<span id="id9"><div class="title1">
<p class="p">Отчет № 9</p>
</div><p class="subtitle">1 апреля</p><p class="p1">Вся пекарня пришла севодня посмотреть как я начал работать на тестосмесителе. Вот как это получилось. Оливер который работал на смесителе вчера уволился. Я помогал ему раньше когда приносил мешки с мукой и высыпал ее в нутрь. Но все равно я не знал что умею работать на нем. Это очень трудно и Оливер целый год ходил в школу для пекарей чтобы научица быть помошником пекаря.</p><p class="p1">Но Джо Карп он мой друг сказал Чарли почему бы тебе не заменить Оливера. Все собрались во круг и все улыбались и Фрэнк Рейли сказал Чарли ты уже давно работаеш. Давай Джимпи сечас нету и он ничево не узнает. Я испугался потомучто Джимпи старший пекарь и он сказал мне ни когда не подходи к смесителю если не хочеш лежать в больнице с переломанными костями. Все кричали давай начинай только Фанни Бирден сказала хватит оставте беднягу в покое.</p><p class="p1">Фрэнк Рейли сказал заткнись Фанни севодня первое апреля и если Чарли как следует поработает у нас будет выходной. Я сказал что могу и поработать потомучто я видел как это делает Оливер но если смеситель сломаеца то починить ево я не смогу.</p><p class="p1">Я включил смеситель и все удивились особенно Фрэнк Рейли. Фанни Бирден совсем разволновалась и сказала Оливер 2 года учился замешивать тесто а он ходил в школу для пекарей. Берни Бэйт который был помошником Оливера сказал что я делаю это быстрее чем Оливер и лутше. Никто больше не смеялся а когда пришол Джимпи и Фанни расказала ему он очень рассердился на меня.</p><p class="p1">Но тогда она сказала сам посмотри как у нево получаеца. Они хотели надуть ево потомучто севодня первое апреля а он сам всех одурачил. Джимпи стал смотреть и я знал что он злица на меня потомучто он не любит когда другие делают не то что он велит совсем как проф Немур. Он посмотрел как я работаю почесал в голове и сказал я вижу но не верю своим глазам. Потом он позвал мистера Доннера и сказал поработай ещо чтобы мистер Доннер тоже посмотрел. Я боялся что он разозлится и начнет орать на меня так что когда я кончил я сказал у меня много дел. Нужно подмести перед входом и убраца за стойкой. Мистер Доннер все смотрел и смотрел на меня а потом сказал ребята это перво апрельская шутка. В чом соль. Джимпи сказал я тоже с начала думал они дурачяца. Он прохромал во круг машины и сказал мистер Доннер я тоже ничево не понимаю но нужно признать что Чарли знает как работать на смесителе и делает это лутше Оливера. Все столпились во круг и заговорили. Я испугался потомучто они смотрели на меня и были какие то странные. Фрэнк сказал я говорил вам Чарли чудной в последнее время. А Джо Карп сказал ага я знаю что ты имееш в виду. Мистер Доннер сказал чтобы все шли работать и вышел со мной во двор.</p><p class="p1">Он сказал Чарли я не знаю в чом дело но кажеца ты на конец чему то научился. Мне хочеца чтобы ты был осторожным и усердно трудился. Теперь у тебя новая работа и плата за нее на 5 доларов больше.</p><p class="p1">Я сказал не нужна мне новая работа потомучто мне нравица мыть и подметать и разносить и делать что ни будь для моих друзей но мистер Доннер сказал плевать на друзей ты нужен мне имено для этой работы. Мне не нравяца люди которые не хотят повышения. Я спросил что такое повышение. Он почесал за ухом и посмотрел на меня по верх очков. Не бойся Чарли с севоднешнево дня ты работаеш на смесителе. Это и есть повышение.</p><p class="p1">Так что теперь вместо разноски посылок мытья сортиров и уборки помоев я новый пекарь. Это повышение. Завтра я скажу мис Кинниан. Я знаю что она обрадуеца но ни как не могу понять почему Фрэнк и Джо так зляца на меня. Я спросил Фанни и она сказала не обращай внимания на этих идиотов. Севодня первое апреля они хотели выставить тебя дураком а остались в дураках сами. Я спросил Джо какую они хотели сыграть шутку а он сказал иди утопись в пруду. Мне кажеца они зляца потомучто хоть я не поработал на смесителе но выходново дня не получилось. Значит ли это что я умнею.</p><p class="subtitle">3 апреля</p><p class="p1">Кончил Робинзона Крузо. Я хотел узнать что случилось с ним потом но мисс Кинниан сказала что книга на этом кончается. ПОЧЕМУ.</p><p class="subtitle">4 апреля</p><p class="p1">Мисс Кинниан сказала я учюсь быстро. Она прочитала мои отчеты и долго молча смотрела на меня. Она сказала я хороший человек и еще покажу им всем. Я спросил ее почему. Она сказала не обращай внимания и не расстраивайся когда вдруг заметишь что другие люди совсем не такие расчудесные как раньше казалось. Ты человек которому Господь дал так мало делаешь куда больше чем люди с мозгами которые не знают как ими пользоваться. Я сказал они все мои друзья умные и хорошие. Они любят меня и делают мне только приятное. Тут ей чтото попало в глаз и ей пришлось выбежать в дамскую комнату.</p><p class="p1">Я сидел в класе ждал ее и думал какая мисс Кинниан приятная леди совсем как моя мама. Мама всегда говорила мне чтобы я был хорошим и добрым мальчиком. Она говорила всегда будь осторожным а то люди не поймут тебя и подумают что ты хочешь сделать им чтото плохое.</p><p class="p1">Потом я вспомнил как мама должна была уйти и меня отдали на несколько дней в дом миссис Леруа нашей соседки. Мама была в больнице. Папа сказал она не заболела и ничего такого просто она принесет обратно маленького братика или сестричку. Я сказал я хочу братика чтобы играть с ним и не знаю за чем мне сестра но она была красивая как кукла. Только все время плакала.</p><p class="p1">Я ни разу не сделал ей больно.</p><p class="p1">Ее положили в кроватку в спальне и один раз я услышал как папа сказал не бойся Чарли не сделает ей ничего плохого. Она была похожа на комочек вся розовая и вопила так что я ни как не мог уснуть. Один раз когда они были на кухне а я лежал в кровати она заплакала. Я встал взял ее и стал качать чтобы успокоить как мама. Но тут вбежала мама отобрала ее и ударила меня так сильно что я упал на кровать.</p><p class="p1">Потом она начала кричать. Не смей прикасаться к ней. Ты сломаеш ей что нибудь. Она совсем маленькая. Не подходи к ней. Тогда я не знал но теперь мне кажется она боялась что я сделаю ей что ни будь плохое потомучто я был слишком глуп чтобы понимать что делаю. Сейчас мне очень грустно когда я вспоминаю об этом потомучто как я мог сделать плохо такой крошке.</p><p class="p1">Когда пойду к доку Штраусу обезательно расскажу ему про это.</p><p class="subtitle">5 апреля</p><p class="p1">Сегодня, я, узнал что, такое, запятая, это, точка, с, хвостиком (,) и мисс, Кинниан, говорит, очень, важная потому, что, улучшает, правописание, и можно, потерять, много денег, если, запятая, стоит, не, там, я сберег, чуть, чуть, денег от, работы, и, что, платит, фонд, и не, знаю, как, запятая, помогла, мне, сохранить, их,</p><p class="p1">Но, она, говорит, все, пользуются, запятыми, и, ты, тоже, пользуйся,</p><p class="subtitle">7 апреля</p><p class="p1">Я ставил запятые неправильно. Это <em>пунктуация</em>. Мисс Кинниан сказала чтобы я смотрел длинные слова в словаре и учился их правильно писать и произносить. Я сказал какая разница если слово все равно можно прочитать. Она ответила что это показывает твою образованность так что теперь я буду смотреть все слова которые не знаю как писать и произносить. Так на писание отчетов уходит больше времени но мне кажется я начинаю запоминать все больше и больше.</p><p class="p1">Слово <em>пунктуация</em> я тоже нашел в словаре. Мисс Кинниан сказала точка это тоже пунктуация но кроме нее есть еще много всяких знаков. Наверное она имеет в виду что все точки должны быть с хвостиками и называться запятыми.</p><p class="p1">Она; сказала, ты — должен? их! сочетать: Она показала) мне, как! их сочетать; и, теперь? я! могу — писать, все эти! знаки! Правил(очень? много; но я! их запомню’</p><p class="p1">Вот? что мне: нравится! в, дорогой? мисс Кинниан: она? всегда. отвечает, если я ее! спрашиваю — она, гений! Я« хочу, быть: умным? как она! Пунктуация, это? здорово!</p><p class="subtitle">8 апреля</p><p class="p1">Какой же я осел! Я даже не понял, о чем она говорит. Вчера вечером я прочитал книгу по грамматике, и в ней все объясняется. А ведь мисс Кинниан старалась внушить мне то же самое. Я проснулся посреди ночи и в голове у меня все прояснилось. Мисс Кинниан сказала, что я вышел на плато. Это вроде плоской вершины холма.</p><p class="p1">Когда я понял, зачем нужна пунктуация, я перечитал все свои отчеты с самого начала. Боже мой! Ну и стиль! Я сказал мисс Кинниан, что хочу исправить все ошибки, на что она ответила:</p><p class="p1">— Профессор Немур не хочет ничего в них менять. Поэтому он и разрешает тебе оставлять их у себя — чтобы ты видел свой прогресс. Чарли, ты просто молодец.</p><p class="p1">Это приятно. После урока я зашел к Элджернону и поиграл с ним. Мы больше не бегаем наперегонки.</p><p class="subtitle">10 апреля</p><p class="p1">Мне плохо. Это не та болезнь, которую может вылечить врач, она внутри, у меня в груди. Там все пусто, как будто мне вырвали сердце. Случившееся слишком важно, чтобы умолчать о нем. Сегодня мне в первый раз не захотелось идти на работу. И я не пошел.</p><p class="p1">Вчера Джо Карп и Фрэнк Рейли пригласили меня на вечеринку. Там было много девушек, и Джимпи, и Эрни тоже. Я еще не забыл, как мне стало плохо, когда я выпил виски, и сказал Джо, что ничего не буду пить. Тогда он дал мне стакан кока-колы с каким-то странным привкусом. Я не обратил на него внимания.</p><p class="p1">Мы немного повеселились.</p><p class="p1">— Потанцуй с Эллен, — сказал Джо, — она поучит тебя. — И подмигнул как будто ему что-то попало в глаз.</p><p class="p1">Эллен сказала:</p><p class="p1">— Отстань от него.</p><p class="p1">Джо хлопнул меня по спине.</p><p class="p1">— Это Чарли Гордон, мой приятель, мой лучший друг. Он головастый парень — его повысили и теперь он работает на сложной машине — тестосмесителе. Мне хочется, чтобы он немного развлекся. Что в этом плохого?</p><p class="p1">Он подтолкнул меня к ней. Заиграла музыка и мы начали танцевать. За одну минуту я упал три раза и никак не мог понять почему. Я все время спотыкался о чью-то выставленную вперед ногу.</p><p class="p1">Все гости хохоча смотрели на нас. Когда я падал, они начинали смеяться еще громче, и я вместе с ними. Но упав в четвертый раз, я не засмеялся. Я стал подниматься, но Джо толкнул меня, и я снова упал.</p><p class="p1">Я поднял взгляд и увидел на его лице такое выражение, что у меня внутри все сжалось.</p><p class="p1">— Потрясно, — сказала одна из девиц, задыхаясь от смеха.</p><p class="p1">— О, Фрэнк, ты прав, он неподражаем, — выдавила из себя Эллен. Потом она добавила: — Эй, Чарли, скушай фрукт, — и протянула мне яблоко.</p><p class="p1">Я укусил его, но оно оказалось не настоящее.</p><p class="p1">Тогда Фрэнк сказал:</p><p class="p1">— Я же говорил, он сожрет его! Только такой кретин не может отличить пластмассовое яблоко от настоящего.</p><p class="p1">Джо добавил:</p><p class="p1">— Я не ржал так с тех пор, когда мы послали его за угол посмотреть, идет ли там дождь.</p><p class="p1">Мне вспомнилось, как давно, когда я был маленьким, соседские ребята разрешили мне поиграть с ними в прятки, и я водил. Сосчитав до десяти десять раз на пальцах, я отправился искать. Я искал их, пока не стало темно и холодно, и мне пришлось уйти домой.</p><p class="p1">Я никого не нашел.</p><p class="p1">После слов Фрэнка мне все стало ясно. И там, и у Халлорана произошло одно и то же. Так вот чем занимались Джо с компанией… Издевались надо мной. И те ребята — тоже.</p><p class="p1">Я лежал, а они глядели на меня сверху вниз и ржали, ржали…</p><p class="p1">— Глянь-ка, у него рожа красная.</p><p class="p1">— Он покраснел. Чарли покраснел!</p><p class="p1">— Эллен, что ты с ним сделала? Мы никогда не видели его таким!</p><p class="p1">— Да, Эллен, здорово ты его обработала!</p><p class="p1">Я не знал, что делать и куда смотреть. Внезапно я почувствовал себя голым. Мне захотелось спрятаться, и чтобы меня никто никогда не нашел. Я выбежал из квартиры. Это был большой дом с множеством коридоров. Я забыл про лифт и никак не мог найти лестницу. Потом я долго бродил по улицам. Мне и в голову раньше не приходило, что они таскали меня с собой только за тем, чтобы повеселиться за мой счет.</p><p class="p1">Теперь я знаю, что такое «строить из себя Чарли Гордона».</p><p class="p1">Мне стыдно.</p><p class="p1">Ночью мне снилась Эллен, как она танцует и прижимается ко мне, а когда я проснулся, простыня была мокрой и грязной.</p><p class="subtitle">13 апреля</p><p class="p1">Я так и не хожу в пекарню. Я попросил миссис Флинн, мою хозяйку, позвонить мистеру Доннеру и сказать, что я заболел. Миссис Флинн, кажется, начала бояться меня.</p><p class="p1">Я понял наконец почему надо мной смеются, и думаю, это открытие поможет мне. Я был настолько глуп, что даже не понимал, до чего я глуп. Людям становится очень весело, когда дурак делает что-нибудь не так, как они.</p><p class="p1">Зато теперь я знаю, что каждый день становлюсь чуточку умнее. Я знаю, что такое пунктуация и как правильно писать слова. Мне нравится выискивать трудные слова в словаре, и я легко запоминаю их. Я стараюсь писать отчеты как можно аккуратнее, но это отнимает уйму времени. Я много читаю, и мисс Кинниан говорит, что я читаю очень быстро. Я даже понимаю многое из того, что читаю. Бывает так, что я закрываю глаза и вижу перед собой целую страницу, словно картину.</p><p class="p1">Утром я проснулся и долго лежал в постели с открытыми глазами. В стене, отгородившей мой мозг от остального мира, появилась огромная дыра, и я вышел сквозь нее.</p><p class="empty-line"/><p class="p1">…Это было давно, очень давно, когда я только начинал работать у Доннера. Я вижу улицу, на которой стоит пекарня. Сначала все как в тумане. Потом начинают проявляться отдельные детали, они кажутся настолько реальными, что я как будто и в самом деле стою там…</p><p class="p1">Тщедушный старик с детской коляской, переделанной в тележку с угольной жаровней, запах жареных орешков, снег на тротуаре. Долговязый молодой человек с широко раскрытыми глазами и выражением испуга на лице уставился на вывеску. Что там написано? Теперь-то я <em>знаю</em>: «ПЕКАРНЯ ДОННЕРА», но, заглядывая в глубины памяти, я не могу прочитать вывеску его глазами. Он не умеет читать. Этот парень с испуганным лицом — я, Чарли Гордон.</p><p class="p1">Слепящие неоновые огни. Рождественские елки и прохожие. Люди в пальто с поднятыми воротниками. Их шеи укутаны теплыми шарфами. А у него нет перчаток. Его руки замерзли, и он опускает на землю тяжелые коричневые бумажные мешки. Он остановился, чтобы получше рассмотреть маленькие заводные игрушки на лотке уличного торговца — переваливающегося с ноги на ногу медвежонка, подпрыгивающую собачку, тюленя с крутящимся на носу мячом. Топает, прыгает, крутится… Если бы эти игрушки были его, он стал бы счастливейшим человеком в мире.</p><p class="p1">Он хочет попросить краснолицего торговца, чьи пальцы торчат из рваных дешевых перчаток, минутку, всего одну минутку подержать медвежонка, но ему страшно. Он поднимает свой груз и взваливает его себе на плечо. Пусть он худ, но годы тяжелой работы закалили его.</p><p class="p1">— Чарли! Чарли! Наш Чарли!..</p><p class="p1">Вокруг собрались дети, они весело смеются и дразнят его — собачки, тявкающие под ногами. Чарли улыбается им. Ему хочется положить пакеты на тротуар и поиграть с ними, но пока он раздумывает, что-то ударяет его в спину. Это ребята постарше швыряют в него куски льда.</p><p class="p1">В подворотне, недалеко от пекарни, расположилась компания парней.</p><p class="p1">— Смотри-ка, Чарли!</p><p class="p1">— Эй, Чарли! Что это там у тебя?</p><p class="p1">— Чарли, кинем кости?</p><p class="p1">— Двигай сюда, повеселимся!</p><p class="p1">Но в подворотне есть что-то пугающее — темнота, смех… По коже бегут мурашки. Он пробует понять, что же страшит его, но вспоминает только грязь и помои на одежде, дядю Германа, выскочившего на улицу с молотком в руке, когда он пришел домой весь заляпанный дерьмом… Чарли подальше обходит гогочущих парней, роняет мешок, поднимает его и что есть духу бежит к пекарне.</p><p class="p1">— Где тебя носило, Чарли? — орет Джимпи из глубины дома.</p><p class="p1">Чарли протискивается сквозь вращающиеся двери и сваливает кипу пакетов на один из желобов, спускающихся в подвал. Он прислоняется спиной к стене и засовывает руки в карманы.</p><p class="p1">Ему нравится здесь. Полы белые от муки, белее закопченных стен и потолка. Толстые подошвы его ботинок покрыты белым налетом, мука забилась в швы и дырочки для шнурков, она у него под ногтями и в трещинах на коже мозолистых рук.</p><p class="p1">Присев на корточки, он расслабляется, бейсбольная шапочка с большой буквой Д сползает ему на глаза. Он любит запах муки, сладкого теста, хлеба и пирожков. Печь потрескивает и нагоняет на него сон.</p><p class="p1">Сладко… тепло… он спит…</p><p class="p1">Внезапно он изгибается, падает и со всего размаху врезается головой в пол. Кто-то, проходя мимо, ударил его, спящего, по ногам.</p><p class="empty-line"/><p class="p1">…Вот и все, что я вспомнил. Я представляю себе эту сцену совершенно отчетливо и не могу ничего понять. Так же было и с кино. Я начинал понимать, о чем фильм, только после того, как смотрел его три или четыре раза. Нужно спросить доктора Штрауса.</p><p class="subtitle">14 апреля</p><p class="p1">Доктор Штраус сказал, что такие воспоминания чрезвычайно интересны и их обязательно нужно записывать. А потом мы вместе будем их обсуждать.</p><p class="p1">Доктор Штраус — психиатр и нейрохирург. Я не знал этого. Мне казалось, он просто доктор. Когда я пришел к нему сегодня утром, он заговорил о том, как важно мне понять себя, чтобы решить свои проблемы. Я ответил, что нет у меня никаких проблем.</p><p class="p1">Он рассмеялся, встал и подошел к окну.</p><p class="p1">— Чем разумнее ты будешь становиться, Чарли, тем больше их будет возникать. Твое интеллектуальное развитие значительно опережает эмоциональное, мне кажется, что тебе все чаще и чаще придется обсуждать со мной многие вещи. Я просто хочу напомнить, что если тебе понадобится помощь, приходи сюда.</p><p class="p1">По его словам выходит, что когда-нибудь в недалеком будущем все мои сны и воспоминания свяжутся воедино, и я многое узнаю о себе. Он сказал, что очень важно вспомнить, что именно говорили обо мне люди.</p><p class="p1">Ничего этого я раньше не знал. Значит, если я стану достаточно умным, то пойму все слова, которые роятся у меня в голове, узнаю все про тех парней в подворотне, про дядю Германа, про маму и папу. И вот тогда мне станет совсем плохо, и мой мозг может повредиться.</p><p class="p1">Так что два раза в неделю я прихожу к нему в кабинет и говорю о том, что меня тревожит. Мы садимся, и доктор Штраус начинает слушать. Это называется терапия. После таких разговоров я должен чувствовать себя лучше. Я признался ему, что больше всего меня тревожит то, что я ничего не знаю о женщинах. Как я танцевал с Эллен и что случилось потом. Тут я почувствовал себя не в своей тарелке — мне стало холодно, я вспотел, в голове возникло непонятное жужжание, к горлу подступила тошнота. Я всегда считал неприличным говорить о таких вещах. Но доктор Штраус спокойно объяснил, что случившееся со мной после вечеринки называется поллюция. Ничего страшного, с кем не бывало.</p><p class="p1">Оказывается, хоть я и умнею на глазах, в некоторых отношениях я еще совсем ребенок. Меня это смущает, но рано или поздно я обязательно узнаю о себе все.</p><p class="subtitle">15 апреля</p><p class="p1">Я очень много читаю и почти все запоминаю. Мисс Кинниан сказала, что кроме истории, географии и арифметики мне следовало бы заняться иностранными языками. Профессор Немур дал мне еще несколько кассет для ночной учебы. Я все еще не понимаю, как работают сознание и подсознание. Доктор Штраус говорит, чтобы я не ломал над этим голову. Он заставил меня пообещать, что когда я через пару недель начну изучать курс колледжа, то не буду читать книг по психологии без его разрешения. Он считает, что они собьют меня с толку и вместо того, чтобы поглубже разобраться в собственных мыслях и ощущениях, я начну копаться в противоречивых психологических теориях. Но романы мне читать никто не запрещает. За прошлую неделю я одолел «Великий Гэтсби», «Американская трагедия» и «Взгляни на дом свой, ангел». Никогда не думал, что люди могут позволять себе такое.</p><p class="subtitle">16 апреля</p><p class="p1">Сегодня я чувствую себя значительно лучше, хотя еще злюсь при мысли о том, что всю жизнь люди смеялись и издевались надо мной. Когда я стану совсем умным и мой КИ удвоится по сравнению с нынешними семьюдесятью, то, может быть, я начну нравиться окружающим, и у меня появятся друзья.</p><p class="p1">Что такое КИ, или коэффициент интеллектуальности? Профессор Немур говорит, что это нечто, чем можно измерить, насколько человек разумен — как стрелка весов в аптеке. Доктор Штраус крупно поспорил с ним и заявил, что с помощью КИ нельзя <em>взвесить</em> разум. По его словам, КИ показывает, насколько умным человек <em>может</em> стать. Как деления на мерном стакане. Правда, стакан этот нужно еще чем-то наполнить.</p><p class="p1">Когда я спросил об этом Барта Селдона, он ответил, что есть ученые, которые не согласятся ни с тем, ни с другим определением. Он вычитал где-то, что КИ измеряет множество разнообразнейших показателей, включая и знания, уже приобретенные человеком, и что на самом деле это далеко не лучшая оценка умственных способностей.</p><p class="p1">Так что я до сих пор не знаю, что такое КИ. У меня он сейчас около ста, а скоро будет больше ста пятидесяти, но ведь стакан еще нужно чем-то наполнить. Не хочу сказать ничего плохого, но если ученые не знают, <em>что</em> это такое, то как они могут определить, <em>сколько</em> его?</p><p class="p1">Профессор Немур сказал, что послезавтра меня ожидает тест Роршаха. Интересно, что это такое?</p><p class="subtitle">17 апреля</p><p class="p1">Ночью мне снился кошмар и утром, следуя советам доктора Штрауса, я снова испробовал метод свободной ассоциации. Вспоминаю сон и позволяю разуму свободно странствовать, надеясь при этом, что в нем родятся другие мысли. Чаще всего в результате у меня вообще никаких мыслей не остается. По словам доктора Штрауса, это значит, что я достиг такого положения, при котором подсознание блокирует сознание, оберегая его от неприятных воспоминаний. Своеобразная стена между настоящим и прошлым. Иногда она рушится, и я могу вспомнить случаи, скрытые за ней. Как сегодня утром.</p><p class="p1">Во сне мисс Кинниан читала мои отчеты.</p><p class="p1">Я уже приготовил ручку, но обнаружил, что больше не умею ни читать, ни писать. Все ушло. Я страшно перепугался и попросил Джимпи написать отчет вместо меня. Но когда мисс Кинниан стала читать его, она вдруг рассердилась и порвала все листы, потому что там были написаны неприличные слова. Когда я вернулся домой, профессор Немур и доктор Штраус были там и избили меня за то, что я пишу ругательства в отчетах. Они ушли и я стал подбирать разорванные листы, но они превратились в окровавленные обрывки кружев.</p><p class="p1">Это был ужасный сон, и когда я вылез из-под одеяла и записал его, то попробовал проанализировать свои мысли.</p><p class="p1">Пекарня… ночь… урна… кто-то бьет меня ногой… падаю… кровь… писать… большой карандаш… маленькое золотое сердечко… медальон… нитка… все в крови… они хохочут надо мной… нитка от медальона… она крутится… солнечные зайчики слепят глаза… мне нравится, смотреть, как она крутится… наматывается на палец… на меня смотрит девочка.</p><p class="p1">Ее зовут мисс Кин… — ее зовут Гарриет.</p><p class="p1">— Гарриет, Гарриет, все мы любим Гарриет…</p><p class="p1">И снова привычная пустота.</p><p class="p1">Мисс Кинниан читает отчет, заглядывая мне через плечо.</p><p class="p1">Потом мы в школе для умственно отсталых взрослых. Она смотрит, как я пишу сочинение.</p><p class="p1">Вместо моей школы вдруг появляется школа № 13. Мне одиннадцать лет, и мисс Кинниан тоже одиннадцать лет, но она уже не мисс Кинниан, она — девочка с ямочками на щеках и длинными белокурыми волосами. Ее зовут Гарриет. Все мы любим Гарриет. Сегодня 14 февраля, день святого Валентина. Я вспомнил…</p><p class="empty-line"/><p class="p1">Я вспомнил, что случилось в школе № 13 и почему меня пришлось перевести в школу № 222. Из-за Гарриет. Я вижу Чарли — одиннадцатилетнего. У него есть золотистый медальон, он нашел его на улице. Цепочка отсутствует, но он подвесил его на нитку и очень любит крутить его — нитка сначала наматывается на палец, потом раскручивается. Медальон красиво блестит на солнце.</p><p class="p1">…Когда Гарриет проходит мимо, ребята бросают любую игру и смотрят на нее. Все ребята влюблены в Гарриет. Она кивает головой, и ее локоны подпрыгивают, а на щеках у нее ямочки. Чарли не понимает, почему они так суетятся из-за какой-то девчонки и почему их так тянет поболтать с ней (сам он предпочитает поиграть в футбол), но все ребята без ума от Гарриет, и Чарли тоже без ума от нее.</p><p class="p1">Она никогда не дразнит его, и он готов сделать для нее что угодно. Он бегает по столам, когда учителя нет в классе, он швыряет ластики в окно, пишет мелом на стенах. Гарриет всегда при этом взвизгивает и хихикает:</p><p class="p1">— Ох, Чарли! Какой он смешной! Какой он глупенький!</p><p class="p1">Сегодня день святого Валентина. Ребята обсуждают, что подарить Гарриет, и Чарли говорит:</p><p class="p1">— Я тоже подарю ей кое-что.</p><p class="p1">Все смеются, а Барри спрашивает:</p><p class="p1">— А где ты возьмешь подарок?</p><p class="p1">— Я подарю ей красивую штуку. Вот увидите.</p><p class="p1">Но у него нет денег, и он решает подарить Гарриет свой медальон. Он в форме сердечка и так похож на те, что лежат в витринах шикарных магазинов. Вечером он берет из маминого стола лист оберточной бумаги, долго и тщательно заворачивает медальон и перевязывает красной ленточкой. На следующий день, во время перерыва на завтрак, он просит Хайми Рота написать на свертке записку. Он диктует:</p><p class="p1">— Дорогая Гарриет! Мне кажется, что ты самая красивая во всем мире. Ты мне очень нравишься и я люблю тебя. Будь моей возлюбленной. Твой друг Чарли Гордон.</p><p class="p1">Хайми аккуратными печатными буквами выводит послание на бумаге и, не переставая хохотать, говорит:</p><p class="p1">— Да у нее глаза вылезут на лоб! Пусть только прочитает!</p><p class="p1">Чарли страшно, но ему очень хочется подарить Гарриет медальон, и после школы он незаметно идет за ней. Подождав, пока она войдет в дом, он проскальзывает в прихожую, вешает подарок на дверную ручку, дважды звонит, перебегает улицу и прячется за деревом.</p><p class="p1">Выходит Гарриет, в недоумении осматривается, замечает сверток, берет его и уходит в дом. Чарли торопится домой и получает трепку за то, что взял бумагу и ленту без спроса. Но ему все равно. Завтра Гарриет придет в школу с медальоном и всем скажет, что это подарок Чарли.</p><p class="p1">Утром он чуть свет бежит в школу, но еще слишком рано. Гарриет еще не пришла, и он ужасно волнуется.</p><p class="p1">Вот появляется Гарриет, но она даже не глядит на него. На ней нет медальона и вид у нее сердитый. Чего он только не вытворяет, когда мисс Джексон отворачивается! Он корчит рожи. Он громко хохочет. Он встает на стул и вертит задницей. Он даже швыряет кусок мела в Гаролда. Но Гарриет не смотрит на него. Может, она забыла. Может быть, она оденет медальон завтра. На перемене она молча обходит его стороной.</p><p class="p1">На школьном дворе Чарли поджидают два ее старших брата.</p><p class="p1">Гэс толкает его.</p><p class="p1">— Эй, ублюдок, это ты написал грязную записку нашей сестре?</p><p class="p1">Чарли отвечает, что он никогда не писал никаких грязных записок.</p><p class="p1">— Я только подарил ей медальон.</p><p class="p1">Оскар, который раньше играл в школьной футбольной команде, хватает Чарли за рубашку и отрывает две пуговицы.</p><p class="p1">— Держись подальше от нашей малышки, дегенерат. Тебе все равно нечего делать в этой школе. — Он толкает Чарли к Гэсу, и тот обхватывает его за шею.</p><p class="p1">Чарли становится страшно и он плачет.</p><p class="p1">Тогда они начинают делать ему больно. Оскар бьет его в нос, а Гэс сбивает с ног. И оба начинают пинать его — сначала один, потом другой. Дети — друзья Чарли — сбегаются со всего двора, хлопают в ладоши и вопят:</p><p class="p1">— Драка! Драка! Чарли колотят!</p><p class="p1">Вся его одежда порвана, из носа течет кровь, зуб сломан, и когда Оскар и Гэс уходят, он садится на тротуар и плачет. Ребята смеются и кричат:</p><p class="p1">— Чарли всыпали! Чарли всыпали!</p><p class="p1">Потом появляется мистер Вагнер и прогоняет их. Он отводит Чарли в туалет и заставляет вымыть лицо и руки…</p><p class="p1">Полагаю, я был весьма глуп, веря всему, что мне говорят. Нельзя было доверяться Хайми. Да и никому другому.</p><p class="p1">Я никогда раньше не думал об этом случае, но после того, как поразмышлял о кошмаре, вспомнил его. Есть в нем что-то общее с тем чувством, которое я испытываю, когда мисс Кинниан читает мои отчеты. Но я рад, что теперь мне никого не надо просить написать что-нибудь. Теперь я могу сделать это сам.</p><p class="p1">Гарриет так и не вернула мне медальон.</p><p class="subtitle">18 апреля</p><p class="p1">Наконец я понял, что такое «Роршах». Это тест с чернильными пятнами, тот самый, который я проходил перед операцией. Увидев знакомые листки, я здорово перепугался. Барт попросит меня найти в пятнах картинки, а я не смогу этого сделать. Если бы только можно было заранее узнать, что в них спрятано! Может оказаться, что там ничего нет. Может, вся эта затея только для того, чтобы посмотреть, достаточно ли я глуп, чтобы искать картинки в пятнах. От этой мысли я сразу разозлился на Барта.</p><p class="p1">— Чарли, — сказал он, — ты уже видел эти карточки раньше. Помнишь?</p><p class="p1">— Конечно, помню.</p><p class="p1">По моему тону он заметил, что я не в себе, и удивленно посмотрел на меня.</p><p class="p1">— В чем дело, Чарли?</p><p class="p1">— Ни в чем. Просто эти пятна злят меня.</p><p class="p1">Он улыбнулся и кивнул головой.</p><p class="p1">— Тут не на что злиться. Это всего лишь один из стандартных тестов. Посмотри на эту карточку. Что бы это могло быть? Чего только люди не видят в этих пятнах! А что <em>тебе</em> кажется? О чем ты думаешь, глядя на них?</p><p class="p1">Я не ожидал ничего подобного и был потрясен. Я посмотрел на карточку, потом на него.</p><p class="p1">— Ты хочешь сказать, что в пятнах не скрыто никаких изображений?</p><p class="p1">Барт нахмурился и снял очки.</p><p class="p1">— Что?</p><p class="p1">— Изображения! Скрытые в пятнах! В прошлый раз ты сказал, что они там есть и каждый может их увидеть!</p><p class="p1">— Нет, Чарли. Я просто не мог тебе этого сказать.</p><p class="p1">— Неправда! — закричал я на него. Испугаться такого пустяка! Это разозлило меня еще больше. — Ты сказал мне именно так! То, что ты умнее и учишься в колледже, не дает тебе права издеваться надо мной! Я по горло сыт тем, что каждый, кому не лень, потешается надо мной!</p><p class="p1">Никогда раньше я не испытывал таких чувств. Все во мне взорвалось. Я швырнул карточки Роршаха на стол и выскочил из комнаты. Профессор Немур как раз проходил мимо, и когда я молча промчался по коридору, сразу понял, что что-то неладно.</p><p class="p1">Они с Бартом догнали меня у самого лифта.</p><p class="p1">— Чарли, — сказал Немур, беря меня за руку, — погоди минутку. Что случилось?</p><p class="p1">Я вырвал руку и повернулся к Барту.</p><p class="p1">— Я устал от издевательств. Вот и все. Может, раньше я этого не замечал, зато замечаю теперь, мне это совсем не нравится.</p><p class="p1">— Но Чарли, нам и в голову не придет издеваться над тобой, — сказал Немур.</p><p class="p1">— А чернильные пятна? В прошлый раз Барт сказал мне, что там, в чернилах, спрятаны картинки, что каждому под силу разглядеть их, и я…</p><p class="p1">— Вот что, Чарли. Хочешь послушать свой разговор с Бартом? У нас есть магнитофонная запись. Давай послушаем все вместе.</p><p class="p1">Когда Немур пошел за кассетами, Барт пояснил:</p><p class="p1">— В прошлый раз я говорил то же самое. Это стандартное требование к любому тесту — процедура его проведения не должна меняться.</p><p class="p1">В эту минуту вернулся Немур, и услышал, как я ответил:</p><p class="p1">— Послушаем, тогда, может быть, и поверю.</p><p class="p1">Они переглянулись. Кровь бросилась мне в лицо. Они опять смеются надо мной! Но тут до меня дошел смысл собственных слов, и значение этого взгляда стало понятным. Им было не до смеха. Я достиг нового уровня развития. Но гнев и подозрительность стали первыми чувствами, которые я испытал к окружающему меня миру.</p><p class="p1">Из динамика донесся голос Барта:</p><p class="p1">— А сейчас, Чарли, я хочу, чтобы ты поглядел на эту карточку. Что это такое? Что ты видишь на ней? Людям чудятся в этих пятнах самые разные вещи. Скажи мне, о чем ты думаешь…</p><p class="p1">Те же самые слова, тот же самый тон. А потом я услышал себя… Невероятно… Ноги мои подкосились, и я рухнул в кресло рядом со столом Немура.</p><p class="p1">— Это и в самом деле я?..</p><p class="p1">…Мы с Бартом вернулись в лабораторию и прошли весь тест. Медленно и со вкусом. На этот раз ответы мои были другими, я <em>увидел</em> изображения. Пару дерущихся летучих мышей. Фехтовальщиков с мечами. Я воображал себе что угодно. Но я уже не мог заставить себя безоговорочно доверять Барту.</p><p class="p1">Он записывал. Я попробовал подглядеть, но записи были похожи на шифр, вроде: ВФ+АДдФ-Ад ориг. ВФ-АСФ+об.</p><p class="p1">Этот тест так и остался для меня бессмыслицей. Каждый может выдумать что угодно о вещах, которых не видит. Откуда они знают, не поиздевался ли я сам над ними?</p><p class="p1">Попробую разобраться в этом, когда доктор Штраус разрешит мне читать книги по психологии. Мне становится все труднее записывать свои мысли и чувства, потому что я знаю, что все мои отчеты обязательно будут прочитаны. Почему это так беспокоит меня?</p></span>
