<span><p class="p1">Прежде чем я осознал, что происходит, Алиса уже целовала и прижимала меня к себе так крепко, как никто раньше. Но в это самое мгновение, единственное в моей жизни, все началось снова — шум в ушах, холод, тошнота. Я отвернулся.</p><p class="p1">Алиса стала успокаивать меня, говорить, что это не имеет значения, что мне не в чем винить себя. От стыда я заплакал. Так, плача, я и уснул в ее объятиях, а приснились мне бравый рыцарь и розовощекая дева. Только во сне не он, а она держала в руке поднятый меч.</p></span>
