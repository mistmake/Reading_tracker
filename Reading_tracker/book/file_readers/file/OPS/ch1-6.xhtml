</div><p class="p1">Они отыскали мою сестру Норму каторая жывет с моей мамой в бруклине и она дала разрешение на апирацыю. Я так валнуюсь што едва могу записать все это. Но с начала проф Немур и док Штраус не много паспорили. Я сидел в кабинете у профа Немура когда вошли док Штраус и Барт Селдон. Проф Немур почемуто биспакоился нашот меня но док Штраус сказал я выглежу лутше всех ково они видили. Барт сказал мис Кинниан рикамендавала меня ис всех ково она учит в школе для умствено атсталых. Куда я хожу.</p><p class="p1">Док Штраус сказал што у меня есть то што очень харашо. Он сказал у меня есть мативацыя. Ни когда в жызни не знал што она у меня есть. Мне стало преятно когда он сказал што не у каждово у каво ки 68 есть такая штука. Я не знаю што это такое и от куда она взелась но он сказал што у Элджернона она тоже есть, у нево мативацыя от сыра каторый ложут ему в ящик. Но она не может быть только от этово патамушто я на этой неделе не ел сыра.</p><p class="p1">Проф Немур биспакоился што мой ки станет очень высоким а у меня он очень ниский и я от этово заболею. А док Штраус сказал профу Немуру штото чево я не понел пока они разгаваривали и я записал коекакие слова в книшку а патом в атчет.</p><p class="p1">Он сказал Гарольд так зовут профа Немура я знаю што Чярли это не совсем то што вам хочеца для первово сверхинтелекта. Но многие люди с таким ниским развитием враждебны и не желают сатрудничать они тупые и апатичные и с ними трудно иметь дело. Чярли харошый характер он заинтирисован и всегда рад услужыть.</p><p class="p1">Тогда проф Немур сказал не забывайте он будет первым челавеком разум каторово будет улутшен хирурно. Док Штраус сказал вотимено. Где мы ещо найдем слабо умново с такой агромной мативацыей учица. Пасматрите как харашо он на учился читать и писать для своево уровня развития.</p><p class="p1">Я не понел всех слов они гаварили так быстро но кажеца док Штраус был за меня а проф Немур против. Барт сказал Алиса Кинниан сказала у нево желание учица. Он умалял нас. И это правда потому што я хочу стать умным. Док Штраус встал пахадил и сказал нам нужен имено Чярли. Барт кивнул. Проф Немур пачисал затылок потер нос и сказал может вы правы. Но нужно дать ему панять што не все может пройти гладко.</p><p class="p1">Когда он сказал это я так абрадавался и развалнавался што вскачил и пожал ему руку зато што он так добр ко мне. Кажеца он не много испугался когда я сделал это.</p><p class="p1">Он сказал Чярли мы работали над этим очень долго но только с жывотными на пример с Элджерноном. Мы уверены што для твоево здоровья нет апасности но про другое ничево пока сказать нельзя. Я хочю штобы ты понел што может ни чево не палучица и тогда вобще ни чево не случица. Или палучица только на время а патом будет ещо хуже. Ты панимаеш што это значит. Может нам придеца атаслать тебя в дом Уоррена.</p><p class="p1">Я сказал мне всеравно потомушто я ни чево не боюсь. Я очень сильный и всегда делаю только харошее и кроме тово у меня на щастье есть заечья лапка и я ни когда не разбил ни одново зеркала. Один раз я уранил тарелку но это не щитаеца.</p><p class="p1">Док Штраус сказал Чярли даже если ни чево не палучица ты всеравно делаеш агромный вклат в науку. Этот кспиримент много раз ставился на жывотных но ты будеш первым челавеком. Я сказал ему спасибо док вы не пажалеете што дали мне 2ой шанс как гаварит мис Кинниан. Чесное слово. После апирацыи я пастараюсь стать умным. Я очень пастараюсь.</p></span>
