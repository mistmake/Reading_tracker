<p class="p">атчет 7. Март 11</p>
</div><p class="p1">На апирацыи савсем не было больно. Док Штраус сделал ее пока я спал. Я не знаю как потомушто я не видел на моих глазах и галаве 3 дня была павяска и до севодня я не мог писать атчетов. Тощяя сестра каторая следила как я пишу сказала што я пишу ОТЧЕТ не правельно и паказала мне как он пишеца. Нужно запомнить это. Я очень плохо помню как надо писать. Севодня с глаз сняли павяску и я смог написать отчет. Но на галаве ещо астались павяски.</p><p class="p1">Я очень испугался когда они пришли и сказали што пора итти на апирацыю. Меня заставили вылести из кравати и леч на другую кравать каторая на калесах и выкатили меня ис комнаты и по каридору до двери на каторой написано апирацыоная. Я был удевлен это была агромная комната с зелеными стенками и вокруг сидело много других докторов они слидили за апирацыей. Не думал я што это будет как цырк.</p><p class="p1">Человек подошол к столу весь в белом и с белой тряпкой на лице как в картинах по телику и в ризиновых перчятках и сказал спакойно Чярли это я док Штраус. Я сказал привет док я боюсь. Он сказал не надо бояца Чярли ты сичас уснеш. Я сказал што этово я и боюсь. Он пагладил меня по галаве и потом 2 человека в белых масках подошли и привезали мне руки и ноги так што я не мог двигаца и тут я савсем испугался и хотел заплакать но они надели мне на лицо ризиновую штуку дышать и она страно пахла. Все время я слышал как док Штраус гаварит всем про апирацыю и што он собираеца делать. Но я ничево не понел и думал можетбыть потом я стану умным и пойму о чом он гаварит. Я всдохнул и очень устал и с разу уснул.</p><p class="p1">Когда я проснулся я был с нова в своей кравати и было темно. Я ничево не видел но слышал как гаварят. Это были сестра и Барт и я сказал в чом дело включите свет и когда они собираюца апирировать. Они засмиялись и Барт сказал Чярли все уже сделано. А темно потомушто у тебя павяска на глазах.</p><p class="p1">Чюдно. Они сделали это пока я спал.</p><p class="p1">Барт приходит каждый день записать мою тимпиратуру и другие штуки про меня. Он сказал это научный метод. Нужно записать все все штобы потом сделать это с нова когда захатят. Не мне а другим каторые то же не умные.</p><p class="p1">По этому я должен писать эти отчеты. Барт сказал это чясть кспиримента и они сделают фотографеи с отчетов и будут их изучять и узнают што праисходит у меня в мозгу. Не знаю как они узнают это патамушто я читал их милион рас и не знаю што у меня в мозгу и как они узнают.</p><p class="p1">Ну штош это наука и я пастараюсь стать умным как другие. Тогда они будут разгаваривать со мной и я смогу сидеть с ними и слушать как Джо Карп и Фрэнк и Джимпи когда они апсуждают всякие важные дела. Когда они работают они начинают гаварить про бога или про деньги каторые тратит призидент или про риспубликанцев и димакратов. Они шумят бутто хотят подраца тогда приходит мистер Доннер и кричит хватит чесать языки и давай работать. Я тоже хачю разгаваривать про это.</p><p class="p1">Если ты умный то у тебя много друзей с ними можно разгаваривать и ты ни когда не будеш один.</p><p class="p1">Проф Немур сказал штобы я больше писал в отчетах што случаеца со мной но ещо сказал нужно писать што я чуствую и про свое прошлое. Я сказал я не умею вспаминать и думать а он сказал ты папробуй.</p><p class="p1">Все время пока у меня были завязаны глаза я думал и вспаминал но ничево не случилось. Я не знаю про што думать. Можетбыть я спрашу ево и он скажет мне как думать когда я стал умным. Про што думают умные и што помнют. Интиресно.</p><p class="subtitle">12 марта</p><p class="p1">Оказываеца я не должен писать слово ОТЧЕТ на каждом новом листе после тово как проф Немур забирает старый. Нужно писать только число. Это атличная идея и эканомит время. Я могу вставать в кравати и сматреть в окно на траву и деревья. Тощюю сестру зовут Хильда и она очень добрая. Она приносит мне еду паправляет пастель и гаварит што я очень храбрый што разрешыл им делать апирацыю на галаве. Она сказала што не разрешила бы это за весь чяй в китае. Я сказал што это не за чяй а штобы стать умным. А она сказала может они не имели права делать тебя умным потомушто если бы господь хотел штобы я был умным он бы сделал так штобы я радился умным. А што гаварить про Адама и Еву про грех с деревом познания и про яблоко и про их изгнание. И может проф Немур и док Штраус играют с вещями которые лутше аставить в пакое.</p><p class="p1">Она очень тощая и когда разгаваривает ее лицо все краснеет. Она сказала мне нужно молица богу и просить у нево прощения за то што со мной сделали. Но я не ел яблоков и не грешил а теперь я боюсь. Может я зря разришыл им апириравать мои мозги если она гаварит што это против бога. Не хочю гневать господа.</p><p class="subtitle">13 марта</p><p class="p1">Севодня у меня другая сестра. Она очень красивая ее зовут Люсиль и она паказала мне как писать ее имя в отчетах и у нее жолтые волосы и голубые глаза. Я спросил где Хильда и она сказала в радильном атделении где она может трепать езыком сколько угодно. Когда я спросил ее што такое радильное атделение она сказала што там раждаюца маленькие детки а когда я спросил ее как они палучяюца она пакраснела как Хильда и сказала мне нужно померить у ковото тимпиратуру. Никто не расказывал мне про маленьких деток. Может если я стану умным то узнаю. Севодня приходила мис Кинниан и сказала Чярли ты чюдесно выгледиш. Я сказал што чуствую себя здорово но ещо не стал умным. Я думал мне после апирацыи снимут пазяску с глаз и я стану умным и буду знать много всево и смогу читать и разгаваривать про разные вещи как другие.</p><p class="p1">Она сказала это не так Чярли. Это приходит не с разу и нужно потрудица штобы стать умным. Я не знал этово. Если нужно трудица то зачем тогда апирацыя. Она сказала она не уверена но апирацыя должна сделать мне так што если я буду трудица штобы стать умным я буду все помнить а раньше я ничево не помнил.</p><p class="p1">Я сказал ей што это не очень харашо потомушто я думал я стану умным с разу и смогу вернуца и показать парням какой я умный и пагаварить с ними и может я стану памошником пекаря. Патом я хочю найти маму и папу. Они удивяца какой я умный мама всегда хотела штобы я был умный. Может они не прагонят меня если увидют какой я умный. Я сказал мис Кинниан я очень очень пастараюсь. Она пагладила меня по галаве и сказала я верю в тебя Чярли.</p></span>
