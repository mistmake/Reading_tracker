<span id="id11"><div class="title1">
<p class="p">Отчет № 11</p>
</div><p class="subtitle">1 мая</p><p class="p1">Почему я до сих пор не замечал, как хороша Алиса Кинниан? У неё нежные карие глаза и волнистые каштановые волосы до плеч. Когда она улыбается, ее полные губы складываются колечком.</p><p class="p1">Мы сходили в кино, а потом поужинали. В первом фильме я мало что понял, потому что все время думал о том, что вот наконец она сидит рядом. Дважды ее обнаженная рука касалась моей, и оба раза я отдергивал ее в страхе, что она рассердится. Потом я заметил, как впереди нас парень положил руку на плечо своей девушки, и мне тоже захотелось обнять мисс Кинниан. Подумать только, до чего я дошел…</p><p class="p1">Не надо торопиться… Подниму руку на спинку ее кресла… Потом дюйм за дюймом… Вот рука рядом с ее плечом… и как бы случайно…</p><p class="p1">Я не посмел.</p><p class="p1">Я ухитрился всего лишь разместить локоть на поручне ее кресла, но руке тут же пришлось покинуть завоеванное место — мне срочно потребовалось вытереть пот с лица. А один раз она случайно коснулась меня ногой.</p><p class="p1">В конце концов это стало невыносимо, и я принудил себя не думать о ней. Первый фильм был про войну, но я застал только самый его конец: один солдат возвращается в Европу и женится на женщине, спасшей ему жизнь. Вторая картина заинтересовала меня. Психологический фильм про мужчину и женщину, которые вроде бы любят друг друга, а на самом деле подталкивают себя к гибели. Все идет к тому, что муж прикончит жену, но в последний момент ей снится кошмар, она что-то кричит во сне, и муж начинает вспоминать свое детство. Его озаряет, что всю свою ненависть он должен направить на злую гувернантку, которая постоянно пугала его жуткими историями, оставив тем самым трещину в его драгоценном «я». Взволнованный до глубины души своим открытием, муж вскрикивает от радости, да так, что жена просыпается. Он обнимает ее и… все проблемы решены. Дешевка! Наверно, я как-нибудь проявил свой праведный гнев — Алиса вдруг спросила, что со мной.</p><p class="p1">— Бесстыдное вранье, — объяснил я, когда мы выходили в фойе. — Такого не бывает.</p><p class="p1">— Конечно не бывает, — сказала она и рассмеялась. — Кино — мир притворщиков.</p><p class="p1">— Это не ответ! — продолжал настаивать я. — Даже в выдуманном мире должны существовать свои правила. Отдельные части должны складываться в единое целое. Такие фильмы — ложь. Сценаристу или продюсеру захотелось вставить туда нечто такое, чему там не место, и сразу начинает казаться, что все идет вкривь и вкось.</p><p class="p1">Мы вышли на залитый яркими огнями Таймс-сквер. Алиса задумчиво посмотрела на меня.</p><p class="p1">— Как быстро ты меняешься…</p><p class="p1">— Я растерян. Я больше не знаю, что я знаю.</p><p class="p1">— Пусть это не тревожит тебя. Ты начинаешь видеть и понимать мир. — Она взмахнула рукой, включая в этот жест сверкающий вокруг нас неон. Мы свернули на Седьмую авеню. — Ты начинаешь догадываться, что скрыто за фасадом вещей… А отдельные части должны подходить друг к другу, тут я согласна с тобой.</p><p class="p1">— Ну что ты… У меня совсем нет чувства, что я совершил великое открытие. Я не понимаю себя самого и никак не могу разобраться в своем прошлом. Я не знаю даже, где мои родители, как они выглядят. Когда я вижу их во сне или вспоминаю, то их лица расплываются. А мне так хочется увидеть отраженные в них чувства! Я никогда не пойму, что происходит со мной, пока не увижу их лиц…</p><p class="p1">— Чарли, успокойся. — На нас оборачивались. Алиса взяла меня под руку и притянула к себе. — Потерпи. Не забывай, что за несколько недель ты сделал то, на что у других уходит вся жизнь. Скоро ты начнешь находить связи между отдельными явлениями и поймешь, что разные на первый взгляд области знания на самом деле составляют единое целое. Ты как бы взбираешься по огромной лестнице все выше, и видишь вокруг себя все больше.</p><p class="p1">Когда мы зашли в кафе на Пятьдесят четвертой улице и взяли подносы, она оживленно заговорила:</p><p class="p1">— Обычные люди могут увидеть совсем немного. Не в их власти изменить себя или подняться выше определенного уровня, но ты — гений. Каждый день будет открывать тебе новые миры, о существовании которых ты раньше и не подозревал.</p><p class="p1">Люди в очереди оборачивались поглазеть на новоявленного гения, и мне пришлось слегка подтолкнуть ее, чтобы заставить говорить потише.</p><p class="p1">— Я только надеюсь, — прошептала она, — что это не пойдет тебе во вред.</p><p class="p1">Я не сразу нашелся, что ответить на это. Мы взяли еду со стойки, расплатились и сели за столик. Ели мы молча, и в конце концов молчание начало действовать мне на нервы. Я понимал, чего она боится, и решил обратить все в шутку.</p><p class="p1">— А с чего ты взяла, что операция может повредить мне? Вряд ли я стану хуже, чем раньше. Посмотри на Элджернона. Пока хорошо ему, будет хорошо и мне.</p><p class="p1">Она молча рисовала ножом круги на куске масла, и эти размеренные движения на какое-то мгновение загипнотизировали меня.</p><p class="p1">— А еще, — сказал я, — мне удалось кое-что подслушать. Профессор Немур и доктор Штраус поспорили, и Немур сказал, что он уверен в благополучном исходе.</p><p class="p1">— Будем надеяться, — сказала она. — Ты и представить себе не можешь, как я боялась за тебя.</p><p class="p1">Она заметила, что я уставился на ее нож, и осторожно положила его рядом с тарелкой.</p><p class="p1">Я собрался с духом и произнес:</p><p class="p1">— Я пошел на это только ради тебя.</p><p class="p1">Алиса улыбнулась, и я задрожал от счастья. Тогда-то я и заметил, что у нее нежные карие глаза. Внезапно она опустила взгляд и покраснела.</p><p class="p1">— Спасибо, Чарли, — сказала она и взяла меня за руку.</p><p class="p1"><em>Такого</em> я еще в своей жизни не слышал. Я наклонился к ней и, зажмурившись от страха, произнес:</p><p class="p1">— Ты мне очень нравишься. — Она кивнула головой и чуть-чуть улыбнулась, одними губами… — Больше чем нравишься. Я хочу сказать… Черт возьми, я не знаю, что хочу сказать!</p><p class="p1">Я сознавал, что сижу весь красный, не зная, куда смотреть и что делать с руками. Я уронил вилку, полез доставать ее и опрокинул стакан воды прямо ей на платье. Внезапно опять я стал тупым и неуклюжим и, когда захотел извиниться, обнаружил, что язык у меня слишком большой и не помещается во рту.</p><p class="p1">— Ничего страшного, — попробовала Алиса успокоить меня. — Это всего лишь вода.</p><p class="p1">В такси по дороге домой мы долго молчали, а потом она положила сумочку, поправила мне галстук и выровняла платок в нагрудном кармане.</p><p class="p1">— Ты очень взволнован, Чарли.</p><p class="p1">— Я чувствую себя смешным.</p><p class="p1">— Я расстроила тебя своими разговорами, смутила тебя.</p><p class="p1">— Это не так. Меня тревожит, что я не всегда могу высказать то, что чувствую.</p><p class="p1">— Чувства — новость для тебя. Не все нужно… высказывать…</p><p class="p1">Я придвинулся ближе к ней я хотел взять ее за руку, но она отдернула ее.</p><p class="p1">— Не надо, Чарли. Мне кажется, это не то, что тебе сейчас требуется. Я виновата перед тобой, и неизвестно еще, чем все кончится.</p><p class="p1">И снова я почувствовал, что туп и смешон одновременно. Я разозлился на себя, отодвинулся от Алисы и уставился в окно. Я ненавидел ее, как никого раньше, — за легкие ответы на трудные вопросы и материнское воркование. Мне захотелось влепить ей пощечину, заставить ползать перед собой на коленях, а потом захотелось обнять ее и поцеловать.</p><p class="p1">— Чарли, прости меня.</p><p class="p1">— Забудем об этом.</p><p class="p1">— Но ты должен разобраться в том, что происходит.</p><p class="p1">— Конечно-конечно, но давай все-таки не будем говорить об этом.</p><p class="p1">Когда такси подъехало к ее дому, я уже чувствовал себя самым несчастным человеком на свете.</p><p class="p1">— Пойми, — сказала Алиса, — это моя ошибка. Мне никуда нельзя было ходить с тобой.</p><p class="p1">— Да, теперь я вижу.</p><p class="p1">— Я хочу сказать… Нам нельзя строить наши отношения на… эмоциональной основе. Тебе так много нужно сделать… У меня нет права врываться в твою жизнь.</p><p class="p1">— Это уж моя забота, не так ли?</p><p class="p1">— Это не только твое личное дело, Чарли. У тебя появились обязательства, не перед Немуром и Штраусом, а перед теми миллионами, которые пойдут по твоим следам.</p><p class="p1">Чем больше она говорила об этом, тем хуже мне становилось. Вечер, проведенный с нею, высветил всю мою неловкость, полное незнание того, как вести себя в подобных случаях. В ее глазах я был всего лишь неловким подростком, и она постаралась избавиться от меня как можно изящнее.</p><p class="p1">Мы остановились у дверей ее квартиры. Алиса улыбнулась, и мне показалось даже, что она хочет пригласить меня к себе. Но она только прошептала:</p><p class="p1">— Спокойной ночи, Чарли. Спасибо за чудесный вечер.</p><p class="p1">Мне захотелось поцеловать ее на прощанье. Я уже думал об этом раньше. Всегда ли женщина ждет, что ее поцелуют? В известных мне романах и фильмах инициатива всегда исходила от мужчины. Вчера я твердо решил, что поцелую ее. А вдруг она не позволит?</p><p class="p1">Я шагнул к ней, но Алиса оказалась проворнее меня.</p><p class="p1">— Давай лучше пожелаем друг другу спокойной ночи, Чарли. Нельзя так сразу… Пока нельзя.</p><p class="p1">Прежде чем я смог спросить, что означает это «пока», она переступила порог квартиры.</p><p class="p1">— Спокойной ночи. И спасибо еще раз. Спасибо.</p><p class="p1">Дверь захлопнулась.</p><p class="p1">В тот момент я был зол на себя, на нее, на весь мир, но когда добрался домой, то понял, что она права. Не знаю, нравлюсь ли я ей или она всего лишь старается быть доброй. Что может Алиса найти во мне?</p><p class="p1">Да, я неловок, но только оттого, что никогда прежде не оказывался в подобных обстоятельствах. Откуда человек узнает, как ему вести себя с другие человеком? Откуда мужчина узнает, как вести себя с женщиной?</p><p class="p1">От книг мало толку.</p><p class="p1">В следующий раз обязательно поцелую ее.</p><p class="subtitle">3 мая</p><p class="p1">Среди всего прочего меня тревожит то, что, вспоминая свое прошлое, я никогда не могу с уверенностью сказать, происходило ли что-нибудь на самом деле или мне кажется, что происходило именно так, или я вообще все придумал. Я похож на человека, который проспал полжизни, а теперь пытается узнать, кем он был, пока спал.</p><p class="p1">Ночью мне снились кошмары, и я кое-что запомнил.</p><p class="p1">…Ослепленный клубами пыли, я бегу по длинному коридору. Я бегу вперед, потом поворачиваюсь и бегу назад. Мне страшно, потому что в моем кармане что-то спрятано. Я не знаю, что это такое и откуда оно взялось, но сознаю, что <em>это</em> хотят у меня отнять.</p><p class="p1">Вдруг падает стена, в проломе появляется рыжеволосая девушка и протягивает ко мне руки. Ее лицо — бледная маска. Она обнимает, целует и утешат меня, мне хочется крепко прижать ее к себе, но я боюсь. Она не отпускает меня и мне становится все страшнее, потому что я знаю, что никогда не должен прикасаться к женщине. Я начинаю ощущать, как что-то бурлит и дрожит во мне. Становится тепло. Я поднимаю глаза и вижу в ее руке окровавленный нож. Я убегаю. В моих карманах пусто. Я обшариваю карманы, но не знаю, ни что именно я потерял, ни почему я вообще прятал <em>это</em>.</p><p class="p1">Когда я проснулся и вспомнил про Алису, меня охватила такая же паника, как и во сне. Чего же я боюсь? Наверно, это как-то связано с ножом.</p><p class="p1">Я сварил кофе и выкурил сигарету. Мне еще никогда не снилось ничего подобного, и я совершенно уверен, что сновидение уходит корнями во вчерашний вечер. Я начинаю думать об Алисе по-другому.</p><p class="p1">Свободные ассоциации — все еще слишком мучительный процесс. Очень трудно отучиться контролировать свои мысли. …Распахни свой мозг и дай чему угодно вливаться в него… Образы булькают, как пузыри в стакане… в ванне… там купается женщина… девочка… Норма принимает ванну… Я подсматриваю в замочную скважину… Она встает, чтобы вытереться, и я вижу, что ее тело отличается от моего… Чего-то не хватает.</p><p class="p1">Бегу по коридору… Кто-то гонится за мной… не человек… всего лишь огромный сверкающий кухонный нож… Я в ужасе и хочу закричать, но голоса нет, горло мое перерезано и из него льется кровь.</p><p class="p1">— Мама, Чарли подглядывает за мной!</p><p class="p1">Почему она другая? Что случилось с ней?.. Кровь… реки крови…</p><div class="poem">
<div class="stanza">
<p class="v">Три слепых мышонка… три слепых мышонка,</p>
<p class="v">Как они бегут! Как они бегут!</p>
<p class="v">Они бегут за фермерской женой,</p>
<p class="v">Отрезавшей им хвостики кухонным ножом.</p>
<p class="v">Ты когда-нибудь видал такое?</p>
<p class="v">Три… слепых… мышонка…</p>
</div>
</div><p class="p1">Чарли один рано утром на кухне. Все еще спят, и он развлекается со своей ниткой. Вот он неловко поворачивается, и от рубашки отлетает пуговица. Она катится по линолеуму с замысловатым рисунком, катится к ванной, и Чарли теряет ее из виду. Где пуговица? Поиски приводят Чарли в ванную. Там стоит ящик с грязным бельем, и ему нравится вынимать оттуда вещи и глядеть на них — одежда отца, матери… вещи Нормы. Однажды, когда он надел их и притворился Нормой, мама здорово отшлепала его. Ему попадается белье Нормы со следами крови. Он потрясен. Что с ней случилось? Наверно, тот, кто ранил ее, охотится сейчас за ним…</p><p class="p1">Почему это воспоминание не выветрилось из моей памяти, как большинство остальных? Почему оно приводит меня в ужас? Как оно связано с моими чувствами к Алисе?</p><p class="p1">Теперь-то я начинаю понимать, почему меня научили держаться подальше от женщин. Нельзя было так говорить с Алисой. У меня нет права думать о женщинах — пока нет.</p><p class="p1">Почему все твердят мне, что я становлюсь человеком? Я был человеком <em>всегда</em>, даже до того, как меня коснулся нож хирурга.</p><p class="p1">Я — <em>человек</em>… Я должен любить.</p><p class="subtitle">8 мая</p><p class="p1">Даже теперь, когда я разобрался в том, что творится за спиной мистера Доннера, мне трудно в это поверить. Первый раз я заметил неладное два дня назад. Джимпи за стойкой заворачивал праздничный пирог нашему постоянному клиенту. Такой пирог стоит 3 доллара 95 центов. Джимпи звякнул кассой, и в ее окошечке выскочили цифры 2,95. Я открыл было рот, чтобы поправить его, но вдруг в зеркале, висевшей за стойкой, увидел, как покупатель весело подмигнул, а Джимпи улыбнулся ему в ответ. Покупатель взял сдачу, и я заметил блеск большой серебряной монеты, оставшейся в ладони Джимпи, и быстрое движение, которым он опустил полдоллара себе в карман.</p><p class="p1">— Чарли, — спросила вошедшая женщина, — эклеры еще остались?</p><p class="p1">— Сейчас посмотрю.</p><p class="p1">Это позволило мне поразмыслить над тем, чему я стал невольным свидетелем. Конечно, Джимпи не ошибся. Он нарочно недобил клиенту доллар, и они прекрасно поняли друг друга. Каждый получил половину.</p><p class="p1">Не зная, что делать, я бессильно прислонился к стене. Джимпи работал у Доннера пятнадцать лет. Доннер всегда относился к своим служащим, как к близким друзьям, и не раз приглашал семью Джимпи к себе на ужин. Когда ему нужно было отлучиться, Доннер оставлял его вместо себя, а еще я слышал, что он давал Джимпи деньги на оплату больничных счетов жены.</p><p class="p1">Немыслимо красть у такого человека. Тут должно быть какое-то другое объяснение. Например, Джимпи случайно ошибся, а полдоллара — всего лишь чаевые. Или мистер Доннер разрешил делать скидку постоянным клиентам. Да пусть будет что угодно, только бы Джимпи не оказался вором. Ведь он всегда был так добр ко мне.</p><p class="p1">Я ничего не хотел знать. Я принес эклеры и принялся раскладывать по прилавку булочки. На окошечко кассы я больше не взглянул.</p><p class="p1">Но… вошла маленькая рыжеволосая женщина — она всегда щиплет меня за щеку и шутит, что скоро найдет мне подружку, — и я вспомнил, что она почти всегда приходит, когда Доннер завтракает, а Джимпи стоит за стойкой. Он частенько посылал меня относить заказы ей на дом. Я невольно подсчитал стоимость ее покупки: 4 доллара 53 цента, и отвернулся, чтобы не видеть, сколько пробьет ей Джимпи. Я горел желанием знать правду, но вместе с тем боялся ее.</p><p class="p1">— Два пятьдесят три, миссис Уилер, — донесся до меня голос Джимпи.</p><p class="p1">Звон кассы. Звон сдачи. Стук по прилавку.</p><p class="p1">— Благодарю вас, миссис Уилер.</p><p class="p1">Я обернулся как раз в тот момент, когда его рука была в кармане, и услышал приглушенный звон монет.</p><p class="p1">Сколько раз при передаче заказов он использовал <em>меня</em>, как посредника? С кем делил разницу? И неужели все эти годы я помогал ему красть?</p><p class="p1">Я не мог оторвать глаз от хлопочущего за стойкой Джимпи. Он был в прекрасном настроении, возбужден, из-под его белого колпака на лицо струился пот. Но вот он поймал мой взгляд, нахмурился и отвернулся. Мне захотелось ударить его. Зайти за стойку и врезать ему как следует. Не помню, чтобы раньше у меня возникало такое желание…</p><p class="p1">В тишине своей комнаты я выплеснул чувства на бумагу. Не помогло. Как вспомню, что Джимпи обкрадывает мистера Доннера, мною овладевает желание что-нибудь сломать, разбить, размозжить. Хорошо, что я не способен к насилию. За свою жизнь я ни разу никого не ударил.</p><p class="p1">Нужно на что-то решиться. Сказать мистеру Доннеру, что человек, которому он доверяет, как самому себе, — вор? Джимпи от всего откажется, а я ничего не смогу доказать. А как сам мистер Доннер воспримет такую новость? Не знаю, что делать.</p><p class="subtitle">9 мая</p><p class="p1">Ночью не сомкнул глаз. Слишком многим я обязан мистеру Доннеру, чтобы спокойно стоять в сторонке и смотреть, как его обкрадывают. Промолчав, я стану соучастником Джимпи. Но имею ли я право доносить на него? Больше всего меня беспокоит то, что это именно я помогал ему обделывать свои грязные делишки. Пока я ничего не понимал, с меня и спроса не было, но теперь молчание делает меня таким же преступником, как и Джимпи.</p><p class="p1">Да, Джимпи работает вместе со мной. Трое детей. А если Доннер выгонит его? Вряд ли со своей деревянной ногой он найдет другую работу.</p><p class="p1">Какое мне до этого дело?</p><p class="p1">Ирония в том, что никакие, пусть даже самые обширные знания не помогут мне решить эту маленькую задачку.</p><p class="subtitle">10 мая</p><p class="p1">Рассказал обо всем профессору Немуру. Он заявил, что меня это не касается, и совершенно ни к чему впутываться в дело, которое впоследствии может оказаться весьма неприятным. Тот факт, что меня использовали как посредника, не произвел на него никакого впечатления. Если в то время я не соображал, что происходит, сказал он, значит, мое дело — сторона. Ты, мол, виноват не больше, чем нож, когда он ранит, или машина, когда сбивает человека.</p><p class="p1">— Не сравнивайте меня с бессловесной железякой! Я — человек.</p><p class="p1">На мгновение он смутился, потом рассмеялся.</p><p class="p1">— Естественно, Чарли. Но я говорю о том, что было до операции.</p><p class="p1">Довольный, напыщенный — мне захотелось дать по физиономии и ему.</p><p class="p1">— Я был личностью и до операции. Если вы забыли…</p><p class="p1">— Конечно-конечно, Чарли. Но пойми меня правильно… Все было по-другому… — Тут он вспомнил, что нужно проверить чьи-то истории болезни и сбежал.</p><p class="p1">Доктор Штраус. Обычно он во время наших психотерапевтических сеансов молчит, но, когда я упомянул о своих переживаниях, сказал, что мой долг рассказать все мистеру Доннеру.</p><p class="p1">Чем больше я думаю об этом, тем сложнее все кажется. Кто-то должен распутать этот узел, и единственный, на кого я могу положиться, — Алиса.</p><p class="p1">В половине одиннадцатого я наконец решился. Набирая ее номер, я трижды вешал трубку и только в четвертый раз заставил себя дождаться ответа.</p><p class="p1">Сначала она и слышать не хотела о новой встрече со мной. Но я не сдавался:</p><p class="p1">— Ты мне нужна, ты всегда давала хорошие советы. — И пока она еще колебалась, добавил: — Ты <em>должна</em> помочь мне! Ты сама сказала, что чувствуешь ответственность за меня. Если бы не ты, я никогда не влез бы в эту историю. Ты просто не можешь отмахнуться от меня!</p><p class="p1">Наверно, она что-то уловила в моем голосе, потому что согласилась встретиться со мной в том самом кафе, где мы ужинали. Я повесил трубку и уставился на телефон. Почему мне так важно знать, что <em>она</em> думает, что чувствует <em>она</em>? В течение года единственным моим желанием было порадовать ее. Не потому ли я и согласился на операцию?</p><p class="p1">У кафе я долго вышагивал взад и вперед, пока стоявший поодаль полицейский не начал подозрительно поглядывать на меня. Я зашел внутрь и взял чашку кофе. К счастью, столик, за которым мы сидели в прошлый раз, оказался свободным…</p><p class="p1">Алиса сразу заметила меня и помахала рукой, но, прежде чем подойти, задержалась у стойки и тоже взяла кофе. Она улыбнулась, и я сразу сообразил, что причина этого — знакомый столик. Романтическое совпадение.</p><p class="p1">— Конечно, уже поздно. — начал извиняться я, — но, клянусь, мне очень нужно поговорить с тобой. Я чуть не рехнулся…</p><p class="p1">Прихлебывая кофе, она молча выслушала мой рассказ о том, как я уличил Джимпи, о моих собственных чувствах и противоречивых советах, что я получил, а потом задумчиво сказала:</p><p class="p1">— Чарли, ты поражаешь меня. Ты так вырос в последнее время, а нерешителен как дитя. Я не могу решать за тебя. Если не хочешь остаться ребенком навеки, нельзя ждать подсказок от других. Ты должен найти решение в себе самом — <em>почувствовать</em>, что будет правильно. Научись доверять себе.</p><p class="p1">Мое раздражение достигло крайней точки и вдруг до меня дошло, что она имеет в виду.</p><p class="p1">— Так что же, по-твоему, я <em>сам</em> должен…</p><p class="p1">Она кивнула.</p><p class="p1">— Кое-что я уже понял. Кажется мне, что Штраус и Немур оба не правы.</p><p class="p1">Она внимательно смотрела на меня.</p><p class="p1">— С тобой что-то происходит, Чарли. Какое у тебя сейчас лицо!</p><p class="p1">— Ты права! Происходит! Передо мной висела дымовая завеса, а ты разок дунула — и ее не стало. Простейшая идея. Доверяй <em>себе</em>. Раньше мне ничего подобного и в голову прийти не могло.</p><p class="p1">— Чарли, ты просто молодец!</p><p class="p1">Я поймал ее руку и крепко вцепился в нее.</p><p class="p1">— Это ты. Ты коснулась моих глаз и подарила мне свет.</p><p class="p1">Алиса залилась краской и высвободила руку.</p><p class="p1">— В прошлый раз я сказал, что ты нравишься мне. Нужно было быть решительнее и сказать, что я люблю тебя.</p><p class="p1">— Не надо, Чарли. Подожди.</p><p class="p1">— Ждать!? Тогда ты сказала то же самое. Чего ждать?</p><p class="p1">— Ш-ш-ш… И все-таки подожди. Заканчивай учебу и посмотри, куда она тебя приведет. Ты меняешься слишком быстро.</p><p class="p1">— Ну и что? Мои чувства к тебе никогда не изменятся. Если я и поумнею, то полюблю тебя еще больше</p><p class="p1">— Не в том дело… Случилось так, что я — первая женщина на твоем пути. Именно как женщина. Я была твоим учителем, то есть человеком, к которому обращаются за помощью и советом, и было бы странно, если бы ты не влюбился в меня. Посмотри на других женщин. Дай себе время.</p><p class="p1">— Ты хочешь сказать, что дети обязательно влюбляются в своих учителей, а эмоционально я еще ребенок?</p><p class="p1">— Не играй словами. Для меня ты совсем не ребенок.</p><p class="p1">— Эмоционально отсталый взрослый?</p><p class="p1">— Нет!</p><p class="p1">— Так что же я такое?</p><p class="p1">— Не дави на меня, Чарли. Я не знаю. Через несколько месяцев, а может и недель ты станешь другим человеком. Может случиться, что тогда мы уже не сможем общаться на интеллектуальном уровне, а когда ты повзрослеешь эмоционально, просто не захочешь видеть меня. Чарли, мне нужно подумать и о себе. Поживем — увидим. Запасемся терпением.</p><p class="p1">Конечно, в ее словах был определенный смысл, но я просто не мог позволить себе вникнуть в него.</p><p class="p1">— Прошлый раз… — выдавил я. — Ты представить себе не можешь, как я ждал этого… Я чуть не сошел с ума, пытаясь понять, как себя вести и что говорить, как произвести впечатление. Меня ужасала мысль, что я могу чем-нибудь рассердить тебя.</p><p class="p1">— Я совсем не сердилась. Наоборот.</p><p class="p1">— Когда я увижу тебя снова?</p><p class="p1">— У меня нет права привязывать тебя к себе.</p><p class="p1">— Разве ты не видишь, что я уже привязан?! — закричал я, но, заметив, что из-за соседних столиков на нас смотрят, понизил задрожавший от гнева голос. — Я — личность, человек, мужчина, я не могу ограничивать себя книгами, кассетами и электронными лабиринтами. Вот ты сказала: «Посмотри на других женщин». А как, если я не знаю никаких других женщин? Все вокруг кричит о тебе. Я смотрю на страницу в книге и вижу на ней твое лицо — не размытое пятно из далекого прошлого, а настоящее, живое лицо. Я прикасаюсь к нему, и оно исчезает… Тогда мне хочется разорвать книгу в клочья и вышвырнуть в окно!</p><p class="p1">— Чарли, прошу тебя…</p><p class="p1">— Когда я увижу тебя снова?</p><p class="p1">— Завтра, в лаборатории.</p><p class="p1">— Ты же знаешь, что я не это имею в виду. К черту лабораторию. К черту университет. Наедине.</p><p class="p1">Я чувствовал, что ей хочется согласиться — моя настойчивость явно оказалась для нее сюрпризом. Я и сам был весьма удивлен, но знал, что не оставлю Алису в покое, пока не добьюсь своего. От страха у меня перехватило горло, ладони вспотели. Чего я больше боялся? Ее «<em>да</em>» или ее «<em>нет</em>»? Если бы она не ответила еще минуту, со мной случился бы обморок от напряжения.</p><p class="p1">— Хорошо, Чарли. Пусть не в лаборатории, но и не с глазу на глаз. Нам пока не следует оставаться наедине.</p><p class="p1">— Где угодно. — выдохнул я. — Мне хочется быть с тобой и не думать про тесты, статистику, вопросы, ответы…</p><p class="p1">Алиса на секунду задумалась.</p><p class="p1">— В Центральном парке дают бесплатные весенние концерты. На будущей неделе можешь пригласить меня туда.</p><p class="p1">Когда мы подошли к ее дому, она повернулась и быстро поцеловала меня.</p><p class="p1">— Спокойной ночи, Чарли. Я рада, что ты позвонил мне. Увидимся завтра, в лаборатории.</p><p class="p1">Она исчезла за дверью, а я стоял и смотрел на свет в ее окне, пока он не погас.</p><p class="p1">Никаких вопросов. Все ясно. Я ее люблю.</p><p class="subtitle">11 мая</p><p class="p1">Поразмышляв и помучавшись, я понял, что Алиса права — нужно больше доверять собственной интуиции. Сегодня я внимательно наблюдал за Джимпи и трижды заметил, как он кладет в карман часть выручки. Причем проделывал он это только с постоянными, проверенными клиентами, и мне пришло в голову, что их вина ничуть не меньше — без их согласия Джимпи не удалось бы воровать так легко. Но почему именно он должен стать козлом отпущения? Эта мысль и заставила меня пойти на компромисс с самим собой. Наверно, решение не было идеальным, но оно было моим собственным и при сложившихся обстоятельствах показалось мне наилучшим. Я предупрежу Джимпи, дам ему понять, что знаю все.</p><p class="p1">Я застал его в душевой. Увидев меня, он вздрогнул и отпрянул назад. Не мешкая, я приступил к делу.</p><p class="p1">— Мне нужно посоветоваться с тобой. У одного моего друга возникли трудности — он случайно узнал, что один из его знакомых обкрадывает своего хозяина, и не знает, что ему делать. Ему не хочется доносить и портить тому парню жизнь, но мой друг очень любит хозяина и не может молча смотреть на это безобразие.</p><p class="p1">Джимпи уставился на меня.</p><p class="p1">— Ну и что же этот твой друг собирается делать?</p><p class="p1">— Вот это как раз самое трудное… Ему ужасно не хочется ничего делать. Сам посуди, если воровство прекратится, то какой смысл болтать о нем? Он просто забудет об этом, как будто ничего не случилось.</p><p class="p1">— Твой друг слишком любит совать нос в чужие дела, — проворчал Джимпи, отстегивая деревянную ногу. — На такие вещи нужно закрывать глаза. Неужели он не знает, кто его настоящие друзья? Босс — это босс, а рабочие должны держаться вместе.</p><p class="p1">— Моему другу так не кажется.</p><p class="p1">— Это не его дело.</p><p class="p1">— Если он промолчит, часть вины ляжет и на него. А вот если обман прекратится сам собой, тогда и говорить будет не о чем. В противном случае он расскажет хозяину все. Как ты считаешь, согласится вор с такими условиями?</p><p class="p1">Я видел, что Джимпи стоит огромных трудов сдержать себя. Ему ужасно хотелось врезать мне как следует, но он только бессильно сжимал кулаки.</p><p class="p1">— Скажи своему другу, что у того парня просто нет другого выхода.</p><p class="p1">— Вот и отлично. Мой друг очень обрадуется.</p><p class="p1">Джимпи отвернулся, помолчал, потом нерешительно посмотрел на меня.</p><p class="p1">— Этот друг… Он не захочет войти в долю?</p><p class="p1">— Нет. Его единственное желание — чтобы все это поскорее кончилось.</p><p class="p1">Глаза Джимпи злобно вспыхнули.</p><p class="p1">— Ты еще пожалеешь, что впутался в это дело. А я-то всегда стоял за тебя… Пора мне навестить психиатра… — И он упрыгал прочь.</p><p class="p1">Может быть, и стоило рассказать об этом Доннеру. Скорее всего, Джимпи пришлось бы расстаться с пекарней. Не знаю… Я свое дело сделал. Но сколько таких Джимпи процветают еще на белом свете!</p><p class="subtitle">15 мая</p><p class="p1">Учеба продвигается успешно. Университетская библиотека стала мне вторым домом. Для меня выделили отдельный кабинет. За секунду я успеваю прочесть целую страницу, и когда я пролистываю книги, вокруг обязательно собирается толпа любопытных студентов.</p><p class="p1">Сейчас меня больше всего интересуют этимология древних языков, новейшие работы по вариационному исчислению и история Индии. Просто удивительно — между несопоставимыми на первый взгляд понятиями существуют, оказывается, глубокие связи. Я вышел на следующий уровень, и потоки из разных областей знания сблизились, словно текут из одного источника.</p><p class="p1">Споры студентов о религии и политике кажутся мне теперь детским лепетом. Я больше не получаю удовольствия от обмена идеями на таком примитивном уровне. Люди почему-то обижаются, если сказать, что они не понимают, например, всей сложности какой-либо либо проблемы, не могут постичь всей ее глубины. Жизнь наверху тоже не слишком сладка.</p><p class="p1">Барт познакомил меня в кафетерии с одним профессором экономики, известным своими работами по влиянию экономических факторов на банковские учетные ставки. Мне давно хотелось обсудить кое-что с серьезным экономистом. Например, меня весьма интересует нравственная сторона применения экономической блокады как оружия в мирное время. Я спросил, что он думает о предложении некоторых сенаторов перейти к политике эмбарго и военно-морской блокады отдельных малых стран по примеру первой и второй мировых войн.</p><p class="p1">Он молча выслушал меня, глядя в пространство. Мне показалось, что он обдумывает ответ, но через несколько минут он прочистил горло и отрицательно покачал головой. Такие вопросы, пояснил он, лежат вне его компетенции. Его интересуют учетные ставки, а не военная экономика. Мне следует побеседовать с доктором Весси, опубликовавшим однажды статью о мировых экономических связях в период второй мировой войны. Не успел я и рта раскрыть, как он схватил мою руку и с жаром потряс ее. Он был счастлив познакомиться со мной, но ему некогда — нужно успеть подготовиться к лекции. Только я его и видел.</p><p class="p1">То же самое случилось, когда я попробовал поговорить о Чосере со специалистом по американской литературе, расспросить востоковеда об острове Тробриан и обсудить с психологом, экспертом по делам молодежи, связь автоматизации производства с безработицей. Все они просто-напросто боялись обнаружить узость своих знаний и всегда находили способ улизнуть от меня.</p><p class="p1">Окружающие кажутся мне теперь совсем другими. Каким же глупцом надо было быть, чтобы всех профессоров чохом причислять к гигантам мысли! Мало того, что все они лишь самые обычные люди, они еще и одержимы страхом, что остальной мир поймет это.</p><p class="p1">Алиса — тоже человек, а не богиня. Завтра вечером я веду ее на концерт.</p><p class="subtitle">17 мая</p><p class="p1">Почти утро, а я не могу уснуть… Пытаюсь разобраться в том, что произошло вчера.</p><p class="p1">Вечер начался довольно удачно. Когда мы пришли, вся лужайка оказалась занятой, и нам с Алисой пришлось пробираться среди растянувшихся на траве парочек, пока мы не отыскали свободное место под деревом. О человеческом присутствии вокруг свидетельствовали лишь протестующий женский смех и редкие огоньки сигарет.</p><p class="p1">— Останемся здесь, — решила Алиса. — Вовсе необязательно сидеть посреди оркестра.</p><p class="p1">— Что они играют? — спросил я.</p><p class="p1">— «Море» Дебюсси. Нравится?</p><p class="p1">— Я еще плохо разбираюсь в такой музыке. Нужно поразмыслить о ней.</p><p class="p1">— Не надо, — прошептала она, — старайся почувствовать ее, пусть она захлестнет тебя.</p><p class="p1">Она легла на траву и повернула голову туда, откуда доносилась музыка. Не знаю, чего она ждала от меня. Как далеко все это было от чистых линий науки и процесса систематического накопления знаний! Я твердил себе, что вспотевшие ладони, тяжесть в груди, желание обнять ее — всего лишь биохимические реакции. Я даже проследил всю цепь раздражитель — реакция, чтобы понять, что привело меня в столь нервозное состояние. Однако дальнейшие действия представлялись мне расплывчатыми и неопределенными. Обнять ее или нет? Желает она этого или нет? Рассердится она или нет? Я сознавал, что веду себя как мальчишка, и это раздражало меня.</p><p class="p1">— Вот… — выдавил я из себя. — Устраивайся поудобнее. Положи голову мне на плечо. — Она позволила обнять себя, но даже не взглянула в мою сторону. Казалось, она настолько захвачена музыкой, что перестала воспринимать окружающее. Так хочется ей этого или она просто терпит меня? Я положил руку ей на талию. Алиса вздрогнула, но не оторвала глаз от оркестра. Она притворялась, что занята только музыкой. Это освобождало ее от решения вопроса: отвечать мне или не стоит? Слушая музыку, она могла делать вид, будто не замечает моей близости: пожалуйста пользуйся моим телом, только душу не трогай. Довольно грубо я взял ее за подбородок и повернул лицом к себе.</p><p class="p1">— Почему ты не смотришь на меня? Притворяешься, что я не существую?</p><p class="p1">— Нет, Чарли, — прошептала она, — я притворяюсь что не существует меня…</p><p class="p1">Я притянул ее к себе. Она вздрогнула и напряглась. Тут это и случилось — в ушах зашумело… электрическая пила… далеко-далеко… Потом холод: по рукам и ногам побежали мурашки… онемели пальцы… Вдруг я почувствовал на себе чей-то взгляд.</p><p class="p1">…Резкое переключение восприятия. Из какой-то точки в темноте, совсем рядом, я увидел нас самих в объятиях друг друга.</p><p class="p1">Я посмотрел по сторонам и заметил юнца лет пятнадцати, притаившегося за деревом.</p><p class="p1">— В чем дело? — выдохнула Алиса. — В чем дело? — повторила она.</p><p class="p1">Я вскочил, и он исчез в темноте.</p><p class="p1">— Ты видела?</p><p class="p1">— Нет, — ответила она, разглаживая юбку нервными движениями. — Я никого не заметила.</p><p class="p1">— Он стоял вот здесь. Подсматривал. Совсем близко.</p><p class="p1">— Чарли, куда ты?</p><p class="p1">— Он не мог убежать далеко.</p><p class="p1">— Успокойся, Чарли. Это ничего не значит.</p><p class="p1">Для нее, может, и не значит…</p><p class="p1">Спотыкаясь о чьи-то ноги, я бросился в темноту, но, конечно, никого не нашел.</p><p class="p1">Чем больше я думал о нем, тем сильнее становилось тошнотворное ощущение, за которым обычно следует обморок. Я постарался взять себя в руки и вернулся к Алисе.</p><p class="p1">— Догнал?</p><p class="p1">— Нет, но он был здесь. Я видел его!</p><p class="p1">Она как-то странно посмотрела на меня:</p><p class="p1">— Тебе плохо?</p><p class="p1">— Какое-то жужжание в голове… Скоро пройдет.</p><p class="p1">— Пойдем отсюда.</p><p class="p1">Пока мы добирались до ее дома, у меня не выходил из головы этот парень и то, что на секунду я увидел нас его глазами.</p><p class="p1">— Хочешь зайти ко мне? Я сварю кофе.</p><p class="p1">Конечно, я хотел, но что-то удержало меня.</p><p class="p1">— Лучше не надо. Мне нужно еще кое над чем поработать.</p><p class="p1">— Чарли, неужели я сказала или сделала что-нибудь не так?</p><p class="p1">— Не в этом дело. Тот парень… Он совсем выбил меня из колеи.</p><p class="p1">Алиса стояла вплотную ко мне и ждала поцелуя. Я обнял ее, но тут же все началось снова. Если я не убегу сию же минуту, то хлопнусь в обморок прямо на ступеньках.</p><p class="p1">— Чарли, ты совсем больной.</p><p class="p1">— Ты видела его, Алиса? Только не обманывай меня.</p><p class="p1">Она покачала головой.</p><p class="p1">— Нет. Было слишком темно. Но я уверена…</p><p class="p1">— Мне пора идти. Я позвоню тебе. — И не дав ей прийти в себя, я выскочил из подъезда.</p><p class="p1">Я почти уверен, что все случившееся было не чем иным, как галлюцинацией. Доктор Штраус полагает, что эмоционально я еще не вышел из того возраста, когда близость к женщине или мысли о сексе вызывают не только волнение и панику, но даже галлюцинации. Необычайно быстрое умственное развитие обмануло меня, заставило поверить, что я могу жить нормальной эмоциональной жизнью. Нельзя не признать, что последние события достаточно ясно показали мою неподготовленность к полноценному общению с женщиной типа Алисы Кинниан.</p><p class="subtitle">20 мая</p><p class="p1">Меня выгнали из пекарни. Понимаю, что глупо цепляться за прошлое, но что-то родное было в ее стенах из белого кирпича, обожженных жаром печей… Она была мне домом.</p><p class="p1">За что они так ненавидят меня?</p><p class="p1">Мне не в чем винить Доннера. Он должен думать о своем предприятии, о других рабочих. И все же… Он был мне больше чем отцом.</p><p class="p1">Он вызвал меня к себе в кабинет, усадил в единственное кресло, стоявшее рядом с его древним столом, и, глядя в сторону, сказал:</p><p class="p1">— Мне нужно поговорить с тобой, Чарли. Ни к чему откладывать… Твой дядя Герман был моим лучшим другом, и я обещал ему, что как бы ни шли мои дела, у тебя всегда будет работа, доллар в кармане и крыша над головой…</p><p class="p1">— Это мой дом и…</p><p class="p1">— …и я относился к тебе, как к собственному сыну, отдавшему жизнь за эту страну. А когда Герман умер — сколько тебе было? семнадцать? — я поклялся… Я сказал себе: Артур Доннер, пока ты владеешь этой пекарней, ты не бросишь Чарли на произвол судьбы. У него будет постель и кусок хлеба. Когда тебя хотели забрать в Уоррен, я объяснил, что ты будешь работать у меня и я сам присмотрю за тобой. Ты не провел в Уоррене ни дня. Я дал тебе комнату… Как, по-твоему, сдержал я свое слово?</p><p class="p1">Я кивнул, но по тому, как он теребил в руках какие-то бумажки, было видно, насколько тяжело ему говорить мне все это.</p><p class="p1">— Я старался… Я никогда не работал плохо…</p><p class="p1">— Знаю, Чарли. Но сейчас я говорю не о работе. Что-то произошло с тобой, и я не понимаю, что именно. И не только я… Все говорят только о тебе. Им страшно, Чарли… Я вынужден просить тебя уйти.</p><p class="p1">Я хотел перебить его, но он покачал головой.</p><p class="p1">— Вчера вечером ко мне пришла целая делегация… Чарли, пойми, я не могу допустить, чтобы моя пекарня прогорела!</p><p class="p1">Он смотрел на свои руки, на скомканный листок бумаги в них, словно надеясь найти там то, чего раньше не было.</p><p class="p1">— Прости меня, Чарли.</p><p class="p1">— Куда же мне идти?</p><p class="p1">Он посмотрел на меня, в первый раз за время разговора.</p><p class="p1">— Ты прекрасно знаешь, что <em>эта</em> работа тебе больше не нужна.</p><p class="p1">— Мистер Доннер, я не знаю никакой другой.</p><p class="p1">— Давай рассмотрим этот вопрос. Ты уже не тот Чарли, каким был семнадцать лет назад, и даже четыре месяца назад. Ты не объяснил мне, что случилось с тобой. Согласен, это твое дело. Может быть, случилось чудо. Ты стал блестящим молодым человеком, а работать на миксере и разносить заказы неподходящее занятие для блестящего молодого человека.</p><p class="p1">Несомненно, он был прав, но что-то во мне упорно сопротивлялось его решению.</p><p class="p1">— Позвольте мне остаться, мистер Доннер. Вы же обещали дяде Герману, что у меня будет работа. Она все еще нужна мне, мистер Доннер.</p><p class="p1">— Нет, Чарли, не нужна. Если бы это было так, я послал бы всех их к черту и стоял бы за тебя. Но они боятся тебя до полусмерти! Я не могу забывать и о своей семье.</p><p class="p1">— А если они передумают? Я поговорю с ними. — Разговор зашел совсем не туда, куда хотелось мистеру Доннеру, но я уже не мог остановиться. — Они поймут, — умолял я.</p><p class="p1">— Ну, ладно, — вздохнул он наконец. — Попробуй, но предупреждаю: ты услышишь мало приятного.</p><p class="p1">Когда я вышел из кабинета, Фрэнк Рэйли и Джо Карп как раз проходили мимо, и я сразу понял, что Доннер не преувеличивал. Видеть меня было для них слишком большим испытанием.</p><p class="p1">Фрэнк взял поднос с булочками, я когда я окликнул его, оба обернулись.</p><p class="p1">— Видишь, Чарли, я занят. Потом.</p><p class="p1">— Нет, сейчас. Вы избегаете меня. Почему?</p><p class="p1">Фрэнк, болтун, бабник и жулик, внимательно посмотрел на меня и поставил поднос на стол.</p><p class="p1">— Почему? Я скажу тебе, почему. Потому что ты стал большой шишкой, всезнайкой, умником! Ты теперь вундеркинд, яйцеголовый. Всегда с книжкой, и знаешь ответы на все вопросы. Ну и что? Думаешь, ты лучше нас? О’кей, проваливай.</p><p class="p1">— Что я тебе сделал?</p><p class="p1">— Что ты сделал? Слышишь, Джо? Я скажу тебе, что ты сделал, <em>мистер</em> Гордон. Ты выпендривался со своими предложениями, и теперь мы, все остальные, выглядим бездельниками. Но я скажу тебе еще кое-что. Для меня ты все тот же кретин, каким был всю жизнь. Может, я и не понимаю всяких мудреных слов и названий твоих книг, но это не значит, что я хуже тебя.</p><p class="p1">— Ага, — кивнул Джо, поворачиваясь, чтобы подчеркнуть этот вывод для появившегося откуда ни возьмись Джимпи.</p><p class="p1">— Я не прошу вас быть моими друзьями, — сказал я. — Не имейте со мной никаких дел. Только оставьте мне работу. Мистер Доннер сказал, что это зависит от вас.</p><p class="p1">Джимпи пронзил меня взглядом, с отвращением сплюнул и злобно прошипел:</p><p class="p1">— Однако крепкие же у тебя нервы! Убирайся к черту! — Он повернулся и тяжело захромал прочь.</p><p class="p1">Вот так. Все было прекрасно, пока они могли смеяться надо мной и чувствовать себя умниками за мой счет, но теперь они оказались ниже кретина, над которым вдоволь поиздевались в свое время. Удивительным ростом своих способностей я заставил их «<em>я</em>» сильно уменьшиться в размерах и вытащил на свет божий все их недостатки. Я предал их, и за это они возненавидели меня.</p><p class="p1">Фанни Бирден оказалась единственной, кто не желал моего увольнения, и, несмотря на сильное давление, так и не подписалась под их требованием.</p><p class="p1">— Но это совсем не означает, — сказала она мне, — что я не замечаю, как сильно ты изменился, Чарли. Ты стал <em>совсем</em> другим! Не знаю, не знаю… Ты был простым, хорошим, надежным человеком, не слишком головастым, зато честным. Что ты сделал с собой, чтобы вот так, сразу, поумнеть? Это неправильно.</p><p class="p1">— Что может быть плохого в том, что человек хочет стать разумнее, получить знания, понять мир и самого себя?</p><p class="p1">— Почитай повнимательнее Библию и поймешь, что человек не должен превосходить назначенного ему Господом. Чарли, если ты не сделал ничего такого с дьяволом, например, или еще чего… то, может, еще не поздно отказаться от всего этого? Оставайся таким, каким был раньше.</p><p class="p1">— Нет, Фанни, все пути уже отрезаны. Я не сделал ничего плохого. Я похож на слепого от рождения, которому позволили увидеть свет. Это не может быть грехом! Таких, как я, скоро будут миллионы. Такое чудо подвластно науке.</p><p class="p1">Она посмотрела на жениха и невесту, украшавших свадебный пирог, и едва шевеля губами, прошептала:</p><p class="p1">— Когда Адам и Ева отведали плод с древа познания, то увидели, что они наги, узнали похоть и стыд. Это был грех. После этого врата рая навсегда закрылись для них. Если бы они не поддались уговорам змея, нам не пришлось бы стареть, страдать и умирать.</p><p class="p1">Больше мне нечего было сказать ни ей, ни другим. Никто не смотрел мне в глаза. Раньше меня презирали за невежество и тупость, теперь ненавидят за ум и знания. Господи, да чего же им нужно от меня?</p><p class="p1">Разум вбил клин между мной и всеми, кого я знал и любил, выгнал меня из дома. Никогда еще я не чувствовал себя таким одиноким. Интересно, что случится, если Элджернона посадить в клетку с другими мышами? Возненавидят ли <em>они</em> его?</p><p class="subtitle">25 мая</p><p class="p1">Я открыл, как человек может начать презирать самого себя. Это происходит, когда он сознает, что поступает неправильно, но не может остановиться. Ноги сами привели меня к Алисе. Она удивилась, но впустила меня.</p><p class="p1">— Ты совсем промок. Даже с носа капает.</p><p class="p1">— Дождь. Хорошо для цветов.</p><p class="p1">— Заходи. Сейчас принесу полотенце, а то схватишь воспаление легких.</p><p class="p1">— Мне больше некуда идти. Можно побыть у тебя?</p><p class="p1">— Кофе закипает… Вытрись, а потом поговорим.</p><p class="p1">Пока она ходила на кухню, я огляделся. Что-то сразу же обеспокоило меня. Кругом чистота. Фарфоровые статуэтки на подоконнике стояли строго в ряд и все смотрели в одну сторону. Подушки аккуратно разложены на софе. Журналы поровну распределены по двум столикам так, чтобы видны были их названия: на одном «Репортер», «Сатердей ревью», «Нэю-Йоркер», на другом — «Мадемуазель», «Хаус бьютифул» и «Ридерс дайджест».</p><p class="p1">На дальней от софы стене висела репродукция Пикассо «Мать и дитя», а напротив нее — изображение бравого придворного эпохи Возрождения, в маске и с мечом в руке, обороняющего от неведомой опасности перепуганную розовощекую деву… Словно Алиса никак не могла решить, кто она и в каком мире предпочитает жить.</p><p class="p1">— Что-то тебя давно не видно в лаборатории, — окликнула Алиса меня из кухни. — Профессор волнуется.</p><p class="p1">— Мне стыдно смотреть в глаза людям. Вроде бы стыдиться и нечего, но я уже несколько дней не работаю, и от этого внутри какая-то пустота — мне не хватает пекарни, печей, друзей… Две ночи подряд мне снилось, что я тону.</p><p class="p1">Она поставила поднос точно на середину кофейного столика — салфетки свернуты треугольничками, пирожные разложены идеальным кругом.</p><p class="p1">— Не принимай этого так близко к сердцу, Чарли. Ведь не ты же виноват, что так получилось.</p><p class="p1">— Пробовал, не помогает. Все эти люди… они были моей семьей. Меня будто вышвырнули из родного дома.</p><p class="p1">— А тебе не кажется, что это — символическое повторение детских впечатлений? Родители тоже отвергли тебя… отдали…</p><p class="p1">— Боже мой! Ну зачем вешать на все чистые аккуратные ярлычки? До этого проклятого эксперимента я считал их друзьями! А сейчас мне страшно…</p><p class="p1">— У тебя есть друзья.</p><p class="p1">— Это не одно и то же.</p><p class="p1">— Страх — совершенно естественная реакция.</p><p class="p1">— Не совсем. Страшно мне бывало и раньше. Я боялся ослушаться Нормы, боялся переходить Хауэлл-стрит — там была одна компания, которая буквально терроризировала меня. Я боялся учительницу, миссис Либби, — она связывала мне руки, чтобы я не играл предметами на парте. Но все это было реально — я знал причину страха, знал, чего именно я боюсь. Теперь все по-другому…</p><p class="p1">— Возьми себя в руки.</p><p class="p1">— <em>Ты</em> не сможешь понять меня.</p><p class="p1">— Чарли, рано или поздно, но это должно было случиться. Ты словно прыгаешь первый раз с вышки, и мысль о том, что спасительная доска вот-вот уйдет из-под ног, ужасает тебя. Мистер Доннер <em>хорошо</em> относился к тебе, и все эти годы у тебя <em>была</em> крыша над головой. Просто удар оказался для тебя слишком сильным.</p><p class="p1">— Я все прекрасно понимаю, но от этого не легче. У меня нет больше сил сидеть одному в своей комнате. Я бесцельно брожу по улицам, пока не заблужусь… и обнаруживаю, что вернулся к пекарне. А вчера вечером я прошагал от Вашингтон-сквер до Центрального парка и уснул там. Какого черта мне нужно? Чего я ищу?</p><p class="p1">Чем больше я говорил, тем грустнее становилась Алиса.</p><p class="p1">— Чарли, а я… могу я тебе чем-нибудь помочь?</p><p class="p1">— Не знаю… Я как зверь, которого выпустили из чудесной безопасной клетки.</p><p class="p1">Она села рядом со мной.</p><p class="p1">— Тебя толкают вперед слишком ревностно. Ты не знаешь, как жить дальше. Хочешь стать взрослым, а внутри остаешься маленьким мальчиком. Ты один, и тебе страшно.</p><p class="p1">Алиса положила мою голову себе на плечо, и в эту секунду я понял, что нужен ей. Как и она мне.</p><p class="p1">— Чарли, — прошептала она, — о чем бы ты не думал… не бойся меня.</p><p class="empty-line"/><p class="p1">…Однажды, разнося заказы, Чарли едва не хлопнулся в обморок, когда женщина средних лет, только что из ванной, решила развлечься тем, что распахнула перед ним халат. Ты видел раньше голую женщину? Знаешь, что нужно делать? Чарли так смешался и так жалобно застонал, что она перепугалась, туго запахнула халат, дала ему четвертак и приказала забыть все, что он видел.</p><p class="p1">— Я только проверяла тебя… чтобы посмотреть, хороший ли ты мальчик.</p><p class="p1">— Я стараюсь быть хорошим мальчиком, — ответил ей Чарли, — и никогда не смотрю на женщин, потому что мама всегда била меня за это…</p><p class="p1">Вот мать Чарли, зашедшаяся в крике, с ремнем в руке, и отец, пытающийся удержать ее.</p><p class="p1">— Хватит, Роза! Ты убьешь его! Уйди! — Мать рвется из его рук, чтобы еще раз ударить извивающегося на полу сына.</p><p class="p1">— Ты только посмотри на него! — кричит Роза. — Он не может научиться читать и писать, но умеет подглядывать за девочками! Я выбью из него эту грязь!</p><p class="p1">— Он не виноват, что у него эрекция. Это нормально. Он же ничего не сделал.</p><p class="p1">— Ему даже думать нельзя о девочках! К сестре приходит подруга, а ему лезут в голову грязные мысли! Я проучу его на всю жизнь! Слышишь? Только прикоснись к какой-нибудь девочке, и я засажу тебя в клетку, как животное, навсегда! Ты слышишь меня?..</p><p class="p1">Да, я слышу тебя, мамочка. А может быть, я уже свободен? Может, страх и тошнота уже не море, в котором тонут, а всего лишь лужа, криво отражающая прошлое? Я свободен?</p><p class="p1">Наверно, я не поддался бы панике, если бы смог прикоснуться к Алисе чуть пораньше, прежде чей прошлое поглотило меня… прежде чем я <em>вспомнил</em> … Я успел сказать:</p><p class="p1">— Ты сама… сама… Обними меня!..</p></span>
