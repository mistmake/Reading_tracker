<span id="id15"><div class="title1">
<p class="p">Отчет № 15</p>
</div><p class="subtitle">12 июля</p><p class="p1">Немур, Штраус, Барт и еще несколько человек ждали меня в кабинете. Все постарались сделать вид, что рады мне, но трудно было не заметить, как хотелось, например, Барту забрать Элджернона. Никто не сказал ничего плохого, однако я сознавал, что Немур не скоро простит меня за то, что я обратился в фонд Уэлберга через его голову. Ну и пусть. Мне нужна была уверенность, что я смогу вести свои собственные исследования. Если отчитываться перед Немуром в каждой мелочи, не хватит времени на работу.</p><p class="p1">Решение совета директоров фонда было уже известно ему, и потому прием носил прохладный и формальный характер. Он протянул мне руку, но улыбки на его лице не было.</p><p class="p1">— Чарли, — сказал Немур, — все мы рады твоему возвращению и предстоящей совместной работе. Лаборатория и персонал в твоем полном распоряжении. Вычислительный центр будет брать твои расчеты вне всякой очереди и, конечно, если я сам могу быть чем-нибудь полезен…</p><p class="p1">Немур изо всех сил старался казаться приветливым, но на лице его было написано сомнение. Прежде всего, я не имел никакого опыта в экспериментальной психологии. Что я знал о технической стороне эксперимента, на разработку которой он потратил столько лет? Но, как я уже упоминал, он старался казаться дружелюбным и готов был отложить свои суждения до будущих времен. У него просто не было выбора. Если не удастся объяснить поведение Элджернона, вся его работа летит к чертям. В случае успеха я вознесу вместе с собой и всех остальных.</p><p class="p1">Я прошел в лабораторию, где Барт уже запустил Элджернона в один из множества лабиринтов. Вздохнув и покачав головой, Барт сказал:</p><p class="p1">— Бедняга многое забыл. Такое впечатление, будто почти все самые сложные ответные реакции стерлись из его памяти. Он работает на весьма примитивном уровне.</p><p class="p1">— Тебе так кажется?</p><p class="p1">— Раньше он мог рассчитывать простые последовательности образов, например, что нужно входить только в каждую вторую дверь или в каждую третью, только в красную дверь или только в зеленую. Сейчас он проходит лабиринт уже в третий раз и все еще ошибается.</p><p class="p1">— А может, причина в том, что он просто давно здесь не был?</p><p class="p1">— Не исключено… Пусть пообвыкнется, а завтра посмотрим.</p><p class="p1">Раньше я много времени проводил в лаборатории, но теперь пришла пора оценить все ее возможности. За несколько дней мне предстояло усвоить то, на что у других уходили годы.</p><p class="p1">Барт четыре часа водил меня по комнатам, и я смог получить довольно цельное представление о месте, где мне предстояло работать. В самом конце обхода я заметил дверь, в которую мы еще не заглядывали.</p><p class="p1">— Что там?</p><p class="p1">— Холодильник и печь для сжигания. — Барт толкнул тяжелую дверь и включил свет. — Прежде чем сжечь умершее животное, мы его замораживаем. Помогает избавиться от запаха.</p><p class="p1">Он уже хотел выйти, но я остановил его.</p><p class="p1">— Только не Элджернона! Слушай… если… когда… в общем, я не хочу, чтобы он попал сюда… Отдай его мне, я сам позабочусь о нем.</p><p class="p1">Он не улыбнулся. Он только кивнул. Немур приказал ему исполнять все мои желания.</p><p class="p1">Наперегонки со временем. Если я хочу успеть получить ответы на свои вопросы, нельзя терять ни минуты. Я взял у Барта список необходимых книг, у Немура и Штрауса — их записи и уже собрался уходить, но тут мне в голову пришла странная мысль. Я спросил Немура:</p><p class="p1">— Объясните мне одно обстоятельство. Я видел вашу печь для сжигания погибших экспериментальных животных. Какие планы были у вас в отношении меня?</p><p class="p1">Мой вопрос ошеломил его.</p><p class="p1">— Что ты имеешь в виду?</p><p class="p1">— Я уверен, что вы с самого начала продумали все возможные варианты. Что должно было случиться со мной?</p><p class="p1">Профессор растерянно молчал, но я не унимался:</p><p class="p1">— Я вправе знать все, что имеет отношение к эксперименту. В этот перечень входит и моя собственная судьба.</p><p class="p1">— Что ж, не вижу причин отказывать тебе в этом. — Немур поднес спичку к уже дымящейся сигарете. — Ты, конечно, понимаешь, что мы были практически уверены в необратимости результатов эксперимента и до сих пор… есть надежда…</p><p class="p1">— Понимаю, понимаю…</p><p class="p1">— Конечно, в твоем случае мы взяли на себя большую ответственность. Не знаю, что ты помнишь о начале эксперимента или как отдельные его стадии складывались в твоем мозгу в единое целое, но мы ясно дали тебе понять, что повышение уровня разумности может оказаться временным.</p><p class="p1">— Да, это записано в отчетах, — согласился я. — Хотя в то время я вряд ли мог понять, что это означает.</p><p class="p1">— Мы решили рискнуть, — продолжал Немур, — поскольку чувствовали, что вероятность причинить тебе вред ничтожно мала, особенно по сравнению с вероятностью того, что ты станешь человеком.</p><p class="p1">— Не надо оправдываться.</p><p class="p1">— Нам нужно было получить разрешение на операцию от кого-то из твоих ближайших родственников. Решить этот вопрос сам ты был не в состоянии.</p><p class="p1">— Мне известно и это. Вы говорите о моей сестре Норме. Я читал газеты и вряд ли ошибусь, если предположу, что разрешение на экзекуцию она дала весьма охотно.</p><p class="p1">Немур поднял брови, но решил не заострять внимание на этих словах.</p><p class="p1">— Мы объяснили ей, что, если эксперимент провалится, вряд ли ты сможешь вернуться обратно в пекарню.</p><p class="p1">— Почему?</p><p class="p1">— Ты стал бы другим. Хирургическое вмешательство и инъекции гормонов могли дать эффект со значительной задержкой. На тебе могли оставить отпечаток впечатления и жизненный опыт, приобретенные уже после операции. Я имею в виду возможные эмоциональные расстройства, которые могут осложнить обычное слабоумие…</p><p class="p1">— Изумительно. Как будто у меня других забот не хватало.</p><p class="p1">— И еще… Неизвестно, вернешься ли ты в свое прежнее состояние. Не исключена регрессия и до более примитивного уровня.</p><p class="p1">Вот он и выдал мне самое худшее. Снял груз с души.</p><p class="p1">— Мне нужно узнать все, пока я еще в состоянии влиять на ход событий. Каковы были ваши дальнейшие планы?</p><p class="p1">— Фонд устроил все так, что тебя отослали бы в Уоррен.</p><p class="p1">— Какого черта?!</p><p class="p1">— В соглашении с мисс Гордон было оговорено, что все расходы по твоему содержанию возьмет на себя фонд Уэлберга. Он же обязался до конца твоей жизни выделять ежемесячно сумму, необходимую для твоих личных потребностей.</p><p class="p1">— Но почему туда? Когда умер дядя Герман, я ухитрялся обходиться сам. Даже Доннер не допустил, чтобы меня забрали в Уоррен, я жил и работал у него. Почему мне предназначили именно Уоррен?</p><p class="p1">— Если ты сможешь заботиться о себе сам, никто не станет держать тебя там насильно. Людям разрешают жить отдельно в куда более тяжелых случаях… Но мы должны были обеспечить тебя — на всякий случай.</p><p class="p1">Конечно, он прав. Мне не на что жаловаться. Они подумали обо всем. Уоррен — самое логичное решение, там я смогу спокойно дожить до глубокой старости.</p><p class="p1">— Ну что же, по крайней мере это не печь.</p><p class="p1">— Что?</p><p class="p1">— Не обращайте внимания. Шутка. — Мне пришла в голову мысль. — Скажите, можно ли посмотреть лечебницу в Уоррене? В качестве посетителя.</p><p class="p1">— У них там все время посетители. В рамках взаимоотношений с общественностью. Но зачем?</p><p class="p1">— Мне хочется узнать, что произойдет со мной, пока я еще могу что-то изменить. Пожалуйста, организуйте мне такое посещение, и чем скорее, тем лучше.</p><p class="p1">Видно было, что идея ему не по вкусу. Как будто я примерял собственный гроб. Не могу винить профессора. Он просто не понимает, что познание самого себя включает не только прошлое, но и будущее, не только те места, где я был, но и те, где буду. Я не только <em>некто</em>, но и способ существования этого <em>некто —</em> один из многих способов, и мне необходимо не только знание той дороги, по которой я иду, но и всех возможных дорог.</p><p class="p1">На несколько дней я погрузился в книги: клиническая психология, психометрия, обучение, экспериментальная психология, психология животных, физиологическая психология, теория поведения. Аналитические, функциональные, динамические, органистические и все прочие древние и новые учения, школы и течения. Плохо то, что большинство идей, на которых психологи строят свои заключения о человеческом разуме и памяти, представляют собой ничем не подкрепленные умозаключения.</p><p class="p1">Фэй хочет посмотреть лабораторию, но я запретил ей. Не хватало только, чтобы она столкнулась тут с Алисой. Как будто у меня других забот нет.</p></span>
