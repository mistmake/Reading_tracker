<p class="p">Отчет № 12</p>
</div><p class="subtitle">5 июня</p><p class="p1">Немур сердится — вот уже две недели он не видел моих отчетов. В какой-то степени он прав, потому что фонд Уэлберга начал платить мне жалованье и его нужно отрабатывать. Это избавляет меня от поисков работы. До Международного симпозиума психологов в Чикаго осталась всего неделя, и, естественно, Немуру хочется, чтобы доклад прозвучал как можно внушительнее. Мы с Элджерноном — самые яркие экспонаты.</p><p class="p1">Отношения наши с каждым днем становятся все напряженнее. Надоели его постоянные разговоры обо мне, как некоем лабораторном образце. Его послушать, так до эксперимента меня вообще не существовало.</p><p class="p1">Я сказал Штраусу, что слишком занят осмыслением мира и своего места в нем и мне не хватает терпения водить ручкой по бумаге. Ужасно непроизводительный процесс. Он посоветовал мне научиться печатать на машинке, и теперь — при скорости семьдесят пять слов в минуту — жить стало проще. Он же напомнил, что следует выражать свои мысли как можно доступнее, чтобы люди могли понимать меня. Язык, выразился он, иногда вместо дороги превращается в барьер. Ведь теперь я живу по другую сторону интеллектуального забора.</p><p class="p1">Мы встречаемся с Алисой, но никогда не говорим о том, что произошло между нами.</p><p class="p1">Трудно поверить, что меня выперли из пекарни всего две недели назад.</p><p class="p1">По ночным улицам за мной гоняются призраки. Когда я оказываюсь у пекарни, дверь ее закрыта и люди внутри никогда не оборачиваются, чтобы посмотреть на меня. Жених и невеста на свадебном пироге хохочут и показывают на меня пальцами, а купидоны размахивают своими стрелами. Я кричу. Я стучу в дверь, но никто не открывает. Я вижу Чарли, он смотрит на меня из окна. Или это просто отражение в стекле? Кто-то хватает меня за ноги и тащит прочь от пекарни в тени черных аллей, они обволакивают меня, и я просыпаюсь.</p><p class="p1">Иногда окно пекарни открывается, я заглядываю внутрь и вижу другую обстановку и других людей.</p><p class="p1">Удивительно, как прогрессирует моя способность вспоминать. Я еще не могу пользоваться ею в полной мере, но в те минуты, когда я поглощен чтением или решением какой-нибудь проблемы, мысли приобретают необыкновенную ясность. Мне кажется, это нечто вроде подсознательного предупреждения, и теперь, вместо того чтобы ждать воспоминаний, я вызываю их сам. Скоро я научусь контролировать их полностью и смогу исследовать не только сумму случаев из моей прошлой жизни, но и скрытые возможности мозга.</p><p class="p1">Я вижу окно пекарни… Я протягиваю руку и касаюсь его… холодное стекло… оно становится теплее… обжигает пальцы. Стекло превращается в зеркало, и я вижу юного Чарли Гордона, лет четырнадцати или пятнадцати. Он смотрит на меня из окна своего дома и, что вдвойне странно, совершенно не похож на меня…</p><p class="empty-line"/><p class="p1">Он ждет, когда сестра вернется из школы. Вот она появляется из-за угла, и он с криком «Норма! Норма!» выскакивает на крыльцо.</p><p class="p1">Норма размахивает тетрадкой.</p><p class="p1">— У меня пятерка за контрольную по истории! Миссис Баффин сказала, что это лучшая работа в классе! Я знала все ответы!</p><p class="p1">Норма — миловидная девочка, со светло-каштановыми волосами, аккуратно заплетенными в косички и уложенными вокруг головы наподобие короны. Она поднимает глаза на старшего брата, и улыбка превращается в гримасу. Она осторожно обходит его и вбегает в дом. Радостно смеясь, Чарли бежит за ней.</p><p class="p1">Родители на кухне, и Чарли, которого распирает гордость за сестру, выпаливает, прежде чем она успевает раскрыть рот:</p><p class="p1">— У нее пятерка! У нее пятерка!</p><p class="p1">— Нет!!! — вопит Норма. — Не ты! Молчи! Это моя отметка, и я сама скажу про нее!</p><p class="p1">— Минуточку, юная леди! — Матт откладывает газету и резко говорит Норме: — Не смей так разговаривать с братом!</p><p class="p1">— Он не имеет права говорить за меня!</p><p class="p1">— Не в этом дело! — Матт сердито смотрит на нее поверх грозящего пальца. — Он хочет тебе только добра, нельзя так кричать на него.</p><p class="p1">Норма ищет поддержки у матери.</p><p class="p1">— Моя пятерка — одна на весь класс. Теперь у меня будет собака? Ты обещала. Ты сказала, как только я получу пятерку за контрольную. У меня пятерка. Коричневую собаку с белыми пятнами. Я назову ее Наполеоном, потому что на этот вопрос я ответила лучше всего. Он проиграл битву при Ватерлоо.</p><p class="p1">Роза кивает:</p><p class="p1">— Иди на веранду и поиграй с Чарли. Он целый час ждал тебя из школы.</p><p class="p1">— Не хочу играть с ним.</p><p class="p1">— Иди на веранду! — произносит Матт.</p><p class="p1">Норма глядит на отца, потом на Чарли.</p><p class="p1">— Не пойду. Мама сказала, что я могу не играть с ним, если не хочу.</p><p class="p1">— Мне кажется, юная леди, — Матт встает и идет к ней, — что ты должна извиниться перед братом.</p><p class="p1">— Никогда! — вопит Норма, прячась за стулом, на котором сидит мать. — Он совсем глупый! Он не умеет играть в Монополию, и в шашки… ни во что… он все путает. Никогда больше не буду играть с ним.</p><p class="p1">— Тогда иди в свою комнату!</p><p class="p1">— Мама, ты купишь мне собаку?</p><p class="p1">Матт с треском бьет кулаком по столу.</p><p class="p1">— Пока ты так ведешь себя, в этом доме не будет собаки!</p><p class="p1">— Но я обещала ей, что если она будет хорошо учиться…</p><p class="p1">— Коричневую с белыми пятнами! — добавляет Норма.</p><p class="p1">Матт показывает на прижавшегося к стене Чарли.</p><p class="p1">— Ты уже говорила своему сыну, что мы не можем завести собаку. Мол у нас нет места и некому о ней заботиться. Забыла? Он ведь тоже просил собаку. Почему ты молчишь?</p><p class="p1">— Я буду заботиться о своей собаке, — настаивает Норма. — Я буду кормить ее, купать, гулять с ней…</p><p class="p1">Чарли, который до этого играл большой красной пуговицей, привязанной к нитке, неожиданно произносит:</p><p class="p1">— Я помогу Норме заботиться о собаке! Я тоже буду кормить ее, расчесывать и не дам другим собакам кусать ее!</p><p class="p1">Прежде чем Матт или Роза успевают вставить слово, Норма в отчаянии кричит:</p><p class="p1">— Нет!!! Это будет моя собака! Только моя!</p><p class="p1">— Вот видишь? — говорит Матт.</p><p class="p1">Роза садится рядом с дочерью и примирительно гладит ее по голове.</p><p class="p1">— Нужно же делиться, дорогая. Чарли поможет тебе.</p><p class="p1">— Нет, только я! Это я получила пятерку, а не он! Он никогда не получал хороших отметок, так почему он будет помогать мне? А потом собака полюбит его и станет собакой Чарли, а не моей! Если так, то я вообще не хочу никакой собаки!</p><p class="p1">— Договорились, — произносит Матт, поднимает упавшую газету и усаживается на стул. — Собаки не будет.</p><p class="p1">Норма хватает тетрадку, которую она всего несколько минут назад с торжеством принесла домой, рвет ее и швыряет обрывки в лицо удивленного Чарли:</p><p class="p1">— Ненавижу! Ненавижу тебя!</p><p class="p1">— Норма, прекрати сейчас же! — Роза протягивает к ней руки, но та вырывается.</p><p class="p1">— И школу ненавижу! Ненавижу! Я брошу школу и стану таким же идиотом, как Чарли! Я забуду все, чему научилась, и мы с ним станем похожи друг на друга! — И с криком: — Я уже забываю, забываю… Я уже ничего не помню! — выбегает из комнаты.</p><p class="p1">Роза в ужасе бросается за ней. Матт молчит и смотрит в газету, лежащую у него на коленях. Чарли, напуганный всеми этими криками, вжимается в стену и тихо всхлипывает. Что он плохого сделал? По его ноге стекает что-то горячее, и он ждет неизбежной пощечины от матери, когда та вернется.</p><p class="empty-line"/><p class="p1">После этого случая Норма стала проводить все свое время или с подругами, или запершись одна в комнате. Дверь ее всегда была закрыта, и мне запрещалось входить без разрешения.</p><p class="p1">Помню, как однажды, играя с подругой, Норма сказала:</p><p class="p1">— Чарли мне не настоящий брат. Он просто мальчик, которого мы пожалели и взяли к себе жить. Это мне мама рассказала и разрешила говорить всем, что он мне не брат!</p><p class="p1">Хорошо, если бы это воспоминание оказалось фотографией, чтобы я мог разорвать ее, а клочки в отместку швырнуть в физиономию Нормы. Мне хочется крикнуть ей: «Плевать мне на эту собаку! Она принадлежала бы только ей! Я никогда не допустил бы, чтобы она полюбила меня больше Нормы. Мне хотелось только, чтобы Норма играла со мной, как и раньше, и чтобы ей никогда не было плохо».</p><p class="subtitle">6 июня</p><p class="p1">Первая настоящая ссора с Алисой. Моя вина.</p><p class="p1">Мне захотелось увидеться с ней. В этом не было ничего необычного после пережитых воспоминаний или кошмаров один только ее вид успокаивает меня. Ошибкой было то, что я зашел за ней на работу.</p><p class="p1">После операции я еще не был в Центре обучения умственно отсталых взрослых, и возможность увидеть его снова показалась мне заманчивой. Он расположен на Двадцать третьей улице, восточнее Пятой авеню, в старом школьном здании, которое университет Бекмана вот уже пять лет арендует для экспериментального обучения — специальные классы для неполноценных.</p><p class="p1">Уроки кончались в восемь, но меня тянуло побывать в классе, где еще совсем недавно я с трудом учился разбирать буквы и отсчитывать сдачу с доллара.</p><p class="p1">Я поднялся по лестнице, подошел к знакомой двери и украдкой заглянул в маленькое окошко. Алиса была на своем месте за учительским столом, а рядом с ней сидела незнакомая мне женщина с изможденным лицом, на котором было написано нескрываемое удивление. Интересно, что именно втолковывала ей Алиса? У доски в инвалидном кресле сидел Майк Дорни, а первую парту украшал собой Лестер Браун, самый способный, по словам Алисы, ученик в классе. Над чем я корпел целыми днями, Лестер схватывал сразу, но появлялся он в школе, когда хотел, а иногда подрабатывал натиркой полов и пропадал неделями. Уверен, что если бы мы с Лестером относились к учебе одинаково, на операционный стол лег бы он, а не я. Многие из сидевших в классе были мне незнакомы.</p><p class="p1">Я набрался духу, открыл дверь и вошел.</p><p class="p1">— Да это же Чарли! — воскликнул Майк, разворачивая кресло.</p><p class="p1">Я помахал ему рукой.</p><p class="p1">Бернис, красивая блондинка с пустыми глазами, тупо посмотрела на меня и улыбнулась:</p><p class="p1">— Где тебя носило, Чарли? Какой у тебя шикарный костюм!</p><p class="p1">Еще несколько человек поздоровались со мной, и я помахал им в ответ рукой. Тут я заметил, что Алиса сердится.</p><p class="p1">— Уже почти восемь часов, — объявила она. — Пора собираться.</p><p class="p1">Дел было много — убрать мел, ластики, тетради, учебники, карандаши, краски и тому подобное. Каждый знал, что от него требуется, и работа закипела. Все засуетились, кроме Бернис, которая не сводила с меня глаз. Наконец она спросила:</p><p class="p1">— Почему Чарли не ходил в школу? Что с тобой стряслось, Чарли?</p><p class="p1">Все уставились на меня, а я на Алису — может, она ответит? Но она молчала. Что сказать и при этом никого не обидеть?</p><p class="p1">— Я… я просто так зашел…</p><p class="p1">Одна из девушек хихикнула — Франсина, о ней Алиса беспокоилась больше всех. К восемнадцати годам она ухитрилась родить троих, прежде чем ее родители настояли на гистерэктомии. Совсем не симпатичная — до Бернис ей было далеко, тем не менее она была легкой мишенью для десятков мужчин, покупавших ей какую-нибудь безделушку или билет в кино. Теперь она жила в общежитии, рекомендованном советом Уоррен-хауса, и вечерами ей разрешалось посещать школу. Но с тех пор, как ее дважды перехватывали по дороге, Франсина выходила на улицу только с провожатым.</p><p class="p1">— Наш Чарли стал большой шишкой, — хихикнула она.</p><p class="p1">— Хватит! — резко сказала Алиса. — Все свободны. Увидимся завтра в шесть.</p><p class="p1">Ученики вышли из класса. По тому, с какой яростью швыряла Алиса свои вещи в ящики стола, было видно, что она явно не в духе.</p><p class="p1">— Прости, — сказал я. — Сначала я ждал тебя внизу, а потом, думаю, дай-ка взгляну на свой класс, Альма-матер. Я хотел только посмотреть из-за двери и сам не понимаю, что толкнуло меня войти. Почему ты так рассердилась?</p><p class="p1">— Я совсем не рассердилась. Ни капли.</p><p class="p1">— Да что ты… Твоя обида непропорциональна случившемуся. Ты что-то скрываешь от меня.</p><p class="p1">— Ладно. Ты хочешь знать? Ты — другой. Ты изменился. Я говорю не о твоем коэффициенте интеллектуальности. Отношение к людям… ты просто другой человек…</p><p class="p1">— Ну, не надо так…</p><p class="p1">— Дай мне закончить! — Неприкрытая злоба в ее голосе заставила меня отшатнуться. — Да, да, именно так! Раньше в тебе было что-то… не знаю… тепло… доброта, ты всем нравился, и людям было хорошо с тобой. Теперь вместе с умом и знаниями в тебе появились другие черты, которые…</p><p class="p1">Я не вытерпел:</p><p class="p1">— А чего ты хотела? Неужели ты могла хоть на минуту представить, что я останусь ласковым щенком, который виляет хвостиком и лижет пнувший его ботинок? Конечно, я изменился, я начал узнавать себя. Я не обязан больше выслушивать ерунду, которую вбивали в меня всю жизнь.</p><p class="p1">— Многие люди относились к тебе достаточно хорошо.</p><p class="p1">— Интересно, откуда <em>ты</em> это знаешь? Послушай, даже лучшие из них жалели меня и этим возвышали себя в собственных глазах. Приходилось ли тебе замечать, что рядом с кретином кто угодно смотрится гением?</p><p class="p1">Сказав это, я тут же догадался, что Алиса поймет меня неправильно.</p><p class="p1">— Ты и меня причисляешь к этой категории?</p><p class="p1">— Не выворачивай мои слова наизнанку. Ты прекрасно знаешь…</p><p class="p1">— В некотором смысле ты прав. Рядом с тобой я выгляжу туповатой. После каждой нашей встречи у меня появляется чувство, что я — полная дура. Я вспоминаю свои слова, и вместо них в голову приходят замечательные, блестящие фразы, которые следовало бы произнести. Я просто убить себя готова!</p><p class="p1">— Так бывало с каждым.</p><p class="p1">— Понимаешь, мне хочется произвести на тебя <em>впечатление</em>. Совсем недавно я только посмеялась бы над такой мыслью, а сейчас потеряла всякую уверенность в себе. Прежде чем что-нибудь сказать или сделать, я ломаю голову — а стоит ли?</p><p class="p1">Я попробовал сменить тему разговора:</p><p class="p1">— Алиса, я пришел сюда вовсе не для того, чтобы спорить и пререкаться. Позволь проводить тебя. Мне обязательно нужно с кем-нибудь поговорить.</p><p class="p1">— Мне тоже. Но в последнее время разговоры с тобой даются мне все труднее. Моя роль в них сводится к тому, чтобы слушать, согласно кивать и притворяться, будто я имею представление о культурных различиях, необулианской математике и постсимволической логике. У меня такое ощущение, что я глупею буквально на глазах, а когда ты уходишь, я подхожу к зеркалу и говорю себе: «Алиса, ты не теряешь разум! Ты не тупеешь! Ты не впадаешь в маразм! Это Чарли — он идет вперед так быстро, что тебе только кажется, будто ты катишься назад!..» Потом мы снова встречаемся, ты начинаешь что-нибудь нетерпеливо доказывать мне, и я уверена, что в душе ты смеешься надо мной. Тебе кажется, что мне неинтересно, что я просто ленива. Откуда тебе знать, как я казню себя, когда остаюсь одна? Ты не знаешь, над какими книгами я просиживаю ночами, на какие лекции хожу… но все равно, что бы я ни сказала, все кажется тебе детским лепетом. Я надеялась помочь тебе, порадоваться твоим успехам, а ты отгородился от меня.</p><p class="p1">Я слушал, и меня не оставляла мысль, что Алиса совершенно права. Я был слишком поглощен происходящим со мной и забыл о ней.</p><p class="p1">Но дороге домой она тихо плакала, а я молчал — мне нечего было сказать, и думал о том, как все повернулось на сто восемьдесят градусов. Она боится меня. Лед треснул, и полоса чистой воды между нами становится все шире. Поток разума уносит меня в открытое море. Общение со мной — пытка для Алисы. У нас не осталось ничего общего.</p><p class="p1">— У тебя серьезный вид, — сказала она, посмотрев наконец мне в глаза.</p><p class="p1">— Я задумался о нас с тобой.</p><p class="p1">— Не придавай моим словам слишком большого значения. Мне совсем не хотелось огорчать тебя, — она попробовала улыбнуться.</p><p class="p1">— Ты уже огорчила меня. Только я не знаю, что делать.</p><p class="p1">Когда мы подходили к дому Алисы, она вдруг сказала:</p><p class="p1">— Я не поеду с тобой на симпозиум. Сегодня утром я сказала об этом Немуру. Ты будешь занят — разговоры с важными людьми, всеобщее внимание… Я не хочу путаться под ногами…</p><p class="p1">— Алиса…</p><p class="p1">— …и что бы ты сейчас ни сказал, я буду чувствовать, что мешаю тебе. Если не возражаешь, я побуду немного в обществе своего разбитого тщеславия, спасибо тебе.</p><p class="p1">— Ты преувеличиваешь. Я уверен, если ты только…</p><p class="p1">— Ты <em>знаешь</em>? Ты <em>уверен</em>? — Она повернулась и пристально посмотрела на меня со ступенек подъезда. — Подумать только, каким ты стал непогрешимым! Не слишком ли вольно ты обращаешься с желаниями других? Тебе не дано понять, <em>как</em> я чувствую, <em>что</em> я чувствую, и <em>почему</em>!</p><p class="p1">Она открыла дверь в свою квартиру и дрожащим голосом произнесла:</p><p class="p1">— Когда ты вернешься, я буду здесь. А пока мы далеко друг от друга, давай обдумаем все получше.</p><p class="p1">В первый раз за много недель она не пригласила меня зайти. Я стоял у закрытой квартиры и медленно закипал. Мне хотелось кричать, колотить в дверь, выломать ее, поджечь дом. Но потом, по дороге домой, я начал понемногу успокаиваться. И почувствовал свободу.</p><p class="p1">Теперь я понимаю, что одновременно с движением разума вперед мельчали мои чувства к Алисе — от преклонения — к любви, к признательности и, наконец, к простой благодарности. Я цеплялся за нее из боязни потерять последнюю нить, связывающую меня с прошлым.</p><p class="p1">С ощущением свободы пришла печаль. Я мечтал любить Алису, превозмочь эмоциональные и сексуальные страхи, завести детей, дом. Сейчас это уже невозможно. Я так же далек от Алисы со своим КИ 185, как и прежде с КИ 70. Разница в том, что теперь мы оба понимаем это.</p><p class="subtitle">8 июня</p><p class="p1">Что гонит меня из дома и заставляет в одиночестве бродить по городу? Это не легкая прогулка в летний вечер, а вечная спешка, чтобы попасть… куда? Я шагаю по бульварам, заглядываю в подворотни, в освещенные окна, ищу, с кем бы поговорить, и боюсь этого. По одной улице, по другой, сквозь бесконечный их лабиринт, всюду натыкаясь на слепящие неоновые прутья клетки, в которую превратился город.</p><p class="p1">Я ищу… что?</p><p class="p1">В Центральном парке я встретил женщину. Она сидела на скамейке у озера, и несмотря на жару, пальто ее было застегнуто на все пуговицы. Она улыбнулась и жестом пригласила меня сесть рядом. Мы смотрели на ярко освещенные громады зданий, выделяющиеся на фоне черного неба, и мне хотелось вобрать в себя все огни сразу.</p><p class="p1">Да, я из Нью-Йорка. Нет, я никогда не бывал в Ньюпорт-Ньюс, Вирджиния. Она оказалась оттуда родом, там она вышла замуж за моряка. Он сейчас в море, она не видела его два с половиной года. Она теребила в руках носовой платок, время от времени вытирая им со лба капельки пота. Даже в слабом, отраженном от поверхности озера свете было видно, сколько на ней косметики, но выглядела она привлекательно, если не считать припухшего лица, словно она только что проснулась. Ей хотелось поговорить о себе, а я был не прочь послушать.</p><p class="p1">Отец дал ей все, что богатый судовладелец мог дать единственной дочери — хороший дом, образование… все, кроме прощения. Он проклял ее, когда она завела роман с простым матросом.</p><p class="p1">Она взяла меня за руку и положила голову мне на плечо.</p><p class="p1">— В ту ночь, когда мы с Гарри поженились, — прошептала она, — я была пугливой девственницей. А он сошел с ума. Сначала избил меня, а потом изнасиловал безо всякой любви. Это был первый и последний раз, когда мы были вместе, больше я не позволяла ему прикасаться к себе.</p><p class="p1">Вероятно, по дрожанию моей руки она поняла, как я потрясен. Да, такие разговоры были для меня в новинку… Она вцепилась в меня еще сильнее, словно боясь, что я убегу прежде, чем она закончит рассказ. Казалось, это очень важно для нее, и я сидел тихо-тихо, как человек, кормящий с ладони птицу.</p><p class="p1">— Не то что я ненавижу мужчин, — успокоила она меня с подкупающим простодушием. — У меня были другие. Много, но он — ни разу. Обычно мужчины нежные, они сначала ласкают и целуют. — Она многозначительно посмотрела на меня.</p><p class="p1">Это было то, о чем я слышал, читал, мечтал. Я не знал, как ее зовут, а она не спросила моего имени. Она просто хотела побыть со мной наедине. Что подумала бы Алиса?</p><p class="p1">Я так неуклюже погладил ее плечо и так неумело поцеловал, что она с тревогой спросила:</p><p class="p1">— В чем дело? О чем ты думаешь?</p><p class="p1">— О тебе.</p><p class="p1">— У тебя есть место, куда можно пойти?</p><p class="p1">Осторожнее, осторожнее, Чарли… В какой именно момент земля разверзнется под ногами и ввергнет тебя в пучину?</p><p class="p1">— Если нет, то в одном отеле на Пятьдесят третьей берут недорого. А если заплатить вперед, они не станут спрашивать, где багаж.</p><p class="p1">— У меня есть комната…</p><p class="p1">Она посмотрела на меня с новым уважением:</p><p class="p1">— Что ж, прекрасно.</p><p class="p1">Все еще ничего. Любопытно, как далеко могу я зайти, не впадая в панику? Когда начнутся неприятности? Когда мы окажемся одни в комнате? Когда я увижу ее тело?</p><p class="p1">Внезапно самым важным в жизни для меня стал вопрос, могу ли я быть похожим на других мужчин? Имею ли я право просить женщину разделить мою судьбу? Ума и знаний тут недостаточно… Вместе с чувством раскованности и свободы во мне росло убеждение, что на этот раз все получится как надо. Эта женщина — не Алиса. Она многое повидала.</p><p class="p1">Ее голос изменился, в нем появилась неуверенность:</p><p class="p1">— Пока мы не ушли… я хочу сказать… — Она встала, шагнула ко мне, расстегнула пальто, и я увидел, что очертания ее тела совсем не те, какими я представлял их, сидя рядом с ней на скамейке. — Только пятый месяц, — сказала она. — Но ведь это все равно, правда?</p><p class="p1">Стоя в раскрытом пальто, она почти точно наложилась на картину женщины, распахнувшей для лучшего обозрения халат перед Чарли. А я ждал, как святотатец ждет удара молнии. Я отвернулся. <em>Этого</em> я ожидал меньше всего, хотя застегнутое в теплый летний вечер пальто должно было предупредить меня, что тут что-то неладно.</p><p class="p1">— Это не от мужа. Я не обманула тебя, мы не виделись с ним уже много лет. Восемь месяцев назад я встретила одного торгового агента и жила с ним. Его я больше не увижу, но ребенка хочу сохранить. Просто нам нужно быть поосторожнее, не толкаться и вообще… Тебе ни о чем не надо беспокоиться…</p><p class="p1">Она посмотрела мне в глаза, и то, что она в них увидела, заставило ее замолчать.</p><p class="p1">— Это непристойно! — крикнул я. — Как тебе не стыдно!</p><p class="p1">Она отступила и быстро запахнула пальто, защищая то, что находилось внутри.</p><p class="p1">Этот жест… Опять двойной образ: мама, беременная сестрой, в те дни, когда она меньше прижимала меня к себе, меньше согревала, меньше защищала от тех, кто говорил, что я не совсем нормален.</p><p class="p1">Кажется, я схватил ее за плечо, я не уверен, но она закричала. Ее вопли быстро вернули меня к действительности. Мне захотелось сказать ей, что не надо бояться, я никогда никому не сделал ничего плохого.</p><p class="p1">Но она не умолкала, и я услышал, как по темной тропинке кто-то бежит к нам. Никто не сможет понять меня правильно. Я бросился в темноту, к выходу из парка, сначала по одной дорожке, потом по другой. Я не знал, куда бежать, внезапно врезался во что-то и отлетел назад. Проволочная сетка — тупик! Тут я разглядел какие-то качели и понял, что это детская площадка, закрытая на ночь. Спотыкаясь о корни, я побежал вдоль забора. У полукруглого озерца, окружавшего площадку, я повернул назад, нашел еще одну тропинку, миновал маленький мостик, потом другой. Выхода не было.</p><p class="p1">— Что случилось, леди?</p><p class="p1">— Маньяк?</p><p class="p1">— Что он с вами сделал?</p><p class="p1">— Куда он убежал?</p><p class="p1">Итак, я вернулся на старое место. Спрятавшись за огромный валун в кустах, я растянулся на земле.</p><p class="p1">— Зовите полицейского! Никогда их не бывает там, где надо!</p><p class="p1">— Что случилось?</p><p class="p1">— Какой-то дегенерат хотел изнасиловать ее.</p><p class="p1">— Там кто-то бежит! Вот он!</p><p class="p1">— Надо поймать его, пока он в парке!</p><p class="p1">— Осторожно! У него нож и пистолет!</p><p class="p1">Очевидно, шум заставил всех ночных пташек выползти из своих темных углов, потому что раздался еще один вопль «Вот он!» и, выглянув из своего укрытия, я увидел, как кто-то мчится по освещенной тропинке, а за ним гонятся. Секундой позже передо мной промелькнула еще одна тень, нырнувшая в темноту. Я представил, как толпа ловит меня, бьет, рвет на куски… Я заслужил это. Мне почти хотелось этого!</p><p class="p1">Я встал, стряхнул с себя прилипший мусор и не торопясь пошел по дорожке, ожидая, что в следующее мгновение меня схватят и швырнут на землю, в грязь. Но скоро впереди показались огни Пятьдесят девятой улицы и Пятой авеню, и я вышел из парка.</p><p class="p1">Обдумав случившееся в безопасности моей комнаты, я был потрясен его откровенной жестокостью. Воспоминания о том, как выглядела мама перед тем, как родила Норму, пугают меня. Но еще страшнее то, что мне хотелось быть пойманным и избитым. Тени прошлого цепляются за ноги и тянут меня вниз. Я открываю рот, чтобы закричать, но нет голоса. Руки дрожат, мне холодно. Шум в ушах.</p></span>
