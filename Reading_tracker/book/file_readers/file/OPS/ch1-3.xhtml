<p class="p">2 атчет 4 марта</p>
</div><p class="p1">Севодня меня правиряли. Мне кажеца я не падайду им. У меня был перерыв и как они сказали я пошол к профу Немуру и ево секретарша сказала здравствуй и привела меня где на двери было на писано отдел психологии и был большой зал и много маленьких комнаток с только столом и стульями. И очень приятный челавек был в одной ис комнаток и у нево были белые листки на которых были пролиты чирнила. Он сказал садись Чярли устраивайся паудобней и успакойся. На нем был белый халат как у доктора но мне кажеца што он был не доктор потомушто он не сказал мне аткрой рот и скажы а. У нево были только эти белые листки. Ево завут Барт. Я не помню ево фамилии потомушто плохо запаминаю. Я не знал што он будет делать и я крепко держался за стул как у зубново врачя только Барт и не зубной врач но он сказал мне штоб я успакоился и я испугался потомушто когда так гаварят всегда бывает больно.</p><p class="p1">Барт сказал Чярли што ты видиш на этом листке. Я видил пролитые чирнила и очень испугался хотя заечья лапка была у меня в кармане потомушто когда я был маленький я всегда плохо учился и проливал чирнила. Я сказал Барту я вижу чирнила пролитые на белый листок. Барт сказал да и улыбнулся и мне стало харашо. Он переварачевал все листки и я гаварил ему ктото разлил на них чорные и красные чирнила. Я думал это лехко но когда я встал штобы идти Барт сказал садись Чярли мы ещо не кончили. Мы ещо не все сделали с листками. Я не понел но я помнил што док Штраус сказал делай все што тебе скажут даже если не понемаеш потомушто это тест.</p><p class="p1">Я не очень харашо помню што гаварил Барт но помню што он хотел штобы я сказал што было в чирнилах. Я там ничево не видил но Барт сказал там картинки. Я не видил ни каких картинок. Я очень старался. Я держал листок блиско а патом далеко. Патом я сказал если я надену ачки я наверно увижу лутше я надеваю ачки в кино и когда сматрю тиливизир но я сказал может быть они дадут мне увидить картинки в чирнилах. Я надел их и сказал дай пасматреть спорим я сичас их найду. Я очень старался но не нашол картинок а видил только чирнила. Я сказал Барту может мне нужны новые ачки. Он штото записал на бумаге и я испугался што не пройду тест. Я сказал ему это очень красивая картинка с прилесными точичками по краям но он пакачял галавой и я понел што это апять не то. Я спрасил другие люди видют што-нибуть в чирнилах и он сказал они вображают картинки в чирнильном петне. Он сказал што чирнила на картинках называюца чирнильное петно.</p><p class="p1">Барт очень приятный и гаварит медлено как мис Кинниан на уроке в класе куда я хажу учица читать для медлительных взрослых. Он обьеснил мне што это за тест. Он сказал люди видют разные штуки в чирнилах. Я сказал пакажы мне. Он не паказал а сказал ВОБРАЖАЙ што тут штото есть. Што это напаменает тебе и придумай штонибуть. Я закрыл глаза и придумал и сказал как пузырек с чирнилами выливаеца на белый лист. Тут у нево сломался карандаш он встал и вышел.</p><p class="p1">Мне кажеца я не прошол этот тест.</p></span>
