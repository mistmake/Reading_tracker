<span id="id10"><div class="title1">
<p class="p">Отчет № 10</p>
</div><p class="subtitle">21 апреля</p><p class="p1">Я придумал, как заставить тестосмеситель работать производительнее. Мистер Доннер сказал, что это весьма прибыльно, можно сэкономить на рабочей силе. Он выдал мне премию в пятьдесят долларов и прибавил десять долларов в неделю.</p><p class="p1">Я хотел пригласить Джо Карпа и Фрэнка Рейли отпраздновать это событие, но Джо нужно было что-то купить для жены, а к Фрэнку внезапно приехал двоюродный брат. Да, наверно, потребуется немало времени, чтобы привыкнуть ко мне.</p><p class="p1">Все меня боятся. Когда я подошел к Джимпи, чтобы о чем-то спросить, и тронул его за плечо, он подпрыгнул, уронил чашку с кофе и облился с ног до головы.</p><p class="p1">Джимпи все время украдкой посматривает на меня. Никто больше не разговаривает со мной, как раньше. Работать стало одиноко и неуютно. Размышляя об этом, я вспомнил, как Фрэнк вышиб из-под меня ноги, когда я уснул стоя. Теплый сладкий запах, белые стены. Фрэнк открывает печь и оттуда доносится рев огня. Я падаю… выгибаюсь… пол вылетает из-под ног… вспышка боли…</p><p class="empty-line"/><p class="p1">Это я — и все же это кто-то другой лежит на полу, другой Чарли. Он растерян… он трет ушибленное место… смотрит на Фрэнка, долговязого и тощего, и на стоящего рядом Джимпи — огромного, заросшего волосами. Его голубых глаз почти не видно под нависшими бровями.</p><p class="p1">— Оставь парня в покое, — говорит Джимпи. — Боже, Фрэнк, ну почему ты все время цепляешься к нему?</p><p class="p1">— Пустяки, — смеется Фрэнк, — я же не убил его. Ему ведь все равно. Правда, Чарли?</p><p class="p1">Чарли съеживается. Он не понимает, чем заслужил такое наказание, но понимает, что это еще не конец.</p><p class="p1">— Но тебе-то не все равно, — говорит Джимпи, скрипя ортопедическим ботинком. — Как же ты можешь издеваться над ним?</p><p class="p1">Они садятся за длинный стол и начинают лепить тесто для булочек, заказанных к вечеру. Некоторое время они работают молча, потом Фрэнк останавливается и сдвигает на затылок свой белый колпак.</p><p class="p1">— Слышь-ка, Джимп, давай научим Чарли печь булочки.</p><p class="p1">Джимпи ставит локти на стол.</p><p class="p1">— Давай лучше оставим его в покое.</p><p class="p1">— Нет, Джимп, серьезно. Спорим, его можно научить чему-нибудь простому — например, делать булочки.</p><p class="p1">Кажется, мысль начинает нравиться Джимпи, и он, повернувшись, внимательно смотрит на Чарли.</p><p class="p1">— В этом что-то есть. Эй, Чарли, поди-ка сюда на минутку.</p><p class="p1">Чарли стоит, уставившись на шнурки своих ботинок — он всегда так делает, когда другие говорят о нем. Он знает, как шнуровать ботинки и завязывать шнурки. Он может делать булочки. Его можно научить, как взбить, раскатать, свернуть тесто и сделать из него маленькие круглые булочки.</p><p class="p1">Фрэнк с сомнением глядит на него.</p><p class="p1">— Может, не надо, Джимп? Чего ради нам возиться с этим придурком?</p><p class="p1">— Предоставь это мне, — говорит Джимпи, которого уже захватила идея Фрэнка. — Мне кажется, у него пойдет дело. Чарли, хочешь научиться делать булочки, как я и Фрэнк?</p><p class="p1">Чарли смотрит на него, и улыбка медленно исчезает с его лица. Он знает, чего хочет от него Джимпи, и чувствует, что его загнали в угол. Он хочет услужить Джимпи, но в словах <em>учить</em> и <em>учиться</em> есть что-то зловещее, за ними ему видится высоко поднятая тонкая белая рука, бьющая его, чтобы он выучил то, чего не может понять.</p><p class="p1">Чарли отступает на шаг, но Джимпи хватает его за руку.</p><p class="p1">— Не бойся, парень, мы не сделаем тебе ничего плохого. Глянь-ка, ты весь трясешься, как будто собираешься развалиться на куски. Смотри, что у меня есть. — Он раскрывает ладонь, а на ней лежит медная цепочка, к которой прикреплен сияющий диск с надписью: «Стар-брайт полирует до звездного блеска». Джимпи поднимает цепочку, и золотистый кружок начинает медленно вращаться, отражая свет люминесцентной лампы. Такой блеск Чарли уже видел, хотя и не помнит, где и когда.</p><p class="p1">Чарли знает: возьмешь чужое — будешь наказан. Если вложат что-то прямо в руку — все в порядке. Только так. Но ведь Джимпи хочет отдать ему висюльку… Чарли кивает и улыбается.</p><p class="p1">— Это он понимает, — смеется Фрэнк и окончательно передает проведение эксперимента в руки Джимпи, — любит, чтоб ярко блестело. — Он взволнованно подается вперед. — Если эта безделушка так уж нужна ему, может, он и научится лепить булочки.</p><p class="p1">Два пекаря всерьез принимаются за Чарли, и вся пекарня собирается вокруг. Фрэнк очищает участок стола, а Джимпи шмякает на него средних размеров кусок теста. Зрители заключают пари.</p><p class="p1">— Следи внимательно, — говорит Джимпи, и кладет цепочку с диском на стол. — Следи и повторяй за нами. Научишься делать булочки, и эта штука твоя. На счастье.</p><p class="p1">Чарли, сгорбившись на стуле, смотрит, как Джимпи берет нож и отрезает кусок теста. Ему видно каждое движение — вот он раскатывает тесто в длинную колбаску, отрывает от нее кусок и сворачивает в кольцо. Время от времени Джимпи посыпает тесто мукой.</p><p class="p1">— Теперь смотри сюда, — говорит Фрэнк, проделывая то же самое.</p><p class="p1">Чарли смущен — в их действиях есть разница. Катая тесто, Джимпи растопыривает локти, как птица крылья, а Фрэнк прижимает их к бокам. Джимпи держит все пальцы вместе, а у Фрэнка большие пальцы задраны вверх. Джимпи говорит:</p><p class="p1">— Давай, Чарли, попробуй.</p><p class="p1">Чарли отрицательно качает головой — неуверенность в мелочах пригвождает его к месту.</p><p class="p1">— Смотри, Чарли, я сейчас сделаю все медленно. Следи, и повторяй движения за мной. Договорились? Попробуй запомнить все как следует, чтобы потом сделать самому.</p><p class="p1">Чарли морщит лоб, наблюдая как Джимпи отрезает кусок теста и скатывает его в шар. Он медлит, потом берет нож, тоже отрезает кусок теста и кладет его на середину стола. Медленно, отставив локти как Джимпи, он скатывает шар. Смотрит то на свои руки, то на руки Джимпи и старается держать пальцы так же, как и он, — вместе. Нужно сделать все правильно, потому что Джимпи хочет этого. В голове что-то шепчет: сделай все правильно, и они полюбят тебя. Чарли очень хочется, чтобы Фрэнк и Джимпи полюбили его.</p><p class="p1">Джимпи выпрямляется, и то же самое делает Чарли.</p><p class="p1">— Вот это здорово. Смотри, Фрэнк, он сделал шар.</p><p class="p1">Фрэнк кивает и улыбается, Чарли вздыхает. Он весь дрожит от напряжения. Успех непривычен для него.</p><p class="p1">— Хорошо, — говорит Джимпи, — а теперь будем делать колбаски.</p><p class="p1">Неуклюже, но очень внимательно Чарли повторяет каждое его движение. Несколько раз дрожание рук сводит все его усилия на нет, но в конце концов он ухитряется скрутить кусок теста в кольцо. Он делает шесть колечек и кладет их на большой посыпанный мукой противень рядом с теми, что сделал Джимпи.</p><p class="p1">— Отлично, Чарли. — Лицо Джимпи серьезно. — А теперь сделай все сам, без меня. Давай.</p><p class="p1">Чарли смотрит на огромный ком теста и на нож, который сунули ему в руку. И сразу же им овладевает отчаяние. Что он делал сначала? Как держал руку? Пальцы? Как скатать тесто в шар? Тысячи вопросов роятся у него в голове, а он стоит и улыбается. Ему хочется, чтобы Фрэнк и Джимпи были рады и полюбили его, ему хочется получить обещанную цепочку на счастье. Он снова и снова переворачивает тесто, но никак не может заставить себя начать. Не может отрезать кусок, потому что знает, что ошибется. Ему страшно.</p><p class="p1">— Он уже забыл, — говорит Фрэнк. — Ничего в голове не держится.</p><p class="p1">Чарли сосредоточенно хмурится и пробует вспомнить: сначала отрезаешь кусок. Потом скатываешь из него шар. Но как он становится колечком как те, на противне? Дайте ему время и он вспомнит. Вот рассеется немного туман, и он сразу вспомнит. Он отчаянно борется с собой, чтобы удержать в голове хоть чуточку из того, чему его учили. Он так старается…</p><p class="p1">— Ну что ж, Чарли, — говорит Джимпи, отбирая у него нож, — не мучь себя понапрасну. Все равно это не твоя работа.</p><p class="p1">Еще минута, и он вспомнит. Если бы только они не торопили его. Куда все так спешат?</p><p class="p1">— Иди, Чарли. Иди посиди и посмотри комиксы. Нам надо работать.</p><p class="p1">Чарли улыбается и вытаскивает из заднего кармана журнал со смешными картинками. Он расправляет его и кладет себе на голову, как шляпу. Фрэнк хохочет, да и Джимпи наконец улыбается.</p><p class="p1">— Иди, бэби, — фыркает Джимпи. — Посиди, пока не позовет мистер Доннер.</p><p class="p1">Чарли улыбается ему и бредет в угол, где сложены мешки с мукой. Ему нравится сидеть на них, скрестив ноги, и разглядывать картинки в журнале. Он начинает переворачивать страницы, и им вдруг овладевает желание заплакать. Он не понимает, почему. О чем печалиться? Туман густеет, потом снова рассеивается. Он предвкушает удовольствие от ярких картинок, виденных им уже тридцать, сорок раз. Он знает, как кого зовут и что белые пузыри с буквами над головами фигурок означают, что они разговаривают. Сможет ли он когда-нибудь прочитать эти буквы? Дайте ему время, не торопите, не толкайте его — и он сможет. Но все куда-то спешат…</p><p class="p1">Чарли подтягивает к себе колени и открывает журнал на первой странице, где Батман и Робин раскачиваются на длинной веревке, свисающей с крыши какого-то здания. Когда-нибудь, решает Чарли, он обязательно научится читать и узнает, что тут написано. Он чувствует руку на своем плече и поднимает голову. Это Джимпи, он протягивает ему цепочку. Медный диск крутится, поблескивает…</p><p class="p1">— Возьми, — ворчит он, бросает цепочку Чарли на колени и хромая уходит.</p><p class="p1">Теперь я понимаю, что для него это был весьма необычный поступок. Почему он сделал это? С той поры, благодаря профессору Немуру, доктору Штраусу и другим людям, работающим в колледже, я проделал долгий путь. Но что думают обо мне Фрэнк и Джимпи? Ведь я стал совсем другим…</p><p class="subtitle">22 апреля</p><p class="p1">Народ в пекарне здорово изменился. Они не просто игнорируют меня, я чувствую настоящую враждебность. Доннер хочет, чтобы я вступил в профсоюз, и еще раз повысил мне зарплату. Самое паршивое, что я не получаю от всего этого никакого удовольствия, потому что люди обижены на меня. Что ж, не могу винить их — они не понимают, что произошло со мной, а я не могу объяснить им. Раньше мне казалось, что они будут гордиться мной. Но это не так.</p><p class="p1">Правда, мне есть с кем поговорить. Завтра вечером приглашу мисс Кинниан в кино, отпраздновать прибавку. Если отважусь.</p><p class="subtitle">24 апреля</p><p class="p1">Наконец-то профессор Немур согласился со мной и с доктором Штраусом, что мне совершенно невозможно записывать свои ощущения, зная, что их будут читать другие. В своих записях я всегда старался быть абсолютно честным, но есть такое, что мне не хотелось бы делать всеобщим достоянием. По крайней мере, сейчас.</p><p class="p1">Теперь я могу оставлять у себя записи о самых тайных переживаниях, но при условии, что перед тем как представить окончательный доклад в фонд Уэлберга, профессор Немур прочитает все и сам решит, что может быть опубликовано.</p><p class="p1">Сегодня произошло довольно неприятное событие. Я пришел в лабораторию пораньше, чтобы спросить доктора Штрауса или профессора Немура, можно ли мне пригласить Алису Кинниан в кино. Я уже собрался было постучать в дверь, но услышал, как они спорят друг с другом. Очень трудно справиться с привычкой подслушивать, ведь раньше люди всегда говорили и действовали так, словно я пустое место, словно им наплевать, что я о них подумаю.</p><p class="p1">Кто-то из них стукнул ладонью по столу, и профессор Немур закричал:</p><p class="p1">— Я уже информировал оргкомитет, что мы представим доклад в Чикаго!</p><p class="p1">Потом я услышал голос доктора Штрауса:</p><p class="p1">— Ты не прав, Гаролд. Шесть недель — слишком короткий срок. Он все еще меняется.</p><p class="p1">Потом опять Немур:</p><p class="p1">— До сих пор мы ни разу не ошиблись в своих предсказаниях, и тем самым получили право обнародовать наши результаты. Повторяю, Джей, бояться абсолютно нечего. Все идет по плану.</p><p class="p1">Штраус:</p><p class="p1">— Эта работа слишком важна для всех нас, чтобы трезвонить о ней прежде времени. Ты берешь на себя смелость…</p><p class="p1">Немур:</p><p class="p1">— А ты забываешь, что руковожу проектом я!</p><p class="p1">Штраус:</p><p class="p1">— А ты забываешь, что тут замешана не только твоя репутация! Если результаты не подтвердятся, под ударом окажется вся теория!</p><p class="p1">Немур:</p><p class="p1">— Я проверил и перепроверил все, что можно, и думаю, что регрессия нам больше не грозит. Небольшой доклад не повредит нам. Я просто уверен, что все будет в порядке!</p><p class="p1">Потом Штраус сказал, что Немур метит на пост заведующего кафедрой психологии в Гэлстоне. На это Немур ответил, что Штраус вцепился ему в фалды и тащится за ним к славе.</p><p class="p1">Штраус:</p><p class="p1">— Без моей техники нейрохирургии и инъекций энзимов твои теории ничего не стоят, и скоро тысячи хирургов во всем мире будут пользоваться <em>моей</em> методикой.</p><p class="p1">Немур:</p><p class="p1">— Эти новые методики родились только благодаря <em>моей</em> теории!</p><p class="p1">Они всячески обзывали друг друга: оппортунист, циник, пессимист, и я почему-то испугался. Внезапно мне пришло в голову, что я не имею никакого права стоять под дверью и подслушивать их. Раньше для них это не имело бы никакого значения, но теперь, когда они прекрасно осведомлены о моих умственных способностях, вряд ли им захочется, чтобы я узнал об этом споре. Не дождавшись конца разговора, я ушел.</p><p class="p1">На улице стемнело, и я долго бродил, пытаясь понять, что же так испугало меня. Впервые я увидел их такими, какие они есть на самом деле — не богов, даже не героев, а просто двух усталых мужчин, старающихся получить что-то от своей работы. А вдруг Немур прав, и эксперимент удался? О чем же тогда спорить?</p><p class="p1">Так приглашать мисс Кинниан в кино или нет? Спрошу завтра.</p><p class="subtitle">26 апреля</p><p class="p1">Наверно, не стоит мне болтаться по колледжу без дела. Вид юношей и девушек, спешащих куда-то с книгами под мышкой, звуки их голосов — все это волнует меня. Мне хочется посидеть и поговорить с ними за чашкой кофе, поспорить о романах, политике, новых идеях. Интересно послушать, как они спорят о поэзии, науке и философии — о Шекспире и Мильтоне, Ньютоне, Эйнштейне, Фрейде, Платоне, Гегеле и Канте, и о других, чьи имена отдаются у меня в голове, как звуки огромного колокола.</p><p class="p1">Слушая их разговоры, я притворяюсь, что тоже студент, хотя и много старше. Я ношу с собой учебники и даже начал курить трубку. Глупо, конечно, но мне почему-то кажется, что я принадлежу к тому же миру, что и они. Ненавижу свой дом и свою такую одинокую комнатенку.</p><p class="subtitle">27 апреля</p><p class="p1">В кафе познакомился и подружился с несколькими студентами. Они спорили о том, сам ли Шекспир писал свои пьесы. Один из них — толстяк с потным носом — утверждал, что все пьесы Шекспира написал Марлоу. Но Ленни — коротышка в темных очках — сказал, что Марлоу — это чепуха и все прекрасно знают, что эти пьесы написал сэр Фрэнсис Бэкон, потому что Шекспир никогда не учился в колледже и не мог получить того образования, которое прослеживается в приписываемых ему произведениях. Тогда парень в шапочке первокурсника сказал, что слышал, как ребята в туалете говорили, будто пьесы Шекспира на самом деле написала какая-то леди.</p><p class="p1">Они говорили про политику, про искусство и про Бога. Никогда не предполагал, что Бога может и не быть. Мне становится немного страшновато, ведь я впервые задумался о том, что же такое Бог.</p><p class="p1">Теперь я понимаю, что одна из главных задач колледжа — объяснить людям, что то, во что они верили всю жизнь, на самом деле совсем не так и что ничто не является на самом деле тем, чем кажется.</p><p class="p1">Все время, пока они спорили, возбуждение так и бурлило во мне. Вот чего мне хочется больше всего на свете — ходить в колледж и слушать, как люди говорят о важных вещах.</p><p class="p1">Почти все свободное время я теперь провожу в библиотеке, глотая и впитывая в себя книги. Круг моих интересов достаточно широк: Достоевский, Флобер, Диккенс, Хемингуэй, Фолкнер — любые романы, которые попадаются под руку. Мой голод из тех, что нельзя насытить.</p><p class="subtitle">28 апреля</p><p class="p1">Ночью мне приснилось как мама ругается с папой и с учительницей в школе № 13, где я учился, пока меня не перевели в 222-ю…</p><p class="empty-line"/><p class="p1">— …Он нормальный! Он нормальный! Он вырастет и будет как все остальные! Лучше, чем все остальные! — Она пробует вцепиться учительнице в лицо, но папа крепко держит ее. — Он будет ходить в колледж! Он станет знаменитым! — Она выкрикивает это снова и снова, вырываясь из папиных рук. — Он будет ходить в колледж!</p><p class="p1">Мы в директорском кабинете и кроме нас тут полно народу. У всех смущенный вид, и только заместитель директора слегка улыбается и отворачивается, чтобы никто этого не заметил. В моем сне у директора длинная борода, он плавает по комнате и показывает на меня пальцем:</p><p class="p1">— Его необходимо перевести в особую школу. Государственная специальная школа в Уоррене — вот, что вам нужно! Он не может оставаться здесь!</p><p class="p1">Папа выталкивает маму из кабинета, но она продолжает кричать и плакать. Я не вижу ее лица, но огромные красные слезы капают и капают на меня…</p><p class="p1">Утром я смог не только вспомнить сон, но и снова проникнуть памятью сквозь туман — туда, где мне шесть лет и где все это случилось. Норма еще не родилась. Мама — крохотная темноволосая женщина. Речь ее тороплива, а руки постоянно в движении. Помнится, она все время трепетала вокруг папы, как большая заботливая птица. Папа очень уставал на работе, и у него не было сил отмахиваться от нее.</p><p class="p1">Я вижу Чарли. Он стоит посреди кухни со своей любимой игрушкой — ниткой с нанизанными на нее бусинками и колечками. Он вращает нитку, она накручивается на палец, рассыпая вокруг яркие вспышки. Он может играть с ней часами. Я не помню, кто сделал ее и куда она потом делась, но помню, как он восхищенно смотрит на яркие мерцающие круги…</p><p class="p1">Она кричит на него… нет, она кричит на отца:</p><p class="p1">— Я не собираюсь забирать его из школы! С ним все в порядке!</p><p class="p1">— Роза, хватит обманывать себя, будто он нормальный ребенок. Посмотри на него. Роза! Ему уже шесть лет, а…</p><p class="p1">— Он не идиот! Он как все дети!</p><p class="p1">Папа печально глядит на сына, играющего со своей ниткой. Чарли улыбается и вытягивает руку, чтобы папа увидел, как здорово она крутится.</p><p class="p1">— Выбрось эту гадость! — вопит мама и бьет Чарли по руке. Нитка падает на пол. — Иди поиграй в кубики!</p><p class="p1">Чарли напуган этой внезапной вспышкой гнева. Он не знает, что будет дальше. Его начинает бить дрожь. Родители продолжают спорить, и голоса, перелетающие от одного к другому, туго охватывают его, сжимают внутренности. Паника.</p><p class="p1">— Чарли, марш в уборную! Только посмей наделать в штаны!</p><p class="p1">Конечно, он послушался бы ее, только ноги почему-то не двигаются. Его руки взлетают вверх, защищая голову от удара.</p><p class="p1">— Ради бога, Роза! Оставь его в покое! Посмотри, как ты напугала его. Всегда ты так, а бедный ребенок…</p><p class="p1">— А почему ты не помогаешь мне? Почему я все должна делать сама? Я каждый день занимаюсь с ним, чтобы он не отстал. Он просто медлительный, вот и все!</p><p class="p1">— Не обманывай себя, Роза, это нечестно. Ты дрессируешь его, как животное. Не приставай к нему.</p><p class="p1">— Мне хочется, чтобы он стал таким, как все!</p><p class="p1">Пока они спорят, живот Чарли болит все сильнее и сильнее, будто собирается взорваться. Он прекрасно понимает, что нужно идти в туалет. Он просто не может заставить себя. Куда удобнее сделать все прямо тут, на кухне, но это неправильно, и она ударит его. Он хочет свою нитку обратно. Если бы она была у него и крутилась, он смог бы удержаться и не наделать в штаны. Но игрушки нет — колечки и бусинки разлетелись по кухне, а нитка лежит около плиты.</p><p class="p1">Странно, хотя голоса доносятся до меня совершенно отчетливо, я по-прежнему не вижу их лиц, только размытые очертания. Папа — огромный и неторопливый, мама — маленькая и быстрая. Прислушиваясь к их спору, мне так и хочется заорать изо всех сил: «Да посмотрите же вы на него! Вниз, на него! На Чарли! Ему нужно в туалет!!!».</p><p class="p1">Они спорят, а Чарли стоит, вцепившись ручонками в свою красную клетчатую рубашку. В словах, проскакивающих между ними словно искры, слышны злоба и сознание своей вины.</p><p class="p1">— В сентябре он снова пойдет в тринадцатую, и снова пройдет весь класс!</p><p class="p1">— Ну посмотри же правде в глаза! Учительница сказала, что он неспособен ни к какой серьезной работе.</p><p class="p1">— Эта стерва? О, я знаю, как назвать ее в следующий раз! Пусть только начнет, и я напишу не только в попечительский совет! Я выцарапаю глаза этой грязной шлюхе! Чарли, что ты так извиваешься? Иди в туалет. Иди сам. Ты знаешь, куда идти.</p><p class="p1">— Разве ты не видишь — ему хочется, чтобы ты пошла с ним. Ему страшно!</p><p class="p1">— Отстань! Он прекрасно сходит и один. В книге написано, что это придаст ему уверенности и создаст чувство достижения цели.</p><p class="p1">Но ужас, который вызывает у Чарли холодная, облицованная белым кафелем комнатка, превозмогает все. Он боится идти туда один. Он протягивает к маме руки и всхлипывает:</p><p class="p1">— Ту… туа…</p><p class="p1">Она бьет его по рукам.</p><p class="p1">— Хватит, — говорит строго. — Ты уже большой мальчик. Иди прямо в туалет и сними штанишки, как я тебя учила. Предупреждаю — если обделаешься, накажу.</p><p class="p1">Я почти чувствую корежащие его спазмы, а эти двое стоят над ним и ждут, что же он будет делать. Всхлипывания становятся все тише и тише, и внезапно он теряет всякий контроль над своим телом. Он закрывает лицо руками и пачкает себя.</p><p class="p1">Облегчение и страх. Сейчас она будет бить его. Вот она уже наклоняется к нему, крича, что он плохой мальчик, и Чарли ищет спасения у отца.</p><p class="empty-line"/><p class="p1">…И вдруг я вспоминаю, что ее зовут Роза, а его — Матт. Странно, что я забыл, как зовут маму и папу. Ведь я помню, как звали сестру. Не помню, когда я в последний раз думал про них. Мне хочется увидеть Матта, понять, о чем он думает в этот момент. Когда она начала бить меня, он повернулся и ушел на улицу.</p><p class="p1">Если бы я только мог разглядеть их лица!</p></span>
