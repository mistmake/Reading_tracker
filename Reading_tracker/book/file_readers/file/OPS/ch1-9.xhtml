<p class="p">Отчет 8</p>
</div><p class="subtitle">15 марта</p><p class="p1">Меня выписали из госпиталя но на работу я ещо не хожу. Ничево не случаеца. Я прошол кучу тестов и милион гонок с Элджерноном. Не навижу этого мыша он всегда выигрывает. Проф Немур сказал я должен правиряца и саривнаваца с нова и с нова. Эти лаберинты дурацкие. И картинки тоже дурацкие. Мне нравица смотреть на картинки на каторых мущины и женщины но я не буду выдумывать не правду про людей.</p><p class="p1">У меня болит галава потомушто я стараюся много думать и запаминать. Док Штраус обещял помоч но не помогает. Он не гаварит про што мне думать и когда я стану умным. Он только заставляет меня ложыца на кушетку и гаварить.</p><p class="p1">Мис Кинниан то же приходит навестить меня в колеже. Я сказал ей што ничево не случаеца. Когда я стану умным. Она сказала Чярли ты должен быть тирпиливым для этово нужно время. Это случица так медлено ты и не заметиш. Она сказала мне што Барт сказал ей што мои дела идут харашо. Я все равно думаю эти тесты и гонки дурацкие и думаю отчеты то же дурацкие.</p><p class="subtitle">16 марта</p><p class="p1">Я съел ленч в месте с Бартом в сталовой колежа. У них есть всякая харошая еда и я не плачю за нее ни цента. Мне нравица сидеть и смотреть на студентов и студенток. Иногда они смеюца но в аснавном разгаваривают о том о чем и в пикарне Доннера. Барт сказал это про искуство политику и рилигию. Я не знаю што это такое но знаю што рилигия это бог. Мама расказала мне про нево и про то как он сделал мир. Она гаварила я должен всегда любить бога и молица ему. Я не помню молитв но думаю когда я был маленьким мама чясто заставляла меня молица ему штобы он сделал меня здоровым а небольным. Я думаю што это какраз што я не был умный.</p><p class="p1">Барт сказал если кспиримент пройдет как надо я смогу понять все про што разгаваривают студенты я спросил думаеш я буду такойже умный он засмиялся и сказал што эти ребята не такие уж умники ты абайдеш их как бутто они стаят на месте.</p><p class="p1">Он пазнакомил меня с некоторыми из них и они гледели на меня как то страно бутто я чюжой. Я почти забыл и стал расказывать им што я буду скоро такой же умный как они но Барт прервал меня и сказал им што я уборщик в лабалатории. Потом он обьеснил што моя апирацыя секрет. Я не савсем панимаю почему это секрет. Барт сказал это на случяй если ничево не получица то проф Немур не хочет штобы над ним смиялись особено люди из фонда Уэлберга которые дали ему деньги для праекта. Я сказал мне все равно если люди будут смияца надо мной. Много людей смиеца надо мной но они мои друзья и нам весело. Барт палажил мне руку на плечо и сказал Немур не о тебе беспокоица.</p><p class="p1">Мне кажеца што люди не будут смияца над профом Немуром потомушто он учоный в колеже но Барт сказал што для других учоных и депломников учоные тоже люди. Барт сам депломник и ево спициальность ПСИХОЛОГИЯ как на двери в лабалаторию.</p><p class="p1">Скарее бы стать умным потомушто я хочю узнать все што есть в мире как эти ребята из колежа. Про искуство палитику и бога.</p><p class="subtitle">17 марта</p><p class="p1">Утром когда я проснулся мне паказалось што я уже умный но я ашибся. Каждое утро я так думаю и все время ашибаюсь. Может кспиримент не палучился. Может я савсем не стану умным и буду жыть в доме Уоррена. Ненавижу тесты ненавижу лаберинты и ненавижу Элджернона. Ни когда не знал што я глупее мыша. Я не хочю больше писать отчеты. Я все забываю и даже когда я записываю штото в книшку то потом не всегда могу прочитать и мне очень плохо. Мис Кинниан сказала Чарли будь тирпиливым но я устал и мне плохо. У меня все время болит галава. Я хочю абратно в пикарню и не хочю писать ни каких отчетов.</p><p class="subtitle">20 марта</p><p class="p1">Я вазвращяюсь работать в пикарню. Док Штраус сказал профу Немуру так будет лутше но все равно мне ни кому нельзя гаварить про апирацыю за чем она была и я должен приходить каждый вечер после работы на 2 часа в лабалаторию делать тесты и писать дурацкие отчеты. Они будут каждую неделю платить мне как за работу потомушто так сказали люди из фонда Уэлберга когда давали им деньги. Я досих пор не знаю што такое Уэлберг. Мис Кинниан обьясняла мне но я не понел. Если я не стал умным то почиму мне плотют деньги. Но если они будут платить то я буду ходить. Очень трудно писать.</p><p class="p1">Я рад што вазвращаюсь на зад потомушто я люблю свою работу в пикарне и своих друзей и как нам бывает весело. Док Штраус сказал я должен носить в кармане записную книшку на случай если я штонибудь вспомню. И я не должен песать отчеты каждый день а только когда я думаю про штонибудь или случяеца штото не обычное. Я сказал со мной не случяеца ничево не обычного и кспиримент то же не случился. Он сказал не падай духом Чярли для этово нужно время и ты сам не сразу заметиш. Он обьеснил как это занело много времени у Элджернона пока он стал в 3 раза умнее.</p><p class="p1">Значит Элджернон все время абганяет меня в лаберинте потомушто ему сделали такуюже апирацыю. Он спицыальная мыш и первое жывотное которое так долго астаеца умным после апирацыи. Не знал што он спицыальный мыш. Это другое дело. На верно я смогу абагнать в лаберинте простого мыша. Может потом я абганю и Элджернона. Вот это будет да. Док Штраус сказал пахоже Элджернон астанеца умным на всегда и это хароший признак потомушто нам абоим сделали одну и туже апирацыю.</p><p class="subtitle">21 марта</p><p class="p1">Севодня нам в пикарне было очень весело. Джо Карп сказал эй пасматрите где Чярли делали апирацыю што они сделали Чярли влажили тебе мозги в заднее место. Я хотел сказать што буду умным но вспомнил што проф Немур сказал што не надо. Потом Фрэнк Рэйли сказал Чярли ты открыл дверь не тем местом. Я засмиялся. Они все мои друзья и любют меня по настаящиму.</p><p class="p1">Работы много. Без меня не кому было убираца в пикарне потомушто это моя работа но у них новый парень Эрни который разносит хлеп а я это всегда делал. Мистер Доннер сказал он решыл пока невыганять ево штобы дать мне атдахнуть и не работать слишком много. Я сказал ему со мной все в порятке и я могу и разносить и убирать как всегда но мистер Доннер сказал парень остаеца.</p><p class="p1">Я сказал а што мне делать. А мистер Доннер пахлопал меня по плечю и спросил Чярли сколько тебе лет. Я сказал 32 а в день рождения будет 33. А давно ты здесь спросил он. Я сказал не знаю. Он сказал ты пришел сюда 17 лет на зад. Твой дядя Герман боже упакой ево душу был мой лутший друг. Он привел теба сюда и папрасил меня разрешить тебе работать здесь и присмотреть за тобой. А когда он через 2 года помер и твоя мать атдала тебя в дом Уоррена я заставил их разрешить тебе работать у меня. 17 лет Чярли и я хочю штобы ты знал што хотя пикарное дело и не приносит большого дахода я всегда гаварил у тебя будет здесь работа до конца твоей жызни. Такшто не беспакойся што ктото займет твое место. Тебе ни когда не придеца вазвращяца в дом Уоррена.</p><p class="p1">Я и не беспакоюсь только за чем ему нужен Эрни если я могу и разнасить и убирать. Я всегда делал это харашо. Он сказал парню нужны деньги Чярли и он будет учеником а потом станет пекарем. Ты будеш ево памошником и памагать ему когда надо.</p><p class="p1">Ни когда я не был памошником. Эрни умный но другие почему то не очень любют ево. Они любют меня они мои друзья и мы шутим и смиемся в месте.</p><p class="p1">Иногда ктото гаварит эй сматри Фрэнк или Джо или даже Джимпи он пахож на Чярли Гордона. Я не знаю почему они так гаварят но они всегда смиюца и я тоже смиюсь. Утром Джимпи он старый и он храмой назвал мое имя когда он арал на Эрни потомушто Эрни потирял празничный пирог. Он сказал Эрни чортвозьми ты притваряешся Чярли Гордоном. Не знаю за чем он так сказал. Я ни когда не терял пасылок.</p><p class="p1">Я спрасил мистера Доннера могули я научица штобы быть учиником как Эрни. Я сказал што смогу научица если он даст мне шанс.</p><p class="p1">Мистер Доннер долго и чюдно сматрел на меня я думаю потомушто я всегда молчю. Фрэнк услышал это и хахатал пока мистер Доннер не сказал заткнись и ступай к печи. Патом он сказал для этово нужно много времени Чярли. Работа пекаря очень важная и трудная и не нужно пока думать про это Чярли.</p><p class="p1">Я очень хочю расказать ему и другим про настаящюю апирацыю. Я хочю штобы все палучилось и я стал умным как другие.</p><p class="subtitle">24 марта</p><p class="p1">Проф Немур и Док Штраус прихадили ко мне в комнату штобы узнать почиму я не пришол в лабалаторию. Я сказал я не хочю бегать на перегонки с Элджерноном. Проф Немур сказал не хочеш не надо но притти нужно. Он принес мне подарок только это не подарок а на время. Он сказал это обучяющяя машина и работает как теливизор. Она гаварит и паказывает картинки и я должен включать ее как ложусь спать. Я сказал ты шутиш за чем включать теливизор когда я ложусь спать. Но проф Немур сказал што если я хочю стать умным то нужно делать как он гаварит. А я сказал ему я думаю я ни когда не стану умным.</p><p class="p1">Тогда док Штраус подошол положил мне руку на плече и сказал Чярли ты сам этово не знаеш но ты становися все умнее и умнее. Ты не замечяеш этово как не замечяеш как движеца часовая стрелка на часах. В тебе идут изминения. Они идут очень медлено. Но мы замечяем их по твоим тестам и как ты гавариш и по твоим отчетам. Мы не уверены на савсем ли это но мы уверены што скоро ты станеш в полне интилигентным молодым челавеком.</p><p class="p1">Я сказал ладно и проф Немур паказал мне как включить этот не теливизор. Я спросил а што он делает он с нова нахмурился потомушто я прошу обьеснить. Но док Штраус сказал што нужно расказать мне потому што я уже перестал верить всему што мне скажут. У профа Немура был такой вид бутто он хочет аткусить себе езык. Потом он медлено обьеснил мне што эта машына изминяет мой мозг. Она будет учить меня когда я хочю спать и не много когда я почти усну. Я буду слышить реч но не буду видить картинок. По ночям она будет снить мне сны и заставлять вспаминать как я был совсем маленьким.</p><p class="p1">Страшно.</p><p class="p1">Вот што я забыл. Я спросил профа Немура когда я смогу пойти к мис Кинниан в школу для взрослых и он сказал скоро мис Кинниан сама придет в колеж штобы учить меня спицыально. Это хорошо. Я ретко видил ее после апирацыи а она очень добрая.</p><p class="p1">Этот дурацкий теливизер всю ноч не давал мне спать. Как можно уснуть когда ктото арет всякие глупости прямо в ухо всю ноч. А эти сумашедшие картинки. Ох. Я не панимаю што он гаварит когда я не сплю так от куда я могу знать што он гаварит когда я сплю. Я спросил про это Барта а он сказал все идет нармально. Он сказал мои мозги учяца когда я сплю и это поможет мне когда мис Кинниан начнет со мной занимаца в лабалатории. Это не больница для жывотных как я думал. Это лабалатория для науки. Я не знаю што такое наука но я знаю што памагаю ей этим кспириментом.</p><p class="p1">Всеравно мне кажеца этот теливизер дурацкий. Если можно стать умным когда спиш то за чем люди ходют в школу. В ряд ли эта штука мне паможет. Я чясто смотрел позние передачи по настоящему теливизеру и не стал от этово умным. Может не от всех передач умнееш.</p><p class="subtitle">26 марта</p><p class="p1">Как я буду работать днем если эта штука не давала мне спать всю ноч. Я проснулся по среди ночи и не мог уснуть потомушто он все время твердил вспаминай вспаминай вспаминай. Мне кажеца я штото вспомнил. Не помню точно но это нащот мис Кинниан и школы где я учился читать. И как я попал туда.</p><p class="p1">Давно давно я спросил Джо Карпа как он научился читать и нельзя ли мне тоже научица. Он захахатал как он всегда делает когда я скажу штонибуть виселое и сказал Чярли за чем зря терять время нельзя вставить мозги туда где их нет. Но Фанни Бирден услышыла меня и спросила своево брата каторый студент в колеже и сказала мне про школу для атсталых взрослых при колеже Бекмана. Она написала мне это на бумашке а Фрэнк смиялся и сказал смотри не стань таким абразованым што не захочеш видить старых друзей. Я сказал не бойся я не брошу старых друзей даже если научюсь читать и писать. Он засмиялся и Джо Карп тоже но пришол Джимпи и сказал пора ставить булочки. Они все любют меня.</p><p class="p1">После работы я прошол 6 кварталов до школы и мне было не много страшно. Я очень хотел научица читать и купил газету штобы прочитать ее с разу как научюсь.</p><p class="p1">Когда я пришол туда это был большой зал и там было много народу. Я испугался што скажу кому ни буть што ни буть не то и хотел уйти но потом астался. Я ждал пока почти все ушли кроме не которых и я спросил у одной леди можно мне научица читать потомушто я хочю прочитать все в газете и паказал ее ей. Это была мис Кинниан но тогда я этово не знал. Она сказала если ты придеш завтра и запишешся я начну учить тебя как читать. Но ты должен понять што на это нужно много времени может годы научица читать. Я сказал я не знал этово но всеравно хочю потомушто я чясто притваряюсь што умею читать но это не правда и хочю научица. Она пожала мне руку и сказала рада пазнакомица с вами мистер Гордон. Я буду вашей учитильницей. Меня завут мис Кинниан. Вот так я пошол в школу и вот так я встретил мис Кинниан.</p><p class="p1">Думать и вспаминать очень трудно и я плохо сплю. Теливизер арет с лишком громко.</p><p class="subtitle">27 марта</p><p class="p1">Теперь когда мне сняца сны и я вспаминаю всякие случяи проф Немур сказал мне нужно ходить на тирапивтические сиансы с доком Штраусом. Он сказал тирапивтичиские сиансы это когда тебе плохо и ты разгавариваеш и тебе становица лутше. Я сказал ему мне не плохо я и так болтаю целый день так за чем ходить на тирапию но он расирдился и сказал всеравно ходи. На тирапии я лег на кушетку док Штраус сел рядом и сказал Чярли гавари што хочеш. Я долго молчал потомушто ни чево не мог придумать. Потом я расказал ему про пикарню и што там делают. Мне кажеца глупо ходить в ево кабинет и ложица ведь я пишу отчеты и он может их читать. Так што севодня я принес ему отчет и сказал может ты пачитаеш ево а я не много посплю на кушетке. Я был сильно уставшы этот праклятыи теливизер не давал мне спать но он сказал нет так не пойдет. Нужно гаварить. Я начал но всеравно уснул прям по середине.</p><p class="subtitle">28 марта</p><p class="p1">У меня болит галава. На этот раз не от телевизера. Док Штраус паказал как уменьшыть в нем звук штобы я мог спать. Не сколько раз я слушал все это утром штобы узнать чему я научился пока спал. Я даже не понял все слова. Может это другой езык или ещо што. Хотя больше это похоже на амириканский. Но он гаварит очень быстро.</p><p class="p1">Я спросил дока Штрауса чево харошево если я буду умным во сне ведь я хочю быть умным днем. Он сказал это одно и то же и у меня два мозга. Есть СОЗНАНИЕ и ПОДСОЗНАНИЕ так они пишуца и одно не гаварит другому што оно делает. Они не разгаваривают друг с другом. Поэтому мне сняца сны. И боже какие же мне сняца сумашетшие сны. Ох. Все от этово теливизера.</p><p class="p1">Забыл спросить у дока Штрауса это только я или у всех два мозга. (Я только што посмотрел это слово в словаре который док Штраус дал мне. ПОДСОЗНАТЕЛЬНЫЙ<em> — относящийся к деятельности мозга, но не присутствующий в сознании, например, подсознательный конфликт стремлений.</em>) Там было ещо но я не знаю што оно означяет. Это не очень хороший словарь для глупых людей как я.</p><p class="p1">А галава болит от вечеринки. Джо Карп и Фрэнк Рейли пригласили меня после работы зайти в бар Халлоранса и выпить. Я не люблю пить виски но они сказали мы здорово повеселимся. Мне было хорошо. Мы играли в игру и я плесал на стойке бара на галаве у меня был абажур от лампы и все смиялись. Потом Джо Карп сказал покажы девочкам как ты моеш сортир в пикарне и дал мне тряпку. Я показал им и все хахатали когда я сказал што мистер Доннер сказал што я лутший уборщик который у нево был потомушто я люблю свою работу и ни когда не апаздал и не прогуливал кроме апирацыи. Я сказал мис Кинниан сказала Чярли гордись потомушто ты работаеш хорошо. Все смиялись. А Фрэнк сказал эта мис Кинниан должно быть рехнулась если крутит с Чярли. А Джо сказал Чярли ты тискал ее. Я сказал не знаю про што он гаварит. Мне дали выпить ещо а Джо сказал Чярли просто умора когда переберет. Мне кажеца это значит што я им нравлюсь. Когда я стану таким же умным как мои лутшые друзья Джо Карп и Фрэнк Рейли.</p><p class="p1">Я не помню как кончилась вечеринка но они папрасили меня сбегать за угол и посмотреть идетли дож. Когда я вернулся ни ково не было. На верно ушли искать меня. Я искал их пока не стемнело. Я заблудился и злился на себя за это потомушто спорю Элджернон прошол бы здесь сто раз и не заблудился как я.</p><p class="p1">Дальше я не помню но мис Флинн сказала меня привел вежлевый полицейский. Ночью мне снились мама и папа только я не видел ее лица оно было белое и расплывчетое. Я плакал потомушто я был в большом магазине и не мог найти их и бегал в доль полок. Потом подошол челавек и привел меня в большую комнату со скамейками у стен дал мне леденец и сказал такому большому мальчику нельзя плакать потомушто мама и папа скоро придут и найдут меня. Такой был сон и у меня болела галава и на ней была шишка и везде синяки. Джо сказал может я кувырнулся или полицейский вложыл мне но мне так не кажеца. Виски я больше пить не буду. Ни когда.</p><p class="subtitle">29 марта</p><p class="p1">Я победил Элджернона. Я не знал этово пока Барт не сказал мне. Потом второй раз я проиграл потомушто развалнавался. Потом я побил ево ещо 8 раз. На верно я умнею если выигрываю у такой умной мышы но я этово не чуствую. Я хотел ещо пасаривнаваца но Барт сказал хватит на севодня. Он дал мне подержать Элджернона. Чюдесный мыш. Мягкий как вата. Он моргает и когда аткрывает глаза они у нево чорные и розовые по краям. Я спросил можно мне покормить ево потомушто я чуствовал себя виноватым и хотел подружыца с ним. Барт сказал нет Элджернон очень спицыальный мыш с такойже апирацыей как моя. Он первый из всех животных остался умным так долго и он сказал Элджернон такой умный што должен каждый раз аткрывать новый замок штобы покушать такшто он должен каждый раз учица новому. Мне стало грусно потомушто если он не научица то не сможет поесть и астанеца голодный. По моему это не правильно заставлять проходить тест штобы просто покушать. Какбы это понрвилось Барту. Мне кажеца мы подружымся с Элджерноном.</p><p class="p1">Тут я вспомнил. Док Штраус сказал што я должен записывать все свои сны и все што я думаю. Я сказал што ещо не знаю как думать. Он сказал ты написал как пришол в школу к мис Кинниан про маму и папу и што случилось до апирацыи это и называеца думать и ты это уже написал в отчетах. Оказываеца я думаю и вспаминаю. Может это значит што штото происходит со мной. Я не чуствую себя другим но я так развалнавался што не мог спать.</p><p class="p1">Док Штраус дал мне розовые пилюли штобы я спал. Он сказал што я должен много спать потомушто в это время происходют изменения в моем мозгу. Может это правда потомушто дядя Герман спал на старой софе в гостиной все время когда не работал. Он был толстый и ему было трудно найти работу потомушто он красил дома и ему трудно было взбраца по леснице. Когда я сказал маме што хочю быть маляром как дядя Герман моя сестра Норма сказала ага Чярли будет в нашей семье художником. А папа ударил ее по лицу и сказал не будь такой стервой он твой брат. Я не знаю што такое художник но если Норме дали за это подщочину на верно это не очень хорошо. Мне всегда было плохо когда Норму били когда она шутила со мной. Вот стану умным и навещю ее.</p><p class="subtitle">30 марта</p><p class="p1">Севодня в лабалаторию после работы пришла мис Кинниан. Она была рада видеть меня но валнавалась. Кажеца она моложе чем я помню ее.</p><p class="p1">Я сказал ей я очень стараюсь стать умным. Она сказала я верю в тебя Чарли я помню как ты сражался зато штобы читать и писать как другие. Я знаю ты все сможеш. Этим ты делаеш великое дело для всех атсталых людей.</p><p class="p1">Мы начали читать ужасно трудную книгу. Я ещо ни когда не читал такой трудной книги. Она называеца Робинзон Крузо про человека который попал на не обитаемый остров. Он умный и много умеет и по этому у нево есть дом и еда и он хорошо плавает. Только мне жаль ево потомушто он совсем один и у нево нет друзей. Но мне кажеца на острове ктото есть потомушто в книге есть картинка где он с чюдным зонтиком смотрит на следы на песке. Надеюсь у нево будет друг.</p><p class="subtitle">31 марта</p><p class="p1">Мисс Кинниан учит меня как правильно произносить и писать слова. Она говорит посмотри на слово закрой глаза и павтаряй ево много много раз пока не запомниш. Оказываеца я писал много слов не правильно. Это трудно но мисс Кинниан говорит не бойся ты научися.</p></span>
