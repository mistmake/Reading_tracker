<p class="p">Послесловие</p>
</div><p class="p1">В истории американской фантастики немало случаев, когда один и тот же рассказ или роман получал две самые высокие награды, присуждаемые за лучшие произведения года в этом жанре-премию «Хьюго» (приз читательской популярности, которым автор награждается на ежегодных конвентах любителей фантастики) и премию «Небьюла» (профессиональный приз, присуждаемый по итогам голосования членов Организации писателей-фантастов Америки). Однако лишь дважды высшие награды получал и рассказ, и созданный на его основе позже роман, хотя подобные проекты — сделать из успешного рассказа роман — в издательской практике США явление вполне обычное. Первое такое достижение принадлежит автору романа, с которым читатель только что познакомился.</p><p class="p1">Рассказ «Цветы для Элджернона» был опубликован в 1959 году в журнале «Фэнтези энд сайенс фикшн» и в 1960-м получил «Хьюго». Премию «Небьюла» стали присуждать только с 1965 года, но, появись она раньше, рассказ, возможно, завоевал бы и ее: немного найдется фантастических произведений, удостоившихся столь высокой и почти единодушной оценки как читателей, так и профессионалов жанра. Автор не только продемонстрировал новые возможности техники повествования и развития сюжета, но и сумел сделать это абсолютно естественно: перед вами прежде всего удивительная история, и литературное экспериментирование нисколько не мешает ее ходу. Одним словом, рассказ мастерский — золотой фонд современной фантастики. (Советский читатель познакомился с ним в 1967 году — «Библиотека современной фантастики», т. 10.)</p><p class="p1">А в 1966 году вышел в свет роман с тем же названием, и Даниэл Киз второй раз взошел на фантастический Олимп — снова высшая награда, теперь уже «Небьюла». Техника повествования несколько иная, читатель гораздо ближе знакомится с героем, здесь больше эмоций, больше размышлений, но это по-прежнему тонкая, невероятной силы драма, трагедия разума и одно из самых важных произведений фантастической литературы.</p><p class="p1">В 1968 году режиссер Ральф Нелсон снял по роману Даниэла Киза довольно успешный фильм «Чарли», и Клифф Робертсон, сыгравший в нем Чарли Гордона, получил «Оскара» за лучшую мужскую роль. Бродвей также не остался в стороне, хотя мюзикл «Чарли и Элджернон» (1980) долго на сцене не продержался.</p><p class="p1">Даниэл Киз родился 9 августа 1927 года в Нью-Йорке. Образование получил в Бруклинском колледже. После войны три года служил на флоте, а его карьера в фантастике началась в 1950 году, когда он стал младшим редактором в журнале «Марвел сайенс сториз». Позже Даниэл Киз сменил множество занятий, но так или иначе всегда работал с литературой. Хотя первый его фантастический рассказ «Прецедент» появился еще в 1952 году, он опубликовал совсем немного — два романа и не более десятка рассказов. Может быть, это как раз тот случай, когда автору, создавшему нечто уникальное, превзойти самого себя уже почти невозможно. Однако след в истории литературы, и фантастики в частности, Даниэл Киз оставил ярчайший — «Цветы для Элджернона», и теперь у советского читателя есть возможность познакомиться с его замечательным романом.</p><p class="p1">Переводчик романа Сергей Шаров, к сожалению, не дожил до появления этой книги. Он умер летом 1988 года в возрасте всего 35 лет. «Цветы для Элджернона» — его первая публикация, но, очевидно, не последняя: переводчиком он был, без сомнения, одаренным, эрудированным, тонко чувствующим и искренне увлеченным работой. Фантастику Сергей переводил просто из любви к этому жанру, бескорыстно, что называется, в стол — не так уж много ее до недавнего времени публиковали, — хотя, разумеется, мечтал увидеть свои переводы напечатанными, поделиться с читателем найденным чудом. И вот перед вами его работа, книга, которая едва ли оставит кого-то равнодушным, а значит, надолго останется в памяти — о чем еще может мечтать переводчик?</p><div class="cite">
<p class="text-author">Александр Корженевский</p>
</div></span>
