<span id="id16"><div class="title1">
<p class="p">Отчет № 16</p>
</div><p class="subtitle">14 июля</p><p class="p1">День для поездки в Уоррен я выбрал явно неудачный — серый и дождливый — и этим отчасти объясняется тяжелый осадок, с которым связаны воспоминания о нем. Хотя не исключено, что я просто обманываю себя, и сумеречное состояние духа объясняется тем, что я и сам могу оказаться в лечебнице. Автомобиль я одолжил у Барта. Алиса хотела поехать со мной, но она помешала бы мне. Фэй я вообще не сказал, куда направляюсь.</p><p class="p1">Полтора часа езды привели меня в фермерскую общину Уоррен, Лонг-Айленд. Найти нужное мне место не составило труда. Широко раскинувшееся серое поместье являло миру только вход в него — два бетонных столба по сторонам боковой дороги и до блеска отполированная медная табличка:</p><div class="cite">
<p class="subtitle">ГОСУДАРСТВЕННАЯ ЛЕЧЕБНИЦА</p>
<p class="subtitle"><strong>СПЕЦИАЛЬНАЯ ШКОЛА</strong></p>
<p class="subtitle"><strong>УОРРЕН</strong></p>
</div><p class="p1">Знак у дороги гласил, что скорость ограничена пятнадцатью милями в час, и в поисках административного здания я медленно повел машину мимо серых домов.</p><p class="p1">Через луг по направлению ко мне двигался трактор, на котором, кроме водителя, примостились еще двое. Я высунулся в окно и крикнул:</p><p class="p1">— Не подскажете ли, где найти мистера Уинслоу?</p><p class="p1">Водитель остановил свою машину и показал рукой:</p><p class="p1">— Главный госпиталь. Поверните налево, и он окажется справа от вас.</p><p class="p1">Я не мог не обратить внимания на прицепившегося сзади к трактору молодого человека, на чьем небритом лице блуждала тень пустой улыбки. На голове его была матросская шляпа с широкими, по-мальчишески загнутыми полями, защищавшая глаза от солнца. На мгновение я поймал его вопросительный взгляд и сразу отвел глаза. Когда трактор затарахтел дальше, я заметил в зеркале, что человек не сводит с меня любопытных глаз. Он до того был похож на Чарли, что мне стало не по себе.</p><p class="p1">Главный психолог удивил меня своей молодостью. Он оказался высоким, стройным мужчиной, и хотя лицо его выглядело усталым, в голубых глазах читались воля и решительность.</p><p class="p1">Он показал мне свои «владения» из окна собственного автомобиля — залы для развлечений, больницу, школу и двухэтажные кирпичные здания, в которых обитали пациенты и которые он называл коттеджами.</p><p class="p1">— Почему не видно забора? — спросил я.</p><p class="p1">— А его и нет. Только ворота и живая изгородь для защиты от праздношатающихся.</p><p class="p1">— Но как вы охраняете… их… Они ведь могут уйти…</p><p class="p1">Он улыбнулся и пожал плечами.</p><p class="p1">— Да, некоторые уходят, но большинство возвращаются.</p><p class="p1">— Вы разыскиваете их?</p><p class="p1">Уинслоу посмотрел на меня так, словно почувствовал, что в моих вопросах скрыто нечто большее, чем пустое любопытство.</p><p class="p1">— Нет. Если у них случаются неприятности, мы очень быстро узнаем об этом от соседей-фермеров. Или полиция привозит их обратно.</p><p class="p1">— А если нет?</p><p class="p1">— Тогда нам остается только предполагать, что они нашли некий удовлетворяющий их способ существования… Поймите меня правильно, мистер Гордон, это не тюрьма. Власти требуют, чтобы мы предпринимали все мыслимые усилия для предотвращения побегов, но мы не в состоянии постоянно держать под наблюдением четыре тысячи человек. Бегут в основном легкие пациенты, хотя их у нас становится все меньше и меньше. В последнее время наш главный контингент составляют больные с повреждениями мозга, требующие неусыпного надзора, но для остальных свобода передвижения не ограничена. Побыв на «воле» неделю-другую и поняв, что там для них нет <em>ничего</em> хорошего, беглецы возвращаются. Общество отвергает их и не затрудняется в выборе средств, чтобы дать им понять это.</p><p class="p1">Мы выбрались из машины и подошли к одному из коттеджей. Стены внутри были выложены белой плиткой, пахло хлоркой. Из холла первого этажа дверь вела в большой зал, в нем несколько десятков мальчишек сидели на расставленных вдоль стен скамейках и ждали, когда звон колокольчика позовет их к ленчу. Первым, на кого упал мой взгляд, был один из старших ребят — он сидел в углу и баюкал на коленях голову другого, лет четырнадцати. При нашем появлении все лица повернулись к нам, а самые храбрые из мальчишек подошли и уставились на меня.</p><p class="p1">— Не бойтесь, — сказал Уинслоу, заметив выражение моего лица, — они не сделают вам ничего плохого.</p><p class="p1">К нам подошла заведующая отделением — крупная, красивая женщина. Рукава ее рубашки были закатаны до локтей, а поверх накрахмаленной белой юбки был повязан фартук. На поясе позвякивала связка ключей. Когда она повернула голову, я заметил, что одна сторона ее лица покрыта багрово-красным родимым пятном. Она сказала:</p><p class="p1">— Мы никого не ждали сегодня, Рэй. Ведь обычно ты всегда приводишь посетителей по четвергам.</p><p class="p1">— Это мистер Гордон, из университета Бекмана. Ему хочется оглядеться вокруг и получить представление о нашей работе… А что касается тебя, Тельма, я же знаю, что тебе все равно, какой сегодня день, любой хорош.</p><p class="p1">— Точно! — громко и весело засмеялась Тельма. — Но по средам мы меняем матрасы, и по четвергам тут пахнет значительно лучше.</p><p class="p1">Я заметил, что пряча родимое пятно, Тельма старалась держаться слева от меня. Она показала мне спальни, прачечную, кладовую, обеденный зал — столы были уже накрыты и ждали только, когда еду доставят из центральной кухни. Разговаривая, Тельма улыбалась, и пучок волос на голове делал ее похожей на танцовщицу Лотрека. Она ни разу не посмотрела мне в глаза. Интересно, на что будет похожа жизнь, доведись Тельме надзирать за мной?</p><p class="p1">— Им хорошо у нас, — сказала она. — Но знаете… Триста ребят, по семьдесят пять в отделении, а нас, чтобы присматривать за ними, всего пятеро. Так трудно держать их в узде! Но все равно здесь куда лучше, чем в «грязных» коттеджах. Вот там люди долго не задерживаются. С младенцами как-то не обращаешь на это внимания, а вот когда дети взрослеют и все так же делают под себя…</p><p class="p1">— Мне кажется, вы очень хороший человек, — сказал я. — Ребятам повезло с вами.</p><p class="p1">Она довольно улыбнулась, глядя все так же перед собой.</p><p class="p1">— Я не лучше и не хуже остальных. Просто мне нравятся эти ребята. Конечно, работа нелегкая, но стоит подумать, как ты нужна им… — Улыбка исчезла. — Нормальные дети слишком быстро вырастают… уходят… забывают тех, кто любил их и заботился о них. Но эти… Им нужно отдавать всего себя, всю жизнь. — Она снова улыбнулась, словно устыдившись собственных слов. Тяжелая работа, но стоящая.</p><p class="p1">Внизу, где нас ждал Уинслоу, прозвенел колокольчик, и ребята потянулись в столовую. Я заметил, что парень, который держал младшего на коленях, ведет его к столу за руку.</p><p class="p1">— Интересно, — сказал я, кивнув в их сторону. Уинслоу тоже кивнул.</p><p class="p1">— Джерри, это большой, а второй — Дасти. Мы часто видим такое. Ни у кого нет для них времени, и они начинают искать доброту и любовь друг в друге…</p><p class="p1">Дальше наш путь лежал к школе, и когда мы проходили мимо одного из коттеджей, до нас донесся громкий то ли вопль, то ли стон, которому тут же ответило еще несколько голосов. Окна этого здания были забраны решетками.</p><p class="p1">Впервые за утро я заметил в поведении Уинслоу некоторую неуверенность.</p><p class="p1">Он объяснил:</p><p class="p1">— Коттедж «К» со специальными мерами безопасности. Легковозбудимые больные, при малейшей возможности причиняют увечья себе или друг другу. Они постоянно заперты.</p><p class="p1">— Буйные пациенты здесь, у вас?! Разве их место не в психиатрических больницах?</p><p class="p1">— Конечно, конечно… Но как определить границы такого состояния? Некоторые из них далеко не сразу проявляют подобные наклонности, некоторых определил сюда суд, и мы просто вынуждены были принять их. Настоящая беда в том, что нигде ни для кого нет места. Знаете, сколько народа ждет очереди к нам? Тысяча четыреста человек. В конце года мы, <em>может быть</em>, примем из них человек двадцать-тридцать.</p><p class="p1">— Где же сейчас эти тысяча четыреста?</p><p class="p1">— Дома. Или еще где-нибудь. Ждут… Наши проблемы несколько отличаются от обычной нехватки больничных коек. Больные обычно остаются здесь до конца жизни.</p><p class="p1">Мы подошли к новой школе, одноэтажному зданию из стекла и бетона, с большими светлыми окнами, и я попытался представить, каково будет ходить по его коридорам в качестве пациента, стоять в очереди в классную комнату в компании себе подобных. Может быть, я стану одним из тех, кто везет своего собрата по несчастью в инвалидной коляске, или ведет кого-то за руку, или баюкает на коленях маленького мальчика…</p><p class="p1">В столярной мастерской группа старших ребят делала сиденья для парт, и когда мы вошли, они тут же с любопытством окружили нас. Учитель отложил пилу и тоже подошел.</p><p class="p1">— Это мистер Гордон из университета Бекмана, — представил меня Уинслоу. — Хочет посмотреть наших больных. Подумывает, не купить ли ему наше заведение.</p><p class="p1">Учитель рассмеялся и махнул рукой в сторону своих учеников:</p><p class="p1">— С-с-согласны. Т-только ему п-п-придется т-т-тогда забрать и нас. А н-нам н-нужно б-будет м-много д-дерева д-д-для работы.</p><p class="p1">Он начал показывать мне мастерскую, и я заметил, какие необычно молчаливые здесь ученики. Они работали — ошкуривали скамейки, полировали их, но не разговаривали.</p><p class="p1">— Это м-мои т-тихони, — почувствовав мое недоумение, сказал учитель. — Г-г-глухо-н-немые.</p><p class="p1">— У нас их сто шесть, — добавил Уинслоу. — Их обучение финансирует федеральное правительство.</p><p class="p1">Просто удивительно! Насколько меньше дано им, чем другим людям! Умственно отсталые, глухие, немые — и с таким рвением полируют скамейки!</p><p class="p1">Один из ребят — он зажимал кусок дерева в тиски — оставил свое занятие, похлопал Уинслоу по плечу и показал рукой в угол, где на полках сохли уже законченные изделия. Он указал на подставку для лампы на второй полке, потом на себя. Это была неуклюжая подставка, неумело сделанная, кособокая, лак на ней расплылся неровными пятнами. Уинслоу и учитель с энтузиазмом стали хвалить его. Юноша гордо улыбнулся и посмотрел на меня, ожидая, что я тоже присоединюсь к хору похвал.</p><p class="p1">Я кивнул и, преувеличенно четко выговаривая слова, сказал:</p><p class="p1">— Очень хорошо… Просто прекрасно…</p><p class="p1">Я сказал это, потому что он нуждался в моих словах, но в душе моей была пустота. Юноша улыбнулся и слегка коснулся моего рукава. Так он говорил мне «До свиданья». Сердце мое сжалось, и пока мы не вышли из мастерской, мне стоило огромного труда не расплакаться от жалости к нему.</p><p class="p1">Директором школы оказалась невысокая пухлая дама, совсем не строгая на вид. Она усадила меня перед плакатом, на котором аккуратными буквами были выписаны различные типы пациентов, а также число учителей и перечень предметов, предназначенных для каждой из групп.</p><p class="p1">— Конечно, — объяснила она, — теперь у нас мало пациентов с высоким КИ. Тех, у кого он от шестидесяти до семидесяти, все чаще и чаще обучают в обычных школах, правда, в специальных классах. Общество в какой-то степени заботится о них. Большинство вполне способны жить самостоятельно в приютах, общежитиях, работать на фермах, заниматься ручным трудом на фабриках или в прачечных…</p><p class="p1">— Или в пекарнях, — подсказал я.</p><p class="p1">Директриса задумалась.</p><p class="p1">— Да, мне кажется, это не выходит за пределы их возможностей… Мы делим наших детей — независимо от возраста я всех их называю детьми — на «чистых» и «грязных». Когда в коттедже пациенты только одного типа, ими значительно легче управлять. Некоторые из «грязных» — пациенты со значительными повреждениями мозга и обречены лежать, пока жизнь их не кончится…</p><p class="p1">— Или пока наука не найдет способа помочь им.</p><p class="p1">— Боюсь, — сказала директриса, — что этим уже ничто не поможет.</p><p class="p1">— Нельзя терять надежды.</p><p class="p1">Она растерянно, но вместе с тем пристально посмотрела на меня.</p><p class="p1">— Да, да, конечно, вы правы… Надежда — это главное…</p><p class="p1">Я нарушил ее душевный покой и улыбнулся про себя, подумав, в какую категорию запишет она меня: «чистых»? Или нет?</p><p class="p1">Мы вернулись в кабинет Уинслоу. Он заварил кофе и повел речь о своей работе.</p><p class="p1">— Это неплохое место. У нас нет штатного психиатра, только консультант, он появляется раз в две недели. В общем, это не имеет значения. Все наши психологи работают, не щадя себя. Можно было бы нанять и психиатра, но на те же деньги я держу двух психологов — людей, которые не боятся отдать нашим пациентам частицу самого себя.</p><p class="p1">— Что вы имеет в виду под «частицей самого себя»?</p><p class="p1">Сквозь усталость Уинслоу мелькнуло раздражение и в голосе появились недовольные нотки.</p><p class="p1">— Масса людей дает нам деньги или оборудование, но мало кто способен отдать время и чувства. Вот что я имею в виду!</p><p class="p1">Он показал на пустую детскую бутылочку, стоящую на книжной полке. Я сказал, что уже обратил на нее внимание.</p><p class="p1">— Так вот, многие ли из ваших знакомых готовы взять на руки взрослого мужчину и кормить его из этой самой бутылочки, рискуя оказаться при этом обделанными с ног до головы? Вы удивлены! Вы не можете понять этого, сидя в своей научно-исследовательской башне из слоновой кости. Откуда вам знать, <em>что</em> значит быть отрезанным от человечества?</p><p class="p1">Тут уж я не мог сдержать улыбки.</p><p class="p1">Уинслоу сразу же встал и ледяным тоном попрощался со мной. Если я в конце концов попаду сюда и он узнает мою историю, он поймет. Такой человек способен понять.</p><p class="p1">Я вел машину в Нью-Йорк, и ощущение холодной серости вокруг меня дополнилось внутренней отрешенностью от всего. Никто из тех, с кем я говорил, ни словом не упомянул об излечении своих больных, о возможности того, что когда-нибудь их можно будет вернуть обществу… и самим себе. Ни единого слова надежды. Пациенты были для них живыми мертвецами — нет, хуже, никогда не жившими людьми, обреченными бездумно воспринимать пространство и время в бесконечном чередовании дня и ночи.</p><p class="p1">Я вспомнил хозяйку дома — женщину с багрово-красной родинкой в пол-лица, заику-учителя, добрую директрису, молодого психолога с усталым лицом. Как <em>они</em> нашли дорогу сюда, чтобы посвятить себя служению этим молчаливым умам? Подобно парню, державшему на руках младшего собрата, каждый из них нашел смысл жизни в том, чтобы отдать часть ее обделенным жизнью.</p><p class="p1">…А коттеджи, которые мне не показали?</p><p class="p1">Может быть, и я вернусь сюда и проведу в Уоррене остаток жизни. В ожидании…</p><p class="subtitle">15 июля</p><p class="p1">Раз за разом откладываю встречу с матерью. Мне ужасно хочется повидать ее, но я понимаю, что пока не разберусь, что же собственно ждет меня, проку от этой встречи будет мало.</p><p class="p1">Элджернон отказывается бегать по лабиринту, никакая награда на него не действует. Сегодня я зашел посмотреть на него и столкнулся с Немуром и Штраусом, они с обеспокоенным видом наблюдали, как Барт насильно кормит его. Странно видеть этот белый пушистый комочек привязанным к лабораторному столу и Барта, склонившегося над ним с пипеткой в руке.</p><p class="p1">Если и дальше будет так, придется поддерживать в нем жизнь инъекциями. Не сводя глаз с извивающегося под ремешками Элджернона, я представил, как они охватывают мои собственные руки… ноги… Я начал задыхаться и в поисках свежего воздуха выскочил из лаборатории. Пора бы перестать отождествлять себя с ним.</p><p class="p1">Я зашел в бар Мюррея и выпил, потом позвонил Фэй, и мы совершили обычный обход злачных мест. Фэй раздражена тем, что я перестал выводить ее на танцы. Вчера вечером она разозлилась и ушла, не попрощавшись. Она не имеет ни малейшего представления о моей работе. Ей просто наплевать на нее, но мне трудно винить в этом Фэй. <em>Ее</em> интересуют только три вещи — танцы, живопись и секс. Единственное, что способен разделить с ней я, — это секс. Глупо даже пытаться заинтересовать ее своей работой. Так что она ходит танцевать без меня. Позавчера она рассказала, что ей приснилось, будто она подожгла все мои книги и записи и как мы потом весело плясали вокруг костра. Нужно быть с ней поосторожнее — она начинает предъявлять требования. Я только что осознал, что моя квартира стала походить на квартиру Фэй, постепенно превращаясь в грязную свалку. И я слишком пью.</p><p class="subtitle">16 июля</p><p class="p1">Вчера вечером Алиса и Фэй наконец-то встретились. Алиса пришла, узнав от Барта, что произошло с Элджерноном. Она догадывается, что это может означать, а кроме того, чувствует себя виноватой в том, что втравила меня в это дело.</p><p class="p1">Мы долго пили кофе и разговаривали. Я знал, что Фэй умчалась в «Звездную пыль» и не ждал ее так рано. Однако примерно без четверти два мы были сражены внезапным появлением моей соседки на пожарной лестнице. Она постучала в окно, открыла его, влезла и, вальсируя, прошлась по комнате с бутылкой в руке.</p><p class="p1">— Устроим вечеринку. Я принесла свою долю.</p><p class="p1">Я уже рассказывал ей, что Алиса тоже работает в университете, и упоминал Алисе о существовании Фэй — так что встреча не оказалась для них неожиданной. Бросив друг на друга несколько оценивающих взглядов, они заговорили об искусстве, обо мне и, казалось, забыли о моем присутствии. Да, они понравились друг другу.</p><p class="p1">— Надо еще кофе сварить, — пробормотал я и поплелся на кухню, оставив женщин наедине.</p><p class="p1">Когда я вернулся, Фэй уже сняла туфли и сидела на полу, отхлебывая джин из бутылки. При этом она объясняла Алисе, что, по ее глубокому убеждению, для человеческого тела нет ничего лучше солнечного загара и что колонии нудистов — готовое решение моральных проблем человечества.</p><p class="p1">Алиса несколько нервно посмеялась над предложением присоединиться к упомянутой колонии и приняла от Фэй стаканчик с выпивкой.</p><p class="p1">Мы просидели почти до утра, и мне захотелось проводить Алису домой. Она попыталась сказать, что в этом нет надобности, но Фэй тут же заявила, что только совершенная дура может выйти в такой час одна на улицу. Я вышел из дома и поймал такси.</p><p class="p1">По дороге Алиса сказала:</p><p class="p1">— Что-то в ней есть. Не знаю, что именно… Открытость, откровенность, полное отсутствие эгоизма…</p><p class="p1">С этим я не мог не согласиться.</p><p class="p1">— И она любит тебя.</p><p class="p1">— Нет. Она любит всех, а я — всего лишь сосед по лестничной клетке.</p><p class="p1">— А ты любишь ее?</p><p class="p1">— Единственная женщина, кого я любил и люблю, — это ты.</p><p class="p1">— Давай не будем говорить об этом.</p><p class="p1">— Ты лишаешь меня интереснейшей темы для разговора.</p><p class="p1">— Чарли, меня очень беспокоит твое пьянство. Я знаю кое-что об этих похмельях…</p><p class="p1">— Передай Барту, чтобы он хранил свои наблюдения и выводы в соответствующих рабочих журналах. Я не позволю ему настраивать нас друг против друга! Я сам знаю, сколько мне можно пить!</p><p class="p1">— Мне уже приходилось слышать такое.</p><p class="p1">— Но не от меня.</p><p class="p1">— Это — единственное, что мне не нравится в Фэй. Она заставляет тебя пить и мешает работать!</p><p class="p1">— С этим я тоже справлюсь.</p><p class="p1">— Чарли, твоя работа важна не только для человечества вообще, но и для тебя самого! Не позволяй связывать себе руки!</p><p class="p1">— Вот когда правда выходит наружу, — поддразнил ее я. — Просто тебе хочется, чтобы я пореже с ней виделся.</p><p class="p1">— Я этого не говорила!</p><p class="p1">— Подразумевала. Если Фэй и в самом деле помеха, я вычеркну ее из жизни.</p><p class="p1">— Ну, зачем же так сразу… Она — то, что тебе нужно. Женщина, много повидавшая в жизни.</p><p class="p1">— Мне нужна ты!</p><p class="p1">Алиса отвернулась.</p><p class="p1">— Но не так, как она.</p><p class="p1">Она снова посмотрела на меня.</p><p class="p1">— Сегодня я пришла к тебе, готовая возненавидеть ее. Мне хотелось увидеть ее злобной, глупой шлюхой, и у меня были грандиозные планы насчет того, как я встану между вами и вырву тебя из ее когтей. Но, поговорив с ней, я поняла, что не имею права судить. Я лишилась уверенности в себе. Она нравится мне… хотя ее поведение… Все равно, если тебе приходится пить с ней и проводить время в кабаках, — она стоит на твоем пути! Эта проблема мне не по зубам, ее можешь решить только ты сам.</p><p class="p1">— Опять? — рассмеялся я.</p><p class="p1">— Не отрицай, что ты глубоко увлечен ею!</p><p class="p1">— Не так уж глубоко.</p><p class="p1">— Ты рассказывал ей о себе?</p><p class="p1">— Нет, — ответил я и сразу увидел, что Алиса успокоилась. То, что я не выдал Фэй своего секрета, означало, что я не посвятил себя ей полностью. Мы оба знали — какой бы расчудесной ни была Фэй, она не поняла бы ничего.</p><p class="p1">— Я нуждался в ней, и не знаю почему она тоже нуждалась во мне. Мы оказались соседями — что ж, это было удобно. Вот и все. Разве это любовь? Это совсем не то, что существует между нами.</p><p class="p1">Алиса внимательно рассматривала свои ногти.</p><p class="p1">— И что же существует между нами?</p><p class="p1">— Нечто настолько глубокое и важное, что Чарли внутри меня приходит в ужас при мысли о том, что мы можем провести ночь вместе.</p><p class="p1">— Но не с ней?</p><p class="p1">— Именно поэтому я и знаю, что это не любовь — Фэй ровным счетом ничего не значит для Чарли.</p><p class="p1">Алиса рассмеялась:</p><p class="p1">— Прекрасно! И сколько иронии! Когда ты так говоришь, я ненавижу его. Как тебе кажется, разрешит он нам…</p><p class="p1">— Не знаю. Надеюсь.</p><p class="p1">Прощаясь, мы пожали друг другу руки и, странно, жест этот оказался куда более нежным и интимным, чем возможные объятия.</p><p class="subtitle">27 июля</p><p class="p1">Работаю круглые сутки. Не взирая на протесты Фэй, в лаборатории поставили для меня диван. Она стала слишком властной и обидчивой. Мне кажется, она стерпела бы присутствие другой женщины, но полная самоотдача в работе выше ее понимания. Я, хоть и был готов к этому, начинаю терять терпение. Каждая минута, отданная работе, бесценна, нельзя красть мое время.</p><p class="p1">Расчет уровня умственного развития — восхитительное занятие. С этой проблемой я так или иначе сталкиваюсь всю жизнь. Именно она — точка приложения всех моих знаний.</p><p class="p1">Время приобретает иное значение. Мир вокруг и прошлое кажутся далекими и искаженными, словно время и пространство растянуты, перепутаны, искривлены до неузнаваемости. Реальны только клетки, мыши и приборы в лаборатории на четвертом этаже главного корпуса.</p><p class="p1">Нет ни дня, ни ночи. Как впихнуть в несколько недель всю жизнь ученого? Я понимаю, что надо иногда отдохнуть, расслабиться, но не могу позволить себе этого до тех пор, пока не узнаю, что же происходит со мной.</p><p class="p1">Алиса — вот кто настоящий помощник. Она носит мне кофе с бутербродами и ничего не требует.</p><p class="p1">О моем восприятии: все ясно и четко, каждое ощущение поднято на небывалую высоту и высвечено так, что красные, желтые и голубые цвета буквально полыхают. То, что я сплю здесь, производит странный эффект: запахи лабораторных животных — собак, обезьян, мышей — возвращают меня в прошлое, и трудно понять, испытываю я новые впечатления или вспоминаю старые… Невозможно определить их соотношение, и я оказываюсь в странной мешанине прошлого и настоящего, ответных реакций, хранящихся в памяти, и ответных реакций на происходящее в комнате. Словно все, что я знаю, сплавилось в некую кристаллическую вселенную, она вращается передо мной, и на ее гранях вспыхивают изумительные по красоте сполохи света…</p><p class="p1">…В середине клетки сидит обезьяна и смотрит на меня сонными глазами, подпирая щеки маленькими, по-стариковски сморщенными кулачками… Чини… чини… чини… Вдруг она взлетает по прутьям клетки вверх, к качелям, где, тупо уставившись в пространство, сидит другая обезьяна.</p><p class="p1">Она мечется по клетке, раскачивается и хочет схватить другую обезьяну за хвост, но та все время убирает его, без суеты, спокойно. Чудесная обезьяна… Красивая обезьяна… с огромными глазами и длинным хвостом. Можно мне дать ей орех? Нет, вон тот раскричится. Там написано, что нельзя кормить животных. Это шимпанзе. Можно погладить его? Нет. Я хочу погладить ши-па-зе. Ну, хватит, пойдем посмотрим слона.</p><p class="p1">Толпы ярких солнечных людей одеты в весну.</p><p class="p1">Элджернон неподвижно лежит в куче нечистот, и запах становится невыносимым.</p><p class="p1">Что же будет со мной?</p><p class="subtitle">28 июля</p><p class="p1">Фэй завела себе нового приятеля. Вчера вечером я зашел домой, чтобы побыть с ней. Заглянул в свою квартиру, взял бутылку и вылез на пожарную лестницу. К счастью, прежде чем влезть к Фэй, я заглянул в окно. Они развлекались на кушетке. Странно, но меня это не только не трогает, я испытываю прямо-таки облегчение.</p><p class="p1">Я вернулся в лабораторию, к Элджернону. Бывают моменты, когда он выходит из летаргии, а иногда даже бегает по лабиринту, но если заходит при этом в тупик, реакцию его можно описать только как безудержную злобу. Когда я вошел, он был оживлен и узнал меня. Ему хотелось работать, я пересадил его из клетки в лабиринт, и он быстро побежал по коридорам. Дважды он проделал это успешно, но на третий раз запутался на перекрестке, замешкался и повернул не в ту сторону. Я знал, чем это кончится, мне захотелось протянуть руку и забрать его оттуда прежде, чем он запутается окончательно, но я сдержался.</p><p class="p1">Вот Элджернон обнаружил, что двигается по незнакомой тропинке, остановился. Действия его стали хаотичными: старт, пауза, поворот назад, еще поворот, снова вперед… и так до тех пор, пока он не оказался в тупике и легкий электрический удар не оповестил его об ошибке. Он забегал кругами, издавая похожий на скрип граммофонной иглы писк, потом начал бросаться на стену лабиринта, снова и снова, подпрыгивая вверх, падая и снова прыгая. Дважды ему удавалось зацепиться коготками за проволочную сетку, прикрывавшую лабиринт сверху, и оба раза он, громко вереща, срывался. Наконец он прекратил тщетные попытки и свернулся в маленький, тугой комочек.</p><p class="p1">Я поднял его, но он не сделал ни малейшей попытки развернуться, оставаясь в состоянии, похожем на ктатоноческий ступор. Я положил его обратно в клетку и наблюдал за ним, пока он не пришел в себя и не начал двигаться нормально.</p><p class="p1">Непонятно, что представляет собой подобная регрессия — особый случай? Изолированная реакция? Или в самой процедуре изначально заложен принцип, обрекающий нас на неудачу?</p><p class="p1">Если мне удастся понять закономерность, добавить хоть одну запятую к тому, что уже известно об умственной отсталости и возможности излечения таких, как я, я буду удовлетворен. Что бы ни случилось со мной, я проживу тысячу нормальных жизней лишь тем, что смогу дать другим, еще не родившимся.</p><p class="p1">Этого хватит.</p><p class="subtitle">31 июля</p><p class="p1">Я на самом верху и сознаю это. Всем вокруг кажется, что я убиваю себя работой, но они не понимают, что сейчас я живу на самой вершине ясности и красоты, о существовании которой и не подозревал. Все мои составляющие настроены на работу. Днем я впитываю, а вечерами — в моменты, прежде чем провалиться в сон, — идеи фейерверком взрываются в голове. Нет в мире большего наслаждения.</p><p class="p1">Невозможно поверить, что произойдет нечто такое, что истощит эту кипящую энергию, рвение, наполняющее все мои дела. Словно все знания, приобретенные мной в последние месяцы, соединились и вознесли меня на вершину света и понимания. Это истина, любовь и красота, сплавленные воедино. Это наслаждение. Как смогу я отказаться от всего этого? Жизнь и работа — лучше этого человек не может иметь <em>ничего</em>. Ответы уже внутри меня, и скоро, очень скоро они ворвутся и в мой мозг. Если бы только мне удалось решить одну крохотную проблему! Я молюсь, чтобы ее решение оказалось именно тем, чего мне не хватает. Но чем бы оно ни оказалось, я постараюсь быть благодарным за него.</p><p class="p1">Оказывается, новый приятель Фэй работает учителем танцев в «Звездной пыли». У меня не осталось времени для нее, а она ни в чем передо мной не виновата.</p><p class="subtitle">11 августа</p><p class="p1">Последние два дня — тупик. Ничего. Где-то я свернул не туда. Я получаю уйму ответов на разнообразнейшие вопросы, кроме самого главного — каким образом регрессия Элджернона связана с основными теоретическими предпосылками эксперимента.</p><p class="p1">К счастью, мне достаточно известно о работе мозга, чтобы мучиться впустую. Я не поддамся панике и не сдамся (или что еще хуже — не начну искать ответы там, где их нет). Я перестану думать о проблеме и дам ей созреть. Возможности сознательного уровня исчерпаны, так что пусть поработает таинственное подсознание. Удивительно, как все мои силы концентрируются на одной-единственной задаче. Но если я поддамся этому чувству и начну отдавать все силы ей одной, это ничему не поможет. Интересно, сколько загадок остались нерешенными только из-за того, что ученые или слишком мало знали, или слишком верили в себя и возможности управления процессом созидания?</p><p class="p1">Я решил ненадолго оторваться от работы и сходить на коктейль, который миссис Немур устраивала в честь двух членов совета директоров фонда Уэлберга, чьи голоса имели решающее значение при распределении дотаций.</p><p class="p1">Я пригласил Фэй, но она сказала, что у нее свидание и вообще она лучше пойдет потанцует.</p><p class="p1">Вечер я начал с благим намерением быть приятным собеседником и завести новых друзей. В последнее время у меня возникает много трудностей в общении с людьми. Не знаю, кто больше виноват в этом, но любой разговор, затеянный мной, иссякает уже через две минуты. Почему? Неужели меня боятся?</p><p class="p1">Я взял бокал и отправился в путешествие по огромной гостиной. Несколько маленьких компаний оживленно что-то обсуждали. Присоединиться к такой группе для меня — дело совершенно невозможное. В конце концов миссис Немур загнала меня в угол и представила Хайраму Харви, одному из директоров. Миссис Немур — привлекательная женщина: сорок или чуть больше, светлые волосы, много косметики и длинные ярко-красные ногти. Уцепившись за локоть Харви, она осведомилась у меня:</p><p class="p1">— Как продвигается работа?</p><p class="p1">— Хорошо, благодарю вас. Как раз сейчас я бьюсь над довольно трудной задачей.</p><p class="p1">Она улыбнулась и закурила.</p><p class="p1">— Все очень благодарны вам за помощь. Правда, мне представляется, что вы охотнее занялись бы какой-нибудь собственной темой. По-моему, куда интереснее создавать что-то свое, чем заканчивать работу, начатую другими.</p><p class="p1">Надо отдать ей должное, она ни на секунду не давала Харви забыть, что именно ее муж должен получать кредиты. Я не мог удержаться от искушения ответить в том же стиле.</p><p class="p1">— Никто не в состоянии предложить нечто <em>совершенно</em> новое, миссис Немур. Каждый исследователь начинает работу на развалинах идей предшественников. Значение имеет только конечный вклад в сумму знаний.</p><p class="p1">— Конечно, конечно, — она говорила, скорее, со своим пожилым гостем. — Жаль, что мистера Гордона не было с нами с самого начала. О… — она рассмеялась, — простите, я совсем забыла, вряд ли вы были тогда в состоянии заниматься психологическими исследованиями.</p><p class="p1">Харви тоже улыбнулся, и я решил промолчать. Нельзя, чтобы последнее слово осталось за мной. Это будет действительно плохо.</p><p class="p1">Я заметил Штрауса и Барта. Они беседовала с Джорджем Рейнором — вторым человеком в фонде Уэлберга. Штраус говорил:</p><p class="p1">— Мистер Рейнор, основная трудность в таких исследованиях — получить деньги и не оказаться связанным по рукам и ногам требованием практических результатов. Когда кредиты выдаются под строго определенные цели, мы практически не в состоянии работать.</p><p class="p1">Рейнор покачал головой и помахал огромной сигарой.</p><p class="p1">— Наоборот, проблема как раз в том, чтобы убедить совет директоров в чисто практической ценности работы!</p><p class="p1">Пришла очередь Немура покачать головой.</p><p class="p1">— Я хочу сказать, что иногда можно и нужно давать деньги и на фундаментальные исследования. Никому не под силу сказать заранее, будет ли какая-нибудь работа иметь практическое значение, ведь довольно часто результаты получаются отрицательными. А вот для ученого, идущего по нашим стопам, такой результат равносилен положительному. По крайней мере он будет знать, чего ему не надо делать.</p><p class="p1">Я подошел к ним поближе и заметил жену Рейнора — ослепительно красивую брюнетку лет тридцати. Она пристально смотрела на меня, нет, скорее, на мою макушку, словно ожидая, что там вот-вот что-нибудь вырастет. Я в свою очередь уставился на нее. Она покраснела, повернулась к Штраусу и спросила:</p><p class="p1">— Что вы можете сказать о своей теперешней работе? Будет ли ваша методика применяться для лечения других слабоумных?</p><p class="p1">Штраус пожал плечами и кивком указал на меня.</p><p class="p1">— Пока об этом еще рано говорить. Ваш муж помог Чарли подключиться к нашей работе, и многое зависит от того, что у него получится.</p><p class="p1">— Конечно, — вставил Рейнор, — важность <em>чистых</em> исследований в вашей области неоспорима. Но подумайте только, как поднимется мнение о нас, если удастся разработать метод, позволяющий получать устойчивые результаты вне стен лаборатории, если мы сможем показать миру, что наши деньги помогли получить вполне ощутимые результаты!</p><p class="p1">Я открыл было рот, но Штраус, почувствовав, <em>что</em> я собираюсь сказать, сделал шаг вперед и положил руку мне на плечо.</p><p class="p1">— Мы все чувствуем, что работа, которую ведет Чарли, имеет огромное значение. Его задача — установить истину, какой бы она ни оказалась. А отношения с публикой и просвещение общества мы с удовольствием предоставим вам.</p><p class="p1">Он улыбнулся Рейнорам и потащил меня прочь от них.</p><p class="p1">— Я не собирался говорить ничего подобного, — сказал я.</p><p class="p1">— Естественно, — прошептал он, не выпуская моего локтя. — По блеску в твоих глазах я догадался, тебе неймется порубить их на мелкие части. Разве я мог допустить это?</p><p class="p1">— Наверно, нет, — согласился я, беря с подноса новый бокал мартини.</p><p class="p1">— Тебе нельзя пить так много.</p><p class="p1">— Знаю… но мне хочется расслабиться, и, кажется, я выбрал для этого не совсем подходящее место.</p><p class="p1">— Успокойся, — сказал Штраус, — и постарайся ни с кем не поругаться. Эти люди отнюдь не идиоты. Они знают, какие ты питаешь к ним чувства, но даже если они не нужны <em>тебе</em>, то мы без них — ничто!</p><p class="p1">Я отсалютовал Штраусу бокалом.</p><p class="p1">— Попробую, но не подпускай ко мне миссис Рейнор. Если она еще раз вильнет передо мной задницей, я дам ей пинка.</p><p class="p1">— Ш-ш-ш! — прошипел Штраус. — Она услышит.</p><p class="p1">— Ш-ш-ш, — эхом отозвался я. — Прости. Пойду посижу в уголке и не буду путаться под ногами.</p><p class="p1">На меня словно упала пелена, но сквозь нее я замечал, что люди смотрят в мою сторону. Кажется, я разговаривал сам с собой, но слишком громко. Не, помню, что я бормотал. Немного погодя у меня появилось чувство, что гости уходят слишком рано, но я не обращал на это внимания, пока не подошел Немур и не встал прямо передо мной.</p><p class="p1">— Какого черта! Как ты мог позволить себе такое!? Никогда в жизни не слышал столько грубостей за один вечер!</p><p class="p1">Штраус попробовал остановить его, но было уже поздно. Брызгая слюной, Немур крикнул:</p><p class="p1">— В тебе нет ни капли благодарности! Ты не понимаешь, что происходит вокруг! Ты в неоплатном долгу перед этими людьми! Ты должен им куда больше, чем можешь себе представить!</p><p class="p1">— С каких это пор от морской свинки требуют благодарности? Я послужил вашим целям, а теперь пытаюсь разобраться в ошибках, которые вы понаделали… Каким это образом я оказался в должниках?</p><p class="p1">Штраус снова попробовал вклиниться в разговор. Но Немур оборвал его на полуслове:</p><p class="p1">— Минуточку! Мне хочется услышать все до конца! Пусть наконец выскажется!</p><p class="p1">— Он слишком много выпил, — сказала его жена.</p><p class="p1">— Не так уж и много, — фыркнул Немур. — Он выражается как нельзя более ясно. Он вконец запутал, если уже не уничтожил, всю нашу работу. Мне хочется услышать оправдания из его собственных уст!</p><p class="p1">— Оставим это, — сказал я. — Вряд ли вам захочется узнать правду.</p><p class="p1">— Ошибаешься, Чарли! Захочется! По крайней мере твою версию правды. Я хочу узнать, благодарен ли ты за те способности, что проснулись в тебе, за знания, которые ты приобрел, за жизненный опыт, наконец! Или тебе кажется, что раньше ты жил лучше?</p><p class="p1">— В некотором смысле, да, лучше!</p><p class="p1">Это поразило его.</p><p class="p1">— Я многое узнал за последние месяцы, и не только о Чарли Гордоне, но и о мире вообще. И что же? Я обнаружил, что никому нет дела до Чарли Гордона, будь он кретин или гений. Так в чем разница?</p><p class="p1">Немур рассмеялся.</p><p class="p1">— Тебе просто жалко себя! А чего ты ждал? Целью эксперимента было поднять твой разум, а не сделать тебя знаменитостью. Мы не могли контролировать развитие твоей личности, и ты из приятного, хотя и несколько отсталого молодого человека превратился в высокомерного, эгоистичного, антисоциального сукиного сына.</p><p class="p1">— Дорогой профессор, вам был нужен кто-то, кого можно было бы превратить в гения, но продолжать держать в клетке и выставлять на обозрение, только когда приходит время снимать очередной урожай лаврового листа… Загвоздка как раз в том, что я <em>стал</em> личностью!</p><p class="p1">Видно было, что Немур разрывается между двумя желаниями: кончить ссору или все-таки попробовать разбить меня.</p><p class="p1">— Ты несправедлив, как обычно. Мы всегда обращались с тобой хорошо и делали все возможное…</p><p class="p1">— Все, кроме одного — вы не относились ко мне, как к разумному существу. Вы не устаете похваляться, что до операции я был ничем, и я знаю, почему! Потому что если я был пустым местом, то, значит, вы создали меня, а это делает вас моим хозяином и повелителем! Вы обижаетесь, что я не благодарю вас двадцать четыре раза в сутки… Хотите верьте, хотите нет, но я благодарен вам. Однако запомните, что бы вы для меня ни сделали, это не дает вам права обращаться со мной, как с подопытным животным! Я — человек, и Чарли тоже был человеком еще до того, как пришел в вашу лабораторию. Вы шокированы? Да-да, вдруг оказывается, что я был личностью всегда, а это противоречит вашему убеждению, что если у человека КИ меньше ста, он не заслуживает рассмотрения. Профессор Немур, мне кажется, что при взгляде на меня вас начинает мучить совесть!</p><p class="p1">— Достаточно! Ты просто пьян!</p><p class="p1">— О нет, — уверил я его. — Вот если я действительно напьюсь, вы увидите перед собой совсем другого Чарли Гордона. Да, другого Чарли… Он бродит в темноте, но он с нами! Внутри меня.</p><p class="p1">— Он сошел с ума, — сказала миссис Немур, — и уверен, что существуют два Чарли Гордона. Доктор, советую получше присматривать за ним.</p><p class="p1">Штраус покачал головой.</p><p class="p1">— Нет. Я догадываюсь, что он хочет сказать, мы говорили об этом на сеансах терапии. Вот уже примерно месяц Чарли временами испытывает странное расщепление личности… Как будто в его сознании живут два самостоятельных индивидуума, и прежний Чарли, дооперационный, борется за контроль над телом…</p><p class="p1">— Нет! Я никогда не говорил этого! Чарли существует, но он не борется со мной за контроль над телом… Он просто ждет и никогда не вмешивается в мои действия. — Вспомнив Алису, я добавил: — Почти никогда… Скромный, смиренный Чарли, о котором вы только что вспоминали с такой ностальгией, терпеливо ждет. Не скрою, мне многое нравится в нем, но только не скромность. Скромнику нечего делать в этом мире.</p><p class="p1">— Ты стал циником, — сказал Немур. — Гениальность убила в тебе веру в человечество.</p><p class="p1">— Это не совсем так, — тихо ответил я. — До меня дошло, что чистый разум сам по себе ни черта не значит. В вашем университете разум, образование, знания — все обожествляется. Но я знаю то, чего вы все не заметили: голые знания, не пронизанные человеческими чувствами, не стоят и ломаного гроша.</p><p class="p1">Я взял еще один бокал мартини и продолжил проповедь:</p><p class="p1">— Поймите меня правильно: разум — величайшее приобретение человечества! И все же слишком часто погоня за знаниями подменяет поиски любви. Я дошел до этого совсем недавно. Предлагаю рабочую гипотезу: человек, обладающий разумом, но лишенный способности любить и быть любимым, обречен на интеллектуальную и моральную катастрофу, а может быть, и на тяжелое психическое заболевание. Кроме того, я утверждаю, что замкнутый на себе мозг не способен дать окружающим ничего, только боль и насилие. В бытность слабоумным я имел много друзей. Теперь их у меня нет. О, я знаю множество народу, но это просто знакомые, и среди них нет почти ни одного человека, который что-нибудь значил бы для меня или кому интересен я.</p><p class="p1">Я почувствовал, что речь моя становится неразборчивой, а голова подозрительно легкой.</p><p class="p1">— Но ведь это поправимо… Так не должно быть… Ва… вы согласны со мной?</p><p class="p1">Штраус подошел и взял меня за руку.</p><p class="p1">— Чарли, тебе нужно отдохнуть. Ты слишком много выпил.</p><p class="p1">— Чего это вы так смотрите на меня? Что такого я сказал? Что такого я сделал? Я правильно говорил?</p><p class="p1">Я сознавал, как слова тяжело ворочаются у меня во рту, словно в каждую щеку сделали по уколу новокаина. Я был пьян и почти не владел собой. В этот момент щелкнул какой-то переключатель, и я увидел всю сцену из дверного проема, и себя в том числе — рядом с уставленными бокалами подносом, широко раскрывшего испуганные глаза.</p><p class="p1">— Я хочу все делать правильно! Мама всегда говорила, чтобы я любил людей, потому что так я никогда не попаду в беду и у меня всегда будет много друзей…</p><p class="p1">Он дергался и извивался, и я понял, что ему срочно нужно в ванную. Боже, только не здесь, не перед ними!</p><p class="p1">— Прошу прощения, — пробормотал он, — мне надо выйти…</p><p class="p1">Даже в таком пьяном отупении мне удалось довести его до ванной.</p><p class="p1">Он успел, и через несколько секунд я вновь стал хозяином положения: отдохнул, прижавшись щекой к холодной кафельной стене, умылся. В голове еще шумело, но теперь я знал, что все будет в порядке.</p><p class="p1">Тут я заметил, что из зеркала над раковиной на меня смотрит Чарли. Не понимаю, как я догадался, что это он, а не я. Тупо просящее выражение его лица… и такое чувство, что при первом же моем слове он исчезнет в призрачном зеркальном мире. Но он не убежал. Он просто смотрел на меня — рот открыт, челюсть безвольно отвисла.</p><p class="p1">— Привет, — сказал я. — Вот наконец мы и встретились.</p><p class="p1">Он нахмурился чуть-чуть, словно ему требовалось объяснение, но он не знал, о чем спросить меня. Потом он сдался и криво улыбнулся уголком рта.</p><p class="p1">— Останься! Не уходи! — крикнул я. — Мне надоело смотреть, как ты шпионишь за мной из-за углов!</p><p class="p1">Он смотрел.</p><p class="p1">— Кто ты, Чарли?</p><p class="p1">Улыбка.</p><p class="p1">Я кивнул, и он кивнул мне в ответ.</p><p class="p1">— Так чего же ты хочешь? — спросил я.</p><p class="p1">Он пожал плечами.</p><p class="p1">— Ну, давай, говори. Наверняка тебе что-нибудь нужно. Ты прибежал сюда…</p><p class="p1">Он глянул вниз, и я тоже, чтобы узнать, на что это он там смотрит.</p><p class="p1">— Ты хочешь обратно? Ты хочешь, чтобы я ушел, а ты вернулся в мое тело и начал жизнь сначала? Вполне законное желание… Это твое место, твой мозг… И твоя жизнь тоже, хотя ты немногое ухитрился взять от нее. Я не вправе отнимать у тебя жизнь. Кто сказал, что мой свет лучше твоей тьмы?</p><p class="p1">— Я скажу тебе еще кое-что, Чарли. — Я выпрямился и отошел от зеркала. — Не считай меня своим другом. Я не отдам тебе разум без борьбы, мне трудно заставить себя вернуться в пещеру. <em>Мне</em> некуда податься, Чарли, так что отойди в сторонку. Оставайся в моем подсознании, и не преследуй меня. Я не сдамся, что бы они ни думали! Да, я одинок, но это не имеет значения… Я сохраню данное мне и много сделаю для мира и для таких, как ты.</p><p class="p1">Я повернулся к двери, и мне показалось, будто Чарли протянул мне руку. Ерунда. Просто я пьян и разговариваю со своим отражением в зеркале.</p><p class="p1">Когда я вернулся в комнату, Штраусу непременно захотелось вызвать для меня такси, и пришлось доказывать ему, что я прекрасно доберусь до дома сам. Все, что мне нужно, — глоток свежего воздуха. Мне хотелось побыть одному.</p><p class="p1">Я почувствовал себя именно тем, кем назвал меня Немур, — высокомерной, эгоцентричной сволочью. В отличие от Чарли, я не способен думать о людях и их проблемах. Мне интересен лишь я и только я. Я увидел себя глазами Чарли, и мне стало стыдно.</p><p class="p1">Через несколько часов я обнаружил, что стою перед своим подъездом, и побрел вверх по лестнице. Из-под двери Фэй пробивался свет, но как только я собрался постучать, из квартиры донеслось ее хихиканье и ответный мужской смех.</p><p class="p1">Опоздал.</p><p class="p1">Я осторожно вошел в квартиру и остановился, не осмеливаясь включить свет. Я просто стоял, наблюдая за кружащимся перед глазами водоворотом.</p><p class="p1">Что случилось со мной? Почему я так одинок?</p><p class="subtitle">4.30 утра</p><p class="p1">Решение пришло ко мне во сне. Озарение! Разрозненные кусочки сложились в единое целое, и я понял то, что должен был понять с самого начала. Хватит спать. Нужно вернуться в лабораторию и просчитать результаты на компьютере. В эксперименте была ошибка, и я нашел ее.</p><p class="p1">Так что же будет со мной?</p><p class="subtitle">26 августа</p><p class="p1">Письмо профессору Немуру (копия).</p><div class="cite">
<p class="p1">Дорогой профессор!</p>
<p class="p1">Посылаю Вам в отдельном конверте копию своей статьи «Эффект Элджернона — Гордона: структура и функционирование мозга при повышенном уровне развития». Можете опубликовать ее, если сочтете необходимым.</p>
<p class="p1">Вам известно, что я уже закончил свои опыты. В статье приведены формулы и представлен математический анализ полученных результатов. Естественно, данные подлежат тщательной проверке.</p>
<p class="p1">Результат ясен. Сенсационные аспекты моего восхождения по интеллектуальной лестнице не должны затмевать фактов. Хирургическо-терапевтическая методика, разработанная Вами совместно с доктором Штраусом, не имеет в настоящее время никакого практического значения.</p>
<p class="p1">Элджернон: хотя физически он молод, его умственная регрессия очевидна. Нарушена моторная активность. Произошло общее понижение деятельности желез внутренней секреции. Прогрессирующая потеря координации. Прогрессирующая амнезия.</p>
<p class="p1">В статье указано, что эти и другие показатели умственной и физической деградации могут быть статистически предсказаны с использованием выведенной мною формулы. Несмотря на то, что результатом хирургического стимулирования, которому мы оба подверглись, явилась интенсификация и ускорение процессов мышления, изъян, который я взял на себя смелость назвать эффектом Элджернона — Гордона, суть логическое следствие всего процесса повышения уровня умственного развития. Эта гипотеза может быть кратко сформулирована следующим образом.</p>
<p class="p1">При искусственном повышении уровня умственного развития деградация протекает со скоростью, прямо пропорциональной степени повышения этого уровня.</p>
<p class="p1">До тех пор, пока я сохраню способность писать, я буду записывать свои мысли и идеи. Это совершенно необходимо для завершения эксперимента. Судя по всему, у меня самого процесс деградации будет протекать чрезвычайно быстро.</p>
<p class="p1">В поисках ошибки я несколько раз проверил и перепроверил все результаты, но с сожалением вынужден констатировать, что они незыблемы. Тем не менее я благодарен за предоставленную мне возможность внести свою лепту в знания о человеческом мозге и тех законах, которые им управляют.</p>
<p class="p1">Вчера доктор Штраус сказал, что неудача эксперимента, опровержение теории столь же важны, как и успех… Теперь я понимаю, что это так, но тем не менее очень жаль, что мой собственный вклад в науку основывается на пепелище Ваших трудов.</p>
<p class="text-author">Искренне Ваш Чарлз Гордон</p>
</div><div class="cite">
<p class="p1">Приложение: экземпляр статьи.</p>
<p class="p1">Копии: доктору Штраусу, фонду Уэлберга.</p>
</div><p class="subtitle">1 сентября</p><p class="p1">Только без паники! Первые симптомы — забывчивость и эмоциональная неустойчивость — должны появиться со дня на день. Узнаю ли я их в себе? Все, что мне остается, — продолжать фиксировать свое состояние с наибольшей объективностью, не забывая при этом, что дневник мой будет первым в своем роде и, скорее всего, последним.</p><p class="p1">Утром Немур послал Барта с моей статьей в университет Халлстона. Его ведущие специалисты должны подтвердить правильность моих выводов. Всю прошлую неделю Барт корпел над формулами и статистическими выкладками. Немуру трудно заставить себя признать, что мои идеи выше его понимания. Он слишком сильно верит в миф о собственной непогрешимости.</p><p class="p1">Меня совершенно перестало заботить, что он думает обо мне… да и не только он. Времени больше нет. Дело сделано, результаты получены, остается только подождать и посмотреть, с какой точностью моя судьба совпадает с судьбой Элджернона.</p><p class="p1">Рассказал обо всем Алисе. Она расплакалась и убежала. А ведь она ни в чем не виновата.</p><p class="subtitle">2 сентября</p></span>
