</div><p class="p1">Я боюсь. Много народу кто работает в колеже и в медшколе пришли пажелать мне щастья, Барт принес мне цветы он сказал што это от психическаво отдела. Он пажелал мне удачи. Надеюсь мне павезет. У меня есть заечья лапка щасливое пенни и подкова. Док Штраус сказал не буть таким суеверным Чярли. Это наука. Я не знаю што такое наука но они все гаварят это. Так што может она принесет мне удачю. Но я всеравно держу заечью лапку в одной руке и щасливое пенни в другой с дыркой в нем. В пенни. Я хотел взять с собой подкову но она очень тежолая и я аставил ее в куртке.</p><p class="p1">Джо Карп из пикарни принес мне шакаладный пирог от мистера Доннера и они надеюца што я скоро паправлюсь. В пикарне думают што я болею потомушто проф Немур сказал штобы я так гаварил и ничево про апирацыю. Это секрет на случяй если апирацыя не получица. Потом ко мне пришла мис Кинниан и принесла мне журналы и она была нервная и испуганая. Она поправила цветы на столе и положила все ровно и акуратно. И она поправила мне подушку под головой. Я нравлюсь ей потомушто я очень стараюсь научица всему не как астальные в центре для взрослых которым на все плевать. Она хочет штобы я стал умным. Я знаю.</p><p class="p1">Потом проф Немур сказал што поситителей больше не будет и мне надо атдахнуть. Я спросил я побью Элджернона после апирацыи и он сказал можетбыть. Если апирацыя пройдет как надо я пакажу этой мышы што я могу быть такимже умным и даже умнее. Тогда я буду лутше читать и выгаваривать правельно слова и буду знать много много и буду пахожым на астальных. Вот все удивяца. Если апирацыя пройдет как надо и я стану умным можетбыть я найду своих папу маму и сестру и пакажу им. Как они удивяца когда увидят што я такойже умный как они и моя сестра.</p><p class="p1">Проф Немур гаварит што если все будет харашо то они будут делать умными и других людей. Может и во всем мире. И он сказал значит я сделаю штото великое для науки и буду знаменитым и мое имя напишут в книгах. Мне всеравно буду я знаменитым или нет. Я только хочю быть умным как другие и штобы у меня было много друзей которые будут меня любить. Севодня мне не дали ничево поесть. Я не знаю нужноли это што бы стать умным и я хочю есть. Проф Немур отнял мой шакаладный пирог. Это не харашо. Док Штраус сказал он отдаст ево после апирацыи. Перед апирацыей ничево нельзя есть. Даже сыра.</p></span>
