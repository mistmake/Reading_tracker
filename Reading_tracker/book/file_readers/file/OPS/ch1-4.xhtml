</div><p class="p1">Док Штраус и проф Немур гаварят это ничево нащот чирнил на листках. Я сказал им это не я разлил чирнила и от куда я могу знать што там под ними. Они сказали можетбыть я им падайду. Я сказал доку Штраусу мис Кинниан ни когда не давала мне тестов а только чтение и письмо. Он сказал мис Кинниан сказала ему што я был ее лутший ученик в колеже Бекмана для умствено атсталых и я старался больше всех потомушто я хотел научица даже больше тех кто умнее меня.</p><p class="p1">Док Штраус спрасил как случилось што ты сам пришол в школу Бекмана Чярли. Как ты узнал про нее. Я сказал я не помню. Проф Немур спросил пачему ты хотел учица читать и писать. Я сказал ему потомушто всю жизнь я хотел быть умным а не глупым и моя мама всегда гаварила старайся и учись и мис Кинниан гаварит это но очень тежело быть умным и даже когда я штонибудь выучю в класе я много забываю.</p><p class="p1">Док Штраус штото записал на бумаге а проф Немур гаварил со мной очень сирьезно. Он сказал ты знаеш Чярли мы не уверены как этот кспиримент падействует на людей потомушто мы делали ево только на жывотных. Я сказал мис Кинниан сказала мне но мне все равно если будет больно потомушто я сильный и буду стараца.</p><p class="p1">Я хочю быть умным если они разрешат мне. Они сказали им нужно взять разрешение у моей семьи но мой дядя Герман каторый заботился об мене помер и я не помню про свою семью. Я не видил мою маму и моево папу и мою маленькую сестру Норму очень очень давно. Может они тоже померли. Док Штраус спросил где они жыли. Мне кажеца в бруклине. Он сказал может они найдут их.</p><p class="p1">Харашобы писать паменьше этих атчетов потомушто это занимает много времени и я ложусь спать позно и утром усталый. Джимпи наарал на меня потомушто я уронил полный поднос булочек каторый я нес к печи. Они испачкались и ему пришлось вытирать их а патом ставить в печ. Джимпи арет на меня все время но я ему панастаящему нравлюсь потому што он мой друг. Если я стану умным вот будет ему серприс.</p></span>
