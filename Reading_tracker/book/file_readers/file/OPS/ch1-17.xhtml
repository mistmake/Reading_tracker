<body class="z">
<span><p class="p1">— Знаешь, мне кажется, что за последние недели я все-таки изменился. Сначала я бродил в темноте. Попытка самому решить проблему провалилась, но чем глубже погружался я в пучины снов и воспоминаний, тем яснее сознавал, что эмоциональные проблемы не могут быть решены так же, как интеллектуальные. Окончательно я понял это вчера вечером. Я твердил себе, что странствую во мраке, словно потерянная душа, а потом понял, что и вправду потерялся. Каким-то образом я оказался отрезанным от всех и всего. И то, что я искал на темных улицах — то есть в самом неподходящем месте — был способ сделаться частью людской массы, сохранив при этом интеллектуальную свободу. Мне нужно вырасти. Это — все…</p><p class="p1">Я говорил и говорил, выплескивая из себя сомнения и страхи. Алиса была моей аудиторией — я загипнотизировал ее. Я впал в лихорадочное состояние, и мне казалось, будто я весь горю. Но теперь передо мной был человек, к которому я не равнодушен. В этом-то и заключалась вся разница.</p><p class="p1">Груз оказался ей не по силам. Дрожь перешла в рыдания. Мой взгляд упал на картину над кушеткой — перепуганная краснощекая дева. Что испытывает сейчас Алиса? Я знал, что она отдаст себя мне, я хотел ее, но куда девать Чарли?</p><p class="p1">Если бы на месте Алисы была Фэй, Чарли не стал бы вмешиваться. Он стоял бы у двери и смотрел. Но когда я оказываюсь рядом с Алисой, он впадает в панику. Что плохого сделала ему Алиса?</p><p class="p1">Она сидела на кушетке, смотрела на меня и ждала, что я буду делать. А что я смогу сделать? Обнять ее и…</p><p class="p1">Не успела сложиться мысль, как пришло предупреждение.</p><p class="p1">— Что с тобой, Чарли? Ты побледнел.</p><p class="p1">Я сел рядом с ней.</p><p class="p1">— Что-то голова кружится. Это скоро пройдет. — Но я прекрасно знал, что если захочу Алису, Чарли не допустит этого, и мне станет только хуже.</p><p class="p1">Тут у меня появилась одна идея… Поначалу она показалась мне отвратительной, но я знал, что это единственный способ выйти из паралича — перехитрить Чарли. Если по какой-то причине Чарли боится Алисы, но не боится Фэй, я выключу свет, притворюсь, что рядом со мной Фэй, и все будет в порядке.</p><p class="p1">Ужасно, мерзко. Но если этот трюк сработает, я порву цепи, которыми Чарли опутал мои эмоции. Потом-то я признаюсь себе, что любил Алису… Другого выхода я пока не видел.</p><p class="p1">— Со мной все в порядке. Давай посидим немного в темноте, — сказал я и выключил свет.</p><p class="p1">Это будет нелегко. Мне придется представить Фэй, убедить себя до такой степени, что женщина, сидящая рядом со мной, превратится в Фэй. И даже если Чарли отделится от меня, чтобы понаблюдать со стороны, ничего у него не выйдет — в комнате темно.</p><p class="p1">Я подождал — симптомов паники не было. Совершенно. Я чувствовал себя спокойным и уверенным. Положил руку ей на плечо.</p><p class="p1">— Чарли, я…</p><p class="p1">— <em>Замолчи!</em> — крикнул я, и она испуганно отодвинулась. — Пожалуйста, не говори ничего. Просто позволь мне обнять тебя в темноте. — Я обнял ее, прижал к себе, и в темноте под закрытыми веками представил Фэй — с длинными светлыми волосами и белой кожей. Фэй, какой я видел ее в последний раз. Я поцеловал волосы Фэй, шею Фэй, и, наконец, губы Фэй. Я почувствовал, как руки Фэй гладят мою спину, плечи. Сначала я ласкал ее медленно, потом, по мере того как мое нетерпение возрастало, все смелее и смелее.</p><p class="p1">В затылке закололо. В комнате кто-то был — он напряженно вглядывался в темноту, стараясь разглядеть, что мы делаем. Я лихорадочно повторял про себя: Фэй! Фэй! ФЭЙ! Это же ее лицо стоит перед моими глазами, и ничто не встанет между нами… Она прижалась ко мне, и тут я вскрикнул и оттолкнул ее.</p><p class="p1">— Чарли! — Я не видел лица Алисы, но шок, испытанный ею, отразился в крике.</p><p class="p1">— Нет, Алиса! Не могу! Ты не понимаешь!</p><p class="p1">Я спрыгнул с кушетки и включил свет. Я был почти уверен, что сейчас увижу его. Но, конечно, не увидел. Мы были одни. Все, что произошло, случилось в моей собственной голове. Алиса лежала, блузка ее была расстегнута, глаза широко раскрыты, лицо горело.</p><p class="p1">— Я люблю тебя! — вырвалось у меня. — Но я не могу! Я не могу объяснить тебе, но если бы не оттолкнул тебя, я ненавидел бы себя до конца жизни. Не спрашивай, а то и ты возненавидишь меня. Все дело в Чарли. По каким-то неизвестным причинам он никогда не разрешит тебе стать моей.</p><p class="p1">Алиса отвернулась и застегнула блузку.</p><p class="p1">— Сегодня все было по-другому. Ты не боялся. Ты хотел меня.</p><p class="p1">— Да, я хотел тебя, но сейчас я был <em>не с тобой</em>. Я собирался <em>использовать</em> тебя, но ничего не могу объяснить. Я и сам почти ничего не понимаю. Давай согласимся на том, что я еще не готов. И не надо притворяться, что все в порядке, это только заведет нас в следующий тупик.</p><p class="p1">— Чарли, не исчезай снова.</p><p class="p1">— Я больше не буду прятаться. У меня есть дела. Передай, что я зайду в лабораторию через несколько дней — как только возьму себя в руки.</p><p class="p1">Когда я выходил из ее квартиры, меня трясло как в лихорадке. На улице я постоял немного, не зная, куда идти. Идти было некуда.</p><p class="p1">В конце концов я добрел до станции подземки и доехал до Сорок девятой улицы. Народу вокруг было мало, но я заметил блондинку, чем-то напомнившую мне Фэй. По пути к автобусной остановке я завернул в магазин и купил бутылку джина. В ожидания автобуса я откупорил бутылку прямо в пакете, вспомнив, что так делают пьяницы, и отхлебнул солидный глоток. Алкоголь обжег желудок, но на вкус был ничего. Когда подошел автобус, я уже купался в золотистом сиянии. Но ни капли больше. Я совсем не хотел напиваться.</p><p class="p1">Я поднялся по лестнице и постучал в дверь квартиры Фэй. Молчание. Я открыл дверь и заглянул внутрь. Она еще не пришла, но все лампы горели. Ей плевать на все. Почему бы и мне не стать таким же?</p><p class="p1">Вернувшись к себе, я разделся, принял душ, надел халат и стал ждать, моля о том, чтобы она никого не привела с собой.</p><p class="p1">Примерно в половине третьего ночи я услышал ее шаги. Захватив бутылку, я выбрался наружу и очутился возле ее окна как раз в тот момент, когда она открыла входную дверь. Я не собирался подглядывать за ней и хотел уже постучать, даже поднял руку, чтобы заявить о своем присутствии, но тут она сбросила и туфли, довольно улыбнулась и начала раздеваться. Я отхлебнул из бутылки. Нельзя, чтобы она думала, будто я подсматриваю за ней.</p><p class="p1">Я вернулся к себе и, не зажигая света, прошел через квартиру. Сначала я хотел пригласить ее к себе, но у меня все было слишком чисто и слишком много прямых линий подлежало искривлению. Здесь ничего не получится. Я вышел на площадку и постучал к ней — сперва тихо, потом громче.</p><p class="p1">— Открыто! — крикнула Фэй.</p><p class="p1">Она лежала на полу, раскинув руки и положив ноги на кушетку. Наклонив голову, она посмотрела на меня снизу вверх.</p><p class="p1">— Чарли, дорогой! Зачем ты стоишь на голове?</p><p class="p1">— Не обращай внимания, — сказал я, доставая бутылку из пакета. — Линии сегодня какие-то особенно прямые, и мне подумалось, что ты поможешь мне привести некоторые из них в надлежащее состояние.</p><p class="p1">— Джин — что может быть лучше этого? Если сосредоточиться на возникающем в желудке тепле, линии тут же начинают выгибаться.</p><p class="p1">— Вот именно!</p><p class="p1">— Чудесно! — Фэй вскочила на ноги. — Сегодня я танцевала с людьми, похожими на ящики. Пусть они тоже расплавятся.</p><p class="p1">Она протянула мне стакан, и я наполнил его. Пока она пила, я обнял ее и погладил по обнаженной спине.</p><p class="p1">— Эй, паренек! Это что еще такое?</p><p class="p1">— Я ждал, когда ты вернешься.</p><p class="p1">Она отступила на шаг.</p><p class="p1">— Минутку, Чарли. Однажды мы уже прошли через это, и ничего не получилось. Ты нравишься мне, и если бы я знала, что есть хоть какая-то надежда, затащила бы тебя в постель, не раздумывая ни секунды. Но… мне противно стараться впустую. Это нечестно, Чарли.</p><p class="p1">— Сегодня все будет по-другому. Клянусь. Я отплачу тебе за все прошлое. Ты не пожалеешь.</p><p class="p1">— Чарли, я никогда еще не слышала от тебя таких речей. И не гляди на меня так, словно хочешь проглотить целиком. — Она схватила блузку с одного из кресел и попыталась прикрыться ею. — Ты заставляешь меня чувствовать себя голой!</p><p class="p1">— Я хочу тебя. Сегодня я смогу все, я знаю… Не отталкивай меня, Фэй!</p><p class="p1">Я начал целовать ее шею и плечи. Мое волнение передавалось ей, она задышала чаще.</p><p class="p1">— Чарли, если ты обманешь меня снова, я не знаю, что сделаю. Я ведь тоже человек!</p><p class="p1">Я взял ее за руку и усадил на кушетку, на кучу одежды и белья.</p><p class="p1">— Не здесь, — сказала она, пытаясь встать. — Пойдем в спальню.</p><p class="p1">— Нет, здесь! — настаивал я, вырывая из ее рук блузку.</p><p class="p1">Фэй посмотрела на меня, встала и сняла последнее, что еще оставалось на ней.</p><p class="p1">— Я погашу свет.</p><p class="p1">— Не надо, я хочу видеть тебя.</p><p class="p1">Она поцеловала меня и крепко обняла.</p><p class="p1">— Только не обмани меня еще раз, Чарли. Лучше не надо.</p><p class="p1">Я был уверен, что на этот раз никто не помешает нам. Я знал, что делать и как. На какой-то миг я все же почувствовал, что он смотрит — из темноты за окном, где я сам был несколько минут назад. Мгновенное переключение восприятия, и вот я уже там, вместо него, и смотрю на мужчину и женщину в объятиях друг друга.</p><p class="p1">Отчаянное усилие воли, и я снова с Фэй, а за окном — жадные глаза. Что ж, несчастный ублюдок, подумал я про себя, гляди. Плевать.</p><p class="p1">Он смотрел, и глаза его стали совсем круглыми.</p><p class="subtitle">29 июня</p><p class="p1">До возвращения в лабораторию мне нужно закончить несколько собственных проектов, начатых после симпозиума. Позвонил Лангедорфу в институт новых методов обучения и поговорил с ним об использовании парного ядерного фотоэффекта в биофизике. Сначала он подумал, что звонит сумасшедший, но когда я указал ему на некоторые изъяны в его последней статье, он продержал меня у телефона почти час и, прощаясь, пригласил обсудить свои идеи с его группой. Может быть, я так и сделаю, когда покончу с лабораторией. Если у меня будет время. Это — главная проблема. Я не знаю, сколько у меня времени. Месяц? Год? Вся жизнь? Это зависит от того, что я узнаю о побочных психофизических эффектах эксперимента.</p><p class="subtitle">30 июня</p><p class="p1">Теперь у меня есть Фэй и я перестал бродить по улицам. Я дал ей ключ от своей квартиры. Она посмеивается над моим замком, я — над свалкой в ее квартире. Она предупредила, чтобы я не пытался переделать ее. Муж развелся с ней пять лет назад как раз потому, что она не утруждала себя подбирать вещи с пола и заботой о доме.</p><p class="p1">Так же она относится и ко всему, что считает неважным. Ей просто все равно. Однажды я обнаружил в углу за креслом пачку штрафных квитанций за стоянку в неположенном месте. Штук сорок или пятьдесят. Я спросил, зачем она коллекционирует их.</p><p class="p1">— А, эти, — она рассмеялась. — Как только получу чек от бывшего мужа, надо будет заплатить. Представь себе, я держу их за креслом специально: когда я вижу их, меня начинает мучить совесть. Но можно ли винить бедную девушку? Куда не поедешь, везде понавешаны знаки «Стоянка запрещена!». Стоянка запрещена! Я просто не могу заставить себя смотреть по сторонам каждый раз, когда хочу вылезти из машины.</p><p class="p1">Так что я пообещал, что не буду переделывать ее. С ней интересно. Великолепное чувство юмора. Но прежде всего — ее свобода и независимость. Единственное, от чего можно устать — от бесконечных танцев. На прошлой неделе мы каждый день плясали до трех ночи. У меня почти не остается сил.</p><p class="p1">Это чувство — не любовь, но я обнаружил, что начал по вечерам нетерпеливо ждать, когда же послышатся на лестнице ее шаги. Чарли больше не подсматривает за нами.</p><p class="subtitle">5 июля</p><p class="p1">Посвятил Фэй свой Первый концерт для фортепиано с оркестром. Она потрясена тем, что ей может быть что-то посвящено, но концерт Фэй не понравился. Что ж, нельзя иметь все сразу в одной женщине. Весомый аргумент в пользу полигамии.</p><p class="p1">Важно то, что сердце у нее доброе. Сегодня я узнал, почему Фэй осталась без денег в самом начале месяца. За неделю до моего появления она познакомилась в «Звездной пыли» с какой-то девицей, и та сказала, что у нее в городе совсем нет знакомых, что она сломлена и ей негде переночевать. Фэй пригласила ее к себе. Через два дня девица нашла в ящике стола двести тридцать два доллара и исчезла вместе с деньгами. Фэй не заявила в полицию, она не знала даже полного имени своей «подруги».</p><p class="p1">— Зачем мне идти в полицию? — вопрошала она. — Наверно, этой стерве действительно нужны были деньги, если она решилась на кражу. Не стану же я ломать ей жизнь из-за пары сотен. Не то чтобы они мне самой не нужны, но шкура ее мне тоже ни к чему. Понимаешь?</p><p class="p1">— Конечно.</p><p class="p1">Я никогда не встречал более открытого и доверчивого человеческого существа. Она — именно то, что нужно мне в данный момент. Я изголодался по простому человеческому общению.</p><p class="subtitle">8 июля</p><p class="p1">Времени для работы остается совсем ничего — крошечный промежуток между утренними похмельями и вечерними кривляньями в клубе. Только с помощью аспирина и какой-то адской смеси, которую Фэй самолично изобрела, мне удалось закончить лингвистический анализ глаголов языка урду и послать статью в «Международный лингвистический бюллетень».</p><p class="p1">Представляю, как толпы языковедов бросятся с магнитофонами в Индию — статья подрывает всю их методологию.</p><p class="p1">Не могу не восхищаться структурными лингвистами — выдумали для себя науку, которая зиждется на ухудшении письменных коммуникаций. Вот еще пример того, как люди посвящают свою жизнь все более полному изучению все более малого и заполняют тома и библиотеки лингвистическим анализом <em>хрюкания</em>. Пожалуйста, на здоровье, однако нельзя же это использовать как повод для подрыва стабильности языка.</p><p class="p1">Сегодня позвонила Алиса, хотела узнать, когда я вернусь. Я ответил, что мне нужно закончить несколько дел и что я надеюсь получить от фонда Уэлберга разрешение на самостоятельную работу. Все же она права — нельзя тратить время так бездумно.</p><p class="p1">Единственное желание Фэй — танцевать. Вчера вечером мы начали пить и плясать в клубе «Белая лошадь», потом перебрались в «Пещеру», а оттуда — в «Розовые шлепанцы»… После этого все окуталось туманом, но танцевали мы так, что я с ног валился от усталости. Кажется, я лучше стал переносить алкоголь, потому что Чарли появился, когда я уже здорово набрался. Помню только, что он успел сплясать довольно пошлую чечетку на сцене в «Аллаказаме». Ему долго аплодировали, потом администратор вышвырнул нас оттуда, а Фэй сказала, будто все уверены, что я — великий комик и что сцена, где я изображаю слабоумного, просто восхитительна. Остального не помню, но мышцы спины жутко болят. Наверно, растяжение. Я думал, что от танцев, но Фэй уверяет, что я упал с проклятой кушетки.</p><p class="p1">Поведение Элджернона снова становится хаотичным. У меня такое впечатление, что Минни боится его.</p><p class="subtitle">9 июля</p><p class="p1">Сегодня случилось нечто совершенно ужасное. Элджернон укусил Фэй. Я просил, чтобы она не играла с ним, но ей всегда нравилось кормить мышку. Обычно, когда Фэй входила в комнату, он бежал ей навстречу, но сегодня все было иначе. Свернувшись в белый пушистый комок, Элджернон лежал у дальней стенки. Фэй просунула внутрь руку, и он забился в угол. Ей захотелось выманить его, открыв дверь в лабиринт, и не успел я предупредить ее, как она совершила ошибку, попытавшись взять Элджернона в руки. Он цапнул ее за палец, злобно посмотрел на нас и убежал в лабиринт.</p><p class="p1">Минни мы нашли в другом конце лабиринта, в комнатке для наград. Из ранки на ее груди капала кровь, но она была еще жива. Когда я захотел взять ее в руки, к нам ворвался Элджернон и прямо-таки бросился на меня, ухватился зубами за рукав и висел, пока я не стряхнул его.</p><p class="p1">После этого он успокоился. Я наблюдал за ним целый час. Хотя он и продолжал решать новые проблемы без видимых наград, в действиях его появилась не свойственная ему раньше торопливость. Вместо прежних осторожных, но решительных движений по коридорам лабиринта — суетливые, неконтролируемые броски. Раз за разом он поворачивает за угол слишком быстро и врезается в барьер.</p><p class="p1">Я не тороплюсь с выводами. Они будут зависеть от многих факторов. Обязательно нужно взять Элджернона с собой в лабораторию. Получу ли я дотацию от фонда Уэлберга? Завтра утром позвоню Немуру.</p></span>
