<span id="id13"><div class="title1">
<p class="p">Отчет № 13</p>
</div><p class="subtitle">10 июня</p><p class="p1">Мы в реактивном самолете. Скоро он взлетит и направится к Чикаго. Этот отчет обязан своим существованием Барту, которому пришло в голову, что я могу продиктовать его на магнитофон. В Чикаго его перепечатают. Немуру это понравилось. Он даже настаивает на том, чтобы я диктовал до последней возможности: такая запись только украсит его доклад.</p><p class="p1">Итак, я сижу в отдельной кабинке самолета, направляющегося в Чикаго, стараюсь научиться думать вслух и привыкаю к звуку собственного голоса. Надеюсь, машинистка не станет переносить на бумагу все эти «хм», «это самое» и «ах» и сделает отчет удобочитаемым. Мысль о том, что сотни людей будут слушать мои излияния, парализует меня.</p><p class="p1">Голова совсем пуста, но сейчас важнее чувства, а не мысли.</p><p class="p1">Идея полета в воздухе ужасна сама по себе. До терапии я не сознавал, что такое самолет, не мог связать виденное в кино и по телевизору с грохочущими серебристыми птицами, проносящимися над головой. Сейчас же меня мучает одно: а что, если мы разобьемся? От этого у меня мурашки по коже и мысли о том, что я не хочу умирать. Почему-то вспоминаются споры о Боге.</p><p class="p1">В последнее время я часто думал о смерти, но не о Боге. Мама иногда брала меня с собой в церковь, но я не видел никакой связи между церковью и богом. Она часто говорила о нем и заставляла меня молиться по вечерам, но все это мало меня трогало. Бог представлялся мне дальним родственником с длинной бородой, сидящим на троне (как Санта Клаус в универмаге, который сажает тебя к себе на колени и спрашивает, хороший ли ты мальчик и что тебе подарить). Мама, хоть и боялась его, все равно просила о милостях. Папа никогда не упоминал о нем, словно он был дядюшкой Розы, с которым он не желал иметь ничего общего.</p><p class="p1">— Скоро взлет, сэр. Позвольте помочь вам застегнуть ремни.</p><p class="p1">— Это обязательно? Я не хочу пристегиваться.</p><p class="p1">— Пока не наберем высоту, сэр.</p><p class="p1">— Я предпочел бы не делать этого. Знаете, я боюсь, когда меня привязывают. Мне станет плохо.</p><p class="p1">— Таковы правила, сэр. Я помогу вам.</p><p class="p1">— Не надо! Я сам…</p><p class="p1">— Не так… вот это надо сюда…</p><p class="p1">— Минутку… готово!</p><p class="empty-line"/><p class="p1">Любопытно. Ничего страшного. Ремень совсем не тугой. Чего я так испугался? Этого и того, как трясется самолет, отрываясь от земли. Степень волнения не соответствует серьезности ситуации… Что-то тут есть… что? Летим вверх в черные облака… Пристегните ремни… Ты привязан… напрягаешься… запах кожи… дрожь и рев в ушах.</p><p class="p1">Сквозь круглое окошко в облаках я вижу Чарли. Трудно сказать, сколько ему лет. Пять? Еще до Нормы…</p><p class="p1">— Ну что, готовы? — отец подходит к двери, громоздкий и тяжелый. У него усталый вид. — Я спрашиваю, готовы?</p><p class="p1">— Сейчас, — отвечает Роза. — Одеваю шляпку. Застегни ему рубашку и завяжи шнурки.</p><p class="p1">— Давай быстрее. Покончим с этим.</p><p class="p1">— Куда? — спрашивает Чарли. — Куда Чарли идет?</p><p class="p1">Отец хмурится. Матту Гордону всегда трудно было отвечать на вопросы сына. Поправляя вуаль на шляпке, из спальни выходит Роза. Она чем-то похожа на птицу, и ее порхающие над головой руки напоминают крылья.</p><p class="p1">— Мы пойдем к доктору, который поможет тебе стать умным.</p><p class="p1">Она смотрит на сына из-под вуали, словно из-за проволочного забора. Ему всегда страшно, когда родители наряжаются перед выходом — значит, им придется говорить с другими людьми и мама обязательно расстроится и рассердится. Ему хочется убежать, но некуда.</p><p class="p1">— Зачем ты говоришь ему это? — спрашивает Матт.</p><p class="p1">— Потому что это правда. Доктор Гуарино может вылечить его.</p><p class="p1">Матт шагает взад и вперед с видом человека, давно потерявшего надежду и верящего только в чудо.</p><p class="p1">— Откуда ты это взяла? Что ты знаешь о нем? Если бы можно было что-то сделать, врачи давно сказали бы нам.</p><p class="p1">— Не смей так говорить! — кричит она. — Он будет нормальным, сколько бы это ни стоило!</p><p class="p1">— Ум за деньги не купишь…</p><p class="p1">— Ведь это же Чарли, твой сын, твой единственный ребенок! — У Розы начинается истерика. — Я не хочу тебя слушать! Врачи просто ничего не понимают и поэтому твердят одно и то же. Доктор Гуарино все мне объяснил. Он сказал, что никто не поддерживает его метод, потому что тогда все узнают, что врачи не правы! С другими учеными тоже так было. И Пастера, и Дженнингса сначала тоже никто не признавал. Доктор Гуарино сказал, что врачи боятся прогресса.</p><p class="p1">Отбиваясь таким образом от Матта, Роза успокаивается и снова обретает уверенность в себе. Она отпускает Чарли, и тот, дрожа от страха, забивается в угол.</p><p class="p1">— Гляди, — говорит она, — ты опять напугал его!</p><p class="p1">— Я?</p><p class="p1">— Ты всегда заводишь при нем такие разговоры.</p><p class="p1">— Боже мой! Пойдем, пойдем скорее!</p><p class="p1">Всю дорогу к доктору они молчат. Тишина в автобусе, тишина, пока они идут три квартала до кабинета… Минут через пятнадцать доктор Гуарино выходит в приемную и здоровается с ними. Он толстый и лысый, и у него такой вид, будто он вот-вот выпрыгнет из своего белого халата. Чарли восхищен его густыми седыми бровями и шевелящимися седыми усами. Иногда сначала подергиваются усы, а потом поднимаются брови, но иногда первыми взлетают вверх брови, а усы дергаются вослед им.</p><p class="p1">Большая белая комната, куда Гуарино вводит их, пахнет свежей краской и почти пуста. Два стола у одной стены, у другой — огромная машина с рядами циферблатов и четырьмя длинными рычагами, как у бормашины. Рядом с ней черная кожаная кушетка с ремнями для пристегивания пациентов.</p><p class="p1">— Чудненько, чудненько, — рокочет Гуарино, поднимая брови. — Так вот ты какой, Чарли, — он крепко хватает мальчика за плечо. — Мы с тобой обязательно станем друзьями!</p><p class="p1">— Вы и в самом деле можете сделать что-нибудь для него? — спрашивает Матт. — У вас уже были похожие случаи? Знаете, мы не очень богаты.</p><p class="p1">Гуарино хмурится, брови стремительно падают вниз.</p><p class="p1">— Мистер Гордон, разве я обещал что-нибудь? Разве не нужно первым делом осмотреть мальчика? Может, я смогу что-то сделать, а может, и не смогу. Сначала нужны физические и умственные тесты, чтобы выяснить причины патологии. Потом у нас будет время поговорить о прогнозах. Скажу вам откровенно, в настоящее время я весьма занят и согласился заняться вашим ребенком только потому, что интересуюсь именно такими случаями задержки развития. Так что если у вас есть сомнения…</p><p class="p1">Он с печальным видом замолкает и отворачивается, но Роза локтем толкает Матта в бок.</p><p class="p1">— Мой муж просто неудачно выразился, доктор. Он часто говорит невпопад. — Взглядом она умоляет Матта извиниться.</p><p class="p1">Матт вздыхает.</p><p class="p1">— Если существует способ помочь Чарли, мы сделаем все, что от нас требуется. Но дела идут плохо. Я торгую парикмахерскими принадлежностями и буду рад…</p><p class="p1">— Хочу сразу предупредить вас вот о чем, — доктор Гуарино складывает губы трубочкой, словно принимая важное решение. — Начав курс лечения, мы не должны прерывать его. Улучшение может наступить внезапно, после долгих месяцев безрезультатных на первый взгляд усилий. Я не обещаю непременного успеха, избави Боже. Ничего не гарантирую. Но вы должны слушаться меня во всем, иначе не стоит и начинать.</p><p class="p1">Он внимательно смотрит на родителей, давая им время осознать важность разговора. Его брови кажутся белыми абажурами, под которыми горят две яркие голубые лампочки.</p><p class="p1">— Прошу вас выйти. Я осмотрю мальчика.</p><p class="p1">Матту не хочется оставлять Чарли наедине с ним, но Гуарино неумолим.</p><p class="p1">— Так будет лучше, — говорит он, выталкивая их в приемную. — Психосубстанционные тесты дают наиболее достоверные результаты, когда я один на один с пациентом. Внешние раздражения вызывают массу побочных эффектов.</p><p class="p1">Роза торжествующе улыбается мужу, и Матт покорно выходит вслед за ней.</p><p class="p1">Доктор Гуарино гладит Чарли по голове. У него добрая улыбка.</p><p class="p1">— Все в порядке, мальчик. Ложись на кушетку.</p><p class="p1">Чарли не двигается с места. Тогда доктор осторожно поднимает его, кладет и пристегивает тяжелыми ремнями. Кушетка пахнет кожей и потом.</p><p class="p1">— Мама-а-а!</p><p class="p1">— Она за дверью. Не бойся, Чарли, тебе совсем не будет больно.</p><p class="p1">— Хочу маму! — Чарли смущен тем, что ему нельзя двигаться. Он не понимает происходящего, но уже встречался с врачами, которые не были так добры, выпроводив родителей из кабинета.</p><p class="p1">Гуарино пробует удержать его:</p><p class="p1">— Успокойся, мой хороший. Видишь эту большую машину? Знаешь, что я хочу сделать?</p><p class="p1">Чарли вспоминает слова матери:</p><p class="p1">— Сделать меня умным.</p><p class="p1">— Правильно. По крайней мере ты знаешь, зачем пришел сюда. Закрой глаза и лежи тихо, пока я включу ее. Она зашумит, как самолет, но тебе ни капельки не будет больно. И, может быть, она сделает тебя чуть-чуть умнее.</p><p class="p1">Гуарино щелкает переключателями, большая машина начинает гудеть, красные и голубые огни зажигаются и гаснут. Чарли в ужасе. Его трясет, он вырывается из стягивающих ремней. Он начинает кричать, но Гуарино быстро заталкивает ему в рот комок марли.</p><p class="p1">— Ну, ну, Чарли. Хватит. Ты же хороший мальчик. Тебе не будет больно.</p><p class="p1">Чарли снова пытается закричать, но изо рта доносится только сдавленный стон, от звука которого его начинает тошнить. Он чувствует, как по ногам расползается сырость, а запах говорит, что мама снова отшлепает его и поставит в угол. Контролировать некоторые функции организма ему не под силу. При малейшем волнении он пачкает себя. Он задыхается… ему плохо… тошнит… кабинет проваливается в темноту…</p><p class="p1">Чарли не знает, сколько прошло времени, но когда он открывает глаза, марли во рту уже нет, ремни расстегнуты. Доктор Гуарино усиленно делает вид, что в кабинете ничем не пахнет.</p><p class="p1">— Ну что, было больно?</p><p class="p1">— Н-н-нет…</p><p class="p1">— Тогда почему ты так дрожишь? Машина всего лишь сделала тебя умнее. Как ты считаешь, стать умнее — это хорошо?</p><p class="p1">Забыв свои страхи, Чарли широко раскрытыми глазами смотрит на машину.</p><p class="p1">— А я стал умнее?</p><p class="p1">— Конечно! Встань сюда. Что ты чувствуешь?</p><p class="p1">— Мне мокро. Я наделал в штанишки.</p><p class="p1">— Да, хм, что же… В следующий раз ты так не сделаешь, правда? Ты уже узнал, что это не больно, и не будешь бояться. А теперь скажи маме, что ты стал умнее. Она два раза в неделю будет приводить тебя сюда, и мы займемся энцефалорекондиционированием. Ты будешь становиться все умнее, умнее и умнее.</p><p class="p1">Чарли улыбается.</p><p class="p1">— А я могу ходить спиной вперед!</p><p class="p1">— Правда? Давай-ка посмотрим, — тщательно изображая изумление, произносит Гуарино.</p><p class="p1">Медленно, с огромным старанием, Чарли делает несколько шагов назад и натыкается на кушетку. Гуарино удовлетворенно кивает головой:</p><p class="p1">— Здорово! Но ты только подожди! Когда мы закончим курс, ты будешь самым умным мальчиком в своем квартале!</p><p class="p1">Чарли краснеет от удовольствия. Люди не часто улыбаются ему и говорят, что он молодец. Даже ужас перед машиной и ремнями куда-то уходит.</p><p class="p1">— Во всем квартале? — От этой мысли у него спирает грудь. — Умнее, чем Хайми?</p><p class="p1">Гуарино снова улыбается:</p><p class="p1">— Умнее, чем Хайми.</p><p class="p1">Чарли глядит на машину с новым интересом и уважением — она сделает его умнее Хайми, который живет через два дома от них, умеет читать и писать и уже принят в бойскауты.</p><p class="p1">— Это ваша машина?</p><p class="p1">— Пока нет. Она принадлежит банку, но скоро станет моей, и я смогу многих ребят сделать умными. — Он гладит Чарли по голове и продолжает: — Иметь с тобой дело куда приятнее, чем с теми нормальными детьми, которых матери приводят ко мне в надежде, что я превращу их в гениев. А ты, Чарли… оставайся самим собой — хорошим маленьким мальчиком.</p><p class="p1">Доктор открывает дверь и выводит Чарли к родителям.</p><p class="p1">— Вот он. Ничего страшного не случилось. Замечательный мальчишка. Мы с ним будем друзьями. А, Чарли?</p><p class="p1">Чарли согласно кивает. Он хочет понравиться доктору Гуарино, но вот он встречает взгляд матери и ужас возвращается.</p><p class="p1">— Чарли! Что ты натворил!</p><p class="p1">— Случайность, миссис Гордон. Не наказывайте его. Посещение врача не должно ассоциироваться с наказанием.</p><p class="p1">Но Роза Гордон сгорает от стыда.</p><p class="p1">— Отвратительно! Доктор, я просто не знаю, что делать. Он и дома забывает… при гостях… Мне так стыдно за него!</p><p class="p1">На лице матери написано неприкрытое презрение, и Чарли начинает бить дрожь. На мгновение ему посчастливилось забыть, какой он плохой и как заставляет страдать маму и папу. Он не знает почему, но ему страшно, когда мама говорит, что он заставляет их страдать, и когда она плачет и кричит на него, он отворачивается к стенке и тихо стонет.</p><p class="p1">— Не пугайте его, миссис Гордон, и успокойтесь. Приводите его ко мне по вторникам и четвергам в это же время.</p><p class="p1">— Так поможет ему это или нет? — спрашивает Матт. — Десять долларов очень…</p><p class="p1">— Матт!!! — Роза хватает его за рукав. — Ну как ты можешь! Твоя плоть и кровь! Может быть, доктор Гуарино с божьей помощью вылечит его, и он станет похож на других, а ты твердишь про деньги!</p><p class="p1">Матт Гордон хочет что-то сказать, передумывает и вытаскивает бумажник.</p><p class="p1">— Ну что вы… — вздыхает Гуарино, изображая смущение при виде денег. — Финансовые вопросы решает мой ассистент… Благодарю вас. — Он слегка кланяется Розе, пожимает руку Матту, хлопает Чарли по спине. — Прекрасный мальчик, прекрасный, — и, не переставая улыбаться, исчезает в кабинете.</p><p class="p1">Всю дорогу домой они спорят. Матт жалуется, что в парикмахерском деле застой, а сбережения их тают. Роза с жаром возражает, что нет ничего важнее благополучия их единственного сына.</p><p class="p1">Чарли испуганно хнычет. Ему больно от злобы в голосах родителей. Как только они входят в дом, он стремглав мчится на кухню и становится там в угол за дверью, прижавшись лбом к стене и тихо плача.</p><p class="p1">Родители не обращают на него внимания. Они забыли, что его нужно вымыть и сменить штанишки.</p><p class="p1">— Я не истеричка! Просто меня мутит от того, что когда я хочу что-то сделать для твоего сына, ты начинаешь ныть. Тебе все равно, каким он вырастет! Тебе плевать на него!</p><p class="p1">— Мне не все равно! Просто я давно понял, что никто ему не поможет. Такой ребенок — крест, и нам остается только нести его и любить. С этим я согласен, но не собираюсь потакать твоим дурацким затеям. Все наши сбережения ушли шарлатанам, а на эти деньги я давно мог открыть свое дело. Да-да! Не гляди на меня так! На деньги, которые ты швырнула на ветер, я мог бы завести свою парикмахерскую, а не выбиваться из сил за прилавком! <em>Мое</em> дело, где люди работали бы на <em>меня</em>!</p><p class="p1">— Не кричи так. Ему страшно.</p><p class="p1">— Иди к черту! Теперь я знаю, кто осел в этом доме — я! Потому что не остановил тебя вовремя!</p><p class="p1">Он выскакивает на улицу и с треском хлопает дверью.</p><p class="empty-line"/><p class="p1">— Прошу прощения, сэр, но мы уже заходим на посадку. Застегните… О, вы так и просидели с ними от самого Нью-Йорка! Почти два часа…</p><p class="p1">— Я совсем забыл о нем. Расстегну, когда приземлимся. Мне больше не страшно.</p><p class="empty-line"/><p class="p1">Теперь я понимаю, от кого передалось мне это так поразившее всех желание стать <em>умным</em>. Роза вставала и засыпала с ним. Ее ужас, вина, стыд. Чарли — слабоумный! Ее мечта, что все можно исправить. И вечный вопрос — кто виноват? Матт или она? Только когда Норма доказала, что она способна иметь здоровых детей и что я просто-напросто урод, Роза оставила попытки переделать меня. Но сам я никогда не оставлял надежды превратиться в нормального человека… Чтобы она полюбила меня.</p><p class="p1">Вот что еще любопытно. Мне следовало бы затаить на Гуарино обиду за то, что он обманул меня, Розу и Матта. Но я вспоминаю его с благодарностью. Он всегда был добр ко мне. Улыбка, дружеское похлопывание по спине, ободряющее слово — все то, что доставалось мне так редко. Он обращался со мной, даже тогда, как с разумным существом.</p><p class="p1">Может, это попахивает неблагодарностью, но что действительно злит меня — отношение ко мне как к подопытному животному. Постоянные напоминания Немура, что он <em>сделал меня тем, кто я есть</em>, или что в один прекрасный день тысячи кретинов станут <em>настоящими людьми</em>.</p><p class="p1">Как заставить его понять, что не он создал меня? Немур совершает ту же ошибку, что и люди, потешающиеся над слаборазвитым человеком, не понимая при этом, что он испытывает те же самые чувства, что и они. Он и не догадывается, что задолго до встречи с ним я уже был личностью.</p><p class="p1">Я учусь сдерживать обиду, быть терпеливее, ждать. Я расту. Каждый день я узнаю о себе что-то новое, и воспоминания, начавшиеся с небольшой ряби, захлестывают меня десятибалльным штормом.</p><p class="subtitle">11 июня</p><p class="p1">Недоразумения начались, как только мы прибыли в «Чалмерс-отель» в Чикаго и обнаружили, что наши комнаты освободятся только завтра к вечеру и заночевать нам придется в ближайшем отеле «Индепенденс». Немур был вне себя. Он воспринял это как личное оскорбление и переругался со всеми — от посыльного до управляющего. Он ждал в фойе, пока каждый из них в свою очередь ходил за вышестоящим чином, в надежде, что тот решит каверзный вопрос.</p><p class="p1">Мы стояли посреди всего этого смятения — куч сваленного в беспорядке багажа, летящих сломя голову носильщиков с тележками, участников симпозиума, не видевшихся целый год и теперь с чувством приветствовавших друг друга — и с растущим с каждой минутой смущением наблюдали, как Немур орет на представителей Международной ассоциации психологов.</p><p class="p1">Наконец стало ясно, что ничего нельзя поделать и до Немура дошла безнадежность нашего положения. Случилось так, что большинство молодых участников остановилось именно в «Индепепденсе». Многие из них слышали об эксперименте Немура и знали, кто я такой. Куда бы мы ни шли, кто-нибудь пристраивался сбоку и начинал интересоваться моим мнением о разнообразнейших вещах — от нового налога до археологических находок в Финляндии. Это был прямой вызов, но запас знаний позволял мне свободно обсуждать почти любую проблему. Однако скоро я заметил, что с каждым обращенным ко мне вопросом физиономия Немура все больше мрачнеет. Поэтому, когда симпатичная молодая врачиха из Фалмут-колледжа спросила, чем я могу объяснить причину моей умственной отсталости, я сказал, что лучше профессора Немура на этот вопрос не ответит никто.</p><p class="p1">Дождавшись момента показать себя, Немур впервые за все время нашего знакомства изволил положить руку мне на плечо.</p><p class="p1">— Нельзя с уверенностью сказать, что вызывает подобную разновидность фенилкетонурии — необычная биохимическая или генетическая ситуация, ионизирующее излучение, естественная радиоактивность или вирусная атака на эмбрион. Важно то, что результатом явился дефективный ген, вырабатывающий… назовем его «блуждающий энзим», который стимулирует дефективные биохимические реакции. Образовавшиеся в итоге новые аминокислоты конкурируют с нормальными энзимами, вызывая повреждения мозга.</p><p class="p1">Девушка нахмурилась. Она не ожидала лекции, но Немур уже захватил кафедру и поспешил развить свою мысль:</p><p class="p1">— Я называю это «конкурирующей ингибицией энзимов». Например, представьте себе, что энзим, произведенный дефективным геном, — это ключ, который можно вставить в замок центральной нервной системы, но который не <em>поворачивается</em> в нем. Следовательно, настоящий ключ — нужный энзим — уже не может проникнуть в замок. Результат? Необратимое нарушение протеина мозговой ткани.</p><p class="p1">— Но если оно необратимо, — вмешался в разговор один из присоединившихся к аудитории психологов, — как стало возможным излечение мистера Гордона?</p><p class="p1">— Ах, — проворковал Немур, — я сказал, что необратимо разрушение тканей, но не сам процесс. Многим ученым уже удавалось обратить его путем инъекций веществ, реагирующих с дефективными энзимами, меняя, так сказать, молекулярную бородку ключа. Этот принцип является основным и в нашей методике. Но сначала мы удаляем поврежденные участки мозга и заставляем пересаженную мозговую ткань синтезировать протеин с высокой скоростью…</p><p class="p1">— Минутку, профессор, — прервал я его на самой высокой ноте. — Что вы скажете о работе Рахаджамати на эту тему?</p><p class="p1">— Кого-кого? — непонимающе переспросил он.</p><p class="p1">— Рахаджамати. В ней он критикует теорию Таниды — концепцию изменения химической структуры блокирующих метаболизм энзимов.</p><p class="p1">Немур нахмурился:</p><p class="p1">— Где была переведена статья?</p><p class="p1">— Она еще не переведена. Я прочел ее в индийском журнале «Психопатология» несколько дней назад.</p><p class="p1">Немур оглядел присутствующих и сделал попытку отмахнуться от меня:</p><p class="p1">— Не стоит придавать этой статье слишком большого значения. Наши результаты говорят сами за себя.</p><p class="p1">— Но Танида сам предложил теорию блокирования блуждающего энзима путем рекомбинации, а теперь утверждает, что…</p><p class="p1">— Ну-ну, Чарли. То, что человек первым предложил теорию, отнюдь не означает, что последнее слово навсегда останется за ним, особенно в ее экспериментальном развитии. Думаю, все согласятся, что исследования, проведенные в США и Англии, далеко превосходят индийские и японские работы. У нас лучшие лаборатории и лучшее оборудование в мире.</p><p class="p1">— Но этим нельзя опровергнуть утверждения Рахаджамати, что…</p><p class="p1">— Сейчас не время углубляться в это. Я уверен, что этот вопрос подвергнется здесь детальному обсуждению.</p><p class="p1">Немур заговорил с каким-то старым знакомым и полностью отключился от меня. Потрясающе. Я отвел в сторонку Штрауса и засыпал его вопросами:</p><p class="p1">— Что скажешь? Ты всегда говорил, что это я слишком чувствителен для него. На что он так обиделся?</p><p class="p1">— Ты дал ему почувствовать свое превосходство, а он терпеть этого не может.</p><p class="p1">— Нет, серьезно. Скажи мне правду.</p><p class="p1">— Чарли, пора бы тебе перестать подозревать всех в желании посмеяться над тобой. Немур ничего не знает об этих статьях, потому что не читал их.</p><p class="p1">— Он что, не знает хинди и японского? Не может быть!</p><p class="p1">— Не у всех такие способности к языкам, как у тебя.</p><p class="p1">— Тогда как же он может отрицать выводы Рахаджамати, отмахиваться от сомнений Таниды в достоверности методов контроля? Он должен знать…</p><p class="p1">— Подожди, — задумчиво произнес Штраус. — Должно быть, это совсем недавние работы. Их еще не успели перевести.</p><p class="p1">— Ты хочешь сказать, что тоже не читал их?</p><p class="p1">Он пожал плечами:</p><p class="p1">— Лингвист из меня, пожалуй, даже похуже, чем из него. Правда, я уверен, что перед публикацией итоговой статьи Немур тщательно прочешет все журналы.</p><p class="p1">Я просто не знал, что сказать. Мысль о том, что оба они могут ничего не знать о революционных работах в своей области, ужаснула меня.</p><p class="p1">— Какие языки ты знаешь? — спросил я.</p><p class="p1">— Французский, немецкий, испанский, итальянский и немного шведский.</p><p class="p1">— А русский? Португальский? Китайский?</p><p class="p1">Тогда он напомнил мне, что является практикующим психиатром и нейрохирургом и не может уделять много времени изучению языков. Из древних он может читать только по-латыни и по-гречески. Никакого понятия о древних языках Востока.</p><p class="p1">Было видно, что Штраусу не терпится закончить дискуссию, но отпустить его просто так было выше моих сил. Интересно, что он вообще знает?</p><p class="p1">Физика: ничего глубже квантовой теории поля.</p><p class="p1">Геология: ничего о геоморфологии, стратиграфии и даже петрологии.</p><p class="p1">Математика: дифференциальное исчисление на примитивнейшем уровне и ничего о банаховых алгебрах и римановом пространстве.</p><p class="p1">Все это было только первыми каплями из обрушившегося на меня потока открытий.</p><p class="p1">Я не смог досидеть до конца так называемого дружеского ужина и ускользнул, чтобы побродить и обдумать услышанное. Притворщики — вот они кто. Оба. Как ловко изображали они из себя гениев! Обычные люди, работающие вслепую, но убедившие других в своей способности осветить тьму. Почему все врут? Ни один из тех, кого я знаю, не выдержал проверки временем.</p><p class="p1">Заворачивая за угол, я краем глаза увидел спешащего за мной Барта.</p><p class="p1">— Шпионишь? — спросил я, когда мы поравнялись.</p><p class="p1">Он неестественно засмеялся.</p><p class="p1">— Экспонат А, звезда первой величины. Если тебя задавит сегодня один из этих моторизованных чикагских ковбоев или ограбят на Стейт-стрит, я себе этого не прощу.</p><p class="p1">— Не хочу находиться под неусыпным надзором.</p><p class="p1">Он отвел взгляд и, глубоко засунув руки в карманы, зашагал рядом.</p><p class="p1">— Пойми, Чарли, старик ужасно волнуется. Симпозиум — кульминация его жизни. На карту поставлена репутация!</p><p class="p1">— Не знал я, что вы так близки, — поддел я его, вспомнив, как часто Барт жаловался на профессорскую узколобость и тиранию.</p><p class="p1">— Не так уж мы близки… Он отдал своей работе всю жизнь. Он не Фрейд, не Юнг, не Павлов и не Уотсон, но он занят важным делом, и я уважаю его за одержимость, за то, что он, обыкновенный человек, поставил перед собой задачу, решить которую под силу только гению. А гении сейчас в основном заняты тем, что делают бомбы…</p><p class="p1">— Хотел бы я видеть, как ты в глаза назовешь его «обыкновенным человеком».</p><p class="p1">— То, что он думает о себе, не имеет никакого значения. Да, Немур эгоист, ну и что? Чтобы взяться за такую работу, как раз и нужно быть эгоистом. Я вдоволь насмотрелся на немуров всех мастей и знаю, что под их величественной внешностью всегда прячутся страх и неуверенность в себе.</p><p class="p1">— А также лживость и мелочность, — добавил я. — Теперь я их раскусил. Я давно подозревал, что Немур — обманщик, он всегда чего-то боялся. А вот кто по-настоящему удивил меня, так это Штраус.</p><p class="p1">Барт помолчал и глубоко вздохнул. Я не видел его лица, но во вздохе слышалось раздражение.</p><p class="p1">— Ты не согласен со мной?</p><p class="p1">— Ты прошел длинный путь слишком быстро. Сейчас у тебя изумительный мозг, степень твоей разумности невозможно вычислить, а сумма накопленных знаний превосходит всякое воображение. Но ты однобок. Ты знаешь. Ты видишь. Но не понимаешь. В тебе нет терпимости. Ты именуешь ученых притворщиками, но разве кто-нибудь из них сказал, что он совершенен, что он — сверхчеловек? Нет, они — простые люди. Это ты — гений.</p><p class="p1">Уловив, что речь его весьма смахивает на проповедь, Барт умолк.</p><p class="p1">— Продолжай, что же ты?</p><p class="p1">— Ты когда-нибудь видел жену Немура?</p><p class="p1">— Нет.</p><p class="p1">— Если хочешь знать, почему он всегда в напряжении, даже когда дела в лаборатории идут лучшим образом, а его лекциям аплодируют, тебе надо познакомиться с Бертой Немур. Известно тебе, что это она сделала его профессором? Что это она, пользуясь влиянием отца, буквально выбила из фонда Уэлберга дотацию для него? Именно она подтолкнула его к преждевременному докладу на симпозиуме. Пока тебя не погоняет такая женщина, не пытайся понять мужчину, испытавшего это на собственной шкуре.</p><p class="p1">Я ничего не ответил, а ему явно хотелось поскорее вернуться в отель. Возвращались мы в молчании.</p><p class="p1">Я — гений? Не уверен. По крайней мере, пока. Я, как сказал бы Барт, <em>исключение</em>. Вполне демократичный термин, позволяющий избегнуть проклятых ярлыков типа «одаренный» и «неспособный» (что на самом деле означает «блестящий» и «слабоумный»). Как только слово «исключение» начинает приобретать смысл, его тут же заменяют другим. Пользуйся словом только до тех пор, пока никто не понимает его значения. «Исключение» можно отнести к обоим концам умственного спектра, так что я всю жизнь был «исключением».</p><p class="p1">Чем, больше я узнаю, тем больше вижу такого, о существовании чего даже не подозревал. Раньше я тешил себя дурацкой мыслью, что смогу знать ВСЕ, вобрать в себя все знания человечества. Теперь же я надеюсь, что окажусь способным узнать только о <em>наличии</em> знания и понять хоть малую его крупицу. Хватит ли мне времени?</p><p class="p1">Барт зол на меня. Ему кажется, что я слишком нетерпелив, да и остальные придерживаются такого же мнения. Меня придерживают, хотят поставить на место. Где мое место? Кто я? Что я такое? Итог всей моей жизни или только нескольких последних ее месяцев? О, какими нетерпеливыми становятся они сами, стоит мне завести разговор об этом! Никому не хочется признаваться в своем невежестве. Парадокс — «простой человек» вроде Немура посвящает жизнь тому, чтобы делать других гениями. Он мечтает войти в историю первооткрывателем новых законов обучения, этаким Эйнштейном от психологии. Но, несмотря ни на что, в нем жив извечный страх учителя перед талантливым учеником, страх мастера перед тем, что подмастерье обесценит его работу. С другой стороны, я не ученик и не подмастерье Немура, как, например, Барт.</p><p class="p1">Страх Немура обнаружить себя человеком на ходулях среди великанов вполне понятен. Ошибка уничтожит его. Он слишком стар, чтобы начать все снова.</p><p class="p1">Так же поразило меня, если не сказать больше, открытие истинной сущности людей, перед которыми я преклонялся. Но тут Барт прав — нельзя быть таким нетерпимым. Ведь это их идеи и блестящая работа сделали возможным эксперимент, и мне нельзя поддаваться искушению смотреть на них сверху вниз. Следует усвоить, что когда меня слегка поругивают за слишком сложный и непонятный «другим» язык отчетов, мои учителя имеют в виду и себя. Но все равно страшно подумать, что мою судьбу держат в своих руках не те гиганты, какими я представлял их себе раньше, а люди, не знающие ответов на многие вопросы.</p><p class="subtitle">13 июня</p><p class="p1">Я диктую эти заметки, пережив ни с чем не сравнимый эмоциональный стресс. Я сбежал оттуда, и сижу теперь в самолете, летящем в Нью-Йорк. Не представляю, что мне делать, когда окажусь там.</p><p class="p1">Признаюсь, поначалу зрелище сотен ученых и мыслителей, собравшихся в одном месте в одно время, чтобы обменяться идеями, вызывало у меня благоговение. Вот здесь, думал я, происходит нечто настоящее. Здесь все будет не так, как в стерильных университетских дискуссиях, потому что здесь собрались светила психологии и теории обучения, настоящие ученые, которые пишут книги и читают лекции, ученые, которых цитируют. Пусть Немур и Штраус — середнячки, но не остальные, был уверен я.</p><p class="p1">Настало время, и Немур повел нас по гигантскому фойе с роскошной мебелью в стиле барокко, по широким мраморным лестницам сквозь растущую толпу головокивателей и рукопожимателей. Утром прибыло еще двое наших — профессора Уайт и Клингер шествовали чуть справа и на шаг позади Немура и Штрауса. Мы с Бартом замыкали шествие.</p><p class="p1">Толпа расступилась, и мы вошли в главный конференц-зал. Немур весело помахал рукой репортерам и фотографам, собравшимся, чтобы из первых уст услышать о тех замечательных вещах, которые удалось сделать с обыкновенным кретином всего за три месяца. Очевидно, Немур предупредил их заранее.</p><p class="p1">Некоторые доклады произвели на меня сильное впечатление. Группа ученых с Аляски выяснила, как стимуляция различных областей мозга влияет на способность к восприятию знаний, а другая, из Новой Зеландии, определила участки коры мозга, ответственные за восприятие стимулов.</p><p class="p1">Были и другие работы. Например, П.Т. Целлерман сделал доклад о том, как зависит скорость, с которой крысы проходят лабиринт, от формы углов в нем… Или сообщение некоего Верфеля о влиянии уровня разумности на время реагирования у макак-резусов. Время, деньги и энергия, потраченные впустую. Да, прав был Барт, превознося Немура и Штрауса за то, что они посвятили себя важному и неизвестному делу, в то время как другие занимались простенькими темами с гарантированным успехом.</p><p class="p1">Если бы только Немур был способен относиться ко мне, как к человеку!</p><p class="p1">Но вот председатель объявил доклад от университета Бекмана, и мы заняли свои места на возвышении рядом с президиумом — я и Барт, а между нами Элджернон в клетке. Мы были главной приманкой этого вечера, и председатель торжественно представил нас. Я почти ожидал, что из его уст вырвется: «Почтеннейшая публика! Не проходите мимо! Уникаааальное представление! Нигде больше в научччном мире! Мышь и кретин становятся гениями прррямо на ваших глазах!!!»</p><p class="p1">Однако он сказал:</p><p class="p1">— Прежде чем вы услышите сам доклад, мне хочется сказать несколько слов. Все мы уже слышали о совершенно поразительной работе, проделанной в стенах университета Бекмана на средства фонда Уэлберга под руководством профессора психологии Немура совместно с доктором Штраусом, сотрудником нейропсихологической лаборатории того же университета. Нет нужды повторять, что мы ждем доклада с понятным нетерпением. Предоставляю слово университету Бекмана!</p><p class="p1">Немур грациозно кивнул и от избытка чувств подмигнул Штраусу. Первым выступал профессор Клингер. Элджернон, непривычный к дыму и шуму, нервно забегал по клетке. Ни с того ни с сего у меня появилось сильнейшее желание открыть дверцу и выпустить его в зал. Абсурд, конечно. Тем не менее, слушая излияния Клингера на тему «Сравнение лабиринтов с преимущественно левосторонними поворотами с лабиринтами с преимущественно правосторонними», я поймал себя на том, что непроизвольно поглаживаю пальцами задвижку клетки.</p><p class="p1">Потом Барт описал собранию разработанную им методику обучения Элджернона и достигнутые с ее помощью результаты. За этим должна была последовать демонстрация самого Элджернона, решающего разнообразнейшие проблемы, чтобы заполучить свой кусочек сыра (есть вещи, на которые я не перестаю обижаться).</p><p class="p1">Я никогда не имел ничего против Барта. В отличие от других, он всегда казался мне прямым и откровенным человеком, но, начав описывать с трибуны белую мышь, которой был дарован разум, сразу стал таким же выспренным и помпезным, как все остальные. Словно примерял мантию своих учителей. Я считал Барта своим другом — только это и удержало меня. Выпустить Элджернона — значит превратить симпозиум в балаган, а это, безусловно, отразится на репутации Барта, для которого сегодняшнее выступление — первый старт в гонке за академическими почестями. Мой палец остался лежать на задвижке. Элджернон внимательно следил за ним своими розовыми глазками и, я уверен, прекрасно понимал, что я хочу сделать. Но тут Барт поднял клетку для показа. Он объяснил, насколько сложен замок и сколько ума требуется, чтобы открыть его. Чем умнее становился Элджернон, тем меньше времени ему для этого требовалось — очевидный и известный мне факт. Но потом Барт сказал нечто такое, о чем я <em>не знал</em>. Оказывается, достигнув максимума разумности, Элджернон повел себя странно. Иногда он совсем отказывался работать, даже когда был явно голоден. Иногда же, успешно решив задачу, он вместо того, чтобы полакомиться, ни с того ни с сего начинал бросаться на прутья клетки.</p><p class="p1">Когда из зала спросили, нельзя ли предположить, что это странное поведение прямо связано с уровнем разумности, Барт уклонился от ответа.</p><p class="p1">— По моему мнению, — сказал он, — ничто не свидетельствует об этом. Возможно, на определенном этапе и хаотичное поведение, и уровень разумности являются следствием самой операции, а не функциями друг друга. Не исключено, что такое поведение — черта характера Элджернона. У других мышей не наблюдалось ничего подобного, но, с другой стороны, ни одна из них не достигла уровня Элджернона и не смогла удержаться достаточно долго даже на своем уровне.</p><p class="p1">Ясно, что эту информацию держали в тайне от меня, и я даже подозреваю почему. Естественно, я разозлился, но это оказалось пустяком в сравнении с той дикой яростью, которая охватила меня при показе фильмов. Я и не подозревал, что все ранние эксперименты со мной были засняты на пленку. Вот я за столом рядом с Бартом, смущенный и с раскрытым ртом, стараюсь пройти лабиринт электрической палочкой. При каждом ударе тока выражение моего лица меняется на испуганное, но потом дурацкая улыбка появляется снова. Каждый раз зал корчится от смеха, и каждый такой случай кажется им смешнее предыдущего.</p><p class="p1">Я твердил себе, что они — не пустоголовые ротозеи, а ученые, посвятившие жизнь поиску истины. Да, кадры оказались весьма забавными, и Барт, уловив общее настроение, стал вставлять веселенькие комментарии. Меня не покидала мысль, что, если выпустить Элджернона и все они начнут ползать на коленях и ловить маленького белого перепуганного гения, будет еще смешнее. Однако я сдержался, и когда на трибуну взобрался Штраус, совсем успокоился.</p><p class="p1">Штраус говорил в основном о теории и технике нейрохирургии. Он в деталях описал, каким образом, определив местонахождение гормональных контрольных центров, ему удалось изолировать и стимулировать их и в то же время удалить участки коры, синтезирующие гормоны-ингибиторы. Он изложил теорию блокировки энзимов, после чего перешел к описанию моего состояния до и после операции. Присутствующим были розданы фотографии (и когда их только успели сделать), и по кивкам и улыбкам я заключил, что большинство согласны с тем, что «пустое» выражение лица уступило место «внимательному и интеллигентному».</p><p class="p1">Я появился здесь как часть научного труда и не сомневался, что меня выставят в витрину, но все говорили обо мне так, словно я представляю собой нечто едва только созданное. Ни один из участников симпозиума не думал обо мне как о живом человеке. Постоянное сопоставление «Элджернона и Чарли», «Чарли и Элджернона» ясно показало, что они рассматривают нас обоих как подопытных животных, не имеющих права на существование вне стен лаборатории. Но, не переставая злиться, я никак не мог избавиться от ощущения, что что-то здесь не так.</p><p class="p1">Наконец пришел черед главы проекта, профессора Немура, обобщить сказанное и получить свою долю восхищения. Долго же пришлось ему ждать этого дня.</p><p class="p1">Надо отдать ему должное — он произвел прекрасное впечатление, и я с удивлением обнаружил, что соглашаюсь с ним и в нужных местах даже киваю головой. Тестирование, эксперимент, операция, мое последующее развитие — все это он описал в деталях, украшая речь цитатами из отчетов, в большинстве своем совсем не теми, что хотелось бы услышать мне. Слава богу, у меня хватило ума не включать в отчеты некоторые детали, касающиеся наших отношений с Алисой.</p><p class="p1">…И вот, уже кончая доклад, он сказал <em>это</em>:</p><p class="p1">— Все мы, участники эксперимента, горды сознанием того, что исправили одну из ошибок природы и создали новое, совершенно исключительное человеческое существо. До прихода к нам Чарли был вне общества, один в огромном городе, без друзей и родственников, без умственного аппарата, необходимого для нормальной жизни. У него не было прошлого, не было осознания настоящего, не было надежд на будущее, Чарли Гордона просто не существовало…</p><p class="p1">Не знаю, почему меня разозлила именно эта фраза — для меня не было новостью, что участники чикагского симпозиума придерживаются того же мнения. Мне захотелось встать и крикнуть: «Я — человек, я — личность, у меня есть отец и мать, воспоминания, история. Я <em>был</em> и до того, как меня вкатили в операционную!»</p><p class="p1">И тут я четко увидел то, что смутно беспокоило меня, когда говорил Штраус, и потом, когда Немур подводил итоги. Они ошиблись… ну конечно! Статистические оценки периода, необходимого для доказательства необратимости перемен, основывались на ранних экспериментах и относились к постоянно тупым или постоянно разумным животным. Но совершенно очевидно, что для животных, чей интеллект возрос в два-три раза, период ожидания должен быть неизмеримо большим…</p><p class="p1">Следовательно, выводы Немура преждевременны. В нашем с Элджерноном случае надо было ждать дольше, значительно дольше… Профессора совершили ошибку, и никто не заметил ее! Меня словно парализовало. Не только Элджернон, но и я сижу в клетке, построенной вокруг меня.</p><p class="p1">Сейчас посыплются вопросы, и, не дав пообедать, меня заставят развлекать мировую элиту. Нет! Пора убираться отсюда.</p><p class="p1">— …В некотором смысле он — результат глубоко продуманного психологического эксперимента. На месте почти пустой оболочки, обузы для общества, не без оснований опасающегося его безответственного поведения, мы имеем настоящего человека, готового внести свою лепту в дело всеобщего прогресса. Мне представляется, что несколько слов, сказанных самим Чарли Гордоном…</p><p class="p1">Черт бы его побрал. Он не понимает, о чем говорит. Я с удивлением увидел, как палец, перестав подчиняться моей воле, отодвигает задвижку на клетке Элджернона. Он внимательно посмотрел на меня, выскочил из клетки и побежал по длинному столу, за которым восседал президиум. Сначала его почти не было видно на белоснежной скатерти, но вот одна из женщин взвизгнула и вскочила на ноги, опрокинув при этом свой стул и графин с водой. Барт закричал:</p><p class="p1">— Элджернон сбежал!</p><p class="p1">— Элджернон спрыгнул со стола на сцену, а с нее — в зал.</p><p class="p1">— Ловите его! Ловите! — пронзительно завопил Немур в аудиторию, превратившуюся в спутанный клубок рук и ног. Некоторые из женщин (не экспериментаторы) залезали на неустойчивые складные стулья, а в это время остальные, горя желанием изловить беглеца, сбивали их оттуда.</p><p class="p1">— Закройте задние двери! — крикнул Барт, до которого дошло, что Элджернон достаточно умен и направится именно туда.</p><p class="p1">— Беги! — услышал я собственный голос. — В боковую дверь!</p><p class="p1">Через несколько секунд кто-то закричал:</p><p class="p1">— Он выскочил в боковую дверь!</p><p class="p1">— Ради бога, поймайте же его! — умолял Немур.</p><p class="p1">Толпа вывалилась из зала в коридор. Элджернон, резво перебирая лапками, вел охоту. Под столами в стиле Людовика XIV, вокруг пальм в кадках, по лестницам, в фойе. К погоне присоединялись встречные. Наблюдая, как они носятся взад и вперед, гоняясь за белой мышкой, которая была умнее многих из них, я получал ни с чем не сравнимое удовольствие.</p><p class="p1">— Смейся, смейся, — фыркнул Немур, наткнувшись на меня. — Если мы не поймаем его, все пойдет насмарку.</p><p class="p1">Изображая усердие, я поднял мусорную корзину и посмотрел, нет ли под ней Элджернона.</p><p class="p1">— Знаете ли вы, что ошиблись и его поимка уже не имеет никакого значения.</p><p class="p1">В эту секунду из дамской комнаты с визгом выскочили полдюжины женщин, в отчаянии прижимая юбки к ногам.</p><p class="p1">— Он там! — крикнул кто-то, и вся толпа в нерешительности остановилась перед табличкой «<em>Для дам</em>».</p><p class="p1">Я первым пересек невидимый барьер и вошел в священные врата. Элджернон сидел на раковине, рассматривая свое отражение в зеркале.</p><p class="p1">— Пойдем, — сказал я. — Я тебя не брошу. — Он позволил мне взять себя и посадить в карман пиджака. — Сиди тихо, я сам тебя выну.</p><p class="p1">Тут ворвались другие. На их физиономиях было написано, что они ожидают встретить здесь толпу вопящих обнаженных леди. В самый разгар поисков я вышел в коридор и услышал голос Барта:</p><p class="p1">— Тут дырка для вентиляции. Может, он шмыгнул туда?</p><p class="p1">— Посмотри, куда она ведет, — сказал Штраус.</p><p class="p1">— Беги на второй этаж, — сказал Немур Штраусу, — а я спущусь в подвал.</p><p class="p1">Силы разделились. Я последовал за батальоном, ведомым Штраусом, на второй этаж, где все занялись поисками выхода вентиляции. Когда Штраус и Уайт повернули направо в коридор В, я повернул налево, в коридор Б, и на лифте поднялся в свою комнату.</p><p class="p1">Закрыв за собой дверь, я легонько похлопал по карману. Розовый носик и белые усы высунулись наружу.</p><p class="p1">— Уложу вещи и смоемся отсюда. Только ты и я. Парочка доморощенных гениев ударяется в бега.</p><p class="p1">Посыльный отнес чемодан и магнитофон в такси. Я заплатил по счету и вышел на улицу. Объект охоты уютно устроился в теплом кармане. Обратный билет в Нью-Йорк у меня уже был, оставалось только проставить дату.</p><p class="p1">Я не вернусь в свою убогую комнатушку. Поживу немного в отеле и подыщу маленькую квартирку поближе к Таймс-сквер.</p><p class="p1">Я диктую это и чувствую себя несравненно лучше, чем раньше, хотя и плохо понимаю, что делаю на борту самолета с Элджерноном, сидящим под креслом в обувной коробке. Нельзя впадать в панику. Ошибка Немура не обязательно должна быть серьезной. Просто все вдруг стало таким неопределенным… Но что же делать?</p><p class="p1">Первым делом найду родителей. И поскорее. Может, у меня значительно меньше времени, чем мне казалось…</p></span>
