<p class="p">атчет 4</p>
</div><p class="p1">Севодня у меня был другой дурацкий тест на случай если я им падайду. Этоже самое место но другая маленькая комнатка. Леди каторая там была сказала мне ево название и я спросил как оно пишеца штобы записать в атчет. Тематический апперцептический тест. Я не знаю двух первых слов но я знаю што такое тест. Ево нужно сделать ато палучиш плохую атметку.</p><p class="p1">С начала я думал этот тест лехкий потомушто я видил картинки. Только на этот рас она не хотела штобы я гаварил што вижу я со всем запутался. Я сказал ей вчера Барт сказал што я должен сказать што я вижу в чирнилах. Она сказала этот тест другой. Ты должен придумать истории про людей в картинках.</p><p class="p1">Я сказал как я могу расказывать про людей каторых не знаю. Она сказала а ты претворись а я сказал это будет вранье. Я ни когда больше не вру потомушто когда я был маленький я врал и меня за это били. У меня в бумажнике есть картинка меня и Нормы и дяди Германа каторый устроил меня в пикарню прежде чем помер.</p><p class="p1">Я сказал што могу расказать истории про них потомушто долго жыл с ними но леди и слышать про них не хотела. Она сказала што этот тест и другой для тово штобы палучить мою личность. Я смиялся. Я сказал как можно палучить эту штуку из листов на каторые пролили чирнила и фатографий людей каторых я не знаю. Она расердилась и забрала картинки. Мне напливать.</p><p class="p1">Мне кажеца я и этот тест не сделал.</p><p class="p1">Патом я рисовал ей картинки но я плохо рисую. Патом пришол Барт в белом халате ево зовут Барт Селдон. Он атвел меня в другое место на томже 4 итаже уневерсетета Бекмана каторое называеца лабалатория психалогии. Барт сказал психалогия азначяет мозги а лабалатория азначяет где они делают кспирименты. Я думал это жвачка но теперь мне кажеца это игры и загатки потомушто мы это делали.</p><p class="p1">Я не мог сделать галаваломку патамушто она была вся сломана и кусочки не лезли в дырки. Одна игра была бумага с разными линиеми на одной старане было СТАРТ а на другой ФИНИШ. Барт сказал што эта игра называеца ЛАБЕРИНТ и я должен взять карандаш и идти от туда где СТАРТ туда где ФИНИШ и не пересекать линий.</p><p class="p1">Я не понел и мы испортили кучю бумаги. Тогда Барт сказал я пакажу тебе коешто идем в кспириментальную лабалаторию может ты поймеш. Мы паднялись на 5 итаж в другую комнату где было много клеток и жывотных. Там были абизьяны и мышы. Там был чюдной запах как на старой памойке и много людей в белых халатах каторые играли с ними и я падумал што это магазин но они не были пахожы на пакупатилей. Барт вынул из клетки белую мыш и показал мне. Барт сказал это Элджернон и он здорово разбераеца в лаберинте. Я сказал пакажы мне как.</p><p class="p1">Он пустил Элджернона в большой ящик со стенками где было много изгибов и паваротов и СТАРТ и ФИНИШ как на бумаге и закрыл ево стеклом. Барт вынул часы и поднял дверь и сказал ну пашли Элджернон и мыш нюхнула 2 или 3 раза и пабежала. С начала она бежала прямо а когда увидила што не может бежать дальше вернулась от куда начала пасидела там шевилила усами а патом пабежала в другую сторону. Это было пахоже на то што Барт хотел штобы я сделал с линиеми на бумаге. Я засмиялся потомушто я думал мыш не сделает этово. Но Элджернон бежал как надо потомушто прибежал где написано ФИНИШ и запищял. Барт сказал што это он радуеца што сделал все как надо.</p><p class="p1">Ну и хитрущяя мыш сказал я.</p><p class="p1">Барт сказал хочеш пабегать на перегонки с Элджерноном. Я сказал конешно и он сказал што у нево есть другой лаберинт нарисованый на доске и с иликтрической палочкой как карандаш а лаберинт Элджернона он переделает и он будет как мой и мы будем делать одно и тоже.</p><p class="p1">Он переставил все стенки на столе у Элджернона они были разборные и приделал их подругому. Патом он поклал обратно стекло штобы он не мог прыгать через стенки прямо к ФИНИШУ. Патом он дал мне иликтрическую палочку и паказал как водить ей между линиеми и мне нельзя поднимать ее от доски пока мне не куда будет ее двигать или меня чютьчють не трехнет. Я старался не гледеть на нево и очень валнавался.</p><p class="p1">Когда он сказал пошол я не пошол патамушто не знал куда итти. Патом я услышел как Элджернон запищял из ящика и затопал как бутто уже бежал. Я двинул палочку но пошол не так потомушто застрял и меня трехнуло и я вернулся к СТАРТУ но каждый раз когда я шол другим путем я застревал и меня тресло. Это не больно я только чютьчють подпрыгивал а Барт сказал это паказывает што я пошол не верно. Я прошол половину доски и услышел как Элджернон пищит как бутто радуеца што выграл у меня.</p><p class="p1">Он выграл у меня еще 10 раз потомушто я не мог найти правельный путь к ФИНИШУ. Я не чуствовал себя плохо патамушто смотрел на Элджернона и понел как притти к ФИНИШУ даже если это очень долго.</p><p class="p1">Не знал я што мышы такие умные.</p></span>
