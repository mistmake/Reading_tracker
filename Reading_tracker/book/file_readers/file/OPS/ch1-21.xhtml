<span id="id17"><div class="title1">
<p class="p">Отчет № 17</p>
</div><p class="subtitle">3 октября</p><p class="p1">Все быстрее вниз под уклон. Появляются мысли о самоубийстве, чтобы остановить падение, пока я еще могу контролировать свое поведение и осознавать окружающий мир. Но тут я вспоминаю ждущего у окна Чарли. Я не могу распоряжаться <em>его</em> жизнью. Я всего лишь ненадолго одолжил ее, и теперь меня просят вернуть долг.</p><p class="p1">Нельзя забывать, что я — единственный, с кем случалось подобное. До последнего момента я буду записывать свои мысли и чувства. Это подарок человечеству от Чарли Гордона.</p><p class="p1">Я стал злым и раздражительным. Поссорился с соседями из-за того, что допоздна не выключаю проигрыватель. Я часто так делаю с тех самых пор, как перестал играть на рояле. Конечно, я не прав, что постоянно кручу пластинки, но музыка не дает мне спать. Я знаю, что должен иногда спать, но дорожу каждой секундой бодрствования. Это не только из-за кошмаров, но и потому, что я боюсь поглупеть во сне.</p><p class="p1">Не устаю напоминать себе, что высплюсь, когда на меня падет тьма.</p><p class="p1">Мистер Вернор, сосед снизу, никогда раньше не жаловался на шум, но в последнее время взял привычку колотить по трубам отопления или в потолок своей квартиры. Поначалу я игнорировал эти звуки, но вчера ночью он явился ко мне в халате. Мы поругались, и я захлопнул дверь перед его носом. Через час он вернулся с полицейским, и тот объяснил мне, что не следует заводить пластинки так громко в четыре часа ночи. Ухмылка на физиономии Вернора была настолько отвратительной, что я с трудом удержался, чтобы не ударить его. Когда они ушли, я разбил все пластинки, а заодно и проигрыватель. Все равно такая музыка мне совсем не нравится.</p><p class="subtitle">4 октября</p><p class="p1">Самый непонятный сеанс терапии в моей жизни. Штраус явно не ожидал этого и здорово разозлился.</p><p class="p1">То, что произошло (я не осмеливаюсь назвать это воспоминанием), больше всего походило на галлюцинацию. Не буду пытаться объяснить или интерпретировать этот случай, просто опишу его.</p><p class="p1">В кабинет Штрауса я вошел в состоянии легкого раздражения, но он притворился, что не заметил этого. Я сразу улегся на кушетку, а он, как водится в таких случаях, уселся на стул сбоку от меня и чуть-чуть сзади, как раз вне пределов видимости. Сел и стал ждать, когда же я начну лить на него скопившиеся в моем мозгу нечистоты.</p><p class="p1">Я украдкой посмотрел на Штрауса. Он выглядел постаревшим, каким-то потасканным и напомнил мне Матта, ждущего посетителей. Я сказал об этом Штраусу. Он кивнул и продолжал ждать. Тогда я спросил:</p><p class="p1">— А <em>вы</em> тоже ждете клиентов? Вам следовало бы сконструировать кушетку в форме парикмахерского кресла. Когда речь зайдет о свободных ассоциациях, вам надо будет только откинуть кресло с пациентом назад, как парикмахеру, когда он собирается намылить жертву. Проходит пятьдесят минут, кресло возвращается в исходное положение, и вы вручаете бедняге зеркало, чтобы он мог как следует рассмотреть свое свежевыбритое «я».</p><p class="p1">Штраус молчал, и хотя мне было стыдно за свое словоблудие, я уже не мог остановиться:</p><p class="p1">— Потом пациент перед каждым сеансом будет говорить: «Снимите немного с верхушки волнения, пожалуйста» или «Не стригите мой эгоизм слишком коротко». Он может попросить даже яич… я имел в виду я-шампунь. Ага! Заметили оговорку, доктор? Я сказал, что нужен яичный шампунь вместо я-шампуня. Яйцо… Я. Близко, вам не кажется? Не означает ли это, что мне хочется отмыться от грехов? Возродиться? Что это? Баптистский символизм? Или все же мы стрижем слишком коротко?</p><p class="p1">Я ждал его реакции, но он только поерзал в кресле.</p><p class="p1">— Вы не уснули? — спросил я.</p><p class="p1">— Я внимательно слушаю, Чарли.</p><p class="p1">— Только слушаете? Вам случалось когда-нибудь выходить из себя?</p><p class="p1">— А тебе этого очень хочется?</p><p class="p1">Я вздохнул.</p><p class="p1">— Непоколебимый Штраус… Вот что я вам скажу: мне надоело таскаться сюда. Какой смысл в терапии? Вам не хуже меня известно, что будет дальше.</p><p class="p1">— Мне почему-то не кажется, что наши сеансы тебе надоели, — сказал Штраус.</p><p class="p1">— Но это же глупо! Пустая трата времени, и моего, и вашего!</p><p class="p1">Я лежал в полутемной комнате и разглядывал квадратики, которыми был выложен потолок — звуконепроницаемые панели, тысячами дырочек впитывающие каждое слово. Звук, похороненный заживо…</p><p class="p1">В голове вдруг образовалась пустота. Мозг опустел, и это было необычно, потому что во время таких сеансов мне всегда находилось что сказать. Сны… воспоминания… проблемы… ассоциации…</p><p class="p1">А сегодня — только дыхание Непоколебимого Штрауса позади меня.</p><p class="p1">— Я очень странно себя чувствую, — сказал я.</p><p class="p1">— Расскажешь мне?</p><p class="p1">О, как он блестящ, как искусен! Какого черта я приперся сюда? Чтобы мои ассоциации поглощались маленькими дырочками в потолке и огромными дырами в моем терапевте?</p><p class="p1">— Не уверен, хочется ли мне говорить об этом… Непонятно почему, но сегодня я чувствую враждебность к вам… — И тут я выдал Штраусу все, что я о нем думаю.</p><p class="p1">Даже не видя Штрауса, я догадывался, как он задумчиво кивает головой.</p><p class="p1">— …Это трудно объяснить, — продолжал я, — такое у меня бывало всего один или два раза, перед тем как я терял сознание. Головокружение… Все чувства обострены до предела… Конечности немеют…</p><p class="p1">— Продолжай! — Теперь его голос был резким и взволнованным. — Что еще?</p><p class="p1">— Я не чувствую своего тела. Кажется, что Чарли где-то рядом. Мои глаза открыты… Я уверен в этом… Они открыты?</p><p class="p1">— Да, широко открыты.</p><p class="p1">Из стен и потолка исходит голубовато-белое сияние… оно собирается в мерцающий шар… Висит в воздухе… Свет… Он впивается в глаза… в мозг… все сверкает… Я плыву… нет, я расширяюсь… Я не смотрю вниз, но знаю, что лежу на кушетке. Что это — галлюцинация?</p><p class="p1">— Чарли, что с тобой?</p><p class="p1">Не это ли описывают в своих сочинениях мистики?</p><p class="p1">Я слушаю голос Штрауса, но не хочу отвечать. Меня раздражает его присутствие. Не буду обращать на него внимания. Успокойся и дай <em>этому</em>, чем бы оно ни было, наполнить меня светом, поглотить меня…</p><p class="p1">— Что ты видишь, Чарли? Да что с тобой?!</p><p class="p1">Я лечу вверх, словно подхваченный потоком теплого воздуха листочек. Ускоряясь, атомы моего тела разлетаются в разные стороны. Я становлюсь легче и больше… больше… Взрываюсь и превращаюсь в солнце. Я — расширяющаяся вселенная, всплывающая в спокойном море. Тело мое поглощает комнату, здание, город, страну… Если я посмотрю вниз, то увижу, как тень моя затмевает планету.</p><p class="p1">Вот-вот я прорву оболочку существования, словно рыба, выпрыгивающая на поверхность океана, но тут начинаю чувствовать, как что-то тянет меня вниз.</p><p class="p1">Я разозлился и хочу стряхнуть с себя невидимые путы. На грани полного единения со Вселенной я слышу вокруг себя шепот. Он зовет меня вниз, в мир смертных. Волны медленно опадают, мой непомерно разросшийся дух возвращается в земные измерения — отнюдь не добровольно, я предпочел бы потеряться, — но потому, что меня тянут вниз… к себе… в себя, и через мгновение я снова лежу на кушетке, натягивая перчатку своего бренного тела на пальцы сознания. Если я захочу, то смогу поднять руку или подмигнуть — но только если захочу. Однако я не хочу! Я не сдвинусь с места!</p><p class="p1">Я лежу и жду. Чарли не хочет, чтобы я раздвинул занавес мозга. Чарли не желает знать, что скрывается за ним.</p><p class="p1">Неужели он боится увидеть Бога?</p><p class="p1">Или он боится не увидеть <em>ничего</em>?</p><p class="p1">Я лежу, жду, момент самосознания проходит, и опять я теряю ощущение собственного тела: Чарли втягивает меня в себя. Я смотрю внутрь, в центр невидимого, на красную точку, и она превращается в цветок со множеством лепестков — мерцающий, клубящийся, светящийся цветок, растущий в глубине моего подсознания.</p><p class="p1">Я уменьшаюсь. Это не сближение атомов моего тела — это сплавление, словно атомы моего «я» соединяются в микрокосм. Будет страшная жара и непереносимо яркий свет — ад внутри ада, — но я не смотрю на свет, только на цветок, <em>не</em>умножающееся, <em>не</em>разделяющееся создание одного из многого. На мгновение мерцающий цветок превращается в золотистый диск, кружащийся на нитке, потом в клубок радужных струй… Вот наконец я снова в пещере, где тихо и темно. Я плыву по лабиринту в поисках того, кто примет… обнимет… поглотит меня… в самого себя.</p><p class="p1">Это я и начинаю.</p><p class="p1">В глубине я снова вижу свет, отверстие в темнейшей из пещер, крошечное и очень далекое, словно видимое не в тот конец телескопа — ослепительное, слепящее, блестящее, а потом снова многолепестковый цветок (кружащийся лотос — он плавает неподалеку от входа в бессознательность). У входа в эту пещеру я найду ответ, если осмелюсь вернуться туда и броситься в заполненный светом грот.</p><p class="p1"><em>Пока нет!</em></p><p class="p1">Я боюсь. Ни жизни, ни смерти, ни пустоты, но открытия того, что меня никогда не было. И когда я начинаю двигаться, то чувствую, как давление окружает меня, толкая волнообразными судорогами к отверстию. Оно слишком маленькое! Я не пройду сквозь него!</p><p class="p1">Внезапно меня начинает бить о стены, снова и снова, и проталкивает туда, где свет грозит выжечь мне глаза. Я знаю, что смогу пронзить покрывающую святое сияние пелену. Но это больше, чем я в состоянии вынести. Боль, какой я еще не знал, холод, тошнота, невыносимое гудение над головой, похожее на хлопанье тысяч крыльев. Я открываю ослепшие глаза, размахиваю руками, дрожу и кричу.</p><p class="empty-line"/><p class="p1">Из этого состояния я вышел, только ощутив, как меня грубо и настойчиво трясет чья-то рука. Доктор Штраус.</p><p class="p1">— Слава богу, — прошептал он, когда я осмысленно поглядел на него. — Я не знал, что делать.</p><p class="p1">— Со мной все в порядке.</p><p class="p1">— Хватит на сегодня.</p><p class="p1">Я встал и покачнулся. Кабинет показался мне очень маленьким.</p><p class="p1">— Да, хватит, и не только на сегодня. Навсегда.</p><p class="p1">Доктор Штраус, конечно, расстроился, но не стал переубеждать меня. Я надел пальто и вышел.</p><p class="subtitle">5 октября</p><p class="p1">Печатание на машинке стало вызывать у меня затруднения, а думать вслух перед включенным магнитофоном я не умею. Я долго откладывал написание этого отчета, пока не решил, что это важно и я не сяду ужинать, не написав чего-нибудь. Чего угодно.</p><p class="p1">Утром снова прибыл посыльный от профессора Немура. Он хотел, чтобы я пришел в лабораторию и сделал несколько тестов, тех же самых, что и раньше. Сначала мне показалось, что так и надо — ведь они до сих пор платят мне деньги, да и эксперимент нужно закончить. Но когда я явился в университет и начал работать с Бартом, то понял, как это стало невыносимо.</p><p class="p1">Первым был нарисованный лабиринт. Я помнил, как легко решал такие задачки, когда соревновался с Элджерноном, и ясно почувствовал, насколько медленнее я все это делаю сейчас.</p><p class="p1">Барт протянул руку за листком, но я порвал его и бросил клочки в корзину для мусора.</p><p class="p1">— Хватит. Пора кончать с лабиринтами. Меня занесло в тупик — вот и все.</p><p class="p1">Барт испугался, что я сейчас уйду, и стал уговаривать меня:</p><p class="p1">— Не надо так, Чарли, успокойся.</p><p class="p1">— Что ты имеешь в виду, говоря мне «успокойся»? Ты не понимаешь, что происходит со мной?</p><p class="p1">— Нет, но могу себе представить. Нам всем очень плохо.</p><p class="p1">— Прибереги сочувствие для кого-нибудь другого.</p><p class="p1">Он смутился, и только тут до меня дошло, что это совсем не его вина.</p><p class="p1">— Прости… Как твои дела? Закончил диплом?</p><p class="p1">Он кивнул.</p><p class="p1">— Его сейчас перепечатывают. В феврале получу своего доктора философии.</p><p class="p1">— Примерный мальчик! — я похлопал его по плечу, показывая, что не злюсь больше. — Копай глубже. Ничего нет лучше образования. Забудь, что я тут наговорил, я сделаю все, что ты попросишь. Кроме лабиринта.</p><p class="p1">— Немур просил проверить тебя по Роршаху.</p><p class="p1">— Решил заглянуть в самые дебри? И что же он надеется там найти?</p><p class="p1">Наверно, вид у меня был печальный, и Барт дал задний ход:</p><p class="p1">— Не хочешь, не надо. В конце концов, никто тебя не заставляет…</p><p class="p1">— Ладно, поехали. Только потом не говори мне, чем все кончилось.</p><p class="p1">Ему и не пришлось.</p><p class="p1">Я часто проходил этот тест и понимал, что экспериментатора интересует не то, что ты видишь на карточках, а то, как ты <em>воспринимаешь</em> их: как единое целое или как сумму составляющих, в движении или статично, обращаешь ли внимание на цветовые пятна или игнорируешь их, разнообразны ли ответы или сводятся к нескольким стереотипам. Я сказал:</p><p class="p1">— Вряд ли ты сможешь многое почерпнуть. Я же знаю, как следует отвечать <em>мне</em>, чтобы создать определенное впечатление у <em>тебя</em>. Остается только…</p><p class="p1">Барт молча смотрел на меня.</p><p class="p1">— Мне остается только…</p><p class="p1">И тут меня словно кувалдой ударило — я не помнил, что нужно делать. Ощущение было такое, будто я только что видел перед собой написанный на школьной доске текст, но стоило мне отвернуться на секунду, как некоторые слова стерли, а остальные без них потеряли всякий смысл.</p><p class="p1">Сначала я не поверил сам себе. В панике я быстро перебрал карточки, и мне захотелось разорвать их и узнать, что же там, внутри. Где-то в этих чернильных пятнах таились ответы, которые я только что знал… Нет, не в пятнах, а в той части моего мозга, которая придавала им форму, значение и проецировала их обратно на листки.</p><p class="p1">Я не мог сделать этого. Я не мог вспомнить, что нужно говорить. Все ушло. Я промямлил:</p><p class="p1">— Это женщина… Она стоит на коленях и моет пол… Нет, это мужчина с ножом… — Тут я понял, куда меня заносит, и быстро переключился: — Две фигурки… Они тянут что-то… Каждый к себе… похоже на куклу… Они сейчас разорвут ее пополам… Нет! Я хотел сказать, что это два лица… Они смотрят друг на друга через стекло… и…</p><p class="p1">Я смахнул карты со стола и встал.</p><p class="p1">— Никаких тестов. Больше не будет никаких тестов.</p><p class="p1">— Хорошо, Чарли. Давай прекратим.</p><p class="p1">— Ты меня не понял. Я больше не собираюсь приходить сюда. Все, что тебе нужно, придется брать из моих отчетов. Никаких лабиринтов, я не морская свинка. Я достаточно потрудился и хочу, чтобы меня оставили в покое.</p><p class="p1">— Конечно, Чарли. Я понимаю.</p><p class="p1">— Ничего ты не понимаешь, потому что происходит это не с тобой. Понять могу только я сам. Но ты тут ни при чем. У тебя есть работа, нужно получить степень… Только не надо ничего говорить мне, я и так знаю, что ты занимаешься этим исключительно из любви к человечеству. У тебя впереди жизнь, которую нужно прожить. Получилось так, что мы с тобой живем на разных этажах. Я проскочил твой этаж по пути наверх, а теперь проезжаю его по дороге вниз. Почему-то мне кажется, что я уже никогда больше не воспользуюсь этим лифтом. Так что давай распрощаемся навсегда.</p><p class="p1">— Может, тебе стоит поговорить с доктором…</p><p class="p1">— Скажи всем от меня «до свидания», договорились? Мне не хочется больше никого видеть.</p><p class="p1">Прежде чем Барт успел ответить или остановить меня, я вышел из лаборатории, поймал идущий вниз лифт и в последний раз вышел из университета Бекмана.</p><p class="subtitle">7 октября</p><p class="p1">Сегодня утром ко мне заходил Штраус, но я не впустил его. Мне хочется побыть одному.</p><p class="p1">Я беру книгу, которой наслаждался всего несколько месяцев назад, и обнаруживаю, что ничего про нее не помню. Странное ощущение. Вспоминаю, как восхищался Мильтоном. Но когда я взял с полки «Потерянный рай», то припомнил только Адама, Еву и древо познания.</p><p class="p1">Закрыл глаза и увидел Чарли — себя. Ему шесть или семь лет, он сидит за столом перед раскрытым учебником. Он учится читать, а мама сидит рядом с ним, рядом со мной…</p><p class="p1">— Повтори!</p><p class="p1">— Смотри Джек смотри Джек бежит. Смотри Джек смотри.</p><p class="p1">— Нет! Не «Смотри Джек смотри», а «смотри Джек бежит»! — и тычет в слово загрубевшим от стирки пальцем.</p><p class="p1">— Смотри Джек. Смотри Джек бежит. Бежи Джек смотри́т.</p><p class="p1">— Нет! Ты не стараешься! Повтори!</p><p class="p1">…Повтори… повтори… повтори…</p><p class="p1">— Отстань от ребенка. Он тебя боится.</p><p class="p1">— Ему нужно учиться. Он слишком ленив!</p><p class="p1">…Беги Джек беги… беги Джек беги… беги Джек беги…</p><p class="p1">— Просто он усваивает все медленнее, чем остальные дети. Не торопи его.</p><p class="p1">— Он совершенно нормален. Только ленив! Я вобью ему в голову все, что нужно!</p><p class="p1">…Беги Джек беги… беги Джек беги… беги Джек беги…</p><p class="p1">А потом, подняв глаза от стола, я увидел себя взором Чарли, держащего в руках «Потерянный рай», и осознал, что стараюсь разорвать обложку книги. Я оторвал одну половину, вырвал несколько страниц и швырнул все вместе в угол, где уже лежали разбитые пластинки. Они лежали там, и белые языки страниц смеялись надо мной, потому что я не мог уразуметь, что они хотели мне сказать.</p><p class="p1">Если бы мне удалось удержать хоть часть того, чем я еще владею! Боже, не забирай от меня <em>все</em>!</p><p class="subtitle">10 октября</p><p class="p1">По вечерам я обычно выхожу прогуляться но городу. Без всякой цели. Просто поглядеть на незнакомые лица. Вчера вечером я не смог вспомнить, где живу. Домой меня проводил полицейский, и, кажется, все это уже случалось — очень давно. Мне не хотелось записывать это и пришлось напомнить себе, что я — единственный во всем мире, кто может описать подобное состояние.</p><p class="p1">Казалось, я не иду, а плыву в пространстве, но не ярком и четком, а пронизанном всепоглощающей серостью. Я сознаю это, но ничего не могу с собой поделать. Я шагаю, а иногда просто стою на тротуаре и всматриваюсь в лица прохожих. Некоторые из них поглядывают на меня, некоторые — нет, но никто не заговорил со мной, если не считать одного типа, спросившего, не требуется ли мне девушка. Он куда-то отвел меня и попросил в задаток десять долларов. Я дал, и он бесследно исчез.</p><p class="p1">И только тогда до меня дошло, какой же я дурак.</p><p class="subtitle">11 октября</p><p class="p1">Вернувшись утром домой, я обнаружил там спящую на диване Алису. Кругом сияла чистота, и поначалу мне показалось, что я попал не в свою квартиру. Потом я заметил, что она не тронула кучу разбитых пластинок, разорванных книг и нот в углу. Скрипнула половица. Алиса проснулась и увидела меня.</p><p class="p1">— Привет, сова!</p><p class="p1">— Я не сова, я додо. Глупый додо. Как ты сюда попала?</p><p class="p1">— По пожарной лестнице, из квартиры Фэй. Я позвонила ей и спросила про тебя, и она сказала, что ты странно себя ведешь — со всеми ссоришься. Мне пришла в голову мысль навестить тебя… Я прибрала тут немного. Надеюсь, ты ничего не имеешь против?</p><p class="p1">— Имею, и очень много. Мне противно, когда меня жалеют!</p><p class="p1">Алиса подошла к зеркалу и принялась расчесывать волосы.</p><p class="p1">— Я здесь не потому, что мне жалко тебя. Мне жалко себя.</p><p class="p1">— Что ты хочешь этим сказать?</p><p class="p1">— Хочу сказать… — она в раздумье пожала плечами. — Это… это как в поэме. Мне захотелось увидеть тебя.</p><p class="p1">— Так почему ты не пошла в зоопарк?</p><p class="p1">— Не надо так, Чарли, прошу… Я долго ждала тебя и вот… решила прийти сама.</p><p class="p1">— Зачем?</p><p class="p1">— Еще есть время, и я хочу провести его с тобой.</p><p class="p1">— Как в песне?</p><p class="p1">— Не смейся надо мной, Чарли.</p><p class="p1">— Я не смеюсь. Просто я не могу позволить себе тратить время на кого-то другого. Мне его и самому не хватает.</p><p class="p1">— Я не верю, что ты так страстно желаешь одиночества.</p><p class="p1">— Именно этого мне хочется больше всего.</p><p class="p1">— Мы так мало были вместе… Нам было о чем поговорить и было, чем заняться. Пусть и недолго, но наше время <em>было</em>! Ведь мы же знали, что может случиться, это ни для кого не было секретом. Чарли, я не отвергла тебя, я просто ждала. Хоть теперь-то мы на одном уровне?</p><p class="p1">Я метался по квартире.</p><p class="p1">— Но это же безумие! У нас нет никакого будущего! Я не осмеливаюсь загадывать вперед, я вспоминаю только прошлое! Через несколько месяцев, недель, дней — кто знает! — я отправлюсь в Уоррен. Ты же не пойдешь туда за мной?</p><p class="p1">— Нет, — согласилась Алиса. — И навещать тебя я скорее всего тоже не буду. Я постараюсь забыть тебя и не хочу притворяться, что поступлю иначе. Но пока ты здесь, нет причин терпеть одиночество.</p><p class="p1">Она поцеловала меня прежде, чем я успел что-нибудь сказать. Мы сели рядом на диван. Я ждал, но паника не приходила. Да, Алиса — женщина, но, может быть Чарли понял наконец, что она ему не мать и не сестра.</p><p class="p1">Я вздохнул с облегчением, как выздоравливающий после тяжелой болезни, потому что теперь ничто не могло остановить меня. Не время для страха и притворства — <em>так</em> у меня не могло получиться больше ни с кем на свете. Все барьеры рухнули. Я размотал нить, которую вручила мне Алиса, выбрался из лабиринта, а у выхода ждала меня <em>она</em>. Я люблю ее.</p><p class="p1">Не буду притворяться, будто знаю, что такое любовь, но то, что произошло, было больше, чем секс. Меня словно подняло над землей, выше всяких страхов и пыток, я стал частью чего-то большего, чем я сам. Меня вытащили из темницы собственного разума, и я стал частью другого существа. Пронзенная лучом света растаяла окутывавшая мой мозг серая пелена. Как странно, что свет может ослеплять…</p><p class="p1">Мы любили друг друга. Ночь постепенно превратилась в тихий день. Я лежал рядом с Алисой и размышлял о том, как важна физическая любовь, как необходимо было для нас оказаться в объятиях друг друга, получая и отдавая. Вселенная расширяется — каждая частичка удаляется от другой, швыряя нас в темное и полное одиночества пространство, отрывая нас: ребенка от матери, друга — от друга, направляя каждого по собственной тропе к единственной цели — смерти в одиночестве.</p><p class="p1">Любовь — противовес этому ужасу, любовь — акт единения и сохранения. Как люди во время шторма держатся за руки, чтобы их не оторвало друг от друга и не смыло в море, так и соединение наших тел стало звеном в цепи, удерживающей нас от движения в пустоту.</p><p class="p1">Прежде чем заснуть, я вспомнил интрижку с Фэй, и улыбнулся про себя. Как там все было просто! Да и не удивительно…</p><p class="p1">Я приподнялся на локте и поцеловал закрытые глаза Алисы.</p><p class="p1">Теперь она знает обо мне все, в том числе и то, что вместе мы пробудем недолго. Она согласна уйти в тот момент, когда я попрошу ее. Думать об этом тяжело, но то, что мы обрели, — это больше того, чем большинство человечества владеет за всю свою жизнь.</p><p class="subtitle">14 октября</p><p class="p1">Я просыпаюсь по утрам, долго не могу понять, где я и что тут делаю, потом вижу Алису и вспоминаю. Она чувствует, что со мной не все в порядке, и старается производить как можно меньше шума, занимаясь обыденными делами, — готовит завтрак, заправляет постель. Иногда она уходит и оставляет меня одного.</p><p class="p1">Вечером мы пошли на концерт, но мне стало скучно, и мы ушли, не дождавшись конца. Не могу сосредоточиться на музыке.</p><p class="p1">Вообще-то я пошел только потому, что когда-то мне нравился Стравинский, но на этот раз у меня просто не хватило терпения.</p><p class="p1">Теперь, когда Алиса рядом, я чувствую, что просто обязан бороться с <em>этим</em>. Мне хочется остановить время, заморозить себя на одном уровне и никуда не отпускать любимую.</p><p class="subtitle">17 октября</p><p class="p1">Почему я ничего не помню? Алиса говорит, что я целыми днями лежу в постели и ей кажется, что я не понимаю, кто я такой. Потом сознание возвращается, я узнаю ее и вспоминаю, что происходит. Первые ростки тотальной амнезии. Симптомы второго детства — как его называют? — маразм? Он надвигается.</p><p class="p1">В этом есть жесточайшая, неумолимая логика. Результат искусственного ускорения происходящих в мозгу процессов. Я быстро постиг многое и столь же быстро деградирую. А что, если я не поддамся? Если начну бороться за себя? Мне вспоминаются пациенты лечебницы в Уоррене — бессмысленные улыбки, пустые глаза…</p><p class="p1">Маленький Чарли Гордон смотрит на меня из окна. Он ждет. Господи, только не это!</p><p class="subtitle">18 октября</p><p class="p1">Начал забывать то, что узнал совсем недавно. Классический образец — недавнее забывается легче всего.</p><p class="p1">Перечитал свою статью «Эффект Элджернона — Гордона». Знаю, что написал ее именно я, но все равно кажется, что это был кто-то другой. Я в ней почти ничего не понял.</p><p class="p1">Но почему я стал таким раздражительным? Особенно когда Алиса рядом? Она поддерживает в квартире чистоту и порядок, всегда убирает мои вещи, моет тарелки и скребет полы. Нельзя было так кричать на нее утром. Она плакала, а мне этого совсем не хочется. Она не имела права убирать разбитые пластинки, ноты и книги, не имела права аккуратно складывать их в ящик. Я разозлился не на шутку. Не хочу, чтобы кто-то прикасался к ним. Желаю видеть их всегда перед собой, как напоминание о том, <em>что</em> оставляю позади. Я перевернул ящик, раскидал все обрывки по полу и запретил Алисе прикасаться к ним.</p><p class="p1">Глупо. Для этого нет никакой причины. Думается, взорвался я потому, что знал, что она думает, что глупо хранить все это барахло, и не сказала мне ни слова. Она притворилась, что все совершенно нормально. Она ублажает меня. Увидев этот ящик, я вспомнил того парня в Уоррене, сделанную им дурацкую лампу и как мы все говорили, что лампа просто замечательная. Ублажали его.</p><p class="p1">Вот что она делает со мной, а этого я вынести уже не могу.</p><p class="p1">Когда она ушла в спальню и заплакала, мне стало совсем плохо. Я сказал, что это я один виноват, что не заслуживаю ее. Ну почему я не могу контролировать себя хоть настолько, чтобы продолжать любить Алису? Хоть настолько…</p><p class="subtitle">19 октября</p><p class="p1">Координация движений никуда не годится. Все время спотыкаюсь и роняю вещи. Сначала мне казалось, что это Алиса виновата — переставляет все подряд. То мне под ноги попадется корзина для мусора, то кресло…</p><p class="p1">Нет, дело во мне самом… Передвигаться приходится все медленнее, печатать на машинке все труднее. Алиса не виновата, но почему она не спорит со мной? Написанная на ее лице жалость раздражает меня еще больше.</p><p class="p1">Единственное развлечение теперь — телевизор. Я сижу перед ним сутками напролет и смотрю все подряд — старые вестерны, мыльные оперы и даже мультики. Я просто не могу заставить себя выключить его. Поздно вечером начинаются мелодрамы, потом — фильмы ужасов, потом — передачи для тех, кто не спит и кто совсем не спит. Перед тем как канал со вздохом закрывается на ночь, — маленькая проповедь, потом — гимн на фоне развевающегося звездно-полосатого флага… И наконец — сетка, глядящая на меня сквозь маленькое квадратное окошко…</p><p class="p1">Почему я все время смотрю на жизнь сквозь оконное стекло?</p><p class="p1">Потом я начинаю злиться на себя, ведь мне осталось так мало времени, чтобы написать что-нибудь, почитать или просто подумать. Зачем я оглупляю себя всей этой белибердой, предназначенной для того ребенка, что сидит во мне. Особенно, если ребенок этот требует, чтобы я вернул ему разум.</p><p class="p1">Все это я прекрасно понимаю, но когда Алиса говорит, что я зря теряю время, я свирепею и кричу, чтобы она оставила меня в покое.</p><p class="p1">Очевидно, любовь к телевизору возникла как следствие нежелания думать, вспоминать пекарню, маму, папу, Норму. Я больше не желаю помнить прошлое.</p><p class="p1">Сегодня ужасный день. Мне захотелось еще раз просмотреть работу, выводами которой я не без успеха пользовался в своих исследованиях, «Über Psychische Ganzheit» Крюгера. С ее помощью я надеялся разобраться в собственной статье. Сначала мне показалось, что что-то не в порядке с моими глазами. Потом я понял, что не могу читать по-немецки. Проверил остальные языки. Все забыл.</p><p class="subtitle">21 октября</p><p class="p1">Ушла Алиса. Посмотрим, смогу ли я вспомнить… Началось, когда она сказала, что не может жить в таком свинарнике.</p><p class="p1">— Лучше оставь все как есть, — предупредил я.</p><p class="p1">— Неужели тебе это нравится?</p><p class="p1">— Просто мне хочется, чтобы все лежало так, как оставил <em>я</em>, мне необходимо видеть все это сразу. Ты представить себе не можешь, что это такое — сознавать, что в тебе происходит нечто, чего нельзя ни увидеть, ни проконтролировать, и все утекает сквозь пальцы.</p><p class="p1">— Ты прав. Я и не говорила, что могу понять происходящее с тобой — ни когда ты был слишком умен для меня, ни теперь. Послушай-ка, что я тебе скажу. До операции ты не был таким. Ты не валялся в собственной грязи, не жалел самого себя, не засорял мозг бесконечным сидением перед телевизором, не огрызался и не рычал на людей. В тебе было что-то, что вызывало уважение — да, да, уважение! Такого я у слабоумных прежде никогда не встречала.</p><p class="p1">— Я ни капли не жалею о том, что случилось.</p><p class="p1">— Я тоже, но ты многое потерял. У тебя была улыбка…</p><p class="p1">— Пустая и глупая!</p><p class="p1">— Нет, настоящая, теплая улыбка! Ведь ты хотел нравиться людям.</p><p class="p1">— Конечно, хотел, а они разыгрывали меня, издевались…</p><p class="p1">— Пусть ты не понимал, почему им весело, но чувствовал, что если они смеются, значит, ты можешь понравиться им. Твоим единственным желанием было нравиться людям! Ты вел себя как ребенок и веселился вместе с ними.</p><p class="p1">— Сейчас у меня нет такого желания.</p><p class="p1">Алиса изо всех сил старалась не разрыдаться. Полагаю, мне именно этого и хотелось.</p><p class="p1">— Может, поэтому мне и было так важно поумнеть. Казалось, это заставит людей любить меня, стать моими друзьями… Смешно?</p><p class="p1">— Высокий КИ — не самое главное в жизни.</p><p class="p1">Я разозлился. Наверно, оттого, что никак не мог понять, куда клонит Алиса. В последние дни она все чаще говорила загадками, намеками, словно ожидая, что я пойму ее с полуслова. Я слушал, притворялся, что понимаю, но в глубине души боялся, что она раскусит меня.</p><p class="p1">— Тебе пора уходить.</p><p class="p1">Она покраснела.</p><p class="p1">— Еще рано, Чарли. Не прогоняй меня.</p><p class="p1">— Твое присутствие делает мою жизнь невыносимой. Ты притворяешься, будто я все еще могу делать и понимать вещи, давно забытые мной. Совсем как мама…</p><p class="p1">— Неправда!</p><p class="p1">— Это проявляется во всем. В том, как ты подбираешь и подтираешь за мной, как оставляешь на видных местах книги, которые могли бы заинтересовать меня, как рассказываешь новости в надежде вызвать меня на обсуждение. Ты как была учительницей, так и осталась. Я не хочу больше ходить в музеи и на концерты, не хочу делать ничего, что заставило бы меня как-то бороться и думать!</p><p class="p1">— Чарли…</p><p class="p1">— Просто уйди. Оставь меня одного. Я — это уже не я. Я разваливаюсь на части, и ты не нужна мне.</p><p class="p1">Тут Алиса не выдержала и наконец разрыдалась. Днем она собрала вещи и ушла. Квартира стала тихой и пустой.</p><p class="subtitle">25 октября</p><p class="p1">Дела идут все хуже и хуже. Отказался от пишущей машинки — координация никуда. Теперь отчеты придется писать вручную. Я много думал о словах Алисы, и до меня внезапно дошло, что если бы я продолжал читать и запоминать что-то <em>новое</em>, даже при том условии, что забывается старое, мне удалось бы удержать часть разума. Эскалатор идет вниз. Если я буду стоять на одной ступеньке, наверняка спущусь до самого дна. Если побегу вверх, то не исключено, что останусь на том же самом месте. Значит — вверх, чего бы это ни стоило.</p><p class="p1">Я пошел в библиотеку и набрал уйму книг. Большинство из них не понятны, но мне все равно. Пока я буду читать их, я по крайней мере не разучусь читать. Это самое главное. Читай, Чарли, может, и удержишься…</p><p class="p1">На следующий день после ухода Алисы явился доктор Штраус, значит, она рассказала ему про меня. Он притворился, будто ему нужны только отчеты, и я сказал, что пришлю их. Мне не хочется, чтобы он приходил ко мне. Я попросил его не беспокоиться обо мне и добавил, что когда почувствую, что не в состоянии заботиться о себе, сяду на поезд и отправлюсь в Уоррен.</p><p class="p1">Хотел поговорить с Фэй, но она боится меня. Решила, наверно, что я сошел с ума. Вчера ночью она кого-то привела — мне он показался очень молодым.</p><p class="p1">Утром хозяйка, мисс Муни, принесла мне горячего куриного супа. Она сказала, что заглянула ко мне просто узнать, все ли в порядке. Я ответил, что у меня полно еды, но она все равно оставила суп. Он был очень вкусный. Мисс Муни притворилась, будто решила зайти сама, но я еще не настолько поглупел. Это ее Алиса или Штраус попросили. Ну и ладно. Она — приятная пожилая леди с ирландским акцентом и любит поговорить о жильцах. Она заметила, в какую свалку я превратил квартиру, но ничего не сказала.</p><p class="subtitle">1 ноября</p><p class="p1">Целую неделю не мог заставить себя писать. Не понимаю куда уходит время. Сегодня воскресенье я знаю потому что вижу в окно как люди идут в церковь через дорогу. Мне кажется я пролежал в постели целую неделю но помню что миссис Муни несколько раз приносила мне еду и спрашивала не заболел ли я.</p><p class="p1">Что мне с собой делать? Я не могу болтаться тут совсем один и смотреть в окно. Нужно взять себя в руки. Я твержу себе снова и снова что нужно что то сделать а потом забываю или может быть легче просто ничего не делать когда я говорю себе что нужно сделать.</p><p class="p1">У меня все еще много библиотечных книг, но я почти ничего в них не понимаю. Я читаю сейчас много детективов и книг про королей и королев из старых времен. Я прочитал книгу про человека который думал что он рыцарь и поехал с другом на старой лошади. Что бы он ни делал всегда оставался побитым. Даже когда подумал что мельницы это драконы. Сначала мне показалось что это глупая книга потому что если бы он не был чокнутым то не принял бы мельницы за драконов и знал бы что не существует волшебников и заколдованных замков но потом вспомнил что все это должно означать еще что-то — про что не пишется в книге а только намекается. Тут есть еще значение. Но я не знаю какое. Я разозлился потому что раньше знал. Я продолжаю читать и каждый день узнаю что то новое и знаю это поможет мне.</p><p class="p1">Нужно писать отчеты чтобы в лаборатории знали что происходит со мной. Но писать все труднее и труднее. Даже простые слова приходится искать в словаре и я от этого злюсь.</p><p class="subtitle">2 ноября</p><p class="p1">Вчера я забыл на писать про женщину которая жывет в доме на против на один этаж ниже. Я увидел ее из окна кухни на прошлой неделе. Я не знаю как ее зовут и даже как выгледит ее верхняя часть но каждый вечер около одинацати она входит в ванную и моеца под душем. Она ни когда не задергивает занавеску и из моево окна когда гашу свет я вижу ее от шеи в низ когда она вытираеца полотенцем.</p><p class="p1">Мне интересно но когда леди гасит свет мне становица тоскливо и одиноко. Мне хочеца увидеть какое у нее лицо красива она или нет. Я знаю что не хорошо под сматривать за женщинами но ни чево не могу с собой поделать. Какая разница если она не знает что я смотрю.</p><p class="p1">Уже почти одинацать. Пора. Пойду по смотрю.</p><p class="subtitle">5 нояб</p><p class="p1">Мисис Муни беспокоица про меня. Она сказала то как я лежу целыми днями и ни чево не делаю на поминает ей ее сына как раз перед тем как он вы бросился из окна. Она сказала ей не нравяца лентяи. Если я болею это одно дело а если без дельничаю это совсем другое и я ей такой не нужен Я сказал мне кажеца я за болел.</p><p class="p1">Я стараюсь а не могу читать расказы но иногда мне приходица читать ево снова и с нова я ни как не могу понять про што он. И трудно писать. Я знаю што нужно сматреть слова в словаре но я все время усталый.</p><p class="p1">Мне пришла мысль што надо пользаца маленькими словами а не длиными. Это бережет время. На улице становица холодно но я все равно ложу цветы на могилку Элджернона. Мисис Муни думает это глупо ложыть цветы на могилку мышы но я сказал ей што Элджернон был особеный мыш.</p><p class="p1">Я хотел сходить к Фэй но она сказала уходи и не вазвращяйся. Она вставила в дверь новый замок.</p><p class="subtitle">9 нояб</p><p class="p1">С нова воскресенье. Мне со всем не чево делать потомушто телевизор с ломался а я забыл вы звать мастера. Кажеца я потерял последний чек из колежа. Не помню.</p><p class="p1">У меня ужастно болит галава и асперин со всем не памагает. Мисис Муни теперь и в правду думает што я болен и она желеет меня. Она чюдесная женщина когда кто то болеет. На улице со всем холодно и мне приходица одевать два свитера.</p><p class="p1">Леди на против стала за дергивать занавеску и мне ни чево не видно. Не везет.</p><p class="subtitle">10 нояб</p><p class="p1">Мисис Муни привела ко мне чюдново доктора. Она боялась што я помру. Я сказал ему што не со всем болен а просто забывчив. Он спросил есть у меня друзья или родствиники а я сказал нет у меня ни ково нет. Я сказал ему што у меня был друг Элджернон и мы с ним бегали на пере гонки. Он по смотрел на меня как бутто я чокнулся.</p><p class="p1">Я сказал ему што был гением а он улыбнулся он гаварил со мной как с ребенком и под мигивал мисис Муни. Я расирдился потомушто он издивалси над мной вы гнал ево и запер дверь.</p><p class="p1">Мне кажеца я знаю по чему мне не везет. Это потомушто я по терял заечью лапку и подкову. Нужно до быть новую.</p><p class="subtitle">11 нояб</p><p class="p1">Севодня док Штраус при ходил и Алиса то же а я не в пустил их. Я сказал им што я не хочю ни ково видить. Я хочю быть один. Потом мисис Муни пре несла еду и она сказала мне што они за платили ренту и оставили ей денег што бы платить за еду и купить мне што нужно. Я сказал ей што больше не хочю пользоваца ихними деньгами. Она сказала деньги есть деньги и кто то должен платить а то я вы селю тебя. Потом она сказала найди себе работу в место штобы болтаца без дела.</p><p class="p1">Я не знаю ни какой работы кроме што я делал в пикарне. Я не хочю вазвращяца туда потомушто они знают што я был умный и будут смияца над мной. Я не знаю што ещо делать штобы за работать деньги а я хочю платить за все сам. Я сильный и могу работать. Если я не с могу заботица про себя сам то у еду в Уоррен. Не хочю ни от ково благо тварительность.</p><p class="subtitle">15 нояб</p><p class="p1">Хотел по читать свои старые отчеты и это страно но я не могу читать што на писал. Я могу разобрать не которые слова но они ни чево не значют. Мне кажеца это я их на писал но я не помню. Когда я стараюсь читать книги которые купил в аптеке то с разу устаю. Кроме тех где есть картинки с красивыми девушками. Мне нравица смотреть на них но потом у меня чюдные сны. Это не хорошо. Не буду больше их покупать. Я про читал што сделали валшебный парашок от которого человек делаеца сильным и умным и может сделать много всево. Может я про дам кое што и куплю не много ево себе.</p><p class="subtitle">16 нояб</p><p class="p1">Алиса снова при ходила а я сказал уходи я не хочю тебя видить. Она плакала и я плакал то же но я не пустил ее потому што не хотел штобы она смиялась над мной. Я сказал ей она мне больше не нравица и я не хочю быть умным с нова. Это не правда Я все ещо люблю ее и все ещо хочю быть умным но я сказал так штобы она у шла. Мисис Муни сказала мне Алиса при несла денег штобы заботица про меня и на ренту. Я не хочю этово. Нужно найти работу.</p><p class="p1">Пожалуста… ну пожалуста… пусть я не за буду как читать и писать…</p><p class="subtitle">18 нояб</p><p class="p1">Мистер Доннер очень удивился когда я пришол к нему и по просил старую работу. С начала он был подо зрителен а потом я расказал ему про што со мной было и он стал печальный положыл мне руку на плечо и сказал Чярли ты просто молодец.</p><p class="p1">Все смотрели на меня когда я с пустился в низ и начял мыть сортир как раньше. Я сказал себе Чярли если они будут смияца над тобой не абращяй внимания потомушто они не такие уш умники как тебе казалось с начала. И ещо они были раньше твои друзья и если и смиялись над тобой то это потомушто ты им нравился.</p><p class="p1">Один из новых который пришол работать сюда после тово как я ушол ево зовут Майер Клаус сделал с мной плохую вещ. Он поднялся ко мне на верх когда я грузил мешки с мукой и сказал эй Чярли я слышал ты головатый парень — прям гений. Скажы штонибудь умное. Мне стало обидно потомушто я видел што он смиеца над мной. Так што я про должыл работать. Но потом он подо шол блиско и крепко с хватил меня за руку и за орал на меня. Когда я гаварю с тобой щинок ты лутше слушай меня. Или я с ломаю тебе руку. Он вывернул мне руку мне стало очень больно и я ис пугался што он с ломает ее как сказал. А он смиялся и вы ворачивал ее а я не знал што делать. Мне было страшно и думал што заплачю но не заплакал и мне стало нужно в сортир потомушто в жывоте у меня все за крутилось и я падумал што сичас взарвусь потомушто я не мог у держаца.</p><p class="p1">Я сказал ему пожалуста пустите меня потомушто мне нужно в сортир а он все смиялся а я не знал што делать. Я заплакал. Пустите меня. Пустите меня. А потом я сделал в штаны и за вонял и плакал. Он пустил меня лицо у нево пере касилось и он сказал бог мой Чярли я не хотел ни чево таково.</p><p class="p1">Пришол Джо Карп с хватил Клауса за рубаху и сказал от стань от нево а то я с верну тебе шейю ты вшывый ублюдок. Чярли атличный парень и ни кто не будет из деваца над ним без наказано. Мне было стыдно и я по бежал почистица и пере одеца.</p><p class="p1">Когда я вернулся пришол Фрэнк и Джимпи и Джо расказал им и они сказали надо гнать Клауса к чортовой матери. Они хотели сказать мистеру Доннеру штобы он выгнал ево. Я сказал им не нужно вы гонять ево потомушто у нево жена и рибенок. Я сказал надо дать Клаусу шанс потомушто теперь он не сделает мне ни чево плохово.</p><p class="p1">Потом Джимпи при хромал ко мне на деревяной ноге и сказал Чярли если кто будет при ставать к тебе скажы мне Джо или Фрэнку и мы при ведем тово в чуство. Мы все хотим штобы ты помнил што у тебя есть здесь друзья и ни когда не забывай этово. Я сказал спасибо Джимпи. Мне хорошо.</p><p class="p1">Как здорово когда у тебя есть друзья.</p><p class="subtitle">21 нояб</p><p class="p1">Я севодня сделал глупую штуку я забыл што я не хожу к мис Кинниан в центр для взрослых как раньше. Я пришол сел на старое место и она чюдно по смотрела на меня и сказала Чярли где ты был. А я сказал привет мис Кинниан я готов учица только я по терял книшку.</p><p class="p1">Она за плакала и у бежала из класа и все стали гледеть на меня и я увидил што почти все они не из моево класа.</p><p class="p1">Тут я с разу вспомнил коешто про апирацыю и как я был умным и сказал ну и штука каково Чярли Гордона я от мочил. Я ушол пока она ещо не вернулась.</p><p class="p1">По этому я уежаю на всегда в Уоррен. Не хочю с нова быть глупым. Я не хочю штобы мис Кинниан желела меня. Я знаю што в пикарне то же все желеют меня и я уежаю туда где много таких людей как я и ни ково не валнует што Чярли Гордон раньше был гений а сичас не может читать книгу.</p><p class="p1">Я возьму пару книг с собой пусть я не могу читать я буду трудица и может даже стану чютьчють умнее чем был до апирацыи без апирацыи. У меня есть новая заечья лапка и щесливое пенни и даже асталось не много волшебного парашка и может они по могут мне.</p><p class="p1">Мис Кинниан если вы про читаете это не желейте меня. Я рат што у меня был второй шанс как вы сказали я был умным и вы учил уйму всево чево я не знал што есть на свете и я рат што кое што по видал. Хорошо што я вспомнил про маму и папу и Норму и про себя. Ведь было как бутто у меня не было семьи пока я не вспомнил про них и увидил их и сичас я знаю што у меня были родные и я был человек как все.</p><p class="p1">Я не знаю пачиму я с нова стал глупым или што я сделал не так как надо. Может это по тому што я не очень старался или кто то с глазил меня. Но если я буду трудица как следует может я стану умнее и у знаю што азначяют все слова. Я помню как здорово было читать галубую книгу с порваной аблошкой. А когда я за крываю глаза я думаю про человека каторый по рвал аблошку и он пахош на меня только он вы гледит и гаварит по другому и мне кажеца што это не я потомушто я в роде как вижу ево из окна.</p><p class="p1">Чесное слово я буду стараца стать умным штобы мне с нова стало харошо. Как здорово знать и быть умным и я хочю знать все в мире. Я хочю стать умным с разу. Если бы я мог я сидел бы и читал все время.</p><p class="p1">Спорим што я первый слабо умный в мире каторый сделал кое што важное для науки. Я сделал штото я не помню што. Мне кажеца я сделал это для всех людей таких как я.</p><p class="p1">Прощяйте мис Кинниан и док Штраус и все все.</p><p class="p1">P.S. Пожалуста скажите профу Немуру штобы он не абижался когда люди смиюца над ним и тогда у нево будет много много друзей. Очень легко иметь друзей если раз ришаеш смияца над собой. Там где я буду жыть у меня будет много друзей.</p><p class="empty-line"/><p class="p1">P.S. Пожалуста если с можите положыте на могилку цветы для Элджернона. На заднем дворе.</p></span>
