<span id="id14"><div class="title1">
<p class="p">Отчет № 14</p>
</div><p class="subtitle">15 июня</p><p class="p1">Наше бегство из Чикаго стало настоящим подарком для бульварных газет. «Дейли пресс» поместила на второй странице мою старую фотографию и рисунок белого мышонка. Заголовок гласил: «Идиот-гений и мышь безумствуют». Немуру и Штраусу приписали слова, что в последнее время я находился в постоянном напряжении, но что я, несомненно, скоро вернусь. За Элджернона они предложили пятьсот долларов награды, им и в голову не приходило, что мы вместе.</p><p class="p1">Дойдя до пятой страницы, я был потрясен, увидев фотографию матери и сестры. Какой-то хваткий репортер добрался-таки до них.</p><div class="cite">
<p class="subtitle"><strong>СЕСТРА НЕ ЗНАЕТ, ГДЕ НАХОДИТСЯ ИДИОТ-ГЕНИЙ</strong></p>
<p class="subtitle">(Специально для «Дейли пресс»)</p>
<p class="p1">Бруклин, Нью-Йорк, 14 июня. Мисс Норма Гордон, проживающая со своей матерью, Розой Гордон, в 4136, Марк-стрит, Бруклин, сказала, что ей ничего не известно о брате. Она заявила: «Мы ничего не слышали про него целых семнадцать лет». Мисс Гордон считала, что ее брат умер, пока в марте психолог из университета Бекмана не попытался получить у нее разрешение на использование Чарли для некоего эксперимента. «Мать сказала мне, что его отослали в Уоррен (Государственная лечебница и специальная школа, Уоррен, Лонг-Айленд) и что он умер там несколько лет спустя. Я и понятия не имела, что он еще жив».</p>
<p class="p1">Мисс Гордон просит каждого, кому известно что-нибудь о ее брате, сообщить ей об этом по указанному адресу. Отец, Мэтью Гордон, живет отдельно от семьи. Он владелец парикмахерской в Бронксе.</p>
</div><p class="p1">Я перечитал заметку несколько раз, а потом долго смотрел на фотографию. Как описать их?</p><p class="p1">Я не помню лица Розы. Несмотря на довольно высокое качество снимка, она все еще видится мне сквозь вуаль детства. Да, я знаю ее и в то же время совсем не знаю. Я не узнал бы ее на улице, зато теперь вспомнил все до мелочей — да!</p><p class="p1">Преувеличенно тонкие черты лица. Острый нос, острый подбородок. Я почти слышу ее голос, похожий на крик чайки. Волосы стянуты в тугой узел. Она пронзает меня взглядом черных глаз. Мне хочется, чтобы она обняла меня и сказала, что я хороший мальчик, и в то же время боюсь не увернуться от пощечины. От одного ее вида меня бросает в дрожь.</p><p class="p1">Норма. Миловидна, черты лица не так заострены, но все равно очень похожа на мать. Волосы до плеч смягчают образ. Они сидят на диване в гостиной.</p><p class="p1">Фотография Розы всколыхнула пугающие воспоминания. Она была для меня двумя разными людьми, и я никогда не знал, кем из них она станет в следующую секунду. Норма прекрасно знала признаки надвигающегося шторма и всегда ухитрялась в нужный момент оказаться вне пределов досягаемости, но меня буря всегда застигала врасплох. Я шел к ней за утешением, а она срывала на мне злобу.</p><p class="p1">В следующий раз она была воплощенная теплота и нежность, она гладила мои волосы, прижимала к себе и произносила слова, высеченные над вратами моего детства:</p><p class="empty-line"/><p class="p1"><em>Он совсем как другие дети!</em></p><p class="p1"><em>Он хороший мальчик!</em></p><p class="empty-line"/><p class="p1">Фотография растворяется у меня перед глазами, я смотрю сквозь нее и вижу себя и отца склонившимися над детской кроваткой. Он держит меня за руку и говорит: «Вот она. Осторожнее, ведь она совсем еще крошка. Она вырастет и будет играть с тобой».</p><p class="p1">Тут и мама. Она лежит рядом, на огромной кровати, изможденная и бледная, руки безжизненно брошены на одеяло: «Следи за ним, Матт…».</p><p class="p1">Это было еще до того, как она изменила свое отношение ко мне, и теперь мне понятно, почему это произошло — мама не знала, будет похожа на меня Норма или нет. Потом, когда она уверилась, что ее молитвы не пропали даром и Норма развивается нормально, голос ее зазвучал по-другому. Не только голос, но и взгляд, прикосновение — изменилось все. Словно ее магнитные полюса поменялись местами и тот, что притягивал, начал отталкивать. В нашем саду расцвела Норма, и я превратился в сорняк, имеющий право расти только там, где его не видно, — в темных углах.</p><p class="p1">Я вглядываюсь в ее лицо, и в душе растет ненависть. Если бы только она не слушала врачей, учителей и всех прочих, торопившихся убедить ее, что я идиот от рождения! Она не отвернулась бы от меня, не стала давать мне любви меньше когда мне требовалось ее как можно больше. А теперь? Зачем она нужна мне теперь? Что она может рассказать о себе? Но все равно, мне интересно.</p><p class="p1">Поговорить с ней и узнать, каким я был в детстве? Или забыть ее? Стоит ли прошлое того, чтобы знать его? Почему для меня важнее всего на свете сказать ей: «Посмотри на меня, мама. Я — другой. Я нормальный. Я — больше чем обычный человек. Я — гений!»</p><p class="p1">Мне хочется забыть её, но воспоминания сочатся из прошлого, черня и пачкая настоящее… Еще одна сцена, но я намного старше.</p><p class="p1">Ссора.</p><p class="p1">Чарли лежит в постели, одеяло натянуто до подбородка. В комнате темно, если не считать узкой полоски света из-за приоткрытой двери, пронзающей тьму и соединяющей два мира. Он слушает, не понимая слов, но зная, откуда взялся металлический скрежет в голосах родителей. Они говорят о нем. С каждым днем этот тон все больше и больше ассоциируется у него с брезгливой гримасой.</p><p class="p1">Чарли уже засыпал, когда тихий разговор, доносившийся до него по лучу света, внезапно превратился в ссору. Голос матери резок и визглив, это голос женщины, привыкшей добиваться своего при помощи истерик.</p><p class="p1">— Его необходимо отослать! Я больше не хочу видеть его рядом с Нормой! Позвони доктору Портману и скажи, что мы решили отдать его в Уоррен.</p><p class="p1">Голос отца тверд:</p><p class="p1">— Но ты же знаешь, что Чарли не сделает ей ничего плохого. В таком возрасте ей все равно.</p><p class="p1">— Откуда ты знаешь? Может, ребенку вредно расти в одном доме с… с таким, как он!</p><p class="p1">— Доктор Портман сказал…</p><p class="p1">— Портман сказал! Портман сказал! Плевать мне на Портмана! Представь, каково ей будет иметь такого брата! Все эти годы я надеялась, что он вырастет и станет человеком. Я ошиблась. Ему самому будет лучше без нас!</p><p class="p1">— Появилась Норма, и ты решила, что Чарли тебе больше не нужен…</p><p class="p1">— Думаешь, мне легко? Все твердили мне, что его нужно убрать. Те, кто говорил это, оказались правы. Уберем его. Может быть, там, рядом с такими же… как он, у него начнется другая жизнь. Я больше не знаю, что правильно, а что нет, но я не намерена приносить ему в жертву свою дочь.</p><p class="p1">И хотя Чарли не понимает, что происходит, ему страшно. Он лежит с открытыми глазами, стараясь пробить окружающую его тьму.</p><p class="p1">Я вижу его. Он боится как-то не по-настоящему, он просто отпрянул назад, как птица или белка при резком движении кормящей их руки. Мне хочется утешить притаившегося под одеялом Чарли, сказать ему, что он не сделал ничего плохого, что не в его силах заставить маму снова полюбить его. Тогда Чарли не понимал, что происходит, но теперь… как мне больно! Если бы можно было вернуться в прошлое, я заставил бы ее понять, как мне больно…</p><p class="p1">Я не тороплюсь к ней. У меня еще есть время решить этот вопрос для себя.</p><p class="p1">К счастью, я успел снять со счета в банке все свои сбережения, как только вернулся в Нью-Йорк. На восемьсот восемьдесят шесть долларов долго не протянешь, но на них можно купить немного времени и определиться. Поселился в отеле «Кэмден» на Сорок первой улице, через квартал от Таймс-сквер, Нью-Йорк! Чего я только не наслышался о нем! Гнездо разврата… бурлящий котел… Багдад-на-Гудзоне. Город цвета и света. Трудно представить, что почти всю жизнь я провел рядом с Таймс-сквер и побывал там всего один раз. С Алисой.</p><p class="p1">Едва удерживаюсь, чтобы не позвонить ей. Несколько раз уже начинал набирать номер. Держись от нее подальше.</p><p class="p1">Слишком много спутанных мыслей просится на бумагу. Я твержу себе, что пока записываю отчеты на магнитофон, ни одно откровение не пропадет для потомства. А они… Пускай побудут в темноте еще немного — я прожил во тьме больше тридцати лет.</p><p class="p1">Устал. Я не спал в самолете, и теперь глаза сами закрываются. Завтра начну с этого же места.</p><p class="subtitle">16 июня</p><p class="p1">Сегодня позвонил Алисе, но повесил трубку прежде, чем она ответила. Нашел меблированную квартиру. Девяносто пять долларов в месяц это больше, чем я планировал, зато она расположена на углу Девяносто третьей и Десятой авеню и за десять минут я могу добраться до библиотеки. Нельзя отставать от жизни. Квартира на четвертом этаже, четыре комнаты и пианино. Хозяйка сказала, что на днях его увезут, но я постараюсь научиться играть на нем.</p><p class="p1">Элджернон — приятный компаньон. Он ест за маленьким столиком и очень любит печенье. А вчера, когда мы смотрели футбол по телевизору, он даже глотнул пива. Кажется, он болеет за «Янки».</p><p class="p1">Собираюсь освободить вторую спальню и целиком отдать ее Элджернону. Я построю там трехмерный лабиринт из отходов пластика, их можно достать чуть ли не даром. Лабиринт будет посложнее прежних — Элджернону тоже нужно поддерживать форму. Надо только найти другую мотивацию, не пищевую. Должны же существовать и другие награды, способные побудить его к действию.</p><p class="p1">Одиночество позволяет мне спокойно думать, читать и копаться в воспоминаниях — заново открывать мое прошлое, узнать наконец кто я такой. Если все пойдет вкривь и вкось, пусть хотя бы прошлое останется со мной.</p><p class="subtitle">19 июня</p><p class="p1">Познакомился с Фэй Лилман, соседкой по лестничной клетке. Вернувшись домой с полными сумками овощей, я обнаружил, что забыл ключ, а дверь захлопнута. Потом я вспомнил, что пожарная лестница соединяет мою гостиную и квартиру точно напротив.</p><p class="p1">…По радио гремела музыка, и я постучал, сперва осторожно, потом погромче.</p><p class="p1">— Входите! Дверь не заперта!</p><p class="p1">Я толкнул дверь и замер: стоя перед мольбертом, что-то рисовала стройная блондинка в розовом лифчике и трусиках.</p><p class="p1">— Прошу прощения! — выдохнул я, закрывая дверь. Очутившись снова на площадке, я закричал: — Я ваш сосед! Не могу открыть дверь и хотел по пожарной лестнице пробраться к себе!</p><p class="p1">Дверь квартиры распахнулась, и она появилась передо мной — все еще в белье, с кистью в каждой руке.</p><p class="p1">— Ты что, не слышал, как я сказала «заходите»? — Она жестом пригласила меня зайти и ногой отодвинула картонную коробку с мусором, стоявшую в прихожей.</p><p class="p1">Я подумал, что она или не сознает, или просто забыла, что раздета, и не знал, куда девать глаза. Я смотрел на стены, на потолок — куда угодно, только не на нее.</p><p class="p1">Такого беспорядка, как у нее в квартире, я еще никогда и нигде не видел. В комнате стояла дюжина маленьких складных столиков, и на всех валялись тюбики с краской — одни выжаты досуха и сплющены, словно сброшенная змеиная кожа, другие еще истекали цветными лентами. Повсюду раскиданы кисти, банки, тряпки, куски картона, обрывки холста. В ноздри бил смешанный запах краски, олифы и скипидара. Три мягких кресла и ядовито-зеленая софа были завалены кучами разнообразнейшей одежды, а на полу валялись туфли и чулки, словно у хозяйки была привычка раздеваться на ходу и швырять вещи куда попало. Все покрывал тонкий слой пыли.</p><p class="p1">— Так, значит, вы — мистер Гордон, — произнесла она, в упор разглядывая меня. — Мне страсть как хотелось хоть одним глазком посмотреть на вас. Садитесь. — Она схватила ворох одежды с одного из кресел и перекинула его на софу. — Решили наконец навестить соседей… Что будете пить?</p><p class="p1">— А вы, значит, художница… — пробормотал я, чтобы хоть что-нибудь сказать. Меня нервировала мысль о том моменте, когда она наконец поймет, что не одета, и с визгом кинется в спальню. Мои глаза тщательно избегали ее.</p><p class="p1">— Пиво? Эль? Больше ничего нет, разве кроме соуса шерри. Вы ведь не хотите соуса?</p><p class="p1">— К сожалению, я спешу, — произнес я, беря себя в руки и фиксируя взглядом родинку на левой стороне ее подбородка. — У меня захлопнулась дверь, и я хотел из вашего окна добраться по пожарной лестнице до своей квартиры.</p><p class="p1">— В любое время, — уверила она меня. — От этих паршивых патентованных замков одни неприятности. В первую неделю я три раза захлопывала себя, один раз полчаса простояла на площадке совсем голая. Выскочила забрать молоко, а проклятая дверь захлопнулась. Тогда я выдрала замок с корнем, а нового до сих пор не поставила.</p><p class="p1">Должно быть, у меня был глупый вид, потому что она вдруг рассмеялась.</p><p class="p1">— Эти замки, они только и делают, что защелкиваются, а защиты от них никакой. В этом проклятом доме за год было пятнадцать краж, и все из запертых квартир. Ко мне еще никто не вламывался, хотя дверь всегда открыта. Да и брать у меня нечего.</p><p class="p1">Она снова предложила мне пива, и я согласился. Пока она ходила за ним на кухню, я еще раз огляделся и заметил, что одна стена комнаты совсем очищена — мебель отодвинута, штукатурка содрана до голых кирпичей — и превращена в некое подобие картинной галереи. Она была увешана картинами до потолка и еще множество их стояло в несколько рядов на полу. Тут было несколько автопортретов, на которых художница изобразила себя обнаженной. Картина на мольберте, над которой она трудилась в момент моего появления, являла собой нагой поясной автопортрет. Волосы на нем были длинные, до плеч (не сегодняшняя короткая стрижка). Несколько прядей завились вперед и уютно устроились между грудей… Я услышал ее шаги, быстро отвернулся от мольберта, споткнулся о кипу книг на полу и притворился, что рассматриваю осенний пейзаж на стене.</p><p class="p1">Я с облегчением заметил, что она накинула на себя драный домашний халат, и хотя дырки на нем были в самых неподходящих местах, я смог наконец позволить себе посмотреть прямо на нее. Нельзя сказать, что красавица… Голубые глаза и упрямый вздернутый нос придавали ей некоторое сходство с кошкой, что вполне гармонировало с ее уверенными, спортивными движениями. Она была стройна, хорошо сложена, лет тридцати пяти. Поставив банки с пивом на пол, она уселась рядом с ними и пригласила меня сделать то же самое.</p><p class="p1">— Мне кажется, что на полу удобнее, чем в кресле. А вам?</p><p class="p1">Я сказал, что у меня еще не было случая задуматься над этим. Она улыбнулась и заметила, что у меня честное лицо. Она была расположена поговорить о себе:</p><p class="p1">— Избегаю Гринвич-Вилледжа. Там вместо того, чтобы писать, пришлось бы целыми днями торчать в барах и кафе. Здесь лучше, подальше от бездарей и дилетантов. Здесь я могу делать, что хочу, и никто не приходит ругать меня. Вы ведь тоже не злопыхатель?</p><p class="p1">Я пожал плечами, стараясь не обращать внимания на перепачканные пылью брюки.</p><p class="p1">— А мне кажется, что все мы все время критикуем кого-то. Вот вы, например, ругаете бездарей и дилетантов, правда?</p><p class="p1">Еще через несколько минут я сказал, что мне пора. Она оттащила от окна кучу книг, и я полез по газетам и мешкам с пивными бутылками.</p><p class="p1">— Скоро, — вздохнула она, — я их все сдам…</p><p class="p1">С подоконника я вылез на пожарную лестницу и, открыв свое окно, вернулся за овощами. Однако прежде чем я успел сказать «спасибо» и «до свидания», она полезла на лестницу вслед за мной.</p><p class="p1">— Позвольте взглянуть на вашу квартиру. Эти старухи сестры Вагнер, которые жили в ней до вас, даже не здоровались со мной.</p><p class="p1">Она уселась на мой подоконник.</p><p class="p1">— Заходите, — сказал я, раскладывая овощи на столе. — У меня нет пива, зато есть кофе.</p><p class="p1">Но она глядела мимо меня широко раскрытыми от удивления глазами.</p><p class="p1">— Бог мой! Никогда не видела такой чистоты! Кто бы мог подумать, что одинокий мужчина способен на такое!</p><p class="p1">— Ну, таким я был не всегда, — уверил ее я. — Когда я въехал сюда, квартира была чистой, и у меня появилось искушение оставить все в таком же виде. Теперь меня раздражает любой беспорядок.</p><p class="p1">Она слезла с подоконника и приступила к осмотру.</p><p class="p1">— Эй, — сказала она вдруг, — ты любишь танцевать? Знаешь… Она вытянула руки и, напевая какую-то латиноамериканскую мелодию, сделала несколько замысловатых па. — Скажи, что умеешь, и я взовьюсь к потолку!</p><p class="p1">— Только фокстрот, да и то не очень…</p><p class="p1">— Я помешана на танцах, но никто из моих знакомых, из тех, что мне нравятся, не умеет. Когда совсем тоска одолевает, я наряжаюсь и хожу в зал «Звездная пыль». Парни там жутковатые, но танцевать мастера.</p><p class="p1">Она вздохнула и еще раз внимательно огляделась вокруг.</p><p class="p1">— Знаешь, что мне не нравится в твоей идеальной квартире? Как художнику… Линии, вот что бесит меня! Они все прямые — пол, стены, потолок, углы — как в гробу. Единственный выход — немного выпить. Тогда линии начинают изгибаться и извиваться и мир кажется мне лучше, чем он есть на самом деле. Мне не по себе, когда все вокруг прямое и ровное. Ух! Живи я здесь, мне постоянно пришлось бы ходить под хмельком.</p><p class="p1">Внезапно она повернулась и посмотрела мне прямо в глаза.</p><p class="p1">— Одолжи пятерку до двадцатого. Получу алименты — отдам. Мне всегда хватает денег, но на прошлой неделе возникли кое-какие проблемы…</p><p class="p1">Я не успел ответить. Она взвизгнула и бросилась к стоящему в углу пианино.</p><p class="p1">— Я слышала, как ты тренькаешь на нем и подумала — вот парень что надо! Уже тогда мне захотелось познакомиться с тобой. Я так давно не играла… Она стала подбирать какую-то мелодию, а я отправился на кухню варить кофе.</p><p class="p1">— Можешь приходить и упражняться в любое время. — Не знаю, с чего это я стал так вольно обращаться со своим жилищем, но было в Фэй нечто, требующее полного отказа от самого себя. — Я еще не дошел до того, чтобы оставлять открытой входную дверь, но окно не закрывается, и, если меня нет дома, залезай в него. Тебе нужны сахар и сливки?</p><p class="p1">Не услышав ответа, я зашел в комнату. Фэй куда-то пропала, и когда я направился к окну, то услышал ее голос из комнаты Элджернона:</p><p class="p1">— Это еще что такое?</p><p class="p1">Она стояла перед сооруженным мной лабиринтом.</p><p class="p1">— Современная скульптура! Ящики, гробы и прямые линии!</p><p class="p1">— Это специальный лабиринт, — объяснил я. — Обучающее устройство для Элджернона.</p><p class="p1">Но она продолжала возбужденно бегать вокруг него.</p><p class="p1">— Его надо показать в Музей современного искусства!</p><p class="p1">— Это не скульптура! — не сдавался я, открывая дверцу клетки и выпуская Элджернона в лабиринт.</p><p class="p1">— Боже мой! — прошептала она. — Скульптура с <em>одушевленным элементом</em>! Чарли! Это величайшее произведение со времен разбитых автомобилей и приваренных друг к другу консервных банок!</p><p class="p1">Я открыл было рот, но она заявила, что одушевленный элемент введет это творение в Историю, и только заметив пляшущие в ее глазах огоньки, я понял, что она дразнит меня.</p><p class="p1">— Это можно классифицировать как самообновляющееся искусство. Своего рода созидательный подвиг. Достань еще одну мышь, и когда у них появятся маленькие, одушевленный элемент начнет воспроизводить сам себя. Твоя работа обретет бессмертие, и все бросятся доставать копии, чтобы было о чем поговорить. Как мы назовем это чудо?</p><p class="p1">— Ладно… — сказал я. — Сдаюсь!</p><p class="p1">— Ну нет! — фыркнула она, похлопывая по пластиковому куполу, внутри которого Элджернон уже нашел путь к цели. — «Сдаюсь» — уже приелось. Как насчет «Жизнь — ящик с лабиринтом»?</p><p class="p1">— Ты рехнулась, — сказал я.</p><p class="p1">— Ну конечно! — Фэй присела в реверансе. — Я все ждала, когда ты заметишь это.</p><p class="p1">Выпив полчашки кофе, она испуганно вскрикнула и сказала, что ей пора бежать, потому что вот уже полчаса, как она должна встретиться с кем-то на какой-то выставке.</p><p class="p1">— Тебе нужны деньги, — напомнил я.</p><p class="p1">Она взяла мой бумажник, открыла его и вытащила пятидолларовую купюру.</p><p class="p1">— До следующей недели, когда получу чек. Тысяча благодарностей!</p><p class="p1">Фэй скомкала бумажку, послала Элджернону воздушный поцелуй и, прежде чем я успел что-либо сказать, выскочила в окно и скрылась из виду.</p><p class="p1">Она ужасно привлекательна. Полна жизни и воображения. Голос, глаза все располагает к себе. И живет от меня-то всего через окно.</p><p class="subtitle">20 июня</p><p class="p1">Наверно, не стоило торопить встречу с Маттом. А может, и вовсе не стоило ходить к нему. Не знаю… Все получается не так, как хотелось бы. Я знал, что Матт открыл парикмахерскую где-то в Бронксе, и найти его не составило труда. Я помнил, что он работал продавцом в нью-йоркской кампании по торговле парикмахерскими принадлежностями. Это вывело меня на метро «Барбер Шоп», в чьих книгах значилось заведение на Уэнтворт-стрит, именуемое «Салон Гордона». Матт часто говорил о собственном деле. Как он ненавидел работу продавца! Какие битвы разгорались вокруг этого! Роза кричала, что продавец — все же уважаемая профессия и она не потерпит мужа-парикмахера. А Маргарет Финней, как будет она фыркать, выговаривая «жена парикмахера»! А Лу Мейнер, как <em>она</em> задерет нос!</p><p class="p1">Все эти годы, с ненавистью встречая каждый новый день, Матт мечтал о том времени, когда будет сам себе хозяином. Экономя деньги, он стриг меня сам. Уйдя от Розы, он бросил прежнюю работу, и я восхищаюсь им за это.</p><p class="p1">Мысль о предстоящей встрече с отцом взволновала меня. Воспоминания о нем согревали. Матт принимал меня таким, каким я был.</p><p class="p1">Споры… До Нормы: оставь его в покое и не заставляй равняться с другими ребятами! После Нормы: он имеет право на собственную жизнь, даже если не похож на остальных!</p><p class="p1">Он всегда защищал меня. Интересно, какое у него будет лицо, когда… С ним, с ним я смогу поделиться всем!</p><p class="p1">Уэнтворт-стрит в Бронксе явно переживала не лучшие времена. На большинстве контор и магазинов висела табличка «Сдается», остальные были просто закрыты. Но почти в самой середине улицы светилась вывеска парикмахерской.</p><p class="p1">Внутри было пусто, если не считать самого мастера, расположившегося с кучей журналов в ближайшем к окну кресле. Он посмотрел на меня, и я узнал Матта — крепкого и краснощекого, сильно постаревшего, с лысиной, обрамленной венчиком седых волос… Но все равно, это был Матт и никто иной. Заметив, что я не ухожу, он отбросил в сторону журнал.</p><p class="p1">— Ваша очередь, мистер!</p><p class="p1">Я помедлил, и он не понял меня.</p><p class="p1">— В этот час заведение обычно закрыто, мистер, вы правы. Просто не явился один постоянный клиент. Я было уже хотел совсем закрываться, вам повезло, что я на минутку присел отдохнуть. Лучшие прически в Бронксе!</p><p class="p1">Я позволил втащить себя внутрь, и он заметался, вытаскивая из ящиков ножницы, расчески, свежую простыню.</p><p class="p1">— Вы заметили, что все стерилизовано? Этого нельзя сказать об остальных парикмахерских по соседству… Постричь и побрить?</p><p class="p1">Я поудобнее устроился в кресле. Удивительно, я сразу узнал его, а он меня — нет. Пришлось напомнить себе, что мы не виделись почти пятнадцать лет, а в последние месяцы я изменился еще больше. Он накрыл меня полосатой простыней, внимательно посмотрел на меня в зеркало и нахмурился, как будто что-то вспоминая.</p><p class="p1">— Полная обработка, — сказал я, кивая на одобренный профсоюзом прейскурант, — шампунь, стрижка, бритье, загар…</p><p class="p1">Он поднял брови.</p><p class="p1">— Сегодня у меня встреча с человеком, которого я давно не видел, заверил я его, — и мне хочется быть в лучшем виде.</p><p class="p1">…Он снова стриг меня — пугающее ощущение. Потом он начал править бритву на ремне, и глухой свист стали по коже заставил меня вжаться в кресло. Под мягким нажимом его руки я откинул голову и почувствовал как лезвие скребет горло. Я закрыл глаза в ожидании… как будто снова очутился на операционном столе.</p><p class="p1">Мышцы на шее напряглись, безо всякого предупреждения дернулись, и лезвие порезало меня как раз над адамовым яблоком.</p><p class="p1">— Ой! — воскликнул он. — Боже мой! Успокойтесь, прошу вас, мне так жаль, но вы не предупредили…</p><p class="p1">Он быстро смочил полотенце в раковине. Я увидел в зеркале ярко-красный пузырь и тонкую струйку крови, ползущую от него вниз. Рассыпаясь в извинениях, Матт занялся раной, торопясь перехватить струйку, пока она не добралась до простыни.</p><p class="p1">Наблюдая за его ловкими и быстрыми движениями, я почувствовал себя виноватым. Мне захотелось сказать ему, кто я, и чтобы он положил мне руку на плечо и мы поговорили о добрых старых временах. Но я ничего не сказал, а он промокнул кровь и присыпал порез квасцами… Потом он молча добрил меня, включил кварцевую лампу и положил мне на глаза смоченные лосьоном кусочки ваты. И в ярко-красной тьме я увидел, что случилось в тот вечер, когда он увел меня из дома в последний раз…</p><p class="empty-line"/><p class="p1">Чарли спит, но просыпается от воплей матери. Обычно ссоры не мешают ему спать — они стали частью повседневной жизни. Но сегодня в этой истерике что-то особенно страшит. Он прислушивается…</p><p class="p1">— Я больше не могу! Он должен уйти! Подумай о дочери! Она каждый день приходит из школы в слезах, потому что ее дразнят! Мы не вправе лишать ее нормальной жизни!</p><p class="p1">— Чего ты хочешь? Выгнать Чарли на улицу?</p><p class="p1">— Убрать его отсюда. Отослать в Уоррен.</p><p class="p1">— Давай поговорим об этом утром.</p><p class="p1">— Нет! Ты ничего не делаешь, только говоришь, говоришь… Сегодня! Сейчас!</p><p class="p1">— Не глупи, Роза. Уже поздно… Твои вопли слышит вся улица!</p><p class="p1">— Плевать! Чтоб сегодня же его тут не было! Я больше не могу смотреть на него!</p><p class="p1">— Опомнись, Роза! Что ты говоришь!</p><p class="p1">— Слушай меня последний раз, убери его отсюда!</p><p class="p1">— Положи нож!!!</p><p class="p1">— Я не хочу портить Норме жизнь!</p><p class="p1">— Ты сошла с ума! Положи нож!</p><p class="p1">— Ему лучше умереть… Он никогда не станет человеком… Ему лучше…</p><p class="p1">— Ради бога, возьми себя в руки!!!</p><p class="p1">— Уведи его. Сейчас.</p><p class="p1">— Черт с тобой. Я отведу его к Герману, а завтра узнаю, как определить его в Уоррен.</p><p class="p1">Тишина. Потом голос Матта:</p><p class="p1">— Я знаю, чего тебе все это стоит, Роза, и не виню тебя. Но держи себя в руках. Я уведу его к Герману. Ты довольна?</p><p class="p1">— Именно об этом я и прошу. Твоя дочь имеет право на жизнь.</p><p class="p1">Матт заходит в комнату Чарли и одевает сына. Мальчик не понимает, что происходит, но ему страшно. Когда они проходят мимо Розы, та отворачивается. Она хочет убедить себя в том, что он уже ушел из ее жизни, перестал существовать. Чарли видит на столе длинный нож, которым она режет мясо, и смутно чувствует, что мама хотела сделать с ним что-то плохое. Она хотела что-то забрать от него и отдать Норме. Когда он оглядывается, Роза берет тряпку и начинает мыть раковину…</p><p class="empty-line"/><p class="p1">В конце концов со стрижкой, бритьем, кварцевой лампой и прочим было покончено, и я вяло сидел в кресле, чувствуя себя легким, скользким и чистым. Матт ловко сдернул с меня простыню и поднял второе зеркало, чтобы я смог рассмотреть свой затылок. Я увидел себя в заднем зеркале, глядящим в переднее, и на какое-то время оно оказалось под таким углом, что создало иллюзию глубины — бесконечного коридора меня самого, смотрящего на самого себя… на себя… на себя…</p><p class="p1">Который? Кто из них — я?</p><p class="p1">А что, если не говорить ему? Что хорошего принесет ему эта новость? Просто уйти, не сказав ни слова. Но ведь мне хотелось, чтобы он <em>знал</em>, что я жив, что я — <em>кто-то</em>, чтобы завтра он мог хвастать перед клиентами родством со <em>мной</em>. Это сделало бы мое существование <em>реальным</em>. Если он признает во мне сына, значит, я — личность.</p><p class="p1">— Вы прекрасно постригли меня, так может, теперь вспомните, кто я такой? — сказал я, вставая с кресла и стараясь поймать в его взгляде хотя бы намек…</p><p class="p1">Матт нахмурился:</p><p class="p1">— Как прикажете вас понимать? Это шутка?</p><p class="p1">Я уверил его, что это не розыгрыш, и если он посмотрит повнимательнее, то наверняка узнает меня. Он пожал плечами и принялся убирать со столика ножницы и расчески.</p><p class="p1">— У меня нет времени разгадывать головоломки, пора закрываться. С вас три пятьдесят.</p><p class="p1">Неужели он забыл меня? Неужели мечты останутся пустой фантазией? Он протянул руку за деньгами, а я не мог заставить себя сдвинуться с места.</p><p class="p1">Он <em>должен</em> вспомнить, <em>должен</em> узнать.</p><p class="p1">Но нет, конечно же нет… И когда я почувствовал горечь во рту и пот на ладонях, то понял, что через минуту мне станет плохо. В мои расчеты не входило, чтобы это случилось на его глазах.</p><p class="p1">— Эй, мистер, что с вами?</p><p class="p1">— Все в порядке… Подождите… — я наткнулся на хромированное кресло и, хватая ртом воздух, согнулся пополам. Господи, только не сейчас… Господи, не дай опозориться перед ним…</p><p class="p1">— Воды… пожалуйста… — нет, не пить, а только чтобы он отвернулся от меня…</p><p class="p1">Когда Матт принес стакан воды, мне уже стало лучше.</p><p class="p1">— Вот, выпейте, отдохните минуточку. Все будет хорошо.</p><p class="p1">Пока я пил, он не сводил с меня глаз, и я буквально чувствовал, как полузабытые воспоминания ворочаются у него в голове.</p><p class="p1">— Мы и в самом деле уже встречались?</p><p class="p1">— Нет… спасибо, я пойду.</p><p class="p1"><em>Как</em> сказать ему? <em>Что</em> сказать?</p><p class="p1">Эй, посмотри-ка на меня, это же я, Чарли, которого ты списал из своих бухгалтерских книг. Не то чтобы я виню тебя за это, но вот он я, меня сделали лучше, чем раньше. Проверь сам. Поспрашивай. Я говорю на двадцати живых и мертвых языках, я — гениальный математик, я сочиняю фортепианный концерт, который навеки оставит мое имя в памяти человечества.</p><p class="p1"><em>Как</em> сказать ему?</p><p class="p1">До чего же глупо выгляжу я, наверно, со стороны, сидя в занюханной парикмахерской и надеясь, что отец погладит меня по голове и скажет: «Хороший мальчик»… Как сияли его глаза, когда я научился завязывать шнурки и застегивать рубашку… За этим я сюда и пришел, но понял, что не получу ничего.</p><p class="p1">— Позвать доктора?</p><p class="p1">Нет, я не его сын. То был Чарли. Разум и знания сделали меня другим, и Матт обидится, как и те, в пекарне, ведь я перегнал его.</p><p class="p1">— Все прошло. Извините, что причинил вам столько неприятностей. Наверно, съел что-то… Вам пора закрываться.</p><p class="p1">Я направился к двери, но в спину мне вонзился резкий голос:</p><p class="p1">— Минуточку!</p><p class="p1">Я обернулся, он с подозрением смотрел на меня.</p><p class="p1">— Вы кое-что забыли.</p><p class="p1">— Не понимаю…</p><p class="p1">Рука его была вытянута вперед, большой палец терся об указательный.</p><p class="p1">— Три пятьдесят.</p><p class="p1">Я извинился, но он явно не поверил, что я просто-напросто забыл заплатить. Я дал ему пятерку, отказался от сдачи и не оглядываясь вышел на улицу.</p><p class="subtitle">21 июня</p><p class="p1">Я добавил временные ловушки ко все усложняющемуся лабиринту, но Элджернон прекрасно справляется и с ними. Оказывается, совсем не надо заманивать его едой, успешно решенная проблема сама по себе становится ему наградой.</p><p class="p1">Поведение его (Барт упоминал об этом на симпозиуме) стало непредсказуемым. Иногда он начинает злиться и бросаться на стенки лабиринта, а иногда сворачивается клубком и отказывается работать. Раздражение? Или что-то глубже?</p><p class="empty-line"/><p class="p1"><em>5.30.</em> Эта чокнутая Фэй сегодня утром влезла в окно и принесла с собой белую мышь женского пола, чтобы, как она выразилась, скрасить Элджернону одинокие летние ночи. Она отмела в сторону все мои возражения и решительно заявила, что Элджернону это ничего кроме пользы не принесет. Прежде всего я удостоверился, что Минни обладает крепким здоровьем и твердыми моральными принципами, и только тогда согласился окончательно. Мне было очень интересно посмотреть, что произойдет, когда Элджернон познакомится с ней, но как только мы запустили ее в клетку, Фэй схватила меня за руку и вытащила из комнаты.</p><p class="p1">— Где твое чувство приличия?! — с негодованием спросила она, включила радио и с угрожающим видом приблизилась ко мне. — Сейчас я буду учить тебя танцевать.</p><p class="p1">Ну разве можно на нее сердиться?</p><p class="p1">Как бы то ни было, я счастлив, что Элджернон больше не одинок.</p><p class="subtitle">23 июня</p><p class="p1">Поздно ночью — смех на площадке и стук в мою дверь. Фэй и какой-то мужчина.</p><p class="p1">— Привет, Чарли, — захихикала при виде меня Фэй. — Лерой, это Чарли, мой сосед. Прекрасный художник. Он делает скульптуры с одушевленным элементом.</p><p class="p1">Не дав Фэй врезаться в стену, Лерой поймал ее, потом с беспокойством посмотрел на меня и что-то пробормотал в знак приветствия.</p><p class="p1">— Встретила Лероя в «Звездной пыли», — объяснила Фэй. — Он здорово танцует. — Она направилась в свою квартиру, но остановилась на полпути и снова хихикнула. — А почему бы нам не пригласить Чарли выпить?</p><p class="p1">Лерою такая идея пришлась не по душе, но я ухитрился извиниться и закрыть дверь. Потом до меня донесся их смех. Я попробовал отвлечься чтением, но перед глазами все время стояла картина: большая белая кровать, прохладные белые простыни и они, в объятиях друг друга.</p><p class="p1">Мне захотелось позвонить Алисе, но я сдержался. Зачем мучить себя? Я не мог вспомнить даже ее лица. Фэй, одетую или раздетую, с пронзительными голубыми глазами и короной светлых волос, я мог представить себе в любую секунду. Алиса же окуталась в моем воображении каким-то туманом.</p><p class="p1">Примерно через час я услышал из квартиры Фэй громкие голоса, потом ее вопль и звуки, как будто швыряли что-то тяжелое. С намерением узнать, не нуждается ли она в помощи, я начал выбираться из постели, но в этот момент хлопнула дверь и до меня донеслась ругань сбегающего по лестнице Лероя. Прошло еще несколько минут, и в мое окно постучали. Я открыл. Фэй в черном шелковом кимоно скользнула внутрь и уселась на подоконнике.</p><p class="p1">— Привет, — прошептала она. — У тебя сигареты не найдется?</p><p class="p1">Сигареты у меня были. Спрыгнув с подоконника, Фэй устроилась на софе и вздохнула.</p><p class="p1">— Обычно я в состоянии позаботиться о себе, но существует тип людей, которых можно образумить только так.</p><p class="p1">— Конечно, — сказал я. — Ты привела его к себе, чтобы образумить.</p><p class="p1">Она поняла намек.</p><p class="p1">— Не одобряешь?</p><p class="p1">— А кто я такой, чтобы одобрять или не одобрять? Если ты подцепила в танцевальном зале парня, то должна ожидать соответствующего развития событий. Он считает, что имеет на это право.</p><p class="p1">Она отрицательно покачала головой.</p><p class="p1">— Я хожу туда танцевать и не понимаю, почему, если я позволила кому-то проводить себя, должна лезть с ним в постель. Думаешь, я была с ним в постели? — Помолчав и не дождавшись ответа на свой вопрос, она добавила: — Если бы на его месте был ты, я бы не отказалась.</p><p class="p1">— Как прикажешь тебя понимать?</p><p class="p1">— Так и понимай. Попроси меня, и я не откажусь.</p><p class="p1">Спокойнее, Чарли, спокойнее…</p><p class="p1">— Тысяча благодарностей. Постараюсь не забыть. Сварить тебе кофе?</p><p class="p1">— Никак не возьму в толк, что ты за человек. Я либо нравлюсь мужчине, либо нет, и это сразу видно. А ты, кажется, боишься меня… Ты случайно не гомосексуалист?</p><p class="p1">— Этого только не хватало!</p><p class="p1">— Я хотела только сказать, что не надо скрывать от меня таких вещей. Тогда мы просто останемся хорошими друзьями.</p><p class="p1">— Нет-нет. Когда ты заявилась ко мне с этим парнем, мне захотелось оказаться на его месте.</p><p class="p1">Она обняла меня, явно ожидая ответных действий. Я знал, что от меня требовалось. А почему бы и нет? Может быть, на этот раз все обойдется? Главное, инициатива исходит от нее. И еще — похожей на нее женщины я не встречал, и не исключено, что на данном уровне эмоционального развития она как раз то, что мне нужно.</p><p class="p1">Я тоже обнял ее.</p><p class="p1">— Вот это другое дело, — проворковала она, — а то мне уже показалось, что тебе все равно.</p><p class="p1">Я поцеловал ее в шею и прошептал:</p><p class="p1">— Нет, мне не все равно.</p><p class="p1">И в этот момент я увидел нас глазами третьего, стоящего у двери человека. Я увидел обнявшихся мужчину и женщину, и это не произвело на меня ровным счетом никакого впечатления. Паники не было, это верно. Но не было и волнения, желания.</p><p class="p1">— Здесь останемся или ко мне пойдем?</p><p class="p1">— Подожди минутку.</p><p class="p1">— В чем дело?</p><p class="p1">— Может, лучше не надо? Мне сегодня что-то не по себе.</p><p class="p1">— Если хочешь, чтобы я что-нибудь сделала… Скажи…</p><p class="p1">— Нет, — твердо ответил я. — Просто сегодня я плохо себя чувствую.</p><p class="p1">Присутствие Фэй тяготило меня, но слова прощания застряли в горле.</p><p class="p1">Она долго смотрела на меня, а потом сказала:</p><p class="p1">— Послушай, ты не будешь против, если я здесь переночую?</p><p class="p1">— Зачем?</p><p class="p1">Она пожала плечами:</p><p class="p1">— Ты мне нравишься. Не знаю. Лерой может вернуться. Миллион причин. Но если не хочешь…</p><p class="p1">Она снова застала меня врасплох, и я сдался.</p><p class="p1">— У тебя есть джин? — спросила Фэй.</p><p class="p1">— Нет, я же почти не пью.</p><p class="p1">— У меня есть. Подожди, сейчас принесу.</p><p class="p1">Я не успел отказаться. В мгновение ока она выскочила в окно и тут же вернулась с полной на две трети бутылкой и лимоном. Взяв на кухне два стакана, Фэй плеснула в них джина и сказала:</p><p class="p1">— Держи. Хуже не будет. Искривим линии. Тебе плохо именно от этого — все кругом прямое, ровное, и ты сидишь, как в ящике… как Элджернон в той скульптуре.</p><p class="p1">Сначала я не собирался пить, но мне было так тоскливо, что я решил махнуть на все рукой. Да, хуже не будет, может, даже глоток джина притупит чувство, будто я смотрю на себя глазами человека, не понимающего элементарных вещей.</p><p class="p1">Она заставила-таки меня напиться.</p><p class="p1">Помню первый стакан, помню, как влез в постель и Фэй с бутылкой в руке скользнула рядом. Потом все пропало — до полудня следующего дня, когда я проснулся с ужасным похмельем. На скомканной подушке лицом к стене все еще спала Фэй. На столике, рядом с забитой окурками пепельницей, стояла пустая бутылка, но последнее, что я запомнил перед тем, как опустился занавес, это, как я смотрю сам на себя, выпивающего второй стакан.</p><p class="p1">Фэй потянулась и повернулась — голая. Я сделал попытку отодвинуться, упал с кровати, схватил одеяло и обернулся им.</p><p class="p1">— Привет. — Она зевнула. — Знаешь, чего мне хочется?</p><p class="p1">— Чего?</p><p class="p1">— Написать тебя обнаженным. Как Давид Микеланджело. Ты прекрасен. Самочувствие?</p><p class="p1">— Нормально, только голова трещит. Я… перебрал вчера?</p><p class="p1">Она рассмеялась и приподнялась, опершись на локоть.</p><p class="p1">— Да-а, ты здорово набрался. И, парень, каким же ты стал жутким, нет, я не про гомосексуализм, каким-то совсем чудны́м.</p><p class="p1">— Ради всего святого, что я натворил?</p><p class="p1">— Совсем не то, что мне хотелось. Никакого секса. Но ты был феноменален. Целое представление! Просто жуть берет! На сцене тебе цены б не было. Ты стал глупым и сконфуженным. Знаешь, как будто взрослый начинает изображать ребенка. Ты рассказал, как хотел пойти в школу и научиться читать и писать, чтобы стать умным, как остальные, и еще много чего. Ты стал совсем другим… и все твердил, что не будешь играть со мной, потому что тогда мама отберет орешки и посадит тебя в клетку.</p><p class="p1">— Орешки?</p><p class="p1">— Точно! — Фэй еще немного посмеялась и почесала в затылке. — Ты говорил, что не отдашь мне орешки. Жуть в полосочку! Но <em>как</em> ты говорил! Как те идиоты, что стоят на углах и доводят себя до белого каления, всего лишь <em>глядя</em> на женщину. Совсем другой… Сначала мне казалось, что ты просто дурачишься, а теперь думаю, не слишком ли ты впечатлителен или что-нибудь в этом роде… Это все оттого, что у тебя так чисто и ты вечно обо всем беспокоишься.</p><p class="p1">Я не очень огорчился, хотя этого можно было ожидать. Алкоголь каким-то образом сломал барьеры, прятавшие прежнего Чарли Гордона в глубинах моего подсознания. Как я и подозревал, он ушел не навсегда. Ничто в нас не исчезает без следа. Операция прикрыла Чарли тонким слоем культуры и образования, но он остался. Он смотрит и ждет.</p><p class="p1">Чего он ждет?</p><p class="p1">Фэй ухватилась за одеяло, в которое я завернулся, и втащила меня в постель. Я не успел остановить ее — она обняла меня и поцеловала.</p><p class="p1">— Чарли, мне было так страшно, я думала, ты рехнулся. Я слышала про импотентов, как они вдруг слетают с катушек и превращаются в маньяков.</p><p class="p1">— Как же ты решилась остаться?</p><p class="p1">— Ты стал маленьким перепуганным ребенком. Я была уверена, что самой мне ничего не угрожает, но ты мог покалечить себя! Так что я решила побыть здесь. Правда, на всякий случай…</p><p class="p1">Из промежутка между кроватью и стеной она вытащила тяжеленную книгу.</p><p class="p1">— Так и не воспользовалась ею?</p><p class="p1">Она покачала головой.</p><p class="p1">— Наверно, ты очень любил орешки, когда был маленьким.</p><p class="p1">Она встала и начала одеваться, а я лежал и смотрел на нее. В движениях Фэй начисто отсутствовала стеснительность. Мне хотелось протянуть руку и дотронуться до нее, но я понимал, что все тщетно. Чарли со мной. Он бдит.</p><p class="p1">А Чарли всегда боялся, что у него отберут орешки.</p><p class="subtitle">24 июня</p><p class="p1">Сегодня со мной случился приступ антиинтеллектуализма. Я не осмелился напиться — ночь с Фэй предупредила меня об опасности. Вместо этого я отправился на Таймс-сквер и устроил обход кинотеатров, выбирая те, в которых шли вестерны и фильмы ужасов. Как раньше. В середине фильма меня захлестывало чувство вины, я вставал и шел в другой кинотеатр. Я искал в мерцающем выдуманном мире экрана то, что ушло от меня вместе с прежней жизнью.</p><p class="p1">В какой-то момент меня озарило, и я догадался, что не фильмы нужны мне, а <em>люди</em>. Мне просто захотелось побыть в заполненной человеческими телами темноте.</p><p class="p1">В темноте стенки между людьми тонки, и если прислушаться, можно <em>услышать</em>. Не просто быть в толпе — я никогда не испытывал такого чувства в набитом лифте или вагоне подземки… Жаркими летними вечерами, когда люди выходят погулять или посидеть в театре, слышишь какое-то своеобразное шуршание… и когда случайно прикасаешься к кому-нибудь, чувствуешь связь между кроной, стволом и глубокими корнями. В такие моменты у меня появляется ненасытное желание стать частью этого мира, оно гонит меня в темные углы и аллеи, на поиски.</p><p class="p1">Устав от ходьбы, я обычно возвращаюсь к себе и ложусь спать, но сегодня зашел в ресторан. Там появился новый мойщик посуды, парень лет шестнадцати. Что-то в нем показалось знакомым — движения, взгляд… И вот, убирая столик рядом с моим, он уронил с подноса тарелки.</p><p class="p1">Тарелки с грохотом рухнули на пол, и белые фарфоровые осколки разлетелись во все стороны. Потрясенный и испуганный, он стоял, держа в руках пустой поднос. Свист и вопли посетителей (крики «Так вот куда летят прибыли» или «да он тут совсем недавно!», неизбежно сопутствующие битью посуды в ресторанах) окончательно сконфузили его.</p><p class="p1">Владелец ресторана вышел посмотреть, что за шум, и парень поднял руки, словно защищаясь от удара.</p><p class="p1">— Ну ты, дубина, — заорал хозяин, — чего стоишь? Возьми веник и подмети! Веник… веник, кретин! Он на кухне. Подмети все осколки.</p><p class="p1">Парень тут же понял, что наказания не последует, страх исчез с его лица, а когда он вернулся с веником, то уже улыбался и что-то напевал. Но самые скандальные посетители не унимались, желая выжать из этого случая побольше удовольствия. За его счет.</p><p class="p1">— Эй, сынок, вон там чудесный кусочек…</p><p class="p1">— Проделай-ка это еще разок…</p><p class="p1">— Он совсем не глуп. Разбить тарелки куда проще, чем мыть их!</p><p class="p1">Его пустые глаза обежали веселящуюся толпу, улыбки начали отражаться и на его лице, и наконец он тоже засмеялся шутке, соли которой не понимал.</p><p class="p1">От этого тупого, идиотского смеха, от широко раскрытых блестящих глаз ребенка, не понимающего, что происходит, но горящего желанием услужить, мне стало не по себе. Люди смеются над ним потому, что он — слабоумный.</p><p class="p1">А ведь сначала мне тоже было весело.</p><p class="p1">Меня взяло зло, и на себя, и на всех, кто сидел рядом. Мне захотелось схватить свои тарелки и швырнуть их прямо в ухмыляющиеся рожи. Я вскочил и крикнул:</p><p class="p1">— Замолчите! Оставьте его в покое! Разве вы не видите, что он ничего не <em>понимает</em>! Это не его вина… Сжальтесь над ним, ради бога! Он же <em>человек</em>!</p><p class="p1">Полная тишина. Я проклинал себя за то, что потерял контроль и устроил сцену, и пока расплачивался по счету и шел к выходу, старался не смотреть на несчастного. Меня жег стыд за нас обоих.</p><p class="p1">Удивительно, как люди высоких моральных принципов и столь же высокой чувствительности, никогда не позволяющие себе воспользоваться преимуществом над человеком, рожденным без рук, ног или глаз, как они легко и бездумно потешаются над человеком, рожденным без разума. Ярость моя происходит из того, что я вспомнил, как сам был клоуном.</p><p class="p1">А ведь я почти забыл.</p><p class="p1">Совсем недавно люди <em>смеялись надо мной</em>… А теперь сам присоединился к их веселому хору. И от этого больнее всего.</p><p class="p1">Я часто перечитываю мои ранние отчеты и прекрасно вижу их безграмотность, детскую наивность. Это несчастный разум глядит из темной комнаты сквозь замочную скважину в сияющий мир, счастливо и неуверенно улыбаясь. Даже в своей тупости я понимал, что стою ниже окружающих. У них было что-то такое, чего не было дано мне. Слепой умственно, я верил, что это — способность читать и писать и что я сравняюсь с ними, научившись тому же.</p><p class="p1">Даже слабоумный хочет быть похожим на других. Младенец не знает, как накормить себя и что съесть, но он понимает, что такое голод.</p><p class="p1">День не прошел даром. Хватит беспокоиться о себе — <em>моем</em> прошлом и <em>моем</em> будущем. Пора отдавать. Пора применить мои знания и способности на пользу другим. Кто может сделать это лучше меня? Кто жил в двух мирах?</p><p class="p1">Завтра же свяжусь с советом директоров фонда Уэлберга и попрошу выделить мне самостоятельную область работы. Только бы они согласились! У меня есть кое-какие идейки…</p><p class="p1">С уже существующей техникой, если ее немного подработать, можно многого добиться. Если из меня удалось сделать гения, то что тогда говорить о пяти миллионах слабоумных в одних только Соединенных Штатах? О бесчисленных миллионах во всем мире? О тех, кто еще не родился, но уже обречен? А каких выдающихся результатов можно будет достичь, применив эту технику к нормальным людям? К гениям???</p><p class="p1">Сколько дверей предстоит открыть! Люди должны понять, насколько важна такая работа. Уверен — фонд не откажет мне.</p><p class="p1">Но я устал от одиночества. Нужно рассказать обо всем Алисе.</p><p class="subtitle">25 июня</p><p class="p1">Позвонил Алисе. Я нервничал и, должно быть, говорил не совсем внятно, но как же приятно было вновь услышать ее голос! Казалось, она тоже рада. Она согласилась повидаться со мной, и через мгновения я уже сидел в такси, проклиная уличные пробки.</p><p class="p1">Я не успел постучать — Алиса распахнула дверь и кинулась мне в объятия.</p><p class="p1">— Чарли, мы все так беспокоились за тебя! Мне снились ужасные сны, будто ты лежишь мертвый или бродишь, потеряв память, по трущобам. Почему ты не давал знать о себе? Что тебе помешало?</p><p class="p1">— Не ругай меня. Мне надо было побыть одному и найти ответы на множество вопросов.</p><p class="p1">— Пойдем на кухню, я сварю кофе. Что ты делал все это время?</p><p class="p1">— Днем — думал, читал и писал. По ночам — странствовал в поисках самого себя и открыл, что Чарли подглядывает за мной.</p><p class="p1">Она вздрогнула.</p><p class="p1">— Не говори так. Никто не следит за тобой, у тебя просто фантазия разыгралась.</p><p class="p1">— Я чувствую, что я — это не я. Я занял принадлежащее Чарли место и вышвырнул его оттуда, как меня самого выкинули из пекарни. Я хочу сказать, что Чарли Гордон существует в прошлом, а прошлое реально. Нельзя построить новый дом на месте старого, не разрушив его, но Чарли уничтожить нельзя. Сначала я искал его. Я виделся с его — моим — отцом. Все, чего я хотел, доказать, что Чарли существовал в прошлом как <em>личность</em> и что именно этим оправдано мое собственное существование. Слова Немура, будто он создал меня, оскорбительны… Но я обнаружил, что Чарли существует и сейчас, во мне и вокруг меня. Это он вставал между нами. Оказалось именно мой разум создал барьер — эту помпезную дурацкую гордость, чувство, что у нас с тобой нет ничего общего, потому что я превзошел тебя. Ты вложила эту идею в мою голову. Но это не так. Это Чарли, маленький мальчик, он боится женщин, потому что мать била его. Неужели ты не понимаешь? Месяцы интеллектуального роста ничего не смогли сделать с эмоциональной схемой маленького Чарли. Каждый раз, когда я прикасался к тебе или представлял, как мы любим друг друга, происходило короткое замыкание.</p><p class="p1">Я был возбужден, и голос мой бил и бил по Алисе, пока ее не охватила дрожь.</p><p class="p1">— Чарли, — прошептала она. — Что я могу сделать? Как помочь тебе?</p></span>
