<span><p class="p1">Ничего определенного. Я двигаюсь в тишине, пронизанной чистейшим белым сиянием. Все вокруг застыло в ожидании. Мне кажется, что я в одиночестве стою на горной вершине, обозревая окружающий пейзаж. Солнце в зените, и тень моя сжалась тугим комком под ногами. Но вот солнце начинает спускаться, тень удлиняется и вытягивается до самого горизонта. Далеко-далеко…</p><p class="p1">Хочется повторить то, что я однажды сказал уже доктору Штраусу: никто не виноват в том, что случилось. Эксперимент был тщательно подготовлен, техника его проведения опробована на множестве животных. Вероятность ошибки была ничтожно мала. Когда принималось решение использовать меня как первого человека, все были уверены, что я не подвергнусь никакой физической опасности. Западня оказалась совершенно неожиданной, и мне не хочется, чтобы кто-то пострадал из-за меня.</p><p class="p1">Один вопрос: сколько я еще протяну?</p><p class="subtitle">15 сентября</p><p class="p1">Немур сказал, что все мои выводы подтвердились, а это означает, что изъян заложен в самой постановке эксперимента. Когда-нибудь люди справятся с этой проблемой, но время еще не настало. Я рекомендую не проводить больше опытов на людях. Недостающие данные можно получить и на животных.</p><p class="p1">Наиболее многообещающим направлением исследований мне представляется изучение баланса энзимов в человеческом организме. Время здесь, как и везде, — решающий фактор. Как можно скорее обнаружить недостаток, как можно скорее ввести гормон-заменитель! Я охотно помог бы будущим исследователям и в этом и в подборе радиоактивных изотопов для оперативного контроля, но у меня не осталось времени.</p><p class="subtitle">17 сентября</p><p class="p1">Становлюсь рассеянным. Убираю вещи, потом не могу найти их и бросаюсь на первого встречного. Симптомы?</p><p class="p1">Позавчера умер Элджернон. Я бродил по набережной, и в половине пятого утра пришел в лабораторию. Элджернон лежал в углу клетки, вытянув ножки. Будто бежал во сне.</p><p class="p1">Вскрытие подтвердило мои предположения. Мозг Элджернона резко отличается от нормального — меньше вес, разглажены извилины, глубже и шире стали разделяющие полушария впадины.</p><p class="p1">Ужасна мысль, что это же самое происходит сейчас и со мной. Я увидел, насколько все это реально, и начинаю бояться будущего.</p><p class="p1">Я положил трупик Элджернона в маленькую металлическую коробочку и отнес домой. Разве можно его сжигать? Пусть это выглядит по-дурацки сентиментально, но вчера вечером я похоронил его на заднем дворе. Я положил на его могилку букетик ромашек и долго плакал.</p><p class="subtitle">21 сентября</p><p class="p1">Собираюсь завтра на Маркс-стрит — навестить маму. Сон, приснившийся мне прошлой ночью, вызвал целую цепочку воспоминаний, высветил огромный кусок прошлого. Обязательно нужно записать это, и как можно скорее, пока я ничего не забыл. В последнее время я многое стал забывать. Сейчас мне больше чем когда-либо хочется понять маму, узнать, что она за человек и почему поступала так, а не иначе. Ненавидеть ее — преступление.</p><p class="p1">Необходимо разобраться в своих чувствах <em>до</em> встречи с ней, чтобы не оказаться излишне жестоким.</p><p class="subtitle">27 сентября</p><p class="p1">То, что я пишу сейчас, следовало бы перенести на бумагу сразу, не откладывая. Очень важно сделать именно этот отчет как можно полнее.</p><p class="p1">Мы встретились три дня назад. Я принудил себя еще раз одолжить машину у Барта. Было страшно, но я понимал, что визит этот необходим.</p><p class="p1">Когда я добрался до Маркс-стрит, мне показалось что я ошибся и попал не туда. Улица оказалась грязной до безобразия — совершенно не такой, какой я представлял ее себе. Кое-какие дома совсем недавно снесли, и на их месте громоздились кучи мусора. На тротуаре валялся ржавый холодильник с оторванной дверцей, а рядом — старый матрац с вылезшими пружинами. Окна некоторых домов были заколочены досками, а были и такие дома, что больше походили на грязные лачуги. Я оставил машину за квартал от нашего дома и дошел до него пешком.</p><p class="p1">Нигде не было видно играющих детей, и это тоже не совпадало с моими воспоминаниями. Тогда дети были всюду, а Чарли смотрел на них из окна. Странно, большинство моих воспоминаний обрамлено в оконный переплет, как картина в рамку… Сейчас же я видел только стариков, отдыхающих в полуразвалившихся беседках.</p><p class="p1">Еще один удар я испытал, когда подошел к дому. Роза в старом коричневом свитере стояла перед домом на скамейке и, несмотря на холодную, ветреную погоду, мыла окна. Всегда в работе, чтобы соседи видели, какая она замечательная жена и мать…</p><p class="p1">Для нее всегда самым важным было то, что о ней подумают другие. Тут она была непоколебима и не обращала никакого внимания на рассуждения Матта о том, что в жизни есть вещи и поважнее. Норма должна хорошо одеваться. В доме должна стоять красивая мебель. Чарли должен сидеть взаперти, чтобы соседи не заподозрили ничего дурного.</p><p class="p1">Я подошел к калитке и, увидев ее лицо, вздрогнул. Это было не то лицо, которое я с такими муками пытался вспомнить… Волосы ее поседели, кожа на щеках покрылась морщинами. На лбу собрались капельки пота.</p><p class="p1">Она сразу заметила меня.</p><p class="p1">Мне захотелось отвернуться, побежать дальше по улице, но я зашел уже слишком далеко, чтобы поворачивать назад. Оставалось притвориться, будто я заблудился в незнакомом месте, и спросить у нее дорогу. Одного взгляда на Розу было мне вполне достаточно. …Все это так, но я только молча стоял и смотрел на нее. А она смотрела на меня.</p><p class="p1">— Что вам нужно?</p><p class="p1">Ее хриплый голос безошибочным эхом отозвался в пещерах моей памяти.</p><p class="p1">Я открыл рот, но слова застряли в горле. Губы мои и язык двигались, я знаю это, я отчаянно боролся, чтобы произнести хоть слово — ведь она почти узнала меня! Как же мне не хотелось, чтобы мама увидела меня вот таким… неспособным заставить понять себя. Но во рту пересохло, язык вдруг стал огромным и неуклюжим, слова застряли…</p><p class="p1">…Кроме одного. Я планировал произнести при встрече что-нибудь успокаивающее, ободряющее, отбросив таким образом прошлое в сторону, и с помощью всего нескольких слов овладеть положением… Однако из моего пересохшего горла вырвалось только:</p><p class="p1">— Маааааа…</p><p class="p1">Я, в совершенстве знающий столько языков, смог выдавить из себя только это… Как добравшийся до вымени голодный ягненок.</p><p class="p1">Роза вытерла лоб тыльной стороной ладони и прищурилась, желая рассмотреть меня получше. Я открыл калитку и сделал несколько шагов по дорожке. Она отступила к двери.</p><p class="p1">Я не был уверен, узнала меня Роза или нет, но тут она выдохнула:</p><p class="p1">— <em>Чарли!</em></p><p class="p1">Она не прокричала и не прошептала мое имя. Она выдохнула его, как пробуждающийся от кошмара человек.</p><p class="p1">— Ма… — я встал на первую ступеньку. — Это я…</p><p class="p1">Мое движение напугало ее, она отступила еще на шаг, опрокинула ведро с водой, и грязная мыльная пена водопадом хлынула по ступенькам.</p><p class="p1">— Что ты здесь делаешь?</p><p class="p1">— Мне так хотелось увидеть тебя… поговорить…</p><p class="p1">Язык все еще мешал мне, и голос звучал не как обычно. В нем чувствовался какой-то плаксивый оттенок. Должно быть, именно так я и говорил много-много лет назад.</p><p class="p1">— Не уходи! — молил я. — Не убегай от меня!</p><p class="p1">Но Роза уже шмыгнула в прихожую и закрыла дверь. Секунду спустя она отодвинула снежно-белую занавеску на двери и уставилась на меня через стекло расширенными от ужаса глазами. Губы ее бесшумно двигались.</p><p class="p1">— Уходи! Прочь от меня!</p><p class="p1">Почему? Почему мама отказывается от меня? По какому праву?</p><p class="p1">— Открой дверь! Нам надо поговорить! Впусти меня!</p><p class="p1">Я забарабанил по стеклу. Оно треснуло, и одна из трещин защемила кожу на пальце так, что какое-то время я не мог вырвать ее. Наверно, Розе показалось, что я окончательно сошел с ума и явился рассчитаться с ней за прошлое. Она отпрянула и ринулась к ведущей в глубь дома двери.</p><p class="p1">Я нажал посильнее, дверной крючок не выдержал и, потеряв равновесие, я буквально ввалился в прихожую. Из пореза шла кровь и, не зная что делать, я сунул руку в карман, чтобы, избави Боже, не запачкать свежевымытый линолеум.</p><p class="p1">Я проскочил по коридору мимо лестницы на второй этаж. Сколько раз демоны хватали меня на этой лестнице за ноги и тащили вниз, в подвал! Я пробовал кричать, но язык душил меня и обрекал на молчание… Как тихих ребятишек в Уоррене.</p><p class="p1">На втором этаже жили хозяева дома — Мейерсы. Они всегда были добры ко мне — подкармливали сладостями, разрешали сидеть у них на кухне и играть с собакой. Никто мне ничего не говорил, но я почему-то догадался, что их уже нет в живых и наверху обитают незнакомцы. И эта тропинка закрыта для меня навеки…</p><p class="p1">Дверь, за которой исчезла Роза, оказалась запертой, и секунду я стоял в нерешительности.</p><p class="p1">— Открой дверь!</p><p class="p1">Ответом был визгливый лай маленькой собачонки. Странно.</p><p class="p1">— Не бойся, я не замышляю ничего плохого. Я долго шел к тебе и не собираюсь уходить просто так! Если ты не откроешь дверь, мне придется сломать ее!</p><p class="p1">Я услышал ее голос:</p><p class="p1">— Ш-ш-ш, Наппи… Иди в спальню, иди…</p><p class="p1">Еще через секунду замок щелкнул, дверь открылась и мама вдруг очутилась совсем рядом со мной.</p><p class="p1">— Мама, — прошептал я. — Не бойся меня и выслушай! Пойми, я уже не тот, что был раньше… я изменился… я нормальный человек… Понимаешь? Я больше не слабоумный… я не кретин. Я — как все, как ты, как Матт, как Норма…</p><p class="p1">Я говорил и говорил, моля в душе, чтобы она не захлопнула дверь. Мне хотелось рассказать ей все, сразу.</p><p class="p1">— Мне сделали операцию, и я стал другим, каким ты меня всегда хотела видеть. Читала про это в газетах? Это новый научный эксперимент, который повышает умственные способности человека, и я стал первым! Пойми же меня! Почему ты так на меня смотришь? Я стал умным, умнее, чем Норма, дядя Герман или Матт! Я знаю вещи, которых не знают даже профессора в университете! Скажи мне что-нибудь! Ты можешь гордиться мной и рассказать про меня всем соседям! Тебе больше не нужно прятать меня в подвале, когда приходят гости! Поговори же со мной! Расскажи, как я был маленьким! И не бойся меня! Я ни в чем не виню тебя, просто мне надо узнать побольше о самом себе, пока еще не поздно! Я не смогу стать полноценным человеком, пока не пойму самого себя, и ты — единственная в мире, кто может мне помочь! Впусти меня. Посидим вместе.</p><p class="p1">Мой тон, а не слова, заворожили ее. Она просто стояла и смотрела на меня. Не подумав, я вынул из кармана окровавленную руку и протянул вперед, словно моля о помощи. Лицо ее сразу смягчилось.</p><p class="p1">— Тебе больн… — Вряд ли она по-настоящему жалела меня. То же самое чувство она испытала бы и к поранившей лапу собаке, и к исцарапанному в боевой схватке коту. Не потому, что я — ее Чарли. Наоборот.</p><p class="p1">— Заходи и вымой руки. Я принесу йод и бинты.</p><p class="p1">Я подошел к треснувшей раковине, над которой мама так часто умывала меня, когда я возвращался со двора, когда мне нужно было идти есть или спать. Пока я закатывал рукава, она смотрела на меня.</p><p class="p1">— Не надо было бить стекло. Хозяйка рассердится, а у меня нет денег, чтобы заплатить ей…</p><p class="p1">Потом, словно недовольная тем, что я делаю все так медленно, она отобрала у меня мыло и сама занялась моими руками. Занятие это полностью захватило ее, и я боялся шевельнуться, чтобы не спугнуть счастье. Иногда она цокала языком или вздыхала:</p><p class="p1">— Ох, Чарли, Чарли, и где ты только ухитряешься перепачкаться… Когда же ты научиться следить за собой?</p><p class="p1">Она вернулась на двадцать пять лет назад, когда я был ее маленьким Чарли, а она готова была до последнего сражаться за мое место под солнцем.</p><p class="p1">Но вот наконец кровь смыта, руки вытерты бумажным полотенцем. Вдруг она посмотрела мне в лицо и снова глаза ее округлились от ужаса:</p><p class="p1">— Боже мой! — всхлипнула она и отстранилась от меня.</p><p class="p1">Я заговорил снова, тихо, успокаивая ее, стараясь внушить, что намерения у меня самые благородные. Роза меня не слушала. Она рассеянно осмотрелась, прикрыла рот ладонью и простонала:</p><p class="p1">— В доме такой беспорядок… Я никого не ждала. Взгляни только на эти окна… а плинтусы…</p><p class="p1">— Все в порядке, ма, не волнуйся.</p><p class="p1">— Нужно получше натереть полы… Они должны блестеть!</p><p class="p1">Тут она заметила пятна крови на двери и тряпочкой быстро стерла их. Потом снова посмотрела на меня и нахмурилась.</p><p class="p1">— Вы пришли по поводу счета за электричество?</p><p class="p1">Прежде чем я успел ответить «нет», она укоризненно погрозила мне пальцем:</p><p class="p1">— Я всегда посылаю чек первого числа, но мужа сейчас нет дома, он уехал по делам… Дочь обязательно получит деньги на этой неделе, и мы заплатим сразу за все. Так что вы явились напрасно, мистер.</p><p class="p1">— У вас только один ребенок? Других нет?</p><p class="p1">Роза вздрогнула, взгляд ее устремился куда-то вдаль.</p><p class="p1">— У меня был мальчик. Он был таким умным, что все матери завидовали мне. Но его сглазили… Да, сглазили! Если бы не это, он стал бы великим человеком. Он был таким умным… <em>исключительно</em> одаренным ребенком. Все так говорили. Он мог стать <em>гением!</em></p><p class="p1">Она взяла щетку.</p><p class="p1">— Извините… Дочь пригласила на обед молодого человека, и мне нужно прибраться.</p><p class="p1">Она опустилась на колени и принялась скрести и без того сверкающий пол. На меня она не смотрела.</p><p class="p1">Она начала что-то бормотать. Я уселся на табуретку с твердым намерением дождаться, пока она выйдет из забытья и признает меня. Не уйду, пока она не поймет, что я — Чарли, ее Чарли! Ведь должен же хоть кто-нибудь поверить мне!</p><p class="p1">Роза стала напевать какую-то печальную мелодию, но вдруг замерла, держа щетку на весу, как будто до нее только что дошло, что в кухне есть еще кто-то.</p><p class="p1">Она повернулась, посмотрела на меня блестящими глазами и, склонив голову набок, спросила:</p><p class="p1">— Как могло такое случиться? Ничего не понимаю… Мне говорили, что ты неизлечим.</p><p class="p1">— Мне сделали операцию, и я стал другим. Я теперь знаменитость, весь мир знает про меня. Я стал очень умным, мама. Я умею читать и писать, я могу…</p><p class="p1">— Слава богу, — прошептала она. — Мои молитвы… Все эти годы мне казалось, что <em>он</em> не слышит меня… Оказывается, <em>он</em> всего лишь ждал, чтобы исполнить <em>свою</em> волю в нужное время…</p><p class="p1">Она вытерла фартуком лицо. Я обнял ее, она положила голову мне на плечо и заплакала. Слезы ее смыли всю мою боль. Я уже не жалел, что пришел.</p><p class="p1">— Надо всем рассказать, — улыбнулась Роза. — Всем этим учителям. Увидишь, как у них рожи вытянутся. И всем соседям. А дядя Герман — ему тоже нужно сказать. Он так обрадуется! Подожди, вот придут папа и сестра… Как они будут счастливы! Ты просто не представляешь!</p><p class="p1">Продолжая строить планы на нашу новую счастливую совместную жизнь, она крепко обняла меня. У меня не хватило духу сказать ей, что учителя мои больше не учат детей, соседи все переехали, дядя Герман давно умер, а отец покинул ее много лет назад. Мне хотелось видеть ее улыбку и сознавать, что впервые в жизни я заставил ее улыбнуться.</p><p class="p1">Но вот она замолчала, как будто что-то вспоминая, и я почувствовал, что она удаляется.</p><p class="p1">— Нет!!! — закричал я, возвращая ее к реальности. — Подожди, мама! Я сейчас уйду, но я хочу оставить тебе кое-что!</p><p class="p1">— Уйдешь? Но тебе не надо никуда уходить!</p><p class="p1">— У меня много дел, мама. Я буду писать тебе и пришлю денег.</p><p class="p1">— Когда ты вернешься?</p><p class="p1">— Пока не знаю, но я хочу дать тебе вот это.</p><p class="p1">— Журнал?</p><p class="p1">— Не совсем. Это научная статья, которую я написал. Смотри, она называется «Эффект Элджернона — Гордона». Это я открыл его и так назвал! Я оставлю ее тебе. Покажи статью соседям, чтобы они знали, что твой сын больше не слабоумный.</p><p class="p1">Она с благоговением взяла журнал.</p><p class="p1">— Это… это и в самом деле твое имя! Я всегда знала, что так оно и будет! Я же говорила! Я испробовала все, что можно. Ты был еще маленьким и не помнишь, но я сделала все, что могла. Я всем говорила, что ты будешь учиться в колледже и станешь ученым. Надо мной смеялись, а я верила!</p><p class="p1">Она улыбнулась сквозь слезы, потом вдруг отвернулась, взяла тряпку и, двигаясь словно во сне, принялась протирать плинтусы.</p><p class="p1">Снова залаяла собака. Слышно было, как входная дверь открылась и хлопнула и женский голос произнес:</p><p class="p1">— Все в порядке, Наппи, это я.</p><p class="p1">Слышно было, как запертая в спальне собака радостно кидается на дверь.</p><p class="p1">У меня не было ни малейшего желания видеть Норму, и я почувствовал, что попал в ловушку. Нам нечего сказать друг другу, а в доме нет черного хода… Можно было выпрыгнуть в окно, но мне не хотелось, чтобы меня приняли за взломщика.</p><p class="p1">Услышав скрежет ключа в замке, я, не понимая зачем, прошептал:</p><p class="p1">— Норма пришла…</p><p class="p1">Но мама не обратила внимания на мои слова, она была слишком занята.</p><p class="p1">Дверь открылась. Норма посмотрела на меня и нахмурилась. В комнате было темно, она не узнала меня. Поставила сумку на пол, включила свет…</p><p class="p1">— Кто вы такой?</p><p class="p1">Прежде чем я успел ответить, рука ее метнулась ко рту, и она без сил прислонилась к стене.</p><p class="p1">— Чарли!!!</p><p class="p1">Она сказала это так же, как и мама — на одном выдохе. И выглядела она, как мама в молодости — мелкие, острые черты лица…</p><p class="p1">— Чарли! Боже мой, Чарли! Ты мог бы предупредить, позвонить… Как же так… — Она посмотрела на маму, сидящую на полу рядом с раковиной. — Как она? Переволновалась?</p><p class="p1">— У нее было просветление, мы немного поговорили.</p><p class="p1">— Хорошо. Она уже почти ничего не помнит. Это старость… Доктор Портман посоветовал мне отдать ее в дом для престарелых, но я отказалась. Не могу представить ее там…</p><p class="p1">Она открыла дверь спальни, собака выскочила оттуда, и Норма подняла ее и прижала к себе.</p><p class="p1">— Я просто не могу сделать такое со своей матерью…</p><p class="p1">Норма посмотрела на меня и неуверенно улыбнулась.</p><p class="p1">— Все это так неожиданно… Я и подумать не могла… Дай-ка мне посмотреть на тебя. Встреть я тебя на улице, ни за что не узнала бы. Ты совсем другой. — Она вздохнула. — Я очень рада видеть тебя, Чарли!</p><p class="p1">— В самом деле? Мне казалось, что ты никогда больше не захочешь знать меня.</p><p class="p1">— Ох, Чарли! — Она взяла меня за руку. — Не надо так говорить! Я и вправду рада тебя видеть. Я ждала тебя. Я не знала когда, но верила, что ты обязательно придешь, с тех самых пор, как я прочитала, что ты сбежал с конференции… Ты не представляешь, сколько я думала о тебе — где ты, что делаешь. Этот профессор… Когда же он появился? Да, в марте. Семь месяцев назад… Я даже не знала, что ты жив. Мать твердила, что ты умер в Уоррене. Я так и думала. Когда мне сказали, что ты жив и нужен для какого-то эксперимента, я растерялась. Профессор… — Немур, так его звали? — не разрешил мне повидаться с тобой, он не хотел волновать тебя перед операцией. Потом я увидела в газетах, что операция удалась и ты стал гением… Боже мой! Я рассказала всем на работе и в клубе… показывала твою фотографию в газете и говорила, что скоро ты придешь навестить нас. И вот ты пришел! Не забыл!</p><p class="p1">Она снова обняла меня.</p><p class="p1">— Чарли, Чарли… Как же чудесно узнать, что у меня есть старший брат! Садись, я приготовлю тебе чего-нибудь перекусить, а ты расскажешь все, что с тобой было и что ты собираешься делать дальше. Я… я просто не знаю, о чем тебя спрашивать. Наверно, я сейчас глупо выгляжу, как девица, узнавшая, что ее брат — герой, кинозвезда или что-то в этом роде.</p><p class="p1">Не скрою, я не ожидал такой встречи с сестрой и был весьма смущен. Не учел я, что столько лет наедине с матерью могут изменить ее. Но это было неизбежно. Она перестала быть капризным, испорченным существом моих воспоминаний. Она выросла и превратилась в женщину, способную любить.</p><p class="p1">Мы разговорились. О маме. Говорили так, словно ее не было сейчас с нами. А ведь она была, в этой самой комнате. Пока Норма рассказывала о жизни с ней, я иногда поглядывал на Розу: слушает ли она нас? Но казалось, ей нет никакого дела до наших разговоров — так глубоко ушла она в свои мысли. Она двигалась по кухне как привидение, все время что-то переставляя, перекладывая с места на место… Она совсем не мешала нам. Пугающее зрелище.</p><p class="p1">Норма принялась кормить собаку.</p><p class="p1">— Наконец-то ты заполучила его. Наппи — это сокращенно от Наполеона?</p><p class="p1">Норма выпрямилась и внимательно посмотрела на меня.</p><p class="p1">— Откуда ты знаешь?</p><p class="p1">Я объяснил, что недавно вспомнил, как она принесла домой свою контрольную по истории, как завела разговор о собаке и как Матт отшил ее.</p><p class="p1">— Я ничего этого не помню… Ах, Чарли, неужели я была такой стервой?</p><p class="p1">— Есть еще одно воспоминание, о котором мне хотелось тебя спросить. Никак не пойму, то ли это было на самом деле, то ли мне приснилось. Тогда мы с тобой последний раз играли как друзья. В подвале. Надели на головы абажуры, представив себя китайскими кули, и прыгали на старых матрасах. Тебе было лет семь или восемь, мне — тринадцать. Ты неудачно прыгнула и ударилась головой о стену. Не сильно, но ты закричала. Тут же прибежали мама с папой. Ты сказала им, что я хотел убить тебя. Роза обвинила Матта, что он не смотрит за мной и оставил нас одних. Потом она била меня ремнем, пока я не свалился без чувств. Помнишь? Это так и было?</p><p class="p1">Норма была потрясена моим описанием.</p><p class="p1">— Все так смутно… Я помню, как мы напялили абажуры, как прыгали на матрасах. — Она подошла к окну и выглянула на улицу. — Я ненавидела тебя, потому что родители все время занимались только тобой. Тебя никогда не пороли за плохие отметки. Ты прогуливал уроки, играл, сколько душе угодно, а мне приходилось трудиться изо всех сил. Как я ненавидела тебя! Ребята в классе рисовали на доске мальчишку в шутовском колпаке, а внизу подписывали: «<em>Брат Нормы</em>». Они писали на асфальте: «<em>Сестра кретина</em>» и «<em>Гордоны — дураки</em>». Один раз меня не пригласили на день рождения к Эмилии Раскин, и я знала, что это из-за тебя. Вот тогда, в подвале, я и решила рассчитаться с тобой. — Она заплакала. Я соврала и сказала, что ты хотел убить меня. Чарли, Чарли, какой же я была дурой, какой дурой… Прости меня…</p><p class="p1">— Не вини себя так… Тебе было нелегко. Для меня домом были кухня и вот эта комната, все остальное не имело значения. Тебе же приходилось сталкиваться с окружающим миром.</p><p class="p1">— Чарли, почему тебя выгнали из дома? Разве ты не мог остаться и жить вместе с нами? Я много думала об этом, а мама каждый раз говорила, что там тебе лучше.</p><p class="p1">— Может, она и права.</p><p class="p1">Норма покачала головой:</p><p class="p1">— Она отказалась от тебя из-за <em>меня</em>, правда? Ах, Чарли, ну почему такое должно было случиться именно с нами?</p><p class="p1">Я не знал, что ответить. Страдаем ли мы за грехи отцов или исполняем волю какого-нибудь греческого оракула? Но ответить <em>ей</em> мне было нечего. И себе тоже. Я сказал:</p><p class="p1">— Все в прошлом. Я рад, что повидал тебя. Теперь мне будет легче жить на свете.</p><p class="p1">Вдруг Норма схватила меня за руку.</p><p class="p1">— Чарли, ты представить себе не можешь, что это такое — жить с ней! Эта квартира, улица, моя работа… Какой это кошмар — идти домой, не зная, что с ней, жива ли она еще, и мучиться от этих мыслей!</p><p class="p1">Я встал, прижал Норму к себе, и она, положив голову мне на плечо, тихо заплакала.</p><p class="p1">— Чарли, до чего же я рада, что ты вернулся! Мне так трудно одной, я так устала!</p><p class="p1">Когда-то я мог только мечтать о таком. Но вот это случилось, и что? Я не собирался говорить сестре, что будет со мной. Вправе ли я принять ее любовь? Будь я прежним Чарли, разве стала бы она так разговаривать со мной? Скоро, скоро время сорвет с меня маску…</p><p class="p1">— Не плачь, Норма, все будет хорошо, — услышал я свой нежный голос. — Я буду заботиться о вас. У меня есть деньги, и вместе с тем, что платит фонд Уэлберга, их вполне хватит, чтобы посылать еще и вам.</p><p class="p1">— Разве ты уходишь? Ты должен остаться с нами…</p><p class="p1">— Мне нужно еще кое-куда съездить, кое над чем поработать, прочитать несколько докладов, но я обязательно буду навещать вас. Заботиться о маме, она через многое прошла. Я буду помогать вам, пока смогу.</p><p class="p1">— Чарли, нет! Не уходи! — Норма вцепилась в меня. — Мне страшно!</p><p class="p1">Вот роль, которую мне всегда хотелось сыграть — Старший Брат.</p><p class="p1">В этот момент я почувствовал, что Роза, которая до этого тихо сидела в углу, смотрит на нас. Что-то изменилось в ее лице, глаза расширились, и вся она подалась вперед. Она показалась мне орлицей, готовой броситься на защиту своего гнезда.</p><p class="p1">Я оттолкнул Норму и не успел произнести ни слова, как Роза вскочила со стула, схватила со стола кухонный нож и наставила его на меня.</p><p class="p1">— Что ты делаешь? Не смей прикасаться к ней! Сколько раз я говорила, чтобы ты не смел прикасаться к своей сестре! Грязное животное! Тебе нельзя жить с нормальными людьми!</p><p class="p1">Мы оба отпрыгнули назад. По какой-то непонятной причине я почувствовал себя виноватым, словно меня застали за постыдным занятием. Я догадывался, что Норма чувствует то же самое. Слова матери сделали наши объятия непристойными.</p><p class="p1">Норма крикнула:</p><p class="p1">— Мама! Положи нож!</p><p class="p1">Вид Розы с ножом в руке сразу заставил меня вспомнить тот вечер, когда она вынудила Матта увести меня из дома. Сейчас она словно заново переживала тот случай. Я же не мог сдвинуться с места. Волной прокатилась по телу тошнота, знакомое удушье, гул в ушах… Внутренности завязались в тугой узел и натянулись, будто хотели вырваться из моего грешного тела.</p><p class="p1">У Розы — нож, у Алисы — нож, и у отца был нож, и у доктора Штрауса тоже…</p><p class="p1">К счастью, Норма сохранила достаточно самообладания, и ей удалось отнять у Розы орудие убийства. Но Роза продолжала вопить:</p><p class="p1">— Гони его отсюда! Ему нельзя смотреть так на свою сестру!</p><p class="p1">Потом она упала в кресло и заплакала.</p><p class="p1">Ни я, ни Норма не знали, что говорить и что делать. Оба мы были ужасно смущены. Теперь она поняла, почему меня лишили дома.</p><p class="p1">Интересно, сделал ли я хоть раз в жизни что-нибудь такое, что подтвердило бы опасения матери? По крайней мере, сам я не мог вспомнить ничего подобного, но как я мог быть уверен, что в моем истерзанном мозгу никогда не зарождались ужасные мысли? Наверно, я уже не узнаю этого, но нельзя ненавидеть женщину за то, что она защищает свою дочь. Если я не прощу ее, в жизни моей не останется ничего.</p><p class="p1">Норму била дрожь.</p><p class="p1">— Успокойся, — сказал я. — Она не ведает, что творит. Не на меня наставляла она нож, а на того, прежнего, Чарли. Она боялась <em>его</em>. А мы… давай не будем вспоминать о <em>нем</em>. Он ушел навеки. Правда?</p><p class="p1">Она не слушала меня. На лице ее появилось задумчивое выражение.</p><p class="p1">— Со мной только что случилась странная вещь… Мне показалось, что все это уже было, и та же самая сцена в точности повторяется…</p><p class="p1">— Все хоть раз в жизни испытывали нечто подобное…</p><p class="p1">— Да, но когда я увидела ее с этим ножом, я подумала, что это сон, который приснился мне много лет назад.</p><p class="p1">Зачем говорить ей, что это не сон, что она не спала в ту далекую ночь и все видела из своей комнаты? Что видение это подавлялось и видоизменялось, оставив после себя ощущение нереальности? Не надо отягощать ее душу правдой, ей еще придется хлебнуть горя с мамой. Я с радостью снял бы с нее этот груз и эту боль, но нет никакого смысла начинать то, что не сможешь закончить. Я сказал:</p><p class="p1">— Мне пора уходить. Береги ее и себя.</p><p class="p1">Я сжал ее руку и вышел. Наполеон облаял меня.</p><p class="p1">В доме у Розы я сдерживался, но когда вышел на улицу, у меня не осталось на это сил. Трудно писать об этом, но когда я шел к машине, то плакал, как ребенок, а люди смотрели мне вслед. Я ничего не мог поделать с собой, до людей же мне не было дела.</p><p class="p1">Я шел, и в голове моей зазвучали непонятные стишки, звучали снова и снова, подстраиваясь под ритм моих шагов:</p><div class="poem">
<div class="stanza">
<p class="v">Три слепых мышонка… три слепых мышонка,</p>
<p class="v">Как они бегут! Как они бегут!</p>
<p class="v">Они бегут за фермерской женой,</p>
<p class="v">Отрезавшей им хвостики кухонным ножом.</p>
<p class="v">Ты когда-нибудь видал такое?</p>
<p class="v">Три… слепых… мышонка…</p>
</div>
</div><p class="p1">Я не мог выбросить эту чепуху из головы. Обернулся я всего один раз и увидел глядящее на меня детское лицо, прижавшееся к оконному стеклу.</p></span>
