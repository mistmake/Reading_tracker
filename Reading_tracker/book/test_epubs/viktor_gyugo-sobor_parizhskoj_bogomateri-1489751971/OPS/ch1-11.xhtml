<p class="p">III. Besos para colpes<a href="ch2.xhtml#id99" class="a">[26]</a></p>
</div><p class="p1">К тому времени, как Пьер Гренгуар дошел до Гревской площади, он совсем окоченел от холода. Чтобы избежать толпы на мосту Шанж и флагов Жана Фурбо, он свернул на Мельничный мост. Но по пути вертевшиеся колеса всех мельниц епископа так забрызгали его, что он промок насквозь. К тому же он чувствовал, что после провала своей пьесы его как будто еще больше знобит. А потому он быстро направился к праздничному костру, великолепно пылавшему на середине площади, но костер был окружен плотным кольцом людей.</p><p class="p1">– Проклятые парижане! – сказал про себя Гренгуар, почувствовав, как настоящий драматург, пристрастие к монологам. – Теперь они загораживают мне огонь. А как бы мне нужно было погреться и пообсушиться. Мои башмаки промокли, а эти отвратительные мельницы окатили меня с ног до головы водой! Чтобы черт побрал парижского епископа со всеми его мельницами! Интересно знать, на что епископу мельницы? Уж не собирается ли он из епископа превратиться в мельника? Если для этого нужно только мое проклятие, то я с удовольствием прокляну и его самого, и его собор, и его мельницы!.. А эти зеваки и не думают расходиться! И что, спрашивается, они там делают? Греются, вот так удовольствие! Смотрят, как горит сотня поленьев, – есть чем любоваться!</p><p class="p1">Однако, подойдя поближе, Гренгуар заметил круг гораздо больший, чем нужно для того, чтобы греться около королевского костра, и что это стечение зрителей объяснялось не только красотой сотни горящих поленьев.</p><p class="p1">В довольно большом пустом пространстве между толпой и костром танцевала девушка. Несмотря на весь свой скептицизм философа и всю свою иронию поэта, Гренгуар в первую минуту не мог решить, была эта молодая девушка человеческим существом, феей или ангелом, – до такой степени был он очарован ослепительным видением. Она была невысока ростом, но тонкая фигурка ее была так стройна, что казалась высокой. Она была брюнетка, и днем кожа ее, как нетрудно было догадаться, имела тот чудный золотистый оттенок, который свойственен андалузкам и римлянкам. Ее маленькие ножки так легко и свободно двигались в хорошеньких узких башмачках, что тоже казались ножками андалузки. Она танцевала, вертелась, кружилась на небрежно брошенном на землю старом персидском ковре, и каждый раз, как она повертывалась и ее сияющее лицо мелькало перед вами, она обжигала вас, как молнией, взглядом своих больших черных глаз.</p><p class="p1">Все взгляды были обращены на нее, все рты полуоткрыты. Она танцевала с тамбурином, поднимая его над головой нежными, точно выточенными руками. Тоненькая, легкая и подвижная, как оса, в золотистом корсаже, плотно облегающем талию, пестрой, развевающейся юбке, иногда открывавшей ее стройные ножки, с обнаженными плечами, черными волосами и сверкающими глазами – она действительно казалась сверхъестественным существом.</p><p class="p1">«Это саламандра, – думал Гренгуар, – это нимфа, богиня, вакханка!»</p><p class="p1">В эту минуту одна из кос «саламандры» расплелась, и блестящая медная монета, привязанная к ней, упала и покатилась по земле.</p><p class="p1">– Господи, да это цыганка! – воскликнул Гренгуар.</p><p class="p1">И вся иллюзия сразу исчезла.</p><p class="p1">Она снова принялась танцевать. Подняв с земли две шпаги и приложив их острием ко лбу, она начала вертеть их в одну сторону, а сама стала кружиться в другую. Да, это была простая цыганка. Но как ни велико было разочарование Гренгуара, он не мог не поддаться обаянию этого зрелища, в котором было что-то волшебное. Ярко-красное пламя костра освещало всю картину, дрожало на лицах зрителей, на смуглом лбу молодой девушки и отбрасывало слабый, прорезанный колеблющимися тенями отблеск в глубину площади, на старый, почерневший фасад Дома с колоннами с одной стороны и на каменные столбы виселицы – с другой.</p><p class="p1">Среди множества лиц, освещенных красным пламенем костра, особенно выделялось суровое, спокойное и мрачное лицо одного человека, поглощенного, казалось, больше всех остальных созерцанием танцовщицы.</p><p class="p1">Человеку этому, одежду которого нельзя было рассмотреть за окружавшей его толпой, казалось на вид не больше тридцати пяти лет. А между тем он был лыс, и только несколько прядей жидких и уже седеющих волос остались у него на висках. Его высокий и широкий лоб был изрезан морщинами, но впалые глаза сверкали пылом молодости, жаждой жизни и глубокой страстью. Он не спускал их с цыганки, и в то время, как беззаботная шестнадцатилетняя девушка танцевала и порхала, возбуждая восторг толпы, его мысли, казалось, становились все мрачнее. Время от времени улыбка и вздох встречались на его губах, но улыбка была еще печальнее вздоха.</p><p class="p1">Наконец молодая девушка, запыхавшись, остановилась, и толпа наградила ее рукоплесканиями.</p><p class="p1">– Джали! – позвала цыганка.</p><p class="p1">Тут только Гренгуар увидал хорошенькую белую подвижную козочку с глянцевитой шерстью, позолоченными рожками и копытцами и в золоченом ошейнике. До сих пор она лежала на уголке ковра, смотря, как танцует ее хозяйка, и он не заметил ее.</p><p class="p1">– Теперь твоя очередь, Джали, – сказала танцовщица.</p><p class="p1">Она села и, грациозно протянув козочке свой тамбурин, спросила:</p><p class="p1">– Какой теперь месяц, Джали?</p><p class="p1">Козочка подняла переднюю ногу и ударила по тамбурину один раз.</p><p class="p1">Был действительно январь. Толпа зааплодировала.</p><p class="p1">– Джали, – спросила молодая девушка, перевернув тамбурин, – какое у нас число?</p><p class="p1">Джали подняла свое позолоченное копытце и ударила им по тамбурину шесть раз.</p><p class="p1">– Джали, – продолжала цыганка, снова перевернув тамбурин, – который теперь час?</p><p class="p1">Козочка ударила по тамбурину семь раз. В ту же минуту на часах Дома с колоннами пробило семь часов.</p><p class="p1">Народ был в восторге.</p><p class="p1">– Это колдовство! – сказал зловещий голос в толпе. Голос принадлежал лысому человеку, не спускавшему глаз с цыганки.</p><p class="p1">Она вздрогнула и обернулась. Но в ту же минуту раздался гром рукоплесканий, заглушивший эти ужасные слова и изгладивший из памяти молодой девушки произведенное ими тяжелое впечатление.</p><p class="p1">– Джали, – обратилась она опять к своей козочке, – покажи, как ходит мэтр Гишар Гран-Реми, капитан городской стражи, во время крестного хода на Сретение.</p><p class="p1">Джали поднялась на задние ноги и заблеяла, переступая с такой уморительной важностью, что вся толпа разразилась громким хохотом при этой пародии на ханжу-капитана.</p><p class="p1">– Джали, – продолжала цыганка, ободренная все возраставшим успехом, – представь, как говорит речь мэтр Жак Шармолю, королевский прокурор духовного суда.</p><p class="p1">Козочка села и заблеяла, размахивая передними ножками, причем по ее позе и жестам сейчас же можно было узнать мэтра Жака Шармолю. Для полного сходства недоставало только плохого французского языка и такой же плохой латыни. Толпа разразилась восторженными рукоплесканиями.</p><p class="p1">– Это святотатство! Профанация! – снова раздался голос лысого человека. Цыганка опять обернулась.</p><p class="p1">– Ах, это тот противный человек! – прошептала она и, вытянув вперед нижнюю губку, сделала гримасу, которая, по-видимому, вошла у нее в привычку. Потом она повернулась на каблучках и, взяв в руки тамбурин, пошла собирать приношения зрителей.</p><p class="p1">Крупные и мелкие серебряные монеты и лиарды сыпались градом. Когда она проходила мимо Гренгуара, он необдуманно опустил руку в карман, и девушка остановилась перед ним.</p><p class="p1">– Черт возьми! – пробормотал поэт, найдя в своем кармане действительность, то есть пустоту.</p><p class="p1">А цыганка продолжала стоять, смотря на него своими большими глазами и протягивая ему тамбурин. Крупные капли пота выступили на лбу Гренгуара.</p><p class="p1">Если бы у него в кармане лежало все золото Перу, он не задумавшись отдал бы его танцовщице. Но никаких золотых россыпей Перу не было у Гренгуара, да и Америка в то время еще не была открыта.</p><p class="p1">Счастливая случайность помогла ему.</p><p class="p1">– Скоро ли ты уберешься отсюда, египетская саранча! – крикнул резкий голос из самого темного уголка площади.</p><p class="p1">Молодая девушка испуганно обернулась. Это говорил уже не лысый человек; это был голос женщины – злой, исступленный голос.</p><p class="p1">Восклицание, так напугавшее цыганку, доставило большое удовольствие бегавшим по площади детям.</p><p class="p1">– Это затворница башни Роланда! – со смехом закричали они. – Это она бранится! Должно быть, она не ужинала. Сбегаем в городской буфет и принесем ей каких-нибудь объедков!</p><p class="p1">И они побежали к Дому с колоннами.</p><p class="p1">Между тем Гренгуар, воспользовавшись смущением танцовщицы, обратился в постыдное бегство. Слова детей напомнили ему, что он тоже не ужинал. Он побежал к буфету. Но у ребятишек ноги были проворнее, чем у него, и, когда он пришел, они уже успели очистить стол. На нем не осталось решительно ничего. Только нежные лилии и розы, переплетаясь, красовались на стенках, расписанных в 1435 году Матье Битерном. Но такой ужин не мог, конечно, насытить нашего поэта.</p><p class="p1">Неприятно ложиться спать без ужина. Но еще неприятнее остаться без ужина и не иметь уголка, где бы можно было заснуть. Гренгуар был как раз в таком положении, – у него не было ни хлеба, ни пристанища. Горькая нужда теснила его со всех сторон, и он находил ее чересчур суровой. Давно уже открыл он ту истину, что Юпитер создал людей в припадке мизантропии и что мудрецу приходится всю жизнь бороться с судьбою, которая держит, словно в осаде, его философию. Что касается его самого, то никогда еще, казалось ему, эта осада не доходила до такой крайней степени. Желудок его бил тревогу, и он находил, что со стороны злой судьбы нечестно смирять его философию голодом.</p><p class="p1">Погрузившись в эти грустные размышления, он глубоко задумался, как вдруг странное, но необыкновенно нежное пение вывело его из задумчивости. Это пела молодая цыганка.</p><p class="p1">О ее голосе можно было сказать то же, что об ее танцах и красоте. В нем было что-то неизъяснимое и прелестное, что-то чистое, воздушное и, так сказать, окрыленное. Голос этот то повышался, то понижался; чудесные мелодии сменялись неожиданными переходами; простые музыкальные фразы перемежались с резкими, звонкими нотами; рулады, способные сбить с толку соловья, но всегда полные гармонии, переходили в мягкие переливы октав, то поднимаясь, то опускаясь, как грудь самой молодой певицы.</p><p class="p1">На ее прелестном лице с необыкновенной быстротой сменялось выражение, передавая все оттенки ее капризной песенки – от страстного вдохновения до самого чистого, целомудренного величия. Она казалась то безумной, то королевой. Она пела на неизвестном Гренгуару языке. Казалось, он был незнаком и самой певице, так как выражение, которое она придавала пению, часто совсем не подходило к словам. Безумным весельем звучали в ее устах слова:</p><div class="poem">
<div class="stanza">
<p class="v">Un cofre de gran riqueza</p>
<p class="v">Haralon dentro un pilar,</p>
<p class="v">Dentro del nuevas banderas</p>
<p class="v">Con figuras de espantar…<a href="ch2.xhtml#id97" class="a">[27]</a></p>
</div>
</div><p class="p1">А минуту спустя, когда она пела:</p><div class="poem">
<div class="stanza">
<p class="v">Alarabes de cavallo</p>
<p class="v">Sin paderse menear</p>
<p class="v">Con espadas, y los cuellos</p>
<p class="v">Ballestas de buen echar…<a href="ch2.xhtml#id95" class="a">[28]</a> –</p>
</div>
</div><p class="p1">у Гренгуара навернулись слезы.</p><p class="p1">Но чаще всего в ее пении звучала жизнерадостность: она пела весело и беззаботно, как птичка.</p><p class="p1">Песня цыганки нарушила задумчивость Гренгуара, как лебедь, плывя, тревожит водную гладь. Он слушал с восхищением, забыв обо всем на свете. После долгих тяжелых часов он в первый раз вздохнул свободно и не чувствовал страдания. Но это продолжалось недолго.</p><p class="p1">Голос той же женщины, которая прервала танец цыганки, теперь прервал ее пение.</p><p class="p1">– Замолчишь ли ты, чертова стрекоза! – крикнула она из своего темного угла.</p><p class="p1">Бедная «стрекоза» сразу умолкла, а Гренгуар заткнул себе уши.</p><p class="p1">– Ах, эта проклятая зазубренная пила разбила лиру! – воскликнул он.</p><p class="p1">В толпе тоже послышался ропот.</p><p class="p1">– К черту затворницу! – крикнул кто-то.</p><p class="p1">И невидимая старуха, нарушавшая общее веселье, могла бы дорого поплатиться за свои нападки на цыганку, если бы внимание толпы не было в эту минуту отвлечено процессией шутовского папы, уже обошедшей улицы и перекрестки и теперь хлынувшей с факелами и шумом на Гревскую площадь.</p><p class="p1">Эта процессия, о которой читатель составил себе некоторое понятие, когда она выходила из дворца, успела организоваться в пути и вобрать в себя по дороге всех парижских мошенников, воров и бродяг. Таким образом, когда она явилась на Гревскую площадь, у нее был весьма внушительный вид.</p><p class="p1">Впереди шествовало цыганское царство. Во главе его ехал верхом герцог цыганский со своими графами, которые шли рядом с ним, ведя за повод его коня и придерживая стремена; позади них двигалась беспорядочная толпа цыган и цыганок с маленькими плачущими детьми за плечами. Все они – герцог, графы и простой народ – были в лохмотьях и мишурных украшениях.</p><p class="p1">Затем следовало королевство «арго», то есть все воры Франции. Они были разделены по рангам на несколько отрядов. Мелкие воришки шли впереди, за ними, по четыре в ряд, следовали остальные, со знаками ученых степеней, в которые их возвел этот странный факультет. Тут были хромые, однорукие, карлики, слепые, кривые, эпилептики, расслабленные, сироты, плуты, лицемеры; перечисление всех утомило бы самого Гомера. Посреди святошей и плутов ехал король «арго», высокий человек, сидевший на корточках в маленькой тележке, которую везли две большие собаки.</p><p class="p1">Потом шло царство галилейское. Впереди бежали шуты, которые дрались между собою и выплясывали пиррический танец, а за ними важно выступал Гильом Руссо, царь галилейский, в пурпурной, залитой вином мантии, окруженный своими жезлоносцами, советниками и писцами счетной палаты.</p><p class="p1">Шествие замыкала корпорация судебных писцов в черных мантиях, с украшенными цветами «майскими ветвями», достойной шабаша музыкой и толстыми желтыми восковыми свечами. Посреди этой толпы высшие члены братства шутов несли на плечах носилки, на которые было налеплено больше свечей, чем на раке святой Женевьевы во время чумы. А на этих носилках сидел сияющий, облаченный в мантию, в митре и с посохом в руках новый папа шутов – звонарь собора Богоматери, Квазимодо-горбун.</p><p class="p1">У каждого отделения этой шутовской процессии была своя музыка. Цыгане били в тамбурины и балафосы. Народ «арго», далеко не музыкальный, все еще придерживался виолы, пастушьего рожка и готической рюбебы двенадцатого столетия. Царство галилейское стояло по части музыки почти на таком же уровне. Правда, в его оркестре слышались звуки гудка, но это был жалкий старинный гудок, имевший всего три тона. Зато около шутовского папы звучали и гремели в дикой какофонии все лучшие музыкальные инструменты той эпохи. Тут были уже новые гудки, отдельные – для верхних, средних и нижних регистров, было много флейт и медных инструментов. Увы! Как известно читателю, это был оркестр Гренгуара.</p><p class="p1">Трудно представить себе, до какой степени изменилось безобразное и грустное лицо Квазимодо с тех пор, как процессия выступила из дворца и добралась до Гревской площади. Теперь это лицо просветлело, озаренное выражением гордости и блаженства. Первый раз за всю свою жизнь испытал Квазимодо чувство удовлетворенного самолюбия. До сих пор он не знал ничего, кроме унижений; все относились к нему с презрением ввиду его низкого положения, все с отвращением смотрели на его фигуру и лицо. А потому, несмотря на свою глухоту, он наслаждался, как настоящий папа, восторженными криками толпы, которую ненавидел за ненависть к себе. Правда, народ его состоял из всякого сброда – из воров, шутов, нищих и калек, – но что из этого! Все же это был народ, а он – его властелин. И он принимал за чистую монету иронические рукоплескания и насмешливые знаки уважения, хотя нужно сознаться, что к чувствам толпы примешивалась немалая доля страха. Горбун был силен, кривоногий был ловок, глухой был зол – три качества, умеряющие насмешки.</p><p class="p1">Но едва ли новый папа шутов отдавал себе ясный отчет в чувствах, которые он возбуждал и которые испытывал сам. Ум, обитавший в этом уродливом теле, тоже не мог развиться как следует, не мог рассуждать здраво и делать точные выводы. А потому Квазимодо лишь смутно и неопределенно сознавал то, что сам он чувствовал в эту минуту.</p><p class="p1">Только радость охватывала его все сильнее, только гордость преобладала над всем! Это уродливое, жалкое лицо было, казалось, озарено сиянием.</p><p class="p1">В ту минуту, как опьяненного величием Квазимодо торжественно несли мимо Дома с колоннами, какой-то человек, к изумлению и ужасу толпы, вдруг бросился к нему и гневным движением вырвал у него из рук деревянный позолоченный посох – знак его папского достоинства.</p><p class="p1">Этот смельчак был тот самый лысый незнакомец, который некоторое время тому назад, стоя в толпе, окружавшей цыганку, испугал молодую девушку своими угрожающими, полными ненависти словами. На нем была одежда духовного лица. В ту минуту, как он бросился к Квазимодо, Гренгуар, до сих пор не видевший его, вскрикнул от удивления.</p><p class="p1">– Господи! – пробормотал он. – Да это мой учитель герметики, архидьякон Клод Фролло! Что ему нужно от этого кривого? Ведь тот разорвет его!</p><p class="p1">И действительно, раздался крик ужаса. Квазимодо в ярости соскочил с носилок, и женщины отвернулись, чтобы не видеть убийства архидьякона.</p><p class="p1">Горбун бросился к Клоду Фролло, взглянул на него и пал на колени. Архидьякон сорвал с него тиару, сломал его посох и разорвал мишурную мантию.</p><p class="p1">Квазимодо продолжал стоять на коленях, опустив голову и сложив руки.</p><p class="p1">Потом между ними начался странный разговор на языке знаков и жестов, так как ни один из них не произносил ни слова. Архидьякон стоял гневный, в угрожающей, повелительной позе; Квазимодо склонялся к его ногам, смиренный, умоляющий. А между тем он мог бы одним пальцем уничтожить Клода Фролло, – в этом не было ни малейшего сомнения.</p><p class="p1">Наконец архидьякон, сжав могучее плечо Квазимодо, знаком велел ему встать и следовать за собою.</p><p class="p1">Горбун встал.</p><p class="p1">Тогда братство шутов, опомнившись от первого изумления, решило защищать своего так грубо свергнутого папу; цыгане, воры и писцы с криками окружили архидьякона.</p><p class="p1">Квазимодо заслонил его собою, сжал свои страшные кулаки и, оглядев толпу, заскрежетал зубами, как разъяренный тигр.</p><p class="p1">Архидьякон, лицо которого приняло свое обычное спокойное и строгое выражение, сделал ему знак и молча стал удаляться.</p><p class="p1">Горбун пошел впереди, расталкивая народ на его пути.</p><p class="p1">Когда они выбрались из толпы и пересекли площадь, толпа любопытных и зевак двинулась за ними. Тогда Квазимодо занял место в арьергарде и, обернувшись к ним лицом, пятясь, пошел за архидьяконом. Угрюмый, коренастый, всклокоченный, чудовищный, насторожившийся, он облизывал свои кабаньи клыки, ворчал, как дикий зверь, и одним взглядом или жестом заставлял толпу отпрянуть в сторону.</p><p class="p1">Наконец они оба вошли в узкую темную улицу, и никто не решился следовать за ними, – одна мысль о страшном, скрежещущем зубами Квазимодо преграждала туда путь.</p><p class="p1">– Вот так чудеса! – сказал Гренгуар. – Но где же, черт возьми, я добуду себе ужин?</p></span><span id="id14"><div class="title4">
<p class="p">IV. Неудобства, которым подвергаешься, преследуя вечером хорошенькую женщину</p>
</div><p class="p1">Не зная, куда идти, Гренгуар пошел за цыганкой. Он видел, как она повернула со своей козочкой на улицу ножовщиков, и тоже свернул туда.</p><p class="p1">«Почему бы и нет!» – подумал он.</p><p class="p1">Гренгуар, практический философ парижских улиц, заметил, что мечтательное настроение легче всего приходит, когда следуешь за хорошенькой женщиной, не зная, куда она идет. Это добровольное отречение от своей воли, подчинение своей фантазии фантазии другого, даже не подозревающего о том, смесь независимости и слепого повиновения, нечто среднее между свободой и рабством, – нравились Гренгуару. У него был нерешительный, сложный характер, постоянно переходящий из одной крайности в другую, колеблющийся между различными желаниями и стремлениями, которые вследствие этого взаимно уничтожались. Он сам охотно сравнивал себя с гробом Магомета, который два магнита тянут в противоположные стороны и который вечно колеблется между верхом и низом, между восхождением и падением, между зенитом и надиром.</p><p class="p1">Если бы Гренгуар жил в наше время – какое великолепное место занял бы он между классицизмом и романтизмом!</p><p class="p1">Но, к сожалению, он родился слишком поздно, когда люди уже перестали жить по триста лет. А между тем в наши дни его отсутствие особенно ощутимо и заметно.</p><p class="p1">Настроение человека, не имеющего пристанища на ночь, как нельзя лучше подходит для того, чтобы следовать за прохожими и прежде всего, конечно, за женщинами, что Гренгуар проделывал охотно.</p><p class="p1">Итак, он шел, задумавшись, за молодой девушкой, которая ускорила шаг и заставляла бежать свою козочку, видя, что все расходятся по домам и таверны запираются. Все остальные лавки были закрыты в этот день.</p><p class="p1">«Ведь живет же она где-нибудь, – думал Гренгуар. – У цыган доброе сердце. Кто знает?..»</p><p class="p1">Многоточие, которое он мысленно ставил после этого вопроса, таило за собой что-то недосказанное и, по-видимому, очень приятное.</p><p class="p1">Время от времени, когда он проходил мимо групп горожан, возвращавшихся домой и запиравших за собою двери, обрывки их разговоров, долетавшие до него, прерывали цепь его мечтаний.</p><p class="p1">Вот встретились на улице два старика.</p><p class="p1">– А какой холод-то сегодня, мэтр Тибо Ферникль! – произнес один.</p><p class="p1">Гренгуар знал это с самого начала зимы.</p><p class="p1">– Ваша правда, мэтр Бонифаций Дизом, – отвечал другой. – Неужели у нас будет опять такая же зима, как три года тому назад, в четыреста восьмидесятом году, когда охапка дров стоила восемь солей?</p><p class="p1">– Это что, мэтр Тибо! А помните зиму в четыреста семидесятом году, когда морозы стояли с Мартинова дня и до самого Сретения, – да такие морозы, что у секретаря парламента через каждые три слова замерзали на пере чернила! И из-за этого пришлось запустить дела.</p><p class="p1">Вот две соседки болтают, стоя у окон с зажженными свечами, потрескивающими от тумана.</p><p class="p1">– Слышали вы, какое несчастье случилось сегодня, госпожа де Бурдак? Рассказывал вам муж?</p><p class="p1">– Нет. Что же такое случилось, госпожа Тюркан?</p><p class="p1">– Лошадь нотариуса Жилля Годена испугалась фламандцев с их свитой и сбила с ног мэтра Филиппа Аврилло, облата целестинских монахов.</p><p class="p1">– Неужели?</p><p class="p1">– Истинная правда.</p><p class="p1">– Лошадь горожанина! Это уж слишком. Еще будь это кавалерийская лошадь – куда ни шло!</p><p class="p1">Окна захлопнулись. Но Гренгуар все-таки терял нить своих мыслей.</p><p class="p1">К счастью, он скоро опять находил ее благодаря цыганке и Джали, двум нежным, грациозным, прелестным созданиям, шедшим впереди. Он любовался их маленькими ножками, их стройными формами и грациозными движениями, и они почти сливались в его воображении. По своему уму и дружбе обе они казались ему молодыми девушками; по легкости и быстроте походки это были две козочки.</p><p class="p1">Между тем улицы становились с каждой минутой все темнее и пустыннее.</p><p class="p1">Прошло уже довольно много времени с тех пор, как прозвучал колокольный сигнал тушить огни, и теперь только изредка попадался на улице прохожий или светился где-нибудь в окне огонек.</p><p class="p1">Гренгуар последовал за цыганкой в запутанный лабиринт улиц, перекрестков и глухих переулков, которые окружают старинное кладбище «Невинных душ» и походят на моток ниток, перепутанный кошкой.</p><p class="p1">«Вот улицы, которым не хватает логики!» – думал Гренгуар, путаясь в бесчисленных поворотах, которые, казалось ему, приводили опять на то же место. Но девушка, очевидно, хорошо знала эту местность: она без малейшего колебания шла вперед, все ускоряя шаг. Что же касается Гренгуара, то он совсем сбился с толку и не мог бы сказать, куда попал, если бы не заметил на повороте одной улицы восьмиугольного позорного столба Рыночной площади, сквозная верхушка которого резко выделялась своей черной резьбой на освещенном окне одного из домов улицы Верделе.</p><p class="p1">Молодая девушка наконец заметила, что ее преследуют, и несколько раз с беспокойством оглянулась назад. Один раз она даже остановилась и, воспользовавшись светом, проникавшим из полуотворенной двери булочной, внимательно оглядела Гренгуара с головы до ног. После этого осмотра она сделала гримасу, которую он уже видел раньше, и пошла дальше.</p><p class="p1">Эта хорошенькая гримаска заставила призадуматься Гренгуара; она – в этом не могло быть сомнения – выражала презрение и насмешку. А потому он немножко замедлил шаг и, опустив голову, стал считать камни мостовой, следуя за девушкой уже на некотором отдалении. Вдруг на повороте одной улицы девушка пропала у него из виду, и он услыхал ее пронзительный крик.</p><p class="p1">Гренгуар ускорил шаг.</p><p class="p1">Улица была окутана мраком. К счастью, на углу, около статуи Пресвятой Девы, горела в железном фонаре пропитанная маслом светильня, и при ее слабом свете Гренгуар увидел цыганку, вырывавшуюся из рук двоих мужчин, старавшихся заглушить ее крики. Бедная перепуганная козочка опустила рога и жалобно блеяла.</p><p class="p1">– Стража, сюда! – крикнул Гренгуар и смело бросился вперед.</p><p class="p1">Один из мужчин, державших девушку, обернулся к нему, и он увидел страшное лицо Квазимодо.</p><p class="p1">Гренгуар не обратился в бегство, но и не двинулся с места.</p><p class="p1">Квазимодо подошел к нему, одним ударом сбил его с ног и быстро скрылся в темноте, унося молодую девушку, перебросив ее через плечо, как шелковый шарф. Его спутник последовал за ним, а бедная козочка, продолжая жалобно блеять, побежала сзади.</p><p class="p1">– Помогите! Помогите! – кричала несчастная цыганка.</p><p class="p1">– Стойте, негодяи, и освободите эту женщину! – раздался вдруг громовой голос, и из-за угла появился какой-то всадник.</p><p class="p1">Это был капитан королевских стрелков, вооруженный с головы до ног и с обнаженной саблей в руке.</p><p class="p1">Он вырвал цыганку из рук ошеломленного Квазимодо и положил ее поперек своего седла. А когда ужасный горбун, опомнившись от изумления, бросился к нему, чтобы отнять свою добычу, человек пятнадцать вооруженных палашами стрелков, ехавших следом за своим начальником, подскакали к нему. Этот отряд был послан в ночной объезд по распоряжению парижского прево мессира Роберта д’Эстуваля.</p><p class="p1">Квазимодо схватили и связали по рукам и ногам. Он кричал, бесновался, кусался, и, будь это днем, один вид его безобразного, искаженного гневом лица, которое от этого было еще ужаснее, чем обычно, наверное, обратил бы в бегство весь отряд. Но темнота лишила горбуна самого страшного его оружия – безобразия.</p><p class="p1">Спутник Квазимодо исчез во время схватки.</p><p class="p1">Цыганка, грациозно приподнявшись на седле и положив руки на плечи молодого всадника, несколько секунд пристально смотрела на него, как бы благодаря его за оказанную услугу и вместе с тем восхищаясь его красивой наружностью. Она первая нарушила молчание. Придав еще больше нежности своему и без того нежному голосу, она спросила:</p><p class="p1">– Как вас зовут, господин стрелок?</p><p class="p1">– Капитан Феб де Шатопер к вашим услугам, моя красавица, – выпрямившись, ответил офицер.</p><p class="p1">– Благодарю вас, – сказала она.</p><p class="p1">И в то время как капитан самодовольно крутил усы, она, как падающая на землю стрела, соскользнула с лошади и исчезла быстрее молнии.</p><p class="p1">– Черт возьми! – воскликнул капитан и велел стянуть покрепче ремни, которыми был связан Квазимодо. – Мне было бы гораздо приятнее оставить у себя девушку!</p><p class="p1">– Делать нечего, капитан! – сказал один из его спутников. – Птичка улетела, а летучая мышь осталась.</p></span><span id="id15"><div class="title4">
<p class="p">V. Продолжение неудач</p>
</div><p class="p1">Оглушенный падением, Гренгуар продолжал лежать на углу улицы, перед статуей Пресвятой Девы. Мало-помалу он пришел в себя. Сначала, в продолжение нескольких минут, он находился в полубессознательном и довольно приятном забытьи, причем воздушные фигуры цыганки и козочки сливались в его сознании с полновесным кулаком Квазимодо. Но это состояние продолжалось недолго. Довольно сильный холод, который ощущало его тело от соприкосновения с мостовой, вывел его из забытья и привел в себя.</p><p class="p1">«Отчего мне так холодно?» – подумал он и тут только заметил, что лежит в уличной канаве.</p><p class="p1">– Черт побери этого горбатого циклопа! – проворчал сквозь зубы Гренгуар и хотел встать. Но у него так кружилась голова и он был до того разбит, что не мог подняться и принужден был остаться на месте. Делать нечего – приходилось покориться. Он поднял руку и зажал себе нос.</p><p class="p1">«Парижская грязь, – подумал он, в полной уверенности, что луже, в которой он лежит, суждено было послужить ему на этот раз ночлегом (“А что же делать на ложе, как не мечтать”), – парижская грязь как-то особенно зловонна. Она, наверное, заключает в себе много летучей соли и азотной кислоты. По крайней мере, так полагает мэтр Никола Фламель и герметики…»</p><p class="p1">Слово «герметики» напомнило ему об архидьяконе Клоде Фролло. Он вспомнил страшную сцену, которая произошла на его глазах; вспомнил, как цыганка отбивалась от двоих мужчин; вспомнил, что у Квазимодо был спутник, – и суровое, гордое лицо архидьякона смутно промелькнуло в его памяти.</p><p class="p1">«Это было бы очень странно!» – подумал он и по одной лишь данной принялся строить на весьма шатком основании причудливое здание гипотез – этот карточный домик философов.</p><p class="p1">– Господи! Я совсем замерзаю! – вдруг воскликнул он, снова возвращаясь к действительности.</p><p class="p1">Положение Гренгуара становилось действительно невыносимым. Каждая частичка воды отнимала частичку теплоты его тела, так что его температура, мало-помалу понижаясь, начала весьма неприятным образом сравниваться с температурой воды.</p><p class="p1">Но тут Гренгуара постигла новая беда. Толпа уличных мальчишек, этих маленьких босоногих дикарей, которые с незапамятных времен гранят мостовые Парижа и называются «гаменами», которые в дни нашего детства швыряли камнями в нас, когда мы по вечерам выходили из школы, только за то, что наши панталоны не были оборваны, – толпа этих буйных ребятишек показалась на перекрестке, где лежал Гренгуар. Нисколько не заботясь о том, что все уже спят, они с громким хохотом и криком тащили за собою какой-то безобразный мешок. Деревянные башмаки их с таким громом били о мостовую, что этот стук мог бы разбудить мертвого. Гренгуар, который был еще не совсем мертв, немножко приподнялся.</p><p class="p1">– Эй, Геннекен Дандеш! Эй, Жан Пенсбурд! – во все горло кричали они. – Старик Эсташ Мубон, торговавший на углу железом, умер. У нас его соломенное чучело, мы разведем из него костер – устроим иллюминацию по случаю приезда фламандцев.</p><p class="p1">И они швырнули чучело прямо на Гренгуара, к которому подбежали, не заметив его. Потом один из них взял пук соломы и стал зажигать его от лампадки, горевшей перед статуей Пресвятой Девы.</p><p class="p1">– Господи помилуй! – пробормотал Гренгуар. – Теперь мне будет, пожалуй, уж чересчур жарко.</p><p class="p1">Минута была критическая. Гренгуар мог очутиться в безвыходном положении, между водой и огнем. Сделав такое же страшное, нечеловеческое усилие, какое сделал бы для спасения своей жизни фальшивомонетчик, видя, что его собираются варить в котле, Гренгуар встал, отбросил чучело на мальчишек и бросился бежать.</p><p class="p1">– Пресвятая Дева! – вскрикнули дети. – Это вернулся старик Мубон!</p><p class="p1">И они тоже умчались без оглядки.</p><p class="p1">Поле битвы осталось за соломенным чучелом. Летописцы Бельфорз, священник ле Жюж и Коррозэ уверяют, что на другой день местное духовенство подняло его и торжественно отнесло в церковь Сент-Опортюнэ. Для ризницы этой церкви оно до 1789 года служило довольно прибыльной статьей дохода, так как появление чучела Эсташа Мубона на перекрестке считалось чудом, совершенным Пресвятой Девой, статуя которой стояла тут же, на углу улицы Монконсейль. Она одним своим присутствием спасла в памятную ночь с 6 на 7 января 1482 года умершего Эсташа Мубона, который, желая подшутить над дьяволом, умирая, запрятал свою душу в соломенное чучело.</p></span></span></span>
