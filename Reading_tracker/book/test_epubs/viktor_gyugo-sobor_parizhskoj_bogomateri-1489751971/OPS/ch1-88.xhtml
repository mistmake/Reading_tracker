<p class="p">4. Ненависть роднит самых несходных людей</p>
</div><p class="p1">Чужого успеха не выносят, в особенности те, кому он вредит. Пожираемые редко любят пожирателей. «Человек, который смеется» стал положительно событием. Окрестные фигляры негодовали. Театральный успех – это смерч, который, засасывая толпу, оставляет вокруг пустое пространство. В балагане, стоящем напротив, начался переполох. Повышение сборов в балагане «Зеленый ящик» сразу же вызвало снижение выручки в соседних заведениях. Балаганы, которые до этого времени охотно посещались, внезапно перестали привлекать к себе зрителей. Это было как бы понижением уровня жидкости в одном из двух сообщающихся сосудов, о котором можно было судить по повышению уровня в другом. Все театры знают эти приливы и отливы: половодье в одном вызывает мелководье в другом. Ярмарочный муравейник, выставлявший напоказ на соседних подмостках свои таланты и фанфарами зазывавший к себе публику, оказался совершенно разоренным «Человеком, который смеется»; но, впав в отчаяние, он вместе с тем был ослеплен Гуинпленом. Ему завидовали все скоморохи, все клоуны, все фигляры. Ну и счастливчик же этот обладатель звериной морды! Матери-комедиантки и канатные плясуньи с досадой смотрели на своих хорошеньких ребятишек и говорили, указывая на Гуинплена:</p><p class="p1">– Какая жалость, что у тебя не такое лицо!</p><p class="p1">Некоторые из них шлепали своих малышей, злясь, что они так красивы. Немало матерей, знай они только секрет, охотно изуродовали бы лицо своих сыновей наподобие Гуинплена. Ангельское личико, не приносящее никакого дохода, ничего не стоит по сравнению с дьявольской рожей, обогащающей ее обладателя.</p><p class="p1">Как-то мать одного малютки, игравшего на сцене купидонов и прелестного словно херувим, воскликнула:</p><p class="p1">– Что за неудачные вышли у нас дети! Вот Гуинплен уродился на славу.</p><p class="p1">И, погрозив кулаком своему ребенку, прибавила:</p><p class="p1">– Знала бы я, кто твой отец, уж устроила бы я ему скандал!</p><p class="p1">Гуинплен был курицей, несущей золотые яйца. «Какое удивительное чудо!» – только и слышно было во всех балаганах. Скоморохи, скрежеща зубами, глазели на Гуинплена с восхищением и отчаянием. Когда восторгается злоба – это называется завистью. В таких случаях ее голос становится воем. Соседи «Зеленого ящика» сделали попытку сорвать успех «Побежденного хаоса»; сговорившись между собой, они начали свистеть, хрюкать, выть. Это послужило для Урсуса поводом обратиться к толпе с обличительными речами в духе Гортензия и дало возможность Том-Джим-Джеку прибегнуть к тумакам, достаточно внушительным, чтобы восстановить порядок. Кулачная расправа, учиненная Том-Джим-Джеком, окончательно привлекла к нему внимание Гуинплена и вызвала уважение Урсуса. Впрочем, только издали, так как труппа «Зеленого ящика» ни с кем не искала знакомства и держалась особняком. Что же касается Том-Джим-Джека, то он казался головой выше предводительствуемого им сброда и ни с кем, по-видимому, не был дружен и близок: буян и зачинщик всяких скандалов, он то появлялся, то исчезал, всему свету приятель и никому не товарищ.</p><p class="p1">Однако неистовые завистники Гуинплена не сочли себя побежденными после нескольких затрещин, которые закатил им Том-Джим-Джек. Когда попытка освистать пьесу провалилась, таринзофилдские комедианты подали жалобу. Они обратились к властям. Это – обычный прием. Если чей-нибудь успех становится нам поперек дороги, мы сперва натравливаем на этого человека толпу, а затем прибегаем к содействию полиции.</p><p class="p1">К фиглярам присоединились священники: «Человек, который смеется» нанес ущерб проповедникам. Опустели не только балаганы, но и церкви. Часовни пяти саутворкских приходов лишились своих прихожан. Люди удирали с проповеди, чтобы посмотреть на Гуинплена. «Побежденный хаос», «Зеленый ящик», «Человек, который смеется» – все эти языческие мерзости брали верх над церковным красноречием. Глас вопиющего в пустыне, vox damantis jn deserto, в таких случаях не бывает доволен и охотно призывает на помощь власти предержащие. Настоятели пяти приходов обратились с жалобой к лондонскому епископу, а тот в свою очередь – к Ее Величеству.</p><p class="p1">Комедианты исходили в своей жалобе из соображений религиозного свойства. Они заявляли, что религии нанесено оскорбление. Они обвиняли Гуинплена в чародействе, а Урсуса – в безбожии.</p><p class="p1">Священники, напротив, выдвигали доводы общественного порядка. Оставляя в стороне вопросы церковные, они ссылались на нарушение парламентских актов. Это было более хитро. Ибо дело происходило во времена Локка, скончавшегося всего за шесть месяцев до этого, 28 октября 1704 года, и скептицизм, которым Болингброк вскоре заразил Вольтера, уже начинал оказывать свое влияние на умы. Впоследствии Уэсли пришлось снова обратиться к Библии, подобно тому как в свое время Лойола восстановил папизм.</p><p class="p1">Таким образом, на «Зеленый ящик» повели атаку с двух сторон: фигляры – во имя пятикнижия, и духовенство – во имя полицейских правил. С одной стороны – небо, с другой – дорожный устав, причем священники вступались за уличное движение, а скоморохи – за небо. Преподобные отцы утверждали, что «Зеленый ящик» препятствует свободному движению по дорогам, а фигляры усматривали в нем кощунство.</p><p class="p1">Был ли к этому какой-либо повод? Давал ли «Зеленый ящик» основание для обвинений? Да, давал. В чем же заключалось его преступление? А вот в чем: в труппе находился волк. Волку же в Англия жить не разрешается. Догу – можно, а волку – нельзя. Англия не возражает против собаки, которая лает, но не признает той, которая воет: такова грань между скотным двором и лесом. Настоятели и викарии пяти саутворкских приходов ссылались в своих жалобах на многочисленные королевские и парламентские статуты, объявлявшие волка вне закона. В заключение они требовали, чтобы Гуинплена заточили в тюрьму, а волка посадили в клетку или, на худой конец, изгнали обоих из прадедов Англии. По их словам, это вызывалось интересами общественного порядка, необходимостью оградить прохожих от опасности и т. п. Кроме того, они ссылались на авторитет науки. Они цитировали определение коллегии восьмидесяти лондонских медиков, ученого учреждения, существующего со времен Генриха VIII, имеющего, подобно государству, свою печать, возводящего больных в ранг подсудимых, пользующегося правом подвергать тюремному заключению всякого, кто преступит его постановления и нарушит его предписания; среди прочих направленных к охране здоровья граждан полезных открытий эта коллегия установила следующий чрезвычайно важный научный факт: «Если волк первым увидит человека, то человек охрипнет на всю жизнь. Кроме того, волк может укусить его».</p><p class="p1">Таким образом, Гомо оказался предлогом для преследования.</p><p class="p1">Благодаря хозяину гостиницы Урсус был осведомлен обо всех этих происках. Он встревожился, ибо боялся и когтей полиции и когтей правосудия. Чтобы бояться судейских чиновников, достаточно одного только страха: вовсе нет необходимости быть в чем-нибудь виновным. – Урсус совершенно не желал входить в соприкосновение с шерифами, прево, судьями или коронерами. Он отнюдь не стремился лицезреть их близко. Он так же жаждал познакомиться с представителями судебного ведомства, как заяц с борзыми.</p><p class="p1">Он уже начинал сожалеть, что приехал в Лондон.</p><p class="p1">– От добра добра не ищут, – бормотал он про себя. – Я считал эту пословицу не стоящей внимания, и ошибался. Дурацкие истины оказываются самой настоящей правдой.</p><p class="p1">Против стольких объединившихся сил, против скоморохов, вступившихся за религию, и против духовных пастырей, возмутившихся во имя медицины, бедный «Зеленый ящик», заподозренный в чародействе в лице Гуинплена и в водобоязни в лице Гомо, имел только один козырь – бездеятельность местных властей, являющуюся в Англии большой силой. Из этой-то бездеятельности и родилась английская свобода. В Англии свобода ведет себя так же, как ведет себя в Англии море. Она подобна морскому приливу. Обычай вздымается мало-помалу все выше и выше, поглощая в своей пучине страшное законодательство. Однако свирепый кодекс еще и поныне проступает сквозь прозрачную гладь свободы, – такова Англия.</p><p class="p1">«Человек, который смеется», «Побежденный хаос» и Гомо могли восстановить против себя фигляров, проповедников, епископов, палату общин, палату лордов, Ее Величество, Лондон, всю Англию – и оставаться тем не менее спокойными, пока за них стоял Саутворк. «Зеленый ящик» был излюбленным развлечением пригорода, а местные власти относились к нему, по-видимому, равнодушно. В Англии безразличие властей равносильно их покровительству. И пока шериф графства Серрей, в состав которого входит Саутворк, оставался в бездействии, Урсус мог дышать свободно, а Гомо – спать крепким сном.</p><p class="p1">Поскольку ненависть, внушаемая обитателями «Зеленого ящика», не достигала своей цели, она только способствовала их успеху. «Зеленому ящику» покуда жилось от этого ничуть не хуже. Даже напротив. В публику проникли слухи об интригах и подкопах, и «Человек, который смеется» стал еще популярнее. Толпа чутьем угадывает донос и принимает сторону жертвы. Быть предметом травли – значит вызывать сочувствие. Народ инстинктивно берет под защиту все, на что направлен угрожающий перст власти. Жертва доноса – запретный плод и от этого лишь кажется милее. Да и рукоплескания, неугодные высокому начальству, весьма приятны. Провести весело вечер, выражая в то же время сочувствие притесняемому и возмущение притеснителями, – кому же это не понравится? Ты покровительствуешь угнетаемому и вместе с тем развлекаешься. Прибавим, что владельцы балаганов продолжали, по взаимному уговору, свистать и шикать «Человеку, который смеется». Ничто не могло в большей мере содействовать его успеху. Когда враги поднимают шум, это только увеличивает и подчеркивает триумф. Друг скорее устанет хвалить, нежели враг поносить. Хула не причиняет вреда. Этого не понимают враги. Они не могут удержаться от оскорблений, и в этом их польза. Они неспособны молчать и тем самым постоянно подогревают интерес публики. Толпа валом валила посмотреть «Побежденный хаос».</p><p class="p1">Урсус хранил про себя все, что сообщал ему дядюшка Никлс об интригах и жалобах, поданных высокому начальству, и не затоваривал об этом с Гуинпленом, не желая лишать его спокойствия, необходимого актеру. Если нагрянет беда, об этом всегда успеешь узнать.</p></span><span id="id144"><div class="title6">
<p class="p">5. Жезлоносец</p>
</div><p class="p1">Впрочем, однажды Урсус счел необходимым отказаться от этой осторожности и во имя осторожности потревожить Гуинплена. Правда, он считал, что на этот раз речь идет о вопросе более важном, нежели происки ярмарочных фигляров и служителей церкви. Как-то раз, подобрав с полу фартинг, упавший при подсчете выручки, Гуинплен принялся внимательно рассматривать его; пораженный тем, что на этой монете, являвшейся как бы символом народной нищеты, изображена королева Анна, олицетворявшая паразитическое великолепие трона, он позволил себе в присутствии хозяина гостиницы весьма резкое суждение по этому поводу. Его слова, подхваченные Никлсом, передавались из уст в уста и в конце концов, через Фиби и Винос, дошли до Урсуса. Урсуса бросило в жар и в холод. Крамольные слова! Оскорбление Ее Величества! Он жестоко разбранил Гуинплена.</p><p class="p1">– Заткни ты свою омерзительную пасть. Закон сильных мира сего – бездельничать; закон маленьких людей – молчать. У бедняка только один друг – это молчание. Он должен произносить лишь односложное «да». Все принимать, со всем соглашаться – вот его единственное право. Отвечать «да» судье. Отвечать «да» королю. Знатные люди могут, если им вздумается, избивать нас – меня самого били не раз – такова уж их привилегия, и они ничуть не умаляют своего величия, ломая нам кости. Костолом – это разновидность орла. Преклонимся же перед скипетром: он – первый среди палок. Почтение не что иное, как осторожность, безропотное подчинение – самозащита. Тот, кто оскорбляет короля, подвергает себя той же опасности, что и девушка, отважившаяся отрезать гриву у льва. Мне передавали, будто ты болтал какие-то глупости насчет фартинга, который по существу совершенно то же, что и лиар, и что ты отозвался неуважительно об этой монете с изображением высочайшей особы – монете, за которую нам на рынке дают осьмушку соленой селедки. Берегись. Будь серьезнее. Вспомни, что на свете есть наказания. Проникнись уважением к закону. Ты находишься в стране, где человека, срубившего трехлетнее дерево, преспокойно ведут на виселицу, где охотникам божиться попусту надевают на ноги колодки. Пьяницу помещают в бочку с выбитым дном с отверстием для головы и с отверстиями по бокам для рук, так что ходить он может, но лечь не в состоянии. Ударивший кого-либо в зале Вестминстерского аббатства подлежит пожизненному заключению в тюрьме и конфискации имущества. У того же, кто сделает это в королевском дворце, отрубают правую руку. Щелкни кого-нибудь по носу так, чтобы у него пошла кровь, – и вот ты уже без руки. Уличенного в ереси сжигают на костре по приговору епископского суда. За пустячную провинность колесовали Кетберта Симпсона. Всего три года назад, в тысяча семьсот втором году, – как видишь, совсем недавно, – поставили к позорному столбу некоего злодея, Даниэля Дефо, за то, что он имел наглость напечатать имена членов палаты общин, которые накануне выступали с речами в парламенте. У человека, который предал Ее Величество, рассекают грудь, вырывают сердце и этим сердцем хлещут его по щекам. Вдолби себе в голову эти основные понятия права и справедливости. Никогда не позволять себе лишнего слова и при малейшей тревоге быть готовым к отлету – в этом вся моя отвага; советую и тебе поступать так же. Будь храбр, как птица, и болтлив, как рыба. Помни, Англия тем и хороша, что ее законодательство отличается поразительной мягкостью.</p><p class="p1">После этого внушения Урсус еще долго не мог успокоиться, Гуинплен же нисколько не встревожился: молодость неопытна, а потому бесстрашна. Однако, по-видимому, Гуинплен имел все основания сохранять спокойствие, ибо несколько недель протекло без всяких волнений и его слова о королеве как будто не повлекли за собой никаких последствий. Урсус, как известно, не отличался беспечностью и, подобно косуле, все время был настороже.</p><p class="p1">Однажды, несколько дней спустя после заданной Гуинплену головомойки, Урсус выглянул в слуховое окно, выходившее на площадь, и побледнел.</p><p class="p1">– Гуинплен!</p><p class="p1">– Что?</p><p class="p1">– Погляди.</p><p class="p1">– Куда?</p><p class="p1">– На площадь.</p><p class="p1">– Ну и что же?</p><p class="p1">– Видишь этого прохожего?</p><p class="p1">– Человека в черном?</p><p class="p1">– Да.</p><p class="p1">– С дубинкой в руке?</p><p class="p1">– Да.</p><p class="p1">– Ну так что же?</p><p class="p1">– Так вот, Гуинплен, этот человек – wapentake.</p><p class="p1">– Что это такое – wapentake?</p><p class="p1">– Это жезлоносец, окружной пристав.</p><p class="p1">– А что значит окружной пристав?</p><p class="p1">– Это значит praepositus hundredi.</p><p class="p1">– Кто он такой, этот praepositus hundredi?</p><p class="p1">– Очень страшное должностное лицо, начальник сотни.</p><p class="p1">– А что у него в руке?</p><p class="p1">– Это – iron-weapon.</p><p class="p1">– Что такое iron-weapon?</p><p class="p1">– Железный жезл.</p><p class="p1">– А что он с ним делает?</p><p class="p1">– Прежде всего приносит на нем присягу. Потому-то его и зовут жезлоносец.</p><p class="p1">– А затем?</p><p class="p1">– А затем прикасается им к кому-либо.</p><p class="p1">– Чем?</p><p class="p1">– Железным жезлом.</p><p class="p1">– Жезлоносец прикасается железным жезлом?</p><p class="p1">– Да.</p><p class="p1">– Что это означает?</p><p class="p1">– Это означает: следуйте за мной.</p><p class="p1">– И нужно за ним идти?</p><p class="p1">– Да.</p><p class="p1">– Куда?</p><p class="p1">– Почем я знаю?</p><p class="p1">– Но сам-то он говорит, куда?</p><p class="p1">– Нет.</p><p class="p1">– А спросить у него можно?</p><p class="p1">– Нет.</p><p class="p1">– Как это так?</p><p class="p1">– Он ничего не говорит, и ему ничего не говорят.</p><p class="p1">– Но…</p><p class="p1">– Он дотрагивается до тебя железным жезлом, и этим все сказано. Ты должен идти за ним.</p><p class="p1">– Но куда?</p><p class="p1">– Куда он поведет.</p><p class="p1">– Но куда же?</p><p class="p1">– Куда ему вздумается, Гуинплен.</p><p class="p1">– А если отказаться?</p><p class="p1">– Повесят.</p><p class="p1">Урсус снова высунул голову в окошко, вздохнул всей грудью и сказал:</p><p class="p1">– Слава Богу, прошел мимо! Это не к нам.</p><p class="p1">Урсус, по-видимому, больше, чем следовало, страшился сплетен и доносов, которые могли последовать за неосторожными словами Гуинплена.</p><p class="p1">Дядюшке Никлсу, в чьем присутствии они были сказаны, не было никакой выгоды навлечь подозрение властей на бедных обитателей «Зеленого ящика». «Человек, который смеется» приносил немалый доход ему самому. «Побежденный хаос» оказался залогом двойного преуспеяния: в то время как в «Зеленом ящике» торжествовало искусство, в кабачке процветало пьянство.</p></span></span></span></span>
