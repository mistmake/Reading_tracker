<p class="p">I. Беспристрастный взгляд на старинную магистратуру</p>
</div><p class="p1">В 1482 году во всем Париже не было человека счастливее благородного Робера д’Эстувиля, сьёра де Бейна, барона д’Иври и Сен-Андри ан ла Марш, советника и камергера короля и парижского прево. Последнюю должность, очень почетную, он получил от короля еще семнадцать лет тому назад, а именно 7 ноября 1465 года, столь памятного появлением страшной кометы<a href="ch2.xhtml#id232" class="a">[76]</a>. Кстати сказать, эта должность давала гораздо больше прав, чем обязанностей, по определению Иоанна Лемнея, сказавшего о ней: «Dignitas, quae cum non exiqua potestate politiam concernente, atque praerogativis multus et juribus conjuncta est»<a href="ch2.xhtml#id230" class="a">[77]</a>. В 1482 году было чудом увидеть человека, состоящего на королевской службе со времени бракосочетания побочной дочери Людовика XI с незаконным сыном герцога Бурбонского. В тот же самый день, когда Робер д’Эстувиль заместил Жака де Вилье в звании главного парижского судьи, мэтр Жан Довэ был назначен первым президентом парламентского суда на место мессира Эли де Торета, Жан Ювенал Дезюрсен сменил Пьера де Морвилье в должности государственного канцлера, а Реньо де Дорман сделался преемником Пьера Пюи в должности начальника канцелярии королевского двора. С тех пор три последние должности много раз уже переходили из рук в руки, а Робер д’Эстувиль все еще сидел на своем месте. Королевский патент гласил, что должность главного парижского судьи «дается ему на хранение», и он действительно хранил ее хорошо. Он так крепко вцепился в эту прибыльную должность, точно прирос к ней и сроднился с нею, и, несмотря на страсть Людовика XI к переменам, усидел на месте.</p><p class="p1">Как известно, этот недоверчивый и упрямый король, постоянно сам во все входивший, любил поддерживать упругость своей власти частыми перемещениями должностных лиц, увольнением старых и назначением новых. Что же касается д’Эстувиля, то почтенный прево, на случай своей смерти, добился даже и для своего сына формального закрепления за ним должности главного парижского судьи, так что за последние годы имя его сына, Жака д’Эстувиля, конюшего, красовалось рядом с именем отца в списке служебного персонала Парижского судебного приказа. Поистине редкая и знаменательная милость! Правда, Робер д’Эстувиль был храбрый воин и в свое время мужественно бился за короля против Лиги общественного блага, а в день въезда королевы в Париж поднес ей великолепного сахарного оленя. Кроме того, он пользовался расположением мессира Тристана л’Эрмита, начальника королевской дворцовой стражи. Вообще мессир Робер благоденствовал. Во-первых, он получал приличное жалованье, к которому были прицеплены, как кисти к виноградной лозе, разные побочные доходы, например: доход с судебных пошлин по гражданским и уголовным делам, подлежавшим разбору в Главной парижской судебной палате; доходы с дел, разбиравшихся в Шатлэ; мостовые пошлины в Манте и Корбейле и проч., не считая доходов по разным другим статьям, вроде поборов с меряльщиков дров, с весовщиков соли и проч. Прибавьте к этому удовольствие разъезжать по городу в блеске своего великолепного военного мундира на фоне полукрасных, полукоричневых одеяний мещанских старост и квартальных. Кстати, кто желает иметь верное понятие об этом мундире, тот может полюбоваться его точным изображением на могиле Робера д’Эстувиля в Вальмонском аббатстве, в Нормандии. Там же находится и его шлем со следами ударов, полученных в сражении при Монлери. А чего стоило наслаждение сознавать себя начальником над двенадцатью сержантами, над привратниками и сторожами Шатлэ, над двумя аудиторами того же Шатлэ, над шестнадцатью комиссарами стольких же парижских кварталов, над тюремщиком Шатлэ, над четырьмя сержантами ленными, ста двадцатью конными и ста двадцатью сержантами-жезлоносцами, над начальником ночной стражи со всеми его помощниками? А разве плохо было иметь право решать и вершить всевозможные судебные дела, вешать, четвертовать и подвергать наказанию плетьми у позорного столба, не считая права разбирательства мелких дел в первой инстанции (in prima instantia, как говорилось в тогдашних хартиях) по всему парижскому виконтству с его семью судебными округами? Можно ли представить себе что-нибудь приятнее возможности чинить суд и расправу, как это ежедневно делал мессир Робер д’Эстувиль, заседая в залах Большого Шатлэ, под широкими и придавленными сводами эпохи Филиппа Августа, а затем возвращаться вечером в прелестный домик на Галилейской улице возле королевского дворца, полученный им в приданое за своею женою, Амбруазою де Орэ, и спокойно предаваться там сладкому отдыху после трудов? Труды же эти состояли главным образом в том, чтобы осудить какого-нибудь горемыку на ночевку в «маленькой горенке в улице д’Эскоршери, употреблявшейся судьями и старшинами города Парижа в качестве тюрьмы и имевшей одиннадцать футов в длину, семь футов четыре дюйма в ширину и одиннадцать футов в вышину»<a href="ch2.xhtml#id228" class="a">[78]</a>.</p><p class="p1">Мессир Робер д’Эстувиль имел не только свою собственную юрисдикцию в качестве прево и виконта Парижского, но и долю в делах высшего королевского суда, участвуя как в разбирательствах, так и в прибылях последнего. Не было ни одной сколько-нибудь высокопоставленной личности, которая не прошла бы через его руки, прежде чем попасть в руки палача. Таким образом, он имел удовольствие вести на казнь из Бастилии на площадь Главного рынка герцога Немурского, а на Гревскую площадь для той же надобности коннетабля Сен-Поля, который на пути к казни кричал и вырывался, к немалой радости господина прево, сильно его недолюбливавшего.</p><p class="p1">Разумеется, всего этого было вполне достаточно, чтобы сделать человека счастливым и знаменитым и чтобы обеспечить за ним впоследствии местечко на страницах той интересной истории парижских главных судей, из которой мы, между прочим, узнаем, что Удар де Вильнёв имел собственный дом на улице Бушри, что Гильом де Ганга купил Большую и Малую Савойю, что Гильом Тибу завещал монахиням Святой Женевьевы свои дома на улице Клопэн, что Гюг Обрио жил в отеле «Поре-Эпик», и много других подробностей из быта этих господ.</p><p class="p1">Однако, несмотря на то, что Робер д’Эстувиль имел столько причин быть довольным своей жизнью, утром 7 января 1482 года он проснулся в самом отвратительном расположении духа. Почему – он и сам не сумел бы определить. Быть может, его расстраивала пасмурная погода? Быть может, пряжка от его портупеи, побывавшей в сражении при Монлери, была неловко застегнута и слишком сжимала раздобревшую талию судьи? Или же его рассердила кучка гуляк, которые, точно насмехаясь над ним, прошли под его окнами, щеголяя своими лохмотьями и продавленными шляпами, с сумками и фляжками у пояса? А может статься, его томило предчувствие грядущей беды, ожидавшей его в следующем году, когда новый король, Карл VIII, вынужден был более чем на триста семьдесят ливров урезать доходы парижского главного судьи? Предоставляем читателю самому решить, какое из этих предположений вернее. Что же касается нас, то мы склонны думать, что он был не в духе просто потому, что был не в духе.</p><p class="p1">К тому же накануне был праздник, то есть день и вообще-то скучный, а в особенности для чиновника, обязанного убирать всю грязь, какую в прямом и переносном смысле оставляет после себя праздник в Париже. Кроме всего этого, нужно принять во внимание и то, что Роберу д’Эстувилю предстояло в этот день заседать в Шатлэ. Насколько мы могли заметить, судьи всегда стараются подогнать дурное расположение духа к тем дням, когда им предстоит присутствовать на заседаниях. Впрочем, они делают это, вероятно, с тою целью, чтобы иметь возможность отыграться на подсудимом, ссылаясь на короля, закон и юстицию.</p><p class="p1">В этот раз заседание началось без него. Назначенные на этот день дела, по обыкновению, разбирались его помощниками, замещавшими его в уголовном и гражданском отделениях суда. Уже с восьми часов утра несколько десятков обывателей обоего пола набилось в тесное пространство между стеною и крепкою дубовою решеткою; это место было отведено для публики в самом тесном углу залы судебных заседаний в Шатлэ. Публика всегда с удовольствием присутствовала при разнообразных и подчас увеселительных эпизодах разбирательства, чинимого мэтром Флорианом Барбдьёном, аудитором суда Шатлэ и помощником господина прево, переходившим от гражданских дел к уголовным и обратно как попало, по вдохновению.</p><p class="p1">Зал суда был небольшой, низкий и сводчатый. В глубине его находился стол, украшенный изображениями лилий, а перед столом помещалось дубовое резное кресло судьи, которое в эту минуту было пусто. Налево от кресла была скамья, на которой восседал аудитор, мэтр Флориан. Несколько пониже, на другой скамье, помещался секретарь суда, что-то строчивший. Публика сидела напротив стола, по ту сторону решетки. Возле дверей было выстроено несколько сержантов суда в лиловых камлотовых одеяниях с белыми крестами. Двое других сержантов, в красных с голубым камзолах, стояли на часах у низкой затворенной двери, видневшейся в глубине зала позади стола. При бледном свете январского утра, проникавшего через единственное стрельчатое окно, проделанное в толстой стене, особенно выделялись две забавные фигуры: причудливый каменный демон, высеченный в самой середине свода зала, и аудитор, сидевший в глубине зала у разукрашенного лилиями стола.</p><p class="p1">В самом деле, трудно представить себе более смешную фигуру, чем та, которая сидела за столом между двумя кипами бумаг. Локтями эта фигура тяжело опиралась на стол, а одна из ее ног покоилась на длинном шлейфе темного суконного платья. Голову фигуры украшала шапка, обшитая белым барашком. Брови походили на два клочка меха, оторванных от шапки, лицо было красного цвета, щеки лоснились от жира и величественно свисали по обеим сторонам лица, почти сходясь у подбородка, а выпученные глаза постоянно мигали. Это был мэтр Флориан Барбдьён, аудитор Шатлэ.</p><p class="p1">Вдобавок господин аудитор был глух. Но глухота, очевидно, не важный порок для судьи, потому что она нисколько не препятствовала мэтру Флориану судить довольно здраво и выносить безапелляционные приговоры. Да оно и верно: для судьи совершенно достаточно лишь показывать вид, что он слушает, а этому условию, которое одно только и существенно в деле правосудия, почтенный аудитор удовлетворял вполне, так как его внимание не нарушалось никаким посторонним шумом.</p><p class="p1">Впрочем, в зале суда неумолимо контролировал каждое слово и движение мэтра Флориана наш приятель Жан Фролло де Мулен, этот безбородый студент и неутомимый пешеход, которого всегда можно было встретить в любом уголке Парижа, только не перед профессорской кафедрой.</p><p class="p1">– Смотри-ка, – шепотом говорил он сидевшему рядом с ним и посмеивавшемуся Робену Пуспену, которому он взялся объяснять все, что происходило у них перед глазами, – ведь это Жанета дю Буисон, красивая дочка лентяя с Нового рынка. И этот старый хрыч произносит над нею обвинительный приговор!.. Да у него, нужно полагать, нет не только ушей, но и глаз!.. Платить пятнадцать су и четыре денье только за то, что нацепила на себя пару четок! Дорогонько! Lex duri carminis<a href="ch2.xhtml#id226" class="a">[79]</a>. А это кто? А-а! Робен Шеф де Виль, кольчужный мастер… С него взимается пошлина «по случаю принятия его мастером в сказанный цех…». Это его вступительный взнос!.. Э, да вот и двое дворян посреди этого сброда! Эгле де Суан и Гютен де Мальи! Два рыцаря, клянусь телом Христовым! А-а! Их притянули за игру в кости… Когда же наш ректор попадет сюда? Сто ливров парижской чеканки в пользу короля? Здорово! Однако этот Барбдьён бьет с плеча, как глухой!.. Ну, я готов хоть сейчас превратиться в своего почтенного братца господина архидьякона, если это может помешать играть в кости. Я буду играть днем и ночью, стану жить за игрою и умру за игрою, предварительно спустив после своей последней рубашки и душу!.. Пресвятая Дева! Сколько девиц-то!.. Смотри, смотри, так и валят одна за другой, как овечки. Амбруаза Лекюер, Изабо ла Пайнет, Берарда Жиронен… Это всё мои знакомые… Ба! Все они присуждаются к штрафу… Вот то-то, голубушки! Будете знать, как щеголять в золотых поясах, когда вас каждый раз заставят платить за это удовольствие по десяти парижских су… Ишь, щеголихи какие! Ах ты, старая судейская морда! Глупая, глухая башка! Флориан-болван, дурак Барбдьён!.. Ишь, сидит за столом, как боров, и жрет все, что ни попало: подсудимых, дела – все чавкает, скотина! Наколачивает, наколачивает себе брюхо, а все ему мало!.. Штрафы, пени, пошлины, судебные издержки, протори и убытки, тюрьма, железные узы, – словом, весь ад для подсудимых, а для него это настоящие лакомства, все равно что для других святочные пряники или марципаны, которыми угощают в Иванов день… Ты взгляни только на эту свинью! Ах, вот еще одна жрица любви! Сама Тибо ла Тибод, собственной персоной… Ее привлекли за то, что она вышла за пределы улицы Глатиньи… А это что за молодец? Ба! Жифруа Мабон, жандарм из стрелковой команды… Он-то за что попался?.. А! «За произнесение всуе имени Божьего…» Так! К штрафу ла Тибод! К штрафу и Жифруа!.. Ну, глухой тетерев, кажется, перепутал оба дела. Ставлю десять против одного, что девицу он приговорил к штрафу за крепкое словцо, а жандарма – за легкое поведение… Ну, Робен Пуспен, теперь внимание! По всему видно, что ждут кого-то важного… Гляди, сколько собралось жандармов – чуть не со всего Парижа!.. Вся свора ищеек налицо… Наверное, дошла очередь до крупной дичи, вроде кабана… И то кабан, настоящий кабан!.. Гляди-ка, Робен, гляди!.. Ба! Да ведь это наш вчерашний владыка, наш папа шутов, наш звонарь, наш горбун, наш кривоглазый гримасник, – словом, Квазимодо! Вот так штука!</p><p class="p1">Это действительно был Квазимодо.</p><p class="p1">Звонарь шел, крепко связанный и окруженный сильным конвоем, состоящим из городских сержантов под предводительством самого начальника ночной стражи, у которого на груди был вышит французский государственный герб, а на спине – герб города Парижа. Впрочем, в самом Квазимодо, если не считать его феноменального безобразия, не было ничего такого, что требовало бы стольких алебард и ружей; он был угрюм, безмолвен и спокоен. Лишь изредка, украдкою, он бросал своим единственным глазом гневный взгляд на стягивавшие его веревки.</p><p class="p1">Войдя в зал, он осмотрелся вокруг с видом такой сонливости и тупости, что женщины без всякого страха смеялись, указывая на него друг другу пальцами.</p><p class="p1">В это время мэтр Флориан внимательно перелистывал протокол, составленный по делу Квазимодо и поданный аудитору секретарем суда.</p><p class="p1">Просмотрев этот протокол, судья помолчал с минуту, как бы собираясь с мыслями. Он всегда придерживался этой предосторожности, прежде чем приступить к допросу. Ознакомляясь заранее с именем, званием и проступком подсудимого, аудитор приискивал наперед возражения на ответы, которых ожидал по существу дела. Таким образом он почти всегда выпутывался из всех затруднений допроса, не выдавая перед присутствующими своей глухоты. Протоколы предварительного следствия служили для него тем же, чем служит собака для слепого. Если ему иногда и случалось выдавать свой недостаток каким-нибудь неуместным вопросом или замечанием, то у одних это сходило за глубокомыслие, а у других – за доказательство его глупости.</p><p class="p1">В том и другом случае честь судебного сословия нисколько не страдала, потому что для судьи гораздо лучше прослыть глубокомысленным или глупым человеком, нежели глухим. Итак, тщательно скрывая свою глухоту, он делал это так успешно, что в конце концов и сам позабывал о своем недостатке. Дойти до такого самообмана гораздо легче, чем думают.</p><p class="p1">Все горбуны ходят, высоко подняв голову, все заики считают себя великими ораторами, глухие говорят чуть ли не шепотом. Что же касается нашего аудитора, то он считал себя только несколько «туговатым» на ухо. Это была единственная уступка общему мнению, но и до нее он доходил только в минуты откровенности и строгой самопроверки.</p><p class="p1">Таким образом, мысленно переварив как следует дело Квазимодо, мэтр Флориан откинул назад голову и прищурил глаза, чтобы придать себе более внушительный и беспристрастный вид, благодаря чему он в эту минуту был не только глух, но и слеп. Известно, что только при соблюдении этих двух условий и можно быть идеальным судьею. Приняв величественную позу, аудитор начал допрос:</p><p class="p1">– Ваше имя?</p><p class="p1">Но здесь возникло недоразумение, не предусмотренное законом: глухой стал допрашивать глухого.</p><p class="p1">Не видя никаких признаков, по которым он мог бы догадаться, что аудитор обратился к нему с вопросом, Квазимодо молчал, впиваясь своим единственным глазом в судью. Глухой же судья, который тоже ничего не знал о глухоте подсудимого, думал, что тот ответил на вопрос, как это обыкновенно делают все подсудимые, и повел дальнейший допрос своим глухим монотонным голосом, не теряя, впрочем, своего величия:</p><p class="p1">– Так… Ну а сколько вам лет?</p><p class="p1">Квазимодо и на этот вопрос ответил молчанием, а судья, в полной уверенности, что подсудимый уже ответил, продолжал:</p><p class="p1">– Ваше звание?</p><p class="p1">То же молчание. Публика начала переглядываться и перешептываться.</p><p class="p1">– Довольно, – проговорил невозмутимый аудитор, когда, по его мнению, подсудимый успел ответить и на последний вопрос. – Вы обвиняетесь перед судом: primo – в учинении ночного буйства; secundo – в насильственных действиях против женщины легкого поведения; in praejudicium meretricis, tertio – в бунте и неповиновении стрелкам, состоящим на службе его величества, нашего всемилостивейшего короля. Отвечайте по всем этим пунктам обвинения… Секретарь, вы записали предыдущие ответы подсудимого?</p><p class="p1">При этом злополучном вопросе по всему залу, начиная с секретарской скамьи и кончая местами для публики, пронесся такой неистовый, заразительный, дружный хохот, что даже глухой судья и глухой подсудимый не могли не заметить его. Квазимодо обернулся, презрительно поводя своим горбом, меж тем как судья, уверенный, что хохот вызван каким-нибудь непочтительным замечанием подсудимого по его адресу, чем объяснялось и презрительное движение Квазимодо, с негодованием воскликнул:</p><p class="p1">– За такой ответ, негодяй, тебя следовало бы повесить! Знаешь ли ты, с кем говоришь?</p><p class="p1">Эти слова аудитора подлили масла в огонь и, конечно, не могли остановить взрыва общей веселости. Новая выходка судьи так поразила всех своей несообразностью, что даже сержанты, у которых тупоумие составляло своего рода необходимую принадлежность, не выдержали и дружно захохотали. Один Квазимодо оставался серьезным, по той простой причине, что он ровно ничего не понимал из происходившего вокруг. Что же касается судьи, то, раздражаясь все более и более, он нашел нужным продолжать в начатом им тоне, надеясь нагнать этим страх на подсудимого и оказать косвенное воздействие на публику, напомнив ей о должном уважении к суду:</p><p class="p1">– Понимаешь ли ты, бессовестный и развращенный человек, что ты позволяешь себе забываться перед аудитором суда Шатлэ, перед сановником, которому вверена охрана порядка в городе Париже, перед лицом, на которое возложены многотрудные и важные обязанности: преследовать все преступления, проступки и непорядки; иметь надзор за всеми промыслами и ремеслами и не допускать монополий; содержать в порядке мостовую; пресекать злоупотребления в торговле домашней птицей и дичью; следить за правильною мерою дров; очищать город от нечистот и воздух от заразительных болезней, – словом, неусыпно печься о благополучии обывателей? И все это я должен делать совершенно безвозмездно, я не получаю за это ни жалованья, ни какого-либо иного вознаграждения, даже не имею надежды на что-либо подобное… Так знай же, что я – Флориан Барбдьён, помощник самого господина прево, кроме того, комиссар, следователь, контролер и допросчик, и пользуюсь одинаковыми полномочиями во всех судебных учреждениях, как городских, так и прочих.</p><p class="p1">Когда глухой обращается к другому глухому, ему нет никакой надобности останавливаться, потому что его никто не перебивает. Бог знает, когда остановил бы мэтр Флориан поток своего красноречия, если бы в эту минуту не отворилась низенькая дверь за судейским столом и в зал не вошел сам господин прево.</p><p class="p1">При появлении начальника аудитор вскочил со своего места и, сделав довольно ловкий поворот на каблуках, продолжал с прежней горячностью, обращаясь к главному судье:</p><p class="p1">– Монсеньор, я требую наказания, какое вы найдете нужным назначить для этого вот подсудимого; он осмелился издеваться над судом!</p><p class="p1">Выпалив задыхающимся голосом эти слова, он снова уселся на свое место, тяжело дыша и отирая крупные капли пота, которые выступили у него на лбу и градом скатывались на лежащие перед ним бумаги.</p><p class="p1">Мессир Робер д’Эстувиль нахмурил брови и обратился к подсудимому с таким выразительным, грозным жестом, что Квазимодо, несмотря на свою глухоту и тупость, поневоле насторожился.</p><p class="p1">– Отвечай, негодяй, – строго проговорил прево, – за какое преступление ты попал в суд?</p><p class="p1">Бедняк подумал, что судья спрашивает, как его зовут, и, прервав свое обычное молчание, он ответил хриплым горловым голосом:</p><p class="p1">– Квазимодо.</p><p class="p1">Ответ так плохо гармонировал с вопросом, что в публике снова раздался оглушительный хохот. Мессир Робер, весь красный от гнева, вне себя вскрикнул:</p><p class="p1">– Как, мерзавец, ты, кажется, вздумал потешаться и надо мною?!</p><p class="p1">– Звонарь собора Богоматери, – снова невпопад ответил Квазимодо, думая, что судья спрашивает, кто он такой.</p><p class="p1">– А, звонарь! – продолжал прево, который, как мы уже говорили, в этот день встал левой ногой с постели, а потому и без таких ответов подсудимого готов был вспылить каждую минуту. – Звонарь! Хорошо! Я прикажу задать тебе на парижских перекрестках такого трезвона по спине, что ты вовек не забудешь!</p><p class="p1">– Если вы спрашиваете меня о моем возрасте, – продолжал Квазимодо, – то мне в Мартинов день, должно полагать, будет двадцать лет.</p><p class="p1">Это было уже слишком. Прево окончательно вышел из себя.</p><p class="p1">– Ах ты, мерзавец! – крикнул он не своим голосом. – Ты уж начинаешь издеваться над самим главным судьей?! Господа сержанты-жезлоносцы! Отведите этого нахала на Гревскую площадь, привяжите его там к позорному столбу и бейте плетью целый час… Он у меня поплатится за свои дерзости!.. И об этом приговоре объявить через глашатаев, в сопровождении четырех присяжных трубачей, по всем семи округам парижского виконтства!</p><p class="p1">Секретарь принялся писать письменный приговор.</p><p class="p1">– Черт возьми! Вот это суд так суд! – воскликнул из своего угла студент Жан Фролло де Мулен.</p><p class="p1">Прево обернулся и снова устремил на Квазимодо разъяренный взгляд.</p><p class="p1">– Кажется, этот негодяй сказал «черт возьми»? Секретарь, прибавьте к наложенному наказанию еще двенадцать парижских денье штрафа за произношение бранных слов, и пусть половина этого штрафа пойдет в пользу церкви Святого Евстафия, к которому я чувствую особенное уважение.</p><p class="p1">Через несколько минут приговор был готов. Содержание его было коротко и ясно. В то время обычаи парижского суда еще не были преобразованы президентом Тибо Бэллье и прокурором Роже Бармо. Судопроизводство тогда не загромождалось еще тем дремучим лесом формальностей и крючкотворства, который эти юристы насадили в нем в начале шестнадцатого столетия. Тогда все было просто, ясно и делалось очень быстро. Правосудие шло прямо к цели, без всяких изворотов и обходов, так что во время самого судопроизводства сразу можно было видеть, к чему будет присужден подсудимый: к виселице, позорному столбу или к четвертованию. По крайней мере, каждый знал, что его ожидает.</p><p class="p1">Секретарь подал приговор господину прево, который, скрепив его своею подписью и печатью, тотчас же вышел из зала, чтобы продолжать свой обход по другим отделениям суда. Расположение духа, в котором он удалился, было таково, что можно было ожидать значительного увеличения населения парижских тюрем в этот день.</p><p class="p1">Жан Фролло и Робен Пуспен посмеивались. Квазимодо озирался с равнодушным и недоумевающим видом.</p><p class="p1">В то время как мэтр Флориан пробегал глазами приговор и готовился в свою очередь подписать его, в секретаре суда шевельнулось чувство сострадания к осужденному, и он, в надежде добиться смягчения приговора, наклонился к самому уху аудитора и довольно громко сказал, указывая на Квазимодо:</p><p class="p1">– Он глух.</p><p class="p1">Секретарь предполагал, что эта общность физического недостатка расположит мэтра Флориана в пользу осужденного. Но аудитор, во-первых, как мы уже сказали, вовсе не желал, чтобы другие замечали его собственную глухоту, а во-вторых, он был так туг на ухо, что не расслышал ни одного звука из того, что ему сказал секретарь. Не желая, однако, показывать этого, он ответил:</p><p class="p1">– Вот как! Ну, я не знал этого… В таком случае прибавьте негодяю еще один час наказания у позорного столба.</p><p class="p1">И он подписал исправленный в таком виде приговор.</p><p class="p1">– Славно! Поделом ему! – обрадовался Робен Пуспен, затаивший обиду на Квазимодо. – Это научит его быть повежливее с людьми.</p></span><span id="id33"><div class="title6">
<p class="p">II. «Крысиная нора»</p>
</div><p class="p1">Теперь мы попросим читателя вернуться с нами на Гревскую площадь, которую мы оставили накануне, чтобы вместе с Гренгуаром последовать за Эсмеральдой.</p><p class="p1">Было десять часов утра. Вся площадь носила следы минувшего празднества. Мостовая была усеяна обрывками, лентами и тряпками, перьями от шляп, каплями воска от факелов, объедками вчерашнего народного пира. Тут и там еще бродили кучки зевак, шевеля ногами потухавшие угли вчерашних костров и любуясь фасадом Дома с колоннами, который накануне был так роскошно задрапирован, а теперь щеголял одними гвоздями, на которых держалась драпировка. Среди публики сновали продавцы сидра и пива со своими тележками. По всем направлениями площади шли деловые люди, спешившие к своим обязанностям. Торговцы переговаривались, стоя на порогах своих лавок. Толковали о вчерашнем празднике, о фламандских послах, о Коппеноле, о папе шутов. Каждый старался сообщить какой-нибудь курьез и первый смеялся своему рассказу. Вдруг на площади появились четыре конных сержанта и расположились у четырех углов позорного столба. Появление их привлекло со всех концов площади любопытных, тотчас же обступивших позорный столб и добровольно обрекших себя на продолжительную неподвижность и скуку в надежде насладиться зрелищем предстоящего истязания человека.</p><p class="p1">Если теперь читатель, полюбовавшись шумными, оживленными сценами, происходившими во всех концах площади, перенесет свой взор на старинный дом полуроманской, полуготической архитектуры, известный под названием Роландовой башни и занимающий западный угол площади, то он может заметить на одном из углов фасада этого дома большой требник с роскошно разрисованными страницами. Этот требник защищен от дождя небольшим навесом, а от воров – решеткой, не мешающей, однако, переворачивать листы. Рядом с требником находится небольшое узкое окно стрельчатой формы, перегороженное двумя скрещивающимися железными полосами. Окно выходит на площадь и служит единственным отверстием, пропускающим немного света и воздуха в тесную келью без дверей, проделанную на уровне мостовой в стене старого здания. Глубокая, мертвая тишина, постоянно царящая в этой келье, производит особенно сильное впечатление, потому что тут же, рядом с нею, кипит жизнь одной из самых людных и шумных площадей Парижа.</p><p class="p1">Эта келья еще около трехсот лет тому назад была прославлена Роландой, владелицей Роландовой башни. Оплакивая своего отца, погибшего в одном из крестовых походов, она приказала вырубить в стене своего дома келью и заперлась в ней навсегда. От всего своего роскошного жилища она оставила себе только эту тесную комнатку, вход в которую приказала замуровать, оставив только небольшое окно; это окно она держала открытым круглый год, летом и зимою. Все свое имущество она раздала нищим. Двадцать лет дожидалась смерти безутешная дочь крестоносца в этой каменной могиле, в которую она заточила себя заживо. Дни и ночи она проводила в молитве, спала на куче золы, не имея даже камня под головою, носила рубище и питалась только хлебом и водою, которые сострадательные прохожие ставили на наружный выступ ее окна. Раздав все, что имела, она сама стала существовать одним подаянием. Перед смертью, прежде чем перейти в вечную могилу, она свою временную могилу завещала тем вдовам или осиротевшим девушкам, которые захотят, в сильной скорби или раскаянии, так же, как она, похоронить себя заживо, чтобы замаливать свои или чужие грехи. На погребение умершей затворницы собралась вся голь и беднота того времени и с честью проводила ее на вечный покой, напутствуя своими слезами и благословениями. Но, к величайшему удивлению и сожалению бедняков, подвижница не была объявлена святой – у нее не было протекции при папском дворе. Те из ее почитателей, которые отличались некоторым вольнодумством, утешались мыслью, что в Царстве Небесном к добровольной затворнице отнесутся лучше, чем в Риме, и довольствовались тем, что усердно молились за нее. Большинство свято чтило ее память и благоговейно хранило остатки ее рубища. Город, со своей стороны, по желанию девицы Роланды прикрепил под фонарем рядом с ее кельей требник. Это было сделано с той целью, чтобы прохожие останавливались в этом месте и читали молитву, которая могла бы навести их на мысль о милостыне затворницам, поселившимся в келье Роланды, чтобы они не умерли с голода, всеми позабытые.</p><p class="p1">Такого рода могилы посреди городов не были особенной редкостью в Средние века. Очень часто на какой-нибудь людной улице или среди шумного рынка, кишащего народом, чуть не под ногами лошадей и колесами тележек продавцов, можно было заметить замурованную нору, нечто вроде подвала или колодца, с еле заметным оконцем, заделанным железною решеткою. В такой норе добровольно проводило свой век какое-нибудь человеческое существо, оплакивая большое горе или замаливая тяжкое преступление. В наше время подобное зрелище вызвало бы в каждом улыбку сожаления и множество размышлений, но тогда оно действовало на толпу иначе. Эта ужасная нора, служившая как бы промежуточным звеном между домом и гробом, между городом и кладбищем; этот живой покойник, отрешенный навсегда от всякого общения с живыми людьми; эта жизнь, догорающая во мраке, подобно лампе, в которую больше не подливается масла; этот голос, неустанно твердящий слова молитвы в четырех стенах каменного ящика; это тело, заточенное в склепе, и вечное томление духа в своем двойном заключении – все это тогда не замечалось толпой. В те времена благочестивые люди не рассуждали и не вдавались в подробности, когда речь шла о подвиге благочестия. Они брали факт целиком, высоко чтили подвиг самоотречения, преклонялись пред ним, признавали его святым делом, но не анализировали тех страданий, с которыми был сопряжен этот подвиг для того, кто его выполнял, и не особенно плакали над участью добровольного мученика. Время от времени они приносили ему корку хлеба, заглядывали в окошко, чтобы удостовериться, жив ли он еще, но часто не знали даже имени затворника и едва ли могли сказать, сколько лет тому назад он обрек себя на медленную смерть в своей норе. На расспросы посторонних о живом скелете, похороненном в подвале, соседи просто отвечали, что это затворник или затворница, и больше ничего.</p><p class="p1">В те времена на все явления жизни смотрели без всяких мудрствований, без всяких преувеличений, так сказать, простым, невооруженным глазом. Микроскоп в ту пору еще не был изобретен ни для предметов мира вещественного, ни для явлений мира духовного. К тому же случаи подобного добровольного заточения среди шумной жизни городов были делом самым обыкновенным. Немало было таких келий и в Париже, и все они были почти всегда заняты. Да и само духовенство заботилось о том, чтобы кельи не пустовали, так как это было признаком оскудения веры в народе, и если не оказывалось налицо добровольных подвижников, то в эти норы замуровывали прокаженных. Кроме кельи на Гревской площади другая такая же келья была на Монфоконе, третья находилась близ кладбища «Невинных душ», а четвертая – не помню, где именно, кажется, в стене особняка Клишон. Несколько таких же убежищ было разбросано в разных других местах. Предания о них сохранились до наших дней, хотя сами здания, в которых они были устроены, уже давно не существуют. В квартале Университета тоже были такие же места добровольного заточения. На горе Святой Женевьевы какой-то средневековый Иов целых тридцать лет распевал все семь покаянных псалмов, сидя на гноище, в каком-то колодце. Окончив седьмой псалом, он тотчас же начинал опять первый. Особенно громко он пел по ночам – magna voce per umbras<a href="ch2.xhtml#id210" class="a">[80]</a>. Еще в наши дни любителю, посещающему улицу Говорящего колодца на горе Святой Женевьевы, мерещится голос этого певца.</p><p class="p1">Но возвратимся к келье Роландовой башни. В затворницах, желавших занять эту келью, редко бывал недостаток, поэтому она почти не пустовала, а если это и случалось, то ненадолго, самое большее на год, на два. Немало женщин оплакивало в ней своих погибших родных, возлюбленных, детей или свои прегрешения. Парижские сплетники, вмешивающиеся во все, даже и в то, чего им не следовало бы и касаться, утверждали, что менее всего в этой келье перебывало вдов.</p><p class="p1">По обычаю той эпохи, латинская надпись, вырезанная на стене, указывала грамотному прохожему на благочестивое назначение кельи. Вообще вплоть до середины шестнадцатого столетия еще сохранился обычай пояснять значение зданий коротеньким изречением над его входом. Так, например, во Франции и теперь можно прочесть над калиткою тюрьмы в Турвильском замке надпись: «Sileto et spera»<a href="ch2.xhtml#id209" class="a">[81]</a>. В Ирландии, на щите, которым украшены главные ворота замка Фортескью, мы читаем: «Forte scutum, salus ducum»<a href="ch2.xhtml#id208" class="a">[82]</a>. В Англии, над главным входом гостеприимного замка графов Каупер, видим надпись: «Tuum est»<a href="ch2.xhtml#id207" class="a">[83]</a>. И это понятно: ведь в те времена каждое здание выражало собою какую-нибудь мысль.</p><p class="p1">Так как замурованная келья Роландовой башни не имела двери, то над ее окном были вырезаны крупными романскими буквами следующие два слова: «Tu ora»<a href="ch2.xhtml#id206" class="a">[84]</a>.</p><p class="p1">Народ, здравый смысл которого не любит останавливаться на разных тонкостях и который не стесняется переделкой слов Ludovico Magno в «ворота Сен-Дени», прозвал этот темный, мрачный и сырой склеп «Крысиною норой» – «Trou aux rats». Название это если и не так величественно, зато гораздо образнее.</p></span></span></span>
