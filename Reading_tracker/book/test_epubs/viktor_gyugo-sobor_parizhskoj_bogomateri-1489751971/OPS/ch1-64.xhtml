<span><span><span><span id="id104"><div class="title6">
<p class="p">18. Крайнее средство</p>
</div><p class="p1">Избавившись от груза, «Матутина» стала погружаться немного медленнее, но все же продолжала погружаться.</p><p class="p1">Положение было отчаянное: ни на что уже не приходилось надеяться. Последнее средство было исчерпано.</p><p class="p1">– Нет ли там еще чего, что можно было бы бросить в море? – выкрикнул главарь.</p><p class="p1">Доктор, о котором все теперь позабыли, вышел из рубки и сказал:</p><p class="p1">– Есть.</p><p class="p1">– Что именно? – спросил начальник.</p><p class="p1">Доктор ответил:</p><p class="p1">– Наше преступление.</p><p class="p1">Все вздрогнули и в один голос воскликнули:</p><p class="p1">– Аминь!</p><p class="p1">Доктор весь вытянулся, мертвенно бледный, и, указав рукой на небо, произнес:</p><p class="p1">– На колени!</p><p class="p1">Они качнулись, собираясь пасть ниц.</p><p class="p1">Доктор продолжал:</p><p class="p1">– Бросим в море наши преступления. Они – наша главная тяжесть. Из-за них судно идет ко дну. Нечего больше думать о спасении жизни, подумаем лучше о спасении души. Слушайте, несчастные: тяжелее всего наше последнее преступление – то, которое мы сейчас совершили, или, вернее, довершили. Нет более дерзкого кощунства, как искушать пучину, имея на совести предумышленное убийство. То, что содеяно против ребенка, – содеяно против Бога. Уехать было необходимо, знаю, но это была верная погибель. Тень, отброшенная нашим черным делом, навлекла на нас бурю. Так и должно быть. Впрочем, жалеть нам не о чем. Тут, неподалеку от нас, в этой непроглядной тьме, Вовильские песчаные отмели и мыс Гуг. Это – Франция. Для нас оставалось только одно убежище – Испания. Франция для нас не менее опасна, чем Англия. Избежав гибели на море, мы попали бы на виселицу. Либо потонуть, либо быть повешенным – другого выбора у нас не было. Бог сделал выбор за нас. Возблагодарим же его. Он дарует нам могилу в пучине моря, которая смоет с нас грехи. Братья мои, это было неизбежно. Подумайте, ведь мы сами только что сделали все от нас зависящее, чтобы погибло невинное существо, ребенок, и, быть может, в эту самую минуту в небе, над нашими головами, его чистая душа обвиняет нас перед лицом судии, взирающего на нас. Воспользуемся же последней отсрочкой. Постараемся, если только это еще возможно, исправить в пределах, нам доступных, содеянное нами зло. Если ребенок нас переживет, придем ему на помощь. Если он умрет, приложим все усилия к тому, чтобы заслужить его прощение. Снимем с себя тяжесть преступления. Освободимся от бремени, гнетущего нашу совесть. Постараемся, чтобы наши души не были отвергнуты Богом, ибо это было бы самой ужасной гибелью. Наши тела тогда достались бы рыбам, а души – демонам. Пожалейте самих себя! На колени, говорю вам! Раскаяние – ладья, которая никогда не идет ко дну. У вас нет больше компаса? Вы заблуждаетесь. Ваш компас – молитва.</p><p class="p1">Волки превратились в ягнят. Такие превращения происходят в минуты безысходного отчаяния. Бывают случаи, что и тигры лижут распятие. Когда приоткрывается дверь в неведомое, верить – трудно, не верить – невозможно. Как бы ни были несовершенны попытки существовавших и существующих религий измыслить картину загробного мира, но даже и тогда, когда вера человека носит неопределенный характер и предлагаемые ему догматы никак не согласуются с его смутными представлениями о вечности, все-таки в последнюю минуту невольный трепет овладевает его душой. За порогом жизни нас ждет что-то неведомое. Это и угнетает нас перед лицом смерти.</p><p class="p1">Час смерти – время расплаты. В это роковое мгновение люди чувствуют всю тяжесть лежащей на них ответственности. То, что было, усложняет собою то, чему предстоит совершиться. Прошедшее возвращается и вторгается в будущее. Все изведанное предстоит взору такой же бездной, как и неизведанное, и обе эти пропасти, одна – исполненная заблуждений, другая – ожидания, взаимно отражаются одна в другой. Это слияние двух пучин повергает в ужас умирающего.</p><p class="p1">Беглецы утратили последнюю надежду на спасение здесь, в земной жизни. Потому-то они и повернулись в противоположную сторону. Только там, во мраке вечной ночи, они еще могли уповать на что-то. Они это поняли. Это было скорбным просветлением, за которым сразу же снова последовал ужас. То, что постигаешь в минуту кончины, похоже на то, что видишь при вспышке молнии. Сначала – все, затем – ничего. И видишь, и вместе с тем не видишь. После смерти наши глаза опять откроются, и то, что было молнией, станет солнцем.</p><p class="p1">Они воскликнули, обращаясь к доктору:</p><p class="p1">– Ты! Ты! Ты один теперь у нас. Мы исполним все, что ты велишь. Что нужно делать? Говори!</p><p class="p1">Доктор ответил:</p><p class="p1">– Нужно перешагнуть неведомую бездну и достигнуть другого берега жизни, по ту сторону могилы. Я знаю больше всех вас, и наибольшая опасность угрожает мне. Вы поступаете правильно, предоставляя выбор моста тому, кто несет на себе самое тяжелое бремя.</p><p class="p1">И он прибавил:</p><p class="p1">– Сознание содеянного зла гнетет совесть.</p><p class="p1">Потом спросил:</p><p class="p1">– Сколько времени нам еще остается?</p><p class="p1">Гальдеазун взглянул на цифры, показывающие глубину осадки, и ответил:</p><p class="p1">– Немного больше четверти часа.</p><p class="p1">– Хорошо, – промолвил доктор.</p><p class="p1">Низкая крыша рубки, на которую он облокотился, представляла собою нечто вроде стола. Доктор вынул из кармана чернильницу, перо и бумажник, вытащил из него пергамент, тот самый, на котором несколько часов назад он набросал строк двадцать своим неровным, убористым почерком.</p><p class="p1">– Огня! – распорядился он.</p><p class="p1">Снег, падавший безостановочно, как брызги пены водопада, погасил один за другим все факелы, кроме одного. Аве-Мария выдернул этот факел из гнезда и, держа его в руке, стал рядом с доктором.</p><p class="p1">Доктор спрятал бумажник в карман, поставил на крышу рубки чернильницу, положил перо, развернул пергамент и сказал:</p><p class="p1">– Слушайте.</p><p class="p1">И вот среди моря, на неуклонно оседавшем остове судна, похожем на шаткий настил над зияющей могилой, доктор с суровым лицом приступил к чтению, которому, казалось, внимал весь окружавший их мрак. Осужденные на смерть, склонив головы, обступили старика. Пламя факела подчеркивало бледность их лиц. То, что читал доктор, было написано на английском языке. Временами, поймав на себе чей-либо жалобный взгляд, молча просивший разъяснения, доктор останавливался и переводил только что прочитанное на французский, испанский, баскский или итальянский языки. Слышались сдавленные рыдания и глухие удары в грудь. Тонущее судно продолжало погружаться в воду.</p><p class="p1">Когда чтение было окончено, доктор разложил пергамент на крыше рубки, взял перо и на оставленном для подписей месте под текстом вывел свое имя: «Доктор Гернардус Геестемюнде».</p><p class="p1">Затем, обратившись к людям, окружавшим его, сказал:</p><p class="p1">– Подойдите и подпишитесь.</p><p class="p1">Первой подошла уроженка Бискайи, взяла перо и подписалась: «Асунсион».</p><p class="p1">Затем передала перо ирландке, которая, будучи неграмотной, поставила крест.</p><p class="p1">Доктор рядом с крестом приписал: «Барбара Фермой, с острова Тиррифа, что в Эбудах».</p><p class="p1">Потом протянул перо главарю шайки.</p><p class="p1">Тот подписался: «Гаиздорра, капталь».</p><p class="p1">Генуэзец вывел под этим свое имя: «Джанджирате».</p><p class="p1">Уроженец Лангедока подписался: «Жак Катурз, по прозванию Нарбоннец».</p><p class="p1">Провансалец подписался: «Люк-Пьер Капгаруп, из Магонской каторжной тюрьмы».</p><p class="p1">Под этими подписями доктор сделал примечание:</p><p class="p1">«Из трех человек, составлявших экипаж урки, судовладельца унесло волною в море, остальные два подписались ниже».</p><p class="p1">Оба матроса проставили под этим свои имена. Уроженец Северной Бискайи подписался: «Гальдеазун». Уроженец Южной Бискайи подписался: «Аве-Мария, вор».</p><p class="p1">Покончив с этим делом, доктор кликнул:</p><p class="p1">– Капгаруп!</p><p class="p1">– Есть, – отозвался провансалец.</p><p class="p1">– Фляга Хардкванона у тебя?</p><p class="p1">– Да.</p><p class="p1">– Дай-ка ее мне.</p><p class="p1">Капгаруп выпил последний глоток водки и протянул флягу доктору.</p><p class="p1">Вода в трюме прибывала с каждой минутой. Судно все больше и больше погружалось в море.</p><p class="p1">Скошенная к краям палуба медленно затоплялась плоской, постепенно возраставшей волной.</p><p class="p1">Все сбились в кучу на изгибе палубы.</p><p class="p1">Доктор просушил на пламени факела еще влажные подписи, сложил пергамент тонкой трубкой, чтобы он мог пройти в горлышко фляги, и всунул его внутрь. Потом потребовал:</p><p class="p1">– Пробку!</p><p class="p1">– Не знаю, где она, – ответил Капгаруп.</p><p class="p1">– Вот обрывок гинь-лопаря, – предложил Жак Катурз.</p><p class="p1">Доктор заткнул флягу кусочком несмоленого троса и приказал:</p><p class="p1">– Смолы!</p><p class="p1">Гальдеазун отправился на нос, погасил пеньковым тушилом догоревшую в гранате паклю, снял самодельный фонарь с форштевня и принес его доктору: граната была до половины наполнена кипящей смолой.</p><p class="p1">Доктор погрузил горлышко фляги в смолу, затем вынул его оттуда. Теперь фляга, заключавшая в себе подписанный всеми пергамент, была закупорена и засмолена.</p><p class="p1">– Готово, – сказал доктор.</p><p class="p1">И в ответ из уст всех присутствующих вырвался невнятный разноязыкий лепет, походивший на мрачный гул катакомб:</p><p class="p1">– Да будет так!</p><p class="p1">– Mea culpa!<a href="ch2.xhtml#id21" class="a">[171]</a></p><p class="p1">– Asi sea!<a href="ch2.xhtml#id19" class="a">[172]</a></p><p class="p1">– Aro rai!<a href="ch2.xhtml#id17" class="a">[173]</a></p><p class="p1">– Amen!<a href="ch2.xhtml#id15" class="a">[174]</a></p><p class="p1">Восклицания потонули во мраке, подобно угрюмым голосам строителей Вавилонской башни, испуганных безмолвием неба, отказывавшегося внимать им.</p><p class="p1">Доктор повернулся спиною к своим товарищам по преступлению и несчастью и сделал несколько шагов к борту. Подойдя к нему вплотную, он устремил взор в беспредельную даль и с чувством произнес:</p><p class="p1">– Со мной ли ты?</p><p class="p1">Он обращался, вероятно, к какому-то призраку.</p><p class="p1">Судно оседало все ниже и ниже.</p><p class="p1">Позади доктора все стояли, погруженные в свои думы. Молитва – неодолимая сила. Они не просто склонились в молитве, они словно сломились под ее тяжестью. В их раскаянии было нечто непроизвольное. Они беспомощно никли, как никнет в безветрие парус, и мало-помалу эти сбившиеся в кучу суровые люди с опущенными головами и молитвенно сложенными руками принимали, хотя и по-разному, сокрушенную позу отчаяния и упования на божью милость. Быть может, то было отсветом разверзавшейся перед ними пучины, но на эти разбойничьи лица теперь легла печать спокойного достоинства.</p><p class="p1">Доктор снова подошел к ним. Каково бы ни было его прошлое, этот старик в минуту роковой развязки казался величественным. Безмолвие черных пространств, окружавших корабль, хотя и занимало его мысли, но не повергало в смятение. Этого человека нельзя было застигнуть врасплох. Спокойствия его не мог нарушить даже ужас. Его лицо говорило о том, что он постиг величие Бога.</p><p class="p1">В облике этого старика, этого углубленного в свои мысли преступника, была торжественность пастыря, хотя он об этом и не подозревал.</p><p class="p1">Он промолвил:</p><p class="p1">– Слушайте!</p><p class="p1">И, посмотрев с минуту в пространство, прибавил:</p><p class="p1">– Пришел наш смертный час.</p><p class="p1">Взяв факел из рук Аве-Марии, он взмахнул им в воздухе.</p><p class="p1">Стая искр оторвалась от пламени, взлетела и рассеялась во тьме.</p><p class="p1">Доктор бросил факел в море.</p><p class="p1">Факел потух. Последний свет погас, воцарился непроницаемый мрак. Казалось, над ними закрылась могила.</p><p class="p1">И в этой темноте раздался голос доктора:</p><p class="p1">– Помолимся!</p><p class="p1">Все опустились на колени.</p><p class="p1">Теперь они стояли уже не на снегу, а в воде.</p><p class="p1">Им оставалось жить лишь несколько минут.</p><p class="p1">Один только доктор не преклонил колея. Снежные хлопья падали, усеивая его фигуру белыми, похожими на слезы, звездочками и выделяя ее на черном фоне ночи. Это была говорящая статуя мрака.</p><p class="p1">Он перекрестился и возвысил голос, меж тем как палуба у него под ногами уже начала вздрагивать толчками, предвещающими близость момента окончательного погружения судна в воду. Он произнес:</p><p class="p1">– Pater noster, qui es in coelis<a href="ch2.xhtml#id13" class="a">[175]</a>.</p><p class="p1">Провансалец повторил это по-французски:</p><p class="p1">– Notre père qui êtes aux cieux.</p><p class="p1">Ирландка повторила на своем языке, понятном уроженке Бискайи:</p><p class="p1">– Ar nathair ata ar neamh.</p><p class="p1">Доктор продолжал:</p><p class="p1">– Sanctificetur nomen tuum<a href="ch2.xhtml#id12" class="a">[176]</a>.</p><p class="p1">– Que votre nom soit sanctifyé, – перевел провансалец.</p><p class="p1">– Naomhthar hainm, – сказала ирландка.</p><p class="p1">– Adveniat regnum tuum<a href="ch2.xhtml#id11" class="a">[177]</a>, – продолжал доктор.</p><p class="p1">– Que votre règne arrive, – повторил провансалец.</p><p class="p1">– Tigeadh do rioghachd, – подхватила ирландка.</p><p class="p1">Они стояли на коленях, и вода доходила им до плеч.</p><p class="p1">Доктор продолжал:</p><p class="p1">– Fiat voluntas tua<a href="ch2.xhtml#id10" class="a">[178]</a>.</p><p class="p1">– Que votre volonté soil faite, – пролепетал провансалец.</p><p class="p1">У обеих женщин вырвался вопль:</p><p class="p1">– Deuntar do thoil ar an Hhalàmb!</p><p class="p1">– Sicut in coelo, et in terra<a href="ch2.xhtml#id9" class="a">[179]</a>, – произнес доктор.</p><p class="p1">Никто не отозвался.</p><p class="p1">Он посмотрел вниз. Все головы были под водой. Никто не встал. Стоя на коленях, они без сопротивления дали воде поглотить себя.</p><p class="p1">Доктор взял в правую руку флягу, стоявшую на крышке рубки, и поднял ее над головой.</p><p class="p1">Судно шло ко дну.</p><p class="p1">Погружаясь в воду, доктор шепотом договаривал последние слова молитвы.</p><p class="p1">С минуту над водой виднелась еще его грудь, потом только голова, наконец лишь рука, державшая флягу, как будто он показывал ее бесконечности.</p><p class="p1">Но вот исчезла и рука. Поверхность моря стала гладкой, как у оливкового масла, налитого в бочку. Все падал и падал снег.</p><p class="p1">Какой-то предмет вынырнул из пучины и во мраке поплыл по волнам. Это была засмоленная фляга, державшаяся на воде благодаря плотной ивовой плетенке.</p></span></span></span></span>
