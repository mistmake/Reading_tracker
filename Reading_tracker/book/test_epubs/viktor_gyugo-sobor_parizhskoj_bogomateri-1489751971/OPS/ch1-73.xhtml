<p class="p">5. Королева Анна</p>
</div><p class="p1">Над этой четой судьба поставила Анну – королеву Англии. Королева Анна была самой заурядной женщиной. Она была весела, благожелательна, почти величественна. Ни одно из ее положительных качеств не достигало степени добродетели, ни один из недостатков не доходил до порока. Ее полнота была одутловатостью, остроумие – тупостью, а доброта – глупостью. Она была упряма и ленива, была и верна, и неверна своему мужу, так как отдавала сердце фаворитам, а ложе берегла для супруга. Как христианка, она была и еретичкой и ханжой. Ее красила сильная шея Ниобеи. Все остальное в ее наружности было значительно хуже. Кокетничала она неловко и бесхитростно. Зная, что у нее нежная белая кожа, она охотно надевала открытые платья. Она ввела в моду плотно облегавшие шею ожерелья из крупного жемчуга. У нее был низкий лоб, чувственные губы и выпуклые близорукие глаза. Эта близорукость распространялась и на ее ум. За исключением редких порывов веселости, почти столь же тягостных для окружающих, как и ее гнев, она жила в атмосфере молчаливого недовольства и затаенного брюзжания. У нее вырывались слова, о смысле которых надобно было догадываться. Это была смесь доброй женщины и злой дьяволицы. Она любила неожиданности – чисто женское свойство. Это была представительница первобытного типа Евы, еле тронутого резцом времени. И на долю этого чурбана случайно выпал трон. Она пила. Муж ее был породистый датчанин.</p><p class="p1">Будучи сторонницей тори, она правила при посредстве вигов. Правила по-женски, безрассудно. На нее иногда находили припадки бешенства. Все у нее валилось из рук. Трудно представить себе человека, менее подходящего для управления государством. Она роняла наземь события. Через ее политику проходила глубокая трещина. Из-за нее пустяковые происшествия приводили к катастрофам. Когда ей почему-либо хотелось показать свою власть, она называла эти проявления самодурства «огреть кочергой».</p><p class="p1">Она с глубокомысленным видом изрекала такие фразы:</p><p class="p1">– Ни один пэр, кроме Курси, барона Кинсела, пэра Ирландии, не смеет стоять перед королем с покрытой головой.</p><p class="p1">Или:</p><p class="p1">– Мой отец был лорд-адмиралом, отчего же и моему мужу не носить этого звания? Это несправедливо.</p><p class="p1">И она делала Георга Датского генерал-адмиралом Англии и всех колоний Ее Величества. Она постоянно находилась в дурном настроении. Мысли свои она не высказывала, а изрекала. В этой гусыне были некоторые черты сфинкса.</p><p class="p1">Она не была противницей fun – злобной издевательской шутки. Она с радостью сделала бы Аполлона горбатым, но оставила бы его богом. Когда на нее находил добрый стих, она не хотела никого огорчать, но докучала решительно всем. У нее часто вырывались грубые слова; еще немного – и она ругалась бы площадными словами, как Елизавета. Время от времени она доставала из кармана юбки маленькую круглую коробочку чеканного серебра с ее собственным профилем между двумя буквами «К» и «А» и, взяв оттуда на кончик мизинца немного помады, красила себе губы. Приведя в порядок рот, она начинала смеяться. Ее любимым лакомством были плоские зеландские пряники. Она гордилась своим дородством.</p><p class="p1">Будучи скорее всего пуританкой, Анна питала, однако, склонность к зрелищам. Ей очень хотелось основать музыкальную академию, наподобие французской. В 1770 году один француз, по имени Фортерош, задался целью построить в Париже «Королевский цирк», который должен был обойтись в четыреста тысяч франков, но этому воспротивился министр д’Аржансон; Фортерош приехал в Англию и предложил свой план королеве Анне; ее на минуту соблазнила идея выстроить в Лондоне оборудованный машинами и четырехъярусными люками театр, который затмил бы роскошью театр короля Франции. Как и Людовик XIV, она любила быструю езду. Иногда ее переезд в карете из Виндзора в Лондон занимал не больше часа с четвертью, включая все остановки.</p><p class="empty-line"/><p class="p1">Во времена Анны никакие сборища не допускались без разрешения двух мировых судей. Двенадцать человек, собравшихся хотя бы для того, чтобы поесть устриц и выпить портеру, объявлялись заговорщиками.</p><p class="p1">Во время этого относительно спокойного царствования насильственный набор во флот производился с особой жестокостью – печальное доказательство того, что англичанин в большей мере подданный, чем гражданин. На протяжении столетий английские короли поступали в этом отношении как тираны, нарушая все старинные хартии вольностей и вызывая этим негодование и злорадство во Франции. Торжество ее отчасти умалялось тем, что, наподобие практиковавшейся в Англии насильственной вербовки матросов, во Франции существовала насильственная вербовка солдат. Во всех больших городах Франции любой здоровый мужчина, шедший по своим делам, мог быть схвачен на улице вербовщиками и отправлен в один из домов, носивших название «печи». Там его запирали вместе с другими жертвами, затем вербовщики отбирали годных к военной службе и продавали их офицерам. В 1695 году в Париже было тридцать таких «печей».</p><p class="p1">Изданные королевой Анной законы против Ирландии были ужасны.</p><p class="p1">Анна родилась в 1664 году, за два года до пожара Лондона, на основании чего астрологи (эти звездочеты тогда еще существовали; при рождении Людовика XIV также присутствовал астролог, составивший его гороскоп) предсказали, что, как «старшая сестра огня», она будет королевой. Она и стала королевой благодаря астрологии и революции 1688 года. Анна чувствовала себя униженной тем, что ее крестным отцом был всего лишь Джильберт, архиепископ Кентерберийский. В те времена в Англии уже невозможно было иметь крестным отцом папу. Но даже старший среди епископов – незавидный восприемник для августейшей особы. Анне пришлось удовольствоваться им. Это произошло по ее собственной вине. Зачем она была протестанткой?</p><p class="p1">За ее девственность, virginitas empta<a href="ch2.xhtml#id254" class="a">[186]</a>, как говорится в старинных хартиях, Дания уплатила шесть тысяч двести пятьдесят фунтов стерлингов годового пожизненного дохода, получаемого ею с Вардинбурга и острова Фемарна.</p><p class="p1">Анна следовала – не по убеждениям, а по привычке – традициям Вильгельма Оранского. Во время этого царствования, рожденного революцией, англичане пользовались свободой на всем пространстве между Тауэром, куда заключали ораторов, и позорным столбом, к которому ставили писателей. Анна говорила немного по-датски – наедине с мужем, и по-французски – наедине с Болингброком. Французский язык она коверкала нещадно, но в Англии, в особенности при дворе, было в моде говорить по-французски. На другом языке никакие остроты не имели успеха. Анна уделяла огромное внимание монетам, в особенности мелким медным монетам, имеющим широкое хождение, – ей хотелось красоваться на них. В ее царствование отчеканили фартинги шести образцов. На трех первых она приказала изобразить трон, на четвертом – триумфальную колесницу, а на шестом – богиню, держащую в одной руке меч, в другой – оливковую ветвь с надписью: Bello et Pace<a href="ch2.xhtml#id253" class="a">[187]</a>. Дочь наивного и жестокого Иакова II была груба.</p><p class="p1">И вместе с тем она была, в сущности, кроткой женщиной. Это противоречие только кажущееся. Ее преображал гнев. Подогрейте сахар – он закипит.</p><p class="p1">Анна пользовалась популярностью. Англия любит царствующих женщин. Почему? Да потому, что Франция их не допускает. Это уже достаточно веская причина. А других причин, пожалуй, и нет. Если верить английским историкам, то Елизавета была олицетворением величия, а Анна – доброты. Предположим, что это так. Но в обоих этих женских царствованиях не было и намека на изящество. Все линии были топорны. Это было грубое величие и грубая доброта. Что же касается незапятнанной добродетели этих королев, на которой так настаивает Англия, мы не будем ее оспаривать. Елизавета – девственница, целомудрие которой несколько умаляется тенью Эссекса, супружеская верность Анны осложняется близостью с Болингброком.</p><p class="empty-line"/><p class="p1">У народов существует идиотская привычка приписывать королям свои собственные подвиги. Они сражаются. Кому достается слава? Королю. Они платят деньги. Кто на эти деньги роскошествует? Король. И народу нравится, что его король так богат. Король собирает с бедняков экю, а возвращает им лиар. Как он щедр! Колосс служит пьедесталом и любуется стоящим на нем пигмеем. Какой великий карапузик! Он взобрался ко мне на спину! У карлика есть прекрасная возможность стать выше гиганта – стоит лишь вскарабкаться к нему на плечи. Удивительно, что исполин это позволяет, но то, что он еще и восхищается величием карлика, – просто глупо. Человечество очень наивно.</p><p class="p1">Конная статуя, воздвигаемая только в честь королей, – прекрасный символ монархии. Конь – это народ. Но только конь этот постепенно видоизменяется. Вначале это осел, но в конце концов он становится львом. Тогда он сбрасывает всадника, и Англия переживает 1642 год, а Франция – 1789 год; случается, что лев и пожирает всадника, тогда в Англии происходят события 1649 года, а во Франции – 1793 года.</p><p class="p1">Трудно поверить, чтобы лев мог снова стать ослом, однако иногда это бывает. Так случилось в Англии. Впав в монархическое идолопоклонство, народ снова стал вьючным животным. Королева Анна, как мы уже сказали, была популярна. Что же она делала для этого? Ничего. Ничего не делать – вот все, что требуется от короля Англии. За этот труд он получает тридцать миллионов в год. Англия, имевшая при Елизавете только тридцать военных судов и при Иакове II – тридцать шесть, в 1705 году насчитывала их сто пятьдесят. У англичан было три армии – пять тысяч человек в Каталонии, десять тысяч в Португалии, пятьдесят тысяч во Фландрии; кроме того, она платила сорок миллионов в год монархической и дипломатической Европе, этой публичной девке, которую всегда содержала Англия на деньги народа. Когда парламент вотировал патриотический заем в тридцать четыре миллиона, дававший пожизненную ренту, казначейство осаждали охотники подписаться на него. Англия послала одну эскадру в Восточную Индию, другую, во главе с адмиралом Ликом, – к берегам Испании, не считая запасной флотилии из четырехсот парусных судов, находившихся под командой адмирала Шоуэлла. Англия только что присоединила к себе Шотландию. Это было в период между Гохштетом и Рамильи, когда первая победа дала возможность предвидеть вторую. Под Гохштетом Англия окружила и взяла в плен семь батальонов и четыре драгунских полка, отобрала сто два лье территории у французов, в замешательстве отступивших от Дуная к Рейну. Англия протягивала руку к Сардинии и Балеарским островам. Она с триумфом ввела в свои порты десять испанских линейных кораблей и множество груженных золотом галионов. Гудсонов залив и пролив были почти брошены Людовиком XIV; чувствовалось, что он так же легко расстанется с Акадией, и с островами св. Христофора, и с Новой Землей и будет счастлив, если Англия снисходительно разрешит Франции ловить треску у Бретонского мыса. Англия готовилась принудить французского короля совершить позорный поступок – самому разрушить укрепления Дюнкерка.</p><p class="p1">А покуда она завладела Гибралтаром и намеревалась завладеть Барселоной. Сколько великих деяний! Как было не восторгаться королевой Анной, соблаговолившей жить в такое время?</p><p class="p1">В некотором отношении царствование Анны представляется сколком с царствования Людовика XIV. Анна, которую случай, называемый историей, сделал современницей этого короля, имела с ним некое, довольно слабое, сходство, была его бледным подобием.</p><p class="p1">Подобно Людовику XIV, она играла в «великое царствование»; у нее были свои памятники, свое искусство, свои победы, свои полководцы, свои писатели, свои личные средства, из которых она выдавала пенсии знаменитостям, своя галерея произведений искусств. У нее тоже был пышный двор и свита, собственный этикет и собственный марш. Двор этот был воспроизведением в миниатюре всех «великих людей» Версаля – и в оригинале не очень-то великих. В некотором роде обман зрения, но прибавьте к этому гимн «Боже, спаси королеву», музыка которого заимствована у Люлли, и все вместе создавало иллюзию сходства. Все необходимые персонажи налицо: Кристофер Рен вполне подходящий Мансар, Сомерс не хуже Ламуаньона. У Анны был свой Расин – Драйден, свой Буало – Поп, свой Кольбер – Годольфин, свой Лувуа – Пемброк и свой Тюренн – Мальборо. Увеличьте только парики и уменьшите лбы. В общем все торжественно и пышно, и Виндзор в то время почти не уступал Марли. Но на всем лежал женственный отпечаток, даже отец Телье у Анны носил имя Сары Дженнингс. Впрочем, к этому времени в литературе начинает звучать та ирония, которая пятьюдесятью годами спустя воплотится в философию, и Свифт разоблачает протестантского Тартюфа так же, как Мольер разоблачил Тартюфа-католика. Несмотря на то, что Англия ссорится в это время с Францией и побеждает ее, она ей подражает и заимствует у нее просвещение; все, что красуется на фасаде Англии, освещено лучами Франции. Жаль, что царствование Анны продолжалось только двенадцать лет, иначе англичане не долго думая стали бы говорить «век Анны», как французы говорят: «век Людовика XIV». Анна появилась на горизонте в 1702 году, когда Людовик XIV уже склонялся к закату. Восхождение бледного светила совпало с закатом светила пурпурного; когда во Франции царствовал король Солнце, в Англии правила королева Луна.</p><p class="p1">Любопытный исторический факт: в Англии очень почитали Людовика XIV, несмотря на то, что вели с ним войну. «Именно такой король и нужен Франции», – говорили англичане. Любовь англичан к своей свободе не мешает им мириться с рабством других народов. Благожелательное отношение к цепям, сковывающим соседа, приводит англичан к восторженному преклонению перед деспотами.</p><p class="p1">В общем, Анна осчастливила свой народ, как говорит французский переводчик книги Биверелла, с любезной настойчивостью упоминая об этом трижды: на шестой и девятой страницах своего посвящения и на третьей странице предисловия.</p><p class="empty-line"/><p class="p1">Королева Анна не очень благоволила к Джозиане по двум причинам.</p><p class="p1">Во-первых, потому, что находила герцогиню Джозиану красивой.</p><p class="p1">Во-вторых, потому, что находила красивым жениха герцогини Джозианы.</p><p class="p1">Чтобы возбудить зависть женщины, необходимы два повода; королеве же достаточно одного.</p><p class="p1">Она сердилась на Джозиану еще за то, что Джозиана была ее сестрой.</p><p class="p1">Анна была против красивых женщин.</p><p class="p1">Она считала, что это развращает нравы.</p><p class="p1">Что касается ее самой, она была некрасива, – но, конечно, не по своей воле.</p><p class="p1">Непривлекательной внешностью Анны отчасти и объясняется ее религиозность.</p><p class="p1">Умница и красавица Джозиана раздражала королеву.</p><p class="p1">Хорошенькая герцогиня не совсем желанная сестра для некрасивой королевы.</p><p class="p1">Была еще одна причина для недовольства: происхождение Джозианы.</p><p class="p1">Анна была дочерью Анны Хайд, простой леди, на которой Иаков II женился хотя и неудачно, но вполне законным образом, когда еще был герцогом Йоркским. Зная, что в ее жилах есть некоролевская кровь, Анна чувствовала себя королевой лишь наполовину; Джозиана, явившаяся на свет совсем незаконно, точно подчеркивала не вполне безупречное происхождение королевы. Дочери от неравного брака было досадно видеть рядом с собою внебрачную дочь. Напрашивалось какое-то неприятное сравнение. Джозиана имела право заявить Анне: «Моя мать ничуть не хуже вашей!» При дворе об этом не говорили, но, вероятно, думали. Это раздражало ее королевское величество. К чему здесь эта Джозиана? Зачем она вздумала родиться? Кому понадобилась эта Джозиана?</p><p class="p1">Некоторые родственные связи бывают унизительными.</p><p class="p1">Однако внешне Анна относилась к Джозиане благосклонно.</p><p class="p1">Возможно, она даже полюбила бы ее, не будь герцогиня ее сестрой.</p></span></span></span></span>
