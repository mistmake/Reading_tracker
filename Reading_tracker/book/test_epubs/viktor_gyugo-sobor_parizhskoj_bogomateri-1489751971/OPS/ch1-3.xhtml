<span id="id2"><div class="title1">
<p class="p">Собор Парижской Богоматери</p>
</div><span><p class="p1">Несколько лет тому назад, посещая, или, вернее, обследуя собор Парижской Богоматери, автор этой книги заметил в темном углу одной из башен вырезанное на стене слово:</p><div class="cite">
<p class="p1">ÁN ÀГKH<a href="ch2.xhtml#id64" class="a">[4]</a></p>
</div><p class="p1">Греческие письмена, почерневшие от времени и довольно глубоко высеченные в камне, неуловимые особенности готического письма, сквозившие в их форме и расположении и словно свидетельствовавшие о том, что их начертала средневековая рука, а более всего – мрачный и роковой смысл, заключавшийся в них, живо поразили автора.</p><p class="p1">Он раздумывал, он старался отгадать, чья скорбящая душа не пожелала покинуть этот мир, не оставив клейма преступления или несчастья на челе старинного собора.</p><p class="p1">Теперь эту стену (я уже даже не помню, какую именно) не то закрасили, не то выскоблили, и надпись исчезла. Ведь уже двести лет у нас так поступают с чудесными средневековыми церквами. Их калечат всевозможными способами как снаружи, так и изнутри. Священник их перекрашивает, архитектор скребет; затем является народ и разрушает их вконец.</p><p class="p1">И вот, кроме хрупкого воспоминания, которое автор этой книги посвящает таинственному слову, высеченному в мрачной башне собора Парижской Богоматери, ничего не осталось ни от этого слова, ни от той неведомой судьбы, итог которой был столь меланхолически подведен в нем.</p><p class="p1">Человек, начертавший его на стене, исчез несколько столетий тому назад из числа живых, слово, в свою очередь, исчезло со стены собора, и самый собор, быть может, вскоре исчезнет с лица земли. Из-за этого слова и написана настоящая книга.</p><div class="cite">
<p class="text-author"><em>Февраль 1831 г.</em></p>
</div></span></span>
