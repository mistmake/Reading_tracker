<p class="p">I. Золотая монета, превратившаяся в сухой лист</p>
</div><p class="p1">Гренгуар и весь Двор чудес были в смертельном беспокойстве. Уже больше месяца никому не было известно ни что сталось с Эсмеральдой, – это весьма печалило герцога египетского и бродяг, – ни что сталось с козой, что особенно огорчало Гренгуара. Однажды вечером цыганка исчезла, и с тех пор о ней не было ни слуху ни духу. Все поиски не привели ни к чему. Кто-то сказал Гренгуару, с очевидным намерением подразнить его, что встретил Эсмеральду в тот вечер около моста Святого Михаила в обществе офицера. Но этот муж, обвенчанный по цыганскому обряду, оказался философом-скептиком. К тому же ему лучше, чем кому-либо, была известна чистота его жены. Он по опыту знал, какую непреодолимую силу представляли собою амулет и добродетель самой цыганки, и с математической точностью рассчитал сопротивление, которое они могут оказать нападению. На этот счет он был совершенно спокоен.</p><p class="p1">Тем необъяснимее было для Гренгуара исчезновение Эсмеральды. Оно его глубоко опечалило. Он бы даже похудел, если бы для него существовала такая возможность. Он все оставил, даже свои литературные занятия, даже свою большую работу «De figuris regularibus et irregularibus»<a href="ch2.xhtml#id141" class="a">[116]</a>, которую собирался напечатать на первые деньги, которые у него появятся. Он бредил книгопечатанием с тех пор, как увидел книгу Гюга де Сен-Виктора, Didascalon, напечатанную знаменитым шрифтом Винделина Спирского.</p><p class="p1">Однажды, грустно бредя мимо здания Ла Турнель, он увидал группу людей, толпившихся у дверей Дворца правосудия.</p><p class="p1">– Что там такое? – спросил он у одного из выходивших оттуда молодых людей.</p><p class="p1">– Не знаю, сударь, – отвечал молодой человек. – Говорят, судят какую-то женщину, убившую военного. Тут, кажется, замешано колдовство. Епископ и консисторский судья вступились в это дело, мой брат, архидьякон, с головой ушел в него. Мне надо было поговорить с ним, да я так и не добрался до него – такая там толпа! Это ужасно досадно, потому что мне нужны деньги.</p><p class="p1">– Желал бы иметь возможность ссудить вас ими, молодой человек, только у меня карманы продырявились не от денег, – сказал Гренгуар.</p><p class="p1">Он не посмел сказать студенту, что знает его брата архидьякона, к которому он не заходил со времени встречи в церкви и чувствовал себя виноватым в этом.</p><p class="p1">Студент пошел своей дорогой, а Гренгуар стал подниматься по лестнице вслед за толпой, направлявшейся в первую камеру палаты. Принято утверждать, что ничто так не способствует рассеянию меланхолии, как зрелище уголовного процесса, – настолько забавна глупость судей! Толпа, в которую вмешался Гренгуар, двигалась и толкалась молча. После медленного скучного топтания по темному коридору, извивавшемуся в старом здании, Гренгуар достиг низкой двери, ведшей в зал. Благодаря своему высокому росту он видел происходящее через головы колыхающейся толпы.</p><p class="p1">Зал был обширный и темный, отчего казался еще больше. Смеркалось. В длинные стрельчатые окна проникали только бледные лучи, погасавшие, не достигнув свода, представлявшего огромную решетку из балок, покрытых множеством вырезанных на них фигур, которые, казалось, двигались в полумраке. На столах местами уже горели свечи. Свет от них падал на головы согнувшихся над кипами бумаг писцов. Передняя часть зала была занята толпой; направо и налево сидели судейские и стояли столы. В глубине, на эстраде, сидели многочисленные судьи, последние ряды которых тонули в темноте, – неподвижные, мрачные лица! Стены были усеяны изображениями лилий. Над судьями неясно виднелось большое распятие, и повсюду сверкали пики и алебарды, на остриях которых огненными точками отражался свет.</p><p class="p1">– Что это за господа, сидящие, как прелаты на соборе? – спросил Гренгуар одного из соседей.</p><p class="p1">– Направо советники первой камеры палаты, налево – судебные следователи. Низшие чины – в черном, а высшие – в красном.</p><p class="p1">– А там, выше, кто этот толстяк, что так потеет?</p><p class="p1">– Господин председатель.</p><p class="p1">– А эти бараны позади него? – продолжал расспрашивать Гренгуар, не любивший, как мы уже сказали, магистратуру; может быть, причиной тому была злоба, которая осталась у него по отношению к суду со времени его драматических злоключений.</p><p class="p1">– Это все господа следователи королевской палаты.</p><p class="p1">– А перед ними – этот кабан?</p><p class="p1">– Это королевский секретарь парламента.</p><p class="p1">– А направо – тот крокодил?</p><p class="p1">– Мэтр Филипп Лёлье, чрезвычайный королевский прокурор.</p><p class="p1">– А налево – этот толстый черный кот?</p><p class="p1">– Мэтр Жак Шармолю, королевский прокурор духовного суда, и господа члены консистории.</p><p class="p1">– Что же делают здесь все эти господа? – спросил Гренгуар.</p><p class="p1">– Судят.</p><p class="p1">– Кого? Я не вижу подсудимого.</p><p class="p1">– Это женщина, сударь. Вы не можете ее видеть. Она обращена к нам спиной, и толпа закрывает ее. Она там, где вы видите группу стражей с бердышами.</p><p class="p1">– Что это за женщина? – спросил Гренгуар. – Вы знаете ее имя?</p><p class="p1">– Нет; я только что пришел. Думаю только, что дело идет о колдовстве, потому что консистория присутствует на суде.</p><p class="p1">– А! Так мы увидим, как все эти господа в мантиях станут поедать человеческое мясо. Что же, зрелище, как всякое другое!</p><p class="p1">– Не находите ли вы, сударь, что у мэтра Жака Шармолю очень кроткая наружность? – спросил сосед.</p><p class="p1">– Гм, – отвечал Гренгуар. – Не доверяю я кроткой физиономии со сжатыми ноздрями и тонкими губами.</p><p class="p1">Здесь соседи попросили разговаривавших замолчать. Слушалось важное свидетельское показание.</p><p class="p1">– Господа, – говорила, стоя посреди зала, старуха, лицо которой настолько сливалось с одеждой, что она казалась сплошным узлом лохмотьев, – это все такая же правда, как то, что я ла Фалурдель с моста Святого Михаила, где я живу уж сорок лет, аккуратно платя пошлины, оброки и подати. Дверь моя против Тассена Кайяра, красильщика, который живет на верхнем берегу реки. Теперь я – бедная старуха, а когда-то была красивой девушкой! На днях мне сказали: «Ла Фалурдель, не верти свою прялку чересчур быстро вечером, дьявол любит расчесывать своими рогами пряжу старух. Достоверно, что “мрачный монах”, что бродил в прошлом году около Темпля, теперь оказался в ла Сите. Смотри, Фалурдель, как бы он не постучался к тебе в дверь». Однажды вечером я пряла около двери. Стучат. Спрашиваю – кто там? Кто-то ругается. Отворяю. Входят двое мужчин – один весь в черном, другой красивый офицер. У черного были видны только глаза – как два горящих угля. Все остальное было закрыто плащом и шляпой. Вот что они мне сказали: «Дай нам келью святой Марты». Это моя верхняя комната, самая чистая из всех. Они мне дают экю. Я прячу экю в ящик и говорю: «Завтра куплю себе требухи на живодерне в Глориетте». Мы идем наверх. Когда мы пришли в комнату и я обернулась, человек в черном исчез. Это меня несколько удивило. Офицер, красивый, как настоящий аристократ, спустился со мной вниз. Он ушел. Не успела я спрясть и четверть пасмы, как он вернулся с красивой молодой девушкой – куколкой, которая засияла бы как звездочка, если бы ее приодеть. С ней был козел, большой козел, белый или черный, теперь не помню. Это заставило меня призадуматься. До девушки мне дела нет, но вот козел… Не люблю я этих животных – у них борода и рога. Как будто мужчины. Да и пахнет шабашем. Однако я ничего не говорю. Я получила экю. Ведь я правильно рассудила, господин судья? Я проводила девушку и капитана наверх и оставила их одних, то есть с козлом. Сама же возвратилась вниз и снова принялась за пряжу. Надо вам сказать, что дом мой двухэтажный и задняя сторона его обращена к реке, как у прочих домов на мосту, и окна из первого и второго этажа выходят прямо над водой. Ну вот, я принялась было за пряжу, и, не знаю почему, у меня в голове все вертелся этот «мрачный монах», о котором мне напомнил козел; а девушка показалась мне несколько странно одетой. Вдруг я слышу наверху крик, что-то падает на пол, и затем открывается окно. Я бегу к своему окну, которое как раз под верхним, и вижу, как мимо меня мелькает какая-то черная масса и падает в воду. Это был призрак, одетый священником. Светила луна, и я его очень хорошо рассмотрела. Он поплыл в сторону Сите. Тогда, вся дрожа, я зову ночную стражу. Солдаты вошли, и так как они были навеселе, то, не зная, в чем дело, в первую минуту стали бить меня. Я им все объяснила. Мы идем наверх – и что же находим? Комната вся залита кровью, офицер лежит на полу с кинжалом в шее, девушка притворяется мертвой, а козел мечется в испуге. «Вот так история, – говорю я, – теперь целых две недели не отмоешь пол. Придется скоблить – ужасно!» Бедного молодого человека, офицера, унесли, а также и девушку – она была полураздета. Подождите. Самое худшее то, что, когда я на другой день хотела взять экю, чтобы сходить за требухой, я на его месте нашла сухой лист.</p><p class="p1">Старуха умолкла. Ропот ужаса пробежал среди слушателей.</p><p class="p1">– Привидение, козел – все это пахнет колдовством, – заметил один из соседей Гренгуара.</p><p class="p1">– А этот сухой лист! – добавил другой.</p><p class="p1">– Нет никакого сомнения, – заключил третий, – это колдунья, у которой стачка с «мрачным монахом», чтобы грабить офицеров.</p><p class="p1">Сам Гренгуар был недалек от того, чтобы найти все это ужасным и правдоподобным.</p><p class="p1">– Женщина Фалурдель, вы не имеете ничего больше сообщить правосудию? – величественно спросил председатель.</p><p class="p1">– Нет, разве только то, что в протоколе мой дом назвали покосившейся, вонючей лачугой, а это обидно! – заявила старуха. – Все дома на мосту не бог весть какие, потому что битком набиты людьми. А все же мясники не перестают селиться там, хотя это люди богатые и жены у них – красивые, порядочные женщины.</p><p class="p1">Прокурор, в котором Гренгуар нашел сходство с крокодилом, поднялся.</p><p class="p1">– Замолчите, – сказал он. – Прошу господ судей не терять из виду, что на обвиняемой нашли кинжал. Женщина Фалурдель, принесли ли вы с собой сухой лист, в который превратился экю, данный вам демоном?</p><p class="p1">– Да, милостивый государь, я его нашла. Вот он.</p><p class="p1">Судебный пристав передал засохший лист «крокодилу», который зловеще кивнул головой и передал лист председателю, тот препроводил его прокурору церковного суда, и лист обошел весь зал.</p><p class="p1">– Это березовый лист, – сказал мэтр Жак Шармолю. – Новое доказательство колдовства.</p><p class="p1">– Свидетельница, – заговорил один из советников, – к вам вошли два человека – человек в черном, который потом исчез и поплыл по Сене в одежде монаха, и еще офицер. Который из двоих вам дал экю?</p><p class="p1">Старуха с минуту подумала и сказала:</p><p class="p1">– Офицер.</p><p class="p1">В толпе пробежал шепот.</p><p class="p1">«А, – подумал Гренгуар, – это показание поколебало мое убеждение».</p><p class="p1">Между тем снова вмешался мэтр Филипп Лёлье, королевский прокурор:</p><p class="p1">– Напомню господам, что в своем показании, записанном у его изголовья, убитый офицер заявил, что в ту минуту, когда к нему подошел человек в черном, у него мелькнула мысль, не мрачный ли это монах. Этот человек уговаривал его сойтись с обвиняемой и на замечание, что у него, капитана, нет денег, дал ему экю, которым офицер заплатил Фалурдель. Стало быть, это экю – бесовская монета.</p><p class="p1">Это заключительное слово, по-видимому, рассеяло все сомнения Гренгуара и других скептиков из числа слушателей.</p><p class="p1">– У вас, господа, в руках обвинительный акт, – прибавил королевский прокурор, садясь, – вы можете найти в нем подтверждение показания Феба де Шатопера.</p><p class="p1">При этом имени подсудимая встала. Показалась ее голова. Гренгуар, к своему ужасу, узнал Эсмеральду.</p><p class="p1">Она была бледна. Волосы, прежде так изящно заплетенные и украшенные монетами, падали в беспорядке, губы посинели, ввалившиеся глаза смотрели страшно.</p><p class="p1">– Феб? – повторила она как бы в забытьи. – Где он? О господа! Прежде чем убить меня, сжальтесь, скажите, жив ли он еще!</p><p class="p1">– Замолчи, женщина, – сказал председатель. – Это не наше дело.</p><p class="p1">– Ради бога, скажите, жив ли он? – продолжала она, сжимая свои прелестные исхудалые руки. При этом послышался звон цепей.</p><p class="p1">– Он умирает, – сухо сказал королевский прокурор. – Довольно ли с тебя этого?</p><p class="p1">Бедняжка упала на скамейку, без голоса, без слез, бледная, как восковая статуя.</p><p class="p1">Председатель нагнулся к человеку в расшитой золотом шапке и черном платье, с цепью на шее и жезлом в руке, сидевшему у его ног:</p><p class="p1">– Пристав, введите вторую подсудимую.</p><p class="p1">Все взоры обратились к отворившейся дверце, и в нее вошла хорошенькая козочка с золочеными рожками и копытцами. Гренгуар задрожал. Грациозное животное на минуту остановилось на пороге, вытягивая шею вперед, как будто, стоя на скале, увидело перед собой необъятный горизонт. Вдруг она заметила цыганку и, перескочив через стол и голову одного из писцов, в два прыжка очутилась возле нее. Тут она грациозно стала ластиться у ног своей госпожи, выпрашивая слово или ласку. Но подсудимая сидела неподвижно, и на долю бедной Джали не выпало даже ни одного взгляда.</p><p class="p1">– Ах, да ведь это та самая противная коза! – воскликнула Фалурдель. – Теперь я узнаю их обеих.</p><p class="p1">Жак Шармолю заговорил:</p><p class="p1">– Если угодно, господа, мы приступим к допросу козы.</p><p class="p1">Действительно, коза оказалась второй подсудимой. В те времена обвинение животного в колдовстве было делом обыкновенным. Так, в отчетах судопроизводства за 1466 год содержатся, между прочим, интересные подробности о стоимости процесса Жилье-Сулара и его свиньи, казненных за их проступки в Карбэйле. Здесь есть все: и стоимость ямы для закапывания свиньи, и пятьсот вязанок хвороста из Морсанского порта, и три пинты вина и хлеба – последний обед осужденного, который он по-братски разделил со своим палачом, – и наконец, издержки на охрану и корм свиньи в продолжение одиннадцати дней, по восьми парижских денье в день. Иногда заходили еще дальше. Так, по капитуляриям Карла Великого и [Людовика Благочестивого] налагаются ужасные кары на огненные призраки, осмеливающиеся появляться в воздухе.</p><p class="p1">Между тем прокурор духовного суда воскликнул:</p><p class="p1">– Если злой дух, который вселился в эту козу и который не поддается никаким увещеваниям, будет продолжать упорствовать в своих кознях, – если он ужаснет ими суд, то мы предупреждаем его, что мы будем вынуждены прибегнуть против него к виселице или к костру.</p><p class="p1">У Гренгуара выступил холодный пот. Шармолю взял со стола бубен цыганки и подал его особенным образом козе, спрашивая ее:</p><p class="p1">– Который час?</p><p class="p1">Коза посмотрела на него своим умным взглядом, подняла золоченое копытце и ударила семь раз. Действительно, было семь часов. Движение ужаса пробежало в толпе.</p><p class="p1">Гренгуар не выдержал.</p><p class="p1">– Она губит себя! – крикнул он. – Вы ведь видите, что она не понимает, что делает.</p><p class="p1">– Тише, вы, мужичье, там в зале! – резко приказал пристав.</p><p class="p1">При помощи такого же маневра с бубном Жак Шармолю заставил козу проделать еще несколько подобных фокусов, касавшихся дня недели, числа месяца, года и т. д., – словом, заставил козу проделать все, чему читатель уже был свидетелем. И вследствие оптического обмана, обычного при судебных разбирательствах, те же зрители, которые, может быть, не раз аплодировали на перекрестках невинным шуткам Джали, испугались их под сводами суда. Коза, без всякого сомнения, была нечистой силой.</p><p class="p1">Впечатление получилось еще более сильное, когда королевский прокурор, высыпав на пол из мешочка, висевшего у Джали на шее, содержавшиеся в нем подвижные буквы, заставил козу копытцем сложить из рассыпанной азбуки роковое имя: Феб. Колдовство, жертвой которого пал капитан, казалось неопровержимо доказанным, и в глазах всех эта прелестная плясунья, столько раз очаровывавшая прохожих своей грацией, превратилась в ужасную ведьму.</p><p class="p1">Впрочем, она не подавала никаких признаков жизни. Ни грациозные движения Джали, ни угрозы судей, ни глухие проклятия, раздававшиеся из толпы, – ничто не доходило до ее сознания.</p><p class="p1">Чтобы пробудить ее, сержанту пришлось безжалостно ее трясти, а председателю торжественно возвысить голос:</p><p class="p1">– Девушка, ты из цыганского племени, предающегося колдовству. Ты, состоя в сообщничестве с заколдованной козой, привлеченной к процессу, в ночь на двадцать девятое марта убила, заколов кинжалом, при помощи темных сил, чар и колдовства, капитана королевских стрелков Феба де Шатопера. Ты продолжаешь отрицать это?</p><p class="p1">– Какой ужас! – вскричала девушка, закрывая лицо руками. – Мой Феб!.. О! Это ад!</p><p class="p1">– Ты продолжаешь отрицать? – холодно спросил председатель.</p><p class="p1">– Да, отрицаю! – отвечала она громко и встала со сверкающими глазами.</p><p class="p1">Председатель прямо поставил вопрос:</p><p class="p1">– В таком случае как ты объяснишь обстоятельства, послужившие к твоему обвинению?</p><p class="p1">Она отвечала прерывающимся голосом:</p><p class="p1">– Я уже сказала. Я ничего не знаю. Это сделал священник – священник, которого я не знаю. Этот дьявол-священник преследует меня.</p><p class="p1">– Совершенно правильно, – сказал судья. – Это «мрачный монах».</p><p class="p1">– Сжальтесь надо мной, господа судьи! Я бедная девушка…</p><p class="p1">– Цыганка, – дополнил судья.</p><p class="p1">Мэтр Жак заговорил мягко:</p><p class="p1">– Ввиду прискорбного запирательства подсудимой я предлагаю применить пытку.</p><p class="p1">– Согласен, – ответил председатель.</p><p class="p1">Несчастная содрогнулась всем телом, однако поднялась по приказанию стражей и медленно, довольно твердою поступью, предшествуемая Шармолю и консисторскими священниками, между двумя рядами алебард, направилась к потайной двери, которая внезапно отворилась и так же быстро захлопнулась, произведя на Гренгуара впечатление ужасной пасти, поглотившей несчастную.</p><p class="p1">Когда она исчезла, послышалось жалобное блеяние – то плакала бедная коза.</p><p class="p1">Заседание было прервано. Один из советников заметил, что господа судьи устали и что слишком долго ждать окончания пытки. На это председатель ответил, что должностное лицо должно уметь приносить себя в жертву своему долгу.</p><p class="p1">– Скучная, противная девчонка, с которой приходится возиться на голодный желудок! – заключил один судья-старик.</p></span><span id="id48"><div class="title6">
<p class="p">II. Продолжение рассказа об экю, превратившемся в сухой лист</p>
</div><p class="p1">Поднявшись и спустившись по нескольким ступеням в коридорах, настолько темных, что и днем они освещались лампами, Эсмеральда в сопровождении своей мрачной свиты была введена судейской стражей в комнату зловещего вида. Эта круглая комната помещалась в нижнем этаже одной из толстых башен, вздымающихся еще и в наше время над зданиями, заступившими в современном Париже место старинных построек. В этом подземелье не было окон, не было никаких отверстий, кроме низкой, окованной железом двери. Темно, однако, здесь не было. В толстой стене была выложена печь, в которой пылал яркий огонь, наполнявший подземелье своим багровым отблеском и лишавший всякого значения жалкую сальную свечу, горевшую в углу. От железной решетки, закрывавшей печь, поднятой в это время над пылающим отверстием, на темной стене выступал ряд темных, острых, редких зубьев, что придавало печи вид сказочного дракона, изрыгающего пламя. При свете печи узница увидела в комнате различные ужасные орудия, назначение которых ей было непонятно. Посредине, почти на полу, находился кожаный матрац, над которым висел ремень с пряжками, прикрепленный к медному кольцу, соединенному с таким же кольцом огромных размеров, вделанным в свод потолка. Тиски, клещи, огромные полосы железа наполняли внутренность печи и накалялись, брошенные в беспорядке на горящие угли. Кровавый свет горна освещал в подземелье массу ужасных вещей.</p><p class="p1">Этот ад назывался <em>допросной камерой</em>.</p><p class="p1">На кровати сидел в непринужденной позе Пьера Тортерю, присяжный палач. Его прислужники, два гнома с четырехугольными лицами, в кожаных фартуках и холщовых рубахах, поворачивали железные орудия на углях.</p><p class="p1">Напрасно несчастная девушка призывала на помощь все свое мужество. Войдя в эту комнату, она ужаснулась.</p><p class="p1">Стража встала по одну сторону, священники и представители консистории – по другую. В углу, за столом, на котором стояла чернильница, сидел писец.</p><p class="p1">Мэтр Жак Шармолю подошел к цыганке с самой ласковой улыбкой.</p><p class="p1">– Ты все еще продолжаешь запираться, дитя мое?</p><p class="p1">– Да, – отвечала она уже упавшим голосом.</p><p class="p1">– В таком случае нам очень тяжело будет допрашивать тебя более настоятельно, чем мы бы того желали. Потрудись сесть на кровать. Мэтр Пьера, дайте барышне сесть и затворите дверь.</p><p class="p1">Пьера встал, ворча.</p><p class="p1">– Если запру дверь, огонь погаснет, – проворчал он.</p><p class="p1">– Ну, так не запирайте ее.</p><p class="p1">Между тем Эсмеральда продолжала стоять. Эта кожаная постель, на которой корчилось столько несчастных, приводила ее в ужас. Страх леденил ее кровь. Она стояла растерянная, ничего не понимая. По знаку Шармолю два прислужника схватили ее и посадили на постель. Они не причинили ей боли, но, когда эти мужчины дотронулись до нее, когда кожа матраца коснулась ее тела, она почувствовала, как вся кровь прилила ей к сердцу. Она окинула блуждающим взглядом комнату. Ей казалось, что все эти безобразные орудия пытки, представлявшие собой среди виденных ею когда-либо инструментов то же, что летучие мыши, сороконожки и пауки среди насекомых и птиц, двинулись к ней со всех сторон, чтобы поползти по ее телу, чтобы кусать и щипать ее.</p><p class="p1">– Где врач? – спросил Шармолю.</p><p class="p1">– Здесь, – отвечал человек в черном, которого Эсмеральда не заметила раньше. Она вздрогнула.</p><p class="p1">– В третий раз спрашиваю вас, продолжаете вы упорствовать в отрицании поступков, в которых вас обвиняют?</p><p class="p1">На этот раз она могла только кивнуть головой. У нее не было голоса…</p><p class="p1">– Вы упорствуете? – спросил Жак Шармолю. – В таком случае я, к величайшему сожалению, должен исполнить свой служебный долг.</p><p class="p1">– С чего мы начнем, господин королевский прокурор? – резко вмешался Пьера.</p><p class="p1">Шармолю с минуту поколебался с двусмысленной улыбкой поэта, подыскивающего рифму.</p><p class="p1">– С испанского «сапога», – сказал он наконец.</p><p class="p1">Несчастная почувствовала себя до такой степени покинутой Богом и людьми, что голова ее бессильно опустилась на грудь, как неодушевленный предмет.</p><p class="p1">Палач и врач одновременно подошли к ней. В то же время прислужники начали рыться в своем ужасном арсенале. При звоне этих страшных железных орудий несчастная девочка задрожала, как мертвая лягушка, сквозь тело которой пропустили электрический ток.</p><p class="p1">– О мой Феб! – проговорила Эсмеральда так тихо, что никто ее не слыхал.</p><p class="p1">Затем она снова погрузилась в свою прежнюю неподвижность и каменное безмолвие. Это зрелище истерзало бы всякое другое сердце, кроме судейского. Казалось, будто сам Сатана допрашивает бедную грешную душу при багровом свете ада. Несчастное тело, за которое готовы были ухватиться эти бесчисленные пилы, колеса и дыбы, существо, которое должно было сейчас очутиться в этих цепких руках палачей, в этих тисках, было кроткое, хрупкое, беленькое созданьице. Бедное зернышко, которое людское правосудие бросало под ужасные жернова пытки.</p><p class="p1">Между тем мозолистые руки слуг Пьера Тортерю грубо обнажили эту прелестную маленькую ножку, не раз поражавшую своим изяществом и красотой зрителей на парижских перекрестках.</p><p class="p1">– Экая жалость! – проворчал палач, смотря на нежную, грациозную ножку.</p><p class="p1">Если бы архидьякон был тут, он, без сомнения, вспомнил бы своих символических паука и муху. Скоро несчастная увидала сквозь дымку, застлавшую ей глаза, как поднесли «сапог», скоро почувствовала, как ее ножка, охваченная окованными железом лубками, исчезла в ужасном аппарате. Тогда ужас вернул ей силы.</p><p class="p1">– Снимите с меня это! – крикнула она, не помня себя, и, поднявшись, вся растрепанная, прибавила: – Сжальтесь!</p><p class="p1">Она пыталась вскочить и броситься к ногам прокурора, но ногу ее сдавливал тяжелый, дубовый обрубок, окованный железом, и она принуждена была опуститься, более обессиленная, чем пчела, к крылу которой подвесили бы кусок свинца.</p><p class="p1">По знаку Шармолю ее снова положили на постель, и две грубые руки привязали к ее тонкому поясу ремень, свисавший с потолка.</p><p class="p1">– В последний раз: признаете вы обстоятельства, при которых совершилось злодеяние? – спросил Шармолю со своей невозмутимой медоточивостью.</p><p class="p1">– Я невиновна.</p><p class="p1">– В таком случае как вы объясните все, в чем вас обвиняют?</p><p class="p1">– Увы! Я не знаю, монсеньор.</p><p class="p1">– Вы отрицаете свою вину?!</p><p class="p1">– Отрицаю все!</p><p class="p1">– Начинайте! – приказал Шармолю палачу.</p><p class="p1">Пьера завернул винт, «сапог» сжался, и несчастная испустила один из тех ужасных криков, передать которые невозможно ни на одном человеческом языке.</p><p class="p1">– Остановитесь, – приказал Шармолю Пьера. – Сознаетесь? – спросил он цыганку.</p><p class="p1">– Во всем! – закричала несчастная девушка. – Сознаюсь! Сознаюсь! Пощадите!</p><p class="p1">Идя на пытку, она не соразмерила своих сил. Первая боль победила бедняжку, жизнь которой до тех пор была так весела, легка и приятна.</p><p class="p1">– Человеколюбие обязывает меня предупредить вас, что, повинившись, вы должны ждать смерти, – сказал прокурор.</p><p class="p1">– О, поскорей бы, – ответила она и упала на кожаную постель, точно умирающая, перегнувшись вдвое и повиснув на кожаном ремне, застегнутом пряжкой у нее на груди.</p><p class="p1">– Ну, красавица, приободрись, – сказал мэтр Пьера, приподнимая ее. – Ты похожа на золотого агнца, которого носит на шее герцог Бургундский.</p><p class="p1">Жак Шармолю возвысил голос:</p><p class="p1">– Писец, пишите. Цыганка, ты признаешься, что принимала участие в сходбищах, шабашах и адских колдовствах вместе с злыми духами, ведьмами и вампирами? Отвечай.</p><p class="p1">– Да, – отвечала она так тихо, что ее слова сливались с дыханием.</p><p class="p1">– Ты видела барана, которого показывает Вельзевул в облаках, чтобы собрать шабаш, и которого могут видеть одни только колдуньи?</p><p class="p1">– Да.</p><p class="p1">– Ты признаешься в том, что поклонялась головам Бофомета, этим отвратительным идолам храмовников?</p><p class="p1">– Да.</p><p class="p1">– Что общалась с дьяволом под видом ручной козы, привлеченной к делу?</p><p class="p1">– Да.</p><p class="p1">– Наконец, ты признаешься и каешься в том, что с помощью демона и оборотня, обыкновенно называемого «мрачным монахом», ты в ночь на двадцать девятое марта убила некоего капитана Феба де Шатопера?</p><p class="p1">Она подняла на прокурора свои большие неподвижные глаза и отвечала как бы машинально, не дрогнув:</p><p class="p1">– Да.</p><p class="p1">Очевидно, в ней все было сломлено.</p><p class="p1">– Пишите, писец, – приказал Шармолю. – А вы, – продолжал он, обращаясь к палачам, – отвяжите узницу и отведите ее обратно в зал суда.</p><p class="p1">Когда с узницы сняли «сапог», церковный прокурор осмотрел ее ногу, все еще неподвижную от боли.</p><p class="p1">– Ну, беда невелика. Ты крикнула вовремя. Еще сможешь плясать, красавица!</p><p class="p1">Затем он обратился к представителям правосудия:</p><p class="p1">– Вот наконец правосудию все ясно. Это утешительно, господа. Барышня должна отдать нам справедливость, что мы действовали со всей доступной нам мягкостью.</p></span><span id="id49"><div class="title6">
<p class="p">III. Конец экю, превратившегося в сухой лист</p>
</div><p class="p1">Когда бледная, хромающая Эсмеральда вернулась в зал, ее встретил общий ропот удовольствия. Со стороны публики это было чувство удовлетворенного нетерпения, которое зрители испытывают при окончании последнего антракта пьесы, когда подымается занавес и начинается финал. Со стороны судей – надежда на скорый ужин. И козочка заблеяла от радости. Она хотела побежать навстречу хозяйке, но ее привязали к скамейке.</p><p class="p1">Совсем стемнело. Свечи, количество которых не увеличили, давали так мало света, что даже стены зала не были видны. Мрак окутывал всех как бы туманом. Только едва выделялось несколько апатичных лиц судей. На противоположном конце длинного зала зрители видели неясную белую точку, выделявшуюся на темном фоне. То была подсудимая.</p><p class="p1">Она дотащилась до своего места. Шармолю, торжественно дойдя до своего, сел, затем встал и, не выказывая слишком сильного тщеславия своим успехом, сказал:</p><p class="p1">– Подсудимая во всем созналась.</p><p class="p1">– Цыганка, – заговорил председатель, – ты призналась в колдовстве, распутной жизни и убийстве Феба де Шатопера?</p><p class="p1">Ее сердце сжалось. Из темноты послышались рыдания.</p><p class="p1">– Во всем, в чем хотите, – отвечала она слабым голосом. – Только убейте меня поскорей!</p><p class="p1">– Господин прокурор церковного суда, палата готова выслушать ваше заявление.</p><p class="p1">Мэтр Шармолю извлек тетрадь ужасающих размеров и начал читать, жестикулируя, повышенным тоном стряпчего латинскую речь, где все доказательства обвинения были нагромождены на цицероновских перифразах и сопровождались цитатами из Плавта, его любимого комика. Очень сожалеем, что не можем предложить читателю этого замечательного документа. Оратор читал его весьма оживленно и еще не успел окончить вступление, как уже пот капал у него с лица, а глаза вылезли из орбит.</p><p class="p1">Вдруг на самой середине периода он остановился, и его взгляд, обыкновенно довольно добродушный и даже глуповатый, стал метать молнии.</p><p class="p1">– Господа! – вскричал он уже по-французски, так как этого не было в тетради. – Сатана настолько замешан во всем этом деле, что вот он сам присутствует при наших прениях и передразнивает королевский суд. Взгляните.</p><p class="p1">Говоря это, он указал на козочку, которая, видя жесты Шармолю, действительно подумала, что ей следовало подражать ему. Она присела на задние ноги, а передними и бородатой головкой старалась, насколько возможно, повторять патетические движения прокурора церковного суда. Если читатель помнит, это был один из ее талантов. Этот инцидент, это последнее доказательство произвело огромный эффект. Козе связали ноги, и королевский прокурор продолжал прерванную нить своего красноречия.</p><p class="p1">Говорил он долго, но речь была великолепна. Вот ее последняя фраза; прибавьте к ней мысленно хриплый голос и торопливую жестикуляцию мэтра Шармолю: «Ideo, domini, coram stryga demonstrata, crimine patente, intentione criminis existente, in nomine sanctae ecclesiae Nostrae-Dominae Parisiensis, quae est in saisina habendi omnimodum altam et bassam justitiam in illa hac intemerata Civitatis insula, tenore praesentium declaramus nos requirere, primo, aliquamdam pecuniariam indemnitatem; secundo, amendationem honorabilem ante portalium maximum Nostrae-Dominae, ecclesiae cathedralis; tertio, sententiam in virtute cujus ista stryga exeunte in fluvio Secanae juxta pointam jardini regalis, executatae sint»<a href="ch2.xhtml#id140" class="a">[117]</a>. Он надел шапочку и сел.</p><p class="p1">– Ох! – вздохнул Гренгуар. – Bassa latinitas!<a href="ch2.xhtml#id139" class="a">[118]</a></p><p class="p1">Другой человек в черной мантии встал возле обвиняемой. Это был ее адвокат. Проголодавшиеся судьи начали роптать.</p><p class="p1">– Говорите кратко, – обратился к адвокату председатель.</p><p class="p1">– Господин председатель, – начал адвокат, – так как моя подзащитная созналась в своем преступлении, то мне остается сказать только одно слово. Вот текст салического закона: «Если ведьма съела человека и уличена в том, она заплатит штраф в восемь тысяч экю, то есть штраф в двести золотых су». Угодно будет суду приговорить мою клиентку к уплате штрафа?</p><p class="p1">– Текст, уже вышедший из употребления, – заметил королевский прокурор.</p><p class="p1">– Nego<a href="ch2.xhtml#id138" class="a">[119]</a>, – ответил защитник.</p><p class="p1">– На голоса! – посоветовал советник. – Преступление доказано, и уже поздно.</p><p class="p1">Собирали голоса, не выходя из зала. Судьи подавали голос снятием шапочки, все спешили. При зловещем вопросе, с которым к ним шепотом обращался председатель, видно было в полумраке, как они один за другим снимали шапочки с головы. Несчастная подсудимая как будто смотрела на них, но ее помутившиеся глаза уже не видели ничего.</p><p class="p1">Затем писец начал писать и через несколько времени передал председателю длинный пергамент.</p><p class="p1">Тогда несчастная услыхала, как толпа задвигалась, зазвенели пики, ударяясь одна о другую, а ледяной голос стал говорить:</p><p class="p1">– Девушка-цыганка, в тот день, который благоугодно будет назначить королю, нашему государю, в полдень, тебя, в рубашке, босиком, с веревкой на шее, вывезут в телеге перед главным фасадом собора Богоматери. Здесь, держа двухфунтовую восковую свечу в руках, ты всенародно покаешься, и оттуда тебя перевезут на Гревскую площадь, где тебя повесят и удавят на виселице, так же, как и твою козу. Ты заплатишь исполнителю приговора три лиондера в возмездие за совершенные тобой преступления, в которых ты повинилась, – колдовство, волшебство, распутство и убийство дворянина Феба де Шатопера. Прими, Господь, твою душу!</p><p class="p1">– Это сон! – проговорила Эсмеральда и почувствовала, что ее уносят сильные руки.</p></span></span></span>
