<p class="p">V. Продолжение о Клоде Фролло</p>
</div><p class="p1">В 1482 году Квазимодо было около двадцати, а Клоду Фролло – около тридцати шести лет. Один возмужал, другой начинал стареть.</p><p class="p1">Клод Фролло уже не был прежним скромным школьником коллежа Торши, нежным покровителем беспомощного ребенка, молодым философом-мечтателем, так много знавшим и еще больше не знавшим. Теперь это был строгий, серьезный и угрюмый священник, блюститель душ, архидьякон Жозасский, второй викарий епископства, управлявший двумя деканатами – Монлерийским и Шатофорским – и ста семьюдесятью четырьмя сельскими приходами. Он сделался особой, перед которой трепетали певчие в стихарях и куртках, причетники, братия Святого Августина, младшие клирики собора Богоматери, когда он, величавый и мрачный, медленными шагами проходил перед ними, скрестив на груди руки и низко опустив голову, так что был виден только один его высокий обнаженный лоб.</p><p class="p1">Однако Клод Фролло не бросил ни науки, ни забот о воспитании своего брата – этих двух привязанностей своей жизни. С течением времени к ним добавилась только некоторая горечь. Недаром Павел-Дьякон говорит, что от времени горкнет и самое лучшее сало. Маленький Жан Фролло, прозванный де Муленом в честь мельницы, на которой он был вскормлен, смотрел совсем не в ту сторону, в какую направлял его Клод. Старший брат порывался сделать из младшего богобоязненного, покорного, ученого и вообще достойного уважения человека; а тот, подобно тем молодым деревьям, которые, наперекор всем стараниям садовника, упорно тянутся в сторону света и воздуха, рос и распускался пышными побегами только в сторону лени, невежества и всякого рода безрассудств. Это был настоящий дьяволенок, своими бесшабашными проказами то и дело заставлявший грозно хмуриться высокое чело старшего брата. Но вместе с тем он был такой забавный и увертливый, что часто вызывал на строгом лице старшего брата невольную улыбку. Клод поместил его в тот самый коллеж Торши, в котором сам провел первые годы своей школьной жизни в занятиях и размышлениях. Для архидьякона было большим огорчением, что теперь в этом святилище имя Фролло произносилось чуть ли не с ужасом, в то время как при нем оно считалось одним из лучших украшений школы. На эту тему Клод часто читал брату длинные и строгие наставления, которые тот выслушивал с примерным мужеством. Впрочем, несмотря на свою распущенность, Жан был очень добр, как герой комедии. Выслушав грозную проповедь брата, он как ни в чем не бывало преспокойно снова продолжал свои похождения и дебоши. То он поколотит какого-нибудь школяра-новичка, следуя в этом случае сохранившейся до наших времен традиции, по которой все вновь вступавшие в храм науки посвящались в его адепты доброю порцией колотушек со стороны поступивших раньше. То поведет банду учащейся молодежи в «классический» поход на какой-нибудь кабачок, где буяны сначала изрядно отдубасят кабатчика, потом с хохотом все разгромят у него, выбьют дно у бочек в погребе и устроят настоящее разливанное море. По временам к Клоду являлся старший наставник коллежа Торши и со скорбным видом вручал ему изложенный на превосходном латинском языке отчет о буйствах Жана, с грустною отметкою на полях: «Rixa; prima causa vinum optimum potatum»<a href="ch2.xhtml#id20" class="a">[56]</a>. В довершение говорили, что Жан Фролло доходил в своих бесчинствах даже до улицы Глатиньи, а для шестнадцатилетнего юноши это ужасно.</p><p class="p1">Опечаленный и все более падая духом вследствие таких сведений о поведении брата, Клод с большей еще страстью бросался в объятия науки, этой сестры, которая, во всяком случае, не издевается над нами и всегда, по временам, правда, довольно потертою монетою, вознаграждает нас за оказываемое ей внимание. Таким образом он набирался большей и большей учености и, сообразно с этим, по естественному закону последовательности, становился все более суровым священником и все более печальным человеком. У каждого из нас существует известный параллелизм между нашим умственным складом, нашим характером и нашими склонностями, нарушающийся только при крупных потрясениях.</p><p class="p1">Клод Фролло уже в молодости прошел почти весь круг положительных официальных, дозволенных законом знаний. Теперь ему ничего более не оставалось, как перейти через границу этих знаний и искать другой пищи для утоления своего ненасытного духовного голода, если он не хотел остановиться ubi defuit orbis<a href="ch2.xhtml#id18" class="a">[57]</a>. Древний символ змеи, кусающей свой собственный хвост, всего лучше подходит к науке. Вероятно, Клод Фролло убедился в этом на собственном опыте. Многие серьезные люди уверяли, что, истощив весь fas человеческого знания, он дерзнул проникнуть и в nefas<a href="ch2.xhtml#id16" class="a">[58]</a>; что, перепробовав последовательно один за другим все плоды древа познания и не удовлетворившись ими, он ухватился и за плоды запретные. Читатели помнят, что он принимал участие и в конференциях богословов Сорбонны, и в собраниях богословов Сент-Илэра, и в диспутах декретистов Сен-Мартена, и в конгрегациях медиков чаши Богородицы – ad cupam Nostrae-Dominae.</p><p class="p1">Он поглотил всю стряпню тех четырех громадных кухонь, которые называются университетскими факультетами, и пресытился ими раньше, чем успел насытиться. Тогда он стал проникать дальше и глубже и рваться за пределы этой ограниченной, строго замкнутой самой в себе, чисто материальной науки. Рискуя своей душою, он забрался в таинственную пещеру запретного знания и уселся за ту мистическую трапезу алхимиков, астрологов, герметиков, на верхнем конце которой в Средние века сидели Авероэс, Гильом Парижский и Николай Фламель, а другой, освещенный семисвечником, терялся в дверях Востока, где за ним виднелись тени Соломона, Пифагора и Зороастра.</p><p class="p1">Так, по крайней мере, думали о Клоде Фролло, а справедливо это было или нет – неизвестно.</p><p class="p1">Несомненно было только то, что архидьякон часто посещал кладбище «Невинных душ», на котором были погребены его родители вместе с остальными жертвами чумы 1466 года. Там он не столько молился над крестом, осенявшим их могилу, сколько всматривался в странные изображения, украшавшие могилы Николая Фламеля и Клода Пернеля, находившиеся рядом.</p><p class="p1">Достоверно было и то, что не раз видели, как Клод Фролло пробирается по улице Ломбар и быстро входит в небольшой домик, стоявший на углу улиц Экривен и Мариво. Этот дом был построен Николаем Фламелем, который в нем и скончался около 1417 года. С тех пор домик пустовал и уже начинал разрушаться благодаря тому, что стекавшиеся к нему со всех сторон герметики и искатели философского камня исчерчивали его стены своими именами. Были люди, уверявшие, что однажды они видели, как архидьякон Клод усердно рыл землю в тех двух подвалах, подпорки которых были покрыты во всех направлениях бесчисленными иероглифами и стихами, написанными рукою Николая Фламеля. Предполагалось, что в этих подвалах он зарыл свой философский камень, поэтому в течение целых двух веков все алхимики, начиная с Манжистри и до отца Пасифика, не переставали рыться под фундаментом этого дома, пока последний не выдержал и не рассыпался.</p><p class="p1">Не подлежало сомнению и то, что архидьякон пылал какою-то исключительной страстью к символическому порталу собора Богоматери, этой странице чернокнижной мудрости, начертанной таинственными каменными письменами рукою епископа Гильома Парижского, который, разумеется, попал прямо в ад за то, что дерзнул приделать столь дьявольский заголовок к священному гимну, представляемому самым зданием. Шел также слух, что архидьякон исследовал внутренность колоссальной статуи святого Христофора и длинного загадочного каменного изображения, которое в то время возвышалось у входа на паперть и было известно в народе под насмешливым прозванием «Мосье Легри». Но как бы там ни было, во всяком случае, каждый мог видеть, как Клод Фролло просиживал по целым часам на парапете преддверия, то созерцая изваяние над главным входом в собор, то изучая безрассудных дев с потухшими светильниками и мудрых с горящими, то измеряя взглядом угол, под которым смотрит в какую-то таинственную точку внутри собора ворон, изображенный над левым входом. По всей вероятности, в том месте, куда смотрит каменный ворон, и зарыт философский камень, если только, впрочем, он не находится под развалинами дома Николая Фламеля. Сказать мимоходом: не казалось ли в самом деле странным то обстоятельство, что собор Богоматери в описываемую нами эпоху был предметом горячей, беззаветной преданности двух существ, так отличавшихся друг от друга, как Клод Фролло и Квазимодо? Звонарь, получеловек, полуживотное, живший почти одним инстинктом, любил собор за его внешнюю красоту, за его стройную величавость, за гармонию, которою в целом дышит это здание, а архидьякон, как человек глубоко ученый, с пылким воображением, чувствовал любовь к собору за его внутреннее значение, за символы, рассеянные по его фасаду под скульптурными изображениями, подобно тому как в древней рукописи под одним текстом скрывается другой, более глубокий и содержательный по смыслу. Словом, Клод Фролло любил собор Богоматери за ту вечную, неразрешимую загадку, которую он предлагает пытливому уму.</p><p class="p1">Наконец, не подлежало сомнению и то, что архидьякон приспособил себе в одной из тех двух башен, которые обращены к Гревской площади, рядом с помещением для колоколов, небольшую потайную келью, куда никто не смел входить без его разрешения, даже сам епископ, как гласила молва. Эта келья, находившаяся на самой вершине башни, между вороньими гнездами, была устроена епископом Гуго Безансонским (жившим между 1326–1332 годами), занимавшимся там колдовством. Что заключала в себе келья, никто не знал. Но нередко по ночам с песчаных отмелей Террена можно было видеть, как в ее небольшом окне, выходившем в сторону, противоположную площади, с правильными промежутками то вспыхивает, то гаснет, то вновь разгорается какое-то странное красное сияние, происходившее точно от действия кузнечного меха и напоминавшее скорее пламя горна, чем огонь обыкновенного светильника. Этот перемежающийся огонь, видневшийся в ночном мраке на высоте собора, производил очень странное впечатление, и кумушки, завидев его, говорили: «Ну, архидьякон опять принялся раздувать огонь в своей адской печи!»</p><p class="p1">В сущности, все это не могло еще, конечно, служить несомненными доказательствами чернокнижия, но все-таки давало столько дыма, что поневоле приходилось подозревать за ним и огонь, тем более что архидьякон пользовался в этом отношении дурною славой. Следует, впрочем, сказать, что все науки, происхождение которых нужно искать в древнем Египте, – все эти некромантии и магии, не исключая и самой невинной из них, так называемой белой магии, – не имели более заклятого врага и более яростного обличителя перед судом консистории, чем архидьякон Клод Фролло. Скажись в этом искреннее отвращение Клода или будь это только уловкой вора, громче всех кричащего «Держите его!» – все равно ученые мужи капитула смотрели на архидьякона как на душу, уже забравшуюся в преддверие ада, блуждающую в дебрях каббалистики и ощупью пробирающуюся во мраке тайных наук. Народ тоже понимал его по-своему. Для каждого мало-мальски проницательного человека было ясно как божий день, что Квазимодо – демон, а Клод Фролло – колдун. Очевидно, звонарь обязался отслужить у архидьякона известный срок, чтобы затем, по истечении этого срока, овладеть его душою в виде платы за свою службу. Ввиду всего этого архидьякон, несмотря на свой строгий образ жизни, пользовался дурною славою между людьми, и не было ни одной столь неискушенной набожной души, которая не считала бы его за колдуна. И вот с возрастом не только в его знаниях, но и в его сердце образовались глубокие бездны; так, по крайней мере, можно было думать, глядя на его лицо, где его душа просвечивала точно сквозь темную тучу. В самом деле, откуда взялся у него такой широкий и высокий лоб? Отчего голова его всегда клонилась книзу, а грудь постоянно подымалась с тяжелыми вздохами? Какая тайная мысль заставляла его уста улыбаться с такой горечью, в то время как его нахмуренные брови сдвигались подобно двум быкам, готовым вступить в бой друг с другом? Почему оставшиеся волосы успели так рано поседеть? Что это был за внутренний огонь, который порою так вспыхивал в его глазах, что они казались отверстиями пылающего горна?</p><p class="p1">Все эти признаки напряженной душевной деятельности у Клода Фролло особенно резко стали проявляться в описываемую нами эпоху. Не раз случалось, что кто-нибудь из маленьких певчих, встретившись с ним в соборе с глазу на глаз, в ужасе убегал, испуганный его неестественно сверкающим взором. Нередко на хорах во время богослужения кто-нибудь из стоящих поблизости слышал, как он к пению священных гимнов ad omnem tonum<a href="ch2.xhtml#id14" class="a">[59]</a> прибавлял какие-то непонятные слова. Даже прачка, стиравшая на весь «капитул», часто с ужасом замечала на стихаре жозасского архидьякона следы судорожно сжатых пальцев и вонзавшихся в материю ногтей.</p><p class="p1">В то же время он стал вести еще более строгий образ жизни и мог служить блестящим примером нравственной чистоты. И в пору цветущей молодости он избегал женщин – отчасти в силу своего положения, а отчасти и по своему личному характеру; теперь же он, казалось, прямо ненавидел их. Достаточно было ему услыхать шуршание шелкового женского платья, чтобы это заставило его опустить капюшон своей рясы на глаза. Строгость его в этом отношении дошла до того, что когда дочь короля, Анна де Боже, в декабре 1481 года пожелала посетить монастырь собора Богоматери, он серьезно воспротивился допущению принцессы в монастырь, напомнив сопровождавшему принцессу епископу параграф Черной книги, изданной в 1334 году, накануне дня святого Варфоломея, по которому доступ в монастырь собора Богоматери воспрещался всякой женщине, «без разбора, молода она или стара, госпожа или служанка». В ответ на это епископ был вынужден сослаться на постановление легата Одо, сделавшего исключение в пользу особенно высокопоставленных дам. «Aliquae magnates mulieres, quae sine scandalo vitari non possunt»<a href="ch2.xhtml#id270" class="a">[60]</a>, – говорится в этом параграфе. Но архидьякон не сдался. Продолжая протестовать, он возразил епископу, что постановление Одо, составленное в 1207 году, предшествует Черной книге на сто двадцать семь лет, а следовательно, должно считаться отмененным последнею. И он отказался появиться перед принцессой.</p><p class="p1">Между прочим, досужие умы замечали, что с некоторых пор особенно усилилась ненависть архидьякона к египтянкам и цыганкам. Не ограничиваясь исходатайствованием у епископа распоряжения, воспрещавшего цыганкам бить в бубен и плясать на площади перед собором, он рылся в заплесневелых документах консистории и составлял сборник о колдунах и колдуньях, присужденных к виселице или к сожжению на костре за чародейства, совершенные ими при помощи козлов, свиней или коз.</p></span><span id="id27"><div class="title6">
<p class="p">VI. Нелюбовь народа</p>
</div><p class="p1">Таким образом, архидьякон и звонарь не пользовались расположением лиц, обитавших по соседству с собором. Когда Клод и Квазимодо выходили вместе – что случалось довольно часто – и пробирались по прохладным, узким и темным улицам, прилегавшим к собору, по адресу обоих летели злые словечки, насмешливые припевы и различные оскорбительные замечания. Исключение составляли только те редкие случаи, когда Клод Фролло шел с высоко поднятой головою. Вид строгого и величественного лица архидьякона останавливал насмешников.</p><p class="p1">Они оба в своем околотке находились в положении тех поэтов, о которых Ренье говорит:</p><div class="poem">
<div class="stanza">
<p class="v">Toutes sortes de gens vont après les poètes</p>
<p class="v">Comme après les hiboux vont criant les fauvettes<a href="ch2.xhtml#id269" class="a">[61]</a>.</p>
</div>
</div><p class="p1">Часто какой-нибудь шалун-мальчишка рисковал своей шкурой и костями из-за наслаждения воткнуть булавку в горб Квазимодо, или какая-нибудь красивая, бойкая, не в меру отважная девица нарочно задевала своим платьем черную рясу архидьякона, напевая ему прямо в лицо насмешливую песенку, начинающуюся словами:</p><div class="poem">
<div class="stanza">
<p class="v">Niche, niche, le diable est pris<a href="ch2.xhtml#id268" class="a">[62]</a>.</p>
</div>
</div><p class="p1">Иной раз группа старух, сидевших на ступенях одной из папертей собора, громко ворчала вслед архидьякону и звонарю:</p><p class="p1">– Гм! Вот парочка-то! Сразу видно: что у одного написано прямо на роже, то у другого таится в душе!</p><p class="p1">Или же кучка школяров, игравших в камешки, разом поднималась при их появлении и встречала их свистками и какою-нибудь насмешкою на латинском языке, вроде, например, следующей: «Eia, eia! Claudus cum claudo»<a href="ch2.xhtml#id267" class="a">[63]</a>.</p><p class="p1">Чаще всего священник и звонарь даже не замечали этих оскорблений. Чтобы расслышать все эти любезности, Квазимодо был слишком глух, а Клод – слишком погружен в свои размышления.</p></span></span></span>
