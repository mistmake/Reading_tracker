<p class="p">8. Стон</p>
</div><p class="p1">Процессия тронулась.</p><p class="p1">Пошли по коридору.</p><p class="p1">Никаких предварительных опросов. Никакой канцелярии, никакой регистрации. Тюремное начальство того времени не занималось излишним бумагомаранием. Оно ограничивалось тем, что захлопывало за человеком двери, нередко даже не зная, за что его заточили. Тюрьма вполне довольствовалась тем, что она тюрьма и что у нее есть узники.</p><p class="p1">Коридор был узким, и шествию пришлось растянуться. Шли почти гуськом: впереди жезлоносец, за ним Гуинплен, за Гуинпленом судебный пристав, за судебным приставом полицейские, двигавшиеся вереницей вдоль всего коридора. Проход сужался все больше и больше: теперь Гуинплен уже касался локтями обеих стен; в своде, сооруженном из залитого цементом мелкого камня, на равном расстоянии один от другого были гранитные выступы, и здесь потолок нависал еще ниже; приходилось наклоняться, чтобы пройти; бежать по коридору было невозможно. Даже тот, кто вздумал бы спастись бегством, был бы вынужден двигаться тут шагом; узкий коридор извивался, как кишка; внутренность тюрьмы так же извилиста, как и внутренности человека. Местами, то направо, то налево, чернели четырехугольные проемы, защищенные толстыми решетками, за которыми виднелись лестницы – одни поднимались вверх, другие спускались вниз. Дошли до запертой двери, она отворилась, переступили через порог, и она снова закрылась; затем встретилась еще одна дверь, тоже пропустившая шествие, потом третья, также повернувшаяся на петлях. Двери открывались и закрывались как бы сами собой. По мере того как коридор сужался, свод нависал все ниже и ниже, так что можно было двигаться, только согнув спину. На стенах выступала сырость; со свода капала вода, каменные плиты, которыми был выложен коридор, были покрыты липкой слизью, точно кишки. Какой-то бледный, рассеянный сумрак заменял свет; уже не хватало воздуха. Но всего страшнее было то, что галерея шла вниз.</p><p class="p1">Впрочем, заметить это можно было, только внимательно приглядевшись. Отлогий скат в темноте становился чем-то зловещим. Нет ничего чудовищнее неизвестности, которой идешь навстречу, спускаясь по едва заметному склону.</p><p class="p1">Спуск – это вход в ужасное царство неведомого.</p><p class="p1">Сколько времени шли они таким образом? Гуинплен не мог бы сказать этого.</p><p class="p1">Тревожное ожидание, словно прокатный вал, удлиняет каждую минуту до бесконечности.</p><p class="p1">Вдруг шествие остановилось.</p><p class="p1">Кругом был непроглядный мрак.</p><p class="p1">Коридор тут немного расширился.</p><p class="p1">Гуинплен услышал рядом с собой звук, похожий на звон китайского гонга, – как будто удар в диафрагму бездны.</p><p class="p1">Это жезлоносец ударил жезлом в железную плиту.</p><p class="p1">Плита оказалась дверью.</p><p class="p1">Дверь не поворачивалась на петлях, а поднималась и опускалась наподобие подъемной решетки.</p><p class="p1">Раздался резкий скрип в пазах, и глазам Гуинплена внезапно предстал четырехугольный просвет.</p><p class="p1">Это скользнула кверху и ушла в щель, проделанную в своде, железная плита, точь-в-точь как поднимается дверца мышеловки.</p><p class="p1">Открылся пролет.</p><p class="p1">Свет, проникавший оттуда, не был дневным светом, а тусклым мерцанием. Но для расширенных зрачков Гуинплена эти слабые лучи были ярче внезапной вспышки молнии.</p><p class="p1">Некоторое время он ничего не видел; различить что-нибудь в ослепительном сиянии так же трудно, как и во мраке.</p><p class="p1">Затем мало-помалу его зрачки приспособились к свету, также как ранее они приспособились к темноте; и Гуинплен стал постепенно различать то, что его окружало: свет, показавшийся ему вначале таким ярким, постепенно ослабел и перешел в полумрак; Гуинплен отважился взглянуть в зиявший перед ним пролет, и то, что он увидел, было ужасно.</p><p class="p1">У самых ног его почти отвесно спускалось в глубокое подземелье десятка два крутых, узких и стершихся ступеней, образуя нечто вроде лестницы без перил, высеченной в каменной стене. Ступени шли до самого низа.</p><p class="p1">Подземелье было круглое, со стрельчатым покатым сводом, покоившимся на осевших устоях неравной высоты, как это обычно бывает в подвалах, устроенных под слишком массивными зданиями.</p><p class="p1">Отверстие, служившее входом и обнаружившееся, только когда поднялась кверху железная плита, было пробито в каменном своде в том месте, где начиналась лестница, так что с этой высоты взор погружался в подземелье, точно в колодец.</p><p class="p1">Подземелье занимало большое пространство, и если оно когда-то служило дном колодца, то колодец этот был циклопических размеров. Старинное выражение «яма» могло быть применено к этому каменному мешку, только если представить его себе в виде рва для львов или тигров.</p><p class="p1">Подземелье не было вымощено ни плитами, ни булыжником. Полом служила сырая, холодная земля, какой она бывает в глубоких погребах.</p><p class="p1">Посредине подземелья четыре низкие уродливые колонны поддерживали каменный стрельчатый навес, четыре ребра которого сходились в одной точке, образуя нечто, напоминавшее митру епископа. Этот навес, вроде тех балдахинов, под которыми некогда ставились саркофаги, упирался вершиной в самый свод, образуя в подземелье как бы отдельный покой, если можно назвать покоем помещение, открытое со всех сторон и имеющее вместо четырех стен четыре столба.</p><p class="p1">К замочному камню навеса был подвешен круглый медный фонарь, защищенный решеткой, словно тюремное окно. Фонарь отбрасывал на столбы, на своды, на круглую стену, смутно видневшуюся за столбами, тусклый свет, пересеченный полосами тени.</p><p class="p1">Это и был тот свет, который в первую минуту ослепил Гуинплена. Теперь он казался ему мерцающим красноватым огоньком.</p><p class="p1">Другого освещения в подземелье не было. Ни окна, ни двери, ни отдушины.</p><p class="p1">Между четырьмя столбами, как раз под фонарем, на месте, освещенном ярче всего, лежала на земле какая-то белая, страшная фигура.</p><p class="p1">Она была простерта на спине. Можно было ясно разглядеть лицо с закрытыми глазами; туловище исчезало под какой-то бесформенной грудой; руки и ноги, растянутые в виде креста, были привязаны четырьмя цепями к четырем столбам, а цепи прикреплены к железным кольцам у подножия каждой колонны. Человеческая фигура, неподвижно застывшая в ужасной позе четвертуемого, синевато-бледным цветом кожи походила на труп. Это было обнаженное тело мужчины.</p><p class="p1">Окаменев, Гуинплен стоял на верхней ступени лестницы.</p><p class="p1">Вдруг он услыхал хрип.</p><p class="p1">Значит, это был не труп. Это был живой человек.</p><p class="p1">Немного поодаль от этого страшного существа, под одной из стрельчатых арок навеса, по обе стороны, большого кресла, водруженного на широком каменном подножия, стояло двое людей в длинных черных хламидах, а в кресле сидел одетый в красную мантию бледный неподвижный старик со зловещим лицом, держа в руке букет роз.</p><p class="p1">Человек более сведущий, чем Гуинплен, взглянув на букет, сразу сообразил бы, в чем дело. Право судить, держа в руке пучок цветов, принадлежало чиновнику, представлявшему одновременно и королевскую, и муниципальную власть. Лорд-мэр города Лондона и поныне отправляет судейские функции с букетом в руке. Назначением первых весенних роз было помогать судьям творить суд и расправу.</p><p class="p1">Старик, сидевший в кресле, был шериф Серрейского графства.</p><p class="p1">Он застыл в величественной позе, напоминая собою римлянина, облеченного верховной властью.</p><p class="p1">Кроме кресла, в подземелье не было других сидений.</p><p class="p1">Рядом с креслом стоял стол, заваленный бумагами и книгами; на нем лежал длинный белый жезл шерифа.</p><p class="p1">Люди, недвижимо стоявшие по обе стороны кресла, были доктора: один – доктор медицины, другой – доктор права; последнего можно было узнать по шапочке, надетой на парик. Оба были в черных мантиях. Представители обеих этих профессий носят траур по тем, кого они отправляют на тот свет.</p><p class="p1">Позади шерифа, на выступе каменной плиты, служившей подножием, сидел с пером в руке и, видимо, собирался писать секретарь в круглом парике; на коленях у него лежала папка с бумагами, а на ней лист пергамента; подле него на плите стояла чернильница.</p><p class="p1">Чиновник этот принадлежал к числу так называемых «мешкохранителей», на что указывала сумка, лежавшая у его ног. Такая сумка, некогда бывшая непременным атрибутом судебного процесса, называлась «мешком правосудия».</p><p class="p1">Прислонившись к одному из столбов, со скрещенными на груди руками, стоял человек в кожаной одежде. Это был помощник палача.</p><p class="p1">Все эти люди, замершие в мрачных позах вокруг закованного в цепи человека, казались зачарованными. Ни один не двигался; никто не произносил ни слова.</p><p class="p1">Кругом царила зловещая тишина.</p><p class="p1">Место, которое видел перед собой Гуинплен, было застенком. Таких застенков в прежней Англии было великое множество. Подземелье башни Бошана долгое время служило для этой цели, так же как подвалы тюрьмы Лоллардов. До наших дней сохранилось в Лондоне подземелье, известное под названием «склепа леди Плейс». В этом помещении находится камин, где накаливались щипцы.</p><p class="p1">Во всех тюрьмах, выстроенных при короле Иоанне, – а Саутворкская тюрьма была типичной тюрьмой той эпохи, – имелись застенки.</p><p class="p1">То, о чем сейчас будет рассказано, в ту пору часто происходило в Англии и могло бы, строго говоря, происходить и теперь, ибо все законы того времени существуют и поныне. Англия представляет собою любопытное явление в том отношении, что варварское законодательство прекрасно уживается в ней со свободой. Что и говорить, чета образцовая.</p><p class="p1">Однако некоторое недоверие к ней было бы нелишним. Случись какая-нибудь смута – и прежние карательные меры могли бы легко возродиться. Английское законодательство – прирученный тигр. Лапа у него бархатная, но когти прежние; они только спрятаны.</p><p class="p1">Обрезать эти когти было бы вполне разумно.</p><p class="p1">Английские законы почти совсем не признают права. По одну сторону – система карательных мер, по другую – принципы человечности. Философы протестуют против такого порядка, но пройдет еще немало времени, прежде чем человеческое правосудие сольется со справедливостью.</p><p class="p1">Уважение к закону характерно для англичан. В Англии к законам относятся с таким почтением, что их никогда не упраздняют. Из этого нелегкого положения, впрочем, находят выход: законы чтут, но их не исполняют. С устаревшими законами происходит то же, что с состарившимися женщинами; никто не думает насильственно пресекать существования тех или других; на них просто перестают обращать внимание – вот и все. Пусть себе думают на здоровье, что они все еще красивы и молоды. Никто не позволит себе сказать им, что они отжили свой век. Подобная учтивость и называется уважением к закону.</p><p class="p1">Нормандское обычное право изборождено морщинами; это, однако, не мешает многим английским судьям строить ему глазки. Англичане любовно оберегают всякие древние жестокости, если только они нормандского происхождения. Есть ли что-нибудь более жестокое, чем виселица? В 1867 году одного человека приговорили к четвертованию, с тем чтобы его растерзанный труп преподнести женщине – королеве.</p><p class="p1">Впрочем, в Англии пыток никогда не существовало. Ведь именно так утверждает история. Что ж, у нее немалый апломб.</p><p class="p1">Мэтью Вестминстерский, констатируя, что «саксонский закон, весьма милостивый и снисходительный», не наказывал преступников смертной казнью, присовокупляет: «Ограничивались только тем, что им отрезали носы, выкалывали глаза и вырывали части тела, являющиеся признаками пола». Только-то!</p><p class="p1">Гуинплен, растерянно остановившись на верхней ступеньке лестницы, дрожал всем телом. Им овладел страх. Он старался вспомнить, какое преступление мог он совершить. Молчание жезлоносца сменилось картиной пытки. Это был шаг вперед, но шаг трагический. Мрачный облик угрожавшего ему закона принимал все более и более загадочные очертания.</p><p class="p1">Человек, лежавший на полу, снова захрипел.</p><p class="p1">Гуинплен почувствовал, что кто-то слегка толкнул его в плечо.</p><p class="p1">Это был жезлоносец.</p><p class="p1">Гуинплен понял, что ему приказывают сойти вниз.</p><p class="p1">Он повиновался.</p><p class="p1">Нащупывая ногой ступеньки, он стал спускаться с лестницы.</p><p class="p1">Ступени были узкие и крутые, высотой в восемь-девять дюймов. Перил не было. Спускаться можно было только с большой осторожностью. За Гуинпленом на расстоянии двух ступенек от него следовал жезлоносец, держа прямо перед собой железный жезл, и на таком же расстоянии позади жезлоносца – судебный пристав.</p><p class="p1">Спускаясь по этим ступеням, Гуинплен чувствовал, что теряет последнюю надежду на спасение. Казалось, он шаг за шагом приближается к смерти. Каждая пройденная ступень угашала в нем какую-то частицу света. Бледнея все больше и больше, он достиг конца лестницы.</p><p class="p1">Распластанный на земле и прикованный к четырем столбам призрак продолжал хрипеть.</p><p class="p1">В полумраке послышался голос:</p><p class="p1">– Подойдите!</p><p class="p1">Это сказал шериф.</p><p class="p1">Гуинплен сделал шаг вперед.</p><p class="p1">– Ближе, – произнес голос.</p><p class="p1">Гуинплен сделал еще шаг.</p><p class="p1">– Еще ближе, – повторил шериф.</p><p class="p1">Судебный пристав прошептал Гуинплену на ухо с таким внушительным видом, что шепот прозвучал торжественно:</p><p class="p1">– Вы находитесь перед шерифом Серрейского графства.</p><p class="p1">Гуинплен подошел почти вплотную к пытаемому, распростертому на полу посреди подземелья. Жезлоносец и судебный пристав остановились поодаль.</p><p class="p1">Когда Гуинплен, очутившись под навесом, увидал вблизи несчастное существо, на которое он до сих пор смотрел только издали, его страх перешел в беспредельный ужас.</p><p class="p1">Человек, лежавший скованным на земле, был совершенно обнажен, если не считать целомудренно прикрывавшего его отвратительного лоскута, который можно было бы назвать фиговым листом пытки и который у римлян назывался succingulum, у готов – christipannus – слово, из которого наше древнегалльское наречие образовало слово cripagne. Тело распятого на кресте Иисуса тоже было прикрыто только обрывком ткани.</p><p class="p1">Осужденному на смерть преступнику, которого видел перед собой Гуинплен, было лет пятьдесят – шестьдесят. Он был лыс. На подбородке у него торчала редкая седая борода. Глаза были закрыты, широко открытый рот обнажал все зубы. Худое, костлявое лицо походило на череп мертвеца. Руки и ноги, прикованные цепями к четырем каменным столбам, образовали букву «X». Грудь и живот были у него придавлены чугунной плитой, на которой лежало пять-шесть огромных булыжников. Его хрип иногда переходил в едва слышный вздох, иногда же – в звериное рычание.</p><p class="p1">Шериф, не расставаясь со своим букетом роз, свободной рукой взял со стола белый жезл и, подняв его, произнес:</p><p class="p1">– Повиновение Ее Величеству.</p><p class="p1">Затем положил жезл обратно на стол.</p><p class="p1">Потом медленно, точно отбивая удары похоронного колокола, сохраняя ту же неподвижность, что и пытаемый, шериф заговорил:</p><p class="p1">– Человек, закованный здесь в цепи, внемлите последний раз голосу правосудия. Вас вывели из вашей темницы и доставили сюда. На вопросы, предложенные вам с соблюдением всех требований формальностей, formaliis verbis pressus, вы, не обращая внимания на прочитанные вам документы, которые вам будут предъявлены еще раз, побуждаемый злобным духом противного человеческой природе упорства, замкнулись в молчании и отказываетесь отвечать судье. Это – отвратительное своеволие, заключающее в себе все признаки наказуемого по закону отказа от дачи показаний суду и запирательства.</p><p class="p1">Присяжный законовед, стоявший справа от шерифа, перебил его с зловещим равнодушием и произнес:</p><p class="p1">– Overhernessa. Законы Альфреда и Годруна. Глава шестая.</p><p class="p1">Шериф продолжал:</p><p class="p1">– Закон уважают все, кроме разбойников, опустошающих леса, где лани рождают детенышей.</p><p class="p1">И, словно колокол, вторящий колоколу, законовед подтвердил:</p><p class="p1">– Qui faciunt vastum in foresta ubi damae solent founinare.</p><p class="p1">– Отказывающийся отвечать на вопросы судьи, – продолжал шериф, – может быть заподозрен во всех пороках. Он способен на всякое злодеяние.</p><p class="p1">Снова раздался голос законоведа:</p><p class="p1">– Prodigus, devorator, profusus, salax, ruffianus, ebriosus, luxuriosus, simulator, consumptor patrimonii elluo, ambro, et gluto<a href="ch2.xhtml#id243" class="a">[227]</a>.</p><p class="p1">– Все пороки, – говорил шериф, – предполагают возможность любых преступлений. Кто все отрицает, тот во всем сознается. Тот, кто не отвечает на вопросы судьи, – лжец и отцеубийца.</p><p class="p1">– Mendax et parricida, – подхватил законовед.</p><p class="p1">Шериф продолжал:</p><p class="p1">– Человек, прикрываться молчанием воспрещается. Своевольно уклоняющийся от суда наносит тяжелое оскорбление закону. Он подобен Диомеду, ранившему богиню. Молчание на суде есть сопротивление власти. Оскорбление правосудия – то же, что оскорбление величества. Это самое отвратительное и самое дерзкое преступление. Уклоняющийся от допроса крадет истину. Законом это предусмотрено. В подобных случаях англичане во все времена пользовались правом воздействовать на преступника, прибегая к яме, к колодкам и к цепям.</p><p class="p1">– Anglica charta<a href="ch2.xhtml#id242" class="a">[228]</a> тысяча восемьдесят восьмого года, – пояснил законовед.</p><p class="p1">И с той же деревянной торжественностью прибавил:</p><p class="p1">– Ferrum, et fossam, et furcas, cum alliis libertatibus<a href="ch2.xhtml#id241" class="a">[229]</a>.</p><p class="p1">Шериф продолжал:</p><p class="p1">– Вследствие этого, подсудимый, поскольку вы не пожелали нарушить свое молчание, хотя находитесь в здравом уме и отлично понимаете, чего требует от вас правосудие, поскольку вы обнаружили дьявольское упорство, вас надлежало бы сжечь живым, но вы, в соответствии с точными указаниями уголовных статутов, были подвергнуты пытке, именуемой «допросом с наложением тяжестей». Вот что было сделано с вами. Закон требует, чтобы я лично сообщил вам это. Вас привели в это подземелье, вас раздели донага и положили на спину, растянув вам руки и ноги и привязав их к четырем колоннам – к столпам закона, – на грудь вам положили чугунную плиту, а на нее столько камней, сколько вы оказались в состоянии выдержать. «И даже сверх того», как говорит закон.</p><p class="p1">– Plusque<a href="ch2.xhtml#id220" class="a">[230]</a>, – подтвердил законовед.</p><p class="p1">Шериф продолжал:</p><p class="p1">– Прежде чем подвергнуть вас дальнейшему испытанию, я, шериф графства Серрейского, обратился к вам, когда вы уже находились в таком положении, вторично предложив вам отвечать и говорить, но вы с сатанинским упорством хранили молчание, невзирая на то, что на вас надеты цепи, колодки, ошейник и кандалы.</p><p class="p1">– Attachiamenta legalja<a href="ch2.xhtml#id219" class="a">[231]</a>, – произнес законовед.</p><p class="p1">– Ввиду вашего отказа и запирательства, – сказал шериф, – а также ввиду того, что справедливость требует, чтобы настойчивость закона не уступала упорству преступника, испытание было продолжено в порядке, установленном эдиктами и сводом законов. В первый день вам не давали ни есть, ни пить.</p><p class="p1">– Hoc est superjejunare<a href="ch2.xhtml#id218" class="a">[232]</a>, – пояснил законовед.</p><p class="p1">Наступило молчание. Слышно было только ужасное хриплое дыхание человека, придавленного грудой камней.</p><p class="p1">Законовед дополнил свое пояснение:</p><p class="p1">– Adde augmentum abstinentiae ciborum diminutione. Consuetude britannica<a href="ch2.xhtml#id217" class="a">[233]</a>, статья пятьсот четвертая.</p><p class="p1">Оба, шериф и законовед, говорили попеременно; трудно представить себе что-либо мрачнее этого невозмутимого однообразия; унылый голос вторил голосу зловещему; можно было подумать, что священник и дьякон, представители некоего культа пыток, служат кровожадную обедню закона.</p><p class="p1">Шериф снова начал:</p><p class="p1">– В первый день вам не давали ни пить, ни есть. На второй день вам дали есть, но не дали пить; вам положили в рот три кусочка ячменного хлеба. На третий день вам дали пить, но не дали есть. Вам влили в рот в три приема тремя стаканами пинту воды, почерпнутой из сточной канавы тюрьмы. Наступил четвертый день – сегодняшний. Если вы и теперь не будете отвечать, вас оставят здесь, пока вы не умрете. Этого требует правосудие.</p><p class="p1">Законовед, не упуская случая подать реплику, монотонно произнес:</p><p class="p1">– Mors rei homagium est bonae legi<a href="ch2.xhtml#id216" class="a">[234]</a>.</p><p class="p1">– И в то время, как вы будете умирать самым жалким образом, – подхватил шериф, – никто не придет к вам на помощь, хотя бы у вас кровь хлынула горлом, выступила из бороды, из подмышек, из всех отверстий тела, начиная со рта и кончая чреслами.</p><p class="p1">– A throtebolla, – подтвердил законовед, – et pabus et subhircis, et a grugno usque ad crupponum.</p><p class="p1">Шериф продолжал:</p><p class="p1">– Человек, выслушайте меня внимательно, ибо последствия касаются вас непосредственно. Если вы откажетесь от своего гнусного молчания и сознаетесь во всем, то вас только повесят, и вы получите право на meldefeoh, то есть на известную сумму денег.</p><p class="p1">– Damnum confitens, – подтвердил законовед, – habeat le meldefeoh. Leges Inae<a href="ch2.xhtml#id215" class="a">[235]</a>, глава двадцатая.</p><p class="p1">– Каковая сумма, – подчеркнул шериф, – будет выплачена вам дойткинсами, сускинсами и галихальпенсами, которые в силу статута, изданного в третий год царствования Генриха Пятого, отменившего эти деньги, могут иметь хождение только в данном случае; кроме того, вы будете иметь право на scortum ante mortem<a href="ch2.xhtml#id214" class="a">[236]</a>, после чего вас удавят на виселице. Таковы выгоды признания. Угодно вам отвечать суду?</p><p class="p1">Шериф умолк в ожидании ответа. Пытаемый даже не пошевельнулся.</p><p class="p1">Шериф продолжал:</p><p class="p1">– Человек, молчание – это прибежище, в котором больше риска, чем надежды на спасение. Запирательство пагубно и преступно. Кто молчит на суде, тот изменник короне. Не упорствуйте в своем дерзостном неповиновении. Подумайте о Ее Величестве. Не противьтесь нашей всемилостивейшей государыне. Отвечайте ей в моем лице. Будьте верным подданным.</p><p class="p1">Пытаемый захрипел.</p><p class="p1">Шериф продолжал:</p><p class="p1">– Итак, по истечении первых трех суток испытания наступили четвертые. Человек, это – решительный день. Очная ставка законом предусмотрена на четвертый день.</p><p class="p1">– Quarta die, frontem ad frontem adduce<a href="ch2.xhtml#id213" class="a">[237]</a>, – пробормотал законовед.</p><p class="p1">– Мудрость законодателя, – продолжал шериф, – избрала этот последний час для получения того, что наши предки называли «решением смертного хлада», поскольку в такое мгновение принимается на веру бездоказательное утверждение или отрицание.</p><p class="p1">Законовед снова пояснил:</p><p class="p1">– Judicium pro frodmortell, quod homines credensi sint per suum ya et per suum na. Хартия короля Адельстана. Том первый, страница сто семьдесят третья.</p><p class="p1">Шериф выждал минуту, затем наклонил к пытаемому свое суровое лицо:</p><p class="p1">– Человек, простертый на земле…</p><p class="p1">Он сделал паузу.</p><p class="p1">– Человек, слышите ли вы меня? – крикнул он.</p><p class="p1">Пытаемый не шевельнулся.</p><p class="p1">– Во имя закона, – приказал шериф, – откройте глаза.</p><p class="p1">Веки допрашиваемого по-прежнему оставались закрытыми.</p><p class="p1">Шериф повернулся к врачу, стоявшему налево от него.</p><p class="p1">– Доктор, поставьте ваш диагноз.</p><p class="p1">– Probe, da diagnosticum, – повторил законовед.</p><p class="p1">Врач, сохраняя торжественность каменного изваяния, сошел с плиты, приблизился к простертому на земле, нагнулся, приложил ухо к его рту, пощупал пульс на руке, подмышкой и на бедре, потом снова выпрямился.</p><p class="p1">– Ну как? – спросил шериф.</p><p class="p1">– Он еще слышит, – ответил медик.</p><p class="p1">– Видит он?</p><p class="p1">– Может видеть.</p><p class="p1">По знаку шерифа судебный пристав и жезлоносец приблизились. Жезлоносец поместился у головы пытаемого; судебный пристав стал позади Гуинплена.</p><p class="p1">Врач, отступив на шаг, стал между колоннами.</p><p class="p1">Тогда шериф, подняв букет роз, словно священник кропило, обратился громким голосом к допрашиваемому; он стал страшен.</p><p class="p1">– Говори, о несчастный! – крикнул он. – Закон заклинает тебя, прежде чем уничтожить. Ты хочешь казаться немым, подумай о немой могиле; ты притворяешься глухим, подумай о страшном суде, который глух к мольбам грешника. Подумай о смерти, которая еще хуже, чем ты. Подумай, ведь ты навеки останешься в подземелье. Выслушай меня, подобный мне, ибо и я – человек. Выслушай меня, брат мой, ибо я христианин. Выслушай меня, сын мой, ибо я старик. Страшись меня, ибо я властен над твоим страданием и буду беспощаден. Ужас, воплощенный в лице закона, сообщает судье величие. Подумай! Я сам трепещу перед собой. Моя собственная власть повергает меня в смятение. Не доводи меня до крайности. Я чувствую в себе священную злобу судьи карающего. Исполнясь же, несчастный, спасительным и достодолжным страхом перед правосудием и повинуйся мне. Час очной ставки наступил, и тебе надлежит отвечать. Не упорствуй. Не допускай непоправимого. Вспомни, что кончина твоя в моих руках. Внемли мне, полумертвец! Если только ты не хочешь умирать здесь в течение долгих часов, дней и недель, угасая в мучительной, медленной агонии, среди собственных нечистот, терзаемый голодом, под тяжестью этих камней, один в этом подземелье, покинутый всеми, забытый, отверженный, отданный на съедение крысам, раздираемый на части всякой тварью, водящейся во мраке, меж тем как над твоей головой будут двигаться люди, занятые своими делами, куплей, продажей, будут ездить кареты; если только ты не хочешь стенать здесь от отчаяния, скрежеща зубами, рыдая, богохульствуя, не имея подле себя ни врача, который смягчил бы боль твоих ран, ни священника, который божественной влагой утешения утолил бы жажду твоей души, о, если только ты не хочешь чувствовать, как будет выступать на губах твоих предсмертная пена, – то молю и заклинаю тебя: послушайся меня! Я призываю тебя помочь самому себе; сжалься над самим собой, сделайте, что от тебя требуют, уступи настояниям правосудия, повинуйся, поверни голову, открой глаза и скажи, узнаешь ли ты этого человека?</p><p class="p1">Пытаемый не повернул головы и не открыл глаз.</p><p class="p1">Шериф посмотрел сначала на судебного пристава, потом на жезлоносца.</p><p class="p1">Судебный пристав снял с Гуинплена шляпу и плащ, взял его за плечи и поставил лицом к свету так, чтобы закованный в цепи мог видеть его. Черты Гуинплена внезапно выступили из темноты во всем своем ужасающем безобразии.</p><p class="p1">В то же время жезлоносец нагнулся, схватил обеими руками голову пытаемого за виски, повернул ее к Гуинплену и пальцами раздвинул сомкнутые веки. Показались дико выкатившиеся глаза.</p><p class="p1">Пытаемый увидел Гуинплена.</p><p class="p1">Тогда, уже сам приподняв голову и широко раскрыв глаза, он стал всматриваться в него.</p><p class="p1">Содрогнувшись всем телом, как только может содрогнуться человек, которому на грудь навалили целую гору, он вскрикнул:</p><p class="p1">– Это он! Да, это он!</p><p class="p1">И разразился ужасным смехом.</p><p class="p1">– Это он! – повторил пытаемый.</p><p class="p1">Его голова снова упала на землю, глаза закрылись.</p><p class="p1">– Секретарь, запишите, – сказал шериф.</p><p class="p1">До этой минуты Гуинплен, несмотря на свой испуг, кое-как владел собою. Но крик пытаемого «Это он!» потряс его. При словах же шерифа: «Секретарь, запишите» – у него кровь застыла в жилах. Ему показалось, что лежащий перед ним преступник увлекает его за собою в пропасть по причинам, о которых он, Гуинплен, даже не догадывался, и что непонятное для него признание этого человека железным ошейником замкнулось у него на шее. Он представил себе, как их обоих – его самого и этого человека – прикуют рядом к позорному столбу. Охваченный ужасом, потеряв всякую почву под ногами, он попробовал защищаться. Глубоко взволнованный, сознавая свою полную непричастность к какому бы то ни было преступлению, он бормотал что-то бессвязное и, весь дрожа, утратив последнее самообладание, выкрикивал все, что ему приходило на ум, – подсказанные смертельной тревогой слова, напоминающие пущенные наудачу снаряды.</p><p class="p1">– Неправда! Это не я! Я не знаю этого человека! Он не может знать меня, потому что я не знаю его! Меня ждут; у меня сегодня представление. Чего от меня хотят? Отпустите меня на свободу! Все это ошибка! Зачем привели меня в это подземелье? Неужели не существует никаких законов? Скажите тогда прямо, что никаких законов не существует. Господин судья, повторяю, это не я! Я не виновен ни в чем решительно. Я это твердо знаю. Я хочу уйти отсюда. Это несправедливо! Между этим человеком и мною нет ничего общего. Можете навести справки. Моя жизнь у всех на виду. Меня схватили точно вора. Зачем меня задержали? Да разве я знаю, что это за человек? Я – странствующий фигляр, выступающий на ярмарках и рынках. Я – Человек, который смеется. Немало народу перевидало меня. Мы помещаемся на Таринзофилде. Вот уже пятнадцать лет, как я честно занимаюсь своим ремеслом. Мне пошел двадцать пятый год. Я живу в Тедкастерской гостинице. Меня зовут Гуинплен. Сделайте милость, господа судьи, прикажите выпустить меня отсюда. Не надо обижать беспомощных, обездоленных людей. Сжальтесь над человеком, который ничего дурного не сделал, у которого нет ни покровителей, ни защитников. Перед вами бедный комедиант.</p><p class="p1">– Передо мною, – сказал шериф, – лорд Фермен Кленчарли, барон Кленчарли-Генкервилл, маркиз Корлеоне Сицилийский, пэр Англии.</p><p class="p1">Шериф встал и, указывая Гуинплену на свое кресло, прибавил:</p><p class="p1">– Милорд, не соблаговолит ли ваше сиятельство присесть?</p></span></span></span></span>
