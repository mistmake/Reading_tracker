<p class="p">8. Не только счастье, но и благоденствие</p>
</div><p class="p1">Сколько правды заключено в сказках! Жгучее прикосновение незримого дьявола – это угрызение совести за дурную мысль.</p><p class="p1">У Гуинплена дурных мыслей не возникало, и поэтому совесть не мучила его. Но по временам он чувствовал какое-то недовольство собой.</p><p class="p1">Смутный голос совести.</p><p class="p1">Что это было? Ничего.</p><p class="p1">Счастье Гуинплена и Деи было полным. И теперь они даже не были бедны.</p><p class="p1">Между 1689 и 1704 годами в их положении произошла перемена.</p><p class="p1">Случалось иногда в 1704 году, что в тот или иной городок побережья под вечер въезжал тяжелый, громоздкий фургон, запряженный парой сильных лошадей. Фургон напоминал опрокинутый и поставленный на четыре колеса корпус судна: киль вместо крыши и палуба вместо пола. Колеса все были одинакового размера и величиной с колеса ломовой телеги. Колеса, дышло, фургон – все было выкрашено в зеленый цвет с постепенным переходом оттенков: от бутылочно-зеленого на колесах до ярко-зеленого на крыше. Этот зеленый цвет в конце концов заставил обратить внимание на колымагу, и она получила известность на ярмарках: ее стали называть «Зеленый ящик». В «Зеленом ящике» было всего лишь два окна, по одному на каждом конце; сзади находилась дверь с откидной лесенкой. Из трубы, торчавшей над крышей и выкрашенной, как и все остальное, в зеленый цвет, шел дым. Стенки этого дома на колесах всегда были покрыты свежим лаком и чисто вымыты. Впереди, на козлах, сообщавшихся с внутренностью фургона посредством окна вместо двери, над крупами лошадей, рядом со стариком, державшим в руке вожжи, сидели две цыганки, одетые богинями, и трубили в трубы. Горожане, разинув рты, смотрели на эту большую колымагу, важно переваливавшуюся с боку на бок, и толковали о ней.</p><p class="p1">Прежний балаган Урсуса уступил место более усовершенствованному сооружению и превратился в настоящий театр. На цепи под колымагой было привязано какое-то странное существо – не то собака, не то волк. Это был Гомо.</p><p class="p1">Старик, правивший лошадьми, был не кто иной, как наш философ.</p><p class="p1">Чем же было вызвано такое превращение жалкой повозки в олимпийскую колесницу?</p><p class="p1">Тем, что Гуинплен стал знаменитостью.</p><p class="p1">Урсус проявил настоящее чутье того, что у людей считается успехом, когда сказал Гуинплену:</p><p class="p1">– О твоем богатстве позаботились!</p><p class="p1">Как помнят читатели, Урсус сделал Гуинплена своим учеником. Неизвестные люди обработали лицо ребенка. Он же обработал его ум и постарался вложить под эту столь удачно сделанную личину возможно больший запас мысли. Как только подросший мальчик показался ему годным для роли комедианта, он вывел его на сцену, то есть на подмостки перед балаганом. Появление Гуинплена произвело необычайное впечатление. Зрители сразу же пришли в восторг. Никто еще никогда не видел ничего похожего на эту поразительную маску смеха. Никто не знал, каким способом было достигнуто это чудо: одни считали этот смех, заражавший всех окружающих, естественным, другие – искусственным; действительность обрастала догадками, и всюду на перекрестках дорог, на площадях, на ярмарках, на праздничных гуляньях толпа стремилась взглянуть на Гуинплена. Благодаря этому «блестящему аттракциону» в тощий кошелек бродячих фигляров сначала полились дождем лиары, затем су и, наконец, шиллинги. Насытив любопытство публики в одном месте, возок переезжал в другое. Для камня не велик прок – перекатываться с места на место, но домик на колесах от таких странствий богател. И вот, по мере того как шли годы, а Гуинплен, кочевавший из города в город, мужал и становился все безобразнее, пришло, наконец, предсказанное Урсусом богатство.</p><p class="p1">– Какую услугу оказали тебе, сынок! – говаривал Урсус.</p><p class="p1">Это «богатство» позволило Урсусу, руководившему успехами Гуинплена, соорудить такую колымагу, о которой он всегда мечтал, то есть фургон, достаточно просторный, чтобы вместить в себе театр, – настоящий театр, сеятель благотворных семян науки и искусства на всех перекрестках. Сверх того, Урсус получил возможность присоединить к труппе, состоявшей из него, Гомо, Гуинплена и Деи, пару лошадей и двух женщин, исполнявших, как мы уже сказали, роли богинь и обязанности служанок. В те времена для балагана фигляров было полезно иметь мифологическую вывеску.</p><p class="p1">– Мы – странствующий храм, – говаривал Урсус.</p><p class="p1">Две цыганки, подобранные философом в пестрой толпе, кочующей по городам и местечкам, были молоды и некрасивы; одна, по воле Урсуса, носила имя Фебы, другая – Венеры, или – поскольку необходимо сообразоваться с английским произношением – Фиби и Винос.</p><p class="p1">Феба стряпала, а Венера убирала храм искусства.</p><p class="p1">Кроме того, в дни представлений они одевали Дею.</p><p class="p1">За исключением тех моментов, когда фигляры, также как и государи, «показываются народу», Дея, подобно Фиби и Винос, носила флорентийскую юбку из цветной набойки и короткую кофту без рукавов. Урсус и Гуинплен носили мужские безрукавки, кожаные штаны и высокие сапоги, какие носят матросы на военных судах. Гуинплен, кроме того, надевал для работы и во время гимнастических упражнений еще и кожаный нагрудник. Он ходил за лошадьми. Что касается Урсуса и Гомо, то они заботились друг о друге сами.</p><p class="p1">Дея настолько привыкла к «Зеленому ящику», что расхаживала в нем с уверенностью зрячего человека.</p><p class="p1">Если бы чей-либо глаз, заинтересовавшись внутренним расположением и устройством этого странствующего дома, заглянул в него, он заметил бы в одном из его углов прикрепленную к стене прежнюю повозку Урсуса, вышедшую в отставку, доживавшую свой век на покое и избавленную от необходимости трястись по дорогам, так же как Гомо, который был теперь избавлен от необходимости тащить возок.</p><p class="p1">Эта развалина, загнанная в самый конец фургона, направо от двери, служила Урсусу и Гуинплену спальней и актерской уборной. В ней помещались теперь два ложа и наискосок от них – кухня.</p><p class="p1">Даже на корабле трудно было бы встретить более обдуманное и целесообразное расположение предметов, чем внутри «Зеленого ящика». Все в нем было на своем месте, точно предусмотрено, заранее рассчитано.</p><p class="p1">Фургон, разгороженный тонкими переборками, состоял из трех отделений, которые сообщались между собою завешенными материей проемами без дверей. Заднее отделение занимали мужчины, переднее – женщины, среднее было театром. Музыкальные инструменты и все приспособления, необходимые для спектаклей, хранились в кухне. На помосте, под самой крышей, помещались декорации; приподняв трап, устроенный в этом помосте, можно было увидеть лампы, предназначенные для «магических и световых эффектов».</p><p class="p1">Этими «магическими эффектами» вдохновенно распоряжался Урсус. Он же сочинял пьесы.</p><p class="p1">Он обладал самыми разнородными талантами; он показывал удивительные фокусы. Помимо того, что он подражал всевозможным голосам, проделывал самые неожиданные штуки, посредством игры света и тени вызывал внезапное появление на стене огненных цифр и слов – любых, по желанию публики, и исчезновение в полумраке разных фигур, – он удивлял зрителей множеством других диковинных вещей, между тем как сам, совершенно равнодушный к изъявлениям восторга, казалось был погружен в глубокое раздумье.</p><p class="p1">Однажды Гуинплен сказал ему:</p><p class="p1">– Отец, вы похожи на волшебника!</p><p class="p1">Урсус ответил:</p><p class="p1">– А что же, может быть я действительно волшебник.</p><p class="p1">«Зеленый ящик», сооруженный по искусным чертежам Урсуса, имел остроумное приспособление: вся средняя часть левой стенки фургона, между передними и задними колесами, была укреплена на шарнирах, и с помощью цепей и блоков ее по желанию можно было опустить, как подъемный мост. А когда ее откидывали, три подпорки на петлях, приняв вертикальное положение, опускались под прямым углом к земле, как ножки стола, и поддерживали стенку фургона, превращенную в театральные подмостки. Перед зрителями возникала сцена, для которой откинутая стенка служила авансценой. Отверстие это, по словам пуританских проповедников, проходивших мимо и в ужасе отворачивавшихся от него, напоминало собой точь-в-точь вход в ад. Вероятно, именно за такое неблагочестивое изобретение Солон присудил Фесписа к палочным ударам.</p><p class="p1">Впрочем, изобретение Фесписа оказалось долговечнее, чем принято думать. Театр-фургон существует и поныне. Именно на таких кочующих подмостках в шестнадцатом и в семнадцатом столетиях в Англии ставили баллады и балеты Амнера и Пилкингтона, во Франции – пасторали Жильбера Колена, во Фландрии на ярмарках – двойные хоры Климента, прозванного лже-папой, в Германии – «Адама и Еву» Тейля, в Италии – венецианские интермедии Анимучча и Кафоссиса, сильвы Джезуальдо, принца Венузского, «Сатиры» Лауры Гвидиччони, «Отчаяние Филлена» и «Смерть Уголино» Винченцо Галилея, отца астронома, причем Винченцо Галилей сам пел свои произведения, аккомпанируя себе на виоле-да-гамба; а также все первые опыты итальянских опер, в которых с 1580 года свободное вдохновение вытесняло мадригальный жанр.</p><p class="p1">Фургон, окрашенный в цвет надежды и перевозивший Урсуса и Гуинплена со всем их достоянием, с Фиби и Винос, трубившими на козлах, как две вестницы славы, входил в состав великой бродячей литературной семьи: Феспис не отверг бы Урсуса, так же как Конгрив не отверг бы Гуинплена.</p><p class="p1">Приехав в город или деревню, Урсус в промежутках между трубными призывами Фиби и Винос давал пояснения к их музыке.</p><p class="p1">– Это – грегорианская симфония! – восклицал он. – Граждане горожане, грегорианские канонические напевы, явившиеся таким крупным шагом вперед, столкнулись в Италии с амброзианским каноном, а в Испании – с мозарабическим и восторжествовали над ними с большим трудом.</p><p class="p1">После этого «Зеленый ящик» останавливался где-нибудь в месте, облюбованном Урсусом; вечером стенка-авансцена опускалась, театр открывался, и представление начиналось.</p><p class="p1">Декорации «Зеленого ящика» изображали пейзаж, написанный Урсусом, не знавшим живописи, вследствие чего, в случае надобности, пейзаж мог сойти и за подземелье.</p><p class="p1">Занавес сшит был из квадратных шелковых лоскутьев ярких цветов.</p><p class="p1">Публика помещалась под открытым небом, располагаясь полукругом перед подмостками, на улице или на площади, под солнцем, под проливным дождем, вследствие чего дождь для тогдашних театров был явлением куда более разорительным, чем для нынешних. Если только была возможность, представления давались во дворах гостиниц, и тогда оказывалось столько ярусов лож, сколько в здании было этажей. В таких случаях театр более походил на закрытое помещение, и публика платила за места дороже.</p><p class="p1">Урсус принимал участие во всем: в сочинении пьесы, в ее исполнении, в оркестре. Винос играла на деревянных цимбалах, мастерски ударяя по клавишам палочками, а Фиби пощипывала струны инструмента, представлявшего собою разновидность гитары. Волк тоже был привлечен к делу. Его окончательно ввели в состав труппы, и при случае он исполнял небольшие роли. Когда Урсус и Гомо появлялись рядом на сцене, Урсус в плотно облегавшей его медвежьей шкуре, а Гомо в своей собственной волчьей, еще лучше пригнанной к нему, зрители нередко затруднялись определить, кто же из этих двух существ настоящий зверь; это льстило Урсусу.</p></span></span></span></span>
