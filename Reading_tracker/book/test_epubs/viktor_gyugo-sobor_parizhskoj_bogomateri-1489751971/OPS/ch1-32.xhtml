<p class="p">IV. 'ANÀГKH</p>
</div><p class="p1">Случилось, что в одно прекрасное утро того же марта месяца – кажется, в субботу двадцать девятого, в день святого Евстафия, – наш юный друг, студент Жан Фролло, заметил, одеваясь, что из кармана его штанов, в котором лежал кошелек, не доносится никакого металлического звука.</p><p class="p1">– Бедный кошелек! – проговорил он, вынимая его. – Не осталось в тебе ни одного су! Жестоко опустошили тебя кости, кружки с пивом да Венера! Ты опустел, сморщился, сплюснулся! Точно грудь ведьмы! Скажите-ка мне, господа Цицерон и Сенека, произведения которых в засохших переплетах валяются на полу, какая мне польза от того, что я лучше всякого начальника Монетного двора или жида с моста Менял знаю, что золотой экю с короной стоит тридцать пять монет, по двадцать пять су и восемь парижских денье каждая, а экю с полумесяцем стоит тридцать шесть монет, по двадцать шесть су и шесть денье, если у меня нет даже несчастного лиара, чтоб рискнуть в double-six? О консул Цицерон, из такой беды не выпутаешься красивыми оборотами, вроде quemadmodum<a href="ch2.xhtml#id188" class="a">[92]</a> или verum enim vero<a href="ch2.xhtml#id187" class="a">[93]</a>.</p><p class="p1">Он грустно стал одеваться. В то время как он завязывал башмаки, ему пришла одна мысль. Сначала он ее отогнал, однако она снова вернулась, и Жан надел жилет наизнанку – явный признак сильной внутренней борьбы. Наконец он изо всей силы швырнул шапку оземь и воскликнул:</p><p class="p1">– Тем хуже! Будь что будет! Пойду к брату. Придется выслушать проповедь, но, по крайней мере, достану денег.</p><p class="p1">Он поспешно надел казакин с меховыми отворотами, поднял шапку и выбежал из дому.</p><p class="p1">Он пошел по улице Арфы к Старому городу. Когда он проходил по улице Гюшетт, запах вкусного мяса, жарившегося на вертеле, защекотал его обонятельный аппарат, и он любовно взглянул на огромную съестную лавку, по поводу которой францисканский монах Калатажирон воскликнул с пафосом: «Veramente, queste rotisserie sono cosa stupenda»<a href="ch2.xhtml#id186" class="a">[94]</a>. Но Жану нечем было заплатить за завтрак, и он с глубоким вздохом вошел под портик Пти-Шатлэ – огромный шестиугольник из массивных башен, охраняющий вход в город.</p><p class="p1">Он даже не остановился на мгновение, чтобы, по обычаю, проходя, бросить камень в статую презренного Перинэ-Леклера, предавшего при Карле VI Париж англичанам. За это преступление его статуя с лицом, избитым камнями и выпачканным грязью, расплачивалась в продолжение трех веков, стоя на перекрестке улиц Арфы и Бюси, словно у вечного позорного столба.</p><p class="p1">Пройдя Новый мост и улицу Нев-Сен-Женевьев, Жан де Молендино очутился перед собором Богоматери. Тут им снова овладела нерешительность, и он несколько минут бродил вокруг статуи Легри, повторяя с тоской:</p><p class="p1">– Проповедь-то неизбежна, экю – сомнительно!</p><p class="p1">Он окликнул церковного сторожа, выходившего из церкви:</p><p class="p1">– Где господин жозасский архидьякон?</p><p class="p1">– Должно быть, в башенной келье, – ответил сторож, – и не советую вам беспокоить его там, разве только если вы посланы кем-нибудь вроде Папы или короля.</p><p class="p1">Жан захлопал в ладоши:</p><p class="p1">– Ах, черт возьми! Вот прекрасный случай посмотреть знаменитый приют всякого колдовства!</p><p class="p1">Он решительно двинулся к темному входу и стал подниматься по винтовой лестнице в верхний этаж башни.</p><p class="p1">«Посмотрим, – думал он дорогой. – Клянусь Пресвятой Девой, интересна, должно быть, эта келья, которую мой преподобный братец так тщательно скрывает! Говорят, он там зажигает огонь в горне и раскаляет на сильном пламени философский камень. Ну, мне этот философский камень так же нужен, как простой булыжник, и я бы больше обрадовался, если б увидел на его очаге простую яичницу с салом, чем самый большой философский камень в мире!»</p><p class="p1">Достигнув галереи с колоннами, он перевел дух, призывая по поводу бесконечной лестницы тысячу чертей, а затем снова начал подниматься, пройдя через узкую северную дверцу, теперь закрытую для публики. Миновав помещение для колоколов, он очутился на маленькой площадке, устроенной в боковом углублении, и на ней, под сводом, увидел низенькую стрельчатую дверь. Свет, падавший из проема, проделанного в круглой стене, вдоль которой поднималась лестница, позволил ему рассмотреть огромный замок и тяжелую железную обшивку. Кто поинтересовался бы теперь взглянуть на эту дверь, тот узнал бы ее по надписи белыми буквами на черной стене: «Обожаю Корали. 1829. Подписано Южен». <em>Подписано</em> – имеется в тексте.</p><p class="p1">– Уф, – вздохнул студент, – должно быть, здесь.</p><p class="p1">Ключ торчал в замке; дверь была близко. Жан толкнул ее тихонько и просунул голову в образовавшуюся щель.</p><p class="p1">Читателю, вероятно, случалось видеть чудесные произведения Рембрандта, этого Шекспира живописи. Между его гравюрами есть один офорт, изображающий, как предполагают, доктора Фауста. На эту картину нельзя смотреть без восторга. Она представляет темную келью; посредине стол со странными предметами: мертвыми головами, шарами, ретортами, циркулями, пергаментами, исписанными иероглифами. Доктор сидит за этим столом; он одет в тяжелую епанчу и надвинутую до бровей меховую шапку. Видна только верхняя половина его корпуса. Он привстал со своего огромного кресла, опираясь сжатыми кулаками на стол, и с любопытством и ужасом рассматривает большой светлый круг, составленный из магических букв и сверкающий на задней стене, как солнечный спектр в темной комнате. Кажется, будто его каббалистическое солнце дрожит и наполняет мрачную келью своим таинственным сиянием. Страшно и прекрасно!</p><p class="p1">Нечто похожее на келью Фауста представилось глазам Жана, когда он решился просунуть голову в полуотворенную дверь. Это была тоже темная, едва освещенная келья. В ней стояли большое кресло и большой стол с циркулями, ретортами, скелетами животных, подвешенными к потолку. На каменном полу стоял подвижной глобус, а вперемешку с банками, где дрожали золотые листья, лежали лошадиные и человеческие черепа на пергаментных листах, испещренных фигурами и буквами. Огромные рукописи были навалены одна на другую с раскрытыми страницами, невзирая на ломкость пергамента в сгибах. Словом, тут был собран весь сор науки. И весь этот хаос покрывали пыль и паутина. Недоставало только круга из светящихся букв и доктора, созерцающего в экстазе сверкающее видение, как орел созерцает солнце.</p><p class="p1">Однако келья была обитаема. В кресле, склонившись над столом, сидел человек. Жан, к которому сидящий был обращен спиной, мог видеть только плечи и заднюю часть черепа. Но он без труда узнал эту лысую голову, с тонзурой, выбритой самой природой, словно желавшей наружным знаком указать на духовное призвание архидьякона.</p><p class="p1">Итак, Жан узнал брата. Но дверь отворилась так тихо, что Клод не слыхал ничего. Любопытный студент воспользовался этим, чтобы оглядеть на свободе келью. Налево от кресла, под круглым окном, находился широкий очаг, которого Жан сначала не заметил. Луч света, проникавший через это окно, проходил через круглую паутину, изящная розетка которой была вплетена в стрелку окна; в середине ее архитектор-паук сидел неподвижно, как сердцевина этого кружевного колеса. На очаге стояли в беспорядке всевозможные сосуды, глиняные пузырьки, стеклянные рожки, угольные колбы с длинными горлышками. Жан со вздохом заметил, что сковородки не было видно.</p><p class="p1">«Нечего сказать… кухня!» – подумал он.</p><p class="p1">Впрочем, в очаге не было огня, и казалось даже, что его уже давно не зажигали. Стеклянная маска, замеченная Жаном среди алхимических приборов и служившая, вероятно, для предохранения лица архидьякона во время выработки какого-нибудь опасного вещества, лежала в углу, покрытая пылью и, видимо, позабытая. Рядом лежали не менее запыленные мехи с надписью из медных букв на верхней крышке: «Spira, spera»<a href="ch2.xhtml#id185" class="a">[95]</a>.</p><p class="p1">На стенах, по обычаю алхимиков, также красовались многочисленные изречения, одни – написанные чернилами, другие – вырезанные металлической иглой. Готические, еврейские, греческие и римские буквы перемешивались, надписи переплетались, более свежие сглаживали более старинные, – все перепутывалось, как ветви кустов, как пики в рукопашной схватке. Это действительно было смешение всяких философий, всяких человеческих знаний и мечтаний. Тут и там что-нибудь выступало особенно ярко, как выступает знамя среди леса острых пик. Чаще всего это было краткое греческое или латинское изречение, которое так хорошо умели формулировать в Средние века: Unde? inde? – Homo homini monstrum. – Astra, castra; nomen, numen. – Μέγα βίσλίον, μέγα ϰαϰον. – Sapere aude. – Flet ubi vult<a href="ch2.xhtml#id184" class="a">[96]</a>.</p><p class="p1">Иногда попадалось слово, лишенное видимого смысла: Αναγχοφα’ για<a href="ch2.xhtml#id183" class="a">[97]</a> – может быть, горький намек на монастырскую жизнь. Иногда – какое-нибудь простое дисциплинарное правило духовной иерархии, изложенное в правильном гекзаметре: Coelestem dominum, terrestrem dicito domnum<a href="ch2.xhtml#id182" class="a">[98]</a>. Попадались и еврейские изречения, но тут Жан, и в греческом-то не особенно сильный, не понимал ровно ничего. Поверх всего были разбросаны звезды, человеческие фигуры и пересекающиеся треугольники, и все это делало испещренную стену кельи похожей на лист бумаги, по которому обезьяна водила пером, обмакнутым в чернила.</p><p class="p1">Общий вид кельи производил впечатление заброшенности и разорения, и плохое состояние всех приборов наводило на мысль, что хозяин ее уже давно отвлечен от своих занятий другими мыслями.</p><p class="p1">Этот хозяин, склонившийся над обширной рукописью, украшенной странными рисунками, казалось, мучился какою-то мыслью, постоянно врывавшейся в его размышления. По крайней мере, так подумал Жан, услыхав, как его брат, точно грезя наяву, восклицал:</p><p class="p1">– Да, Ману говорит это, и Зороастр учил тому же – солнце рождается от огня, луна – от солнца. Огонь – душа всего великого. Его первичные атомы изливаются непрестанно на мир и разливаются по нему бесконечными потоками. В тех точках, где эти течения пересекаются в небе, они порождают свет. В местах пересечения в земле – золото. Свет и золото одно и то же – огонь в конкретной форме. Разница между видимыми и осязаемыми, между жидкостью и твердым веществом, состоящими из той же субстанции, та же, что между паром и льдом. Больше ничего… Это не бредни, таков общий закон природы… Но как ввести в науку этот общий закон? Как? Этот свет, заливающий мою руку, – золото! Это те же атомы, размещенные по известным законам, и стоит лишь сгустить их соответственно иному закону! Но как это сделать?.. Нашлись люди, вздумавшие зарыть в землю солнечный луч. Авероэс – да, Авероэс – закопал один такой луч под первой колонной с левой стороны в святилище Корана – большой Кордовской мечети. Но открыть склеп, чтобы посмотреть, удалась ли операция, можно только через восемь тысяч лет.</p><p class="p1">– Долго же пришлось бы, черт возьми, ждать, пока получишь экю, – проговорил про себя Жан.</p><p class="p1">– Другие думали, что лучше брать луч Сириуса, – продолжал задумчиво рассуждать архидьякон. – Но весьма трудно получить этот луч в чистом виде из-за того, что лучи других звезд примешиваются к нему на пути. Фламель полагал, что проще действовать посредством земного огня… Фламель! Какое имя, как бы предопределенное самой судьбой: Flamma!.. Да, огонь. Вот все… Алмаз в угле, золото в огне… Но как его извлечь оттуда?.. Мажистри утверждает, что есть некоторые женские имена, имеющие такую обаятельную и таинственную силу, что достаточно произносить их во время добывания!.. Посмотрим, что говорит об этом Ману: «Где женщина в почтении, там богам приходится радоваться. Где она в презрении – бесполезно молиться Богу… Уста женщины всегда чисты. Это проточная вода, это солнечный луч… Имя женщины должно быть приятно, легко и говорить воображению; оно должно оканчиваться длинными гласными и походить на благословение…» Да, мудрец прав; в самом деле: Мария, София, Эсмер… Проклятие, вечно эта мысль!</p><p class="p1">Архидьякон с сердцем захлопнул книгу.</p><p class="p1">Он провел рукой по лбу, как бы отгоняя навязчивую мысль. Затем взял со стола гвоздь и молоточек, ручка которого была покрыта странными каббалистическими знаками.</p><p class="p1">– С некоторых пор все мои опыты оканчиваются неудачно. Одна неотвязная мысль засела у меня в мозгу и жжет его, как раскаленное железо. Я даже не мог отыскать секрета Кассидора, лампа которого горела без фитиля и без масла. Между тем вещь нехитрая!</p><p class="p1">– Еще бы! – пробормотал про себя Жан.</p><p class="p1">– Стало быть, достаточно какой-то одной несчастной мысли, чтобы превратить человека в ничтожного безумца! О, как бы стала смеяться надо мной Клавдия Пернель, которой ни на минуту не удалось отвлечь Николая Фламеля от работы над великим делом! Вот я держу в руках магический молоток Захиелэ. При каждом ударе, который делал в своей келье знаменитый равви по гвоздю, тот из его врагов, которого он осудил на смерть, – будь он за тысячу лье – уходил на локоть в землю, пожиравшую его. Сам французский король за то, что однажды необдуманно постучал в дверь чародея, погрузился до колен в мостовую Парижа… Это случилось три века тому назад. Вот теперь молоток и гвоздь у меня в руках, и эти орудия оказываются не опаснее молота в руках кузнеца… А между тем стоит только найти магическое слово, которое произносил Захиелэ, ударяя по гвоздю…</p><p class="p1">«Пустяки!» – подумал Жан.</p><p class="p1">– Дай-ка попробую, – продолжал архидьякон. – В случае удачи я увижу, как из головки гвоздя выскочит голубая искра… Эмен-хэтан! Эмен-хэтан!.. Не то… Сижеани! Сижеани!.. Пусть этот гвоздь разверзнет могилу для человека, носящего имя Феб! Проклятие! Постоянно, постоянно одна и та же мысль!</p><p class="p1">Он гневно отбросил молоток и затем так глубоко погрузился в кресло, что совершенно скрылся от Жана за огромной его спинкой. В продолжение нескольких минут студент видел только кулак, конвульсивно сжатый на книге.</p><p class="p1">Вдруг Клод встал, взял циркуль и молча вырезал на стене прописными буквами греческое слово:</p><div class="cite">
<p class="p1">’ANÀГKH</p>
</div><p class="p1">«Брат сошел с ума, – подумал Жан, – проще было бы написать: Fatum – рок. Не все обязаны знать греческий язык».</p><p class="p1">Архидьякон снова сел в кресло и положил голову на обе руки, как делает больной, когда голова у него тяжела и горит.</p><p class="p1">Студент с изумлением наблюдал за братом. Он, у которого душа всегда была нараспашку, признававший в жизни один только закон – закон природы, изливавший свои страсти по их руслам, исчерпывая все сильные впечатления и наслаждения до дна, он не ведал, с какой яростью море человеческой страсти волнуется и кипит, когда ему некуда излиться, как оно переполняется, вздымается, рвется из берегов, как оно подмывает человеческое сердце, разражается внутренними рыданиями и глухими судорогами до тех пор, пока не прорвет плотины и не вырывается на волю. Ледяная, суровая наружность Клода Фролло, холодная внешность непреклонной добродетели, всегда вводила в заблуждение Жана. Веселый студент никогда не размышлял о том, какая масса клокочущей яростной лавы наполняет недра покрытой снегом Этны.</p><p class="p1">Не знаем, отдал ли он себе внезапно отчет во всем этом, но при всем своем легкомыслии он понял, что видел то, чего ему не следовало видеть, что он увидел душу старшего брата в одну из самых сокровенных минут и что Клод не должен этого знать. Видя, что архидьякон снова погрузился в полную неподвижность, он тихонько отступил и, стуча ногами, походил за дверью, как человек, который только что пришел и желает дать знать о своем приходе.</p><p class="p1">– Войдите! – крикнул архидьякон из кельи. – Я вас ждал и нарочно оставил ключ в двери. Войдите, мэтр Жак.</p><p class="p1">Студент смело переступил через порог. Архидьякон, которому здесь подобное посещение было очень неудобно, вздрогнул:</p><p class="p1">– Как, Жан, это ты?</p><p class="p1">– Все то же Ж, – отвечал студент с румяным, нахальным и веселым лицом.</p><p class="p1">Лицо Клода снова приняло свое обычное строгое выражение.</p><p class="p1">– Что тебе нужно?</p><p class="p1">– Я пришел к вам, братец… – начал студент, стараясь состроить приличную, скромную и жалобную мину и вертя с самым невинным видом свою шапку в руках. – Я хочу просить…</p><p class="p1">– Что?</p><p class="p1">– Дать мне наставление, в котором я очень нуждаюсь.</p><p class="p1">Он не осмелился прибавить вслух: «И немного денег, в которых нуждаюсь еще больше!» Последняя часть фразы застряла у него в горле.</p><p class="p1">– Я очень недоволен тобой, – сказал архидьякон холодным тоном.</p><p class="p1">– Весьма сожалею, – вздохнул юноша.</p><p class="p1">Клод на четверть круга повернул свое кресло и пристально взглянул на брата:</p><p class="p1">– Я рад тебя видеть.</p><p class="p1">Вступление было подозрительное. Жан приготовился выдержать удар.</p><p class="p1">– Ко мне каждый день обращаются с жалобами на тебя. Что это за драка, где вы исколотили молодого виконта Альберта де Рамошан?..</p><p class="p1">– Пустяки! – отвечал Жан. – Скверный мальчишка забавлялся тем, что забрызгивал студентов, скача на лошади по грязи.</p><p class="p1">– А кто это Майе Фаржель, которому ты изодрал платье? «Tunicam dechiraverunt» – говорится в жалобе.</p><p class="p1">– Э, какая беда! Просто сбросил шапку с какого-то Монтегю…</p><p class="p1">– В жалобе сказано «tunicam», а не «cappettam». Ты понимаешь по-латыни?</p><p class="p1">Жан не отвечал.</p><p class="p1">– Да, вот как теперь учатся, – продолжал священник, покачивая головой. – Латынь еле-еле понимают, о существовании сирийского языка не подозревают, изучение греческого в таком положении, что даже самым ученым людям не ставится в вину, если они пропускают греческое слово, не читая его, да еще говорят: Graecum est, non legitur<a href="ch2.xhtml#id181" class="a">[99]</a>.</p><p class="p1">Студент поднял с решительным видом глаза.</p><p class="p1">– Желаете вы, братец, чтоб я объяснил вам на ясном французском языке, что значит это греческое слово, написанное на стене?</p><p class="p1">– Какое слово?</p><p class="p1">– ’ANÀГKH.</p><p class="p1">Легкая краска вспыхнула на впалых щеках архидьякона, подобно клубу дыма, возвещающему снаружи о переворотах, совершающихся в тайниках вулкана.</p><p class="p1">Студент почти не обратил на это внимания.</p><p class="p1">– Хорошо, – с усилием проговорил архидьякон, – что же значит это слово?</p><p class="p1">– Судьба, рок!</p><p class="p1">Достопочтенный Клод снова побледнел, а студент продолжал, ничего не подозревая:</p><p class="p1">– А слово, начерченное внизу той же рукой, – ’Αναγϰεία – значит «нечистота». Видите-с, и мы немножко маракуем по-гречески.</p><p class="p1">Архидьякон молчал. Этот урок греческого языка заставил его задуматься.</p><p class="p1">Жан, обладавший проницательностью балованного ребенка, счел минуту благоприятной для того, чтобы выступить со своей просьбой. Он начал самым нежным тоном:</p><p class="p1">– Братец, неужели вы возненавидели меня до такой степени, что сердитесь за встряску, которую я в честной схватке задал каким-то там мальчишкам и молокососам – quibusdam marmosetis? Видите, братец Клод, и с латынью мы знакомы.</p><p class="p1">Но слова эти не произвели желаемого действия на строгого старшего брата. Цербер не кинулся на сладкий пирог, и лоб архидьякона оставался таким же нахмуренным.</p><p class="p1">– К чему ты ведешь все это? – спросил архидьякон.</p><p class="p1">– Хорошо, скажу прямо: мне нужны деньги, – смело отвечал Жан.</p><p class="p1">При этом беззастенчивом заявлении лицо архидьякона приняло наставнически отеческое выражение.</p><p class="p1">– А известно ли тебе, господин Жан, что наше поместье Тиршап, со включением поземельной подати и аренды за двадцать один дом, приносит всего тридцать девять ливров одиннадцать су шесть парижских денье. Это в полтора раза больше, чем во времена братьев Паклэ, однако все же очень немного.</p><p class="p1">– Мне нужны деньги, – стоически повторил Жан.</p><p class="p1">– Тебе известно решение консисторского суда, по которому наши двадцать один дом переходят в полный лен епископства, и мы можем выкупить этот дар не иначе, как внеся его преподобию епископу две серебряные золоченые марки, ценностью по шесть парижских ливров каждая. Эти две марки мне еще не удалось скопить. Ты это знаешь.</p><p class="p1">– Я знаю только, что мне нужны деньги, – в третий раз повторил Жан.</p><p class="p1">– На что?</p><p class="p1">При этом вопросе в глазах молодого человека загорелась надежда. Он снова заговорил вкрадчивым, ласковым тоном:</p><p class="p1">– Поверьте, братец Клод, я не стал бы просить у вас денег с дурными намерениями. Не стал бы я сорить вашими унциями по тавернам или гулять по парижским улицам в платье из золотой парчи в сопровождении собственного лакея, cum meo laquasio. Нет, братец, мне деньги нужны на доброе дело.</p><p class="p1">– На какое доброе дело? – спросил Клод с некоторым удивлением.</p><p class="p1">– Двое из моих друзей желали бы купить приданое ребенку одной бедной вдовы. Это доброе дело. Всего требуется три флорина, и мне бы хотелось внести свою долю.</p><p class="p1">– Как зовут твоих друзей?</p><p class="p1">– Пьер Лассомер и Батист Крок-Уазон<a href="ch2.xhtml#id168" class="a">[100]</a>.</p><p class="p1">– Хм! – пробормотал архидьякон. – Вот уж имена, которые так же пристали к доброму делу, как пушка к церковному алтарю.</p><p class="p1">Нет сомнения, что Жан очень плохо подобрал имена своих друзей. Он спохватился слишком поздно.</p><p class="p1">– И, кроме того, что это за приданое, которое стоит три флорина? Да еще для вдовы бедняка. С каких это пор бедные вдовы стали готовить приданое своим ребятам?</p><p class="p1">Жан еще раз попытался проломить лед:</p><p class="p1">– Ну, так вот, мне нужны деньги, чтобы пойти сегодня взглянуть на Изабо ла Тьери в Валь д’Амур.</p><p class="p1">– Презренный нечестивец! – воскликнул священник.</p><p class="p1">– ’Αναγϰεία, – перевел Жан.</p><p class="p1">Это слово, заимствованное студентом, может быть, не без намерения, со стены кельи, произвело на архидьякона странное впечатление. Он закусил губу, и гнев его выразился только краской на лице.</p><p class="p1">– Уходи, – сказал он Жану. – Я жду одного человека.</p><p class="p1">Студент сделал последнюю попытку:</p><p class="p1">– Братец Клод, дайте мне хоть одно парижское су. Мне нечего есть.</p><p class="p1">– В каком положении твои грациановские декреталии? – спросил Клод.</p><p class="p1">– Я потерял тетради.</p><p class="p1">– Кого из латинских классиков ты изучаешь?</p><p class="p1">– У меня украли мой экземпляр Горация.</p><p class="p1">– А как с Аристотелем?</p><p class="p1">– Братец, вы не помните, какой это из отцов церкви сказал, что заблуждения еретиков испокон века ищут убежище в дебрях аристотелевской метафизики? Ну его, Аристотеля! Не хочу я нарушать своих религиозных воззрений его метафизикой!</p><p class="p1">– При последнем выезде короля у одного из дворян, Филиппа де Коммин, на чепраке лошади был вышит девиз, о смысле которого советую тебе поразмыслить: «Qui non laborat non manducet»<a href="ch2.xhtml#id166" class="a">[101]</a>.</p><p class="p1">Студент с минуту помолчал, приложив палец к уху, и стоял, опустив глаза, с раздосадованной миной. Вдруг он обратился к Клоду с быстротой вертихвостки:</p><p class="p1">– Стало быть, вы мне отказываете в одном су, на которое я мог бы купить себе кусок хлеба у булочника?</p><p class="p1">– Qui non laborat non manducet.</p><p class="p1">При этом ответе неумолимого архидьякона Жан закрыл лицо руками, как рыдающая женщина, и воскликнул с выражением отчаяния:</p><p class="p1">– Οτοτοτοτοτι!</p><p class="p1">– Что это значит?! – спросил Клод, изумленный этим дурачеством.</p><p class="p1">– Греческое изречение, анапест из Эсхила, выражающий глубокое горе, – ответил студент, поднимая на Клода свои смелые глаза, которые он натер кулаками, чтобы они казались заплаканными.</p><p class="p1">Но тут он разразился таким неудержимым, заразительным хохотом, что даже архидьякон улыбнулся. Клод сознавал, что он сам во всем виноват, – зачем он так избаловал этого мальчика?</p><p class="p1">– Ах, добрый братец, – продолжал Жан, ободренный этой улыбкой, – посмотрите на мои разорванные башмаки. Можно ли вообразить себе что-нибудь более трагическое, чем башмаки, из которых выглядывают пальцы?</p><p class="p1">К архидьякону быстро вернулась его прежняя суровость.</p><p class="p1">– Я пришлю тебе новые башмаки, но денег не дам.</p><p class="p1">– Только одно экю, братец, – продолжал умолять Жан. – Я выучу Грациана наизусть, стану набожным, сделаюсь настоящим Пифагором и по учености и по добродетели! Но, ради бога, дайте хоть одно экю! Неужели вы хотите, чтоб я попал в пасть голода, которая уже разверста передо мной? Она чернее, зловоннее, глубже Тартара или монашеского носа.</p><p class="p1">Клод покачал головой:</p><p class="p1">– Qui non laborat…</p><p class="p1">Жан не дал ему кончить.</p><p class="p1">– Хорошо же! – крикнул он. – К черту! Да здравствует веселье! Стану шляться по тавернам, драться, бить посуду, гулять с публичными женщинами! – Он швырнул шапочкой в стену и щелкнул пальцами, как кастаньетами.</p><p class="p1">Архидьякон мрачно взглянул на него:</p><p class="p1">– Жан, у тебя нет души…</p><p class="p1">– В таком случае у меня, по определению Эпикура, нет чего-то, состоящего из чего-то, чему нет имени.</p><p class="p1">– Жан, надо серьезно подумать об исправлении.</p><p class="p1">– Ну, я вижу, здесь все пусто – и рассуждения, и бутылки! – воскликнул студент, переводя взгляд то на брата, то на реторты на очаге.</p><p class="p1">– Жан, ты катишься по наклонной плоскости. Знаешь ли ты, куда ты идешь?</p><p class="p1">– В кабак, – ответил Жан.</p><p class="p1">– Из кабака путь лежит к позорному столбу.</p><p class="p1">– Это такой же фонарный столб, как и всякий другой. Может быть, Диоген именно с помощью его нашел бы человека, которого искал.</p><p class="p1">– От позорного столба недалеко до виселицы.</p><p class="p1">– Виселица – весы, у которых по одну сторону человек, а вся земля по другую. Хорошо быть человеком.</p><p class="p1">– С виселицы прямо попадешь в ад.</p><p class="p1">– Там яркий огонь.</p><p class="p1">– Жан, Жан, тебя ждет плохой конец.</p><p class="p1">– По крайней мере, начало хорошо.</p><p class="p1">В эту минуту на лестнице раздались шаги.</p><p class="p1">– Молчи! – сказал архидьякон, поднося палец к губам. – Это мэтр Жак. Слушай, Жан, – шепотом продолжал он. – Боже тебя сохрани проболтаться когда-нибудь о том, что ты видел и слышал здесь. Спрячься сюда, под очаг, и старайся не дышать.</p><p class="p1">Студент съежился под очагом. Здесь ему пришла в голову блестящая мысль:</p><p class="p1">– Кстати, братец Клод, флорин за то, что я буду сидеть тихо.</p><p class="p1">– Молчи! Обещаю!</p><p class="p1">– Дайте.</p><p class="p1">– Бери! – с сердцем проговорил архидьякон, бросая брату свой кошелек. Жан спрятался под очагом, и дверь отворилась.</p></span></span></span>
