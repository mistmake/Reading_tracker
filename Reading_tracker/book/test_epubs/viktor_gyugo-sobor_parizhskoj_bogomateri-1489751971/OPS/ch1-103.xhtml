<p class="p">5. Государственные интересы проявляются в великом и в малом</p>
</div><p class="p1">Увы, напрасно Урсус хвалился тем, что никогда не плачет. Теперь слезы подступили к самому его горлу. Они накоплялись в груди по капле в продолжение всей его горестной жизни. Переполненная до краев чаша не может пролиться в одно мгновение. Урсус рыдал долго.</p><p class="p1">Первая слеза пролагает дорогу другим. Он оплакивал Гуинплена, Дею, самого себя, Гомо. Плакал как дитя. Плакал как старик. Плакал обо всем, над чем смеялся. Он задним числом выплатил свой долг прошлому. Право человека на слезы не знает давности.</p><p class="p1">На самом деле покойник, опущенный в землю, был Хардкванон, но Урсус не мог этого знать.</p><p class="p1">Прошло несколько часов.</p><p class="p1">Занялся день; бледная пелена утреннего света, кое-где еще боровшегося с ночными тенями, легла на ярмарочную площадь. В лучах зари выступил белый фасад Тедкастерской гостиницы.</p><p class="p1">Дядюшка Никлс так и не ложился спать. Нередко одно и то же событие вызывает бессонницу у нескольких человек.</p><p class="p1">Всякая катастрофа вызывает много последствий. Бросьте камень в воду и попробуйте сосчитать круги.</p><p class="p1">Дядюшка Никлс сознавал, что арест Гуинплена может затронуть и его. Очень неприятно, когда у вас в доме происходят такие события. Он был встревожен этим; предвидя впереди еще всякие осложнения, Никлс погрузился в мрачное раздумье. Он сожалел, что пустил к себе «этих людей». Если бы он знал раньше! Втянут они его в конце концов в какую-нибудь беду. Как развязаться с ними теперь? Ведь с Урсусом у него заключен контракт. Какое было бы счастье избавиться от таких постояльцев! К чему бы только придраться, чтобы выгнать их?</p><p class="p1">Вдруг в дверь харчевни раздался сильный стук, который возвещает в Англии о прибытии важного лица. Гамма стуков соответствует иерархической лестнице.</p><p class="p1">Это был стук не вельможного лорда, а судейского чиновника.</p><p class="p1">Дрожа от страха, трактирщик приоткрыл форточку.</p><p class="p1">И действительно, стучался судейский чиновник. При свете занимавшегося дня дядюшка Никлс увидел у двери отряд полицейских, возглавляемый двумя людьми, из которых один был судебный пристав.</p><p class="p1">Судебного пристава дядюшка Никлс видел утром и потому сразу узнал его.</p><p class="p1">Другой человек был ему неизвестен.</p><p class="p1">Это был тучный джентльмен с будто восковым лицом, в придворном парике и дорожном плаще.</p><p class="p1">Судебного пристава дядюшка Никлс очень боялся. Если бы дядюшка Никлс принадлежал к королевскому двору, он еще больше испугался бы второго посетителя, ибо то был Баркильфедро.</p><p class="p1">Один из полицейских снова громко постучался в дверь.</p><p class="p1">Трактирщик, у которого на лбу выступил холодный пот, поспешил открыть.</p><p class="p1">Судебный пристав тоном человека, призванного наблюдать за порядком и хорошо знакомого с бродягами, возвысил голос и строго спросил:</p><p class="p1">– Где Урсус, хозяин балагана?</p><p class="p1">Сняв шляпу, Никлс ответил:</p><p class="p1">– Он проживает здесь, ваша честь.</p><p class="p1">– Это я знаю и без тебя, – сказал пристав.</p><p class="p1">– Конечно, ваша честь.</p><p class="p1">– Позови его сюда.</p><p class="p1">– Его нет дома, ваша честь.</p><p class="p1">– Где же он?</p><p class="p1">– Не знаю.</p><p class="p1">– Как это не знаешь?</p><p class="p1">– Он еще не возвращался.</p><p class="p1">– Значит, он очень рано ушел из дому?</p><p class="p1">– Нет, очень поздно.</p><p class="p1">– Ах, эти бродяги! – заметил пристав.</p><p class="p1">– Да вот он, ваша честь, – тихо промолвил дядюшка Никлс.</p><p class="p1">Действительно, в эту минуту из-за угла показался Урсус. Он направлялся к гостинице. Почти всю ночь провел он между тюрьмой, куда в полдень ввели Гуинплена, и кладбищем, где в полночь, как он слышал, засыпали свежую могилу. Его побледневшее от горя лицо казалось еще бледнее в утренних сумерках.</p><p class="p1">Занимающийся день, этот предвестник яркого света, не меняет ночных, неясных очертаний предметов, даже находящихся в движении. Медленно приближавшийся Урсус своим бледным лицом и всей своей фигурой, смутно выступавшей в полумраке, напоминал привидение.</p><p class="p1">Накануне, охваченный отчаянием, он выбежал из гостиницы с непокрытой головой. Он даже не заметил, что забыл надеть шляпу. Его жидкие седые волосы развевались по ветру. Широко раскрытые глаза, казалось, ничего не видели. Мы часто как будто бодрствуем во сне и спим наяву. Урсус был похож на сумасшедшего.</p><p class="p1">– Мистер Урсус, – закричал трактирщик, – подите-ка сюда. Эти джентльмены желают поговорить с вами.</p><p class="p1">Дядюшка Никлс, всецело занятый мыслью, как бы уладить инцидент, употребил множественное число, хотя в то же время опасался, не заденет ли оно самолюбие начальника тем, что поставит его на одну доску с подчиненными.</p><p class="p1">Урсус вздрогнул, как человек, внезапно сброшенный с постели, на которой он спал глубоким сном.</p><p class="p1">– Что такое? – спросил он.</p><p class="p1">Он увидел полицейских с судебным приставом во главе.</p><p class="p1">Новое тяжелое потрясение.</p><p class="p1">Совсем недавно жезлоносец, теперь – судебный пристав. Один как бы перебрасывал его другому. Он был в положении судна, оказавшегося меж двух грозных утесов, о которых говорится в древних преданиях.</p><p class="p1">Судебный пристав знаком приказал ему войти в харчевню.</p><p class="p1">Урсус повиновался.</p><p class="p1">Говикем, который только что проснулся и подметал в это время зал, остановился, отставил в сторону метлу и, укрывшись за столами, затаил дыхание. Запустив руку в волосы, он почесывал затылок – признак напряженного внимания.</p><p class="p1">Судебный пристав сел на скамью перед столом; Баркильфедро сел на стул; Урсус и дядюшка Никлс стояли перед ними. Полицейские столпились на улице, у закрытых ворот.</p><p class="p1">Судебный пристав устремил на Урсуса строгий взор блюстителя закона и спросил:</p><p class="p1">– Вы держите у себя волка?</p><p class="p1">Урсус ответил:</p><p class="p1">– Не совсем так.</p><p class="p1">– Вы держите у себя волка, – повторил судебный пристав, резко напирая на слово «волк».</p><p class="p1">– Дело в том… – начал было Урсус и замолчал.</p><p class="p1">– Уголовно наказуемый проступок, – сказал пристав.</p><p class="p1">Урсус попробовал защищаться:</p><p class="p1">– Это домашнее животное.</p><p class="p1">Пристав положил руку на стол, растопырив все пять пальцев, – жест, прекрасно выражающий всю силу его власти.</p><p class="p1">– Фигляр, завтра в этот час вы с вашим волком будете за пределами Англии. В противном случае волка заберут, отведут в присутствие и убьют.</p><p class="p1">Урсус подумал: «Одно убийство за другим». Однако не произнес ни слова и только задрожал всем телом.</p><p class="p1">– Вы слышите? – продолжал пристав.</p><p class="p1">Урсус утвердительно кивнул головой.</p><p class="p1">Пристав повторил:</p><p class="p1">– И убьют.</p><p class="p1">Наступило молчание.</p><p class="p1">– Удавят или утопят.</p><p class="p1">Судебный пристав посмотрел на Урсуса:</p><p class="p1">– А вас – в тюрьму.</p><p class="p1">Урсус пробормотал:</p><p class="p1">– Господин судья…</p><p class="p1">– Вы должны уехать прежде, чем наступит утро завтрашнего дня. Иначе приказ будет выполнен.</p><p class="p1">– Господин судья…</p><p class="p1">– Что?</p><p class="p1">– Нам обоим нужно уехать из Англии?</p><p class="p1">– Да.</p><p class="p1">– Сегодня?</p><p class="p1">– Сегодня же.</p><p class="p1">– Но как это сделать?</p><p class="p1">Дядюшка Никлс был счастлив. Этот судебный пристав, которого он так боялся, выручил его из беды. Полиция пришла ему, Никлсу, на помощь. Она освободила его от «этих людей». Она сама взяла на себя заботу избавить его от них. Урсуса, которого он хотел выгнать, высылала полиция. Неодолимая сила. Попробуй с ней поспорить! Он был в восторге.</p><p class="p1">Он вмешался в разговор:</p><p class="p1">– Ваша честь, этот человек…</p><p class="p1">Он указал пальцем на Урсуса.</p><p class="p1">– Этот человек спрашивает, как ему уехать нынче из Англии. Нет ничего проще. На Темзе по обеим сторонам Лондонского моста и днем и ночью можно найти суда, отплывающие в различные страны: в Данию, в Голландию, в Испанию, – куда угодно, кроме Франции, с которой мы ведем войну. Многие из них снимутся с якоря сегодня около часу ночи, когда начнется отлив. Между прочими и роттердамская шхуна «Вограат».</p><p class="p1">Судебный пристав повел плечом в сторону Урсуса.</p><p class="p1">– Хорошо. Уезжайте на любом судне. Хоть на «Вограате».</p><p class="p1">– Господин судья… – начал Урсус.</p><p class="p1">– Ну?</p><p class="p1">– Господин судья, это было бы возможно, если бы у меня, как и прежде, был только возок. Его можно было бы погрузить на корабль. Но…</p><p class="p1">– Но что же?</p><p class="p1">– Но сейчас у меня «Зеленый ящик», огромный фургон с двумя лошадьми, который не поместится даже на большом судне.</p><p class="p1">– А мне-то что за дело? – возразил пристав. – В таком случае волка убьют.</p><p class="p1">Урсус затрепетал, почувствовав, что сердце у него словно сжимает чья-то ледяная рука. «Изверги! – думал он. – Убийство – их излюбленное занятие».</p><p class="p1">Трактирщик с улыбкой обратился к Урсусу:</p><p class="p1">– Мистер Урсус, ведь вы же можете продать свой «Зеленый ящик».</p><p class="p1">Урсус взглянул на него.</p><p class="p1">– Мистер Урсус, вам же сделали предложение.</p><p class="p1">– Какое?</p><p class="p1">– Предложение насчет фургона, насчет лошадей. Насчет обеих цыганок. Насчет…</p><p class="p1">– Кто?</p><p class="p1">– Хозяин соседнего цирка.</p><p class="p1">– Да, верно.</p><p class="p1">Урсус вспомнил.</p><p class="p1">Никлс повернулся к судебному приставу:</p><p class="p1">– Ваша честь, сделка может состояться сегодня же. Хозяин соседнего цирка хочет купить фургон и лошадей.</p><p class="p1">– Хозяин цирка поступит разумно, – сказал пристав, – потому что фургон и лошади ему очень скоро понадобятся. Он тоже уедет сегодня. Священники саутворкских приходов подали жалобу на шум и безобразие, которые творятся в Таринзофилде. Шериф принял надлежащие меры. Сегодня вечером на площади не останется ни одного балагана. Конец всем этим безобразиям. Почтенный джентльмен, удостаивающий нас своим присутствием…</p><p class="p1">Судебный пристав сделал паузу, чтобы отвесить поклон Баркильфедро, который ответил ему тем же.</p><p class="p1">– …почтенный джентльмен, удостаивающий нас своим присутствием, прибыл сегодня из Виндзора. Он привез приказы. Ее Величество повелела: «Очистить площадь».</p><p class="p1">Урсус, успевший много передумать за эту ночь, мысленно задавал себе не один вопрос. Ведь в конце концов он видел только гроб. Мог ли он поручиться, что в нем лежало тело Гуинплена? Мало ли узников умирает в тюрьме? На гробе не ставят имя покойника. Вскоре после ареста Гуинплена кого-то хоронили. Это еще ничего не доказывает: Post hoc, non propter hoc<a href="ch2.xhtml#id174" class="a">[256]</a> – и так далее. Урсусом снова овладели сомнения. Надежда загорается и сверкает над нашей скорбью, подобно тому как горит нефть на воде. Ее огонек постоянно всплывает на поверхность людского горя. В конце концов Урсус решил: «Возможно, что хоронили действительно Гуинплена, но это еще не достоверно. Как знать? А вдруг Гуинплен еще жив?»</p><p class="p1">Урсус поклонился приставу:</p><p class="p1">– Достопочтенный судья, я уеду. Мы уедем. Все уедут. На «Вограате». В Роттердам. Я повинуюсь. Я продам «Зеленый ящик», лошадей, трубы, цыганок. Но у меня есть товарищ, которого я не могу оставить. Гуинплен…</p><p class="p1">– Гуинплен умер, – произнес чей-то голос.</p><p class="p1">Урсусу показалось, будто он внезапно ощутил холодное прикосновение какого-то пресмыкающегося.</p><p class="p1">Эти слова произнес Баркильфедро.</p><p class="p1">Угас последний луч надежды. Сомнений больше не было. Гуинплен умер.</p><p class="p1">Незнакомец должен был знать это доподлинно. У него был такой зловещий вид.</p><p class="p1">Урсус поклонился.</p><p class="p1">В сущности, дядюшка Никлс был человеком добрым. Но когда не трусил. Страх делал его жестоким. Нет никого безжалостнее перепуганного труса.</p><p class="p1">Он пробормотал:</p><p class="p1">– Это упрощает дело.</p><p class="p1">И стал за спиною Урсуса потирать руки, радуясь, как все эгоисты, и мысленно говоря: «Я здесь ни при чем» – жест Понтия Пилата, умывающего руки.</p><p class="p1">Урсус горестно поник головой. Смертный приговор, вынесенный Гуинплену, был приведен в исполнение; он же, Урсус, как ему только что об этом объявили, был осужден на изгнание. Ничего другого не оставалось, как повиноваться. Он задумался.</p><p class="p1">Вдруг он почувствовал, что кто-то взял его за локоть. Это был спутник судебного пристава. Урсус вздрогнул.</p><p class="p1">Голос, сказавший раньше: «Гуинплен умер», теперь прошептал ему на ухо:</p><p class="p1">– Вот десять фунтов стерлингов, которые посылает лицо, желающее вам добра.</p><p class="p1">И Баркильфедро положил на стол перед Урсусом маленький кошелек.</p><p class="p1">Читатель помнит, конечно, про шкатулку, унесенную Баркильфедро.</p><p class="p1">Десять гиней – вот и все, что смог уделить Баркильфедро из двух тысяч. По совести говоря, этого было вполне достаточно. Дай он Урсусу больше, он сам оказался бы в убытке. Ведь он потратил немало труда на то, чтобы разыскать лорда, – теперь он приступал к использованию находки, и справедливость требовала, чтобы первая же добыча с открытой им золотой россыпи досталась ему. Пускай иные назовут такой поступок низким, это их дело, но удивляться тут не приходится. Просто Баркильфедро любил деньги, в особенности краденые. В каждом завистнике кроется корыстолюбец. У Баркильфедро были свои недостатки – ведь злодеи не избавлены от мелких пороков. И у тигров бывают вши.</p><p class="p1">Кроме того, здесь сказывалась школа Бекона.</p><p class="p1">Баркильфедро повернулся к судебному приставу и сказал:</p><p class="p1">– Сударь, будьте любезны, кончайте поскорей. Я очень тороплюсь. Мне нужно скакать во весь дух в Виндзор и прибыть туда не позже, чем через два часа. Я должен донести обо всем и получить дальнейшие приказания.</p><p class="p1">Судебный пристав поднялся.</p><p class="p1">Он подошел к двери, которая была заперта только на задвижку, открыл ее, не произнося ни слова, окинул взором полицейских, поманил их к себе указательным пальцем. Весь отряд вступил в зал, соблюдая тишину, которая обычно предвещает наступление чего-то грозного.</p><p class="p1">Дядюшка Никлс, довольный быстрой развязкой, сулившей конец всем осложнениям, был в восторге, что выпутался из беды, но при виде шеренги выстроившихся полицейских испугался, как бы Урсуса не арестовали у него в доме. Один за другим два ареста в его гостинице – сначала Гуинплена, затем Урсуса – это могло повредить его заведению, так как посетители не любят тех кабачков, куда часто заглядывает полиция. Наступил момент, когда надо было почтительно вмешаться и в то же время проявить великодушие. Дядюшка Никлс обратил к приставу улыбающееся лицо, на котором выражение самоуверенности смягчилось подобострастием.</p><p class="p1">– Ваша честь, я позволю себе заметить, что в почтенных господах сержантах нет никакой нужды теперь, когда ясно, что преступный волк будет увезен из Англии, а человек, носящий имя Урсуса, не оказывает сопротивления и собирается в точности исполнить приказание вашей чести. Пусть ваша честь соблаговолит принять во внимание, что достойные всякого уважения действия полиции, столь необходимые для блага королевства, могут причинить ущерб моему заведению, хотя оно ни в чем не повинно. Как только площадь, пользуясь выражением Ее Величества, будет очищена от фигляров «Зеленого ящика», на ней не останется больше преступного элемента, ибо, по-моему, нельзя считать нарушителями законности ни слепую девушку, ни обеих цыганок; поэтому я умоляю вашу честь сократить свое высокое пребывание здесь и отправить назад достойных господ, только что вошедших сюда, так как им больше нечего делать в моем доме; если бы ваша честь позволила мне подтвердить справедливость моих слов смиренным вопросом, я доказал бы бесполезность присутствия этих почтенных господ, спросив вашу честь: поскольку человек, носящий имя Урсуса, подчиняется приговору, то кого же они намереваются арестовать здесь?</p><p class="p1">– Вас, – ответил пристав.</p><p class="p1">С ударом шпаги, пронзающей вас насквозь, спорить не приходится. Пораженный как громом, Никлс упал на первый стоявший близ него предмет, не то на стол, не то на скамью.</p><p class="p1">Судебный пристав возвысил голос так, что его могли услышать на площади:</p><p class="p1">– Мистер Никлс Племптри, содержатель харчевни, нам нужно покончить еще с одним делом. Этот скоморох и волк – бродяги. Они изгоняются из Англии. Но главный виновник – вы. При вашем попустительстве был у вас в доме нарушен закон, и вы, человек, которому разрешили содержать гостиницу, человек, ответственный за все происходящее в ней, вы терпели бесчинства в своем заведении. Мистер Никлс, у вас отныне отбирается патент, вы заплатите штраф и будете посажены в тюрьму.</p><p class="p1">Полицейские окружили трактирщика.</p><p class="p1">Судебный пристав указал на Говикема.</p><p class="p1">– Этот малый арестуется как ваш сообщник.</p><p class="p1">Рука одного из полицейских схватила за шиворот Говикема, который с любопытством взглянул на блюстителя порядка. Он не очень испугался, так как плохо понимал, в чем дело; он насмотрелся на всякие странности и мысленно задавал себе вопрос, не продолжают ли еще разыгрывать перед ним комедию.</p><p class="p1">Судебный пристав нахлобучил на голову шляпу, сложил руки на животе, что является высшим выражением величественности, и прибавил:</p><p class="p1">– Итак, мистер Никлс, вас отведут в тюрьму и посадят за решетку. Вас и этого мальчишку. А ваша Тедкастерская гостиница будет закрыта и заколочена. В назидание другим. Теперь следуйте за нами.</p></span></span></span></span>
