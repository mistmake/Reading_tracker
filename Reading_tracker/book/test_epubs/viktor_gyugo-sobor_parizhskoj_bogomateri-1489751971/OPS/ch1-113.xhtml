<span><span><span><span id="id183"><div class="title6">
<p class="p">7. Жизненные бури страшнее океанских</p>
</div><p class="p1">Двери снова затворились; пристав черного жезла возвратился в зал; лорды-комиссары покинули государственную скамью и заняли отведенные им по должности три первых места на скамье герцогов, после чего лорд-канцлер взял слово:</p><p class="p1">– Милорды! Прения по обсуждавшемуся уже несколько дней биллю об увеличении на сто тысяч фунтов стерлингов ежегодного содержания его королевскому высочеству, принцу супругу Ее Величества, ныне закончены, и нам надлежит приступить к голосованию. Согласно обычаю, подача голосов начнется с младшего на скамье баронов. При поименном опросе каждый лорд встанет и ответит «доволен» или «недоволен», причем ему предоставлено право, если он сочтет это уместным, изложить причины своего согласия или несогласия. Клерк, приступите к опросу.</p><p class="p1">Парламентский клерк встал и раскрыл большой фолиант, лежавший на позолоченном пюпитре, так называемую «книгу пэрства».</p><p class="p1">В ту пору младшим по титулу членом парламента был лорд Джон Гарвей, получивший баронское и пэрское звание в 1703 году, – тот самый Гарвей, от которого впоследствии произошли маркизы Бристол.</p><p class="p1">Клерк провозгласил:</p><p class="p1">– Милорд Джон, барон Гарвей.</p><p class="p1">Старик в белокуром парике поднялся и заявил:</p><p class="p1">– Доволен.</p><p class="p1">И снова сел.</p><p class="p1">Помощник клерка записал его ответ.</p><p class="p1">Клерк продолжал:</p><p class="p1">– Милорд Фрэнсис Сеймур, барон Конуэй Килтелтег.</p><p class="p1">– Доволен, – пробормотал, приподнявшись, изящный молодой человек с лицом пажа, не подозревавший в ту пору, что ему суждено стать дедом маркизов Гартфордов.</p><p class="p1">– Милорд Джон Ливсон, барон Гоуэр, – продолжал клерк.</p><p class="p1">Барон Гоуэр, будущий родоначальник герцогов Саутерлендов, встал и, опускаясь на место, произнес:</p><p class="p1">– Доволен.</p><p class="p1">Клерк продолжал:</p><p class="p1">– Милорд Хинедж Финч, барон Гернсей.</p><p class="p1">Предок графов Эйлсфордов, столь же молодой и изящный, как прародитель маркизов Гертфордов, оправдал свой девиз «Aperto vivere vote»<a href="ch2.xhtml#id150" class="a">[270]</a>, громко объявив:</p><p class="p1">– Доволен.</p><p class="p1">Не успел он опуститься на место, как клерк вызвал пятого барона:</p><p class="p1">– Милорд Джон, барон Гренвилл.</p><p class="p1">– Доволен, – ответил, быстро поднявшись и снова сев на скамью, лорд Гренвилл Потридж, роду которого, за неимением наследников, предстояло угаснуть в 1709 году.</p><p class="p1">Клерк перешел к шестому лорду:</p><p class="p1">– Милорд Чарльз Монтег, барон Галифакс.</p><p class="p1">– Доволен, – ответил лорд Галифакс, носитель титула, под которым угасло имя Севилей и предстояло угаснуть роду Монтегов. Эту фамилию не следует смешивать с фамилиями Монтегю и Монтекьют.</p><p class="p1">И лорд Галифакс прибавил:</p><p class="p1">– Принц Георг получает известную сумму в качестве супруга Ее Величества, другую – как принц Датский, третью – как герцог Кемберлендский, четвертую – как главный адмирал Англии и Ирландии, но не получает ничего по должности главнокомандующего. Это несправедливо. В интересах английского народа необходимо положить конец такому беспорядку.</p><p class="p1">Затем лорд Галифакс произнес похвалу христианской религии, выразил осуждение папизму и подал свой голос за увеличение сумм на содержание принца.</p><p class="p1">Когда он уселся, клерк продолжал:</p><p class="p1">– Милорд Кристоф, барон Барнард.</p><p class="p1">Лорд Барнард, от которого впоследствии произошли герцоги Кливленды, услыхав свое имя, встал и объявил:</p><p class="p1">– Доволен.</p><p class="p1">Он не торопился садиться, так как на нем были прекрасные кружевные брыжи и ими стоило щегольнуть. Впрочем, это был вполне достойный джентльмен и храбрый воин.</p><p class="p1">Пока лорд Барнард опускался на скамью, клерк, до сих пор бегло читавший все знакомые имена, на мгновение запнулся. Он поправил очки и с удвоенным вниманием наклонился над книгой, потом, снова подняв голову, провозгласил:</p><p class="p1">– Милорд Фермен Кленчарли, барон Кленчарли-Генкервилл.</p><p class="p1">Гуинплен поднялся.</p><p class="p1">– Недоволен, – сказал он.</p><p class="p1">Все головы повернулись к нему. Гуинплен стоял во весь рост. Свечи канделябров, горевшие по обеим сторонам трона, ярко освещали его лицо, отчетливо выступившее из мглы полутемного зала, словно маска среди клубов дыма.</p><p class="p1">Гуинплен сделал над собой то особое усилие, которое, как помнит читатель, было иногда в его власти. Огромным напряжением воли, не меньшим, чем то, которое потребовалось бы для укрощения тигра, ему удалось согнать со своего лица роковой смех. Он не смеялся. Это не могло продлиться долго. Лишь короткое время способны мы противиться тому, что является законом природы или нашей судьбой. Бывает, что море, не желая повиноваться закону тяготения, взвивается смерчем, вздымается кверху горой, но оно вскоре возвращается в прежнее состояние. Так было и с Гуинпленом. Сознавая торжественность минуты, он невероятным усилием воли на один лишь миг отразил на своем челе мрачные думы, отогнал свой безмолвный смех, удалил со своего изуродованного лица маску веселости; теперь он был ужасен.</p><p class="p1">– Что это за человек? – раздался всеобщий крик.</p><p class="p1">Всех охватило неописуемое волнение.</p><p class="p1">Густая грива волос, два черных провала под бровями, пристальный взор глубоко запавших глаз, чудовищно уродливые черты, искаженные жуткой игрою светотени, – все это произвело ошеломляющее впечатление. Это превосходило всякие пределы. Сколько бы ни толковали о Гуинплене, лицо его всегда вызывало невольный ужас. Даже те, кто был в какой-то мере подготовлен к его виду, не ожидали такого потрясения. Вообразите себе вершину горы, где обитают боги, ясный вечер, веселое пиршество, собравшее всех небожителей, и вдруг, словно кровавая луна на горизонте, возникает перед ними исклеванное коршуном лицо Прометея. Олимп, взирающий на грозный Кавказ, – какое зрелище! Старые и молодые лорды, онемев от изумления, смотрели на Гуинплена.</p><p class="p1">Уважаемый всей палатой старик, перевидавший на своем веку много людей и событий, Томас, граф Уортон, представленный к герцогскому титулу, в ужасе вскочил со своего места.</p><p class="p1">– Что это значит? – закричал он. – Кто впустил этого человека в палату? Выведите его!</p><p class="p1">И высокомерно обратился к Гуинплену:</p><p class="p1">– Кто вы? Откуда вы явились?</p><p class="p1">Гуинплен ответил:</p><p class="p1">– Из бездны.</p><p class="p1">И, скрестив руки на груди, окинул взглядом палату.</p><p class="p1">– Кто я? Я – нищета. Милорды, вы должны меня выслушать.</p><p class="p1">Дрожь охватила присутствующих. Воцарилась тишина.</p><p class="p1">Гуинплен продолжал.</p><p class="p1">– Милорды, вы – на вершине. Отлично. Нужно предположить, что у Бога есть на то свои причины. В ваших руках власть и богатство, все радости жизни, для вас всегда сияет солнце, вы пользуетесь неограниченным авторитетом, безраздельным счастьем, и вы забыли обо всем прочих людях. Пусть так. Но под вами, а может быть и над вами есть еще кое-кто. Милорды, я пришел, чтобы сообщить вам новость: на свете существует род человеческий.</p><p class="p1">Люди в собраниях похожи на детей; неожиданное происшествие для них – то же, что для ребенка коробка с сюрпризом: немного страшно и любопытно. Порой кажется, что стоит лишь нажать пружинку – и выскочит чертик. Во Франции эта роль выпала на долю Мирабо, который тоже был безобразен.</p><p class="p1">Гуинплен чувствовал в эту минуту, что он внутренне будто вырастает. Те, к кому обращается оратор, служат для него как бы пьедесталом. Он стоит, так сказать, на возвышении, образованном людскими душами. Он чувствует у себя под ногами трепещущие человеческие сердца. Теперь Гуинплен был уже не тем человеком, который прошлой ночью был почти ничтожен. Дурман, вскруживший ему голову при внезапном подъеме, уже рассеялся, уже не застилал ему взора, и в том, что раньше соблазняло его тщеславие, Гуинплен видел теперь свое назначение. То, что сперва унизило его, теперь вознесло его на высоту. В душе его вспыхнул вдруг тот ослепительный свет, который рождается чувством долга.</p><p class="p1">Вокруг Гуинплена со всех сторон неслись крики:</p><p class="p1">– Слушайте! Слушайте!</p><p class="p1">Судорожным, сверхчеловеческим усилием воли ему асе еще удавалось удержать на своем лице зловеще-суровое выражение, сквозь которое готов был прорваться смех, точно дикий конь, стремящийся вырваться на свободу. Гуинплен продолжал:</p><p class="p1">– Я поднялся сюда из низов. Милорды, вы знатны и богаты. Это таит опасность. Вы пользуетесь прикрывающим вас мраком. Но берегитесь, существует великая сила – заря. Заря непобедима. Она наступит. Она уже занимается. Она несет с собой потоки неодолимого света. И кто же помешает этой праще взметнуть солнце на небо? Солнце – это справедливость. Вы захватили в свои руки все преимущества. Страшитесь! Подлинный хозяин скоро постучится в дверь. Кто порождает привилегии? Случай. А что порождают привилегии? Злоупотребления. Однако ни то, ни другое не прочно. Будущее сулит вам беду. Я пришел предупредить вас. Я пришел изобличить ваше счастье. Оно построено на несчастье людей. Вы обладаете всем, но только потому, что обездолены другие. Милорды, я – адвокат, защищающий безнадежное дело. Однако Бог восстановит нарушенную справедливость. Сам я ничто, я только голос. Род человеческий – уста, и я их вопль. Вы услышите меня. Перед вами, пэры Англии, я открываю великий суд народа – этого властелина, подвергаемого пыткам, этого верховного судьи, которого ввергли в положение осужденного. Я изнемогаю под бременем того, что хочу сказать. С чего начать? Не знаю. В безмерном море человеческих страданий я собрал по частям основные доводы моей обличительной речи. Что делать мне с ними теперь? Меня гнетет этот груз, и я сбрасываю его с себя наугад, в беспорядке. Предвидел ли я это? Нет. Вы удивлены? Я тоже. Еще вчера я был фигляром, сегодня я лорд. Непостижимая прихоть. Чья? Неведомого рока. Страшитесь! Милорды, вся лазурь неба принадлежит вам. В беспредельной Вселенной вы видите только ее праздничную сторону; знайте же, что в ней существует и тьма. Среди вас я – лорд Фермен Кленчарли, но настоящее мое имя – имя бедняка: меня зовут Гуинплен. Я – отверженный; меня выкроили из благородной ткани по капризу короля. Вот моя история. Некоторые из вас знали моего отца, я не знал его. Вас связывает с ним то, что он феодал, меня – то, что он изгнанник. Все, что сотворил Господь, – благо. Я был брошен в бездну. Для чего? Чтобы измерить всю глубину ее. Я водолаз, принесший со дна ее жемчужину – истину. Я говорю потому, что знаю. Вы должны выслушать меня, милорды. Я все видел, я все испытал. Страдание – это не просто слово, господа счастливцы. Страдание – это нищета, я знаю ее с детских лет; это холод, я дрожал от него; это голод, я вкусил его; это унижения, я изведал их; это болезни, я перенес их; это позор, я испил чашу его до дна. И я изрыгну ее перед вами, и блевотина всех человеческих бедствий, забрызгав вам ноги, вспыхнет огнем. Я колебался, прежде чем согласился прийти сюда, ибо у меня есть другие обязанности. Сердце мое не с вами. Что произошло во мне – вас не касается; когда человек, которого вы называете приставом черного жезла, явился за мной от имени женщины, которую вы называете королевой, мне на одну минуту пришла мысль отказаться. Но мне показалось, будто незримая рука толкает меня сюда, и я повиновался. Я почувствовал, что мне необходимо появиться среди вас. Почему? Потому, что вчера еще на мне были лохмотья. Бог бросил меня в толпу голодных для того, чтобы я говорил о них сытым. О, сжальтесь! О, поверьте, вы не знаете того гибельного мира, к которому будто бы принадлежите. Вы стоите так высоко, что находитесь вне его пределов. О нем расскажу вам я. У меня достаточный опыт. Я пришел от тех, кого угнетают. Я могу сказать вам, как тяжел этот гнет. О вы, хозяева жизни, знаете ли вы – кто вы такие? Ведаете ли вы, что творите? Нет, не ведаете. Ах, все это страшно… Однажды ночью, бурной ночью, еще совсем ребенком, вступил я в эту глухую тьму, которую вы называете обществом. Я был сиротой, брошенным на произвол судьбы, я был совсем один в этом беспредельном мире. И первое, что я увидел, был закон, в образе виселицы; второе – богатство, в образе женщины, умершей от голода и холода; третье – будущее, в «образе умирающего ребенка; четвертое – добро, истина и справедливость, в лице бродяги, у которого был только один спутник и товарищ – волк.</p><p class="p1">В эту минуту Гуинплен, охваченный душераздирающим волнением, почувствовал, что к горлу у него подступают рыдания.</p><p class="p1">И одновременно с этим – о ужас! – его лицо перекосилось чудовищной гримасой смеха.</p><p class="p1">Этот смех был до того заразителен, что все присутствующие захохотали. Над собранием только что нависала мрачная туча; она могла разразиться чем-то страшным, – она разразилась весельем. Смех, словно припадок радостного безумия, охватил всю палату. Вершители народных судеб всегда рады позабавиться. Насмехаясь, они мстят за свою вынужденную чопорность.</p><p class="p1">Смех королей похож на смех богов, в нем всегда есть нечто жестокое. Лорды стали потешаться. К смеху присоединились издевательства. Вокруг говорившего раздались рукоплескания, послышались оскорбления. Его осыпали градом убийственно ядовитых насмешек.</p><p class="p1">– Браво, Гуинплен! – Браво, «Человек, который смеется»! – Браво, харя из «Зеленого ящика»! – Браво, кабанье рыло с Таринзофилда! – Ты пришел дать нам представление! Прекрасно! Болтай сколько влезет! – Вот кто умеет потешить! – Здорово смеется эта скотина! – Здравствуй, паяц! – Привет лорду-клоуну! Продолжай свою проповедь! – И это пэр Англии?! – А ну-ка еще! – Нет! Нет! – Да! Да!</p><p class="p1">Лорд-канцлер чувствовал себя довольно неловко.</p><p class="p1">Глухой лорд Джеме Бутлер, герцог Ормонд, приставил в виде рупора руку к уху и спросил у Чарльза Боклерка, герцога Сент-Олбенс:</p><p class="p1">– Как он голосовал?</p><p class="p1">Сент-Олбенс ответил:</p><p class="p1">– Он недоволен.</p><p class="p1">– Еще бы, – заметил герцог Ормонд, – можно ли быть довольным с эдаким лицом!</p><p class="p1">Попробуйте вновь подчинить себе толпу, когда она вырвется из-под вашей власти; а ведь любое собрание – та же толпа. Красноречие – удила; когда удила лопнули, собрание встает на дыбы, как необузданный конь, и будет брыкаться до тех пор, пока не выбьет оратора из седла. Аудитория всегда ненавидит оратора. Это – истина, недостаточно известная. Некоторым кажется, что стоит лишь натянуть поводья, и порядок восстановится. Однако это не так. Но всякий оратор бессознательно прибегает к этому средству. Гуинплен тоже прибегнул к нему.</p><p class="p1">Некоторое время он молча смотрел на хохотавших вокруг него людей.</p><p class="p1">– Значит, вы издеваетесь над несчастьем! – крикнул он. – Тише, пэры Англии! Судьи, слушайте же защитительную речь. О, заклинаю вас, сжальтесь! Над кем? Над собой. Кому угрожает опасность? Вам. Разве вы не видите, что перед вами весы, на одной чаше которых ваше могущество, на другой – ваша ответственность? Эти весы держит в руках сам господь. О, не смейтесь! Подумайте. Колебание этих весов не что иное, как трепет вашей совести. Вы ведь не злодеи. Вы такие же люди, как и все, не хуже и не лучше других. Вы мните себя богами, но стоит вам завтра заболеть, и вы увидите, как ваше божественное естество будет дрожать от лихорадки. Все мы стоим один другого. Я обращаюсь к людям честным – надеюсь, что такие здесь есть; я обращаюсь к людям с возвышенным умом – надеюсь, такие здесь найдутся; я обращаюсь к благородным душам – надеюсь, что их здесь немало, Вы – отцы, сыновья и братья, значит, вам должны быть знакомы добрые чувства. Тот из вас, кто видел сегодня утром пробуждение своего ребенка, не может не быть добрым. Сердца у всех одинаковы. Человечество не что иное, как сердце. Угнетатели и угнетаемые отличаются друг от друга только тем, что одни находятся выше, а другие ниже. Вы попираете ногами головы людей, но это не ваша вина. Это вина той Вавилонской башни, какою является наш общественный строй. Башня сооружена неудачно, она кренится набок. Один этаж давит на другой. Выслушайте меня, я сейчас объясню вам все. О, ведь вы так могущественны, будьте же сострадательными; вы так сильны – будьте же добрыми. Если бы вы только знали, что мне пришлось видеть! Какие страдания – там, внизу! Род человеческий заключен в темницу. Сколько в нем осужденных, ни в чем не повинных! Они лишены света, лишены воздуха, они лишены мужества; у них нет даже надежды; но ужаснее всего то, что они все-таки ждут чего-то. Отдайте себе отчет во всех этих бедствиях. Есть существа, чья жизнь – та же смерть. Есть девочки, которые в восемь лет уже занимаются проституцией, а в двадцать обращаются в старух. Жестокие кары ваших законов – они поистине ужасны. Я говорю бессвязно, я не выбираю слов; я высказываю то, что приходит мне на ум. Не далее, как вчера, я видел закованного в цепи обнаженного человека, на грудь ему навалили целую гору камней, и он умер во время пытки. Знаете ли вы об этом? Нет. Если бы вы знали, что творится рядом с вами, никто из вас не осмелился бы веселиться. А бывал ли кто-нибудь в Ньюкасле-на-Тайяе? Там, в копях, люди зачастую жуют угольную пыль, чтобы хоть чем-нибудь наполнить желудок и обмануть голод, Или взять, например, Риблчестер в Ланкастерском графстве: он так обнищал, что превратился из города в деревню. Я не верю, чтобы принц Георг Датский нуждался в этих ста тысячах гиней. Пусть лучше в больницу принимают больного бедняка, не требуя с него заранее платы за погребение. В Карнарвоне, в Трейт-Море, так же как в Трейт-Бичене, народная нищета ужасна. В Стаффорде нельзя осушить болото потому, что нет денег. В Ланкашире закрыты все суконные фабрики. Всюду безработица. Известно ли вам, что рыбаки в Гарлехе питаются травой, когда улов рыбы слишком мал? Известно ли вам, что в Бертон-Лезерсе еще есть прокаженные; их травят, как диких зверей, стреляя в них из ружей, когда они выходят из своих берлог? В Элсбери, принадлежащем одному из вас, никогда не прекращается голод. В Пенкридже, в Ковентри, где вы только что отпустили ассигнования на собор и где вы увеличили оклад епископу, в хижинах нет кроватей, и матери вырывают в земляном полу ямы, чтобы укладывать в них своих малюток, – дети, вместо колыбели, начинают жизнь в могиле. Я видел это собственными глазами. Милорды, знаете ли вы, кто платит налоги, которые вы устанавливаете? Те, кто умирает с голоду. Увы, вы заблуждаетесь. Вы идете по ложному пути. Вы увеличиваете нищету бедняка, чтобы возросло богатство богача. А между тем следовало бы поступать наоборот. Как! Отбирать у труженика, чтобы давать праздному, отнимать у нищего, чтобы дарить пресыщенному, отбирать у неимущего, чтобы давать государю! О да, в моих жилах течет старая республиканская кровь! По-моему, все это отвратительно. Я ненавижу королей. А как бесстыдны ваши женщины! Недавно мне рассказали печальную историю. О, я ненавижу Карла Второго! Этому королю отдалась женщина, которую любил мой отец; распутница! она была его любовницей в то время, как мой отец умирал в изгнании. Карл Второй, Иаков Второй; после негодяя – злодей. Что такое в сущности король? Безвольный, жалкий человек, раб своих страстей и слабостей. На что нам нужен король? А вы кормите этого паразита. Из дождевого червя вы выращиваете удава. Солитера превращаете в дракона. Сжальтесь над бедняками! Вы увеличиваете налог в пользу трона. Будьте осторожны, издавая законы! Берегитесь тех несчастных, которых вы попираете пятой. Опустите глаза. Взгляните себе под ноги! О великие мира сего, на свете есть и обездоленные! Пожалейте их! Пожалейте самих себя! Ибо народ – в агонии, а те, кто умирает внизу, увлекают к гибели и тех, кто стоит наверху. Смерть уничтожает всех, никого не щадя. Когда наступает ночь, никто не в силах сохранить даже частицу дневного света. Если вы любите самих себя, спасайте других. Если корабль гибнет, никто из пассажиров не может относиться к этому равнодушно. Если потонут одни, то и других поглотит пучина. Знайте, бездна равно подстерегает всех.</p><p class="p1">Неудержимый смех усилился, хохотала вся палата. Впрочем, одной уже необычности этой речи было достаточно, чтобы развеселить высокое собрание.</p><p class="p1">Быть внешне смешным, когда душа переживает трагедию, – что может быть унизительнее таких мучений, что может вызвать в человеке большую ярость? Именно это испытывал Гуинплен. Слова его бичевали, лицо вызывало хохот. Это было ужасно. В голосе его зазвучали вдруг пронзительные ноты:</p><p class="p1">– Им весело, этим людям! Что ж, прекрасно. Они смеются над агонией, они издеваются над предсмертным хрипом. Ах да, ведь они всемогущи. Возможно. Ну, хорошо, будущее покажет. Ах, да ведь я тоже один из них. Но я и ваш, о бедняки! Король продал меня, бедняк приютил меня. Кто изувечил меня? Монарх. Кто исцелил и вскормил? Нищий, сам умиравший с голоду. Я – лорд Кленчарли, но я останусь Гуинпленом. Я из стана знатных, но принадлежу к стану обездоленных. Я среди тех, кто наслаждается, но душой я с теми, кто страждет. Ах, как неправильно устроено наше общество! Но настанет день, когда оно сделается настоящим человеческим обществом. Не будет больше вельмож, будут только свободные люди. Не будет больше господ, будут только отцы. Вот каково будущее. И тогда исчезнут и низкопоклонство, и унижение, и невежество, не будет ни людей, превращенных в вьючных животных, ни придворных, ни лакеев, ни королей. Тогда засияет свет! А пока – я здесь. Это право дано мне, и я пользуюсь им. Есть ли у меня это право? Нет – если я пользуюсь им для себя. Да – если я пользуюсь им для других. Я буду говорить с лордами, ибо я сам – лорд. О братья мои, томящиеся там, внизу, я поведаю этим людям о вашей нужде. Я предстану перед ними, потрясая вашими жалкими отрепьями, я брошу эти лохмотья рабов в лицо господам; и им, высокомерным баловням судьбы, уж не избавиться от воспоминания о страждущих; им, владыкам земли, не освободиться от жгучей язвы нищеты, и тем хуже для них, если в этих лохмотьях кишит всякая нечисть, тем лучше, если она обрушится на львов.</p><p class="p1">Тут Гуинплен обернулся к писцам, стоявшим на коленях и писавшим на четвертом мешке с шерстью.</p><p class="p1">– Кто это там, на коленях? Что вы делаете? Встаньте! Ведь вы же люди.</p><p class="p1">Это внезапное обращение к подчиненным, которых лорду не подобает даже замечать, придало веселью палаты еще более бурный характер. Раньше кричали «браво», теперь стали кричать «ура». От рукоплесканий перешли к стуку ногами. Можно было подумать, что находишься в «Зеленом ящике». Но в «Зеленом ящике» хохот толпы был торжеством Гуинплена, здесь же этот хохот уничтожал его. Смех стремится стать смертоносным оружием. Иногда хохотом пытаются убить человека.</p><p class="p1">Хохот превратился в пытку. Беда, когда сборище тупоголовых начинает изощряться в остроумии. Своим тупым зубоскальством оно отстранит от себя самый очевидный факт и осудит его, прежде чем разберется, в чем дело. Всякое происшествие – это вопросительный знак. Смеяться над ним – значит смеяться над загадкой. Но позади загадки – сфинкс, и он отнюдь не смеется.</p><p class="p1">Слышались противоречивые восклицания:</p><p class="p1">– Довольно! Долой! – Продолжай! Дальше!</p><p class="p1">Вильям Фармер, барон Лестер, кричал Гуинплену, как некогда Рик-Квайни Шекспиру:</p><p class="p1">– Histrio! Mima!<a href="ch2.xhtml#id149" class="a">[271]</a></p><p class="p1">Лорд Воган, занимавший двадцать девятое место на баронской скамье и любивший изрекать сентенции, восклицал:</p><p class="p1">– Вот мы опять вернулись к временам, когда пророчили животные. Среди человеческих уст заговорила и звериная пасть.</p><p class="p1">– Послушаем валаамову ослицу, – подхватил лорд Ярмут. Мясистый нос и перекошенный рот придавали лорду Ярмуту глубокомысленный вид.</p><p class="p1">– Мятежник Линней наказан в могиле, такой сын – кара отцу, – изрек Джон Гауф, епископ Личфилдский и Ковентрийский, на доходы которого посягнул в своей речи Гуинплен.</p><p class="p1">– Он лжет, – сказал лорд Чолмлей, законодатель и законовед. – То, что он называет пыткой, не что иное, как разумная мера, именуемая «длительный допрос с пристрастием». Пыток в Англии не существует.</p><p class="p1">Томас Уэнтворт, барон Реби, обратился к канцлеру:</p><p class="p1">– Милорд канцлер, закройте заседание!</p><p class="p1">– Нет! Нет! Нет! Пусть продолжает. Он забавляет нас. Гип! Гип! Гип! Ура!</p><p class="p1">Это кричали молодые лорды; их веселость граничила с неистовством. Особенно бесновались, захлебываясь от хохота и от ненависти, четверо из них: Лоуренс Хайд, граф Рочестер, Томас Тефтон, граф Тенет, виконт Хеттон и герцог Монтегю.</p><p class="p1">– В конуру, Гуинплен! – кричал Рочестер.</p><p class="p1">– Долой его! Долой! Долой! – орал Тенет.</p><p class="p1">Виконт Хеттон вынул из кармана пенни и бросил его Гуинплену.</p><p class="p1">Джон Кемпбел, граф Гринич, Севедж, граф Риверс, Томсон, барон Гевершем, Уорингтон, Эскрик, Ролстон, Рокингем, Картрет, Ленгдейл, Банистер Мейнард, Гудсон, Карнарвон, Кавендиш, Берлингтон, Роберт Дарси, граф Холдернес, Отер Виндзор, граф Плимут, – рукоплескали.</p><p class="p1">В этом адском шуме и грохоте терялись слова Гуинплена. Можно было расслышать только одно слово: «Берегитесь!»</p><p class="p1">Ральф, герцог Монтегю, юноша с едва пробивавшимися усиками, только что кончивший курс в Оксфордском университете, сошел с герцогской скамьи, на которой он занимал девятнадцатое место, и, подойдя к Гуинплену, стал против него, скрестив руки на груди. На каждом лезвии есть наиболее острое место, и в каждом голосе есть наиболее оскорбительные интонации. Герцог Монтегю придал своему голосу именно такое выражение и, смеясь прямо в лицо Гуинплену, крикнул:</p><p class="p1">– Что ты тут рассказываешь?</p><p class="p1">– Я предсказываю, – ответил Гуинплен.</p><p class="p1">Снова раздался взрыв хохота, сквозь который немолчным рокотом прорывался глухой гнев. Один из несовершеннолетних пэров, Лайонел Кренсилд-Секвилл, граф Дорсет и Миддлсекс, стал ногами на скамью, со степенным видом, как подобает будущему законодателю, и, не смеясь, не говоря ни слова, обратил к Гуинплену свое свежее мальчишеское лицо и пожал плечами. Заметив это, епископ Сент-Асафский наклонился к уху своего соседа епископа Сент-Дэвидского, шепнул, указывая на Гуинплена: «Вот безумец!» – и, указав на подростка, прибавил: «А вот мудрец».</p><p class="p1">В хаосе насмешек выделялись громкие выкрики:</p><p class="p1">– Страшилище!</p><p class="p1">– Что означает все это?</p><p class="p1">– Оскорбление палаты!</p><p class="p1">– Это выродок, а не человек!</p><p class="p1">– Позор! Позор!</p><p class="p1">– Прекратить заседание!</p><p class="p1">– Нет, дайте ему кончить!</p><p class="p1">– Говори, шут!</p><p class="p1">Лорд Льюис Дюрас крикнул, подбоченясь:</p><p class="p1">– Ах, до чего же хорошо посмеяться! Как это полезно для моей печени! Предлагаю вынести постановление в нижеследующей редакции: «Палата лордов изъявляет свою признательность забавнику из “Зеленого ящика”».</p><p class="p1">Как помнит читатель, Гуинплен мечтал совсем о другом приеме.</p><p class="p1">Тот, кто подымался по крутому песчаному, осыпающемуся скату над глубокой пропастью, кто чувствовал, как из-под его рук, из-под его пальцев, колен и ног ускользает точка опоры, кто тщетно пытался двигаться вверх по непокорному обрыву, опасаясь каждую минуту поскользнуться, скатываясь вниз вместо того, чтобы подыматься, спускаясь вместо того, чтобы восходить, увеличивая опасность при каждой попытке добраться до вершины, сползая все больше и больше при каждом движении, вызванном желанием спастись, кто чувствовал, что страшная бездна все ближе, кто ощущал мрачный холод и зияние разверзающейся перед ним пропасти, – тот испытал то, что испытывал в эти минуты Гуинплен.</p><p class="p1">Он чувствовал, как рушатся его гордые мечты, как мрачной пропастью разверзается перед ним вражда этих людей.</p><p class="p1">Всегда находится человек, способный в немногих словах выразить общее мнение.</p><p class="p1">Лорд Скерсдейл выразил единодушное чувство собрания, воскликнув:</p><p class="p1">– Зачем явилось сюда это чудовище?</p><p class="p1">Гуинплен вздрогнул, словно от нестерпимой боли; он резко выпрямился и пылающим взором окинул все скамьи.</p><p class="p1">– Зачем я явился сюда? Затем, чтобы повергнуть вас в ужас. Я чудовище, говорите вы? Нет, я – народ. Я выродок, по-вашему? Нет, я – все человечество. Выродки – это вы. Вы – химера, я – действительность. Я – Человек. Страшный. Человек, который смеется. Смеется над кем? Над вами. Над собой. Надо всем. О чем говорит этот смех? О вашем преступлении и о моей муке. И это преступление, эту муку он швыряет вам в лицо. Я смеюсь – и это значит: я плачу.</p><p class="p1">Он остановился. Шум утих. Кое-где еще смеялись, но уже не так громко. Он подумал было, что снова овладел вниманием слушателей. Передохнув, он продолжал:</p><p class="p1">– Маска вечного смеха на моем лице – дело рук короля. Этот смех выражает отчаяние. В этом смехе – ненависть и вынужденное безмолвие, ярость и безнадежность. Этот смех создан пыткой. Этот смех – итог насилия. Если бы так смеялся сатана, этот смех был бы осуждением Бога. Но предвечный не похож на бренных людей. Он совершенен, он справедлив, и деяния королей ненавистны ему. А! Вы считаете меня выродком! Нет. Я – символ. О всемогущие глупцы, откройте же глаза! Я воплощаю в себе все. Я представляю собой человечество, изуродованное властителями. Человек искалечен. То, что сделано со мной, сделано со всем человеческим родам: изуродовали его право, справедливость, истину, разум, мышление, так же как мне изуродовали глаза, ноздри и уши; в сердце ему, так же как и мне, влили отраву горечи и гнева, а на лицо надели маску веселости. На то, к чему прикоснулся перст божий, легла хищная лапа короля. Чудовищная подмена! Епископы, пэры и принцы, знайте же, народ – это великий страдалец, который смеется сквозь слезы. Милорды, народ – это я. Сегодня вы угнетаете его, сегодня вы глумитесь надо мной. Но впереди – весна. Солнце весны растопит лед. То, что казалось камнем, станет потоком. Твердая по видимости почва провалится в воду. Одна трещина – и все рухнет. Наступит час, когда страшная судорога разобьет ваше иго, когда в ответ на ваше гиканье раздастся грозный рев. Этот час уже наступил однажды – ты пережил его, отец мой! – этот час господень назывался республикой: ее уничтожили, но она еще возродится. А пока помните, что длинную череду вооруженных мечами королей пресек Кромвель, вооруженный топором. Трепещите! Близится неумолимый час расплаты, отрезанные когти вновь отрастают, вырванные языки превращаются в языки пламени, они взвиваются ввысь, подхваченные буйным ветром, и вопиют в бесконечности; голодные скрежещут зубами; рай, воздвигнутый над адом, колеблется; всюду страдания, горе, муки; то, что находится наверху, клонится вниз, а то, что лежит внизу, раскрывает зияющую пасть; тьма стремится стать светом; отверженные вступают в спор с блаженствующими. Это идет народ, говорю я вам, это поднимается человек; это наступает конец; это багряная заря катастрофы. Вот что кроется в смехе, над которым вы издеваетесь! В Лондоне – непрерывные празднества. Пусть так. По всей Англии – пиры и ликованье. Хорошо. Но послушайте! Все, что вы видите, – это я. Ваши празднества – это мой смех. Ваши пышные увеселения – это мой смех. Ваши бракосочетания, миропомазания, коронации – это мой смех. Празднества в честь рождения принцев – это мой смех. Гром над вашими головами – это мой смех!</p><p class="p1">Как можно было сдержаться, слыша такие слова? Смех возобновился, на этот раз с удручающей силой. Из всех видов лавы, которые извергает, словно кратер вулкана, человеческий рот, самый едкий – это насмешка. Никакая толпа не в состоянии противиться соблазну жестокой потехи. Не все казни совершаются на эшафотах, и любое сборище людей, будь то уличная толпа или законодательная палата, всегда имеет наготове палача: палач этот – сарказм. Нет пытки, которая сравнялась бы с пыткой глумления. Этой пытке подвергся Гуинплен. Насмешки сыпались на него градом камней и градом картечи. Он оказался в роли детской игрушки, манекена, истукана, ярмарочного силомера, который бьют по голове, пробуя крепость кулака. Присутствующие подпрыгивали на своих местах, кричали «Еще!», покатывались от хохота, топали ногами, хватались за брыжи. Ни торжественность места, ни пурпур мантий, ни белизна горностая, ни внушительные размеры париков – ничто не могло остановить их. Хохотали лорды, хохотали епископы, хохотали судьи. Старики смеялись до слез, несовершеннолетние надрывались от смеха. Архиепископ Кентерберийский толкал локтем архиепископа Йоркского. Генри Комптон, епископ Лондонский, брат графа Нортгемптона, хватался за бока. Лорд-канцлер опускал глаза, чтобы скрыть невольную улыбку. Смеялся даже пристав черного жезла, стоявший у перил, как живое олицетворение почтительности.</p><p class="p1">Гуинплен скрестил руки на груди: он был бледен. Окруженный всеми этими лоснящимися от удовольствия лицами, старыми и молодыми, среди взрывов гомерического хохота, в этом вихре рукоплесканий, топота, криков «Ура!», среди этого безудержного ликования, этого необузданного веселья, он чувствовал в душе могильный холод. Все было кончено. Отныне он не мог уже совладать ни с выражением смеха на своем лице, ни с теми, кто осыпал его оскорблениями.</p><p class="p1">Никогда еще не проявлялся с такой очевидностью извечный, роковой закон близости великого и смешного: хохот оказывается отзвуком мучительного вопля, пародия движется следом за отчаянием; никогда еще противоречие между кажущимся и действительным не вскрывалось столь, ужасно. Никогда еще более зловещий свет не озарял непроглядной тьмы человеческой души.</p><p class="p1">Гуинплен присутствовал при полном крушении своих чаяний: они были уничтожены смехом. Произошло нечто непоправимое. Упавший может встать, но человек раздавленный уже не подымется. Нелепая, всепобеждающая насмешка обратила его в прах. Отныне у него не было никакой надежды. Все зависит от среды. То, что в «Зеленом ящике» было торжеством, в палате лордов оказалось падением и катастрофой. Рукоплескания, служившие там наградою, были здесь оскорблением. Он почувствовал теперь как бы изнанку своей личины. По одну сторону была симпатия простого люда, принимающего Гуинплена, по другую – ненависть знати, отвергающей лорда Фермена Кленчарли. Притягательная сила одних и отталкивающая сила других – обе одинаково влекли его во мрак. Ему казалось, будто кто-то напал на него сзади. Рок нередко наносит такие предательские удары. Потом все разъяснится, но пока судьба оказывается западней, и человек попадает в волчью яму. Гуинплену казалось, что он возносится вверх, а его осмеяли. Порой апофеозы завершаются мрачно. Существует зловещее слово: отрезвление. Это – трагическая мудрость, которую рождает опьянение. Застигнутый этой беспощадной бурей веселья, Гуинплен задумался.</p><p class="p1">Отдаться сумасшедшему смеху – то же, что плыть по воле волн. Сборище людей, охваченное неудержимым хохотом, – то же, что судно, потерявшее компас. Никто уже не знал, ни чего он хочет, ни что он делает. Пришлось закрыть заседание.</p><p class="p1">«Ввиду происшедшего» лорд-канцлер отложил голосование на следующий день. Члены палаты стали расходиться. Поклонившись королевскому креслу, лорды покидали зал. Их смех еще звучал в коридорах, теряясь где-то в отдалении. Кроме официальных выходов, во всех залах заседаний есть еще много дверей, скрытых коврами, лепными украшениями стен и нишами; просачиваясь в эти выходы, как просачивается влага в трещины сосуда, публика быстро освобождает помещение. В несколько минут зал пустеет. Такие перемены наступают быстро, почти без переходов. В местах шумных сборищ сразу же воцаряется безмолвие.</p><p class="p1">Углубившись в раздумье, можно забыть обо всем и в конце концов оказаться как бы на другой планете. Гуинплен вдруг словно очнулся. Он был один в пустом зале; он и не заметил, как закрыли заседание. Все пэры куда-то исчезли, даже оба его восприемника. Осталось лишь несколько служителей палаты, ожидавших ухода «его милости», чтобы покрыть чехлами мебель и погасить свет. Он машинально надел шляпу, сошел со своей скамьи и направился к большим дверям, распахнутым в галерею. Когда он проходил мимо перил, привратник снял с него пэрскую мантию. Он едва обратил на это внимание. Мгновение спустя он был уже в галерее.</p><p class="p1">Слуги, находившиеся в зале, с удивлением заметили, что новый лорд вышел, не поклонившись трону.</p></span></span></span></span>
