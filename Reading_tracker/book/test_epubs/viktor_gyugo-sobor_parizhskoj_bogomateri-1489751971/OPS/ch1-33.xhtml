<p class="p">V. Два человека в черном</p>
</div><p class="p1">Вошедший был в черной одежде, с угрюмым выражением лица. Особенно бросилась в глаза нашему другу Жану (устроившемуся, конечно, в своем уголке так, чтобы все видеть и слышать) глубокая печаль, отличавшая и одежду, и лицо пришедшего. Однако на лице можно было прочесть кротость, но кротость кошки или судьи, кротость притворную. Это был плотный мужчина лет шестидесяти, с сильной проседью в волосах, морщинистым лицом, мигающими глазами, светлыми бровями, отвисшей нижней губой и большими руками. Рассмотрев все это и решив, что перед ним, наверное, какой-нибудь доктор или судейский, и заметив, что нос у него отстоит далеко от рта – признак глупости, – Жан отодвинулся в самый дальний уголок своего убежища и досадовал, что ему придется провести неопределенное время в таком неудобном положении и таком скучном обществе.</p><p class="p1">Архидьякон между тем даже не встал навстречу пришедшему. Он сделал знак, чтобы тот сел на скамейку возле двери, и после нескольких минут молчания, в продолжение которых он как бы заканчивал ранее начатое размышление, обратился к нему слегка покровительственно:</p><p class="p1">– Здравствуйте, мэтр Жак.</p><p class="p1">– Мое почтение, мэтр! – отвечал человек в черном.</p><p class="p1">В тоне, которым было произнесено <em>мэтр Жак</em> с одной стороны и просто <em>мэтр</em> с другой, была такая же разница, как между обращением <em>монсеньор</em> и <em>месье</em>, или между domine и domne. По-видимому, ученик встречался с учителем.</p><p class="p1">– Ну, что же, – спросил архидьякон после нового молчания, которого мэтр Жак не смел нарушить, – надеетесь на успех?</p><p class="p1">– К несчастью, я все еще продолжаю раздувать. Пепла – сколько угодно, но золота – ни единой крупинки, – отвечал мэтр Жак с грустной улыбкой.</p><p class="p1">Клод сделал нетерпеливый жест.</p><p class="p1">– Я не об этом говорю, мэтр Жак Шармолю, а о процессе вашего колдуна. Ведь вы называли его Марком Сененом, казначеем счетной палаты? Признается он в своем колдовстве? Удался допрос?</p><p class="p1">– К несчастью, нет, – отвечал мэтр Жак все с тою же грустной улыбкой. – Мы не имеем этого утешения. Этот человек настоящий кремень. Его нужно живьем сварить на Свином рынке, прежде чем он что-нибудь скажет. Однако мы не щадим ничего, чтобы добиться истины. У него уже все члены вывернуты. Мы пускаем в ход все средства, как говорит старый комик Плавт:</p><div class="poem">
<div class="stanza">
<p class="v">Adversum stimulos, laminas, crucesque, compedesque,</p>
<p class="v">Nervos, catenas, carceres, numellas, pedicas, boias<a href="ch2.xhtml#id164" class="a">[102]</a>.</p>
</div>
</div><p class="p1">Ничего не действует. Это – ужасный человек. С ним и латынь не помогает.</p><p class="p1">– Вы не нашли ничего нового в его доме?</p><p class="p1">– Как же! – заявил мэтр Жак, шаря в своем мешке. – Этот пергамент. Тут есть слова, которых мы не понимаем. Между тем королевский прокурор Филипп Лелье знает немного еврейский язык. Он изучил его во время ведения процесса о евреях с улицы Кантерсен в Брюсселе. – Говоря это, мэтр Жак развернул пергамент.</p><p class="p1">– Дайте сюда! – приказал архидьякон и, бросив взгляд на документ, вскрикнул: – Несомненно колдовство! <em>Эменхетан</em>! – это крик ведьм, когда они прилетают на шабаш. Per ipsum, et cum ipso, et in ipso!<a href="ch2.xhtml#id162" class="a">[103]</a> Это – заклинание, которым дьявол переносит себя обратно в ад. <em>Hax, pax, max</em> – это медицинские термины. Формула против укуса бешеной собаки. Мэтр Жак, вы королевский прокурор церковного суда. Этот пергамент – гнусность!</p><p class="p1">– Снова подвергнем этого человека допросу. Вот еще что мы нашли у Марка Сенена, – добавил мэтр Жак, снова порывшись в своем мешке.</p><p class="p1">Это был сосуд, похожий на те, которые стояли на очаге патера Клода.</p><p class="p1">– А, – сказал архидьякон, – алхимический тигель.</p><p class="p1">– Признаюсь вам, – продолжал мэтр Жак со своей робкой, неестественной улыбкой, – что я было попробовал его на очаге, но не получил лучших результатов, чем с моим собственным.</p><p class="p1">Архидьякон принялся рассматривать сосуд.</p><p class="p1">– Что такое нацарапано на тигле? Och! Och! Слово, отгоняющее блох? Невежда этот Марк Сенен! Вполне уверен, что в таком тигле вам не добыть золота! Он годится разве только на то, чтоб ставить его подле кровати летом.</p><p class="p1">– Раз мы коснулись ошибок, – сказал королевский прокурор, – то, перед тем как подняться к вам, я внимательно присматривался к порталу внизу. Вполне ли вы уверены, ваше преподобие, в том, что начало работ по физике изображено на стороне, обращенной к больнице, и что из семи обнаженных фигур, стоящих у подножия Богоматери, фигура с крыльями на пятках представляет Меркурия?</p><p class="p1">– Да, – отвечал патер. – Так пишет Августин Нифо – итальянский ученый, которому служил бородатый демон, открывавший ему все. Впрочем, пойдемте вниз, и я вам объясню все это по надписи.</p><p class="p1">– Благодарю вас, учитель, – ответил Шармолю, кланяясь до земли. – Кстати, я забыл! Когда прикажете допросить маленькую колдунью?</p><p class="p1">– Какую колдунью?</p><p class="p1">– Известную вам цыганку, что каждый день выходит плясать на площадь перед собором, несмотря на запрещение властей! У нее есть рогатая коза, одержимая дьяволом, которая читает, пишет, знает математику, как Пикатрикс. Из-за нее одной можно бы перевешать всех цыган. Вина налицо. Обвинительный акт недолго составить! А хорошенькое создание, клянусь честью, эта плясунья! Какие чудные черные глаза! Точно два египетских карбункула! Когда мы начнем?</p><p class="p1">Архидьякон был страшно бледен.</p><p class="p1">– Я скажу вам, – ответил он чуть слышно и затем проговорил с усилием: – Занимайтесь Марком Сененом.</p><p class="p1">– Не беспокойтесь, – сказал Шармолю, улыбаясь. – Вернувшись, я опять прикажу растянуть его на кожаной постели. Только это какой-то черт, а не человек! Он довел до изнеможения самого Пьера Тортерю, у которого руки посильнее моих. Как говорит добряк Плавт: «Nudus vinctus, centum pondo es quando pendes per pedes!»<a href="ch2.xhtml#id160" class="a">[104]</a> Допрос на дыбе! Это лучшее, что у нас есть! Попробуем его.</p><p class="p1">Dom Клод, казалось, был отвлечен мрачными мыслями. Он обернулся к Шармолю:</p><p class="p1">– Мэтр Пьера… то есть мэтр Жак, займитесь Марком Сененом!</p><p class="p1">– Да, да, господин Клод. Бедняга! Ему придется перенести все муки ада. Да и что за фантазия отправиться на шабаш? Ему – казначею Монетного двора, которому, кажется, следовало бы знать закон Карла Великого: Stryga vel masca!..<a href="ch2.xhtml#id158" class="a">[105]</a> А что касается этой девочки – Смеральды, как ее зовут, – я буду ждать ваших приказаний… Да! Проходя под порталом, вы объясните мне, что значит живописное изображение садовника, которое мы видим при входе в церковь… Это, должно быть, сеятель?.. Мэтр, о чем это вы так задумались?</p><p class="p1">Углубившись в свои мысли, Клод не слушал. Следя за его взглядом, Шармолю заметил, что он остановился на большой паутине, затягивавшей круглое окно. В эту минуту легкомысленная муха, стремясь к мартовскому солнцу, бросилась было через тенета и прилипла к ним. При сотрясении сети огромный паук сделал резкое движение от центра паутины и одним прыжком бросился на муху, которую согнул вдвое своими передними крючками, между тем как его отвратительный хоботок нащупывал ее голову.</p><p class="p1">– Бедная мушка! – сказал прокурор церковного суда и поднял руку, чтобы освободить насекомое.</p><p class="p1">Архидьякон, словно очнувшись, в испуге удержал его судорожным движением.</p><p class="p1">– Мэтр Жак! – крикнул он. – Не перечьте судьбе!</p><p class="p1">Прокурор обернулся в испуге. Ему показалось, что его руку сжали железные тиски. Священник устремил суровый, сверкающий неподвижный взгляд на ужасную маленькую группу – паука и муху.</p><p class="p1">– Да, – продолжал священник голосом, звучавшим откуда-то из глубины, – вот символ всего. Она только что родилась на свет Божий. Она летает, радуется, ищет весны, воздуха, свободы. Но вот она наткнулось на роковую розетку, и из нее выскакивает отвратительный паук! Бедная плясунья! Бедная мушка, которой предопределена погибель! Оставьте, мэтр Жак, это – рок!.. Увы! Клод, ты паук! Но ты также и муха!.. Ты летел к науке, к свету, к солнцу, ты думал только о том, как бы вырваться на воздух, на свет вечной истины… Но, бросившись к отдушине, которая ведет в другой мир, в мир света, ума и науки, ты – слепая муха – безумный ученый! – не заметил тонкой паутины, протянутой роком между светом и тобой, ты бросился в нее очертя голову, несчастный безумец, – и теперь ты стараешься вырваться из железных когтей судьбы… Но голова у тебя разбита и крылья сломаны! Мэтр Жак, не мешайте пауку!</p><p class="p1">– Уверяю вас, что я не трону его, – сказал Шармолю, смотревший на Клода, ничего не понимая. – Но пустите же мою руку, мэтр, ради бога! У вас не рука – клещи.</p><p class="p1">Архидьякон не слушал его.</p><p class="p1">– О безумец, – продолжал он, не отрывая глаз от окна. – И если б тебе даже удалось своими слабыми крыльями прорвать эту страшную паутину, ты думаешь, ты достиг бы света? Нет! Как бы ты пробрался через это окно, это прозрачное препятствие, через эту хрустальную стену, которая тверже металла, отделяющего всех философов от истины? О, тщета науки! Сколько мудрецов, несясь издалека, ударяются о нее и разбивают себе голову! Сколько учений, перепутываясь и жужжа, натыкаются на это вечное стекло!..</p><p class="p1">Он умолк. Последние рассуждения, незаметно отвлекшие его внимание от его собственной личности в науке, как будто успокоили его. Шармолю окончательно вернул его к действительности, обратившись к нему с вопросом:</p><p class="p1">– Когда же вы зайдете ко мне, учитель, чтобы помочь мне добыть золото? Мне хочется поскорей достигнуть удачного результата.</p><p class="p1">Архидьякон с горькой усмешкой покачал головой:</p><p class="p1">– Прочтите «Dialogus de energia et operatione daemonum»<a href="ch2.xhtml#id156" class="a">[106]</a>, мэтр Жак. То, что мы делаем, не вполне невинная забава!</p><p class="p1">– Тише, учитель! Я того же мнения, – сказал Шармолю, – но приходится немного изучить алхимию, когда занимаешь место королевского прокурора в церковном суде, получая всего тридцать турских экю в год. Только давайте говорить потише.</p><p class="p1">В эту минуту щелканье челюстей, пережевывавших что-то, донеслось из-под очага до слуха насторожившегося Шармолю.</p><p class="p1">– Что это? – спросил он.</p><p class="p1">Студент, соскучившийся сидеть в своем углу и случайно обнаруживший кусок черствого хлеба и заплесневевшую корку сыра, принялся закусывать без всякой церемонии. Так как он был голоден, то ел с большим шумом, что и привлекло внимание прокурора.</p><p class="p1">– Должно быть, мой кот лакомится там мышью, – поспешно сказал архидьякон.</p><p class="p1">Шармолю удовлетворился этим объяснением.</p><p class="p1">– Правда, ведь у всех философов были любимцы среди животных, – сказал он с почтительной улыбкой. – Помните, что говорит Сервий: «Nullis enim locus sine genio est»<a href="ch2.xhtml#id154" class="a">[107]</a>.</p><p class="p1">Клод, боясь какой-нибудь новой выходки Жана, напомнил своему достойному ученику, что им еще надо рассмотреть вместе несколько изображений на портале, и оба вышли из кельи, к великому облегчению студента, начинавшего серьезно опасаться, как бы его колено не сохранило навеки отпечатка его подбородка.</p></span><span id="id43"><div class="title6">
<p class="p">VI. К каким последствиям могут привести несколько ругательств, громко произнесенных на улице</p>
</div><p class="p1">– Te Deum laudamus!<a href="ch2.xhtml#id152" class="a">[108]</a> – воскликнул Жан, вылезая из своего убежища. – Насилу-то убрались оба филина. Och! Och! Hax! Pax! Бешеные собаки! Дьяволы! Хороших я наслушался разговоров, нечего сказать! У меня от них до сих пор в ушах трезвон стоит. А тут еще этот вонючий сыр! Ну, теперь скорее вон! Захватим с собой братцеву мошну и поспешим променять денежки на бутылки!</p><p class="p1">Жан с любовью и восхищением заглянул еще раз в драгоценный кошелек, привел в порядок свою одежду, смахнул пыль с башмаков, почистил посеревшие от золы рукава, засвистал какую-то песенку, перевернулся на одной ноге, осмотрелся, нельзя ли еще чего стащить, захватил с собой несколько лежавших на очаге стеклянных амулетов, рассчитав, что их можно подарить Изабо ла Тьери, и наконец отворил дверь, которую брат не запер из сострадания к нему. Жан тоже оставил ее открытой, желая на прощание насолить брату, и побежал вниз по винтовой лестнице, подпрыгивая, как воробей.</p><p class="p1">В потемках на лестнице Жан толкнул кого-то, посторонившегося с сердитым рычанием. Он подумал, что это Квазимодо, и эта мысль его так рассмешила, что остаток лестницы он пробежал, держась за бока от смеха, и, даже выскочив уже на площадь, все еще продолжал хохотать.</p><p class="p1">Очутившись наконец на улице, он топнул ногой.</p><p class="p1">– О славная, почтенная парижская мостовая! И будь проклята лестница, – на ней запыхались бы сами ангелы, восходившие по лестнице Иакова! Чего ради я полез в этот каменный бурав, ушедший в самое небо? Чтобы поесть протухшего сыра да полюбоваться из слухового окна на парижские колокольни!</p><p class="p1">Пройдя несколько шагов, Жан заметил «обоих филинов», то есть достопочтенного Клода и Жака Шармолю, погруженных в созерцание изваяний у входа в собор. Подкравшись к ним на цыпочках, он услыхал, как архидьякон объяснял вполголоса Жаку Шармолю:</p><p class="p1">– Это Гильом Парижский приказал вырезать изображение Иова на этом камне цвета ляпис-лазури, позолоченном по краям. Иов знаменует собою философский камень, который тоже должен перенести много испытаний и терзаний, чтобы стать совершенным, как говорит Раймонд Луллий: Sub conservatione formae specificae salva anima<a href="ch2.xhtml#id151" class="a">[109]</a>.</p><p class="p1">«Ну, меня это не касается, – подумал Жан, – благо денежки у меня в руках».</p><p class="p1">В эту минуту позади него раздался громкий и звучный голос, ругавшийся самым отчаянным образом:</p><p class="p1">– Провалиться тебе! К черту тебя! Нечестивое чрево Вельзевула! Клянусь Папой! Гром и молния!</p><p class="p1">– Клянусь честью, – воскликнул Жан, – да ведь это мой друг – капитан Феб!</p><p class="p1">Имя Феб поразило слух архидьякона в ту минуту, как он объяснял королевскому прокурору значение дракона, спрятавшего свой хвост в фонтане, откуда выходят клубы дыма, окутывающие голову короля. Клод вздрогнул и, оборвав, к великому удивлению Шармолю, свою речь на полуслове, обернулся. Он увидел своего брата Жана, подходившего к высокому офицеру, стоявшему перед домом Гондлорье.</p><p class="p1">Действительно, это был капитан Феб де Шатопер. Он стоял, прислонившись к стене дома своей невесты, и ругался самым неистовым образом.</p><p class="p1">– Однако, капитан Феб, и молодец же вы ругаться, – проговорил Жан, дотрагиваясь до его руки.</p><p class="p1">– Убирайся к черту! – отвечал капитан.</p><p class="p1">– Убирайтесь сами к черту! – возразил школяр. – Но расскажите мне, милейший капитан, что вызвало такой фонтан красноречия?</p><p class="p1">– Простите, дружище! – воскликнул Феб, пожимая ему руку. – Но ведь знаете – и лошадь на всем скаку не остановишь сразу, а я ведь ругался во весь дух! Видите ли, я только что вышел от этих святош, а каждый раз, как я там побываю, я даю себе потом волю поругаться всласть, а то боюсь задохнуться. Гром и молния!</p><p class="p1">– Не хотите ли выпить? – спросил студент.</p><p class="p1">Такое предложение немного успокоило капитана.</p><p class="p1">– Я бы с удовольствием, да денег нет.</p><p class="p1">– Зато у меня есть!</p><p class="p1">– Неужели?</p><p class="p1">Жан показал ему кошелек жестом, исполненным величественной простоты. Между тем архидьякон, покинув у собора изумленного Шармолю, тихо подошел к ним и, никем не замеченный, стал наблюдать за молодыми людьми, всецело поглощенными рассматриванием кошелька.</p><p class="p1">Феб воскликнул:</p><p class="p1">– Кошелек у вас в кармане, Жан! Да это похоже на отражение луны в воде: и видишь ее, и нет ее там! Черт возьми, да я готов пари держать, что вы насовали туда одних камешков!</p><p class="p1">– А вот полюбуйтесь, какими камешками набит мой кошелек! – хладнокровно возразил на это Жан и без дальних разговоров высыпал содержимое кошелька на ближайшую тумбу с видом римлянина, спасающего отечество.</p><p class="p1">– Фу ты, черт! – пробурчал Феб. – Большие беляки, мелкие беляки, турские монеты, парижские монеты и даже настоящие лиарды! Да это восхитительно!</p><p class="p1">Жан сохранял свой невозмутимый вид.</p><p class="p1">Несколько лиардов скатилось в грязь, и восхищенный капитан бросился было их подымать.</p><p class="p1">Но Жан остановил его:</p><p class="p1">– Стыдитесь, капитан Феб де Шатопер!</p><p class="p1">Феб сосчитал деньги и торжественно обратился к Жану:</p><p class="p1">– Знаете ли вы, Жан, что тут двадцать три парижских су! Сознайтесь, что вы кого-нибудь ограбили сегодня ночью на улице Перерезанных глоток!</p><p class="p1">Жан тряхнул своей белокурой кудрявой головой и произнес, презрительно прищурив глаза:</p><p class="p1">– На то у нас имеется полоумный братец – архидьякон.</p><p class="p1">– Ах, черт побери! – воскликнул Феб. – Вот достойный-то человек!</p><p class="p1">– Пойдем выпьем, – предложил Жан.</p><p class="p1">– Куда же пойдем, – спросил Феб, – разве в кабак «Яблоко Евы»?</p><p class="p1">– Не стоит, капитан, пойдем лучше в «Старую науку», мне там больше нравится.</p><p class="p1">– Ну ее к черту, «Старую науку». Вино лучше в «Евином яблоке». И там у самой двери вьется на солнышке виноградная лоза. Я люблю на нее смотреть, когда пью.</p><p class="p1">– Ну ладно, отправимся к Еве, – согласился студент, беря капитана под руку. – Кстати, дорогой капитан, вы только что упомянули улицу Перерезанных глоток. Так не говорят. Мы уже теперь не варвары. Нужно говорить: «улица Перерезанного горла».</p><p class="p1">И оба друга направились к «Яблоку Евы». Незачем и говорить о том, что они предварительно собрали рассыпанные деньги и что архидьякон последовал за ними, мрачный и расстроенный… Тот ли это Феб, проклятое имя которого не давало ему покоя со времени его разговора с Гренгуаром? Он не был в этом уверен, но достаточно было этого магического слова, чтобы заставить архидьякона крадучись последовать за беспечными друзьями, прислушиваясь к их разговору и тревожно наблюдая за малейшими их движениями. Впрочем, весьма нетрудно было слышать все, что они говорили, потому что приятели нисколько не заботились о том, что другие прохожие могут услыхать их. Они разговаривали очень громко, болтая о дуэлях, женщинах, попойках и всяких сумасбродствах.</p><p class="p1">На углу одной улицы к ним донесся с ближайшего перекрестка звук бубна. И Клод услыхал, как офицер сказал студенту:</p><p class="p1">– Черт возьми! Пойдем скорее!</p><p class="p1">– Почему?</p><p class="p1">– Боюсь, чтобы цыганка не увидала.</p><p class="p1">– Какая цыганка?</p><p class="p1">– Да та, что ходит с козой.</p><p class="p1">– Эсмеральда?</p><p class="p1">– Она самая. Все забываю ее дурацкое имя. Пойдем скорее, а то она меня узнает. А мне вовсе не хочется, чтобы она заговорила со мной на улице.</p><p class="p1">– Да разве вы ее знаете, Феб?</p><p class="p1">Тут архидьякон услыхал самодовольный смех капитана, прошептавшего что-то на ухо Жану. Потом Феб снова захохотал и с победоносным видом тряхнул головой.</p><p class="p1">– Правда? – спросил Жан.</p><p class="p1">– Ей-богу! – отвечал Феб.</p><p class="p1">– Сегодня вечером?</p><p class="p1">– Сегодня вечером.</p><p class="p1">– И вы думаете, что она придет?!</p><p class="p1">– Да что вы, Жан, разве в этом можно сомневаться?</p><p class="p1">– Ну и счастливчик же вы, капитан Феб!</p><p class="p1">Ни одно слово из этого разговора не ускользнуло от архидьякона. Зубы его стучали, как в лихорадке, и он весь дрожал. На секунду он остановился, присев на тумбу, как пьяный, а затем снова пустился вслед за молодыми шалопаями.</p><p class="p1">В ту минуту, как он их догнал, они уже оставили интересовавшую его тему, и до его слуха донесся припев старинной песни, которую они распевали во все горло:</p><div class="poem">
<div class="stanza">
<p class="v">Les enfants des Petits-Carreaux</p>
<p class="v">Se font pendre comme des veaux!<a href="ch2.xhtml#id148" class="a">[110]</a></p>
</div>
