<p class="p">8. Был бы хорошим братом, если бы не был примерным сыном</p>
</div><p class="p1">В галерее уже никого не было. Гуинплен прошел через стеклянную ротонду, откуда успели убрать кресло и столы и где не оставалось больше никаких следов церемонии его посвящения в пэры. Горевшие на равном расстоянии друг от друга люстры и канделябры указывали ему путь к выходу. Благодаря этой веренице огней Гуинплену удалось легко отыскать в путанице залов и коридоров дорогу, по которой он шел в палату вслед за герольдмейстером и приставом черного жезла. Он не встретил ни души, если не считать нескольких замешкавшихся старых лордов, тяжелыми шагами бредущих к выходу.</p><p class="p1">Вдруг среди безмолвия этих огромных пустынных залов до него долетел неясный гул человеческих голосов, необычный для такого места и в столь поздний час. Он направился в ту сторону, откуда доносился шум, и очутился в широком, слабо освещенном вестибюле, служившем выходом из платы. Сквозь распахнутую стеклянную дверь виден был подъезд, лакей с факелами, площадь и ряд карет, ожидавших у подъезда.</p><p class="p1">Отсюда и исходил шум, услышанный Гуинпленом.</p><p class="p1">Около двери, под фонтаном, в вестибюле стояла кучка людей, которые бурно жестикулировали и громко о чем-то спорили. Незамеченный в полумраке Гуинплен подошел ближе.</p><p class="p1">Очевидно, здесь происходила ссора. Десять – двенадцать молодых лордов толпились у выхода, а какой-то человек в шляпе, как и они, стоял перед ними, гордо вскинув голову и преграждая им дорогу.</p><p class="p1">Кто был этот человек? Том-Джим-Джек.</p><p class="p1">Некоторые из лордов еще не сняли пэрской мантии, другие уже сбросили с себя парламентское одеяние и были в обыкновенном платье.</p><p class="p1">На шляпе Том-Джим-Джека развевались перья, но не белые, как у пэров, а зеленые с оранжевыми завитками; его костюм, сверху донизу расшитый золотыми галунами, был украшен у ворота и на рукавах целыми каскадами лент и кружев; левой рукой он крепко сжимал рукоять висевшей сбоку шпаги, на бархатных ножнах и на перевязи которой были вышиты золотом адмиральские якоря.</p><p class="p1">Гуинплен услышал, как он говорил, обращаясь ко всем этим молодым лордам:</p><p class="p1">– Я назвал вас трусами. Вы требуете, чтобы я взял свои слова назад. Извольте. Вы не трусы. Вы идиоты. Вы все накинулись на одного. Это не трусость? Пожалуй. В таком случае это глупость. Вы слушали, но ровно ничего не поняли. Старики здесь тугоухи, а молодежь тупоумна. Я в достаточной мере принадлежу к вашей среде, чтобы иметь право высказывать вам такие истины. Этот новый лорд – существо странное, он наговорил кучу нелепостей, – согласен, но среди этих нелепостей было и много верного. Его речь была сбивчива, бестолкова, он произнес ее неумело, – не спорю; он слишком часто повторял «знаете ли вы, знаете ли вы», но человек, еще вчера бывший ярмарочным фигляром, не обязан говорить, как Аристотель или как Гильберт Барнет, епископ Сарумский. Его слова о нечисти, о львах, его обращение к помощникам клерков – все это было безвкусно. Черт возьми! Кто же спорит с вами? Это была безрассудная, беспорядочная речь, где все было спутано, но иногда в ней проскальзывала настоящая правда. Говорить так, как он, не будучи опытным оратором, – это уже немалая заслуга. Хотел бы я увидеть вас на его месте. То, что он рассказал о прокаженных Бертон-Лезерса – факт бесспорный. К тому же не он первый говорит глупости в парламенте. Наконец, милорды, я не люблю, когда все нападают на одного, таков уж мой характер, а потому разрешите мне считать себя оскорбленным. Ваше поведение не нравится мне, я возмущен. Я не очень-то верю в Бога, но, когда он совершает добрые поступки, что случается с ним не каждый день, я готов склониться к мысли, что он существует; поэтому, например, я весьма признателен ему, если только он есть, за то, что он извлек из общественных низов пэра Англии и возвратил наследство законному владельцу; независимо от того, на руку мне это или нет, я рад, что мокрица внезапно превратилась в орла, Гуинплен – в Кленчарли. Милорды, я запрещаю вам держаться иного мнения. Жаль, что здесь нет Льюиса Дюраса. Он получил бы от меня по заслугам! Милорды, Фермен Кленчарли вел себя как лорд, а вы – как скоморохи. Что касается его смеха, он в нем не повинен. Вы потешались над его смехом. Нельзя смеяться над несчастьем. Вы глупцы, и глупцы жестокие. Вы очень ошибаетесь, если полагаете, что нельзя посмеяться и над вами, вы сами безобразны, и вы не умеете одеваться. Милорд Хавершем, я видел третьего дня твою любовницу, она отвратительна. Хоть и герцогиня, но настоящая мартышка. Господа насмешники, повторяю вам, мне очень хотелось бы послушать, сумеете ли вы связать три-четыре слова кряду. Болтать может всякий, говорить – далеко не каждый. Вы воображаете себя образованными людьми на том лишь основании, что протирали штаны на скамьях в Оксфорде или Кембридже, и потому, что, прежде чем усесться в качестве пэров Англии на скамьи Вестминстер-Холла, вы хлопали ушами на скамьях Гонвиллского или Кайского колледжа. Я говорю вам в лицо: вы вели себя нагло с новым лордом.</p><p class="p1">Конечно, он чудовище, но чудовище, отданное на съедение диким зверям. Я предпочел бы быть на его месте, чем на вашем. Я присутствовал на заседании в качестве возможного наследника пэрства. Я все слышал. Я не имел права высказываться, но имею право быть порядочным человеком. Ваши насмешки возмутили меня. Когда я зол, я способен подняться на гору Пендлхилл и набрать там травы «собачий зуб», хотя она навлекает молнию на голову того, кто срывает ее. Вот почему я поджидал вас здесь, у выхода. Объясниться никогда не лишнее, и мне нужно поговорить с вами. Понимаете ли вы, что в известной степени оскорбили и меня? Милорды, я твердо решил отправить кое-кого из вас на тот свет. Все вы, присутствующие здесь – Томас Тефтон, граф Тенет, Севедж, граф Риверс, Чарльз Спенсер, граф Сендерленд, Лоуренс Хайд, граф Рочестер, и вы, бароны Грей-Ролстон, Кери Хенсдон, Эскрик, Рокингем, ты, маленький Картрет, ты, Роберт Дарси, граф Холдернес, ты, Вильям, виконт Хеттон, и ты, Ральф, герцог Монтегю, и все остальные, – я, Дэвид Дерри-Мойр, моряк английского флота, бросаю вам вызов и настоятельно предлагаю вам запастись секундантами и свидетелями; я буду ждать вас, чтобы встретиться лицом к лицу и грудь с грудью нынче же вечером, сейчас же или завтра, днем или ночью, при солнечном свете или при свете факелов, в любом месте, в любое время и на каких угодно условиях, всюду, где только хватит места, чтобы скрестить два клинка; вы хорошо сделаете, если осмотрите ваши пистолеты и лезвия ваших шпаг, ибо я имею намерение сделать вакантными ваши пэрства. Огль Кавендиш, прими меры предосторожности и вспомни свой девиз: «Cavendo tutus»<a href="ch2.xhtml#id147" class="a">[272]</a>. Мармедьюк Ленгдейл, ты поступишь благоразумно, если, по примеру твоего предка Гундольда, велишь нести за собою гроб. Джордж Бутс, граф Уорингтон, не видать тебе больше своего графства в Честере, своего критского лабиринта и высоких башен Денгем-Месси. Что касается лорда Вогана, он достаточно молод, чтобы говорить дерзости, но слишком стар, чтобы отвечать за них; поэтому за его слова я привлеку к ответу его племянника Ричарда Вогана, депутата города Мерионета в палате общин. Тебя, Джон Кемпбел, граф Гринич, я убью, как Эгон убил Мэтеса, но только честным ударом, а не сзади, так как я привык становиться к острию шпаги грудью, а не спиной. Это решено, милорды. А теперь, если угодно, прибегайте к колдовству, обращайтесь к гадалкам, натирайте себе тело мазями и снадобьями, делающими его неуязвимым, вешайте себе на шею дьявольские или Богородицыны ладанки, – я буду драться с вами, невзирая ни на какие благословения или колдовские заговоры, и не стану ощупывать вас, чтобы узнать, нет ли на вас талисманов. Я буду биться с вами пеший или конный. На любом перекрестке, если хотите – на Пикадилли или Черинг-Кроссе, пусть даже для нашего поединка разворотят мостовую, как это сделали во дворе Лувра для Гиза с Бассомпьером. Слышите вы? Я вызываю вас всех! Дорм, граф Карнарвон, я заставлю тебя проглотить мою шпагу до рукоятки, как это сделал Мароль с Лилем-Мариво; тогда увидим, будешь ли ты смеяться, милорд. Ты, Барлингтон, похожий на семнадцатилетнюю девчонку, ты можешь выбрать себе место для могилы, где пожелаешь: на лужайке ли твоего Миддлсекского замка или в твоем Лендерсбергском саду в Йоркшире. Ставлю в известность ваши милости, что я не терплю дерзостей и накажу вас по заслугам, милорды. Я не допущу, чтобы вы глумились над лордом Ферменом Кленчарли. Он лучше вас. Как Кленчарли, он не менее знатен, чем вы, а как Гуинплен, он обладает умом, которого у вас нет. Я объявляю его дело своим делом, оскорбление, нанесенное ему, считаю нанесенным мне и возмущен вашими издевательствами над ним. Посмотрим, кто из нас останется жив, ибо я вызываю вас, слышите ли вы, на смертный бой; оружие и способ смерти выбирайте какие вам угодно, но так как вы в то же время и джентльмены и грубые скоты, я соразмеряю свой вызов с вашими качествами и предлагаю вам все существующие способы взаимного истребления, начиная с дворянского оружия – шпаги и кончая простонародной кулачной расправой.</p><p class="p1">Этот яростный поток был встречен всеми молодыми людьми высокомерной улыбкой.</p><p class="p1">– Согласны, – ответили они.</p><p class="p1">– Я выбираю пистолет, – сказал Барлингтон.</p><p class="p1">– Я, – заявил Эскрик, – выбираю старинный поединок в огороженном месте на палицах и на кинжалах.</p><p class="p1">– Я, – сказал Холдернес, – рукопашную схватку на двух ножах, одном длинном и одном коротком.</p><p class="p1">– Лорд Дэвид, – ответил граф Тенет, – ты шотландец, и я выбираю палаш.</p><p class="p1">– Я – шпагу, – сказал Рокингем.</p><p class="p1">– Я, – объявил герцог Ральф, – предпочитаю бокс. Это благороднее!</p><p class="p1">Гуинплен вышел из темноты.</p><p class="p1">Он направился к человеку, который до сих пор назывался Том-Джим-Джеком, но теперь оказался кем-то совсем другим.</p><p class="p1">– Благодарю вас, – сказал он, – но это касается только меня.</p><p class="p1">Все обернулись к нему.</p><p class="p1">Гуинплен подошел еще ближе. Какая-то сила толкала его к тому, кого все называли лордом Дэвидом и кто стал его защитником, если не более. Лорд Дэвид отступил.</p><p class="p1">– А! – воскликнул лорд Дэвид. – Это вы! Вы здесь? Прекрасно. Мне и вам надо сказать несколько слов Вы осмелились говорить о женщине, которая сперва любила лорда Линнея Кленчарли, а потом короля Карла Второго?</p><p class="p1">– Да, говорил.</p><p class="p1">– Сударь, вы оскорбили мою мать.</p><p class="p1">– Вашу мать? – воскликнул Гуинплен. – Значит… я чувствовал это… значит, мы…</p><p class="p1">– Братья, – закончил лорд Дэвид.</p><p class="p1">И он дал Гуинплену пощечину.</p><p class="p1">– Мы – братья, – повторил он. – Поэтому мы можем драться. Поединок возможен только между равными. Кто же мне более равен, чем собственный брат? Я пришлю к вам секундантов. Завтра мы будем драться насмерть.</p></span></span></span></span>
