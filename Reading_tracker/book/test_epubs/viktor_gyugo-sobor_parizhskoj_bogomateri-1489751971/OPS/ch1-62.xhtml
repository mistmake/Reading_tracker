<p class="p">4. Появление тучи, не похожей на другие</p>
</div><p class="p1">Старик, которого главарь шайки назвал сперва безумцем, а затем мудрецом, больше не покидал носовой части судна. Как только миновали Чембурскую мель, его внимание разделилось между небом и океаном. Он то опускал глаза, то снова поднимал их; особенно пристально всматривался он в направлении северо-востока.</p><p class="p1">Судохозяин передал руль одному из матросов, перешагнул через люк канатного ящика, перешел шкафут и очутился на баке.</p><p class="p1">Приблизившись к старику, он остановился в нескользких шагах позади него и, прижав локти к бокам, расставив руки, склонил голову набок; выкатив глаза, приподняв брови, он улыбнулся одними уголками губ, и лицо его выразило любопытство, находившееся на грани между иронией и уважением.</p><p class="p1">Старик, потому ли, что он имел привычку беседовать иногда сам с собою, или потому, что чувствовал у себя за спиной чье-то присутствие, вызывающее его на разговор, принялся разглагольствовать, ни к кому не обращаясь и глядя на расстилавшийся перед ним водный простор:</p><p class="p1">– Меридиан, от которого исчисляется прямое восхождение, в нашем веке обозначен четырьмя звездами: Полярной, креслом Кассиопеи, головой Андромеды и звездой Альгениб, находящейся в созвездии Пегаса. Но ни одной из них не видать…</p><p class="p1">Слова эти, прозвучавшие еле слышно, были обронены как будто безотчетно, словно сознание этого человека не принимало никакого участия в их произнесении. Они слетали с его губ и пропадали в воздухе. Монолог – это дым духовного огня, горящего внутри нас.</p><p class="p1">Владелец урки перебил его:</p><p class="p1">– Сеньор…</p><p class="p1">Старик, быть может тугой на ухо, а может быть, глубоко погруженный в свои думы, не расслышал обращения и продолжал:</p><p class="p1">– Слишком мало звезд, и слишком много ветра. Ветер то и дело меняет направление и устремляется на берег. Он обрушивается на него отвесно. Это происходит оттого, что на суше теплее, чем на море. Воздух над сушею легче. Холодный и тяжелый морской ветер устремляется на землю и вытесняет теплый воздух. Потому-то на большой высоте ветры дуют на землю со всех сторон. Следовало бы делать длинные галсы между параллелью теоретически исчисленной и параллелью предполагаемой. В тех случаях, когда наблюдаемая широта уклоняется от широты предполагаемой не больше, чем на три минуты на каждые десять лье и на четыре минуты на каждые двадцать лье, можно не сомневаться в правильности курса.</p><p class="p1">Судохозяин поклонился, но старик по-прежнему не замечал его. Закутанный в какое-то одеяние, похожее на мантию доктора Оксфордского или Геттингенского университета, он стоял неподвижно, не меняя своей надменно-суровой позы, и пристально смотрел на море, как человек, хорошо изучивший и водную стихию и людей. Он вглядывался в волны, как будто собираясь принять участие в их шумной беседе и сообщить им важную весть. В нем было нечто, напоминавшее и средневекового алхимика и авгура древнего Рима. У него был вид ученого, претендующего на знание последних тайн природы.</p><p class="p1">Он продолжал свой монолог, быть может в расчете на то, что кто-то его слушает.</p><p class="p1">– Можно было бы бороться, будь у нас вместо румпеля штурвал. При скорости в четыре лье в час давление в тридцать фунтов на штурвал может дать триста тысяч фунтов полезного действия. И даже больше, ибо в некоторых случаях удается выгадать лишних два оборота.</p><p class="p1">Судохозяин вторично поклонился и произнес:</p><p class="p1">– Сеньор…</p><p class="p1">Старик пристально посмотрел на него. Он повернул только голову, не изменив своей позы.</p><p class="p1">– Называй меня доктором.</p><p class="p1">– Сеньор доктор, я владелец судна.</p><p class="p1">– Хорошо, – ответил «доктор».</p><p class="p1">Доктор – отныне и мы будем называть его так – по-видимому, согласился вступить в разговор.</p><p class="p1">– Хозяин, есть у тебя английский октант?</p><p class="p1">– Нет.</p><p class="p1">– Без английского октанта ты не в состоянии определять высоту ни впереди, ни позади судна.</p><p class="p1">– Баски, – возразил судовладелец, – умели определять высоту, когда никаких англичан еще на свете не было.</p><p class="p1">– Берегись приводиться к ветру.</p><p class="p1">– Я припускаюсь, когда это нужно.</p><p class="p1">– Ты измерил скорость хода корабля?</p><p class="p1">– Да.</p><p class="p1">– Когда?</p><p class="p1">– Только что.</p><p class="p1">– Чем?</p><p class="p1">– Лагом.</p><p class="p1">– А ты осмотрел деревянный сектор лага?</p><p class="p1">– Да.</p><p class="p1">– Песочные часы верно показывают свои тридцать секунд?</p><p class="p1">– Да.</p><p class="p1">– Ты уверен, что песок не расширил трением отверстия между двумя склянками?</p><p class="p1">– Да.</p><p class="p1">– Проверил ли ты песочные часы при помощи мушкетной пули, подвешенной…</p><p class="p1">– На ровной нитке из смоченной пеньки? Разумеется.</p><p class="p1">– Хорошо ли ты навощил нитку, чтобы она не растянулась?</p><p class="p1">– Да.</p><p class="p1">– А лаг ты проверил?</p><p class="p1">– Я проверил песочные часы посредством мушкетной пули и лаг посредством пушечного ядра.</p><p class="p1">– Каков диаметр твоего ядра?</p><p class="p1">– Один фут.</p><p class="p1">– Калибр вполне достаточный.</p><p class="p1">– Это старинное ядро с нашей старой военной урки «Касс де Паргран».</p><p class="p1">– Она входила в состав Армады?</p><p class="p1">– Да.</p><p class="p1">– На ней было шестьсот солдат, пятьдесят матросов и двадцать пять пушек?</p><p class="p1">– Про то знает море, поглотившее их.</p><p class="p1">– А как определил ты силу удара воды об ядро?</p><p class="p1">– При помощи немецкого безмена.</p><p class="p1">– Принял ли ты в расчет напор волны на канат, к которому привязано ядро?</p><p class="p1">– Да.</p><p class="p1">– Что же у тебя получилось в итоге?</p><p class="p1">– Сто семьдесят фунтов.</p><p class="p1">– Иными словами, урка делает четыре французских лье в час.</p><p class="p1">– Или три голландских лье.</p><p class="p1">– Но ведь это только превышение скорости хода над быстротою морского течения.</p><p class="p1">– Конечно.</p><p class="p1">– Куда ты направляешься?</p><p class="p1">– В знакомую мне бухту между Лойолой и Сан-Себастьяном.</p><p class="p1">– Выходи поскорее на параллель, на которой лежит эта бухта.</p><p class="p1">– Да, надо как можно меньше отклоняться в сторону.</p><p class="p1">– Остерегайся ветров и течений. Ветры усиливают течения.</p><p class="p1">– Предатели!</p><p class="p1">– Не надо ругательств! Море все слышит. Избегай бранных слов. Наблюдай – и только.</p><p class="p1">– Я наблюдал и наблюдаю. Ветер дует сейчас навстречу поднимающемуся приливу, но скоро, как только начнется отлив, он будет дуть в одном направлении с ним, и тогда мы полетим стрелой.</p><p class="p1">– Есть у тебя карта?</p><p class="p1">– Нет. Для этого моря у меня нет карты.</p><p class="p1">– Значит, ты идешь вслепую?</p><p class="p1">– Нет. У меня компас.</p><p class="p1">– Компас – один глаз, а карта – второй.</p><p class="p1">– И кривой видит.</p><p class="p1">– Каким образом ты измеряешь угол, образуемый курсом судна и килем?</p><p class="p1">– У меня есть компас, а остальное – дело догадки.</p><p class="p1">– Догадка хороша, но знание лучше.</p><p class="p1">– Христофор Колумб основывался на догадке.</p><p class="p1">– Когда во время бури стрелка компаса мечется как угорелая, никто уже не знает, за какой ветер следует ухватиться, и дело кончается тем, что теряешь всякое направление. Осел с дорожной картой стоит большего, чем прорицатель с его оракулом.</p><p class="p1">– Но ветер пока еще не предвещает бури, и я не вижу повода к тревоге.</p><p class="p1">– Корабли – мухи в паутине моря.</p><p class="p1">– Сейчас ни волны, ни ветер не внушают никаких опасений.</p><p class="p1">– Черные точки, качающиеся на волне, – вот что такое люди в океане.</p><p class="p1">– Я не предвижу ничего дурного этой ночью.</p><p class="p1">– Берегись, может произойти такая кутерьма, что ты и не выпутаешься из нее.</p><p class="p1">– Пока все обстоит благополучно.</p><p class="p1">Взор доктора устремился на северо-восток.</p><p class="p1">Владелец урки продолжал:</p><p class="p1">– Только бы добраться до Гасконского залива, а там я отвечаю за все. Еще бы! Там я как у себя дома. Гасконский залив я знаю, как свой карман. Хотя эта лоханка довольно часто бурлит от ярости, но мне известны все ее глубокие и мелкие места, все особенности фарватера: близ Сан-Киприано – ил, близ Сисарки – раковины, у мыса Пеньяс – песок, у Буко-де-Мимисана – мелкие гальки; я знаю, какого цвета каждый камешек.</p><p class="p1">Он остановился: доктор не слушал его.</p><p class="p1">Доктор внимательно смотрел на северо-восток. Что-то необычайное появилось вдруг на его бесстрастном лице. Оно выражало ту степень испуга, какую только способна выразить каменная маска. Из его уст вырвалось восклицание:</p><p class="p1">– В добрый час!</p><p class="p1">Его глаза, ставшие теперь совершенно круглыми, как у совы, расширились от ужаса при виде еле заметной точки на горизонте.</p><p class="p1">Он прибавил:</p><p class="p1">– Это справедливо. Что касается меня, я согласен.</p><p class="p1">Судовладелец смотрел на него.</p><p class="p1">Доктор, обращаясь не то к самому себе, не то к кому-то, притаившемуся в морской пучине, повторил:</p><p class="p1">– Я говорю: да.</p><p class="p1">Он умолк, шире раскрыл глаза, с удвоенным вниманием вглядываясь в то, что представилось его взору, и произнес:</p><p class="p1">– Оно надвигается издалека, но отлично знает, что делает.</p><p class="p1">Часть небосклона, противоположная закату, к которой неотрывно были прикованы и взор и мысль доктора, была освещена, как днем, отблеском заходившего солнца. Этот отрезок, резко очерченный окружавшими его клочьями сероватого тумана, был синего цвета, но скорее свинцового, чем лазурного оттенка.</p><p class="p1">Доктор, всем корпусом повернувшись к морю и уже не глядя на судовладельца, указал пальцем на эту часть неба:</p><p class="p1">– Видишь, хозяин?</p><p class="p1">– Что?</p><p class="p1">– Вот это.</p><p class="p1">– Что именно?</p><p class="p1">– Вон там.</p><p class="p1">– Синеву? Вижу.</p><p class="p1">– Что это такое?</p><p class="p1">– Клочок неба.</p><p class="p1">– Это для тех, кто думает попасть на небо, – возразил доктор. – Для тех же, кто туда не попадет, это совсем иное.</p><p class="p1">Он подчеркнул свои загадочные слова странным взглядом, потонувшим в вечернем полумраке.</p><p class="p1">Наступило молчание.</p><p class="p1">Владелец урки, вспомнив двойственную характеристику, данную старику главарем шайки, мысленно задал себе вопрос: «Кто же этот человек? Безумец или мудрец?»</p><p class="p1">Костлявый палец доктора все еще был направлен на мутно-синий край горизонта.</p><p class="p1">– Синяя туча-хуже черной, – произнес доктор.</p><p class="p1">И прибавил:</p><p class="p1">– Это снеговая туча.</p><p class="p1">– La nube de la nieve, – проговорил хозяин, переведя эти слова на родной язык, для того чтобы лучше уяснить себе их смысл.</p><p class="p1">– Знаешь ты, что такое снеговая туча?</p><p class="p1">– Нет.</p><p class="p1">– Так скоро узнаешь.</p><p class="p1">Судовладелец впился взглядом в горизонт. Всматриваясь в тучу, он бормотал сквозь зубы:</p><p class="p1">– Месяц бурных ветров, месяц дождей, кашляющий январь да плачущий февраль – вот и вся наша астурийская зима. Дождь у нас теплый. Снег у нас выпадает только в горах. Зато там берегись лавины! Лавина ничего не разбирает: лавина – это зверь.</p><p class="p1">– А смерч – чудовище, – подхватил доктор.</p><p class="p1">И, помолчав немного, прибавил:</p><p class="p1">– Вот он надвигается.</p><p class="p1">Затем продолжал:</p><p class="p1">– Сразу начинает дуть несколько ветров: порывистый с запада и другой, очень медленный, с востока.</p><p class="p1">– Восточный – это лицемер, – заметил судовладелец.</p><p class="p1">Синяя туча все росла.</p><p class="p1">– Если снег, – продолжал доктор, – страшен, когда он скатывается с горы, сам посуди, каков он, когда обрушивается с полюса.</p><p class="p1">Глаза его стали совершенно стеклянными; казалось, туча, сгущавшаяся на горизонте, одновременно сгущалась и на его лице.</p><p class="p1">Он продолжал задумчиво:</p><p class="p1">– С каждой минутой близится ужасный час. Приподымается завеса над предначертаниями верховной воли.</p><p class="p1">Владелец урки опять задал себе вопрос: «Не сумасшедший ли это?»</p><p class="p1">– Хозяин, – снова заговорил доктор, не отрывая взгляда от тучи, – ты много плавал в Ла-Манше?</p><p class="p1">– Сегодня в первый раз, – ответил тот.</p><p class="p1">Доктор, поглощенный созерцанием синей тучи, переполненный чувством тревоги, не взволновался от этого ответа, – так губка, пропитавшаяся влагой, уже не способна вобрать в себя ни одной лишней капли. В ответ на слова судохозяина он только слегка пожал плечами:</p><p class="p1">– Как же так?</p><p class="p1">– Я, сеньор доктор, обыкновенно плаваю только до Ирландии. Я делаю рейс от Фуэнтарабии до Блек-Харбора или до острова Акиля; называют его «остров», а на деле он состоит из двух островов. Иногда я захожу в Брачипульт, на побережье Уэльса. Но я никогда не спускался до Силлийсиих островов и этого моря не знаю.</p><p class="p1">– Плохо дело. Горе тому, кто с трудом разбирает азбуку океана! Ла-Манш – книга, которую надо читать бегло, Ла-Манш – сфинкс. Дно у него коварное.</p><p class="p1">– Здесь глубина двадцать пять брассов.</p><p class="p1">– Надо держать курс на запад, где глубина достигает пятидесяти пяти брассов, и не плыть на восток, где она всего лишь двадцать брассов.</p><p class="p1">– Мы будем бросать лот.</p><p class="p1">– Помни, Ла-Манш – море особенное. Вода здесь поднимается до пятидесяти футов при высокой воде и до двадцати пяти при низкой. Здесь спад воды – еще не отлив, а отлив – это еще не спад воды… Ага! Ты, кажется, испугался.</p><p class="p1">– Сегодня ночью будем бросать лот.</p><p class="p1">– Чтобы бросить лот, нужно остановиться, а это тебе не удастся.</p><p class="p1">– Почему?</p><p class="p1">– Не позволит ветер.</p><p class="p1">– Попробуем.</p><p class="p1">– Шквал, как шпага, воткнутая в ребра, лишает всякой свободы действий.</p><p class="p1">– Все равно будем бросать лот, сеньор доктор.</p><p class="p1">– Тебе не удастся даже поставить судно лагом к ветру.</p><p class="p1">– Бог поможет.</p><p class="p1">– Будь осторожен в словах. Не произноси всуе грозного имени.</p><p class="p1">– А все-таки я буду бросать лот.</p><p class="p1">– Будь скромнее. Сейчас ветер надает тебе пощечин.</p><p class="p1">– Я хочу сказать, что постараюсь бросить лот.</p><p class="p1">– Волны не дадут свинцу опуститься на дно, и линь оборвется. Видно, что ты впервые в этих местах.</p><p class="p1">– Ну да, я уже говорил вам…</p><p class="p1">– В таком случае слушай, хозяин…</p><p class="p1">Это «слушай» было сказано таким повелительным тоном, что судовладелец покорно склонил голову.</p><p class="p1">– Я слушаю, сеньор доктор.</p><p class="p1">– Ссади галсы на бакборте и натяни шкоты на штирборте.</p><p class="p1">– Что вы хотите этим сказать?</p><p class="p1">– Сворачивай на запад.</p><p class="p1">– Карамба!</p><p class="p1">– Сворачивай на запад.</p><p class="p1">– Невозможно.</p><p class="p1">– Как хочешь. Я это говорю, чтобы спасти других. Что касается меня, я готов покориться судьбе.</p><p class="p1">– Но, сеньор доктор, повернуть на запад…</p><p class="p1">– Да, хозяин.</p><p class="p1">– Значит идти против ветра.</p><p class="p1">– Да, хозяин.</p><p class="p1">– Будет дьявольская качка!</p><p class="p1">– Выбирай другие слова. Да, качка будет, хозяин.</p><p class="p1">– Судно встанет на дыбы.</p><p class="p1">– Да, хозяин.</p><p class="p1">– Может и мачта сломаться.</p><p class="p1">– Может.</p><p class="p1">– Вы хотите, чтобы я взял курс на запад?</p><p class="p1">– Да.</p><p class="p1">– Не могу.</p><p class="p1">– В таком случае справляйся с морем, как знаешь.</p><p class="p1">– Пусть только ветер переменится.</p><p class="p1">– Он не переменится всю ночь.</p><p class="p1">– Почему?</p><p class="p1">– Он дует на протяжении тысячи двухсот лье.</p><p class="p1">– Как же идти против такого ветра? Невозможно.</p><p class="p1">– Возьми курс на запад, говорю тебе.</p><p class="p1">– Попытаюсь. Но нас все равно отнесет в сторону.</p><p class="p1">– То-то и опасно.</p><p class="p1">– Ветер гонит нас на восток.</p><p class="p1">– Не правь на восток.</p><p class="p1">– Почему?</p><p class="p1">– Знаешь, хозяин, как зовут сегодня нашу смерть?</p><p class="p1">– Нет.</p><p class="p1">– Ее зовут востоком.</p><p class="p1">– Буду править на запад.</p><p class="p1">Доктор посмотрел на судовладельца таким взглядом, как будто хотел запечатлеть в его мозгу какую-то мысль. Он повернулся к нему и, медленно отчеканивая слог за слогом, произнес:</p><p class="p1">– Если сегодня ночью, когда мы будем в открытом море, до нас долетит звон колокола, судно погибло.</p><p class="p1">Владелец урки с ужасом уставился на него:</p><p class="p1">– Что вы хотите этим сказать?</p><p class="p1">Доктор ничего не ответил. Его взор, оживившийся на мгновение, снова погас. Он опять смотрел куда-то внутрь себя и, казалось, не расслышал вопроса изумленного судохозяина. Его внимание целиком было поглощено тем, что происходило в нем самом. С его губ невольно сорвалась шепотом произнесенная фраза:</p><p class="p1">– Настало время омыться черным душам.</p><p class="p1">Судохозяин сделал выразительную гримасу, от которой его подбородок поднялся чуть не до самого носа.</p><p class="p1">– Он скорее сумасшедший, чем мудрец, – пробормотал он, отойдя в сторону.</p><p class="p1">Но все-таки повернул судно на запад.</p><p class="p1">А ветер крепчал, и волны вздымались все выше.</p></span><span id="id91"><div class="title6">
<p class="p">5. Хардкванон</p>
</div><p class="p1">Туман набухал, поднимался клубами на всем протяжении горизонта, словно какие-то незримые рты раздували мехи бури. Облака начинали принимать зловещие очертания.</p><p class="p1">Синяя туча заволокла большую часть небосвода. Она уже захватила и запад и восток. Она надвигалась против ветра. Такие противоречия свойственны природе ветров.</p><p class="p1">Море, за минуту перед тем вздымавшееся граненой, крупной чешуей, тетерь было словно покрыто кожей. Таков этот дракон. Это был уже не крокодил, а боа. Грязно-свинцового цвета кожа казалась толстой и морщилась тяжелыми складками. На ней вздувались круглые пузыри, похожие на нарывы, и тотчас же лопались. Пена напоминала собой струпья проказы.</p><p class="p1">Как раз в это мгновение урка, которую брошенный ребенок разглядел на горизонте, зажгла фонарь.</p><p class="p1">Прошло четверть часа.</p><p class="p1">Судохозяин стал искать глазами доктора, но его уже не было на палубе.</p><p class="p1">Как только владелец урки отошел от него, доктор, согнув свой нескладный высокий стан, спустился в каюту. Там он уселся на эзельгофте подле кухонной плиты, вынул из кармана чернильницу, обтянутую шагренью, и большой бумажник из кордовской кожи, достал из бумажника вчетверо сложенный кусок пожелтевшего, пятнистого, исписанного пергамента, развернул его, извлек из футляра перо, примостил бумажник на коленях, положил на него пергамент оборотной стороной вверх и при свете фонаря, выхватывавшего из мрака фигуру повара, принялся писать. Ему мешали удары волн о борт, он медленно выводил букву за буквой.</p><p class="p1">Занятый этим делом, доктор случайно кинул взгляд на флягу с водкой, к которой провансалец прикладывался каждый раз, когда подбрасывал перцу в котел, как будто советовался с ней насчет приправы.</p><p class="p1">Доктор обратил внимание на флягу не потому, что это была бутыль с водкой, а потому, что заметил на ее плетенке имя, выведенное красными прутьями на фоне белых. В каюте было достаточно светло: он без труда прочитал это имя.</p><p class="p1">Прервав свое занятие, доктор медленно произнес вполголоса:</p><p class="p1">– Хардкванон.</p><p class="p1">Затем обратился к повару:</p><p class="p1">– Я до сих пор как-то не замечал этой фляги. Разве она принадлежала Хардкванону?</p><p class="p1">– Нашему бедняге Хардкванону? – переспросил повар. – Да.</p><p class="p1">Доктор продолжал допытываться:</p><p class="p1">– Фламандцу Хардкванону?</p><p class="p1">– Да.</p><p class="p1">– Тому самому, что сидит в тюрьме?</p><p class="p1">– Да.</p><p class="p1">– В Четэмской башне?</p><p class="p1">– Да, это его фляга, – произнес повар, – он был мне приятель. Я храню ее как память. Когда-то мы еще свидимся с ним? Да, это его поясная фляга.</p><p class="p1">Доктор снова взялся за перо и опять начал с трудом выводить букву за буквой: строчки ложились криво, но он явно старался писать разборчиво. Рука у него тряслась от старости, судно сотрясала качка, и все же он довел до конца свою запись.</p><p class="p1">Он кончил во-время, ибо как раз в эту минуту налетел шквал.</p><p class="p1">Волны приступом пошли на урку, и все бывшие на борту почувствовали, что началась та ужасающая пляска, которой корабли встречают бурю.</p><p class="p1">Доктор встал и, несмотря на сильную качку удерживая равновесие, подошел к плите, высушил, насколько это было возможно, на огне только что написанные строки, снова сложил пергамент, сунул его в бумажник, а самый бумажник вместе с чернильницей спрятал в карман.</p><p class="p1">Плита благодаря своему остроумному устройству занимала далеко не последнее место среди оборудования урки; она была расположена в части судна, наименее подверженной качке. Однако теперь котел сильно трясло. Провансалец не спускал с него глаз.</p><p class="p1">– Похлебка из рыбы, – сказал он.</p><p class="p1">– Для рыбы, – поправил его доктор.</p><p class="p1">И возвратился на палубу.</p></span><span id="id92"><div class="title6">
<p class="p">6. Они уповают на помощь ветра</p>
</div><p class="p1">Охваченный все возраставшей тревогой, доктор постарался выяснить положение дел. Тот, кто в эту минуту оказался бы рядом с ним, мог бы расслышать сорвавшуюся с его уст фразу:</p><p class="p1">– Слишком сильна боковая качка и слишком слаба килевая.</p><p class="p1">И, поглощенный мрачным течением своих мыслей, он снова погрузился в раздумье, подобно тому как рудокоп спускается в шахту.</p><p class="p1">Размышления нисколько не мешали ему наблюдать за тем, что происходило на море. Наблюдать море – значит размышлять.</p><p class="p1">Начиналась жестокая пытка водной стихии, от века терзаемой бурями. Из морской пучины вырывался жалобный стон. На всем безмерном пространстве ее совершались зловещие приготовления. Доктор смотрел на все творившееся у него перед глазами, не упуская ни малейшей подробности. Но его взгляд не был взглядом созерцателя. Нельзя спокойно созерцать ад.</p><p class="p1">Начинался пока еще мало приметный сдвиг воздушных слоев, однако уже проявивший себя в смятении океана, усиливший ветер и волны, сгустивший тучи. Нет ничего более последовательного и вместе с тем более вздорного, чем океан. Неожиданные прихоти его соприродны его могуществу и составляют один из элементов величия океана. Его волна не ведает ни покоя, ни бесстрастия. Она сливается с другой волной, чтобы тотчас же отхлынуть назад. Она то нападает, то отступает. Ничто не сравнится с зрелищем бушующего моря. Как живописать эти почти невероятные в своей непрерывной смене провалы и взлеты, эти исполинские зыблющиеся холмы и ущелья, эти едва воздвигнутые и уже рушащиеся подпоры? Как изобразить эти кущи пены на гребнях сказочных гор? Здесь все неописуемо – и эта разверстая бездна, и ее угрюмо-тревожный вид, и ее совершенная безликость, и эта светотень, и низко нависшие тучи, и внезапные разрывы облаков над головой, и их беспрестанное, неуловимое глазом таяние, и зловещий грохот, сопровождающий этот дикий хаос.</p><p class="p1">Ветер стал дуть прямо с севера. Ярость, с которой он налетал на судно, была как нельзя более кстати, ибо порывы его гнали урку от берегов Англии; владелец «Матутины» решил поднять все паруса. Вся в хлопьях пены, подгоняемая ветром, дувшим прямо в корму, урка неслась как будто вскачь, с бешеным весельем перепрыгивая с волны на волну. Беглецы заливались смехом. Они хлопали в ладоши, приветствуя волны, ветер, паруса, быстроту хода, свое бегство и неведомое будущее. Доктор, казалось, не замечал их; он был погружен в задумчивость.</p><p class="p1">Померкли последние лучи заката.</p><p class="p1">Они угасли как раз в ту минуту, когда ребенок, стоя на отдаленном утесе и пристально глядя на урку, потерял ее из виду. До этого мгновения его взор был прикован к судну. Какую роль в судьбе беглецов сыграл этот детский взор? Когда ребенок не мог уже ничего различить на горизонте, он повернулся и пошел на север, между тем как судно уносилось на юг.</p><p class="p1">Все потонуло во мраке ночи.</p></span><span id="id93"><div class="title6">
<p class="p">7. Священный ужас</p>
</div><p class="p1">А те, кого уносила на своем борту урка, с чувством радостного облегчения смотрели, как отступает все дальше и уменьшается в размерах враждебная земля. Мало-помалу перед ними, округляясь, все выше вздувалась мрачная поверхность океана, и в сумерках скрывались один за другим Портленд, Пербек, Тайнем, Киммридж и оба Матравера, длинный ряд мглистых утесов и усеянный маяками берег.</p><p class="p1">Англия скрылась из виду. Только море окружало теперь беглецов.</p><p class="p1">И вдруг наступила страшная темнота.</p><p class="p1">Ни расстояния, ни пространства уже не существовало; небо стало совершенно черным и непроницаемой завесой протянулось над судном. Медленно начал падать снег. Закружились первые хлопья. Казалось, это кружатся живые существа. В непроглядном мраке бушевал на просторе ветер. Люди почувствовали себя во власти стихии. На каждом шагу их подстерегала ловушка.</p><p class="p1">Именно такой глубокой тьмой обычно начинается в наших широтах полярный смерч.</p><p class="p1">Огромная бесформенная туча, похожая на брюхо гидры, тяжко нависла над океаном, в иных местах своей серо-свинцовой утробой вплотную соприкасаясь с волнами. Иногда она приникала к нему чудовищными присосками, похожими на лопнувшие мешки, которые втягивали в себя воду и выпускали клубы пара. Они поднимали то там, то здесь на поверхности волн конусообразные холмы пены.</p><p class="p1">Полярная буря обрушилась на урку, и урка ринулась в самую гущу ее. Шквал и судно устремились друг другу навстречу, словно бросились в рукопашную.</p><p class="p1">Во время этой первой неистовой схватки ни один парус не был убран, ни один кливер не спущен, не взят ни один риф – до такой степени бегство граничило с безумием. Мачта трещала и перегибалась назад, точно отпрянув в испуге.</p><p class="p1">Циклоны в нашем северном полушарии вращаются слева направо, в направлении часовой стрелки, и в своем поступательном движении проходят иногда до шестидесяти миль в час. Хотя урка оказалась всецело во власти яростного вихря, она держалась так, как держится судно при умеренном ветре, стараясь только идти наперерез волне, подставляя нос первому порыву ветра, правый борт – последующим, благодаря чему ей удавалось избегать ударов в корму и в борта. Такая полумера не принесла бы ни малейшей пользы, если бы ветер стал менять направление.</p><p class="p1">Откуда-то сверху, с недосягаемой высоты, доносился протяжный мощный гул.</p><p class="p1">Что можно сравнить с ревущей бездной? Это оглушительный звериный вой целого мира. То, что мы называем материей, это непознаваемое вещество, этот сплав неизмеримых сил, в действии которых обнаруживается едва ощутимая, повергающая нас в трепет воля, этот слепой хаос ночи, этот непостижимый Пан иногда издает крик – странный, долгий, упорный, протяжный крик, еще не ставший словом, но силою своей превосходящий гром. Этот крик и есть голос урагана. Другие голоса – песни, мелодии, возгласы, речь – исходят из гнезд, из нор, из жилищ, они принадлежат наседкам, воркующим влюбленным, брачующимся парам; голос же урагана – это голос из великого Ничто, которое есть Все. Живые голоса выражают душу Вселенной, тогда как голосом урагана вопит чудовище, ревет бесформенное. От его косноязычных вещаний захватывает дух, объемлет ужас. Гулы несутся к человеку со всех сторон. Они перекликаются над его головой. Они то повышаются, то понижаются, плывут в воздухе волнами звуков, поражают разум тысячью диких неожиданностей, то разражаясь над самым ухом пронзительной фанфарой, то исходя хрипами где-то вдалеке; головокружительный гам, похожий на чей-то говор, – да это и в самом деле говор; это тщится говорить сама природа, это ее чудовищный лепет. В этом крике новорожденного глухо прорывается трепетный голос необъятного мрака, обреченного на длительное, неизбывное страдание, то приемлющего, то отвергающего свое иго. Чаще всего это напоминает бред безумца, приступ душевного недуга; это скорее эпилептические судороги, чем сила, направленная к определенной цели; кажется, будто видишь воочию бесконечность, бьющуюся в припадке падучей. Временами начинает казаться, что стихии предъявляют своя встречные права и хаос покушается снова завладеть Вселенной. Временами это жалобный стон причитающего и в чем-то оправдывающегося пространства, нечто вроде защитительной речи, произносимой целым миром; в такие минуты приходит в голову, что вся Вселенная ведет спор; прислушиваешься, стараясь уловить страшные доводы за и против; иногда стон, вырывающийся из тьмы, неопровержим, как логический силлогизм. В неизъяснимом смущении останавливается перед этим человеческая мысль. Вот где источник возникновения всех родов мифологии и политеизма. Ужас, вызываемый этим оглушительным и невнятным рокотом, усугубляется мгновенно возникающими и столь же быстро исчезающими фантастическими образами сверхчеловеческих существ: еле различимые лики эвменид, облакоподобная грудь фурий, адские химеры, в реальности которых почти невозможно усомниться. Нет ничего страшнее этих рыданий, взрывов хохота, многообразных возгласов, этих непостижимых вопросов и ответов, этих призывов о помощи, обращенных к неведомым союзникам. Человек теряется, слыша эти жуткие заклинания. Он отступает перед загадкой свирепых и жалобных воплей. Каков их скрытый смысл? Что означают они? Кому угрожают, кого умоляют они? В них чудится бешеная злоба. Яростно перекликается бездна с бездной, воздух с водою, ветер с волной, дождь с утесом, зенит с надиром, звезды с морскою пеной, несется вой пучины, сбросившей с себя намордник, – таков этот бунт, в который замешалась еще и таинственная распря каких-то злобных духов.</p><p class="p1">Многоречивость ночи столь же зловеща, как и ее безмолвие. В ней чувствуется гнев неведомого.</p><p class="p1">Ночь скрывает чье-то присутствие. Но чье?</p><p class="p1">Впрочем, следует различать ночь и потемки. Ночь заключает в себе нечто единое; в потемках есть известная множественность. Недаром грамматика, со свойственной ей последовательностью, не допускает единственного числа для слова «потемки». Ночь – одна, потемок много.</p><p class="p1">Разрозненное, беглое, зыбкое, пагубное – вот что представляет собою покров ночной тайны. Земля пропадает у нас под ногами, вместо нее возникает иная реальность.</p><p class="p1">В беспредельном и смутном мраке чувствуется присутствие чего-то или кого-то живого, но от этого живого веет на нас холодом смерти. Когда закончится наш земной путь, когда этот мрак станет нам светом, тогда и мы станем частью этого неведомого мира. А пока – он протягивает к нам руку. Темнота – его рукопожатие. Ночь налагает свою руку на нашу душу. Бывают ужасные и торжественные мгновения, когда мы чувствуем, как овладевает нами этот посмертный мир.</p><p class="p1">Нигде эта близость неведомого не ощущается более явственно, чем на море, во время бури. Здесь ужас возрастает от фантастической обстановки. Древний тучегонитель, по своему произволу меняющий течение людских жизней, располагает здесь всем, что ему требуется для осуществления любой своей причуды: непостоянной, буйной стихией и рассеянными повсюду равнодушными силами. Буря, природа которой остается для нас тайной, только исполняет приказания, ежеминутно повинуясь внушениям чьей-то мнимой или действительной воли.</p><p class="p1">Поэты всех времен называли это прихотью волн.</p><p class="p1">Но прихоти не существует.</p><p class="p1">Явления, повергающие нас в недоумение и именуемые нами случайностью в природе и случаем в человеческой жизни, – следствия законов, сущность которых мы только начинаем постигать.</p></span><span id="id94"><div class="title6">
<p class="p">8. Nix et nox – Снег и ночь</p>
</div><p class="p1">Характерным признаком снежной бури является ее чернота. Обычная картина во время грозы – помрачневшее море или земля и свинцовое небо – резко изменяется: небо становится черным, океан – белым. Внизу – пена, вверху – мрак. Горизонт заслонен стеною мглы, зенит занавешен крепом. Буря напоминает внутренность собора, задрапированную траурной материей. Но никакого освещения в этом соборе нет. Нет ни огней святого Эльма на гребнях волн, нет ни одной искорки, ни намека на фосфоресценцию – куда ни глянь, сплошной мрак. Полярный циклон тем и отличается, между прочим, от циклона тропического, что один из них зажигает все огни, другой гасит их все до последнего. Над миром внезапно вырастает давящий каменный свод. В непроглядной тьме падают с неба, крутясь в воздухе, белые пушинки и постепенно опускаются в море. Пушинки эти не что иное, как снежные хлопья, – они порхают и кружатся в воздухе. Как будто с погребального покрова, раскинутого в небе срываются серебряные блестки и ожившими слезами падают одна за другой. Сеется снег, дует яростный северный ветер. Чернота, испещренная белыми точками, беснование во мраке, смятение перед разверзшейся могилой, ураган под катафалком – вот что представляет собою снежная буря.</p><p class="p1">Внизу волнуется океан, скрывающий страшные, неизведанные глубины.</p><p class="p1">При полярном ветре, насыщенном электричеством, хлопья снега мгновенно превращаются в градины, и воздух пронизывают маленькие ядра. Обстреливаемая этой картечью, поверхность моря кипит.</p><p class="p1">Ни одного удара грома. Во время полярной бури молния безмолвствует, и про нее можно сказать то же, что говорят иногда про кошку: «Она способна испепелить взглядом». Это – грозно разверстая пасть, не знающая пощады. Снежная буря – буря слепая и немая. Сплошь и рядом после того, как она пронеслась, корабли тоже становятся слепыми, а матросы немыми.</p><p class="p1">Выбраться из этой бездны нелегко.</p><p class="p1">Было бы, однако, ошибкой думать, что в снежную бурю кораблекрушение неизбежно. Датские рыболовы из Диско и Балезена, охотники за черными китами, Хирн, отправившийся к Берингову проливу отыскивать устье реки Медных Залежей, Гудсон, Мекензи, Ванкувер, Росс, Дюмон-Дюрвиль – все они за полярным кругом попадали в полосу страшных снежных бурь и все же остались невредимы.</p><p class="p1">Навстречу такой буре и устремилась дерзко урка, распустив все паруса. Безумие против безумия. Когда Монтгомери, спасаясь бегством из Руана, приказал гребцам своей галеры налечь на весла, чтобы с размаху прорвать цепь, загораживающую Сену у Буйля, он действовал с той же отвагой.</p><p class="p1">«Матутина» летела стрелой. По временам, несясь под парусами, она давала такой ужасный крен, что угол, образуемый ее бортом и поверхностью моря, не превосходил пятнадцати градусов, но ее отличный закругленный киль прилегал к волне, словно приклеенный. Киль противостоял напору урагана. Носовая часть судна освещалась фонарем. Туча, с приближением которой усилился ветер, все ниже нависала над океаном, суживая и поглощая пространство вокруг урки. Ни одной чайки. Ни одной ласточки, гнездящейся на скалах. Ничего, кроме снега. Клочок водной поверхности, освещенный фонарем впереди корабля, внушал ужас. На нем вздымались три-четыре вала исполинских размеров.</p><p class="p1">Время от времени огромная молния цвета красной меди вспыхивала, рассекая черные напластования тьмы от зенита до горизонта. Прорезанная ее алым сверканием, толща туч казалась еще более грозной. Пламя пожара, внезапно охватывавшего ее глубины, озаряя на миг передние облака и хаотическое их нагромождение вдалеке, открывало взорам всю бездну. На этом огненном фоне хлопья казались черными бабочками, залетевшими в пылающую печь. Потом все гасло.</p><p class="p1">После первого натиска ураган, продолжая подгонять урку, принялся реветь глухим басом. Это – вторая фаза, фаза зловещего замирания грохота. Нет ничего тревожнее такого монолога бури. Этот угрюмый речитатив как будто прерывает на время борьбу таинственных противников и свидетельствует о том, что в мире неведомого кто-то стоит на страже.</p><p class="p1">Урка по-прежнему с безумной скоростью мчалась вперед. Оба ее главных паруса были напряжены до предела. Небо и море стали чернильного цвета, брызги пены взлетали выше мачты. Потоки воды то и дело захлестывали палубу, и всякий раз, когда в боковой качке судно накренялось то правым, то левым бортом, клюзы, подобно раскрытым ртам, изрыгали пену обратно в море. Женщины укрылись в каюте, но мужчины оставались на палубе. Снежный вихрь слепил им глаза. Волны плевали им прямо в лицо. Все вокруг было охвачено неистовством.</p><p class="p1">В эту минуту главарь шайки, стоявший на корме, на транце, уцепившись одной рукой за ванты, другой сорвал с головы платок и, размахивая им при свете фонаря, с развевающимися по ветру волосами, с лицом, просиявшим от горделивой радости, опьяненный дыханием бури, крикнул:</p><p class="p1">– Мы свободны!</p><p class="p1">– Свободны! Свободны! Свободны! – вторили ему беглецы.</p><p class="p1">И вся шайка, держась за снасти, выстроилась на палубе.</p><p class="p1">– Ура! – крикнул вожак.</p><p class="p1">И шайка проревела в бурю:</p><p class="p1">– Ура!</p><p class="p1">Не успел еще замереть этот крик, заглушенный воем ветра, как на противоположном конце судна раздался громкий суровый голос:</p><p class="p1">– Молчать!</p><p class="p1">Все повернули головы в ту сторону.</p><p class="p1">Они узнали голос доктора. Вокруг царила непроглядная тьма; доктор прислонился к мачте, его высокая худая фигура сливалась с нею, его совсем не было видно.</p><p class="p1">Голос продолжал:</p><p class="p1">– Слушайте!</p><p class="p1">Все замолкли.</p><p class="p1">И тогда во мраке явственно прозвучал звон колокола.</p></span><span id="id95"><div class="title6">
<p class="p">9. Бурное море предостерегает</p>
</div><p class="p1">Владелец урки, державший румпель, разразился хохотом:</p><p class="p1">– Колокол! Отлично! Мы идем левым галсом. Что означает этот колокол? Только одно: вправо от нас земля.</p><p class="p1">Медленно выговаривая каждое слово, доктор твердо сказал:</p><p class="p1">– Вправо от нас нет земли.</p><p class="p1">– Есть! – крикнул судохозяин.</p><p class="p1">– Нет.</p><p class="p1">– Но ведь звон-то доносится с земли.</p><p class="p1">– Этот звон, – ответил доктор, – доносится с моря.</p><p class="p1">Даже наиболее бесстрашные из беглецов вздрогнули.</p><p class="p1">У входа в каюту, словно призраки, вызванные заклинанием, показались испуганные женщины. Доктор сделал шаг вперед, и его высокий черный силуэт отделился от мачты. Звон колокола был явственно слышен во мраке ночи.</p><p class="p1">– Среди моря, на полпути между Портлендом и Ла-Маншским архипелагом, находится буй, предостерегающий суда об опасности. Буй этот цепями прикреплен к отмели я плавает на поверхности воды. На буе на железных козлах подвешен колокол. В непогоду море, волнуясь, раскачивает буй, и колокол звонит. Этот колокол вы и слышите теперь.</p><p class="p1">Доктор выждал, чтобы улегся порыв ветра, и когда снова долетел звон колокола, продолжал:</p><p class="p1">– Слышать этот звон во время бури, когда дует северный ветер, равносильно смертному приговору. Почему? Сейчас объясню. Если вы слышите звуки колокола, то лишь потому, что их доносит ветер. Ветер дует с запада, а буруны Ориньи лежат на востоке. До вас не долетали бы эти звуки, не находись вы между буем и бурунами. Ветер гонит вас прямо на риф. Вы мчитесь навстречу опасности. Если бы судно не сбилось с курса, вы были бы в открытом море, на значительной глубине, и не слышали бы колокола. Ветер не доносил бы до вас его звона. Вы прошли бы около буя, не подозревая о его существовании. Мы сбились с пути. Колокол – это набат, возвещающий о кораблекрушении. А теперь решайте сами, как быть!</p><p class="p1">Во время речи доктора удары колокола, лишь слегка раскачиваемого утихшим ветром, стали реже; долетая через правильные промежутки, они как будто подтверждали слова старика. Казалось, в морской пучине раздается похоронный звон.</p><p class="p1">Задыхаясь от ужаса, беглецы внимали то голосу старика, то звону колокола.</p></span><span id="id96"><div class="title6">
<p class="p">10. Буря – лютая дикарка</p>
</div><p class="p1">Владелец урки схватил рупор.</p><p class="p1">– Cargate todo, hombres!<a href="ch2.xhtml#id40" class="a">[168]</a> Отдай шкоты! Тяни виралы! Спускай драйперы у нижних парусов! Забираем на запад! Подальше в море! Правь на буй! Правь на колокол! Там развернемся! Не все еще потеряно!</p><p class="p1">– Попробуйте, – сказал доктор.</p><p class="p1">Заметим здесь мимоходом, что этот буй, нечто вроде колокольни, был уничтожен в 1802 году. Старые моряки еще помнят его звон. Он предупреждал об опасности, но немного поздно.</p><p class="p1">Все кинулись исполнять приказания владельца урки. Уроженец Лангедока взял на себя роль третьего матроса. Работа закипела. Паруса не только убрали, но и закрепили; подтянули сезьни, завязали узлом нок-гордени, бак-гордени и гитовы, накрутили концы на стропы, превратив последние в ванты: наложили шкало на мачту; наглухо забили полупортики, благодаря чему судно оказалось как бы обнесенным стеной. Хотя все это делалось второпях, однако по всем правилам. Урка приняла вид гибнущего корабля. Но по мере того как она, убирая свой такелаж, уменьшалась в размерах, волны и ветер все свирепей обрушивались на нее. Валы достигали почти такой же высоты, какой бывают они за полярным кругом.</p><p class="p1">Ураган, словно палач, спешащий прикончить свою жертву, стал рвать урку на части. В мгновение ока она подверглась невероятному опустошению: марсели были сорваны, фальшборт снесен, галс-боканцы выбиты, ванты превращены в клочья, мачта сломана – все это с треском и грохотом разлетелось в разные стороны. Толстые перлини – и те не выдержали.</p><p class="p1">Магнитное напряжение, сопутствующее обычно снежным бурям, еще более способствовало разрыву снастей. Они лопались столько же от напора ветра, сколько от действия тока. Цепи, соскочив с блоков, больше не поддерживали рей. Скулы в носовой части и корма на всем протяжении от бизань-русленей до гакаборта сплющивались от страшного давления. Первой волною смыло компас вместе с нактоузом; второй унесло шлюпку, подвешенную по старинному астурийскому обычаю к бушприту; третьей сорвало блинда-рей; четвертой – статую Богородицы и фонарь.</p><p class="p1">Уцелел один лишь руль.</p><p class="p1">Фонарь заменили крупной гранатой, которую повесили на форштевне, наполнив ее горящей смолой и паклей.</p><p class="p1">Мачта, сломанная пополам, унизанная сверху донизу клочьями парусов, обрывками снастей, остатками блоков и рей, загромождала палубу. Падая, она пробила правый борт.</p><p class="p1">Судовладелец, не выпускавший ни на минуту румпеля, крикнул:</p><p class="p1">– Ничего еще не потеряно, пока мы можем управлять судном. Подводная часть совсем не повреждена! Давай сюда топоры! Топоры! Мачту в море! Расчищай палубу!</p><p class="p1">Экипаж и пассажиры работали с тем лихорадочным возбуждением, какое появляется у людей в самые решительные моменты жизни. Несколько взмахов топора, и дело было сделано.</p><p class="p1">Мачту выкинули за борт. Палуба была очищена.</p><p class="p1">– А теперь, – продолжал судохозяин, – возьмите фал и принайтовьте меня к рулю.</p><p class="p1">Его привязали к румпелю.</p><p class="p1">Пока его привязывали, он смеялся. Он крикнул морю:</p><p class="p1">– Реви, старина, реви! Видывал я и почище бури у мыса Мачичако!</p><p class="p1">Когда его всего обкрутили канатами, он обеими руками схватился за румпель и заорал в порыве восторга, который вызывает в нас борьба с опасностью:</p><p class="p1">– Все идет отлично! Слава Буглосской божьей матери! Держим курс на запад!</p><p class="p1">Внезапно сбоку налетела огромная волна и хлынула на корму. Во время бури не раз поднимается такой свирепый вал: как беспощадный тигр, он сначала крадется по морю ползком, потом с рычанием и скрежетом набрасывается на гибнущий корабль и превращает его в щепы. Вей кормовая часть «Матутины» скрылась под горою пены, и в ту же минуту среди черного хаоса налетевших хлябей раздался громкий треск. Когда пена схлынула и из воды снова показалась корма, на ней не было уже ни судохозяина, ни руля.</p><p class="p1">Все исчезло бесследно.</p><p class="p1">Руль вместе с привязанным к нему человеком унесло волной в ревущий водоворот.</p><p class="p1">Главарь шайки, пристально всматриваясь в окружавшую темноту, воскликнул:</p><p class="p1">– Te burlas de nosotros?<a href="ch2.xhtml#id39" class="a">[169]</a></p><p class="p1">Вслед за этим негодующим криком раздался другой:</p><p class="p1">– Бросим якорь! Спасем хозяина!</p><p class="p1">Кинулись к кабестану. Отдали якорь. На урках бывает только один якорь. Попытка привела к тому, что «Матутина» потеряла свой единственный якорь. Дно было скалистое, волнение неистовое. Канат порвался, как волосок.</p><p class="p1">Якорь остался на дне морском.</p><p class="p1">От водореза сохранилась лишь фигура ангела, глядевшего в подзорную трубу.</p><p class="p1">С этой минуты урка сделалась добычей волн. «Матутина» была безнадежно оголена. Это судно, еще совсем недавно крылатое, можно сказать – грозное в своем стремительном беге, было теперь совершенно беспомощно. Вся оснастка была сорвана и пришла в полную негодность. Точно окаменев, оно без сопротивления подчинилось яростному произволу волн. В несколько мгновений парящий орел превратился в ползающего калеку: такие метаморфозы возможны только на море.</p><p class="p1">Порывы шторма ежеминутно возрастали, приобретая чудовищную силу. У бури – исполинские легкие. Она беспрестанно нагнетает новый ужас, сгущает мрак, хотя он как будто и не допускает, по самой своей сущности, никаких градаций. Колокол посреди моря отчаянно гудел, словно его раскачивала чья-то безжалостная рука.</p><p class="p1">«Матутина» неслась по воле волн. Так носится пробка, перескакивая с гребня на гребень. Она то ныряла, то снова всплывала наверх. Казалось, каждую минуту она может перевернуться, как мертвая рыба, брюхом кверху. Единственное, что спасало урку от гибели, – это прочность корпуса, не давшего ни малейшей течи. Сколько ни трепала ее буря, все доски внутренней обшивки были на месте. Не было ни одной трещины или щели, ни одна капля воды не попала в трюм. Это было чрезвычайно важно, ибо насос испортился и не действовал.</p><p class="p1">Урка прыгала по волнам в какой-то дикой пляске. Палуба судорожно вздымалась и опускалась, как диафрагма человека, которого тошнит. Казалось, она всячески старается изрыгнуть ютившихся на ней людей. Они же, не в силах ничего предпринять, только цеплялись за безжизненно повисшие снасти, за доски, за краспис, за рустов, за линьки, за обломки вздувшихся переборок, гвоздями раздиравшие им руки, за искривленные ридерсы, за самые незначительные выступы на всем, что еще оставалось после катастрофы. Время от времени они прислушивались. Звон колокола доносился все слабее и слабее. Казалось, он тоже был в агонии. Его удары напоминали прерывистое хрипение умирающего. Но вот и оно прекратилось. Где же они находились? В каком расстоянии от буя?</p><p class="p1">Звон колокола испугал их, его молчание повергло их в ужас. Ветер гнал их, быть может, туда, откуда нет возврата. Они чувствовали, что новый яростный шторм мчит их к чему-то страшному. Остов «Матутины» несся неизвестно куда среди непроглядной тьмы. Нет ничего ужаснее стремительного движения навстречу неведомой цели. Со всех сторон – впереди них, сзади них и под ними – зияла бездна. Это не было уже бегом, это было стремительным падением.</p><p class="p1">Вдруг сквозь оплошную завесу снежной метели мелькнуло что-то красное.</p><p class="p1">– Маяк! – закричали погибающие.</p></span><span id="id97"><div class="title6">
<p class="p">11. Каскеты</p>
</div><p class="p1">Это был действительно Каскетский маяк.</p><p class="p1">В девятнадцатом столетии маяк – это высокое конусообразное каменное сооружение, вверху которого находится осветительный аппарат, устроенный по всем правилам науки. В частности, Каскетский маяк в настоящее время представляет собою тройную башню с тремя вращающимися огнями. Световые приборы, приводимые в движение при помощи часовых механизмов, совершают оборот вокруг своей оси с такой точностью, что вахтенный, наблюдающий их огни в открытом море, успевает сделать десять шагов по палубе во время проблеска и двадцать пять во время затмения. Вся система построена на строжайшем расчете как фокусных расстояний, так и вращающегося восьмигранного барабана, образованного восемью ступенчатыми плоско-выпуклыми стеклами, сверху и снизу которых помещаются диоптрические зеркала; эта тончайшая аппаратура защищена от напора ветра и от прибоя волн литыми миллиметровыми стеклами; однако даже такие стекла иногда разбивают своим клювом морские орлы, налетающие, как огромные ночные мотыльки, на исполинские фонари маяков. Здание, заключающее в себе этот механизм и служащее ему как бы оправой, отличается не меньшей математической точностью устройства. Все в нем просто, соразмерно, целесообразно, строго, стройно. Маяк – это цифра.</p><p class="p1">В семнадцатом веке маяк был, так сказать, пышным украшением земли на берегу моря. Башня маяка привлекала к себе внимание вычурным великолепием своей архитектуры. Она была перегружена множеством балконов, балюстрад, башенок, ниш, беседок, флюгеров. Сверху донизу ее усеивали лепные украшения в виде голов, статуи, решетки, завитки, рельефы, фигурки, дощечки с надписями. «Pax in bello»<a href="ch2.xhtml#id23" class="a">[170]</a> – гласил Эддистоунский маяк. Заметим мимоходом, что это провозглашение мира не всегда обезоруживало океан. Уинстенлей воспроизвел эту надпись на маяке, сооруженном им на свои средства в дикой местности близ Плимута. По окончании постройки он поселился в башне, желая лично проверить, как выдержит она бурю. Но буря налетела и унесла в море и маяк и Уинстенлея. Эти чрезмерно затейливые сооружения, со всех сторон открытые ветрам, навлекали на себя ярость ураганов, подобно тому как генералы в цветных, расшитых золотом мундирах оказываются во время битвы наиболее уязвимой целью. Помимо украшений из камня, на маяках были украшения из железа, меди, дерева; металлические части изобиловали рельефами, деревянные – всякого рода выступами. По наружным стенам маяка, вделанные среди арабесок, лепились всевозможные снаряды, годные и непригодные к употреблению: лебедки, тали, блоки, багры, лестницы, грузоподъемные краны, дреки. На самой вершине башни, вокруг фонаря, на кованых, искусной работы кронштейнах были утверждены огромные железные подсвечники, в которые вставлялись куски просмоленного каната, – этих факелов не мог погасить самый сильный ветер. Вся башня сверху донизу была убрана морскими флагами, вымпелами, флюгарками, знаменами, султанами, наметами, укрепленными на флагштоках и поднимающимися от яруса к ярусу до самого фонаря; эта пестрая смесь разноцветных флагов, гербов различной формы и сигналов во время бури живописной массой лоскутьев весело развевалась вокруг пылавшего пламени. Дерзкий огонь на краю пучины походил на вызов и пробуждал отвагу у мореплавателей, терпевших бедствие в море. Но Каскетский маяк совсем не был похож на эти маяки.</p><p class="p1">В ту пору это был простой старинный, самого примитивного устройства маяк, воздвигнутый по приказанию Генриха I после гибели «Бланш-Нефа»: на вершине утеса в железной клетке горел костер – высокая груда углей, обнесенная решеткой, и ветер раздувал языки пламени.</p><p class="p1">Единственным усовершенствованием, сделанным в этом маяке со времени его сооружения в двенадцатом веке, были кузнечные мехи, приводимые в движение зубчатым колесом с каменной гирей; их присоединили к железной клетке в 1610 году.</p><p class="p1">Для морских птиц эти старинные маяки представляли несравненно большую опасность, чем нынешние. Привлеченные ярким светом, птицы слетались на огонь и попадали прямо в костер; там они прыгали, как адские духи, корчась в предсмертных судорогах; иногда они вырывались из раскаленной клетки и падали на скалу, обугленные, искалеченные, ослепленные, как падает ночная мошкара, обгоревшая в пламени лампы.</p><p class="p1">Вполне оснащенному судну, повинующемуся воле кормчего, Каскетский маяк нередко оказывает услугу. Он кричит ему: «Берегись!» Он предупреждает его о близости рифа. Но для судна, потерявшего и такелаж и руль, он только страшен. Оголенный остов корабля, беспомощный, бессильный в борьбе с бешеным натиском волн, беззащитный против шторма, – рыба без плавников, бескрылая птица, – он может плыть лишь туда, куда его гонит ветром. Маяк указывает ему роковое место, где его ждет неминуемая гибель, освещает его могилу. Маяк для него – погребальный факел.</p><p class="p1">Озарять путь к неотвратимому, предупреждать о неизбежном – какая трагическая насмешка!</p></span><span id="id98"><div class="title6">
<p class="p">12. Поединок с рифом</p>
</div><p class="p1">Несчастные, погибавшие на «Матутине», сразу же поняли горькую насмешку судьбы. При виде маяка они сначала приободрились, затем пришли в отчаяние. У них не было выхода, они ничего не могли предпринять. К волнам вполне применимо изречение, относящееся к царям: всякий, кто им подвластен, становится их жертвой. Хочешь не хочешь, надо терпеть все их безрассудства. Ветер гнал урку на Каскеты. Приходилось плыть по воле ветра. Сопротивляться было невозможно. Судно быстро несло на риф. Беглецы чувствовали, что дно мелеет; если бы измерение лотом имело для них какой-либо смысл, они убедились бы, что глубина моря здесь не больше трех-четырех брассов. Они прислушивались к глухому рокоту волн, врывающихся в расщелины подводных скал. Они различали у подножия маяка, между двумя гранитными выступами, темную полоску – узкий пролив, соединявший с океаном страшную бухточку, на дне которой, как можно было предположить, покоилось немало человеческих скелетов и разбитых остовов кораблей. Это был скорее зев пещеры, чем вход в гавань. С вершины маяка доносилось потрескивание костра в железной клетке, его багровые вспышки угрюмо освещали картину бури, пламя, сталкиваясь с градом, разрывало пелену тумана, черная туча, словно змей, сцепившийся со змеем, вступала в схватку с красным дымом, взлетали, подхваченные ветром, мелкие горящие головешки, и снежные хлопья, казалось, обращались в бегство перед внезапным натиском искр. Контуры рифов, вначале еле заметные, теперь выступали совершенно отчетливо – беспорядочное нагромождение скал с их пиками, гребнями и ребрами. Очертания углов обозначались ярко-алыми линиями, а скаты – кровавыми огненными бликами. По мере того как они приближались к рифу, его громада, разрастаясь ввысь и вширь, становилась все более зловещей.</p><p class="p1">Одна из женщин, ирландка, исступленно перебирала четки.</p><p class="p1">Обязанности лоцмана, лежавшие на погибшем судохозяине, пришлось взять на себя главарю шайки, который был капитаном. Баски все без исключения отлично знают горы и море. Они не боятся пропастей и не теряются при кораблекрушениях.</p><p class="p1">Судно подходило к самому рифу – вот-вот налетит на него. Внезапно северный склон Каскетов оказался так близко, что гранитная их стена сразу заслонила собою маяк. Виден был только утес да свет, пробивавшийся из-за него. Скала, выступавшая из тумана, напоминала женскую фигуру в черном с огненным чепцом на голове.</p><p class="p1">Эта скала, пользующаяся дурной славой, носит название Библе. Она является крайней северной точкой рифа, ограниченного с юга другим утесом, известным под именем Этак-о-Гильме.</p><p class="p1">Главарь шайки, окинув взглядом Библе, крикнул:</p><p class="p1">– Не найдется ли охотника доплыть с перлинем до бурунов? Кто умеет плавать?</p><p class="p1">Ответа не последовало.</p><p class="p1">Никто из находившихся на борту не умел плавать, даже матросы, – явление, довольно обычное среди моряков.</p><p class="p1">Наполовину оторвавшийся от бортовой обшивки лонгкарлинс болтался на скрепах. Главарь шайки схватил его обеими руками и сказал:</p><p class="p1">– Помогите мне.</p><p class="p1">Лонг-карлинс оторвали совсем. Теперь им можно было пользоваться как угодно. Из орудия обороны он стал наступательным орудием.</p><p class="p1">Это было довольно длинное бревно, вырезанное из сердцевины дуба, крепкое и толстое, одинаково пригодное и для нападения и для упора; оно могло служить и рычагом для подъема груза и тараном для разрушения башни.</p><p class="p1">– Становись! – крикнул главарь.</p><p class="p1">Все шестеро, выстроившись в ряд и упершись изо всех сил в обломок мачты, держали лонг-карлинс горизонтально за бортом, как копье, направленное в ребро утеса.</p><p class="p1">Это был опасный маневр. Атаковать гору – дерзость немалая. Все шестеро могли быть сброшены в воду обратным толчком.</p><p class="p1">Борьба с бурей чревата неожиданностями. Вслед за штормом – риф. На смену ветру – гранит. Приходится иметь дело то с неуловимым, то с несокрушимым.</p><p class="p1">Наступила одна из тех минут, когда у людей сразу седеют волосы.</p><p class="p1">Риф и судно должны были вступить друг с другом в схватку.</p><p class="p1">Утес терпелив. Он спокойно выжидал этого мгновения.</p><p class="p1">Набежала волна и положила конец ожиданию. Она подхватила судно снизу, приподняла его на своем гребне и с минуту раскачивала, как праща раскачивает камень.</p><p class="p1">– Смелей! – крикнул главарь. – Ведь это всего только утес, а мы – люди!</p><p class="p1">Бревно держали наготове. Все шесть человек как бы срослись с ним. Острые шипы лонг-карлинса врезались им в подмышки, но никто не почувствовал боли.</p><p class="p1">Волна швырнула урку на скалу.</p><p class="p1">Столкнувшись, они окрылись в бесформенном облаке пены, которое всегда готово скрыть от взоров такие столкновения.</p><p class="p1">Когда пенное облако скатилось в море и волна отхлынула от утеса, все шесть человек лежали на палубе; но «Матутина» уже огибала буруны. Бревно выдержало испытание, и толчок повлек за собой изменение курса. В несколько секунд урка, унесенная бешеным течением, оставила Каскеты далеко позади себя. «Матутина» на время оказалась вне опасности.</p><p class="p1">Такие случаи нередки. Удар бушприта о скалу спас от гибели Вуда де Ларго в устье Тея. В опасном месте, близ мыса Уинтертона, оттолкнувшись ганшпугом от страшного Браннодумского утеса, капитан Гамильтон предотвратил гибель находившегося под его командой судна «Ройял Мери», хотя это был хрупкий фрегат шотландского типа. Волна – сила, подверженная мгновенному спаду, который делает если не легким, то, во всяком случае, возможным перемену галса, даже при сильнейшем толчке. В буре есть что-то животное: ураган – как бык: его можно ввести, в обман.</p><p class="p1">Перейти от движения по секущей к движению по касательной – вот весь секрет того, как избегнуть кораблекрушения.</p><p class="p1">Именно такую услугу и оказал судну лонг-карлинс. Он сыграл роль весла, он заменил собою руль. Но этим спасительным маневром можно было воспользоваться лишь однажды; повторить его уже было невозможно: бревно унесло в море. Силою толчка оно было выбито из рук людей, переброшено через борт и кануло в волны. Оторвать же второй лонг-карлинс значило бы расшатать самый кузов.</p><p class="p1">Ураган снова подхватил «Матутину». Через мгновение Каскеты вырисовывались уже на горизонте беспорядочной грудой камней. В подобных случаях у рифов бывает смущенный вид. В природе, еще далеко не изученной нами до конца, зримое как будто находит свое дополнение в незримом, и скалы угрюмо смотрят неподвижным взглядом вам вслед, негодуя, что добыча вырвалась у них из рук.</p><p class="p1">Именно так выглядели Каскеты, когда от них убегала «Матутина».</p><p class="p1">Маяк, отступая назад, бледнел, тускнел, затем пропал из глаз.</p><p class="p1">Его исчезновение вселило тоску. Густая пелена тумана заволокла растекавшийся во мгле багровый свет. Его лучи растворились в необъятности водной стихии. Пламя побарахталось немного на волнах, пытаясь еще бороться, потом поникло, нырнуло, как будто пошло ко дну. Костер превратился в огарок, еле мерцавший бледным огоньком. Вокруг него расплывалось кольцо мутного сияния, точно на дне пучины мрака кто-то раздавил ногой горящий светильник.</p><p class="p1">Умолк колокол, звучавший угрозой. Исчез из виду маяк, предостерегавший об опасности. Однако, когда тот и другой остались позади, беглецов объял еще больший ужас. Колокол был голосом, маяк был факелом. В них было нечто человеческое. Без них оставалась одна лишь пучина.</p></span><span id="id99"><div class="title6">
<p class="p">13. Лицом к лицу с мраком ночи</p>
</div><p class="p1">Урку снова захлестнули волны беспредельного мрака. Благополучно миновав Каскеты, «Матутина» теперь перепрыгивала с гребня на гребень бушующих волн. Отсрочка развязки среди хаоса. Урка металась из стороны в сторону, воспроизводя своими движениями безумные взлеты пенистых валов. Она почти совсем не испытывала килевой качки – грозный признак агонии судна. Потерпевшие аварию суда подвержены лишь боковой качке. Килевая же – судороги борьбы. Только руль может повернуть судно против ветра.</p><p class="p1">Во время бури, особенно во время снежной бури, море и мрак в конце концов сливаются воедино и образуют одно неразрывное целое. Туман, метель, ветер, бесцельное кружение, отсутствие всякой опоры, невозможность выправить свой курс, сделать хотя бы короткую передышку, падение из одного провала в другой, полное исчезновение видимого горизонта, безнадежное движение вслепую – вот к чему свелось плавание урки.</p><p class="p1">Выбраться благополучно, из Каскетов, миновать рифы было для несчастных беглецов подлинной победой. Но эта победа повергла их в оцепенение. Они уже не приветствовали ее криками «ура»; в море не позволяют себе дважды такой неосторожности. Бросать вызов там, где не рискуешь бросать лот, – опасно.</p><p class="p1">Оттолкнуться от рифа значило осуществить невозможное. Это ошеломило гибнущих. Мало-помалу, однако, в их сердцах пробудилась надежда. Человеческая душа всегда склонна уповать на чудо. Нет такого отчаянного положения, при котором в самый критический момент из глубины души не подымалась бы заря надежды. Несчастные так жаждали сказать себе: «Спасены!» У них уже готово было сорваться это слово.</p><p class="p1">Но вдруг во мраке ночи с левой стороны судна выросла какая-то чудовищная громада. Из тумана выступила и четко обозначилась высокая черная отвесная скала с прямыми углами – четырехугольная башня, возникшая из бездны.</p><p class="p1">Они смотрели на нее, пораженные.</p><p class="p1">Шторм гнал их прямо на нее.</p><p class="p1">Они не знали, что это такое. Это была скала Ортах.</p></span><span id="id100"><div class="title6">
<p class="p">14. Ортах</p>
</div><p class="p1">Опять начинались рифы. После Каскетов – Ортах. Буря не блещет фантазией: она груба, могуча и прибегает всегда к одним и тем же приемам.</p><p class="p1">Мрак неисчерпаем. Он вероломно таит в себе неисчислимые ловушки и козни. Человек же быстро расходует все свои средства. Человек выдыхается; бездна неистощима.</p><p class="p1">Глаза погибающих обратились к главарю, к единственному их защитнику. Но он только пожал плечами с угрюмым презрением к собственному бессилию.</p><p class="p1">Ортах – исполинский булыжник, поставленный дыбом посреди океана. Ортахский риф, представляющий собою сплошной массив, возвышается на восемьдесят футов над бушующими волнами. О него разбиваются и морские валы и корабли. Неподвижный гранитный куб отвесно погружает свои прямолинейные грани в бесчисленные змеиные извивы волнующегося моря.</p><p class="p1">Ночью его можно принять за огромную плаху, придавившую собой складки черного сукна на помосте. В бурю он ждет удара топора, или, что то же, удара грома. Грома, однако, при снежной буре не бывает. Правда, ночная темнота вполне заменяет для корабля повязку на глазах. Его ждет плаха, как осужденного на казнь преступника. Но на молнию, убивающую сразу, он не должен возлагать никаких надежд.</p><p class="p1">«Матутина», жалкая игрушка волн, понеслась навстречу этому утесу, как незадолго перед тем мчалась к другому рифу. Несчастные, уже считавшие себя спасенными, снова впали в отчаяние. Перед ними вновь возникал призрак кораблекрушения, который они оставили позади. Со дна моря опять вынырнул риф. Оттолкнувшись от скалы, они ничего не добились.</p><p class="p1">Каскеты – вафельница со множеством углублений; Ортах – сплошная стена. Потерпеть аварию у Каскетов – значит быть растерзанным на части; потерпеть аварию у Ортаха – значит быть расплющенным.</p><p class="p1">И все-таки у находившихся на борту урки была еще возможность спастись.</p><p class="p1">От отвесной скалы – а Ортах именно такая скала – волна не отскакивает рикошетом, подобно пушечному ядру. Она соскальзывает вниз. Это похоже на прилив и отлив. Она налетает валом, а отступает зыбью. В подобных случаях вопрос о жизни и смерти решается следующим образом: если вал бросит судно на скалу, оно разобьется вдребезги; если же волна отхлынет раньше, чем корабль достиг скалы, он окажется спасенным.</p><p class="p1">Сердце сжимала мучительная тревога. Погибавшие уже различали в полумраке приближение девятого вала.</p><p class="p1">Как далеко он увлечет их? Если волна ударит в борт, их отбросит к самому рифу, и тогда смерть неизбежна. Если же она пройдет под килем…</p><p class="p1">Волна прошла под килем.</p><p class="p1">Они облегченно вздохнули.</p><p class="p1">Но что будет с ними, когда она вернется? Куда умчит их отхлынувшая волна?</p><p class="p1">Волна умчала их в море.</p><p class="p1">Несколько минут спустя «Матутина» была уже далеко от рифа. Ортах постепенно скрывался из виду, как перед тем исчезли из виду Каскеты.</p><p class="p1">Вторая победа. Уже во второй раз урка была на краю гибели и счастливо избежала ее.</p></span></span></span></span>
