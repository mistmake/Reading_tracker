<span><span><span><span id="id181"><div class="title6">
<p class="p">5. Высокомерная болтовня</p>
</div><p class="p1">Мало-помалу скамьи палаты заполнились. Начали появляться лорды. В порядке дня стоял билль об увеличении на сто тысяч фунтов стерлингов ежегодного содержания Георгу Датскому, герцогу Кемберлендскому, супругу королевы. Кроме того, было объявлено, что несколько биллей, одобренных Ее Величеством, будут представлены в палату коронными комиссарами, на которых возложено право и обязанность утвердить их; тем самым заседание приобретало значение королевского. Все пэры были в парламентских мантиях, накинутых поверх своей обычной одежды или придворных костюмов. На всех были одинаковые мантии, такие же, как и на Гуинплене, с той лишь разницей, что у герцогов было по пять горностаевых, обшитых золотом полос, у маркизов четыре, у графов и виконтов три, а у баронов две. Лорды входили группами, продолжая беседу, начатую еще в коридорах. Некоторые появлялись поодиночке. Одеяния были парадными, в позах же и в словах не было ничего торжественного. Входя, каждый из лордов кланялся трону.</p><p class="p1">Пэры все прибывали. Все эти обладатели громких имен входили в зал почти без всякого церемониала, так как посторонней публики не было. Вошел Лестер и пожал руку Личфилду; затем явились Чарльз Мордаунт, граф Питерборо, и Монмут, друг Локка, по инициативе которого он в свое время предложил переливку монеты; Чарльз Кемпбел, граф Лоудоун, которому что-то нашептывал Фук Гревилл, лорд Брук; Дорм, граф Карнарвон; Роберт Сеттон, барон Лексингтон, сын того Лексингтона, который посоветовал Карлу II прогнать историографа Грегорио Лети, слишком недостаточно догадливого, чтобы быть историком; красивый старик Томас Белласайз, виконт Фалькомберг; трое двоюродных братьев Ховардов: Ховард, граф Биндон, Боур-Ховард, граф Беркшир, и Стаффорд-Ховард, граф Стаффорд; Джон Ловлес, барон Ловлес, чей род прекратился в 1736 году, что позволило Ричардсону ввести Ловлеса в свой роман и создать под этим именем определенный тип. Все эти лица, выдвинувшиеся либо в области политики, либо на войне и прославившие собою Англию, смеялись и болтали. Это была сама история в домашнем халате.</p><p class="p1">Меньше чем за полчаса палата оказалась почти в полном составе. Дело объяснялось просто – предстояло королевское заседание. Более необычным обстоятельством были оживленные разговоры. Палата, еще недавно погруженная в сонную тишину, загудела, как потревоженный улей. Пробудило ее от дремоты появление запоздавших лордов. Они принесли с собой любопытные вести. Странное дело: пэры, находившиеся в палате с начала заседания, не подозревали о том, что произошло в палате, тогда как те, что отсутствовали, знали обо всем.</p><p class="p1">Многие лорды приехали из Виндзора.</p><p class="p1">Уже несколько часов, как все происшедшее с Гуинпленом стало достоянием гласности. Тайна – та же сеть: достаточно, чтобы порвалась одна петля, и все расползается. Весть о происшествиях, уже известных читателю, вся история о пэре, найденном на подмостках, о скоморохе, признанном лордом, еще утром разнеслась по Виндзору в кругу приближенных королевы. Об этом заговорили сначала вельможи, затем лакеи. Вслед за королевским двором событие стало известно всему городу. События имеют свой вес, и к ним вполне применим закон квадрата скоростей. Обрушиваясь на публику, они с невероятной быстротой вызывают всевозможные толки. В семь часов в Лондоне никто и понятия не имел об этой истории. В восемь часов в городе только и говорили, что о Гуинплене. Лишь несколько пожилых лордов, прибывших до открытия заседания, ни о чем не догадывались, так как не успели побывать в городе, где о случившемся кричали на всех перекрестках, а провели это время в палате и ровно ничего не заметили. Они невозмутимо сидели на скамьях, когда вновь прибывшие члены взволнованно обратились к ним.</p><p class="p1">– Каково? – спрашивал Френсис Броун, виконт Монтекьют, маркиза Дорчестера.</p><p class="p1">– Что?</p><p class="p1">– Неужели это возможно?</p><p class="p1">– Что?</p><p class="p1">– Да «Человек, который смеется»!</p><p class="p1">– Что это за «Человек, который смеется»?</p><p class="p1">– Как, вы не знаете «Человека, который смеется»?</p><p class="p1">– Нет.</p><p class="p1">– Это клоун. Ярмарочный комедиант. Невероятно уродливый, такой уродливый, что его доказывали в балагане за деньги. Фигляр.</p><p class="p1">– Ну и что же?</p><p class="p1">– Вы только что приняли его в пэры Англии.</p><p class="p1">– Вы сами – человек, который смеется, милорд Монтекьют.</p><p class="p1">– Я нисколько не смеюсь, милорд Дорчестер.</p><p class="p1">Виконт Монтекьют знаком подозвал парламентского клерка, и тот, поднявшись с мешка, набитого шерстью, подтвердил их светлостям факт принятия нового пэра. Затем он сообщил всякие подробности.</p><p class="p1">– Вот так штука, – сказал лорд Дорчестер, – а я все время беседовал с епископом Илийским!</p><p class="p1">Молодой граф Энсли подошел к старому лорду Юру, которому оставалось жить лишь два года, так как он умер в 1707 году.</p><p class="p1">– Милорд Юр?</p><p class="p1">– Милорд Энсли?</p><p class="p1">– Знали вы лорда Линнея Кленчарли?</p><p class="p1">– Старого лорда? Знал.</p><p class="p1">– Того, что умер в Швейцарии?</p><p class="p1">– Да. Мы были с ним в родстве.</p><p class="p1">– Того, что был республиканцем при Кромвеле и остался республиканцем при Карле Втором?</p><p class="p1">– Республиканцем? Вовсе нет. Он попросту обиделся. У него были личные счеты с королем. Я знаю из достоверных источников, что лорд Кленчарли помирился бы с ним, если бы ему предоставили место канцлера, доставшееся лорду Хайду.</p><p class="p1">– Вы удивляете меня, милорд Юр! Мне говорили, что лорд Кленчарли был честным человеком.</p><p class="p1">– Честный! Да разве честные люди существуют? Молодой человек, на свете нет честных людей.</p><p class="p1">– А Катон?</p><p class="p1">– Вы верите в Катона?</p><p class="p1">– А Аристид?</p><p class="p1">– Его прогнали, и поделом.</p><p class="p1">– А Томас Мор?</p><p class="p1">– Ему отрубили голову, и хорошо сделали.</p><p class="p1">– И, по вашему мнению, лорд Кленчарли…</p><p class="p1">– Был из той же породы. К тому же человек, добровольно остающийся в изгнании, просто смешон.</p><p class="p1">– Он там умер.</p><p class="p1">– Честолюбец, обманувшийся в своих расчетах. Знал ли я его? Еще бы! Я был его лучшим другом.</p><p class="p1">– Известно ли вам, милорд Юр, что в Швейцарии он женился?</p><p class="p1">– Что-то слыхал об этом.</p><p class="p1">– И что от этого брака у него был законный сын?</p><p class="p1">– Да. Этот сын умер.</p><p class="p1">– Нет, он жив.</p><p class="p1">– Жив?</p><p class="p1">– Жив.</p><p class="p1">– Невозможно.</p><p class="p1">– Вполне возможно. Доказано. Засвидетельствовано. Официально признано судом. Зарегистрировано.</p><p class="p1">– В таком случае этот сын унаследует пэрство Кленчарли?</p><p class="p1">– Нет, не унаследует.</p><p class="p1">– Почему?</p><p class="p1">– Потому что он уже унаследовал. Дело сделано.</p><p class="p1">– Уже?</p><p class="p1">– Поверните голову, барон Юр. Он сидит за вами на скамье баронов.</p><p class="p1">Лорд Юр обернулся, но Гуинплен сидел, опустив голову, и лица его не было видно.</p><p class="p1">– Смотрите! – воскликнул старик, не видя ничего, кроме волос Гуинплена. – Он уже усвоил новую моду. Он не носит парика.</p><p class="p1">Грентэм подошел к Колпеперу.</p><p class="p1">– Вот кто попался-то!</p><p class="p1">– Кто?</p><p class="p1">– Дэвид Дерри-Мойр.</p><p class="p1">– Почему?</p><p class="p1">– Он больше уже не пэр.</p><p class="p1">– Как так?</p><p class="p1">И Генри Оверкерк, граф Грентэм, рассказал Джону, барону Колпеперу, весь «анекдот», то есть историю о выброшенной морем и доставленной в адмиралтейство бутылке, о пергаменте компрачикосов, о королевском приказе, скрепленном подписью Джеффриса, об очной ставке в саутворкском застенке, о том, как отнеслись ко всем этим событиям лорд-канцлер и королева, об отречении от католических догматов в стеклянной ротонде, наконец, о принятии лорда Фармена Кленчарли в члены палаты перед началом заседания. Оба лорда старались разглядеть сидевшего между лордом Фицуолтером и лордом Эранделом нового пэра, о котором столько говорилось, но, так же как и лорду Юру и лорду Энсли, им это не удалось.</p><p class="p1">Быть может, случайно, а может быть, потому, что об этом позаботились его восприемники, предупрежденные канцлером, Гуинплен сидел в тени, укрывавшей его от любопытных взоров.</p><p class="p1">– Где он, где же он?</p><p class="p1">Все, входя, задавали себе этот вопрос, но никому не удавалось как следует рассмотреть нового лорда. Некоторые, видевшие Гуинплена в «Зеленом ящике», сгорали от любопытства, но все их усилия были тщетны. Как иногда старые, вдовы благоразумно заслоняют собою от нескромных взоров молодую девушку, так и Гуинплен был укрыт за широкими спинами пожилых, немощных и ко всему безучастных лордов. Старики, страдающие подагрой, мало интересуются тем, что не имеет к ним прямого отношения.</p><p class="p1">По рукам ходила копия письма в три строки, которое, как уверяли, герцогиня Джозиана прислала своей сестре, королеве, в ответ на предложение Ее Величества выйти замуж за нового пэра, законного наследника баронов Кленчарли, лорда Фермена. Письмо это было следующего содержания:</p><p class="empty-line"/><p class="p1">«Государыня!</p><p class="p1">Я согласна. Это даст мне возможность взять себе в любовники лорда Дэвида».</p><p class="empty-line"/><p class="p1">Внизу стояла подпись: «Джозиана». Письмо это, настоящее или вымышленное, возбуждало всеобщий восторг.</p><p class="p1">Молодой лорд Чарльз Окемптон, барон Мохен, из числа тех, кто не носил парика, с наслаждением читал и перечитывал эту записку. Льюис Дюрас, граф Фивершем, англичанин, отличавшийся чисто французским остроумием, с улыбкой поглядывал на Мюхена.</p><p class="p1">– Вот женщина! – воскликнул лорд Мохен. – На такой стоит жениться!</p><p class="p1">И два лорда, сидевшие рядом с Дюрасом и Мохеном, услышали следующий разговор:</p><p class="p1">– Жениться на герцогине Джозиане, лорд Мохен?</p><p class="p1">– А почему бы нет?</p><p class="p1">– Черт возьми!</p><p class="p1">– Это было бы счастье!</p><p class="p1">– Это счастье делили бы с вами другие.</p><p class="p1">– Разве бывает иначе?</p><p class="p1">– Лорд Мохен, вы травы. Когда дело касается женщины, нам всегда перепадают крохи чужого пиршества. Кто положил этому начало?</p><p class="p1">– Адам, должно быть.</p><p class="p1">– Вовсе нет.</p><p class="p1">– Верно, сатана.</p><p class="p1">– Дорогой мой, – заметил в заключение Льюис Дюрас, – Адам только подставное лицо. Его надули, беднягу. Он взвалил себе на плечи весь род людской. Дьявол сотворил мужчину для женщины.</p><p class="p1">Натанаэль Крью, бывший вдвойне пэром, светским в качестве барона Крью и духовным в качестве епископа Дерхемского, сидя на епископской скамье, окликнул Гью Чолмлея, графа Чолмлея, известного законоведа:</p><p class="p1">– Возможно ли это?</p><p class="p1">– Вы хотите сказать – законно ли это? – поправил его Чолмлей.</p><p class="p1">– Принятие нового лорда совершилось не в зале палаты, – продолжал епископ, – хотя, как говорят, подобные примеры бывали и раньше.</p><p class="p1">– Да. Лорд Бошан при Ричарде Втором, лорд Ченей при Елизавете.</p><p class="p1">– И лорд Брогил при Кромвеле.</p><p class="p1">– Кромвель в счет не идет.</p><p class="p1">– Что вы думаете, обо всем этом?</p><p class="p1">– Как сказать…</p><p class="p1">– Милорд граф Чолмлей, какое же место будет занимать в палате молодой Фермен Кленчарли?</p><p class="p1">– Милорд епископ, так как республика нарушила исконный порядок старшинства, то пэрство Кленчарли занимает теперь среднее место между пэрством Барнард и пэрством Сомерс, следовательно, при подаче мнений лорд Фермен Кленчарли будет говорить восьмым.</p><p class="p1">– Подумать только! Ярмарочный фигляр!</p><p class="p1">– Происшествие само по себе не удивляет меня, милорд епископ. Такие вещи случаются. Бывают и еще более удивительные. Разве накануне войны Алой и Белой Розы первого января тысяча триста девяносто девятого года не высохла вдруг рева Уза в Бедфорде? Но если река может высохнуть, то и вельможа может впасть в унизительное состояние. Улиссу, царю Итаки, приходилось браться за всякую работу. Фермен Кленчарли оставался лордом под внешней оболочкой скомороха. Одежда простолюдина не умаляет того, в чьих жилах течет благородная кровь. Однако принесение присяги и принятие в члены палаты вне зала заседаний, хотя они и произведены вполне законно, могут все же вызвать возражения. Я полагаю, что нам необходимо сговориться, следует ли позднее сделать лорд-канцлеру запрос по этому поводу. Через несколько недель станет ясно, как нам поступить.</p><p class="p1">Епископ заметил:</p><p class="p1">– Все равно. Такого происшествия не было со времени графа Джесбодуса.</p><p class="p1">На всех скамьях только и было разговору, что о Гуинплене, о «Человеке, который смеется», о Тедкастерской гостинице, о «Зеленом ящике», о «Побежденном хаосе», о Швейцарии, о Шильоне, о компрачикосах, об изгнании, об изуродовании, о республике, о Джеффрисе, об Иакове II, о приказе короля, о бутылке, откупоренной в адмиралтействе, об отце, лорде Линнее, о законном сыне, лорде Фермене, о побочном сыне, лорде Дэвиде, о возможных столкновениях между ними, о герцогине Джозиане, о лорд-канцлере, о королеве. Громкий шепот пробегал по залу с быстротою огня по пороховой дорожке. Без конца смаковали подробности. От всех этих толков в зале стоял непрерывный гул. Гуинплен лишь смутно слышал это гуденье, не подозревая, что причиной этого является он сам. Однако он был по-своему внимателен ко всему окружавшему, но только внимание его было обращено куда-то вглубь, а не на внешнюю сторону происходившего в зале. Избыток внимания вызывает обособленность.</p><p class="p1">Шум в палате не мешает заседанию идти своим чередом, так же как дорожная пыль не препятствует продвижению войск. Судьи, присутствующие в палате лордов в качестве зрителей и имеющие право говорить не иначе, как отвечая на предлагаемые им вопросы, уселись на втором мешке с шерстью, а три государственных секретаря – на третьем. Наследники пэрских титулов собрались в отведенном им отделении позади трона, несовершеннолетние пэры заняли свою особую скамью. В 1705 году их было не меньше двенадцати: Хентингтон, Линкольн, Дорсет, Уорик, Бат, Берлингтон, Дервентуотер, которому впоследствии суждено было трагически погибнуть, Лонгвил, Лонсдейл, Дадлей, Уорд и Картрет; среди этих юнцов было восемь графов, два виконта и два барона.</p><p class="p1">Каждый лорд занял свое место на одной из скамей, тремя ярусами окружавших зал. Почти все епископы были налицо. Герцогов было много, начиная с Чарльза Сеймура, герцога Сомерсета, и кончая Георгом-Августом, курфюрстом Ганноверским, герцогом Кембриджским, младшим по времени пожалования, а потому и младшим по рангу. Все сидели в порядке старшинства. Кавендиш, герцог Девоншир, чей дед приютил у себя в Гартвике девяностодвухлетнего Гоббса; Ленокс, герцог Ричмонд; три Фиц-Роя: герцог Саутгемптон, герцог Грефтон и герцог Нортемберленд; Бетлер, герцог Ормонд; Сомерсет, герцог Бофорт; Боклерк, герцог Сент-Олбенс; Раулет, герцог Болтон; Осборн, герцог Лидс; Райотсли Рессел, герцог Бетфорд, чьим девизом и военным кличем было: «Che sara sara» («Будь что будет»), выражавшее полную покорность судьбе; Шеффилд, герцог Бекингем; Меннес, герцог Ретленд, и прочие. Ни Ховард, герцог Норфолк, ни Талбот, герцог Шрусбери, будучи католиками, не присутствовали на заседании, не было также Черчилля, герцога Мальборо – по-вашему Мальбрука, который к тому времени «в поход собрался» и воевал во Франции. Не было также шотландских герцогов Куинсбери, Монтроза и Роксберга, так как они были приняты в палату лордов только в 1707 году.</p></span><span id="id182"><div class="title6">
<p class="p">6. Верхняя и нижняя палаты</p>
</div><p class="p1">Вдруг зал ярко осветился. Четыре привратника принесли и поставили по обеим сторонам трона четыре высоких канделябра со множеством восковых свечей. Освещенный таким образом трон предстал в пурпурном сиянии. Пустой, но величественный. Сиди на нем сама королева, это вряд ли прибавило бы торжественности.</p><p class="p1">Вошел пристав черного жезла и, подняв кверху свой жезл, возгласил:</p><p class="p1">– Их милости комиссары Ее Величества.</p><p class="p1">Шум сразу прекратился.</p><p class="p1">На пороге большой двери появился клерк в парике и длиннополой мантии, держа в руках расшитую геральдическими лилиями подушку, на которой лежали свитки пергамента. Эти свитки были не что иное, как билли. От каждого из них свешивался шелковый плетеный шнурок с прикрепленным к концу шариком; некоторые из этих шариков были золотые. По этим шарикам – bills, или bulles, – законы зовутся в Англии биллями, а в Риме буллами.</p><p class="p1">За клерком выступали три человека в пэрских мантиях и шляпах с перьями.</p><p class="p1">Это были королевские комиссары. Первый из них был лорд-казначей Англии Годольфин, второй – лорд-председатель совета Пемброк, третий – лорд-хранитель собственной Ее Величества печати Ньюкасл.</p><p class="p1">Они шествовали один за другим не по старшинству титулов, а по старшинству должностей; Годольфин шел поэтому первым, а Ньюкасл последним, хотя и был герцогом.</p><p class="p1">Подойдя к скамье, стоявшей перед троном, они отвесили поклон «королевскому креслу», затем, снова надев шляпы, сели на скамью.</p><p class="p1">Лорд-канцлер, обратившись к приставу черного жезла, произнес:</p><p class="p1">– Позовите представителей палаты общин.</p><p class="p1">Пристав черного жезла вышел.</p><p class="p1">Парламентский клерк положил на стол, стоявший посредине помещения, подушку с биллями.</p><p class="p1">Наступил перерыв, продолжавшийся несколько минут. Два привратника поставили перед барьером трехступенчатый, обитый пунцовым бархатом помост, на котором золотые головки гвоздей были расположены узором геральдических лилий.</p><p class="p1">Двустворчатая дверь снова распахнулась, и чей-то голос возвестил:</p><p class="p1">– Верноподданные представители английской палаты общин!</p><p class="p1">Это пристав черного жезла объявил, о прибытии второй половины парламента.</p><p class="p1">Лорды надели шляпы.</p><p class="p1">Члены палаты общин, предшествуемые спикером, вошли с обнаженными головами.</p><p class="p1">Они остановились у барьера. На них были костюмы горожан, преимущественно черного цвета; каждый имел при себе шпагу.</p><p class="p1">Спикер, достопочтенный Джон Смит, эсквайр, депутат от Андовера, поднялся на помост перед барьером. На нем была длинная мантия черного атласа с широкими рукавами и разрезами спереди и сзади, обшитыми завитушками из золотых шпуров; парик у него был немного меньше, чем у лорд-канцлера. Несмотря на его величественный вид, чувствовалось, что здесь он исполняет второстепенную роль.</p><p class="p1">Все члены палаты общин почтительно стояли с обнаженными головами перед лордами, сидевшими в шляпах.</p><p class="p1">Среди представителей нижней палаты можно было увидеть Джозефа Джекиля, главного судью города Честера, трех присяжных законоведов Ее Величества – Хупера, Пауиса и Паркера, генерального прокурора и генерального стряпчего Саймона Харкорта. За исключением нескольких баронетов, дворян и девяти лордов – Харпингтона, Виндзора, Вудстона, Мордаунта, Гремби, Скьюдемора, Фиц-Хардинга, Хайда и Беркли – сыновей пэров и наследников пэрств, все остальные принадлежали к среднему сословию. Они стояли темной молчаливой толпой.</p><p class="p1">Когда стих шум их шагов, глашатай пристава черного жезла, стоявший у дверей, воскликнул:</p><p class="p1">– Слушайте!</p><p class="p1">Коронный клерк встал. Он взял с подушки пергамент и, развернув, прочел его. Это было послание королевы, в котором сообщалось, что своими представителями в парламенте с правом утверждать билли она назначает трех комиссаров, а именно…</p><p class="p1">Тут клерк повысил голос:</p><p class="p1">– Сиднея, графа Годольфина.</p><p class="p1">Клерк поклонился лорду Годольфину. Лорд Годольфин приподнял шляпу. Клерк продолжал:</p><p class="p1">– Томаса Герберта, графа Пемброка и Монтгомери.</p><p class="p1">Клерк поклонился лорду Пемброку. Лорд Пемброк прикоснулся к своей шляпе. Клерк продолжал:</p><p class="p1">– Джона Голлиса, герцога Ньюкасла.</p><p class="p1">Клерк поклонился лорду Ньюкаслу. Лорд Ньюкасл в ответ кивнул головой.</p><p class="p1">После этого коронный клерк снова сел. Поднялся парламентский клерк. Его помощник, стоявший на коленях позади него, последовал его примеру. Оба стали лицом к трону, а спиною к членам палаты общин.</p><p class="p1">На подушке лежало пять биллей. Эти пять биллей, принятые палатой общин и одобренные палатой лордов, ожидали королевской санкции.</p><p class="p1">Парламентский клерк прочел первый билль.</p><p class="p1">Этим актом нижней палаты издержки в сумме одного миллиона фунтов стерлингов, произведенные королевою на украшение ее резиденции в Гемптон-Корте, относились за счет государства.</p><p class="p1">Окончив чтение, клерк низко поклонился трону. Его помощник поклонился еще ниже, затем, став вполоборота к представителям палаты общин, произнес:</p><p class="p1">– Королева принимает ваше добровольное даяние и изъявляет на то свое согласие.</p><p class="p1">Затем клерк прочел второй билль.</p><p class="p1">Это был проект закона, присуждавшего к тюремному заключению и к штрафу всякого уклоняющегося от службы в войсках ополчения. Это ополчение, служившее в царствование Елизаветы без жалованья, в ту пору, когда ожидалось прибытие испанской Армады, выставило сто восемьдесят пять тысяч пехотинцев и сорок тысяч всадников.</p><p class="p1">Оба клерка снова поклонились «королевскому креслу», после чего помощник клерка, опять обернувшись через плечо в сторону палаты общин, произнес:</p><p class="p1">– Такова воля Ее Величества.</p><p class="p1">Третий билль увеличивал десятину и пребенду личфилдской и ковентрийской епархии, одной из самых богатых в Англии, устанавливал ежегодную ренту кафедральному собору этой епархии, умножал число ее каноников и повышал доходы духовенства, для того чтобы, как говорилось во вступительной части проекта, «удовлетворить нужды нашей святой церкви». Четвертый билль вводил в бюджет новые налоги: на мраморную бумагу, на наемные кареты, которых в Лондоне насчитывалось около восьмисот и которые облагались пятьюдесятью фунтами стерлингов ежегодно; на адвокатов, прокуроров и судебных стряпчих – ежегодно по сорок восемь фунтов стерлингов с каждого; на дубленые кожи, «невзирая, – как говорилось во вступительной части, – на жалобы кожевников»; на мыло, «несмотря на протест городов Эксетера и Девоншира, в которых вырабатывается много саржи и сукна, а потому употребляется на промывку тканей много мыла»; на вино по четыре шиллинга с бочонка, на муку, на ячмень и хмель, причем этот последний налог подлежал возобновлению каждые четыре года ввиду того, что «нужды государства, – как говорилось все в том же предисловии, – должны быть выше коммерческих соображений»; далее устанавливался налог на корабельные грузы в размере от шести турских фунтов с тонны товаров, привозимых с запада, и до тысячи восьмисот турских фунтов с тонны товаров, привозимых с востока; кроме того, билль, объявляя недостаточной обычную подушную подать, уже собранную в текущем году, вводил дополнительный сбор во всем государстве по четыре шиллинга, или сорок восемь турских су, с каждого подданного, причем указывалось, что уклонившиеся от уплаты этого сбора будут обложены вдвойне. Пятый билль гласил, что ни один больной не может быть принят в больницу, если он не внесет одного фунта стерлингов на оплату своих похорон в случае смерти. Три последних билля, как и первые два, были утверждены палатой путем изложенной выше процедуры: поклона, отвешиваемого трону, и традиционной формулы: «такова воля королевы», которую произносил помощник клерка, став вполоборота к членам палаты общин.</p><p class="p1">Затем помощник клерка опять опустился на колени около четвертого мешка с шерстью, и лорд-канцлер возгласил:</p><p class="p1">– Да будет все исполнено, как на том согласились.</p><p class="p1">Этим завершалось «королевское заседание».</p><p class="p1">Спикер низко склонился перед канцлером и, пятясь, спустился с помоста, подбирая сзади волочившуюся по полу мантию; все члены палаты, общин поклонились до самой земли и удалились из зала, между тем как лорды, не обращая внимания на вое эти почести, занялись очередными делами.</p></span></span></span></span>
