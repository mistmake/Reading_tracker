<p class="p">IV. Песчаник и кристалл</p>
</div><p class="p1">Дни проходили. Спокойствие постепенно возвращалось в душу Эсмеральды. Сильное отчаяние, как и сильная радость, не может долго продолжаться. Сердце человеческое не выносит долго крайнего напряжения. Цыганка так исстрадалась, что теперь у нее осталось только удивление.</p><p class="p1">Когда миновала опасность, вернулась надежда. Она была вне общества, вне жизни, но смутно чувствовала возможность вернуться к ним. Она была похожа на мертвеца, у которого есть ключ от его гробницы.</p><p class="p1">Постепенно исчезали страшные образы, так долго мучившие ее. Ужасные призраки – Пьера Тортерю, Жак Шармолю – исчезли из ее памяти, исчез даже священник.</p><p class="p1">Затем – Феб был жив, она была в этом уверена, она видела его.</p><p class="p1">Жизнь Феба – это было все. После роковых потрясений, все уничтоживших в ней, одно только чувство осталось нетронутым в ее душе: любовь к капитану. Любовь растет, как дерево, глубоко запускает корни в нашу душу и часто продолжает еще зеленеть над разбитым сердцем.</p><p class="p1">Непостижимо то, что страсть чем более слепа, тем упорнее. Она тем тверже, чем меньше у нее оснований.</p><p class="p1">Конечно, Эсмеральда думала о капитане с некоторой горечью. Конечно, было ужасно то, что он был обманут, что он поверил такой невозможной вещи, как удар кинжала от той, которая тысячу жизней отдала бы за него. Но не так уж он виноват: разве она не созналась в своем преступлении? Разве она, слабая женщина, не испугалась пытки? Она сама виновата. Она должна была дать вырвать себе ногти скорее, чем произнести такое слово. Если бы она хоть раз увидала Феба, довольно было бы одного ее слова, одного взгляда, чтобы разубедить его, чтобы вернуть его. В этом она не сомневалась. Она обманывала себя самыми невероятными предположениями относительно присутствия Феба в день ее публичного покаяния, относительно девушки, бывшей с ним. Это, несомненно, была его сестра. Она довольствовалась этой обманчивой мечтой, потому что у нее была потребность верить, что Феб ее любит, ее одну. Он клялся ей в этом, а чего же ей, доверчивой и простодушной, было больше нужно? В этом деле все внешние доказательства были скорей против нее, чем против него. Она ждала, она надеялась.</p><p class="p1">Вдобавок сама церковь, огромная церковь, которая ее окружала, защищала, спасала, успокаивала ее. Торжественные архитектурные линии, святость предметов, окружавших девушку, религиозные и светлые мысли, которые навевали даже эти камни, помимо ее воли действовали на нее. Звуки священные и торжественные смягчали ее больную душу. Монотонное пение священнослужителей, ответы народа священникам, порой беззвучные, порой громовые, гармоничное дрожание стекол, орган, звучащий, как сотни труб, три колокольни, жужжащие, как рой пчел, – весь этот оркестр, гамма которого пролетала от толпы к колокольне, усыплял ее память, ее воображение, ее горе. Особенно колокола убаюкивали ее, словно широкие волны магнетизма неслись к ней от их мощных корпусов.</p><p class="p1">Каждый восход солнца находил ее более успокоенной, менее бледной. По мере того как закрывались ее душевные раны, красота ее расцветала, но становилась более спокойной и серьезной. Между тем возвращался ее прежний характер. Она бывала иногда даже весела, мило надувала губки, и к ней возвращалась любовь к козочке, стыдливость и желание петь. Она одевалась утром в дальнем углу комнаты, чтоб кто-нибудь из обитателей соседних чердаков не увидал ее в окно.</p><p class="p1">Когда мысль о Фебе не поглощала ее всю, она думала о Квазимодо. Он был единственной связью, единственным звеном между нею и живыми людьми. Несчастная, она была более, чем Квазимодо, отдалена от мира! Она не понимала друга, посланного ей судьбой. Она часто упрекала себя в неблагодарности, но не могла привыкнуть к бедному звонарю. Он был слишком безобразен.</p><p class="p1">Эсмеральда оставила на полу свисток, который он дал ей. Это не помешало Квазимодо являться к ней в первые дни. Она старалась скрыть свое отвращение, когда он приносил ей еду и питье, но он замечал всякое ее движение и грустно уходил.</p><p class="p1">Раз он вошел, когда она ласкала Джали. Он постоял в задумчивости над этой грациозной группой, затем сказал, качая своей тяжелой, безобразной головой:</p><p class="p1">– Мое несчастье, что я еще слишком похож на человека. Я бы хотел быть совсем животным, как эта коза.</p><p class="p1">Она удивленно посмотрела на него.</p><p class="p1">Он ответил на этот взгляд:</p><p class="p1">– Я знаю почему, – и ушел.</p><p class="p1">В другой раз он показался в дверях кельи (он никогда не входил внутрь), когда Эсмеральда пела старую испанскую балладу, слов которой она не понимала, но которая осталась у нее в памяти с тех пор, как цыгане убаюкивали ее этой песнью. При виде страшного лица, внезапно появившегося среди ее пения, девушка умолкла и сделала невольное движение испуга. Несчастный звонарь упал на колени и, сложив свои огромные руки, горько проговорил:</p><p class="p1">– Умоляю вас, продолжайте и не гоните меня.</p><p class="p1">Она не хотела огорчить его и, еще дрожащая, продолжала свой романс. По мере того как она пела, страх ее прошел, и она поддалась вся настроению грустной песни. Он остался на коленях со сложенными, как для молитвы, руками и смотрел в ее блестящие глаза, как будто в них слушал песню.</p><p class="p1">Другой раз он как-то смущенно подошел к ней.</p><p class="p1">– Послушайте, – сказал он с усилием, – мне нужно сказать вам одну вещь.</p><p class="p1">Она сделала знак, что слушает его. Он начал вздыхать, открыл было губы, чтоб заговорить, но, только взглянул на нее, сделал отрицательное движение головой и медленно ушел, сжимая лоб руками, оставив цыганку в изумлении.</p><p class="p1">Между уродливыми фигурами, высеченными в стене, была одна, которую он особенно любил и с которой он, казалось, часто обменивался дружескими взглядами. Цыганка раз услышала, как он говорил изображению: «Зачем я не каменный, как ты!»</p><p class="p1">Однажды Эсмеральда приблизилась к краю крыши и смотрела на площадь из-за остроконечной крыши Сен-Жан-ле-Рон. Квазимодо стоял за нею. Он старался всегда стоять так, чтобы избавить девушку от неприятности видеть его. Вдруг цыганка вздрогнула, слезы и радость вместе блеснули в ее глазах, она опустилась на колени на краю крыши, с тоской протянула руки к площади и воскликнула:</p><p class="p1">– Феб! Приди, приди! Одно слово, одно только слово, ради бога, Феб! Феб!</p><p class="p1">Ее голос, ее лицо, ее движение, все в ней выражало ужас и мольбу тонущего, который видит веселый корабль, освещенный солнцем, проходящий на горизонте.</p><p class="p1">Квазимодо нагнулся и увидел, что предметом этой нежной и горячей мольбы был молодой человек, блестящий, нарядный капитан, который, заставляя гарцевать своего коня, приветствовал, сняв каску, прекрасную даму, улыбавшуюся ему с балкона. Офицер был слишком далеко, чтобы услыхать возглас несчастной.</p><p class="p1">Зато бедный глухой услыхал, и тяжкий вздох вырвался из его груди. Он вернулся в собор; его сердце было полно слез, которые он глотал. Он судорожно сжал руками голову, а когда снова отнял их, то в каждом кулаке оказалось по клоку рыжих волос.</p><p class="p1">Цыганка не обращала на него внимания. Он тихо произнес, скрежеща зубами:</p><p class="p1">– Проклятье! Так вот каким надо быть! Красивым снаружи!</p><p class="p1">Тем временем она, все еще стоя на коленях, кричала с невероятным возбуждением:</p><p class="p1">– Он слезает с лошади! Входит в дом! Феб! Феб! Неужели ты не слышишь меня! Феб! Эта злая женщина говорит с ним, чтоб он не услышал меня! Феб! Феб!</p><p class="p1">Глухой смотрел на нее. Он понимал ее. Он не давал течь слезам, наполнявшим его глаз. Вдруг он осторожно потянул ее за рукав. Она обернулась. Он спокойно сказал ей:</p><p class="p1">– Хотите, я схожу за ним?</p><p class="p1">Она радостно вскрикнула:</p><p class="p1">– Подите! Поди, беги скорей! Приведи мне этого капитана! Я буду любить тебя!</p><p class="p1">Она обняла его колени, он печально покачал головой.</p><p class="p1">– Я вам приведу его, – сказал он слабым голосом и опрометью бросился с лестницы, задыхаясь от рыданий.</p><p class="p1">Когда он дошел до площади, то увидал только лошадь, привязанную у подъезда дома Гондлорье; капитан уже вошел в дом.</p><p class="p1">Он поднял глаза на крышу собора. Эсмеральда стояла на том же месте, в той же позе. Он печально кивнул ей головой и прислонился к крыльцу дома, решив дождаться выхода капитана.</p><p class="p1">В доме Гондлорье происходило одно из тех праздничных собраний, которые предшествуют свадьбе. Квазимодо видел много людей, входивших туда, но никто не выходил. Время от времени он бросал взгляд на крышу, – цыганка не двигалась, так же, как и он. Конюх отвязал лошадь и увел ее в конюшню.</p><p class="p1">Так прошел весь день: Квазимодо – у подъезда, Эсмеральда – на крыше, Феб – должно быть, у ног Флёр де Лис.</p><p class="p1">Наконец наступила ночь, ночь безлунная, темная. Квазимодо не отводил взгляда от Эсмеральды; вскоре он стал различать в сумерках лишь белое пятно; затем и оно исчезло. Все стерлось, все было черно.</p><p class="p1">Квазимодо видел, как зажглись по всему фасаду, сверху донизу, окна дома Гондлорье; он видел, как осветились одно за другим остальные окна, выходящие на площадь; он видел, как они погасли все до одного, потому что он весь вечер пробыл на посту. Офицер не выходил.</p><p class="p1">Когда все прохожие возвратились к себе домой, когда все огни в других домах погасли, Квазимодо остался один в полном мраке. Тогда еще не было освещения на площадке перед собором Богоматери.</p><p class="p1">Только в квартире Гондлорье окна были освещены и после полуночи. За цветными стеклами неподвижно наблюдающий Квазимодо видел толпу подвижных пляшущих теней. Если бы он не был глух, он, по мере того как утихал засыпающий Париж, все яснее слышал бы шум бала, смех и музыку, доносившиеся из дома Гондлорье.</p><p class="p1">Около часу ночи гости стали расходиться. Квазимодо, притаившись в темноте, оглядывал их всех. Капитана между ними не было. Грустные думы овладевали звонарем. По временам он с тоской взглядывал кверху. Большие черные, тяжелые, разорванные облака висели, как гамаки, под звездным небом. Они были похожи на паутину, сплетенную под небосводом.</p><p class="p1">Вдруг он заметил, что таинственно отворилась дверь балкона, каменная ограда которого вырисовывалась над его головой. Хрупкая стеклянная дверь пропустила двух человек и бесшумно затворилась за ними – это были мужчина и женщина. Квазимодо с трудом узнал в мужчине прекрасного капитана, в женщине – молодую даму, приветствовавшую утром прибывшего капитана с этого самого балкона. На площади было совершенно темно, а двойная темно-красная драпировка, опустившаяся за дверью, как только та закрылась, не пропускала на балкон света из комнаты.</p><p class="p1">Молодые люди, насколько мог судить наш глухой, не слыхавший их слов, были очень нежны друг с другом. Молодая девушка, казалось, позволила офицеру обвить рукой свой стан и не очень сопротивлялась его поцелую.</p><p class="p1">Квазимодо присутствовал внизу при этой сцене, тем более очаровательной, что она не предназначалась для посторонних глаз. Он с горечью наблюдал такое счастье. Природа не молчала в несчастном: его искривленный позвоночник был способен к жизни, как и всякий другой. Он думал о том, как ужасна предначертанная ему Провидением участь, о том, что женщина, любовь, страсть всегда будут проходить мимо него и что он может быть только зрителем чужого счастья. Но более всего мучила его и заставляла негодовать мысль о том, как страдала бы цыганка, если бы могла видеть эту сцену. Но ночь была темна, и даже если Эсмеральда и не покинула крыши (в чем он не сомневался), она была слишком далеко, а он сам с трудом различал влюбленных на балконе. Это его утешало.</p><p class="p1">Разговор между тем становился оживленнее. Молодая дама, казалось, умоляла офицера не требовать от нее большего. Но Квазимодо только мог увидеть с мольбой сжатые руки, улыбки, смешанные со слезами, поднятые к небу глаза девушки и страстный взгляд капитана, устремленный на нее.</p><p class="p1">По счастью – так как девушка сопротивлялась все слабее, – дверь балкона внезапно открылась, явилась пожилая дама; красавица казалась сконфуженной, офицер – рассерженным, и все трое ушли в комнаты.</p><p class="p1">Через несколько минут лошадь зафыркала у подъезда, и блестящий офицер, завернутый в плащ, проехал мимо Квазимодо.</p><p class="p1">Звонарь дал ему доехать до угла, затем побежал за ним с быстротою обезьяны и закричал:</p><p class="p1">– Эй! Капитан!</p><p class="p1">Капитан остановился.</p><p class="p1">– Что тебе надо, бродяга? – спросил он, заметив в темноте странную фигуру, прихрамывая, бежавшую к нему.</p><p class="p1">Квазимодо, добежав, смело схватил лошадь за узду и сказал:</p><p class="p1">– Следуйте за мной, капитан, с вами желают поговорить.</p><p class="p1">– Черт побери, – проворчал Феб, – я где-то видел эту зловещую птицу. Эй, ты, отпусти повод моей лошади.</p><p class="p1">– Капитан, – ответил глухой, – вы не спрашиваете, кто желает видеть вас?</p><p class="p1">– Я говорю: отпусти мою лошадь, – с нетерпением сказал Феб. – Чего ты повис на ней? За виселицу ее принимаешь, что ли?</p><p class="p1">Квазимодо, не оставляя повода, старался загородить ему дорогу. Не понимая, чем объяснить упорство капитана, он поспешно сказал:</p><p class="p1">– Пойдемте, капитан, вас ждет женщина. Женщина, которая вас любит, – с усилием добавил он.</p><p class="p1">– Дурак, – сказал капитан, – точно я должен идти к каждой женщине, которая меня любит или уверяет в этом. Может быть, она на тебя похожа, филин? Скажи ей, что я женюсь и чтоб она убиралась к черту!</p><p class="p1">– Послушайте, господин! – воскликнул Квазимодо, думая одним словом сломать его нерешительность. – Пойдемте, это цыганка, которую вы знаете!</p><p class="p1">Это слово действительно произвело впечатление на Феба, но не то, которого ожидал глухой. Читатель помнит, что наш блестящий офицер ушел с балкона вместе с Флёр де Лис прежде, чем Квазимодо спас осужденную из рук Шармолю. С тех пор во время своих визитов в дом Гондлорье он не говорил о женщине, воспоминание о которой было ему тяжело, да и Флёр де Лис не нашла нужным сообщить ему, что цыганка жива. Феб думал, что бедная «Симиляр» умерла месяца два тому назад. Прибавим, что ночь была темная, что вид у посланника был страшный, голос замогильный, что была полночь, что улица была так же безлюдна, как тогда, когда мрачный монах напал на него, и лошадь его захрапела, косясь на Квазимодо.</p><p class="p1">– Цыганка! – воскликнул он в испуге. – Что же ты – пришелец с того света? – Он положил руку на эфес шпаги.</p><p class="p1">– Скорей, скорей, – говорил глухой, стараясь повести лошадь за собой, – вот сюда!</p><p class="p1">Феб изо всех сил ударил его ногой в грудь.</p><p class="p1">Глаз Квазимодо засверкал. Он сделал движение, чтобы броситься на капитана, но удержался и сказал:</p><p class="p1">– Как вы счастливы, что кто-то вас так любит!</p><p class="p1">Он сделал ударение на слове «кто-то» и, бросив повод, сказал:</p><p class="p1">– Уезжайте!</p><p class="p1">Феб с проклятием вонзил шпоры в бока лошади. Глядя, как он исчезает в ночном тумане, бедный глухой промолвил:</p><p class="p1">– Боже мой! Отказаться от этого!</p><p class="p1">Он вернулся в собор, зажег светильник и поднялся на башню. Как он и ожидал, цыганка была все на том же месте. Как только она заметила Квазимодо, она полетела к нему навстречу.</p><p class="p1">– Один! – вскрикнула она, горестно сжимая прекрасные руки.</p><p class="p1">– Я не мог найти его, – холодно ответил Квазимодо.</p><p class="p1">– Надо было ждать всю ночь! – горячо воскликнула она.</p><p class="p1">Он видел ее гневное движение и понял упрек.</p><p class="p1">– Я постараюсь в другой раз, – сказал он, опуская голову.</p><p class="p1">– Поди прочь! – сказала она.</p><p class="p1">Квазимодо оставил ее. Она была недовольна им. Он, однако, предпочел вынести ее гнев, чем огорчить ее.</p><p class="p1">С этого дня цыганка не видала его: он перестал подходить к ее келье. Иногда она видела на какой-нибудь башне грустное, наблюдающее за нею лицо звонаря. Но как только она замечала его, он исчезал.</p><p class="p1">Мы должны признаться, что ее мало огорчало добровольное отсутствие бедного горбуна. В глубине души она даже была рада. Квазимодо прекрасно это знал.</p><p class="p1">Она не видела его, но чувствовала присутствие доброго гения. Еду приносила ей во время ее сна невидимая рука. Однажды утром она нашла на своем окне клетку с птицами. Над кельей была скульптурная голова, которая пугала ее. Эсмеральда не раз выражала испуг в присутствии Квазимодо. И вот однажды утром – все делалось по ночам – этого изображения не оказалось, кто-то разбил его. Тот, кто влез туда, где находилось изваяние, рисковал жизнью.</p><p class="p1">Иногда вечером она слышала из-под колокольни как бы убаюкивающую ее грустную и странную песню. Это были стихи без рифм, которые может сочинить и глухой:</p><div class="poem">
<div class="stanza">
<p class="v">Не смотри ты на лицо,</p>
<p class="v">Девушка, смотри на сердце,</p>
<p class="v">Сердце красавца бывает уродливо.</p>
<p class="v">Есть сердца, где любовь живет недолго.</p>
<p class="v">Девушка, сосна не так красива,</p>
<p class="v">Не так красива, как тополь,</p>
<p class="v">Но не вянет и зимою.</p>
<p class="v">Ах, слова эти напрасны,</p>
<p class="v">Не должно бы жить уродство:</p>
<p class="v">Красота любит красоту,</p>
<p class="v">Апрель убегает от января.</p>
<p class="v">Красота прекрасна,</p>
<p class="v">Красоте все доступно,</p>
</div>
<div class="stanza">
<p class="v">Лишь одна красота живет полной жизнью.</p>
<p class="v">Ворон только днем летает,</p>
<p class="v">А сова летает ночью,</p>
<p class="v">Лебедь день и ночь летает.</p>
</div>
</div><p class="p1">Однажды утром, проснувшись, она увидела на своем окне две вазы с цветами. Одна была хрустальная – красивая и блестящая, но надтреснутая: вода вытекла из нее, и цветы завяли; другая была из грубого песчаника, но она сохранила всю воду, и цветы в ней оставались свежими и яркими.</p><p class="p1">Не знаю, было ли то намеренно, но Эсмеральда взяла увядшие цветы и носила их целый день на груди.</p><p class="p1">В этот день она не слыхала пения на колокольне.</p><p class="p1">Она не обратила на это внимания. Эсмеральда проводила дни, лаская Джали, наблюдая за подъездом дома Гондлорье, беседуя вполголоса с Фебом, кормя крошками хлеба ласточек.</p><p class="p1">Наконец она совсем перестала видеть и слышать Квазимодо. Бедный звонарь, казалось, совсем исчез из собора.</p><p class="p1">Но в одну ночь, когда думы о Фебе мешали ей спать, она услыхала вздохи возле своей кельи.</p><p class="p1">Испугавшись, она встала и при свете луны увидела темную массу, лежавшую поперек ее двери. Это был Квазимодо, спавший на голом камне.</p></span><span id="id58"><div class="title6">
<p class="p">V. Ключи от Красной двери</p>
</div><p class="p1">Тем временем общественная молва о чудесном спасении цыганки дошла до слуха архидьякона. Узнав об этом, он не мог понять, что с ним происходит. Он свыкся с мыслью о смерти Эсмеральды. Он был спокоен. Он испытал всю глубину страдания. Человеческое сердце (Клод размышлял на этот счет) может вынести только известную долю страдания.</p><p class="p1">Когда губка насыщена, целое море может прокатиться по ней, не прибавив ни одной капли воды.</p><p class="p1">Эсмеральда была мертва, губка насыщена, все было кончено на свете для Клода. Но узнать, что и она, и Феб живы, – это было возобновление пытки, потрясений, страданий, жизни. А Клод устал от всего этого.</p><p class="p1">Когда священник узнал эту новость, он заперся в своей монастырской келье.</p><p class="p1">Он не являлся ни на собрания капитула, ни на службы. Дверь его была заперта даже для епископа.</p><p class="p1">Так провел он несколько недель. Думали, что он болен. И это была правда.</p><p class="p1">Что делал он взаперти? С какими мыслями бился? Быть может, вел последний бой со своей роковой страстью? Или обдумывал последний план смерти для нее и гибели для себя?</p><p class="p1">Жан, его любимый брат, его балованный ребенок, стучался в его дверь, умолял, заклинал, десятки раз называл свое имя. Клод не впустил его.</p><p class="p1">Он проводил целые дни, прислонив лицо к стеклу окна. Из этого окна в монастыре он видел келью Эсмеральды, он часто видел ее с козочкой, иногда с Квазимодо. Клод видел ухаживание за нею глухого, его внимание, его послушание цыганке. У него была хорошая память, а память – мучительница ревнивцев, и он вспоминал странный взгляд, брошенный как-то звонарем на танцовщицу. Клод спрашивал себя, какая причина могла заставить Квазимодо спасти ее. Он был свидетелем коротких встреч цыганки с глухим, и ее жесты, дорисованные его страстным воображением, издали казались ему нежными. Он не доверял женщинам. И в нем пробудилась ревность, которой он не ожидал и которая заставляла его краснеть от стыда и негодования. «Пусть бы еще капитан, – с возмущением думал он, – но этот!» Мысль эта терзала его.</p><p class="p1">Ночи его были ужасны. С тех пор как он узнал, что цыганка жива, его страхи перед призраком и могилой исчезли, но возвратилась физическая страсть. Он корчился на своей постели при мысли, что молодая смуглянка была так близко от него.</p><p class="p1">Каждую ночь его воспаленное воображение рисовало ему Эсмеральду в позах, заставлявших кипеть его кровь. То он видел ее склонившейся над заколотым капитаном, с закрытыми глазами, с белой грудью, окрашенной кровью Феба, в ту блаженную минуту, когда он запечатлел на ее бледных губах поцелуй, огонь которого несчастная почувствовала, хотя была полумертва. То представлялась она ему полураздетой в руках мучителей, когда винты испанского «сапога» охватили ее маленькую ступню, ее стройную, округлую ножку, ее гибкое, белое колено. Он еще видел ее словно выточенное из слоновой кости колено, выглядывавшее из ужасного орудия пытки Тортерю. Наконец он воображал ее в рубашке, с веревкой на шее, с обнаженными плечами, босыми ногами, почти всю обнаженную, какой видел ее в последний раз. При этих сладострастных образах он сжимал кулаки, и дрожь пробегала у него по спине.</p><p class="p1">Одну ночь эти образы так разожгли в его венах кровь девственника и священника, что он кусал свою подушку. Наконец он встал, накинул плащ поверх сорочки и, с лампой в руках, безумный, полураздетый, с воспаленными глазами, вышел из своей кельи.</p><p class="p1">Клод знал, где найти ключ от Красной двери, соединявшей монастырь с собором, а ключ от башен, как известно, всегда был с ним.</p></span><span id="id59"><div class="title6">
<p class="p">VI. Продолжение рассказа о ключе от Красной двери</p>
</div><p class="p1">В эту ночь Эсмеральда заснула в своей келье, полная забвения, надежд и сладких грез. Она спала уже некоторое время, видя во сне, как всегда, Феба, как вдруг услыхала около себя шум. У нее был легкий беспокойный сон птицы: малейший шорох пробуждал ее. Она открыла глаза. Было темно. Тем не менее она увидала в своем окне смотрящее на нее лицо. Лампа освещала это видение. Заметив, что Эсмеральда увидела его, призрак задул лампу, но Эсмеральда успела разглядеть его. Веки девушки опустились от ужаса.</p><p class="p1">– О, – сказала она упавшим голосом, – священник!</p><p class="p1">Все минувшее горе, как молния, охватило ее, и она, похолодев, упала на постель.</p><p class="p1">Через мгновение она почувствовала прикосновение к своему телу, прикосновение, от которого она встрепенулась и хотела в ярости вскочить.</p><p class="p1">Священник был около нее и крепко обхватил ее руками. Она хотела закричать, но не могла.</p><p class="p1">– Уйди, изверг! Уйди, убийца! – шептала она дрожащим от негодования и ужаса голосом.</p><p class="p1">– Сжалься надо мной! – говорил священник, целуя ее плечи.</p><p class="p1">Она обеими руками схватила за остатки волос его плешивую голову и старалась отдалить от себе его поцелуи, как будто то были ядовитые укусы.</p><p class="p1">– Сжалься! – повторял несчастный. – Если б ты знала мою любовь к тебе! Это огонь, растопленное олово, тысяча ножей в сердце!</p><p class="p1">Он с неестественной силой схватил ее руки.</p><p class="p1">– Пусти меня, – растерянно промолвила она, – пусти, или я плюну тебе в лицо.</p><p class="p1">Священник отпустил ее.</p><p class="p1">– Унижай меня, бей меня, будь злой, делай со мной, что хочешь, но только сжалься! Полюби меня.</p><p class="p1">Тогда она начала бить его с яростью ребенка. Своими прекрасными ручками она била его по лицу.</p><p class="p1">– Уходи, дьявол!</p><p class="p1">– Люби меня, люби меня! Пожалей меня! – кричал священник, прижимаясь к ней, отвечая ласками на удары.</p><p class="p1">Вдруг она почувствовала, что он сильнее ее.</p><p class="p1">– Пора кончить! – прошептал он сквозь зубы.</p><p class="p1">Она была побеждена, разбита. Дрожащая, она была в его руках, в его власти. Она чувствовала, как сладострастная рука блуждает по ее телу. Сделав последнее усилие, она закричала:</p><p class="p1">– Спасите! Сюда! Вампир! Вампир!..</p><p class="p1">Никто не являлся на помощь, одна Джали проснулась и жалобно заблеяла.</p><p class="p1">– Молчи! – повторял, задыхаясь, священник.</p><p class="p1">Вдруг, борясь с ним, ползая по земле, цыганка нащупала что-то холодное, металлическое. Это был свисток Квазимодо. Она схватила его с порывом надежды, поднесла к губам и дунула в него из последних сил. Свисток издал пронзительный, резкий, чистый звук.</p><p class="p1">– Что это? – проговорил священник.</p><p class="p1">Почти в то же мгновение его приподняли вверх сильные руки. В келье было темно. Он не видел, кто держал его, но слышал бешеный скрежет зубов и разглядел поднятое над ним лезвие ножа.</p><p class="p1">Священнику показалось, что это Квазимодо, это не мог быть никто другой. Он вспомнил, что, входя, чуть не наступил на какую-то массу, лежавшую снаружи у двери. Но так как явившийся на зов не произносил ни слова, Клод не знал, что и подумать. Он схватил руку, державшую нож, и закричал: «Квазимодо!» – забыв в этот ужасный момент, что Квазимодо глух.</p><p class="p1">В одно мгновение священник был брошен на пол и ощутил железное колено у себя на груди. По этому острому колену он узнал Квазимодо. Но как поступить, чтобы Квазимодо мог узнать его? Ночь превращала глухого в слепого.</p><p class="p1">Ему грозила гибель. Молодая девушка, безжалостная, как разъяренная тигрица, не думала спасать его. Острие кинжала приближалось к его голове. Минута была критической. Вдруг его враг поколебался.</p><p class="p1">– Кровь не должна коснуться ее, – сказал он глухо.</p><p class="p1">Это действительно был голос Квазимодо.</p><p class="p1">Сильная рука выволокла священника за ноги из комнаты. Там должен был он умереть. На его счастье, в это время взошла луна. Когда они очутились за дверью кельи, ее бледный луч упал на лицо священника. Квазимодо взглянул на него, задрожал, бросил его и попятился.</p><p class="p1">Цыганка, подошедшая к порогу своей кельи, увидела с удивлением, что роли переменились. Теперь священник грозил, Квазимодо умолял.</p><p class="p1">Священник, осыпавший его жестами гнева и упрека, властно приказал ему удалиться.</p><p class="p1">Глухой опустил голову, потом стал на колени перед дверью цыганки.</p><p class="p1">– Ваше преподобие, – сказал он покорным, но торжественным голосом, – вы сделаете все, что вам будет угодно, но прежде убейте меня.</p><p class="p1">Говоря это, он подал священнику свой нож. Взбешенный священник хотел схватить нож, но молодая девушка оказалась проворнее. Она вырвала нож из рук Квазимодо и злобно расхохоталась.</p><p class="p1">– Подойди! – сказала она священнику.</p><p class="p1">Она подняла нож. Священник остановился. Без всякого сомнения, она ударила бы его.</p><p class="p1">– Ты не смеешь подойти, трус! – закричала она. Потом прибавила безжалостно, так как знала, что это каленым железом пронзит сердце священника: – Я знаю, что Феб жив!</p><p class="p1">Священник отшвырнул Квазимодо ногой и, дрожа от бешенства, скрылся на лестнице.</p><p class="p1">Когда он ушел, Квазимодо поднял свисток, который спас цыганку, и подал его ей, говоря:</p><p class="p1">– А то он было совсем заржавел!..</p><p class="p1">С этими словами он оставил ее одну. Молодая девушка, измученная этой бурной сценой, упала в изнеможении на свою постель и разразилась рыданиями. Ее горизонт снова затягивался тучами.</p><p class="p1">Священник ощупью вернулся в свою келью. Свершилось: Клод ревновал цыганку к Квазимодо. Он задумчиво повторял роковые слова:</p><p class="p1">– Она не достанется никому.</p></span></span></span>
