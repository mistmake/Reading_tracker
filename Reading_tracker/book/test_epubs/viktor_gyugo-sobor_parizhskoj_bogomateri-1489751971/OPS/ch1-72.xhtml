<p class="p">4. Magister elegantiarum – Законодатель изящества</p>
</div><p class="p1">Джозиана, конечно, скучала.</p><p class="p1">Лорд Дэвид Дерри-Мойр занимал выдающееся место среди веселящегося лондонского общества. Аристократия и дворянство относились к нему с глубоким почтением.</p><p class="p1">Отметим один из славных подвигов лорда Дэвида: он осмелился носить собственные волосы. Реакция против париков уже начиналась. Подобно тому как в 1824 году Эжен Девериа первый отважился отпустить бороду, так в 1702 году Прайс Девере первый появился в обществе с прической из собственных, искусно завитых волос. Рисковать шевелюрой значило почти рисковать головой. Негодование было всеобщим, хотя Прайс Девере был виконтом Герфордом и пэром Англии. Его оскорбляли, и действительно было за что. И вот, в самый разгар этой травли, лорд Дэвид неожиданно появился тоже без парика, в прическе из своих волос. Подобные поступки знаменуют собою начало крушения общественного уклада. На лорда Дэвида посыпалось еще больше оскорблений, чем на виконта Герфорда. Он, однако, продолжал делать по-своему. Прайс Девере был первым, Дэвид Дерри-Мойр оказался вторым. Иногда вторым быть труднее, чем первым. Для этого нужно меньше гениальности, но больше отваги. Первый, упоенный новизной, может не знать размеров угрожающей ему опасности, второй же видит пропасть и все же бросается в нее. Вот в эту-то пропасть и устремился Дэвид Дерри-Мойр, дерзнув вторым появиться без парика. Позднее у двух смельчаков нашлись подражатели, рискнувшие носить собственные волосы; смягчающим обстоятельством явилась пудра.</p><p class="p1">Чтобы правильнее осветить столь важный исторический факт, мы должны признать настоящее первенство в этой войне против париков за шведской королевой Христиной, одевавшейся в мужское платье и носившей, начиная с 1680 года, свои собственные каштановые волосы, напудренные и беспорядочно взбитые. Впрочем, у нее, кроме того, была, по словам Миссона, «кое-какая растительность на подбородке». Со своей стороны папа римский тоже подорвал отчасти уважение к парику, издав в марте 1694 года буллу, запрещавшую епископам и священникам носить парики и предписав всем служителям церкви отращивать волосы.</p><p class="p1">Итак, лорд Дэвид не признавал парика и, кроме того, носил сапоги из юфти.</p><p class="p1">Эти подвиги вызывали всеобщее восхищение. Не было ни одного аристократического клуба, где лорд Дэвид не состоял бы почетным членом, не проходило ни одного состязания боксеров, где бы он не являлся для всех желанным referee. Referee – значит судья.</p><p class="p1">Он принял участие в сочинении уставов нескольких клубов лондонского высшего света; он основал ряд великолепных учреждений, из которых одно, а именно «Леди Гинея», существовало в Пел-Меле еще в 1772 году. Там играли на золото. Самой маленькой ставкой был столбик из пятидесяти гиней; в банке никогда не было меньше двадцати тысяч гиней. Подле каждого игрока стоял столик, чтобы ставить на него чай и золоченую деревянную чашку для гиней. Игроки надевали, как лакеи во время чистки ножей, кожаные нарукавники и нагрудники, предохранявшие от порчи их кружевные манжеты и брыжи; широкополые соломенные шляпы, украшенные цветами, защищали их от яркого света и сохраняли завивку. Все они были в масках, чтобы скрыть свое волнение, в особенности когда шла игра в «пятнадцать». Камзолы они надевали наизнанку, так как, говорят, это приносит удачу.</p><p class="p1">Лорд Дэвид состоял членом «Бифштекс-клуба», «Серли-клуба», «Клуба ворчунов», «Сплит-фартинг-клуба», «Клуба скаредов», «Клуба запечатанного узла» («Силед-Нот»), «Клуба роялистов» и «Клуба Мартина Скриблера», основанного Свифтом взамен «Клуба Рота», учрежденного Мильтоном.</p><p class="p1">Несмотря на свою красивую наружность, он был также членом «Клуба безобразных». Этот клуб был посвящен уродству. Там давали обещание драться не из-за красивых женщин, а из-за безобразных мужчин. В зале клуба были развешаны портреты уродливых людей: Терсита, Трибуле, Дунса, Гудибраса, Скаррона; на камине между двумя кривыми – Коклесом и Камоэнсом – стоял Эзоп; Коклес был крив на левый глаз, а Камоэнс на правый; каждый из них был обращен к зрителю своим невидящим глазом; их слепые профили смотрели друг на друга. В тот день, когда красавица Визар заболела оспой, в «Клубе безобразных» пили за ее здоровье. Этот клуб процветал еще в начале девятнадцатого столетия; он послал Мирабо диплом почетного члена.</p><p class="p1">С восстановлением на престоле Карла II все республиканские клубы были уничтожены. На улице, прилегавшей к Мурфилдсу, была уничтожена таверна, в которой заседал «Клуб телячьей головы», получивший это название потому, что 30 января 1649 года, в день, когда пролилась на эшафоте кровь Карла I, здесь пили красное вино за здоровье Кромвеля из телячьего черепа.</p><p class="p1">На смену республиканским клубам явились клубы монархические.</p><p class="p1">Там развлекались вполне благопристойно: например, члены «Клуба озорников» хватали на улице какую-нибудь проходившую мимо мещанку, по возможности не старую и не безобразную, силой затаскивали ее в клуб и заставляли ходить на руках, вверх ногами, причем падавшие на голову юбки закрывали ей лицо. Если она упрямилась, ее слегка подстегивали хлыстом по тем частям тела, которых больше не скрывала одежда. Сама виновата, изволь слушаться. Подвизавшиеся в этом своеобразном манеже назывались «прыгунами».</p><p class="p1">Был клуб «Жарких молний», который назывался также «Клубом веселых танцев». Там заставляли негров и белых женщин исполнять танцы перуанских пикантов и тимтиримбасов, в частности «мозамалу» (дурная девушка) – пляску, завершающуюся тем, что танцовщица садится на кучу отрубей и, подымаясь, оставляет на ней отпечаток неудобоназываемой части тела. Там же ставили в лицах картину, о которой говорит стих Лукреция:</p><p class="p1">Tunc Venus in sylvis jungebat corpora amantum<a href="ch2.xhtml#id255" class="a">[185]</a>.</p><p class="p1">Был «Клуб адского пламени», в котором занимались богохульством. Члены его соперничали друг с другом в кощунстве. Ад доставался в награду тому, кто превосходил в этом отношении всех остальных.</p><p class="p1">Был «Клуб ударов головы», названный так потому, что там наносили людям удары головой. Подыскивали какого-нибудь грузчика с широкой грудью и глупым лицом. Предлагали ему, а иногда и насильно заставляли его согласиться выпить кружку портера с тем, что его четыре раза ударят в грудь головой. Потом составлялись пари. Один валлиец, по имени Гоганджерд, здоровенный малый, после третьего удара испустил дух. Дело оказалось довольно серьезным. Началось расследование, и комиссия установила: «Умер от разрыва сердца вследствие злоупотребления спиртными напитками». Гоганджерд действительно выпил кружку портера.</p><p class="p1">Был еще «Фен-клуб». Fun, как и cant или как humour, – термин почти непереводимый. По отношению к шутке fun то же, что перец по отношению к соли. Пробраться к кому-нибудь в дом, разбить дорогое зеркало, изрезать фамильные портреты, отравить собаку, посадить к птицам кошку, все это – fun. Распустить слух о чьей-нибудь смерти, заставив родственников мнимого покойника облечься в траур, – это тоже fun. Тот, кто прорезал в картине Гольбейна в Гемптон-Корте большую четырехугольную дыру, тоже устроил fun.</p><p class="p1">Самым замечательным fun было бы отбить руку у Венеры Милосской. При Иакове II один молодой лорд миллионер заставил хохотать весь Лондон: он ночью поджег для забавы чью-то лачугу; его объявили королем fun. Несчастные обитатели лачуги спаслись в одном белье, лишившись всего своего убогого скарба. Ночью, когда обыватели спали, члены «Фен-клуба», все представители высшей аристократии, бродили по Лондону, срывали с петель ставни, перерезали пожарные кишки, вышибали дно у бочек с водой, снимали вывески, топтали огороды, тушили уличные фонари, перепиливали столбы, подпиравшие ветхие стены домов, разбивали оконные стекла, в особенности в бедных кварталах. Так поступали с бедняками богачи. Жаловаться на них было невозможно. Впрочем, все это считалось шутками. Подобные нравы и до сих пор еще не совсем вывелись. В разных частях Англии или английских владений, например на острове Гернсей, от времени до времени на ваш дом ночью происходит небольшое нападение: у вас ломают забор, срывают молоток у двери и т. д. Если бы это проделывали бедняки, их сослали бы на каторгу, но этим занимается золотая молодежь.</p><p class="p1">Во главе самого аристократического клуба стоял председатель, который носил на лбу полумесяц и назывался «Великим могоком». Могок превосходил даже fun. Делать зло во имя зла – такова была его программа. «Могок-клуб» ставил перед собой великую цель – вредить. Для достижения этой цели все средства были хороши. Тот, кто становился могоком, давал клятву всем вредить. Вредить во что бы то ни стало, все равно когда, все равно кому, все равно как, – это входило в его обязанность. Всякий член «Могок-клуба» должен был иметь какой-нибудь особый талант. Один был «учителем танцев»: он заставлял подскакивать крестьян тем, что колол им шпагой икры. Другой умел «вгонять в пот». Для этого шесть-восемь джентльменов, вооруженных рапирами, останавливали какого-нибудь бродягу; оборванец, окруженный со всех сторон, неизменно оказывался к кому-нибудь спиной; джентльмен, к которому несчастный обращался спиной, колол его клинком, отчего бедняга невольно поворачивался; новая рана в поясницу давала ему знать о том, что сзади него стоит другой джентльмен; таким образом, его кололи по очереди; когда забавникам казалось, что израненный человек достаточно навертелся и напрыгался, они приказывали лакеям избить его, чтобы изменить направление его мыслей. Другие «били льва», то есть со смехом останавливали какого-нибудь прохожего, ударом кулака разбивали ему нос и большими пальцами вдавливали глаза. Если он навсегда терял зрение, его вознаграждали за слепоту некоторой суммой денег.</p><p class="p1">Вот как мило развлекались в начале восемнадцатого столетия богатые лондонские повесы. Парижские бездельники развлекались по-своему. Граф де Шароле подстрелил мирного жителя, стоявшего на пороге своего дома. Молодость любит повеселиться.</p><p class="p1">Лорд Дэвид Дерри-Мойр вносил во все эти увеселительные учреждения свойственный ему дух великолепной щедрости. Как и все, он весело поджигал крытую соломой деревянную лачугу и поджаривал немного ее обитателей, но зато потом он строил им каменный дом. Однажды в «Клубе озорников» ему случилось заставить танцевать на руках двух женщин. Одной из них, девушке, он дал потом хорошее приданое; другая была замужем, и он выхлопотал ее мужу место капеллана.</p><p class="p1">Он ввел достойные похвал усовершенствования в петушиные бои. Нельзя было не любоваться им, когда он готовил петуха к бою. Как люди хватают друг друга за волосы, так петухи друг друга хватают за перья. Поэтому лорд Дэвид делал своего петуха как можно более лысым. Он самолично срезывал ему ножницами все перья на хвосте и от головы до плеч. «Тем меньше останется для клюва противника», – говорил он. Потом он расправлял петуху крылья и одно за другим заострял в них перья, так что каждое перо становилось своего рода копьем. «А это для глаз противника», – объяснял он. Потом он скоблил ему лапы, перочинным ножиком оттачивал когти, надевал на шпоры острые стальные наконечники; поплевав ему на голову и на шею, он натирал его своей слюной, как натирали маслом тела атлетов, и выпускал его в этом устрашающем виде, возглашая:</p><p class="p1">– Вот как из петуха делают орла и как обитателя курятника превращают в горную птицу.</p><p class="p1">Лорд Дэвид неизменно присутствовал при боксе и являлся тончайшим знатоком всех правил этого спорта. Под его наблюдением перед каждым серьезным боем вколачивались колья и протягивалась меж ними веревка; он определял величину площадки, на которой будет происходить поединок. Когда он бывал секундантом, он шаг за шагом следовал за своим подопечным с бутылкой в одной руке и губкой в другой, кричал боксеру: «Бей крепче!», подсказывал всякие уловки, давал советы, вытирал ему кровь, подымал, когда тот падал, и, положив к себе на колени, поил его; набрав воды в рот, прыскал ему в лицо, обмывал глаза и уши; таким образом он приводил в чувство даже умирающих. Когда он бывал судьей, он всегда следил за правильностью ударов, запрещал кому бы то ни было, кроме секундантов, помогать дерущимся, объявлял побежденным чемпиона, который становился в неправильную позицию к противнику, наблюдал, чтобы приготовления к схватке не длились больше полминуты, не позволял подставлять подножку, не разрешал наносить удары головой или бить упавшего. Вся эта премудрость отнюдь не делала из него педанта и ничуть не вредила его светскости.</p><p class="p1">И уж когда судьей в боксе бывал он, ни один из загорелых, прыщавых, нестриженых сторонников того или иного бойца не осмеливался перелезать через ограду, выскакивать на середину площадки, разрывать веревки, вытаскивать колья и вмешиваться в бой, чтобы прийти на помощь слабеющему боксеру и склонить весы счастья на его сторону. Лорд Дэвид принадлежал к числу тех немногих судей, которым не осмеливались задать трепку.</p><p class="p1">Никто не умел так тренировать, как он. Боксер, получивший согласие лорда Дэвида быть его тренером, был заранее уверен в победе. Лорд Дэвид выбирал геркулеса, крепкого как скала и высокого, как башня, и воспитывал его как родное дитя. Задача состояла в том, чтобы научить эту каменную глыбу в образе человека переходить из положения оборонительного в положение наступательное, и лорд Дэвид блестяще разрешал ее. Выбрав великана, он уже не расставался с ним. Он становился его нянькой. Он отмерял ему вино, отвешивал мясо, считал часы его сна. Он установил тот замечательный режим для атлетов, который впоследствии возобновил Морлей: утром сырое яйцо и стакан хереса, в полдень кровавый бифштекс и чай, в четыре часа поджаренный хлеб и чай, вечером эль и поджаренный хлеб. После этого он раздевал своего питомца, массировал и укладывал в постель. На улице он не терял его из виду, оберегал от всяких опасностей: от вырвавшихся на свободу лошадей, от колес экипажей, от пьяных солдат и красивых девушек. Он следил за его нравственностью. С материнской заботливостью он вносил все новые и новые усовершенствования в воспитание опекаемого им силача. Он показывал ему, как надо выбивать зубы ударом кулака, как выдавливать большим пальцем глаз. Трудно было представить себе что-либо более трогательное.</p><p class="p1">Вот каким образом готовил он себя к политической деятельности, которой впоследствии должен был заняться. Не так-то просто стать настоящим джентльменом.</p><p class="p1">Лорд Дэвид Дерри-Мойр страстно любил уличные зрелища, театральные подмостки, цирки с диковинными зверями, балаганы, клоунов, фигляров, шутов, представления под открытом небом, ярмарочных фокусников. Настоящий аристократ не гнушается удовольствиями простого народа; вот почему лорд Дэвид посещал таверны и балаганы Лондона и Пяти Портов. Чтобы иметь возможность, не компрометируя своего звания офицера «белой эскадры», схватиться при случае с каким-нибудь матросом или конопатчиком, он прибегал к маскараду и в толпе обитателей трущоб всегда появлялся в матросской куртке. При этих переодеваниях было большим удобством то, что он не носил парика, ибо даже при Людовике XIV народ сохранял свои волосы, как лев – гриву. В таком виде лорд Дэвид чувствовал себя ничем не связанным. Мелкий люд, с которым он вступал в общение на этих шумных сборищах, относился к нему с уважением, не зная, что он лорд. Его называли Том-Джим-Джек. Под этой кличкой он был очень популярен и даже знаменит среди голытьбы. Он мастерски прикидывался простолюдином и при случае пускал в ход кулаки.</p><p class="p1">Эту сторону его изысканной жизни знала и очень ценила леди Джозиана.</p></span></span></span></span>
