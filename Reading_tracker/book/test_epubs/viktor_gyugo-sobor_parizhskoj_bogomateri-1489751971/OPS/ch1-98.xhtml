<p class="p">2. То, что плывет, достигает берега</p>
</div><p class="p1">Все случившееся явилось следствием того, что некий солдат нашел на берегу моря бутылку.</p><p class="p1">Расскажем, как это случилось.</p><p class="p1">Каждое происшествие должно рассматривать лишь как звено в цепи других обстоятельств.</p><p class="p1">Как-то раз один из четырех канониров, составлявших гарнизон Келшорского замка, подобрал во время отлива на песке оплетенную ивовыми прутьями флягу, выброшенную на берег волнами. Фляга эта, сплошь покрытая плесенью, была закупорена просмоленной втулкой. Солдат отнес находку в замок полковнику, а тот отослал ее адмиралу Англии. Адмиралу – значит, в адмиралтейство; в адмиралтействе же предметами, выброшенными на берег, ведал Баркильфедро. Баркильфедро, распечатав и откупорив бутылку, доставил ее королеве. Королева сразу взялась за дело. Она сообщила о находке и предложила высказаться двум важнейшим своим советникам – лорд-канцлеру, который по закону является «блюстителем совести английского короля», и лорд-маршалу, «знатоку в вопросах геральдических и родословных». Томас Ховард, герцог Норфолькский, пэр-католик, наследственный гофмаршал Англии, передал через своего представителя графа-маршала Генри Ховарда, графа Биндона, что он заранее соглашается с мнением лорд-канцлера. Лорд-канцлером был тогда Вильям Коупер. Не надо смешивать его с его однофамильцем и современником Вильямом Коупером, анатомом и комментатором Бидлоу, выпустившим в Англии свой «Трактат о мускулах» почти в то же самое время, когда во Франции Этьен Абейль напечатал «Историю костей»; между хирургом и лордом существует некоторая разница. Лорд Вильям Коупер стяжал себе известность фразой, сказанной по поводу дела Талбота Иелвертона, виконта Лонгвиля: «Для конституции Англии восстановление в правах пэра имеет большее значение, чем реставрация короля». Найденная в Келшоре фляга чрезвычайно заинтересовала лорд-канцлера. Всякий, высказавший какое-либо принципиальное суждение, рад отучаю применить его на деле. А тут как раз представился случай восстановить пэра в его правах. Принялись за розыски человека, выступавшего под именем Гуинплена; найти его оказалось делом нетрудным. Хардкванона тоже. Он был еще жив. Тюрьма может сгноить человека, но вместе с тем сохранить его, если только содержать под стражей значит сохранять. Заключенных в крепости тревожили редко. Темницу не меняли так же, как не меняют мертвецам гроба. Хардкванон все еще сидел в Четэмской тюрьме. Оставалось только взять его оттуда. Его перевезли из Четэма в Лондон. Одновременно с этим навели справки в Швейцарии. Все факты полностью подтвердились. В соответствующих учреждениях в Лозанне и Веве нашли брачное свидетельство лорда Линнея, относящееся к периоду его изгнания, метрическую запись о рождении ребенка, акты о смерти отца и матери; со всех этих бумаг сняли «на всякий случай» по две засвидетельствованные копии. Все это было выполнено с соблюдением строжайшей тайны в чрезвычайно короткий срок, как говорилось тогда, «с королевской быстротой» и с сохранением глубочайшего «рыбьего молчания», рекомендованного и применявшегося Беконом, а позднее возведенного Блекстоном в обязательное правило при производстве дел верховной канцелярии и государственных дел, а также при рассмотрении вопросов, именовавшихся в ту пору «сенаторскими».</p><p class="p1">Надпись «Jussu regis» и подпись «Джеффрис» были признаны подлинными. Для того, кто изучал патологический характер королевских прихотей, именовавшихся «соизволением его или Ее Величества», это «Jussu regis» не представляет ничего удивительного. Почему Иаков II, которому, казалось бы, следовало скрывать подобные деяния, запечатлел их в документах, рискуя даже повредить успеху предприятия? Ведь это цинизм. Высокомерное презрение ко всему на свете. Ах, вы думаете, что только непотребные женщины, бывают бесстыдны? Государственная политика тоже не отличается стыдливостью. Et se cupit ante videri<a href="ch2.xhtml#id197" class="a">[243]</a>. Совершить преступление и хвастаться им – к этому сводится вся история. Король делает себе татуировку, точно каторжник. Надо бы спастись от жандарма и от суда истории, но в то же время жаль расстаться с такой интересной приметой: ведь хочется, чтоб тебя знали и запомнили. Взгляните на мою руку, обратите внимание на этот рисунок с изображением храма любви и пылающего сердца, пронзенного стрелой, – это я, Ласнер. «Jussu regis» – это я, Иаков Второй. Совершить злодеяние – и приложить к нему свою печать. Проявить бесстыдство, сознательно выдать самого себя, выставить напоказ свое преступление – в этом и заключается наглая похвальба злодея. Христина велит схватить Мональдески, вырвать у него признание, умертвить его и при этом говорит: «Я – королева Швеции и пользуюсь гостеприимством короля Франции». Не все тираны поступают одинаково: одни прячутся, как Тиберий, другие тщеславно хвастаются, как Филипп II. Одни ближе к скорпиону, другие – к леопарду. Иаков II принадлежал ко второй разновидности. Лицо у него, как известно, в противоположность Филиппу II, было открытое и веселое. Филипп II был мрачен, Иаков II – жизнерадостен. Это не мешало ему быть жестоким. Иаков II был тигр добродушный, но, подобно Филиппу, спокойно относился к своим преступлениям. Он был извергом «милостью божией». Потому-то ему ничего не приходилось скрывать и затушевывать: его убийства находили себе оправдание в его «божественном праве». Он тоже готов был оставить после себя Симанкасские архивы, в которых хранились бы пергаменты с подробным перечнем всех его злодеяний, перенумерованные, разложенные по отделам, снабженные ярлыками, в полном порядке, каждый на своей полке, словно яды в лаборатории аптекаря. Подписываться под своими преступлениями – жест, достойный короля.</p><p class="p1">Всякое совершенное деяние – вексель, выданный на великого неизвестного предъявителя. По векселю со зловещей передаточной надписью «jussu regis» наступил срок платежа.</p><p class="p1">Королева Анна, умевшая, в отличие от большинства женщин, прекрасно хранить тайну, предложила лорд-канцлеру представить ей по этому важному делу тайный доклад, так называемый «доклад королевскому уху». Такого рода доклады были в большом ходу во всех монархических странах. В Вене был даже особый «советник уха», в звании советника двора. Эта почетная должность, учрежденная во времена Каролингов, соответствовала auricularius<a href="ch2.xhtml#id196" class="a">[244]</a> старинных палатинских хартий – лицу, близкому к императору и имевшему право нашептывать ему на ухо.</p><p class="p1">Вильям Коупер, канцлер Англии, пользовавшийся доверием королевы на том основании, что был близорук, как и она, если не больше, составил докладную записку, начинавшуюся так: «У Соломона к его услугам были две птицы: удод “худбуд”, говоривший на всех языках, и орел “симурганка”, покрывавший тенью своих крыльев караван из двадцати тысяч человек. Точно так же, хотя и в несколько иной форме…» и т. д. Лорд-канцлер признавал доказанным тот факт, что наследственный пэр был похищен, изувечен и впоследствии найден. Он не порицал Иакова II, который как-никак приходился королеве родным отцом. Он даже приводил доводы в его оправдание. Во-первых, испокон веков существуют известные монархические принципы. E senioratu eripimus. In roturagio cadut<a href="ch2.xhtml#id195" class="a">[245]</a>. Во-вторых, королю принадлежит право изувечения его подданных. Чемберлен это признавал. «Corpora et bona nostrorum subjectorum nostra sunt»<a href="ch2.xhtml#id194" class="a">[246]</a>, – изрек преславной и преблагой памяти Иаков I. «Для блага государства» выкалывали глаза герцогам королевской крови. Некоторые принцы, слишком близкие к трону, в полезных для него целях были удушены между двумя тюфяками, прячем их смерть приписывалась апоплексии. Удушить же – дело более серьезное, чем изуродовать. Король тунисский вырвал глаза своему отцу, Муллей-Ассему, тем не менее его послы были приняты императором. Итак, король может приказать лишить своего подданного какой-либо части тела точно так же, как лишают прав состояния и т. п., – это вполне законно. Но одно законное действие не уничтожает другого. «Если человек, которого утопят по приказанию короля, выплывет на поверхность живым, это означает, что Бог смягчил королевский приговор. Если найден наследственный пэр, должно ему возвратить пэрскую корону. Так было с лордом Алла, королем Нортумбрии, который тоже был фигляром. Так должно поступить и с Гуинпленом, который тоже король, то есть лорд. Низкое ремесло, которым ему пришлось заниматься в силу непреодолимых обстоятельств, не позорит герба; тому свидетельством Абдолоним, который, будучи королем, был вместе с тем и садовником, или святой Иосиф, который был плотником, или, наконец, Аполлон, который был богом и в то же время пастухом». Короче, ученый канцлер приходил к выводу, что необходимо восстановить Фермена, лорда Кленчарли, ложно именуемого Гуинпленом, во всех его имущественных правах и титулах, но «под непременным условием, чтобы ему была дана очная ставка с преступником Хардкваноном и чтобы упомянутый Хардкванон признал его». Этим заключением канцлер, конституционный блюститель королевской совести, окончательно успокаивал эту совесть.</p><p class="p1">В особой приписке лорд-канцлер напоминал, что в случае упорного запирательства Хардкванона к нему следует применить «длительный допрос с пристрастием», причем очная ставка должна произойти лишь на четвертый день, когда для преступника настанет час «смертного хлада», о котором говорит хартия короля Адельстана. В этом было, конечно, некоторое неудобство: а именно – пытаемый мог умереть на второй или на третий день, что затруднило бы очную ставку; тем не менее приходилось подчиняться закону. Применение закона всегда встречает известные трудности.</p><p class="p1">Впрочем, по мнению лорд-канцлера, можно было быть вполне уверенным, что Хардкванон признает Гуинплена.</p><p class="p1">Анна, с одной стороны, в достаточной мере осведомленная об уродстве Гуинплена, с другой – не желая обижать сестру, к которой перешли все поместья Кленчарли, с радостью согласилась на брак герцогини Джозианы с новым лордом, то есть с Гуинпленом.</p><p class="p1">Восстановление в правах лорда Фермена Кленчарли не представляло никаких затруднений, ибо он являлся прямым и законным наследником. В сомнительных случаях, когда трудно бывало доказать родство или когда пэрство in abeyance<a href="ch2.xhtml#id193" class="a">[247]</a> оспаривалось родственниками по боковой линии, закон требовал перенесения вопроса в палату лордов. Не обращаясь к более отдаленным временам, укажем, что в 1782 году здесь был разрешен вопрос о праве Елизаветы Перри на Сиднейское баронство; в 1789 году – о праве Томаса Степльтона на Бомонтское баронство; в 1803 году – о праве достопочтенного Таимвела Бриджеса на баронство Чандос; в 1813 году – о праве генерал-лейтенанта Ноллиса на пэрство и на графство Бенбери и т. д. В данном случае не было ничего подобного. Никакой тяжбы. Незачем было тревожить палату, и для признания нового лорда было вполне достаточно одного волеизъявления королевы в присутствии лорд-канцлера.</p><p class="p1">Заправлял всем Баркильфедро.</p><p class="p1">Благодаря ему дело велось с такими предосторожностями, тайна охранялась так тщательно, что ни Джозиана, ни лорд Дэвид даже не подозревали о том, как искусно под них подкапываются. Высокомерную Джозиану, державшуюся в стороне от всех, обойти было нетрудно. Что же касается лорда Дэвида, то его отправили в плавание к берегам Фландрии. Ему предстояло лишиться титула лорда, а он об этом и не догадывался. Отметим здесь одну подробность. В десяти лье от места стоянки флотилии, которой командовал лорд Дэвид, капитан Хелибертон разбил французский флот. Граф Пемброк, председатель совета, предложил наградить капитана Хелибертона чином контр-адмирала. Анна вычеркнула фамилию Хелибертон и внесла вместо нее в список имя лорда Дэвида Дерри-Мойр, для того чтобы к тому моменту, когда он узнает о потере пэрства, лорд Дэвид мог по крайней мере утешиться адмиральским чином.</p><p class="p1">Анна чувствовала себя вполне удовлетворенной. Сестре – безобразный муж, лорду Дэвиду – прекрасный чин. С одной стороны – злорадство, с другой – благоволение.</p><p class="p1">Ее Величеству предстояло насладиться ею же самой придуманной комедией. К тому же она убедила себя в том, что исправляет несправедливость, допущенную ее августейшим отцом, возвращает сословию пэров одного из его членов, то есть действует, как подобает великой монархине, что, по воле божией, она защищает невинность, что провидение в благих и неисповедимых путях своих… и т. д. Нет ничего приятнее, чем поступать справедливо, когда тем самым причиняешь огорчение тому, кого ненавидишь.</p><p class="p1">Впрочем, для королевы было достаточно уже одного сознания, что у ее красавицы сестры будет уродливый муж. В чем именно состоит уродство Гуинплена, каково это безобразие, – Баркильфедро не счел нужным сообщить королеве, а сама она не соблаговолила расспросить его об этом. Подлинно королевское пренебрежение. Да и не все ли равно? Палата лордов могла быть только признательна ей. Лорд-канцлер, официальный оракул, выразил общее мнение. Восстановить пэра – значит поддержать все пэрское сословие. Королевская власть в этом случае выступала как верная и надежная заступница пэрских привилегий. Какова бы ни была внешность нового пэра, она не может явиться препятствием, поскольку речь идет о законном праве на наследство. Анна, вполне удовлетворенная своими доводами, пошла прямо к цели – к великой, женской и королевской цели, состоящей в том, чтобы поступать так, как ей заблагорассудится.</p><p class="p1">Королева жила в то время в Виндзоре, поэтому придворные интриги не сразу получили огласку.</p><p class="p1">Только лица, без которых никак нельзя было обойтись, были осведомлены о предстоящих событиях.</p><p class="p1">Баркильфедро торжествовал, и это придавало его лицу еще более зловещее выражение. Порою радость бывает самым отвратительным чувством.</p><p class="p1">Ему первому выпало на долю удовольствие откупорить флягу Хардкванона. Он не выказал при этом особого удивления, ибо удивляются только ограниченные люди. К тому же – не правда ли? – это было для него вполне заслуженной наградой, – он так долго ждал счастливого случая. Должна же была, наконец, судьба улыбнуться ему.</p><p class="p1">Это nil mirari<a href="ch2.xhtml#id192" class="a">[248]</a> было одной из отличительных черт его поведения. Однако, надо сознаться, в глубине души он был поражен. Тому, кто мог бы сорвать с него личину, под которой он скрывал свою душу даже перед Богом, представилась бы такая картина: именно в это время Баркильфедро начинал приходить к убеждению, что он, человек ничтожный и вместе с тем так близко стоящий к блистательной герцогине Джозиане, не в силах нанести ей хоть какой-нибудь удар. Это вызвало в нем безумный взрыв затаенной ненависти. Он дошел до полного отчаяния. Чем больше терял он надежду, тем сильнее становилась его ярость. «Грызть удила» – как верно передают эта слова состояние духа злого человека, которого гложет сознание собственного бессилия. Баркильфедро был, пожалуй, готов отказаться если не от желания причинить зло Джозиане, то от своих мстительных планов; если не от бешеной вражды к ней, то от намерения ужалить ее. Но какой это позор для него – выпустить из рук добычу! Затаить в себе злобу, как прячут в ножны кинжал, годный лишь для музея! Какое горчайшее унижение!</p><p class="p1">И вдруг, как раз в это самое время (хаос, господствующий во Вселенной, любит такие совпадения!) фляга Хардкванона, перепрыгивая с волны на волну, попадает в руки Баркильфедро. В неведомом сокрыты какие-то силы, всегда готовые выполнять веления зла. В присутствии двух равнодушных свидетелей, двух чиновников адмиралтейства Баркильфедро открывает флягу, находит в ней пергамент, разворачивает его, читает… Представьте себе только его сатанинскую радость!</p><p class="p1">Странно подумать, что море, ветер, водные пространства, приливы и отливы, бури, штили могут прилагать столько усилий с единственной целью доставить счастье злому человеку. Однако именно такой заговор осуществлялся целых пятнадцать лет. Непостижимая тайна! В течение пятнадцати лет океан беспрерывно работал над этим. Волны передавали одна другой всплывшую на поверхность флягу, подводные камни сделали все, чтобы она не разбилась о них и на стекле не появилось ни одной трещины, пробка осталась цела, морские водоросли не разъели ивовой плетенки, раковины не стерли слова «Хардкванон», вода не проникла внутрь сосуда, плесень не покрыла пергамента, сырость не уничтожила написанного – сколько забот приняла на себя морская пучина! И вот в конечном итоге то, что Гернардус бросил во тьму, тьма отдала Баркильфедро: послание, предназначенное Богу, попало в руки к дьяволу. Беспредельность злоупотребила доверием человека; по мрачной иронии судьбы торжество справедливости – превращение покинутого ребенка, Гуинплена, в лорда Кленчарли – осложнилось победой адской злобы; судьба совершила благое дело, прибегнув к дурному средству, и заставила правосудие послужить несправедливости. Отнять жертву у Иакова II – и отдать ее в руки Баркильфедро. Возвысить Гуинплена только для того, чтобы унизить Джозиану. Баркильфедро достиг успеха – и для этого в продолжение стольких лет волны, бурные валы и шквалы бросали, терзали – и уберегли стеклянную флягу, в которой тесно переплелись жребии стольких людей! Для этого вступили между собою в сердечное согласие ветры, приливы и бури! Необъятный, вечно волнующийся океан сотворил это чудо в угоду мерзавцу! Бесконечность оказалась помощницей жадного червя! Какие мрачные прихоти бывают порою у судьбы!</p><p class="p1">Баркильфедро почувствовал прилив титанической гордости. Он говорил себе, что все было сделано ради него одного. Ему казалось, что он – центр и цель происшедшего.</p><p class="p1">Он ошибался. Отдадим справедливость случаю. Не в этом заключался истинный смысл замечательного происшествия, которым воспользовался в своей ненависти Баркильфедро. Дело обстояло совсем иначе. Океан, заменив сироте отца и мать, наслал бурю на его палачей, разбил урку, оттолкнувшую от себя ребенка, поглотил тех, кто находился на ней, не внимая их мольбам о пощаде и соглашаясь принять от них только раскаяние; буря получила залог из рук смерти; прочное судно, хранящее преступления, заменила собою хрупкая фляга, внутри которой был документ, долженствовавший восстановить поруганную справедливость; море, подобно пантере, ставшей кормилицей, взяло на себя новую роль: оно принялось укачивать не самого ребенка, а его жребий, в то время как ребенок рос, не подозревая о том, что совершает для него морская пучина; волны, в которые была брошена бутылка, неусыпно бодрствовали над этим осколком прошлого, заключавшим в себе грядущее; ураган осторожно проносился над хрупким сосудом, течения несли его зыбкими путями среди бездонных глубин; водоросли, буруны, утесы, кипящие пеной волны взяли под свое покровительство невинное существо; океанский вал оказался непоколебим, как совесть; хаос восстанавливал порядок; мрак стремился к торжеству света; тьма содействовала восходу солнца истины; изгнанник, лежавший в могиле, получил утешение, наследник – законное наследство: преступное решение короля отменялось, предначертанное свыше воплощалось в жизнь, беспомощный, брошенный ребенок обрел опекуна в лице самой бесконечности. Вот что мог бы увидеть Баркильфедро в событии, приводившем его в такой восторг. Но ничего этого он не видел. Ему и в голову не приходило, что все это совершилось ради Гуинплена; он решил, что все было сделано для него, Баркильфедро, и что он вполне заслужил это. Таковы сатанинские натуры.</p><p class="p1">Тот, кто удивился бы, что такой хрупкий предмет, как стеклянная фляга, мог уцелеть, проплавав пятнадцать лет, лишь обнаружил бы недостаточное знакомство с океаном, который очень кроток по природе. 4 октября 1867 года в Морбигане, между островом Груа, оконечностью Гаврского полуострова и утесом Странников, рыбаки из Порт-Луи нашли римскую амфору четвертого века, которую море разрисовало своими арабесками. Эта амфора проплавала полторы тысячи лет.</p><p class="p1">Как ни старался Баркильфедро напустить на себя равнодушный вид, его изумление могло сравниться только с его радостью.</p><p class="p1">Все само давалось ему в руки, все было словно нарочно подготовлено. Все составные части события, которое должно было насытить его ненависть, оказались к его услугам. Ему оставалось только сблизить их еще больше и соединить между собой. Такая пригонка – приятное занятие. Чеканная работа.</p><p class="p1">Гуинплен! Это имя было ему известно. Masca ridens. Как и все, он ходил смотреть на «Человека, который смеется». Он прочитал вывеску у Тедкастерской гостиницы, как читают всякую театральную афишу, привлекающую к себе внимание толпы; он заметил ее и теперь сразу припомнил ее до мельчайших подробностей, которые, впрочем, позднее проверил; эта афиша возникла перед его умственным взором с быстротою электрической искры, заняла место в его сознании рядом с пергаментом, обнаруженным в бутылке, как ответ на вопрос, как разгадка загадки, и слова вывески: «Здесь можно видеть Гуинплена, покинутого в десятилетнем возрасте в ночь на 29 января 1690 года на берегу моря в Портленде» – внезапно озарились для него апокалиптическим светом. Перед ним на ярмарочной вывеске вспыхнула огромными буквами надпись – «Мене, текел, фарес». Все сложное сооружение, каким была по существу жизнь Джозианы, сразу рухнуло. Обвал произошел с молниеносной быстротой. Дэвид Дерри-Мойр терял все. Пэрство, богатство, могущество, высокое положение – все переходило от лорда Дэвида к Гуинплену. Все – замки, охоты, леса, особняки, дворцы, поместья, – все, в том числе и Джозиана, доставалось отныне Гуинплену. А Джозиана! Какой финал! Кто теперь был предназначен ей? Ей, прославленной, высокомерной герцогине – площадной шут. Ей, привередливой красавице – урод. Кто мог бы этого ожидать? Говоря по правде, Баркильфедро был в восторге. Неожиданные прихоти судьбы, неистощимой на дьявольские выдумки, иногда превосходят самые злобные замыслы людей. Действительность порой творит настоящие чудеса. Теперь Баркильфедро казались глупыми и жалкими его недавние мечты. Его ожидало нечто лучшее.</p><p class="p1">Если бы предстоящая перемена даже послужила ему во вред, он все равно, продолжал бы к ней стремиться. Есть злые насекомые, которые жалят, не только не извлекая из укуса никакой пользы для себя, но даже зная, что сами умрут от этого. Баркильфедро принадлежал к их числу.</p><p class="p1">Но в этот раз он действовал не бескорыстно. Лорд Дэвид Дерри-Мойр не был ему обязан ничем, тогда как лорд Фермен Кленчарли должен был стать его неоплатным должником. Из покровительствуемого Баркильфедро становился покровителем. И чьим покровителем? Пэра Англии. У него будет свой собственный лорд – лорд, созданный им! Баркильфедро твердо рассчитывал, что сразу же приберет его к рукам. И этот лорд будет морганатическим зятем королевы! Своим уродством он столько же будет приятен королеве, сколько противен Джозиане. Благодаря ему и он, Баркильфедро, облачившись в скромную, солидную одежду, может стать значительной персоной. Он всегда чувствовал влечение к духовной карьере. Ему так хотелось сделаться епископом.</p><p class="p1">А пока он был вполне счастлив настоящим.</p><p class="p1">Какой блестящий успех! Простая случайность, и как все отлично сложилось! Волны медленно, но верно доставили ему возможность мщения: он называл это своим мщением! Не напрасно подстерегал он удачу.</p><p class="p1">Он, Баркильфедро, был подводным утесом, а Джозиана – потерпевшим крушение судном. Джозиана разбилась о Баркильфедро! Он испытывал неописуемый злобный восторг.</p><p class="p1">Он обладал так называемым даром внушения, который состоит в том, что в уме другого человека делают как бы надрез, куда влагают собственную мысль; держась в стороне и не вмешиваясь явно ни во что, Баркильфедро устроил так, чтобы Джозиана поехала в «Зеленый ящик» и увидела Гуинплена. Это никак не могло повредить планам Баркильфедро. Напротив, показать фигляра в окружавшей его унизительной обстановке – это было совсем неплохо придумано и позднее должно было оказаться острой приправой к тому, что ожидало Джозиану впереди.</p><p class="p1">Он заранее потихоньку подготовил все. Он хотел, чтобы события разразились внезапно. Проделанную им работу можно было обозначить только необычным определением: он стремился вызвать удар грома.</p><p class="p1">Покончив с предварительными приготовлениями, он позаботился о том, чтобы все требуемые законом формальности были выполнены. Однако дело не получило огласки, ибо закон предписывал соблюдать в подобных случаях строгую тайну.</p><p class="p1">Произошла очная ставка Хардкванона с Гуинпленом; Баркильфедро присутствовал при этом. Чем она окончилась, читателю известно.</p><p class="p1">В тот же самый день за леди Джозианой, находившейся в Лондоне, неожиданно приехала посланная королевой карета, чтобы отвезти герцогиню в Виндзор, где пребывала в это время Анна. Джозиана, у которой были свои планы, с удовольствием ослушалась бы приказания Ее Величества или по крайней мере отложила бы свою поездку на один день, но придворный этикет не допускает такого своеволия. Ей пришлось немедленно отправиться в дорогу и переменить свою лондонскую резиденцию, Генкервилл-Хауз, на виндзорскую – Корлеоне-Лодж.</p><p class="p1">Герцогиня Джозиана покинула Лондон как раз в ту самую минуту, когда жезлоносец явился в Тедкастерскую гостиницу, чтобы арестовать Гуинплена и отвести его в саутворкское подземелье пыток.</p><p class="p1">Когда она приехала в, Виндзор, пристав черного жезла, дежуривший у дверей в приемную королевы, сообщил Джозиане, что Ее Величество слушает доклад лорд-канцлера и может принять ее только на следующий день; поэтому она должна ждать в Корлеоне-Лодже распоряжений Ее Величества, которые будут переданы ей лично завтра же утром. Джозиана, весьма раздосадованная, вернулась к себе, была за ужином в дурном расположении духа и, почувствовав приступ мигрени, отослала всех слуг, кроме своего пажа, потом отпустила и его и легла спать еще засветло.</p><p class="p1">Уже дома она узнала, что завтра в Виндзоре ожидают лорда Дэвида Дерри-Мойр, который получил в море приказание королевы немедленно прибыть ко двору.</p></span><span id="id161"><div class="title6">
<p class="p">3. Всякий, кого в одно мгновение перебросили бы из Сибири в Сенегал, лишился бы чувств (Гумбольдт)</p>
</div><p class="p1">Нет ничего удивительного в том, что даже самый крепкий и выносливый мужчина теряет сознание под влиянием внезапной перемены судьбы. Неожиданность оглушает человека, как мясник оглушает обухом быка. Франциск д’Альбескола, тот самый, что разрывал голыми руками железные цепи в турецких гаванях, целый день пролежал в обмороке, когда его избрали папой. А ведь расстояние, отделяющее кардинала от папы, меньше расстояния, отделяющего скомороха от пэра Англии.</p><p class="p1">Ничто не действует так сильно, как нарушение равновесия.</p><p class="p1">Когда Гуинплен открыл глаза и пришел в себя, была уже ночь. Он сидел в кресле посреди просторной комнаты, где стены и потолок были обтянуты пурпурным бархатом, а пол устлан мягким ковром. Рядом стоял без шляпы и в дорожном плаще человек с толстым животом – тот, который вышел из-за колонны в саутворкском подземелье. Кроме него и Гуинплена, никого в комнате не было. По обеим сторонам от кресла, так близко, что Гуинплен мог достать до них рукой, стояли два стола, а на них – канделябры с шестью зажженными восковыми свечами. На одном из столов находились какие-то бумаги и шкатулка; на другом – золоченое блюдо с закуской: холодная дичь, вино и бренди.</p><p class="p1">В высоком, от самого пола до потолка, окне на светлом фоне ночного апрельского неба вырисовывались колонны, обступившие полукругом парадный двор с тремя воротами: одними очень широкими и двумя поуже; средние ворота – для карет – были очень большие, ворота направо – для всадников – поменьше, а налево – для пешеходов – еще меньше. Все ворота запирались решетками с блестящими остриями на концах прутьев. Средние ворота были украшены лепкой. Колонны были, по-видимому, из белого мрамора, так же как и блестевшие, точно снег, плиты, которыми был вымощен двор; они окаймляли белым полем какой-то мозаичный узор, еле выделявшийся в полумраке; при дневном свете этот узор, вероятно, оказался бы гербом, выложенным по флорентийскому образцу из разноцветных плиток. Балюстрады, то поднимавшиеся зигзагами кверху, то спускавшиеся вниз, были не чем иным, как перилами лестниц, соединявших между собою террасы. Над двором высилось громадное здание замка, очертания которого расплывались в ночной мгле; вверху, на усеянном звездами небе, выступал резкий силуэт кровля. Видна была огромная крыша, щипец с завитками, мансарды, похожие на шлемы с забралами, дымовые трубы, напоминавшие башни, и карнизы со статуями богов и богинь. В полумраке между колоннами взлетали кверху брызги одного из тех волшебных водометов, которые, переливаясь с тихим журчанием из бассейна в бассейн, ниспадают то мелким дождем, то сплошными каскадами, похожи на ларцы, из которых высыпались драгоценности, и с безрассудной щедростью разбрасывают во все стороны свои алмазы и жемчуга, словно для того, чтобы развеять скуку окружающих их статуй. В простенках длинного ряда окон виднелись барельефы в виде щитов с доспехами и бюсты на подставках. На цоколях фронтона военные трофеи и каменные шишаки с султанами чередовались с изображениями богов.</p><p class="p1">В глубине комнаты, где находился Гуинплен, был с одной стороны громадный, упиравшийся в самый потолок, камин, а с другой, под балдахином, – одна из тех непомерно высоких и широких кроватей средневекового стиля, на которые надо взбираться по ступенькам помоста и где свободно можно улечься поперек. К помосту этого ложа была придвинута скамейка. Остальная мебель состояла из кресел, выстроившихся вдоль стен, и расставленных перед ними стульев. Потолок имел форму купола; в камине, на французский лад, пылал жаркий огонь; по яркости пламени, по его розовато-зеленым языкам знаток сразу определил бы, что горят ясеневые дрова – большая роскошь в те времена; комната была так велика, что два канделябра еле освещали ее. Несколько дверей, одни с опущенными, другие с приподнятыми портьерами, вели в смежные комнаты. Вся обстановка, прочная и массивная, носила на себе отпечаток несколько устаревшей, но великолепной моды времен Иакова I. Точно так же, как ковер и обивка стен, все в этой комнате было из красного бархата: полог, балдахин, покрывало кровати, занавеси, скатерти на столах, кресла, стулья. Никакой позолоты, кроме как на потолке. Там, в самой середине, блестел огромный чеканной работы круглый щит с ослепительными геральдическими украшениями; среди них, на двух расположенных рядом гербах, выделялись баронская корона в виде обруча и корона маркиза. Из чего были сделаны все эти эмблемы? Из позолоченной меди? Из позолоченного серебра? Определить было трудно. Они казались золотыми. С темного свода роскошного потолка этот мрачно сверкающий щит сиял, словно солнце на ночном небе.</p><p class="p1">Выросший на воле человек, который дорожит своей свободой, испытывает во дворце почти то же чувство беспокойства, что и в тюрьме. Это пышное зрелище вызывает тревогу. Всякое великолепие внушает страх. Кто обитатель этого царского чертога? Какому исполину принадлежит этот дворец? Гуинплен все еще не мог прийти в себя, и сердце его сжималось.</p><p class="p1">– Где я? – произнес он вслух.</p><p class="p1">Человек, стоявший перед ним, ответил:</p><p class="p1">– Вы у себя дома, милорд.</p></span></span></span></span>
