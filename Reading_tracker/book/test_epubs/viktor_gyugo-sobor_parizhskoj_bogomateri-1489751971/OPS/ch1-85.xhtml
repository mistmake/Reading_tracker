<span><span><span id="id139"><div class="title6">
<p class="p">Часть третья</p>
<p class="p">Возникновение трещины</p>
</div><span id="id140"><div class="title6">
<p class="p">1. Тедкастерская гостиница</p>
</div><p class="p1">В Лондоне в ту пору был всего один мост – Лондонский мост, застроенный домами. Мост этот соединял город с Саутворком – предместьем, узкие улички и переулки которого, вымощенные галькой из Темзы, казались настоящими теснинами; подобно самому городу, Саутворк представлял собой беспорядочное нагромождение всякого рода построек, жилых домов и деревянных лачуг, бывших вполне подходящей пищей для пожаров: 1666 год доказал это.</p><p class="p1">Слово Саутворк произносили в то время как Соудрик, а в наши дни произносят приблизительно Соузуорк. Впрочем, наилучший способ произношения английских имен – это совсем не произносить их. Например, Саутгемптон выговаривайте так: Стпнтн.</p><p class="p1">Это – было время, когда Четэм произносили как Je t’aime<a href="ch2.xhtml#id33" class="a">[205]</a>.</p><p class="p1">Тогдашний Саутворк так же был похож на нынешний Саутворк, как Вожирар на Марсель. Теперь это город; тогда это был поселок, бывший, однако, весьма оживленным портом. В длинную, старую, напоминавшую циклопические сооружения стену над Темзой были вделаны кольца, к которым пришвартовывались речные суда. Стена эта называлась Эфрокской стеной, или Эфрокстоун. Когда Йорк был еще саксонским, он назывался Эфрок. Согласно преданию, у подножия этой стены утопился какой-то эфрокский герцог. В самом деле, место здесь достаточно глубокое для любого герцога. Даже во время отлива глубина тут была не менее шести брассов. Эта отличная якорная стоянка привлекала к себе морские суда, и старинная пузатая голландская шхуна «Вограат» становилась обычно на причал к Эфрок-стоуну. «Вограат» еженедельно совершала прямой рейс из Лондона в Роттердам и из Роттердама в Лондон. Другие суда отходили по два раза в день в Детфорт, в Гринич или в Гревсенд, отправляясь с отливом и возвращаясь с приливом. Переход до Гревсенда занимал шесть часов, хотя расстояние и не превышало двадцати миль.</p><p class="p1">Шхуна «Вограат» принадлежала к числу тех судов, которые можно встретить теперь только в морских музеях. Ее чрезмерно выпуклый корпус немного напоминал джонку. В ту пору Франция подражала Греции, а Голландия – Китаю. «Вограат», тяжелая двухмачтовая шхуна с водонепроницаемыми перпендикулярными переборками в трюме, имела посредине глубокую каюту, а на носу и на корме палуба была без бортов, как на теперешних железных судах, снабженных башенками. Отсутствие борта имело то преимущество, что во время бури ослаблялся напор волн, однако вместе с тем экипаж подвергался опасности: не встречая на своем пути никакой преграды, волны смывали людей прямо в море. Случаи их гибели бывали столь частыми, что от такого типа судна пришлось отказаться. Обычно «Вограат» шла прямо в Голландию, даже не останавливаясь в Гревсенде.</p><p class="p1">Вдоль подножия Эфрок-стоуна тянулся старинный каменный карниз – частью утес, частью искусственно сооруженный выступ, и это облегчало судам возможность пришвартовываться к стене при любом уровне воды. Стена эта, пересеченная в нескольких местах лестницами, представляла границу южной оконечности Саутворка. Земляная насыпь позволяла прохожим облокачиваться на гребень Эфрок-стоуна, как на парапет набережной. Отсюда открывался вид на Темзу. По другую сторону реки кончался Лондон; дальше тянулись поля.</p><p class="p1">Возле Эфрок-стоуна, у излучины Темзы, почти напротив Сент-Джемского дворца и позади Ламбет-Хауза, неподалеку от места гулянья, носившего тогда название Фокс-Холл, между горшечной мастерской, где выделывали фарфоровую посуду, и стеклянным заводом, где изготовляли цветные бутылки, находился один из тех больших, поросших сорными травами пустырей, которые во Франции были известны под названием бульваров, а в Англии – bowling-greens. Слово bowling-green, означающее «зеленая лужайка для катания шара», мы переделали в boulingrin. В наши дни такие лужайки устраивают в домах, только теперь их располагают на столе: зеленое сукно заменяет дерн, и все это называется бильярдом.</p><p class="p1">Между прочим, непонятно, почему, имея уже слово бульвар (boulevard – boule-vert), совершенно соответствующее по смыслу слову bowling-green, мы придумали еще boulingrin. Удивительно, что такая солидная особа, как словарь, позволяет себе подобную ненужную роскошь.</p><p class="p1">Саутворкская «зеленая лужайка» называлась Таринзофилд, ибо некогда она принадлежала баронам Гастингсам, носившим также титул баронов Таринзо-Моклайн. От баронов Гастингсов Таринзофилд перешел к баронам Тедкастерам, которые сдавали его в аренду в качестве места для народных гуляний, подобно тому как позднее один из герцогов Орлеанских сделал своей доходной статьей Пале-Рояль. С течением времени Таринзофилд как выморочное имущество стал приходской собственностью.</p><p class="p1">Таринзофилд представлял собой нечто вроде постоянной ярмарочной площади, где выстраивались в ряд балаганы фокусников, эквилибристов, фигляров, музыкантов и где вечно толпились зеваки, «приходившие поглазеть на дьявола», как говаривал архиепископ Шарп. «Глазеть на дьявола» – значило смотреть представление. На эту празднично разукрашенную площадь выходили фасадом несколько харчевен, из которых одни отбивали публику у театров, а другие поставляли им зрителей. Харчевни эти процветали. Это были обыкновенные кабачки, открытые только днем. Вечером хозяин запирал свой кабачок, клал ключ в карман и уходил. Только одно из этих заведений носило характер гостиницы и было единственным прочным жилым помещением на всей «зеленой лужайке», ибо остальные ярмарочные постройки могли быть разобраны в любую минуту: ничто не привязывало всех этих странствующих комедиантов к одному месту. Фигляры ведут кочевой образ жизни.</p><p class="p1">Это заведение, называвшееся Тедкастерской гостиницей, по имени бывших владельцев поля, напоминало скорее постоялый двор, чем таверну, и скорее гостиницу, чем харчевню; в его довольно широкий двор можно было попасть через большие ворота.</p><p class="p1">Ворота, выходившие на площадь, были как бы парадным подъездом Тедкастерской гостиницы; рядом с ними находилась боковая дверь, которой и пользовались обычно посетители. Люди всегда и всюду предпочитают входить не с главного входа. Эта дверь служила единственным средством сообщения между площадью и харчевней. Она вела непосредственно в харчевню – просторное, но невзрачное, сплошь уставленное столами помещение с низким потолком и закоптелыми стенами. Прямо над ней, во втором этаже, было пробито окно, и на железной его решетке была прикреплена вывеска гостиницы. Ворота же, крепко запертые на засов, никогда не отпирались.</p><p class="p1">Чтобы проникнуть во двор, нужно было пройти через кабачок.</p><p class="p1">В Тедкастерской гостинице были хозяин и слуга. Хозяина звали дядюшкой Никлсом, слугу – Говикемом. Дядюшка Никлс – очевидно, Николай, превратившийся с помощью английского произношения в Никлса, – был скупой вдовец, вечно трепетавший перед законом. У него были густые брови и волосатые руки. Что касается четырнадцатилетнего мальчугана, прислуживавшего посетителям и откликавшегося на имя Говикем, то это был большеголовый подросток с всегда улыбающейся физиономией. Он носил передник и был подстрижен под гребенку в знак своего зависимого положения. Спал он в нижнем этаже, в крохотной конурке, где прежде держали собаку. Окном этой конурки служило круглое отверстие, выходившее на «зеленую лужайку».</p></span></span></span></span>
