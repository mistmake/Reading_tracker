<span><span><span><span id="id116"><div class="title6">
<p class="p">3. Герцогиня Джозиана</p>
</div><p class="p1">Хотя в 1705 году леди Джозиане было уже двадцать три года, а лорду Дэвиду сорок четыре, они все еще не были женаты – и по очень веским причинам. Быть может, они ненавидели друг друга? Вовсе нет. Но то, что от вас все равно не уйдет, не внушает вам ни малейшего желания торопиться. Джозиана хотела сохранить свою свободу, а лорд Дэвид – свою молодость. Ему казалось, что он тем дольше сможет продлить ее, чем позже свяжет себя брачными узами. В ту богатую любовными похождениями эпоху мужчины не спешили с женитьбой; седины не мешали волокитству: их скрывали парики, позднее на помощь пришла пудра. В пятьдесят лет лорд Чарльз Джерард, барон Джерард из бромлейских Джерардов, пользовался в Лондоне огромным успехом у женщин. Молодая прелестная герцогиня Бекингем, графиня Ковентри, была без ума от шестидесятисемилетнего красавца Томаса Белласайз, виконта Фалькомберга. Цитировали знаменитые стихи семидесятилетнего Корнеля, посвященные двадцатилетней даме: «Пускай мое лицо, маркиза». Женщины на склоне лет тоже побеждали сердца: вспомним хотя бы Нинон и Марион. Было кому подражать.</p><p class="p1">Отношения Джозианы и Дэвида были изящным кокетством, игрой в любовь. Они не любили, они только нравились друг другу. Им было вполне достаточно того, что они общались друг с другом. К чему было спешить? Тогдашние романы внушали влюбленным, что такого рода искус есть проявление хорошего тона. К тому же Джозиана, гордая своим высоким, хотя и незаконным происхождением, считала себя принцессой и держалась довольно надменно. Лорд Дэвид ей нравился. Лорд Дэвид был красив, но главное, она находила его изящным. Быть изящным – это все. Великолепный и изящный Калибан оставляет позади бедного Ариэля. Лорд Дэвид был красив – тем лучше; красивому мужчине угрожает опасность быть приторным; лорд Дэвид не был приторным. Он любил бокс, азартные игры и был в долгу как в шелку. Джозиану занимали его лошади, собаки, его проигрыши и любовницы. Лорд Дэвид в свою очередь поддавался очарованию герцогини Джозианы, девушки безупречного поведения, но свободной от предрассудков, высокомерной, неприступной и дерзкой. Он посвящал ей сонеты, которые Джозиана иногда удостаивала прочесть; он уверял в этих сонетах, что обладание Джозианой вознесет его на небеса, что не мешало ему, однако, из года в год откладывать это вознесение. Он стоял у врат сердца Джозианы, и это нравилось им обоим. Утонченность их отношений восхищала двор. Леди Джозиана говорила:</p><p class="p1">– Как досадно, что я должна выйти замуж за лорда Дэвида: мне хотелось бы только быть влюбленной в него!</p><p class="p1">Джозиана была олицетворением чувственной красоты. Невозможно было себе представить тело более великолепное. Она была очень высокого роста, пожалуй, даже слишком высокого. Ее золотые волосы отливали пурпуром. Это была полная, свежая, румяная красавица, очень смелая и остроумная. Глаза ее говорили красноречиво. Любовников у нее не было, но у нее не было и целомудрия. Ее ограждала гордость. Мужчина? Что вы! Она могла бы снизойти только до божества или чудовища. Если добродетель состоит в неприступности, то Джозиана была идеалом добродетели, но отнюдь не воплощением невинности. Надменность удерживала ее от любовных приключений, но она не рассердилась бы, если бы ей их приписали, лишь бы они были оригинальны и достойны такой особы, как она. Она мало заботилась о своей репутации, но очень дорожила своей славой. Казаться легкомысленной и быть недосягаемой – верх искусства. Джозиана сознавала свое величие и свое обаяние. Ее красота скорей подавляла, чем очаровывала. Она ступала по сердцам. Это была вполне земная женщина. Если бы она почувствовала, что в груди у нее есть душа, она удивилась бы этому не меньше, чем увидев у себя за спиной крылья. Она рассуждала о Локке. Она была хорошо воспитана. Ходили слухи, что она знает арабский язык.</p><p class="p1">Быть живой женской плотью и быть женщиной – две вещи разные. Слабая струна женщины – жалость, так легко переходящая в любовь, – была неведома Джозиане. Не потому, что она была бесчувственна: неверно сравнивать тело с мрамором, как это делали древние. Красивое тело не должно быть похоже на мрамор; оно должно трепетать, содрогаться, покрываться румянцем, истекать кровью, быть упругим, но не твердым, белым, но не холодным, должно испытывать наслаждение и боль; оно должно жить, мрамор же – мертв. Прекрасное тело почти имеет право быть обнаженным; его ослепительность заменяет ему одежды. Кто увидел бы Джозиану нагой, увидел бы ее тело лишь сквозь излучаемое им сияние. Она, не смутясь, предстала бы нагой и перед сатиром и перед евнухом. У нее была самоуверенность богини. Она с удовольствием создала бы из своей красоты пытку для нового Тантала. Король сделал ее герцогиней, а Юпитер – нереидой. Какое-то двойственное обаяние исходило от этого существа. Всякий, кто любовался ею, чувствовал, как становится язычником и ее рабом. Она была дитя прелюбодеяния и казалась нимфой, вышедшей из пены морской. Первое, что судил ей рок, – это плыть по течению, но в царственной среде. В ней было что-то не поддающееся определению, изменчивое, властное, порывистое. Она была образованна и умна. Ни одна страсть не коснулась ее, но мысленно она испытала все. Возможность осуществить свои порочные мечты отталкивала ее и вместе с тем привлекала. Если бы она заколола себя кинжалом, она сделала бы это, как Лукреция, уже после падения. У этой девственницы было развращенное воображение. В этой Диане таилась Астарта. Пользуясь своим высоким происхождением, она держалась вызывающе и неприступно. Однако ей показалось бы забавным самой подготовить свое падение. Слава вознесла ее на лучезарную высоту, но она испытывала соблазн спуститься оттуда и, движимая любопытством, быть может, даже бросилась бы вниз. Она была немного тяжеловесна для облаков, падение казалось ей заманчивым. Свойственная великим мира сего дерзость дает им право производить любые опыты, ведь то, что губит мещанку, для герцогини только забава. Знатность рода, иронический ум, сияющая красота делали Джозиану почти королевой. Одно время она восторгалась Луи де Буфлером, ломавшим одною рукою подкову. Она жалела, что Геркулес уже умер, и жила в ожидании какой-то высокой и вместе с тем сладострастной любви.</p><p class="p1">Нравственный облик Джозианы заставлял вспомнить стих послания к Пизонам: Desinit in piscem<a href="ch2.xhtml#id257" class="a">[184]</a>:</p><div class="poem">
<div class="stanza">
<p class="v">Прекрасный женский торс и гидры хвост.</p>
</div>
</div><p class="p1">Благородный торс, высокая грудь, вздымаемая ровным биением царственного сердца, живой и ясный взор, чистые, горделивые черты, а там под водой, в мутной волне, – как знать? – скрывается, быть может, сверхъестественное продолжение – гибкий и безобразный, ужасный хвост дракона. Недосягаемая добродетель, таящая порочные мечты…</p><p class="empty-line"/><p class="p1">И вместе с тем она была жеманна. Этого требовала мода. Вспомним Елизавету. Елизавета – тот тип женщины, который преобладал в Англии в течение трех столетий – шестнадцатого, семнадцатого и восемнадцатого. Елизавета была не только англичанкой, она была англиканкой. Вот чем объясняется глубокое уважение, с которым епископальная церковь относилась к этой королеве; это уважение, впрочем, разделяла и католическая церковь, что не помешало ей отлучить Елизавету. В устах Сикста Пятого, предававшего Елизавету анафеме, проклятие превращается в мадригал. «Государыня большого ума», – говорит он.</p><p class="p1">Мария Стюарт, менее заботившаяся о религиозных вопросах и больше занятая женскими переживаниями, не слишком уважала свою сестру Елизавету и писала ей как королева королеве и кокетка недотроге: «Ваше нежелание вступить в брак происходит от того, что вы не хотите отказаться от возможности свободно предаваться любви». Мария Стюарт играла веером, Елизавета – топором. Оружие неравное. Они обе соперничали в литературе. Мария Стюарт писала французские стихи, Елизавета переводила Горация. Некрасивая Елизавета считала себя красавицей; она любила катрены, акростихи; по ее желанию ключи от города ей подносили купидоны; она поджимала губки, как итальянка, и закатывала глаза, как испанка; у нее было три тысячи платьев, в том числе несколько костюмов Минервы и Амфитриты; она ценила ирландцев за их широкие плечи, носила расшитые блестками фижмы, обожала розы, ругалась, сквернословила, топала ногами, колотила своих фрейлин, Дедлея посылала к черту, била канцлера Берлея так, что бедняга плакал, плевала в лицо Мэтью, хватала за шиворот Хэттона, давала пощечины Эссексу, показывала свои ноги Бассомпьеру – и при всем том была девственницей.</p><p class="p1">Она сделала для Бассомпьера то же, что сделала когда-то царица Савская для Соломона. Священное писание упоминало о подобном случае: следовательно, это не могло быть неприличным. Все, что допускала Библия, могло быть допущено и англиканской церковью. Происшествие, о котором повествует Библия, завершилось рождением ребенка, нареченного Эвнеакимом или Мелилехетом, что означает «сын мудреца».</p><p class="p1">Развратные нравы. Да. Но лицемерие не лучше цинизма.</p><p class="p1">Современная Англия, имеющая своего Лойолу в лице Уэсли, немного стесняется этого прошлого. Она и досадует на него и гордится им.</p><p class="p1">В те времена нравилось безобразие, в особенности женщинам, и притом красивым. Стоит ли быть красавицей, если у тебя нет урода? Стоит ли быть королевой, если нет какого-нибудь смешного пугала, который говорит тебе «ты»? Мария Стюарт «была благосклонна» к горбуну Риччо. Мария-Терезия Испанская была немного фамильярна с одним мавром. Следствием этой фамильярности явилась «черная аббатиса». В альковных историях «великого века» не был помехой и горб; примером может служить маршал Люксембургский. А еще раньше Люксембургского – Конде, этот «маленький красавчик».</p><p class="p1">Красавицы, и те могли иметь недостатки. Это допускалось. У Анны Болейн одна грудь была больше другой, шесть пальцев на руке и один лишний зуб, выросший над другим. У Лавальер были кривые ноги. Это не мешало Генриху VIII быть без ума от Анны Болейн, а Людовику XIV терять голову от любви к Лавальер.</p><p class="p1">Такие же отклонения от нормы наблюдались и в области моральной. Почти все женщины, принадлежавшие к высшему кругу, были нравственными уродами. В Агнесах таились Мелузины. Днем они были женщинами, а ночью упырями. Они ходили к месту казни и целовали только что отрубленные головы, насаженные на железные колья. Маргарита Валуа, родоначальница всех жеманниц, носила у пояса юбки пришитые к корсажу, закрывавшиеся на замок жестяные коробочки, в которых хранились сердца умерших ее возлюбленных. Под этой необъятной юбкой прятался Генрих IV.</p><p class="p1">В восемнадцатом веке герцогиня Беррийская, дочь регента французского королевства, воплотила в своем образе все разновидности этого типа распутных принцесс.</p><p class="p1">И наряду с этим прекрасные дамы знали латынь. Начиная с семнадцатого века, знакомство с латынью считалось одной из женских прелестей. Изысканность Джен Грей доходила до того, что она изучила древнееврейский язык.</p><p class="p1">Герцогиня Джозиана знала латинский. Кроме того, у нее было еще одно преимущество: она была католичкой – правда, втайне и скорее как ее дядя Карл II, чем как ее отец Иаков II. Из-за своей приверженности к католицизму Иаков потерял трон, Джозиана же совсем не желала рисковать своим пэрством. Вот почему, будучи католичкой в кругу своих утонченных друзей, она была протестанткой для черни.</p><p class="p1">Этот способ исповедовать религию удобен; вы пользуетесь всеми преимуществами, предоставленными вам официальной епископальной церковью, а умираете, как Гроциус, в правоверии католицизма, и отец Пето служит по вас заупокойную мессу.</p><p class="p1">Несмотря на свое цветущее здоровье, Джозиана, повторяем, была в полном смысле слова жеманницей.</p><p class="p1">Иногда ее ленивая и сладострастная манера растягивать конец фразы напоминала мягкие движения крадущейся в джунглях тигрицы.</p><p class="p1">Положение жеманниц выгодно тем, что они резко отделяют себя от всего человеческого рода, считая свою особу выше остальных людей.</p><p class="p1">Жеманницам важней всего держать человечество на известном расстоянии.</p><p class="p1">За неимением Олимпа можно удовольствоваться отелем Рамбулье. Юнона превращается в Араминту.</p><p class="p1">Жеманницу создает неосуществимое притязание на божественность. Небесные громы заменяются дерзостью; храм, уменьшившись в размерах, становится будуаром. Не имея возможности быть богиней, жеманница ограничивается ролью идола.</p><p class="p1">В жеманстве есть известного рода педантство, которое приятно женщинам. Кокетка и педант – близкие соседи. Их внутреннее родство ясно проступает в образе фата.</p><p class="p1">Изнеженность идет от чувственности. Чревоугодие прикрывается разборчивостью. Алчности к лицу гримаса отвращения.</p><p class="p1">Кроме того, слабости, обычно свойственные женщинам, оказываются хорошо защищенными любовной казуистикой, которая заменяет им суровый голос совести. Это похоже на ров перед осаждаемой крепостью. Всякая жеманница имеет неприступный вид. Это ограждает ее от возможной опасности.</p><p class="p1">Она, конечно, сдастся, но пока она полна презрения; повторяем, пока.</p><p class="p1">В глубине души Джозиана была неспокойна. Она сознавала в себе такую склонность к разнузданности, что держала себя святошей. Гордость, сдерживающая наши пороки, толкает нас к порокам противоположным. Чрезмерные усилия быть целомудренной делали Джозиану недотрогой. Постоянная настороженность свидетельствует о тайном желании подвергнуться нападению. Кто действительно неприступен, тому нет надобности вооружаться суровостью.</p><p class="p1">Она была ограждена своим исключительным положением и высоким происхождением, не переставая, как мы уже говорили, помышлять о какой-нибудь неожиданной выходке.</p><p class="p1">Занималась заря восемнадцатого столетия. Англия копировала Францию времен регентства. Уолпол немногим отличался от Дюбуа. Мальборо сражался против своего бывшего короля Иакова II, которому, как говорят, он продал свою сестру Черчилль. Блистал Болингброк, всходила звезда Ришелье. Некоторое смешение сословий создавало удобную почву для любовных интриг; порок уравнивал людей, принадлежавших к разным слоям общества. Позднее их начали уравнивать с помощью идей. Якшаясь с чернью, аристократия положила начало тому, что позднее завершила революция. Уже недалеко было то время, когда Желиот мог открыто сидеть среди бела дня на кровати маркизы д’Эпине. Впрочем, нравы одного столетия нередко перекликаются с нравами другого. Шестнадцатый век был свидетелем того, как ночной колпак Сметона лежал на подушке Анны Болейн.</p><p class="p1">Если женщина и грех одно и то же, как утверждалось на каком-то вселенском соборе, то никогда еще женщина не была до такой степени женщиной, как в те времена. Прикрывая свое непостоянство очарованием, а слабость – всемогуществом, она никогда еще так властно не заставляла прощать себя. То, что Ева сделала из плода запретного плод дозволенный, было ее падением, зато ее торжеством было превращение дозволенного плода в плод запретный. В восемнадцатом веке женщина не допускает в свою спальню супруга. Ева запирается в эдеме с сатаной. Адам остается по ту сторону райских врат.</p><p class="empty-line"/><p class="p1">Инстинкты Джозианы скорее склоняли ее к свободной любви, чем к законному браку. В свободной любви есть что-то от литературы, это напоминает историю Меналка и Амарилис, свидетельствует почти что об учености.</p><p class="p1">Если исключать влечение одного урода к другому, мадемуазель Скюдери не имела другого основания уступить Пелиссону.</p><p class="p1">Девушка властвует над женихом, а жена подчиняется мужу – таков старинный английский обычай. Джозиана старалась, насколько возможно, отдалить час своего рабства. Конечно, повинуясь королевской воле, ей неизбежно предстояло выйти замуж за лорда Дэвида. Но как это было неприятно! Не отвергая лорда Дэвида, Джозиана в то же время держала его в некотором отдалении. Между ними существовало безмолвное соглашение; не заключать брака и не расходиться. Они избегали друг друга. Этот способ любить, делая один шаг вперед и два назад, отразился и в танцах того времени – в менуэте и гавоте. Брак никому не к лицу, из-за него блекнут ленты, украшающие платье, он старит. Брак – убийственно ясное разрешение вопроса. Женщина отдает себя мужчине при посредничестве нотариуса – какая пошлость! Грубость брака приводит к непоправимым положениям; он уничтожает волю, исключает выбор, устанавливает, подобно грамматике, свой собственный синтаксис отношений, заменяет вдохновение орфографией, превращает любовь в диктант, лишает ее всякой таинственности, низводит с облаков образ женщины, одевая ее в ночную сорочку, умаляет тех, кто предъявляет свои права, и тех, кто им подчиняется; наклоняя одну чашу весов, уничтожает очаровательнее равновесие, существующее между полом сильным и полом могущественным, между силой и красотой, мужа делает господином, а жену служанкой, тогда как вне брака существуют только раб и царица. Как превращать ложе в нечто до того прозаическое, что оно становится вполне благопристойным, – мыслимо ли что-либо более вульгарное? Не глупо ли стремиться к такой пресной любви?</p><p class="p1">Лорд Дэвид достиг вполне зрелого возраста. Сорок лет – не шутка. Он не замечал их. Действительно, ему нельзя было дать больше тридцати. Он предпочитал желать Джозиану, чем обладать ею. Он обладал другими женщинами; у него были любовницы.</p><p class="p1">А Джозиана предавалась мечтам. И это было хуже.</p><p class="p1">У герцогини Джозианы была одна особенность, встречающаяся чаще, чем предполагают: один глаз у нее был голубой, а другой черный. Глаза эти таили в себе любовь и ненависть, счастье и горе. День и ночь смешались в ее взгляде.</p><p class="p1">Честолюбие ее было столь велико, что ей хотелось совершить невозможное.</p><p class="p1">Однажды она сказала Свифту:</p><p class="p1">– Вы воображаете, что ваше презрение чего-нибудь стоит?</p><p class="p1">Под этим «вы» подразумевался весь человеческий род.</p><p class="p1">Она была паписткой, но это было в ней очень поверхностно. Ее католицизм не переходил границ, установленных требованиями элегантности. В наши дни это называлось бы пюзеизмом. Она носила тяжелые бархатные, атласные или муаровые платья, затканные золотом и серебром, некоторые шириною в пятнадцать-шестнадцать локтей, пояс ее был перевит множеством нитей жемчуга и драгоценных камней. Она злоупотребляла галунами. Иногда она надевала суконный камзол, обшитый позументом, как у бакалавра. Она ездила верхом по-мужски, несмотря на то, что дамские седла были введены в Англии Анной, женой Ричарда II, еще в четырнадцатом веке. Следуя кастильскому обычаю, сна мыла лицо, руки и грудь раствором леденцов в яичном белке. Выслушав какое-нибудь остроумное замечание, она отвечала на него задумчивым, необычайно красивым смехом.</p><p class="p1">Впрочем, злой она не была; она была скорее добра.</p></span></span></span></span>
