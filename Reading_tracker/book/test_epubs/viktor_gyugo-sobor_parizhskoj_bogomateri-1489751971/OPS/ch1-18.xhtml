<p class="p">Книга четвертая</p>
</div><span id="id22"><div class="title6">
<p class="p">I. Добрые души</p>
</div><p class="p1">За шестнадцать лет до описываемых нами событий, в одно прекрасное утро в Фомино воскресенье, в соборе Парижской Богоматери после обедни было найдено какое-то маленькое, живое существо. Оно лежало в деревянных яслях, вделанных в пол паперти, налево от того исполинского изображения святого Христофора, на которое так благоговейно смотрела с 1413 года каменная коленопреклоненная фигура рыцаря, мессира Антуана Дезэссара. Статуя стояла вплоть до того времени, когда умные люди нашли нужным убрать и изображение святого, и статую молящегося.</p><p class="p1">По издавна существовавшему обычаю, в эти ясли клали подкидышей, поручая их общественному милосердию. Отсюда каждый желающий мог взять подкидыша на воспитание. Перед яслями стояло медное блюдо для подаяния.</p><p class="p1">Подобие живого существа, лежавшее на досках в Фомино воскресенье 1467 года, очевидно, сильно возбуждало любопытство столпившейся вокруг яслей довольно густой кучки людей. Кучка эта состояла большею частью из представительниц прекрасного пола, преимущественно старух.</p><p class="p1">Среди этих женщин особенно выделялись четыре старухи, стоявшие у самых яслей и низко наклонившиеся над ними. Судя по длинным серым одеяниям монашеского покроя, старухи принадлежали к какой-то благочестивой общине. Я не вижу причин, почему бы не передать потомству имен этих четырех скромных и почтенных особ. Их звали: Агнеса ла Герм, Жанна де ла Тарм, Генриетта ла Гольтьер и Гошер ла Виолет. Они все были вдовы и состояли при обители Этьен-Годри.</p><p class="p1">С разрешения своей начальницы и согласно уставу Пьера д’Айльи старушки пришли в собор слушать проповедь.</p><p class="p1">Однако, соблюдая в точности устав Пьера д’Айльи, достойные монахини, с другой стороны, самым бесцеремонным образом нарушали правила Михаила де Браша и кардинала Пизского, жестоко предписывавшие им молчание.</p><p class="p1">– Что это такое, сестра? – говорила Агнеса своей соседке Гошер, рассматривая маленькое создание, которое с визгом корчилось в яслях, видимо испуганное множеством устремленных на него глаз.</p><p class="p1">– Что же это будет с нами, если стали появляться на свет такие дети! – сказала Жанна.</p><p class="p1">– Я не знаю толку в ребятах, – продолжала Агнеса, – но думаю, что на такого ребенка грешно даже и смотреть.</p><p class="p1">– Да это вовсе и не ребенок, Агнеса.</p><p class="p1">– Это неудавшаяся обезьяна, – заметила Гошер.</p><p class="p1">– А по-моему, это какое-то знамение, – произнесла Генриетта ла Гольтьер.</p><p class="p1">– В таком случае, – подхватила Агнеса, – это уже третье чудо за нынешний месяц. Ведь прошло не больше недели, как обервильская Богородица так чудесно наказала нечестивого странника, который кощунствовал перед ее изображением. А то было вторым чудом в этот месяц.</p><p class="p1">– Этот подкидыш – настоящее страшилище! – воскликнула Жанна.</p><p class="p1">– От его крика даже певчий оглохнет! – добавила Гошер. – Замолчи ты, неугомонный ревун!</p><p class="p1">– И подумать только, что монсеньор архиепископ Реймсский прислал это чудовище в подарок монсеньору архиепископу Парижскому! – ужасалась Гошер, всплеснув руками.</p><p class="p1">– По-моему, – снова заговорила Агнеса, – это просто какой-то звереныш… что-то вроде помеси жида и свиньи… ему не место в христианском храме, нужно бросить его в огонь или в воду.</p><p class="p1">– Надеюсь, никто не решится взять к себе это чудовище, – сказала ла Гольтьер.</p><p class="p1">– Ах, боже мой! – сокрушалась Агнеса. – Как мне жаль бедных кормилиц приюта для подкидышей, который находится в конце переулка, на берегу, рядом с жилищем архиепископа… Каково им будет, если придется кормить такое чудовище!.. Я бы на их месте предпочла кормить своей грудью настоящего вампира…</p><p class="p1">– Ну и простота же вы, ла Герм! – вскричала Жанна. – Разве вы не видите, что этому маленькому страшилищу по меньшей мере года четыре и что он нуждается не в груди, а скорее в хорошем куске мяса?</p><p class="p1">И действительно, маленькое «страшилище» (мы и сами затруднились бы назвать его иначе) не было новорожденным. Это существо представляло собой угловатую, очень подвижную массу, завязанную в мешок, помеченный начальными буквами имени мессира Гильома Шартье, тогдашнего парижского архиепископа. Из мешка выглядывала одна только голова, отличавшаяся поразительной уродливостью. На ней ничего нельзя было различить, кроме щетины рыжих волос, одного глаза и зубастого рта. Глаз плакал, рот кричал, а зубы, казалось, так и искали, во что бы им вонзиться. Существо это изо всей силы билось в своем мешке, к немалому изумлению окружавшей ясли всё растущей толпы.</p><p class="p1">В эту толпу вмешалась и госпожа Алоиза Гондлорье, богатая и знатная дама, которая вела за руку хорошенькую девочку лет шести и тащила за собой длинное покрывало, прикрепленное к золотому рогу ее головного убора. Дама остановилась, чтобы тоже взглянуть на злополучное маленькое существо, корчившееся и кричавшее в яслях, между тем как ее дочь, прелестная Флёр де Лис, разодетая в шелк и бархат, водила своим крохотным пальчиком по прибитой к яслям надписи: «Подкидыши».</p><p class="p1">– Фу, какая гадость! – с отвращением проговорила дама. – Я думала, что сюда кладут только детей.</p><p class="p1">И она поспешно пошла дальше, бросив на блюдо серебряный флорин, гордо звякнувший между лежавшими там медяками. Бедные сестры общины Этьен-Годри вытаращили глаза при виде такой небывалой щедрости.</p><p class="p1">Вслед за этим подошел кичившийся своей ученостью Роберт Мистриколь, королевский протонотариус, державший под мышкою одной руки толстый молитвенник, а под другой – руку своей супруги Гильометы, урожденной ла Мерес. Таким образом он имел при себе оба свои регулятора: духовный и светский.</p><p class="p1">– Подкидыш! – проговорил он, рассмотрев метавшееся в мешке существо. – Гм… По всей вероятности, его нашли на берегу реки Флегетона.</p><p class="p1">– У него виден только один глаз, а другой закрыт каким-то желваком, – заметила бывшая девица ла Мерес.</p><p class="p1">– Это не желвак, – возразил мэтр Роберт Мистриколь, – это – яйцо; оно содержит в себе другого такого же демона с таким же яйцом, в котором тоже сидит демон. И так далее… до бесконечности.</p><p class="p1">– Откуда ты это знаешь? – спросила Гильомета.</p><p class="p1">– Знаю, вот и все! – ответил протонотариус.</p><p class="p1">– Господин протонотариус, – обратилась к нему Гошер, – что, по вашему мнению, предвещает этот странный найденыш?</p><p class="p1">– Величайшее бедствие, – изрек мэтр Мистриколь.</p><p class="p1">– Ах ты, господи! – вскричала одна старуха в толпе. – Неужели мало того, что у нас в прошлом году была такая сильная чума, а теперь, говорят, еще англичане собираются высадиться в Гарфле?</p><p class="p1">– Еще, чего доброго, – подхватила другая старуха, – королева не приедет в Париж в сентябре. А торговля и без того идет так плохо.</p><p class="p1">– По-моему, – сказала Жанна де ла Тарм, – для парижских бедняков было бы лучше, если бы этот маленький колдун был положен на костер, а не в ясли.</p><p class="p1">– Да, на хорошенький пылающий костер! – подхватила первая старуха.</p><p class="p1">– Действительно, это было бы благоразумнее, – подтвердил и Мистриколь.</p><p class="p1">В толпе уже несколько минут стоял молодой священник, внимательно прислушиваясь к тому, что говорили монахини и протонотариус. У него были широкий лоб, глубокий взгляд, суровое выражение лица. Он молча отстранил толпу, посмотрел на «маленького колдуна» и положил на него руку. Да и пора было, потому что все эти старые ханжи уже начали предвкушать наслаждение при мысли о «хорошеньком пылающем костре».</p><p class="p1">– Я беру этого ребенка к себе, – произнес молодой священник.</p><p class="p1">И, завернув подкидыша в свою сутану, он быстро ушел с ним, провожаемый полными ужаса взглядами присутствующих. Через минуту он уже скрылся за Красной дверью, соединявшей в то время церковь с монастырем.</p><p class="p1">Когда первое изумление прошло, Жанна де ла Тарм наклонилась к уху Генриетты де ла Гольтьер и прошептала:</p><p class="p1">– Разве я не говорила вам, сестра, что этот молодой клирик, Клод Фролло, колдун?</p></span></span></span>
