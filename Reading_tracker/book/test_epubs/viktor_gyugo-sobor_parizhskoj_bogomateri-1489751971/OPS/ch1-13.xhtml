<span><span><span id="id17"><div class="title4">
<p class="p">VII. Свадебная ночь</p>
</div><p class="p1">Через несколько минут наш поэт очутился в маленькой, уютной, теплой комнатке со сводчатым потолком, перед столом, который, по-видимому, только и ждал, чтобы на него положили что-нибудь из висевшего тут же шкафчика с провизией. А в перспективе ему улыбалась хорошая постель и общество очаровательной молодой девушки. Все это было так похоже на волшебную сказку, что Гренгуар стал не шутя смотреть на себя как на сказочного принца. Время от времени он даже внимательно осматривался по сторонам, как бы отыскивая огненную колесницу, запряженную двумя крылатыми химерами, так как только она одна могла перенести его так быстро из Тартара в рай. Моментами же он начинал упорно смотреть на свою дырявую одежду, словно стараясь, ухватившись за действительность, не потерять почву под ногами. Лишь эта единственная нить удерживала его готовый унестись в мир фантазии разум.</p><p class="p1">Молодая девушка, по-видимому, не обращала на Гренгуара никакого внимания. Она ходила взад и вперед, передвигала скамейки, болтала со своей козочкой, делала по временам свою любимую гримаску. Наконец она подошла к столу, и Гренгуар смог наконец хорошенько рассмотреть ее.</p><p class="p1">Вы были ребенком, читатель, а может быть, вы настолько счастливы, что остались им до сих пор. Вероятно, вы не раз следили в солнечный день около ручейка за какой-нибудь прелестной зеленой или голубой стрекозой, которая быстро, делая резкие повороты, перелетала с кустика на кустик, легко прикасаясь ко всем веточкам, как бы целуя их. Я проводил за этим занятием целые дни – лучшие дни моей жизни. Помните, с какой любовью и любопытством следили вы взглядом и мыслью за этим вихрем крыльев, пурпура и лазури, среди которых мелькало нечто неуловимое благодаря необыкновенной быстроте движений. И воздушное создание, которое смутно вырисовывалось сквозь прозрачные трепещущие крылья, казалось вам тогда чем-то фантастическим, призрачным, недоступным ни зрению, ни осязанию. А когда наконец стрекоза садилась отдохнуть на верхушку тростника, с каким удивлением, сдерживая дыхание, смотрели вы на ее длинные, прозрачные крылья, на ее эмалевое одеяние и хрустальные глаза! Как боялись вы, что она снова скроется в тень, что это создание опять превратится в химеру! Вспомните, что вы чувствовали тогда, и вы поймете, что испытывал Гренгуар, любуясь Эсмеральдой, которую до сих пор видел только мельком, в вихре танцев, песен и шума толпы.</p><p class="p1">«Так вот что такое Эсмеральда! – думал он, смотря на нее и все больше погружаясь в мечты. – Небесное создание! Уличная танцовщица! Так много и так мало! Она нанесла последний удар моей мистерии утром, и она же спасла мне жизнь вечером. Мой злой гений! Мой добрый ангел!.. Прехорошенькая девушка, клянусь честью! А раз она сама захотела сделаться моей женой, то, значит, любит меня до безумия. Да, как-никак, – подумал он вдруг с тем сознанием действительности, которое составляло основу его характера и философии, – не знаю, как это вышло, но ведь я ее муж!»</p><p class="p1">Мысль эта отразилась у него во взгляде, и он с таким победоносным видом подошел к молодой девушке, что она отступила.</p><p class="p1">– Что вам нужно? – спросила она.</p><p class="p1">– Как можете вы спрашивать об этом, обожаемая Эсмеральда? – сказал Гренгуар, и голос его зазвучал такою страстью, что это изумило даже его самого.</p><p class="p1">Цыганка широко открыла глаза.</p><p class="p1">– Я не понимаю, что вы хотите сказать, – с недоумением проговорила она.</p><p class="p1">– Как? – воскликнул Гренгуар, воспламеняясь еще больше и думая, что имеет дело с добродетелью, достойной Двора чудес. – Как? Разве я не принадлежу тебе, моя дорогая? Разве ты не моя? – И он простодушно обнял ее за талию.</p><p class="p1">Цыганка выскользнула, как угорь, у него из рук. Она отпрыгнула на другой конец комнаты, нагнулась, выпрямилась, и в руке ее блеснул кинжал. Гренгуар даже не успел заметить, откуда он взялся. Она стояла перед ним, гневная и гордая, с дрожащими губами и раздувающимися ноздрями; щеки ее пылали, черные глаза сверкали. В то же время белая козочка встала перед ней и, готовясь к бою, опустила голову и выставила вперед свои хорошенькие, позолоченные рожки, очень острые рожки. Все это произошло в мгновение ока.</p><p class="p1">Стрекоза превратилась в осу и собиралась ужалить. Бедный философ, совсем растерявшись, тупо смотрел то на Эсмеральду, то на козочку.</p><p class="p1">– Пресвятая Дева! – воскликнул он наконец, немножко опомнившись от изумления. – Вот так бедовая парочка!</p><p class="p1">– А ты, как видно, очень дерзкий негодяй! – заметила, со своей стороны, Эсмеральда.</p><p class="p1">– Извините, сударыня, – с улыбкой сказал Гренгуар. – Но зачем же в таком случае взяли вы меня в мужья?</p><p class="p1">– А лучше было бы дать тебя повесить?</p><p class="p1">– Так, значит, вы вышли за меня замуж только для того, чтобы спасти меня от виселицы? – спросил Гренгуар, разочаровавшийся в своих страстных ожиданиях.</p><p class="p1">– А иначе зачем же я вышла бы за тебя? – сказала она.</p><p class="p1">– Я, как видно, далеко не так счастлив в любви, как думал, – пробормотал он. – Но к чему же тогда было разбивать эту несчастную кружку?</p><p class="p1">Между тем кинжал Эсмеральды и рога козочки все еще были на страже.</p><p class="p1">– Заключим перемирие, Эсмеральда, – сказал поэт. – Я не секретарь суда и, конечно, не стану доносить, что вы держите у себя оружие вопреки указам и запрещениям парижского прево. Ведь вы, наверное, знаете, что всего неделю тому назад Ноэль Лескрипьен был присужден к штрафу в десять су за то, что носил шпагу. Но это меня не касается, и я перейду прямо к делу. Клянусь вечным спасением, что не подойду к вам близко без вашего разрешения и позволения. Только дайте мне поужинать.</p><p class="p1">В сущности, Гренгуар, как и Депрео, обладал лишь «небольшой дозой чувственности» и не принадлежал к числу тех кавалеров и мушкетеров, которые берут молодых девушек приступом. В любви, как и во всем остальном, он был против крайних мер и предпочитал выжидательную политику. Хороший ужин и приятное общество казались ему – в особенности на пустой желудок – великолепнейшим антрактом между прологом и развязкой его любовного приключения.</p><p class="p1">Цыганка не отвечала. Она сделала свою презрительную гримаску, подняла голову, как птичка, и звонко расхохоталась; а маленький кинжал исчез так же быстро, как и появился, прежде чем Гренгуар мог заметить, куда пчелка спрятала свое жало.</p><p class="p1">Через минуту на столе лежали ржаной хлеб, кусок свиного сала и несколько сморщенных яблок и стояла кружка пива. Гренгуар с увлечением принялся за еду. Судя по отчаянному стуку железной вилки о фаянсовую тарелку, можно было подумать, что вся его любовь превратилась в аппетит.</p><p class="p1">Молодая девушка сидела напротив него и молча смотрела, как он ужинает, очевидно занятая совсем другими мыслями. Время от времени на губах ее мелькала улыбка, и она гладила своей нежной рукой умную головку козочки, прижавшейся к ее коленям.</p><p class="p1">Желтая восковая свеча освещала эту сцену жадности и мечтательности.</p><p class="p1">Между тем Гренгуар, утолив первые приступы голода, устыдился, увидев, что на столе не осталось ничего, кроме одного яблока.</p><p class="p1">– Вы ничего не кушаете, Эсмеральда? – сказал он.</p><p class="p1">Она отрицательно покачала головой и устремила задумчивый взгляд на сводчатый потолок.</p><p class="p1">«Что ее там занимает? – подумал Гренгуар и взглянул на потолок. – Не может быть, чтобы рожа этого высеченного на своде карлика. Черт возьми! Кажется, я могу соперничать с ним!»</p><p class="p1">– Мадемуазель Эсмеральда! – окликнул он.</p><p class="p1">Она, казалось, не слышала его.</p><p class="p1">– Мадемуазель Эсмеральда! – повторил он громче.</p><p class="p1">Напрасный труд. Мысли молодой девушки были далеко, и голос Гренгуара не мог отвлечь ее от них. К счастью, вмешалась козочка. Она начала тихонько дергать свою госпожу за рукав.</p><p class="p1">– Что тебе, Джали? – спросила цыганка, как бы внезапно пробудившись от сна.</p><p class="p1">– Она голодна, – сказал Гренгуар, обрадовавшись случаю завязать разговор.</p><p class="p1">Эсмеральда накрошила хлеба, который Джали принялась грациозно есть с ее ладони.</p><p class="p1">Гренгуар не дал молодой девушке времени снова впасть в задумчивость. Он решился задать ей довольно щекотливый вопрос.</p><p class="p1">– Так вы не хотите, чтобы я был вашим мужем? – спросил он.</p><p class="p1">– Нет, – отвечала Эсмеральда, пристально взглянув на него.</p><p class="p1">– А вашим любовником?</p><p class="p1">– Нет, – отвечала она, сделав свою гримаску.</p><p class="p1">– А вашим другом? – продолжал Гренгуар.</p><p class="p1">Она снова внимательно посмотрела на него и, немножко подумав, сказала:</p><p class="p1">– Может быть.</p><p class="p1">Это «может быть», такое дорогое для философов, ободрило Гренгуара.</p><p class="p1">– Знаете вы, что такое дружба? – спросил он.</p><p class="p1">– Да, – отвечала цыганка. – Это значит быть братом и сестрой. Это две души, которые соприкасаются, но не сливаются; это два пальца на руке.</p><p class="p1">– А любовь? – спросил Гренгуар.</p><p class="p1">– О, любовь! – сказала она, и голос ее задрожал, а глаза блеснули. – Это когда два существа сливаются в одно, когда мужчина и женщина превращаются в ангела. Это – небо.</p><p class="p1">В то время как уличная танцовщица говорила это, ее лицо просияло чудесной красотой, поразившей Гренгуара. Красота эта вполне гармонировала с восточной экзальтацией ее слов. Ее невинные розовые губки улыбались, чистый, ясный лоб минутами затуманивался мыслью, как зеркало от дыхания, а из-под опущенных длинных черных ресниц разливался какой-то особенный свет, придававший ее лицу ту идеальную красоту, которую впоследствии нашел Рафаэль в слиянии девственности, материнства и божества.</p><p class="p1">– Каким же нужно быть, чтобы вам понравиться? – продолжал допрашивать ее Гренгуар.</p><p class="p1">– Нужно быть мужчиной.</p><p class="p1">– А я? – спросил он. – Что же я такое?</p><p class="p1">– Мужчиной с каской на голове, со шпагой в руке и золотыми шпорами на ногах.</p><p class="p1">– Так, – сказал Гренгуар. – Значит, без коня нет и мужчины? А вы любите кого-нибудь?</p><p class="p1">– Любовью?</p><p class="p1">– Да, любовью.</p><p class="p1">Эсмеральда с минуту задумалась, а потом сказала с каким-то особым выражением:</p><p class="p1">– Я скоро узнаю это.</p><p class="p1">– Почему же не сегодня вечером? – нежно спросил поэт. – Почему не меня?</p><p class="p1">Она серьезно взглянула на него:</p><p class="p1">– Я могу полюбить только такого человека, который сумеет меня защитить.</p><p class="p1">Гренгуар покраснел и принял к сведению эти слова. Она, очевидно, намекала на то, что он не помог ей спастись от опасности, которой она подвергалась два часа тому назад; ошеломленный переживаниями странной ночи, он совсем забыл об этом. Теперь лишь он ударил себя по лбу.</p><p class="p1">– Мне следовало прежде всего спросить об этом! – воскликнул он. – Простите мне, пожалуйста, мою глупую рассеянность. Скажите, как удалось вам вырваться из когтей Квазимодо?</p><p class="p1">Вопрос Гренгуара заставил цыганку вздрогнуть.</p><p class="p1">– Ах, этот ужасный горбун! – сказала она, закрыв лицо руками и дрожа, как в лихорадке.</p><p class="p1">– Действительно ужасный, – согласился Гренгуар и снова спросил: – Как же удалось вам спастись от него?</p><p class="p1">Эсмеральда улыбнулась, вздохнула и не отвечала.</p><p class="p1">– Знаете вы, почему он следовал за вами? – спросил Гренгуар, стараясь вернуться обходом к тому же интересовавшему его вопросу.</p><p class="p1">– Нет, не знаю, – отвечала молодая девушка, а потом быстро прибавила: – Ведь и вы шли за мной. Зачем вы это делали?</p><p class="p1">– Клянусь честью, тоже не знаю! – отвечал Гренгуар.</p><p class="p1">Наступило молчание. Гренгуар строгал ножом стол. Молодая девушка улыбалась и пристально смотрела на стену, как будто видела за ней что-то. Вдруг она запела едва слышно:</p><div class="poem">
<div class="stanza">
<p class="v">Quando los pintadas aves</p>
<p class="v">Mudas estan, y la tierra…<a href="ch2.xhtml#id75" class="a">[38]</a> –</p>
</div>
</div><p class="p1">и, так же внезапно остановившись, начала ласкать Джали.</p><p class="p1">– Какое хорошенькое животное, – сказал Гренгуар.</p><p class="p1">– Это моя сестра, – отвечала цыганка.</p><p class="p1">– Почему вас называют Эсмеральдой? – спросил поэт.</p><p class="p1">– Не знаю.</p><p class="p1">– А все-таки?</p><p class="p1">Она вынула из кармана маленькую овальную ладанку, висевшую у нее на шее на цепочке из каких-то зерен. Ладанка сильно пахла камфарой. Она была сшита из зеленой шелковой материи; посредине ее блестел зеленый камень, похожий на изумруд.</p><p class="p1">– Может быть, меня называют так поэтому<a href="ch2.xhtml#id73" class="a">[39]</a>, – сказала она.</p><p class="p1">Гренгуар хотел взять в руки ладанку, но она отдернула ее.</p><p class="p1">– Нет, не трогайте – это амулет, – сказала она. – Ты повредишь ему, либо он тебе.</p><p class="p1">Любопытство поэта было сильно возбуждено.</p><p class="p1">– Кто же вам его дал? – спросил он.</p><p class="p1">Она приложила палец к губам и снова спрятала амулет на груди. Гренгуар попробовал задать ей еще несколько вопросов, но она едва отвечала ему.</p><p class="p1">– Что значит слово «Эсмеральда»?</p><p class="p1">– Не знаю.</p><p class="p1">– На каком оно языке?</p><p class="p1">– Должно быть, на цыганском.</p><p class="p1">– Так казалось и мне, – сказал Гренгуар. – Вы родились во Франции?</p><p class="p1">– Не знаю.</p><p class="p1">– Живы ваши родители?</p><p class="p1">В ответ на это она запела на мотив старинной песни:</p><div class="poem">
<div class="stanza">
<p class="v">Mon pèere est oiseau,</p>
<p class="v">Ma mere est oiselle,</p>
<p class="v">Je passe l’eau sans nacelle,</p>
<p class="v">Je passe l’eau sans bateau,</p>
<p class="v">Ma mèere est oiselle,</p>
<p class="v">Mon pèere est oiseau<a href="ch2.xhtml#id58" class="a">[40]</a>.</p>
</div>
</div><p class="p1">– Так, – сказал Гренгуар. – Каких же лет приехали вы во Францию?</p><p class="p1">– Я была в то время еще совсем маленькая.</p><p class="p1">– А в Париж?</p><p class="p1">– В прошлом году. Когда мы входили в Папские ворота, над нашими головами пролетела малиновка. Это было в конце августа. И тогда я сказала себе: зима будет холодная.</p><p class="p1">– Она и на самом деле была холодная, – сказал Гренгуар, радуясь, что она заговорила. – Мне все время приходилось согревать дыханием пальцы. Так вы, значит, обладаете даром пророчества?</p><p class="p1">– Нет, – по-прежнему коротко отвечала она.</p><p class="p1">– Этот герцог цыганский, как вы его называете, считается главой вашего племени?</p><p class="p1">– Да.</p><p class="p1">– Ведь это он сочетал нас браком, – робко заметил поэт.</p><p class="p1">Эсмеральда сделала свою презрительную гримаску.</p><p class="p1">– Я даже не знаю, как тебя зовут, – сказала она.</p><p class="p1">– Вы желаете знать мое имя? Извольте. Меня зовут Пьер Гренгуар.</p><p class="p1">– Я знаю одно имя, более прекрасное.</p><p class="p1">– Злая! – сказал поэт. – Ну ладно, я не стану сердиться на вас. Подождем, вы, может быть, полюбите меня, когда узнаете ближе. К тому же вы с таким доверием рассказали мне свою историю, что я считаю себя обязанным сделать то же. Итак, меня зовут Пьер Гренгуар, – я сын фермера из Гонесса. Моего отца повесили бургундцы, а мать зарезали пикардийцы во время осады Парижа, двадцать лет тому назад. И я с шести лет остался сиротою, и подошвами мне служили мостовые. Не знаю сам, как удалось мне прожить с шести до шестнадцати лет. Иногда какая-нибудь торговка фруктами давала мне сливу, иногда булочник бросал корку хлеба. Вечером я старался, чтобы меня подобрал обход, и в тюрьме я ночевал на соломе. Несмотря на все эти невзгоды, я, как видите, вырос, хотя толстым меня, правда, назвать нельзя. Зимой я грелся на солнышке у дверей особняка де Сане и никак не мог понять, почему костры Иванова дня зажигаются летом, а не зимою. В шестнадцать лет я решил пристроиться к какому-нибудь делу. Я перепробовал все. Сначала я поступил в солдаты, но оказалось, что я недостаточно храбр для военной службы. Затем я пошел в монахи, но я был недостаточно набожен и к тому же не умел много пить. С отчаяния я поступил учеником к плотникам – оказалось, что я недостаточно силен. Больше всего мне хотелось сделаться школьным учителем. Положим, я не умел читать, но это ничего не значило. Через некоторое время я заметил, что за какое бы занятие я ни принялся, мне всегда не хватает чего-нибудь. Убедившись таким образом в своей полной непригодности к чему бы то ни было, я по доброй воле сделался поэтом. Это самое подходящее занятие при бродячей жизни, и все-таки оно лучше, чем воровство, на которое подбивали меня некоторые из моих приятелей, занимавшиеся кражами. К счастью, в один прекрасный день я встретился с преподобным отцом Клодом Фролло, архидьяконом собора Богоматери. Он принял во мне участие, и ему обязан я тем, что стал настоящим ученым. Я знаю латынь, начиная с «Обязанностей» Цицерона и кончая мартирологом целестинских монахов, я изучил схоластику, пиитику, стихосложение и герметику – эту премудрость из премудростей. Я – автор мистерии, которую с таким успехом разыгрывали сегодня в битком набитом большом зале Дворца правосудия. Затем я написал книгу – в ней будет не меньше шестисот страниц – о чудесной комете 1465 года, от которой один бедняк даже сошел с ума. Выпали на мою долю и другие успехи. Понимая кое-что в артиллерийском деле, я работал вместе с другими при сооружении громадной бомбарды Жана Мог, которую, как вы знаете, разорвало на Шарантонском мосту, когда из нее попробовали выстрелить. При этом еще было двадцать четыре убитых из числа зрителей. Как видите, меня нельзя назвать плохой партией. Я знаю очень много забавных фокусов и штук, которым научу вашу козочку. Я, например, могу выучить ее представлять парижского архиепископа, этого проклятого фарисея, мельницы которого обрызгивают с головы до ног всех проходящих по Мельничному мосту. Да кроме того, я получу за свою мистерию много денег, если мне заплатят. Словом, я весь к вашим услугам, я отдаю вам себя самого, свой ум, свои знания и литературные произведения. И я готов жить с вами, как вам будет угодно – целомудренно или весело. Если хотите, мы будем мужем и женой; если хотите – братом и сестрой.</p><p class="p1">Гренгуар остановился, ожидая, какое впечатление произведет его речь на молодую девушку, которая сидела, опустив глаза в землю.</p><p class="p1">– Феб! – вполголоса проговорила она и, обернувшись к поэту, спросила: – Что значит слово «Феб»?</p><p class="p1">Гренгуар, хоть и не понимавший, какое отношение имеет этот вопрос к его речи, был не прочь похвастаться своей ученостью.</p><p class="p1">– Это латинское слово, – отвечал он, приосаниваясь, – и оно значит – «солнце».</p><p class="p1">– Солнце! – повторила она.</p><p class="p1">– Так звали прекрасного стрелка, который был богом, – прибавил Гренгуар.</p><p class="p1">– Богом! – снова повторила цыганка.</p><p class="p1">Что-то задумчивое и страстное звучало в ее голосе.</p><p class="p1">В это время один из ее браслетов расстегнулся и упал. Гренгуар тотчас же нагнулся поднять его, а когда выпрямился – молодая девушка и козочка исчезли. Он услыхал, как щелкнула задвижка. Маленькая дверь вела в соседнюю комнатку, и теперь эта дверь была заперта снаружи.</p><p class="p1">«Оставила ли она мне хоть постель?» – подумал наш философ. Он обошел комнату кругом. В ней не было ничего, на чем бы можно было лечь, кроме довольно длинного деревянного сундука. Но у него была резная крышка, так что, растянувшись на нем, Гренгуар, наверное, испытал такое же ощущение, какое должен был испытать Микромегас, улегшись во всю длину на Альпы.</p><p class="p1">«Делать нечего, попробуем заснуть хоть тут! – подумал он, укладываясь поудобнее. – Странная, однако, брачная ночь! Очень жаль, что так вышло. В этой свадьбе с разбитой кружкой было что-то наивное, допотопное и привлекательное».</p></span></span></span>
