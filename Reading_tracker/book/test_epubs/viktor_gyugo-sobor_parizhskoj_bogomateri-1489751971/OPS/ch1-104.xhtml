<span><span><span id="id170"><div class="title6">
<p class="p">Часть седьмая</p>
<p class="p">Женщина-титан</p>
</div><span id="id171"><div class="title6">
<p class="p">1. Пробуждение</p>
</div><p class="p1">– А Дея?</p><p class="p1">Гуинплену, смотревшему на занимавшийся день в Корлеоне-Лодже, в то время как в Тедкастерской гостинице происходили описанные выше события, показалось, что этот возглас донесся к нему извне; но крик этот вырвался из глубины его существа.</p><p class="p1">Кому из нас не приходилось слышать голос, звучащий в тайниках нашей души?</p><p class="p1">К тому же начинало светать.</p><p class="p1">Утренняя заря – призыв.</p><p class="p1">К чему бы служило солнце, если бы оно не будило совесть, спящую тяжелым сном?</p><p class="p1">Свет и добродетель соприродны друг другу.</p><p class="p1">Зовут ли Бога Христом или Амуром – в жизни каждого, даже лучшего из нас, наступает час, когда мы забываем о нем; все мы, не исключая и праведников, нуждаемся тогда в напоминании, и заря пробуждает в нас вещий голос совести. Он предшествует пробуждению в нас чувства долга так же, как пение петуха предшествует рассвету.</p><p class="p1">В хаосе человеческого сердца раздается возглас: «Fiat lux»<a href="ch2.xhtml#id173" class="a">[257]</a>.</p><p class="p1">Гуинплен (мы будем называть его по-прежнему этим именем, ибо Кленчарли – только лорд, а Гуинплен – человек) – Гуинплен как бы воскрес.</p><p class="p1">Пора было перевязать лопнувшую артерию, иначе он мог утратить последнюю каплю благородства.</p><p class="p1">– А Дея? – сказал он.</p><p class="p1">И он почувствовал в своих жилах живительный прилив крови. Словно обдало его бодрящей мятежной волною. Бурный наплыв добрых мыслей похож на возвращение домой человека, который потерял ключ и взламывает собственную дверь. Это насильственное вторжение, но вторжение добра; это насилие, но насилие над игом зла.</p><p class="p1">– Дея! Дея! Дея! – повторил он.</p><p class="p1">Он как бы закреплял этим именем то, что происходило у него в сердце.</p><p class="p1">Он спросил вслух:</p><p class="p1">– Где ты?</p><p class="p1">И почти удивился, что не получил ответа.</p><p class="p1">Оглядывая потолок и стены, как человек, к которому возвращается разум, он продолжал вопрошать:</p><p class="p1">– Где ты? Где я?</p><p class="p1">И он снова заметался по комнате, точно запертый в клетку звери.</p><p class="p1">– Где я? В Виндзоре. А ты? В Саутворке. Ах, боже мой! В первый раз в жизни мы разлучены друг с другом. Кто же разъединил нас? Я здесь, а ты там. О! Это невозможно. Этого не будет. Что же со мной сделали?</p><p class="p1">Он остановился.</p><p class="p1">– Кто это говорил мне про королеву? Откуда я знаю? Изменился! Я изменился? Почему? Потому, что я стал лордом. Знаешь ли ты, что случилось, Дея? Ты теперь леди. Творятся удивительные дела. Ах, да! Надо выбраться на настоящую дорогу. Не заблудился ли я? Какой-то человек говорил мне что-то непонятное. Я помню его слова: «Милорд, судьба, отворяя одну дверь, захлопывает другую. То, что осталось позади вас, уже не существует!» Иначе говоря: «Вы негодяй!» Этот презренный человек говорил мне все это, пока я еще не пришел в себя. Он воспользовался тем, что я был ошеломлен. Я оказался его добычей. Где он? Я хочу ответить ему оскорблением! Я, точно в кошмаре, видел его ехидную улыбку. Ах, но теперь я опять становлюсь самим собой! Прекрасно! Они ошибаются, думая, будто с лордом Кленчарли можно сделать все, что угодно! Я – пэр Англии, да, но у пэра есть законная супруга – Дея. Условия? Да разве я приму какие-то условия? Королева? Что мне за дело до королевы? Я ее в глаза не видал. Не для того родился я лордом, чтобы быть рабом. Я получу власть, но не отдам своей свободы. Даром, что ли, сняли с меня оковы? Меня изуродовали – только и всего. Дея! Урсус! Я с вами. Я был таким, как вы. Теперь вы будете такими, каким стал я. Придите! Нет! Я иду к вам! Сейчас же, немедля! Я и так слишком долго ждал. Что они могут подумать, видя, что я не возвращаюсь? Ах, эти деньги! Как смел я послать им деньги! Я должен был сам поспешить к ним. Я помню, этот человек сказал, что мне не выйти отсюда. Посмотрим. Эй, карету! Пусть подадут карету! Я отправлюсь за ними. Где слуги? Должны же быть слуги, раз есть господин. Я здесь хозяин! Это мой дом! Я сорву запоры, сломаю замки, я ногами вышибу двери. Я насквозь проколю шпагой того, кто преградит мне дорогу: теперь у меня есть шпага. Пусть только попробуют оказать мне сопротивление. У меня есть жена – это Дея! У меня есть отец – это Урсус! Мой дом – дворец, и я дарю его Урсусу. Мое имя – корона, и я отдаю ее Дее. Скорей! Сейчас! Вот я, Дея. Одно только мгновение – и я перешагну разделяющее нас расстояние, вот увидишь!</p><p class="p1">И, откинув первую попавшуюся портьеру, он порывисто вышел из комнаты.</p><p class="p1">Он очутился в коридоре и бросился вперед.</p><p class="p1">Перед ним открылся второй коридор.</p><p class="p1">Все двери были настежь.</p><p class="p1">Он пошел наугад из комнаты в комнату, из коридора в коридор в поисках выхода.</p></span><span id="id172"><div class="title6">
<p class="p">2. Дворец, похожий на лес</p>
</div><p class="p1">Как и во всех дворцах, выстроенных в итальянском вкусе, в Корлеоне-Лодже было мало дверей. Их заменяли занавесы, портьеры, ковры.</p><p class="p1">В те времена не было дворца, который не представлял бы собой странного нагромождения великолепных палат, коридоров, украшенных позолотой, мрамором, резными панелями, восточными шелками, уединенных уголков, то темных и таинственных, то залитых светом. Там были веселые, богато убранные покои, блестевшие лаком, плитками голландского фаянса или португальскими узорными изразцами; амбразуры высоких окон, верхняя часть которых уходила в антресоли, застекленные кабинеты, похожие на большие красивые фонари. Глубокие ниши в толстых стенах также могли служить уединенными уголками. Почти на каждом шагу попадались гардеробные, напоминавшие бонбоньерки. Все это называлось «внутренними покоями». Именно здесь готовились преступления.</p><p class="p1">Такие покои оказывались очень удобными в тех случаях, когда надо было убить герцога Гиза, обесчестить хорошенькую жену президента Сильвекана или, позднее, заглушать крики юных девушек, которых приводил Лебель. Замысловатые строения, где человеку непривычному легко было заблудиться. В таких дворцах не стоило никакого труда кого угодно похитить и замести все следы. В этих изысканных вертепах принцы и вельможи скрывали свою добычу. Граф Шароле прятал там госпожу Куршан, жену председателя кассационного суда; де Монтюле – дочь Одри, арендатора земель Круа-Сен-Ланфруа; принц Конти – двух красавиц булочниц из Лиль-Адама; герцог Бекингем – бедняжку Пеньюэл и т. д. Все происходившее там совершалось, если пользоваться выражением римского права, vi, clam et precario, то есть насильственно, тайно и ненадолго. Кто попадал туда, оставался там до тех пор, пока это было угодно хозяину. Это были позолоченные темницы. Они напоминали собой и монастырь и сераль. Винтовые лестницы кружили, поднимались, спускались. Извиваясь спиралью, вереница смежных комнат приводила вас снова туда, откуда вы вышли. Галерея упиралась в молельню. Исповедальня примыкала к алькову. Моделью для архитекторов, строивших королям и вельможам «внутренние покои», служили, очевидно, разветвления кораллов и ходы в губках. Из этого лабиринта, казалось, невозможно было выбраться, но вдруг какой-нибудь вращающийся на шарнирах портрет оказывался замаскированной дверью. Все было предусмотрено. Да оно и понятно: здесь нередко разыгрывались драмы. Дворец от подвалов до мансард представлял собой многоэтажный улей. Этот причудливый звездчатый коралл, выросший внутри каждого дворца, начиная от Версаля, представлялся как бы жилищем пигмеев в обиталище титанов. Коридоры, альковы, ниши, тайники – все это были укромные уголки, где высокие особы прятали от людских взоров свои низкие дела.</p><p class="p1">Эти извилистые, глухие переходы напоминали об играх, о завязанных глазах, о руках, нащупывающих двери, о сдержанном смехе, о жмурках, прятках и в то же время приводили на память Атридов, Плантагенетов, Медичи, свирепых рыцарей Эльца, убийство Риччо, Мональдески, людей с обнаженными шпагами, преследующих беглеца из комнаты в комнату.</p><p class="p1">Такие таинственные убежища, где роскошь предназначена укрывать страшные злодеяния, были еще в древности. Образцом их могут служить сохранившиеся под землей египетские гробницы, как, например, склеп царя Псаметиха, обнаруженный раскопками Пассалакки. Древние поэты с ужасом описывали эти таинственные постройки. Error circumflexus, locus implicitus gyris<a href="ch2.xhtml#id172" class="a">[258]</a>.</p><p class="p1">Гуинплен находился во «внутренних покоях» Корлеоне-Лоджа.</p><p class="p1">Он сгорал желанием выйти отсюда, очутиться на воле, вновь увидеть Дею. Эта путаница коридоров, комнат, потайных дверей, неожиданных выходов задерживала его, замедляла его шаги. Он хотел бежать, а вынужден был пробираться. Ему казалось, что достаточно только распахнуть дверь, чтобы выбраться на свободу, но за ней следовали новые и новые двери, и он блуждал по этому лабиринту.</p><p class="p1">За одной комнатой следовала другая, за залом новый зал.</p><p class="p1">Нигде ни живой души. Ни звука. Ни шороха.</p><p class="p1">Иногда ему казалось, что он кружится на одном месте.</p><p class="p1">Порой ему чудилось, что кто-то идет навстречу. На самом деле не было никого: это было его собственное отражение в зеркале.</p><p class="p1">Это был он, но в костюме знатного дворянина, совершенно не похожий на себя. Он узнавал себя, но не сразу.</p><p class="p1">Он блуждал долго. Он путался в сложном расположении «внутренних покоев», попадал то в укромный кабинет, кокетливо украшенный резьбой и живописью, немного непристойной, то в какую-то подозрительную часовню со стенами, покрытыми перламутром и эмалью, с изображениями из слоновой кости такой тонкой работы, что их надо было рассматривать в лупу, как крышки табакерок; то в один из тех изысканных уголков во флорентийском вкусе, которые как будто нарочно были придуманы для взбалмошных женщин, находящихся в капризном настроении, и с тех пор так и называются «будуарами». Всюду – на потолках, на стенах и даже на полу – пестрели на бархате или металле изображения птиц и деревьев, фантастические растения, перевитые жемчугом, рельефные басоны, скатерти, сверкавшие блестками стекляруса, фигуры воинов, королев, женщин-тритонов с чешуйчатым хвостом гидры. Граненый хрусталь отражал свет и переливался всеми цветами радуги. Стеклянная посуда соперничала блеском с драгоценными камнями. Во мраке что-то вспыхивало искрами в угловых шкафах. Трудно было сказать, что представляли собою эти сверкающие блики, в которых зелень изумрудов сливалась с золотом восходящего солнца и на которые словно наплывали облака цвета голубиных перьев, – были ли это крохотные зеркала, или же огромные аквамарины. Хрупкое и в то же время громоздкое великолепие! Это был самый маленький из всех дворцов, или громаднейший ларец для драгоценностей. Домик феи Маб или безделушка Гео. Гуинплен искал выхода.</p><p class="p1">Он не находил его. Он растерялся. Ничто не поражает с такой силой, как роскошь, когда ее видишь в первый раз. К тому же это был лабиринт. На каждом шагу какое-нибудь великолепное препятствие преграждало ему дорогу. Казалось, все противится его бегству. Дворец как будто не хотел выпускать его. Он точно попал в плен ко всем этим чудесам. Он чувствовал, что его схватили и цепко держат.</p><p class="p1">«Какой страшный дворец!» – думал он.</p><p class="p1">Он блуждал по бесконечным переходам, тревожно спрашивая себя, что означает все это, не в тюрьме ли он; он приходил в бешенство, он рвался на вольный воздух. Он повторял: «Дея! Дея!», хватаясь за это имя как за путеводную нить, боясь оборвать ее; она одна могла вывести его отсюда.</p><p class="p1">Временами он кричал:</p><p class="p1">– Эй! Кто-нибудь!</p><p class="p1">Никто не откликался.</p><p class="p1">Комнатам не было конца. Все было пустынно, молчаливо, пышно и зловеще.</p><p class="p1">Такими рисуются нашему воображению заколдованные замки.</p><p class="p1">Скрытые источники тепла поддерживали в этих коридорах и комнатах летнюю температуру. Казалось, какой-то чародей завладел июнем и запер его в этом лабиринте. Порою до Гуинплена доносился чудесный запах. Его обволакивали ароматы, словно где-то неподалеку благоухали невидимые цветы. Было жарко. Всюду были разостланы ковры. Здесь можно было бы ходить обнаженным.</p><p class="p1">Гуинплен смотрел в окна. Вид постоянно менялся. Его взор встречал то сады, исполненные свежести весеннего утра, то новые фасады с новыми статуями, то испанские патио – квадратные, выложенные плитами дворики, сырые и холодные, заключенные между стенами многоэтажных зданий, то воды Темзы, то высокую башню Виндзорского замка.</p><p class="p1">В этот ранний час на дворе не было ни души.</p><p class="p1">Он останавливался. Прислушивался.</p><p class="p1">– О, я уйду отсюда! – восклицал он. – Я вернусь к Дее. Меня не удержать силой. Горе тому, кто вздумал бы помешать мне. Что это там за башня? Пусть в ней живет великан, адский пес или тараск, охраняющий выход из этого заколдованного замка, все равно я их убью. Я справлюсь с целым полчищем. Дея! Дея!</p><p class="p1">Вдруг до него донесся тихий, еле слышный звук, похожий на журчание воды.</p><p class="p1">Гуинплен находился в узкой темной галерее; в нескольких шагах от него была закрытая портьера.</p><p class="p1">Он сделал несколько шагов, раздвинул портьеру и вошел.</p><p class="p1">Его глазам открылось неожиданное зрелище.</p></span></span></span></span>
