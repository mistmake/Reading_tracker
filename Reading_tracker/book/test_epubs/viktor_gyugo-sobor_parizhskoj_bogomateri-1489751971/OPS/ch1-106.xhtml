<span><span><span><span id="id174"><div class="title6">
<p class="p">4. Сатана</p>
</div><p class="p1">Вдруг спящая пробудилась. Быстрым и вместе с тем величественно-плавным движением она села на своем ложе; золотистые, мягкие, как шелк, волосы в прелестном беспорядке рассыпались вдоль ее стана; рубашка, соскользнув, обнажила плечо; она дотронулась холеной рукой до розовой ступни и некоторое время смотрела на свою обнаженную ногу, достойную восхищения Перикла и резца Фидия; потом потянулась и зевнула, как тигрица, пробудившаяся с восходом солнца.</p><p class="p1">Вероятно, она услышала тяжелое дыхание Гуинплена – человек, старающийся сдержать волнение, всегда дышит тяжело.</p><p class="p1">– Здесь кто-нибудь есть? – спросила она.</p><p class="p1">Она проговорила эти слова, сладко зевая.</p><p class="p1">Гуинплен впервые услыхал ее голос. Голос очаровательницы, в котором звучало что-то пленительно-высокомерное; свойственная ему повелительность смягчалась ласковой интонацией.</p><p class="p1">Внезапно став на колени, напоминая в этой позе античную статую, тело которой облекают тысячи прозрачных складок, она потянула к себе халат, соскочила с постели и с молниеносной быстротой накинула его. Он мгновенно окутал ее с ног до головы. Длинные рукава закрыли даже кисти рук. Из-под подола выглядывали только кончики пальцев белых, крошечных, как у ребенка, ног с узкими розовыми ногтями.</p><p class="p1">Она высвободила из-под халата волну роскошных волос и, подбежав к стоящему в глубине алькова расписному зеркалу, за которым, вероятно, была дверь, прильнула к нему ухом.</p><p class="p1">Согнув пальчик, она постучала в стекло.</p><p class="p1">– Кто там? Это вы, лорд Дэвид? Почему так рано? Который час? Или это ты, Баркильфедро?</p><p class="p1">Она обернулась.</p><p class="p1">– Нет, это не здесь. Это с другой стороны. Может быть, кто-то есть в ванной комнате? Да отвечайте же! Впрочем, нет, оттуда никто не может прийти.</p><p class="p1">Она направилась к занавеси из серебристого газа, откинула ее в сторону ногой, раздвинула плечом и вошла в мраморный зал.</p><p class="p1">Гуинплен почувствовал, как его охватывает предсмертный холод. Скрыться было некуда. Бежать – слишком поздно. Да он и не в силах был бежать. Он был бы рад, если бы под ним разверзлась земля и поглотила его. Он стоял на самом виду.</p><p class="p1">И она увидала его.</p><p class="p1">Она даже не вздрогнула. Она смотрела на него чрезвычайно удивленная, но без малейшего страха; в ее глазах были и радость и презрение.</p><p class="p1">– А! – проговорила она. – Гуинплен!</p><p class="p1">И вдруг одним прыжком эта кошка, обернувшаяся пантерой, бросилась ему на шею.</p><p class="p1">От быстрого движения рукава ее халата откинулись и своими обнаженными до плеча руками она крепко прижала к себе голову Гуинплена.</p><p class="p1">И вдруг, оттолкнув его, она впилась ему в плечи цепкими, как когти, пальцами, и стала всматриваться в него каким-то странным взглядом.</p><p class="p1">Она устремила на него роковой взгляд своих разноцветных глаз, горевших как Альдебаран, глаз, в которых было и что-то низменное и что-то неземное. Гуинплен смотрел в эти двухцветные глаза – голубой и черный, – теряя голову от этого небесного и адского взора. Этот мужчина и эта женщина ослепляли друг друга, он – своим безобразием, она – своей красотой, и оба – ужасом, исходившим от них.</p><p class="p1">Он продолжал молчать, словно придавленный невыносимым гнетом. Она воскликнула:</p><p class="p1">– Ты пришел! Это умно. Ты узнал, что меня заставили уехать из Лондона, и последовал за мной. Вот хорошо! Удивительно, как ты очутился здесь.</p><p class="p1">Когда два существа оказываются во власти друг друга, между ними вспыхивает молния. Гуинплен, услышав внутри себя предостерегающий голос смутного страха и голос совести, отпрянул, но розовые ногти впились ему в плечи и удержали его силой. Надвигалось что-то неумолимое. Он, человек-зверь, попал в берлогу женщины-зверя. Она продолжала:</p><p class="p1">– Представь себе, Анна, дура этакая, – ну, знаешь, королева, – вызвала меня в Виндзор, сама не зная зачем. А когда я приехала, она заперлась со своим идиотом канцлером. Но как ты умудрился пробраться ко мне? Прекрасно! Вот что значит быть настоящим мужчиной. Для него не существует преград. Его зовут, и он приходит. Ты расспрашивал обо мне? Ты, вероятно, узнал, что я герцогиня Джозиана. Кто проводил тебя сюда? Должно быть, мой грум. Смышленый мальчишка. Я дам ему сто гиней. Скажи мне, как ты все это устроил? Нет, лучше не говори. Я не хочу этого знать. Объясняя свои смелые поступки, люди только умаляют их. Мне приятнее видеть в тебе загадочное существо. Ты настолько безобразен, что можешь казаться чудом. Ты упал с небес или поднялся из преисподней, прямо из пасти Эреба. Очень просто: или раздвинулся потолок, или разверзся пол. Ты либо спустился с облаков, либо взвился кверху в столбе серного пламени. Ты достоин того, чтобы являться как божество. Решено, ты мой любовник!</p><p class="p1">Гуинплен растерянно слушал, чувствуя, что его покидает рассудок. Все было кончено. Сомнений быть не могло. Эта женщина подтверждала все, о чем говорилось в письме, полученном ночью. Он, Гуинплен, будет любовником герцогини, обожаемым любовником! Безмерная гордость темной тысячеглавой гидрой зашевелилась в его несчастном сердце.</p><p class="p1">Тщеславие – страшная сила, действующая внутри нас, но против нас же самих.</p><p class="p1">Герцогиня продолжала:</p><p class="p1">– Ты здесь, значит так суждено. Больше мне ничего не надо. Чья-то воля, неба или ада, толкает нас в объятия друг друга. Брачный союз Стикса и Авроры! Безумный союз, попирающий все законы. В тот день, когда я впервые увидела тебя, я подумала: «Это он. Я узнаю его. Это чудовище, о котором я мечтала. Он будет моим». Но надо помогать судьбе. Вот почему я тебе написала. Один вопрос, Гуинплен: ты веришь в предопределение? Я поверила с тех пор, как прочитала у Цицерона про сон Сципиона. Ах, я и не заметила! Ты одет как дворянин. Так и надо. Тем более что ты фигляр. Это только лишний повод к тому, чтобы так нарядиться. Комедиант стоит лорда. Да и что такое лорды? Те же клоуны. У тебя благородная осанка, ты прекрасно сложен. Невероятно все-таки, что ты попал сюда. Когда ты пришел? Давно ты здесь? Ты видел меня нагой? Не правда ли, я хороша? Я собиралась принять ванну. Ах, я люблю тебя! Ты прочел мое письмо? Сам прочел, или тебе его прочли? Умеешь ты читать? Ты, должно быть, совсем необразован. Я задаю тебе вопросы, но ты не отвечай. Мне не нравится звук твоего голоса. Он слишком нежен. Такое необыкновенное существо, как ты, должно не говорить, а рычать. Твоя же речь – как песня. Мне это противно. Единственное, что мне не нравится в тебе. Все остальное в тебе страшно и поэтому великолепно. В Индии ты стал бы богом. Ты так и родился с этим страшным смехом на лице? Нет, конечно? Тебя, должно быть, изуродовали в наказанье за что-либо? Надеюсь, ты совершил какое-нибудь злодейство. Иди же ко мне!</p><p class="p1">Она упала на кушетку, увлекая его за собой. Сами не зная как, они очутились рядом. Стремительный поток ее речей бешеным вихрем проносился над Гуинпленом. Он с трудом улавливал смысл ее безумных слов. В ее глазах сиял восторг. Она говорила бессвязно, страстно, нежным, взволнованным голосом. Ее слова звучали как музыка, но в этой музыке Гуинплену слышалась буря.</p><p class="p1">Она снова устремила на него пристальный взгляд.</p><p class="p1">– Рядом с тобой я чувствую себя униженной, – какое счастье! Быть герцогиней – скука смертная! Быть особой королевской крови, – что может быть утомительнее? Падение приносит отдых. Я так пресыщена почетом, что нуждаюсь в презрении. Все мы немножко сумасбродны, начиная с Венеры, Клеопатры, госпожи де Шеврез, госпожи де Лонгвиль и кончая мной. Я не буду скрывать нашей связи, предупреждаю тебя заранее. Эта любовная интрижка будет не очень приятна королевской фамилии Стюартов, к которой я принадлежу. Ах, наконец-то я вздохну свободно! Я нашла выход. Я сбрасываю с себя величие. Лишиться всех преимуществ моего положения – значит освободить себя от всяких уз. Все порвать, бросить всему вызов, все переделать на свой лад – это и есть настоящая жизнь. Послушай, я люблю тебя!</p><p class="p1">Она остановилась, и на ее губах промелькнула зловещая улыбка.</p><p class="p1">– Я тебя люблю не только потому, что ты уродлив, но и потому, что ты низок. Я люблю в тебе чудовище и скомороха. Иметь любовником человека презренного, гонимого, смешного, омерзительного, выставляемого на посмешище к позорному столбу, который называется театром, – в этом есть какое-то особенное наслаждение. Это значит вкусить от плода адской бездны. Любовник, который позорит женщину, – это восхитительно! Отведать яблока не райского, а адского – вот что соблазняет меня. Вот чего я жажду. Я – Ева бездны. Ты, вероятно, сам того не зная, демон. Я сберегла себя для чудовища, которое может пригрезиться только во сне. Ты марионетка, тебя дергает за нитку некий призрак. Ты воплощение великого адского смеха. Ты властелин, которого я ждала. Мне нужна была любовь, на какую способна лишь Медея или Канидия. Я так и знала, что со мной случится что-то страшное и необыкновенное. Ты именно тот, кого я желала. Я говорю тебе много такого, чего ты, должно быть, не понимаешь. Гуинплен, никто еще не обладал мною. Я отдаюсь тебе безупречно чистая. Ты, конечно, не веришь мне, но если бы ты знал, как мне это безразлично!</p><p class="p1">Ее речь была подобна извержению вулкана. Если бы пробуравить отверстие в склоне Этны, оттуда вырвался бы такой же стремительный поток пламени.</p><p class="p1">Гуинплен пробормотал:</p><p class="p1">– Герцогиня…</p><p class="p1">Она рукой зажала ему рот.</p><p class="p1">– Молчи! Я смотрю на тебя. Гуинплен, я непорочная распутница. Я девственная вакханка. Я не принадлежала ни одному мужчине и могла бы быть пифией в Дельфах, могла бы обнаженной пятою попирать бронзовый треножник в святилище, где жрецы, облокотись на кожу Пифона, топотом вопрошали невидимое божество. У меня каменное сердце, но оно похоже на те таинственные валуны, которые приносит море к подножию утеса Хентли-Набб, в устье Тисы; если разбить такой камень, внутри найдешь змею. Эта змея – моя любовь. Любовь всесильная, это она заставила тебя прийти сюда. Нас разделяло неизмеримое пространство. Я была на Сириусе, ты на Аллиофе. Ты преодолел это расстояние, и вот – ты здесь! Как это хорошо! Молчи! Возьми меня!</p><p class="p1">Она остановилась. Он затрепетал. Она снова улыбнулась.</p><p class="p1">– Видишь ла, Гуинплен, мечтать – это творить. Желание – призыв. Создать в своем воображении химеру – значит наделить ее жизнью. Страшный, всемогущий мрак запрещает нам взывать к нему напрасно. Он исполнил мою волю. И вот ты здесь. Решусь ли я обесчестить себя? Да. Решусь ли стать твоей любовницей, твоей наложницей, твоей рабой, твоей вещью? Да, с восторгом. Гуинплен, я женщина. Женщина – это глина, жаждущая обратиться в грязь. Мне необходимо презирать себя. Это превосходная приправа к гордости. Низость прекрасно оттеняет величие. Ничто не сочетается так хорошо, как эти две крайности. Презирай же меня, ты, всеми презираемый! Унижаться перед униженным – какое наслаждение? Цветок двойного бесчестья! Я срываю его. Топчи меня ногами! Тем сильнее будет твоя любовь ко мне. Я это знаю по себе. Тебе понятно, почему я боготворю тебя? Потому что презираю. Ты настолько ниже меня, что я могу возвести тебя на алтарь. Соединить твердь с преисподней – значит создать хаос, а хаос привлекает меня. Хаос всему начало и конец. Что такое хаос? Беспредельная скверна. И из этой скверны Бог создал свет. Вылепи светило из грязи, и это буду я.</p><p class="p1">Так говорила эта страшная женщина. Халат, распахнувшийся от ее движений, открывал ее девственный стан.</p><p class="p1">Она продолжала:</p><p class="p1">– Волчица для всех, я стану твоей собакой. Как все изумятся! Нет ничего приятнее, чем удивлять глупцов. Ведь это совершенно понятно. Кто я? Богиня? Но ведь Амфитрита отдалась Циклопу. Кто я? Фея? Но Ургела приняла к себе на ложе восьмирукого Бугрикса, полумужчину-полуптицу, с перепонками меж пальцев. Кто я? Принцесса? А у Марии Стюарт был Риччо. Три красавицы и три урода. Я превзошла их, ибо ты уродливее их любовников. Гуинплен, мы созданы друг для друга. Ты чудовище лицом, я чудовище душою. Оттого-то я и люблю тебя. Пусть это моя прихоть. А что такое ураган? Ведь он – прихоть ветров. Между нами космическое сходство. И ты и я, мы оба дети мрака: ты – лицом, я – душой. И ты в свою очередь создаешь меня. Ты пришел, и душа моя раскрылась. Я сама ее не знала. Она поражает меня. Я богиня, но твое приближение пробуждает во мне гидру. Ты открываешь мне мою подлинную природу. Ты помогаешь мне заглянуть в самое себя. Смотри, как я похожа на тебя! Ты можешь смотреться в меня как в зеркало. Твое лицо – моя душа. Я не подозревала, как я ужасна. Значит, и я – тоже чудовище. О Гуинплен, ты почти рассеял мою скуку!</p><p class="p1">Она залилась странным, каким-то детским смехом, наклонилась к нему и прошептала на ухо:</p><p class="p1">– Хочешь видеть безумную? Она перед тобой!</p><p class="p1">Ее пристальный взгляд зачаровывал Гуинплена. Взгляд – это тот же волшебный напиток. Ее халат, распахиваясь, открывал взору Гуинплена страшное своею красотою тело. Слепая, животная страсть охватила Гуинплена. Страсть, в которой была смертельная мука.</p><p class="p1">Женщина говорила, и слова ее жгли его как огнем. Он чувствовал, что сейчас случится непоправимое. Он не мог произнести – ни слова. Иногда она умолкала и, всматриваясь в него, шептала: «О, чудовище!» В ней было что-то хищное.</p><p class="p1">Она схватила его за руки.</p><p class="p1">– Гуинплен, – продолжала она, – я рождена для трона, ты – для подмостков. Станем же рядом. Ах, какое счастье, что я пала так низко! Я хочу, чтобы весь мир узнал о моем позоре. Люди стали бы еще больше преклоняться передо мной, ибо чем сильнее их отвращение, тем больше они пресмыкаются. Таков род людской. Злобные гады. Драконы и вместе с тем черви. О, я безнравственна, как боги! Недаром же я незаконная дочь короля. И я поступаю по-королевски. Кто такая была Родопис? Царица, влюбленная во Фта, мужчину с головою крокодила. В честь его она воздвигла третью пирамиду. Пентесилея полюбила кентавра, носящего имя Стрельца и ставшего впоследствии созвездием. А что ты скажешь об Анне Австрийской? Уж до чего дурен был этот Мазарини! А ты не некрасив, ты безобразен. То, что некрасиво, – мелко, а безобразие величественно! Некрасивое – гримаса дьявола, просвечивающая сквозь красоту. Безобразие – изнанка прекрасного. Это его оборотная сторона. У Олимпа два склона: на одном, залитом светом, мы видим Аполлона, на другом, во мраке, – Полифема. Ты – титан. В лесу ты был бы Бегемотом, в океане – Левиафаном, в клоаке – Тифоном. В твоем уродстве есть нечто грозное. Твое лицо как будто обезображено ударом молнии. Твои черты исковерканы чьей-то огромной огненной рукой. Она смяла их и исчезла. Кто-то в припадке мрачного безумия заключил твою душу в страшную, нечеловеческую оболочку. Ад – это печь, где накаляют докрасна железо, которое мы называем роком; этим железом ты заклеймен. Любить тебя – значит постигнуть великое. Мне выпало на долю это торжество. Влюбиться в Аполлона! Подумаешь, как это трудно! Мерило нашей славы – удивление, которое мы вызываем. Я люблю тебя. Ты снился мне все ночи! Вот мой дворец. Ты увидишь мои сады. Здесь есть ключи, журчащие в траве, есть гроты, в которых можно предаваться ласкам, есть прекрасные мраморные группы работы кавалера Бернини. А сколько цветов! Их даже слишком много. Розы весною пылают, как пожар. Я, кажется, сказала тебе, что королева – моя сестра. Делай же со мной, что хочешь. Я создана для того, чтобы Юпитер целовал мне ноги, а сатана плевал мне в лицо. Какой ты веры? Я – папистка. Мой отец, Иаков Второй, умер во Франции, окруженный толпою иезуитов. Никогда я еще не переживала того, что испытываю возле тебя. Ах, я хотела бы плыть вечером на золотой галере, под пурпурным навесом, прислонясь рядом с тобой к подушке, наслаждаясь под звуки музыки бесконечной красотою моря. Оскорбляй меня! Ударь! Плати мне за любовь! Обращайся со мной как с продажной тварью! Я боготворю тебя…</p><p class="p1">Рычанье может быть голосом любви. Вы сомневаетесь? Посмотрите на львов. Эта женщина была и свирепа и нежна. Трудно представить себе что-либо более трагическое. Она и ранила и ласкала. Она нападала, как кошка, и тотчас же отступала. В этой игре обнажились ее звериные инстинкты. В ее поклонении было нечто вызывающее. Ее безумие заражало. Ее роковые речи звучали невероятно грубо и нежно. Ее оскорбления не оскорбляли. Ее обожание унижало. Ее пощечина возносила на недосягаемую высоту. Ее интонации сообщали безумным, полным страсти словам прометеевское величие. Воспетые Эсхилом празднества в честь великой богини пробуждали в женщинах, искавших сатиров в звездные ночи, такую же темную, эпическую ярость. Подобные пароксизмы страсти сопровождали таинственные пляски, происходившие в лесах Додоны. Эта женщина как бы преображалась, если только преображение возможно для тех, кто отвращается от неба. Ее волосы развевались, как грива, ее халат то запахивался, то раскрывался; ничего не могло быть прелестнее ее груди, из которой вырывались дикие вопли; лучи ее голубого глаза смешивались с пламенем черного; в ней было что-то нечеловеческое. Гуинплен изнемогал от этой близости и, весь проникнутый ею, чувствовал себя побежденным.</p><p class="p1">– Люблю тебя! – крикнула она.</p><p class="p1">И, словно кусая, впилась в его губы поцелуем.</p><p class="p1">Быть может, Гуинплену и Джозиане вскоре могло понадобиться одно из тех облаков, которыми Гомер иногда окутывал Юпитера и Юнону. Быть любимым женщиной зрячей, видящей его, ощущать на своем обезображенном лице прикосновение ее дивных уст, было для Гуинплена жгучим блаженством. Он чувствовал, что перед этой загадочной женщиной в его душе исчезает образ Деи. Воспоминание о ней, слабо стеная, уже не в силах было бороться с наваждением тьмы. Есть античный барельеф с изображением сфинкса, пожирающего амура; божественное нежное создание истекает кровью, зубы улыбающегося свирепого чудовища раздирают его крылья.</p><p class="p1">Любил ли Гуинплен эту женщину? Может ли у человека быть, подобно земному шару, два полюса? Неужели мы тоже вращаемся на неподвижной оси и кажемся издали звездой, а вблизи комом грязи? Не планета ли мы, где день чередуется с ночью? Неужели у сердца две стороны? Одна – любящая при свете, другая – во мраке? Одна – луч, другая – клоака? Ангел необходим человеку, но неужели он не может обойтись без дьявола? Зачем душе крылья летучей мыши? Неужели для каждого наступает роковой сумеречный час? Неужели грех входит, как что-то неотъемлемое, в нашу судьбу, и мы никак не можем без него обойтись? Неужели мы должны принимать зло, лежащее в нашей природе, как нечто, неразрывно связанное со всем нашим существом? Неужели дань греху неизбежна? Глубоко волнующие вопросы.</p><p class="p1">И, однако, какой-то голос твердит нам, что слабость преступна. Гуинплен переживал невыразимо сложное чувство; в нем одновременно боролись влеченья плоти, жажда жизни, сладострастие, мучительное опьянение и все то чувство стыда, которое содержится в гордости. Неужели он поддастся искушению?</p><p class="p1">Она повторила:</p><p class="p1">– Люблю тебя!</p><p class="p1">И в каком-то исступлении прижала его к своей груди.</p><p class="p1">Гуинплен задыхался.</p><p class="p1">Вдруг совсем близко от них раздался громкий и пронзительный звонок. Это звенел колокольчик, вделанный в стену. Герцогиня повернула голову и сказала:</p><p class="p1">– Что ей нужно от меня?</p><p class="p1">И внезапно, подобно отброшенной тугой пружиной крышке люка, в стене со стуком отворилась серебряная дверца, украшенная королевской короной.</p><p class="p1">Показались внутренние стенки, обтянутые голубым бархатом; в ней на золотом подносе лежало письмо.</p><p class="p1">Объемистый квадратный конверт был положен с таким расчетом, чтобы в глаза сразу бросилась крупная печать из алого сургуча. Колокольчик продолжал звенеть.</p><p class="p1">Открытая дверца почти касалась кушетки, на которой сидели Джозиана и Гуинплен. Все еще одной рукой обнимая Гуинплена, герцогиня наклонилась, взяла письмо и захлопнула дверцу. Отверстие закрылось, и колокольчик умолк.</p><p class="p1">Герцогиня сломала печать, разорвала конверт, вынула из него два листа и бросила конверт на пол к ногам Гуинплена.</p><p class="p1">Печать надломилась таким образом, что Гуинплен мог рассмотреть королевскую корону и под нею букву «А». На другой стороне конверта стояла надпись: «Ее светлости герцогине Джозиане».</p><p class="p1">Джозиана вынула из него большой лист пергамента и маленькую записку на веленевой бумаге. На пергаменте стояла зеленая канцелярская печать больших размеров, свидетельствовавшая о том, что документ относится к знатной особе. Герцогиня, все еще в упоении восторга, затуманившего ее глаза, сделала еле заметную недовольную гримасу.</p><p class="p1">– Ах, что это она мне опять посылает? – сказала она. – Бумаги! Какая надоедливая женщина!</p><p class="p1">И, отложив в сторону пергамент, она развернула записку.</p><p class="p1">– Ее почерк. Почерк моей сестры. Как мне это наскучило! Гуинплен, я уже спрашивала тебя: умеешь ты читать? Умеешь?</p><p class="p1">Гуинплен утвердительно кивнул головой.</p><p class="p1">Она растянулась на кушетке, со странной стыдливостью спрятала ноги под халат, опустила широкие рукава, оставив, однако, открытой грудь, и, обжигая Гуинплена страстным взглядом, протянула ему листок веленевой бумаги.</p><p class="p1">– Ну вот, Гуинплен, ты – мой теперь. Начни же свою службу. Мой возлюбленный, прочти, что пишет мне королева.</p><p class="p1">Гуинплен взял письмо, развернул и стал читать голосом, дрожащим от самых разнообразных чувств:</p><p class="empty-line"/><p class="p1">«Герцогиня!</p><p class="p1">Всемилостивейше посылаем вам прилагаемую при сем копию протокола, заверенную и подписанную нашим слугою Вильямом Коупером, лорд-канцлером королевства Англии, из какового протокола выясняется весьма примечательное обстоятельство, а именно, что законный сын лорда Кленчарли, известный до сих пор под именем Гуинплена и ведший низкий, бродячий образ жизни в среде странствующих фигляров и скоморохов, ныне разыскан, и личность его установлена. Всех принадлежащих ему прав состояния он лишился в самом раннем возрасте. Согласно законам королевства и в силу своих наследственных прав, лорд Фермен Кленчарли, сын лорда Линнея, будет сегодня же восстановлен в своем звании и введен в палату лордов. А посему, желая выразить вам нашу благосклонность и сохранить за вами право владения переданными вам поместьями и земельными угодьями лордов Кленчарли-Генкервиллей, мы предназначаем его вам в женихи взамен лорда Дэвида Дерри-Мойр. Мы распорядились доставить лорда Фермена в вашу резиденцию Корлеоне-Лодж; мы приказываем и, как сестра и королева, изъявляем желание, чтобы лорд Фермен Кленчарли, до сего времени носивший имя Гуинплена, вступил с вами в брак и стал вашим мужем. Такова наша королевская воля».</p><p class="empty-line"/><p class="p1">Пока Гуинплен читал – голосом, изменявшимся почти при каждом слове, – герцогиня, приподнявшись с подушки, слушала, не сводя с него глаз. Когда он кончил, она вырвала у него из рук письмо.</p><p class="p1">– «Анна, королева», – задумчиво произнесла она, взглянув на подпись.</p><p class="p1">Подобрав с полу пергамент, она быстро пробежала его. Это была засвидетельствованная саутворкским шерифом и лорд-канцлером копия признаний компрачикосов, погибших на «Матутине».</p><p class="p1">Она еще раз перечла письмо королевы. Затем сна сказала:</p><p class="p1">– Хорошо.</p><p class="p1">И совершенно спокойно, указывая Гуинплену на портьеру, отделявшую их от галереи, она проговорила:</p><p class="p1">– Выйдите отсюда.</p><p class="p1">Окаменевший Гуинплен не трогался с места.</p><p class="p1">Ледяным тоном она повторила:</p><p class="p1">– Раз вы мой муж – уходите.</p><p class="p1">Гуинплен, опустив глаза, словно виноватый, не вымолвил ни слова и не пошевельнулся.</p><p class="p1">Она прибавила:</p><p class="p1">– Вы не имеете права оставаться здесь. Это место моего любовника.</p><p class="p1">Гуинплен сидел как пригвожденный.</p><p class="p1">– Хорошо, – сказала она, – в таком случае уйду я. Так вы мой муж? Превосходно! Я ненавижу вас.</p><p class="p1">Она встала и, сделав в пространство высокомерный прощальный жест, вышла из комнаты.</p><p class="p1">Портьера галереи опустилась за ней.</p></span><span id="id175"><div class="title6">
<p class="p">5. Узнают друг друга, оставаясь неузнанными</p>
</div><p class="p1">Гуинплен остался один.</p><p class="p1">Один перед теплой ванной и неубранной постелью.</p><p class="p1">В голове его царил полный хаос. То, что возникало в его сознании, даже не было похоже на мысли. Это было нечто расплывчатое, бессвязное, непонятное и мучительное. Перед его взором проносились рой за роем леденящие душу образы.</p><p class="p1">Вступление в неведомый мир дается не так-то легко.</p><p class="p1">Начиная с письма герцогини, принесенного грумом, на Гуинплена одно за другим обрушилось столько неожиданных событий, час от часу непостижимее. До этой минуты он словно спал, но все видел ясно. Теперь, так и не придя в себя, он вынужден был брести ощупью.</p><p class="p1">Он не размышлял. Он даже не думал. Он просто подчинялся течению событий.</p><p class="p1">Он продолжал сидеть на кушетке, на том самом месте, где его оставила герцогиня.</p><p class="p1">Вдруг в глубокой тишине раздались чьи-то шаги. Шаги мужчины. Они приближались со стороны, противоположной галерее, куда скрылась герцогиня. Они звучали глухо, но отчетливо. Как ни был поглощен Гуинплен всем происшедшим, он насторожился.</p><p class="p1">За откинутым герцогиней серебристым занавесом, позади кровати, в стене внезапно распахнулась замаскированная расписным зеркалом дверь, и веселый мужской голос огласил зеркальную комнату припевом старинной французской песенки:</p><div class="poem">
<div class="stanza">
<p class="v">Три поросенка, развалясь в грязи,</p>
<p class="v">Как старые носильщики ругались.</p>
</div>
</div><p class="p1">Вошел мужчина в расшитом золотом морском мундире.</p><p class="p1">Он был при шпаге и держал в руке украшенную перьями шляпу с кокардой.</p><p class="p1">Гуинплен вскочил, словно его подбросило пружиной.</p><p class="p1">Он узнал вошедшего, и тот, узнал его.</p><p class="p1">Из их уст одновременно вырвался крик:</p><p class="p1">– Гуинплен!</p><p class="p1">– Том-Джим-Джек!</p><p class="p1">Человек со шляпой, украшенной перьями, подошел к Гуинплену, который скрестил руки на груди.</p><p class="p1">– Как ты здесь очутился, Гуинплен?</p><p class="p1">– А ты как попал сюда, Том-Джим-Джек?</p><p class="p1">– Ах, я понимаю! Каприз Джозианы. Фигляр, да еще урод впридачу. Слишком соблазнительное для нее существо, она не могла устоять. Ты переоделся, чтобы прийти сюда, Гуинплен?</p><p class="p1">– И ты тоже, Том-Джим-Джек?</p><p class="p1">– Гуинплен, что означает это платье вельможи?</p><p class="p1">– А что означает этот офицерский мундир, Том-Джим-Джек?</p><p class="p1">– Я не отвечаю на вопросы, Гуинплен.</p><p class="p1">– Я тоже, Том-Джим-Джек.</p><p class="p1">– Гуинплен, мое имя не Том-Джим-Джек.</p><p class="p1">– Том-Джим-Джек, мое имя не Гуинплен.</p><p class="p1">– Гуинплен, я здесь у себя дома.</p><p class="p1">– Том-Джим-Джек, я здесь у себя дома.</p><p class="p1">– Я запрещаю тебе повторять мои слова. Ты не лишен иронии, но у меня есть трость. Довольно передразнивать меня, жалкий шут!</p><p class="p1">Гуинплен побледнел.</p><p class="p1">– Сам ты шут! Ты ответишь мне за это оскорбление.</p><p class="p1">– В твоем балагане, на кулаках, – сколько угодно.</p><p class="p1">– Нет, здесь, и на шпагах.</p><p class="p1">– Шпага, мой любезный, – оружие джентльменов. Я дерусь только с равными. Одно дело рукопашная, тут мы равны, шпага же – дело совсем другое. В Тедкастерской гостинице Том-Джим-Джек может боксировать с Гуинпленом. В Виндзоре же об этом не может быть и речи. Знай: я – контр-адмирал.</p><p class="p1">– А я – пэр Англии.</p><p class="p1">Человек, которого Гуинплен до сих пор считал Том-Джим-Джеком, громко расхохотался.</p><p class="p1">– Почему же не король? Впрочем, ты прав. Скоморох может исполнять любую роль. Скажи уж прямо, что ты Тезей, сын афинского царя.</p><p class="p1">– Я пэр Англии, и мы будем драться.</p><p class="p1">– Гуинплен, мне это надоело. Не шути с тем, кто может приказать высечь тебя. Я – лорд Дэвид Дерри-Мойр.</p><p class="p1">– А я – лорд Кленчарли.</p><p class="p1">Лорд Дэвид вторично расхохотался.</p><p class="p1">– Ловко придумано! Гуинплен – лорд Кленчарли! Это как раз то имя, которое необходимо, чтобы обладать Джозианой. Так и быть, я тебе прощаю. А знаешь почему? Потому что мы оба ее возлюбленные.</p><p class="p1">Портьера, отделявшая их от галереи, раздвинулась, и чей-то голос произнес:</p><p class="p1">– Вы оба, милорды, ее мужья.</p><p class="p1">Оба обернулись.</p><p class="p1">– Баркильфедро! – воскликнул лорд Дэвид.</p><p class="p1">Это был действительно Баркильфедро.</p><p class="p1">Улыбаясь, он низко кланялся обоим лордам.</p><p class="p1">В нескольких шагах позади него стоял дворянин с почтительным, строгим выражением лица; в руках у незнакомца был черный жезл.</p><p class="p1">Незнакомец подошел к Гуинплену, трижды отвесил ему низкий поклон и сказал:</p><p class="p1">– Милорд, я пристав черного жезла. Я явился за вашей светлостью по приказанию Ее Величества.</p></span></span></span></span>
