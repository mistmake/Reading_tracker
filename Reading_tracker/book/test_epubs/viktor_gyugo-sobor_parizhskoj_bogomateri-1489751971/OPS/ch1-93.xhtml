<span><span><span><span id="id150"><div class="title6">
<p class="p">1. Искушение святого Гуинплена</p>
</div><p class="p1">Иной огонь едва прорезывает окружающую темноту, иной же может воспламенить вулкан.</p><p class="p1">Бывают искры, которые могут вызвать пожар.</p><p class="p1">Гуинплен прочел письмо, затем перечитал его. Он ясно видел эти слова: «Я люблю тебя».</p><p class="p1">Страшные мысли одна за другой проносились в его мозгу.</p><p class="p1">Первой была мысль о том, что он сошел с ума. Он помешался. В этом нет сомнения. Он видит то, чего на самом деле не существует. Призраки ночи сделали его, несчастного, своей игрушкой. Красный человечек только померещился ему. Иногда ночью болотный пар, уплотнившись, становится блуждающим огоньком и дразнит вас. Так и теперь: поиздевавшись, обманчивое видение исчезло, оставив позади себя обезумевшего Гуинплена. Чего только не померещится в темноте!</p><p class="p1">Вторая мысль была еще страшней: он понял, что находится в полном рассудке.</p><p class="p1">Привидение? Какой вздор! А это письмо? Оно у него в руках. Вот и конверт, печать, бумага, исписанная чьим-то почерком. Он знает, от кого это письмо. Ничего загадочного в этом приключении нет. Взяли перо, чернила, написали письмо. Зажгли свечу, запечатали конверт сургучом. Разве на конверте не стоит его имя: «Гуинплену»? Бумага надушена, Все ясно. И человечка он знает. Этот карлик – ее грум. Блуждающий огонек – ливрея. Грум назначил Гуинплену свидание на завтра, в этот же час, у въезда на Лондонский мост. Разве и Лондонский мост обман чувств? Нет, нет, все это вполне вяжется одно с другим. Это ничуть не похоже на бред. Это – действительность. Гуинплен находится в здравом уме. Это не мираж, постепенно рассеивающийся в воздухе и исчезающий бесследно, это нечто вполне реальное. Гуинплен не сумасшедший; ему это вовсе не снится. И он снова и снова перечитывал письмо.</p><p class="p1">Ну да, конечно. Но что же это? Ведь тогда… Но ведь это непостижимо.</p><p class="p1">Женщина желает его! Если так, пускай отныне никто не произносит слова: «невероятно». Женщина желает его! Женщина, которая видела его лицо! А между тем она не слепая. Кто же она, эта женщина? Урод? Нет, красавица. Цыганка? Нет, герцогиня.</p><p class="p1">Что же под этим кроется и что же это значит? Как опасно такое торжество! И все же – как не устремиться очертя голову ему навстречу?</p><p class="p1">Как? Это та женщина, сирена, видение, леди, сияющий мрачным блеском призрак, зрительница в ложе! Да, это она, конечно она.</p><p class="p1">В груди Гуинплена запылал пожар. Это она – та странная незнакомка! Та самая, что смутила его покой! Волнующие мысли, словно распаленные этим темным огнем, снова овладели Гуинпленом, мысли, впервые возникшие в нем при виде этой женщины. Забвение не что иное, как палимпсест. Случайность – и все, казалось уже стертое навеки, вдруг снова оживает между строками в изумленной памяти. Гуинплену казалось, что он изгнал этот образ из сердца, и вот он опять перед ним: он в нем запечатлелся, оставил, вопреки его воле, неизгладимый след в мозгу Гуинплена, обуреваемого мечтами. Без его ведома эти черты глубоко врезались ему в душу. Теперь зло было уже непоправимо, и он с увлечением снова отдался во власть неодолимым грезам.</p><p class="p1">Как! Он – предмет вожделения? Как! Принцесса сходит со ступенек трона, кумир спускается с алтаря, изваяние – со своего пьедестала, призрак – с облаков? Как! Из недр невозможного возникла химера? Как! Эта нимфа с плафона, это воплощение лучезарности, эта нереида, вся переливающаяся блеском драгоценных камней, эта недосягаемо-величественная красавица со своей ослепительной высоты склоняется к Гуинплену? Как! Остановив над его головой свою, запряженную горлицами и драконами, колесницу Авроры, она говорит ему: «Приди!» Как! Ему, Гуинплену, выпал ужасный и славный жребий – унизить, низведя на землю, эмпирей? Эта женщина, если можно назвать женщиной обитательницу иной, более совершенной планеты, эта женщина предлагает себя Гуинплену, отдается ему! Непостижимо! Богиня Олимпа – гетера, призывающая на ложе любви! И кого? Его, Гуинплена! Окруженные ореолом, ему раскрывались объятия блудницы, чтобы прижать его к груди богини. И это ничуть не позорит ее. К этим высшим существам не пристает никакая грязь. Свет омывает богов. И богиня, спускающаяся к нему, знает, что она делает. Ей известно чудовищное уродство Гуинплена. Она видела маску, заменявшую ему лицо! И эта маска не отталкивает ее! Гуинплен любим, несмотря на свое безобразие!</p><p class="p1">Это превосходило самые дерзкие мечты: он любим за свое безобразие! Маска не отвращает богиню – напротив, привлекает ее. Гуинплен не только любим – он вызывает страсть. Она не только снизошла к нему – она его избрала. Он – ее избранник!</p><p class="p1">Как! В царственной среде, окружавшей эту женщину, в среде блестящих, беспечных и могущественные людей, были принцы – она могла избрать принца; там были лорды – она могла выбрать лорда; были красивые, обворожительные, великолепные мужчины – она могла выбрать Адониса. И кем она соблазнилась? Гнафроном! Там, где одни метеоры и молнии, она могла выбрать себе шестикрылого серафима, а остановила свой выбор на жалкой личинке, пресмыкающейся в тине. С одной стороны – сплошь высочества и сиятельства, величие, роскошь, слава, с другой – скоморох. И скоморох одержал верх над всеми! Какие же весы были в сердце этой женщины? Чем взвешивала она свою любовь? Эта женщина сняла с себя диадему герцогини и швырнула ее на подмостки клоуна. Эта женщина сняла со своего чела ореол богини Олимпа и увенчала им щетинистую голову гнома. Этот вверх дном перевернувшийся мир, где насекомые оказались в заоблачных сферах, а созвездия – внизу, засасывал Гуинплена, растерявшегося от нахлынувших на него потоков света, окруженного сиянием среди клоаки. Всемогущая, возмутившись против красоты и роскоши, отдавала себя осужденному на вечный мрак, предпочитала Гуинплена Антиною: охваченная любопытством при виде тьмы, она спускалась в нее, и это отречение богини возводило ничтожное существо в царское достоинство, чудесным образом венчало его на царство. «Ты безобразен. Я люблю тебя». Эти слова льстили гордости Гуинплена с худшей ее стороны. Гордость – ахиллесова пята всех героев. Гуинплен познал тщеславие урода. Его полюбили именно за его безобразие. Он в такой же мере, как Юпитер и Аполлон, а быть может и больше, чем они, был исключением. Он сознавал себя существом сверхчеловеческим и благодаря еще невиданному уродству – равным божеству. Ужасное ослепление.</p><p class="p1">Но что же это за женщина? Что он знал о ней? Все и ничего. Она – герцогиня, он это знал. Он знал, что она красива, богата, что у нее есть ливрейные лакеи, пажи, скороходы с факелами, сопровождающие украшенную короной карету. Он знал, что она влюблена в него, по крайней мере она ему об этом писала. Остального он не знал. Он знал ее титул, но не знал ее имени. Он знал ее мысли, но не знал ее жизни. Кто она: замужняя женщина, вдова или девушка? Свободна ли она или связана какими-нибудь узами долга? К какой семье она принадлежит? Не грозят ли ей западни, ловушки, тайные происки? Гуинплен и не подозревал, какая распущенность царит в высших, совершенно праздных слоях общества, он не думал, что на этих вершинах есть вертепы, где жестокие волшебницы предаются грезам среди жалких остатков былых любовных увлечений, не догадывался, на какие ужасные по своему цинизму опыты толкает скука женщину, полагающую, что она выше мужчины; он не имел ни малейшего представления об этом, ибо общественные низы плохо осведомлены о том, что происходит в высших сферах. Тем не менее он предчувствовал что-то дурное. Он отдавал себе отчет в мрачной природе этого блеска. Понимал ли он? Нет. Догадывался ли? Еще меньше! Что скрывалось за этим письмом? Распахнутая настежь дверь и в то же время какая-то внушающая тревогу преграда. С одной стороны – признание. С другой – загадка.</p><p class="p1">Признание и загадка – два голоса; привлекая и угрожая, они произносят одно и то же слово: «Дерзай».</p><p class="p1">Никогда еще коварный случай не действовал более умело, никогда еще искушение не приходило так кстати. Гуинплен, волнуемый весенним пробуждением природы, наливавшейся буйными соками, находился во власти чувственных мечтаний. Неистребимый, древний как мир инстинкт, которого никому из нас еще не удалось победить, просыпался в этом юноше, сохранившем до двадцати четырех лет всю целомудренную чистоту отрока. Именно в такое мгновение, в самую тягостную минуту кризиса, он получил любовное признание, и ему предстала ослепительная в своей наготе грудь сфинкса. Молодость – это наклонная плоскость. Гуинплен скользил по ней, кто-то толкал его. Кто? Весна. Кто? Ночь. Кто? Эта женщина. Не будь апреля, люди были бы гораздо добродетельнее. Кустарники в цвету – шайка сообщников; любовь – воровка; весна – укрывательница.</p><p class="p1">Гуинплен был в смятении.</p><p class="p1">Дурному поступку предшествует нечто вроде испарений зла, от которых задыхается совесть. Искушаемую честность мутит от зловония преисподней. Пары, вырывающиеся оттуда, служат предупреждением для сильных и дурманом для слабых. Гуинплен испытывал это таинственное недомогание.</p><p class="p1">Перед ним, быстро сменяя друг друга, возникали неотвязные вопросы. Упорно соблазнявший его проступок принимал определенные очертания. Завтра в полночь, Лондонский мост, паж. Пойти? «Да!» – кричала плоть. «Нет!» – кричала душа.</p><p class="p1">Однако, как это ни странно на первый взгляд, надо сказать, что Гуинплен ни разу отчетливо не поставил перед собою вопроса: пойти ли ему? Соблазны влекут к себе украдкой, таясь от совести. Они напоминают чересчур крепкую водку, которую нельзя выпить одним духом. Рюмку отодвигают – подождем немного, уже и от первого глотка кружится голова.</p><p class="p1">Одно было несомненно: он чувствовал, как что-то толкает его навстречу неведомому.</p><p class="p1">Он весь трепетал. Он видел, что стоит на краю пропасти. Он отступал назад, чуя со всех сторон угрозу. Он закрывал глаза. Он всячески старался уверить себя, что ничего не случилось, старался снова внушить себе, что потерял рассудок. Конечно, это было бы самым лучшим выходом из положения. Самое благоразумное – это считать себя сумасшедшим.</p><p class="p1">Роковая болезнь! Каждый, кто хоть раз был жертвой неожиданного, пережил минуты такой мрачной тревоги. Человек, сознательно относящийся к тому, что с ним происходит, всегда с ужасом прислушивается к глухим ударам тарана, которые судьба вдруг обрушивает на его совесть.</p><p class="p1">Увы, Гуинплен колебался! Но там, где нет никаких сомнений, в чем состоит наш долг, колебаться – значит потерпеть поражение.</p><p class="p1">Впрочем – и это следует отметить, – беззастенчивая откровенность письма, которая, вероятно, смутила бы человека испорченного, совершенно ускользнула от Гуинплена. Он не знал, что такое цинизм. Мысль о разврате в тех формах, о которых говорилось выше, не приходила ему в голову. Он даже не был в состоянии этого понять. Он был слишком чист, чтобы столь сложным способом объяснить себе происшедшее. В этой женщине он видел только величие. Увы, он был польщен! Тщеславие заставило его обратить внимание только на победу. Для того же, чтобы заметить, что он оказался не столько предметом любви, сколько предметом бесстыдного любопытства, ему надо было обладать тем опытом, который отнюдь не свойствен невинности. Рядом со словами «Я люблю тебя» он не заметил ужасной приписки: «Я хочу тебя». Животная сущность богини ускользала от него.</p><p class="p1">Рассудок порою подвергается нашествию. У души есть свои вандалы – дурные мысли, совершающие опустошительные набеги на нашу добродетель. Тысяча самых противоположных мыслей одна за другой овладевали Гуинпленом, иногда они обрушивались на него все сразу. Затем все в нем успокаивалось. Тогда он сжимал голову руками, мрачно прислушиваясь к тому, что происходило в нем, точно созерцая ночной пейзаж.</p><p class="p1">Вдруг он заметил, что уже ни о чем не думает. Размышляя, он постепенно дошел до того черного провала, в котором все исчезает. Он вспомнил, что давно пора вернуться домой. Было около двух часов ночи.</p><p class="p1">Он положил письмо, доставленное пажом, в боковой карман, но, сообразив, что так оно будет лежать прямо у сердца, вынул послание обратно, небрежно смяв, сунул его как попало в карман штанов и направился к гостинице. Он бесшумно вошел, не разбудив Говикема, который, ожидая его, заснул у стола, подложив руки под голову; запер дверь, зажег свечу о фонарь харчевни, задвинул засовы, повернул ключ в замке, машинально принимая все предосторожности человека, поздно возвращающегося домой, затем поднялся по лесенке «Зеленого ящика», прокрался в старый возок, служивший ему теперь спальней, посмотрел на спящего Урсуса, задул свечу, но не лег.</p><p class="p1">Так прошел целый час. Наконец, усталый, воображая, что постель и сон одно и то же, он, не раздеваясь, положил голову на подушку и, уступая темноте, закрыл глаза; но буря чувств, волновавших его, не унималась ни на минуту. Бессонница – это насилие ночи над человеком. Гуинплен очень страдал. В первый раз за всю свою жизнь он был недоволен собой. К его удовлетворенному тщеславию примешивалась тайная боль. Что делать? Наступило утро. Он так и не нашел покоя. Он слышал, как поднялся Урсус, но глаз не открывал. Он думал. Слова письма снова возникали перед ним в хаотическом беспорядке. При сильном душевном смятении наша мысль становится похожей на волну. Она бурлит, куда-то рвется, порождая звуки, напоминающие глухой рокот моря. Прилив, отлив, толчки, водовороты, временами задержка у подножия утеса, град и дождь, тучи, в просветы которых прорывается луч, жалкие брызги никому не нужной пены, безумные взлеты, за которыми следует немедленное падение, огромные, попусту затраченные усилия, угроза кораблекрушения, со всех сторон мрак и гибель – все, что мы видим в морской пучине, можно наблюдать и в душе человека. Такую бурю переживал Гуинплен.</p><p class="p1">И вот, когда терзания его достигли высшего предела, Гуинплен, все еще лежавший с закрытыми глазами, услыхал близ себя сладостный голос:</p><p class="p1">– Ты спишь, Гуинплен?</p><p class="p1">Он сразу открыл глаза и присел на постели; дверь его каморки была приотворена, и на пороге стояла Дея. Ее глаза и губы улыбались неизъяснимо прелестной улыбкой. Она возникла очаровательным видением, окруженная лучезарным ореолом, о котором сама и не догадывалась. Это было божественное мгновение. Гуинплен пристально всматривался в нее и, ослепленный ею, затрепетал и очнулся. Очнулся от чего? От сна? Нет, от бессонницы. Это была она, это была Дея! И вдруг он почувствовал в глубине своего существа не выразимое никакими словами внезапное успокоение бури и дивное торжество добра над злом; взгляд, устремленный на него с неба, совершил чудо; кроткая носительница света, слепая одним только своим присутствием рассеяла мрак, царивший в его душе; туманная завеса, застилавшая его духовный взор, упала, точно сорванная невидимой рукой, и – о, священный восторг! – Гуинплен почувствовал, как возвращаются к нему утраченные ясность и спокойствие. Благодаря этому ангелу он снова стал сильным, добрым, невинным Гуинпленом. В человеческой душе, как и во всем мироздании, бывают такие таинственные столкновения противоположностей. Оба молчали: она – свет, он – бездна; она – благая тишина, он – умиротворение; и над бурным сердцем Гуинплена, словно звезда морей, неизъяснимым блеском сияла Дея.</p></span></span></span></span>
