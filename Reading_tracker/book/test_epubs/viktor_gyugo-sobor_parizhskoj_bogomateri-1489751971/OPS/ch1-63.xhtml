<p class="p">15. Portentosum mare – Море ужаса</p>
</div><p class="p1">Между тем густой туман со всех сторон окутал несчастных, носившихся по прихоти волн. Они не знали, где они. Они едва различали, что происходит на расстоянии нескольких кабельтовых от урки. Несмотря на крупный град, заставлявший всех наклонять головы, даже женщины упорно отказывались спуститься в каюту. Всякий, кто терпит бедствие на море, предпочитает погибнуть под открытым небом. Когда смерть так близка, потолок над головой начинает казаться крышкой гроба.</p><p class="p1">Волны, вздымаясь все выше и выше, вместе с тем становились короче. Нагромождение валов свидетельствует о том, что им приходится прорываться сквозь теснины: такое бурление волн всегда указывает на близость узкого пролива. Действительно, беглецы, сами не догадываясь о том, огибали Ориньи. Между Ортахом и Каскетами на западе и Ориньи на востоке море сжато двойным рядом утесов. И там, где ему тесно, оно бурлит. Море, как и все на свете, не избавлено от страданий, и в тех местах, где оно испытывает боль, оно особенно яростно. Такой фарватер опасен для судов.</p><p class="p1">«Матутина» вступила в этот узкий проход.</p><p class="p1">Представьте себе под водою щит черепахи величиною с Гайд-Парк или с Елисейские Поля, на котором каждая бороздка была бы мелким протоком, а каждая выпуклость – скалой. Таковы подступы к Ориньи с запада. Море прикрывает и прячет эту западню для кораблей. Дробясь об острые грани подводных камней, волны скачут и пенятся. В тихую погоду это лишь плеск, но в бурю это хаос.</p><p class="p1">Люди на судне почуяли какую-то новую опасность, хотя не сразу могли ее себе объяснить. Вдруг они все поняли. Небо в зените немного посветлело, на море пал бледный тусклый свет, и с левого борта на востоке показалась длинная гряда утесов, на которую гнал урку вновь усилившийся ветер. Эта гряда была Ориньи.</p><p class="p1">Что представляла собою эта преграда? Они задрожали от ужаса. Они ужаснулись бы гораздо больше, если бы кто-нибудь сказал им, что это Ориньи.</p><p class="p1">Нет острова более недоступного для человека, чем Ориньи. И над водой и под водой его охраняет свирепая стража, передовым постом которой является Ортах.</p><p class="p1">На западе – Бюру, Сотерьо, Анфрок, Ниангль, Фон-дю-Крок, Жюмель, Гросс, Кланк, Эгийон, Врак, Фосс-Мальер; на востоке – Сокс, Омо, Флоро, Бринбете, Келенг, Кроклиу, Фурш, Со, Нуар-Пют, Купи, Орбю. Что это за чудовища? Гидры? Да, из породы рифов.</p><p class="p1">Один из этих утесов называется Бю (цель), словно в знак того, что здесь конец всякому странствованию.</p><p class="p1">Это нагромождение рифов, слитых воедино мраком и водою, предстало взорам погибающих в виде сплошной черной полосы, как бы перечеркнувшей собою горизонт.</p><p class="p1">Кораблекрушение – высшая степень беспомощности. Находиться близ земли и не быть в состоянии достигнуть ее; носиться по волнам и не иметь возможности выбрать направление; опираться на нечто кажущееся твердым, но на самом деле зыбкое и хрупкое, быть одновременно полным жизни и полным смерти; быть узником неизмеримых пространств, заточенным между небом и океаном; ощущать над собою бесконечность сводами темницы; быть окруженным со всех сторон буйным разгулом ветров и быть схваченным, связанным и парализованным – такое состояние подавляет и рождает возмущение. Кажется, слышишь издевательский хохот незримого противника. Тебя сковывает именно то, что помогает птицам расправить крылья, а рыбам свободно двигаться. На первый взгляд это ничто, а между тем это все. Зависишь от того самого воздуха, который колеблешь своим дыханием, от той самой воды, которую можешь зачерпнуть в ладонь. Набери полный стакан этой бурной влаги и выпей ее, и ты ощутишь только горечь во рту. Глоток ее вызывает лишь тошноту, волна же может погубить. Песчинка в пустыне, клочок пены в океане – потрясающие феномены; всемогущая природа не считает нужным скрывать свои атомы; она превращает слабость в силу, наполняет собою ничтожное и из бесконечно малого образует бесконечно великое, уничтожающее человека. Океан сокрушает нас своими каплями. Чувствуешь себя его игрушкой.</p><p class="p1">Игрушкой – какое страшное слово!</p><p class="p1">«Матутина» находилась чуть-чуть повыше Ориньи, и это было благоприятным обстоятельством, но ее относило к северной оконечности гряды, а это угрожало роковой развязкой. Северо-западный ветер гнал урку со стремительностью стрелы, выпущенной из туго натянутого лука. У этого мыса, немного не доходя до гавани Корбеле, есть место, которое моряки Нормандского архипелага прозвали «обезьяной».</p><p class="p1">«Обезьяна» – swinge – это бешеное течение. Ряд воронкообразных углублений в отмелях вызывает на поверхности океана ряд водоворотов. Только вы выбрались из одного, как вас подхватывает другой. Судно, попав в лапы «обезьяны», вертится, перебрасываемое от спирали к спирали, пока не напорется кузовом на острый утес. Получив пробоину, корабль останавливается, вздернув корму выше волн, носом погрузившись в воду, водоворот кружит его в последний раз, корма скрывается под водой, и пучина засасывает судно. Островок пены расширяется, тает, и вскоре на поверхности моря остается лишь несколько пузырьков, свидетельствующих о том, что люди задохнулись под водой.</p><p class="p1">Самые опасные водовороты Ла-Манша находятся в трех местах: один по соседству с пресловутой песчаной мелью Гердлер-Сендс, другой возле Джерси, между Пиньонэ и мысом Нуармон, и третий близ Ориньи.</p><p class="p1">Если бы на борту «Матутины» находился местный лоцман, он предупредил бы об этой новой опасности. За отсутствием лоцмана несчастным приходилось руководствоваться инстинктом: в критические минуты у человека появляется нечто вроде второго зрения. Яростный ветер вздымал на воздух целые каскады пены и разносил их вдоль всего побережья. Это плевалась «обезьяна». Множество судов погибло в этой ловушке. Беглецы с ужасом приближались к этому месту, хотя и не знали, что оно собой представляет.</p><p class="p1">Как обогнуть грозный мыс? Это невозможно.</p><p class="p1">Так же, как перед ними ранее выросли, Каскеты, а затем Ортах, теперь им предстали высокие скалы Ориньи. Один великан вслед за другим. Ряд ужасных поединков.</p><p class="p1">Сцилла и Харибда – их было только две; Каскеты, Ортах и Ориньи – это три противника.</p><p class="p1">Та же картина постепенного исчезновения горизонта за скалами повторялась с величавым однообразием, на какое способна только бездна. В битвах с океаном, так же как в гомеровских битвах, встречаются повторения.</p><p class="p1">С каждой волной, приближавшей их к мысу, громада его, и без того чудовищно разросшаяся в тумане, становилась выше на двадцать локтей. Расстояние между уркой и утесом сокращалось с угрожающей быстротой. Они уже находились на самой грани водоворота. Первая же струя должна была увлечь их безвозвратно. Еще одна волна, и все было бы кончено.</p><p class="p1">Вдруг урка отпрянула назад, словно под ударом чудовищного кулака. Волна вздыбилась под килем судна, затем опрокинулась и отшвырнула урку, обдав ее облаком пены. Этим толчком «Матутину» отбросило от Ориньи.</p><p class="p1">Она снова очутилась в открытом море.</p><p class="p1">Кто же пришел на помощь урке? – Ветер.</p><p class="p1">Шторм внезапно изменил направление.</p><p class="p1">До сих пор беглецы были игралищем волн, теперь они стали игралищем ветра. Из Каскетов они выбрались сами. От Ортаха их спасла волна. От Ориньи их отогнал ветер.</p><p class="p1">Северо-западный ветер сразу сменился юго-западным.</p><p class="p1">Течение – это ветер в воде; ветер – это течение в воздухе: две силы столкнулись, и ветру вздумалось вырвать у течения его добычу.</p><p class="p1">Внезапные причуды океана непостижимы: это бесконечное «а вдруг». Когда всецело находишься в его полной власти, нельзя ни надеяться, ни отчаиваться. Он создает и вновь разрушает. Океан забавляется. Этому необъятному угрюмому морю, которое Жан Барт называл «грубой скотиной», свойственны все черты хищника. Оно то выпускает острые когти, то прячет их в бархатных лапах. Иногда буря топит судно походя, на скорую руку, иногда как бы тщательно обдумывает кораблекрушение, можно оказать – лелеет каждую мелочь. У моря времени достаточно. В этом уже не раз убеждались его жертвы!</p><p class="p1">Порою, кстати сказать, отсрочка казни знаменует собою предстоящее помилование. Но такие случаи редки. Как бы то ни было, погибающим на море недолго поверить в свое спасение: стоит только буре немного утихнуть, и им уже мнится, что опасность миновала. После того как они считали себя погребенными на дне морском, они с лихорадочной поспешностью хватаются за то, что им еще не даровано: все дурное уже пережито, никаких сомнений, они вполне удовлетворены, они спасены, им уже ничего не нужно от Бога. Не следует слишком торопиться с выдачей Неведомому расписок в окончательном расчете с ним.</p><p class="p1">Юго-западный ветер начался вихрем. Тот, кто оказывает помощь терпящим кораблекрушение, обычно не церемонится. Шквал, ухватив «Матутину» за обрывки парусов, как хватают за волосы утопленницу, стремительно поволок ее в открытое море. Это напоминало великодушие Тиберия, даровавшего свободу пленницам ценой их бесчестья. Ветер беспощадно обрушивался на тех, кого спасал. Он оказывал им эту услугу с бешеной злобой. Это была помощь, не знавшая жалости…</p><p class="p1">После столь жестокого спасения урка окончательно стала обломком.</p><p class="p1">Крупные градины, величиною с мушкетную пулю и не уступавшие ей в твердости, казалось, готовы были изрешетить судно. При каждом крене градины перекатывались по палубе, как свинцовые шарики дроби. Урка, терзаемая сверху и снизу водной стихией, чуть виднелась из-под перехлестывавших через нее волн и каскадов пены. На судне каждый думал только о себе.</p><p class="p1">Люди хватались за что попало. После каждой очередной встряски они с удивлением оглядывались, видя, что никого не унесло в море. У многих лица были исцарапаны разлетавшимися во все стороны щепками.</p><p class="p1">К счастью, отчаяние во много крат увеличивает силы человека. Рука объятого ужасом ребенка не слабее руки великана. В минуты смертельного страха пальцы женщин превращаются в настоящие тиски; молодая девушка способна тогда вонзить свои розовые ноготки даже в камень. Погибающие изо всех сил старались удержаться на месте. Но каждая волна грозила смыть их с палубы.</p><p class="p1">Вдруг они снова вздохнули с облегчением.</p></span><span id="id102"><div class="title6">
<p class="p">16. Загадочное затишье</p>
</div><p class="p1">Ураган внезапно утих.</p><p class="p1">Ни северного, ни южного ветра уже не было в помине. Смолк бешеный вой бури. Без всякого перехода, без малейшего ослабления смерч в одно мгновение куда-то исчез, точно провалился в бездну. И не сообразить было, куда он девался. Вместо градин в воздухе опять замелькали белые хлопья. Снова начал медленно падать снег.</p><p class="p1">Волнение улеглось. Море стало гладким, как скатерть.</p><p class="p1">Снежным бурям свойственно такое внезапное затишье. Как только прекращается электрический ток, все успокаивается, даже волны, которые после обыкновенных бурь некоторое время еще продолжают бушевать. Тут же наоборот – никаких следов недавней ярости. Как труженик после тяжкой работы, море сразу засыпает; это как будто идет вразрез с законами статики, но нисколько не удивляет старых моряков, знающих, что море полно всяких неожиданностей.</p><p class="p1">Подобные явления – правда, очень редко – имеют место и при обыкновенных бурях. Так, в наши дни во время памятного урагана, разразившегося 27 июля 1867 года над Джерси, ветер, неистовствовавший четырнадцать часов подряд, внезапно сменился мертвым штилем.</p><p class="p1">Несколько минут спустя вокруг урки простиралась бесконечная пелена сонных вод. Одновременно с этим – ибо последняя фаза бури похожа на первую – наступила полная темнота. Все, что удавалось разглядеть, пока снежные тучи еще клубились в небе, снова стало невидимым, бледные силуэты расплылись, растаяли, и беспредельный мрак опять со всех сторон окутал судно. Эта стена непроглядной ночи, это сплошное черное кольцо, эта внутренность полого цилиндра, ежеминутно сокращавшаяся, окружила «Матутину» и суживалась со зловещей медлительностью замерзающей полыньи. В зените – ни звезды, ни клочка неба: давящий, низко нависший потолок тумана. Урка очутилась как бы на дне глубокого колодца.</p><p class="p1">В этом колодце море казалось жидким свинцом. Вода застыла в суровой неподвижности. Никогда океан не бывает так угрюм, как в то время, когда он напоминает собою пруд.</p><p class="p1">Все было объято безмолвием, тишиной и глубоким мраком.</p><p class="p1">Тишина в природе бывает нередко грозным безмолвием.</p><p class="p1">Последние всплески улегшегося волнения изредка докатывались до бортов судна. Палуба, принявшая опять горизонтальное положение, лишь слегка накренялась то в одну, то в другую сторону. Кое-где еле заметно колыхались оборванные снасти. Висевшая вместо фонаря граната, в которой горела просмоленная пакля, уже не раскачивалась на бушприте, и с нее не стекали в море огненные капли. Ветерок, еще разгуливавший в облаках, не производил никакого шума. Густой рыхлый снег падал чуть-чуть косо. Уже не было слышно кипения волн у рифов. Могильная тишина.</p><p class="p1">После взрывов дикого отчаяния, пережитого несчастными, беспомощно носившимися по волнам, это внезапное затишье казалось невыразимым счастьем. Они решили, что настал конец их испытаниям. Все вокруг них и над ними как будто молча сговорилось спасти их. К ним опять вернулась надежда. Все, что за минуту перед тем было яростью, стало теперь спокойствием. Они сочли это верным признаком того, что мир заключен. Измученные люди вздохнули наконец полной грудью. Они могли теперь выпустить из рук обрывок каната или обломок доски, за которые до сих пор цеплялись, могли подняться, выпрямиться, стоять, ходить, двигаться. Неизъяснимое чувство покоя овладело ими. Во мраке бездны бывают иногда такие мгновения райского блаженства, служащие лишь подготовлением к чему-то иному. Было очевидно, что людям больше не угрожали ни шторм, ни пенящиеся валы, ни бешеные порывы ветра, – от всего этого они уже избавились.</p><p class="p1">Отныне все им благоприятствовало. Часа через три-четыре забрезжит заря, их заметит и подберет какое-нибудь встречное судно. Самое страшное осталось позади. Они возвращались к жизни. Самое важное достигнуто: им удалось продержаться на воде до прекращения бури. Они говорили себе: «Теперь уже конец».</p><p class="p1">Вдруг они убедились, что действительно пришел конец.</p><p class="p1">Один из матросов, уроженец Северной Бискайи, по имени Гальдеазун, спустился за канатом в трюм и, вернувшись, объявил:</p><p class="p1">– Трюм полон.</p><p class="p1">– Чего? – спросил главарь.</p><p class="p1">– Воды, – ответил матрос.</p><p class="p1">Главарь закричал:</p><p class="p1">– Что же это значит?</p><p class="p1">– Это значит, – ответил Гальдеазун, – что еще полчаса, и мы потонем.</p></span><span id="id103"><div class="title6">
<p class="p">17. Последнее средство</p>
</div><p class="p1">В днище оказалась пробоина. Судно дало течь. Когда это произошло? Никто не мог бы ответить на этот вопрос. Случилось ли это, когда их пригнало к Каскетам? Или когда они находились вблизи Ортаха? Или, может быть, когда их едва не затянуло в водоворот, к западу от Ориньи? Вероятнее всего, они вплотную подошли к «обезьяне», и там судно напоролось на острие подводного камня. Они не заметили толчка, так как их в это время швыряло ветром из стороны в сторону. В состоянии столбняка не чувствуешь уколов.</p><p class="p1">Другой матрос, уроженец Южной Бискайи, которого звали Аве-Мария, тоже спустился в трюм и, вернувшись, сообщил:</p><p class="p1">– Воды в трюме на два вара.</p><p class="p1">Это около шести футов.</p><p class="p1">Аве-Мария прибавил:</p><p class="p1">– Через сорок минут мы пойдем ко дну.</p><p class="p1">В каком именно месте днище дало течь? Пробоины не было видно, ее скрывала вода, наполнявшая трюм, она находилась под ватерлинией, где-то глубоко в подводной части урки. Отыскать ее было невозможно. Невозможно было ее и заделать. Где-то была рана, а перевязать ее было нельзя. Впрочем, вода прибывала не слишком быстро.</p><p class="p1">Главарь крикнул:</p><p class="p1">– Надо выкачивать воду!</p><p class="p1">Гальдеазун ответил:</p><p class="p1">– У нас больше нет насосов.</p><p class="p1">– Тогда, – воскликнул главарь, – надо плыть к берегу!</p><p class="p1">– А где он, берег?</p><p class="p1">– Не знаю.</p><p class="p1">– И я не знаю.</p><p class="p1">– Но где-нибудь да должен быть?</p><p class="p1">– Конечно.</p><p class="p1">– Пусть кто-нибудь ведет нас к берегу, – продолжал главарь.</p><p class="p1">– У нас нет лоцмана, – возразил Гальдеазун.</p><p class="p1">– Берись ты за румпель.</p><p class="p1">– У нас больше нет румпеля.</p><p class="p1">– Сделаем из первой попавшейся балки. Гвоздей! Молоток! Инструмент! Живо!</p><p class="p1">– Весь плотничный инструмент в воде, нет ничего.</p><p class="p1">– Все равно, будем как-нибудь править.</p><p class="p1">– Чем же править?</p><p class="p1">– Где шлюпка? В шлюпку! Будем грести!</p><p class="p1">– Нет шлюпки.</p><p class="p1">– Будем грести на урке.</p><p class="p1">– Нет весел.</p><p class="p1">– Тогда пойдем на парусах.</p><p class="p1">– У нас нет ни парусов, ни мачт.</p><p class="p1">– Сделаем мачту из лонг-карлинса, а парус из брезента. Выберемся отсюда, положимся на ветер.</p><p class="p1">– И ветра нет.</p><p class="p1">Действительно, ветер совсем улегся. Буря унеслась прочь, но затишье, которое они сочли своим спасением, было для них гибелью. Если бы юго-западный ветер продолжал дуть с прежней яростью, он пригнал бы их к какому-нибудь берегу раньше, чем трюм наполнился водою, или, быть может, выбросил бы их на песчаную отмель до того, как судно начало тонуть. Шторм помог бы им добраться до суши. Но не было ветра, не было и надежды. Они погибали, потому что ураган утих.</p><p class="p1">Положение становилось безвыходным.</p><p class="p1">Ветер, град, шквал, вихрь – необузданные противники, с которыми можно справиться. Над бурей удается одержать верх, ибо она недостаточно вооружена. С врагом, который беспрестанно сам разоблачает свои намерения, мечется без толку и зачастую допускает промахи, всегда можно найти средства борьбы. Но против штиля нет никакого орудия. Тут не за что ухватиться.</p><p class="p1">Ветры – это налет диких всадников; держитесь стойко, и ватага рассеется. Штиль – это клещи палача.</p><p class="p1">Вода, тяжелая и неодолимая, медленно, но безостановочно прибывала в трюме, и, по мере того как она поднималась, урка все глубже погружалась. Это совершалось очень медленно.</p><p class="p1">Находившиеся на «Матутине» чувствовали, как мало-помалу на них надвигается ужаснейшая гибель, гибель без борьбы. Ими овладела зловеще-спокойная уверенность в неизбежном торжестве слепой стихии. В воздухе не было ни малейшего дуновения, на воде – ни малейшей ряби. В неподвижности кроется что-то неумолимое. Пучина поглощала их в полном безмолвии. Сквозь слой немотствующей воды безгневно, бесстрастно, бесцельно, безотчетно и безучастно их притягивал к себе центр земного шара. Пучина засасывала их среди полного затишья. Уже не было ни разверстой пасти волн, ни злобно угрожавших челюстей шквала и моря, ни зева смерча, ни валов, вскипавших пеной в предвкушении добычи; теперь несчастные видели перед собой черное зияние бесконечности. Они чувствовали, что погружаются в спокойную глубину, которая была не что иное, как смерть. Расстояние от борта до воды постепенно уменьшалось – только и всего. Можно было точно рассчитать, через сколько минут оно исчезнет совсем. Это было зрелище, прямо противоположное зрелищу наступающего прилива. Не вода поднималась к ним, а они опускались к ней. Они сами рыли себе могилу. Их могильщиком была их собственная тяжесть.</p><p class="p1">Им готовилась казнь не по людским законам, но по законам природы.</p><p class="p1">Снег все шел, и так как тонущее судно не двигалось, эта белая корпия пеленой ложилась на палубу, точно саваном покрывая урку.</p><p class="p1">Трюм постепенно наполнялся водой. Не было никаких средств остановить течь. У них не было даже черпака, который, впрочем, не мог бы принести никакой пользы – урка была палубным судном. Тремя-четырьмя факелами, воткнутыми куда попало, осветили трюм. Гальдеазун принес несколько старых кожаных ведер; решили отливать воду из трюма, образовали цепь. Но ведра оказались никуда не годными: одни расползлись по швам, у других было дырявое дно, и вода выливалась из них по дороге. Несоответствие между количеством воды прибывавшей и вычерпываемой казалось прямым издевательством. Прибывала целая бочка, убывал один стакан. Все старания не приводили ни к чему. Это напоминало усилия скупца, который пытается израсходовать миллион, тратя ежедневно по одному су.</p><p class="p1">Главарь сказал:</p><p class="p1">– Нужно облегчить судно.</p><p class="p1">Во время бури несколько сундуков, находившихся на палубе, канатами привязали к мачте. Они так и остались принайтовленными к ее обломку. Теперь найтовы развязали и столкнули сундуки в воду через брешь в обшивке борта. Один из этих сундуков принадлежал уроженке Бискайи: у бедной женщины вырвалось горестное восклицание:</p><p class="p1">– Ах, ведь там мой новый плащ на красной подкладке! И мои кружевные чулки! И серебряные сережки, в которых я ходила к обедне в Богородицын день!</p><p class="p1">Палубу очистили, оставалась каюта. Она была доверху загромождена. В ней, как помнит читатель, находился багаж пассажиров и тюки, принадлежавшие матросам.</p><p class="p1">Багаж вытащили и выкинули за борт через ту же брешь.</p><p class="p1">Тюки также столкнули в море.</p><p class="p1">Принялись до конца опоражнивать каюту. Фонарь, эзельгофт, бочонки, мешки, баки, бочки с пресной водой, котел с похлебкой – все полетело в воду.</p><p class="p1">Отвинтили гайки у чугунной печки, уже давно потухшей, сняли ее с цементной подставки, подняли на палубу, дотащили до бреши и бросили за борт.</p><p class="p1">Выкинули в море все, что можно было оторвать от внутренней обшивки, выбросили ридерсы, ванты, обломки мачты и реи.</p><p class="p1">Время от времени главарь шайки брал факел и освещал цифры на носу урки, показывающие глубину осадки, стараясь определить, сколько еще продержится судно.</p></span></span></span></span>
