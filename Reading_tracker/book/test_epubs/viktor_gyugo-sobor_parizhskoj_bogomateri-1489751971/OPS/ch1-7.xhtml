<p class="p">III. Кардинал</p>
</div><p class="p1">Бедный Гренгуар! Треск огромных двойных петард в Иванов день, залп двадцати мушкетов, выстрел знаменитой пушки башни Бильи, которым в воскресенье 29 сентября 1465 года, во время осады Парижа, было убито сразу семеро бургундцев, взрыв всего хранящегося у ворот Тампля пороха оглушили бы его в торжественную и драматическую минуту меньше, чем эта коротенькая фраза слуги: «Его преосвященство монсеньор кардинал Бурбонский!»</p><p class="p1">Дело было не в том, что Пьер Гренгуар боялся кардинала или относился к нему с пренебрежением. Нет, он не был ни настолько малодушен, ни настолько высокомерен. Настоящий эклектик, как его назвали бы в наше время, он принадлежал к числу тех спокойных, уравновешенных людей, обладающих возвышенным и твердым умом, которые всегда и во всем держатся золотой середины (stare in dimidio rerum), здраво рассуждают и либерально философствуют, относясь в то же время с полным уважением к кардиналам. Этот замечательный тип философов никогда не исчезает. Мудрость, словно Ариадна, дает им клубок ниток, и они, разматывая его, шествуют от сотворения мира сквозь лабиринт человеческих дел. Они всегда одинаковы, то есть всегда умеют приноровиться к своему времени. Оставив в стороне Гренгуара, их представителя в пятнадцатом веке, мы легко найдем подобный же тип и в шестнадцатом. Стоит только припомнить великолепные в своей наивности и достойные всех веков взгляды отца де Брёля: «Я парижанин по происхождению и парижанин по манере говорить, потому что „parrhisia” по-гречески значит „свобода речи”. Я всегда говорил без всякого стеснения правду монсеньорам кардиналам, дяде и брату монсеньора принца [Конти], конечно, с должным уважением к их высокому сану и не оскорбляя никого из их свиты, что было нелегко».</p><p class="p1">Итак, в неприятном впечатлении, произведенном на Гренгуара появлением кардинала, не было ни ненависти к нему, ни пренебрежения к его присутствию. Напротив, наш поэт обладал слишком большой дозой здравого смысла и слишком потертой одеждой, чтобы не оценить того, что намеки его пролога, а в особенности горячие похвалы дофину, сыну Льва Франции, будут услышаны святейшим ухом. Но у благородных поэтических натур расчет никогда не стоит на первом плане. Если обозначить совокупность всех достоинств и недостатков поэта цифрою десять и подвергнуть это целое тщательному химическому анализу, разложив его на составные части, то, вероятно, можно было бы установить, как говорит Рабле, что на девять десятых самолюбия приходится всего едва десятая корыстолюбия. А в ту минуту, как отворилась дверь эстрады, процент самолюбия Гренгуара, польщенного восхищением публики, так разросся, что совершенно похоронил под собой ту маленькую частичку корысти, которую мы только что обнаружили в натуре поэта вообще. Впрочем, эта частичка есть тот реальный человеческий вес, без которого поэт никогда бы не прикасался к земле, а парил бы в воздухе.</p><p class="p1">Гренгуар наслаждался, видя, чувствуя и как бы осязая все, правда, далеко не блестящее, собрание, которое изумлялось, цепенело и, казалось, задыхалось от нескончаемых тирад, сыпавшихся на него из каждой части его эпиталамы. Я утверждаю, что Гренгуар сам разделял всеобщий восторг и в полную противоположность Лафонтену, который, присутствуя при представлении своей комедии «Флорентинец», выкрикнул: «Какой это болван написал такую дрянь?» – он, наоборот, готов был спросить своего соседа: «Кем написан этот шедевр?» Можно представить себе поэтому, какое впечатление произвело на него шумное и неуместное появление кардинала.</p><p class="p1">Его опасения полностью оправдались. Прибытие его преосвященства всполошило всю аудиторию. Все головы повернулись к эстраде. Поднялся страшный шум. «Кардинал! Кардинал!» – раздавалось со всех сторон. И несчастный пролог был прерван во второй раз.</p><p class="p1">Кардинал на минуту остановился у входа на эстраду и довольно равнодушно оглядел зрителей. Шум усилился, каждому хотелось получше рассмотреть кардинала; каждый вытягивал шею и клал голову на плечо соседа.</p><p class="p1">Это было действительно очень важное лицо, и взглянуть на него стоило всякого другого зрелища. Карл, кардинал Бурбонский, архиепископ и граф Лионский, примат Галльский, состоял в родстве и с Людовиком XI, на старшей дочери которого был женат его брат, синьор Пьер Божэ, и с Карлом Смелым по линии своей матери, Анны Бургундской. Отличительной чертой примата Галльского было то, что по натуре это был настоящий придворный, преклонявшийся перед властью. Можно представить себе, сколько затруднений вытекало для него из этого двойного родства и с каким трудом приходилось ему лавировать между подводными камнями, чтобы не натолкнуться ни на Людовика XI, ни на Карла – на Сциллу и Харибду, уже погубивших герцога Немурского и коннетабля Сен-Поля. К счастью, ему удалось избегнуть опасностей и благополучно достигнуть Рима. Но хотя теперь он и был у пристани или, вернее, именно поэтому, он не мог без тревоги вспоминать о препятствиях, встречавшихся ему в его политической жизни, так долго исполненной борьбы и труда.</p><p class="p1">Он имел обыкновение повторять, что 1476 год был для него «и черным и белым»: в этот год умерли его мать, герцогиня Бурбонская, и его двоюродный брат, герцог Бургундский; второй траур был для него утешением после первого.</p><p class="p1">Впрочем, это был довольно добродушный человек. Он вел веселую жизнь кардинала, с удовольствием попивал королевское вино Шальо, благосклонно относился к Ришарде ля Гармуаз и к Томасе ля Сайярд, гораздо охотнее подавал милостыню молодым девушкам, чем старухам, и благодаря всему этому пользовался большой популярностью у парижан. Он являлся всюду в сопровождении целого штата епископов и аббатов знатного происхождения, любезных, веселых, готовых при случае покутить. И часто разряженные прихожанки Сен-Жерменского предместья, проходя вечером мимо ярко освещенных окон Бурбонского дворца, бывали возмущены, слыша, как те же самые голоса, которые пели днем в церкви, теперь при звоне стаканов распевали вакхическую песню Бенедикта XII, Папы, прибавившего третью корону к тиаре: «Bibamus papaliter»<a href="ch2.xhtml#id106" class="a">[21]</a>.</p><p class="p1">Должно быть, именно благодаря этой вполне заслуженной популярности толпа не встретила кардинала шиканьем, несмотря на то что была так враждебно настроена против него всего несколько минут тому назад, да еще нисколько не расположенная относиться с уважением к кардиналу в тот самый день, как ей самой предстояло выбирать себе папу. Но парижане не злопамятны. Они заставили начать представление, не дожидаясь прибытия его преосвященства, и эта победа удовлетворила их. Да к тому же кардинал Бурбонский был очень красив, на нем была великолепная красная мантия, которая очень к нему шла. Значит, на его стороне были все женщины и, следовательно, лучшая часть зрителей. Ведь и в самом деле было бы несправедливо и бестактно шикать кардиналу за то только, что он немножко опоздал, когда он такой красивый и к нему так идет его красная мантия.</p><p class="p1">Он вошел и поклонился присутствующим с традиционной улыбкой, которая всегда появляется у высокопоставленных лиц при обращении к народу, потом медленно направился к своему красному бархатному креслу с рассеянным видом человека, думающего о чем-то постороннем. Вслед за ним на эстраду вошла вся его свита, весь его, как выразились бы в наши дни, генеральный штаб, состоящий из епископов и аббатов, отчего еще усилились волнение и любопытство толпы. Всякий знавший хоть одного из этих духовных лиц спешил указать на него и назвать его. Вот, насколько я помню, марсельский епископ Алодэ, вот премикарий Сен-Дени; вот Роберт де Леспинас – аббат Сен-Жермен-де-Пре, этот распутный брат любовницы Людовика XI. Все напропалую путали имена и принимали одно лицо за другое. Студенты же ругались вовсю. Это был их день, их праздник шутов, сатурналия, ежегодная оргия студентов и причетников. Всякое безумство считалось в этот день дозволенным, всякая дерзость – простительной. К тому же в толпе находились такие зачинщики, как Симона Четыре Ливра, Агнеса Треска, Розина Козлоногая. Для каждого соблазном было побраниться и безнаказанно покощунствовать в такой исключительный день, в таком исключительном обществе священников и уличных девок одновременно. И они не давали маху; среди всеобщего шума раздавались неистовые проклятия и гнусные выкрики всех тех развязавшихся языков студентов и причетников, которые в обычное время сдерживались страхом перед раскаленным железом Святого Людовика. Бедный Людовик Святой! Какие непристойности позволяли они себе в самом его дворце! Каждый из них выбрал себе на эстраде одну из сутан – черную, серую, белую или фиолетовую – и изощрялся над ней в своем остроумии. А Жан Фролло де Молендино, в качестве архидьяконского брата, смело набросился на красную мантию и, устремив на кардинала свои дерзкие глаза, распевал во все горло:</p><p class="p1">Capa repleta mero!<a href="ch2.xhtml#id105" class="a">[22]</a></p><p class="p1">Все эти насмешки и остроты, которые мы описываем не приукрашивая, в назидание читателю, сливались с гулом толпы и исчезали в нем, не доходя до эстрады. Впрочем, кардинала это и не тронуло бы, настолько уже вошла в обычай полная свобода того дня. Да ему было и не до того. У него была своя забота, и его физиономия целиком выражала ее – то были фламандские послы, взошедшие на эстраду почти одновременно с ним.</p><p class="p1">Кардинал не был глубоким политиком. Его мало интересовало, каковы будут последствия брака между его кузиной, Маргаритой Бургундской, и кузеном Карлом, дофином венским, долго ли продолжится неискреннее примирение герцога Австрийского с королем французским, как примет английский король пренебрежение, с которым отнеслись к его дочери. Нет, все эти вопросы не особенно интересовали его, и он очень спокойно пил каждый вечер вино Шальо, подававшееся к королевскому столу. Ему и в голову не приходило, что несколько бутылок этого самого вина, только немножко приправленного доктором Куаксье, будут любезно предложены Людовиком XI Эдуарду IV и в один прекрасный день избавят Людовика XI от Эдуарда IV.</p><p class="p1">Достопочтенное посольство герцога Австрийского тревожило кардинала не в политическом, а совсем в другом отношении. Мы уже говорили раньше, что ему было тяжело принимать этих послов. Он, Карл Бурбонский, должен был рассыпаться в любезностях перед какими-то мещанами; кардинал вынужден принимать светских старшин; ему, французу и веселому собеседнику, приходилось выносить общество неотесанных фламандцев, которые молча тянут пиво. И все это он принужден был проделывать публично. Никогда еще не случалось ему играть такой скучной роли в угоду королю.</p><p class="p1">Но когда привратник громко провозгласил: «Господа послы герцога Австрийского», кардинал с самой приветливой улыбкой – он отлично умел владеть собою – обернулся к двери. Нечего и говорить, что глаза всех в зале обратились туда же.</p><p class="p1">На эстраду начали входить попарно, со степенной важностью, представлявшей резкий контраст с оживлением духовной свиты Карла Бурбонского, сорок восемь послов Максимилиана Австрийского. Во главе их шли: преподобный отец Жеан, аббат Сен-Бартенский, канцлер ордена Золотого Руна, и Иаков де Гуа, сьёр Доби, главный судья Гента. В зале наступила тишина, прерываемая заглушенным смехом, когда привратник провозглашал смешные имена и титулы фламандцев, невозможно коверкая их. Тут были: мэтр Лоис Рёлоф, старшина города Лувена; мессир Клайс Этюальд, старшина города Брюсселя; мессир Поль Баёст, сьёр Вуармизель, президент Фландрии; мэтр Жеан Коллегенс, бургомистр города Антверпена; мэтр Георг Мёр, главный старшина города Гента; мэтр Гельдольф ван дер Геге, дворянский старшина того же города, и сьёр Борбок, и Жеан Пиннок, и Жеан Димаэрзель и т. д. и т. д. – судьи, старшины, бургомистры; бургомистры, старшины, судьи – серьезные, важные, чопорные, разряженные в бархат и шелк, в черных бархатных шапочках, украшенных кипрскими золотыми кистями. Впрочем, у всех этих фламандцев были славные лица, спокойные и строгие, того типа, который обессмертил Рембрандт на темном фоне своего «Ночного дозора». Стоило только взглянуть на них, чтобы убедиться, что Максимилиан Австрийский имел полное основание «всецело довериться» послам, как он выразился в своем манифесте, «полагаясь на их здравый смысл, мужество, опытность и добросовестность».</p><p class="p1">Только один из них составлял исключение. У него было умное, хитрое лицо обезьяны и дипломата. Кардинал сделал три шага к нему навстречу и низко поклонился, несмотря на то что это был только Гильом Рим, советник и пенсионарий города Гента.</p><p class="p1">Немногие знали тогда, что представлял собой Гильом Рим. Редкий гений, который во время революции, вероятно, с блеском выплыл бы на поверхность событий, но в пятнадцатом веке был принужден заниматься подпольными интригами и – как выразился герцог Сен-Симон – «жить в подкопах». Впрочем, он был оценен как первый «подкапыватель» Европы Людовиком XI. Гильом Рим орудовал запросто у Людовика XI, не раз исполняя его секретные поручения. Но толпа, собравшаяся в зале, не подозревала этого и удивлялась, с какой стати так разлюбезничался кардинал с каким-то жалким фламандским советником.</p></span></span></span>
