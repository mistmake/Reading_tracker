<span><span><span id="id164"><div class="title6">
<p class="p">Часть шестая Личины Урсуса</p>
</div><span id="id165"><div class="title6">
<p class="p">1. Что говорит человеконенавистник</p>
</div><p class="p1">Увидав, как Гуинплен скрылся за дверью Саутворкской тюрьмы, Урсус, растерявшись, так и замер в закоулке, откуда он наблюдал за всем происходившим. В ушах у него еще долго раздавались скрип замков и лязг засовов, похожие на радостный визг тюрьмы, поглотившей еще одного несчастного. Он ждал. Чего? Он высматривал. Что? Эти неумолимые двери, однажды замкнувшись, распахиваются уже не скоро; они кажутся окаменевшими, навсегда застывшими неподвижно во мраке и с трудом поворачиваются на своих петлях, в особенности когда надо кого-нибудь выпустить; войти – можно, выйти – дело другое. Урсус знал это. Но человек так устроен, что он ждет иногда помимо своей воли, даже зная, что ждать уже нечего. Чувства, толкающие нас на какие-нибудь действия, продолжают проявляться вовне, как бы в силу инерции, даже тогда, когда предмета, на который они были направлены, уже нет, и заставляют нас еще в течение какого-то времени стремиться к исчезнувшей цели. Бесполезное ожидание, бессмысленное стояние, потеря времени, когда внимание приковано к предмету, уже скрывшемуся из виду, – все это каждому не раз приходилось переживать. Продолжаешь чего-то выжидать с безотчетным упорством. Сам не знаешь почему, но остаешься на том же месте. То, что было начато сознательно, продолжаешь по какой-то инерции. Такое упорство истощает и приводит к упадку сил. Хотя Урсус во многом отличался от других людей, однако и он все еще стоял как вкопанный: он погрузился в состояние настороженного раздумья, охватывающего нас перед лицом огромного события, перед которым мы бессильны. Он смотрел на черные стены – то на низкую, то на высокую, смотрел на калитку, на прибитую над нею виселичную лестницу, на ворота, над которыми красовалось изображение черепа; он был как бы зажат в тиски между тюрьмой и кладбищем. В этой пустынной улице, которую все старались обойти, было так мало прохожих, что Урсуса никто не замечал.</p><p class="p1">Наконец он вышел из своего закоулка – из каменной ниши, где стоял на карауле, и медленно поплелся назад. Уже вечерело, – так долго он пробыл здесь. Он то и дело оборачивался и смотрел на страшную калитку, за которой скрылся Гуинплен. Взгляд у него был тупой и застывший. Он добрел до конца переулка, повернул за угол, прошел один переулок, потом другой, смутно припоминая дорогу, которая несколько часов тому назад привела его сюда. Он то и дело оглядывался, как будто мог увидать тюремную калитку, хотя улица, где находилась тюрьма, осталась далеко позади. Мало-помалу он приближался к Таринзофилду. Переулки, прилегавшие к ярмарочной площади, представляли собой пустынные тропинки между оградами садов. Он шел, согнувшись, вдоль изгородей и рвов. Но вдруг он остановился и воскликнул:</p><p class="p1">– Тем лучше!</p><p class="p1">Тут он дважды хлопнул себя по лбу и по бедрам – жест, свидетельствующий о том, что человек понял, наконец, в чем дело.</p><p class="p1">Он продолжал идти, то бормоча себе под нос, то повышая голос:</p><p class="p1">– Отлично! Ах, негодяй! Разбойник! Шалопай! Бездельник! Бунтовщик! Конечно, он мятежник! И я укрывал у себя мятежника. Ну, теперь я избавился от него. Он осрамил нас. Его упекли на каторгу! И поделом! На то и законы. Ах, неблагодарный! А я-то воспитывал его! Вот и старайся тут! Кто тянул его за язык? Туда же, рассуждать! Совать нос в государственные дела! Скажите пожалуйста! У самого в кармане ломаный грош, а он разглагольствует о налогах, обо всем, что нисколько его не касается! Позволять себе высказывать суждения о пенни! Глумиться над королевской медной монетой! Оскорблять Ее Величество! Разве фартинг не то же самое, что королева? На нем ее изображение, черт возьми, ее священное изображение! Есть у нас королева или нет? Ну, так изволь уважать ее позеленевшие медяки. В государстве все связано одно с другим. Это надо зарубить себе на носу. Я-то пожил на свете. Я знаю жизнь. Мне, пожалуй, скажут: вы, значит, отрекаетесь от политики? Ну разумеется. Политика, друзья мои, интересует меня, как прошлогодний снег. Однажды меня ударил тростью один баронет. Я сказал себе: «Довольно с меня, теперь я понял, что такое политика». Королева отбирает у народа последний грош, и народ ее благодарит. Нет ничего проще. Остальное касается лордов. Их сиятельств, вельмож духовных и светских. А Гуинплена под замок! А Гуинплена на галеры! Так и надо, это справедливо. Это вполне резонно, великолепно, заслуженно и законно. Сам виноват. Не болтай лишнего. Что ты – лорд, что ли, дурак этакий? Жезлоносец арестовал его, судебный пристав увел, шериф держит в своих руках. Теперь, должно быть, его, как петуха, ощипывает какой-нибудь законовед. О, это молодцы! Они тебя выведут на чистую воду! Законопатили тебя, голубчика! Тем хуже для тебя, тем лучше для меня. Ей-богу, я очень рад. Скажу по совести, мне везет. Какую глупость я сделал, подобрав этого мальчишку и девчонку! Нам с Гомо жилось так спокойно. И зачем только эти негодяи приплелись ко мне в балаган? Мало я возился с ними, когда они были еще малышами! Мало я таскал их за собою! Стоило спасать их! Его, такого урода, ее – слепую на оба глаза! Вот и отказывай себе во всем! Сколько пришлось голодать из-за них! И вот они вырастают, да еще и влюбляются друг в дружку! Любовь двух калек! Вот до чего мы докатились! Жаба и крот – идиллия, нечего сказать! И все это творилось у меня под носом. Это и должно было кончиться вмешательством правосудия. Жаба заквакала о политике – очень хорошо! Теперь у меня руки развязаны. Когда явился жезлоносец, я сперва ошалел, сразу не поверил собственному счастью; мне казалось, что это мне померещилось, что это невозможно, что это кошмар, что это мне во сне приснилось. Но нет, это не игра воображения. Так оно и есть. Гуинплен в самом деле сидит в тюрьме. Само провидение позаботилось об этом. Этот урод наделал такого шуму, что обратил внимание властей на мое заведение и на моего бедного волка. И вот Гуинплена больше нет. Я могу считать себя избавленным от обоих сразу. Одним выстрелом двух зайцев убили. Ведь Дея умрет от всего этого. Когда она больше не увидит Гуинплена – а она его видит, идиотка! – она решит, что ей незачем жить, она скажет себе: «Что мне делать на этом свете?» – и тоже уберется прочь. Счастливого пути! К черту обоих! Я всегда терпеть их не мог! Подыхай же, Дея! Ах, как я доволен!</p></span></span></span></span>
