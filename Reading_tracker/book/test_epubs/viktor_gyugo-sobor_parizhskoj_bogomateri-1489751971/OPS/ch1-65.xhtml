<span><span><span id="id105"><div class="title6">
<p class="p">Часть третья</p>
<p class="p">Ребенок во мраке</p>
</div><span id="id106"><div class="title6">
<p class="p">1. Чесс-Хилл</p>
</div><p class="p1">На суше буря свирепствовала не меньше, чем на море.</p><p class="p1">Та же дикая ярость окружала и покинутого ребенка. Слабым и неискушенным приходится самим изыскивать способы борьбы с бешеным разгулом слепой стихии; мрак не делает различий; природа вовсе не так милосердна, как это предполагают.</p><p class="p1">Правда, на берегу почти не чувствовалось ветра; в холоде была какая-то странная неподвижность. Града не было. Но шел невероятно густой снег.</p><p class="p1">Град бьет, колотит, ранит, оглушает, разрушает, но снежные хлопья хуже града. Мягкие неумолимые снежинки делают свое дело втихомолку. Если до них дотронуться – они тают. Их чистота – то же, что искренность лицемера. Ложась слой за слоем, снежинки вырастают в лавину; нагромождая обман на обман, лицемер доходит до преступления.</p><p class="p1">Ребенок продолжал идти вперед в сплошном тумане. Туман на первый взгляд представляется легко преодолимым препятствием, но в этом-то и заключается его опасность: он отступает, но не рассеивается; так же как в снеге, в тумане есть нечто предательское. Ребенку, которому по странной прихоти судьбы приходилось бороться со всеми этими опасностями, удалось достигнуть конца спуска и выйти на Чесс-Хилл. Сам того не зная, он находился теперь на перешейке; по обеим сторонам от него простирался океан: достаточно было ему в ночном тумане и снежной метели сделать несколько неверных шагов, и он, ступив направо, упал бы в глубокие воды залива, а свернув налево – в бушующие волны открытого моря. Он шел, не подозревая о том, что идет между двумя безднами.</p><p class="p1">В те времена Портлендский перешеек имел необычайно суровый и дикий вид. Теперь этот перешеек уже ничем не напоминает то, чем он был прежде. С тех пор как из портлендского камня стали делать романский цемент, всю скалу изрыли сверху донизу, совершенно изменив этим ее первоначальный вид. Правда, там и в наши дни еще попадаются известняки нижнеюрской формации, сланцы и траппы, выступающие из пластов смешанных пород, точно зубы из десен; но кирка разрыла и сровняла с землей эти остроконечные каменистые холмы, на которых вили свои безобразные гнезда стервятники. Нет уже вершин, куда могли бы слетаться поморники и хищные чайки, любящие, подобно завистливым людям, грязнить все высокое. Напрасно стали бы там искать и исполинский монолит, прозванный Годольфином, что на древневаллийском языке означает «белый орел». Летом на этой изрытой и пористой, как губка, почве еще находят розмарин, мяту, дикий иссоп, морокой укроп, настой которого служит хорошим укрепляющим средством, и узловатую траву, растущую прямо на песке и употребляемую для изготовления циновок; но там уже не увидишь ни серой амбры, ни черного олова, ни трех разновидностей сланца – зеленого, голубого и цвета шалфейных листьев. Исчезли лисицы, барсуки, выдры, куницы; на скалистых уступах Портленда, так же как и на высотах Корнуэла, водились прежде серны; теперь их больше нет. В некоторых местах еще ловят палтусов и сардин. Но вспугнутые лососи уже не поднимаются в период между днем св. Михаила и рождеством к верховьям Уэя, чтобы метать там икру. Сюда уже не прилетают, как в старину, во времена Елизаветы, те неизвестные птицы величиною с ястреба, что расклевывали яблоко пополам и съедали только семена. Не видно тут и тех коварных желтоклювых ворон, называемых по-английски cornish dough, а по-латыни pyrrocarax, которые сбрасывали на соломенные крыши горящие прутья виноградных лоз. Не видно больше и переселившегося сюда с шотландского архипелага колдуна-буревестника, выпускавшего из клюва какой-то жир, который островитяне жгли в своих светильнях. Не встретить больше вечером в лужах, оставленных морским приливом, древней легендарной птицы со свиными ногами, мычавшей теленком. Приливом уже не выбрасывает на песок острозубую усатую нерпуху с загнутыми ушами, ползающую на ластах. На Портленде, ставшем в наши дни неузнаваемым, никогда не водились соловьи, потому что там не было лесов, но соколы, лебеди и морские гуси перевелись на нем сравнительно недавно. У теперешних портлендских овец жирное мясо и тонкое руно; но у тех немногочисленных иизкорослых овец, которые паслись здесь два века назад, питаясь соленой прибрежной травой, мясо было жесткое, а шерсть грубая; так и подобало кельтскому скоту, который стерегли во время оно пастухи, евшие много чеснока, жившие по сто лет и на расстояний полумили пробивавшие латы своими аршинными стрелами. Где не возделана земля, там и шерсть груба. Нынешний Чесс-Хилл ничем не напоминает прежнего Чесс-Хилла: до такой степени все здесь преображено человеком и бешеными ветрами, разрушающими даже камень.</p><p class="p1">В наши дни по этой узкой косе проходит железная дорога, доходящая до Чезлтона, в котором новенькие дома расположены в шахматном порядке. Есть и станция «Портленд». Там, где когда-то ползали тюлени, теперь катятся вагоны.</p><p class="p1">Двести лет назад Портлендский перешеек представлял собою двухсторонний скат со скалистым хребтом посредине.</p><p class="p1">Опасности, угрожавшие ребенку, не исчезли, только стали иными. При спуске самым страшным для него было сорваться и упасть к подножию утеса; на перешейке же он на каждом шагу рисковал провалиться в какую-нибудь рытвину. Раньше он имел дело с пропастью; теперь ему пришлось иметь дело с трясиной. На берегу моря все оказывается ловушкой: утесы – скользки, песок – зыбуч. Что ни изберешь точкой опоры – все обманчиво. Ходишь точно по стеклу. В любую минуту почва может раздаться у вас под ногами, и вы исчезнете бесследно. Берег океана, как хорошо оборудованная сцена, имеет свои многоярусные люки.</p><p class="p1">Высокие гранитные склоны, в которые упираются оба ската перешейка, почти совсем недоступны. На них с трудом можно отыскать то, что на театральном языке называется выходом на сцену. Человек не должен рассчитывать на гостеприимство океана: ни скалы, ни волны не окажут ему радушного приема. Море заботится лишь с птицах и о рыбах. Перешейки всегда обнажены и каменисты. Волны, размывающие и подрывающие их с двух сторон, придают им резкие очертания. Всюду – острые выступы, гребни, пилообразные хребты, ужасные осколки треснувших глыб, впадины с зазубренными краями, напоминающие усеянную острыми зубами челюсть акулы, волчьи ямы, прикрытые влажным мхом, крутые обрывы скал, нависших над пенящимся прибоем. Человек, задавшийся целью перейти по хребту перешейка, встречает на каждом шагу уродливые, величиною с дом, громады, имеющие форму берцовых или тазовых костей, лопаток, позвонков – омерзительную анатомию оголенных утесов. Пешеход с риском свернуть себе шею пробирается через груды этих обломков. Это почти то же самое, что ходить по костяку исполинского скелета.</p><p class="p1">Представьте же себе ребенка, совершающего этот Геркулесов подвиг.</p><p class="p1">При ярком дневном свете идти все-таки было бы легче, ко вокруг царила тьма. Здесь необходим проводник, а ребенок был один. И взрослому человеку здесь пришлось бы немало потрудиться, а у него были только слабые силы ребенка. Проводника могла бы, на худой конец, заменить тропинка. Но тропинок здесь не было. Инстинктивно он избегал цепи острых утесов и старался держаться как можно ближе к берегу. Но на этом пути ему попадались рытвины. Их было три разновидности: одни – наполненные водой, другие – снегом, третьи – песком. Последняя разновидность всего страшнее, ибо песок засасывает.</p><p class="p1">Опасность, которую ждешь заранее, внушает тревогу; опасность неожиданная внушает ужас. Ребенок боролся с неведомыми ему опасностями. Он то и дело вслепую приближался к тому, что могло стать его могилой.</p><p class="p1">У него не было колебаний. Он огибал скалы, обходил провалы, чутьем угадывал расставленные мраком ловушки, преодолевал одно препятствие за другим и смело двигался вперед. Не имея возможности идти прямо, он все-таки шел уверенно.</p><p class="p1">В случае надобности он мгновенно отступал. Он вовремя выбирался из трясины зыбучих песков. Он стряхивал с себя снег. Не раз оказывался он по колено в воде, и его мокрые лохмотья сразу же замерзали на сильном ночном морозе. Он шел быстро в своей обледеневшей одежде. При этом он как-то умудрился сохранить свою матросскую куртку сухой и теплой на груди. Голод по-прежнему мучил его.</p><p class="p1">Нет предела неожиданностям, кроющимся в бездне: тут все возможно, даже спасение. Исхода из нее не видно, но он существует. Каким образом ребенок, застигнутый снежной метелью, от которой у него захватывало дыхание, заблудившийся на узком подъеме между двумя разверстыми пропастями, не видя дороги, все-таки одолел перешеек, он и сам не мог бы объяснить. Он скользил, карабкался, падал, поднимался, нащупывал дорогу и упорно шел вперед – вот и все. В этом тайна всякой победы. Не прошло и часа, как он почувствовал, что поднимается в гору: он достиг другого конца перешейке, он оставил позади себя Чесс-Хилл, он стоял уже на твердой почве.</p><p class="p1">Моста, соединяющего теперь Сендфорд-Кэс со Смолмоус-Сендом, в ту пору не существовало. Возможно, что ребенок, руководясь верным инстинктом, добрался до гребня, высящегося как раз напротив Уайк-Реджиса, где тогда пролегала песчаная коса – природное шоссе, пересекавшее Ист-Флит.</p><p class="p1">Он избегнул гибели, грозившей ему на перешейке, но все еще находился лицом к лицу с бурей, с зимою, с ночью.</p><p class="p1">Перед ним снова простиралась во мгле необъятная равнина.</p><p class="p1">Он посмотрел на землю, отыскивая тропинку.</p><p class="p1">Вдруг он наклонился.</p><p class="p1">Он заметил на снегу что-то, похожее на след.</p><p class="p1">В самом деле это был след, след человеческой ноги. Ее отпечаток совершенно явственно виднелся на белой пелене снега. Ребенок стал рассматривать его. След был оставлен босой ступней; нога была меньше мужской, но больше детской.</p><p class="p1">Вероятно, это была нога женщины.</p><p class="p1">За первым следом был второй, за ним третий, следы шли на расстоянии шага один от другого и уклонялись вправо по равнине. Следы были еще свежие, слегка припорошенные снегом. Здесь несомненно прошла недавно женщина.</p><p class="p1">Она, по-видимому, направилась в ту сторону, где ребенок разглядел дым.</p><p class="p1">Не спуская глаз с этих следов, ребенок пошел по ним.</p></span><span id="id107"><div class="title6">
<p class="p">2. Действие снега</p>
</div><p class="p1">Некоторое время он шел по этим следам. К несчастью, они становились все менее и менее отчетливыми. Снег так и валил. Это было как раз то время, когда «Матутина» под тем же снегопадом шла к своей гибели в открытом море.</p><p class="p1">Ребенок, боровшийся, так же как и судно, со смертью, хотя она и предстала ему в ином облике, не видел в окружавшей его со всех сторон непроглядной тьме ничего, кроме этих следов на снегу, и он ухватился за них, как за путеводную нить.</p><p class="p1">Вдруг – потому ли, что их окончательно замело снегом, или по другой причине – следы пропали. Все вокруг опять стало гладким, плоским, ровным, без единого пятнышка. Земля была сплошь затянута белой пеленой, небо – черной.</p><p class="p1">Можно было подумать, что женщина, проходившая здесь, улетела.</p><p class="p1">Выбившийся из сил ребенок наклонился к земле и стал приглядываться. Увы, тщетно.</p><p class="p1">Не успел он выпрямиться, как ему почудился какой-то непонятный звук, но у него не было уверенности, что он не ослышался. Звук был похож на голос, на вздох, на неуловимый лепет, и, казалось, исходил скорее от человека, чем от животного. Однако в нем было что-то замогильное, а не живое. Это был звук, какой нам слышится иногда сквозь сон.</p><p class="p1">Он посмотрел вокруг, но ничего не увидел.</p><p class="p1">Перед ним расстилалась бесконечная, голая, мертвенная пустыня. Он прислушался. Звук прекратился. Быть может, это ему только почудилось? Он прислушался еще раз. Все было тихо.</p><p class="p1">Очевидно, в густом тумане что-то вызывало слуховую галлюцинацию. Он снова двинулся в путь.</p><p class="p1">Он брел теперь наугад.</p><p class="p1">Едва прошел он несколько шагов, как звук возобновился. На этот раз он уже не мог сомневаться. Это был стон, почти рыдание.</p><p class="p1">Звук вновь повторился.</p><p class="p1">Если души, находящиеся в чистилище, могут стонать, то, вероятно, они стонут именно так.</p><p class="p1">Трудно представить себе что-либо более трогательное, душераздирающее и вместе с тем более слабое, чем этот голос. Ибо это был голос – голос, принадлежавший человеческому существу. В этом жалобном и, казалось, безотчетном стенании чувствовалось биение чьей-то жизни. Это молило о помощи живое страдание, не сознающее того, что оно страждет и молит. Этот стон, бывший, может быть, первым, может быть, последним вздохом, в равной мере напоминал предсмертный хрип и крик новорожденного. Кто-то дышал, кто-то задыхался, кто-то плакал. Глухая мольба, доносившаяся неизвестно откуда.</p><p class="p1">Ребенок зорко посмотрел во все стороны: вдаль, вблизи себя, вверх, вниз. Никого и ничего.</p><p class="p1">Он напряг слух. Звук раздался еще раз. Он явственно услыхал его. Голос немного напоминал блеяние ягненка.</p><p class="p1">Тогда ему стало страшно, ему захотелось убежать.</p><p class="p1">Стон повторился. Уже четвертый раз. В нем была невероятная мука и жалоба. Чувствовалось, что это – последнее усилие, скорее невольное, чем сознательное, и что сейчас этот крик, вероятно, умолкнет навсегда. Это была мольба о помощи, безотчетно обращенная умирающим в пространство, откуда должно было прийти спасение; это был предсмертный лепет, взывавший к незримому провидению. Ребенок пошел в ту сторону, где слышался голос.</p><p class="p1">Он по-прежнему ничего не видел.</p><p class="p1">Чутко прислушиваясь, он сделал еще несколько шагов.</p><p class="p1">Стенание не прекращалось. Из нечленораздельного и еле внятного оно сделалось теперь явственным и громким. Это было где-то совсем близко. Но где именно?</p><p class="p1">Кто-то рядом жалобно взывал. Эти дрожащие звуки раздавались возле него. Человеческий стон, носившийся где-то в пространстве, – вот что слышал ребенок в непроглядном мраке. Таково по крайней мере было его впечатление, смутное, как густой туман, в котором он блуждал.</p><p class="p1">Колеблясь между безотчетным желанием бежать и безотчетным желанием остаться, он вдруг заметил на снегу, в нескольких шагах от себя, волнообразное возвышение размером с человеческое тело, невысокий бугорок, продолговатый и узкий, нечто вроде белой могильной насыпи на заснеженном кладбище.</p><p class="p1">В эту минуту стон перешел в крик.</p><p class="p1">Он доносился из-под этого холмика.</p><p class="p1">Ребенок нагнулся, присел на корточки перед снежным сугробом и принялся торопливо разгребать его обеими руками.</p><p class="p1">По мере того как он расчищал снег, перед ним стали обрисовываться очертания человеческого тела, и вдруг в вырытом углублении показалось бледное лицо.</p><p class="p1">Но кричало не это существо. Нет, глаза его были закрыты, а рот хотя и открыт, но полон снега.</p><p class="p1">Лицо было неподвижно. Оно не дрогнуло, когда ребенок дотронулся до него рукой. Ребенок, обморозивший себе кончики пальцев, отпрянул, ощутив холод этого лица. Это была голова женщины. В разметавшиеся волосы набился снег. Женщина была мертва.</p><p class="p1">Ребенок снова принялся разгребать снег. Показалась шея покойницы, потом верхняя часть туловища, прикрытая лохмотьями, сквозь которые виднелось голое тело.</p><p class="p1">Вдруг он почувствовал под своими руками легкое движение. Что-то маленькое шевелилось под снежным сугробом. Мальчик быстро раскидал снег и увидел на обнаженной груди матери жалкое тельце крошечного, совершенно голого младенца, хилого, посиневшего от холода, но еще живого.</p><p class="p1">Это была девочка.</p><p class="p1">Рваные пеленки, в которые ее завернули, были, должно быть, короткими, и она, ворочаясь, выбилась из них. Тепло, исходившее от ее щуплого тельца и от ее дыхания, растопило вокруг нее немного снега. Кормилица дала бы ей на вид месяцев пять-шесть, но ей было, вероятно, около года: ведь нищета ведет детей к рахитизму и задерживает их рост. Как только лицо малютки показалось из-под снега, горький плач ее сменился резким криком. Мать, несомненно, была мертва, если этот отчаянный вопль не мог разбудить ее.</p><p class="p1">Мальчик взял малютку на руки.</p><p class="p1">Эта мать, застывшая на снегу, производила страшное впечатление. Казалось, ее лицо светится каким-то призрачным светом. Ее отверстый бездыханный рот как будто готовился отвечать на невнятном языке теней на вопросы, предлагаемые там, в незримом мире, мертвецам. На лице ее лежал тусклый отпечаток белеющих кругом снежных просторов. Виднелось юное чело, обрамленное темными волосами, почти негодующе нахмуренные брови, сжатые ноздри, закрытые веки, слипшиеся от инея ресницы и спускавшиеся от углов глаз к концам губ следы обильных слез. Снег бросал бледный отблеск на это мертвое лицо. Зима и могила отнюдь не враждебны друг другу. Труп – это обледеневший человек. В наготе груди было нечто возвышенно-трогательное. Она исполнила свое назначение. Лежавшая на ней трагическая печать увядания свидетельствовала о том, что это безжизненное существо дало жизнь другому существу: девственную чистоту сменило величие материнства. На одном соске белела жемчужина. Это была замерзшая капля молока.</p><p class="p1">Поясним сразу, что по тем же самым равнинам, по которым шел покинутый мальчик, незадолго до него брела в поисках крова заблудившаяся нищенка с младенцем у груди. Окоченев от холода, она свалилась под бурным порывом ветра и не могла уже подняться. Ее замело вьюгой. Из последних сил она прижала к себе ребенка и так умерла.</p><p class="p1">Малютка пыталась прильнуть губами к этому мрамору. В бессознательной доверчивости, с которой она искала себе пищи, не было ничего противного законам природы, ибо мать, только что испустившая последний вздох, по-видимому, еще способна накормить грудью ребенка.</p><p class="p1">Но ротик младенца не мог найти соска, на котором застыла похищенная смертью капля молока, и малютка, более привыкшая к колыбели, чем к могиле, закричала под снегом.</p><p class="p1">Покинутый мальчик услыхал вопль погибавшей крошки.</p><p class="p1">Он вырыл ее из сугроба.</p><p class="p1">Он взял ее на руки.</p><p class="p1">Почувствовав, что ее держат на руках, она перестала кричать. Лица двух детей соприкоснулись, и посиневшие губы младенца прильнули к щеке мальчика, как к материнской груди.</p><p class="p1">Малютка была близка к тому состоянию, когда застывающая кровь останавливает биение сердца. Мать уже успела приобщить ее в какой-то мере к своей смерти; холод трупа распространяется на окружающее: ножки и ручки малютки были словно скованы этим ледяным холодом. Мальчик тоже почувствовал на себе его дыхание.</p><p class="p1">Из всей одежды на нем осталась сухой и теплой только матросская куртка. Положив крошку на грудь умершей, он снял с себя куртку, закутал в нее девочку, снова взял ее на руки и, сам теперь полуголый, ничем почти не защищенный от бушующей вьюги, держа малютку в объятиях, опять тронулся в путь.</p><p class="p1">Снова отыскав щеку мальчика, младенец прильнул к ней губами, и, согревшись, уснул. Это было первым поцелуем двух детских душ, встретившихся во мраке.</p><p class="p1">Мать осталась лежать в снегу; лицо ее было обращено к ночному небу. Но в ту минуту, когда мальчик снял с себя куртку, чтобы завернуть в нее малютку, покойница, быть может, увидела это из беспредельности, где уже была ее душа.</p></span><span id="id108"><div class="title6">
<p class="p">3. Тягостный путь еще тяжелее от ноши</p>
</div><p class="p1">Прошло более четырех часов с того момента, как урка покинула воды Портлендской бухты, оставив мальчика одного на берегу. За те долгие часы, когда он, брошенный всеми, брел куда глаза глядят, ему повстречались здесь, в человеческом обществе, в которое ему, быть может, предстояло вступить, лишь трое: мужчина, женщина и ребенок. Мужчина – тот, что был на холме; женщина – та, что лежала в снегу; ребенок – девочка, которую он нес на руках.</p><p class="p1">От усталости и голода он еле держался на ногах. Но он шел вперед еще решительнее, чем прежде, хотя теперь у него прибавилась ноша, а сил убавилось. Он был почти совсем раздет. Еле прикрывавшие его лохмотья, обледенев на морозе, подобно стеклу резали тело и обдирали кожу. Он замерзал, зато девочка согревалась. То, что терял он, не пропадало даром, а шло на пользу малютке. Он ощущал это тепло, возвращавшее ее к жизни, и упорно шел вперед.</p><p class="p1">Время от времени, стараясь не выронить ноши, он нагибался, захватывал полную горсть снега и растирал себе ступни, чтобы не дать им закоченеть.</p><p class="p1">Порою же, когда у него пересыхало в горле, он набирал в рот немного снегу и сосал его; это ненадолго утоляло жажду, но вызывало озноб. Мимолетное облегчение лишь усиливало страдания.</p><p class="p1">Вьюга, разбушевавшись, уже не знала пределов своему неистовству, – в природе наблюдаются явления, которые следовало бы назвать снежными потопами. Это и было таким потопом. Беснуясь, буря обрушилась не только на океан: она свирепствовала и на побережье. Вероятно, как раз в это время урка, беспомощно носясь по волнам, теряла в поединке с рифами последние остатки такелажа.</p><p class="p1">Двигаясь сквозь вьюгу на восток, ребенок пересек широкие снежные пространства. Он не имел представления, который мог быть час. Уже давно не различал он никакого дыма. Такие приметы исчезают во мраке ночи довольно скоро, не говоря уже о том, что час был поздний и огни давно были потушены; в конце концов, он, может быть, просто ошибся, и в той стороне, куда он направлялся, не было ни города, ни селения.</p><p class="p1">Но эти сомнения нисколько не ослабили его решимости.</p><p class="p1">Два-три раза малютка принималась кричать. Не останавливаясь, он укачивал ее на ходу; она успокаивалась и умолкала. Наконец она заснула крепким, безмятежным сном. Сам дрожа от холода, он чувствовал, что ей тепло.</p><p class="p1">Он то и дело запахивал плотнее куртку вокруг шейки малютки, чтобы в разошедшиеся складки не забился иней и чтобы к тельцу ребенка не было ни малейшего доступа таявшему снегу.</p><p class="p1">Поверхность равнины была волнистой. В ложбинах, где она понижалась, ветром намело такие сугробы, что мальчик утопал в них чуть не по грудь и с трудом прокладывал себе дорогу, расталкивая снег коленями.</p><p class="p1">Выбравшись из лощины, он попал на плоскогорье, со всех сторон открытое ветрам, где снег лежал лишь тонким слоем. Там была гололедица.</p><p class="p1">Теплое дыхание девочки, касаясь его щеки, согревало его на мгновение, но увлажненные волосы на виске тотчас же превращались в сосульку.</p><p class="p1">Он отдавал себе отчет, насколько усложнилась его задача: ему уже нельзя было упасть. Он чувствовал, что, упав, он больше не подымется. Он изнемогал от усталости, и мрак немедленно придавил бы его своей свинцовой тяжестью к земле, а мороз заживо приковал бы его к ней, как ту покойницу. До сих пор он уже не раз висел над пропастью, но спускался благополучно; не раз спотыкался, попадая ногою в ямы, но выбирался из них невредимым; теперь же всякое падение было равносильно смерти. Неверный шаг разверзнул бы перед ним могилу. Ему нельзя было поскользнуться: у него не хватило бы сил даже привстать на колени. А между тем поскользнуться можно было на каждом шагу: все пространство вокруг покрылось ледяной корой.</p><p class="p1">Девочка, которую он нес, страшно мешала ему идти; это была не только тяжесть, непосильная при его усталости и истощении, это была еще и помеха. Обе руки у него были заняты, между тем при гололедице именно руки служат пешеходу необходимым естественным балансиром.</p><p class="p1">Надо было обходиться без этого балансира.</p><p class="p1">Он и обходился без него и шел, не зная, как ему управиться с ношей.</p><p class="p1">Малютка оказалась каплей, переполнившей чашу его бедствий.</p><p class="p1">Он продвигался вперед, ставя ноги как на туго натянутом канате, проделывая чудеса равновесия, которых никто не видел. Впрочем, повторяем, быть может на этом скорбном пути за ним из мрака бесконечности следили открывшиеся глаза матери да око божие.</p><p class="p1">Он шатался, оступался, но удерживался на ногах, все время заботясь о малютке, закутывая ее поплотнее в куртку, покрывая ей головку, опять оступался, но продолжал идти, скользил и снова выпрямлялся. У ветра же хватало низости еще подталкивать его.</p><p class="p1">Он, вероятно, много плутал. Судя по всему, он находился на тех равнинах, где позднее выросла Бинкливская ферма, на полпути между нынешними Спринг-Гарденсом и Персонедж-Хаузом. В настоящее время там – фермы и коттеджи, тогда же там была пустошь. Нередко меньше, чем за столетие, голая степь превращается в город.</p><p class="p1">Вдруг слепившая ему глаза и пронизывавшая холодом метель на минуту затихла, и он заметил невдалеке от себя занесенные снегом крыши и трубы – целый город, выступавший белым пятном на черном фоне горизонта, так сказать, силуэт наизнанку, нечто вроде того, что теперь называют негативом.</p><p class="p1">Кровли, жилища, ночлег! Он, значит, куда-то добрался! Он почувствовал неизъяснимый прилив бодрости, какой пробуждает в человеке надежда. Вахтенный на сбившемся с курса судне, кричащий своим спутникам: «Земля!», переживает подобное же волнение. Ребенок ускорил шаги.</p><p class="p1">Он наконец нашел людей. Он сейчас увидит живые лица. Куда девался страх! Он чувствовал себя в безопасности, и от одного этого сознания кровь быстрей потекла в его жилах. С тем, что ему только что пришлось пережить, было, значит, покончено навсегда. Не будет больше ни ночи, ни зимы, ни вьюги. Ему казалось, что все самое страшное теперь позади. Малютка уже нисколько не обременяла его. Он почти бежал.</p><p class="p1">Его глаза были прикованы к этим кровлям. Там, под ними, была жизнь. Он не сводил с них взгляда. Так смотрел бы мертвец на мир, представший ему сквозь приоткрытую крышку гроба. Это были те самые трубы, дым которых он видел издалека.</p><p class="p1">Теперь ни одна из них не дымилась.</p><p class="p1">Он быстро дошел до первых домов. Он вступил в предместье, представлявшее собою открытый въезд в город. В ту эпоху уже отмирал обычай загораживать улицы на ночь.</p><p class="p1">Улица начиналась двумя домами. Однако в них не было видно ни одной горящей свечи, ни одной лампы, так же как и во всей улице и во всем городе – нигде не было ни одного огонька.</p><p class="p1">Дом направо был похож скорее на сарай, чем на жилое строение, до того он был невзрачен; стены были глинобитные, крыша соломенная и по сравнению со стенами несоразмерно велика. Большой куст крапивы, разросшийся у стены, доходил чуть не до застрехи. В лачуге была одна только дверь, похожая на кошачью лазейку, и лишь одно крошечное окошко под самой кровлей. Все было заперто. Рядом, в хлеву, глухо хрюкала свинья; это свидетельствовало о том, что и дом обитаем.</p><p class="p1">Дом слева был высоким, длинным каменным зданием с аспидной крышей. Палаты богача, выросшие против лачуги бедняка.</p><p class="p1">Мальчик, не колеблясь, направился к большому дому. Тяжелая дубовая двустворчатая дверь с узором из крупных шляпок гвоздей не вызывала сомнения в том, что она заперта на несколько крепких засовов и замков; снаружи висел железный молоток.</p><p class="p1">Ребенок не без труда поднял молоток – его окоченевшие руки были скорее обрубками, чем руками. Он постучал.</p><p class="p1">Никакого ответа.</p><p class="p1">Он постучал еще раз, теперь в два удара.</p><p class="p1">В доме не слышно было ни малейшего движения.</p><p class="p1">Он постучал в третий раз. Никто не откликнулся.</p><p class="p1">Он понял, что хозяева либо опят, либо не желают подняться с постели.</p><p class="p1">Тогда он подошел к бедному дому. Разыскав в снегу булыжник, он постучал им в низенькую дверь.</p><p class="p1">Никакого ответа.</p><p class="p1">Привстав на носки, он стал барабанить камнем в окошечко – достаточно осторожно, чтобы не разбить стекла, но достаточно громко, чтобы его услышали.</p><p class="p1">Никто не отозвался, никто не шевельнулся, никто не зажег свечи.</p><p class="p1">Он понял, что здесь тоже не хотят вставать.</p><p class="p1">И в каменных палатах и в крытой соломой хижине люди были одинаково глухи к мольбам обездоленных.</p><p class="p1">Мальчик решил идти дальше и направился в тянувшийся прямо перед ним узкий переулок, настолько мрачный, что его можно было скорее принять за ущелье между скалами, чем за городскую улицу.</p></span><span id="id109"><div class="title6">
<p class="p">4. Иного рода пустыня</p>
</div><p class="p1">Поселок, в который он попал, назывался Уэймет.</p><p class="p1">Тогдашний Уэймет не был нынешним почтенным и великолепным Уэйметом.</p><p class="p1">В старинном Уэймете не было, подобно теперешнему Уэймету, безукоризненной, прямой, как стрела, набережной со статуей Георга III и гостиницей, носящей имя того же короля. Это объясняется тем, что Георга III в то время еще не было на свете. По той же причине на зеленом склоне холма, к востоку от Уэймета, еще не красовалось занимающее теперь чуть ли не целый арпан и сделанное из подстриженного дерна, уложенного на обнаженной почве, изображение некоего короля верхом на белом коне с развевающимся хвостом, обращенным, в честь того же Георга III, в сторону города. Впрочем, почести эти были заслужены: Георг III, лишившийся в старости рассудка, которым он не обладал и в молодости, не ответственен за бедствия, происшедшие в его царствование. Это был дурачок. Почему бы не воздвигнуть памятник и ему?</p><p class="p1">Сто восемьдесят лет тому назад Уэймет отличался приблизительно той же симметричностью, что и сваленная в беспорядке куча бирюлек. Легендарная Астарот иногда прогуливалась по земле с мешком за плечами, в котором было все решительно, включая и домики с добрыми хозяйками. Груда домишек, выпавшая из этой дьявольской котомки, могла бы дать точное представление о хаотической разбросанности уэйметских жилищ и даже о добрых уэйметских хозяйках. Образцом его построек может служить сохранившийся доныне Дом музыкантов. Множество деревянных хижин, украшенных резьбою; уродливые, покосившиеся на сторону строения, из коих одни опирались на столбы, а другие прислонялись к соседним домишкам, чтобы не свалиться под напором морского ветра, узкие, кривые, извилистые проходы, переулки, перекрестки, часто затопляемые морским приливом, ветхие лачуги, лепившиеся вокруг старинной церкви, – вот что представлял собой в ту пору Уэймет. Уэймет был чем-то вроде древнего нормандского поселка, выброшенного волнами на английский берег.</p><p class="p1">Путешественник, заходивший в таверну, на месте которой стоит ныне гостиница, вместо того чтобы потребовать жареной камбалы и бутылку вина и с королевской щедростью заплатить двадцать пять франков, скромно съедал за два су тарелку рыбной похлебки, впрочем отменно вкусной. Все это было очень убого.</p><p class="p1">Покинутый ребенок, неся на руках найденную им девочку, прошел одну улицу, затем другую, третью. Он смотрел вверх, надеясь найти хоть одно освещенное окно, но все дома были наглухо заперты и темны. Иногда он стучался в какую-нибудь дверь. Никто не отзывался. Теплая постель обладает способностью превращать человеческое сердце в камень. Стук и толчки разбудили в конце концов малютку. Он заметил это, потому что она принялась сосать его щеку. Она не кричала, так как думала, что лежит на руках у матери.</p><p class="p1">Быть может, ему пришлось бы долго кружить и блуждать по лабиринту переулков Скрамбриджа, где в то время было больше огородов, чем домов, и больше изгородей из кустов терновника, чем жилых строений, если бы по счастливой случайности он не забрел в узкий проход, еще существующий и в наши дни возле школы Троицы. Этот проход вывел его к отлогому берегу, где было сооружено некое подобие набережной с парапетом. Направо от себя он увидел мост.</p><p class="p1">Мост этот, переброшенный через Уэй, был тот самый, что и теперь соединяет Уэймет с Мелкомб-Реджисом, – мост, под пролетами которого гавань сообщается с рекой, прегражденной плотиной.</p><p class="p1">Уэймет был еще в те времена предместьем портового города Мелкомб-Реджиса. Теперь Мелкомб-Реджис – один из приходов Уэймета. Предместье поглотило город, чему в значительной степени помог мост. Мосты – это своеобразные насосы, перекачивающие население из одной местности в другую и иногда способствующие росту какого-нибудь прибрежного селения за счет его соседа на противоположном берегу.</p><p class="p1">Мальчик направился к мосту, который представлял собой в те времена просто крытые деревянные мостки. Он прошел по этим мосткам.</p><p class="p1">Благодаря крыше на настиле моста не было снега. Ступая босыми ногами по сухим доскам, он испытал на минуту блаженное ощущение.</p><p class="p1">Перейдя мост, он очутился в Мелкомб-Реджисе.</p><p class="p1">Здесь деревянных домиков было меньше, чем каменных. Это было уже не предместье, это был город. Мост упирался в довольно красивую улицу св. Фомы. Мальчик пошел по ней. По обеим сторонам улицы стояли высокие дома с резным щипцом, там и сям попадались окна лавок. Он снова стал стучаться в двери. У него уже не было сил ни звать, ни кричать.</p><p class="p1">Никто не откликался в Мелкомб-Реджисе, так же, как это было и в Уэймете. Все двери были крепко заперты на замок. Окна были закрыты ставнями, как глаза веками. Были приняты все меры предосторожности против внезапного, всегда неприятного пробуждения.</p><p class="p1">Маленький скиталец испытал на себе не выразимое никакими словами влияние спящего города. Безмолвие такого оцепеневшего муравейника способно вызвать головокружение. Кошмары тяжелого сна, что толпой теснятся в мозгу неподвижно распростертых человеческих тел, как будто исходят от них клубами дыма. Смутная мысль спящих реет над ними то легким туманом, то тяжким угаром и сливается с несбыточными их мечтами, которые, пожалуй, тоже витают в пространстве, где-то на грани сна и действительности. Отсюда вся эта путаница наших снов. Грезы, наплывая облаком, порою плотным, порою прозрачным, заслоняют собою звезду, имя которой разум. За сомкнутыми веками глаз, где зрение вытеснено сновидением, проносятся призрачные силуэты, распадающиеся образы, совсем живые, но неосязаемые, и кажется, что рассеянные где-то в иных мирах таинственные существования сливаются с нашей жизнью на том рубеже смерти, который называется оном. Этот хоровод призраков и душ кружится в воздухе. Даже тот, кто не спит, чувствует, как давит его эта среда, исполненная зловещей жизни. Окружающие его химеры, в которых он угадывает нечто реальное, не дают ему покоя. Бодрствующий человек проходит по спящим улицам точно сквозь мглу чужих сновидений, безотчетно сопротивляясь натиску наступающих на него призраков; он испытывает (или, во всяком случае, ему кажется, будто он испытывает) ужас соприкосновения с незримыми и враждебными существами; каждое мгновение он сталкивается с чем-то неизъяснимым, что сейчас же пропадает бесследно. В этом ночном странствии среди летучего хаоса сонных грез есть нечто общее с блужданием в дремучем лесу.</p><p class="p1">Это и есть то состояние, которое называют беспричинным страхом.</p><p class="p1">У ребенка это чувство проявляется еще сильнее, чем у взрослых.</p><p class="p1">Ужас, внушаемый мальчику ночным безмолвием и зрелищем как будто вымерших домов, усугублял тяжесть бедственного его положения.</p><p class="p1">Войдя в Коникер-лейн, он увидел в конце этого переулка запруженную реку и принял ее за океан; он уже не мог бы сказать, в какой стороне находится море; он возвратился на прежнее место, свернул влево по Мейдн-стрит и пошел назад по Сент-Олбенс-роу.</p><p class="p1">Там он стал уже без разбора громко стучать в первые попавшиеся дома. Беспорядочно сыпавшиеся отрывистые удары, в которые он влагал свои последние силы, повторялись через определенные промежутки все с большей и большей яростью. Это билось в двери его иссякшее терпение.</p><p class="p1">Наконец раздался ответный звук.</p><p class="p1">Ответили часы.</p><p class="p1">На старинной колокольне церкви св. Николая медленно пробило три часа ночи.</p><p class="p1">Затем все снова погрузилось в безмолвие.</p><p class="p1">Может показаться невероятным, что ни один из жителей города не приоткрыл даже окошка. Однако это находит некоторое объяснение. Надо сказать, что в январе 1690 года только что улеглась довольно сильная вспышка чумы, свирепствовавшей в Лондоне, и боязнь впустить к себе в дом какого-нибудь больного бродягу вызвала во всей стране, упадок гостеприимства. Не решались даже слегка приотворить окно, чтобы не вдохнуть зараженного воздуха.</p><p class="p1">Холодность людей была для ребенка еще страшнее, чем холод ночи. В ней ведь всегда чувствуется преднамеренность. Сердце у него болезненно сжалось: он впал в большее уныние, чем там, в пустыне. Он вступил в общество себе подобных, но продолжал оставаться одиноким. Это было мучительно. Безжалостность пустыни была ему понятна, но беспощадное равнодушие города казалось ему чудовищным. Мерные звуки колокола, отбивающего истекшие часы, повергли его в еще большее отчаяние. Порою ничто не производит такого удручающего впечатления, как бой часов. Это – откровенное признание в полном безразличии. Это – сама вечность, заявляющая громогласно: «Какое мне дело?»</p><p class="p1">Он остановился. Как знать, может быть в эту горькую минуту он задал себе вопрос: не лучше ли лечь прямо на улице и умереть? Но в это время девочка склонила головку к нему на плечо и опять заснула. Инстинктивная доверчивость малютки побудила его идти дальше.</p><p class="p1">Он, вокруг которого все рушилось, почувствовал, что сам является чьей-то опорой. При таких обстоятельствах в человеке пробуждается голос долга.</p><p class="p1">Но ни эти мысли, ни состояние, в котором он находился, не соответствовали его возрасту. Возможно, что все это было выше уровня его понимания. Он действовал бессознательно. Он поступал так, не отдавая себе отчета.</p><p class="p1">Он направился к Джонсон-роу.</p><p class="p1">Он уже не шел, а еле волочил ноги.</p><p class="p1">Оставив по левую руку от себя Сент-Мери-стрит, он миновал несколько кривых переулков и, пробравшись через узкий извилистый проход между двумя лачугами, очутился на довольно обширном незастроенном поле. Этот пустырь находился приблизительно в том месте, где теперь Честерфилдская площадь. Здесь дома кончались. Направо виднелось море, налево – редкие хижины предместья.</p><p class="p1">Как быть? Опять начиналась голая равнина. На востоке простирались покрытые пеленою снега широкие склоны Редипола.</p><p class="p1">Что делать? Идти дальше? Уйти снова в безлюдье? Вернуться назад на городские улицы? Что предпочесть: безмолвие снежных полей или глухой, бездушный город? Которое выбрать из этих двух зол?</p><p class="p1">Существует якорь спасения, существует и взгляд, молящий о спасении. Именно такой взгляд кинул вокруг себя отчаявшийся ребенок.</p><p class="p1">Вдруг он услышал угрозу.</p></span></span></span></span>
