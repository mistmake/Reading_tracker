<p class="p">2. Беспристрастие</p>
</div><p class="p1">Провозглашение пэрского сословия равным королю было фикцией, но фикцией, принесшей в те варварские времена известную пользу. Эта незамысловатая политическая уловка привела во Франции и в Англии к совершенно разным последствиям. Во Франции пэр был только мнимым королем; в Англии же он был подлинным властелином. В Англии у него было, пожалуй, меньше величия, чем во Франции, но больше настоящей власти. Можно было сказать: «меньше, да зловреднее».</p><p class="p1">Пэрство родилось во Франции. В какую эпоху оно возникло, неизвестно; по преданию – при Карле Великом; согласно данным истории – при Роберте Мудром. Но история ничуть не достовернее устных преданий. Фавен пишет: «Французский король хотел привлечь к себе вельмож своего государства, награждая их пышным титулом пэра, коим как бы признавал, их равными себе».</p><p class="p1">Пэрство вскоре разветвилось и перешло из Франции в Англию.</p><p class="p1">Учреждение английского пэрства явилось крупным событием и имело важное значение. Ему предшествовал саксонский wittenagemot. Датский тан и нормандский вавасор слились в бароне. Слово «барон» означает то же самое, что латинское vir и испанское varon, то есть «муж». Начиная с 1075 года, бароны дают чувствовать свою власть королям. И каким королям! – Вильгельму Завоевателю! В 1086 году они кладут основание феодализму «Книгою страшного суда», «Doomsday book». При Иоанне Безземельном происходит столкновение: французская аристократия относится свысока к Великобритании и к ее монарху, и французские пэры вызывают к себе на суд английского короля. Английские бароны негодуют. При короновании Филиппа-Августа английский король в качестве герцога нормандского несет первое четырехугольное знамя, а герцог Гиеннский – второе. Против этого короля, вассала чужестранцев, вспыхивает «война вельмож». Бароны заставляют безвольного Иоанна подписать «Великую хартию», породившую палату лордов. Папа становится на сторону короля и отлучает лордов от церкви. Дело происходит в 1215 году, при папе Иннокентии III, который написал гимн «Veni sancte Spiritus»<a href="ch2.xhtml#id159" class="a">[266]</a> и прислал королю Иоанну Безземельному четыре золотых кольца, знаменовавших собой четыре основных христианских добродетели. Лорды упорствуют. Начинается долгий поединок, которому суждено было длиться несколько поколений. Пемброк борется. В 1248 году издаются «Оксфордские постановления». Двадцать четыре барона ограничивают королевскую власть, оспаривают ее решения и привлекают к участию в разгоревшейся распре по одному дворянину от каждого графства – зарождение палаты общин. Позднее лорды стали призывать в качестве помощников по два человека от каждого города и по два – от каждого местечка. В результате этого вплоть до царствования Елизаветы пэры держали в своих руках выборы в палату общин. Их юрисдикция породила изречение: «Депутаты должны избираться без трех “Р”: sine Prece, sine Pretio, sine Poculo»<a href="ch2.xhtml#id157" class="a">[267]</a>. Это, однако, не помешало подкупам в некоторых общинах. Еще в 1293 году французские пэры считали подсудным себе короля Англии, и Филипп Красивый требовал к ответу Эдуарда I. Эдуард I был тот самый король, который, умирая, приказал своему сыну выварить его труп и кости взять с собой на войну. Королевские безрассудства побуждают лордов принять меры к укреплению власти в парламенте; с этой целью они разделяют его на две палаты, верхнюю и нижнюю. Со свойственным им высокомерием лорды сохраняют главенство за собой. «Если кто-либо из членов нижней палаты дерзнет неуважительно отозваться о палате лордов, он подлежит вызову в суд для наказания, вплоть до заключения в Тауэр». Такое же неравенство наблюдается и при подаче голосов. В палате лордов голосуют по одному, начиная с младшего барона, так называемого «меньшого пэра». Каждый пэр, голосуя, отвечает: «доволен» или «недоволен». В нижней палате голосуют одновременно, все сразу, отвечая просто: «да» или «нет». Палата общин обвиняет, палата пэров вершит суд. Пренебрегая цифрами, пэры поручают нижней палате, которая со временем обращает это себе на пользу, надзор за «шахматной доской», то есть за казначейством, получившим это название, по одной версии, от скатерти с изображением шахматной доски, а по другой – от ящиков старинного шкафа, где за железной решеткой хранилась казна английских королей. С конца тринадцатого века вводится ежегодный реестр – «Year-book». Во время войны Алой и Белой Розы лорды дают почувствовать свое влияние, становясь то на сторону Джона Гонта, герцога Ланкастерского, то на сторону Эдмунда, герцога йоркского. Уот Тайлер, лолларды, Уорик, «делатель королей», и все стихийные движения – эти зачаточные попытки добиться вольностей – имеют явной или тайной точкой опоры английский феодализм. Лорды не без пользы для себя ревниво следили за престолом; ревновать – значит не спускать с глаз; они ограничивают королевский произвол, сужают понятие измены королю, выставляют против Генриха IV лже-Ричардов, присваивают себе функции верховных судей, решают тяжбу о трех коронах между герцогом Йоркским и Маргаритой Анжуйской, в случае нужды сами снаряжают войска и с переменным успехом сражаются между собой, как это было при Шрусбери, Тьюксбери и Сент-Олбане. Уже в тринадцатом столетии они одержали победу при Льюисе и изгнали из королевства четырех братьев короля, побочных сыновей Изабеллы и графа Марча, за лихоимство и притеснение христиан при посредстве евреев; с одной стороны, это были принцы, с другой – обыкновенные мошенники; подобное сочетание довольно часто встречается и поныне, но в прежние времена оно не пользовалось уважением. До пятнадцатого века в короле Англии еще чувствуется нормандский герцог, и парламентские акты пишутся на французском языке; начиная с царствования Генриха VII эта акты, по настоянию лордов, пишутся уже на английском. Англия, бывшая бретонской при Утэре Пендрагоне, римской при Цезаре, саксонской при семивластии, датской при Гарольде, нормандской после Вильгельма, благодаря лордам становится, английской. Затем она делается англиканской. Собственная церковь – большая сила. Глава церкви, находящийся вне пределов страны, обескровливает ее. Всякая Мекка высасывает, как спрут. В 1534 году Лондон порывает с Римом, пэрство соглашается на реформацию, и лорды признают Лютера, – таков ответ на отлучение от церкви, состоявшееся в 1215 году. Генриху VIII это было на руку, но в других отношениях лорды его стесняли: они стояли перед, ним, как бульдог перед медведем. Кто стал грозно скалить зубы, когда Уолсей незаконно отнял Уайт-Холл у народа, а Генрих VIII отобрал его у Уолсея? – Четыре лорда: Дарси Чичестер, Сент-Джон Блетсо и (два нормандских имени) – Маунтжуа и Маунтигль. Король стремится захватить всю власть. Пэры урезывают ее. Преемственность власти в значительной мере обусловливает ее неподкупность: этим объясняется непокорность лордов. Даже при Елизавете бароны осмеливаются бунтовать. Это вызывает дерхемские казни. Юбка этой тиранки забрызгана кровью казненных. Плаха, скрытая под фижмами, – вот что такое царствование Елизаветы. Она созывает парламент как можно реже и ограничивает число лордов верхней палаты шестьюдесятью пятью, оставив в ней одного лишь маркиза Вестминстера и исключив всех герцогов. Впрочем, во Франции короли так же ревниво оберегали свою власть и ограничивали число пэров. При Генрихе III было только восемь герцогов-пэров; бароны де Мант, де Куси, де Куломье, де Шатонеф-Римере, де Ла Фер-Тарденуа, де Мортань и еще некоторые другие сохранили свое пэрское достоинство, к величайшему неудовольствию короля. В Англии короли охотно допускали вымирание пэрских родов; достаточно сказать, что при Анне число угасших с двенадцатого века пэрских родов дошло до шестидесяти пяти. Истребление герцогов, начало которому положила война Алой и Белой Розы, было довершено топором Марии Тюдор. Так обезглавили дворянство. Уничтожить герцога – значило лишить дворянство его главы. Политика, конечно, сама по себе недурная, но все же подкуп лучше убийства. Это прекрасно понял Иаков I. Он восстановил герцогское достоинство. Он сделал герцогом своего фаворита Вильерса, величавшего его «ваше свинство». Герцог-феодал превращается в герцога-придворного. Со временем их развелось несчетное множество. Карл II жалует герцогское достоинство двум своим любовницам – Барбаре Саутгемптон и Луизе Керуэл. При Анне насчитывается двадцать пять герцогов, из них три иностранца: Кемберленд, Кембридж и Шонберг. Имеет ли успех хитрость Иакова I? Нет. Палата лордов подозревает в этом происки и приходит в негодование. Она негодует на Иакова I, негодует и на Карла I, который, кстати говоря, быть может отчасти повинен в смерти своего отца, так же как Мария Медичи, быть может, повинна в смерти своего мужа. Между Карлом I и палатой лордов происходит разрыв. Лорды, которые при Иакове I привлекали к суду взяточничество в лице Бекона, при Карле I судят государственную измену в лице Страффорда. Они вынесли обвинительный приговор Бекону, они выносят его и Страффорду. Один потерял честь, другой – жизнь. Карл I обезглавлен в первый раз в лице Страффорда. Лорды оказывают поддержку нижней палате. Король созывает парламент в Оксфорде, революция созывает его в Лондоне; сорок три пэра принимают сторону короля, двадцать два – сторону республики. Приобщив таким образом народ к власти, лорды подготовляют почву для «Билля о правах», первоначального наброска «Декларации прав человека», – из глубины грядущего французская революция бросает бледную тень на революцию английскую.</p><p class="p1">Такова польза от сословия пэров. Пускай невольная. И дорого стоившая народу, ибо пэрство – чудовищный паразит. Но польза все же значительная. Все то, что имело место во Франции, – укрепление деспотизма при Людовике XI, Ришелье и Людовике XIV; установление чисто султанского режима; приниженность, выдаваемая за равенство; превращение скипетра в палку; всеобщий гнет, весь этот турецкий уклад миновали Англию именно благодаря лордам. Это они сделали из аристократии стену, которая, с одной стороны, сдерживала, точно плотиной, королевскую волю, с другой – защищала народ. Свое высокомерие по отношению к народу они искупают дерзостью по отношению к королю. Граф Саймон Лестер сказал в лицо Генриху III: «Король, ты солгал». Лорды навязывают короне ряд ограничений; они задевают чувствительное место короля – охоту. Всякий лорд, проезжая через королевский парк, имеет право убить в нем серну. Лорд чувствует себя как дома во дворце короля. Предусмотренная законом возможность заключения короля в Тауэр и определение ему в этом случае еженедельного содержания в размере двенадцати фунтов стерлингов, то есть не больше, чем пэру, – это дело палаты лордов. Мало того, ей же Англия обязана развенчанием ряда королей. Лорды лишили престола Иоанна Безземельного, свергли Эдуарда II, удалили Ричарда II, сломили Генриха VI и сделали возможным появление Кромвеля. Какой Людовик XIV таился в Карле II! Но Кромвель помешал ему развернуться. Кстати, упомянем мимоходом об одном обстоятельстве, на которое не обратил внимания ни один историк, а именно: Кромвель сам домогался пэрства; в этих целях он женился на Елизавете Борчир, родственнице и наследнице лорда Борчира, пэрство которого угасло в 1471 году, и другого Борчира, лорда Робсарта, род которого угас в 1429 году. Стараясь не отстать от событий, развивавшихся со страшной быстротой, Кромвель, однако, нашел, что проще прийти к власти, убрав короля, чем домогаясь от него пэрства.</p><p class="p1">Мрачный церемониал суда, установленный для лордов, распространился и на короля. Если король представал перед судом пэров, у него, как у обыкновенного лорда, по бокам стояли два вооруженных топорами тюремщика из Тауэра. На протяжении пяти веков древняя палата лордов упорно придерживалась одного и того же направления. Можно перечесть по пальцам те редкие случаи, когда ее подозрительность и настороженность ослабевали, как, например, в тот злополучный день, когда она позволила соблазнить себя присланное папой Юлием II галерой, груженной сырами, окороками и греческими винами. Английская аристократия была беспокойна, надменна, упряма, сурова и недоверчива. Именно она в конце XVII столетия десятым актом 1694 года лишила местечко Стокбридж в Саутгемптоне права представительства в парламенте и заставила палату общин кассировать выборы в этом местечке, запятнавшем себя приверженностью папистам. Это она предложила Иакову, герцогу йоркскому, принести присягу в отречении от католических догматов и устранила его от престолонаследия, когда он отказался. Правда, он все-таки стал королем, но лордам в конце концов удалось захватить его и изгнать из пределов страны. За долгий период своего существования английская аристократия не раз проявляла бессознательное тяготение к прогрессу. Она в какой-то мере была носительницей просвещения, правда за исключением последнего времени, то есть наших дней. При Иакове II она соблюдала в нижней палате определенную пропорцию между горожанами и дворянами, а именно – на триста сорок шесть горожан приходилось там девяносто два дворянина; шестнадцать баронов, представители от Пяти Портов, имели вполне достаточный противовес в лице пятидесяти граждан, депутатов от двадцати пяти городов. Несмотря на свое развращающее влияние и эгоизм, эта аристократия в некоторых случаях проявляла беспристрастие. Ее судят слишком строго. История относится снисходительно только к палате общин; это едва ли справедливо. Мы находим, что роль лордов весьма значительна. Олигархия – довольно первобытная форма независимости, но все-таки это независимость. Взять, например, Польшу, которая, будучи королевством по названию, в действительности являлась республикой. Английские пэры относились к престолу с подозрением и держали его под опекой. Во многих случаях лорды навлекали на себя королевскую немилость в большей мере, чем палата общин. Они нередко делали шах королю. Так, в достопамятном 1694 году билль о трехлетнем парламенте, отвергнутый палатой общин как неугодный Вильгельму III, был утвержден в палате пэров; Вильгельм III, придя в ярость, отнял у графа Бата замок Пенденнис и лишил виконта Мордаунта всех занимаемых им должностей. Палата лордов была своего рода Венецианской республикой в самом сердце королевской Англии. Низвести короля до уровня дожа – такова была ее цель, и она обогащала народ тем, что отнимала у короля.</p><p class="p1">Королевская власть сознавала это и ненавидела пэров. Обе стороны старались ослабить одна другую. Ущерб, наносимый ими друг другу, шел на пользу народу. Эти две слепые силы – монархия и олигархия – не замечали, что работают в интересах третьей – демократии. Как ликовал в прошлом столетии королевский двор, когда удалось повесить одного из пэров, лорда Ферерса!</p><p class="p1">Впрочем, отдавая дань учтивости, его повесили на шелковой веревке.</p><p class="p1">«Пэра Франции не повесили бы», – гордо заметил герцог Ришелье. Совершенно верно. Ему отрубили бы голову. Это еще учтивее. Монморанси-Танкервилл подписывался: «Пэр Франции и Англии», отодвигая, таким образом, английское пэрство на второе место. Французские пэры стояли выше английских, но были менее могущественны, так как дорожили титулом больше, чем действительной властью, и почетным первенством больше, чем фактическим господством. Между ними и английскими лордами была такая же разница, как между тщеславием и гордостью. Стоять выше чужестранных принцев, идти впереди испанских грандов во время церемоний, затмевать венецианских патрициев; сажать в парламенте на скамьи низших рядов маршалов Франции, коннетабля и адмирала Франции, хотя бы им был сам граф Тулузский, сын Людовика XIV; устанавливать различие между герцогством по мужской и женской линии, проводить грань между простым графством вроде Арманьякского или Альбретского и графством-пэрством вроде Эвре; носить чуть ли не в двадцатипятилетнем возрасте голубую орденскую ленту через плечо или орден Золотого Руна; противопоставлять герцогу де ла Тремуйль, старейшему пэру королевства, герцога д’Юзеса, старейшего пэра парламента; домогаться права иметь столько же пажей и запрягать в карету столько же лошадей, сколько полагалось немецкому курфюрсту; требовать, чтобы председатель государственного совета называл пэров «монсеньерами»; обсуждать вопрос; вправе ли герцог Мэнский, имеющий в качестве графа д’Э звание пэра с 1458 года, проходить через большой зал заседаний по диагонали или вдоль стен, – вот что было самым важным для пэров Франции. Английских лордов гораздо больше занимали вопросы о навигационном акте, о клятвенном отречении от католических догматов, об использовании Европы в интересах Англии, о господстве на морях, об изгнании Стюартов, о войне с Францией. Для первых главное – этикет, для вторых – подлинная власть. Пэры Англии захватили добычу, пэры Франции гонялись за призраком.</p><p class="p1">В общем, английская палата лордов сыграла существенную роль в истории цивилизации страны. Ей выпала честь основать нацию. Она явилась первым по времени воплощением народного единства. Сопротивление английского народа – эта мрачная, но могучая сила – зародилось в палате лордов. Рядом насилий над своим монархом бароны подготовили почву для окончательного низвержения королей. Нынешняя палата лордов сама несколько удивлена и огорчена тем, что она когда-то бессознательно и помимо своей воли совершила. Тем более что все это непоправимо. Что такое уступки? Восстановление в правах. И народы прекрасно понимают это. «Жалую», – говорит король. «Беру свое», – говорит народ. Думая добиться привилегий для пэров, палата лордов давала права гражданам. Аристократия подобна ястребу, высидевшему яйцо орла – свободу.</p><p class="p1">В наши дни это яйцо разбито, орел парит в облаках, ястреб издыхает.</p><p class="p1">Аристократия корчится в предсмертных судорогах, народ Англии растет.</p><p class="p1">Но будем справедливы к аристократии. Она удерживала королевскую власть в известных границах, она была ее противовесом. Она служила преградой для деспотизма; она была барьером.</p><p class="p1">Поблагодарим же ее и предадим земле.</p></span></span></span></span>
