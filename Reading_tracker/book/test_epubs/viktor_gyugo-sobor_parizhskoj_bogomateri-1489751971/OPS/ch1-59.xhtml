<p class="p">1. Южная оконечность Портленда</p>
</div><p class="p1">В продолжение всего декабря 1689 года и января 1690 года на европейском материке непрерывно дул упорный северный ветер, в особенности неистовствуя в Англии. Это он вызвал те страшные по своим последствиям холода, которые сделали эту зиму «памятной для бедных», как об этом записано на полях старинной Библии в пресвитерианской лондонской часовне Non Jurors<a href="ch2.xhtml#id51" class="a">[161]</a>. Благодаря исключительной прочности старинного королевского пергамента, употреблявшегося для официальных актов, длинные списки бедняков, найденных мертвыми от голода и холода, можно еще и теперь без труда разобрать во многих местных реестрах, особенно в приходских записях Клинк-Либерти-Корта в городке Саутворке, Пай-Паудер-Корта (что означает «Двор запыленных ног») и Уайт-Чепел-Корта в деревне Стэпней, где церковным ктитором был местный бальи. Темза стала, что случается реже одного раза в столетие, так как морские приливы препятствуют образованию на ней льда. По замерзшей реке ездили на повозках; на Темзе открылась ярмарка с палатками, с боями медведей и быков; тут же, на льду, зажарили целого быка. Такой толщины лед держался два месяца. Тяжелый 1690 год превзошел холодами даже знаменитые зимы начала семнадцатого века, тщательно изученные доктором Гедеоном Делоном, которого как аптекаря короля Иакова I город Лондон почтил постановкой памятника – бюста на цоколе.</p><p class="p1">Однажды вечером, к концу одного из самых морозных январских дней 1690 года, в одной из многочисленных негостеприимных бухточек Портлендского залива происходило нечто необычайное. Всполошившиеся чайки и морские гуси с криком кружились у входа в бухточку, не отваживаясь вернуться в нее.</p><p class="p1">В этой маленькой бухте, самой опасной из всех бухт залива, когда дуют некоторые ветры, а следовательно, самой пустынной и наиболее удобной для судов, укрывающихся от нежелательных взоров, почти вплотную к берегу – место было глубокое – стояло небольшое суденышко, причалившее к выступу скалы. Мы делаем ошибку, говоря: «ночь опускается на землю»; следовало бы говорить: «ночь поднимается от земли», ибо темнота надвигается на небо снизу. Внизу, у подножия скалы, уже наступила ночь; вверху был еще день. Если бы кто-нибудь подошел поближе к стоявшему на причале суденышку, он узнал бы в нем бискайскую урку.</p><p class="p1">Солнце, скрывавшееся весь день в тумане, только что село. В сердце уже начинало проникать то мрачное беспокойство, которое можно было бы назвать тоской по исчезнувшему светилу.</p><p class="p1">Ветер с моря улегся, и в бухте было тихо.</p><p class="p1">Это было счастливым исключением, в особенности зимой. Доступ в большинство портлендских бухт прегражден мелями. В бурную погоду волнение в них очень сильно, и нужны немалая ловкость и опыт, чтобы благополучно довести судно до берега. Эти крошечные гавани хороши только с виду, на самом же деле они сплошь и рядом оказывают дурную услугу. Войти в них опасно, выйти – страшно. Однако в этот вечер, вопреки обыкновению, бухта не таила в себе никакой угрозы.</p><p class="p1">Бискайская урка – старинное судно, вышедшее ныне из употребления. Этот тип судна, в свое время принесший известную пользу военному флоту, отличался крепким корпусом и по размерам соответствовал барке, а по прочности – кораблю. Урки входили в состав Армады; военные урки, правда, имели большое водоизмещение; так, «Большой грифон», капитанское судно, которым командовал Лопе де Медина, было вместимостью в шестьсот пятьдесят тонн и имело на борту сорок пушек; торговая же и контрабандистская урки были значительно меньших размеров. Моряки ценили и уважали это утлое суденышко. Тросы такелажа на нем были из пеньковых стренд, некоторые из них – со вплетенной внутрь железной проволокой, что свидетельствовало, быть может, о намерении, хотя научно и не совсем обоснованном, обеспечить правильное действие компаса при магнитных бурях; оснастка урки состояла не только из этих тонких тросов, но и из толстых перлиней, из кабрий испанских галер и камелов римских трирем. Румпель был очень длинным: это имело то преимущество, что увеличивалась сила рычага, но и ту дурную сторону, что уменьшался угол поворота; два шкива в двух шкивгатах на конце румпеля исправляли этот недостаток и до известной степени уменьшали потерю силы. Компас помещался в нактоузе правильной четырехугольной формы и сохранял устойчивое равновесие благодаря двум медным ободкам, вставленным один в другой и утвержденным горизонтально на маленьких стержнях, как в лампах Кардана. Конструкция урки свидетельствовала о том, что строитель ее обладал известными знаниями и смекалкой; но это были знания невежды и смекалка дикаря. Урка была так же примитивна по своему устройству, как прама и пирога; она обладала устойчивостью, первой и быстроходностью второй и, подобно всем судам, созданным инстинктом пирата и рыбака, отличалась высокими мореходными качествами. Такое судно было одинаково пригодно для плавания в закрытых и открытых морях; его чрезвычайно своеобразная парусная оснастка, включавшая в себя и стакселя, позволяла ему идти тихим ходом в закрытых бухтах Астурии, напоминающих собою бассейны, как, например, Пасахес, и полным ходом в открытом море; на нем можно было совершать путешествия и по озеру и вокруг света, – оригинальное судно, предназначенное для плавания и по спокойным водам пруда и по бурным океанским волнам. Среди кораблей урка была то же, что трясогузка среди пернатых – меньше всех и смелей всех; усевшись на камыш, трясогузка только чуть-чуть сгибает его, а вспорхнув – может перелететь через океан.</p><p class="p1">Бискайские урки, даже самые бедные, были позолочены и раскрашены. Такая татуировка совсем в духе басков, этого очаровательного, но несколько дикого народа. Чудесные краски Пиренейских гор, покрытых белым снегом и зелеными пастбищами, пробуждают в их обитателях неодолимую страсть ко всякого рода украшениям. Баски великолепны в своей нищете: над входом в их хижины намалеваны гербы; у них есть крупные ослы, которых они увешивают бубенцами, и рослые быки, которым они сооружают головной убор из перьев; их телеги, за две мили дающие знать о себе скрипом колес, всегда ярко расписаны, покрыты резьбою и убраны лентами. Над дверью башмачника – барельеф, высеченный из камня: изображение св. Крепина и башмак. Их куртки обшиты кожаным галуном, на изношенной одежде вместо заплат вышивка. Даже в минуты самого непосредственного веселья баски величавы. Они, подобно грекам, – дети солнца. В то время как сумрачный сын Валенсии набрасывает на голое тело рыжую шерстяную хламиду с отверстием для головы, жители Галисии и Бискайи наряжаются в красивые рубашки из выбеленного на росе холста. Из-за маисовых гирлянд в окнах и на порогах их хижин приветливо выглядывают белокурые головки и свежие личики. Жизнерадостная и гордая ясность духа находит свое отражение в их незамысловатом искусстве, в ремеслах, в обычаях, в нарядах их девушек, в их песнях. Каждая гора, эта исполинская растрескавшаяся лачуга, в Бискайе насквозь пронизана светом: солнечные лучи проникают во все ее расщелины. Суровый Хаискивель – сплошная идиллия. Бискайя – краса Пиренеев, как Савойя – краса Альп. В опасных бухтах, близ Сан-Себастьяна, Лесо и Фуэнтарабии, в бурную погоду, под небом, затянутым тучами, среди всплесков пены, перехлестывающей через скалы, среди яростных волн и воя ветра, среди ужаса и грохота можно увидеть лодочниц-перевозчиц в венках из роз. Кто хоть раз видел страну басков, тот захочет увидеть ее вновь. Благословенный край! Две жатвы в год, веселые, шумные деревни, горделивая бедность; по воскресеньям целый день звон гитар, пляска, кастаньеты; любовь, опрятные светлые хижины да аисты на колокольнях.</p><p class="p1">Но возвратимся в Портленд, к неприступной морской скале.</p><p class="p1">Полуостров Портленд на карте имеет вид птичьей головы, обращенной клювом к океану, а затылком к Уэймету; перешеек кажется горлом.</p><p class="p1">В наши дни Портленд, в ущерб своей первобытной прелести, стал промышленным центром. В середине восемнадцатого века на берегах Портленда появились каменоломни и печи для обжигания гипса. С той поры из портлендского мергеля вырабатывают так называемый романский цемент – весьма полезное производство, которое обогащает страну, но уродует ландшафт. Двести лет назад скалистые берега залива подмывало только море, теперь же их разрушает рука каменолома; волна отхватывает целые пласты, кирка откалывает лишь небольшие куски; пейзаж от этого сильно проигрывает. На смену величественному разгулу океана пришел кропотливый труд человека. Этот труд совершенно уничтожил маленькую бухту, в которой стояла на причале бискайская урка. Следы этой разрушенной гавани надо искать на восточном берегу полуострова, у самой его оконечности, по ту сторону Фолли-Пира и Дердл-Пайера, и даже дальше Уэкхема, между Черч-Хопом и Саутвелем.</p><p class="p1">Бухта, сжатая со всех сторон отвесными берегами, Превосходящими своей высотой ее ширину, с каждой минутой все больше погружалась в темноту; мутный туман, обычно подымающийся к ночи, все сгущался; становилось темно, как в глубоком колодце; узкий выход из бухты в море выделялся беловатой полоской на фоне почти ночного сумрака, оживленного мерным плеском прибоя. Только подойдя совсем близко, можно было заметить урку, причалившую к прибрежным скалам и как бы укрывшуюся огромным плащом их тени. С берегом ее соединяла доска, перекинутая с борта на низкий и плоский выступ утеса – единственное место, куда можно было поставить ногу; по этому шаткому мостику сновали во мраке черные фигуры, очевидно готовясь к отплытию.</p><p class="p1">Благодаря скале, возвышавшейся в северной части бухты; и игравшей роль заслона, здесь было теплее, чем в открытом море; тем не менее люди дрожали. Они торопились.</p><p class="p1">В сумерках очертания предметов кажутся как бы изваянными резцом. Можно было ясно различить лохмотья, служившие одеждой отъезжающим и свидетельствовавшие о том, что их обладатели принадлежат к разряду населения, именуемого в Англии the ragged, то есть оборванцами.</p><p class="p1">На фоне скалы смутно виднелись извивы узкой тропинки. Девушка, небрежно бросающая через спинку кресла корсет, длинные шнурки которого петлями спускаются до полу, сама того не подозревая, воспроизводит извивы горных троп. К площадке, с которой была переброшена доска на судно, вела зигзагами такая тропинка, скорее пригодная для коз, чем для человека. Дороги в скалах своею, крутизной способны испугать пешехода; с них легче скатиться, чем сойти; это не спуски, а обрывы. Тропинка, о которой идет речь, по всей вероятности была ответвлением какой-нибудь дороги, пролегавшей по равнине, но шла так отвесно, что на нее страшно было смотреть. Снизу было видно, как она ползет змеей к вершине утеса, а оттуда, через обвалы и через, расщелину в скале, выбирается на выше расположенное плато. Должно быть, по этой тропе спустились и люди, которых урка ожидала в бухте.</p><p class="p1">Кроме людей, торопливо готовящихся к отплытию, несомненно под влиянием страха и тревоги, в бухте никого не было; вокруг царили тишина и спокойствие. Не слышно было ни шума шагов, ни голосов, ни дуновения ветра. По ту сторону рейда, у входа в Рингстедскую бухту, можно было с трудом, разглядеть флотилию судов для ловли акул, сбившуюся, по всей видимости, с дороги. Прихотью моря эти полярные суда загнало сюда из датских вод. Северные ветры иногда подшучивают таким образом над рыбаками. Суда эти укрылись в Портлендской гавани, что было признаком надвигавшейся непогоды и опасности, угрожавшей в открытом море. Они намеревались стать на якорь. На однообразно белесом море четко выступал черный силуэт головного судна, стоявшего, по древнему обычаю норвежских флотилий, впереди остальных судов; виден был весь его такелаж, а на носу ясно можно было различить снаряды для ловли акул: всякого рода багры и гарпуны, предназначенные для охоты на seymnus glacialis, squalus acanthias и на squalus spinax niger<a href="ch2.xhtml#id49" class="a">[162]</a>, а также неводы для ловли крупного селаха. За исключением этих судов, теснившихся в одном углу гавани, на всем обширном горизонте Портленда не было ни живой души. Ни жилого строения, ни корабля. Побережье в ту пору было еще необитаемо, а рейд в это время года обычно пустовал.</p><p class="p1">Однако, что бы ни сулила им погода, люди, собиравшиеся отчалить на бискайской урке, судя по всему, и не думали откладывать свой отъезд. Они копошились на берегу и с озабоченным и растерянным видом быстро сновали взад и вперед. Отличить их друг от друга было трудно. Нельзя было и рассмотреть, стары они или молоды. Вечерние сумерки затушевывали и заволакивали их фигуры. Тень маской ложилась на лица. Во мраке вырисовывались только силуэты. Их было восемь, в том числе, вероятно, одна или две женщины, но они почти не отличались от мужчин: жалкие лохмотья, в которые все они были закутаны, не походили ни на мужскую, ни на женскую одежду. Отрепья не имеют пола.</p><p class="p1">Среди этих движущихся силуэтов был один поменьше. Он мог принадлежать карлику или ребенку.</p><p class="p1">Это был ребенок.</p></span><span id="id80"><div class="title6">
<p class="p">2. Брошенный</p>
</div><p class="p1">Присмотревшись поближе, можно было заметить следующее.</p><p class="p1">Все эти люди были в длинных плащах с капюшонами, рваных, в заплатах, но очень широких, закрывавших их в случае необходимости до самых глаз, одинаково защищавших и от непогоды, и от любопытных взоров. Плащи эти ничуть не стесняли их быстрых движений. У большинства из них вокруг головы был повязан платок – испанский головной убор, из которого потом образовалась чалма. В Англии этот убор не был редкостью. В ту пору Юг был на Севере в моде. Быть может, это происходило оттого, что Север побеждал Юг; восторжествовав над ним, он приносил ему дань восхищения. После разгрома Армады кастильское наречие стало считаться изысканнейшим языком при дворе Елизаветы. Говорить по-английски в покоях королевы Англии было почти неприличным. Перенимать, хотя бы отчасти, нравы тех, для кого он стал законодателем, сделалось обычаем, победителя-варвара по отношению к побежденному народу более высокой культуры; монголы внимательно присматривались к китайцам и подражали им. Вот почему и кастильские моды проникали в Англию, зато английские товары проложили себе дорогу в Испанию.</p><p class="p1">Один из группы, готовившейся к отплытию, имел вид главаря. Он был обут в альпаргатьи; его рваная одежда была разукрашена золотым галуном, а жилет, расшитый крупными блестками, отсвечивал из-под плаща, как рыбье брюхо. У другого широкополая шляпа, вроде сомбреро, была надвинута на самые глаза. В шляпе не было обычного отверстия для трубки; это указывало, что владелец ее – человек ученый.</p><p class="p1">Куртка взрослого человека может служить для ребенка плащом; по этой причине ребенок был закутан поверх отрепьев в матросскую парусиновую куртку, доходившую ему до колен. Судя по росту, это был мальчик лет десяти – одиннадцати. Он был бос.</p><p class="p1">Экипаж урки состоял из владельца судна и двух матросов.</p><p class="p1">Урка, по всей вероятности, пришла из Испании и возвращалась туда же. Совершая рейсы между двумя берегами, она, несомненно, выполняла какое-то тайное дело.</p><p class="p1">Люди, собиравшиеся отплыть на ней, переговаривались между собой шепотом.</p><p class="p1">Изъяснялись они на какой-то сложной смеси наречий. То слышалось испанское слово, то немецкое, то французское, порою – валлийское, порою – баскское. Это был язык простонародья, если не воровской жаргон.</p><p class="p1">Казалось, они принадлежали к разным нациям, но были членами одной шайки.</p><p class="p1">Экипаж судна, по всей видимости, состоял из их сообщников; и он принимал живое участие в приготовлениях к отплытию.</p><p class="p1">Этот разношерстный сброд можно было принять и за тесную приятельскую компанию и за шайку соумышленников.</p><p class="p1">Будь немного посветлее, можно было бы, вглядевшись пристальней, заметить на этих людях четки и ладанки, наполовину скрытые лохмотьями. На одной из этих фигур, в которой угадывалась женщина, четки почти не уступали величиною зерен четкам дервиша; в них нетрудно было узнать ирландские четки, какие носят в Ланимтефри, называемом также Ланандифри.</p><p class="p1">Если бы не было так темно, можно было бы также увидеть на носу урки позолоченную статую Богородицы с младенцем на руках. Это была, вероятно, баскская мадонна, нечто вроде панагии древних кантабров. Под этой фигурой, заменявшей обычное скульптурное украшение на носу корабля, висел фонарь, в эту минуту не зажженный: предосторожность, свидетельствовавшая о том, что эти люди хотели укрыться от посторонних взоров. Фонарь, вероятно, имел двойное назначение: когда его зажигали, он горел вместо свечи перед изображением Богоматери и в то же время освещал море, – он одновременно был судовым фонарем и церковным светильником.</p><p class="p1">Длинный, изогнутый и острый водорез, начинавшийся сразу под бушпритом, полумесяцем выдавался вперед. В самом верху водореза, у ног Богородицы, прислонившись к форштевню, стоял коленопреклоненный ангел со сложенными крыльями и смотрел на горизонт в подзорную трубу. Ангел был позолочен, так же как и Богоматерь.</p><p class="p1">В водорезе были проделаны отверстия и просветы, через которые проходила ударявшая волна; это было еще одним поводом украсить его позолотой и арабесками.</p><p class="p1">Под изображением Богородицы прописными золотыми буквами было выведено название судна: «Матутина», но его в эту минуту нельзя было прочесть из-за темноты.</p><p class="p1">У подножия утеса, сваленный как попало, лежал груз, который увозили с собою эти люди; по доске, служившей сходней, они быстро переправляли его с берега на судно. Мешки с сухарями, бочонок соленой трески, ящик с сухим бульоном, три бочки – одна с пресной водой, другая с солодом и третья со смолой, четыре или пять больших бутылей эля, старый, затянутый ремнями дорожный мешок, сундуки, баулы, тюк пакли для факелов и световых сигналов – таков был этот груз. У оборванцев были чемоданы, и это указывало на то, что они вели кочевой образ жизни. Бродяги вынуждены иметь кое-какой скарб; они порою и рады бы упорхнуть, как птицы, но не могут сделать этого, чтобы не остаться без средств к пропитанию. Каков бы ни был их кочевой промысел, им необходимо всюду таскать с собой орудия своего ремесла. И эти люди тоже не могли расстаться со своими пожитками, уже не однажды служившими им помехой.</p><p class="p1">Им, вероятно, нелегко было спустить ночью свой скарб к подножию скалы. Однако они спустили его, что доказывало решение немедленно покинуть эти края.</p><p class="p1">Они не теряли времени: шло беспрерывное движение с судна на берег и с берега на судно; все принимали участие в погрузке; один тащил мешок, другой ящик. Женщины – если они здесь были (об этом можно было только догадываться) – работали как и все остальные. Ребенка обременяли непосильной ношей.</p><p class="p1">Сомнительно, чтобы у ребенка были среди этих людей отец и мать. Никто к нему не обращался. Его заставляли работать – и только. Он производил впечатление не ребенка в своей семье, а раба среди чуждого ему племени. Он помогал всем, но никто с ним не заговаривал.</p><p class="p1">Впрочем, он тоже торопился и, подобно всей темной шайке, к которой он принадлежал, казалось, был поглощен одною только мыслью – поскорее уехать. Отдавал ли ребенок себе отчет в происходившем? Вероятно, нет. Он торопился бессознательно, видя, как торопятся другие.</p><p class="p1">Урка была палубным судном. Всю кладь быстро уложили в трюм, пора было выходить в открытое море. Последний ящик был уже поднят на палубу, оставалось только погрузить людей. Двое из них, чем-то напоминавшие женщин, уже были на борту; шестеро же, в том числе и ребенок, находились еще на нижнем уступе скалы. На судне началась суета, предшествующая отплытию; владелец урки взялся за руль, один из матросов схватил топор, чтобы обрубить причальный канат. Рубить канат – признак спешки: когда есть время, канат отвязывают. «Andamos»<a href="ch2.xhtml#id47" class="a">[163]</a>, – вполголоса произнес один из шести, одетый в лохмотья с блестками и казавшийся главарем. Ребенок стремительно кинулся к доске, чтобы взбежать первым. Но не успел он поставить на нее ногу, как к доске ринулись двое мужчин, едва не сбросив его в воду; за ними, отстранив ребенка плечом, прыгнул третий, четвертый оттолкнул его кулаком и последовал за третьим, пятый – это был главарь – одним прыжком очутился на борту и каблуком спихнул доску в воду; взмахнув топором, обрубили причал, руль повернулся, судно отчалило от берега – и ребенок остался на суше.</p></span><span id="id81"><div class="title6">
<p class="p">3. Один</p>
</div><p class="p1">Ребенок замер на скале, пристально глядя им вслед. Он даже не крикнул. Никого не позвал на помощь. Все, что произошло, было неожиданностью для него, но он не проронил ни звука. На корабле тоже царило молчание. Ни единого вопля не вырвалось у ребенка вслед этим людям, ни одного слова не сказали эти люди ему на прощанье. Обе стороны молча мирились с тем, что расстояние между ними возрастало с каждой минутой. Это напоминало расставание теней на берегу подземной реки Стикса. Ребенок, словно пригвожденный к скале, которую уже начал омывать прилив, смотрел на удалявшееся судно. Можно было подумать, что он понимает. Что именно? Что понимал он? Непостижимое.</p><p class="p1">Мгновение спустя урка достигла пролива, служившего выходом из бухты, и вошла в него. На светлом фоне неба над раздавшимися скалистыми массивами, между которыми, как между двумя стенами, извивался пролив, еще виднелась верхушка мачты. Некоторое время она скользила над скалами, затем, точно врезавшись в них, совершенно пропала из виду. Все было кончено. Урка вышла в море.</p><p class="p1">Ребенок следил за ее исчезновением.</p><p class="p1">Он был удивлен, он что-то обдумывал.</p><p class="p1">К чувству недоумения, которое он испытывал, присоединялось какое-то мрачное сознание действительности. Казалось, это существо, лишь недавно вступившее в жизнь, уже обладает каким-то опытом. Быть может, в нем уже пробуждался судья? Иногда, под влиянием слишком ранних испытаний, в тайниках детской души возникает нечто вроде весов, грозных весов, на которых эта беспомощная детская душа взвешивает деяния Бога.</p><p class="p1">Не сознавая за собой никакой вины, он безропотно принял совершившееся. Ни малейшей жалобы. Безупречный не упрекает.</p><p class="p1">Неожиданное изгнание, которому его подвергли, не вызвало у него ни одного движения. Внутренне он словно окаменел. Но ребенок не склонился под неожиданным ударом судьбы, как будто желавшей положить конец его существованию на самой заре его жизни. Он мужественно вынес этот удар.</p><p class="p1">Всякому, кто увидел бы его изумление, в котором не было ничего общего с отчаянием, стало бы ясно, что среди этих бросивших его людей никто не любил его и никто не был им любим.</p><p class="p1">Погруженный в раздумье, он забыл про стужу. Вдруг волной ему залило ноги: нарастал прилив; холодное дыхание коснулось его волос; поднимался северный ветер. Он вздрогнул. Дрожь охватила его с ног до головы – он очнулся.</p><p class="p1">Он посмотрел вокруг.</p><p class="p1">Он был один.</p><p class="p1">До этого дня для него во всем мире не существовало других людей, кроме тех, которые в эту минуту находились на урке. Эти люди только что скрылись.</p><p class="p1">Добавим, что, как это ни странно, единственные люди, которых он знал, были ему неизвестны.</p><p class="p1">Он не мог бы сказать, кто они такие.</p><p class="p1">Его детство протекло среди них, но он не сознавал себя принадлежащим к их среде. Он жил бок о бок с ними, только и всего.</p><p class="p1">Теперь они покинули его.</p><p class="p1">У него не было ни денег, ни обуви, лохмотья едва прикрывали его тело, в кармане не было ни куска хлеба.</p><p class="p1">Стояла зима. Был вечер. Чтобы добраться до человеческого жилья, надо было пройти несколько лье.</p><p class="p1">Ребенок не знал, где он.</p><p class="p1">Он ничего не знал, кроме того, что люди, пришедшие с ним на берег моря, уехали без него.</p><p class="p1">Он почувствовал себя выброшенным из жизни.</p><p class="p1">Он почувствовал, что теряет мужество.</p><p class="p1">Ему было десять лет.</p><p class="p1">Ребенок был в пустыне, между бездной, откуда поднималась ночь, и бездной, откуда доносился рокот волн.</p><p class="p1">Он поднял худые ручонки, потянулся и зевнул.</p><p class="p1">Затем резким движением, как человек, сделавший окончательный выбор, он вдруг стряхнул с себя оцепенение и с проворством белки или, быть может, клоуна повернулся спиной к бухте и смело стал карабкаться вверх по скале. Он стал взбираться по тропинке, потом сошел с нее, но снова на нее вернулся, полный решимости. Он торопился теперь уйти отсюда. Можно было подумать, что у него есть определенное намерение. Между тем он сам не знал, куда идет.</p><p class="p1">Он спешил без цели; это было какое-то бегство от судьбы.</p><p class="p1">Человеку свойственно подниматься, животному – карабкаться; он и поднимался и карабкался. Портлендские скалы своими отвесными склонами обращены к югу, и на тропинках почти совсем не было снега. Однако сильный мороз превратил и этот снег в ледяную пыль, идти было очень скользко. Но ребенок продолжал идти. Надетая на нем куртка взрослого человека была ему слишком широка и стесняла движения. Он часто натыкался на обледенелые бугры или попадал в расщелины утеса и падал. Иногда он несколько мгновений висел над пропастью, уцепившись за сухую ветку или за выступ скалы. Один раз он ступил на жилу крапчатого мрамора, который внезапно осыпался под ним, увлекая его за собой. Такие обвалы довольно опасны. Несколько секунд ребенок скользил вниз, как черепица по крыше; он скатился до самого края пропасти и спасся только тем, что во-время ухватился за кустик сухой травы. Он не вскрикнул при виде бездны, как не вскрикнул, увидев, что люди бросили его; он собрался с силами и снова молча стал карабкаться вверх. Склон был очень высок. Ребенку еще не раз пришлось преодолевать такие препятствия. В темноте пропасть казалась бездонной. Отвесной скале не было конца. Она как будто все отступала, исчезая где-то вверху. По мере того как он поднимался, утес, казалось, вырастал. Продолжая карабкаться, ребенок вглядывался в черный карниз, точно преграда стоявший между ним и небом. Наконец он достиг вершины.</p><p class="p1">Он прыгнул на площадку. Можно было бы сказать: он ступил на землю, ибо он выбрался из бездны.</p><p class="p1">Едва он очутился наверху, как его охватила дрожь. Точно острое жало ночи, почувствовал он на своем лице ледяное дыхание зимы. Дул резкий северо-западный ветер. Ребенок плотнее запахнул на груди парусиновую матросскую куртку.</p><p class="p1">Это была хорошая, плотная одежда. Моряки называют ее «непромокайкой», потому что такая куртка не боится дождей.</p><p class="p1">Добравшись до верхней площадки, ребенок остановился; он твердо стал босыми ногами на мерзлую почву и оглянулся вокруг.</p><p class="p1">Позади него – море, впереди – земля, над головою – небо.</p><p class="p1">Но небо было беззвездно. Густой туман скрывал от глаз небесный свод.</p><p class="p1">С вершины утеса он увидел перед собою землю и стал всматриваться в даль. Перед ним расстилалось бескрайное, плоское и обледенелое, покрытое снегом плоскогорье. Кое-где вздрагивали на ветру кустики вереска. Ни следа дороги. Ничего. Не было даже хижины пастуха. В нескольких местах кружились беловатые спирали снежной пыли, вихрем уносившейся ввысь. Волнообразная гряда холмов, пропадая в тумане, сливалась с горизонтом. Огромная голая равнина исчезала в белесой мгле. Глубокое безмолвие. Все вокруг казалось беспредельным и молчало, как могила.</p><p class="p1">Ребенок обернулся к морю.</p><p class="p1">Море, как и земля, было сплошь белое: земля – от снега, море – от пены. Трудно представить себе что-либо более печальное, чем отсветы, порожденные этой двойной белизной. Иногда световые эффекты ночного пейзажа отличаются замечательной определенностью: море казалось стальным, утесы – изваянными из черного дерева.</p><p class="p1">С высоты, где находился ребенок, Портлендский залив, тускло мерцавший среди полукружия утесов, имел почти тот же вид, что и на географической карте; было нечто фантастическое в этой ночной картине; это напоминало серп луны, кажущийся иногда темнее, чем, охватываемый им округлый клочок неба. На всем берегу, от одного мыса до другого, не было ни одного огонька, указывающего на близость горящего очага, ни одного освещенного окна, ни одного человеческого жилища. Густая тьма и на земле и на небе; ни одного светильника внизу, ни одной звезды наверху. Кое-где широкая гладь залива внезапно вздымалась волнами. Ветер возмущал и морщил эту водную пелену. В заливе была еще видна уходившая на всех парусах урка.</p><p class="p1">Теперь это был черный треугольник, скользивший по бледно-свинцовой поверхности.</p><p class="p1">Вдали, в зловещем полумраке беспредельности, волновалось водное пространство.</p><p class="p1">«Матутина» быстро убегала. Она уменьшалась с каждой минутой. Нет ничего быстрее исчезновения судна в морской дали. Вскоре на носу урки зажегся фонарь; вероятно, сгущавшаяся вокруг нее темнота побудила кормчего осветить волны. Эта блестящая точка, мерцание которой заметно было издалека, сообщала что-то зловещее высокому и длинному силуэту судна. Оно было похоже на блуждающее по морю привидение в саване, со звездою в руке.</p><p class="p1">В воздухе чувствовалось приближение бури. Ребенок не отдавал себе в этом отчета, но будь на его месте моряк, он содрогнулся бы. Это была минута того тревожного предчувствия, когда кажется, будто стихии станут сейчас живыми существами и на наших глазах произойдет таинственное превращение ветра в ураган. Море разольется в океан, слепые силы природы преобразятся в волю, и то, что мы принимаем за вещь, окажется наделенным душою. Кажется, что все это предстоит увидеть воочию. Вот чем объясняется наш ужас. Душа человека страшится встречи с душою Вселенной.</p><p class="p1">Еще минута – и все будет объято хаосом. Ветер, разгоняя туман и нагромождая на заднем плане тучи, устанавливал декорации ужасной драмы, действующими лицами которой являются морские волны, и зима и которая называется снежной бурей.</p></span><span id="id82"><div class="title6">
<p class="p">4. Вопросы</p>
</div><p class="p1">Что же это была за шайка, которая, бросив ребенка, спасалась бегством?</p><p class="p1">Быть может, то были компрачикосы?</p><p class="p1">Выше мы обстоятельно изложили, какие меры принимались Вильгельмом III с одобрения парламента против преступников обоего пола, именуемых компрачикосами, компрапекеньосами и чейласами.</p><p class="p1">Некоторые законодательные акты вызывают настоящую панику. Закон, направленный против компрачикосов, обратил в повальное бегство не только их самих, но и всякого рода бродяг. Они наперебой спешили скрыться и покинуть берега Англии. Большинство компрачикосов вернулись в Испанию. Среди них, как мы уже упоминали, было много басков.</p><p class="p1">Закон, взявший на себя защиту детей, имел на первых порах довольно странные последствия: сразу же возросло число брошенных детей.</p><p class="p1">Немедленно после обнародования этого уголовного статута появилось много найденышей, то есть подкинутых детей. Дело объяснялось крайне просто. Всякая бродячая шайка, в которой был ребенок, навлекала на себя подозрений; уже самый факт наличия ребенка в ее среде становился уликой против нее. «Это, по всей вероятности, компрачикосы» – такова была первая мысль, приходившая в голову шерифу, прево, констеблю. Затем начинались аресты и допросы. Обыкновенные нищие, которых нужда заставляла скитаться и просить подаяния, дрожали от страха, что их могут принять за компрачикосов, хотя они не имели с ними ничего общего; но бедняк никогда не огражден от возможных ошибок правосудия. Кроме того, бродячие семьи живут в постоянной тревоге. Компрачикосов обвиняли в том, что они промышляют покупкой и продажей чужих детей. Но нищета и сопряженные с нею бедствия создают иногда условия, при которых отцу и матери бывает трудно доказать, что ребенок, находящийся при них, – их родное дитя. Откуда у вас этот ребенок? Как доказать, что он – твой? Иметь при себе ребенка становилось опасно; от него старались отделаться. Бежать без него было много легче. Взвесив все, отец и мать оставляли ребенка в лесу или на берегу моря, а то и просто бросали его в колодец.</p><p class="p1">В водоемах находили утопленных детей.</p><p class="p1">Прибавим, что компрачикосов, по примеру Англии, стали преследовать по всей Европе. Первый толчок к гонению на них был дан. Во всяком деле главное – почин. Теперь полиция всех стран стала состязаться в погоне за компрачикосами, и испанские альгвазилы выслеживали их с не меньшим рвением, чем английские констебли. Всего двадцать три года назад можно было прочитать на камне у ворот Отеро неудобопереводимую надпись – закон в выборе выражений не стесняется, – из которой явствовало, что в отношении кары между покупателями и похитителями детей проводилась резкая грань. Вот эта надпись на несколько варварском кастильском наречии: «Aqui quedan las orejas de los comprachicos, у las bolsas de los robaniños, mientras que se van ellos al trabajo de mar».</p><p class="p1">Мы видим, что отрезание ушей и прочее отнюдь не избавляло от ссылки на галеры. Такие меры вызвали паническое бегство всякого рода бродяг. Они удирали в испуге и добирались до места, дрожа от страха. На всем побережье Европы прибывающих беглецов выслеживала полиция. Ни одна шайка не желала везти с собой ребенка, потому что высадиться с ним был делом опасным.</p><p class="p1">Гораздо легче было сбыть ребенка с рук.</p><p class="p1">Кем же был покинут ребенок, которого мы только что видели на сумрачном пустынном берегу Портленда?</p><p class="p1">Судя по всему, компрачикосами.</p></span><span id="id83"><div class="title6">
<p class="p">5. Дерево, изобретенное людьми</p>
</div><p class="p1">Было, вероятно, около семи часов вечера. Ветер убывал – признак того, что он скоро должен был снова усилиться. Ребенок находился на краю плоскогорья южной оконечности Портленда.</p><p class="p1">Портленд – полуостров. Но ребенок не знал, что такое полуостров, и даже не слыхал слова «Портленд». Он знал только одно: что можно идти до тех пор, пока не свалишься. Представление об окружающем служит нам вожатым; у ребенка не было этого представления. Они привели его сюда и бросили здесь. «Они» и «здесь» – в этих двух загадочных словах заключалась вся его судьба: «они» – это был весь человеческий род, «здесь» – вся Вселенная. Здесь, в этом мире, у него не было никакой иной точки опоры, кроме клочка земли, по которому ступали теперь его босые ноги, – такой каменистой и такой холодной земли. Что ожидало этого ребенка в огромном сумрачном мире, открытом всем ветрам? Ничто.</p><p class="p1">Он шел навстречу этому Ничто.</p><p class="p1">Вокруг него простирались безлюдные места. Вокруг него простиралась пустыня.</p><p class="p1">Он пересек по диагонали первую площадку, затем вторую, третью… В конце каждой площадки ребенок наталкивался на обрыв; спуск бывал иногда очень крутым, но всегда коротким. Высокие голые равнины оконечности Портленда похожи на огромные плиты, наполовину налегающие одна на другую, подобно ступеням лестницы; южным краем каждая площадка плоскогорья как бы уходила под верхнюю равнину, возвышаясь северным краем над нижней. Эти уступы ребенок преодолевал без труда. Время от времени он замедлял шаг и, казалось, советовался сам с собою. Становилось все темнее, пространство, на котором можно было что-то различить, все сокращалось, и ребенок теперь мог видеть только в нескольких шагах от себя.</p><p class="p1">Вдруг он остановился, на минуту прислушался, еле заметно с удовлетворением, кивнул головой, быстро повернулся и направился к небольшой возвышенности, смутно вырисовывавшейся справа, в том конце равнины, который примыкал к скале. На этой возвышенности виднелись смутные очертания чего-то, казавшегося в тумане деревом. Оттуда и слышал он только что шум, не похожий ни на шум ветра, ни на шум моря. Это не был также и крик животного. Ребенок решил, что там кто-то есть.</p><p class="p1">Сделав несколько шагов, он очутился у подножия холма.</p><p class="p1">Там действительно кто-то был.</p><p class="p1">То, что издали смутно виднелось на вершине холма, теперь вырисовывалось вполне отчетливо.</p><p class="p1">Это было нечто, похожее на огромную руку, торчавшую прямо из земли. Кисть руки была согнута в горизонтальном направлении, и вытянутый вперед указательный палец подпирался снизу большим. Мнимая рука с указательным и большим пальцами приняла на фоне неба очертания угломера. От того места, где соединялись эти странные пальцы, свешивалось что-то вроде веревки, на которой болтался какой-то черный бесформенный предмет. Веревка, раскачиваемая ветром, издавала звук, напоминавший звон цепей.</p><p class="p1">Этот звук и слышал ребенок.</p><p class="p1">Вблизи веревка оказалась цепью, как и можно было предположить по ее лязгу, – корабельной цепью из крупных стальных звеньев.</p><p class="p1">В силу таинственного закона слияния впечатлений, который во всей природе как бы наслаивает кажущееся на действительное, все здесь – место, время, туман, мрачное море, смутные образы, возникавшие на самом краю горизонта, – сочеталось с этим силуэтом и сообщало ему чудовищные размеры.</p><p class="p1">Бесформенный предмет, висевший на цепи, имел сходство с футляром. Он был спеленут, как младенец, но длиною равнялся росту взрослого человека. В верхней части его виднелось что-то круглое, вокруг чего обвивался конец цепи. Внизу футляр был разодран, и из него торчали лишенные мяса кости.</p><p class="p1">Легкий ветерок колыхал цепь, и то, что висело на ней, тихо покачивалось из стороны в сторону. Эта безжизненная масса подчинялась малейшим колебаниям воздуха; в ней было нечто, внушавшее панический страх; ужас, обычно изменяющий действительные пропорции предмета, скрадывал его истинные размеры, сохраняя лишь его контуры; это был сгусток мрака, принявший какие-то очертания; тьма была кругом, тьма была внутри; она вобрала в себя нараставшую вокруг нее могильную жуть; сумерки, восходы луны, исчезновения созвездий за утесами, сдвиги воздушных пространств, тучи, роза ветров – все в конце концов вошло в состав этого призрака; этот обрубок, висевший в воздухе, своим безличием походил на морскую даль и на небо, и мрак поглощал последние черты того, что было некогда человеком.</p><p class="p1">Это было нечто, ставшее ничем.</p><p class="p1">Превратиться в останки – для обозначения этого состояния в человеческом языке нет надлежащих слов. Не жить и вместе с тем продолжать существовать, находиться в бездне и в то же время вне ее, умереть и не быть поглощенным смертью – во всем этом, несмотря на несомненную реальность, есть что-то неестественное и потому невыразимое. Это существо – можно ли было назвать его существом? – этот черный призрак был останками, и притом останками ужасающими. Останками чего? Прежде всего природы, а затем общества. Это было ничто и все.</p><p class="p1">Он находился здесь во власти безжалостных стихий. Глубокое забвение пустыни окружало его. Он был оставлен на произвол неведомого. Он был беззащитен против мрака, который делал с ним все, что хотел. Он должен был терпеть все. И он терпел. Ураганы обрушивались на него. Мрачная задача, выполняемая ветрами!</p><p class="p1">Этот призрак был здесь добычей всех разрушительных сил. Его обрекали на чудовищную участь – разлагаться на открытом воздухе. Для него не существовало закона погребения. Он подвергся уничтожению, но не обрел вечного покоя. Летом он покрывался слоем, пыли, осенью обрастал корою грязи. Смерть должна быть прикрыта покровом, могила – стыдливостью. Здесь не было стыдливости, не было покрова. Гниение, цинично открытое взору каждого. Есть что-то бесстыдное в зрелище смерти, орудующей на глазах у всех. Она наносит оскорбление безмятежному спокойствию небытия, работая вне своей лаборатории – вне могилы.</p><p class="p1">Этот труп был выпотрошен. В его костях уже не было мозга, в его животе не было внутренностей, в его гортани не было голоса. Труп – это карман, который смерть выворачивает наизнанку и вытряхивает. Если у него когда-либо было свое «я», где оно было теперь? Быть может, еще здесь, – страшно подумать. Что-то, витающее вокруг чего-то, прикованного к цепи. Можно ли представить себе во мраке образ более скорбный?</p><p class="p1">На земле существуют явления, открывающие какой-то доступ к неведомому; мысль ищет выхода в этом направлении, и сюда же устремляется гипотеза. Догадка имеет свое compelle intrare<a href="ch2.xhtml#id45" class="a">[164]</a>. В иных местах и перед иными предметами мы невольно останавливаемся в раздумье и пытаемся проникнуть в их сущность. Иногда мы наталкиваемся на полуоткрытую неосвещенную дверь в неведомый мир. Кого не навел бы на размышления вид этого мертвеца?</p><p class="p1">Огромная сила распада бесшумно подтачивала этот труп. В нем была кровь – ее выпили, на нем была кожа – ее изглодали, было мясо – его растащили по кускам. Ничто не прошло мимо, не взяв у него чего-нибудь. Декабрь позаимствовал у него холод его тела, полночь – ужас, железо – ржавчину, чума – миазмы, цветок – запахи. Его медленное разложение было пошлиной, которую труп платил шквалу, дождю, росе, пресмыкающимся, птицам. Все темные руки ночи обшарили этого мертвеца.</p><p class="p1">Это был странный обитатель ночи. Он находился на холме посреди равнины, и в то же время его там не было. Он был доступен осязанию и вместе с тем не существовал. Он был тенью, дополнявшей ночную тьму. Когда угасал дневной свет, он зловеще сливался со всем окружающим в беспредельном безмолвии ночи. Одно его присутствие здесь усиливало мрачную ярость бури и спокойствие звезд. Все то невыразимое, что есть в пустыне, было, как в фокусе, сосредоточено в нем. Жертва неведомого рока, он усугублял собою угрюмое молчание ночи. Его тайна смутно отражала в себе все, что есть загадочного в мире.</p><p class="p1">Близ него чувствовалось как бы убывание жизни, уходящей куда-то в бездну. Все в окружавшем его пространстве утрачивало постепенно спокойствие и уверенность в себе. Трепет кустарников и трав, безнадежная грусть, мучительная тревога, которая, казалось, находила свое оправдание, – все это трагически сближало пейзаж с черной фигурой, висевшей на цепи. Присутствие призрака в поле зрения отягчает одиночество.</p><p class="p1">Он был лишь призраком. Колеблемый никогда не утихавшими ветрами, он был неумолим. Вечная дрожь делала его ужасным. Он казался – страшно вымолвить – средоточием окружавшего пространства и служил опорой чему-то необъятному. Чему? Как знать? Быть может, той неясно сознаваемой и оскорбляемой нами справедливости, которая выше нашего правосудия. В его пребывании вне могилы была месть людей и его собственная месть. В этой сумрачной пустыне он выступал как грозный свидетель. Для того чтобы мертвая материя вызывала в нас тревогу, она в свое время должна была быть одухотворена. Он обличал закон земной перед лицом закона небесного. Повешенный здесь людьми, он ожидал Бога. Над ним, принимая расплывчато-извилистые очертания туч и волн, реяли исполинские видения мрака.</p><p class="p1">За этим призраком стояла какая-то непроницаемая, роковая преграда. Этого мертвеца окружала беспредельность, не оживляемая ничем – ни деревом, ни кровлей, ни прохожим. Когда перед нашим взором смутно возникают тайны бытия – небо, бездна, жизнь, могила, вечность, – в такие мгновения все ощущается нами как нечто недоступное, запретное, огражденное от нас стеной. Когда разверзается бесконечность, все двери в мир оказываются запертыми.</p></span></span></span></span>
