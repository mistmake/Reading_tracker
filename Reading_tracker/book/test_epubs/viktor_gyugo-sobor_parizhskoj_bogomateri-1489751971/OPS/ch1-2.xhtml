<p class="p">Предисловие к публикации перевода романа В. Гюго «Собор Парижской Богоматери»</p>
<p class="p">Ф. М. Достоевский</p>
</div><p class="p1">«Le laid, c’est le beau»<a href="ch2.xhtml#id67" class="a">[1]</a> – вот формула, под которую лет тридцать тому назад самодовольная ратина думала подвести мысль о направлении таланта Виктора Гюго, ложно поняв и ложно передав публике то, что сам Виктор Гюго писал для истолкования своей мысли. Надо признаться, впрочем, что он и сам был виноват в насмешках врагов своих, потому что оправдывался очень темно и заносчиво и истолковывал себя довольно бестолково. И однако ж нападки и насмешки давно исчезли, а имя Виктора Гюго не умирает, и недавно, с лишком тридцать лет спустя после появление его романа «Notre Dame de Paris»<a href="ch2.xhtml#id66" class="a">[2]</a>, явились «Les Misérables»<a href="ch2.xhtml#id65" class="a">[3]</a>, роман, в котором великий поэт и гражданин выказал столько таланта, выразил основную мысль своей поэзии в такой художественной полноте, что весь свет облетело его произведение, все прочли его, и чарующее впечатление романа полное и всеобщее. Давно уже догадались, что не глупой карикатурной формулой, приведенной нами выше, характеризуется мысль Виктора Гюго. Его мысль есть основная мысль всего искусства девятнадцатого столетия, и этой мысли Виктор Гюго как художник был чуть ли не первым провозвестником. Это мысль христианская и высоконравственная, формула ее – восстановление погибшего человека, задавленного несправедливо гнетом обстоятельств, застоя веков и общественных предрассудков. Эта мысль – оправдание униженных и всеми отринутых парий общества. Конечно, аллегория немыслима в таком художественном произведении, как, например, «Notre Dame de Paris». Но кому не придет в голову, что Квазимодо есть олицетворение пригнетенного и презираемого средневекового народа французского, глухого и обезображенного, одаренного только страшной физической силой, но в котором просыпается наконец любовь и жажда справедливости, а вместе с ними и сознание своей правды и еще непочатых, бесконечных сил своих.</p><p class="p1">Виктор Гюго чуть ли не главный провозвестник этой идеи <em>«восстановления» </em>в литературе нашего века. По крайней мере он первый заявил эту идею с такой художественной силой в искусстве. Конечно, она не есть изобретение одного Виктора Гюго; напротив, по убеждению нашему, она есть неотъемлемая принадлежность и, может быть, историческая необходимость девятнадцатого столетия, хотя, впрочем, принято обвинять наше столетие, что оно после великих образцов прошлого времени не внесло ничего нового в литературу и в искусство. Это глубоко несправедливо. Проследите все европейские литературы нашего века, и вы увидите во всех следы той же идеи, и, может быть, хоть к концу-то века она воплотится наконец вся, целиком, ясно и могущественно, в каком-нибудь таком великом произведении искусства, что выразит стремления и характеристику своего времени так же полно и вековечно, как, например, «Божественная комедия» выразила свою эпоху средневековых католических верований и идеалов.</p><p class="p1">Виктор Гюго, бесспорно, сильнейший талант, явившийся в девятнадцатом столетии во Франции. Идея его пошла в ход; даже форма теперешнего романа французского чуть ли не принадлежит ему одному. Даже его огромные недостатки повторились чуть ли не у всех последующих французских романистов. Теперь, при всеобщем, почти всемирном успехе «Les Misérables», нам пришло в голову, что роман «Notre Dame de Paris» по каким-то причинам не переведен еще на русский язык, на котором уже так много переведено европейского. Слова нет, что его все прочли на французском языке у нас и прежде; но, во-первых, рассудили мы, прочли только знавшие французский язык, во-вторых – едва ли прочли и все знавшие по-французски, в-третьих – прочли очень давно, а в-четвертых – и прежде-то, и тридцать-то лет назад, масса публики, читающей по-французски, была очень невелика сравнительно с теми, которые и рады бы читать, да по-французски не умели. А теперь масса читателей, может быть, в десять раз увеличилась против той, что была тридцать лет назад. Наконец – и главное – все это было уже очень давно. Теперешнее же поколение вряд ли перечитывает старое. Мы даже думаем, что роман Виктора Гюго теперешнему поколению читателей очень мало известен. Вот почему мы и решились перевесть в нашем журнале вещь гениальную, могучую, чтоб познакомить нашу публику с замечательнейшим произведением французской литературы нашего века. Мы даже думаем, что тридцать лет – такое расстояние, что даже и читавшим роман в свое время может быть не слишком отяготительно будет перечесть его в другой раз.</p><p class="p1">Итак, надеемся, что публика на нас не посетует за то, что мы предлагаем ей вещь так всем известную… <em>по названью.</em></p></span>
