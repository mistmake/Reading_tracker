<p class="p">Человек, который смеется</p>
</div><div class="epigraph">
<p class="p1">В Англии все величественно, даже дурное, даже олигархия. Английский патрициат – патрициат в полном смысле этого слова. Нигде не было феодального строя более блестящего, более жестокого и более живучего, чем в Англии. Правда, в свое время он оказался полезен. Именно в Англии надо изучать феодальное право, подобно тому как королевскую власть надо изучать во Франции.</p>
<p class="p1">Книгу эту, собственно, следовало бы озаглавить «Аристократия». Другую, которая явится ее продолжением, можно будет назвать «Монархия». Обе они, если только автору суждено завершить этот труд, будут предшествовать третьей, которая замкнет собою весь цикл и будет озаглавлена «Девяносто третий год».</p>
<p class="text-author"><em>Отвиль-Хауз, 1869</em></p>
</div></span>
