<span><span><span><p class="p1">– Как вам угодно, монсеньор. Берите меня, берите. Пытка! Я согласна! Ведите меня, скорее, скорей! Идем сейчас же.</p><p class="p1">«Тем временем дочь моя успеет убежать», – подумала она.</p><p class="p1">– Черт возьми! – удивился Тристан. – Она так и рвется в застенок. Никак не разберешь этой полоумной.</p><p class="p1">Тут из рядов выступил старый седой сержант, служивший в ночной страже, и обратился к Тристану:</p><p class="p1">– Она и впрямь полоумная, монсеньор. Если она выпустила цыганку, то не по своей вине, потому что она ненавидит цыганок. Вот уж пятнадцать лет, как я хожу дозорным, и каждый вечер слышу, как она осыпает цыганок всяческими проклятиями. А если та, которую мы ищем, как я предполагаю, маленькая плясунья с козой, то ту она особенно ненавидит.</p><p class="p1">Гудула сделала над собой усилие и проговорила:</p><p class="p1">– Да, да, – эту особенно.</p><p class="p1">Остальные солдаты единодушно подтвердили слова старого сержанта. Тристан Пустынник, потеряв надежду добиться толку от затворницы, повернулся к ней спиной, и она с невыразимым замиранием сердца смотрела, как он направился к своей лошади.</p><p class="p1">– Трогай! – приказал он сквозь зубы. – Надо продолжать поиски. Я не усну, пока цыганка не будет повешена.</p><p class="p1">Подойдя к лошади, он на минуту остановился в нерешительности. Гудула – ни жива ни мертва – наблюдала за тем, как он окидывал площадь беспокойным взором охотничьей собаки, чующей близость зверя и не решающейся уходить. Наконец он тряхнул головой и вскочил в седло. Страшная тяжесть, давившая сердце Гудулы, скатилась, и она прошептала, оглянувшись на дочь, на которую до сих пор ни разу не решалась взглянуть:</p><p class="p1">– Спасена!</p><p class="p1">Несчастное дитя все это время просидело в своем углу, притаившись, не дыша, не шевелясь, ожидая смерти каждую минуту. Она слышала весь разговор Тристана с Гудулой, и все треволнения, испытанные ее матерью, переживались и ею. Она слышала, как трещит тонкая нить, на которой она висела над бездной, двадцать раз ей казалось, что нить уже порвалась. Теперь наконец она вздохнула свободнее и опять почувствовала почву под ногами. Вдруг она услыхала знакомый голос, говоривший Тристану:</p><p class="p1">– Черт возьми! Монсеньор, я – человек военный, и не мое дело вешать колдуний. Чернь усмирена, а с остальным вы сумеете управиться одни. Если позволите, я вернусь к своему отряду, который остался без капитана.</p><p class="p1">Это был голос Феба де Шатопера. Трудно передать словами, что произошло в душе цыганки. Так он тут, ее друг, ее покровитель, ее заступник, ее убежище, ее Феб. Она вскочила так быстро, что мать не успела ее удержать, и бросилась к окну с криком:</p><p class="p1">– Феб! Ко мне, мой Феб!</p><p class="p1">Но Феба уже не было. Он огибал галопом угол улицы Кутельри. Зато Тристан еще не успел удалиться. Затворница с диким воплем бросилась на свою дочь и быстро оттащила ее от окна, впиваясь ей ногтями в шею: ведь матери-тигрицы не церемонятся! Но было слишком поздно – Тристан все видел.</p><p class="p1">– Ага! – воскликнул он, захохотав и оскалив зубы, что придало его лицу сходство с волчьей мордой. – В мышеловке-то две мыши!</p><p class="p1">– Я так и думал, – заметил солдат.</p><p class="p1">Тристан потрепал его по плечу.</p><p class="p1">– У тебя хороший нюх! – похвалил он. – А ну-ка, где тут Анриэ Кузен?</p><p class="p1">Из рядов выступил человек, не похожий ни по осанке, ни по одежде на солдата. Платье на нем было наполовину серое, наполовину коричневое, с кожаными рукавами; волосы были гладко зачесаны; в руках у него был пучок веревок. Этот человек всегда сопровождал Тристана, как тот сопровождал Людовика XI.</p><p class="p1">– Дружище, – обратился к нему Тристан Пустынник, – надо полагать, что это та самая колдунья, которую мы ищем. Повесь-ка ее. Где твоя лестница?</p><p class="p1">– Лестницу возьмем из-под навеса Дома с колоннами. Не на этом ли «правосудии» нам ее вздернуть? – продолжал он, указывая на каменную виселицу.</p><p class="p1">– Да.</p><p class="p1">– Отлично, – воскликнул палач с хохотом, еще более зверским, чем смех Тристана. – По крайней мере, недалеко ходить.</p><p class="p1">– Живей! – приказал Тристан. – Потом нахохочешься.</p><p class="p1">С той минуты, как Тристан увидал девушку и последняя надежда была потеряна, затворница не произнесла ни слова. Бросив бедную полумертвую цыганку в угол кельи, она снова стала у окна, вцепившись обеими руками, точно когтями, в углы подоконника. В такой позе она окинула солдат отважным взором, принявшим прежнее дикое и безумное выражение. Когда Анриэ Кузен подошел к келье, лицо затворницы сделалось так ужасно, что тот попятился назад.</p><p class="p1">– Монсеньор, – обратился он к Тристану, – которую прикажете взять?</p><p class="p1">– Молодую.</p><p class="p1">– Тем лучше! Со старухой было бы трудненько справиться.</p><p class="p1">– Бедная маленькая плясунья с козочкой, – пожалел старый сержант.</p><p class="p1">Анриэ Кузен снова подошел к окошку и невольно потупил глаза, встретив пристальный взгляд несчастной матери.</p><p class="p1">– Сударыня… – обратился он к ней довольно робко.</p><p class="p1">Она перебила его яростным шипящим шепотом:</p><p class="p1">– Чего тебе нужно?</p><p class="p1">– Я не за вами пришел, а за другой.</p><p class="p1">– Какой другой?</p><p class="p1">– Молодой.</p><p class="p1">Она принялась трясти головой, крича:</p><p class="p1">– Здесь нет никого! Нет никого! Нет никого!</p><p class="p1">– Ну, будет вам притворяться, – сказал палач. – Дайте мне взять молодую, я вам зла не причиню.</p><p class="p1">Она отвечала, как-то странно посмеиваясь:</p><p class="p1">– Так ты мне зла не причинишь?</p><p class="p1">– Дайте мне взять вон ту молодку, сударыня. Монсеньор так приказал.</p><p class="p1">Она продолжала твердить с безумным видом:</p><p class="p1">– Здесь нет никого!</p><p class="p1">– А я вам говорю, что есть, – возразил палач. – Мы видели, что вас было две.</p><p class="p1">– Ну, посмотри сам! – воскликнула Гудула, посмеиваясь. – Сунь-ка голову в окошко!</p><p class="p1">Палач взглянул на ее когти и попятился.</p><p class="p1">– Живей! – крикнул ему Тристан, успевший тем временем выстроить своих солдат полукругом перед «Крысиной норой», а сам подъехал верхом к виселице.</p><p class="p1">Смущенный Анриэ опять подошел к своему начальнику, положил веревки на землю и спросил, сконфуженно комкая в руках свою шапку:</p><p class="p1">– Монсеньор, как же туда войти?</p><p class="p1">– Через дверь.</p><p class="p1">– Двери нет.</p><p class="p1">– Ну, через окно.</p><p class="p1">– Да оно слишком узко.</p><p class="p1">– Так расширь его, – отвечал сердито Тристан. – Разве нет у вас заступов?</p><p class="p1">Из глубины кельи несчастная мать все время внимательно наблюдала за ними. Она потеряла уже последнюю надежду и сама не знала, чего добивается. Она только не хотела отдавать свою дочь.</p><p class="p1">Анриэ Кузен отправился под навес Дома с колоннами, где в ящике хранились разные инструменты. Оттуда он вытащил двойную лестницу и сейчас же приставил ее к виселице. Пять-шесть солдат вооружились кирками и рычагами, и Тристан во главе их снова направился к келье.</p><p class="p1">– Слушай, старуха! – заговорил он суровым тоном. – Отдай нам эту девушку добром.</p><p class="p1">Она взглянула на него бессмысленным взором.</p><p class="p1">– Черт возьми! – воскликнул Тристан. – Какое тебе дело, что эта колдунья будет повешена по приказу короля?</p><p class="p1">Несчастная захохотала своим безумным смехом:</p><p class="p1">– Какое мне дело?! Да ведь это моя дочь!</p><p class="p1">Голос, каким она произнесла эти слова, заставил вздрогнуть самого Анриэ Кузена.</p><p class="p1">– Мне очень жаль тебя, – продолжал Тристан, – но такова воля короля.</p><p class="p1">Она воскликнула, продолжая хохотать своим диким смехом:</p><p class="p1">– Какое мне дело до твоего короля? Я тебе сказала, что это моя дочь!</p><p class="p1">– Ломайте стену! – приказал Тристан.</p><p class="p1">Для того чтобы расширить отверстие, достаточно было выломать ряд камней под окошком.</p><p class="p1">Услыхав удар кирок и рычагов, сокрушавших ее крепость, несчастная мать испустила отчаянный вопль и принялась с ужасающей быстротой кружиться по своей келье; эту привычку дикого зверя она приобрела, сидя в клетке. Она молчала, но глаза ее горели. Солдат охватил ужас.</p><p class="p1">Вдруг она схватила камень и, захохотав, с размаху бросила его в солдат. Камень, брошенный неловко, дрожащими руками, не задев никого, упал к ногам лошади Тристана. Гудула заскрежетала зубами.</p><p class="p1">Тем временем, хотя солнце еще не совсем взошло, но было уже совсем светло, и старые дымовые трубы Дома с колоннами озарились нежным розовым отблеском. В этот час раньше других проснувшиеся обыватели уже весело отворяют свои окна, выходящие на крыши. На Гревской площади показалось несколько рабочих, потом несколько торговцев овощами, отправляющихся на своих осликах на рынок. Все они на минуту останавливались перед отрядом солдат, выстроившимся около «Крысиной норы», смотрели на них с удивлением и проходили дальше.</p><p class="p1">Гудула уселась около дочери, заслоняя ее своим телом, неподвижно глядя вперед и прислушиваясь к тихому шепоту бедной девушки, твердившей не переставая:</p><p class="p1">– Феб, Феб!</p><p class="p1">По мере того как работа солдат, ломавших стену, подвигалась вперед, мать невольно откидывалась назад и все сильнее прижимала молодую девушку к стене. Вдруг затворница увидала, что камни, за которыми она наблюдала, не спуская глаз, закачались, и услыхала голос Тристана, подбодрявшего работавших. Охватившее ее на несколько минут оцепенение покинуло ее, и она закричала каким-то странным голосом, то режущим ухо, как звук пилы, то захлебывающимся от проклятий, стремившихся разом вылиться из ее уст:</p><p class="p1">– Го, го, го! Это ужасно! Разбойники! Неужто вы в самом деле хотите отнять у меня дочь? Я же вам сказала, что это – моя дочь! Ах, подлые! Прислужники палача! Проклятые холуи, убийцы! Помогите, помогите! Пожар! Неужто у меня отнимут дочь! Где же после этого милосердный Господь?</p><p class="p1">Потом она обернулась к Тристану и заговорила с пеной у рта, с блуждающим взором, стоя на четвереньках и ощетинясь, словно пантера:</p><p class="p1">– Попробуй-ка отнять у меня дочь! Да ты что, не понимаешь: женщина тебе сказала, что это ее дочь. Да знаешь ли ты, что значит иметь ребенка? Разве ты, волк, никогда не жил с волчицей, не имел от нее волчонка? А если у тебя есть детеныши, неужели у тебя внутри ничего не шевелится, когда они воют?</p><p class="p1">– Сворачивай камень, – приказал Тристан, – он чуть держится.</p><p class="p1">Рычаги приподняли тяжелую каменную плиту над окном, бывшую, как мы уже говорили, последним оплотом бедной матери. Она бросилась вперед, хотела удержать камень, вцепилась в него ногтями, но тяжелая каменная глыба, на которую напирало шесть человек, выскользнула у нее из рук и медленно опустилась на землю с помощью железных рычагов.</p><p class="p1">Мать, увидав, что вход готов, упала поперек отверстия и загородила его своим телом, ломая руки, стукаясь головой о камни и крича чуть слышным голосом, охрипшим от усталости:</p><p class="p1">– Помогите! Горим! Пожар!</p><p class="p1">– Теперь берите девушку, – хладнокровно сказал Тристан.</p><p class="p1">Мать окинула подошедших солдат таким грозным взглядом, что те предпочли бы отступить, чем идти вперед.</p><p class="p1">– Чего же вы стали! – крикнул Тристан. – Анриэ Кузен, ступай ты вперед!</p><p class="p1">Никто не тронулся с места.</p><p class="p1">– Черт вас побери! – выругался Тристан. – Называетесь солдатами, а боитесь женщины!</p><p class="p1">– Монсеньор, – возразил Анриэ, – да разве это женщина?</p><p class="p1">– У нее грива, как у льва, – заметил один из солдат.</p><p class="p1">– Вперед! – скомандовал Тристан. – Отверстие достаточно широко. Полезайте туда по трое в ряд, как при осаде Понтуаза. Пора покончить с этим, черт возьми! Первого, кто вздумает отступить, я разрублю пополам.</p><p class="p1">Очутившись между угрожавшим начальником и угрожавшей матерью, солдаты поколебались немного, затем решительно двинулись к «Крысиной норе». Увидав это, затворница быстро встала на колени, откинула волосы с лица и снова беспомощно опустила свои исхудалые исцарапанные руки. Крупные слезы одна за другой закапали из ее глаз и побежали по бороздившим ее лицо морщинам, как ручей по проложенному им руслу. И в то же время она заговорила таким умоляющим голосом, так кротко, покорно и жалобно, что вокруг Тристана не один старый рубака, ни во что не ценивший человеческую жизнь, утирал глаза.</p><p class="p1">– Монсеньор! Господа сержанты! Одно слово! Дайте мне сказать только одно слово. Это моя дочь, понимаете ли вы? Моя маленькая дочурка, которую я считала потерянной! Послушайте, это целая история. Ведь я вас хорошо знаю, – вы добрые, вы всегда защищали меня от мальчишек, бросавших в меня камнями за то, что я вела распутную жизнь! Я знаю, вы не захотите отнять у меня дочь, когда я вам все расскажу. Я была дурной женщиной, и ее у меня украли цыганки. Но я пятнадцать лет хранила ее башмачок. Глядите, вот он. Посмотрите, какая у нее была маленькая ножка. Это было в Реймсе, на улице Фоль-Пен; может быть, вы знавали там Пакету Шанфлери? Ведь это я. Это было во времена вашей молодости. Славные времена, весело тогда жилось. Монсеньор, ведь вы сжалитесь надо мной? Цыганки ее у меня украли и пятнадцать лет прятали от меня. Я считала ее умершей. Представьте себе, друзья мои, умершей! Пятнадцать лет провела я здесь в келье, не разводя огня зимой. Нелегко мне приходилось… Бедный маленький дорогой башмачок!.. Я так плакала, что Господь внял моим мольбам. Сегодня ночью Он возвратил мне дочь. Свершилось чудо. Она жива, и вы не захотите отнять ее у меня, я знаю. Повесьте лучше меня, но не трогайте ее, ведь ей всего шестнадцать лет! Дайте ей насмотреться на солнце. Что она вам сделала? Ничего, да и я тоже. Если бы вы знали, что, кроме нее, у меня нет никого на свете! Посмотрите, как я стара, – ведь это Матерь Божия ниспослала мне свое благословение. А вы все такие добрые, вы не знали раньше, что она моя дочь, теперь же вам это известно. Ах, как я ее люблю! Господин начальник, я скорее согласна дать себе распороть живот, чем видеть царапинку у нее на мизинце! У вас такой добрый вид! Теперь вы понимаете, почему я не хотела отдавать ее? Монсеньор, вспомните свою мать! Ведь вы начальник над ними, не велите им трогать мою дочь! Смотрите, я молю вас на коленях, как молят самого Иисуса Христа! Мне ничего не нужно, я сама из Реймса, там у меня есть клочок земли, доставшийся мне от дяди, Майе Прадона. Я не нищенка. Мне ничего не нужно, только не трогайте моего ребенка! Оставьте мне мою дочь! Недаром же мне ее возвратил Господь, властитель над всеми! Король! Вы говорите, что так приказал король? Ну, велико ли ему будет удовольствие из-за того, что убьют мою девочку? И потом король так милостив! Это моя дочь! Моя! Не короля! Не ваша! Я не хочу оставаться здесь, мы обе уйдем отсюда! Смотрите, смотрите, вот идут две женщины, одна из них мать, другая дочь; их пропускают! Пустите и нас, мы обе родом из Реймса. Вы такие все добрые, господа сержанты, я вас очень люблю!.. Вы не отнимете у меня моей дорогой девочки, этого не может быть? Не правда ли, ведь этого никак не может быть? Дитя мое! Дитя мое!</p><p class="p1">Мы не в силах описать ее жесты, ее голос, слезы, которые она глотала; она то складывала руки с мольбой, то в отчаянии ломала их. Свою бессвязную, беспорядочную речь она сопровождала душераздирающими улыбками, молящими взглядами, вздохами, стонами, потрясающими душу воплями. Когда она замолкла, Тристан нахмурил брови, чтобы скрыть слезу, навернувшуюся на его глаза, глаза тигра. Он превозмог, однако, эту слабость и проговорил отрывисто:</p><p class="p1">– Такова воля короля.</p><p class="p1">Потом он нагнулся к Анриэ Кузену и шепнул ему на ухо:</p><p class="p1">– Кончай скорее!</p><p class="p1">Грозный Тристан, быть может, чувствовал, что теряет власть над собой.</p><p class="p1">Палач и солдаты вошли в келью. Мать не оказала им никакого сопротивления. Она лишь подползла к дочери и, бросившись на нее, прикрыла ее своим телом.</p><p class="p1">Цыганка увидела подходивших солдат. Ужас смерти оживил ее.</p><p class="p1">– Матушка! – воскликнула она невыразимо отчаянным голосом. – Матушка! Они идут! Защити меня!</p><p class="p1">– Да, любовь моя, я защищу тебя! – отвечала мать угасшим голосом, сжимая ее в объятиях и покрывая поцелуями. Обе они, мать и дочь, лежавшие на земле, представляли картину, которую нельзя было видеть без сострадания.</p><p class="p1">Анриэ Кузен схватил девушку поперек тела. Почувствовав на себе эту руку, бедняжка вскрикнула и лишилась чувств. Палач, у которого слезы одна за другой капали на жертву, хотел ее унести, взяв на руки. Сначала он постарался отцепить от нее мать, руки которой точно узлом завязались вокруг стана бедной девушки, но она так судорожно обхватила дочь, что не было никакой возможности ее оттащить. Тогда Анриэ Кузен потащил из кельи молодую девушку, волоча вместе с ней и мать. У матери также были закрыты глаза.</p><p class="p1">В это время солнце уже взошло, и на площади было много народу, старавшегося издали рассмотреть, кого это тащат так по мостовой к виселице. Таков был обычай Тристана – не допускать любопытных слишком близко к месту казни. У окон никого не было. Только вдали, на вершине той башни собора Богоматери, которая высится над Гревской площадью, вырисовывались на светлом фоне утреннего неба две черные человеческие фигуры, по-видимому наблюдавшие за тем, что происходит на площади.</p><p class="p1">Анриэ Кузен остановился со своей ношей у подножия роковой лестницы и, едва дыша, – до того он был растроган, – накинул петлю на прелестную шейку девушки. Бедняжка почувствовала ужасное прикосновение веревки. Она приоткрыла глаза и увидала над своею головой распростертую каменную руку виселицы. Она вздрогнула и крикнула высоким, раздирающим душу голосом:</p><p class="p1">– Нет! Нет! Я не хочу!</p><p class="p1">Мать, приникшая лицом к одежде своей дочери, не произнесла ни слова, только все тело ее затрепетало, и она стала покрывать еще более страстными поцелуями свое дитя. Палач воспользовался этой минутой, чтобы быстро отцепить ее руки, обвивавшие стан осужденной. Может быть, выбившись из сил, может быть, от отчаяния, она не сопротивлялась, когда он взвалил себе на плечи девушку; тело прелестного создания, грациозно перегнувшись пополам, запрокинулось за его большую голову. Потом он ступил на лестницу, собираясь лезть наверх.</p><p class="p1">В эту минуту мать, валявшаяся на мостовой, вдруг широко раскрыла глаза. Не издав ни звука, она вскочила с искаженным от ужаса лицом и, точно зверь на добычу, кинулась на палача и укусила его за руку. Все произошло молниеносно. Палач зарычал от боли, к нему подбежали и с трудом освободили его окровавленную руку от впившихся в нее зубов несчастной матери. Она хранила глубокое молчание. Ее грубо оттолкнули, и голова ее грузно ударилась о мостовую. Ее подняли, но она упала снова. Она была мертва.</p><p class="p1">Палач, не выпустивший девушки из рук, стал взбираться по лестнице.</p></span></span></span>
