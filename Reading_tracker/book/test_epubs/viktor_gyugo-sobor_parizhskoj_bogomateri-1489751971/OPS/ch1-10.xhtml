<span><span id="id10"><div class="title3">
<p class="p">Книга вторая</p>
</div><span id="id11"><div class="title4">
<p class="p">I. Сцилла и Харибда</p>
</div><p class="p1">В январе смеркается рано. На улицах было уже почти совсем темно, когда Гренгуар вышел из дворца. Эта темнота пришлась ему по душе. Ему хотелось уйти на какую-нибудь пустынную улицу и поразмыслить там на свободе: философ должен был наложить первую повязку на рану поэта. Впрочем, философия была теперь его единственным прибежищем, так как он даже не знал, где проведет ночь. После столь блистательного провала своей пьесы он не решался вернуться в помещение, которое занимал на улице Гренье, против Фуэнских ворот. Он за целые полгода задолжал своему хозяину, мэтру Гильому Ду-Сиру, и рассчитывал расплатиться с ним деньгами, полученными за пьесу от судьи. А долг был большой – целых двенадцать су! Ровно в двенадцать раз больше, чем стоило все его имущество, включая рубашку, шапку и панталоны.</p><p class="p1">Несколько минут стоял он около маленькой калитки тюрьмы Сен-Шапель, раздумывая о том, где бы провести ночь. Наконец он припомнил, что на прошлой неделе, проходя по улице Саватерн, видел около дома одного парламентского советника каменную подножку, устроенную для того, чтобы было удобнее садиться на мула. Он тогда же подумал, что она при случае могла бы служить отличной подушкой нищему или поэту. Возблагодарив Провидение, пославшее ему такую счастливую мысль, Гренгуар решил отправиться туда. Для этого ему нужно было пересечь Дворцовую площадь и углубиться в извилистый лабиринт старинных улиц – Бочарной, Суконной, Башмачной, Еврейской и т. д., которые еще до сих пор существуют, но только с девятиэтажными домами. Не успел он ступить на площадь, как туда хлынула процессия папы шутов. Она только что вышла из дворца и с оглушительными криками, зажженными факелами и музыкой неслась прямо на Гренгуара. Это зрелище вновь разбередило его уязвленное самолюбие; он поспешил удалиться. С болью сознавал он свою неудачу на театральном поприще, и все, напоминавшее ему о празднике, раздражало его и растравляло его рану. Он направился к мосту Сен-Мишель. Там бегали дети с горящими факелами и ракетами…</p><p class="p1">– Черт бы побрал все эти ракеты! – сказал про себя Гренгуар и повернул к мосту Шанж. У входа на мост на домах были вывешены три флага с нарисованными на них изображениями короля, дофина и Маргариты Фландрской и шесть маленьких флагов с портретами герцога Австрийского, кардинала Бурбонского, синьора де Божэ, Жанны Французской, незаконнорожденного Бурбона и еще кого-то. Все это было освещено факелами. Толпа любовалась.</p><p class="p1">– Какой счастливчик этот живописец Жан Фурбо! – с глубоким вздохом сказал Гренгуар и повернулся. Прямо перед ним была улица, такая темная и пустынная, что там – как он надеялся – ему наконец удастся укрыться от всех отголосков и отблесков праздника. Гренгуар направился туда, через несколько минут нога его наткнулась на что-то, – он потерял равновесие и упал. Это была вязанка сучьев майского дерева, которую корпорация парламентских клерков поставила с утра около двери президента парламента в честь торжественного дня.</p><p class="p1">Гренгуар геройски перенес эту новую неприятность. Он встал и пошел вдоль берега реки. Пройдя мимо гражданской и уголовной палат парламента и высоких стен королевских садов, по немощеному берегу, где грязь доходила ему до лодыжек, он дошел до западной окраины города. Тут он остановился и несколько времени смотрел на пастуший островок, который теперь исчез под бронзовым быком Нового моста. Островок этот, отделенный от Гренгуара узкой полоской светлевшей воды, казался ему в темноте какой-то черной массой. При мерцающем свете огонька на острове смутно выделялась хижина в виде улья, где пастух укрывался на ночь.</p><p class="p1">«Счастливый пастух! – подумал Гренгуар. – Ты не мечтаешь о славе и не пишешь свадебных гимнов. Что тебе до королей, которые женятся, и до герцогинь бургундских! Ты знаешь только одни маргаритки – те, которые цветут в апреле на лугу, где пасутся твои коровы. А я, поэт, унижен и осмеян. Я дрожу от холода, я должен двенадцать су, а подошвы моих башмаков так износились, что могли бы служить стеклами для твоего фонаря. Спасибо тебе, пастух! Смотря на твою хижину, я успокаиваюсь и забываю Париж».</p><p class="p1">Страшный треск двойной петарды, внезапно вылетевшей из счастливой хижины, грубо нарушил лирический экстаз поэта. Пастух, как видно, не хотел отстать от других и пускал фейерверк. Гренгуар вздрогнул, услыхав треск петарды, и мороз пробежал у него по телу.</p><p class="p1">– Проклятый праздник! – воскликнул он. – Неужели ты будешь всюду преследовать меня? О господи! От него нельзя избавиться даже здесь, около хижины пастуха!</p><p class="p1">Он взглянул на Сену, протекавшую у его ног, и страшное искушение овладело им.</p><p class="p1">– Ах, с каким бы удовольствием я утопился! – воскликнул он. – Если бы вода не была так холодна!..</p><p class="p1">И он принял отчаянное решение. Раз все равно нет никакой возможности скрыться от процессии папы шутов, от флагов Жана Фурбо, от майских веток, ракет и петард, так лучше уж смело ринуться в самый центр увеселений и отправиться на Гревскую площадь.</p><p class="p1">«Там я хоть немножко погреюсь около костра, – думал он, – и поужинаю крошками от трех огромных сахарных щитов с королевскими гербами, выставленных над городским общественным буфетом».</p></span><span id="id12"><div class="title4">
<p class="p">II. Гревская площадь</p>
</div><p class="p1">В наши дни остался лишь один малозаметный след от Гревской площади того времени: это прелестная башенка, занимающая ее северный угол. Да и она уже не та, что была прежде. Ее чудесные скульптурные украшения грубо замазаны штукатуркой, и очень возможно, что башня эта в недалеком будущем совсем исчезнет за массой новых домов, которые так быстро вырастают, поглощая старинные здания Парижа.</p><p class="p1">Люди, которые, подобно нам, не могут пройти по Гревской площади, не бросив взгляда сожаления и сочувствия на эту бедную башенку, стиснутую между двумя некрасивыми домами времен Людовика XV, легко воссоздадут в своем воображении общий вид зданий, к которым она принадлежала, и ясно представят себе старую готическую площадь пятнадцатого века.</p><p class="p1">Она, как и теперь, имела форму неправильной трапеции: по одной стороне ее шла набережная, а по трем остальным тянулись ряды высоких, узких, мрачных домов. Днем можно было любоваться разнообразием этих почти сплошь покрытых резьбою по дереву или камню зданий, которые могли служить точными образцами различных средневековых стилей от одиннадцатого до пятнадцатого века. Тут можно было увидать и прямоугольные окна, заменившие стрельчатые, и полукруглые окна чисто романского стиля, которые были вытеснены стрельчатыми. Окна этого романского стиля были во всем нижнем этаже башни Роланда, стоявшей на углу набережной, около Кожевенной улицы.</p><p class="p1">Ночью из всей этой массы зданий можно было различить лишь остроконечные верхушки крыш, выделявшихся на небе рядом черных зубцов. Одно из самых главных различий между теперешними и прежними городами состоит в том, что в настоящее время дома строятся фасадом к улицам и площадям, тогда как прежде они выходили боком. Прошло уже два века с тех пор, как дома повернулись к улице.</p><p class="p1">На восточной стороне площади возвышалось тяжелое здание смешанного стиля, состоящее из трех помещений. У него было три различных названия, объясняющих его историю, назначение и архитектуру. Оно называлось Домом дофина, потому что в нем жил дофин Карл V; Домом торговли, так как здесь был городской магистрат, и Домом с колоннами (domus ad piloria), потому что ряд толстых колонн поддерживал его три этажа.</p><p class="p1">Здесь можно было найти все, что требуется такому большому городу, как Париж: часовню, чтобы помолиться; судебный зал, чтобы творить суд и расправу и в случае надобности отправлять в кутузку королевских подданных, и арсенал, полный огнестрельного оружия.</p><p class="p1">Парижане прекрасно понимали, что одними просьбами далеко не всегда можно добиться каких-нибудь льгот для города, и потому у них на всякий случай был сложен на чердаке порядочный запас ржавых мушкетов.</p><p class="p1">Что-то зловещее было в том впечатлении, какое производила тогда Гревская площадь. Впрочем, почти такое же впечатление производит она и теперь благодаря тяжелым воспоминаниям, которые пробуждаются при ее виде, и благодаря мрачной городской ратуше Доминика Бокадора, заменившей Дом с колоннами. К тому же виселица и позорный столб – «правосудие и лестница», как говорили тогда, – всегда стоявшие рядышком посреди площади, заставляли невольно отвращать глаза от страшного места, где погибло столько полных жизни и здоровья людей и где спустя полвека появилась особая ужасная болезнь, «лихорадка святого Вальера», вызываемая страхом перед эшафотом, – самая чудовищная из всех болезней, так как она исходит не от Бога, а от человека.</p><p class="p1">Утешительно думать, между прочим, что смертная казнь, загромождавшая триста лет тому назад своими железными колесами, каменными виселицами и разными орудиями пыток Гревскую и Рыночную площади, перекресток Трауар, площадь Дофина, Свиной рынок, ужасный Монфокон, заставу Сержантов, Кошачью площадь, ворота Сен-Дени, Шампо, ворота Бодо и Сен-Жак, не считая бесчисленных виселиц прево, епископов, аббатов и приоров, которым было предоставлено право суда, не считая тех несчастных, которых по судебным приговорам топили в Сене, – эта старая сюзеренка феодальных времен в настоящее время потеряла свою прежнюю власть. Постепенно она принуждена была сложить оружие, отказаться от утонченных мучений, развращавших воображение и фантазию, и от пыток, для которых переделывали каждые пять лет кожаную постель в Гран-Шатлэ. Теперь смертная казнь совсем почти исчезла из наших законов и городов. Ее преследовали шаг за шагом, прогоняли с места на место, и теперь у нее во всем громадном Париже остался лишь один опозоренный уголок на Гревской площади, одна жалкая гильотина, робкая, беспокойная, пристыженная, которая словно боится, что ее застанут на месте преступления, и мгновенно исчезает, нанеся свой удар.</p></span></span></span>
