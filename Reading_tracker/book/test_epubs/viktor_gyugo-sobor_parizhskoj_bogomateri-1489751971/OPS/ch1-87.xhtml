<p class="p">3. Прохожий появляется снова</p>
</div><p class="p1">«Зеленый ящик», который читатели, конечно, узнали, недавно прибыл в Лондон. Он остановился в Саутворке, Урсуса привлекала «зеленая лужайка», имевшая то неоценимое достоинство, что ярмарка на ней не закрывалась даже зимой.</p><p class="p1">Урсусу было приятно увидеть купол собора Святого Павла. В конце концов, Лондон – это город, в котором немало хорошего. Ведь для того, чтобы посвятить собор святому Павлу, требовалось известное мужество. Настоящий соборный святой – это святой Петр. Святой Павел несколько подозрителен своим излишним воображением, а в вопросах церковных воображение ведет к ереси. Святой Павел признан святым только благодаря смягчающим его вину обстоятельствам. На небо он попал с черного хода.</p><p class="p1">Собор – это вывеска. Собор Святого Петра – вывеска Рима, города догмы, так же как собор Святого Павла – вывеска Лондона, города ереси.</p><p class="p1">Урсус, чье мировоззрение было настолько широко, что охватывало все на свете, был вполне способен оценить все эти оттенки, я его влечение к Лондону объяснялось, быть может, той особой симпатией, которую он питал к святому Павлу.</p><p class="p1">Урсус остановил свой выбор на Тедкастерской гостинице, обширный двор которой был как будто нарочно предназначен для «Зеленого ящика» и представлял собой уже совершенно готовый зрительный зал. Квадратный двор был отгорожен с трех сторон жилыми строениями, а с четвертой – глухой стеной, возведенной против гостиницы; к этой-то стене и придвинули вплотную «Зеленый ящик», который вкатили во двор через широкие ворота. Длинная деревянная галерея с навесом, построенная на столбах, находилась в распоряжении жильцов второго этажа; она тянулась вдоль трек стен внутреннего фасада, образуя два поворота под прямым углом. Окна первого этажа были ложами бенуара, мощеный двор – партером, галерея – бельэтажем. «Зеленый ящик», прислоненный к стене, был обращен лицом к зрительному залу. Это весьма напоминало «Глобус», где были сыграны впервые «Отелло», «Король Лир» и «Буря».</p><p class="p1">В закоулке, за «Зеленым ящиком», помещалась конюшня.</p><p class="p1">Урсус договорился обо всем с хозяином харчевни дядюшкой Никлсом, который, из уважения к закону, согласился впустить волка только за большую плату. Вывеску «Гуинплен – Человек, который смеется», снятую с «Зеленого ящика», повесили рядом с вывеской гостиницы. В зале кабачка, как уже известно читателю, была внутренняя дверь, выходившая прямо во двор. Рядом с этой дверью поставили бочку без дна, которая должна была изображать будку для «кассирши», обязанности которой поочередно выполняли Фиби и Винос. Все обстояло приблизительно так же, как в наши дни. С каждого зрителя брали плату. Под вывеской «Человек, который смеется» прибили двумя гвоздями доску, выкрашенную в белый цвет, на которой углем было выведено крупными буквами название знаменитой пьесы Урсуса – «Побежденный хаос».</p><p class="p1">В центре галереи, как раз напротив «Зеленого ящика», было устроено с помощью деревянных перегородок отделение для «благородной публики». В него входили через стеклянную дверь.</p><p class="p1">Здесь могли поместиться, усевшись в два ряда, десять человек.</p><p class="p1">– Мы в Лондоне, – сказал Урсус. – Надо быть готовым к тому, что явится и благородная публика.</p><p class="p1">По его требованию, в эту «ложу» поставили лучшие стулья, какие только нашлись в гостинице, а в середине – большое кресло, обитое утрехтским бархатом, золотистым, с вишневыми разводами, – на случай, если бы спектакль посетила жена какого-нибудь сановника.</p><p class="p1">Представления начались.</p><p class="p1">Сразу же хлынул народ.</p><p class="p1">Но отделение для знати пустовало.</p><p class="p1">Если не считать этого, успех был такой, что никто из комедиантов не мог припомнить ничего подобного. Весь Саутворк толпами сбегался поглазеть на «Человека, который смеется».</p><p class="p1">Среди скоморохов и фигляров Таринзофилда Гуинплен произвел настоящий переполох. Как будто ястреб влетел в клетку с щеглами и пожрал весь их корм. Гуинплен отбил у них всю публику.</p><p class="p1">Кроме убогих представлений, даваемых шпагоглотателями и клоунами, на ярмарочной площади бывали и настоящие спектакли. Тут был цирк с наездницами, с канатными плясуньями, откуда с утра до ночи доносились громкие звуки всевозможных инструментов: барабанов, цитр, скрипок, литавр, колокольчиков, сопелок, валторн, бубнов, волынок, немецких дудок, английских рожков, свирелей, свистулек, флейт и флажолетов.</p><p class="p1">В большой круглой палатке выступали прыгуны, с которыми не смогли бы тягаться и современные пиренейские скороходы – Дульма, Борденав и Майлонга, хотя они и спускаются с остроконечной вершины Пьерфит на Лимасонское плато, что почти равносильно падению. Был там и бродячий зверинец с тигром-комиком, который, когда его хлестал укротитель, норовил вырвать у него бич и проглотить конец плети. Но Гуинплен затмил даже этого рычащего комика со страшной пастью и когтями.</p><p class="p1">Любопытство, рукоплескания, сборы, толпу – все перехватил «Человек, который смеется». Это произошло в мгновение ока. Кроме «Зеленого ящика», не признавали больше ничего.</p><p class="p1">– «Побежденный хаос» оказался хаосом-победителем, – говорил Урсус, приписывая себе половину успеха Гуинплена, или, как принято выражаться на актерском жаргоне, «оттягивая скатерть к себе».</p><p class="p1">Гуинплен имел необычайный успех. Однако это был только местный успех. Славе трудно преодолеть водную преграду. Понадобилось сто тридцать лет для того, чтобы имя Шекспира дошло из Англии во Францию: вода – стена, и если бы Вольтер, впоследствии очень сожалевший об этом, не помог Шекспиру, Шекспир и в наше время, быть может, еще находился бы по ту сторону стены, в Англии, в плещу у своей островной славы.</p><p class="p1">Слава Гуинплена не перешла через Лондонский мост. Она не приняла таких размеров, чтобы вызвать эхо в большом городе. Во всяком случае на первых порах. Но и Саутворка достаточно для честолюбия клоуна. Урсус говорил:</p><p class="p1">– Мешок с выручкой, словно согрешившая девушка, толстеет прямо у вас на глазах.</p><p class="p1">Играли «Ursus rursus», затем «Побежденный хаос».</p><p class="p1">В антрактах Урсус показывал свои способности «энгастримита», давая сеансы чревовещания: он подражал голосу любого из присутствующих, пению, крику, поражая сходством самого певшего или кричавшего, а иногда воспроизводил гул целой толпы, и при этом гудел так громко, как будто в нем одном вмещалось множество людей. Замечательный талант!</p><p class="p1">Кроме того, он, как мы видели, и ораторствовал не хуже Цицерона, и торговал снадобьями, и занимался лекарской практикой, и даже вылечивал больных.</p><p class="p1">Саутворк был покорен.</p><p class="p1">Горячий прием, оказанный в Саутворке «Зеленому ящику», доставлял Урсусу удовольствие, но не удивлял его.</p><p class="p1">– Это древние тринобанты, – говорил он.</p><p class="p1">И прибавлял:</p><p class="p1">– Что касается изысканности их вкуса, я не сравню их ни с атробатами, населяющими Беркс, ни с белгами, обитателями Сомерсета, ни с паризиями, основавшими Йорк.</p><p class="p1">На время каждого представления двор гостиницы, превращенный в партер, заполнялся бедно одетой, но восторженной публикой. Это были лодочники, носильщики, корабельные плотники, рулевые речных судов, матросы, только что сошедшие на берег и тратившие свое жалованье на пирушки и женщин. Были тут и кучера, и завсегдатаи кабаков, и солдаты, осужденные за какое-нибудь нарушение дисциплины носить красные мундиры черной подкладкой наружу и прозванные поэтому «черными гвардейцами». Весь этот народ стекался с улицы в театр, а из театра устремлялся в кабачок. И выпитые кружки отнюдь не вредили успеху спектакля.</p><p class="p1">Среди всех этих людей, которых принято называть «подонками», особенно выделялся один: он был выше других, крупнее, сильнее и шире в плечах; он казался менее бедным, чем остальные; его одежда, обычная одежда простолюдина, была, однако, опрятной и не рваной. Не зная меры в выражении своего восторга, он пролагал себе дорогу кулаками, ерошил свои вихры, ругался, кричал, зубоскалил и мог при случае подбить кому-нибудь глаз, но тотчас же поставить потерпевшему бутылку вина.</p><p class="p1">Этот завсегдатай был тот самый прохожий, у которого, как мы помним, вырвалось на улице восторженное восклицание.</p><p class="p1">Этот знаток искусства сразу же пленился «Человеком, который смеется». Ходил он не на все представления, но когда приходил, то становился «вожаком» публики; рукоплескания превращались в овации; бурные волны успеха взмывали если не до потолка (его и не было), то до облаков, которых было достаточно (из этих облаков иногда шел дождь, безжалостно поливавший гениальное произведение Урсуса, не защищенное крышей).</p><p class="p1">В конце концов Урсус заметил этого человека, и Гуинплен тоже обратил на него внимание.</p><p class="p1">В его лице они, по-видимому, нашли надежного друга.</p><p class="p1">Урсусу и Гуинплену захотелось познакомиться с ним или, по крайней мере, узнать, кто он такой.</p><p class="p1">Как-то вечером, столкнувшись случайно с хозяином гостиницы Никлсом, Урсус показал ему из-за кухонной двери, служившей кулисой, на незнакомца и спросил:</p><p class="p1">– Знаете вы этого человека?</p><p class="p1">– Еще бы.</p><p class="p1">– Кто он?</p><p class="p1">– Матрос.</p><p class="p1">– Как его зовут? – вмешался Гуинплен.</p><p class="p1">– Том-Джим-Джек, – ответил хозяин гостиницы.</p><p class="p1">И, спускаясь по откидной лесенке «Зеленого ящика», чтобы возвратиться в свое заведение, дядюшка Никлс обронил чрезвычайно глубокомысленное замечание:</p><p class="p1">– Какая жалость, что он не лорд. Славная из него вышла бы каналья!</p><p class="p1">Хотя труппа «Зеленого ящика» и остановилась во дворе гостиницы, она ни в чем не изменила своего обычного уклада жизни и по-прежнему держалась обособленно. Если не считать нескольких слов, которыми ее участники изредка перебрасывались с хозяином, они не вступали ни в какие сношения с обитателями гостиницы, как постоянными, так и временными, и продолжали общаться только друг с другом.</p><p class="p1">С тех пор как они прибыли в Саутворк, Гуинплен завел привычку по окончании спектакля, уже после того, как все, – и люди, и лошади, – поужинают, а Урсус и Дея улягутся спать, каждый в своем отделении, выходить между одиннадцатью и двенадцатью часами на «зеленую лужайку» подышать немного свежим воздухом. Мечтательное настроение предрасполагает к ночным прогулкам под звездами; юность – вся таинственное ожидание; потому-то молодежь так охотно и бродит ночью без всякой цели. В этот поздний час на ярмарочной площади уже не было никого, кроме нескольких пьяниц, чьи колеблющиеся силуэты вырисовывались в темноте; закрывались пустые таверны, гасли огни в низком зале Тедкастерской гостиницы; только где-нибудь в углу догорала последняя свеча, освещая последнего посетителя; сквозь неплотно закрытые ставни пробивался тусклый свет, и Гуинплен, задумчивый, довольный, погруженный в мечты, ощущая в душе прилив невыразимого счастья, расхаживал взад и вперед близ приоткрытой двери. О чем думал он? О Дее, обо всем и ни о чем; он думал о самом сокровенном. Он никогда не отходил слишком далеко от гостиницы, словно какая-то нить удерживала его подле Деи. Для него было вполне достаточно пройтись около дома.</p><p class="p1">Затем он возвращался, заставал всех обитателей «Зеленого ящика» уже спящими и сам засыпал.</p></span></span></span></span>
