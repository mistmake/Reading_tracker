<p class="p">5. Человеку кажется, что он вспоминает, между тем как он забывает</p>
</div><p class="p1">Что за странные перемены совершаются порою в человеческой душе!</p><p class="p1">Гуинплен в одно и то же время был вознесен на вершину и низвергнут в пропасть.</p><p class="p1">У него кружилась голова.</p><p class="p1">Кружилась вдвойне.</p><p class="p1">Кружилась от взлета и от падения.</p><p class="p1">Роковое сочетание.</p><p class="p1">Он чувствовал, как подымается, но не ощущал своего падения.</p><p class="p1">Новый горизонт всегда пугает нас.</p><p class="p1">Перспектива помогает найти направление. Не всегда правильное.</p><p class="p1">Перед Гуинпленом в облаках открылся волшебный просвет – не западня ли это? – и сквозь него проглянула густая синева. Такая густая, что ее можно было принять за тьму.</p><p class="p1">Он стоял на горе, с которой видны все земные царства. Гора эта тем страшнее, что в действительности ее не существует. Те, кто находится на этой вершине, погружены в сон. Тут искушает бездна, и она так сильна, что ад надеется совратить здесь рай и дьявол возносит сюда Бога. Обольстить вечность – какая странная надежда! Каково же бороться человеку там, где сатана искушает Иисуса?</p><p class="p1">Дворцы, замки, могущество, богатство, все блага земные, мир безграничных наслаждений, нечто вроде лучезарной карты обоих полушарий, средоточием которых являешься ты сам, – какой опасный мираж!</p><p class="p1">Вообразите же себе смятение души перед таким видением, возникшим внезапно и без предварительно пройденных ступеней, без предупреждения, без всяких переходов.</p><p class="p1">Гуинплен был подобен человеку, заснувшему в кротовой норе, а проснувшемуся на шпиле колокольни Страсбургского собора.</p><p class="p1">Головокружение – это своего рода ясновидение. В особенности то, которое, слагаясь из двух противоположных вращательных движений, увлекает вас одновременно и к свету, и к мраку.</p><p class="p1">Видишь и слишком много и слишком мало.</p><p class="p1">Видишь все и не видишь ничего.</p><p class="p1">Испытываешь состояние, которое автор этой книги назвал где-то состоянием «ослепленного светом слепого».</p><p class="p1">Оставшись один, Гуинплен взволнованно зашагал взад и вперед по комнате. Вспышка всегда предшествует взрыву.</p><p class="p1">Обуреваемый нахлынувшими мыслями, он не в силах был усидеть на месте. Эта вспышка уничтожала все его прошлое. Он вызывал в своей памяти картины минувшего. Странно: оказывается, мы прекрасно слышим то, к чему почти не прислушиваемся. Прочитанное шерифом в саутворкском подземелье показание погибших на урке теперь до малейших подробностей всплыло в его мозгу; он припоминал каждое слово; этот документ раскрыл ему тайну его детства.</p><p class="p1">Вдруг он остановился, заложив руки за спину, и поглядел на потолок или на небо – словом, куда-то вверх.</p><p class="p1">– Возмездие! – воскликнул он.</p><p class="p1">Он походил на человека, вынырнувшего из воды. Ему казалось, что он видит все: и прошедшее, и настоящее, и будущее, озаренные внезапным светом.</p><p class="p1">«Ах! – мысленно воскликнул он, ибо можно восклицать и мысленно. – Так вот в чем дело! Я, значит, родился лордом. Теперь все ясно. Меня похитили, продали, лишили наследства, покинули, обрекли на смерть! Пятнадцать лет труп моей судьбы носился по морю и наконец воспрянул и ожил. Я возрождаюсь. Я рождаюсь вновь! Я всегда чувствовал, что под моими лохмотьями бьется сердце не простого фигляра, и когда я обращался к людям, я сознавал, что если они стадо, то я не собака, а пастух! Пастырями народов, предводителями, правителями и властелинами, – вот кем были мои предки; и я могу быть тем же! Я дворянин – у меня есть шпага; я барон – у меня есть шлем; я маркиз – у меня есть шляпа с перьями; я пэр – у меня есть корона. Ах! Все это отняли у меня. Я был рожден для света, меня низвергли во тьму. Изгнавшие отца продали ребенка. Когда скончался мой отец, они вынули из-под его головы камень изгнания, служивший ему изголовьем, они повесили этот камень мне на шею и бросили меня в помойную яму. Эти разбойники, мучившие меня в детстве, как живые стоят передо мной, я снова вижу их. Я был куском мяса, который клевала на могиле стая воронов. Я истекал кровью, я кричал от ужаса перед этими кошмарными призраками. Ах, так вот куда меня кинули – под ноги прохожим, чтобы меня попирали все, кому не лень; меня сделали последним из последних, ниже крепостного, ниже лакея, ниже каторжника, ниже раба, – меня швырнули туда, где хаос превращается в смрадную клоаку, где все исчезает. И вот я выхожу из нее! Я воскресаю! Я здесь! Вот оно, возмездие!»</p><p class="p1">Он сел, снова вскочил, сжал голову руками и опять принялся ходить, продолжая свой бурный монолог:</p><p class="p1">«Где я? На высоте! Куда я попал? На вершину! Эта вершина, этот купол мира, это величие и всемогущество – мой родной дом. Я один из богов, обитающих в этом воздушном недосягаемом храме! Я в нем живу. Эта вершина, на которую я смотрел снизу, лучи которой так ослепляли меня, что я закрывал глаза, этот неприступный замок, эта несокрушимая крепость счастливцев – я вхожу в нее! Я поднялся к ней. Я здесь. О решающий поворот колеса судьбы! Я был внизу – и очутился наверху. Наверху – и навсегда! Я – лорд, у меня будет пурпурная мантия, зубчатая корона, я буду присутствовать при коронации королей, принимать их присягу, буду судить министров и принцев, я буду жить своей настоящей жизнью. Из бездны, куда низвергли меня, я возношусь к самому зениту. У меня есть дворцы в городе и за городом, сады, охотничьи угодья, леса, кареты, миллионы, я буду давать пиры, буду писать законы, буду наслаждаться всеми радостями жизни; бродяга Гуинплен, не имевший права сорвать полевой цветок, будет срывать с неба звезды!».</p><p class="p1">Печально вторжение мрака в человеческую душу! В том Гуинплене, который был раньше героем, да и теперь, пожалуй, не перестал быть им, произошло вытеснение величия морального жаждой величия материального, Пагубная перемена. Уничтожение добродетели сонмом налетевших демонов. Неожиданность, поражающая человека в самое слабое его место. Все низменное, что обычно считается высоким, – честолюбие, нечистые инстинкты, страсти, вожделения, изгнанные из души Гуинплена благотворным влиянием несчастья, – теперь бурной толпой нахлынуло на него и завладело этим великодушным сердцем. Что же было виною этому? Находка пергамента во фляге, выброшенной на берег Англии. Такое растление совести нежданной удачей бывает довольно часто.</p><p class="p1">Гуинплен упивался гордостью, и душа его становилась при этом все мрачнее и мрачнее. Таково воздействие этого рокового напитка.</p><p class="p1">У него кружилась голова; ошеломляющая перемена захватила все его существо; он не только принял ее, но и наслаждался ею. Слишком долго не мог он утолить жажды. Разве не добровольно жертвуем мы рассудком, прикасаясь устами к чаше безумия? Он всегда смутно желал этого. Его взор был всегда устремлен на великих мира сего, а смотреть – значит желать. Недаром орленок родился в орлином гнезде.</p><p class="p1">Он – лорд; теперь это начинало казаться ему совершенно естественным.</p><p class="p1">Прошло только несколько часов, а как далеко от него все вчерашнее!</p><p class="p1">Гуинплен встретил на своем пути западню: лучшее оказалось врагом хорошего.</p><p class="p1">Горе тому, про кого говорят: «Счастливец!»</p><p class="p1">С несчастьем справиться легче, чем со счастьем. Невзгоды менее пагубны для человека, чем благополучие. Бедность – Харибда, богатство – Сцилла. Те, что устояли под ударами грома, падают, ослепленные внезапным блеском молнии. Ты, не страшившийся пропасти, бойся быть унесенным в облака легионами крылатых мечтаний. Высота может унизить тебя. Зловещая опасность падения кроется в апофеозе.</p><p class="p1">Трудно познать себя в счастье. Случай всегда рад надеть на себя личину. Нет ничего обманчивее его. Что он: провидение или злой рок?</p><p class="p1">Не всякий огонь есть свет. Ибо свет – истина, а огонь может быть вероломным. Вы думаете, что он освещает, а он испепеляет.</p><p class="p1">Ночь. Чья-то рука ставит зажженную свечу на окно, распахнутое в темноту. Жалкая сальная свеча кажется во мраке звездою, и мотылек летит на нее.</p><p class="p1">Его ли это вина?</p><p class="p1">Огонь зачаровывает мотылька так же, как взгляд змеи зачаровывает птицу.</p><p class="p1">Могут ли мотылек и птица устоять перед этим? Может ли листок не поддаться ветру? Может ли камень не подчиниться закону притяжения?</p><p class="p1">Все это вопросы материальные, но они имеют и моральное значение.</p><p class="p1">После письма герцогини Гуинплену удалось взять себя в руки. В нем оказалось достаточно сил, чтобы устоять перед соблазном. Но буря, утихнув на одном краю горизонта, начинает бушевать на другом; судьба впадает в не меньшее ожесточение, чем природа. Первый порыв ветра сотрясает дерево, второй вырывает его с корнем.</p><p class="p1">Увы! Не так ли падают могучие дубы?</p><p class="p1">И вот тот, кто десятилетним ребенком, оставшись один на Портлендском утесе, бесстрашно смотрел в глаза противникам, с которыми ему предстояло схватиться, – и буре, уносившей корабль, на котором он собирался плыть, и морю, поглотившему доску, по которой он хотел взбежать на корабль, и зияющей пустоте, грозно отступавшей перед ним, и земле, отказавшей ему в приюте, и зениту, отказавшему ему в путеводной звезде, и безжалостному одиночеству, и непроглядному мраку, и океану, и небу – словом, всем силам, заключенным в одной беспредельности, и всем загадкам, заключенным в другой; тот, кто не задрожал и не пал духом перед беспощадной враждебностью неведомого рока; тот, кто еще малым ребенком не убоялся ночи, как древний Геркулес не убоялся смерти; тот, кто в этой неравной борьбе бросил вызов и взял на свое попечение другого ребенка; тот, кто взвалил на себя, несмотря на слабость и усталость, лишнее бремя и стал еще более уязвим, но сорвал своей рукой намордники с чудовищ мрака, подстерегавших его со всех сторон; тот, кто, чуть не с колыбели вступив в поединок с собственной судьбой, стал укротителем диких зверей; тот, кому явное превосходство сил противника все же не помешало сразиться с ним; тот, кто, невзирая на одиночество, в котором он очутился, когда все покинули его, мужественно принял этот жребий и гордо продолжал свой путь; тот, кто храбро боролся с холодом, жаждой и голодом; тот, кто, будучи пигмеем по росту, оказался исполином душой, – тот самый Гуинплен, который победил свирепое дыхание двуликой бездны – бури и несчастья, теперь пошатнулся под дуновением тщеславия.</p><p class="p1">И вот, когда рок, обрушив на человека все несчастья, бедствия, бури, катастрофы и смертные муки, видит, что тот все-таки устоял, и начинает ему улыбаться, человек, внезапно охмелев, валится с ног.</p><p class="p1">Улыбка рока! Можно ли представить себе что-нибудь более страшное? Это – последнее средство, к которому прибегает безжалостный искуситель человеческих душ. Судьба, словно тигр, протягивает иногда бархатную лапу. Коварные приготовления. Омерзительна ласковость этого чудовища.</p><p class="p1">Каждый знает по себе, как часто возвышение совпадает с упадком сил. Слишком быстрый рост нарушает равновесие и вызывает лихорадку.</p><p class="p1">Бесчисленное множество новых мыслей с головокружительной быстротой проносилось в мозгу Гуинплена; в нем совершались таинственные превращения, непостижимое столкновение прошлого с будущим; это была встреча двух Гуинпленов, это было как бы его раздвоение; позади – ребенок в лохмотьях, вышедший из мрака, бездомный голодный бродяга, дрожащий от холода и вызывающий смех; впереди – блистательный, гордый, пышный вельможа, ослепляющий своим великолепием весь Лондон. Он сбрасывал старую оболочку и срастался с новой. Он расставался с существованием фигляра и становился лордом. Меняя внешний облик, порой меняют душу. Минутами все это казалось слишком похожим на сон. Это было так сложно, это было и дурно и хорошо. Он думал о своем отце. Как мучительно думать об отце, которого не знаешь! Он старался себе представить его. Он думал о брате, о котором ему только что сказали. Итак, у него есть семья. Как? Семья – у него, у Гуинплена! Он терялся в фантастических догадках. Воображение рисовало ему великолепные картины, перед ним, как облака, проходили величественные шествия; ему чудились трубные звуки.</p><p class="p1">«И к тому же, – думал он, – я буду красноречив».</p><p class="p1">И он представлял себе свое торжественное вступление в палату лордов. Он входит туда, полный новых идей. Сколько надо ему сказать! Как много накопилось у него мыслей! Какое огромное преимущество имеет он перед ними – он, человек, столько видевший, столько испытавший, столько переживший, столько страдавший, человек, который может крикнуть им: «Все то, от чего вы так далеки, мне было близко!» Этим патрициям, живущим в искусственном, ложном мире, он бросит в лицо голую правду, и они затрепещут, ибо он ничего не скроет, и они станут рукоплескать ему, потому что он будет велик. Он будет головою выше этих всесильных людей, могущественнее их всех; он предстанет перед ними носителем света, ибо явит им истину, и меченосцем, ибо откроет им справедливость. Какое торжество!</p><p class="p1">И в то время как эти совершенно отчетливые и вместе с тем смутные мысли проносились в мозгу Гуинплена, он беспрерывно двигался, как бы в бреду: опускался в первое попавшееся кресло, впадал в минутное забытье и вдруг снова вскакивал. Он ходил взад и вперед по комнате, глядел на потолок, рассматривал короны, изучал непонятные ему изображения на гербе, ощупывал бархатную обивку стен, передвигал стулья, разворачивал свитки грамот, разбирал титулы – Бекстон, Хомбл, Гемдрайт, Генкервилл, Кленчарли, сравнивал между собою сургучные оттиски королевских печатей, дотрагивался до их шелковых шнурков, подходил к окну, прислушивался к журчанию водомета; устремлял взор на статуи, с терпением лунатика пересчитывал мраморные колонны и говорил: «Да, все это явь».</p><p class="p1">Ощупывая свой атласный кафтан, он спрашивал себя:</p><p class="p1">– Я ли это?</p><p class="p1">И сам же отвечал:</p><p class="p1">– Да, я.</p><p class="p1">В нем все еще бушевала буря.</p><p class="p1">В этом вихре чувств, наполнявшем все его существо, чувствовал ли он слабость, усталость? Утолял ли он жажду и голод, спал ли он? Если да, то бессознательно. При сильном душевном потрясении человек удовлетворяет свои физические потребности без всякого участия мысли. К тому же мысли Гуинплена рассеивались, как дым. Разве в ту минуту, когда черное пламя вырывается из клокочущего кратера, вулкан отдает себе отчет в том, что на траве, у его подножия, пасутся стада?</p><p class="p1">Часы проходили за часами.</p><p class="p1">Занялась заря, наступило утро. Луч света проник в комнату, а вместе с тем и в сознание Гуинплена.</p><p class="p1">«А Дея?» – напомнил он Гуинплену.</p></span></span></span></span>
