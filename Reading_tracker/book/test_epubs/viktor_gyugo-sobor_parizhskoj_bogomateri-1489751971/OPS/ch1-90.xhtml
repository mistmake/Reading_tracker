<p class="p">7. По каким причинам может затесаться золотой среди медяков?</p>
</div><p class="p1">Произошло неожиданное событие.</p><p class="p1">Тедкастерская гостиница все более и более становилась очагом веселья и смеха. Нигде нельзя было встретить более жизнерадостной суматохи. Владелец гостиницы и его слуга разрывались на части, без конца наливая посетителям эль, стаут и портер. По вечерам в низенькой зале светились все окна и не оставалось ни одного свободного столика. Пели, горланили; старинный камин с железной решеткой, доверху набитый углем, пылал ярким пламенем. Харчевня казалась вместилищем огня и шума.</p><p class="p1">Во дворе, то есть в театре, толпа была еще гуще.</p><p class="p1">Вся публика пригорода, все население Саутворка валом валило на «Побежденный хаос», так что к моменту поднятия занавеса, иными словами – когда опускалась подъемная стенка «Зеленого ящика», все места были заняты, окна битком набиты зрителями, галерея переполнена. Не видно было ни одной плиты на мощеном дворе: сплошная масса голов скрывала все.</p><p class="p1">Только ложа для знати по-прежнему оставалась пустой.</p><p class="p1">Вот почему в том месте, где находился как бы центр балкона, зияла черная дыра – на актерском языке это называется «провалом». Ни души. Всюду толпа, а здесь – никого.</p><p class="p1">И вот однажды вечером здесь кто-то появился.</p><p class="p1">Это было в субботу – в день, когда англичане спешат развлечься в предвидении воскресной скуки. В зале яблоку негде было упасть.</p><p class="p1">Мы говорим «в зале». Шекспир тоже долгое время давал представления во дворе гостиницы и называл его залом.</p><p class="p1">В ту минуту, когда раздвинулся занавес и начался пролог «Побежденного хаоса», Урсус, находившийся в это время на сцене вместе с Гомо и Гуинпленом, по обыкновению окинул взором публику и поразился.</p><p class="p1">Отделение «для знати» было занято.</p><p class="p1">Посреди ложи в кресле, обитом утрехтским бархатом, сидела женщина.</p><p class="p1">Рядом с ней не было никого, и казалось, она одна наполняет собой ложу.</p><p class="p1">Есть существа, которые излучают сияние. Так же как и Дея, эта женщина вся светилась, но совсем по-иному. Дея была бледна, эта женщина – румяна. Дея была занимающимся рассветом, эта женщина – багряной зарей. Дея была прекрасна, эта женщина – ослепительна. Дея была вся невинность, целомудрие, белизна, алебастр; эта женщина была пурпуром, и чувствовалось, что она не боится краснеть. Излучаемый ею свет как бы изливался за пределы ложи, а она неподвижно сидела в самом центре ее, торжественная, невозмутимая, словно идол.</p><p class="p1">В этой грязной толпе она сверкала точно драгоценный карбункул, она распространяла вокруг себя такой блеск, что все остальное тонуло во мраке: она затмевала собою тусклые лица окружающих. Перед ее великолепием меркло все.</p><p class="p1">Все глаза были устремлены на нее.</p><p class="p1">Среди зрителей находился и Том-Джим-Джек. Он, как и все другие, исчезал в сиянии ослепительной незнакомки.</p><p class="p1">Женщина, приковавшая к себе сначала внимание публики, отвлекла ее от спектакля и этим несколько помешала первому впечатлению от «Побежденного хаоса».</p><p class="p1">Хотя тем, кто сидел близко от нее, она и казалась видением, это была самая настоящая женщина. Быть может, даже слишком женщина. Она была высока, довольно полна; ее плечи и грудь были обнажены, насколько это позволяло приличие. В ушах сверкали крупные жемчужные серьги с теми странными подвесками, которые называются «ключами Англии». Платье на ней было из сиамской кисеи, затканной золотом, – чрезвычайная роскошь, ибо такое платье стоило тогда не менее шестисот экю. Большая алмазная застежка придерживала сорочку, по нескромной моде того времени еле прикрывавшую грудь; сорочка была из тончайшего фрисландского полотна, из которого Анне Австрийской шили простыни, свободно проходившие сквозь перстень. Незнакомка была как бы в панцире из рубинов, среди которых было несколько неграненых; юбка ее тоже сверкала множеством нашитых на ней драгоценных каменьев. Ее брови были подведены китайской тушью, а руки, локти, плечи, подбородок, ноздри, края век, мочки ушей, ладони, кончики пальцев нарумянены, и это обилие красноватых тонов придавало ей что-то чувственное и вызывающее. Во всей ее наружности проглядывало непреклонное желание быть прекрасной. И она в самом деле была прекрасна, прекрасна до ужаса. Это была пантера, способная притвориться ласковой кошечкой. Один глаз у нее был голубой, другой – черный.</p><p class="p1">Гуинплен, так же как и Урсус, не спускал глаз с этой женщины.</p><p class="p1">«Зеленый ящик» являл собой в известной мере зрелище фантастическое. «Побежденный хаос» воспринимался скорее как сновидение, чем как театральное представление.</p><p class="p1">Урсус и Гуинплен уже привыкли к тому, что для публики они – нечто вроде видения; теперь видение являлось им самим; призрак был в зрительном зале; настала их очередь испытать смятение. Они, которые завораживали других, теперь были заворожены сами.</p><p class="p1">Женщина смотрела на них, и они смотрели на нее.</p><p class="p1">Благодаря значительному расстоянию, отделявшему их от нее, и полумраку в «театральном зале», ее очертания терялись в световой дымке; казалось, это галлюцинация. Да, без сомнения, это была женщина, но не пригрезилась ли она им? Это вторжение света в их мрачное существование ошеломило их. Казалось, неведомая планета залетела к ним из неких блаженных миров. Она казалась очень большой, благодаря исходящему от нее сиянию. Женщина вся сверкала, как сверкает Млечный Путь на ночном небе. Драгоценные камни на ней казались звездами. Алмазная застежка была как будто одной из Плеяд. Великолепные очертания ее груди представлялись чем-то сверхъестественным. При одном только взгляде на это звездное существо мгновенно возникало леденящее ощущение близости к сферам вечного блаженства. Как будто с райских высот склонялось это непреклонное и спокойное лицо над убогим «Зеленым ящиком» и его жалкими зрителями. Острое любопытство к тому, что она видит, и снисхождение к любопытству черни отражались на этом лице небожительницы. Сойдя с горных высот, она позволяла земным тварям взирать на себя.</p><p class="p1">Урсус, Гуинплен, Винос, Фиби, толпа – все затрепетали, ослепленные этим блеском; только Дея, погруженная в вечную ночь, ни о чем не знала.</p><p class="p1">Эта женщина вызывала мысль о призраке, хотя в ее наружности не было ничего такого, что обычно связывают с этим словом: ничего призрачного, ничего таинственного, ничего воздушного, никакой дымки; это было розовое, свежее, цветущее здоровьем привидение, и, однако, свет падал на нее таким образом, что с того места, где находились Урсус и Гуинплен, она казалась им чем-то нереальным. Такие упитанные призраки действительно существуют: они именуются вампирами. Иная королева, которая тоже кажется толпе прелестным видением и пожирает по тридцати миллионов в год, высасывая их из народа, отличается таким же завидным здоровьем.</p><p class="p1">Позади этой женщины в полумраке стоял ее грум, el mozo<a href="ch2.xhtml#id7" class="a">[211]</a>, маленький человечек с детским личиком, бледный, хорошенький и серьезный. Очень юные и вместе с тем очень степенные слуги были в то время в моде. Грум был одет с головы до ног в бархат огненно-красного цвета; на его обшитой золотом шапочке красовался пучок вьюрковых перьев, что было отличительным признаком челяди знатных домов и свидетельствовало о высоком положении его госпожи.</p><p class="p1">Лакей – неотъемлемая часть господина, и потому в тени этой женщины нельзя было не заметить ее пажа-шлейфоносца. Наша память нередко удерживает многое без нашего ведома; Гуинплен и не подозревал, что пухлые щеки, важный вид и обшитая галуном, украшенная перьями шапочка маленького пажа запечатлелись в его памяти. Впрочем, грум вовсе не старался привлечь к себе чьи-либо взоры: обращать на себя внимание – значит быть непочтительным; он невозмутимо стоял в глубине ложи, около самой двери, держась как можно дальше от своей госпожи.</p><p class="p1">Хотя ее muchacho<a href="ch2.xhtml#id6" class="a">[212]</a>, ее паж, и находился при ней, казалось, что женщина в ложе совершенно одна: слуги в счет не идут.</p><p class="p1">Как ни велико было впечатление, произведенное незнакомкой, появление которой, казалось, входило в спектакль, развязка «Побежденного хаоса» потрясла зрителей еще сильнее. Эффект, как всегда, был неотразим. Быть может, благодаря присутствию в зале блистательной зрительницы (ведь зритель иногда является участником спектакля) публика была особенно наэлектризована. Смех Гуинплена в этот вечер казался заразительнее, чем когда бы то ни было. Все присутствующие покатывались от хохота в неописуемом припадке судорожного веселья, и среди всех голосов резко выделялся зычный смех Том-Джим-Джека.</p><p class="p1">И только незнакомка, просидевшая весь вечер неподвижно, как статуя, глядя на сцену пустыми глазами призрака, ни разу не улыбнулась. Да, это был призрак, но призрак яркий, будто солнечный спектр.</p><p class="p1">Когда представление окончилось и стенка фургона была поднята, обитатели «Зеленого ящика» собрались, по обыкновению, в своем тесном кругу, и Урсус высыпал из мешка на уже приготовленный для ужина стол всю выручку. И вдруг в куче медных монет засверкала испанская золотая унция.</p><p class="p1">– Она! – воскликнул Урсус.</p><p class="p1">Среди позеленевших медных грошей золотая унция действительно сияла, подобно той женщине среди серой толпы.</p><p class="p1">– Она заплатила за свое место квадрупль! – продолжал восхищенный Урсус.</p><p class="p1">В эту минуту в «Зеленый ящик» вошел хозяин гостиницы; просунув руку в заднее окошко фургона, он отворил в стене форточку, о которой мы упоминали и которая находилась на уровне окна, благодаря чему из нее видна была вся площадь. Он молча поманил к себе Урсуса и знаками показал ему, чтобы тот взглянул на площадь. От харчевни быстро отъезжала нарядная карета с роскошной упряжкой и лакеями в шляпах, разукрашенных перьями, и с факелами в руках.</p><p class="p1">Почтительно придерживая большим и указательным пальцами квадрупль, Урсус показал его дядюшке Никлсу и произнес:</p><p class="p1">– Это богиня.</p><p class="p1">Затем его взор упал на карету, заворачивавшую за угол, на крышке которой свет от факелов освещал восьмиконечную корону.</p><p class="p1">Тогда он воскликнул:</p><p class="p1">– Это больше, чем богиня! Это герцогиня!</p><p class="p1">Карета скрылась из виду. Стук колес замер вдали.</p><p class="p1">Несколько мгновений Урсус стоял неподвижно, восторженно воздевая кверху руку с квадруплем, словно дарохранительницу, – тем самым жестом, каким возносят святые дары.</p><p class="p1">Потом положил монету на стол и, не сводя с нее глаз, заговорил о «госпоже». Хозяин гостиницы отвечал на его вопросы. Да, это герцогиня. Ее титул известен. А имя? Имени никто не знает. Но Никлс рассмотрел вблизи карету с гербами и лакеев в шитых золотом ливреях. На кучере парик – точь-в-точь как у лорд-канцлера. Карета редко встречающегося образца, который в Испании называется «повозка-гробница», – великолепный экипаж с верхом, напоминающим по форме крышку гроба, увенчанную короной. Грум был такой крошечный, что вполне свободно помещался на подножке кареты с наружной стороны дверцы. Эти миловидные существа носят обычно шлейфы знатных дам; иногда же им поручают носить и любовные послания. Заметил ли кто пучок вьюрковых перьев на его шапочке? Вот бесспорный признак знатности его госпожи. Всякий, кто, не имея на то права, украсит головной убор своего слуги такими, перьями, платит штраф. Никлс видел вблизи и самое даму. Настоящая королева. Такое богатство не может не красить человека. И кожа становится белей, и взгляд более гордым, и поступь благороднее, и движения уверенней. Ничто не в состоянии сравниться с надменным изяществом вечно праздных рук. Никлс описывал великолепие этой белой с голубыми жилками кожи, шею, плечи незнакомки, ее румяна, жемчужные серьги, прическу, волосы, припудренные золотым порошком, несчетное множество драгоценных камней, рубинов, алмазов.</p><p class="p1">– Они блестят не так ярко, как ее глаза, – пробормотал Урсус.</p><p class="p1">Гуинплен молчал.</p><p class="p1">Дея слушала.</p><p class="p1">– И знаете, что удивительнее всего? – сказал трактирщик.</p><p class="p1">– Что? – спросил Урсус.</p><p class="p1">– Я видел, как она садилась в карету.</p><p class="p1">– Ну и что?</p><p class="p1">– Она села не одна.</p><p class="p1">– Вот как!</p><p class="p1">– С ней сел еще один человек.</p><p class="p1">– Кто?</p><p class="p1">– Угадайте.</p><p class="p1">– Король? – сказал Урсус.</p><p class="p1">– Прежде всего, – заметил дядюшка Никлс, – у нас теперь нет короля. Нами правит королева. Угадайте же, кто сел в карету этой герцогини.</p><p class="p1">– Юпитер, – сказал Урсус.</p><p class="p1">Трактирщик ответил:</p><p class="p1">– Том-Джим-Джек.</p><p class="p1">– Том-Джим-Джек? – вырвалось у Гуинплена, не проронившего до этой минуты ни слова.</p><p class="p1">Все были поражены. Наступило молчание. И в этой тишине вдруг раздался тихий голос Деи:</p><p class="p1">– Нельзя ли больше не пускать сюда эту женщину?</p></span><span id="id147"><div class="title6">
<p class="p">8. Признаки отравления</p>
</div><p class="p1">«Призрак» больше не возвращался.</p><p class="p1">Он не вернулся в ложу, но снова возник в душе Гуинплена.</p><p class="p1">Гуинплен был в некотором смятении.</p><p class="p1">Ему показалось, что он впервые в жизни увидал женщину.</p><p class="p1">И, сразу же отдавшись необычным грезам, он наполовину совершил грехопадение. Надо остерегаться, грез, овладевающих нами против нашей воли. Мечта обладает таинственностью и неуловимостью аромата. По отношению к мысли она – то же, что благоухание туберозы. Порою она одурманивает, словно ядовитый аромат, и проникает в мысли, словно угар. Грезами можно отравиться так же, как цветами. Упоительное самоубийство, восхитительное и ужасное!</p><p class="p1">Дурные мысли – самоубийство души. В них-то и заключается отрава. Мечта привлекает вас, обольщает, заманивает, затягивает в свои сети, затем превращает вас в своего сообщника: она делает вас соучастником в обмане совести. Она одурманивает, а потом развращает. О ней можно сказать то же, что об азартной игре. Сперва человек бывает жертвой мошенничества, затем начинает плутовать сам.</p><p class="p1">Гуинплен предался мечтам.</p><p class="p1">Он никогда не видел Женщины.</p><p class="p1">Он видел лишь тень ее в женщинах простонародья и видел душу ее в Дее.</p><p class="p1">Теперь он увидел настоящую женщину.</p><p class="p1">Он увидел теплую нежную кожу, под которой чувствовалось биение пылкой крови; очертания тела, пленяющие четкостью мрамора и плавными изгибами волны; высокомерно-бесстрастное лицо, выражающее одновременно и призыв и отказ, лицо с ослепительно прекрасными чертами; волосы, точно озаренные отблеском пожара; изящество наряда, пробуждающего трепет сладострастия; обольстительную полунаготу; надменное желание воспламенять вожделения завороженной толпы, но только издали; неотразимое кокетство; влекущую неприступность; искушение, идущее рука об руку с предвидением гибели; обещание чувствам и угрозу рассудку; сложное чувство тревоги, порожденное страстным влечением и страхом. Он только что видел все это. Он только что видел женщину.</p><p class="p1">То, что он только что видел, было и больше и меньше, чем женщина. То была влекущая женская плоть – и в то же время богиня Олимпа. Олицетворенная чувственность и красота небожительницы.</p><p class="p1">Ему воочию предстала тайна пола.</p><p class="p1">И где? За пределами досягаемого.</p><p class="p1">В бесконечном отдалении от него.</p><p class="p1">Какая насмешка судьбы: душу, эту небесную сущность, он держал в руках, она принадлежала ему, – это была Дея; женскую плоть, эту сущность земную, он только видел издали, на недосягаемой высоте, – это была та женщина.</p><p class="p1">Герцогиня!</p><p class="p1">«Больше, чем богиня», – так сказал о ней Урсус.</p><p class="p1">Какая высота!</p><p class="p1">Даже в мечтах было бы страшно взобраться на такую крутизну.</p><p class="p1">Неужели он так безрассуден, что думает об этой незнакомке? Он старался побороть эти чары.</p><p class="p1">Он вспоминал все, что рассказывал ему Урсус о жизни этих высоких, почти царственных особ; разглагольствования философа, казавшиеся ему до сих пор не заслуживающими внимания, теперь становились вехами его размышлений, – наша память нередко бывает прикрыта лишь тончайшей пеленой забвения, сквозь которую в нужную минуту нам удается разглядеть то, что погребено под нею; Гуинплен старался представить себе высший свет, мир знати, к которому принадлежала эта женщина, этот мир, стоящий неизмеримо выше мира низшего, мира простого народа, к которому принадлежал он сам. Да и принадлежал ли он к народу? Не был ли он, скоморох, ниже даже тех, кто находится в самом низу? Впервые с тех пор, как он стал мыслить, у него сжалось сердце от сознания своего низкого положения, от того, что теперь мы назвали бы чувством унижения. Картины, набросанные Урсусом, его восторженные лирические описания замков, парков, фонтанов и колоннад, его подробные рассказы о богатстве и могуществе знати оживали в памяти Гуинплена, наполняясь образами, в которых действительность смешивалась с фантазией. Он был одержим видениями этих заоблачных высот. Ему казалось химерой, что человек может быть лордом. А между тем такие люди существуют. Невероятно, просто невероятно! На свете есть лорды! Созданы ли они из плоти и крови, как все люди? Вряд ли. Он чувствовал, что находится в глубоком мраке, что он окружен со всех сторон стеною; словно человек, брошенный на дно колодца, он видел там, в зените, над самой головой, ослепительное смешение лазури, света и видений – обиталище олимпийцев, и в самом центре этого лучезарного мира сияла она, герцогиня.</p><p class="p1">Он испытывал к этой женщине какое-то странное чувство, в котором непреодолимое влечение было неотделимо от сознания ее недоступности. И он без конца мысленно возвращался к этой вопиющей нелепости: ощущать душу близ себя, рядом с собой, тесно соприкасаясь с ней на каждом шагу, плоть же видеть только в идеальной сфере, в области недосягаемого.</p><p class="p1">Ни одна из этих мыслей не была совершенно четкой. Это был какой-то туман, где все было зыбко, где все ежеминутно меняло очертания. Это было глубокое смятение чувств.</p><p class="p1">Впрочем, ему ни разу не приходило в голову сделать попытку приблизиться к герцогине. Даже в мечтах не разрешил бы он себе подняться на такую высоту. И это было его счастьем.</p><p class="p1">Ведь стоит лишь раз поставить ногу на ступень этой лестницы, чтобы ее дрожание навсегда помутило ваш рассудок: думаешь, что восходишь на Олимп, а попадаешь в Бедлам. Явственное вожделение привело бы Гуинплена в ужас. Но ничего подобного он не испытывал.</p><p class="p1">Да и увидит ли он еще когда-нибудь эту женщину? По всей вероятности, никогда. Влюбиться в зарницу, вспыхнувшую на горизонте, – на такое безумие не способен никто. Плениться звездой – это все-таки еще понятно: ее увидишь снова, она опять появится в небе на том же месте. Но можно ли загореться страстью к промелькнувшей молнии?</p><p class="p1">В его душе одна мечта сменялась другою. В них то возникал, то вновь исчезал образ этого божества, этой величественной, лучезарной женщины, сияющей из глубины ложи. Он то думал о ней, то забывал, то отвлекался чем-нибудь другим и снова возвращался все к тем же мыслям. Они будто баюкали его, но не могли усыпить.</p><p class="p1">Это не давало ему спать в течение нескольких ночей. Бессонница, как и сон, полна видений.</p><p class="p1">Нет почти никакой возможности выразить точными словами неясные процессы, протекающие в нашем мозгу. Слова неудобны именно тем, что очертания их резче, чем контуры мысли. Не имея четких контуров, мысли зачастую сливаются друг с другом; слова – иное дело. Поэтому какая-то смутная часть нашей души всегда ускользает от слов. Слово имеет границы, у мысли их нет.</p><p class="p1">Наш внутренний мир так смутен и необъятен, что происходившее в душе Гуинплена не имело почти никакого отношения к Дее. Дея оставалась средоточием его помыслов, она была священной; ничто не могло коснуться ее.</p><p class="p1">А между тем, – душа человека вся соткана из таких противоречий, – в нем происходила борьба. Сознавал ли он это? Вероятно, только смутно догадывался.</p><p class="p1">В самой глубине души, в наиболее уязвимом ее месте, там, где у каждого легко может возникнуть трещина, он чувствовал столкновение противоположных желаний. Для Урсуса все это было бы ясно. Гуинплену было трудно разобраться в этом.</p><p class="p1">Два инстинкта боролись в нем: влечение к идеалу и влечение к женщине. На мосту, перекинутом через бездну, подобные поединки между ангелом белым и ангелом черным происходят нередко.</p><p class="p1">Наконец черный ангел был низвергнут.</p><p class="p1">Однажды как-то сразу Гуинплен перестал думать о незнакомке.</p><p class="p1">Борьба двух начал, схватка между земной и небесной сущностью Гуинплена произошла в тайниках его души, на такой ее глубине, что почти не достигла его сознания.</p><p class="p1">Несомненным было лишь одно: ни на мгновение не переставал он обожать Дею.</p><p class="p1">Когда-то давно – чудилось ему – он пережил какое-то смятение, его кровь кипела, но теперь с этим было покончено. Осталась только Дея.</p><p class="p1">Гуинплен даже удивился бы, если б ему сказали, что Дея хотя одну минуту была в опасности.</p><p class="p1">Неделю или две спустя призрак, который, казалось, угрожал этим двум существам, исчез бесследно.</p><p class="p1">Сердце Гуинплена снова пламенело одной любовью к Дее.</p><p class="p1">К тому же, как мы уже говорили, герцогиня больше не возвращалась.</p><p class="p1">Урсус находил это в порядке вещей. «Дама с квадруплем» – явление необычное. Такое существо входит однажды, платит за место золотой, потом исчезает бесследно. Жизнь была бы слишком хороша, если б это повторялось.</p><p class="p1">Что касается Деи, она ни разу даже не упомянула больше о той женщине, отошедшей в прошлое. Она, вероятно, прислушивалась к разговорам; вздохи Урсуса и время от времени вырывавшиеся у него многозначительные восклицания «Не каждый же день получать золотые унции!» пробудили в ней смутный страх. Она теперь больше никогда не заговаривала о незнакомке. В этом сказывался глубокий инстинкт. Порою душа безотчетно принимает меры предосторожности, тайна которых ей не всегда бывает ясна. Когда молчишь о ком-нибудь, кажется, что этим отстраняешь его от себя. Расспрашивая о нем, боишься привлечь его. Можно оградить себя молчанием, как ограждаешь себя, запирая дверь.</p><p class="p1">Происшествие было забыто.</p><p class="p1">Следовало ли придавать ему какое-либо значение? Произошло ли это на самом деле? Можно ли было сказать, что между Гуинпленом и Деей промелькнула какая-то тень? Дея не знала об этом, а Гуинплен уже забыл. Нет. Ничего и не было. Образ герцогини растаял в отдалении, словно только померещился им. Просто Гуинплен замечтался на минуту, а теперь очнулся от грез. Рассеявшиеся мечты, как и рассеявшийся туман, не оставляют следов, и после того, как туча пронеслась мимо, любовь в душе испытывает не больше ущерба, чем солнце в небе.</p></span></span></span></span>
