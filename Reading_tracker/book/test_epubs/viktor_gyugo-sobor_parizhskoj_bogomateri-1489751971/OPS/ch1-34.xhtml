<span><span><span id="id44"><div class="title6">
<p class="p">VII. Мрачный монах</p>
</div><p class="p1">Знаменитый кабак «Яблоко Евы» находился в университетском квартале, на углу улиц Рондель и Батонье. Он помещался в нижнем этаже и представлял собой довольно большую комнату с очень низким сводчатым потолком, поддерживаемым посредине толстым деревянным столбом, выкрашенным в желтое. Все помещение было заставлено столами, а по стенам висели блестящие жестяные кружки. Тут всегда была масса народу, желавшего выпить, и много уличных женщин. Одно окно выходило на улицу, у двери же вилась виноградная лоза, а над дверью был прибит скрипучий железный лист, украшенный изображениями женщины и яблока. Заржавевший от дождя лист раскачивался от ветра на железном гвозде. Этот своеобразный флюгер заменял вывеску.</p><p class="p1">Наступала ночь, на перекрестке было темно. Кабак, освещенный многочисленными свечами, пылал во мраке, как кузнечный горн. Оттуда, сквозь разбитые стекла, слышались звон стаканов, пьяные крики, крепкие словца и перебранка. Сквозь запотевшее окно смутно виднелись многочисленные посетители, а по временам оттуда раздавались взрывы хохота. Прохожие, спешившие по своим делам, проходили не оглядываясь мимо шумного окна. Лишь изредка какой-нибудь мальчишка в лохмотьях, встав на цыпочки, старался заглянуть в окно и крикнуть старинную прибаутку, которой дразнили тогда пьяниц: «Aux Houls, saouls, saouls, saouls»<a href="ch2.xhtml#id146" class="a">[111]</a>.</p><p class="p1">Но теперь взад и вперед около шумной таверны терпеливо прогуливался какой-то человек, не спуская с нее глаз и не отходя дальше, чем часовой от своей будки. На нем был плащ, которым он старательно закрывал себе лицо. Плащ этот был только что куплен у старьевщика, торговавшего в лавочке рядом с «Яблоком Евы». Вероятно, прохожий или прозяб в холодный мартовский вечер, или хотел скрыть свой костюм. По временам он останавливался перед мутным окном с железной решеткой, вслушивался, вглядывался и топал ногой.</p><p class="p1">Наконец дверь кабака отворилась. Этого, по-видимому, только и дожидался прохожий. Два человека вышли на улицу, и луч света, вырвавшийся через отворенную дверь, на минуту озарил их веселые лица. Незнакомец в плаще продолжал свои наблюдения, спрятавшись под навесом крыльца, на другой стороне улицы.</p><p class="p1">– Гром и молния! – воскликнул один из пьяниц. – Сейчас пробьет семь часов, а ведь это час моего свидания.</p><p class="p1">– Я вам говорю, – бормотал его товарищ заплетающимся языком, – я вам говорю, что я не живу на улице Сквернословия, indighus qui inter mala verba habitat. Я живу на улице Жан – Мягкий хлеб, in vico Johannis Pain Mollet. Вы более рогаты, чем единорог, если вы утверждаете обратное. Каждый знает, что кто раз сел верхом на медведя, тот ничего не боится, а только вы полакомиться любите не хуже Сен-Жака де Лопиталя.</p><p class="p1">– Жан, друг мой, вы пьяны, – говорил второй, но тот продолжал, пошатываясь:</p><p class="p1">– Что вы там ни говорите, капитан Феб, но давно доказано, что у Платона был профиль легавой собаки.</p><p class="p1">Читатель, без сомнения, уже узнал наших двух друзей, капитана и студента. Да и незнакомец, скрывавшийся в тени, тоже, по-видимому, узнал их, потому что он медленно последовал за ними, описывая на ходу такие же зигзаги, как пьяный Жан, увлекавший за собой и капитана, хотя тот, более привычный к вину, держался на ногах вполне твердо.</p><p class="p1">Внимательно прислушиваясь, незнакомец в плаще не пропустил ни одного слова из следующего интересного разговора:</p><p class="p1">– Черт возьми! Старайтесь же идти прямо, господин бакалавр. Сейчас я уйду от вас, ведь уже семь часов, а у меня назначено свидание с красоткой.</p><p class="p1">– Отстаньте от меня, пожалуйста. Вон я вижу звезду, вижу огненные копья. А вы страсть как похожи на Дампмартенский замок, который лопается от смеху.</p><p class="p1">– Клянусь бородавками моей бабушки, Жан, нельзя городить такую чушь! Скажите-ка мне лучше, остались ли у вас деньги?</p><p class="p1">– Господин ректор, тут нет никакой ошибки: parva boucheria значит маленькая бойня.</p><p class="p1">– Жан, друг мой Жан! Ведь я вам говорил, что у меня назначено свидание с этой девочкой за мостом Святого Михаила. Там негде устроиться, иначе как у старухи Фалурдель, а ей надо заплатить за комнату. Старая карга с седыми усами мне не поверит в долг. Жан, пожалуйста, посмотрите, неужели мы пропили все поповские деньги? Неужели у вас не осталось ни одного су?</p><p class="p1">– Сознание хорошо проведенного дня – лучшая приправа к кушаньям…</p><p class="p1">– Черт тебя возьми, наконец! Вот проклятье! Отвечай, есть у тебя еще деньги? Коль есть, так давай, а не то я сам обыщу тебя, хоть бы ты был покрыт проказой, как Иов, или паршой, как Цезарь!</p><p class="p1">– Милостивый государь! Улица Гальяш одним концом упирается в улицу ла Веррули, а другим – в улицу Тиксеранди.</p><p class="p1">– Ну да, ну да, голубчик, улица Гальяш прекрасная улица, но постарайтесь немного прийти в себя. Ведь мне нужно всего одно су и, главное, не позднее семи часов!</p><p class="p1">– Тс-с, слушайте хорошенько куплет:</p><div class="poem">
<div class="stanza">
<p class="v">Quand les rats mangerout les chats,</p>
<p class="v">Le roi sera seigneur d’Arras;</p>
<p class="v">Quand la mer, qui est grande et lèе,</p>
<p class="v">Sera à la Sainte Jean gelee</p>
<p class="v">On verra, par dessus la grace</p>
<p class="v">Sortir ceux d’Arras de leur place<a href="ch2.xhtml#id145" class="a">[112]</a>.</p>
</div>
</div><p class="p1">– Ну ладно, чертов школяр, чтоб тебе удавиться еще в материнской утробе! – воскликнул Феб и грубо толкнул пьяного. Тот скользнул вдоль стены и упал, как мешок, на мостовую. Движимый чувством братского сострадания, никогда не покидающего окончательно сердца пьяниц, Феб подпихнул ногой Жана к даровой подушке, всегда готовой к услугам бедняков у каждой тротуарной тумбы и презрительно называемой богачами кучей мусора. Капитан удобно уложил голову Жана на изголовье из капустных кочерыжек, и в ту же минуту Жан захрапел великолепным басом. Но досада еще не совсем угасла в сердце капитана.</p><p class="p1">– Тебе же хуже, коль мусорщик подберет тебя по дороге в свою тележку! – проговорил он, обращаясь к уснувшему приятелю, и зашагал дальше.</p><p class="p1">Незнакомец в плаще, не отстававший от него ни на шаг, остановился на минуту перед спящим, как будто в нерешительности, потом, глубоко вздохнув, направился опять вдогонку за капитаном.</p><p class="p1">И мы, читатель, по их примеру, оставим Жана спать под благосклонным взором звезд и последуем за капитаном и незнакомцем в плаще. Выйдя на улицу Сент-Андре-Дезарк, капитан заметил, что за ним кто-то следит. Случайно обернувшись, он обратил внимание на какую-то тень, кравшуюся вслед за ним вдоль стен. Капитан остановился – и тень остановилась, он пошел – зашевелилась и тень. Это обстоятельство, впрочем, его нисколько не встревожило. «На здоровье, – подумал он, – все равно у меня нет ни гроша».</p><p class="p1">Перед Отюнским коллежем Феб остановился. Здесь он получил начатки того, что называл своим образованием, и по укоренившейся школьной привычке никак не мог пройти мимо, не нанеся статуе кардинала Пьера Бертрана, стоявшей у входа, того оскорбления, на которое так горько жалуется Приап в сатире Горация: Olim truncus eram ficulnus<a href="ch2.xhtml#id144" class="a">[113]</a>. Благодаря стараниям капитана надпись «Eduensis episcopus»<a href="ch2.xhtml#id143" class="a">[114]</a> почти уже исчезла. И теперь, по обыкновению, он остановился перед статуей. Улица была совершенно безлюдна. Вдруг, в ту минуту, как он приводил в порядок свой туалет, посматривая по сторонам, он заметил тень, приближавшуюся к нему медленно, так медленно, что он успел рассмотреть плащ и шляпу на ее голове. Подойдя к нему, тень остановилась и замерла неподвижно, как статуя кардинала Бертрана.</p><p class="p1">Но взгляд ее был устремлен прямо на капитана Феба, и глаза искрились тем особым светом, каким горят глаза кошки в темноте.</p><p class="p1">Капитан был не трус и нисколько бы не испугался встречи с бродягой, вооруженным кистенем. Но эта ходячая статуя, этот окаменевший человек сковал его сердце ужасом. Ему смутно вспомнились ходившие в то время по городу легенды о каком-то «мрачном монахе», бродившем по ночам по улицам Парижа. Несколько секунд он простоял в оцепенении и наконец заговорил с деланым смехом:</p><p class="p1">– Сударь, если вы вор, как мне кажется, то вы похожи на цаплю, собравшуюся поживиться пустым орехом… Я, голубчик, сын разорившихся родителей. Поищите лучше в другом месте, ну, хотя бы в этой часовне, здесь много серебряной утвари.</p><p class="p1">Из-под плаща призрака показалась рука и сжала руку Феба с силою орлиных когтей. Призрак заговорил:</p><p class="p1">– Капитан Феб де Шатопер!</p><p class="p1">– Ах, черт! – воскликнул Феб. – Ты знаешь, как меня зовут?</p><p class="p1">– Я не только знаю, как вас зовут, – продолжал незнакомец в плаще своим замогильным голосом, – я знаю, что у вас на сегодняшний вечер назначено свидание.</p><p class="p1">– Верно, – отвечал озадаченный Феб.</p><p class="p1">– В семь часов.</p><p class="p1">– Да, через четверть часа.</p><p class="p1">– У старухи Фалурдель.</p><p class="p1">– Совершенно верно.</p><p class="p1">– За мостом Святого Михаила.</p><p class="p1">– Святого Михаила Архангела, как говорится в молитвах.</p><p class="p1">– Нечестивец! – пробормотал призрак. – С женщиной.</p><p class="p1">– Confiteor<a href="ch2.xhtml#id142" class="a">[115]</a>.</p><p class="p1">– И ее зовут…</p><p class="p1">– Смеральдой, – подсказал Феб, к которому мало-помалу вернулась его всегдашняя беспечность.</p><p class="p1">При этом имени призрак яростно стиснул руку Феба.</p><p class="p1">– Капитан Феб де Шатопер, ты лжешь!</p><p class="p1">Тот, кто увидал бы, каким гневом вспыхнуло при этих словах лицо капитана Феба, как стремительно он отступил назад, вырвав свою руку из сжимавших ее тисков, и каким гордым движением схватился за рукоятку своей шпаги, кто видел бы, с какой мрачной невозмутимостью встретил незнакомец в плаще этот порыв гнева, тот содрогнулся бы от ужаса. Сцена эта напоминала борьбу Дон Жуана со статуей Командора.</p><p class="p1">– Клянусь Сатаной! – воскликнул капитан. – Такие слова нечасто приходилось слышать Шатоперам, и ты не посмеешь их повторить.</p><p class="p1">– Ты лжешь! – хладнокровно отвечал призрак.</p><p class="p1">Капитан заскрежетал зубами. Он забыл в эту минуту, что, может быть, имеет дело с «мрачным монахом», призраком, привидением, и помнил только о полученных оскорблениях.</p><p class="p1">– А, ну ладно же! – проговорил он, задыхаясь от гнева, и обнажил шпагу, заикаясь и дрожа как в лихорадке от негодования. – Ну, становись в позицию! Живей! Обнажай шпагу, и будем драться насмерть!</p><p class="p1">Но призрак не двигался. Увидав, что противник его готовится к нападению, он произнес:</p><p class="p1">– Капитан Феб, – и в голосе его звучали горькие ноты, – вы позабыли о своем свидании.</p><p class="p1">Гнев людей, подобных Фебу, похож на кипящий молочный суп с высоко вздувшимися пузырями, моментально лопающимися, если на них брызнуть каплей холодной воды. Простое замечание незнакомца заставило капитана опустить уже обнаженную шпагу.</p><p class="p1">– Капитан, – продолжал незнакомец, – завтра, послезавтра, через месяц, через десять лет я всегда готов перерезать вам горло, но сегодня отправляйтесь сначала на свидание.</p><p class="p1">– В самом деле! – согласился Феб, как будто обрадованный представившимся исходом. – И дуэль, и любовное свидание одинаково прекрасные вещи, так зачем же упускать одну из них?</p><p class="p1">И он вложил шпагу в ножны.</p><p class="p1">– Отправляйтесь же на свое свидание, – снова проговорил незнакомец.</p><p class="p1">– Очень вам благодарен за любезный совет, – отвечал с маленькой запинкой Феб. – Действительно, мы и завтра поспеем наделать дырок в костюме своего прародителя Адама. Весьма признателен вам за разрешение приятно провести время. Правда, я рассчитывал сейчас приколоть вас и все-таки поспеть вовремя к своей красотке, тем более что заставить женщину немножко подождать себя даже служит признаком хорошего тона в таких случаях. Но вы, по-видимому, здоровый малый, и вернее будет отложить наши счеты до завтра. А теперь спешу на свидание, ведь оно назначено в семь часов, как вам известно. – Тут капитан Феб почесал у себя за ухом. – Ах, черт, я и забыл, что у меня нет ни гроша, чтобы заплатить за каморку, а старая ведьма потребует плату вперед. Ни за что не поверит в долг.</p><p class="p1">– Вот вам чем заплатить.</p><p class="p1">И Феб почувствовал, как холодная рука незнакомца сунула ему какую-то крупную монету. Он не мог удержаться, чтобы не схватить деньги, и крепко пожал руку, протянувшую их.</p><p class="p1">– Ей-богу, – воскликнул он, – вы славный малый!</p><p class="p1">– С одним условием, – продолжал незнакомец. – Докажите мне, что я ошибся, а вы говорили правду. Спрячьте меня где-нибудь так, чтобы я мог сам убедиться, что эта женщина именно та, чье имя вы назвали.</p><p class="p1">– Пожалуйста, – отвечал Феб, – мне это безразлично. Мы возьмем келью святой Марты. Там есть рядом собачья конура, откуда все прекрасно видно.</p><p class="p1">– Ну так пойдем, – промолвила тень.</p><p class="p1">– К вашим услугам, – отозвался капитан. – Не знаю, может, вы и сам дьявол, но на сегодняшний вечер – мы друзья. А завтра я уплачу вам долги моего кошелька и моей шпаги.</p><p class="p1">Они быстро зашагали вперед. Через несколько минут по плеску воды капитан догадался, что они подходят к мосту Святого Михаила, в то время застроенному домами.</p><p class="p1">– Сначала я вас спрячу, – обратился Феб к своему спутнику, – а потом пойду за красоткой. Она меня поджидает у Малого Шатлэ.</p><p class="p1">Незнакомец ничего не ответил. За всю дорогу он не проронил ни слова. Феб остановился перед низенькой дверью и начал стучать в нее изо всех сил. В щелях двери показался свет.</p><p class="p1">– Кто там? – спросил старческий голос.</p><p class="p1">– Черт! Дьявол! Сатана! – отвечал капитан.</p><p class="p1">Дверь сейчас же отворилась, и глазам посетителей представились старая женщина и старая лампа, обе одинаково дрожащие. Старуха была сгорбленная, одетая в лохмотья, с трясущейся головой и узенькими щелками вместо глаз, повязанная какой-то тряпкой, вся покрытая морщинами на лице, на руках, на шее. Губы у нее ввалились между беззубых десен, а вокруг рта торчали пучки седых волос, придававшие ей сходство с кошкой. И внутренность комнаты была так же непривлекательна и ветха, как ее хозяйка. Стены, вымазанные известкой, потолок, подпертый почерневшими балками, убогий очаг, повсюду паутина. Посреди комнаты было нагромождено несколько хромоногих столов и расшатанных скамеек. Грязный ребенок копался в золе, а в глубине виднелась крутая деревянная лестница, упиравшаяся в люк, проделанный в потолке.</p><p class="p1">Переступив порог притона, таинственный спутник Феба старательно закрыл лицо плащом до самых глаз. Между тем капитан, продолжая отчаянно ругаться, поспешил «сверкнуть золотым экю на солнышке», по выражению нашего неподражаемого Ренье.</p><p class="p1">– Дай нам келью святой Марты, – распорядился капитан.</p><p class="p1">Старуха назвала его монсеньором и спрятала экю в ящик стола. Это была та монета, которую дал Фебу человек в черном плаще. Не успела она повернуться спиной, как лохматый, оборванный мальчишка, копавшийся в золе, ловко подкрался к столу, вытащил из ящика монету, а на ее место положил сухой лист, оторванный им от веника.</p><p class="p1">Старуха, пригласив обоих посетителей следовать за собою, полезла вверх по лестнице. Поднявшись наверх, она поставила лампу на сундук, а Феб, очевидно хорошо знакомый с расположением дома, толкнул дверь в темную каморку.</p><p class="p1">– Войдите сюда, любезнейший, – пригласил он своего спутника.</p><p class="p1">Тот, не говоря ни слова, повиновался. Дверь захлопнулась за ним, он услыхал, как Феб запер ее на замок и потом спустился вниз за старухой. Стало совсем темно.</p></span></span></span>
