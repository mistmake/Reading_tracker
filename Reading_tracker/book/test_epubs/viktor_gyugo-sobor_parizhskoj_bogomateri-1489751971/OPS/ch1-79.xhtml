<span><span><span id="id126"><div class="title6">
<p class="p">Часть вторая</p>
<p class="p">Гуинплен и Дея</p>
</div><span id="id127"><div class="title6">
<p class="p">1. Лицо человека, которого до сих пор знали только по его поступкам</p>
</div><p class="p1">Природа не пожалела своих даров для Гуинплена. Она наделила его ртом, открывающимся до ушей, ушами, загнутыми до самых глаз, бесформенным носом, созданным для того, чтобы на нем подпрыгивали очки фигляра, и лицом, на которое нельзя было взглянуть без смеха.</p><p class="p1">Мы сказали, что природа щедро осыпала Гуинплена своими дарами. Но было ли это делом одной природы?</p><p class="p1">Не помог ли ей кто-нибудь в этом?</p><p class="p1">Глаза – как две узкие щелки, зияющее отверстие вместо рта, плоская шишка с двумя дырками вместо ноздрей, сплющенная лепешка вместо лица – в общем, нечто, являющееся как бы воплощением смеха; было ясно, что природа не могла создать такое совершенное произведение искусства без посторонней помощи.</p><p class="p1">Но всегда ли смех выражает веселье?</p><p class="p1">Если при встрече с этим фигляром, – ибо Гуинплен был фигляром, – после того как рассеивалось первоначальное веселое впечатление, вызываемое наружностью этого человека, в него вглядывались более внимательно, на его лице замечали признаки мастерской работы. Такое лицо – не случайная игра природы, но плод чьих-то сознательных усилий. Такая законченная отделка не свойственна природе. Человек бессилен сделать из себя красавца, но обезобразить себя вполне в его власти. Вы не превратите готтентотский профиль в римский, но из греческого носа легко сделаете нос калмыка. Для этого достаточно раздавить переносицу и расплющить ноздри. Недаром же вульгарная средневековая латынь создала глагол denasare<a href="ch2.xhtml#id233" class="a">[191]</a>. Не был ли Гуинплен в детстве столь достойным внимания, чтобы кто-то занялся изменением его лица? Возможно! Хотя бы только с целью показывать его и наживать на этом деньги. Судя по всему, над этим лицом поработали искусные фабриканты уродов. Очевидно, какая-то таинственная и, по всей вероятности, тайная наука, относившаяся к хирургии так, как алхимия относится к химии, исказила, несомненно еще в очень раннем возрасте, его природные черты и умышленно создала это лицо. Это было проделано по всем правилам науки, специализировавшейся на надрезах, заживлении тканей и наложении швов: был увеличен рот, рассечены губы, обнажены десны, вытянуты уши, переломаны хрящи, сдвинуты с места брови и щеки, расширен скуловой мускул; после этого швы и рубцы были заглажены, и на обнаженные мышцы натянута кожа с таким расчетом, чтобы навеки сохранить на этом лице зияющую гримасу смеха; так возникла в руках искусного ваятеля эта маска – Гуинплен.</p><p class="p1">С таким лицом люди не рождаются.</p><p class="p1">Как бы там ни было, маска Гуинплена удалась на славу. Гуинплен был даром провидения для всех скучающих людей. Какого провидения? Не существует ли наряду с провидением божественным и провидение дьявольское? Мы ставим этот вопрос, не разрешая его.</p><p class="p1">Гуинплен был скоморохом. Он выступал перед публикой. Ничто не могло сравниться с производимым им впечатлением. Он исцелял ипохондрию одним лишь своим видом. Людям, носившим траур, приходилось избегать Гуинплена, ибо с первого же взгляда они невольно начинали смеяться до неприличия. Однажды явился палач; Гуинплен заставил и его расхохотаться. Увидав Гуинплена, люди хватались за бока: он только раскрывал рот, как все покатывались от смеха. Он был полюсом, противоположным печали. Сплин находился на одном конце, Гуинплен – на другом. Поэтому-то на всех ярмарках и площадях за ним установилась лестная слава непревзойденного урода.</p><p class="p1">Гуинплен вызывал смех своим собственным смехом. Однако сам он не смеялся. Смеялось его лицо, но не он сам. Смеялась только эта чудовищная физиономия, созданная игрою случая или особым искусством. Гуинплен тут был ни при чем. Внешний облик его не зависел от его внутреннего состояния. Он не мог согнать со своего лба, со щек, с бровей, с губ этот непроизвольный смех. Это был смех автоматический, казавшийся особенно заразительным именно потому, что он застыл навсегда. Никто не мог устоять перед этим осклабившимся ртом. Два судорожных движения рта действуют заразительно: это смех и зевота. В результате таинственной операции, которой, по всей вероятности, подвергся Гуинплен в детстве, все черты его лица вызывали это впечатление смеха, вся его физиономия сосредоточилась только на этом выражении, подобно тому, как все спицы колеса сосредоточиваются в ступице. Какие бы чувства ни волновали Гуинплена, они только усиливали это странное выражение веселья, вернее – обостряли его; удивление, страдание, гнев или жалость только резче подчеркивали веселую гримасу этих мускулов: заплачь он, его лицо продолжало бы смеяться; что бы ни делал Гуинплен, чего бы он ни желал, о чем бы ни думал, стоило ему лишь поднять голову, как толпа, если только возле него была толпа, разражалась громовым хохотом.</p><p class="p1">Представьте себе голову веселой Медузы.</p><p class="p1">Неожиданное зрелище нарушало привычное течение мыслей и заставляло смеяться.</p><p class="p1">Некогда в древней Греции на фронтонах театров красовалась бронзовая смеющаяся маска. Маска эта называлась Комедией. Бронзовая личина как будто смеялась и вызывала смех, но вместе с тем хранила печать задумчивости. Пародия, граничащая с безумием, ирония, близкая к мудрости, сосредоточивались и сливались воедино в этом лице; заботы, печали, разочарования, отвращение к жизни отражались на этом бесстрастном челе и порождали мрачный итог – веселость; один угол рта, обращенный к человечеству, был приподнят насмешкой; другой, обращенный к богам, кощунством; люди приходили к этому совершеннейшему образу сарказма, чтобы столкнуть с ним тот запас иронии, который каждый из нас носит в себе, и толпа, беспрерывно сменявшаяся перед этим воплощением смеха, замирала от восторга при виде застывшей издевательской улыбки.</p><p class="p1">Если бы эту мрачную маску античной Комедии надеть на лицо живого человека, можно было бы получить представление о лице Гуинплена. На плечах у него была голова, казавшаяся сатанинской смеющейся маской. Какое бремя для человеческих плеч – такой вечный смех!</p><p class="p1">Вечный смех. Объяснимся. Если верить манихеям, доброе начало отступает перед враждебным, злым началом, и у самого Бога бывают перерывы в бытии. Условимся также насчет того, что такое воля. Мы не допускаем, чтобы она всегда была бессильна. Всякое существование похоже на письмо, смысл которого изменяется постскриптумом. Для Гуинплена постскриптумом было следующее: огромным усилием воли, на котором он сосредоточивал все свое внимание, когда никакое волнение не отвлекало его и не ослабляло этого напряжения, он иногда умудрялся согнать этот непрестанный смех со своего лица и набросить на него некий трагический покров. И в такие минуты его лицо вызывало у окружающих уже не смех, а содрогание ужаса.</p><p class="p1">Заметим, что Гуинплен очень редко прибегал к этому усилию, так как оно стоило ему мучительного труда и невыносимого напряжения. Достаточно было к тому же малейшей рассеянности, малейшего волнения, чтобы прогнанный на минуту, неудержимый как морской прибой, смех снова появлялся на его лице и обнаруживал себя тем резче, чем сильнее было это волнение.</p><p class="p1">За исключением таких случаев Гуинплен смеялся вечно.</p><p class="p1">Глядя на Гуинплена, люди смеялись. Но, посмеявшись, отворачивались. Особенно сильное отвращение вызывал он у женщин. И в самом деле, этот человек был ужасен. Судорожный хохот зрителей был своего рода данью, и ее выплачивали весело, но почти бессознательно. Когда же приступ смеха затихал, смотреть на Гуинплена становилось для женщин совершенно нестерпимо, они опускали глаза и старались не глядеть на него.</p><p class="p1">Между тем он был высок ростом, хорошо сложен, ловок и нисколько не уродлив, если не считать лица. Это было еще одним признаком, подтверждавшим предположение, что наружность Гуинплена была скорее делом рук человеческих, нежели произведением природы. Красоте сложения Гуинплена должна была соответствовать, по всей вероятности, и красота лица. При рождении он был, несомненно, таким же ребенком, как и все другие дети. Тела его не тронули, а перекроили только лицо. Гуинплен был созданием чьей-то злонамеренной воли.</p><p class="p1">По крайней мере, это было очень похоже на истину.</p><p class="p1">Зубов у него не вырвали. Зубы необходимы для смеха. Они остаются и в черепе мертвеца.</p><p class="p1">Операция, произведенная над ним, должно быть, была ужасна. Он не помнил о ней, но это вовсе не доказывало, что он ей не подвергся. Такая работа хирурга-ваятеля могла увенчаться успехом только в том случае, если ее объектом был младенец, который не сознавал, что с ним происходит, и легко мог принять нанесенные раны за болезнь. К тому же в те времена, как помнит читатель, усыпляющие и болеутоляющие средства были уже известны. Только тогда это называли колдовством. В наши дни это называют анестезией.</p><p class="p1">Наделив Гуинплена такой маской, люди, взрастившие его, развили в нем задатки будущего гимнаста и атлета; путем умело подобранных акробатических упражнений его суставам была придана способность выворачиваться в любую сторону, тело получило резиновую гибкость, и сочленения двигались подобно шарнирам. Ничто не было упущено в воспитании Гуинплена для того, чтобы с малолетства подготовить его к мастерству фигляра.</p><p class="p1">Его волосы раз навсегда были выкрашены в цвет охры – секрет, вновь найденный в наши дни. Им пользуются красивые женщины, и то, что некогда, считалось уродством, теперь считается признаком красоты. У Гуинплена были рыжие волосы, а краска, очевидно едкая, сделала их жесткими и грубыми на ощупь. Под рыжей гривой, скорее похожей на щетину, чем на волосы, скрывался прекрасно развитый череп – достойное вместилище мысли. Какова бы ни была операция, уничтожившая гармонию лица и изуродовавшая его мускулы, она оказалась бессильной изменить черепную коробку. Лицевой угол Гуинплена поражал своей мощью. За этой смеющейся маской таилась душа, склонная, как и у всех людей, предаваться мечтам.</p><p class="p1">Впрочем, смех Гуинплена был настоящим талантом. Он не мог избавиться от него и потому извлекал из него пользу. Этим смехом он добывал себе пропитание.</p><p class="p1">Гуинплен – читатели, вероятно, уже догадались об этом – был тот самый ребенок, которого покинули в зимний вечер на портлендском берегу и который нашел себе приют в бедном домике на колесах в Уэймете.</p></span><span id="id128"><div class="title6">
<p class="p">2. Дея</p>
</div><p class="p1">Ребенок стал взрослым мужчиной. Прошло пятнадцать лет. Шел 1705 год. Гуинплену должно было исполниться двадцать пять лет.</p><p class="p1">Урсус оставил у себя тогда обоих детей, образовав маленькую кочующую семью.</p><p class="p1">Урсус и Гомо состарились. Урсус совсем облысел. Волк поседел. Продолжительность жизни волков не установлена с такою точностью, как продолжительность жизни собак. По данным Молена, некоторые волки достигают восьмидесятилетнего возраста, в том числе малый купар, caviae vorus, и вонючий волк, canis nubilus, описанный Сэем.</p><p class="p1">Девочка, найденная на груди мертвой женщины, превратилась теперь в шестнадцатилетнюю девушку, с бледным лицом, обрамленным темными волосами, довольно высокую, стройную и хрупкую, с таким тонким станом, что, казалось, он переломится, едва прикоснешься к нему; девушка была дивно хороша, но глаза ее, полные блеска, были незрячи.</p><p class="p1">Роковая зимняя ночь, свалившая в снег нищенку и ее младенца, нанесла сразу двойной удар: убила мать и ослепила дочь.</p><p class="p1">Темная вода навсегда сделала неподвижными зрачки ребенка, ставшего теперь взрослой девушкой. На лице ее, непроницаемом для света, эта горечь разочарования выражалась в печально опущенных углах губ. Ее большие ясные глаза отличались странным свойством: угаснув для нее, они сохранили свою лучезарность для окружающих. Таинственные светильники, озарявшие только внешний мир! Это лишенное света существо излучало свет. Потухшие глаза были исполнены сияния. Эта пленница мрака освещала тьму, в которой она жила. Из глубины безысходной темноты, из-за черной стены, именуемой слепотою, она посылала в пространство яркие лучи. Она не видела нашего солнца, но в ней отражалась сущность его. Ее мертвый взор обладал неподвижностью, свойственной небесным светилам.</p><p class="p1">Она была воплощением ночи и горела как звезда, горела в этой непроницаемой тьме, ставшей ее собственной стихией.</p><p class="p1">Урсус, помешанный на латинских именах, окрестил ее Деей. Он предварительно посоветовался с волком. «Ты представляешь человека, – сказал он, – я представляю животное, мы с тобой представители земного мира. Пусть же эта малютка будет представительницей мира небесного. Ее слабость на самом деле – всемогущество. Таким образом, в нашей лачуге будет заключена отныне вся Вселенная: мир человеческий, мир животный, мир божественный».</p><p class="p1">Волк ничего не возразил, и найденыш стал называться Деей.</p><p class="p1">Что касается Гуинплена, Урсусу не пришлось ломать себе голову, чтобы придумать для него имя. В то самое утро, когда он узнал, что мальчик обезображен и что девочка слепа, он спросил:</p><p class="p1">– Как звать тебя, мальчик?</p><p class="p1">– Меня зовут Гуинпленом, – ответил ребенок.</p><p class="p1">– Что ж, Гуинплен так Гуинплен, – сказал Урсус.</p><p class="p1">Дея помогала Гуинплену в его выступлениях.</p><p class="p1">Если бы можно было подвести итог всей совокупности человеческих несчастий, он нашел бы свое воплощение в Гуинплене и Дее. Казалось, оба они явились на землю из мира теней: Гуинплен – из той его области, где царит ужас, Дея – из той, где царит тьма. Их существования были сотканы из различного рода мрака, заимствованного у чудовищных полюсов вечной ночи. Дея носила этот мрак внутри себя, Гуинплен – на своем лице. В Дее было что-то призрачное; Гуинплен был подобен привидению. Дея была окружена черной бездной, Гуинплена окружало нечто худшее. У зрячего Гуинплена была ужасная возможность, от которой слепая Дея была избавлена, – возможность сравнивать себя с другими людьми. Но в положении Гуинплена, если только допустить, что он старался дать себе в нем отчет, сравнивать значило перестать понимать самого себя. Иметь, подобно Дее, глаза, в которых не отражается внешний мир, – несчастие огромное, однако меньшее, чем быть загадкою для самого себя: чувствовать в мире отсутствие чего-то, что является тобою самим, видеть Вселенную и не видеть себя в ней. На глаза Деи был накинут покров мрака, на лицо Гуинплена была надета маска. Как выразить это словами? На Гуинплене была маска, выкроенная из его живой плоти. Он не знал своих подлинных черт. Они исчезли. Их подменили другими чертами. Его истинного облика уже не существовало. Голова жила, но лицо умерло. Он не мог вспомнить, видел ли он его когда-нибудь. Для Деи, так же как и для Гуинплена, род человеческий был чем-то внешним, далеким от них. Она была одинока. Он – тоже. Одиночество Деи было мрачным: она не видела ничего. Одиночество Гуинплена было зловещим. Он видел все. Для Деи весь мир не выходил за пределы ее слуха и осязания: все существующее было ограничено, почти не имело протяженности, обрывалось в двух шагах от нее; бесконечной представлялась только тьма. Для Гуинплена жить – значило вечно видеть перед собою толпу, с которой ему никогда не суждено было слиться. Дея была изгнанницей из царства света, Гуинплен был отверженным среди живых существ. Оба они имели все основания отчаяться. И он и она переступили мыслимую черту человеческих испытаний. При виде их всякий, призадумавшись, почувствовал бы к ним безмерную жалость. Как они должны были страдать! Над ними явно тяготел злобный приговор судьбы, и рок никогда еще так искусно не превращал жизнь двух ни в чем не повинных существ в сплошную муку, в адскую пытку.</p><p class="p1">А между тем они жили в раю.</p><p class="p1">Они любили друг друга.</p><p class="p1">Гуинплен обожал Дею. Дея боготворила Гуинплена.</p><p class="p1">– Ты так прекрасен! – говорила она ему.</p></span><span id="id129"><div class="title6">
<p class="p">3. Oculos non habet, et videt – Не имеет глаз, а видит</p>
</div><p class="p1">Одна только женщина на свете видела настоящего Гуинплена – слепая девушка.</p><p class="p1">Чем она была обязана Гуинплену, Дея знала от Урсуса, которому Гуинплен рассказал о своем трудном переходе из Портленда в Уэймет и обо всех ужасах, пережитых им после того, как его оставили на берегу. Она знала, что ее, крошку, умиравшую на груди умершей матери и сосавшую ее мертвую грудь, подобрало другое дитя, не намного старше ее, что это существо, отвергнутое всеми и как бы погребенное в мрачной пучине всеобщего равнодушия, услыхало ее крик и, хотя все были глухи к нему самому, не оказалось глухим к ней; что этот одинокий, слабый, покинутый ребенок, не имевший никакой опоры на земле, сам еле передвигавший ноги в пустыне, истощенный, разбитый усталостью, принял из рук ночи тяжкое бремя – другого ребенка; что несчастное существо, обездоленное при непонятном разделе жизненных благ, именуемом судьбою, взяло на себя заботу о судьбе другого существа и, будучи олицетворением нужды, скорби и отчаяния, стало провидением для найденной им малютки. Она знала, что, когда небо закрылось для нее, он раскрыл ей свое сердце; что, погибая сам, он спас ее; что, не имея ни крова, ни пристанища, он пригрел ее; что он сделался ее матерью и кормилицей; что он, совершенно одинокий на свете, ответил небесам, покинувшим его, тем, что усыновил другого ребенка; что, затерянный в ночи, он явил этот высокий пример; что, сочтя себя недостаточно обремененным собственными бедами, он взвалил себе на плечи бремя чужого несчастья; что он открыл на этой земле, где, казалось бы, его уже ничто не ждало, существование долга; что там, где всякий заколебался бы, он смело пошел вперед; что там, где все отшатнулись бы, он не отстранился; что он опустил руку в отверстую могилу и извлек оттуда ее, Дею; что, сам полуголый, он отдал ей свои лохмотья, ибо она страдала от холода, что, сам голодный, он постарался накормить и напоить ее; что ради нее этот ребенок боролся со смертью, со смертью во всех ее видах: в виде зимы и снежной метели, в виде одиночества, в виде страха, в виде холода, голода и жажды, в виде урагана; что ради нее, ради Деи, этот десятилетний титан вступил в поединок с беспредельным мраком ночи. Она знала, что он сделал все это, будучи еще ребенком, и что теперь, став мужчиной, он для нее, немощной, является опорой, для нее, нищей, – богатством, для нее, больной, – исцелением, для нее, слепой, – зрением. Сквозь густую, ей самой неведомую завесу, заставлявшую ее держаться вдали от жизни, она ясно различала эту преданность, эту самоотверженность, это мужество – во внутреннем нашем мире героизм принимает совершенно определенные очертания. Она улавливала его благородный облик: в той невыразимо отвлеченной области, где живет мысль, не освещаемая солнцем, она постигала это таинственное отражение добродетели. Окруженная со всех сторон непонятными, вечно куда-то движущимися предметами (таково было единственное впечатление, производимое на нее действительностью), замирая в тревоге, свойственной бездеятельному существу, всегда настороженно поджидающему возможную опасность, постоянно переживая, как и все слепые, чувство своей полной беззащитности в этом мире, она вместе с тем явственно ощущала где-то над собой присутствие Гуинплена – Гуинплена, никогда не знающего устали, всегда близкого, всегда внимательного, Гуинплена ласкового, доброго, всегда готового прийти ей на помощь. Дея вся трепетала от радостной уверенности в нем, от признательности к нему: ее тревога стихала, сменялась восторгом, и своими исполненными мрака глазами она созерцала в зените над окружавшей ее бездной неугасимое сияние этой доброты.</p><p class="p1">Во внутреннем мире человека доброта – это солнце. И Гуинплен ослеплял собою Дею.</p><p class="p1">Для толпы, у которой слишком много голов, чтобы она могла над чем-нибудь призадуматься, и слишком много глаз, чтобы она могла к чему-нибудь приглядеться, для толпы, которая, будучи поверхностной, останавливается только на поверхности явлений, Гуинплен был всего лишь клоуном, фигляром, скоморохом, шутом, чем-то вроде животного. Толпа знала только его маску.</p><p class="p1">Для Деи Гуинплен был спасителем, извлекшим ее из могилы и вынесшим на свет, утешителем, дававшим ей возможность жить, освободителем, руку которого она, блуждавшая в темном лабиринте, чувствовала в своей руке. Гуинплен был братом, другом, руководителем, опорой, подобием лика небесного, крылатым, лучезарным супругом, и там, где толпа видела чудовище, она видела архангела.</p><p class="p1">И это потому, что слепая Дея видела его душу.</p></span><span id="id130"><div class="title6">
<p class="p">4. Прекрасно подобранная чета влюбленных</p>
</div><p class="p1">Философ Урсус это понимал. Он одобрял ослепление Деи:</p><p class="p1">– Слепой видит незримое.</p><p class="p1">Он говорил:</p><p class="p1">– Сознавать – значит видеть.</p><p class="p1">Глядя на Гуинплена, он бормотал:</p><p class="p1">– Получудовище и полубог.</p><p class="p1">Гуинплен, со своей стороны, был опьянен Деей. Существует глаз невидимый – ум, и глаз видимый – зрачок. Гуинплен смотрел на Дею видимыми глазами. Дея была очарована идеальным образом, Гуинплен – реальным. Гуинплен был не просто безобразен, он был ужасен. В Дее он видел свою противоположность. Насколько он был страшен, настолько Дея была прелестна. Он был олицетворением уродства, она – олицетворением грации. Дея казалась воплощенной мечтой, грезой, принявшей телесные формы. Во всем ее существе, в ее воздушной фигуре, в ее стройном и гибком стане, трепетном как тростник, в ее, быть может, незримо окрыленных плечах, в легкой округлости ее форм, говорившей о ее пуле не столько чувствам, сколько душе, в почти прозрачной белизне ее кожи, в величественном спокойствии ее незрячего взора, божественно отрешенного от земного, в святой невинности ее улыбки было нечто, роднившее ее с ангелом; а между тем она была женщиной.</p><p class="p1">Гуинплен, как мы уже сказали, сравнивал себя с другими; сравнивал он и Дею.</p><p class="p1">Его жизнь представлялась ему сочетанием двух непримиримых противоположностей. Она была точкой пересечения двух лучей, черного и белого, шедших один снизу, другой – сверху. Одну и ту же крошку могут одновременно клевать два клюва: клюв зла и клюв добра, первый – терзая, второй – лаская. Гуинплен был такой крошкой, атомом; его и терзали и ласкали. Гуинплен был детищем роковой случайности, усложненной вмешательством провидения. Несчастье коснулось его своим перстом, но его коснулось и счастье. Два противоположных удела, сочетавшись, породили его необычную судьбу. На нем лежало и проклятие, и благословение. Он был избранником, на котором лежало проклятие. Кто он? Он не знал этого сам. Когда он смотрел на себя в зеркало, он видел незнакомца. И незнакомец этот был чудовищем. Гуинплен жил как бы обезглавленным, с лицом, которое он не мог признать своим. Это лицо было безобразно, до того безобразно, что служило предметом потехи. Оно было настолько ужасно, что вызывало смех. Оно было жутко-смешным. Человеческое лицо исчезло, как бы поглощенное звериной мордой. Никогда еще никто не видел такого полного исчезновения человеческих черт на лице человека, никогда еще пародия на человеческий образ не достигала такого совершенства, никогда еще, даже в кошмаре, не возникала такая жуткая смеющаяся харя, никогда еще все, что может оттолкнуть женщину, не соединялось так отвратительно в наружности мужчины; несчастное сердце, скрывавшееся за этой маской и оклеветанное ею, казалось, было обречено на вечное одиночество; такое лицо было для него настоящей гробовой доской. Но нет, нет! Там, где исчерпала весь запас своих средств неведомая злоба, там в свою очередь расточила свои дары и незримая доброта. Внезапно подняв из праха поверженного, она всему, что было в нем отталкивающего, придала все, что способно было привлекать: в риф вложила магнит, внушила другой душе желание устремиться как можно скорее к обездоленному; поручила голубке утешить пораженного молнией, заставила красоту боготворить безобразие.</p><p class="p1">Для того чтобы это оказалось возможным, было необходимо, чтобы красавица не могла видеть урода. Для счастья было необходимо несчастье. И провидение сделало Дею слепой.</p><p class="p1">Гуинплен смутно сознавал себя искупительной жертвой. Но за что преследовала его судьба? Этого он не знал. За что ему пришлось понести кару? Это тоже оставалось для него загадкой. Над ним, заклейменным навеки, вдруг засиял ореол – вот и все, что он знал. Когда Гуинплен подрос настолько, что стал многое понимать, Урсус прочел и объяснил ему соответствующее место из сочинения доктора Конкеста «De denasatis» и из другого фолианта, из трактата Гуго Плагона, отрывок, начинающийся словами: «Nares habens mutilas»<a href="ch2.xhtml#id231" class="a">[192]</a>, однако Урсус предусмотрительно воздержался от всяких догадок и остерегся делать какие-либо выводы. Возможны были всякие предположения, с известной степенью вероятия удалось бы, пожалуй, установить кое-какие события, имевшие отношения к детству Гуинплена, но для Гуинплена очевидным было лишь одно: самый результат. Ему суждено было прожить всю жизнь с клеймом на лице. За что заклеймили его? На это не было ответа. Безмолвие и одиночество окружали Гуинплена. Все догадки, возникавшие в связи с трагической действительностью, были зыбки и шатки: вполне достоверным представлялся лишь сам ужасный факт. И вот в эти минуты тяжкой скорби появлялась Дея, словно небесная посредница между Гуинпленом и его отчаянием. Ласковость этой восхитительной девушки, склонявшейся к нему, уроду, трогала и как бы согревала его, черты дракона смягчались выражением счастливого изумления. Созданный для того, чтобы внушать ужас, он каким-то чудом вызывал восторг и обожание светозарного существа; он, чудовище, чувствовал, что его любовно созерцает звезда.</p><p class="p1">Гуинплен и Дея составляли отличную пару; эти трогательно-нежные сердца боготворили друг друга. Гнездо и две птички – такова была их история. Они подчинились закону, общему для всего мироздания, состоящему в том, чтобы любить, искать и находить друг друга.</p><p class="p1">Таким образом, ненависть обманулась в своих расчетах. Преследователи Гуинплена, кто бы они ни были, загадочная вражда к нему, откуда бы она ни исходила, не достигли цели. Его хотели обречь на безысходное отчаяние, а сделали счастливым человеком. Ему нанесли рану, которой суждено было затянуться, его заранее обручили с той, которая должна была пролить на нее целительный бальзам; его скорбь должна была утешить та, которая была сама воплощенной скорбью. Тиски палача незаметно превратились в ласковую руку женщины. Гуинплен был поистине ужасен, но не от природы; таким сделала его рука человека; его надеялись сперва отлучить от семьи, если только у него была семья, затем от всего человечества; еще ребенком его превратили в развалину, но природа оживила эту развалину, как она вообще оживляет развалины; в его одиночестве природа утешила его, как она вообще утешает всех одиноких; природа всегда приходит на помощь обездоленным; там, где ощущается недостаток во всем, она отдает всю себя безраздельно, она покрывает руины цветами и зеленью; для камня у нее есть плющ, для человека – любовь.</p><p class="p1">Глубокое великодушие сокрытых сил природы.</p></span><span id="id131"><div class="title6">
<p class="p">5. Лазурь среди мрака</p>
</div><p class="p1">Так жили друг другом эти два обездоленных существа. Дею поддерживала рука Гуинплена, Гуинплена – доверие Деи.</p><p class="p1">Сирота опиралась на сироту. Урод опекал калеку.</p><p class="p1">Двое одиноких нашли друг друга.</p><p class="p1">Чувство невыразимой благодарности переполняло их сердца. Они благодарили.</p><p class="p1">Кого?</p><p class="p1">Таинственную бесконечность.</p><p class="p1">Чувствовать благодарность – вполне достаточно. У благодарности есть крылья, и она несется туда, куда нужно. Ваша молитва лучше вас знает, куда ей устремиться.</p><p class="p1">Сколько людей, думая, что молятся Юпитеру, молились Иегове! Скольким верующим в амулеты внимает бесконечность! Сколько атеистов не замечают того, что их доброта и грусть – та же молитва, обращенная к Богу!</p><p class="p1">Гуинплен и Дея чувствовали благодарность.</p><p class="p1">Уродство – это изгнание. Слепота – это бездна. И вот изгнанник нашел приют; бездна стала обитаема.</p><p class="p1">Гуинплен видел, как к нему по воле рока, точно сон наяву, нисходит в потоках света прекрасное белое облако, принявшее образ женщины, лучезарное видение, в котором бьется сердце, и этот призрак, почти облако и в то же время женщина, протягивает к нему объятия, это видение целует его, это сердце рвется к нему; Гуинплен забывал о своем уродстве, чувствуя себя любимым; роза пожелала вступить в брак с гусеницей, предугадывая в этой гусенице восхитительную бабочку; Гуинплен, существо отверженное, оказался избранником.</p><p class="p1">Иметь необходимое – в этом все. Гуинплен имел необходимое ему, Дея – необходимое ей.</p><p class="p1">Унизительное сознание собственного уродства перестало тяготить Гуинплена, оно постепенно рассеивалось, сменившись другими чувствами – упоением, восторгом, верою; а навстречу горькой беспомощности слепой Деи протягивалась из окружавшей ее тьмы чья-то рука.</p><p class="p1">Две скорби, поглотив одна другую, вознеслись в идеальный мир. Двое обездоленных взаимно признали друг друга. Двое ограбленных соединились, чтобы обогатить друг друга. Каждого из них связывало с другим то, чего он был лишен. Чем был беден один, тем был богат другой. В несчастье одного заключалось сокровище другого. Не будь Дея слепа, разве избрала бы она Гуинплена? Не будь Гуинплен обезображен, разве он предпочел бы Дею другим девушкам? Она, вероятно, не полюбила бы урода, так же как и он – увечную. Какое счастье для Деи, что Гуинплен был отвратителен! Какая удача для Гуинплена, что Дея была слепа! Если бы не горестное сходство их неотвратимой жестокой участи, союз между ними был бы невозможен. В основе их любви лежала неодолимая потребность друг в друге. Гуинплен спасал Дею, Дея спасала Гуинплена. Столкновение двух горестных судеб вызвало взаимное тяготение. Это было объятие двух существ, поглощенных пучиной. Нет ничего более сближающего, более безнадежного, более упоительного.</p><p class="p1">Гуинплен постоянно думал:</p><p class="p1">«Что бы сталось со мной без нее!»</p><p class="p1">Дея постоянно думала:</p><p class="p1">«Что бы сталось со мной без него!»</p><p class="p1">Двое изгнанников обрели родину; два непоправимых, роковых несчастья – клеймо Гуинплена и слепота Деи, соединив их, стали для обоих источником глубокой радости. Им ничего не надо было, кроме их близости, они не представляли себе ничего вне ее: говорить друг с другом было для них наслаждением, находиться рядом – блаженством; каждый из них непрерывно следил за малейшим душевным движением другого, и они дошли до полного единства мечтаний: одна и та же мысль возникала одновременно у обоих. При звуке шагов Гуинплена Дее казалось, что она слышит поступь божества. Они прижимались друг к другу в некоем звездном полумраке, полном благоуханий, блеска музыки, ослепительных архитектурных форм, грез; они принадлежали друг другу; они знали, что навсегда связаны общими радостями и восторгами. Ничего не могло быть более странного, чем этот рай, созданный двумя осужденными на муку существами.</p><p class="p1">Они были невыразимо счастливы.</p><p class="p1">Свой ад они превратили в небесный рай: таково твое могущество, любовь!</p><p class="p1">Дея слышала смех Гуинплена; Гуинплен видел улыбку Деи.</p><p class="p1">Так было обретено идеальное блаженство, было воплощено наяву совершенное наслаждение жизнью, была разрешена таинственная проблема счастья. И кем? Двумя обездоленными.</p><p class="p1">Для Гуинплена Дея была олицетворенным сиянием. Для Деи Гуинплен был олицетворенным присутствием высшего существа. Такое присутствие – глубокая тайна, сообщающая незримому божественные свойства и порождающая другую тайну – доверие. Во всех религиях одно лишь доверие непреложно, но его вполне достаточно: безграничное существо, без которого верующие не могут обойтись, пребывает невидимым, однако они чувствуют его.</p><p class="p1">Гуинплен был божеством Деи.</p><p class="p1">Иногда, в порыве любви, она опускалась перед ним на колени, точно прекрасная жрица, поклоняющаяся идолу в индийской пагоде.</p><p class="p1">Представьте себе бездну и среди этой бездны светлый оазис, а в нем два изгнанные из жизни существа, ослепленные друг другом.</p><p class="p1">Ничто не могло быть чище этой любви. Дея не знала, что такое поцелуй, хотя, быть может, и желала его, ибо слепота, особенно у женщин, не исключает грез: как бы слепая ни страшилась прикосновений неведомого, она не всегда избегает их. Что же касается Гуинплена, то трепетная молодость делала его задумчивым: чем сильнее он чувствовал себя опьяненным, тем застенчивее он становился; он мог бы себе позволить все с этой подругой детства, с этой девушкой, не ведавшей, что такое грех, так же как она не знала, что такое свет, с этой слепой, которая способна была видеть только одно – что она обожает его. Но он счел бы воровством взять то, что она сама отдала бы ему; с чувством грустного удовлетворения он соглашался любить ее лишь бесплотной любовью, и сознание своего уродства приводило его к еще более высокому целомудрию.</p><p class="p1">Эти счастливцы жили в идеальном мире. Там, подобно небесным сферам, они были супругами на расстоянии. Они обменивались в лазури той эманацией, которая а бесконечности есть притяжение, а на земле – пол. Они дарили друг другу поцелуи души.</p><p class="p1">Они всегда жили общей жизнью и не мыслили себе другой жизни. Детство Деи совпало с отрочеством Гуинплена. Они росли вместе. Долгое время они спали в одной постели, так как домик на колесах представлял собою не слишком просторную спальню. Они помещались на сундуке, а Урсус на полу, – таков был заведенный порядок. Потом в один прекрасный день – Дея была тогда еще совсем ребенком – Гуинплен почувствовал себя взрослым, и в нем проснулся стыд. Он сказал Урсусу: «Я тоже хочу спать на полу». И вечером растянулся на медвежьей шкуре, рядом со стариком. Тогда Дея расплакалась. Она потребовала к себе своего соседа по постели. Но Гуинплен, взволнованный, так как в нем уже зарождалась любовь, настоял на своем. С тех пор он спал на полу вместе с Урсусом. Летом, в теплые ночи, он спал на дворе вместе с Гомо. Дее минуло уже тринадцать лет, а она все еще не могла примириться с этим. Часто вечером она говорила: «Гуинплен, поди ко мне: я скорее засну». Ей необходимо было чувствовать подле себя Гуинплена для того, чтобы заснуть, и она засыпала спокойным сном невинности. Сознание наготы возникает лишь у того, кто видит себя нагим, поэтому Дея не знала наготы. Аркадская или таитянская невинность. Близость дикарки Деи делала Гуинплена нелюдимым. Случалось, что Дея, уже почти взрослой девушкой, сидя на постели в сорочке, спускавшейся с плеча и открывавшей ее уже ясно обозначавшуюся юную грудь, расчесывала волосы и настойчиво звала к себе Гуинплена. Гуинплен краснел, опускал глаза, не знал, куда спрятаться от этой невинной наготы, что-то бормотал, отворачивался, пугался и уходил: порожденный мраком Дафнис обращался в бегство перед погруженной во тьму Хлоей.</p><p class="p1">Такова была эта идиллия, расцветшая в столь трагической обстановке.</p><p class="p1">Урсус говорил им:</p><p class="p1">– Любите друг друга, скоты вы этакие!</p></span><span id="id132"><div class="title6">
<p class="p">6. Урсус наставник и Урсус опекун</p>
</div><p class="p1">Урсус прибавлял:</p><p class="p1">– Сыграю я с ними на днях шутку. Женю их.</p><p class="p1">Урсус излагал Гуинплену теорию любви. Он говорил:</p><p class="p1">– Любовь! Знаешь ли, как Господь Бог зажигает этот огонь? Он сближает женщину и мужчину, а между ними пристраивает дьявола, так что мужчина наталкивается на дьявола. Одной искры, иными словами, одного взгляда достаточно, чтобы все это запылало.</p><p class="p1">– Можно обойтись и без взгляда, – отвечал Гуинплен, думая о Дее.</p><p class="p1">Урсус возражал:</p><p class="p1">– Простофиля! Разве душам нужны глаза, чтобы смотреть друг на друга?</p><p class="p1">Иногда Урсус бывал благодушен. Порою Гуинплен, теряя голову от любви к Дее, становился мрачен и избегал Урсуса, как свидетеля. Однажды Урсус сказал ему:</p><p class="p1">– Ба! Не стесняйся. Влюбленный петух не прячется.</p><p class="p1">– Да, но орел уходит от посторонних взоров, – ответил Гуинплен.</p><p class="p1">Бывало, что Урсус бормотал про себя:</p><p class="p1">– Благоразумие требует вставить несколько палок в колеса Венериной колесницы. Мои голубки слишком горячо любят друг друга. Это может привести к нежелательным последствиям. Предупредим пожар. Умерим пыл этих сердец.</p><p class="p1">И, обращаясь к Гуинплену, когда Дея спала, и к Дее, когда внимание Гуинплена было чем-нибудь отвлечено, Урсус прибегал к такого рода предостережениям:</p><p class="p1">– Дея, тебе не следует слишком привязываться к Гуинплену. Жить другим человеком опасно. Эгоизм – самая надежная основа счастья. Мужчины легко уходят из-под власти женщин. К тому же Гуинплен может в конце концов возгордиться. Он пользуется таким успехом! Ты не представляешь себе, какой он имеет успех!</p><p class="p1">– Гуинплен, такое несоответствие никуда не годится. Чрезмерное уродство с одной стороны и совершенство красоты с другой – над этим стоит призадуматься. Умерь свой пыл, мой мальчик. Не приходи в такой восторг от Деи. Неужели ты серьезно считаешь себя созданным для нее? Но взгляни на свое собственное безобразие и на ее совершенство. Подумай, какое расстояние отделяет ее от тебя. У нее есть все, у нашей Деи! Какая белая кожа, какие волосы, какие губы – настоящая земляника! А ее ножка! А руки! Округлость ее плеч восхитительна, ее лицо прекрасно. Когда она ступает, от нее исходит сияние. А ее разумная речь, а ее чарующий голос! И при всем этом, подумай, ведь она женщина. Она не настолько глупа, чтобы быть ангелом. Это – совершенная красота. Подумай об этом и успокойся.</p><p class="p1">Но такие увещания только усиливали любовь Деи и Гуинплена, и Урсус удивлялся своей неудаче, подобно человеку, который говорил бы себе:</p><p class="p1">– Странная вещь, сколько ни лью я масла в огонь, никак его не погасить!</p><p class="p1">Желал ли он погасить или хотя бы только охладить их сердечный жар? Конечно, нет. Если бы это ему удалось, для него это было бы крайне неприятным сюрпризом. В глубине души эта любовь, бывшая для них пламенем, а для него теплом, восхищала его.</p><p class="p1">Но надо же иногда слегка побранить то, что нас очаровывает. Это брюзжанье и называют благоразумием.</p><p class="p1">Урсус был для Гуинплена и Деи почти что и отцом и матерью. Ворча себе под нос, он вырастил их; поругивая, вскормил их. Так как после усыновления двух детей возок стал тяжелее, Урсусу пришлось чаще впрягаться рядом с Гомо.</p><p class="p1">Следует заметить, однако, что через несколько лет, когда Гуинплен стал почти взрослым, а Урсус – совсем старым, наступила очередь Гуинплена возить Урсуса.</p><p class="p1">Наблюдая за подрастающим Гуинпленом, Урсус предрек уроду его будущее.</p><p class="p1">– О твоем богатстве позаботились, – сказал он ему.</p><p class="p1">Семья, состоявшая из старика, двух детей и волка, странствуя, сплачивалась все тесней и тесней.</p><p class="p1">Такая бродячая жизнь не помешала воспитанию детей. «Скитаться – это расти», – говорил обыкновенно Урсус. Так как Гуинплен был явно предназначен для того, чтобы его «показывали на ярмарках», Урсус сделал из него хорошего фигляра, вкладывая при этом в своего ученика все те премудрости, которые только тот смог воспринять. Иногда, глядя в упор на чудовищную маску Гуинплена, он бормотал: «Да, начато было совсем неплохо». И он стремился завершить начатое, дополняя воспитание Гуинплена разнообразными философскими и научными познаниями.</p><p class="p1">Нередко повторял он Гуинплену:</p><p class="p1">– Будь философом. Быть мудрым – значит быть неуязвимым. Взгляни на меня, я никогда не плакал. А все потому, что я мудрец. Неужели ты думаешь, что, если бы я захотел, у меня не нашлось бы повода поплакать?</p><p class="p1">В монологах, которым внимал только волк, Урсус говорил:</p><p class="p1">– Гуинплена я научил всему, в том числе и латыни, Дею же – ничему, ибо музыка в счет не идет.</p><p class="p1">Он выучил их обоих петь. Сам он недурно играл на маленькой старинной флейте, а также на рылях, которые хроника Бертрана Дюгесклена называет «инструментом нищих» и изобретение которых послужило толчком к развитию симфонической музыки. Эти концерты привлекали публику. Урсус показывал ей свои многострунные рыли и пояснял:</p><p class="p1">– По-латыни это называется organistrum.</p><p class="p1">Он обучил Дею и Гуинплена пению по методе Орфея и Эгидия Беншуа. Не раз прерывал он свои уроки восторженным возгласом:</p><p class="p1">– Орфей – певец Греции! Беншуа – певец Пикардии!</p><p class="p1">Эта сложная система тщательного воспитания все же не настолько поглощала досуг детей, чтобы помешать им любить друг друга. Они выросли, соединив свои сердца, подобно тому как два посаженные рядом деревца со временем соединяют свои ветви.</p><p class="p1">– Все равно, – бормотал Урсус, – я их поженю.</p><p class="p1">И брюзжал про себя:</p><p class="p1">– Надоели они мне со своей любовью.</p><p class="p1">Прошлого, даже того, о котором они могли помнить, не существовало ни для Гуинплена, ни для Деи. Они знали о нем только то, что им сообщил Урсус. Они звали Урсуса отцом.</p><p class="p1">У Гуинплена сохранилось лишь одно воспоминание раннего детства: нечто вроде вереницы демонов, пронесшихся над его колыбелью. У него осталось впечатление, будто чьи-то уродливые ноги топтали его в темноте. Было ли то нарочно или случайно, этого он не знал. Ясно до малейших подробностей помнил Гуинплен только трагические происшествия ночи, в которую его покинули на берегу моря. Но в ту ночь он нашел малютку Дею – находка, превратившая для него страшную ночь в лучезарный день.</p><p class="p1">Память у Деи была окутана еще более густым туманом, чем у Гуинплена, и в этом сумраке все исчезало. Она смутно помнила свою мать как что-то холодное. Видела ли она когда-нибудь солнце? Быть может. Она напрягала все усилия, чтобы оживить пустоту, оставшуюся позади ее. Солнце? Что это такое? Ей смутно припоминалось что-то яркое и теплое; его место занял теперь Гуинплен. Они говорили друг с другом шепотом. Нет никакого сомнения, что воркование – самое важное занятие на свете. Дея говорила Гуинплену:</p><p class="p1">– Свет – это твой голос.</p><p class="p1">Однажды Гуинплен, увидев сквозь кисейный рукав плечо Деи и не устояв, прикоснулся к нему губами. Безобразный рот и такой чистый поцелуй. Дея почувствовала величайшее блаженство. Ее щеки зарделись румянцем. Под поцелуем чудовища заря занялась на этом погруженном в вечную тьму прекрасном челе. А Гуинплен задохнулся от чего-то, похожего на ужас, и не мог удержаться, чтобы не взглянуть на райское видение – на белизну груди, приоткрытой распахнувшейся косынкой.</p><p class="p1">Дея подняла рукав и, протянув Гуинплену обнаженную выше локтя руку, сказала:</p><p class="p1">– Еще!</p><p class="p1">Гуинплен спасся тем, что обратился в бегство.</p><p class="p1">На следующий день игра возобновилась – правда, с некоторыми вариантами. Восхитительное погружение в сладостную бездну, именуемую любовью.</p><p class="p1">Это и есть те радости, на которые Господь Бог в качестве старого философа взирает с улыбкой.</p></span></span>
