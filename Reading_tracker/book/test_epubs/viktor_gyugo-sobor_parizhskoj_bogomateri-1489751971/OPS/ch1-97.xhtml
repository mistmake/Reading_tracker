<span><span><span><span id="id159"><div class="title6">
<p class="p">1. Прочность хрупких предметов</p>
</div><p class="p1">Порою судьба протягивает нам чашу безумия. Из неизвестного появляется вдруг рука и подает нам темный кубок с неведомым дурманящим напитком.</p><p class="p1">Гуинплен ничего не понял.</p><p class="p1">Он оглянулся, чтобы посмотреть, к кому обращается шериф.</p><p class="p1">Слишком высокий звук неуловим для слуха; слишком сильное волнение непостижимо для разума. Существуют определенные границы, как для слуха, так и для понимания.</p><p class="p1">Жезлоносец и судебный пристав приблизились к Гуинплену, взяли его под руки, и он почувствовал, как его сажают в то кресло, с которого поднялся шериф.</p><p class="p1">Он безропотно подчинился, не пытаясь понять, что означает все это.</p><p class="p1">Когда Гуинплен сел, судебный пристав и жезлоносец отступили на несколько шагов и, вытянувшись, стали позади кресла.</p><p class="p1">Шериф положил свой букет на выступ каменной плиты, надел очки, которые подал ему секретарь, извлек из-под груды дел, лежавших на столе, пожелтелый, покрытый пятнами, позеленевший, изъеденный плесенью и местами разорванный пергамент, исписанный с одной: стороны и хранивший на себе следы многочисленных сгибов. Подойдя поближе к фонарю, шериф поднес пергамент к глазам и, придав своему голосу всю торжественность, на какую только был способен, принялся читать:</p><p class="empty-line"/><p class="p1">«Во имя отца и сына и святого духа.</p><p class="p1">Сего двадцать девятого января тысяча шестьсот девяностого года от рождества Христова.</p><p class="p1">На безлюдном побережье Портленда был злонамеренно покинут десятилетний ребенок, обреченный тем самым на смерть от голода и холода в этом пустынном месте.</p><p class="p1">Ребенок этот был продан в двухлетнем возрасте по повелению его величества, всемилостивейшего короля Иакова Второго.</p><p class="p1">Ребенок этот – лорд Фермен Кленчарли, законный и единственный сын покойного лорда Кленчарли, барона Кленчарли-Генкервилла, маркиза Корлеоне Сицилийского, пэра Английского королевства, ныне покойного, и Анны Бредшоу, его супруги, также покойной.</p><p class="p1">Ребенок этот – наследник всех владений и титулов своего отца. Поэтому, в соответствии с желанием Его Величества, всемилостивейшего короля, его продали, изувечили, изуродовали и объявили пропавшим бесследно.</p><p class="p1">Ребенок этот был воспитан и обучен с целью сделать из него фигляра, выступающего на ярмарках и рыночных площадях.</p><p class="p1">Он был продан двух лет от роду, после смерти отца, причем королю было уплачено десять фунтов стерлингов за самого ребенка, а также за различные уступки, попущения и льготы.</p><p class="p1">Лорд Фермен Кленчарли в двухлетнем возрасте был куплен мною, нижеподписавшимся, а изувечен и обезображен фламандцем из Фландрии, по имени Хардкванон, которому был известен секрет доктора Конкеста.</p><p class="p1">Ребенок был нами предназначен стать маскою смеха – masca ridens.</p><p class="p1">С этой целью Хардкванон произвел над ним операцию Bucca fissa usque ad aures<a href="ch2.xhtml#id212" class="a">[238]</a>, запечатлевающую на лице выражение вечного смеха.</p><p class="p1">Способом, известным одному только Хардкванону, ребенок был усыплен и изуродован незаметно для него, вследствие чего он ничего не знает о произведенной над ним операции.</p><p class="p1">Он не знает, что он лорд Кленчарли.</p><p class="p1">Он откликается на имя “Гуинплен”.</p><p class="p1">Это объясняется его малолетством и недостаточным развитием памяти, ибо он был продан и куплен, когда ему едва исполнилось два года.</p><p class="p1">Хардкванон – единственный человек, умеющий делать операцию Bucca fissa, и это дитя – единственный в наше время ребенок, над которым она была произведена.</p><p class="p1">Операция эта столь своеобразна и неповторима, что, если бы этот ребенок превратился в старика и волосы его из черных стали бы седыми, Хардкванон все-таки сразу узнал бы его.</p><p class="p1">В то время, как мы пишем это, Хардкванон, которому доподлинно известны все упомянутые события, ибо он принимал в них участие в качестве главного действующего лица, находится в тюрьме его высочества принца Оранского, ныне именуемого у нас королем Вильгельмом Третьим. Хардкванон был задержан и взят под стражу по обвинению в принадлежности к шайке компрачикосов, или чейласов. Он заточен в башню Четэмской тюрьмы.</p><p class="p1">Ребенок, согласно повелению короля, был продан и выдан нам последним слугой покойного лорда Линнея в Швейцарии, близ Женевского озера, между Лозанной и Веве, в том самом доме, где скончались отец и мать ребенка; слуга умер вскоре после своих господ, так что это злодеяние в настоящее время является тайной для всех, кроме Хардкванона, заключенного в Четэмской тюрьме, и нас, обреченных на смерть.</p><p class="p1">Мы, нижеподписавшиеся, воспитали и держали у себя в течение восьми лет купленного нами у короля маленького лорда, рассчитывая извлечь из него пользу для нашего промысла.</p><p class="p1">Сегодня, покинув Англию, чтобы не разделить участи Хардкванона, мы, из опасений и страха перед суровыми карами, установленными за подобные деяния парламентом, с наступлением сумерек оставили одного на Портлендском берегу упомянутого маленького Гуинплена, лорда Фермена Кленчарли.</p><p class="p1">Сохранить это дело в тайне мы поклялись королю, но не господу.</p><p class="p1">Сегодня ночью, по воле провидения, застигнутые в море сильной бурей и находясь в совершенном отчаянии, преклонив колени перед тем, кто один в силах спасти нам жизнь и, быть может, по милосердию своему спасет и наши души, уже не ожидая ничего от людей, а страшась гнева господня и видя якорь спасения и последнее прибежище в глубоком раскаянии, примирившись со смертью и готовые радостно встретить ее, если только небесное правосудие будет этим удовлетворено, смиренно каясь и бия себя в грудь, – мы делаем это признание и вверяем его бушующему морю, чтобы оно воспользовалось им во благо, согласно воле Всевышнего. Да поможет нам Пресвятая Дева! Аминь. В чем и подписываемся».</p><p class="empty-line"/><p class="p1">Шериф прервал чтение и сказал:</p><p class="p1">– Вот подписи. Все сделаны разными почерками.</p><p class="p1">И снова стал читать:</p><p class="empty-line"/><p class="p1">«Доктор Гернардус Геестемюнде. – Асунсион». – Крест, и рядом: «Барбара Фермой с острова Тиррифа, что в Эбудах. – Гаиздорра, капталь. – Джанджирате. – Жак Катурз, по прозвищу Нарбоннец. – Люк-Пьер Капгаруп, из Магонской каторжной тюрьмы».</p><p class="empty-line"/><p class="p1">Шериф опять остановился и сказал:</p><p class="p1">– Следует приписка, сделанная тем же почерком, каким написан текст, очевидно учиненная тем лицом, которому принадлежит первая подпись.</p><p class="p1">Он прочел:</p><p class="empty-line"/><p class="p1">«Из трех человек, составлявших экипаж урки, судовладельца унесло волною в море, остальные два подписались ниже: – Гальдеазун. – Аве-Мария, вор».</p><p class="empty-line"/><p class="p1">Перемежая чтение своими замечаниями, шериф продолжал:</p><p class="p1">– Внизу листа помечено: «В море, на борту “Матутины”, бискайской урки из залива Пасахес».</p><p class="p1">– Этот лист, – прибавил шериф, – канцелярский пергамент с вензелем короля Иакова Второго. На полях есть еще приписка, сделанная тою же рукою:</p><p class="empty-line"/><p class="p1">«Настоящее показание написано нами на оборотной стороне королевского приказа, врученного нам в качестве оправдательного документа при покупке ребенка. Перевернув лист, можно прочесть приказ».</p><p class="empty-line"/><p class="p1">Шериф перевернул пергамент и, держа его в правой руке, поднес ближе к свету. Все увидели чистую страницу, если только выражение «чистая страница» применимо к полусгнившему лоскуту; посредине можно было разобрать три слова: два латинских – jussu regis<a href="ch2.xhtml#id211" class="a">[239]</a> и подпись «Джеффрис».</p><p class="p1">– Jussu regis, Джеффрис, – произнес шериф во всеуслышание, но уже без всякой торжественности.</p><p class="p1">Гуинплен был подобен человеку, которому свалилась на голову черепица с крыши волшебного замка.</p><p class="p1">Он заговорил, словно в полузабытьи:</p><p class="p1">– Гернардус… да, его называли «доктор». Всегда угрюмый старик. Я боялся его. Гаиздорра, капталь, это значит – главарь. Были и женщины: Асунсион и еще другая. Потом был провансалец – Капгаруп. Он пил из плоской фляги, на которой красными буквами было написано имя.</p><p class="p1">– Вот она, – сказал шериф.</p><p class="p1">И положил на стол какой-то предмет, который секретарь вынул из «мешка правосудия».</p><p class="p1">Это была оплетенная ивовыми прутьями фляга с ушками. Она, несомненно, перевидала всякие виды и, должно быть, немало времени провела в воде. Ее облепили раковины и водоросли. Она была сплошь испещрена ржавым узором – работой океана. Затвердевшая смола на горлышке свидетельствовала о том, что фляга была когда-то герметически закупорена. Ее распечатали и откупорили, потом снова заткнули вместо пробки втулкой из просмоленного троса.</p><p class="p1">– В эту бутылку, – сказал шериф, – люди, обреченные на смерть, вложили только что прочитанное мною показание. Это послание к правосудию было честно доставлено ему морем.</p><p class="p1">Сообщив своему голосу еще большую торжественность, шериф продолжал:</p><p class="p1">– Подобно тому, как гора Харроу родит отличную пшеницу, из которой получается прекрасная мука, идущая на выпечку хлеба для королевского стола, точно так же и море оказывает Англии всевозможные услуги, и когда исчезает лорд, оно его находит и возвращает обратно.</p><p class="p1">Он прибавил:</p><p class="p1">– На этой фляге действительно красными буквами выведено чье-то имя.</p><p class="p1">Возвысив голос, он повернулся к преступнику, лежавшему неподвижно:</p><p class="p1">– Здесь стоит ваше имя, злодей! Неисповедимы пути, которыми истина, поглощаемая пучиной людских деяний, снова всплывает на поверхность.</p><p class="p1">Взяв в руки флягу, шериф поднес ее к свету той стороной, которая была очищена, – вероятно, для расследования. В ивовые прутья была вплетена извилистая красная полоска тростника, местами почерневшая от действия воды и времени. Несмотря на то что кое-где она была повреждена, можно было совершенно ясно разобрать все десять букв, составлявших имя Хардкванон.</p><p class="p1">Шериф опять повернулся к преступнику и снова заговорил тем не похожим ни на какой другой тоном, который можно назвать голосом правосудия:</p><p class="p1">– Хардкванон! Когда эта фляга с вашим именем была нами, шерифом, предъявлена вам в первый раз, вы сразу же добровольно признали ее своею; затем, по прочтении вам пергамента, находившегося в ней, вы не пожелали ничего прибавить к своим предшествующим показаниям и отказались отвечать на какие бы то ни было вопросы, вероятно рассчитывая, что пропавший ребенок не найдется и что вы, таким образом, избегнете наказания. Вследствие этого я к вам применил «длительный допрос с наложением тяжестей», и вам вторично прочитали вышеупомянутый пергамент, содержащий в себе показания и признание ваших сообщников. Это не привело ни к чему. Сегодня, на четвертый день – день, назначенный по закону для очной ставки, – очутившись лицом к лицу с тем, кто был брошен в Портленде двадцать девятого января тысяча шестьсот девяностого года, вы убедились в крушении всех своих греховных надежд и, нарушив молчание, признали в нем свою жертву…</p><p class="p1">Преступник открыл глаза, приподнял голову и необычно громким для умирающего голосом, в котором вместе с предсмертным хрипом звучало какое-то странное спокойствие, с зловещим выражением произнес несколько слов; при каждом слове ему приходилось подымать всей грудью кучу наваленных на него камней, могильной плитою пригнетавших его к земле.</p><p class="p1">– Я поклялся хранить тайну и действительно хранил ее до последней возможности. Темные люди – люди верные; честность существует и в аду. Сегодня молчание уже бесполезно. Пусть будет так. И потому я говорю. Ну да. Это он. Таким его сделали мы вдвоем с королем: король – своим соизволением, я – своим искусством.</p><p class="p1">Взглянув на Гуинплена, он прибавил:</p><p class="p1">– Смейся же вечно.</p><p class="p1">И сам захохотал.</p><p class="p1">Этот смех, еще более страшный, чем первый, звучал как рыдание.</p><p class="p1">Смех прекратился, голова Хардкванона откинулась назад, веки опустились.</p><p class="p1">Шериф, предоставив преступнику возможность высказаться, заговорил снова:</p><p class="p1">– Все это подлежит внесению в протокол.</p><p class="p1">Он дал секретарю время записать слова Хардкванона и продолжал:</p><p class="p1">– Хардкванон, по закону, после очной ставки, приведшей к положительному результату, после третьего чтения показаний ваших сообщников, подтвержденных ныне вашим собственным откровенным признанием, после вашего вторичного свидетельства вы сейчас будете освобождены от оков, чтобы, с соизволения Ее Величества, быть повешенным как плагиатор.</p><p class="p1">– Как плагиатор, – отозвался законовед, – то есть как продавец и скупщик детей. – Вестготский закон, книга седьмая, глава третья, параграф Usurpaverit<a href="ch2.xhtml#id200" class="a">[240]</a>; и Салический закон, глава сорок первая, параграф второй; и закон фризов, глава двадцать первая – «De Plagio»<a href="ch2.xhtml#id199" class="a">[241]</a>. Александр Неккам говорит также: «Qui pueros vendis, plagiarius est tibi nomen»<a href="ch2.xhtml#id198" class="a">[242]</a>.</p><p class="p1">Шериф положил пергамент на стол, снял очки, снова взял букет и произнес:</p><p class="p1">– Суровый длительный допрос с пристрастием прекращается. Хардкванон, благодарите Ее Величество.</p><p class="p1">Судебный пристав сделал знак человеку в кожаной одежде.</p><p class="p1">Человек этот, подручный палача, «виселичный слуга», как он назывался в старинных хартиях, подошел к пытаемому, снял один за другим лежавшие на животе камни, убрал чугунную плиту, из-под которой показались расплющенные ее тяжестью бока несчастного, освободил кисти рук и лодыжки от колодок и цепей, приковывавших его к четырем столбам.</p><p class="p1">Преступник, избавленный от всякого груза и от оков, все еще лежал на полу с закрытыми глазами, раскинув руки и ноги, точно распятый, которого только что сняли с креста.</p><p class="p1">– Встаньте, Хардкванон! – сказал шериф.</p><p class="p1">Преступник не шевелился.</p><p class="p1">«Виселичный слуга» взял его за руку, подержал ее, потом опустил, – она безжизненно упала. Другая рука, которую он приподнял вслед за первой, упала точно так же. Подручный палача схватил сначала одну, затем другую ногу преступника; когда он отпустил их, они ударились пятками о пол. Пальцы обеих ног остались неподвижными, точно одеревенели. У лежащего плашмя на земле голые ступни всегда как-то странно торчат кверху.</p><p class="p1">Подошел врач, вынул из кармана маленькое стальное зеркальце и приложил его к раскрытому рту Хардкванона, затем пальцем приподнял ему веки. Они уже больше не опустились. Остекленевшие зрачки не дрогнули.</p><p class="p1">Врач выпрямился и сказал:</p><p class="p1">– Он мертв.</p><p class="p1">Затем прибавил:</p><p class="p1">– Он засмеялся, и это его убило.</p><p class="p1">– Это уже не имеет значения, – заметил шериф. – После того как он сознался, вопрос о его жизни или смерти – пустая формальность.</p><p class="p1">И, указав на Хардкванона букетом роз, он отдал распоряжение жезлоносцу:</p><p class="p1">– Труп убрать отсюда сегодня же ночью.</p><p class="p1">Жеэлоносец почтительно наклонил голову.</p><p class="p1">Шериф прибавил:</p><p class="p1">– Тюремное кладбище – напротив.</p><p class="p1">Жезлоносец опять наклонил голову.</p><p class="p1">Секретарь писал протокол.</p><p class="p1">Шериф, держа в левой руке букет, взял в правую руку свой белый жезл, стал прямо перед Гуинпленом, все еще сидевшим в кресле, отвесил ему глубокий поклон, потом с не меньшей торжественностью откинул назад голову и, глядя в упор на Гуинплена, сказал:</p><p class="p1">– Вам, здесь присутствующему, мы, кавалер Филипп Дензил Парсонс, шериф Серрейского графства, в сопровождении Обри Доминика, эсквайра, нашего клерка и секретаря, наших обычных помощников, получив надлежащим образом прямые и специальные на этот счет приказания Ее Величества, в силу данного нам поручения, со всеми вытекающими из него правами и обязанностями, сопряженными с нашей должностью, а также с разрешения лорд-канцлера Англии, на основании протоколов, актов, сведений, сообщенных адмиралтейством, после проверки документов и сличения подписей, по прочтении и выслушании показаний, после очной ставки, учинения всех требуемых законом процедур, приведших к благополучному и справедливому завершению дела, – мы удостоверяем и объявляем вам, чтобы вы могли вступить в обладание всем, принадлежащим вам по праву, что вы – Фермен Кленчарли, барон Кленчарли-Генкервилл, маркиз Корлеоне Сицилийский и пэр Англии. И да хранит Господь ваше сиятельство.</p><p class="p1">И он поклонился.</p><p class="p1">Законовед, врач, судебный пристав, жезлоносец, секретарь – все присутствующие, за исключением палача, последовали его примеру и поклонились Гуинплену еще более почтительно, чуть не до самой земли.</p><p class="p1">– Что это такое? – крикнул Гуинплен. – Да разбудите же меня!</p><p class="p1">И, смертельно бледный, вскочил с кресла.</p><p class="p1">– Я и пришел для того, чтобы разбудить вас, – проговорил чей-то голос, который прозвучал здесь в первый раз.</p><p class="p1">Из-за каменного столба выступил человек. Так как никто не спускался в подземелье с той минуты, когда железная плита, поднявшись, открыла доступ в застенок полицейскому шествию, было ясно, что этот человек проник сюда и спрятался в тени еще до появления Гуинплена, что ему поручили наблюдать за всем происходившим и что в этом заключалась его обязанность. Это был тучный человек в придворном парике и дорожном плаще, скорее старый, чем молодой, державшийся весьма пристойно. Он поклонился Гуинплену почтительно, непринужденно; с изяществом хорошо вышколенного лакея, а на с неуклюжестью судейского чина.</p><p class="p1">– Да, – сказал он, – я пришел разбудить вас. Вот уже двадцать пять лет, как вы спите. Вы видите сон, и вам пора очнуться. Вы считаете себя Гуинпленом, тогда как вы – Кленчарли. Вы считаете себя простолюдином, между тем как вы – знатный дворянин. Вы считаете, что находитесь в последнем ряду, между тем как стоите в первом. Вы считаете себя скоморохом, в то время как вы – сенатор. Вы считаете себя бедняком, в действительности же вы – богач. Вы считаете себя ничтожным, между тем как вы принадлежите к сильным мира сего. Проснитесь, милорд!</p><p class="p1">Слабым голосом, в котором звучал неподдельный ужас, Гуинплен прошептал:</p><p class="p1">– Что значит все это?</p><p class="p1">– Это значит, милорд, – ответил толстяк, – что меня зовут Баркильфедро, что я – чиновник адмиралтейства; что эта выброшенная волнами фляга Хардкванона была найдена на берегу моря; что она была доставлена мне, ибо распечатывание таких сосудов входит в круг моих обязанностей; что я откупорил ее в присутствии двух присяжных, состоящих при отделе Джетсон, двух членов парламента, Вильяма Блетуайта, представителя города Бата, и Томаса Джервойса, представителя города Саутгемптона; что они описали и удостоверили содержимое фляги и вместе со мною скрепили протокол своими подписями; что о находке я доложил Ее Величеству; что, по повелению королевы, все требуемые законом формальности были выполнены с соблюдением тайны, необходимой в столь щекотливом деле, и что последняя из этих формальностей – очная ставка – только что имела место; это значит, что у вас миллион годового дохода, что вы – лорд Соединенного Королевства Великобритании, законодатель и судья, верховный судья и верховный законодатель, облаченный в пурпур и горностай, что вы стоите на одной ступени с принцами и почти равны императору, что ваша голова увенчана пэрской короной и что вы женитесь на герцогине, дочери короля.</p><p class="p1">Потрясенный этим превращением, поразившим его подобно удару грома, Гуинплен лишился чувств.</p></span></span></span></span>
