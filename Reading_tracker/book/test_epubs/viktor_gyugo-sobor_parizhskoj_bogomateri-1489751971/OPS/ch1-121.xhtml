<span><p class="p1">В некоторых полках солдаты были в нерешительности, что еще более усиливало ужасающую мрачность кризиса. Командирами их были два неустрашимых человека, испытанных в настоящих войнах: маршал де Лобо и генерал Бюжо, причем последний был подчинен первому. Огромные патрули, состоящие из пехотных батальонов, замкнутых в целые роты национальной гвардии и предшествуемых полицейскими комиссарами в шарфах, объезжали охваченные мятежом улицы. Правительство, держа в руках армию, еще колебалось. Наступала ночь, и слышался звон набатного колокола.</p><p class="p1">В этот момент, когда мятеж, разгоревшийся от столкновения народа с войском перед арсеналом, вызвал обратное движение в толпе, следовавшей за гробом Ламарка вдоль бульваров, произошло страшное смятение. Она заколыхалась, ряды разорвались, все бросились бежать, спасаться: одни с грозными криками, требовавшими атаки, другие с выражением страха на побледневших лицах. Могучий поток, покрывавший бульвары, разделился в один миг и хлынул направо и налево, чтобы затем разлиться мелкими потоками сразу по двумстам улицам и наполнить их шумом прорвавшейся плотины. В эту минуту по улице Менильмонтан шел, весь в лохмотьях, мальчик с веткой черного дерева в руках, сорванной на высотах Бельвиля. Проходя мимо лавочки торговки разным старьем, он увидал выставленный там старинный седельный пистолет. Мальчик бросил на мостовую ветвь и крикнул:</p><p class="p1">– Мамаша, я беру взаймы у тебя эту штучку! – И, схватив пистолет, он бросился с ним бежать.</p><p class="p1">Это был маленький Гаврош, тоже отправлявшийся на войну.</p><p class="p1">Вернувшись утром к слону, он извлек из него обоих малюток, разделил с ними завтрак, который где-то добыл, затем ушел от них, доверив их той доброй матери-улице, которая почти воспитала его самого. Уходя от ребятишек, он назначил им вечером свидание на том же месте, где находился с ними в эту минуту, и сказал на прощание: «Я разбиваю палку, то есть беру ноги в зубы или, как еще говорят, улепетываю. Если вы, карапузики, не отыщете сегодня папеньку с маменькой, то приходите опять сюда вечером. Я накормлю вас ужином и уложу спать». Ребятишки, подобранные, вероятно, городским сержантом и отведенные в участок или украденные каким-нибудь балаганным фокусником, а то и просто заблудившиеся в громадном парижском лабиринте, вечером не вернулись назад. Дно общественного мира полно таких исчезновений. Гаврош так и не видал более малюток. С этой ночи протекло уже несколько месяцев, в течение которых Гаврош, почесывая голову, не раз говорил сам себе: «Куда же это девались мои ребятки, черт их возьми?»</p><p class="p1">Между тем он со своим пистолетом в руках дошел до улицы Понт-о-Шу. Он заметил, что на этой улице была отперта одна только лавка, и притом лавка пирожника. Точно само провидение позаботилось дать ему возможность полакомиться яблочным пирожком. Прежде чем броситься в неизвестность, Гаврош остановился, ощупал у себя бока, порылся в карманах, даже вывернул их, но, не найдя в них ни гроша, он, чтобы выразить чем-нибудь свою досаду, закричал во все горло:</p><p class="p1">– Караул! Ограбили!</p><p class="p1">Размахивание среди улицы пистолетом без собачки – такое важное общественное дело, что Гаврош с каждым шагом все более и более приходил в азарт. Он запел было Марсельезу, но то и дело обрывал ее, чтобы выкрикнуть что-нибудь вроде следующего:</p><p class="p1">– Все идет хорошо! У меня сильно болит левая лапа, я ушиб ее как раз в том месте, где ревматизм, но все-таки я доволен, граждане!.. Пусть держатся буржуа, когда я запою им сногсшибательную песенку!.. Что такое мушары (сыщики)? Сущие собаки, черт бы их побрал!.. Впрочем, не нужно оскорблять собак такими сравнениями… Не мешало бы быть собачке и на моем пистолете… Я прямо с бульвара, друзья мои, там так и кипит, бурлит, брызжет во все стороны. Пора бы и пену снимать с горшка… Вперед, храбрецы! Я жертвую жизнью для отечества! Не видать мне больше своей душеньки, все кончено, все!.. Но мне на это наплевать! Да здравствует веселье!.. Будем драться, дьявол их раздави!.. Довольно с меня всего.</p><p class="p1">В эту минуту споткнулась и упала лошадь проезжавшего мимо улана национальной гвардии. Гаврош бросил свой пистолет на мостовую, поднял улана, потом помог ему поднять и лошадь. После этого он поднял пистолет и продолжал путь.</p><p class="p1">На рынке Сен-Жак, где уже был обезоружен пост, Гаврош присоединился к компании, которая была почти вся вооружена.</p><p class="subtitle">IX</p><p class="p1">Входя с улицы Рамбюто со стороны Рынка и глядя на помещающуюся по правую руку, против улицы Мондетур, лавку корзинщика, нынешние парижане не подозревают о тех страшных сценах, которые разыгрались на этом самом месте каких-нибудь тридцать лет тому назад.</p><p class="p1">Там была в то время улица Шанврери или, как она называлась в старину, Шанврери, на которой находился знаменитый кабак «Коринф».</p><p class="p1">На знаменитую баррикаду улицы Шанврери, ныне покрытую глубоким мраком забвения, мы и намерены пролить некоторый свет.</p><p class="p1">И действительно, место это было очень удобное, благодаря широкому устью улицы и ее суженному в виде воронки тупику. «Коринф» представлял собой выступ, и улицу Мондетур легко было загородить с обеих сторон, так что оставался свободным только фронт, обращенный к улице Оен-Дени.</p><p class="p1">Нашествие вооруженной толпы нагнало на всех обитателей улицы Шанврери панический ужас. Редкие прохожие поспешили скрыться. Всюду моментально затворились двери лавок, квартир и подвалов, заперлись ворота домов, закрылись окна, портьеры и ставни, начиная с нижних помещений и кончая верхними. Какая-то испуганная старуха даже загородила свое окно тюфяком, чтобы заглушить треск ружейных выстрелов. Только кабачок остался открытым, да и то по той причине, что в него ворвалась вся банда бунтовщиков.</p><p class="p1">За несколько минут из оконных решеток нижнего этажа кабака были выломаны все железные полосы, а уличная мостовая разобрана на протяжении нескольких десятков шагов. Гаврош был здесь.</p><p class="p1">Сияющий и восхищенный, он взял на себя задачу подбодрять работающих. Он сновал взад и вперед, поднимался вверх, спускался вниз, шумел, кричал. Казалось, без него не пошло бы и дело. Что подталкивало его самого? Нужда. Что окрыляло его? Веселье. Гаврош был воплощением вихря. Он был везде, и голос его разносился повсюду. Он все наполнял собою; он не давал ни минуты покоя ни себе, ни другим. Сама баррикада точно воодушевлялась им. Он подгонял ленивых, оживлял утомленных, раздражал склонных к задумчивости; одних развеселял, других сердил; всех приводил в возбуждение; того толкнет, того осмеет; на мгновение останавливался, потом вдруг улетал, кружился над этим шумным муравейником, перескакивая от одних к другим, жужжал, бурчал, беспокоил, точно навязчивая муха, всю упряжь исполинской фуры. Его маленькие руки были в беспрерывном движении, его маленькие легкие не уставали работать.</p><p class="p1">Гавроша страшно бесило то, что его пистолет был без собачки; он то и дело приставал к мятежникам, чтобы они дали ему ружье.</p><p class="p1">– Дайте же мне ружье! Я тоже хочу ружье!.. Почему вы не даете мне ружья? – кричал он изо всех сил.</p><p class="p1">– Тебе ружье? – удивился один из них.</p><p class="p1">– А почему же нет? – спросил мальчик.</p><p class="p1">Предводитель пожал плечами и сказал:</p><p class="p1">– Когда все взрослые запасутся ружьями, тогда лишние раздадут и ребятишкам.</p><p class="p1">Гаврош с гордым видом обернулся к нему и крикнул:</p><p class="p1">– Как только тебя убьют, я возьму твое ружье.</p><p class="p1">– Мальчишка! – крикнул тот.</p><p class="p1">– Молокосос! – ответил Гаврош.</p><p class="p1">Современные газеты, сообщавшие, что баррикада на улице Шанврери, названная ими сооружением «почти неодолимым», достигла уровня второго этажа кабака, сильно ошибались. В действительности эта баррикада не превышала шести-семи футов. Она была устроена таким образом, что защитники ее могли, по желанию, взбираться на самый ее верх, благодаря четырем рядам камней, образовавшим ступени с внутренней стороны. С фронта эта баррикада действительно казалась неприступной, представляя очень внушительный вид, так как она была составлена из правильно сложенных камней и бочек, соединенных бревнами и досками, просунутыми в массивные колеса телеги известного заводчика Ансо и омнибуса. Чтобы иметь возможность произвести, в случае необходимости, вылазку, между стеной одного дома и самым отдаленным от кабака краем баррикады было оставлено отверстие, в которое мог протиснуться один человек. Дышло омнибуса при помощи веревок было утверждено стоймя; к нему было прикреплено красное знамя, развевавшееся над баррикадой.</p><p class="p1">Вся работа по сооружению баррикады совершилась в какой-нибудь час, без всякой помехи; горсть бунтовщиков не была смущена появлением ни одной лохматой шапки или штыка. Немногие буржуа, рискнувшие пройти по охваченной мятежом улице Сен-Дени, ускоряли шаги, лишь только взгляд их встречал баррикаду в улице Шанврери.</p><p class="p1">Ружья и карабины бунтовщиков на улице Шанврери были заряжены все сразу, но без торопливости. Затем, когда баррикады были воздвигнуты, ружья заряжены, часовые расставлены, бунтовщики, укрепившиеся в этих улицах, по которым никто посторонний уже не проходил, окруженные безмолвными, точно вымершими домами, ни одним звуком не выдававшими присутствия в них живых людей, окутанные сгущающимися сумерками, застывшие в безмолвии, в котором чувствовалось приближение чего-то страшного, трагического, одинокие, вооруженные, спокойные, полные решимости, – ждали неизбежного.</p><p class="p1">Наступила наконец и ночь, но никто не являлся к баррикаде. Слышался лишь какой-то смутный гул, и по временам доносился треск ружейной пальбы – редкий, довольно слабый и отдаленный. Этот продолжительный роздых показывал, что правительство собирается с силами. Пятьдесят бунтовщиков на улице Шанврери поджидали шестьдесят тысяч противников. Они позаботились, чтобы в верхнем этаже и в мансарде не горел огонь. Гаврош оказался сильно озабоченным. На улице Бильетт к бунтовщикам присоединился один незнакомец, и теперь он только что вошел в нижнее помещение кабака и сел за стол, стоявший в тени. На его долю выпало ружье большого калибра, которое он теперь, сидя на стуле, держал между колен. Гаврош, до этой минуты развлекавшийся столькими «забавными» делами, не успел заметить этого человека на баррикаде. Но когда доброволец вошел в кабак, Гаврош машинально следил за ним глазами, любуясь его оружием, потом вдруг, когда незнакомец сел, мальчик вскочил со своего места. Всякий, кто наблюдал бы за этим человеком с первого момента его появления у баррикады, мог бы заметить, что он с каким-то особенным вниманием рассматривает как самих бунтовщиков, так и то, что они делают; теперь же, войдя в кабак, он как бы сосредоточился на себе самом и точно ничего не видел из происходящего вокруг него. Гаврош подошел к задумчивому незнакомцу и стал вертеться вокруг него на цыпочках, как ходят вокруг человека, которого боятся разбудить. При этом на его детском лице, одновременно наглом и серьезном, легкомысленном и глубоком, веселом и скорбном, замелькали все гримасы, свойственные лицу старому и выражающие мысли вроде следующих: «Ба!.. Не может быть!.. Это мне, наверное, только так кажется… чудится… А может быть… Да нет, это невозможно!.. А вдруг это тот?.. Нет, нет, вздор!» Гаврош раскачивался на пятках, сжимал засунутые в карман кулаки, повертывал шею, как птица, и выражал оттопыренною нижней губою всю свою прозорливость. Он был озадачен, поражен, неуверен, ослеплен. Он имел вид начальника евнухов на невольничьем рынке, вдруг открывшего Венеру среди неуклюжих толстух, или вид знатока, заметившего в куче мазни кисть Рафаэля. В нем одновременно работали и пронюхивающий инстинкт, и сопоставляющий ум. Очевидно, Гаврош натолкнулся на важное открытие.</p><p class="p1">В ту самую минуту, когда возбуждение Гавроша достигло высшей степени, его окликнули:</p><p class="p1">– Гаврош, ты малыш, и тебя не увидят. Выйди из баррикады, прошмыгни вдоль домов, поболтайся по улицам, потом вернись и расскажи все, что увидишь и услышишь.</p><p class="p1">Гаврош выпрямился.</p><p class="p1">– А, – сказал он, – значит, и малыши на что-нибудь да годятся? Это очень приятно!.. Хорошо, я пойду. А пока вы доверяетесь малышам, остерегайтесь взрослых…</p><p class="p1">И, подняв голову, Гаврош украдкой указал на незнакомца и шепотом прибавил:</p><p class="p1">– Видите вы этого человека?</p><p class="p1">– Ну?</p><p class="p1">– Это шпион. Недели две тому назад этот самый человек стащил меня за ухо с карниза Королевского моста, где я сел подышать воздухом.</p><p class="p1">Анжольрас с живостью отошел от гамена и шепнул несколько слов портовому рабочему. Тот вышел из залы и через несколько минут вернулся с тремя товарищами. Эти четыре широкоплечих носильщика незаметно встали позади стола, на который облокотился человек с улицы Бильетт, очевидно готовые броситься на него по первому знаку Анжольраса.</p><p class="p1">Последний подошел к незнакомцу и спросил его:</p><p class="p1">– Кто вы такой?</p><p class="p1">При этом неожиданном вопросе незнакомец встрепенулся. Взглянув своими проницательными глазами в самую глубь кротких глаз Анжольраса, он, вероятно, прочел в них его мысль. Улыбнувшись затем презрительной и выразительной улыбкой, он с высокомерной важностью сказал:</p><p class="p1">– Я угадываю, что это значит… Да, это так.</p><p class="p1">– Вы – шпион?</p><p class="p1">– Я – агент власти.</p><p class="p1">– Ваше имя?</p><p class="p1">– Жавер.</p><p class="p1">Анжольрас сделал знак четырем носильщикам, и, прежде чем Жавер успел обернуться, его схватили, свалили, связали и обыскали. У него нашли маленькую круглую карточку, вставленную между двух стекол, на одной стороне которой был изображен герб Франции с надписью: «Бдительность и неусыпность», а на другой – следующее свидетельство: «Жавер, инспектор полиции, пятидесяти двух лет…», внизу была подпись тогдашнего префекта полиции Жиске.</p><p class="p1">Кроме того, при нем были часы и кошелек с несколькими золотыми монетами. Эти вещи оставили у него. За часами, на дне кармана, нащупали бумагу в конверте и вытащили ее. Анжольрас развернул бумагу и прочел следующие пять строк, написанные собственноручно префектом полиции:</p><p class="p1"><em>«При исполнении данной ему политической миссии инспектор Жавер должен удостовериться специальным наблюдением, верно ли то, что злоумышленники скрываются на правом побережьи Сены, близ Женского моста».</em></p><p class="p1">Окончив обыск, рабочие подняли Жавера на ноги, скрутили ему руки за спиной и привязали посредине залы к тому самому знаменитому столбу, который когда-то дал свое название кабаку.</p><p class="p1">Гаврош, молча наблюдавший за всей этой сценой и по временам одобрительно кивавший головой, подошел к Жаверу и сказал ему:</p><p class="p1">– На этот раз мышь поймала кота.</p><p class="p1">Все совершилось так быстро, что остальные бунтовщики, находившиеся в кабаке, заметили это только тогда, когда все уже было кончено. Жавер не оказал никакого сопротивления.</p><p class="p1">Сыщик, прислоненный спиной к столбу и так крепко скрученный веревками, что не мог пошевельнуться, держал голову с невозмутимым спокойствием человека, никогда не лгавшего.</p><p class="p1">– Это шпион, – сказал Анжольрас и, обернувшись к Жаверу, добавил: – Вы будете расстреляны за десять минут до взятия баррикады.</p><p class="p1">– Почему же не сейчас? – спокойно спросил сыщик.</p><p class="p1">– Потому что мы бережем порох.</p><p class="p1">– Так покончите со мной ножом.</p><p class="p1">– Шпион, – произнес Анжольрас, – мы судьи, а не убийцы!</p><p class="p1">Потом, подозвав Гавроша, он сказал ему:</p><p class="p1">– Так ты ступай по своему делу и помни, что я говорил.</p><p class="p1">– Иду! – крикнул Гаврош, но вдруг, на полпути к двери, остановился и сказал: – Кстати, дайте мне ружье. Музыканта я оставлю вам, а кларнет беру себе.</p><p class="p1">Гамен отдал по-военному честь и весело отправился исполнять данное поручение.</p><p class="subtitle">X</p><p class="p1">Десять часов пробило уже на колокольне Сен-Мери. Никто еще не показывался. Анжольрас и остальные, с карабинами в руках, находились возле лазейки большой баррикады. Они сидели молча, внимательно прислушиваясь к раздававшемуся в отдалении глухому шуму шагов. Вдруг среди унылой тишины зазвучал молодой, свежий, веселый голос, доносившийся как будто с улицы Сен-Дени и распевавший какие-то стишки на мотив старой народной песни.</p><p class="p1">– Это Гаврош, – шепнул один из них.</p><p class="p1">– Предупреждает нас, – добавил второй.</p><p class="p1">Чьи-то поспешные шаги нарушили безмолвие пустынной улицы. Вслед за тем появилась маленькая фигурка, с быстротою и ловкостью лучшего клоуна перебиравшаяся через опрокинутый омнибус. Это действительно был Гаврош. Очутившись на внутренней стороне баррикады, он, весь запыхавшись, крикнул:</p><p class="p1">– Дайте мне ружье! Идут!</p><p class="p1">Присутствовавшие у баррикады мгновенно встрепенулись. Послышался шорох рук, хватавшихся за оружие.</p><p class="p1">– Хочешь мой карабин? – предложил Анжольрас гамену. – Он полегче.</p><p class="p1">– Я хочу большое ружье, – сказал Гаврош и взял ружье Жавера. Почти одновременно с Гаврошем явились двое часовых, стоявших в конце улицы Шанврери.</p><p class="p1">Улица Шанврери, на которой едва можно было различить несколько камней мостовой благодаря отражению освещенного знамени, представляла бунтовщикам ряд темных зияющих ворот.</p><p class="p1">Все заняли боевую позицию. Сорок три бунтовщика, в том числе и Гаврош, стояли на коленях на большой баррикаде, держа головы в уровень с гребнем этого сооружения и положив стволы ружей и карабинов на камни, служившие им бойницами. Они стояли молча, в напряженном ожидании, готовые стрелять. Шестеро, с ружьями наготове, поместились у окон обоих этажей «Коринфа». Через несколько минут со стороны Сен-Луи донесся шум многочисленных мерных, тяжелых шагов. Шум этот, сначала слабый, потом постепенно усиливавшийся, приближался безостановочно, неуклонно, со спокойной, строгой размеренностью. Кроме этих твердых шагов, более ничего не было слышно. Это были грузные, зловещие шаги статуи Командора, но не одной, а множества статуй. Казалось, надвигается целый легион мраморных призраков. Шаги все приближались; наконец они остановились. С конца улицы точно доносилось мощное дыхание целой толпы. Но этой толпы не было видно, только в самой глубине улицы густая тьма прорезывалась как бы множеством металлических нитей, тонких, как иглы, и едва заметных; нити эти двигались, напоминая те неуловимые фосфорические, перепутанные в сети линии, которые мелькают у нас перед закрытыми глазами в тот момент, когда мы засыпаем и нас охватывает первый туман сна. Этими нитями были стволы ружей и штыки, смутно озаренные колеблющимся светом факела, еще отдаленного от них.</p><p class="p1">Снова ненадолго водворилось безмолвие. Очевидно, обе стороны чего-то выжидали. Вдруг из глубины тьмы раздался голос, тем более зловещий, что обладателя его не было видно.</p><p class="p1">– Кто там? – прозвучал грозный оклик.</p><p class="p1">В то же время послышался лязг опускаемых ружей.</p><p class="p1">– Французская революция! – звучным, возбужденным голосом ответил Анжольрас.</p><p class="p1">– Пли! – крикнул первый голос.</p><p class="p1">Фасады всех домов улицы мгновенно озарились промелькнувшей пурпурной молнией; точно вдруг разверзлась и тут же снова захлопнулась заслонка пылающегого горнила. Страшный треск сильного ружейного залпа пронесся над баррикадой. Красное знамя упало, залп был так силен, что им, как ударом острого топора, отрезало самый конец дышла омнибуса. Пули, отскочившие от карнизов домов, попали в баррикаду и ранили нескольких человек. Действие этого первого залпа было ужасающее. Атака была такая серьезная, что заставила задуматься даже самых смелых из баррикадистов. Очевидно, там, во мраке, стоял целый полк.</p><p class="p1">– Товарищи! Подождем понапрасну тратить порох.</p><p class="p1">– Но прежде всего нужно опять водрузить знамя, – сказал Анжольрас.</p><p class="p1">Он нагнулся и поднял знамя, которое упало к его ногам.</p><p class="p1">Извне был слышен стук шомполов в ружьях: войско готовилось дать второй залп.</p><p class="p1">Анжольрас продолжал:</p><p class="p1">– Кто здесь смельчак? Кто водрузит снова знамя на баррикаде?</p><p class="p1">Никто не отвечал. Взлезть на баррикаду в тот миг, когда она, без сомнения, служила мишенью для ружей, – значило идти на верную смерть.</p><p class="p1">Сам Анжольрас содрогнулся. Он повторил:</p><p class="p1">– Никто не хочет?</p><p class="p1">В ту минуту, как Анжольрас повторил свой вопрос, показался старик Мабеф.</p><p class="p1">При его появлении вся баррикада заволновалась. Послышались крики:</p><p class="p1">– Это член Конвента. Это представитель народа.</p><p class="p1">Он подошел к Анжольрасу. Он вырвал знамя из рук Анжольраса, который стоял пораженный; никто не дерзнул ни остановить старика, ни прийти ему на помощь, и с трясущейся головой, но твердыми шагами направился этот восьмидесятилетний старец к баррикаде и стал медленно подыматься по лестнице, сложенной из булыжника. Зрелище было такое мрачное и такое величественное, что все кругом закричали: «Долой шляпы!» Всех обуял ужас. По мере того как Мабеф подымался по ступеням, его белые волосы, старческое лицо, большой лысый и покрытый морщинами лоб, впалые глаза, удивленный и раскрытый рот, его старческая рука, державшая красное знамя, – все это выступало из мрака и явственно обозначалось при кровавом свете факела.</p><p class="p1">Когда он поднялся на последнюю ступень, когда это дрожащее и страшное видение встало во весь рост на куче обломков, имея перед собою тысячу невидимых ружей, и, дрогнув, глянуло в лицо смерти, точно оно было сильнее ее, – вся баррикада увидала во мраке сверхъестественный и величественный облик.</p><p class="p1">Воцарилось то безмолвие, какое бывает только при виде чуда.</p><p class="p1">Среди этого безмолвия Мабеф махнул красным знаменем и закричал:</p><p class="p1">– Да здравствует революция! Да здравствует республика! Братство, равенство и смерть!</p><p class="p1">Тот же звучный голос, который прокричал: «Кто идет!», закричал:</p><p class="p1">– Уйдите прочь!</p><p class="p1">Мабеф, бледный, с безумными глазами, поднял знамя над головой и повторил:</p><p class="p1">– Да здравствует республика!</p><p class="p1">– Пли! – крикнул голос.</p><p class="p1">Второй залп, точно стреляли картечью, разразился над баррикадой.</p><p class="p1">Мабеф опустился на колени; затем приподнялся, выпустил из рук знамя и упал навзничь на мостовую как пласт.</p><p class="p1">Мабефа прикрыли длинной черной шалью, устроили из ружей носилки и положили на них тело, потом, с обнаженными головами и с торжественной медленностью, отнесли его в нижнюю залу кабака и поместили там на большом столе. Всецело поглощенные этим священным делом, они совсем перестали думать о том опасном положении, в котором находились.</p><p class="p1">Когда проносили труп мимо Жавера, спокойно ожидавшего своей участи, Анжольрас сказал ему:</p><p class="p1">– Теперь очередь за тобой.</p><p class="p1">В это время маленький Гаврош, один остававшийся на своем посту в качестве наблюдателя, заметив, что к баррикаде осторожно прокрадываются какие-то люди, громко крикнул:</p><p class="p1">– Коммунары!</p><p class="p1">Они поспели как раз вовремя, потому что над баррикадой уже сверкал густой лес штыков.</p><p class="p1">Рослые солдаты муниципальной гвардии пробирались через заграждения один за другим, карабкаясь по омнибусу или протискиваясь сквозь оставленную лазейку, и напирали на мальчугана, который, хотя и отступал, но не бежал.</p><p class="p1">Минута была критическая. Этот натиск походил на первый страшный напор наводнения, когда поток поднимается выше уровня плотины и вода начинает хлестать через нее. Еще одно мгновение – и баррикада будет взята.</p><p class="p1">– Ко мне! – крикнул Гаврош.</p><p class="p1">Солдат, самый рослый из всех, настоящий исполин, шел прямо на Гавроша со штыком наперевес. Мальчик взял в свои слабые руки тяжелое ружье Жавера, прицелился в великана и спустил курок, но выстрела не последовало; очевидно, ружье не было заряжено. Верзила солдат расхохотался и занес штык над ребенком.</p><p class="p1">Но прежде, чем острие штыка коснулось Гавроша, ружье вывалилось из рук солдата, внезапно пораженного чьей-то пулей прямо в лоб; грузное тело великана тяжело рухнуло в грязь.</p><p class="p1">Выстрелы и стоны раненых товарищей заставили нападающих энергичнее идти на приступ; на гребне баррикады появилось множество солдат муниципальной и национальной гвардии и пехотинцев с ружьями наготове. Они заняли две трети баррикады, но пока еще не забирались внутрь ее, точно опасались попасть в какую-нибудь непредвиденную западню. Они заглядывали вниз, как в темное логовище льва, и держались так, что только половина их туловища выставлялась из-за вершины баррикады; свет одинокого факела освещал только их штыки, мохнатые шапки и раздраженные лица.</p><p class="p1">Захваченные отчасти врасплох, но не устрашенные, мятежники тут же оправились и собрались с духом. Анжольрас крикнул: «Удержитесь; не стреляйте зря!» В суматохе люди действительно могли попасть друг в друга вместо неприятеля.</p><p class="p1">Большинство защитников баррикады засели у окон залы и мансарды кабака и господствовали оттуда над нападающими. Самые же неустрашимые гордо прислонились к стенам домов в глубине улицы и, таким образом, совершенно открытые, подставляли свою грудь под выстрелы гвардейцев и пехотинцев, унизывавших баррикаду. Солдаты действовали без торопливости, с той грозной и спокойной медленностью, которая всегда предшествует серьезной схватке.</p><p class="p1">Обе враждовавшие стороны находились одна от другой на таком близком расстоянии, что свободно могли бы переговариваться.</p><p class="p1">Когда дело дошло до того момента, когда огонь мог вспыхнуть от малейшей искры, офицер, в густых эполетах и со значком на шее, протянул вперед шпагу и крикнул:</p><p class="p1">– Долой оружие!</p><p class="p1">– Пли! – скомандовал в ответ Анжольрас.</p><p class="p1">Такая же команда последовала и со стороны нападающих.</p><p class="p1">Выстрелы грянули одновременно с обеих сторон; вся баррикада заволоклась облаками едкого, удушливого дыма; послышались глухие стоны умирающих и раненых.</p><p class="p1">Когда дым рассеялся, уцелевшие противники оказались на своих местах и поспешно заряжали ружья.</p><p class="p1">Вдруг раздался громкий голос:</p><p class="p1">– Прочь! Или я взорву баррикаду!</p><p class="p1">Все обернулись на этот голос. Этот голос принадлежал молодому революционеру Мариусу.</p><p class="p1">Молодой человек вошел в нижнюю залу кабака, взял там бочонок с порохом, затем, пользуясь царившей в ограде баррикады туманною мглою, усиленной пороховым дымом, проскользнул вдоль баррикады до той каменной клетки, в которой стоял факел. Сорвать факел, поставить на его место бочонок с порохом и вышибить камнем дно бочонка, которое с какой-то страшной покорностью проломилось мгновенно, – все это было для Мариуса делом, на которое ему понадобилось ровно столько времени, сколько нужно на то, чтобы нагнуться и вновь выпрямиться.</p><p class="p1">Нападающие, скучившиеся в другом конце баррикады, в оцепенении смотрели на молодого человека, который, с горящим факелом в руке и выражением дикой решимости на гордом лице, спокойно стоял на камнях.</p><p class="p1">Приблизив пламя факела к той зловещей куче обломков, посреди которой виднелся страшный бочонок с порохом, он и произнес ужасные слова:</p><p class="p1">– Прочь! Или я взорву баррикаду!</p><p class="p1">– Взорвешь баррикаду? Но вместе с нею и сам полетишь в воздух, – крикнул один из нападающих.</p><p class="p1">– Я знаю это, – спокойно ответил Мариус. – Вот, смотри.</p><p class="p1">И он поднес факел к пороху. Через минуту на баррикаде никого не было. Нападающие, оставив на месте своих убитых и раненых, в беспорядке, как попало отхлынули назад, на конец улицы, и снова затерялись во мраке ночи.</p><p class="p1">Свет быстро увеличивался. Но нигде еще не открывали ни одного окна, нигде не отворяли дверей; это была заря, но не пробуждение. На углу улицы Шанврери, против баррикады, уже не стояло войск, как мы уже говорили раньше; она казалась свободной и развертывалась перед глазами прохожих во всем своем зловещем спокойствии. Улица Сен-Дени была нема, как аллея сфинксов в древних Фивах. На перекрестках, освещенных утренними лучами, не видно было ни одного живого существа. Ничего не может быть печальнее, как вид пустынных улиц при ярком свете.</p><p class="p1">Но если ничего не было видно, то было слышно. На недалеком расстоянии происходило какое-то таинственное движение. Критический момент, очевидно, приближался. Как и накануне вечером, часовые вернулись обратно к своим товарищам, и на этот раз уже все.</p><p class="p1">Баррикада казалась теперь сильнее, чем во время первой атаки. После ухода пятерых избранников ее сделали еще выше.</p><p class="p1">Основываясь на донесении патруля, охранявшего доступ со стороны рынка, Анжольрас, из опасения быть захваченным с тыла, сделал очень важное распоряжение. Он приказал загородить бывший до сих пор свободным переулок Мондетур. Для этого разобрали мостовую против нескольких домов. Благодаря этому баррикада, обнесенная стеною с трех сторон – спереди у нее была улица Шанврери, налево – улица Синь и Птиг-Трюандери и направо – переулок Мондетур, – казалась почти неприступной, хотя и защитники ее, в свою очередь, оказывались как бы замурованными. У нее было три фронта, но зато из нее не было ни одного выхода.</p><p class="p1">– Наша крепость – точно мышеловка, – заметил со смехом Курфеврак.</p><p class="p1">Анжольрас приказал свалить в кучу у двери кабачка штук тридцать булыжных камней.</p><p class="p1">С той стороны, откуда должна была начаться атака, до такой степени было тихо, что Анжольрас приказал всем стать по местам.</p><p class="p1">Трудно представить себе что-нибудь любопытнее баррикады, приготовляющейся к отражению приступа. Каждый сам выбирает себе место, точно публика в ожидании предстоящего зрелища. Один становится у стены, другой облакачивается о выступ, третий, наоборот, старается укрыться. Кое-кто устраивает себе даже сиденье из булыжника. Тут выдался угол стены, который мешает, и от него уходят; тут, наоборот, выступ, который может служить защитой, и за ним прячутся.</p><p class="p1">Как только начальник скомандовал войскам готовиться к бою, хождение туда и сюда по баррикаде моментально прекратилось; никто уже не переходил с одного места на другое; разговоры тоже прекратились; мятежники, беседовавшие по двое или группами, разошлись по своим местам; все умы сосредоточились на одном – на ожидании атаки. Пока еще не наступила опасность, на баррикаде царил хаос, а в минуту опасности – дисциплина. Сознание опасности устраивает порядок.</p><p class="p1">Как и накануне вечером, все внимание сосредоточивал на себе, можно даже сказать, приковывал к себе конец улицы, теперь уже весь освещенный и хорошо видимый.</p><p class="p1">Ждать пришлось недолго. Шум ясно доносился со стороны Сен-Ле, но этот шум не имел ничего общего с тем, который предшествовал первой атаке. Слышался грохот окованных железом колес, гул от передвижения какой-то тяжелой массы, резкий, звенящий звук меди, точно прыгающий по мостовой, – словом, тот грозный шум, который служит предвестником приближающегося чудовища, состоящего из железа и меди. Чувствовалось, как дрожала самая почва этих тихих улиц, которые проектировались и прокладывались, как пути, необходимые для общего блага и в интересах прогресса, а вовсе не за тем, чтобы по ним грохотали колеса орудий истребления.</p><p class="p1">Устремленные на конец улицы взоры защитников баррикады сурово нахмурились.</p><p class="p1">На улице показалась пушка.</p><p class="p1">– Пли! – скомандовал Анжольрас.</p><p class="p1">С баррикады грянул залп; облако дыма заволокло и скрыло от глаз и пушку, и людей. Через несколько секунд дым рассеялся, и пушка и люди снова показались. Орудийная прислуга медленно, по всем правилам, не выказывая ни малейшей торопливости, подкатила пушку и установила ее против баррикады. Ни один ружейный выстрел не попал в цель. Затем наводчик нажал на тарель, чтобы поднять прицел, стал устанавливать пушку с важностью астронома, наводящего подзорную трубку.</p><p class="p1">– Попало! – раздался веселый голос.</p><p class="p1">И в то самое мгновение, когда ядро ударило в баррикаду, с нее спрыгнул на землю Гаврош.</p><p class="p1">Он пробрался со стороны улицы Синь и ловко перескочил через добавочную баррикаду, которая заграждала доступ со стороны лабиринта улицы Птит-Трюандери.</p><p class="p1">Появление Гавроша произвело больший эффект, чем ядро.</p><p class="p1">Ядро ударило в кучу мусора и в ней скрылось. Оно только перебило одно из колес омнибуса и разбило вдребезги старую тележку Ансо.</p><p class="p1">Видя это, баррикада весело смеялась.</p><p class="p1">Гаврош стоял уже на другом конце баррикады и кричал: «Где мое ружье?»</p><p class="p1">Приказали возвратить ему ружье.</p><p class="p1">Гаврош сообщил «товарищам», как он их называл, что баррикада окружена со всех сторон. Сообщив эти сведения, Гаврош задорно прибавил:</p><p class="p1">– Разрешаю вам хорошенько попотчевать их.</p><p class="p1">– Надо помешать им сделать второй выстрел, – сказал Анжольрас. И, опустив дуло винтовки, стал целиться в фейерверкера, который, припав к орудию, проверял в эту минуту прицел.</p><p class="p1">Анжольрас нажал собачку винтовки. Грянул выстрел. Артиллерист взмахнул руками, два раза перевернулся на одном месте, поднял голову, как бы затем, чтобы вдохнуть в себя воздух, потом припал к пушке и замер в этой позе. Из-за баррикады видна была его спина, из нее, как раз на самой средине, фонтаном била кровь. Пуля навылет пробила ему грудь. Он был мертв.</p><p class="p1">Надо было его унести и заменить другим, а это давало выигрыш времени на несколько минут.</p><p class="subtitle">XI</p><p class="p1">Ружейные залпы чередовались с картечью, не причиняя, впрочем, больших повреждений. Страдала только верхняя часть дома, занимаемая кабачком «Коринф»; окно на первом этаже и мансарды на крыше от действия пуль и картечи постепенно разрушались. Засевшие там защитники баррикады должны были выйти оттуда. Но баррикада не отвечала.</p><p class="p1">При каждом залпе Гаврош надувал щеку языком.</p><p class="p1">– Это хорошо, – сказал он, – что они рвут материю на тряпки, – нам нужна корпия.</p><p class="p1">Пушка была поднята немного выше и дистанция была рассчитана таким образом, чтобы ядро било в крайнюю часть внешнего ребра баррикады, сбивало о него верх и осыпало бунтовщиков, как картечью, дождем каменных осколков.</p><p class="p1">Этим способом имели в виду заставить бунтовщиков отойти от стены редута и принудить их сгруппироваться подальше внутри баррикады, – это означало, что скоро пойдут на приступ.</p><p class="p1">Как только бунтовщики будут отогнаны ядром от баррикады, а картечью – от окон кабачка, атакующим колоннам можно будет смело вступить в улицу, не боясь служить мишенью для выстрелов, затем броситься на редут, как накануне вечером, и, кто знает, может быть, даже взять его.</p><p class="p1">– Надо во что бы то ни стало уменьшить вред, причиняемый этими пушками, – сказал Анжольрас и затем крикнул: – Стреляйте в артиллеристов!</p><p class="p1">Все держались наготове. Баррикада, так долго до сих пор молчавшая, открыла адский огонь; шесть или семь залпов следовали один за другим, всю улицу заволокло густым туманом, и через несколько минут сквозь этот дым, нависший, как туман, который прорезывали огненные молнии, можно было различить, что две трети артиллеристов лежат под колесами пушек. Остальные между тем продолжали хлопотать около пушек со строгим спокойствием, и только выстрелы следовали один за другим гораздо реже.</p><p class="p1">– Вот это хорошо, – сказал кто-то, обращаясь к Анжольрасу. – Это успех.</p><p class="p1">Анжольрас покачал головой и ответил:</p><p class="p1">– Еще четверть часа такого успеха, и на баррикаде останется не больше десяти патронов.</p><p class="p1">Есть основание предполагать, что Гаврош слышал эти слова.</p><p class="p1">Вдруг Анжольрас увидел кого-то возле баррикады, снаружи, на улице, под выстрелами.</p><p class="p1">Гаврош взял в кабачке корзину из-под бутылок, выбрался на баррикаду через разрез и спокойно пересыпал в свою корзину патроны из патронташей солдат национальной гвардии, лежавших убитыми у самой баррикады.</p><p class="p1">– Что ты там делаешь? – спросил Анжольрас.</p><p class="p1">Гаврош поднял голову:</p><p class="p1">– Я наполняю корзину.</p><p class="p1">– Разве ты не видишь картечи?</p><p class="p1">– Да, точно дождь идет. Дальше?</p><p class="p1">Анжольрас крикнул:</p><p class="p1">– Вернись назад!</p><p class="p1">– Сию минуту, – ответил Гаврош и одним прыжком очутился среди улицы.</p><p class="p1">Рота, отступая, оставила за собой целый ряд трупов.</p><p class="p1">Около двадцати трупов лежало в разных местах на земле по всей улице. Гаврош видел перед собой двадцать патронташей, что обещало большой запас патронов для баррикады.</p><p class="p1">Дым застилал улицу точно туман. Кому приходилось видеть облако, опустившееся в ущелье между двумя отвесными скалами, тот может представить себе этот дым, сжатый и как бы сгущенный двумя тесными линиями высоких домов. Он медленно поднимался, беспрерывно в то же время возобновляясь; благодаря этому постепенно распространялась тьма, помрачавшая даже дневной свет. На этом же основании и противники, защищавшие противоположные концы улицы, едва различали друг друга, хотя расстояние тут было очень короткое.</p><p class="p1">Эта темнота, по всей вероятности, желательная и даже предвиденная начальниками, которым предстояло руководить атакой баррикады, как нельзя более благоприятствовала и Гаврошу.</p><p class="p1">Прячась в складках этой завесы, он, благодаря своему небольшому росту, мог пробраться по улице довольно далеко и, не будучи замеченным и не подвергаясь никакой особенной опасности, опустошил первые семь или восемь патронташей.</p><p class="p1">Он то ползал, то пробирался на четвереньках, держа корзину в зубах, сгибался, скользил и извивался как змея, пробираясь от одного убитого к другому и опустошая лядунки и патронташи с ловкостью обезьяны, грызущей орехи.</p><p class="p1">С баррикады, от которой он был еще довольно близко, ему не смели кричать, чтобы он возвратился, из боязни обратить на него внимание. На одном из убитых, оказавшемся трупом капрала, он нашел пороховницу.</p><p class="p1">– На случай если захочется пить, – сказал он, опуская ее в карман.</p><p class="p1">Продвигаясь вперед, он достиг наконец места, где туман стал гораздо прозрачнее, настолько прозрачнее, что линия стрелков регулярной пехоты, занимавшая место за насыпью, сложенной из булыжника, и стрелки городской национальной гвардии, занимавшие угол улицы, вдруг стали указывать друг другу на какой-то предмет, двигавшийся в дыму.</p><p class="p1">В тот момент, когда Гаврош забирал патроны у сержанта, лежавшего около тумбы, в труп ударила пуля.</p><p class="p1">– Гм! – проговорил Гаврош. – Они стали стрелять в мертвых.</p><p class="p1">Вторая пуля ударила в камень, как раз возле него. Третья опрокинула его корзину.</p><p class="p1">Гаврош поднял глаза и увидел, что в него стреляют национальные гвардейцы.</p><p class="p1">Он выпрямился во весь рост и с развевающимися по ветру волосами уперся руками в бока, вперил глаза в стрелявших в него солдат национальной гвардии и вызывающе запел песенку.</p><p class="p1">Потом он поднял корзину, сложил в нее, не оставляя ни одного, все упавшие на землю патроны и, подойдя еще ближе к стрелкам, стал опустошать другой патронташ. Там мимо него просвистела еще четвертая пуля. Гаврош продолжал петь.</p><p class="p1">Пятая пуля точно еще более подзадорила его.</p><p class="p1">Так продолжалось несколько времени.</p><p class="p1">Зрелище было и ужасное, и захватывающее. Гаврош, в которого стреляли, насмехался над стрелками. Казалось, что ему это даже доставляет большое удовольствие. Это был воробей, собирающийся заклевать охотника. На каждый выстрел он отвечал куплетом. Стреляли безостановочно и все время давали промахи. На каждый выстрел он отвечал куплетом. Солдаты национальной гвардии и солдаты регулярной пехоты смеялись, целясь в него. Он ложился, потом вставал, прятался за угол двери, потом вскакивал, исчезал, потом опять показывался, уходил и возвращался, сердился на картечь и в то же время собирал патроны, опустошал патронташи и наполнял свою корзинку. Бунтовщики, задыхаясь от волнения, следили за ним глазами. Баррикада дрожала от страха, а он пел. Пули гнались за ним, но он был проворнее их.</p><p class="p1">Он играл в прятки со смертью.</p><p class="p1">Но вот одна пуля, меткая и коварная, настигла храброго мальчугана. Гаврош зашатался и упал. С баррикады раздался крик ужаса. Гаврош приподнялся, тонкая струйка крови стекала по его лицу. Он поднял обе руки кверху, взглянул в ту сторону, откуда раздался выстрел, и снова запел. Но кончить куплет ему не удалось: вторая пуля навеки оборвала его песенку. Гаврош зашатался, упал лицом на мостовую и уже больше не шевелился. Отважная душа маленького ребенка отлетела.</p></span>
