<span><span><span><span id="id84"><div class="title6">
<p class="p">6. Битва смерти с ночью</p>
</div><p class="p1">Ребенок стоял перед темным силуэтом, безмолвно, удивленно, пристально глядя на него.</p><p class="p1">Для взрослого человека это была бы виселица, для ребенка это было привидение. Там, где взрослый увидел бы труп, ребенок видел призрак.</p><p class="p1">Он ничего не понимал.</p><p class="p1">Бездна таит в себе все разновидности приманок; одна из них находилась на вершине этого холма. Ребенок сделал шаг, другой. Он стал взбираться выше, испытывая желание спуститься, и приблизился, желая отступить назад.</p><p class="p1">Весь дрожа, он в то же время решительно подошел к самой виселице, чтобы получше рассмотреть призрак. Очутившись под виселицей, он поднял голову и стал внимательно разглядывать его.</p><p class="p1">Призрак был покрыт смолою и местами блестел. Ребенок различал черты лица. Оно тоже было обмазано смолою, и эта маска, казавшаяся липкой и вязкой, четко выступала в сумраке ночи. Ребенок видел дыру на том месте, где прежде был рот, дыру на месте носа и две черных ямы на месте глаз. Тело было как бы запеленуто в грубый холст, пропитанный нефтью. Ткань истлела и расползлась. В одном месте обнажилось колено. В другом видны были ребра. Одни части тела были еще трупом; другие уже стали скелетом. Лицо было цвета чернозема, ползавшие по нему слизняки оставили на нем тусклые серебристые полосы. Под холстом, прилипшим к костям, обрисовывались выпуклости, как под платьем на статуе. Череп треснул и, распавшись на две половины, напоминал собою гнилой плод. Зубы остались целы и скалились в подобии смеха. В зияющей дыре рта, казалось, замер последний крик. На щеках можно было заметить несколько волосков бороды. Голова, наклоненная вниз, как будто к чему-то прислушивалась.</p><p class="p1">Его, по-видимому, недавно подновляли. Лицо было заново вымазано смолой, так же как и выступавшие из прорех колено и ребра. Внизу из-под холста торчали обглоданные ступни. Прямо под ними, в траве, видны были два башмака, утратившие от снега и дождей всякую форму. Они свалились с ног мертвеца.</p><p class="p1">Босой ребенок смотрел на эти башмаки.</p><p class="p1">Ветер, становившийся все резче и резче, иногда внезапно спадал, как будто собирался с силами, чтобы разразиться бурей; на несколько минут он даже совсем стих. Труп уже не качался. Цепь висела неподвижно, как шнурок отвеса с гирькой на конце.</p><p class="p1">Как у всякого существа, только что вступившего в жизнь, но отдающего себе отчет в своей тяжкой участи, у ребенка, несомненно, начиналось пробуждение мучительных мыслей – мыслей еще неясных, детских, но уже стучащих в мозг, подобно птичьему клюву, долбящему скорлупу яйца; но все, чем в эту минуту было полно его младенческое сознание, повергало его лишь в оцепенение. Как излишек масла гасит огонь, так избыток ощущений гасит мысль. Взрослый задал бы себе тысячу вопросов, ребенок только смотрел.</p><p class="p1">Обмазанное смолой лицо мертвеца казалось мокрым. Капли смолы, застывшие в пустых глазницах, были похожи на слезы. Однако смола значительно замедляла разложение трупа: разрушительная работа смерти была задержана, насколько это оказалось возможным. То, что ребенок видел перед собой, было предметом, о котором заботились. По-видимому, человек этот представлял какую-то ценность. Его не захотели оставить в живых, но старались сохранить мертвым. Виселица была старая, вся в червоточинах, но прочная и стояла здесь уже давно.</p><p class="p1">В Англии с незапамятных времен существовал обычай смолить контрабандистов. Их вешали на берегу моря, обмазывали смолой и оставляли висеть; преступника, в назидание прочим, следует подвергать казни у всех на виду, и если его просмолить, он на долгие годы будет служить острасткой. Трупы смолили из чувства человеколюбия, полагая, что благодаря этому можно будет реже обновлять виселицы. Виселицы расставляли на берегу на определенном расстоянии одна от другой, как ставят в наше время фонари. Повешенный заменял собою фонарь. Он по-своему светил своим сотоварищам-контрабандистам. Контрабандисты издали, еще находясь в море, замечали виселицы. Вот одна – первое предостережение, а там другая – второе предостережение. Это нисколько не мешало им заниматься контрабандой, но таков порядок. Этот обычай продержался в Англии до начала нашего столетия. Еще в 1822 году перед Дуврским замком можно было видеть трех повешенных, облитых смолой. Впрочем, такой способ сохранения трупа преступника применялся не к одним только контрабандистам. Англия пользовалась им также по отношению к ворам, поджигателям и убийцам. Джон Пейнтер, совершивший поджог морских складов в Портсмуте, был в 1776 году повешен и засмолен. Аббат Койе, называющий Джона Пейнтера Жаном Живописцем, видел его вторично в 1777 году. Джон Пейнтер висел на цепи над развалинами сожженных им складов, в время от времени его снова покрывали смолой. Этот труп провисел, – можно бы сказать, прожил, – почти четырнадцать лет. Еще в 1788 году он служил правосудию. Однако в 1790 году его пришлось заменить новым. Египтяне чтили мумии своих фараонов; оказывается, мумия простого смертного также может быть полезной.</p><p class="p1">Ветер, с особенной силой разгулявшийся на холме, смел с него весь снег. Во многих местах виднелась трава, кое-где выглядывал чертополох. Холм был одет тем густым и низким приморским дерном, благодаря которому вершины скал кажутся покрытыми зеленым сукном. Только под виселицей, под самыми ногами казненного, росла высокая густая трава – явление неожиданное на этой бесплодной почве. Объяснялось это тем, что тела повешенных разлагались здесь на протяжении нескольких веков. Земля питается прахом человека.</p><p class="p1">Какие-то мрачные чары удерживали ребенка на холме. Он стоял на месте как вкопанный. Один только раз он наклонил голову: крапива больно обожгла ему ноги, и он принял это за укус животного. Затем он выпрямился и, закинув голову, снова стал смотреть прямо в лицо повешенному, который тоже смотрел на него. У мертвеца не было глаз, и потому казалось, что он смотрит особенно пристально. Это был взгляд рассеянный и вместе с тем невыразимо сосредоточенный; в нем были свет и мрак; он исходил из черепа, из оскала зубов, из черных впадин пустых глазниц. Вся голова мертвеца – сплошной взор, и это страшно. Зрачков нет, но мы чувствуем на себе их взгляд, жуткий взгляд привидения.</p><p class="p1">Постепенно ребенок сам становился страшен. Он больше не шевелился, как будто оцепенел. Он не замечал, что уже теряет сознание. Он коченел, замерзал. Зима безмолвно предавала его ночи; в зиме есть что-то вероломное. Дитя превратилось почти в изваяние. Каменный холод проникал в его кости; мрак, это пресмыкающееся, заползал в него. Дремота, исходящая от снега, подкрадывается к человеку, как морской прилив; ребенком медленно овладевала неподвижность, напоминавшая неподвижность трупа. Он засыпал.</p><p class="p1">На руке сна есть перст смерти.</p><p class="p1">Ребенок чувствовал, как его хватает эта рука. Он был близок к тому, чтобы упасть под виселицей. Он уже не сознавал, стоит он на ногах или нет.</p><p class="p1">Неизбежность конца, мгновенный переход от бытия к небытию, зияющий вход в горнило испытаний, возможность в каждое мгновение скатиться в бездну – таково человеческое существование.</p><p class="p1">Еще минута – и ребенок, и мертвец, жизнь, едва зародившаяся, и жизнь, уже угасшая, должны были слиться в общем уничтожении.</p><p class="p1">Казалось, призрак понял это и не хотел этого. Он вдруг зашевелился, словно предупреждая ребенка. Это был просто новый порыв ветра.</p><p class="p1">Трудно представить себе что-либо более ужасное, чем этот качающийся покойник.</p><p class="p1">Подвешенный на цепи труп, колеблемый невидимым дуновением ветра, принимал наклонное положение, поднимался влево, возвращался на прежнее место, поднимался вправо, падал и снова взлетал мерно и угрюмо, как язык колокола. Зловещее движение взад и вперед. Казалось, качается во тьме ночи маятник часов самой вечности.</p><p class="p1">Так продолжалось какое-то время. Увидев, что мертвец движется, ребенок очнулся от столбняка, почувствовал страх. Цепь при каждом колебании поскрипывала с чудовищной размеренностью, словно переводила дыхание. Этот звук напоминал стрекотание кузнечика.</p><p class="p1">Приближение бури вызывает внезапный напор ветра. Ветер вдруг перешел в ураган. Труп задвигался еще порывистее. Это было уже не раскачивание, а резкая встряска. Скрип цепи сменился пронзительным лязгом.</p><p class="p1">Звук этот, по-видимому, был услышан. Если это был призыв, то ему повиновались. Издали, с горизонта, донесся какой-то шум.</p><p class="p1">То был шум крыльев.</p><p class="p1">Слеталась стая воронов, как это часто бывает на кладбищах и пустырях, в особенности перед грозой.</p><p class="p1">Черные летящие точки пробились сквозь тучу, преодолели завесу тумана, приблизились, стали больше, сгрудились, сплотились и с неистовым криком бросились к холму. Это было подобно наступлению легиона. Крылатая нечисть ночи усеяла всю виселицу.</p><p class="p1">Ребенок в испуге отступил.</p><p class="p1">Стаи повинуются команде. Вороны кучками расселись на виселице. Ни один не спустился на мертвое тело. Они перекликались между собою. Карканье воронов вселяет страх. Вой, свист, рев – это голоса жизни, карканье же – радостное приятие тления. В нем чудится звук потревоженного безмолвия гробницы. Карканье – голос ночной тьмы. Ребенок весь похолодел не столько от стужи, сколько от ужаса.</p><p class="p1">Вороны притихли. Но вот один из них прыгнул на скелет. Это было сигналом. За ним устремились все остальные – целая туча крыльев; еще мгновение – и повешенный исчез под кишащей грудой черных пятен, шевелившихся во мраке. В эту минуту мертвец вдруг дернулся.</p><p class="p1">Сам ли он вздрогнул? Дунуло ли на него ветром? Но его с устрашающей силой подбросило на цепи. Налетевший ураган пришел ему на помощь. Призрак забился в судорогах. Бурный ветер, разгулявшись в высоте, завладел мертвым телом и принялся швырять его во все стороны. Мертвец стал ужасен. Он бесновался. Чудовищный картонный паяц, висевший не на тонкой веревочке, а на железной цепи! Какой-то злобный шутник дергал за ее конец и забавлялся пляской этой мумии. Она вертелась и подпрыгивала, угрожая каждую минуту распасться на куски. Вороны шарахнулись в испуге. Покойник точно стряхнул с себя этих омерзительных птиц. Но они снова вернулись. И начался бой.</p><p class="p1">Казалось, в мертвеце проснулись невероятные жизненные силы. Порывы ветра подбрасывали его кверху, словно собираясь умчать с собою, а он как будто отбивался что было мочи, стараясь вырваться; только железный ошейник удерживал его. Птицы повторяли все его движения, то отлетая, то снова набрасываясь, испуганные, остервенелые. С одной стороны – страшная попытка к бегству, с другой – погоня за прикованным на цепи. Мертвец, весь во власти судорожных порывов ветра, подскакивал, вздрагивал, приходил в ярость, отступал, возвращался, взлетал и стремглав падал вниз, разгоняя черную стаю. Он был палицей, стая – пылью. Крылатые хищники, не желая сдаваться, наступали с отчаянным упорством. Мертвец, словно обезумев при виде этого множества клювов, участил свои бесцельные удары по воздуху, подобные ударам камня, привязанного к праще. Временами на него набрасывались все клювы и все крылья, затем все куда-то пропадало; орда рассыпалась, но через мгновение накидывалась еще яростней. Ужасная казнь, продолжавшаяся и за порогом жизни. На птиц, казалось, нашло исступление. Только из недр преисподней могла вырваться подобная стая. Удары когтей, удары клювов, карканье, раздирание в клочья того, что уже не было мясом, скрип виселицы, хруст костей, лязг железа, вой бури, смятение – возможна ли более мрачная картина схватки? Мертвец, борющийся с демонами. Битва призраков.</p><p class="p1">Временами, когда ветер усиливался, повешенный вдруг начинал вертеться, поворачиваясь лицом во все стороны, как будто хотел броситься на птиц и перегрызть им глотку своими оскаленными зубами. Ветер был за него, цепь – против него, – словно темные божества вели бой вместе с ним. Ураган тоже принимал участие в сражении. Мертвец весь извивался, вороны спиралью кружились над ним. Это был живой смерч.</p><p class="p1">Снизу доносился глухой и мощный рокот моря.</p><p class="p1">Ребенок видел наяву этот страшный сон. Вдруг он вздрогнул от головы до пят, трепет пробежал по всему его телу; он заметался, задрожал, еле удержался на ногах и сжал лоб обеими руками, словно это была единственная точка опоры; ошеломленный, с развевающимися по ветру волосами, зажмурив глаза, сам похожий на призрак, он большими шагами спустился с холма и бросился бежать, оставив позади себя мучительные видения ночи.</p></span><span id="id85"><div class="title6">
<p class="p">7. Северная оконечность Портленда</p>
</div><p class="p1">Он бежал, задыхаясь, несся куда глаза глядят, мчался, не помня себя, по снегу, по равнине, в пространство. Бег согрел его. Это было ему необходимо. Если бы не быстрое движение и не испуг, он был бы уже мертв.</p><p class="p1">Когда у него захватило дыхание, он остановился; но оглянуться он не посмел. Ему мерещилось, что птицы гонятся за ним, что мертвец, сорвавшись с цепи, следует за ним по пятам, что даже виселица кинулась с холма вслед за покойником. Он боялся обернуться, чтобы не увидеть этого.</p><p class="p1">Немного передохнув, он снова пустился бежать.</p><p class="p1">Дети не умеют отдавать себе отчет в происходящем. Затуманенное страхом сознание ребенка воспринимало внешние впечатления без связи, без выводов. Он мчался, сам не зная куда и зачем. Охваченный щемящей тоской, он бежал с трудом, как бегут во сне. За три часа, проведенные им в одиночестве, его стремление идти куда-то вперед, не став определеннее, изменило, однако, свою первоначальную цель: тогда это были поиски, теперь это было бегство. Он уже не чувствовал ни голода, ни холода; он чувствовал только страх. Один инстинкт вытеснил другой. Все его помыслы свелись к одному – убежать. Убежать от чего? От всего. Жизнь мрачной стеной обступила его со всех сторон. Если бы он мог убежать от всего на свете, он так бы и сделал.</p><p class="p1">Но детям неведом тот способ взлома тюремной двери, который именуется самоубийством.</p><p class="p1">Он продолжал бежать.</p><p class="p1">Сколько времени он мчался так – неизвестно. Но наступает минута, когда и дыхания не хватает, и страху приходит конец.</p><p class="p1">И вдруг, как бы внезапно охваченный приливом энергии и рассудительности, ребенок остановился; ему, видимо, стало стыдно за свое бегство; он выпрямился, топнул ногою, смело поднял голову и обернулся назад.</p><p class="p1">Ни холма, ни виселицы, ни воронья.</p><p class="p1">Туман опять окутал весь горизонт.</p><p class="p1">Ребенок снова пустился в путь.</p><p class="p1">Теперь он уже не бежал, он медленно шел. Сказать, что встреча с мертвецом сделала его взрослым, значило бы втиснуть в узкие рамки то сложное и неясное впечатление, которое она на него произвела. Виселица, смутно запечатлевшаяся в его еще зачаточном сознании, оставалась для него лишь видением. Но так как победа над страхом придает нам силы, в нем пробудилась отвага. Будь он в том возрасте, когда человек способен разобраться в себе, он нашел бы тысячу поводов к раздумью; но мышление детей лишено четкости, и ребенок в лучшем случае может ощутить лишь легкую горечь того, пока недоступного ему чувства, которое он, став взрослым, назовет негодованием.</p><p class="p1">Прибавим к этому, что ребенок одарен способностью быстро забывать свои ощущения. От него ускользают отдаленные, беглые очертания сущности горестного явления. Самым своим возрастом, своей слабостью дитя защищено от слишком сложных душевных волнений. Оно воспринимает события, но почти ничего с ними не связывает. Взрослый доискивается связи между разрозненными явлениями, ребенок же легко удовлетворяется частичным их объяснением. Жизненный процесс как нечто целое возникает перед ним позднее, когда приходит опыт, на который уже можно опереться. Тогда сопоставляются отдельные группы фактов, просветленный и зрелый рассудок сравнивает их между собой, и воспоминания детского возраста проступают сквозь все пережитое, как палимпсест из-под новейшего письма; воспоминания оказываются точками опоры для логики, и то, что было в уме ребенка впечатлением, становится силлогизмом в сознании взрослого. Впрочем, опыт бывает различным и обращается на пользу или во вред в зависимости от натуры человека. Хорошая натура созревает, дурная – растлевается.</p><p class="p1">Ребенок пробежал с добрую четверть лье и еще столько же прошел шагом. Вдруг он почувствовал мучительный голод. Мысль о еде завладела всем его существом, сразу вытеснив из памяти омерзительную картину, которую он видел на холме. В человеке, к счастью, есть животное: оно возвращает его к действительности.</p><p class="p1">Но что бы поесть? Где бы поесть? Как бы поесть? Мальчик невольно ощупал свои карманы, отлично зная, что они пусты.</p><p class="p1">Он ускорил шаги. Не зная сам, куда идет, он спешил добраться до какого-нибудь жилья.</p><p class="p1">Надежда на пристанище в известной мере является источником человеческой веры в провидение. Верить, что для нас всегда найдется кров, значит верить в Бога.</p><p class="p1">Однако на этой снежной равнине не было видно ничего, похожего на кровлю.</p><p class="p1">Ребенок шел и шел; перед ним по-прежнему простиралось голое плоскогорье; казалось, ему не будет конца.</p><p class="p1">На этой возвышенности никогда не было человеческого жилья. Только у подножия утеса, в расселинах скал, ютились в давние времена первобытные обитатели этой страны, у которых не было дерева для постройки хижины; оружием им служила праща, топливом – сухой коровий помет, божеством, которому они поклонялись, был идол Чейл, стоявший на лесной прогалине в Дорчестере, весь же их промысел сводился к ловле серого коралла, который валлийцы называют plin, а греки – isidis plocamos.</p><p class="p1">Ребенок искал дорогу, как умел. Вся наша судьба – перепутье; выбрать надлежащее направление очень трудно, а этому маленькому существу уже на заре его жизни предстояло сделать выбор вслепую. Тем не менее он продолжал идти вперед. Но хотя мышцы ног у него были точно стальные, он начал уставать. На всем пространстве не было ни; одной тропы, а если они и были, их занесло снегом. Безотчетно он продолжал двигаться на восток. Он изранил ступни об острые камни. Если бы было светло, можно было бы увидеть на следах, оставляемых им на снегу, алые пятна крови.</p><p class="p1">Местность была ему совсем незнакома. Он пересекал Портлендскую возвышенность с юга на север, а шайка, с которой он сюда попал, вероятно, избегая нежелательных встреч, пересекла ее с запада на восток. По-видимому, она бежала в рыбацкой или контрабандистской лодке с какого-нибудь пункта на Эджискомбском побережье, из Сент-Катрин-Чипа или из Суонкри, направляясь в Портленд, где ее ожидала урка, и должна была высадиться в одной из бухт Уэстона, с тем чтобы пересесть на другое судно в одном из заливчиков Истона. Путь этот под прямым углом перекрещивался с направлением, по которому шел теперь ребенок. Потому-то он и не узнавал местности.</p><p class="p1">На Портлендском плоскогорье сплошь и рядом попадаются высокие холмы, нависающие прямо над берегом и отвесно обрывающиеся к морю. Блуждая, ребенок взобрался на один из таких холмов, остановился и стал всматриваться в даль, надеясь, что с высокого места ему будет виднее. Но перед ним, заслоняя горизонт, расстилалась синеватая туманная мгла. Он стал внимательно всматриваться в нее, и пристальный взгляд его постепенно начал улавливать в ней какие-то очертания. На востоке, на дне отдаленной лощины, пониже синеватой мглы, которую можно было бы принять за движущийся в мутном сумраке ночи утес, стлались по земле и развевались в воздухе какие-то черные клочья. Синеватая мгла была туман, а черные клочья – дым. Где есть дым, там есть и люди. Ребенок направился в ту сторону.</p><p class="p1">На некотором расстоянии от себя он увидел спуск и внизу у спуска, среди неясных очертаний скал, окутанных туманом что-то вроде песчаной мели или косы, которая, вероятно, соединяла видневшиеся на горизонте равнины с только что пересеченным им плоскогорьем. Очевидно, надо было идти в этом направлении.</p><p class="p1">Действительно, он достиг Портлендского перешейка, образованного дилювиальными наносами, который называется Чесс-Хилл.</p><p class="p1">Он стал спускаться по склону. Скат был трудный и неровный. Это была противоположная сторона той возвышенности, на которую он карабкался, выбираясь из бухты. Правда, спускаться было легче. Всякий подъем вознаграждается спуском. Раньше он карабкался, теперь скатывался кубарем.</p><p class="p1">Он перепрыгивал с утеса на утес, рискуя вывихнуть себе ногу или свалиться в невидимую пропасть. Чтобы удержаться на льду при спуске со скалы, он хватался руками за тонкие, длинные ветки дикого терна или за усеянные шипами кусты утесника, и колючие иглы их вонзались ему в пальцы. Кое-где скат был не так крут, и тогда ребенок немного отдыхал, но рядом опять начинался обрыв, и снова приходилось рассчитывать каждый шаг. При спуске в пропасть надо быть ловким, иначе грозит смерть; каждое движение – решение задачи. Эту задачу ребенок разрешал с врожденным искусством, которому позавидовали бы обезьяны, и с таким умением, которому подивился бы акробат. Склон был крут и длинен. Тем не менее ребенок уже находился почти внизу.</p><p class="p1">Мало-помалу приближалась минута, когда он вступит на перешеек, издали представший его взору.</p><p class="p1">Он то перескакивал, то переползал с утеса на утес и временами вдруг начинал прислушиваться, насторожившись, как чуткая лань. Он различал вдали, налево от себя, слабый протяжный гул, похожий на низкий звук рожка. Действительно, в вышине уже происходили сдвиги воздушных слоев – предвестники того страшного северного ветра, который каким-то трубным воем дает знать о своем прибытии с полюса. В то же время ребенок почувствовал у себя на лбу, на веках, на щеках нечто, напоминавшее прикосновение к лицу холодных ладоней. Это были крупные хлопья снега, сначала незаметно порхавшие в воздухе и вдруг закружившиеся вихрем. Они предвещали снежную бурю. Ребенок уже был с головы до ног покрыт снегом. Снежная буря, более часа свирепствовавшая на море, захватила теперь и берег. Она постепенно простирала свою власть и на горные равнины. Надвигаясь под косым углом с северо-запада, она готовилась разразиться над Портлендским плоскогорьем.</p></span></span></span></span>
