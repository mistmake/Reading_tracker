<p class="p">II. Пьер Гренгуар</p>
</div><p class="p1">Восхищение, вызванное костюмом Юпитера, мало-помалу проходило по мере того, как он говорил свою речь. А когда он дошел до злополучного заключения: «Как только прибудет его преосвященство господин кардинал, мы тотчас же начнем представление», – голос его был заглушен громкими криками.</p><p class="p1">– Начинайте сейчас же! Мистерию! Мистерию! Сейчас же начинайте мистерию! – кричал народ.</p><p class="p1">Громче всех звучал пронзительный голос Жана де Мулена, выделявшийся как звук флейты среди грома других инструментов.</p><p class="p1">– Начинайте сию же минуту! – визжал студент.</p><p class="p1">– Долой Юпитера и кардинала Бурбонского! – вопили Робен Пуспен и клерки, сидевшие на окне.</p><p class="p1">– Играйте моралите, – ревела толпа. – Сейчас же! Сию же минуту! А не то мы повесим комедиантов и кардинала!</p><p class="p1">Бедный Юпитер, растерянный, перепуганный, побледневший под румянами, уронил молнию, снял шапочку, задрожал всем телом и, низко кланяясь, пробормотал: «Его преосвященство… послы… госпожа Маргарита Фландрская…» Он не знал, что сказать. Он всерьез испугался, что его могут повесить. Его повесит народ, если он будет ждать кардинала, его повесит кардинал, если он не станет ждать его. И в том и в другом случае – виселица.</p><p class="p1">К счастью, нашелся человек, пожелавший вывести его из затруднения и взять ответственность на себя.</p><p class="p1">До сих пор этот так неожиданно явившийся спаситель стоял в промежутке между балюстрадой и мраморным помостом. Его никто не замечал, так как колонна скрывала от публики его длинную тощую фигуру. Это был высокий, худой, бледный белокурый человек с блестящими глазами, улыбающийся, еще молодой, но уже с морщинами на лбу и на щеках. На нем была черная саржевая одежда, сильно потертая и лоснившаяся от времени. Он подошел к мраморному помосту и сделал знак несчастному Юпитеру. Но тот, совсем растерявшись, не замечал его.</p><p class="p1">– Юпитер! – позвал его незнакомец, подойдя еще ближе. – Любезный Юпитер!</p><p class="p1">Юпитер не слыхал его.</p><p class="p1">Тогда высокий блондин, потеряв терпение, крикнул ему чуть не в самое ухо:</p><p class="p1">– Мишель Жиборн!</p><p class="p1">– Кто меня зовет? – спросил Юпитер, словно внезапно пробудившись от сна.</p><p class="p1">– Я! – ответил незнакомец в черном.</p><p class="p1">– А! – сказал Юпитер.</p><p class="p1">– Начинайте сейчас же. Удовлетворите публику. Я берусь утихомирить судью, а тот утихомирит кардинала.</p><p class="p1">Юпитер облегченно вздохнул.</p><p class="p1">– Господа горожане! – воскликнул он насколько мог громче, обращаясь к толпе, продолжавшей кричать и свистеть. – Мы сию минуту начнем представление!</p><p class="p1">– Evoe, Jupiter! Plaudite, cives!<a href="ch2.xhtml#id115" class="a">[18]</a> – закричали студенты.</p><p class="p1">– Браво! Браво! – заревела толпа.</p><p class="p1">Раздался оглушительный взрыв рукоплесканий, и даже после того, как Юпитер скрылся в одевальной, весь зал еще дрожал от криков одобрения.</p><p class="p1">Между тем незнакомец, превративший, как по волшебству, «бурю в штиль», как выражается наш милый старый Корнель, скромно удалился за свою колонну. Он, наверное, там бы и остался, по-прежнему невидимый для публики, по-прежнему безмолвный и неподвижный, если бы его не вызвали оттуда две молодые девушки, сидевшие в первом ряду зрителей и заметившие его разговор с Мишелем Жиборном – Юпитером.</p><p class="p1">– Мэтр! – сказала одна из них, делая знак подойти.</p><p class="p1">– Молчи, милая Лиенарда, – остановила ее сидевшая рядом с ней хорошенькая, свеженькая, разряженная по-праздничному девушка. – Он к клиру не принадлежит, он мирянин. Его нужно называть не «мэтр», а «мессир».</p><p class="p1">– Мессир! – сказала Лиенарда.</p><p class="p1">Незнакомец подошел к балюстраде.</p><p class="p1">– Что вам угодно, сударыни? – любезно спросил он.</p><p class="p1">– Нет… ничего! – смутившись, ответила Лиенарда. – Не я, а моя соседка, Жискета ла Жансьен, хотела вам что-то сказать.</p><p class="p1">– Неправда, – возразила Жискета, покраснев. – Это Лиенарда сказала вам «мэтр». А я поправила ее, объяснив, что нужно назвать вас «мессир».</p><p class="p1">Обе молодые девушки опустили глазки. Незнакомец, который, по-видимому, был не прочь продолжать разговор, улыбаясь, смотрел на них.</p><p class="p1">– Так я ничем не могу служить вам, сударыни? – спросил он.</p><p class="p1">– О, ничем! – ответила Жискета.</p><p class="p1">– Совершенно ничем, – добавила Лиенарда.</p><p class="p1">Высокий блондин сделал шаг назад, собираясь уйти. Но две любопытные девушки не имели ни малейшего желания выпустить так легко свою добычу.</p><p class="p1">– Мессир, – заговорила Жискета с той стремительностью, которая свойственна водяному потоку и женской болтовне, – значит, вы знаете этого солдата, который будет играть роль Пресвятой Девы в мистерии?</p><p class="p1">– То есть вы хотите сказать – роль Юпитера? – спросил незнакомец.</p><p class="p1">– Конечно! – воскликнула Лиенарда. – Какая она глупая! Так вы знаете Юпитера?</p><p class="p1">– Мишеля Жиборна? Да, сударыня.</p><p class="p1">– Какая у него красивая борода! – сказала Лиенарда.</p><p class="p1">– А хорошо то, что они будут представлять? – застенчиво спросила Жискета.</p><p class="p1">– Великолепно, сударыня, – без малейшего колебания ответил блондин.</p><p class="p1">– Что же это будет? – спросила Лиенарда.</p><p class="p1">– «Премудрый суд Пресвятой Девы Марии» – моралите, сударыня.</p><p class="p1">– А, это дело другое! – сказала Лиенарда.</p><p class="p1">Наступила короткая пауза. Незнакомец прервал ее.</p><p class="p1">– Это совершенно новая моралите, – заметил он, – ее еще ни разу не играли.</p><p class="p1">– Значит, это не та, – спросила Жискета, – которую давали два года тому назад, в тот день, как в город въезжал легат? Там еще играли три хорошенькие девушки, которые изображали…</p><p class="p1">– Сирен… – подсказала Лиенарда.</p><p class="p1">– И совсем голых, – прибавил молодой человек.</p><p class="p1">Лиенарда стыдливо опустила глаза. Жискета взглянула на нее и последовала ее примеру.</p><p class="p1">– Да, это была очень интересная пьеса, – продолжал их собеседник. – Но сегодня будут играть моралите, написанную нарочно для герцогини Фландрской.</p><p class="p1">– А будут петь пастушеские песенки? – спросила Жискета.</p><p class="p1">– Помилуйте, разве это возможно в моралите? Не нужно смешивать разные жанры. Будь это шуточная пьеса, тогда дело другое.</p><p class="p1">– Жаль, – сказала Жискета. – В день приезда легата у фонтана Понсо играли прекрасную пьесу. Мужчины и женщины – их было очень много – представляли дикарей, сражались между собою и пели пастушеские песни и мотеты.</p><p class="p1">– То, что хорошо для легата, – довольно сухо заметил молодой человек, – не подходит для принцессы.</p><p class="p1">– И тогда, – сказала Лиенарда, – на различных инструментах исполняли чудесные мелодии.</p><p class="p1">– А чтобы прохожие могли освежиться, – подхватила Жискета, – из трех отверстий фонтана били вино, молоко и напиток с пряностями. Всякий мог пить сколько угодно.</p><p class="p1">– А немножко дальше фонтана, у Троицы, – продолжала Лиенарда, – актеры безмолвно представляли страсти Христовы.</p><p class="p1">– Ах, как хорошо я помню это! – воскликнула Жискета. – Господь на кресте и два разбойника по правую и по левую сторону.</p><p class="p1">Тут молодые подружки, разгоряченные воспоминаниями обо всем виденном в день въезда легата, затараторили разом, перебивая друг друга:</p><p class="p1">– А немного дальше, у Ворот живописцев, как великолепно были одеты актеры!</p><p class="p1">– А помнишь охотника, который около фонтана Святого Иннокентия гнался за козочкой, и собаки громко лаяли, и трубили рога?</p><p class="p1">– А около парижской бойни были устроены подмостки, изображавшие Дьепскую крепость…</p><p class="p1">– И когда мимо проезжал легат, – помнишь, Жискета? – начался приступ, и всех англичан перерезали.</p><p class="p1">– А какие прекрасные актеры были у ворот Шатлэ!</p><p class="p1">– А что творилось у моста Шанж!</p><p class="p1">– А как только легат въехал на мост, выпустили больше двухсот дюжин всяких птиц. Ах, как это было красиво, Лиенарда!</p><p class="p1">– Сегодня будет еще лучше, – сказал их собеседник, по-видимому, с нетерпением слушавший их болтовню.</p><p class="p1">– Вы ручаетесь, что мистерия будет хороша? – спросила Жискета.</p><p class="p1">– Вполне, – ответил он и прибавил несколько напыщенно: – Я автор этой пьесы, сударыни.</p><p class="p1">– Неужели? – воскликнули изумленные девушки.</p><p class="p1">– Совершенно верно, – ответил поэт, слегка выпятив грудь. – Нас, собственно, двое: Жан Маршан напилил доски и сколотил театр, а я написал пьесу. Меня зовут Пьер Гренгуар.</p><p class="p1">Даже автор «Сида» не сумел бы более гордо произнести свое имя: Пьер Корнель.</p><p class="p1">Читатель, наверное, заметил, что должно было пройти уже порядочно времени с тех пор, как Юпитер ушел в одевальную, до той минуты, как Пьер Гренгуар объявил девушкам, что он автор новой моралите, и тем вызвал их наивное восхищение. Странная вещь! Вся эта толпа, такая буйная всего несколько минут тому назад, теперь добродушно ждала, успокоенная обещанием актера. Новое доказательство той вечной истины, которая ежедневно подтверждается и в наших театрах, что лучший способ заставить публику терпеливо ждать – это объявить ей: «Представление сейчас начнется!» Однако студента Жана провести было не так просто.</p><p class="p1">– Эй! – раздался вдруг его голос, нарушая мирную тишину, сменившую шум и волнение. – Юпитер, Пречистая Дева и все прочие чертовы фигляры! Насмехаетесь вы, что ли, над нами? Пьесу! Пьесу! Начинайте, а не то опять начнем мы!</p><p class="p1">Этого возгласа оказалось вполне достаточно.</p><p class="p1">Изнутри стоявшей на столе огромной клетки послышались звуки высоких и низких инструментов; ковер, закрывавший вход, откинулся, из одевальной вышли четверо нарумяненных актеров в пестрых костюмах. Они вскарабкались по крутой лестнице и, добравшись до сцены, выстроились в ряд перед публикой и низко поклонились. Музыка смолкла. Началась мистерия. Четыре актера, щедро вознагражденные за свои поклоны рукоплесканиями, начали среди благоговейной тишины пролог, от которого мы избавим читателя. Впрочем, и публика не особенно внимательно слушала его. Ее, как нередко бывает и в наши дни, гораздо больше занимали костюмы действующих лиц, чем их роли. А на костюмы этих четверых актеров действительно стоило посмотреть. Все они были в платьях наполовину желтых, наполовину белых, одинаковых по покрою, но из разной материи. Платье первого актера было из золотой и серебряной парчи, платье второго – из шелковой материи, третьего – из шерстяной и четвертого – из полотна. Первый держал в руке шпагу, второй – два золотых ключа, третий – весы, четвертый – лопату. А чтобы зрители, не умеющие быстро соображать, поняли, что означают эти атрибуты, на подоле парчового платья было вышито большими черными буквами: «Я – дворянство»; на подоле шелкового платья: «Я – духовенство»; на подоле шерстяного: «Я – купечество»; и на подоле полотняного: «Я – крестьянство». Каждый здравомыслящий человек мог сейчас же догадаться, какие из этих аллегорических фигур были мужского пола и какие женского, так как на первых платья были короче, а головные уборы гораздо проще.</p><p class="p1">Нужно было также не хотеть понимать, чтобы не понять из стихотворного пролога, что Крестьянство состояло в браке с Купечеством, а Духовенство – с Дворянством и что у этих двух счастливых парочек был общий чудный золотой дельфин, которого они решили отдать самой красивой женщине в мире. Они отправились разыскивать эту красавицу по всему свету; отвергнув голкондскую королеву, трапезондскую принцессу, дочь великого хана татарского и многих других, Крестьянство, Купечество, Духовенство и Дворянство пришли отдохнуть на мраморном помосте Дворца правосудия, где принялись угощать почтенную публику таким огромным количеством афоризмов, остроумных изречений, софизмов и риторических фигур, что их могло бы хватить на весь факультет словесных наук, для всех добивающихся ученой степени.</p><p class="p1">Все шло прекрасно.</p><p class="p1">Но ни у кого из слушателей, на которых эти четыре аллегорические фигуры изливали целые потоки метафор, не было таких внимательных ушей, такого трепещущего сердца, такого напряженного взгляда и такой вытянутой шеи, как у самого автора, поэта Пьера Гренгуара, который несколько минут тому назад не мог устоять против желания назвать свое имя двум хорошеньким девушкам. Теперь он стоял в нескольких шагах от них, спрятавшись за колонну, слушал, смотрел и наслаждался. Поощрительные аплодисменты, приветствовавшие начало его пролога, еще звучали у него в ушах, и он забылся в том блаженном упоении, с каким автор внимает словам актера, передающего его мысли одну за другой среди безмолвия многочисленной публики.</p><p class="p1">Достойный Пьер Гренгуар!</p><p class="p1">Однако это восторженное состояние, как нам ни грустно сознаться в этом, было скоро нарушено. Едва Гренгуар успел поднести к губам эту опьяняющую чашу радости и триумфа, как в нее уже попала капля горечи.</p><p class="p1">Какой-то оборванный нищий, настолько затертый толпой, что не мог собирать милостыню, неудовлетворенный жалкими подачками своих соседей, решил взобраться на какое-нибудь видное местечко, надеясь привлечь внимание публики и выклянчить у нее побольше. И вот во время пролога он ухитрился вскарабкаться по столбам эстрады, приготовленной для почетных гостей, и добрался до карниза под балюстрадой, где и уселся на виду, стараясь разжалобить зрителей своими лохмотьями и язвой на правой руке. Он не произносил при этом ни слова, и пролог продолжался без помехи. Он и закончился бы, пожалуй, благополучно, если бы по несчастной случайности студент Жан не заметил со своей колонны кривлявшегося нищего. Повеса громко захохотал и, нисколько не заботясь о том, что прерывает представление и мешает внимательно слушающей публике, весело крикнул:</p><p class="p1">– Посмотрите-ка! Этот несчастный собирает милостыню!</p><p class="p1">Тот, кому случалось бросить камень в болото, где много лягушек, или выстрелить в стаю птиц, может легко представить себе, какое действие произвело на зрителей это неожиданное восклицание в то время, как все внимание их было обращено на сцену. Гренгуар вздрогнул, как от электрической искры. Пролог прервался, и все головы сразу повернулись к нищему, которого это нимало не смутило. Он, напротив, нашел, что теперь самое подходящее время просить милостыню, и, полузакрыв глаза, жалобно затянул: «Подайте Христа ради».</p><p class="p1">– Вот так штука! – воскликнул Жан. – Клянусь, это Клопен Труйльфу. Эй, приятель! Должно быть, болячка на ноге мешала тебе, что ты перенес ее на руку?</p><p class="p1">Говоря это, он с ловкостью обезьяны бросил мелкую серебряную монету прямо в засаленную шапку, которую Клопен держал в своей больной руке. Нищий, не сморгнув, принял подаяние и насмешку и продолжал жалобно тянуть: «Подайте Христа ради!»</p><p class="p1">Этот случай послужил немалым развлечением для публики, и многие зрители с Робеном Пуспеном и всеми членами причта во главе весело аплодировали странному дуэту, который так неожиданно затеяли среди пролога студент, пронзительно кричавший, и монотонно причитавший нищий.</p><p class="p1">Гренгуар был возмущен. Оправившись от неожиданности, он изо всех сил закричал актерам:</p><p class="p1">– Продолжайте! Черт возьми, да продолжайте же! – Он не удостоил даже взглядом двух нарушителей тишины.</p><p class="p1">В эту минуту кто-то дернул его за платье. Он с досадой обернулся и едва мог заставить себя улыбнуться. А не улыбнуться было нельзя: это Жискета ла Жансьен, просунув свою хорошенькую ручку через решетку, старалась таким способом привлечь к себе его внимание.</p><p class="p1">– Сударь, – спросила девушка, – актеры будут продолжать?</p><p class="p1">– Конечно, – ответил несколько задетый этим вопросом Гренгуар.</p><p class="p1">– В таком случае, мессир, не будете ли вы любезны объяснить мне…</p><p class="p1">– Что они будут говорить? – прервал ее Гренгуар. – Извольте. Они…</p><p class="p1">– Нет, – сказала Жискета, – объясните мне, пожалуйста, что они говорили раньше!</p><p class="p1">Гренгуар вздрогнул, как вздрагивает человек, когда неосторожно дотронутся до его открытой раны.</p><p class="p1">– Черт бы побрал эту глупую девчонку! – сквозь зубы пробормотал он.</p><p class="p1">И с этой минуты Жискета погибла в его мнении. Между тем актеры повиновались ему и снова начали играть. Зрители, видя, что они заговорили, стали слушать. Но они все-таки были лишены возможности насладиться несколькими прекрасными местами пролога из-за злополучного перерыва, так неожиданно разделившего его на две части. Так, по крайней мере, с горечью подумал про себя Гренгуар. Все же тишина мало-помалу восстановилась; студент молчал, нищий считал монеты в своей шапке, а пьеса шла своим чередом.</p><p class="p1">Это была, в сущности, очень недурная пьеса, которая могла бы, пожалуй, с успехом пойти с некоторыми изменениями и в наше время. Положим, она, согласно тогдашним правилам, была слишком растянута и бессодержательна, зато она отличалась простотой, и Гренгуар в глубине души восхищался необыкновенной ясностью изложения.</p><p class="p1">Как и следовало ожидать, две аллегорические парочки немножко устали, обегав три части света и не найдя случая приличным образом отделаться от своего золотого дельфина<a href="ch2.xhtml#id113" class="a">[19]</a>. А потому понятны бесконечные похвалы, которые они расточали своей чудесной рыбе, делая в то же время тонкие намеки на юного жениха Маргариты Фландрской. А он в это самое время сидел в печальном заточении в Амбуазе, нимало не подозревая, что Крестьянство, Купечество, Духовенство и Дворянство совершили ради него целое кругосветное путешествие. Итак, дельфин был молод, красив, силен и – что еще важнее – был сыном Льва Франции, отсюда все его царственные достоинства. Эта удивительная и смелая метафора, хотя и несогласная с законами природы, не казалась неестественной в аллегории, написанной по случаю предстоящего бракосочетания дофина. Дельфин – сын Льва! Что же, как не вдохновение, внушило поэту такое необыкновенное и смелое сопоставление!</p><p class="p1">Однако критик, наверное, заметил бы, что двухсот стихов, пожалуй, слишком много для развития прекрасной идеи автора. Но и в этом случае для него находилось оправдание: господин прево распорядился, чтобы мистерия продолжалась от двенадцати до четырех часов, и потому поэту поневоле приходилось быть многоречивым, – не могли же актеры стоять молча на сцене. Впрочем, слушали терпеливо.</p><p class="p1">Вдруг, в то время как ссора между Купечеством и Дворянством находилась в полном разгаре и Крестьянство произносило удивительный стих:</p><div class="poem">
<div class="stanza">
<p class="v">Onc ne vis dans les bois bâte plus triom phante…<a href="ch2.xhtml#id107" class="a">[20]</a> –</p>
</div>
</div><p class="p1">дверь эстрады, которая до сих пор так некстати оставалась закрытой, теперь еще более некстати отворилась, и привратник громко провозгласил:</p><p class="p1">– Его преосвященство монсеньор кардинал Бурбонский!</p></span></span></span>
