<p class="p">2. Баркильфедро метил в ястреба, а попал в голубку</p>
</div><p class="p1">Подножка возка была спущена, дверь приотворена; внутри никого не было, скудный свет, пробивавшийся сквозь переднее окошечко, смутно обрисовывал внутренность балагана, тонувшую в печальном полумраке. На обветшалых досках, служивших одновременно наружными стенами и внутренней обшивкой, еще можно было (разобрать надписи, сделанные Урсусом и прославлявшие величие лордов. Близ двери Гуинплен увидел свой кожаный нагрудник и рабочий костюм, висевшие на гвозде, как одежда покойника в морге.</p><p class="p1">На Гуинплене не было ни кафтана, ни камзола.</p><p class="p1">Возок загораживал собою какой-то предмет, лежавший на палубе у подножия мачты и освещенный фонарем. Это был край тюфяка, видневшийся из-за повозки. На тюфяке, очевидно, кто-то лежал. По палубе двигалась какая-то тень.</p><p class="p1">Слышался чей-то голос. Гуинплен, притаившись за возком, стал прислушиваться.</p><p class="p1">Говорил Урсус.</p><p class="p1">Этот голос, казавшийся столь грубым, но скрывавший такую нежность, так часто бранивший Гуинплена с самого детства и так хорошо его воспитавший, теперь утратил свою звучность и живость. Он стал глухим, вялым и беспрестанно прерывался вздохами. Лишь отдаленно напоминал он прежний ясный и твердый голос Урсуса. Он принадлежал человеку, похоронившему свое счастье. Голос тоже может стать тенью.</p><p class="p1">Урсус, казалось, говорил сам с собою. У него, как известное была привычка к монологам. Из-за этого многие считали его помешанным.</p><p class="p1">Гуинплен затаил дыхание, чтобы не проронить ни слова из того, что говорил Урсус, и вот что он услыхал:</p><p class="p1">– Суда такого типа очень опасны. У них нет бортов. Ничего не стоит скатиться в море. Если разыграется непогода, Дею придется перенести в трюм, а это будет ужасно. Одно неловкое движение, малейший испуг, и у нее может сделаться разрыв сердца. Я видал такие примеры. Ах, боже мой, что с нами будет! Спит она? Да, спит. Кажется, спит. А может быть, она без сознания? Нет. Пульс хороший. Наверное, она спит. Сон – это отсрочка. Благодетельная слепота! Как бы устроить, чтобы никто здесь не ходил? Господа, если кто-нибудь тут есть на палубе, прошу вас, не шумите. Не подходите сюда, если можно. Нужно бережно обращаться с людьми слабого здоровья. У нее лихорадка, видите ли. Она совсем еще молоденькая. У этой девочки горячка. Я вытащил ее тюфяк на воздух, чтобы ей легче было дышать. Я объясняю это для того, чтобы вы были осторожнее. От усталости она свалилась на тюфяк, словно лишилась чувств. Но она спит. Очень прошу – не будите ее. Обращаюсь к женщинам, если здесь есть леди. Как не пожалеть молоденькую девушку? Мы только бедные фигляры, будьте снисходительны к нам; если нужно заплатить, чтобы не шумели, я готов заплатить. Благодарю вас, милостивые государи и милостивые государыни. Есть здесь кто-нибудь? Нет. Кажется, никого. Я трачу слова впустую. Тем лучше. Господа, благодарю вас, если вы здесь, но еще больше вам признателен, если вас нет. – На лбу у нее капельки пота. – Ну что ж, вернемся на каторгу. Опять впряжемся в лямку. К нам возвратилась нищета. Нам снова приходится положиться на волю волн. Чья-то рука, страшная рука, которой мы не видим, но которую постоянно чувствуем над собой, внезапно повернула нашу судьбу в худшую сторону. Пусть так, не будем терять мужества. Только бы она не хворала. Глупо, что я говорю вслух с самим собой, но надо же, чтобы она почувствовала, если проснется, что рядом с нею кто-то есть. Лишь бы только не разбудили ее внезапно. Не шумите, ради бога. Всякий толчок, малейшее волнение может ей повредить. Будет ужасно, если здесь начнут ходить. Мне кажется, на судне все спят. Благодарю провидение за эту милость. А где же Гомо? Во всей этой суматохе я забыл посадить его на цепь. Я сам не знаю, что делаю. Вот уже больше часу, как я его не видел. Он, верно, ушел промышлять себе ужин. Лишь бы с ним ничего дурного не случилось Гомо! Гомо!</p><p class="p1">Волк тихо застучал хвостом по палубе.</p><p class="p1">– А, ты здесь! Слава Богу! Потерять еще и Гомо – это было бы слишком. Она шевелит рукой. Она, пожалуй, сейчас проснется. Тише, Гомо! Начинается отлив. Сейчас мы отчалим. По-моему, ночь будет спокойной. Ветер затих. Вымпел повис вдоль мачты, плаванье будет благополучным. Я не вижу, где луна, но облака еле движутся. Качки не будет. Погода будет хорошая. Как она бледна! Это от слабости. Нет, щеки у нее горят. Это лихорадка. Да нет, она порозовела. Значит, она здорова. Я ничего не могу разобрать. Мой бедный Гомо, я уже ничего не понимаю. Итак, надо начинать жизнь сызнова. Надо будет опять приняться за работу. Ведь нас теперь только двое. Мы с тобой будем работать для нее. Это наше дитя. А! Судно тронулось. Отправляемся. Прощай, Лондон! Добрый вечер, доброй ночи, к черту! Ах, проклятый Лондон!</p><p class="p1">Судно действительно стало понемногу отчаливать от берега. Расстояние между ним и пристанью все увеличивалось. На другом конце судна, на корме, стоял человек, очевидно судовладелец; он только что вышел из каюты и, отдав причал, взялся за руль. Человек этот, отличавшийся хладнокровием моряка и флегматичностью голландца, устремил все свое внимание на фарватер; он ничего не видел, кроме поверхности воды, ничего не слышал, кроме шума ветра; еле выделяясь в темноте, он походил на призрак и медленно двигался по палубе от одного края кормы к другому, согнувшись под тяжестью румпеля. Он был один на палубе. Пока судно шло по реке, ему не нужны были помощники. Через несколько минут шхуна поплыла по течению. Ни боковой, ни килевой качки не было. Почти не нарушая спокойствия Темзы, волна отлива быстро увлекала судно. За ним в тумане уменьшался черный силуэт Лондона.</p><p class="p1">Урсус продолжал:</p><p class="p1">– Все равно, я дам ей выпить настоя наперстянки. Боюсь, как бы у нее не начался бред. Ладони у нее влажные. Но чем же это мы прогневили Бога? Как неожиданно пришла беда! Как торопится обрушиться на нас несчастье! Коршун падает камнем, вонзает когти в жаворонка. Такова судьба. И вот ты слегла, моя дорогая малютка. Приезжаем в Лондон, думаем: вот большой город с прекрасными монументами, вот Саутворк, великолепное предместье. Поселяемся. А оказывается, что это ужасная страна. Что прикажете делать? Я рад, что уезжаю. Сегодня – тридцатое апреля. Я всегда опасался апреля; в этом коварном месяце только два счастливых дня: пятое и двадцать седьмое, а несчастливых четыре: десятое, двадцатое, двадцать девятое и тридцатое. Это неопровержимо доказано вычислениями Кардано. Хоть бы поскорее миновал нынешний день. Хорошо, что мы уже отчалили. На рассвете будем в Гревсенде, а завтра вечером в Роттердаме. Ну что же, черт возьми, опять примемся за прежнюю жизнь, опять будем тащить на себе наш возок, не правда ли, Гомо?</p><p class="p1">В знак согласия волк тихо стукнул о палубу хвостом.</p><p class="p1">Урсус продолжал:</p><p class="p1">– Если б можно было так же легко расстаться со своим горем, как расстаешься с городом! Гомо, мы могли бы быть еще счастливы. Но увы, нам всегда будет кого-то не хватать. Тень умершего всегда остается с тем, кто его пережил. Ты знаешь, о ком я говорю, Гомо. Нас было четверо, теперь нас только трое. Жизнь – лишь длинная цепь утрат любимых нами существ. Идешь и оставляешь за собою вереницу скорбей. Рок оглушает человека, осыпая его градом невыносимых страданий. Как после этого удивляться, что старики вечно твердят одно и то же? Они глупеют от отчаяния. Мой славный Гомо, все еще дует попутный ветер. Уже совсем не видать купола святого Павла. Мы сейчас пройдем мимо Гринича. Это значит – отхватили добрых шесть миль. Ах, меня всегда воротит от этих мерзких столиц, кишащих священниками, судьями и чернью. Я предпочитаю видеть, как колышутся листья в лесу. А лоб у нее все еще влажный! Не нравятся мне эти вздувшиеся выше локтя лиловые вены. Это у нее от жара. Ах, все это меня убивает! Спи, дитя мое. О да, она спит.</p><p class="p1">В эту минуту послышался неизъяснимо нежный голос, казалось, звучавший издалека, доносившийся одновременно я с высоты небес и из глубин земли, чудесный и страдальческий голос Деи.</p><p class="p1">Все, что Гуинплен до сих пор испытал, сразу было позабыто. Говорил его ангел. Ему чудилось, что он слышит слова, произносимые где-то за пределами жизни, как бы в блаженном забытьи. Голос говорил:</p><p class="p1">– Он хорошо сделал, что ушел. Этот мир не для него. Только и мне нужно уйти вслед за ним. Отец, я не больна, я слышала все, что вы говорили; мне хорошо, я чувствую себя прекрасно; я спала. Отец, я буду счастлива.</p><p class="p1">– Дитя мое, – с тоскою спросил Урсус, – что ты хочешь этим сказать?</p><p class="p1">– Отец, не огорчайтесь, – ответила Дея.</p><p class="p1">Наступила пауза; очевидно, она перевела дух, затем до Гуинплена донеслись медленно произнесенные слова:</p><p class="p1">– Гуинплена больше нет. Теперь я действительно слепа. Раньше я не знала ночи. Ночь – это разлука.</p><p class="p1">Голос ее опять прервался, потом снова зазвенел:</p><p class="p1">– Я всегда боялась, что он улетит; я знала, что он спустился ко мне с неба. И вот он исчез. Этого и нужно было ожидать. Душа улетает, как птица. Но гнездо души находится в глубине, там, где скрыт великий магнит, притягивающий к себе все; я хорошо знаю, где можно найти Гуинплена. Поверьте, я найду к нему дорогу. Отец, он там. Позднее и вы будете с нами. И Гомо тоже.</p><p class="p1">Услышав свое имя, Гомо слегка ударил хвостом по палубе.</p><p class="p1">– Отец, – продолжал голос, – вы же понимаете – все кончено с тех пор, как Гуинплена нет. Если бы я и хотела, я не могла бы здесь остаться: без воздуха нечем дышать. Не надо требовать невозможного. Когда со мною был Гуинплен, я жила – это было так просто. Теперь Гуинплена больше нет, и я умираю. Либо он должен вернуться, либо я должна умереть. Но так как возвратиться он не может, я ухожу сама. Так хорошо умереть! Это совсем не страшно. Отец, то, что гаснет здесь, вновь зажигается там. Когда живешь, постоянно чувствуешь, как от боли сжимается сердце. Нельзя же страдать вечно. И вот люди уходят, как вы говорите, к звездам, там сочетаются браком, не расстаются никогда и любят, любят друг друга; это и есть царство небесное.</p><p class="p1">– Ну, не волнуйся так, – сказал Урсус.</p><p class="p1">Голос продолжал:</p><p class="p1">– В прошлом году, весной, мы были вместе, были счастливы, не то что теперь. Я уж не помню где, в каком-то маленьком городке; там шелестели деревья, и я слышала пение малиновок. Потом мы приехали в Лондон, и все переменилось. Я никого не упрекаю. Перебираясь на новое место, никто не знает, что там случится. Помните, отец, однажды вечером в большой ложе сидела женщина, которую вы называли герцогиней? Мне стало грустно. Я думаю, было бы лучше избегать больших городов. Но Гуинплен поступил хорошо. Теперь моя очередь. Вы сами мне рассказывали, что я была совсем малюткой, когда моя мать умерла, что я ночью лежала на земле и снег падал на меня, а Гуинплен тогда тоже был ребенком и тоже совершенно одиноким; он подобрал меня, и лишь потому я осталась в живых; не удивляйтесь же, если я сегодня должна покинуть вас и уйти в могилу, чтобы узнать, там ли Гуинплен. Ведь единственное, что у нас есть при жизни, – это сердце, а когда жизнь кончится, – душа. Отец, вы хорошо понимаете, о чем я говорю. Что это колышется? Мне кажется, будто наш дом движется. Однако я не слышу стука колес.</p><p class="p1">После некоторого перерыва голос Деи продолжал:</p><p class="p1">– Я немного путаю вчерашний и нынешний день. Я не жалуюсь. Я не знаю, что произошло, но словно чувствую какую-то перемену.</p><p class="p1">Слова эти были произнесены с кроткой, но безутешной грустью, и до Гуинплена донесся слабый вздох.</p><p class="p1">– Я должна уйти, если только он не вернется.</p><p class="p1">Урсус угрюмо буркнул вполголоса:</p><p class="p1">– Не верю я в выходцев с того света.</p><p class="p1">И продолжал:</p><p class="p1">– Это судно. Ты спрашиваешь, почему движется дом? Потому что мы плывем на шхуне. Успокойся. Тебе вредно много говорить. Если ты хоть немного любишь меня, дочурка, не волнуйся, не доводи себя до горячки. Я стар и не перенесу твоей болезни. Пожалей меня, не хворай.</p><p class="p1">Снова зазвучал голос Деи:</p><p class="p1">– Зачем искать на земле то, что можно найти только на небе?</p><p class="p1">Урсус возразил, пытаясь придать своему голосу повелительный тон:</p><p class="p1">– Успокойся! Иногда ты совсем ничего не соображаешь. Ты должна лежать смирно. В конце концов, тебе незачем знать, что такое полая вена. Если ты успокоишься, я тоже буду спокоен. Дитя мое, подумай немного и обо мне. Он тебя подобрал, но я тебя приютил. Ты сама себе вредишь. Это плохо. Ты должна успокоиться и заснуть. Все будет хорошо. Даю тебе честное слово, все будет хорошо. Погода отличная. Как будто нарочно установилась для нас. Завтра мы будем в Роттердаме, это город в Голландии, у самого устья Мааса.</p><p class="p1">– Отец, – произнес голос, – когда с детства живешь неразлучно друг с другом, нельзя расставаться, лучше умереть, так как другого выхода нет. Я очень люблю вас, но чувствую, что я уже не с вами, хотя еще и не с ним.</p><p class="p1">– Ну, попробуй опять заснуть, – уговаривал Урсус.</p><p class="p1">– О, мне еще предстоит спать долгим, долгим сном.</p><p class="p1">Голосом, дрожащим от волнения, Урсус возразил:</p><p class="p1">– Говорю тебе, мы едем в Голландию, в город Роттердам.</p><p class="p1">– Отец, – продолжал голос, – я вовсе не больна; если это вас тревожит, вы можете не волноваться, лихорадки у меня нет, мне только немного жарко, вот и все.</p><p class="p1">Урсус пробормотал:</p><p class="p1">– У самого устья Мааса.</p><p class="p1">– Мне хорошо, отец, но я чувствую, что умираю.</p><p class="p1">– Как тебе не стыдно говорить такую чушь! – проворчал Урсус.</p><p class="p1">И прибавил:</p><p class="p1">– Господи, лишь бы только что-нибудь ее не взволновало.</p><p class="p1">Наступило молчание.</p><p class="p1">Вдруг Урсус вскрикнул:</p><p class="p1">– Что ты делаешь? Зачем ты встаешь? Умоляю тебя, лежи!</p><p class="p1">Гуинплен вздрогнул и выглянул из-за повозки.</p></span><span id="id191"><div class="title6">
<p class="p">3. Рай, вновь обретенный на земле</p>
</div><p class="p1">Он увидал Дею. Она стояла на тюфяке, выпрямившись во весь рост. На ней было длинное белое платье, наглухо застегнутое, позволявшее видеть только верхнюю часть плеч и нежную шею. Рукава спускались ниже локтей, складки платья скрывали ее ступни. На кистях рук выступала сеть голубых жилок, вздувшихся от лихорадки. Молодая девушка не шаталась, но вся дрожала и трепетала, как тростник. Фонарь освещал ее снизу. Лицо ее было невыразимо прекрасно. Распущенные волосы ниспадали на плечи. Ни одна слезинка не скатилась по ее щекам. Но глаза ее горели мрачным огнем. Она была бледна той бледностью, которая является как бы отражением божественной жизни на человеческом лице. Ее тонкий, хрупкий стан точно слился с ее одеждой. Вся она колебалась, словно пламя на ветру. В то же время чувствовалось, что она уже становится тенью. Широко раскрытые глаза сверкали ярким блеском. Она казалась бесплотным призраком, душой, воспрянувшей в лучах зари.</p><p class="p1">Урсус, стоявший к Гуинплену спиною, в испуге всплеснул руками:</p><p class="p1">– Дочурка моя! Ах, господи, у нее начинается бред. Вот чего я так боялся. Малейшее потрясение может ее убить или свести с ума. Смерть или безумие. Какой ужас! Что делать, боже мой? Ложись, доченька!</p><p class="p1">Но Дея снова заговорила. Ее голос был еле слышен, как будто некое облако уже отделяло ее от земли.</p><p class="p1">– Отец, вы ошибаетесь. Это не бред. Я прекрасно понимаю все, что вы говорите. Вы говорите, что собралось много народу, что публика ждет и что мне надо сегодня вечером играть; я согласна, видите, я в полном сознании, но я не знаю, как это сделать; ведь я умерла, и Гуинплен умер. Но все равно, я иду. Я готова играть. Вот я, но Гуинплена нет.</p><p class="p1">– Детка моя, – повторил Урсус, – послушайся меня. Ляг опять в постель.</p><p class="p1">– Его больше нет! Его больше нет. О, как темно!</p><p class="p1">– Темно, – пробормотал Урсус. – Она впервые в жизни произносит это слово.</p><p class="p1">Гуинплен бесшумно проскользнул в возок, снял с гвоздя свой костюм фигляра и нагрудник, надел их и вышел на палубу, скрытый от взоров балаганом, снастями и мачтой.</p><p class="p1">Дея продолжала что-то лепетать, едва шевеля губами; понемногу ее лепет перешел в мелодию. Она стала напевать, иногда умолкая и забываясь в бреду, таинственный призыв, с которым столько раз обращалась к Гуинплену в «Побежденном хаосе». Ее пение, звучал о неясно и было не громче жужжанья пчелы:</p><div class="poem">
<div class="stanza">
<p class="v">Noche, quita te de alli</p>
<p class="v">La alba canta…</p>
</div>
</div><p class="p1">Она перебила сама себя:</p><p class="p1">– Нет, это неправда, я не умерла. Что это я говорю? Увы! Я жива, а он умер. Я внизу, а он наверху. Он ушел, а я осталась. Я не слышу ни его голоса, ни его шагов. Бог дал нам на краткий миг рай на земле, а потом отнял его. Гуинплен! Все кончено. Я никогда больше не коснусь его рукой. Никогда. Его голос! Я больше не услышу его голоса.</p><p class="p1">И она запела:</p><div class="poem">
<div class="stanza">
<p class="v">Es rnenester a cielos ir…</p>
<p class="v">…Dexa, quiero,</p>
<p class="v">A tu negro</p>
<p class="v">Caparazón.</p>
</div>
</div><p class="p1">Она простерла руку, словно ища опоры в пространстве.</p><p class="p1">Гуинплен, выступив из темноты и очутившись рядом с остолбеневшим от ужаса Урсусом, опустился перед нею на колени.</p><p class="p1">– Никогда! – говорила Дея. – Никогда я уже не услышу его!</p><p class="p1">И опять запела в полузабытьи:</p><div class="poem">
<div class="stanza">
<p class="v">Dexa, quiero</p>
<p class="v">А tu negro</p>
<p class="v">Caparazón!</p>
</div>
</div><p class="p1">И тогда она услыхала голос любимого, отвечавший ей:</p><div class="poem">
<div class="stanza">
<p class="v">О ven! ama!</p>
<p class="v">Eres alma,</p>
<p class="v">Soy corazón.</p>
</div>
</div><p class="p1">В ту же минуту Дея почувствовала под своей рукой голову Гуинплена. Из груди ее вырвался крик, звучавший невыразимой нежностью:</p><p class="p1">– Гуинплен!</p><p class="p1">Ее бледное лицо озарилось как бы звездным светом, и она пошатнулась.</p><p class="p1">Гуинплен подхватил ее на руки.</p><p class="p1">– Жив! – вскрикнул Урсус.</p><p class="p1">Дея повторила:</p><p class="p1">– Гуинплен!</p><p class="p1">Прижавшись головой к щеке Гуинплена, она прошептала:</p><p class="p1">– Ты опустился обратно с неба. Благодарю тебя.</p><p class="p1">Сидя на коленях у Гуинплена, сжимавшего ее в объятиях, она обратила к нему свое кроткое лицо и устремила на него слепые, но лучезарные глаза, словно могла видеть его.</p><p class="p1">– Это ты! – промолвила она.</p><p class="p1">Гуинплен осыпал поцелуями ее платье. Бывают речи, в которых слова, стоны и рыдания представляют неразрывное целое. В них слиты воедино и выражаются одновременно и восторг и скорбь. Они не имеют никакого смысла и вместе с тем говорят все.</p><p class="p1">– Да, я! Это я! Я, Гуинплен! А ты – моя душа, слышишь? Это я, дитя мое, моя супруга, моя звезда, мое дыхание! Ты – моя вечность! Это я! Я здесь, я держу тебя в своих объятиях. Я жив! Я твой! Ах, подумать только, что я хотел покончить с собой! Еще одно мгновенье и, не будь Гомо… Я расскажу тебе об этом после. Как близко соприкасается радость с отчаянием! Будем жить, Дея! Дея, прости меня! Да, я твой навсегда! Ты права: дотронься до моего лба, убедись, что это я. Если бы ты только знала! Но теперь уже ничто не в силах нас разлучить. Я вышел из преисподней и возношусь на небо. Ты говоришь, что я спустился с неба, – нет, я подымаюсь туда. Вот я опять с тобою. Навеки, слышишь ли? Вместе! Мы вместе! Кто бы мог подумать? Мы снова нашли друг друга. Все дурное кончилось. Впереди нас ждет блаженство. Мы опять заживем счастливо и запрем двери нашего рая так плотно, что никакому горю уже не удастся к нам проникнуть. Я расскажу тебе все. Ты удивишься. Судно отошло от берега. Никто не может теперь его задержать. Мы в пути, и мы свободны. Мы направляемся в Голландию, там мы обвенчаемся; я не боюсь, я добуду средства к жизни, – кто может помешать мне в этом? Нам ничего больше не угрожает. Я обожаю тебя.</p><p class="p1">– Умерь-ка свой пыл! – буркнул Урсус.</p><p class="p1">Дея, замирая от блаженства, трепетной рукой провела по лицу Гуинплена. Он услышал, как она прошептала:</p><p class="p1">– Такое лицо должно быть у Бога.</p><p class="p1">Затем дотронулась до его одежды.</p><p class="p1">– Нагрудник, – сказала она. – Его куртка. Ничего не изменилось. Все как прежде.</p><p class="p1">Урсус, ошеломленный, вне себя от радости, смеясь и обливаясь слезами, смотрел на них и разговаривал сам с собой:</p><p class="p1">– Ничего не понимаю. Я круглый идиот. Ведь я же сам видел, как его несли хоронить! Я плачу и смеюсь. Вот и все, на что я способен. Я так же глуп, как если бы сам был влюблен. Да я и на самом деле влюблен. Влюблен в них обоих. Ах, я старый дурак! Не слишком ли много для нее волнений? Как раз то, чего я опасался. Нет, как раз то, чего я желал. Гуинплен, побереги ее! Впрочем, пусть целуются. Мне-то что за дело? Я лишь случайный свидетель. Какое странное чувство! Я – паразит, пользующийся чужим счастьем. Я тут ни при чем, а между тем мне кажется, что и я приложил к этому руку. Благословляю вас, дети мои!</p><p class="p1">В то время как Урсус произносил свой монолог, Гуинплен говорил Дее:</p><p class="p1">– Ты слишком прекрасна, Дея. Не знаю, где был у меня рассудок в эти дни. Кроме тебя, на земле для меня нет никого. Я снова вижу тебя и глазам своим не верю. На этой шхуне! Но объясни, что с вами произошло? Ах, до чего вас довели! Где же «Зеленый ящик»? Вас ограбили, вас изгнали! Какая низость! О, я отомщу за вас! Отомщу за тебя, Дея! Им придется иметь дело со мной. Ведь я пэр Англии.</p><p class="p1">Урсус, которого последние слова точно обухом ударили по голове, отшатнулся и внимательно посмотрел на Гуинплена.</p><p class="p1">– Он не умер – это ясно, но не рехнулся ли он?</p><p class="p1">И недоверчиво насторожился.</p><p class="p1">Гуинплен продолжал:</p><p class="p1">– Будь спокойна, Дея. Я подам жалобу в палату лордов.</p><p class="p1">Урсус еще раз пристально взглянул на него и постучал пальцем себя по лбу.</p><p class="p1">Потом, очевидно приняв какое-то решение, пробормотал:</p><p class="p1">– Все равно. Это дела не меняет. Будь сумасшедшим, если тебе так нравится, мой Гуинплен. Это – право каждого из нас. Во всяком случае, я счастлив. Но что означает все это?</p><p class="p1">Судно легко и быстро двигалось вперед; ночь становилась все темнее и темнее; туман, наплывавший с океана, благодаря безветрию, поднимался вверх и заволакивал небо, сгущаясь в зените; можно было различить только несколько крупных звезд, но вскоре они исчезли одна за другой, и над головами людей, находившихся на палубе, простерлась сплошная черная пелена спокойного бескрайнего неба. Река становилась все шире, берега ее казались темными узкими полосками, почти сливавшимися с окружающим мраком. Ночь дышала глубоким покоем. Гуинплен присел, держа в объятиях Дею. Они говорили, обменивались восклицаниями, лепетали, шептались. Бессвязный, взволнованный диалог. Как описать тебя, о радость!</p><p class="p1">– Жизнь моя!</p><p class="p1">– Небо мое!</p><p class="p1">– Любовь моя!</p><p class="p1">– Счастье мое!</p><p class="p1">– Гуинплен!</p><p class="p1">– Дея! Я пьян тобою! Дай мне поцеловать твои ноги!</p><p class="p1">– Так это ты?</p><p class="p1">– Мне так много надо сказать. Не знаю, с чего начать.</p><p class="p1">– Поцелуй меня!</p><p class="p1">– Жена моя!</p><p class="p1">– Не говори мне, Гуинплен, что я хороша собой. Это ты красавец.</p><p class="p1">– Я опять нашел тебя, я прижимаю тебя к сердцу. Да, ты моя. Я не грежу наяву. Это ты. Возможно ли? Да. Я снова оживаю. Если бы ты знала, что мне пришлось испытать, Дея!</p><p class="p1">– Гуинплен!</p><p class="p1">– Люблю тебя!</p><p class="p1">А Урсус шептал про себя:</p><p class="p1">– Я радуюсь, как дедушка.</p><p class="p1">Гомо вылез из-под возка и, неслышно ступая, переходил от одного к другому; не притязая ни на чье внимание, он лизал наудачу все, что попадалось, – грубые сапоги Урсуса, куртку Гуинплена, платье Деи, тюфяк. Это был его волчий способ изъявлять радость.</p><p class="p1">Миновали Четэм и устье Медуэя. Приближались к морю. Черная гладь реки была так спокойна, что шхуна спускалась вниз по течению Темзы без малейшего труда; незачем было прибегать к парусам, и матросов не вызывали на палубу. Судохозяин, по-прежнему один у руля, управлял шхуной. Кроме него на корме не было ни души; на носу фонарь освещал горсточку счастливых людей, неожиданно встретившихся снова и в пучине скорби внезапно обретших блаженство.</p></span></span></span></span>
