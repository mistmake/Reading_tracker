<p class="p">VI. Три мужских сердца, созданные различно</p>
</div><p class="p1">Феб, однако, не умер. Такие люди живучи. Мэтр Филипп Лёлье сказал Эсмеральде, что он умирает, по ошибке или издеваясь. Архидьякон сказал, что он умер, потому что хотя ничего не знал, но надеялся, что это так, желал этого, уверял в том самого себя. Да и не мог он сообщить женщине, которую любил, доброй вести о своем сопернике. Каждый мужчина на его месте поступил бы так же.</p><p class="p1">Рана Феба была хотя и опасна, но не настолько, как надеялся архидьякон. Аптекарь, к которому солдаты принесли раненого, с неделю опасался за его жизнь и объяснял ему это по-латыни. Но молодость взяла свое, и природа спасла больного, несмотря на предсказание лекаря. Когда он еще лежал у аптекаря, он должен был отвечать на допрос Филиппа Лёлье и следователей, что ему вовсе не хотелось. Поэтому, как только он почувствовал себя лучше, он ушел, оставив свои золотые шпоры в вознаграждение аптекарю. Это, впрочем, не помешало следствию. В то время не интересовались правильностью процесса: лишь бы обвиняемый был повешен, вот все, что было нужно. Судьи имели достаточно улик против Эсмеральды. Они считали Феба убитым, и этим все было сказано.</p><p class="p1">Феб, со своей стороны, вовсе не думал куда-либо прятаться, а просто отправился в свой полк, который стоял в Кё-ан-Бри, недалеко от Парижа.</p><p class="p1">Ему не улыбалось лично участвовать в этом процессе. Он чувствовал, что будет смешон. Он сам не знал хорошенько, что думать об этой истории. Неверующий, но полный предрассудков, как всякий солдат, который прежде всего солдат, и только, он не особенно был спокоен относительно козы и обстоятельств встречи с Эсмеральдой. Ее признание в любви, ее принадлежность к цыганам и мрачный монах смущали его. Он во всем этом видел больше колдовства, чем любви. Она была колдуньей, может быть, даже самим чертом; а может быть, эта история была комедией, или, как говорили тогда, мистерией, где он играл невыгодную роль побитого и осмеянного. Капитан чувствовал стыд, так превосходно выраженный Лафонтеном: «Стыдился, как лисица, пойманная курицей».</p><p class="p1">Он, впрочем, надеялся, что все это не разгласится, что имя его не будет произнесено и что молва не пойдет дальше зала Турнель. Он не ошибался; тогда не было судебных газет, и так как в то время не проходило дня, чтобы не сварили фальшивомонетчика, не повесили ведьмы, не сожгли еретика, то все так привыкли видеть расправу средневековой Фемиды, с засученными рукавами и голыми руками, что никто на это не обращал внимания. Люди из хорошего общества даже и не знали имен несчастных казнимых, и только чернь наслаждалась этим грубым зрелищем. Казнь была обычным явлением уличной жизни, подобно жаровне блинопека или бойне мясника. Палач был тот же мясник, только поважнее.</p><p class="p1">Феб скоро перестал беспокоиться насчет колдуньи Эсмеральды, или Симиляр, как он говорил. Не все ли равно, кто нанес ему удар ножом – цыганка или монах? Исход процесса тоже не тревожил его. Но как только его сердце опустело, в него вернулся образ Флёр де Лис. Сердце капитана Феба, как физика того времени, не признавало пустоты.</p><p class="p1">К тому же Кё-ан-Бри было очень скучное место. Это была маленькая деревня, в которой можно было увидеть только кузнецов, коровниц с грубыми руками и тянувшиеся вдоль улицы полуразрушенные хижины.</p><p class="p1">Флёр де Лис была его предпоследняя страсть. Это была хорошенькая девушка с заманчивым приданым, так что, выздоровев и надеясь, что история с цыганкой после двух месяцев уже забыта, влюбленный кавалер в одно прекрасное утро подъехал, гарцуя, к дому Гондлорье.</p><p class="p1">Он почти не заметил довольно большой толпы, собравшейся перед папертью собора Богоматери. Он предположил, что это какая-нибудь праздничная майская процессия, привязал лошадь и весело вошел к своей прекрасной невесте.</p><p class="p1">Она была одна с матерью.</p><p class="p1">Сердце Флёр де Лис не могло забыть сцены с цыганкой, ее козы с проклятой азбукой и долгого отсутствия Феба. Но когда она увидела своего капитана, красивого, расфранченного, страстного, она вспыхнула от радости. Благородная девица сама была прелестнее, чем когда-либо. Ее чудные белокурые волосы были заплетены в косы, платье было того небесного цвета, который так идет белокурым, – этому ее научила Коломба, – глаза были подернуты любовной истомой, от чего сделались еще красивее.</p><p class="p1">Феб, долго не видавший в Кё-ан-Бри красивых женщин, был в восторге от Флёр де Лис и сразу стал так мил и галантен, что мир был заключен. Даже у госпожи Гондлорье, все так же величественно восседавшей в своем кресле, не хватило духу его упрекать. Упреки же Флёр де Лис выразились в нежном воркованье.</p><p class="p1">Девушка сидела у окна, вышивая свой вечный грот Нептуна. Капитан стоял за ее стулом и слушал ее нежные выговоры:</p><p class="p1">– Где это вы, злой, пропадали два месяца?</p><p class="p1">– Ей-богу, – ответил несколько сконфуженный Феб, – вы так прекрасны, что сам архиепископ размечтается, если вас увидит.</p><p class="p1">Она только улыбнулась:</p><p class="p1">– Хорошо, хорошо. Оставьте мою красоту в покое и отвечайте на вопрос.</p><p class="p1">– Я, дорогая кузина, был призван на службу.</p><p class="p1">– Куда это? Отчего не пришли проститься?</p><p class="p1">– В Кё-ан-Бри.</p><p class="p1">Феб был рад, что, отвечая на первый вопрос, мог обойти второй.</p><p class="p1">– Но ведь это совсем близко. Отчего же вы ни разу не навестили меня?</p><p class="p1">Феб окончательно смутился:</p><p class="p1">– Да знаете… служба… Потом, прелестная кузина, я был болен.</p><p class="p1">– Болен! – воскликнула она с испугом.</p><p class="p1">– Да… ранен…</p><p class="p1">– Ранены?</p><p class="p1">Бедная девушка совсем взволновалась.</p><p class="p1">– Не пугайтесь, – небрежно сказал Феб. – Пустяки… ссора… удар шпагой. Что вам до этого?</p><p class="p1">– Что мне до этого? – воскликнула Флёр де Лис, поднимая к нему свои полные слез глаза. – Вы не думаете того, что говорите. Как это случилось? Я хочу знать все.</p><p class="p1">– Ну, дорогая, у меня была неприятность с Маге Фэди. Вы знаете его? Лейтенант из Сен-Жермен-ан-Лэ. Мы немного поцарапали друг другу кожу. Вот и все.</p><p class="p1">Лживый капитан знал, что дело чести всегда возвышает человека в глазах женщины. Действительно, Флёр де Лис смотрела на него с выражением страха и восторга. Она все еще не вполне была успокоена.</p><p class="p1">– Совсем ли вы выздоровели, мой Феб? Я не знаю вашего Маге Фэди, но он дурной человек. Из-за чего же вы поссорились?</p><p class="p1">Тут уже Феб, воображение которого не отличалось изобретательностью, не знал, как выпутаться.</p><p class="p1">– Право, я не знаю… Так… лошадь… слова! Прелестная кузина, – воскликнул он, чтобы переменить разговор, – что это за шум на площади?</p><p class="p1">Он подошел к окну.</p><p class="p1">– Посмотрите, прелестная кузина, сколько народу!</p><p class="p1">– Не знаю, – сказала Флёр де Лис. – Кажется, какая-то ведьма должна принести покаяние, прежде чем ее повесят.</p><p class="p1">Капитан был так уверен, что дело Эсмеральды было давно покончено, что не смутился словами Флёр де Лис, но все-таки спросил:</p><p class="p1">– Как зовут эту колдунью?</p><p class="p1">– Не знаю, – отвечала она.</p><p class="p1">– А что она сделала?</p><p class="p1">Она пожала белыми плечиками:</p><p class="p1">– Не знаю.</p><p class="p1">– Боже мой, – сказала госпожа де Гондлорье, – теперь столько колдунов, что их жгут, не разузнав даже их имени. Где же их всех узнать? Но можете быть покойны, Господь ведет им счет.</p><p class="p1">Почтенная дама тоже подошла к окну.</p><p class="p1">– Вы правы, Феб, – сказала она, – какая масса народу! Господи, даже на крышах люди. Знаете, Феб, это напоминает мне мою молодость. Когда въезжал король Карл Шестой, было тоже много народу. В каком году это было, я уж не припомню. Вам представляется то, что я говорю, очень старым, а меня переносит к молодости. Тогда народ был лучше, красивее. Толпа стояла стеной до самых Сент-Антуанских ворот. Королева сидела за королем на его лошади, все принцы и вельможи также везли своих жен. Я помню, все смеялись, потому что ехали рядом Амоньон де Гарпанд, крошечного роста, и рыцарь Матефелон, гигантского роста, – тот, что побил стольких англичан. Очень было хорошо. Перед всеми рыцарями несли их знамена, которые так и блестели. Тут были и знамена и хоругви. Где все запомнить! Сир де Калан – с рыцарским знаменем; Жан де Шатоморан – с хоругвью; сир де Куси – с хоругвью, да такой богатой, какой не было ни у кого, кроме герцога Бурбонского… Как грустно думать, что все это было и прошло!</p><p class="p1">Влюбленные не слушали почтенную особу. Феб возвратился к стулу своей невесты и облокотился на его спинку, причем взгляд повесы проникал во все отверстия воротничка Флёр де Лис. Этот воротник так кстати раскрывался, показывая столь соблазнительные вещи, и давал возможность догадываться о других, еще более соблазнительных, что восхищенный Феб думал: «Можно ли любить кого-нибудь, кроме блондинки?»</p><p class="p1">Оба молчали. Молодая девушка иногда подымала на него счастливые и ласковые глаза. Волосы их смешивались в весеннем луче солнца.</p><p class="p1">– Феб, – вдруг сказала шепотом Флёр де Лис, – мы через три месяца будем мужем и женой. Поклянитесь мне, что вы никогда не любили другой женщины.</p><p class="p1">– Клянусь вам, мой ангел!.. – ответил Феб, и страстный взгляд подтвердил искренность его слов. Он в эту минуту, может быть, сам верил тому, что он говорил.</p><p class="p1">Добрая мать, видя согласие между молодыми людьми, вышла из комнаты за каким-то делом. Феб это заметил, и странные мысли вспыхнули в мозгу предприимчивого капитана. Флёр де Лис его любила, он был ее женихом, они были наедине; его прежняя любовь к ней вернулась если не с прежней свежестью, то с еще большею силою, – так разве грех взять свое, хотя бы и раньше времени?.. Не знаю, таковы ли в точности были его мысли обо всем этом, но Флёр де Лис была испугана его взглядом. Она обернулась и увидела, что матери нет в комнате.</p><p class="p1">– Боже мой, – сказала она, – как мне жарко!</p><p class="p1">– Действительно, – отвечал Феб, – скоро полдень. Солнце греет. Надо закрыть занавес.</p><p class="p1">– Нет, нет, – воскликнула бедная девушка, – напротив! Мне нужен свежий воздух!</p><p class="p1">Как лань, чувствующая приближение охотника, она бросилась к двери, открыла ее и выбежала на балкон.</p><p class="p1">Феб, недовольный, последовал за нею.</p><p class="p1">Площадь перед собором Богоматери, на которую, как известно, выходил балкон, представляла зрелище, снова испугавшее боязливую Флёр де Лис.</p><p class="p1">И площадь, и выходившие на нее улицы были запружены народом. Низенькая каменная ограда, окружавшая паперть, не сдержала бы толпы, если б около нее не стоял ряд вооруженных солдат. Благодаря этой живой стене пик и аркебуз площадка около паперти была пуста. Вход охраняла монастырская стража с алебардами. Широкие врата храма были закрыты в противоположность окнам выходящих на площадь домов, открытым настежь и наполненным головами зрителей, напоминавшими груды пушечных ядер в артиллерийском парке.</p><p class="p1">Толпа казалась грязной и серой. Ожидаемое зрелище было из тех, которые привлекают внимание самого низкого слоя народа. Отвратительный шум стоял над этим сборищем желтых платков и растрепанных волос. Смеха больше было, чем разговоров, женщин больше, чем мужчин.</p><p class="p1">Иногда резкий возглас выделялся средь общего шума.</p><p class="p1">– Эй, Майо Балифр! Ее тут и повесят?</p><p class="p1">– Дура! Здесь она будет каяться в одной рубашке! Здесь Господь будет каркать над ней по-латыни. Это всегда здесь бывает в полдень. Хочешь видеть виселицу – ступай на Гревскую площадь.</p><p class="p1">– Пойду после.</p><p class="p1">………………………………………………………………………………………………………….</p><p class="p1">– Скажите, Буканбри: правда ли, что она отказалась от священника?</p><p class="p1">– Кажется, да, Бешень.</p><p class="p1">– Ишь ты, язычница!</p><p class="p1">………………………………………………………………………………………………………….</p><p class="p1">– Это, сударь, всегда так. Судья должен передать осужденного парижскому прево для казни. Если же преступник из духовных, то – представителю епископа.</p><p class="p1">– Благодарю вас.</p><p class="p1">………………………………………………………………………………………………………….</p><p class="p1">– Боже мой! – говорила Флёр де Лис. – Бедное создание!</p><p class="p1">Взгляд ее сделался грустным. Капитан, занятый больше всего ею, мял сзади ее пояс. Она обернулась с мольбой и улыбкой:</p><p class="p1">– Ради бога, оставьте меня, Феб! Если матушка вернется, она увидит вашу руку!</p><p class="p1">В эту минуту на часах собора Богоматери пробило двенадцать. Шепот удовлетворения прошел по толпе. Едва прозвучал последний удар, все головы двинулись, как волна от ветра, и раздался крик: «Вот она!»</p><p class="p1">Флёр де Лис закрыла глаза руками.</p><p class="p1">– Милая, – сказал Феб, – уйдемте отсюда.</p><p class="p1">– Нет, – ответила Флёр де Лис и, закрыв глаза от страха, вновь открыла их из любопытства.</p><p class="p1">С улицы Сен-Пьер-о-Беф выехала на площадь повозка, запряженная нормандской лошадью и окруженная всадниками в лиловых мундирах с белыми крестами. Пристава расчищали дорогу ударами булавы. Около повозки ехали члены суда, которых можно было узнать по черному одеянию и по неловкой посадке на лошадях.</p><p class="p1">Во главе их ехал Жак Шармолю.</p><p class="p1">В позорной повозке, рядом со священником, сидела девушка со связанными за спиной руками. Она была в одной рубашке, длинные черные волосы (тогда было принято срезать их только перед виселицей) падали на ее полуобнаженные грудь и плечи.</p><p class="p1">Сквозь эти волосы, блестящие как вороново крыло, виднелись узлы грубой серой веревки, которая сдирала нежную кожу шеи и вилась вокруг нее, как дождевой червяк вокруг цветка. Под веревкой блестела ладанка с зелеными бусами, которую, вероятно, оставили ей, потому что последнее желание умирающих принято исполнять. Глядевшим из окон видны были ее голые ноги, которые она стыдливо старалась спрятать. У ее ног лежала связанная козочка. Приговоренная зубами поддерживала спускавшуюся рубашку. Казалось, что в своем отчаянии бедняжка еще могла страдать от мысли, что толпа видит ее полунагой.</p><p class="p1">– Боже! – воскликнула Флёр де Лис. – Посмотрите, кузен, это та самая противная цыганка с козой!</p><p class="p1">Она обернулась к Фебу. Он смотрел на тележку и был очень бледен.</p><p class="p1">– Какая цыганка с козой? – пробормотал он.</p><p class="p1">– Как! – продолжала Флёр де Лис. – Разве вы не помните?</p><p class="p1">Феб перебил ее:</p><p class="p1">– Я не знаю, о чем вы говорите.</p><p class="p1">Он хотел вернуться в комнату. Но Флёр де Лис, в которой зашевелилось прежнее чувство ревности к цыганке, бросила на него взгляд, полный проницательности и недоверия. Она в эту минуту вспомнила доходившие до нее слухи, что в деле колдуньи замешан какой-то капитан.</p><p class="p1">– Что с вами? – сказала она Фебу. – Вид этой женщины как будто смутил вас?</p><p class="p1">Феб засмеялся притворным смехом:</p><p class="p1">– Меня? Нисколько. С какой стати!</p><p class="p1">– Тогда останьтесь здесь, – повелительно произнесла она. – Посмотрим до конца.</p><p class="p1">Несчастному капитану пришлось остаться. Его немного успокаивало, что приговоренная не поднимала глаз. Это действительно была Эсмеральда. На последней ступени презрения и несчастья она все еще была хороша. Ее большие черные глаза казались еще больше от худобы ее щек; ее бледный профиль был чист и прекрасен. Она походила на то, чем она была прежде, как мадонна Мазаччо походит на мадонну Рафаэля: более слабая, нежная, хрупкая.</p><p class="p1">Впрочем, все в ней, кроме стыдливости, казалось, притупилось под гнетом отчаяния. Тело ее поддавалось толчкам тележки, как мертвое. Ее взгляд казался безумным. На ресницах повисла слеза, казавшаяся замерзшей.</p><p class="p1">Мрачная повозка проезжала среди радостных криков толпы. Мы должны, однако, со справедливостью историка сказать, что при виде красоты осужденной во многие грубые сердца закралась жалость.</p><p class="p1">Повозка въехала на площадку перед собором.</p><p class="p1">Перед средними вратами она остановилась. Сопровождавшие ее выстроились в два ряда по бокам. Толпа смолкла. Среди этого торжественного молчания врата отворились как бы сами собой и петли их заскрипели. Тогда открылась мрачная внутренность храма, обтянутая черным, освещенная несколькими свечами на алтаре, открылась, как мрачная пещера, среди блеска освещенной дневным светом площади. В самой глубине можно было различить громадный серебряный крест на черной ниспадающей завесе. Церковь была пуста. Кое-где только виднелись головы священников на хорах, и в то время как двери открылись, из церкви донеслось громкое, мрачное, однообразное пение, которое как бы бросало в лицо осужденной отрывки заунывных псалмов:</p><p class="p1">…Non timebo millia populi, circumdantis me: Exsurge, Domine; salvum me fac, Deus.</p><p class="p1">…Salvum me fac, Deus, quoniam intraverunt aquae usque ad animam meam.</p><p class="p1">….Infixus sum in limo profundi; et non est substantia<a href="ch2.xhtml#id136" class="a">[121]</a>.</p><p class="p1">В то же время другой голос, отдельно от хора, меланхолично пел на ступенях алтаря:</p><p class="p1">«Qui verbum meum audit; et credit ei qui misit me, habet vitam aeternam et in juducium non venit; sed transit a morte in vitam»<a href="ch2.xhtml#id135" class="a">[122]</a>.</p><p class="p1">Это пение, исполнявшееся невидимыми среди мрака храма старцами, было панихидой над прекрасным созданием, полным молодости и жизни, ласкаемым теплым весенним воздухом и ярким солнцем.</p><p class="p1">Народ внимал с благоговением.</p><p class="p1">Мысль и взгляд несчастной устремились в мрачную внутренность храма. Ее губы зашевелились как бы в молитве, и когда палач приблизился к ней, чтобы помочь ей сойти, он услыхал тихо произнесенное ею слово: «Феб».</p><p class="p1">Ей развязали руки, сняли с тележки, освободили и козочку, которая запрыгала от радости. Потом осужденную заставили пройти босиком по мостовой до ступеней паперти. Веревка, надетая ей на шею, ползла за ней, точно змея.</p><p class="p1">Пение в церкви умолкло. Большой крест и ряд свечей зашевелились в тени. Послышались удары алебард о землю, и длинная процессия священников и дьяконов в ризах с пением псалмов двинулась к осужденной. Ее взгляд остановился на том, кто шел первым после несшего крест.</p><p class="p1">– О, – прошептала она, вздрагивая, – опять он… этот священник!</p><p class="p1">Это был действительно архидьякон. С одной стороны возле него шел регент, с другой – его помощник. Голова его была откинута, глаза открыты и неподвижны, он сильным голосом пел:</p><div class="poem">
<div class="stanza">
<p class="v">De ventre inferi clamavi, et exaudisti vocem meam.</p>
<p class="v">Et projecisti me in profundum in corde maris,</p>
<p class="v">et flumen circumdedit mes<a href="ch2.xhtml#id134" class="a">[123]</a>.</p>
</div>
</div><p class="p1">В ту минуту, когда он вышел на свет под стрельчатый портал, в серебряной ризе с черным крестом, он был так бледен, что его можно было принять за одного из мраморных епископов, сошедшего с могильного памятника, чтобы встретить у порога смерти ту, которая шла умирать.</p><p class="p1">Она – такая же бледная статуя – не заметила, как ей сунули в руку зажженную свечу из желтого воска. Она не слыхала прочтенного секретарем суда обвинительного акта. Когда ей велели сказать «аминь», она сказала «аминь». Она несколько оживилась, когда священник отделился от своих спутников и подошел к ней один.</p><p class="p1">Тогда кровь бросилась ей в голову, и в застывшей душе проснулось негодование.</p><p class="p1">Архидьякон медленно приблизился к ней. Даже в такую минуту его глаза скользнули по ее обнаженному телу с выражением ревности, страсти и вожделения. Он сказал громко:</p><p class="p1">– Девушка, просила ли ты прощения у Бога за свои грехи? – Он наклонился к ее уху и прошептал (зрители думали, что он выслушивает ее исповедь): – Если ты будешь моею, я еще могу спасти тебя.</p><p class="p1">Она пристально посмотрела на него:</p><p class="p1">– Отойди от меня, демон, или я обличу тебя перед всеми.</p><p class="p1">Он улыбнулся страшной улыбкой:</p><p class="p1">– Тебе не поверят. Ты лишь присоединишь к преступлению буйство. Отвечай, согласна ли ты?</p><p class="p1">– Что ты сделал с моим Фебом?</p><p class="p1">– Он умер, – сказал священник.</p><p class="p1">В эту минуту архидьякон машинально поднял голову и увидал в конце площади, на балконе дома Гондлорье, капитана рядом с Флёр де Лис. Он пошатнулся, провел по глазам рукой, пробормотал проклятие, все черты его исказились.</p><p class="p1">– Ну, так умри же и ты! – пробормотал он сквозь зубы. – Пусть никто не обладает тобой.</p><p class="p1">Подняв руку над цыганкой, он произнес погребальным тоном:</p><p class="p1">– I nune, anima anceps, et sit tibi deus misericorns<a href="ch2.xhtml#id133" class="a">[124]</a>.</p><p class="p1">Это была страшная формула, которой завершались подобные мрачные церемонии. Это был сигнал священника палачу.</p><p class="p1">Народ опустился на колени.</p><p class="p1">– Kyrie, eleison<a href="ch2.xhtml#id132" class="a">[125]</a>, – запели священники под сводами портала.</p><p class="p1">– Kyrie, eleison, – повторила толпа, и звук этот пробежал по ней, как всплески морской воды.</p><p class="p1">– Amen, – произнес архидьякон.</p><p class="p1">Он отвернулся от осужденной, голова его склонилась на грудь, руки скрестились, и он присоединился к процессии. Священники, крест и свечи – все исчезло в темных воротах собора. Голоса хора постепенно умолкали со словами песни отчаяния:</p><p class="p1">Omnes gurgites tui et fluctus tui super me transierunt!<a href="ch2.xhtml#id131" class="a">[126]</a></p><p class="p1">Удаляющиеся удары алебард стражников, медленно замиравшие среди колонн на хорах, звучали как удары часов, отбивающих последний час осужденной.</p><p class="p1">Двери собора остались открытыми, и была видна внутренность храма, пустая, мрачная, траурная, безмолвная.</p><p class="p1">Осужденная не трогалась с места. Пристав обратил на нее внимание мэтра Шармолю, который усердно рассматривал барельеф на вратах, представляющий, по мнению одних, жертвоприношение Авраама, а по мнению других – философский символ, где ангел изображал солнце, костер – огонь, а Авраам – работника.</p><p class="p1">Трудно было оторвать его от этого созерцания. Но наконец он махнул помощникам палача, которые приблизились к осужденной, чтобы снова связать ей руки.</p><p class="p1">Может быть, у несчастной в последнюю минуту, когда нужно было влезть в тележку, чтобы отправиться в последний путь, пробудилась жажда к жизни. Она подняла свои воспаленные глаза к небу, к солнцу, к серебристым облакам, потом опустила их на землю, на толпу, на дома.</p><p class="p1">Вдруг, пока ей вязали руки, она громко и радостно вскрикнула. Там, на углу площади, на балконе, она увидала его, своего друга, своего господина, свое второе «я», своего Феба!</p><p class="p1">Судья лгал! Священник лгал! Это был Феб, красивый, живой, нарядный, с пером на шляпе, со шпагой на бедре!</p><p class="p1">– Феб, – закричала она, – мой Феб!</p><p class="p1">И она хотела в восторге и любви протянуть к нему руки, но они уже были связаны.</p><p class="p1">Она увидала, что капитан нахмурил брови, что прекрасная молодая девушка, стоявшая с ним, обратила на него презрительный и гневный взгляд. Феб что-то сказал ей, и оба исчезли за дверью балкона, которая затворилась за ними.</p><p class="p1">– Феб! – закричала она в ужасе. – Неужели ты поверил этому?</p><p class="p1">Страшная мысль овладела ею. Она вспомнила, что была приговорена за убийство Феба де Шатопера.</p><p class="p1">Она все переносила до сих пор, но этот последний удар был слишком тяжел. Она упала без чувств на мостовую.</p><p class="p1">– Снесите ее в телегу, – сказал Шармолю. – Пора кончать!</p><p class="p1">Никто не заметил между статуями королей, стоявших прямо над порталом, странного зрителя, смотревшего на происходившее с такой неподвижностью, так вытянув шею и такого безобразного, что если бы не его полосатая, лиловая с красным, ливрея, то его можно было бы принять за одно из каменных чудовищ, корчащихся вот уже шесть веков над водосточными трубами собора. С самого полудня он неотступно следил за всем, что происходило на площадке перед собором Богоматери. Никем не замеченный, он привязал к колонне галереи толстую веревку с узлами, конец которой спускался до паперти. Сделав это, он стал спокойно наблюдать, посвистывая время от времени, когда мимо него пролетала птица.</p><p class="p1">Вдруг, когда помощники палача собирались исполнить приказание Шармолю, он, обхватив веревку руками и ногами, скользнул по ней, как дождевая капля скользит по стеклу, с проворством кошки подбежал к двум палачам, ударил каждого из них кулаком, схватил одной рукой цыганку, как ребенок хватает куклу, и бросился в храм, восклицая громким голосом:</p><p class="p1">– Убежище!</p><p class="p1">Все это произошло с быстротой молнии.</p><p class="p1">– Убежище! Убежище! – заревела толпа, и рукоплескания десяти тысяч рук заставили заблистать радостью и гордостью единственный глаз Квазимодо.</p><p class="p1">Осужденная пришла в себя, открыла глаза, но, взглянув на Квазимодо, закрыла их опять от ужаса пред своим спасителем.</p><p class="p1">Шармолю остановился пораженный, так же как и палачи и стража. Действительно, в стенах собора осужденная была неприкосновенна. Собор пользовался правом убежища. Закон человеческий терял всякую силу за порогом церковных дверей.</p><p class="p1">Квазимодо остановился в дверях. Его большие ноги, казалось, вросли в пол, как тяжелые римские колонны. Его мохнатая голова уходила в плечи, как голова льва. Он держал девушку, словно кусок белой ткани, но его грубые руки прикасались к ней нежно, как к цветку, который он боялся смять. Квазимодо чувствовал, что это нежное создание было предназначено не для его рук. Минутами он боялся дохнуть на нее, потом прижимал ее к своей груди, как сокровище, как мать ребенка. Его взор опускался на нее с выражением нежности, горя и жалости и подымался, метая молнии. Женщины смеялись и плакали, толпа дрожала от энтузиазма, потому что в эту минуту Квазимодо сиял своеобразной красотой. Он, этот сирота-найденыш, этот отверженец, чувствовал себя мощным и сильным. Он гордо смотрел на это изгнавшее его общество, над которым он теперь властвовал, на правосудие людское, у которого он вырвал жертву, на всех этих зверей, оставшихся ни с чем, на приставов, судей, палачей, на всю эту вражескую силу, которую он, ничтожный, сломил с помощью Божией!</p><p class="p1">Трогательно было это покровительство урода несчастной, спасение Квазимодо приговоренной к смерти. Отверженец природы и отверженица общества соприкасались и помогали друг другу.</p><p class="p1">После минуты торжества Квазимодо внезапно со своей ношей исчез внутри храма. Народ, всегда любящий отвагу, жалел, что он так скоро скрылся. Вдруг его увидели бегущим по галерее французских королей, он высоко держал на руках свою добычу и кричал: «Убежище!» Снова раздались рукоплескания толпы. Пробежав галерею, он вновь пропал и снова показался на более высокой галерее и снова кричал, приветствуемый рукоплесканиями: «Убежище!» Наконец он показался в третий раз на колокольне, с торжеством показал толпе спасенную и громовым голосом – голосом, который так редко слышали другие и которого сам он никогда не слыхал, трижды прокричал исступленно:</p><p class="p1">– Убежище! Убежище! Убежище!</p><p class="p1">– Noёl! Noёl! – кричал, со своей стороны, народ, и эти громкие возгласы потрясли на другом берегу Сены толпу, собравшуюся на Гревской площади, и затворницу, не отводившую глаз от виселицы.</p></span></span></span>
