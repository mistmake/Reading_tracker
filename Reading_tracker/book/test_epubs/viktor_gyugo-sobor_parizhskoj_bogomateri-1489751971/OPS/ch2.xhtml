<body class="z">
<div class="title">
<p class="p">Сноски</p>
</div>
<span id="id67"><div class="title6">
<p class="p">1</p>
</div><p class="p1">Безобразное тоже прекрасное (<em>фр.</em>).</p></span>
<span id="id66"><div class="title6">
<p class="p">2</p>
</div><p class="p1">«Собор Парижской Богоматери» (<em>фр.</em>).</p></span>
<span id="id65"><div class="title6">
<p class="p">3</p>
</div><p class="p1">«Отверженные» (<em>фр.</em>).</p></span>
<span id="id64"><div class="title6">
<p class="p">4</p>
</div><p class="p1">Рок, судьба (<em>греч</em>.).</p></span>
<span id="id63"><div class="title6">
<p class="p">5</p>
</div><p class="p1">Значение, которое обыкновенно придается слову «готический», хоть и неточно, но принято всеми. Мы, как и все, употребляем его здесь, чтобы охарактеризовать стиль архитектуры второй половины Средних веков, в котором стрельчатый свод служит таким же отличительным признаком, как в предшествовавшем ему периоде полукруглый свод. (<em>Примеч. В. Гюго.</em>)</p></span>
<span id="id62"><div class="title6">
<p class="p">6</p>
</div><p class="p1">Да, печальное было зрелище, Когда парижская юстиция, Объевшись пряников, Подожгла свой дворец (<em>фр.</em>).</p><p class="p1">Четверостишие содержит игру слов: «еpice» означает и «пряники», и «взятки».</p></span>
<span id="id61"><div class="title6">
<p class="p">7</p>
</div><p class="p1">Moulin – мельница (<em>фр.</em>).</p></span>
<span id="id60"><div class="title6">
<p class="p">8</p>
</div><p class="p1">Le cornu – рогатый (<em>фр</em>.).</p></span>
<span id="id59"><div class="title6">
<p class="p">9</p>
</div><p class="p1">Рогатый и косматый (<em>лат</em>.).</p></span>
<span id="id127"><div class="title6">
<p class="p">10</p>
</div><p class="p1">Тибальд-кормилец (<em>лат.</em>).</p></span>
<span id="id126"><div class="title6">
<p class="p">11</p>
</div><p class="p1">Непередаваемая игра слов, означающая: «Тибо с игральными костями».</p></span>
<span id="id125"><div class="title6">
<p class="p">12</p>
</div><p class="p1">Вот мы и швыряем орешки сатурналиев (<em>лат</em>.).</p></span>
<span id="id124"><div class="title6">
<p class="p">13</p>
</div><p class="p1">С серыми туниками (<em>лат.</em>).</p></span>
<span id="id123"><div class="title6">
<p class="p">14</p>
</div><p class="p1">Или с серыми овчинными шкурами (<em>лат</em>.).</p></span>
<span id="id121"><div class="title6">
<p class="p">15</p>
</div><p class="p1">Или одну потасовку (<em>лат</em>.).</p></span>
<span id="id119"><div class="title6">
<p class="p">16</p>
</div><p class="p1">Сзади него черная забота (<em>лат</em>.).</p></span>
<span id="id117"><div class="title6">
<p class="p">17</p>
</div><p class="p1">«Незачем впутывать Бога» (<em>лат</em>.).</p></span>
<span id="id115"><div class="title6">
<p class="p">18</p>
</div><p class="p1">Ликуй, Юпитер! Рукоплещите, граждане! (<em>Лат</em>.)</p></span>
<span id="id113"><div class="title6">
<p class="p">19</p>
</div><p class="p1">Игра слов: по-французски «dauphin» – «дельфин» и «дофин» (наследник французского престола).</p></span>
<span id="id107"><div class="title6">
<p class="p">20</p>
</div><p class="p1">В лесу невидан был такой торжествующий зверь (<em>стар. фр.</em>).</p></span>
<span id="id106"><div class="title6">
<p class="p">21</p>
</div><p class="p1">«Будем пить, как Папа» (<em>лат</em>.).</p></span>
<span id="id105"><div class="title6">
<p class="p">22</p>
</div><p class="p1">Голова, наполненная вином (<em>лат.</em>).</p></span>
<span id="id104"><div class="title6">
<p class="p">23</p>
</div><p class="p1">Жемчуг перед свиньями (<em>лат</em>.).</p></span>
<span id="id103"><div class="title6">
<p class="p">24</p>
</div><p class="p1">Свиньи перед жемчугом (Маргаритой) – игра слов.</p></span>
<span id="id101"><div class="title6">
<p class="p">25</p>
</div><p class="p1">Самая поступь обнаруживает богиню (<em>лат</em>.) (<em>Вергилий</em>).</p></span>
<span id="id99"><div class="title6">
<p class="p">26</p>
</div><p class="p1">Поцелуи за удары (<em>исп.</em>).</p></span>
<span id="id97"><div class="title6">
<p class="p">27</p>
</div><p class="p1">Роскошный сундук вытащили со дна водоема, в нем были новые знамена со страшными изображениями… (<em>Исп.</em>)</p></span>
<span id="id95"><div class="title6">
<p class="p">28</p>
</div><p class="p1">Арабы на лошадях, неподвижные, с мечами и самострелами через плечо… (<em>Исп.</em>)</p></span>
<span id="id93"><div class="title6">
<p class="p">29</p>
</div><p class="p1">«Вся дорога, извилистая и запутанная» (<em>лат</em>.).</p></span>
<span id="id87"><div class="title6">
<p class="p">30</p>
</div><p class="p1">Привет, Мария, звезда (<em>лат</em>.).</p></span>
<span id="id86"><div class="title6">
<p class="p">31</p>
</div><p class="p1">Подайте, синьор, подайте! (<em>Ит</em>.)</p></span>
<span id="id85"><div class="title6">
<p class="p">32</p>
</div><p class="p1">Господин кавалер, подайте на кусок хлеба (<em>исп</em>.).</p></span>
<span id="id84"><div class="title6">
<p class="p">33</p>
</div><p class="p1">Сотворите милостыню (<em>лат</em>.).</p></span>
<span id="id83"><div class="title6">
<p class="p">34</p>
</div><p class="p1">Куда бежишь, человече? (<em>Исп.</em>)</p></span>
<span id="id81"><div class="title6">
<p class="p">35</p>
</div><p class="p1">Человече, сними свою шляпу (<em>исп.</em>).</p></span>
<span id="id79"><div class="title6">
<p class="p">36</p>
</div><p class="p1">Философия и философы всеобъемлющи (<em>лат</em>.).</p></span>
<span id="id77"><div class="title6">
<p class="p">37</p>
</div><p class="p1">Подайте милостыньку (<em>лат.</em>).</p></span>
<span id="id75"><div class="title6">
<p class="p">38</p>
</div><p class="p1">Когда цесарки меняют перья, и земля… (<em>Исп.</em>)</p></span>
<span id="id73"><div class="title6">
<p class="p">39</p>
</div><p class="p1">Esmeralda – по-испански «изумруд».</p></span>
<span id="id58"><div class="title6">
<p class="p">40</p>
</div><p class="p1">Отец мой птица, Мать моя птичка, Я пересекаю воду без челна, Я пересекаю воду без лодки, Мать моя птичка, Отец мой птица (<em>фр</em>.).</p></span>
<span id="id57"><div class="title6">
<p class="p">41</p>
</div><p class="p1">Время прожорливо, человек еще прожорливей (<em>лат</em>.).</p></span>
<span id="id56"><div class="title6">
<p class="p">42</p>
</div><p class="p1">История галлов. Кн. II. – Период III. – Т. 130. – С. 1. (<em>Примеч. В. Гюго.</em>)</p></span>
<span id="id55"><div class="title6">
<p class="p">43</p>
</div><p class="p1">На время останавливаются прерванные дела (<em>лат</em>.) (<em>Вергилий</em>).</p></span>
<span id="id54"><div class="title6">
<p class="p">44</p>
</div><p class="p1">Это то самое искусство, которое, согласно местности, климату и расе обитателей, называется также ломбардским, саксонским и византийским. Эти три разновидности зодчества, родственные и параллельные, исходят из общего принципа, из полукруглого свода, хотя и сохраняют свои особенности.</p></span>
<span id="id52"><div class="title6">
<p class="p">45</p>
</div><p class="p1">Эта часть шпиля была деревянная, уничтоженная грозою в 1823 году. (<em>Примеч. В. Гюго.</em>)</p></span>
<span id="id50"><div class="title6">
<p class="p">46</p>
</div><p class="p1">Все не на одно лицо, однако не столько различны, сколько и т. д. (<em>Примеч. В. Гюго</em>.)</p></span>
<span id="id48"><div class="title6">
<p class="p">47</p>
</div><p class="p1">Своеобразное (<em>лат.</em>).</p></span>
<span id="id46"><div class="title6">
<p class="p">48</p>
</div><p class="p1">Игра слов, означающая: «Стена, обносящая Париж, вызывает ропот Парижа».</p></span>
<span id="id44"><div class="title6">
<p class="p">49</p>
</div><p class="p1">Гражданская верность правителям, изредка прерываемая восстаниями, породила многие привилегии (<em>лат.</em>).</p></span>
<span id="id28"><div class="title6">
<p class="p">50</p>
</div><p class="p1">С грустью и с негодованием слышали мы, что хотят увеличить, перекроить, переделать, то есть, собственно, уничтожить, этот чудный дворец. У зодчих нашего времени слишком тяжелая рука, чтобы касаться такого нежного произведения эпохи Возрождения. Но будем надеяться, что этого не решатся сделать. Разрушение Тюильри было бы в наши дни не только грубым варварством, от которого мог бы покраснеть даже вандал, но прямо актом измены. Ведь Тюильри является не просто шедевром искусства шестнадцатого века, а страницею истории девятнадцатого столетия. Этот дворец принадлежит уже не королю, а народу. Оставим его таким, какой он есть. Наша революция сделала на нем две отметины: один его фасад пробит ядрами 10 августа, другой – 29 июля. Он священен. (<em>Примеч. В. Гюго к пятому изданию. Париж, 7 апреля 1841 г</em>.)</p></span>
<span id="id27"><div class="title6">
<p class="p">51</p>
</div><p class="p1">Давать пощечины и вырывать волосы (<em>лат.</em>).</p></span>
<span id="id26"><div class="title6">
<p class="p">52</p>
</div><p class="p1">Алтарь лентяев (<em>лат.</em>).</p></span>
<span id="id25"><div class="title6">
<p class="p">53</p>
</div><p class="p1">Quasimodo – «как бы», «наподобие» (<em>лат</em>.).</p></span>
<span id="id24"><div class="title6">
<p class="p">54</p>
</div><p class="p1">Страж страшных тварей – страшнее их сам (<em>лат</em>.).</p></span>
<span id="id22"><div class="title6">
<p class="p">55</p>
</div><p class="p1">Сильный юноша – зол (<em>лат.</em>).</p></span>
<span id="id20"><div class="title6">
<p class="p">56</p>
</div><p class="p1">«Драка; причина – напились самого лучшего вина» (<em>лат</em>.).</p></span>
<span id="id18"><div class="title6">
<p class="p">57</p>
</div><p class="p1">Там, где кончаются все знания (<em>лат</em>.).</p></span>
<span id="id16"><div class="title6">
<p class="p">58</p>
</div><p class="p1">Fas – дозволенное, nefas – недозволенное (<em>лат.</em>).</p></span>
<span id="id14"><div class="title6">
<p class="p">59</p>
</div><p class="p1">К общему напеву (<em>лат.</em>).</p></span>
<span id="id270"><div class="title6">
<p class="p">60</p>
</div><p class="p1">«Ради некоторых женщин, которых без скандала нельзя допустить» (<em>лат</em>.).</p></span>
<span id="id269"><div class="title6">
<p class="p">61</p>
</div><p class="p1">Всякий сброд бежит за поэтами, Как за совой с криком летят малиновки (<em>фр</em>.).</p></span>
<span id="id268"><div class="title6">
<p class="p">62</p>
</div><p class="p1">Вот так штука – пойман бес (<em>фр.</em>).</p></span>
<span id="id267"><div class="title6">
<p class="p">63</p>
</div><p class="p1">Игра слов: «Ура, ура! Клод и хромой» (<em>лат</em>.).</p></span>
<span id="id266"><div class="title6">
<p class="p">64</p>
</div><p class="p1">Аббат блаженного Мартина (<em>лат</em>.).</p></span>
<span id="id264"><div class="title6">
<p class="p">65</p>
</div><p class="p1">«О предназначении и свободной воле» (<em>лат.</em>).</p></span>
<span id="id262"><div class="title6">
<p class="p">66</p>
</div><p class="p1">Dom – господин (от латинского слова «dominus»).</p></span>
<span id="id260"><div class="title6">
<p class="p">67</p>
</div><p class="p1">Игра слов: l’abricotier – абрикосовое дерево, A l’abri ôtier – прибрежный приют (<em>фр</em>.).</p></span>
<span id="id258"><div class="title6">
<p class="p">68</p>
</div><p class="p1">Верую в Бога (<em>лат</em>.).</p></span>
<span id="id256"><div class="title6">
<p class="p">69</p>
</div><p class="p1">Господа нашего (<em>лат</em>.).</p></span>
<span id="id240"><div class="title6">
<p class="p">70</p>
</div><p class="p1">Аминь (<em>лат</em>.).</p></span>
<span id="id239"><div class="title6">
<p class="p">71</p>
</div><p class="p1">Ошибаешься, друг Клод! (<em>Лат</em>.)</p></span>
<span id="id238"><div class="title6">
<p class="p">72</p>
</div><p class="p1">Голубь (<em>греч.</em>).</p></span>
<span id="id237"><div class="title6">
<p class="p">73</p>
</div><p class="p1">Примечания к посланиям апостола Павла. Нюренберг, Антоний Кобургер (<em>лат.</em>).</p></span>
<span id="id236"><div class="title6">
<p class="p">74</p>
</div><p class="p1">«Аббатом блаженного Мартина является король Франции, считающийся каноником и пользующийся частью доходов аббатства; будучи преемником святого Венанция, он должен сидеть в казначейском кресле» (<em>лат</em>.).</p></span>
<span id="id234"><div class="title6">
<p class="p">75</p>
</div><p class="p1">Ибо именуюсь львом (<em>лат.</em>).</p></span>
<span id="id232"><div class="title6">
<p class="p">76</p>
</div><p class="p1">Эта комета, при появлении которой Папа Каликст, дядя Борджиа, повелел всенародно молиться, появилась вновь в 1835 году. (<em>Примеч. В. Гюго.</em>)</p></span>
<span id="id230"><div class="title6">
<p class="p">77</p>
</div><p class="p1">«Должность, которая соединяет с немалой государственной властью многие прерогативы и права» (<em>лат.</em>).</p></span>
<span id="id228"><div class="title6">
<p class="p">78</p>
</div><p class="p1">См.: Отчеты по управлению коронными имуществами за 1383 год. (<em>Примеч. В. Гюго.</em>)</p></span>
<span id="id226"><div class="title6">
<p class="p">79</p>
</div><p class="p1">Закон сурового постановления (<em>лат.</em>).</p></span>
<span id="id210"><div class="title6">
<p class="p">80</p>
</div><p class="p1">Громким голосом во тьме (<em>лат.</em>).</p></span>
<span id="id209"><div class="title6">
<p class="p">81</p>
</div><p class="p1">«Молчи и надейся» (<em>лат</em>.).</p></span>
<span id="id208"><div class="title6">
<p class="p">82</p>
</div><p class="p1">«Крепкий щит – спасение вождей» (<em>лат</em>.).</p></span>
<span id="id207"><div class="title6">
<p class="p">83</p>
</div><p class="p1">«Это твое» (<em>лат</em>.).</p></span>
<span id="id206"><div class="title6">
<p class="p">84</p>
</div><p class="p1">«Ты молись» (<em>лат.</em>).</p></span>
<span id="id205"><div class="title6">
<p class="p">85</p>
</div><p class="p1">Неровными шагами (<em>лат</em>.).</p></span>
<span id="id204"><div class="title6">
<p class="p">86</p>
</div><p class="p1">Цветущая.</p></span>
<span id="id203"><div class="title6">
<p class="p">87</p>
</div><p class="p1">Глухой – глуп (<em>лат.</em>).</p></span>
<span id="id202"><div class="title6">
<p class="p">88</p>
</div><p class="p1">Веревка – висельнику, костер – уроду (<em>фр</em>.).</p></span>
<span id="id201"><div class="title6">
<p class="p">89</p>
</div><p class="p1">«Рождество!» (В знак одобрения.)</p></span>
<span id="id190"><div class="title6">
<p class="p">90</p>
</div><p class="p1">Наедине мужчина и женщина не станут заниматься чтением «Отче наш» (<em>лат.</em>).</p></span>
<span id="id189"><div class="title6">
<p class="p">91</p>
</div><p class="p1">«Отче наш», и «Дева Мария», и «Верую в Бога, всемогущего Отца» (<em>лат.</em>).</p></span>
<span id="id188"><div class="title6">
<p class="p">92</p>
</div><p class="p1">Каким образом, как (<em>лат</em>.).</p></span>
<span id="id187"><div class="title6">
<p class="p">93</p>
</div><p class="p1">Но, впрочем (<em>лат</em>.).</p></span>
<span id="id186"><div class="title6">
<p class="p">94</p>
</div><p class="p1">«Поистине эта торговля жареным мясом вещь глупая» (<em>ит.</em>).</p></span>
<span id="id185"><div class="title6">
<p class="p">95</p>
</div><p class="p1">«Дыши, надейся» (<em>лат</em>.).</p></span>
<span id="id184"><div class="title6">
<p class="p">96</p>
</div><p class="p1">Откуда? оттуда? (<em>лат</em>.) – Человек человеку чудовище (<em>лат</em>.). – Звезды, лагерь; имя, божество (<em>лат</em>.). – Большая книга – большое зло (<em>греч</em>.). – Дерзай знать (<em>лат.</em>). – Течет, где хочет (<em>лат.</em>).</p></span>
<span id="id183"><div class="title6">
<p class="p">97</p>
</div><p class="p1">Пожирание судьбы (<em>греч</em>.).</p></span>
<span id="id182"><div class="title6">
<p class="p">98</p>
</div><p class="p1">Владыку неба величай dominus, владыку земли – domnus (<em>лат</em>.).</p></span>
<span id="id181"><div class="title6">
<p class="p">99</p>
</div><p class="p1">По-гречески, чтению не подлежит (<em>лат</em>.).</p></span>
<span id="id168"><div class="title6">
<p class="p">100</p>
</div><p class="p1">L’Assomeur – убийца, Croque-Oison – пожиратель птиц (фр.).</p></span>
<span id="id166"><div class="title6">
<p class="p">101</p>
</div><p class="p1">«Кто не работает, тот не ест» (<em>лат.</em>).</p></span>
<span id="id164"><div class="title6">
<p class="p">102</p>
</div><p class="p1">Против стрекал, прутьев, крестов, оков, бичей, цепей, темниц, силков (<em>лат</em>.).</p></span>
<span id="id162"><div class="title6">
<p class="p">103</p>
</div><p class="p1">Через себя, и с собой, и в себе! (<em>лат.</em>)</p></span>
<span id="id160"><div class="title6">
<p class="p">104</p>
</div><p class="p1">«Раздет донага, связан, подвешен за ноги!» (<em>Лат</em>.)</p></span>
<span id="id158"><div class="title6">
<p class="p">105</p>
</div><p class="p1">Начальные слова капитулярия Карла Великого о ведьмах, запрещавшего иметь с ними сношения.</p></span>
<span id="id156"><div class="title6">
<p class="p">106</p>
</div><p class="p1">«Диалог о силе и действиях демонов» (<em>лат</em>.).</p></span>
<span id="id154"><div class="title6">
<p class="p">107</p>
</div><p class="p1">«Нет места, где бы не было гения» (<em>лат.</em>).</p></span>
<span id="id152"><div class="title6">
<p class="p">108</p>
</div><p class="p1">Слава тебе, Господи! (<em>Лат</em>.)</p></span>
<span id="id151"><div class="title6">
<p class="p">109</p>
</div><p class="p1">При сохранении специфической формы спасается душа (<em>лат</em>.).</p></span>
<span id="id148"><div class="title6">
<p class="p">110</p>
</div><p class="p1">Ребята с улицы Птит-Каро Дают себя вешать, как телята! (<em>Фр</em>.)</p></span>
<span id="id146"><div class="title6">
<p class="p">111</p>
</div><p class="p1">«Пьяницы, пьяницы, пьяницы, отправляйтесь в Гуль» (houle – морская зыбь) (<em>фр.</em>).</p></span>
<span id="id145"><div class="title6">
<p class="p">112</p>
</div><p class="p1">Когда мыши поедят кошек, Король овладеет Аррасом; Когда море-океан замерзнет в Иванов день, То увидят, как из Арраса пойдут по льду (<em>фр</em>.).</p></span>
<span id="id144"><div class="title6">
<p class="p">113</p>
</div><p class="p1">Речь идет о специфической неприличной выходке.</p></span>
<span id="id143"><div class="title6">
<p class="p">114</p>
</div><p class="p1">«Епископ Отюнский» (<em>лат</em>.).</p></span>
<span id="id142"><div class="title6">
<p class="p">115</p>
</div><p class="p1">Сознаюсь (<em>лат.</em>).</p></span>
<span id="id141"><div class="title6">
<p class="p">116</p>
</div><p class="p1">«О правильных и неправильных оборотах речи» (<em>лат.</em>).</p></span>
<span id="id140"><div class="title6">
<p class="p">117</p>
</div><p class="p1">«Итак, господа, теперь ведьма обличена, преступление доказано, преступные намерения ясны, и от имени священнослужителей собора Парижской Богоматери, которым принадлежит высшее и низшее право суда на этом незапятнанном острове государства, мы, согласно в настоящее время действующему суду, заявляем наши требования: во-первых, присуждения к денежному штрафу; во-вторых, к публичному покаянию перед главным порталом собора Парижской Богоматери; в-третьих, приговора, в силу которого эта ведьма со своей козой были бы казнены на площади, которую в просторечии именуют Гревской, или на острове реки Сены, неподалеку от королевского сада» (<em>лат</em>.).</p></span>
<span id="id139"><div class="title6">
<p class="p">118</p>
</div><p class="p1">Варварская латынь! (<em>Лат</em>.)</p></span>
<span id="id138"><div class="title6">
<p class="p">119</p>
</div><p class="p1">Отрицаю (<em>лат</em>.).</p></span>
<span id="id137"><div class="title6">
<p class="p">120</p>
</div><p class="p1">Оставь всякую надежду (<em>Данте. Божественная комедия</em>).</p></span>
<span id="id136"><div class="title6">
<p class="p">121</p>
</div><p class="p1">…Не убоюсь многих тысяч, окружающих меня. Восстань, Господи! Спаси меня, Боже! …Спаси меня, Боже, ибо воды вошли и поднялись до самой души моей. …В глубокой трясине погряз я, и нет твердой опоры (<em>лат</em>.).</p></span>
<span id="id135"><div class="title6">
<p class="p">122</p>
</div><p class="p1">«Слушающий слово Мое и верующий в пославшего Меня имеет жизнь вечную и на суд не приходит, но перешел от смерти в жизнь» (<em>лат</em>.).</p></span>
<span id="id134"><div class="title6">
<p class="p">123</p>
</div><p class="p1">Из недр глубоких я возопил, и Ты услышал голос мой. И ввергнул меня в глубину пучины морской, и волны окружили меня (<em>лат</em>.).</p></span>
<span id="id133"><div class="title6">
<p class="p">124</p>
</div><p class="p1">Иди, погибшая душа, и Господь да смилуется над тобою (<em>лат</em>.).</p></span>
<span id="id132"><div class="title6">
<p class="p">125</p>
</div><p class="p1">Господи, помилуй (<em>греч</em>.).</p></span>
<span id="id131"><div class="title6">
<p class="p">126</p>
</div><p class="p1">Все пучины твои и потоки твои прошли по мне! (<em>Лат.</em>)</p></span>
<span id="id130"><div class="title6">
<p class="p">127</p>
</div><p class="p1">Это была гидра для монахов святого Германа, что в лугах, ибо миряне кружили им там головы своими ссорами и безобразиями (<em>лат</em>.).</p></span>
<span id="id129"><div class="title6">
<p class="p">128</p>
</div><p class="p1">Грев, лай, Грев, ворчи! Вейся, вейся, моя пряжа, Вейся веревкой палача, Что свистит на площади. Грев, лай, Грев, ворчи! Прекрасная пеньковая веревка! Сейте от Неси до Ванвра Пеньку, а не рожь. Вору не украсть Прекрасную пеньковую веревку. Грев, ворчи, Грев, лай. Ты увидишь продажную девку Висящей на паршивой виселице. Окна будут, что твои глаза. Грев, ворчи, Грев, лай! (<em>Фр</em>.)</p></span>
<span id="id128"><div class="title6">
<p class="p">129</p>
</div><p class="p1">Счастливый старик! (<em>Лат</em>.)</p></span>
<span id="id122"><div class="title6">
<p class="p">130</p>
</div><p class="p1">«О тесании камней» (<em>лат</em>.).</p></span>
<span id="id120"><div class="title6">
<p class="p">131</p>
</div><p class="p1">Он таков: в пище, в питье, во сне, в любви – во всем воздержание (<em>лат.</em>).</p></span>
<span id="id118"><div class="title6">
<p class="p">132</p>
</div><p class="p1">Фиктивный брак (<em>лат</em>.).</p></span>
<span id="id116"><div class="title6">
<p class="p">133</p>
</div><p class="p1">Иссякает ученость ученых, послушание учеников (<em>лат.</em>).</p></span>
<span id="id114"><div class="title6">
<p class="p">134</p>
</div><p class="p1">Беснующегося народа – разнообразное беснование! (<em>Лат</em>.)</p></span>
<span id="id112"><div class="title6">
<p class="p">135</p>
</div><p class="p1">Какие песнопения! Какие трубы! Какие песни! Какие мелодии здесь без конца звучат! Поют медоточивые трубы, раздается нежнейшая ангельская мелодия, дивная песнь песней! (<em>лат</em>.)</p></span>
<span id="id111"><div class="title6">
<p class="p">136</p>
</div><p class="p1">Не всякому дано иметь нос (<em>лат.</em>).</p></span>
<span id="id110"><div class="title6">
<p class="p">137</p>
</div><p class="p1">Пусть я не попробую крепкой Настойки целый год, если я лгу! (<em>Фр.</em>)</p></span>
<span id="id109"><div class="title6">
<p class="p">138</p>
</div><p class="p1">Клянусь кровью Господа: Не верю я ни в Бога, ни в черта, Нет у меня Ни крова, ни пристанища, Ни короля, Ни Бога! (<em>Фр</em>.)</p></span>
<span id="id108"><div class="title6">
<p class="p">139</p>
</div><p class="p1">От вина распутство и буйное веселье (<em>лат</em>.).</p></span>
<span id="id102"><div class="title6">
<p class="p">140</p>
</div><p class="p1">«Вино доводит до греха даже мудрецов» (<em>лат.</em>).</p></span>
<span id="id100"><div class="title6">
<p class="p">141</p>
</div><p class="p1">Хвала Господу! (<em>Лат.</em>)</p></span>
<span id="id98"><div class="title6">
<p class="p">142</p>
</div><p class="p1">«Десять медных носов» (<em>греч.</em>).</p></span>
<span id="id96"><div class="title6">
<p class="p">143</p>
</div><p class="p1">Славно обряжен город Кебраи. Марасен разграбил его (<em>фр.</em>).</p></span>
<span id="id94"><div class="title6">
<p class="p">144</p>
</div><p class="p1">Без кравчего и без виночерпия (<em>лат.</em>).</p></span>
<span id="id92"><div class="title6">
<p class="p">145</p>
</div><p class="p1">Господин Жан Балю Больше не увидит Своих епископств. Господин де Верден Не имеет больше ни одного – Все исчезли (<em>фр</em>.).</p></span>
<span id="id91"><div class="title6">
<p class="p">146</p>
</div><p class="p1">Пульс частый, прерывистый, слабый, неправильный (<em>лат</em>.).</p></span>
<span id="id90"><div class="title6">
<p class="p">147</p>
</div><p class="p1">Плохой, урод (<em>фр</em>.).</p></span>
<span id="id89"><div class="title6">
<p class="p">148</p>
</div><p class="p1">Осаждал тавринов и сам был осажден (<em>лат</em>.).</p></span>
<span id="id88"><div class="title6">
<p class="p">149</p>
</div><p class="p1">«Против скупости» (<em>лат</em>.).</p></span>
<span id="id82"><div class="title6">
<p class="p">150</p>
</div><p class="p1">Прекрасное создание в белой одежде (<em>ит</em>.) (<em>Данте</em>).</p></span>
<span id="id80"><div class="title6">
<p class="p">151</p>
</div><p class="p1">Медведь (<em>лат.</em>).</p></span>
<span id="id78"><div class="title6">
<p class="p">152</p>
</div><p class="p1">Человек (<em>лат.</em>).</p></span>
<span id="id76"><div class="title6">
<p class="p">153</p>
</div><p class="p1">Мольба (<em>лат.</em>) – так называлась жалоба, обращенная к королю.</p></span>
<span id="id74"><div class="title6">
<p class="p">154</p>
</div><p class="p1">Позор тому, кто подумает дурное (<em>фр.</em>).</p></span>
<span id="id72"><div class="title6">
<p class="p">155</p>
</div><p class="p1">Доблесть сильнее тарана (<em>лат.</em>).</p></span>
<span id="id71"><div class="title6">
<p class="p">156</p>
</div><p class="p1">Coq – петух (<em>фр.</em>).</p></span>
<span id="id70"><div class="title6">
<p class="p">157</p>
</div><p class="p1">Орудие власти (<em>лат.</em>).</p></span>
<span id="id69"><div class="title6">
<p class="p">158</p>
</div><p class="p1">Берегись, детка, не то я позову компрачикосов (<em>исп.</em>).</p></span>
<span id="id68"><div class="title6">
<p class="p">159</p>
</div><p class="p1">Бродячий человек страшнее бродячего зверя (<em>лат.</em>).</p></span>
<span id="id53"><div class="title6">
<p class="p">160</p>
</div><p class="p1">«Помилуй» – молитва (<em>лат.</em>).</p></span>
<span id="id51"><div class="title6">
<p class="p">161</p>
</div><p class="p1">Не приемлющих присяги (<em>англ.</em>).</p></span>
<span id="id49"><div class="title6">
<p class="p">162</p>
</div><p class="p1">Латинские названия разных видов акул.</p></span>
<span id="id47"><div class="title6">
<p class="p">163</p>
</div><p class="p1">Идемте (<em>исп.</em>).</p></span>
<span id="id45"><div class="title6">
<p class="p">164</p>
</div><p class="p1">Заставь войти (<em>лат.</em>).</p></span>
<span id="id43"><div class="title6">
<p class="p">165</p>
</div><p class="p1">Баск (<em>исп.</em>).</p></span>
<span id="id42"><div class="title6">
<p class="p">166</p>
</div><p class="p1">Род рыбной солянки (<em>фр.</em>).</p></span>
<span id="id41"><div class="title6">
<p class="p">167</p>
</div><p class="p1">Горячий винегрет (<em>исп.</em>) – национальное испанское блюдо из мяса, овощей и пряностей.</p></span>
<span id="id40"><div class="title6">
<p class="p">168</p>
</div><p class="p1">Люди, спускайте все! (<em>Исп.</em>)</p></span>
<span id="id39"><div class="title6">
<p class="p">169</p>
</div><p class="p1">Издеваешься ты над нами? (<em>Исп.</em>)</p></span>
<span id="id23"><div class="title6">
<p class="p">170</p>
</div><p class="p1">Мир во время войны (<em>лат.</em>).</p></span>
<span id="id21"><div class="title6">
<p class="p">171</p>
</div><p class="p1">Грешен (<em>лат.</em>).</p></span>
<span id="id19"><div class="title6">
<p class="p">172</p>
</div><p class="p1">Да будет так (<em>исп.</em>).</p></span>
<span id="id17"><div class="title6">
<p class="p">173</p>
</div><p class="p1">В добрый час (<em>баск.</em>).</p></span>
<span id="id15"><div class="title6">
<p class="p">174</p>
</div><p class="p1">Аминь (<em>лат.</em>).</p></span>
<span id="id13"><div class="title6">
<p class="p">175</p>
</div><p class="p1">Отче наш, иже еси на небесех (<em>лат.</em>).</p></span>
<span id="id12"><div class="title6">
<p class="p">176</p>
</div><p class="p1">Да святится имя Твое (<em>лат.</em>).</p></span>
<span id="id11"><div class="title6">
<p class="p">177</p>
</div><p class="p1">Да приидет царствие Твое (<em>лат.</em>).</p></span>
<span id="id10"><div class="title6">
<p class="p">178</p>
</div><p class="p1">Да будет воля Твоя (<em>лат.</em>).</p></span>
<span id="id9"><div class="title6">
<p class="p">179</p>
</div><p class="p1">Как на небе, так и на земле (<em>лат.</em>).</p></span>
<span id="id265"><div class="title6">
<p class="p">180</p>
</div><p class="p1">О людях, лишенных носа (<em>лат.</em>).</p></span>
<span id="id263"><div class="title6">
<p class="p">181</p>
</div><p class="p1">Рот твой разодран до ушей, десны обнажены, нос изуродован – ты станешь маской и будешь вечно смеяться (<em>лат.</em>).</p></span>
<span id="id261"><div class="title6">
<p class="p">182</p>
</div><p class="p1">На смену одной золотой ветви – другая (<em>лат.</em>).</p></span>
<span id="id259"><div class="title6">
<p class="p">183</p>
</div><p class="p1">Мадам без дальнейшего определения (<em>фр.</em>) – «мадам» – титул старшей дочери французского короля, дочери дофина и жены брата короля.</p></span>
<span id="id257"><div class="title6">
<p class="p">184</p>
</div><p class="p1">Оканчивается рыбьим хвостом (<em>лат.</em>).</p></span>
<span id="id255"><div class="title6">
<p class="p">185</p>
</div><p class="p1">Там Венера в лесах соединяла в объятиях любовников (<em>лат.</em>).</p></span>
<span id="id254"><div class="title6">
<p class="p">186</p>
</div><p class="p1">Оплаченная девственность (<em>лат.</em>).</p></span>
<span id="id253"><div class="title6">
<p class="p">187</p>
</div><p class="p1">Войною и миром (<em>лат.</em>).</p></span>
<span id="id252"><div class="title6">
<p class="p">188</p>
</div><p class="p1">Приношения по обету (<em>лат.</em>).</p></span>
<span id="id251"><div class="title6">
<p class="p">189</p>
</div><p class="p1">Здесь обитают львы (<em>лат.</em>).</p></span>
<span id="id235"><div class="title6">
<p class="p">190</p>
</div><p class="p1">Искусство поэзии (<em>фр.</em>).</p></span>
<span id="id233"><div class="title6">
<p class="p">191</p>
</div><p class="p1">Лишить носа (<em>лат.</em>).</p></span>
<span id="id231"><div class="title6">
<p class="p">192</p>
</div><p class="p1">Имеющий рваные ноздри (<em>лат.</em>).</p></span>
<span id="id229"><div class="title6">
<p class="p">193</p>
</div><p class="p1">«Медведь наизнанку» (<em>лат.</em>).</p></span>
<span id="id227"><div class="title6">
<p class="p">194</p>
</div><p class="p1">«Закланный агнец» (<em>лат.</em>).</p></span>
<span id="id225"><div class="title6">
<p class="p">195</p>
</div><p class="p1">«Свят Господь» (<em>лат.</em>).</p></span>
<span id="id224"><div class="title6">
<p class="p">196</p>
</div><p class="p1">Молись! плачь! Из слова Родится разум, Из пения – свет (<em>исп.</em>).</p></span>
<span id="id223"><div class="title6">
<p class="p">197</p>
</div><p class="p1">Ночь, уходи! Заря поет победную песню (<em>исп.</em>).</p></span>
<span id="id222"><div class="title6">
<p class="p">198</p>
</div><p class="p1">Вознесись на небо И смейся, плакавший (<em>исп.</em>).</p></span>
<span id="id221"><div class="title6">
<p class="p">199</p>
</div><p class="p1">Разбей ярмо! Сбрось, чудовище, Свою черную Оболочку (<em>исп.</em>).</p></span>
<span id="id38"><div class="title6">
<p class="p">200</p>
</div><p class="p1">О, подойди! люби! Ты – душа, Я – сердце (<em>исп.</em>).</p></span>
<span id="id37"><div class="title6">
<p class="p">201</p>
</div><p class="p1">Для предстоящего совета (<em>лат.</em>).</p></span>
<span id="id36"><div class="title6">
<p class="p">202</p>
</div><p class="p1">Для согласования (<em>лат.</em>).</p></span>
<span id="id35"><div class="title6">
<p class="p">203</p>
</div><p class="p1">Мы (<em>лат.</em>).</p></span>
<span id="id34"><div class="title6">
<p class="p">204</p>
</div><p class="p1">Равные нам по крови (<em>лат.</em>).</p></span>
<span id="id33"><div class="title6">
<p class="p">205</p>
</div><p class="p1">Люблю тебя (<em>фр.</em>).</p></span>
<span id="id32"><div class="title6">
<p class="p">206</p>
</div><p class="p1">Я лекарь (<em>лат.</em>).</p></span>
<span id="id31"><div class="title6">
<p class="p">207</p>
</div><p class="p1">Во всех предметах, доступных познанию (<em>лат.</em>).</p></span>
<span id="id30"><div class="title6">
<p class="p">208</p>
</div><p class="p1">Болтун, исцелись сам (<em>лат.</em>).</p></span>
<span id="id29"><div class="title6">
<p class="p">209</p>
</div><p class="p1">Трое составляют капитул (<em>лат.</em>).</p></span>
<span id="id8"><div class="title6">
<p class="p">210</p>
</div><p class="p1">Дрозд роняет помет себе на беду (<em>лат.</em>).</p></span>
<span id="id7"><div class="title6">
<p class="p">211</p>
</div><p class="p1">Слуга (<em>исп.</em>).</p></span>
<span id="id6"><div class="title6">
<p class="p">212</p>
</div><p class="p1">Мальчик-слуга (<em>исп.</em>).</p></span>
<span id="id5"><div class="title6">
<p class="p">213</p>
</div><p class="p1">По знаку встань и выйди (<em>лат.</em>).</p></span>
<span id="id4"><div class="title6">
<p class="p">214</p>
</div><p class="p1">Собаки лают, служители закона безмолвствуют. Служить закону – значит молчать (<em>лат.</em>).</p></span>
<span id="id3"><div class="title6">
<p class="p">215</p>
</div><p class="p1">Император водворяет безмолвие (<em>лат.</em>).</p></span>
<span id="id2"><div class="title6">
<p class="p">216</p>
</div><p class="p1">Мы будем содержать многих жезлоносцев, которым надлежит молча исполнять свои обязанности (<em>лат.</em>).</p></span>
<span id="id1"><div class="title6">
<p class="p">217</p>
</div><p class="p1">Встань по приказу, данному знаком. Будь безмолвен. Так должно вести себя при задержании по королевской воле (<em>лат.</em>).</p></span>
<span id="id272"><div class="title6">
<p class="p">218</p>
</div><p class="p1">Древний нормандский статут в рукописи (<em>лат.</em>).</p></span>
<span id="id271"><div class="title6">
<p class="p">219</p>
</div><p class="p1">Служители меча – из хартии Людовика Восьмого о норманнах (<em>лат.</em>).</p></span>
<span id="id250"><div class="title6">
<p class="p">220</p>
</div><p class="p1">Сержанты шпаги (<em>лат.</em>).</p></span>
<span id="id249"><div class="title6">
<p class="p">221</p>
</div><p class="p1">Бесноватые – это те, кого мучат многие бесы. Тот, кем владеет лишь один бес, – только одержимый (<em>лат.</em>).</p></span>
<span id="id248"><div class="title6">
<p class="p">222</p>
</div><p class="p1">Страж башни (<em>лат.</em>).</p></span>
<span id="id247"><div class="title6">
<p class="p">223</p>
</div><p class="p1">Преславный и светлейший (<em>лат.</em>).</p></span>
<span id="id246"><div class="title6">
<p class="p">224</p>
</div><p class="p1">Правильный акт (<em>лат.</em>).</p></span>
<span id="id245"><div class="title6">
<p class="p">225</p>
</div><p class="p1">Не знаем (<em>лат.</em>).</p></span>
<span id="id244"><div class="title6">
<p class="p">226</p>
</div><p class="p1">Вводятся привратниками, блюстителями тишины (<em>лат.</em>).</p></span>
<span id="id243"><div class="title6">
<p class="p">227</p>
</div><p class="p1">Пожиратель достояния, расточитель, мот, любострастник, сводник, пьяница, прожигатель жизни, лицемер, истребитель родового наследства, растратчик, транжир и обжора (<em>лат.</em>).</p></span>
<span id="id242"><div class="title6">
<p class="p">228</p>
</div><p class="p1">Английская хартия (<em>лат.</em>).</p></span>
<span id="id241"><div class="title6">
<p class="p">229</p>
</div><p class="p1">Цепи, и яма, и колодки, и прочее (<em>лат.</em>).</p></span>
<span id="id220"><div class="title6">
<p class="p">230</p>
</div><p class="p1">Сверх того (<em>лат.</em>).</p></span>
<span id="id219"><div class="title6">
<p class="p">231</p>
</div><p class="p1">Узы, законом установленные (<em>лат.</em>).</p></span>
<span id="id218"><div class="title6">
<p class="p">232</p>
</div><p class="p1">Полное воздержание от пищи (<em>лат.</em>).</p></span>
<span id="id217"><div class="title6">
<p class="p">233</p>
</div><p class="p1">Увеличить еще более воздержание от пищи уменьшением количества ее. Британское обычное право (<em>лат.</em>).</p></span>
<span id="id216"><div class="title6">
<p class="p">234</p>
</div><p class="p1">Смерть преступника есть дань уважения закону (<em>лат.</em>).</p></span>
<span id="id215"><div class="title6">
<p class="p">235</p>
</div><p class="p1">Признающийся в своей вине да получит meldefeoh. Закон Ины (<em>лат.</em>).</p></span>
<span id="id214"><div class="title6">
<p class="p">236</p>
</div><p class="p1">Любовное свидание перед смертью (<em>лат.</em>).</p></span>
<span id="id213"><div class="title6">
<p class="p">237</p>
</div><p class="p1">На четвертый день назначь очную ставку (<em>лат.</em>).</p></span>
<span id="id212"><div class="title6">
<p class="p">238</p>
</div><p class="p1">Рот, разодранный до ушей (<em>лат.</em>).</p></span>
<span id="id211"><div class="title6">
<p class="p">239</p>
</div><p class="p1">По повелению короля (<em>лат.</em>).</p></span>
<span id="id200"><div class="title6">
<p class="p">240</p>
</div><p class="p1">Присвоил (<em>лат.</em>).</p></span>
<span id="id199"><div class="title6">
<p class="p">241</p>
</div><p class="p1">Противозаконное присвоение (<em>лат.</em>).</p></span>
<span id="id198"><div class="title6">
<p class="p">242</p>
</div><p class="p1">Тебе, продающему детей, имя – плагиатор (<em>лат.</em>).</p></span>
<span id="id197"><div class="title6">
<p class="p">243</p>
</div><p class="p1">Желает, чтобы его видели впереди (<em>лат.</em>).</p></span>
<span id="id196"><div class="title6">
<p class="p">244</p>
</div><p class="p1">Наушник (<em>лат.</em>)</p></span>
<span id="id195"><div class="title6">
<p class="p">245</p>
</div><p class="p1">Исторгаемый из среды дворянства становится лицом недворянского сословия (<em>лат.</em>).</p></span>
<span id="id194"><div class="title6">
<p class="p">246</p>
</div><p class="p1">Жизнь и имущество наших подданных принадлежат нам (<em>лат.</em>).</p></span>
<span id="id193"><div class="title6">
<p class="p">247</p>
</div><p class="p1">В состоянии неизвестности (<em>англ.</em>).</p></span>
<span id="id192"><div class="title6">
<p class="p">248</p>
</div><p class="p1">Ничему не удивляться (<em>лат.</em>).</p></span>
<span id="id191"><div class="title6">
<p class="p">249</p>
</div><p class="p1">Главный сеньер (<em>англ.</em>).</p></span>
<span id="id180"><div class="title6">
<p class="p">250</p>
</div><p class="p1">Старческая любовь – постыдна (<em>лат.</em>).</p></span>
<span id="id179"><div class="title6">
<p class="p">251</p>
</div><p class="p1">Чернь – подонки столицы (<em>лат.</em>).</p></span>
<span id="id178"><div class="title6">
<p class="p">252</p>
</div><p class="p1">Пусть леса будут достойны консула (<em>лат.</em>).</p></span>
<span id="id177"><div class="title6">
<p class="p">253</p>
</div><p class="p1">Рукоплещите, граждане! (<em>Лат.</em>)</p></span>
<span id="id176"><div class="title6">
<p class="p">254</p>
</div><p class="p1">Бык на языке (<em>лат.</em>).</p></span>
<span id="id175"><div class="title6">
<p class="p">255</p>
</div><p class="p1">Немой (<em>лат.</em>).</p></span>
<span id="id174"><div class="title6">
<p class="p">256</p>
</div><p class="p1">После этого еще не значит вследствие этого (<em>лат.</em>).</p></span>
<span id="id173"><div class="title6">
<p class="p">257</p>
</div><p class="p1">Да будет свет (<em>лат.</em>).</p></span>
<span id="id172"><div class="title6">
<p class="p">258</p>
</div><p class="p1">Запутанный тайник со сложными поворотами (<em>лат.</em>).</p></span>
<span id="id171"><div class="title6">
<p class="p">259</p>
</div><p class="p1">Собачка в ногах (<em>исп.</em>).</p></span>
<span id="id170"><div class="title6">
<p class="p">260</p>
</div><p class="p1">Нагая при ярком светильнике (<em>лат.</em>).</p></span>
<span id="id169"><div class="title6">
<p class="p">261</p>
</div><p class="p1">«Коран Магомета» (<em>лат.</em>).</p></span>
<span id="id167"><div class="title6">
<p class="p">262</p>
</div><p class="p1">Заседание происходило вечером (<em>лат.</em>).</p></span>
<span id="id165"><div class="title6">
<p class="p">263</p>
</div><p class="p1">А все-таки она движется (<em>итал.</em>).</p></span>
<span id="id163"><div class="title6">
<p class="p">264</p>
</div><p class="p1">Первого баронета Англии (<em>лат.</em>).</p></span>
<span id="id161"><div class="title6">
<p class="p">265</p>
</div><p class="p1">Библиотекарь (<em>англ.</em>).</p></span>
<span id="id159"><div class="title6">
<p class="p">266</p>
</div><p class="p1">Приди, дух святой (<em>лат.</em>).</p></span>
<span id="id157"><div class="title6">
<p class="p">267</p>
</div><p class="p1">Без просьбы, без подкупа, без попойки (<em>лат.</em>).</p></span>
<span id="id155"><div class="title6">
<p class="p">268</p>
</div><p class="p1">«Об устройстве королевских палат» (<em>лат.</em>).</p></span>
<span id="id153"><div class="title6">
<p class="p">269</p>
</div><p class="p1">Смотритель дверей и решеток (<em>лат.</em>).</p></span>
<span id="id150"><div class="title6">
<p class="p">270</p>
</div><p class="p1">«Жить, открыто изъявляя свою волю» (<em>лат.</em>).</p></span>
<span id="id149"><div class="title6">
<p class="p">271</p>
</div><p class="p1">Скоморох! Комедиант! (<em>Лат.</em>)</p></span>
<span id="id147"><div class="title6">
<p class="p">272</p>
</div><p class="p1">«Остерегаясь, будешь в безопасности» (<em>лат.</em>).</p></span>
