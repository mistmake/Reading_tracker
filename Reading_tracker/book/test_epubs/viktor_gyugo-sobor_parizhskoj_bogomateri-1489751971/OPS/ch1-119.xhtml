<span><span><span><span id="id192"><div class="title6">
<p class="p">4. Нет, на небесах</p>
</div><p class="p1">Вдруг Дея, высвободившись из объятий Гуинплена, привстала. Она прижала обе руки к сердцу, словно желая сдержать его биение.</p><p class="p1">– Что со мной? – оказала она. – Мне трудно дышать. Но это ничего. Это от радости. Это хорошо. Я сражена твоим появлением, мой Гуинплен. Сражена внезапным счастьем. Что может быть упоительнее мгновения, когда все небо нисходит нам в сердце? Без тебя я чувствовала, что умираю. Ты возвратил меня к жизни. Точно раздвинулась какая-то тяжелая завеса, и я почувствовала, как в грудь мою хлынула жизнь, кипучая жизнь, полная волнений и восторгов. Как необычайна эта жизнь, которую ты пробудил во мне! Она так чудесна, что мне даже больно. Мне кажется, что душа моя становится все шире и ей как будто тесно в теле. Эта полнота жизни, это блаженство охватывает меня всю, пронизывает меня. У меня точно выросли крылья, – я чувствую, как они трепещут. Мне немного страшно, но я очень счастлива. Ты воскресил меня, Гуинплен.</p><p class="p1">Она вспыхнула, потом побледнела, затем снова разрумянилась и вдруг упала.</p><p class="p1">– Увы! – сказал Урсус. – Ты убил ее!</p><p class="p1">Гуинплен простер руки к Дее. Какое страшное потрясение – переход от высочайшего блаженства к глубочайшему отчаянию. Гуинплен сам упал бы, если бы ему не нужно, было поддержать ее.</p><p class="p1">– Дея! – вскрикнул он, весь задрожав. – Что с тобой?</p><p class="p1">– Ничего, – ответила она. – Я люблю тебя.</p><p class="p1">Она безжизненно лежала у него в объятиях. Руки ее беспомощно повисли.</p><p class="p1">Гуинплен и Урсус уложили ее на тюфяк.</p><p class="p1">Она прошептала слабым голосом:</p><p class="p1">– Мне трудно дышать лежа.</p><p class="p1">Они посадили ее.</p><p class="p1">Урсус спросил:</p><p class="p1">– Дать тебе подушку?</p><p class="p1">Она ответила:</p><p class="p1">– Зачем? Ведь у меня есть Гуинплен.</p><p class="p1">И она прислонилась головой к плечу Гуинплена, который сел позади и поддерживал ее; в глазах его отражались отчаяние и растерянность.</p><p class="p1">– Ах, как мне хорошо! – сказала она.</p><p class="p1">Урсус взял ее руку и считал пульс. Он не качал головой, не говорил ни слова, и о том, что он думал, можно было догадаться лишь по быстрым движениям его век, судорожно мигавших, словно для того, чтобы удержать готовые политься слезы.</p><p class="p1">– Что с нею? – опросил Гуинплен.</p><p class="p1">Урсус приложил ухо к левому боку Деи.</p><p class="p1">Гуинплен нетерпеливо повторил свой вопрос, с трепетом ожидая ответа.</p><p class="p1">Урсус посмотрел на Гуинплена, потом на Дею. Он был мертвенно бледен.</p><p class="p1">– Мы, должно быть, находимся на высоте Кентербери, – сказал он. – Расстояние отсюда до Гревсенда не очень велико. Тихая погода продержится всю ночь. На море нам нечего бояться нападения, потому что весь военный флот крейсирует у берегов Испании. Наш переезд совершится вполне благополучно.</p><p class="p1">Дея, бессильно склонясь и все более бледнея, судорожно мяла в руках складки своего платья. Погруженная в раздумье о чем-то, не передаваемом никакими словами, она глубоко вздохнула:</p><p class="p1">– Я понимаю, что со мной. Я умираю.</p><p class="p1">Гуинплен в ужасе вскочил. Урсус подхватил Дею.</p><p class="p1">– Умираешь? Ты умираешь? Нет, не может этого быть. Не можешь ты умереть. Умереть теперь? Умереть сейчас? Но это невозможно. Бог не так жесток. Возвратить тебя для того, чтобы в ту же минуту отнять снова? Нет, так не бывает. Ведь это значило бы, что Бог хочет, чтобы мы усомнились в нем. Это значило бы, что все, все обман – и земля, и небо, и сердце, и любовь, и звезды. Ведь это значило бы, что Бог – предатель, а человек – обманутый глупец… Ведь это значило бы, что нельзя верить ни во что, что надо проклясть весь мир, что все – бездна. Ты сама не знаешь, что говоришь, Дея. Ты будешь жить! Я требую, чтобы ты жила. Ты должна мне повиноваться. Я твой муж и господин. Я запрещаю тебе покидать меня. О небо! О несчастные люди! Нет, это невозможно. И я останусь на земле один, без тебя? Да это было бы так чудовищно, что самое солнце померкло бы! Дея, Дея, приди в себя. Это у тебя ненадолго, это сейчас пройдет. У человека бывает иногда вот такой озноб, а потом он забывает о нем. Мне нужно, мне необходимо, чтобы ты была здорова и больше не страдала. Ты хочешь умереть! Что я тебе сделал? При одной мысли об этом я теряю рассудок. Мы принадлежим друг другу. Мы любим друг друга. У тебя нет причин уходить. Это было бы несправедливо. Разве я совершил какое-нибудь преступление? Ведь ты же простила меня. О, ты ведь не хочешь, чтобы я впал в отчаяние, чтобы я стал злодеем, безумцем, осужденным на вечные муки! Дея, прошу тебя, заклинаю, умоляю, не умирай!</p><p class="p1">Судорожно схватив себя за волосы, в смертельном ужасе, задыхаясь от слез, он бросился к ее ногам.</p><p class="p1">– Мой Гуинплен, – сказала Дея, – я в этом не виновата.</p><p class="p1">На губах у нее выступила розовая пена, которую Урсус вытер краем ее одежды; Гуинплен, лежавший ничком, не замечал ничего. Он обнимал ее ноги и бессвязно молил:</p><p class="p1">– Говорю тебе, я не хочу! Я не перенесу твоей смерти. Умрем, но вместе. Только вместе. Тебе – умереть, Дея! Я никогда не соглашусь на это! Божество мое! Любовь моя! Пойми же, я здесь. Клянусь тебе, ты будешь жить! Умереть? Ты, значит, не представляешь себе, что будет со мною после твоей смерти. Если бы ты только знала, как ты мне нужна, ты бы поняла, что это решительно невозможно, Дея! Ведь кроме тебя у меня никого нет. Со мною случилось нечто необычайное. Представь себе, я только что пережил за несколько часов целую жизнь. Я убедился в том, что на свете нет ровно ничего. Существуешь только ты, ты одна. Если не будет тебя, мир не будет иметь никакого смысла. Сжалься надо мной! Живи, если ты любишь меня. Я нашел тебя вновь не для того, чтобы сейчас же утратить. Погоди немного. Нельзя же уходить, едва успев свидеться. Успокойся! О господи, как я страдаю! Ты ведь не сердишься на меня, правда? Ты ведь понимаешь, что я не мог поступить иначе, так как за мной пришел жезлоносец. Вот увидишь, тебе сейчас станет легче дышать. Дея, уже все прошло. Мы будем счастливы. Не повергай меня в отчаяние! Дея! Ведь я не сделал тебе ничего дурного.</p><p class="p1">Слова эти он не выговорил, а прорыдал. В них чувствовались и скорбь и возмущение. Из груди Гуинплена вырывались жалостные стоны, которые привлекли бы голубку, и дикие вопли, способные устрашить льва.</p><p class="p1">Голосом все менее и менее внятным, прерывающимся почти на каждом слове, Дея ответила:</p><p class="p1">– Увы, зачем ты говоришь так! Любимый мой, я верю, что ты сделал бы все, что мог. Час назад мне хотелось умереть, а теперь я уже не хочу этого. Гуинплен, мой обожаемый Гуинплен, как мы были счастливы! Бог послал тебя мне, а теперь отнимает меня у тебя. Я ухожу. Ты не забудешь «Зеленого ящика», правда? И своей бедной слепой Деи? Ты будешь вспоминать мою песенку. Не забывай звука моего голоса, не забывай, как я говорила тебе: «Люблю тебя». Я буду возвращаться по ночам и повторять тебе это, когда ты будешь спать. Мы снова встретились, но радость была слишком велика. Это не могло продолжаться. Я ухожу первая, так решено. Я очень люблю моего отца Урсуса и нашего брата Гомо. Вы все добрые. Как здесь душно! Распахните окно! Мой Гуинплен, я не говорила тебе этого, но однажды я приревновала тебя к женщине, которая приезжала к нам. Ты даже не знаешь, о ком я говорю. Не правда ли? Укройте мне руки. Мне немного холодно. А где Фиби и Винос? В конце концов начинаешь любить всех. Нам приятны люди, которые видели нас счастливыми. Чувствуешь к ним благодарность за то, что они были свидетелями нашей радости. Почему все это миновало? Я не совсем понимаю, что произошло за последние два дня. Теперь я умираю. Оставьте на мне вот это платье. Когда я надевала его, я так и думала, что оно будет моим саваном. Пусть меня похоронят в нем. На нем поцелуи Гуинплена. Ах, как мне хотелось бы еще жить! Как нам чудесно жилось в нашем возке! Мы пели. Я слышала рукоплескания. Как это было хорошо – никогда не разлучаться! Мне казалось, что мы живем, окутанные облаком. Я отдавала себе отчет во всем, различала один день от другого; несмотря на свою слепоту, я знала, когда наступает утро, потому что слышала голос Гуинплена, и знала, когда наступает ночь, потому что видела Гуинплена во сне. Я чувствовала, что меня окружает нежное, теплое облако: это была его душа. Мы так долго любили друг друга. Теперь конец, не будет больше песен. Увы! Неужели жизнь кончилась? Ты будешь помнить обо мне, мой любимый?</p><p class="p1">Голос ее постепенно ослабевал. Жизнь явно ее покидала, ей уже не хватало дыхания. Она судорожно сжимала пальцы – знак приближения последней минуты. Предсмертное хрипение девушки уже переходило с лепет ангела.</p><p class="p1">Она прошептала:</p><p class="p1">– Вы будете вспоминать обо мне, неправда ли? Мне было бы грустно умереть, зная, что никто не вспомнит обо мне. Иногда я бывала злая. Простите меня, прошу вас. Я уверена, что, будь на то воля божья, мы могли бы быть очень счастливы, нам ведь нужно так немного, мой Гуинплен; мы зарабатывали бы себе на жизнь и поселились бы вместе в чужих краях; но Господь не захотел этого. Я не знаю, почему я умираю. Я ведь не жаловалась на свою слепоту, я никого не обижала. Каким счастьем было бы для меня навеки остаться слепой, никогда с тобой не разлучаясь! Ах, как горько расставаться!</p><p class="p1">Она прерывисто дышала, ее слова угасали одно за другим, точно огоньки, задуваемые ветром. Ее уже почти не было слышно.</p><p class="p1">– Гуинплен, – шептала она, – не правда ли, ты будешь помнить обо мне? Мне это будет нужно, когда я умру.</p><p class="p1">И прибавила:</p><p class="p1">– Ах, удержите меня!</p><p class="p1">Потом, помолчав, шепнула:</p><p class="p1">– Приходи ко мне как можно скорее! Даже у Бога я буду несчастной без тебя. Не оставляй меня слишком долго одну, мой милый Гуинплен! Рай был здесь, на земле. Там, наверху, только небо. Ах, я задыхаюсь! Мой любимый! Мой любимый! Мой любимый!</p><p class="p1">– Сжалься! – крикнул Гуинплен.</p><p class="p1">– Прощай! – прошептала она.</p><p class="p1">– Сжалься! – повторил Гуинплен.</p><p class="p1">И прильнул губами к прекрасным холодеющим рукам Деи.</p><p class="p1">Одно мгновение она, казалось, уже не дышала.</p><p class="p1">Вдруг она приподнялась на локтях, глаза ее вспыхнули ярким блеском, и на лице появилась неизъяснимая улыбка.</p><p class="p1">Ее голос обрел неожиданную звонкость.</p><p class="p1">– Свет! – вскрикнула она. – Я вижу!</p><p class="p1">И, упав навзничь, она вся вытянулась и застыла на тюфяке.</p><p class="p1">Бедный старик, словно раздавленный тяжестью отчаяния, припал лысой головой к ногам Деи и, рыдая, зарылся лицом в складки ее одежды. Он лишился сознания.</p><p class="p1">Гуинплен был страшен.</p><p class="p1">Он вскочил на ноги, поднял голову и стал пристально всматриваться в расстилавшееся перед ним бескрайнее черное небо.</p><p class="p1">Потом, никому не видимый, – разве только некоему незримому существу, присутствовавшему в этом мраке, – он простер руки кверху и сказал:</p><p class="p1">– Иду!</p><p class="p1">Он пошел по палубе шхуны, направляясь к ее борту, точно притягиваемый каким-то видением.</p><p class="p1">В нескольких шагах от него расстилалась бездна.</p><p class="p1">Он двигался медленно, не глядя себе под ноги.</p><p class="p1">Лицо его было озарено улыбкой, которая была у Деи перед смертью.</p><p class="p1">Он шел прямо, словно видя что-то перед собой. В глазах у него светился как бы отблеск души, парящей вдалеке.</p><p class="p1">Он крикнул:</p><p class="p1">– Да!</p><p class="p1">С каждым шагом он приближался к борту.</p><p class="p1">Он шел решительно, простирая кверху руки, с запрокинутой назад головой, пристально всматриваясь в одну точку, двигаясь, словно призрак.</p><p class="p1">Он не спешил, не колебался, ступая твердо и неуклонно, как будто перед ним была не зияющая пропасть, не отверстая могила.</p><p class="p1">Он шептал:</p><p class="p1">– Будь спокойна, я иду за тобою. Я хорошо вижу знак, который ты подаешь мне.</p><p class="p1">Он не сводил глаз с одной точки на небе, в самом зените. Он улыбался.</p><p class="p1">Небо было совершенно черно, звезд не было, но он, несомненно, видел какую-то звезду.</p><p class="p1">Он пересек палубу.</p><p class="p1">Еще несколько решительных роковых шагов, и он очутился на самом ее краю.</p><p class="p1">– Я иду, – сказал он. – Вот и я, Дея!</p><p class="p1">И продолжал идти. Палуба была без борта. Перед ним чернела пропасть. Он занес над ней ногу.</p><p class="p1">И упал.</p><p class="p1">Ночь была непроглядно темная, место глубокое. Вода поглотила его. Это было безмолвное исчезновение во мраке. Никто ничего не видел и не слышал. Судно продолжало плыть вперед, река по-прежнему катила свои волны.</p><p class="p1">Немного спустя шхуна вышла в океан.</p><p class="p1">Когда Урсус очнулся, Гуинплена уже не было. Он увидал только Гомо, стоявшего на самом краю палубы, глядя на море, волк жалобно выл в темноте.</p></span></span></span></span>
