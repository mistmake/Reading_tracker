<p class="p">2. Последний итог</p>
</div><p class="p1">Гуинплен вышел из гостиницы и осмотрел во всех направлениях Таринзофилд. Он ходил всюду, где накануне стояли подмостки, палатки, балаганы. Теперь ничего от этого не осталось. Он стучался в лавки, хотя отлично знал, что в них нет никого, колотил во все окна, ломился во все двери. Ни один голос не откликнулся из этой тьмы. Казалось, здесь вымерло решительно все.</p><p class="p1">Муравейник был разрушен. Очевидно, полиция приняла меры. Казалось, здесь прошел разбойничий набег. Таринзофилд не то что опустел, он был разорен; во всех его углах чувствовались следы чьих-то свирепых когтей. У этой жалкой ярмарки вывернули, так сказать, наизнанку карманы и опорожнили их.</p><p class="p1">Внимательно обследовав всю площадь, Гуинплен покинул «зеленую лужайку», свернул в извилистые переулки той части предместья, которая носит название Ист-Пойнта, и направился к Темзе.</p><p class="p1">Миновав запутанную сеть переулков, обнесенных заборами и изгородями, он почувствовал, что на него пахнуло свежестью воды, услыхал глухой плеск реки и вдруг очутился перед парапетом Эфрок-Стоуна.</p><p class="p1">Парапет окаймлял очень короткий и узкий участок набережной. Под парапетом высокая стена отвесно спускалась в темную воду.</p><p class="p1">Гуинплен остановился, облокотился на парапет, сжал обеими руками голову и задумался, склонясь над водой.</p><p class="p1">На что он смотрел? На реку? Нет. Во что же он вглядывался? Во мрак. Но не в тот, что окружал его, а в тот, что наполнял его душу.</p><p class="p1">В унылом ночном пейзаже, которого он не замечал, в темноте, куда не проникал его взор, можно было различить черные силуэты рей и мачт. Под Эфрок-Стоуном не было ничего, кроме воды, но неподалеку, вниз по течению, набережная полого спускалась к берегу, где стояло несколько судов, только что прибывших или готовящихся к отплытию и сообщавшихся с сушей маленькими пристанями, сооруженными из камня или дерева, или дощатыми мостками. Одни суда стояли на якоре, другие – на причале. На них не слышалось ни шагов, ни разговоров, так как матросы имеют похвальную привычку спать как можно дольше и вставать только для работы. Даже если какому-либо из этих судов и предстояло уйти ночью во время прилива, то пока на нем еще никто не просыпался.</p><p class="p1">Во мгле смутно вырисовывались черные пузатые кузовы и такелаж, переплетения снастей и веревочных лестниц. Все затягивала сизая мглистая дымка. Местами ее прорезывал красный фонарь.</p><p class="p1">Ничего этого Гуинплен не замечал. Он созерцал собственную судьбу.</p><p class="p1">Он был погружен в раздумье, этот мечтатель, растерявшийся перед лицом неумолимой действительности. Ему чудилось, будто он слышит позади себя какой-то грохот, словно гул землетрясения. Это был хохот лордов.</p><p class="p1">Он только что бежал от этого хохота. Бежал, получив пощечину.</p><p class="p1">От кого? – От родного брата.</p><p class="p1">И, убежав от этого хохота, оглушенный пощечиной, спеша укрыться в своем гнезде, словно раненая птица, спасаясь от ненависти и надеясь встретить любовь, что встретил он?</p><p class="p1">Мрак.</p><p class="p1">Ни души.</p><p class="p1">Все исчезло.</p><p class="p1">Он сравнивал этот мрак со своими мечтами.</p><p class="p1">Все, все рухнуло!</p><p class="p1">Гуинплен подошел к самому краю зловещей пропасти, к зияющей пустоте.</p><p class="p1">«Зеленый ящик» исчез, и это было гибелью Вселенной.</p><p class="p1">Над ним как бы захлопнулась крышка гроба.</p><p class="p1">Он размышлял.</p><p class="p1">Что с ними могло произойти? Где они? Очевидно, их всех куда-то убрали. Тем же самым ударом, каким она вознесла его на высоту, судьба уничтожила его близких. Было ясно, что он их больше никогда не увидит. Для этого приняли необходимые меры. Сразу удалили всех до одного обитателей ярмарочной площади, начиная с Никлса и Говикема, чтобы он нигде не мог получить никаких сведений. Их смели беспощадной рукой. Та же грозная общественная сила, жертвой которой он стал в палате лордов, уничтожила Урсуса и Дею в их убогом жилище.</p><p class="p1">Они погибли. Дея погибла. Во всяком случае, для него. Навсегда. О силы небесные, где она? И его не было рядом, и он не защитил ее!</p><p class="p1">Строить догадки об отсутствующих, которых любишь, значит подвергать себя пытке. И Гуинплен переживал эту пытку. Куда бы ни устремлялась его мысль, какие бы предположения ни приходили ему на ум, все причиняло ему жестокую внутреннюю боль, и он глухо стонал.</p><p class="p1">В вихре проносившихся в его голове мучительных мыслей у него возникло внезапно воспоминание о том, несомненно роковом, человеке, который назывался Баркильфедро. Это он оставил в его мозгу те неясные слова, которые загорались теперь в его памяти, как будто были начертаны огнем. Он чувствовал, как пылают они в его мозгу – эти, прежде загадочные, теперь ставшие понятными слова:</p><p class="p1">«Судьба никогда не отворяет одной двери, не захлопнув прежде другой».</p><p class="p1">Все было кончено. Последние тени сгустились над ним.</p><p class="p1">В жизни каждого человека бывают минуты, когда для него как будто бы рушится мир. Это называется отчаянием. Душа в этот час полна падающих звезд.</p><p class="p1">Итак, вот что с ним случилось!</p><p class="p1">Откуда-то вдруг надвинулось облако дыма. Оно покрыло его, Гуинплена. Дым закрыл ему глаза; он проник в его мозг, он ослепил и одурманил его. Все это длилось недолго, только пока рассеялся дым. И вот рассеялось все – и дым и жизнь его. Очнувшись от этого страшного сна, он оказался одиноким.</p><p class="p1">Все исчезло. Все ушло. Все погибло. Ночь. Небытие. Вот что он видел вокруг себя.</p><p class="p1">Он был одинок.</p><p class="p1">Синоним одиночества – смерть.</p><p class="p1">Отчаяние – великий счетчик. Оно всему подводит итоги. Ничто не ускользает от него. Оно все подсчитывает, не упуская ни одного сантима. Оно ставит в счет Богу и громовый удар и булавочный укол. Оно хочет точно знать, чего следует ждать от судьбы. Оно все принимает во внимание, взвешивает и высчитывает.</p><p class="p1">Как страшен этот наружный холод, под которым клокочет огненная лава!</p><p class="p1">Гуинплен заглянул в свою душу и посмотрел прямо в глаза своей судьбе. Оглядываясь назад, человек подводит страшный итог.</p><p class="p1">Находясь на вершине горы, мы всматриваемся в пропасть.</p><p class="p1">Упав в бездну, созерцаем небо.</p><p class="p1">И говорим себе: «Вот где я был».</p><p class="p1">Гуинплен познал всю глубину несчастья. И как быстро это случилось! Несчастье надвинулось на него так внезапно! А между тем оно так тяжело, что от него можно было бы ждать большей медлительности. Увы, это не так! Казалось бы, холод, присущий снегу, должен был сообщить ему оцепенелость зимы, а белизна – неподвижность савана. Однако это опровергается стремительным падением лавины.</p><p class="p1">Лавина – это снег, ставший огненной печью. Она ледяная, но все пожирает. Такая лавина увлекла за собой Гуинплена. Она оторвала его, как лоскут, вырвала с корнем, как дерево, швырнула, как камень.</p><p class="p1">Он припомнил все обстоятельства своего падения. Сам задавал себе вопросы и сам же на них отвечал. Страдания – это допрос. Ни один судья не допрашивает обвиняемого так пытливо, как допрашивает нас собственная совесть.</p><p class="p1">В какой мере отчаяние Гуинплена было вызвано угрызениями совести?</p><p class="p1">Он пожелал дать себе в этом отчет и, как анатом, вскрыл свою душу. Мучительная операция.</p><p class="p1">Его отсутствие привело к катастрофе. Зависело ли оно от него? Действовал ли он по собственной воле? Нет. Он все время чувствовал себя пленником. Что же удерживало и останавливало его? Тюрьма? Нет. Цепи? Нет. Что же? Липкая смола. Он завяз в собственном величии.</p><p class="p1">Кому не случалось быть с виду свободным, но чувствовать, что у него связаны крылья!</p><p class="p1">Он будто попался в расставленные тенета. То, что вначале было соблазном, стало в конце концов пленом.</p><p class="p1">Совесть не давала ему покоя: разве он только подчинился обстоятельствам? Нет. Он охотно принял то, что предлагала ему судьба.</p><p class="p1">Правда, в известной мере над ним совершили насилие, его захватили врасплох, но и он в свою очередь не воспротивился этому. В том, что его похитили, он не был виноват, но он проявил слабость, позволив одурманить себя. Была ведь решительная минута, когда ему задали вопрос: Баркильфедро предложил ему сделать выбор и предоставил полную возможность одним-единственным словом решить свою участь.</p><p class="p1">Гуинплен мог сказать «нет». Он сказал «да».</p><p class="p1">Это «да», произнесенное в состоянии полной растерянности, и повлекло за собою все остальное. Гуинплен сознавал это. И воспоминание об этой минуте вызвало теперь прилив горечи в его душе.</p><p class="p1">И все же Гуинплен пытался оправдаться перед самим собой, – неужели он так провинился, вступив в свои права, в свое исконное наследие, в свой дом, заняв в качестве патриция положение, принадлежавшее его предкам, и в качестве сироты приняв имя своего отца? На что он согласился? На восстановление своих прав. И с чьей помощью? С помощью провидения.</p><p class="p1">Но при мысли об этом его охватывал порыв возмущения. Какую глупость он совершил, дав свое согласие! В какую недостойную сделку вступил он! Какой нелепый обмен! Эта сделка принесла ему несчастье. Как! За два миллиона ежегодного дохода, за семь-восемь поместий, за десять – двенадцать дворцов, за несколько особняков и за псовую охоту, кареты и гербы, за право быть судьей и законодателем, за честь носить корону и пурпурную мантию, как король, за титул барона, маркиза и пэра Англии он отдал балаган Урсуса и улыбку Деи! За всепоглощающую жизненную пучину он отдал подлинное счастье! За океан – жемчужину! О, безумец! О, глупец! О, простофиля!</p><p class="p1">Однако – и это возражение было достаточно основательным – разве в охватившей его горячке все было только нездоровым тщеславием? Быть может, отказаться от предложенных ему благ было бы эгоистичным; быть может, соглашаясь принять их, он действовал, повинуясь чувству долга? Что оставалось ему делать, когда он так внезапно превратился в лорда? Сложный круговорот событий повергает в замешательство каждого. Это случилось и с ним, Гуинпленом. Он растерялся, когда на него нахлынули со всех сторон бесчисленные, многообразные, противоречившие одна другой обязанности. Именно этой сковавшей его растерянностью и объясняется его покорность – в частности, то, что он позволил доставить себя из Корлеоне-Лоджа в палату лордов.</p><p class="p1">То, что в жизни называют «возвышением», – не что иное, как переход с пути спокойного на путь, полный тревоги. Где же прямая дорога? В чем состоит наш основной долг? В заботе ли о близких нам людях? Или обо всем человечестве? Не следует ли оставить малую семью ради большой? Человек поднимается вверх и чувствует на своей совести все увеличивающееся бремя. Чем выше подымается он, тем больше становится его долг по отношению к окружающим. Расширение прав влечет за собой увеличение обязанностей. Возникает соблазнительная иллюзия, будто перед нами расстилается одновременно несколько дорог и на каждую из этих дорог нам указывает наша совесть. Куда идти? Свернуть в сторону? Остановиться? Пойти вперед? Отступить? Что делать? Это странно, но у долга тоже есть свои перекрестки; ответственность бывает иногда настоящим лабиринтом.</p><p class="p1">И когда несешь в себе какую-то идею, когда ты не просто человек из плоти и крови, но и воплощение, но и символ, – разве твоя ответственность не больше? Вот чем объяснялись и сознательная покорность и немая тревога Гуинплена, вот почему согласился он заседать в палате лордов.</p><p class="p1">Человек, много думающий, часто бывает бездеятельным. Гуинплену казалось, что он повинуется голосу долга. Разве его вступление в парламент, где можно было бороться за угнетенный народ, не было осуществлением одной из самых заветных грез Гуинплена? Разве мог он отказаться, когда ему дано было право голоса, ему, чудовищному образчику уродливого общественного строя, ему, наглядной жертве произвола, под игом которого вот уже шесть тысяч лет стонет человеческий род? Имел ли он право уклониться от сходящего на него с неба огненного языка?</p><p class="p1">Что говорил себе Гуинплен в таинственном и ожесточенном споре с собственной совестью? Он говорил: «Народ молчит. Я буду неустанным глашатаем этого безмолвия; я буду говорить за немых. Я расскажу великим о малых, могущественным о слабых. В этом смысл моей судьбы. Господь знает, чего хочет, он осуществляет свои предначертания. Конечно, поразительно, что фляга Хардкванона, заключавшая в себе все необходимое для превращения Гуинплена в лорда Кленчарли, пятнадцать лет носилась по морю и ни бурные волны, ни рифы, ни шквалы не причинили ей никакого вреда. Я понимаю, почему. Есть жизненные жребии, остающиеся навеки тайной. Я владею тайной своей судьбы; я знаю ее разгадку. Я предназначен Богом. На меня возложена миссия. Я буду лордом бедняков. Я буду говорить за всех молчащих и отчаявшихся. Я передам их несвязный лепет; я передам их ропот и стоны; я переведу на человеческий язык и неясный гул толпы, и невнятные жалобы, и косноязычные речи – все звериные крики, исторгаемые из людских уст страданием и невежеством. Ведь вопль страдания столь же невнятен, как вой ветра. Люди кричат, но слов у них нет, никто их не понимает, ибо вопить – то же, что молчать, а молчать – значит быть безоружным. Людей обезоружили насилием, и они зовут к себе на помощь. И я приду им на помощь. Я буду обличителем. Я буду голосом народа. Благодаря мне все станет понятно. Я буду окровавленными устами, с которых сорвана повязка. Я выскажу все. Это будет великим делом.</p><p class="p1">Да, говорить за немых – это прекрасно, но как тяжело говорить перед глухими! Это и было второй частью пережитой им трагедии.</p><p class="p1">Увы! Его постигла неудача.</p><p class="p1">Неудача непоправимая.</p><p class="p1">Его внезапное возвышение, в которое он поверил, видимость счастья, блестящая будущность рухнули, едва только он коснулся их.</p><p class="p1">Какое падение! Потонуть в море смеха!</p><p class="p1">Он считал себя сильным, – столько лет его носили ветры в беспредельном море людских страданий, так чутко прислушивался он к его рокоту и слышал во мраке столько горестных воплей.</p><p class="p1">И вот он потерпел крушение, натолкнувшись на исполинский подводный камень – на ничтожество баловней счастья. Он считал себя мстителем, а оказался клоуном. Он думал разить громом, но только пощекотал противника. Вместо глубокого впечатления он вызвал только насмешки. Он рыдал, а ему ответили хохотом. Пучина этого смеха поглотила его. Мрачная гибель.</p><p class="p1">Над чем же смеялись? Над его смехом.</p><p class="p1">Итак, отвратительное насилие, след которого навсегда остался запечатленным на его лице, увечье, сообщившее ему выражение вечной веселости, клеймо смеха, скрывающее муки угнетенных, забавная маска, созданная пыткой, гримаса, исказившая его черты, рубцы, обозначавшие jussu regis, это вещественное доказательство преступления, совершенного королевской властью над целым народом, – вот что восторжествовало над ним, вот что сразило его; то, что должно было обвинить палача, стало приговором для жертвы. Неслыханная несправедливость! Королевская власть, погубив отца, поражала теперь и сына. Совершенное некогда зло служило теперь предлогом для нового злодейства. На кого обратилось негодование лордов? На мучителя? Нет. На его жертву.</p><p class="p1">С одной стороны – трон, с другой – народ; здесь Иаков II, там – Гуинплен. Очная ставка проливала свет на посягательство и на преступление.</p><p class="p1">В чем заключалось посягательство? Он посмел жаловаться. В чем заключалось преступление? Он посмел страдать. Пусть нищета прячется и молчит, иначе она виновна в оскорблении величества. Были ли злы по природе люди, поднявшие Гуинплена на смех? Нет, но над ними также тяготел рок, неизбежная жестокость богатых и счастливых: они были палачами, сами того не подозревая. Они были весело настроены. Они просто нашли Гуинплена лишним.</p><p class="p1">У них на глазах он вскрыл себе грудь, он вынул из себя печень и сердце, он показал им свои раны, а они кричали ему: «Валяй, ломай комедию!» Всего ужаснее было то, что он сам смеялся. Страшные цепи сковывали его душу, не давая мысли отразиться на его лице. Все его существо было изуродовано этой насильственной улыбкой, и в то время, как в нем бушевала ярость, черты его, противореча этой ярости, расплывались в смехе. Все кончено. Он – «Человек, который смеется», кариатида мира, исходящего слезами. Он – окаменевшая в смехе маска отчаяния, маска, запечатлевшая неисчислимые бедствия и навсегда обреченная служить для потехи и вызывать хохот; вместе со всеми угнетенными, чьим олицетворением он являлся, он разделял страшную участь – быть отчаянием, которому не верят. Над его терзаниями смеялись, он был чудовищным шутом, порожденным безысходной человеческой мукой, беглецом с каторги, где томились люди, забытые богом, бродягой, поднявшимся из народных низов, из «черни» до ступеней трона, к созвездиям избранных, скоморохом, забавлявшим вельмож, после того как он увеселял отверженных! Все его великодушие, весь энтузиазм, все красноречие – его сердце, душа, ярость, гнев, любовь, невыразимая скорбь – все это вызывало только смех. И он убеждался, как уже сказал лордам, что это не было исключением, а, напротив, заурядным, обычным фактом, настолько распространенным и неразрывно связанным с повседневной жизнью, что никто уже не замечал его. Смеется умирающий с голоду, смеется нищий, смеется каторжник, смеется проститутка, смеется сирота, чтобы заработать себе на хлеб насущный, смеется раб, смеется солдат, смеется народ. Человеческое общество устроено так, что все его беды, все несчастья, все катастрофы, все болезни, все язвы, все агонии здесь, над зияющей бездной, разрешаются ужасающей гримасой смеха. И олицетворением этой гримасы был он.</p><p class="p1">Небесная воля, неведомая сила, правящая нами, пожелала, чтобы доступный взору и осязанию призрак, призрак из плоти и крови, явился исчерпывающим выражением чудовищной пародии, которую мы называем миром. Этим призраком был он, Гуинплен.</p><p class="p1">Рок неумолим.</p><p class="p1">Он взывал: «Сжальтесь над страждущими!» Тщетный призыв.</p><p class="p1">Он хотел вызвать жалость, а вызвал отвращение. Появление призрака пробудило только это чувство. Но, будучи призраком, он был и человеком – мучительное осложнение. У привидения была человеческая душа. Он был человеком в большей мере, быть может, чем кто бы то ни было, ибо двойственная судьба его воплощала в себе все человечество. Однако, являясь выразителем человечества, он все же чувствовал себя вне его.</p><p class="p1">Какое-то неодолимое противоречие крылось в самой его судьбе. Кем был он? Обездоленным бродягой? Нет, ведь он оказался лордом. Кем он стал? Лордом? Нет, ведь он мятежник. Он был светоносцем и грозным нарушителем общественного спокойствия. Правда, не сатана, но Люцифер. Он явился как зловещее привидение с факелом в руке.</p><p class="p1">Зловещее для кого? Для зловещих. Грозное для кого? Для грозных. Потому-то они и отвергли его. Находиться в их среде? Быть допущенным в нее? Никогда! Препятствие, каким являлось его лицо, было ужасно, препятствие, каким были мысли, оказалось необоримым. Его речь казалась еще более отталкивающей, чем его лицо. Его понятия были несовместимы с понятиями того особого мира знатных и могущественных людей, где он по роковой случайности родился и откуда его изгнала другая роковая случайность. Между людьми и его лицом стояла преградой маска смеха, а между высокородным обществом и его образом мыслей высилась стена. Бродячий фигляр, с детства сроднившийся с живучей, крепкой средою, которую называют простонародьем, вобравший в себя магнитные токи бесчисленных людских толп, насквозь пропитавшийся всеми стремлениями необъятной души человечества, он чувствовал себя частицей его угнетенных масс и не мог смотреть на мир глазами господствующих классов. Ему не было места наверху общественной лестницы. Он поднялся из колодца Истины и все еще был покрыт ее влагой. От него исходило зловоние омута. Он внушал отвращение этим вельможам, благоухающим ложью. Тому, кто живет обманом, истина кажется смрадной. Того, кто жаждет лести, тошнит от правды, если ему нечаянно придется отведать ее. Все, что принес с собой Гуинплен, было неприемлемо для лордов. Что же он принес с собою? Разум, мудрость, справедливость. Они с гадливостью оттолкнули его.</p><p class="p1">В палате заседали епископы. Он был неугоден их богу. Кто он такой, этот непрошенный гость?</p><p class="p1">Противоположные полюсы взаимно отталкиваются. Соединить их невозможно. Переходных ступеней нет между ними. Читатель видел, к какому взрыву глумящегося хохота привела страшная очная ставка людских страданий, сосредоточенных в одном человеке, с высокомерием и гордостью, сосредоточенными в касте.</p><p class="p1">Обвинять бесполезно. Достаточно установить факт. И Гуинплен, размышляя в эту трагическую для него минуту, понял глубочайшую бесполезность своих усилий, понял глухоту представителей знати. Привилегированные слои общества глухи к воплям обездоленных. Виновны ли они в этом? Нет. К сожалению, это закон их существования. Простим им это. Если бы их тронул голос несчастных, им пришлось бы отказаться от своих привилегий. От принцев и вельмож нечего ждать хорошего. Тот, кто всем удовлетворен, – неумолим. Сытый голодного не разумеет. Баловни счастья ничего не хотят знать, они отгородились от несчастных. На пороге их рая, так же как на вратах ада, следовало бы написать: «Оставь надежду навсегда».</p><p class="p1">Гуинплена встретили так, как встретили бы призрак, явившийся в чертоги богов.</p><p class="p1">Гнев закипал в нем при этом воспоминании. Нет, он не призрак, он человек. Он говорил им это, он кричал им, что он Человек.</p><p class="p1">Он не был привидением. Он был трепещущей плотью. У него был мозг, и мозг этот мыслил; у него было сердце, и сердце это любило; у него была душа, и он надеялся. В том-то и состояла его ошибка, что он надеялся понапрасну.</p><p class="p1">Увы, он до того увлекся надеждами, что поверил в блестящий и таинственный мир, имя которому – общество. Он, которого когда-то вышвырнули из общества, решился вернуться в него.</p><p class="p1">И общество сразу же поднесло ему три своих дара: брак, семью и сословие. Брак? На пороге брака он столкнулся с развратом. Семья? Брат дал ему пощечину и ждал его завтра с оружием в руке. Сословие? Оно только что хохотало ему в лицо, ему, патрицию, ему, отверженному! Оно изгнало его, едва успев принять. Он ступил только три шага в глубоком мраке, каким оказалось это общество, а под его ногами уже разверзлось три бездны.</p><p class="p1">Его несчастье началось с предательского превращения. Катастрофа подкралась к нему под видом апофеоза! «Подымайся!» означало «Падай!»</p><p class="p1">Он был своего рода противоположностью Иову: источником его бедствий оказалось его благоденствие.</p><p class="p1">О трагическая загадка человеческой судьбы! Сколько козней скрывается в ней! Ребенком он боролся с ночью и одолел ее. Став взрослым, он боролся с выпавшим ему жребием и одержал над ним верх. Из урода сделался существом, окруженным сиянием славы, из несчастного – счастливцем. Место своего изгнания он превратил в свой приют. Бродяга, он преодолевал пространство и, подобно птицам небесным, скитаясь, находил себе пропитание. Нелюдим, он померился силами с толпой и завоевал ее расположение. Атлет, он боролся с народом, с этим львом, и лев стал его другом. Неимущий, он боролся с нуждою; став лицом к лицу с суровой необходимостью добывать себе хлеб насущный и умудряясь даже нищету сочетать с сердечными радостями, он превратил свою бедность в богатство. Он имел право считать себя победителем жизни. И вдруг из неведомой глубины перед ним возникли новые враждебные силы – на этот раз уже не грозные, а ласковые и льстивые; ему, охваченному чистой любовью, предстала чувственная, хищная любовь; он, живший идеалом, оказался во власти плотских вожделений; он услышал слова страсти, походившие на яростные вопли; он испытал женские объятия, напоминавшие змеиные кольца, свет истины сменился очарованием лжи, ибо правда не плоть, а душа. Плоть – зола, душа – пламя. Горсть людей, связанных с ним узами бедности и труда и составлявших его настоящую семью, заменила семья кровных родственников, хотя и смешанной крови, и, едва вступив в эту семью, он сразу очутился лицом к лицу с призраком братоубийства. Увы, он позволил ввести себя в то самое общество, о котором Брантом (впрочем, Гуинплен и не читал его) писал: «Сын может вызвать отца на дуэль, и это считается в порядке вещей». Роковая судьба крикнула ему: «Ты не принадлежишь к толпе, ты принадлежишь к сонму избранных!» – и распахнула у него над головой, точно врата на небо, свод общественного здания; втолкнув его в это отверстие, она заставила его нежданным и грозным видением появиться среди сильных мира сего.</p><p class="p1">И вдруг, вместо простого люда, рукоплескавшего ему, он увидал вельмож, осыпавших его проклятиями. Печальная перемена. Постыдное возвышение. Внезапная гибель всего, что составляло его счастье. Дикая травля, крушение всей его жизни. Удары орлиных клювов, рвавших на части Гуинплена, Кленчарли, лорда, фигляра, его прошлое и его будущее.</p><p class="p1">Стоило ли одолевать препятствия в начале жизненного пути? Стоило ли одерживать победу? Увы, ему суждено было быть ниспровергнутым, чтобы завершилась его судьба.</p><p class="p1">Итак, отчасти подчиняясь насилию, отчасти по доброй воле (ведь после жезлоносца ему пришлось иметь дело с Баркильфедро, и переезд в палату лордов совершился не без его, Гуинплена, согласия), он променял действительность на химеру, истину на ложь, Дею на Джозиану, любовь на тщеславие, свободу на могущество, гордый честный труд на богатство и связанную с ним тяжкую ответственность, сумрак, укрывающий божество, на адское пламя, где обитают демоны, рай на Олимп!</p><p class="p1">Он вкусил от золотого плода, и во рту у него остался пепел.</p><p class="p1">Скорбный итог! Разгром, банкротство, падение, гибель, поругание всех надежд, уничтоженных злобным смехом, беспредельное отчаяние. Что делать теперь? Что сулит ему завтрашний день? Острие обнаженной шпаги, направленной в его грудь рукою брата. Он видел только ужасный блеск этой шпаги. Остальное – Джозиана, палата лордов – все было позади в чудовищном полумраке, полном трагических теней.</p><p class="p1">А этот брат, показавшийся ему таким отважным, таким рыцарски благородным! Увы, этот Том-Джим-Джек, защищавший Гуинплена, этот лорд Дэвид, вступившийся за лорда Кленчарли, мелькнул перед ним лишь на одно короткое мгновение, успев только внушить любовь к себе и дать ему пощечину.</p><p class="p1">Сколько горестных событий!</p><p class="p1">Идти дальше было некуда: все вокруг рухнуло. Да и к чему? Отчаяние лишает человека последних сил.</p><p class="p1">Опыт был сделан, и повторять его было незачем.</p><p class="p1">Гуинплен оказался игроком, сбросившим один за другим свои козыри. Он позволил заманить себя в страшный игорный дом. Не отдавая себе отчета в своих поступках, ибо таков тонкий яд обольщений, он поставил на карту Дею против Джозианы – и выиграл чудовище. Поставил Урсуса против семьи – и выиграл бесчестье. Поставил подмостки фигляра против скамьи лорда – и вместо восторженных криков услыхал проклятия.</p><p class="p1">Последняя его карта упала на роковой зеленый ковер опустевшей ярмарочной площади. Гуинплен проиграл. Оставалось одно – расплатиться. Расплачивайся же, несчастный!</p><p class="p1">Пораженные молнией не двигаются. Гуинплен как будто оцепенел. Всякий, кто издали увидал бы его, застывшего неподвижно у края парапета, подумал бы, что это каменное изваяние.</p><p class="p1">Ад, змея и человеческая мечта могут образовать замкнутый круг. Гуинплен все глубже и глубже погружался в мрачное раздумье.</p><p class="p1">Он мысленно окинул только что представшее ему общество холодным прощальным взглядом.</p><p class="p1">Брак без любви, семья без братской привязанности, богатство без совести, красота без целомудрия, правосудие без справедливости, порядок без равновесия, могущество без разума, власть без права, блеск без света. Беспощадный итог! Он мысленно перебрал все проносившиеся перед его взором видения. Последовательно подверг оценке свою судьбу, свое положение, общество и самого себя. Чем была для него судьба? Западней. Его положение? Отчаянием. Общество? Ненавистью. А он сам? Побежденным. В глубине души он воскликнул: «Общество – мачеха, природа – мать. Общество – это мир, в котором живет наше тело, природа – мир нашей души. Первое приводит человека к гробу, к сосновому ящику в могиле, к червям и на том и кончается. Вторая ведет к вольному полету, к преображению в лучах зари, к растворению в беспредельности, где сияют звезды и не иссякает жизнь».</p><p class="p1">Мало-помалу Гуинпленом овладевал вихрь скорбных мыслей. Все, с чем мы расстаемся перед смертью, предстает нам, словно при вспышке молнии.</p><p class="p1">Кто судит, тот сопоставляет. Гуинплен сравнил то, что дало ему общество, с тем, что дала ему природа. Как она была добра к нему! Как она поддерживала его, как помогала ему! Все было отнято у него – все, вплоть до лица; природа все возвратила ему – все, даже лицо, ибо на земле жил слепой ангел, созданный нарочно для него, не видевший его безобразия и разгадавший его красоту.</p><p class="p1">И он позволил разлучить себя со всем этим! Он покинул восхитительное существо, сердце, сроднившееся с ним, нежную любовь, божественный слепой взор, единственный взор, сумевший его разглядеть! Дея была его сестрой, ибо он чувствовал между собой и ею те высокие братские узы, ту тайну, в которой заключено все небо. С детских лет Дея была его невестой, ибо каждый ребенок имеет такую избранницу, и жизнь всегда начинается чистым союзом двух непорочных душ, двух маленьких невинных существ. Дея была его супругой, ибо у них на самой вершине высокого дерева Гименея было свое гнездо. Больше того, Дея была его светом: без нее все казалось небытием и пустотой, и он видел ее окруженною лучезарным сиянием. Как жить без Деи? Что делать ему с собой? Без нее все в нем было мертво. Как же мог он потерять ее из виду хотя бы на мгновение? О, несчастный! Он позволил себе уклониться от своей путеводной звезды, а там, где действуют грозные, неведомые силы притяжения, всякое уклонение сразу влечет в бездну. Куда же закатилась его звезда? Дея! Дея! Дея! Дея! Увы! Он потерял свое светило. Удалите заезды с неба, – что останется от него? Сплошной мрак. Но почему же все это исчезло? О, как он был счастлив! Бог создал для него рай, вплоть до того, что впустил туда и змия! Но на этот раз искушению подвергся мужчина. Его похитили оттуда, и он попал в страшную западню, в адский хаос мрачного хохота. Горе! Горе! Как ужасно было все то, что околдовало его! Что такое эта Джозиана? Страшная женщина, не то зверь, не то богиня! Из пропасти, куда его низвергли, Гуинплен видел теперь оборотную сторону того, что недавно так ослепляло его. Это было отвратительное зрелище. Знатность оказалась уродливой, корона отвратительной, пурпурная мантия мрачной, стены дворцов насквозь пропитанными ядом, трофеи, статуи, гербы – фальшивыми; в самом воздухе было что-то нездоровое, что-то предательское, способное свести с ума. О, как великолепны были лохмотья фигляра Гуинплена! Как вернуть теперь «Зеленый ящик», бедность, радость, счастливую бродячую жизнь вместе с Деей, похожую на жизнь ласточек? Они не расставались друг с другом, встречались ежеминутно, вечером, утром, за столом касались друг друга локтями, коленями, пили из одного стакана. Солнце заглядывало в окошко, но оно было только солнцем, Дея же была любовью. Ночью они чувствовали, что спят почти рядом, и сновидения Деи витали над Гуинпленом, а сновидения Гуинплена реяли над Деей! Пробуждаясь, они не могли поручиться, что не обменялись поцелуями в голубой дымке сонных грез. Вся невинность была воплощена в Дее, вся мудрость – в Урсусе. Они переходили из города в город, напутствуемые и поддерживаемые неподдельным весельем любившего их народа. Они были странствующими ангелами, в достаточной мере людьми, чтобы ступать по земле, и недостаточно крылатыми, чтобы улететь на небо. А теперь все исчезло. Куда? Неужели они скрылись бесследно? Каким могильным ветром унесло их? Они поглощены мраком, потеряны безвозвратно. Увы! Неумолимые деспоты, угнетающие малых людей, имеют в своем распоряжении все темные силы и способны на все. Что сделали с ними? И его не было тут, чтобы заступиться за них, чтобы заслонить их грудью, защитить своим титулом лорда, своей знатностью и шпагой, своими кулаками фигляра! И вдруг ему в голову пришла горькая мысль, быть может, самая горькая из всех. Нет, он не мог бы их защитить. Именно он был причиной их гибели. Ведь только для того, чтобы уберечь его, лорда Кленчарли, от них, чтобы оградить его достоинство от соприкосновения с ними, на них и обрушился всей своей гнусной тяжестью полновластный общественный произвол. Лучшим средством защитить их было бы для Гуинплена исчезнуть, тогда отпали бы все поводы их преследовать. Не будь его, их оставили бы в покое. Это леденящее душу открытие придало новый оборот его мыслям. О, почему он позволил разлучить себя с Деей? Разве его первым долгом не было охранять Дею? Служить народу и защищать его? Но разве Дея не воплощение народа? Дея – сирота, слепая, само человечество! Ах, что сделали с ними? Жгучее, мучительное сожаление! Катастрофа разразилась только потому, что его не было с ними. Иначе он разделил бы их участь: он увел бы их с собою, либо погиб бы с ними вместе. Что станется с ним теперь? Разве может существовать Гуинплен без Деи? С ее утратой потеряно все. Ах, все кончено! Эта горсточка любимых, родных людей пропала безвозвратно. Наступил конец всему. Зачем теперь ему продолжать борьбу, если он осужден и отвержен? Нечего больше ждать ни от людей, ни от неба. Дея! Дея! Где Дея? Потеряна! Неужели потеряна? Тот, кто утратил душу, может снова обрести ее лишь в смерти.</p><p class="p1">В скорбном волнении Гуинплен положил руку на парапет, как бы найдя решение, и посмотрел на реку.</p><p class="p1">Он не спал уже третью ночь. Его била лихорадка. Мысли, казавшиеся ему ясными, в действительности были смутны. Он испытывал неодолимую потребность уснуть.</p><p class="p1">Несколько мгновений стоял он, наклонившись над водой; черная гладь сулила ему спокойное ложе, вечное забвение… Страшный соблазн.</p><p class="p1">Он снял с себя кафтан и положил его на парапет, затем расстегнул камзол; когда он начал снимать его, рука наткнулась на какой-то предмет, лежавший в кармане. Это была красная книжечка, которую ему вручил «библиотекарь» палаты лордов. Он вынул книжечку из кармана, посмотрел на нее три тусклом свете, нашел карандаш и написал на первой чистой странице следующие две строки: «Я ухожу. Пусть мой брат Дэвид займет мое место и будет счастлив». И подписал: «Фермен Кленчарли, пэр Англии».</p><p class="p1">Затем он снял камзол и положил его на кафтан. Снял шляпу и положил ее на камзол; записную книжку, открытую на той странице, где сделал надпись, он положил в шляпу. Увидев на земле камень, он поднял его и тоже положил в шляпу.</p><p class="p1">Потом посмотрел вверх, в беспредельный мрак, расстилавшийся над ним.</p><p class="p1">Голова его медленно поникла, как будто его тянула в пучину незримая нить.</p><p class="p1">В нижней части парапета было отверстие; он вставил в него ногу, чтобы опереться коленом на парапет, и теперь ему оставалось только броситься вниз.</p><p class="p1">Заложив руки за спину, он подался вперед.</p><p class="p1">– Да будет так, – промолвил он.</p><p class="p1">И устремил взор на воду.</p><p class="p1">В эту минуту он почувствовал, что кто-то лижет ему руки.</p><p class="p1">Он вздрогнул и обернулся.</p><p class="p1">Перед ним был Гомо.</p></span></span></span></span>
