<p class="p">II. La creatura bella bianco vestita<a href="ch2.xhtml#id82" class="a">[150]</a></p>
</div><p class="p1">Когда Квазимодо увидел, что келья опустела, что цыганки там нет, что ее похитили в то время, как он защищал ее, он схватился за голову руками и затопал ногами от неожиданности и горя. Затем он бросился искать по всей церкви цыганку, испуская страшные крики во всех углах, усеивая своими рыжими волосами пол. Это как раз совпало с той минутой, когда королевские стрелки, восторжествовав, вступили в собор, также разыскивая цыганку. Квазимодо помогал им, не подозревая, бедняга, их коварного намерения: он принимал бродяг за врагов цыганки. Он сам проводил Тристана по всем закоулкам, где бы можно было скрыться, отворял ему все потайные двери, двойные ниши алтарей и ризниц. Если бы несчастная была там, он сам бы предал ее.</p><p class="p1">Когда, наконец, Тристан устал искать без результата, – а он вообще не скоро уставал, – Квазимодо продолжал свои поиски один. Он двадцать раз, сто раз обегал церковь вдоль и поперек, сверху донизу, взбираясь и сбегая по лестницам, зовя, крича, суя голову во все дыры, освещая факелом каждый свод, не помня себя, доходя до помешательства. Самец, потерявший свою самку, не мог бы рычать страшнее, метаться отчаяннее.</p><p class="p1">Наконец, когда он окончательно убедился, что Эсмеральды нет, что все кончено, что ее похитили, он медленно поднялся на башню по той самой лестнице, по которой в таком восторге и с таким торжеством он нес ее в тот день, когда спас. Он прошел по тем же местам, опустив голову, без голоса, без слез, почти не дыша. Собор снова опустел и погрузился в тишину. Стрелки покинули его, чтобы устроить облаву на колдунью в Сите.</p><p class="p1">Оставшись один в этих обширных стенах, столь шумных еще несколько минут тому назад, Квазимодо снова пошел в келью, где Эсмеральда спала столько ночей под его охраной.</p><p class="p1">Подходя к келье, он воображал, что, может быть, найдет в ней свою цыганку. Когда на повороте галереи, выходящей на наклонную кровлю, он увидал узенькую келейку с маленьким окошечком и дверцей, приютившуюся под сводом, как гнездышко под веткой, бедняга не выдержал и должен был прислониться к колонне, чтобы не упасть. Он вообразил, что Эсмеральда, может быть, вернулась к себе, что какой-нибудь добрый гений привел ее туда обратно, что келейка слишком спокойна, надежна и уютна, чтоб она ушла из нее, и не смел сделать ни шагу, боясь нарушить иллюзию.</p><p class="p1">– Да, – говорил он себе, – она, быть может, спит или молится. Не надо ей мешать.</p><p class="p1">Наконец, собрав все силы, он на цыпочках подкрался к двери, заглянул через нее и вошел в келью. Никого! Келья по-прежнему была пуста. Бедный глухой медленно обошел ее, приподнял матрац и посмотрел под него, будто Эсмеральда могла скрываться под ним, затем покачал головой и остановился, не зная, что делать.</p><p class="p1">Вдруг он яростно потушил факел ногой и, не говоря ни слова, не вздохнув, со всего размаху хватился головой об стену и упал без сознания на пол. Придя в себя, Квазимодо бросился на постель и, катаясь по ней, бешено целовал еще теплое место, где спала девушка. Несколько минут он пролежал неподвижно, будто готовясь испустить дух, затем встал, весь обливаясь потом, задыхаясь и теряя способность рассуждать. Он начал биться об стену головой с ужасающей размеренностью языка в колоколе и решимостью человека, стремящегося разбиться насмерть. Наконец, потеряв силы, он вторично упал. Он на коленях выполз из кельи и присел против двери в позе, выражающей удивление. Квазимодо просидел так больше часу, без движения, не спуская глаз с опустевшей кельи, смотря на нее задумчивее и мрачнее, чем мать, сидящая между опустевшей кроваткой и наполнившимся гробиком. Он не проронил ни слова; только через долгие промежутки рыдание потрясало его тело, но то было рыдание без слез, как летняя зарница, при которой не бывает грома.</p><p class="p1">По-видимому, в эту минуту, раздумывая в своем отчаянии, кто мог так неожиданно похитить девушку, он вспомнил об архидьяконе. Он припомнил, что один только Клод имел ключ от лестницы, которая вела в келью. Ему вспомнились ночные нападения на девушку: первому из них он, Квазимодо, содействовал, а второму помешал. Он припомнил множество подробностей, и ему стало ясно, что один только архидьякон мог похитить цыганку. Однако таково было его уважение к священнику, так укоренились в его сердце любовь и преданность к этому человеку, что эти чувства даже в эту минуту боролись с когтями ревности и отчаяния.</p><p class="p1">Он думал, что это дело архидьякона, и непримиримая кровавая ненависть, которую он почувствовал бы ко всякому другому, будучи направлена на Клода Фролло, заменилась только еще более обострившеюся горестью.</p><p class="p1">В ту минуту, как его мысль сосредоточилась на священнике, а заря начала освещать своды, Квазимодо вдруг увидел на верхнем этаже собора, у поворота наружной балюстрады, окружавшей хоры, двигавшуюся человеческую фигуру. Она направлялась в его сторону. Он узнал ее. Это был архидьякон. Клод шел медленной, тяжелой походкой, не глядя перед собой. Он направлялся к северной башне, но лицо его было обращено в сторону правого берега Сены, и он держал голову высоко, будто силясь рассмотреть что-то поверх крыш. Сова часто так поглядывает искоса. Она летит к одной точке, а смотрит на другую. Священник прошел над головой Квазимодо, не заметив его.</p><p class="p1">Глухой, окаменев при его внезапном появлении, смотрел ему вслед, пока тот не скрылся за дверью лестницы в северную башню. Читатель знает, что из этой башни открывался вид на ратушу. Квазимодо встал и пошел следом за архидьяконом. Он взобрался по башенной лестнице, чтобы узнать, зачем Клод туда поднимается. Бедняга-звонарь совершенно не сознавал, что он станет делать, что скажет, вообще чего он хочет. Он был полон ярости и страха. В его сердце архидьякон столкнулся с цыганкой.</p><p class="p1">Дойдя до вершины башни, прежде чем выступить из мрака лестницы на площадку, Квазимодо осторожно взглянул, где священник.</p><p class="p1">Тот стоял, обернувшись к нему спиной. Вокруг площадки на колокольне шла ажурная балюстрада. Священник, устремив взгляд на город, опирался грудью на ту из сторон балюстрады, которая выходила к мосту Богоматери. Бесшумно двигаясь за ним, Квазимодо стал наблюдать, на что он смотрит. Внимание священника было так поглощено, что он даже не услыхал за спиной шагов глухого.</p><p class="p1">Чудную и прелестную картину представляет собой Париж, а особенно Париж того времени, с башен собора Богоматери при первых лучах летней зари. Стоял июль месяц. Небо было совершенно чисто. Несколько запоздавших звездочек угасали в разных местах, а одна, очень яркая, сверкала на востоке, где небо было всего светлее. Солнце должно было появиться с минуты на минуту. Париж начинал просыпаться. При ярком чистом свете все очертания домов на восточной стороне особенно ясно рисовались в воздухе. Гигантская тень от колокольни протягивалась по крышам от одного края города до другого. В некоторых кварталах уже слышались шум и говор. Тут раздавался звон колокола, там удар молота, там дребезжание проезжавшей тележки. Уже кое-где, на пространстве всех этих крыш, из труб, будто из трещин огромного вулкана, начинали подниматься струйки дыма. Река, разбивающая свои волны о быки стольких мостов, о мысы стольких островов, вся сверкала серебристой рябью. За стенами города взор терялся в большом круге клочковатого тумана, через который проглядывали неясные линии равнин и грациозный изгиб холмов. Над этим полупроснувшимся городом носились самые разнородные звуки. На востоке утренний ветерок гнал легкие, как вата, облачка, оторванные от туманной пелены, окутывавшей холмы.</p><p class="p1">Несколько городских кумушек, стоя на соборной паперти с кувшинами для молока в руках, удивленно рассматривали разрушенные двери собора и застывшие в углублениях песчаника свинцовые ручьи. Это были единственные следы, оставшиеся от ночного переполоха. Костер, разведенный Квазимодо между башнями, погас. Тристан уже очистил площадки, велев побросать убитых в реку. Короли, подобные Людовику XI, заботятся о том, чтобы после кровопролития улицы были быстро вымыты. С внешней стороны балюстрады, как раз под тем местом, где остановился священник, приходилась одна из тех каменных сточных труб причудливого рисунка, которыми покрыты готические здания, а в одной из трещин трубы две цветущие гвоздики, колеблемые ветерком, точно живые, приветствовали друг друга, кивая головками. Над башнями, высоко в небе, слышалось щебетание птиц.</p><p class="p1">Но священник ничего этого не слышал и не видел. Он был одним из тех людей, для которых не существует ни утра, ни птиц, ни цветов. На этом обширном горизонте, представлявшем столько разнообразия вокруг него, одна только точка поглощала все его внимание.</p><p class="p1">Квазимодо сгорал нетерпением спросить у него, куда он девал цыганку. Но архидьякон, казалось, перенесся в эту минуту в другой мир. Он, видимо, переживал одну из тех тяжелых минут, когда человек не заметил бы, если бы под ним разверзлась земля. Неизменно устремив глаза на одну точку, он стоял неподвижно и безмолвно, и в этой неподвижности и в этом молчании было что-то настолько ужасное, что дикий звонарь трепетал и не решался их нарушить. Он мог только косвенно предложить вопрос архидьякону, глазами проследить за направлением пристального взгляда священника. Несчастный глухой так и поступил, и взгляд его упал на Гревскую площадь.</p><p class="p1">И он увидал то, на что смотрел священник. К виселице, постоянно стоявшей там, была приставлена лестница. На площади была кучка народа и очень много солдат. Какой-то человек тащил по земле что-то белое, за что цеплялось что-то черное. Этот человек остановился у подножия виселицы.</p><p class="p1">Тут произошло что-то, чего Квазимодо не мог уже рассмотреть, не потому, что его единственный глаз потерял свою зоркость, но оттого, что толпа солдат заслоняла от него происходившее. К тому же в эту минуту показалось солнце, и с горизонта хлынула волна такого ослепительного света, что все выдающиеся точки Парижа – шпили, трубы, колокольни – словно вспыхнули одновременно.</p><p class="p1">Между тем человек начал подниматься по лестнице. И тогда Квазимодо снова ясно увидал его. Он нес на плече женщину – молодую девушку – всю в белом. На шею девушки была накинута петля. Квазимодо узнал эту девушку. Это была она. Человек дошел до последней ступени. Здесь он стал затягивать узел. В эту минуту священник, чтобы лучше видеть, стал на колени на балюстраду.</p><p class="p1">Вдруг человек резким движением ноги оттолкнул лестницу, и Квазимодо, который уже несколько мгновений не дышал, увидел, как на конце веревки, в двух саженях над мостовой, закачалось тело несчастной девушки, на плечи которой вскочил человек. Веревка несколько раз перекрутилась в воздухе, и Квазимодо увидал, как по телу цыганки пробежали страшные судороги. Священник также, с выкатившимися из орбит глазами, вытянув шею, смотрел на эту ужасную группу, на человека и девушку, – на паука и муху.</p><p class="p1">В самый страшный момент этой сцены смех – сатанинский, нечеловеческий – исказил помертвевшее лицо священника. Квазимодо не слыхал этого смеха, но видел его.</p><p class="p1">Звонарь попятился на несколько шагов за спиной архидьякона и вдруг, яростно устремившись на него, своими могучими руками толкнул его сзади в пропасть, нагнувшись над которой стоял dom Клод.</p><p class="p1">– Проклятие!.. – вскрикнул тот и полетел вниз.</p><p class="p1">Водосток, над которым он стоял, приостановил его падение. Он в отчаянии схватился за него руками, и в то мгновение, как он открыл рот, чтобы закричать вторично, он увидал высунувшееся над собой из-за балюстрады страшное лицо Квазимодо, дышавшее мщением. Тогда он умолк.</p><p class="p1">Под ним зияла пропасть. До мостовой было более двухсот футов.</p><p class="p1">В этом ужасном положении архидьякон не произнес ни слова, не издал ни единого стона. Он только извивался, держась за водосток и употребляя неимоверные усилия, чтобы снова подняться на балюстраду. Но руки скользили по граниту, ноги напрасно царапали почерневшую стену, ища, за что зацепиться. Лица, всходившие на башни собора Богоматери, знают, что непосредственно под балюстрадой – каменный откос. На этом-то откосе и старался удержаться несчастный архидьякон. Он имел дело не с отвесной стеной, а со стеной, убегавшей из-под его ног.</p><p class="p1">Стоило Квазимодо только протянуть руку, и он мог бы вытащить Клода из пропасти, но горбун даже не смотрел на него. Он смотрел на площадь. Он смотрел на виселицу. Он смотрел на цыганку.</p><p class="p1">Глухой оперся о балюстраду на том самом месте, где за минуту перед тем был священник. Не сводя взора с единственного явления, существовавшего для него в эту минуту, он стоял неподвижно, не произнося ни звука, как человек, пораженный громом, и слезы ручьем лились из его единственного глаза, пролившего до сих пор лишь одну слезу.</p><p class="p1">Архидьякон между тем тяжело переводил дух. С его лысого лба пот катился градом, ногти пятнили кровью камень, колени обдирались о стену. Он чувствовал, как его сутана, зацепившаяся за трубу, трещала и рвалась при каждом его усилии. К довершению несчастий, труба оканчивалась свинцовым желобом, гнувшимся под тяжестью его тела. Архидьякон чувствовал, что желоб медленно сгибается. Несчастный сознавал, что, как только его руки откажутся служить ему, как только сутана разорвется, а свинец согнется, ему придется упасть, и ужас леденил его до мозга костей. Иногда он с помутившимися мыслями поглядывал на подобие узенькой площадки, которую футах в десяти пониже образовало какое-то архитектурное украшение, и от всей своей измученной души молил небо дать ему окончить жизнь на этом пространстве в два квадратных фута, хотя бы ему пришлось пробыть на нем сто лет. Один раз он взглянул вниз – на площадь, в пропасть. Когда он поднял голову, глаза его были закрыты и волосы стояли дыбом.</p><p class="p1">Было что-то ужасное в молчании этих двоих людей. Между тем как архидьякон мучился в нескольких шагах от Квазимодо, звонарь плакал, глядя на Гревскую площадь.</p><p class="p1">Архидьякон, видя, что все его усилия только колеблют его ненадежную опору, решил больше не шевелиться. Он обхватил водосток, едва переводя дух, не шевелясь, без всякого другого движения, кроме судорожного сокращения мускулов живота, которое испытываешь во сне, когда кажется, что падаешь. Его неподвижные глаза были болезненно расширены, как бы от удивления. Однако почва мало-помалу начинала уходить из-под него; его пальцы скользили по трубе. Он все более и более чувствовал увеличивавшуюся слабость рук и тяжесть своего тела. Свинцовая труба, поддерживавшая его, с каждой минутой все больше сгибалась, наклоняясь к бездне.</p><p class="p1">Он видел под собой ужасное зрелище: кровлю церкви Сен-Жан-ле-Рон, которая казалась ему маленькой, как пополам согнутая карта. Он смотрел поочередно на все бесстрастные изваяния, украшавшие башни и висевшие, как он, над бездной, но не испытывавшие ни ужаса за себя, ни жалости к нему. Все вокруг него было из камня: перед его глазами – чудовища с раскрытыми пастями, внизу, в глубине, – мостовая, над головой – плачущий Квазимодо.</p><p class="p1">На площадке перед собором собралось несколько любопытных, преспокойно рассуждавших, какой безумец нашел себе такую странную забаву. Священник слышал, как они говорили, – звук их голосов ясно долетал до него: «Да он себе сломает шею!»</p><p class="p1">Квазимодо плакал.</p><p class="p1">Наконец архидьякон, полный бешенства и ужаса, понял, что все бесполезно. Однако он собрал остаток своих сил для последнего усилия. Он привстал на желобе, оттолкнулся от стены коленями, зацепился руками за щель в камнях и успел вскарабкаться приблизительно на один фут. Но от этого резкого движения свинцовая труба вдруг согнулась крючком. В ту же минуту сутана разорвалась сверху донизу. Тогда, чувствуя, что у него нет уже опоры снизу, что его поддерживают только немеющие руки, несчастный закрыл глаза и выпустил из рук желоб. Он упал.</p><p class="p1">Квазимодо смотрел, как он падает.</p><p class="p1">Падение с такой высоты редко бывает совершенно отвесным. Полетев в пространство, архидьякон сначала падал головой вниз с распростертыми руками, затем несколько раз перевернулся в воздухе. Ветер отнес его на крышу одного из домов, о которую несчастный ударился. Однако он был еще жив, когда упал на эту крышу. Звонарь видел, как он еще пытался удержаться за конек ногтями. Но плоскость была слишком поката, и у него не хватило сил. Он быстро покатился с крыши, как оторвавшаяся черепица, и грохнулся о мостовую. Тут он уже не шевелился.</p><p class="p1">Тогда Квазимодо поднял свой взор на цыганку, тело которой качалось на виселице и подергивалось под белой одеждой в последних судорогах. Затем он взглянул вниз на архидьякона, лежавшего у основания башни и уже потерявшего всякий человеческий образ, и проговорил с рыданием, вырвавшимся из глубины души:</p><p class="p1">– Вот все, что я любил!</p></span><span id="id71"><div class="title6">
<p class="p">III. Женитьба Феба</p>
</div><p class="p1">Под вечер этого же дня, когда епископские пристава подняли на площади изувеченный труп архидьякона, Квазимодо исчез из собора Богоматери.</p><p class="p1">Об этом происшествии ходили разные слухи. Никто не сомневался, что наступил тот день, когда, в силу их договора, дьявол, то есть Квазимодо, должен был унести Клода Фролло, то есть колдуна. Предполагали, что он разбил тело, чтобы унести душу, подобно тому как обезьяны разбивают скорлупу, чтобы съесть орех.</p><p class="p1">Поэтому архидьякона не похоронили в освященной земле.</p><p class="p1">Людовик XI умер годом позже, в августе 1483 года.</p><p class="p1">Что касается Пьера Гренгуара, то ему удалось спасти козочку и он добился успеха как драматург. По-видимому, попытав свои силы в астрологии, философии, архитектуре и герметике, – словом, во всех безумствах, – он вернулся к трагедии, самой безумной из них всех. Он называл это «трагическим концом». Вот что мы читаем о его драматических успехах в 1483 году в отчетах городского управления: «Уплачено Жеану Маршену и Пьеру Гренгуару, плотнику и сочинителю, сочинившим и поставившим мистерию, представленную в парижском Шатлэ по случаю въезда господина легата, на вознаграждение действующих лиц, на снабжение их костюмами, как того требовала мистерия, а также за сооружение необходимых подмостков, за все – сто ливров».</p><p class="p1">Феб Шатопер тоже «кончил трагически» – он женился.</p></span><span id="id72"><div class="title6">
<p class="p">IV. Женитьба Квазимодо</p>
</div><p class="p1">Мы только что говорили, что Квазимодо исчез из собора Богоматери в день смерти цыганки и архидьякона. Его действительно больше не видали; никто не знал, что с ним сталось.</p><p class="p1">В ночь после казни Эсмеральды палачи сняли ее тело с виселицы и, по обычаю, отнесли его в монфоконский склеп.</p><p class="p1">Монфокон, по словам Соваля, «был самой древней и самой великолепной виселицей во всем королевстве». Между предместьями Тампль и Сен-Мартен, саженях в ста шестидесяти от стен Парижа, на расстоянии нескольких выстрелов из арбалета, на вершине пологого холма, поднимавшегося незаметно, но достаточно высокого, чтобы быть видимым на несколько лье в окружности, возвышалось здание странной формы, несколько похожее на кельтский кромлех, где также приносились человеческие жертвы.</p><p class="p1">Представьте себе на вершине известковой насыпи большой параллелепипед, сложенный из камней высотою в пятнадцать, шириною в тридцать, длиною в сорок футов, с дверью, наружным карнизом и площадкой наверху. На площадке возвышаются шестнадцать огромных столбов из неотесанного камня, высотою в тридцать футов, огибающих колоннадой три стороны массивного сооружения, служащего основанием и связанного наверху крепкими балками, с которых на известных промежутках спускаются цепи. На этих цепях висят скелеты. В окрестности, на равнине, – каменный крест и две второстепенные виселицы, кажущиеся двумя разветвлениями центральной виселицы. Над всем этим вечно кружатся стаи воронов. Вот каков Монфокон!</p><p class="p1">В конце пятнадцатого века огромная виселица, выстроенная в 1328 году, уже пришла в ветхость. Балки подгнили, цепи заржавели, столбы покрылись зеленой плесенью. Фундамент из тесаного камня весь расселся, и площадка, на которую уже не ступала человеческая нога, поросла травой.</p><p class="p1">Этот памятник вырисовывался страшным силуэтом на горизонте, особенно ночью, когда луна слабо освещала эти белые черепа или северный ветер задевал цепи и скелеты и раскачивал их в ночном полумраке. Этой одной виселицы было достаточно, чтобы придать всей окрестности зловещий вид.</p><p class="p1">Каменное здание, служившее основанием отвратительному сооружению, было пусто внутри. Там был устроен обширный склеп, запиравшийся старой, еле державшейся решеткой. В этот склеп бросали не только куски человеческих тел, спадавшие с цепей Монфокона, но также и тела всех несчастных, казненных на прочих виселицах Парижа. В этой глубокой могиле, где столько человеческих прахов, столько преступлений гнило вместе, сложили свои кости много невинных людей, начиная с невинного Ангеррана де Мариньи, обновившего монфоконскую виселицу, и кончая таким же невинным адмиралом Колиньи, завершившим вереницу казненных.</p><p class="p1">Что касается таинственного исчезновения Квазимодо, то вот все, что нам удалось узнать о нем.</p><p class="p1">Около двух или полутора лет спустя после событий, которыми закончился наш рассказ, когда в монфоконский склеп пришли разыскивать тело Оливье ле Дэна, повешенного за два дня перед тем и удостоенного Карлом VIII милости быть погребенным в лучшем обществе, на Сен-Лоранском кладбище, между отвратительными трупами были найдены два скелета, из которых один странным образом сжимал другой в своих объятиях. На одном из этих скелетов, женском, еще оставались лохмотья когда-то белого платья, а на шее было ожерелье из зерен какого-то растения с маленькой шелковой ладанкой, украшенной зелеными бусами, открытой и пустой. Эти предметы были так малоценны, что палач, вероятно, не пожелал взять их себе. Другой скелет, державший первый в объятиях, был скелет мужчины. Заметили, что его позвоночный столб был искривлен, голова вдвинута между лопаток и одна нога короче другой. Однако у него не было замечено никакого повреждения спинного хребта на затылке, из чего можно было заключить, что он не был повешен. Следовательно, человек этот пришел сюда и здесь умер. Когда его хотели отделить от того скелета, который он обнимал, – он рассыпался прахом.</p></span></span></span>
