<p class="p">V. Молельня короля Людовика XI</p>
</div><p class="p1">Читатель, может быть, не забыл, что за несколько минут до того, как Квазимодо заметил толпу наступавших под покровом ночи бродяг, он, окидывая с высоты своей башни взглядом Париж, видел один только огонек, светившийся в одном из окон верхнего этажа высокого и мрачного здания близ Сент-Антуанских ворот. Это здание была Бастилия, а светлая звездочка – свеча Людовика XI.</p><p class="p1">Король действительно уже два дня был в Париже и через день предполагал отправиться в крепость Монтильз ле Тур. Он редко и только на короткое время показывался в своем добром городе Париже, находя, что в нем недостаточно подземелий, виселиц и шотландских стрелков.</p><p class="p1">В эту ночь он избрал местом своего ночлега Бастилию. Он не любил занимаемую им в Лувре большую комнату с ее огромным камином, украшенным массивным изображением двенадцати животных и тринадцати пророков, с постелью, имевшею одиннадцать футов ширины и двенадцать длины. Он терялся среди этого величия и при своих буржуазных вкусах чувствовал себя лучше в маленькой комнатке с узкой постелью в Бастилии. К тому же Бастилия была лучше укреплена, чем Лувр.</p><p class="p1">Эта келейка, которую король устроил для себя в здании знаменитой тюрьмы, была все же довольно просторна и помещалась в самом верхнем этаже башенки, которою оканчивалась сторожевая башня замка. Комната имела круглую форму, стены ее были обтянуты блестящими циновками; деревянный потолок украшали жестяные золоченые лилии, а промежутки между балками были цветные. Кругом шел роскошный цветной карниз, усеянный розетками из белой жести, раскрашенными ярко-зеленым цветом, составленным из желтого мышьяка и индиго.</p><p class="p1">Здесь было лишь одно узкое стрельчатое окно с переплетом из проволоки и с железной решеткой. Цветные стекла были украшены живописными изображениями гербов короля и королевы и стоили по двадцать два соля каждое.</p><p class="p1">Здесь был всего один вход. Дверь была современной архитектуры, с низкой притолокой, обитая изнутри вышивкой, а снаружи – выпилкой из ирландской сосны тонкой артистической работы. Такие двери еще лет пятьдесят тому назад встречались в старинных домах. «Хотя они обезображивают наши жилища и занимают чересчур много места, – говорит с отчаянием Соваль, – однако наши старики не желают с ними расстаться и хранят их наперекор всему».</p><p class="p1">В этой комнате не было решительно ни одной вещи, составляющей обычную меблировку комнат: ни скамей, ни табуретов, ни скамеек в форме сундуков, ни изящных скамеечек на резных ножках, стоивших по четыре су каждая. В келье стояло одно только складное кресло великолепной работы. Дерево на нем было раскрашено розами по красному фону; сиденье было обито красным сафьяном, широкая бахрома кругом была прибита золотыми гвоздями. Одинокое кресло свидетельствовало, что в этой комнате имеет право сидеть только одно лицо. Возле кресла, у самого окна, стоял стол, покрытый скатертью с изображением птиц. На столе стояли чернильница, забрызганная чернилами, и резной серебряный кубок, лежали свитки пергамента и перья. Несколько поодаль помещалась грелка, далее – аналой, обтянутый темно-красным бархатом с выпуклыми золотыми украшениями. Наконец, в глубине комнаты стояла простая постель с пологом из желтой и красной парчи, без мишуры и позументов, обшитая самой простой бахромой. Эту самую постель, в которой Людовик XI находил себе покой или бессонницу, двести лет тому назад видела в доме одного государственного советника мадам Пилу, описанная в романе «Кир» под именем Арцидии или «Олицетворенной нравственности».</p><p class="p1">Такова была комната, называвшаяся «молельней Людовика XI».</p><p class="p1">В ту минуту, как мы ввели читателя в молельню, в ней было довольно темно. Сигнал к тушению огней был дан уже час тому назад. На дворе была ночь, и пять человек, находившихся в комнате, освещались только мерцающим светом восковой свечи, стоявшей на столе.</p><p class="p1">Первый, на которого падал свет, был вельможа в великолепном наряде, состоявшем из штанов и полукафтана пурпуровой материи с серебряными полосами. Поверх кафтана был надет род плаща с широкими рукавами, украшенными отворотами из золотого сукна с черными разводами. Этот великолепный наряд, на котором отражался свет, казалось, вспыхивал пламенем на каждом сгибе. У человека, так одетого, на груди был вышит яркими красками герб: две пересекающиеся под углами полосы, а под ними – бегущая лань. С одной стороны герба находилась оливковая ветвь, с другой – олений рог. За поясом у этого человека был заткнут богатый кинжал, золотая рукоятка которого имела форму шлема и была украшена графской короной. У него был злой вид, гордое лицо, высоко поднятая голова. При первом взгляде на его лицо читалась надменность, при втором – хитрость.</p><p class="p1">Он стоял с непокрытой головой, держа длинный свиток в руке, позади кресла, в котором сидела, некрасиво согнувшись, закинув одну ногу на другую и опершись локтем на стол, личность, весьма скверно одетая. Пусть читатель представит себе на этом роскошном сафьяновом кресле человека с угловатыми коленями и худыми ляжками, обтянутыми поношенным черным шерстяным трико, и закутанного во фланелевый кафтан, обшитый совершенно облезлым мехом; в довершение на голове была старая засаленная шапка из самого плохого сукна, отороченная шнурком со свинцовыми фигурками. Вот, вместе с засаленной ермолкой, почти скрывавшей волосы, все, что можно было рассмотреть в его фигуре. Сидящий так низко наклонил голову, что на его лице, скрытом в тени, можно было рассмотреть только освещенный лучом света кончик носа, по-видимому довольно длинного. По худобе морщинистой руки видно было, что это старик. Это был Людовик XI.</p><p class="p1">Позади, в отдалении, тихо разговаривали между собой два человека, одетые в платье фламандского покроя. Они были настолько освещены, что каждый присутствовавший на представлении мистерии Гренгуара без труда узнал бы в них двух главных послов Фландрии – Гильома Рима, тонкого гентского дипломата, и Жака Коппеноля, популярного чулочника. Читатель, вероятно, помнит, что оба эти человека имели тайные политические сношения с Людовиком XI.</p><p class="p1">Наконец, в самой глубине комнаты, у двери, стоял в темноте, неподвижный как статуя, крепкий, коренастый человек в военных доспехах и кафтане с гербом. Его четырехугольное лицо с огромным ртом и глазами навыкате, с ушами, спрятанными под гладко причесанные волосы, и с низким лбом напоминало в одно и то же время и тигра и собаку.</p><p class="p1">Все были без головных уборов, кроме короля. Вельможа, стоявший подле короля, читал ему нечто вроде длинной докладной записки, которую его величество, по-видимому, внимательно слушал.</p><p class="p1">– Ей-богу, я устал стоять! – проворчал Коппеноль. – Неужели здесь нет стула?</p><p class="p1">Рим отвечал отрицательным жестом, сопровожденным сдержанной улыбкой.</p><p class="p1">– Право, мне так и хочется усесться на пол, поджав под себя ноги, как чулочник во время работы, как я сижу в своей лавке, – не унимался Коппеноль, раздосадованный тем, что приходится так понижать голос.</p><p class="p1">– Не вздумайте этого сделать, мэтр Жак!</p><p class="p1">– Ох, мэтр Гильом! Неужели здесь можно присутствовать не иначе, как стоя на собственных ногах?</p><p class="p1">– Или на коленях, – сказал Рим.</p><p class="p1">В эту минуту голос короля зазвучал громче. Они замолчали.</p><p class="p1">– Пятнадцать солей на одежды нашим слугам и двенадцать ливров нашим придворным писцам! Превосходно! Тратьте золото бочками! Да вы с ума сошли, Оливье?</p><p class="p1">Говоря это, старик поднял голову. На его шее заблестели золотые раковины цепи ордена святого Михаила. Свеча ярко осветила его худой, суровый профиль. Он вырвал бумагу из рук Оливье.</p><p class="p1">– Вы нас разоряете! – кричал он, пробегая ввалившимися глазами тетрадь. – К чему все это? Зачем нам такая роскошь в нашем доме? Двум капелланам по десяти ливров в месяц каждому и причетнику по сотне су! Камердинеру девяносто ливров в год! Четырем поварам по сто двадцать ливров в год каждому! Смотрителю за рабочими, огороднику, садовнику, хранителю оружия, двум счетоводам по десяти ливров в месяц каждому. Двум поваренкам по восьми ливров! Конюху и его двум помощникам по двадцать четыре ливра в месяц! Рассыльному, пирожнику, булочнику, двум кучерам по шестидесяти ливров в год! Кузнецу – сто двадцать ливров! А нашему казначею – тысячу двести ливров! Контролеру – пятьсот. Это черт знает что! Это безумство! Мы грабим Францию, чтобы платить жалованье нашим слугам! Все луврские драгоценности расплавятся на таком огне расточительности. Всю посуду придется продать! А в будущем году, если Господу и Пресвятой Богородице, – тут он приподнял шапку, – угодно будет продлить нашу жизнь, мы будем пить лекарство из оловянного стакана.</p><p class="p1">Говоря это, король бросил взгляд на серебряный кубок, сверкавший на столе. Он кашлянул и продолжал:</p><p class="p1">– Мэтр Оливье, владетельные князья, правители больших государств, короли и императоры не должны допускать роскоши в своих домах, потому что оттуда этот огонь перебрасывается в провинцию. Итак, мэтр Оливье, запомни раз навсегда: наши расходы растут из года в год. Это нам не нравится! Как это? До семьдесят девятого года они не превышали тридцати шести тысяч ливров. В восьмидесятом году они достигли сорока трех тысяч шестисот девятнадцати ливров… я хорошо помню эти цифры… В восемьдесят первом году – шестьдесят шесть тысяч шестьсот восемьдесят ливров, а в нынешнем году – клянусь жизнью – дойдут до восьмидесяти тысяч ливров. В четыре года они возросли вдвое! Чудовищно!</p><p class="p1">Король замолчал, тяжело дыша, затем продолжал запальчиво:</p><p class="p1">– Я вижу вокруг себя только людей, жиреющих за счет моей худобы! Вы из всех моих пор высасываете экю!</p><p class="p1">Все молчали. Это был один из тех припадков гнева, которые следовало переждать. Он продолжал:</p><p class="p1">– Это похоже на латинское прошение, поданное нам феодалами Франции, в котором просят нас восстановить так называемые почетные придворные должности. Нечего сказать, должности! Должности, от которых хребет трещит! Вы заявляете, господа, что мы не настоящий король, если обходимся dapifero nullo, buticulario nullo<a href="ch2.xhtml#id94" class="a">[144]</a>. Покажем мы вам, клянусь Пасхой, король мы или нет!</p><p class="p1">Он улыбнулся с сознанием своего могущества. Его дурное расположение духа смягчилось, и он обратился к фламандцам:</p><p class="p1">– Видишь ли, кум Гильом, все эти главные кравчие, главные виночерпии, главные камергеры и главные сенешали не стоят последнего лакея… Запомни это, кум Коппеноль; в них нет никакого проку. Когда я вижу, как они без всякой пользы толкутся вокруг меня, я вспоминаю статуи четырех евангелистов, окружающих циферблат больших дворцовых часов, недавно подновленных Филиппом Бриллем: они покрыты позолотой, но времени не указывают, и стрелки часов прекрасно могли бы обходиться без них.</p><p class="p1">Он на минуту задумался и прибавил, покачав седой головой:</p><p class="p1">– Хо! Клянусь Пресвятой Девой, я не Филипп Брилль и не стану покрывать позолотой знатных вассалов… Продолжай, Оливье.</p><p class="p1">Человек, которого король называл этим именем, взял из его рук тетрадь и продолжал читать вслух:</p><p class="p1">– «Адаму Тенону, хранителю печатей в парижском ведомстве, за серебро, работу и гравировку этих печатей, сделанных заново, ибо прежние по ветхости и от долгого употребления уже не могут служить, – двадцать парижских ливров.</p><p class="p1">Гильому Фреру – четыре ливра четыре парижских су за его труды и расходы по кормлению голубей на двух голубятнях замка Турнель в течение января, февраля и марта сего года. На тот же предмет отпущено семь мер ячменя.</p><p class="p1">Францисканскому монаху за исповедь преступника четыре парижских соля».</p><p class="p1">Король слушал молча. Время от времени он кашлял, подносил к губам кубок и отпивал из него глоток, делая гримасу.</p><p class="p1">– «В этом году по распоряжению суда было сделано при звуках труб на перекрестках Парижа пятьдесят шесть оповещений… Счет подлежит оплате.</p><p class="p1">За поиски и раскопки в некоторых местах Парижа и других местностях кладов, которые, как говорят, там были сокрыты, – хотя ничего не найдено, – сорок пять парижских ливров».</p><p class="p1">– Это значит закопать экю, чтобы выкопать су, – сказал король.</p><p class="p1">– «…За вставку в замке Турнель шести панно из белого стекла в том месте, где находится железная клетка, – тринадцать су… За изготовление и доставку по приказу короля в день праздника шутов четырех щитов с королевскими гербами, увитых розами, – шесть ливров… За новые рукава к старому камзолу короля – двадцать солей… За ящик сала, чтобы смазывать сапоги короля, – пятнадцать денье. За новый хлев для помещения королевских черных поросят – тридцать парижских ливров. Несколько перегородок, досок и подъемных дверей для помещения львов близ церкви Святого Павла – двадцать два ливра».</p><p class="p1">– Дорогонько-таки обходятся эти звери, – сказал Людовик XI. – Ну, что делать! Это уж чисто царственная затея! Там есть один большой рыжий лев, которого я люблю за его ужимки… Мэтр Гильом, видели вы его?.. Правителям необходимо иметь таких диковинных животных. Нам, королям, собаками должны служить львы, кошками – тигры. Величие приличествует короне. Во времена языческие, когда народ приносил в жертву Юпитеру сто быков и сто овец, императоры давали сто львов и сто орлов. Это было грозно и величественно. Короли французские всегда слышали рычание этих животных вокруг своего трона. Однако отдадут справедливость, что я трачу на этих зверей гораздо меньше, чем мои предшественники, и что число львов, медведей, слонов и леопардов в моем зверинце значительно скромнее… Продолжайте, мэтр Оливье; мы только желали сообщить это нашим друзьям фламандцам.</p><p class="p1">Гильом Рим низко поклонился, между тем как Коппеноль со своей нахмуренной физиономией походил на одного из тех медведей, о которых говорил его величество. Король этого не заметил. Он омочил губы в кубке и выплюнул напиток, говоря:</p><p class="p1">– Фу! Мерзкий отвар!</p><p class="p1">Читавший продолжал:</p><p class="p1">– «За прокорм бездельника-бродяги, содержащегося шесть месяцев на бойне в ожидании решения своей участи, – шесть ливров четыре соля…»</p><p class="p1">– Это еще что? – прервал король. – Кормить того, кого следует повесить? Клянусь Пасхой, я не дам больше ни одного су на его прокорм. Оливье, переговори с господином д’Эстувилем и сегодня же вечером приготовь этого молодца к свадьбе с виселицей… Продолжай.</p><p class="p1">Оливье сделал знак ногтем против статьи о «бездельнике-бродяге» и продолжал:</p><p class="p1">– «Андриэ Кузену, главному палачу при парижском уголовном суде, шестьдесят парижских солей по определению и приказанию господина парижского префекта на покупку по распоряжению того же вышепоименованного господина префекта большого меча для обезглавления и казни лиц, осужденных судом за их проступки, а также за снабжение вышеупомянутого меча ножнами и всем необходимым; равно как за обновление и исправление старого меча, треснувшего и зазубрившегося при казни сеньора Людовика Люксембургского, в удостоверение чего…»</p><p class="p1">Король прервал его:</p><p class="p1">– Довольно. С удовольствием назначаю эту сумму. Против таких расходов я не возражаю. На это я никогда не жалел денег. Продолжай.</p><p class="p1">– «За переделку заново большой клетки…»</p><p class="p1">– Да, я знал, что недаром приехал я в эту Бастилию! – сказал король, опираясь обеими руками на ручки кресла. – Подожди, мэтр Оливье. Я хочу сам взглянуть на клетку. Прочтешь мне счет, пока я ее буду рассматривать… Господа фламандцы, пойдемте взглянуть. Это интересно.</p><p class="p1">Он встал, опираясь на руку своего собеседника, приказал знаком безмолвной личности, стоявшей у дверей, идти впереди, а фламандцам следовать за собой, и вышел из комнаты.</p><p class="p1">У дверей кельи к царственной процессии присоединилась свита, состоявшая из закованных в железо воинов и маленьких пажей, несших факелы. Некоторое время король и его спутники шли в темной башне, по лестницам и коридорам, местами проделанным в самой толще стены. Комендант Бастилии шел во главе, приказывая отворять двери перед старым, согбенным, больным королем, кашлявшим во время пути. Перед каждой дверью всем, кроме старика, согбенного летами, приходилось нагибаться.</p><p class="p1">– Гм! – бормотал он сквозь десны, так как зубов у него не было. – Мы уж близки к дверям подземелья. В низенькую дверцу проходить согнувшись.</p><p class="p1">Наконец, пройдя через последнюю дверь, на которой было навешано столько замков, что их пришлось отпирать четверть часа, они вошли в большой высокий зал со стрельчатым сводом, посредине которого при свете факелов можно было рассмотреть массивный куб из камня, железа и дерева. Внутренность его была пуста. То была одна из клеток, предназначавшихся для государственных преступников и называвшихся «дочурками короля». В стенах куба было два или три окошечка, снабженных такой частой решеткой, что стекол совершенно не было видно. Дверью служила огромная плоская плита, как у могилы, – одна из тех дверей, которые отворяются лишь для того, чтобы войти. Только здесь мертвецом являлся живой человек.</p><p class="p1">Король стал медленно обходить сооружение, внимательно осматривая его, между тем как Оливье громко читал счет:</p><p class="p1">– «На поправку заново большой деревянной клетки из толстых бревен, рам и лежней, имеющей девять футов длины, при восьми ширины и семи высоты между полом и потолком и окованной железом, устроенной в одном из отделений одной из башен крепости Святого Антония и служащей помещением задержанному по приказу короля, нашего государя, узника, помещающегося в старой, развалившейся клетке. На вышеупомянутую новую клетку употреблено девяносто шесть бревен в ширину, пятьдесят два в длину и десять трехсаженных лежней. Заняты были постройкой девятнадцать плотников, обтесывавших, пригонявших и сколачивавших весь материал на дворе Бастилии в течение двадцати дней…»</p><p class="p1">– Дуб порядочный, – заметил король, постучав по углу сооружения.</p><p class="p1">– «…На клетку пошло, – продолжал читать Оливье, – двести двадцать толстых восьми-и девятифутовых железных брусьев, кроме некоторого количества среднего размера, с обручами, болтами и скрепами для упомянутых брусьев. Все это железо весит три тысячи семьсот тридцать пять фунтов, кроме восьми толстых колец для прикрепления клетки к полу, весящих вместе с гвоздями и скобками двести восемнадцать фунтов, не считая железных оконных решеток помещения, где поставлена клетка, дверных засовов и прочего…»</p><p class="p1">– Немало пошло железа, чтобы обуздать легкомыслие, – заметил король.</p><p class="p1">– «…Стоимость всего – триста семнадцать ливров пять солей семь денье».</p><p class="p1">– Клянусь Пасхой – немало! – воскликнул король. При этом любимом восклицании Людовика XI в клетке как будто что-то зашевелилось, послышались лязг цепей по полу и слабый голос, доносившийся словно из могилы:</p><p class="p1">– Государь, государь! Пощадите!</p><p class="p1">Говорившего нельзя было рассмотреть.</p><p class="p1">– Триста семнадцать ливров пять солей семь денье! – повторил Людовик XI.</p><p class="p1">Жалобный голос, раздавшийся из клетки, заледенил ужасом сердца всех присутствующих, даже сердце самого Оливье. Один только король, казалось, не слыхал этого голоса. По его приказанию мэтр Оливье возобновил чтение, а его величество хладнокровно продолжал осмотр клетки.</p><p class="p1">– «…Кроме того, заплачено каменщику, пробившему в стенах дыры для укрепления решеток в окнах и на полу помещения, где клетка, ибо пол не мог бы сдержать тяжести этой клетки, двадцать семь ливров четырнадцать парижских солей».</p><p class="p1">Голос снова простонал:</p><p class="p1">– Смилуйтесь, государь! Клянусь вам, что изменник – кардинал Анжерский, а не я.</p><p class="p1">– Дорогой попался каменщик, – заметил король. – Продолжай, Оливье.</p><p class="p1">Оливье продолжал:</p><p class="p1">– «Столяру за рамы, кровать, судно и прочие принадлежности – двадцать ливров два парижских су».</p><p class="p1">Голос тоже продолжал:</p><p class="p1">– Увы! Государь, неужели вы не выслушаете меня? Уверяю вас, что не я писал монсеньору Гиенскому, а господин кардинал Балю.</p><p class="p1">– Дорого взял и столяр! – заметил король. – Ну, все?</p><p class="p1">– Нет, государь… «Стекольщику за вставку окон в означенном помещении – сорок шесть солей восемь парижских денье».</p><p class="p1">– Помилосердствуйте, государь! Разве не достаточно того, что все мое состояние отдано моим судьям, серебряная посуда – господину де Торси, библиотека – мэтру Пьеру Дориоллю, ковры – губернатору руссильонскому? Я ни в чем не повинен. Вот уже четырнадцать лет, как я дрожу от холода в железной клетке. Пощадите, государь! Вам это зачтется на том свете!</p><p class="p1">– Мэтр Оливье, какова вся сумма? – спросил король.</p><p class="p1">– Триста шестьдесят семь ливров восемь су три парижских денье.</p><p class="p1">– Пресвятая Дева! – воскликнул король. – Эта клетка – одно разорение.</p><p class="p1">Он вырвал тетрадь из рук Оливье и начал сам считать по пальцам, смотря то на пергамент, то на клетку. Между тем оттуда доносились рыдания заключенного. Они производили тяжелое впечатление среди темноты, и присутствовавшие переглядывались, бледнея.</p><p class="p1">– Четырнадцать лет, государь! Уже четырнадцать лет! С апреля шестьдесят девятого года. Во имя Матери Божией выслушайте меня, государь. Вы все это время наслаждались солнечным теплом. Неужели мне, несчастному, уже не суждено увидать света Божьего? Помилуйте, государь! Будьте милосердны. Милосердие – высокая добродетель государей, торжествующая над гневом. Неужели ваше величество полагает, что для короля на смертном одре большим утешением служит, что он не оставил безнаказанной ни одной обиды? К тому же, государь, я не изменял вашему величеству, а изменил кардинал Анжерский. А у меня ноги скованы тяжелой цепью с тяжелым шаром на конце – гораздо более тяжелым, чем я того заслужил. О! Государь, сжальтесь надо мной!</p><p class="p1">– Оливье, – сказал король, качая головой, – я замечаю, что мне ставят известку по двадцати солей за бочку, когда она стоит не более двенадцати. Этот счет вы исправьте.</p><p class="p1">Он повернулся спиной к клетке и направился к выходу. Несчастный узник заключил по удаляющемуся свету факелов, что король уходит.</p><p class="p1">– Государь! Государь! – кричал он в отчаянии.</p><p class="p1">Дверь затворилась. Узник уже ничего не слышал, кроме хриплого голоса тюремщика, распевавшего над самым его ухом:</p><div class="poem">
<div class="stanza">
<p class="v">Maitre Jean Balue</p>
<p class="v">A perdue la vue</p>
<p class="v">De ses êvechês.</p>
<p class="v">Monsieur de Verdun</p>
<p class="v">N’en a plus pas un;</p>
<p class="v">Tous sont dêpêchês<a href="ch2.xhtml#id92" class="a">[145]</a>.</p>
</div>
</div><p class="p1">Король молча поднимался в свою молельню, а свита его шла за ним под ужасным впечатлением стонов узника. Вдруг его величество обернулся к коменданту Бастилии:</p><p class="p1">– Кстати! В клетке как будто кто-то есть?</p><p class="p1">– Как же, государь! – ответил комендант, пораженный вопросом.</p><p class="p1">– Кто же?</p><p class="p1">– Архиепископ Верденский.</p><p class="p1">Королю это было известно лучше, чем кому бы то ни было. Но такова была его привычка.</p><p class="p1">– А! – сказал он с наивным видом, будто в первый раз вспомнив об этом. – Гильом де Аранкур, друг кардинала Балю. Добряк был епископ.</p><p class="p1">Через несколько минут дверь молельни опять отворилась и снова затворилась за пятью лицами, которых читатель видел в начале главы. Они снова заняли прежние места, приняли прежние позы и продолжали по-прежнему беседовать вполголоса.</p><p class="p1">Во время отсутствия короля на стол положили несколько пакетов, которые он сам распечатал. Он быстро прочел их, один за другим, затем сделал знак мэтру Оливье, по-видимому исполнявшему при нем должность министра, чтобы тот взял перо, и, не сообщая ему содержания известий, начал вполголоса диктовать ответы. Оливье писал в довольно неудобной позе – стоя на коленях перед столом.</p><p class="p1">Гильом Рим наблюдал.</p><p class="p1">Король говорил так тихо, что фламандцы могли слышать из того, что он диктовал, только малопонятные отрывки.</p><p class="p1">– …Поддерживать торговлею плодородные местности, а промышленностью бесплодные… Показать англичанам наши четыре новые бомбарды: «Лондон», «Брабант», «Бурган-Бресс», «Сент-Омер»… Война ведется теперь правильнее благодаря артиллерии… Нашему другу, господину де Брессюиру… Нельзя содержать армию без налогов… и т. д.</p><p class="p1">В одном месте король пожал плечами:</p><p class="p1">– Клянусь Пасхой! Король сицилийский запечатывает свои письма желтым воском, как король Франции. Мы, может быть, напрасно допускаем это. Наш любезный кузен, герцог Бургундский, никому не давал герба с червленым полем. Величие царственных родов поддерживается неприкосновенностью привилегий. Запиши это, кум Оливье… Ого! – воскликнул он в другом месте. – Какое длинное послание! Чего хочет от нас наш брат император? – Он пробежал послание, прерывая чтение восклицаниями: – Правда, немцы так многочисленны и сильны, что едва веришь этому!.. Но не надо забывать поговорки: нет графства прекраснее Фландрии, нет герцогства прекраснее Милана и нет королевства лучше Франции… Не так ли, господа фламандцы?</p><p class="p1">На этот раз и Коппеноль поклонился с Гильомом Римом: патриотизм чулочника был польщен. Последняя депеша заставила Людовика XI нахмуриться:</p><p class="p1">– Это что? Жалобы и недовольство нашими гарнизонами в Пикардии? Оливье, напиши немедленно маршалу Руо… что дисциплина падает… что вестовые кавалеристы, служащие в войске по призыву дворяне, вольные стрелки и швейцарцы наносят бесконечный вред крестьянству… Что солдаты, не довольствуясь тем, что находят в домах землевладельцев, принуждают их палкою и плетью отправляться в город за вином, рыбой, сластями и другими предметами роскоши… Что король знает об этом, что мы намереваемся оградить наш народ от поборов, грабежей и насилий… Что такова наша воля! И что, кроме того, нам не угодно, чтобы всякие менестрели, цирюльники, денщики одевались, как князья, в бархат, шелковые материи и носили золотые перстни… Что подобное тщеславие ненавистно Богу… Что мы сами, хотя и дворянин, довольствуемся суконным кафтаном по шестнадцати су за парижский локоть… Что хамы могут, следовательно, тоже снизойти до сукна… Предпишите и прикажите!.. Господину Руо, нашему другу… Хорошо!</p><p class="p1">Он продиктовал это письмо громко, твердым, отрывистым тоном. В ту минуту, как он его кончил, дверь отворилась и появилось новое лицо, бросившееся в комнату с криком:</p><p class="p1">– Государь! Государь! Парижская чернь бунтует!</p><p class="p1">Строгое лицо Людовика исказилось. Но это внешнее волнение исчезло, как молния. Он сдержался и сказал со спокойной строгостью:</p><p class="p1">– Что это вы так врываетесь, кум Жак?</p><p class="p1">– Государь! Бунт! – ответил, еле переводя дух, кум Жак.</p><p class="p1">Король, встав с места, грубо взял его за плечо и со сдержанным гневом, искоса поглядывая на фламандцев, сказал ему на ухо так, что тот один мог слышать:</p><p class="p1">– Молчи или говори шепотом.</p><p class="p1">Вошедший понял и начал шепотом сбивчивый рассказ, который король слушал спокойно, между тем как Гильом Рим обращал внимание Коппеноля на лицо и наряд прибежавшего, на его меховую шапку – caputia furrata, короткую епанчу – apitogia curta и длинное платье из черного бархата, по которым можно было узнать председателя счетной палаты.</p><p class="p1">Едва эта личность успела дать кое-какие объяснения королю, как Людовик XI воскликнул, захохотав:</p><p class="p1">– В самом деле? Да говори же громче, кум Куаксье. Чего шептаться? Пресвятой Деве известно, что у нас нет ничего тайного от наших друзей фламандцев.</p><p class="p1">– Но, государь…</p><p class="p1">– Говори громче!</p><p class="p1">Кум Куаксье молчал в изумлении.</p><p class="p1">– Ну же, говори, – продолжал король, – в нашем славном городе Париже волнение черни?</p><p class="p1">– Да, государь.</p><p class="p1">– Направленное, по твоим словам, против председателя суда?</p><p class="p1">– Да, по-видимому, так, – отвечал кум, путаясь в словах после резкой, необъяснимой перемены, происшедшей в мыслях короля.</p><p class="p1">Людовик XI спросил:</p><p class="p1">– Где ночной обход встретил толпу?</p><p class="p1">– По дороге от Двора чудес к мосту Менял. И я повстречался с ней, направляясь сюда по приказанию вашего величества. Я слышал, как некоторые кричали: «Долой председателя суда!»</p><p class="p1">– Что они имеют против него?</p><p class="p1">– Ведь он их ленный владетель.</p><p class="p1">– В самом деле?..</p><p class="p1">– Да, государь: это бродяги с Двора чудес. Они уже давно жалуются на председателя, которому подчинены. Они не хотят признавать за ним ни права судить их, ни права собирать подати.</p><p class="p1">– Вот как! – заметил король с улыбкой удовольствия, которую тщетно старался скрыть.</p><p class="p1">– Во всех своих прошениях к парламенту они утверждают, что повинуются только двум высшим властям – вашему величеству и своему богу, которым они, по-моему, считают Сатану, – отвечал кум Жак.</p><p class="p1">– Эге! – сказал король.</p><p class="p1">Он потирал себе руки и смеялся тем внутренним смехом, от которого сияет лицо. Он не мог скрыть радости, хотя и пытался сдержать себя. Никто ничего не понимал, даже сам Оливье. Король с минуту молчал, задумавшись, но с довольным лицом.</p><p class="p1">– Много их? – спросил он вдруг.</p><p class="p1">– Да, государь, немало, – отвечал кум Жак.</p><p class="p1">– Сколько?</p><p class="p1">– По крайней мере шесть тысяч.</p><p class="p1">Король не мог удержаться, чтоб не воскликнуть:</p><p class="p1">– Отлично!</p><p class="p1">Затем он снова спросил:</p><p class="p1">– Вооружены?</p><p class="p1">– Косами, пиками, самострелами, заступами, всяким смертоносным оружием.</p><p class="p1">Этот перечень, по-видимому, вовсе не встревожил короля. Кум Жак счел долгом прибавить:</p><p class="p1">– Если, ваше величество, не пошлете поспешно помощи председателю, он погиб.</p><p class="p1">– Пошлем, – с притворной серьезностью проговорил король, – конечно, пошлем. Председатель наш друг. Шесть тысяч! Какие выискались отчаянные! Неслыханная дерзость, и мы на нее очень гневаемся. Но у нас под рукой сегодня мало народу… Успеем послать завтра утром.</p><p class="p1">Кум Жак вскричал:</p><p class="p1">– Немедленно, государь! Здание суда будет до завтра двадцать раз разгромлено, поместье разграблено, а сам судья повешен! Ради бога, государь, пошлите, не дожидаясь завтрашнего дня.</p><p class="p1">Король пристально взглянул ему в лицо:</p><p class="p1">– Я сказал – завтра утром!</p><p class="p1">Это был один из тех взглядов, после которых уже не возражают.</p><p class="p1">Помолчав, Людовик XI снова возвысил голос:</p><p class="p1">– Кум Жак, ты должен знать это. Каковы были… – Он поправился: – Каковы феодальные права председателя?</p><p class="p1">– Государь, председатель суда владеет улицей Каляндр до улицы Эрбри, площадью Святого Михаила и постройками, известными в просторечии под названием ле Мюро, расположенными в числе тринадцати близ церкви Богородицы на Полях, – (тут Людовик XI приподнял шапку), – затем Двором чудес, больницей, называемой Банпье, и всем шоссе – от этой больницы до ворот Святого Иакова. Во всех этих местах он пользуется правом суда и собирания податей, вообще – всеми правами ленного господина.</p><p class="p1">– Ого! – сказал король, почесывая за левым ухом правой рукой. – Порядочный кусочек моего города. Так господин судья был владельцем всего этого?</p><p class="p1">На этот раз он не поправился и продолжал, как бы рассуждая сам с собой:</p><p class="p1">– Отлично, господин судья! Славный кусочек нашего Парижа был в ваших зубах!</p><p class="p1">Вдруг он разразился:</p><p class="p1">– Клянусь Пасхой! Что это за господа, присваивающие себе права сборщиков податей, судей, правителей, полных хозяев в нашем государстве! У них свои сборщики податей, свой суд и палачи на всех перекрестках! Выходит, что, как грек насчитывал столько богов, сколько было источников в его стране, а перс столько, сколько звезд на небе, так француз насчитывает столько королей, сколько видит виселиц! Прескверный порядок, и подобное смешение мне не нравится. Желал бы я узнать, волей ли Всевышнего установлено, чтобы в Париже кто-нибудь получал подати кроме короля, чтобы судил кто-нибудь кроме нашего парламента и в нашем государстве был иной государь кроме нас? Клянусь спасением своей души! Пора наступить дню, когда во Франции будет один король, один владыка, один судья, один палач, подобно тому как в раю есть только один Бог!</p><p class="p1">Он еще раз приподнял шапку и продолжал, все еще погруженный в свои мысли, тоном охотника, науськивающего и спускающего свою свору:</p><p class="p1">– Хорошо, мой народ! Отлично! Сокрушай этих самозваных властителей! Делай свое дело. Ату их! Грабь их, вешай, разоряй!.. А! Вы захотели стать королями, господа! Бери их, народ, бери!..</p><p class="p1">Тут он вдруг оборвал речь, закусил губу, как бы желая вернуть чуть было не вырвавшуюся наружу мысль, окинул своим проницательным взглядом каждого из пяти окружавших его вельмож и вдруг, схватив обеими руками шапку и глядя на нее, сказал:</p><p class="p1">– О, я бы сжег тебя, если б ты знала, что у меня в голове!</p><p class="p1">Затем, еще раз оглядевшись внимательным и тревожным взглядом лисицы, тайком пробирающейся в свою нору, он докончил:</p><p class="p1">– Ну, все равно! Мы окажем помощь господину судье. К несчастью, у нас здесь мало войска сравнительно с такой массой черни. Надо подождать до завтра. Порядок будет восстановлен, а кого захватят, без разговоров повесят.</p><p class="p1">– Кстати, государь, – сказал кум Куаксье, – с перепугу я забыл доложить, что стража захватила двоих бродяг из шайки. Если вашему величеству угодно будет видеть этих людей, они здесь.</p><p class="p1">– Угодно будет их видеть! – закричал король. – Клянусь Пасхой! Как ты забыл такую вещь? Оливье, беги скорей за ними!</p><p class="p1">Мэтр Оливье вышел и через минуту вернулся с двумя арестантами, окруженными конвоем королевских стрелков. У первого из арестантов было толстое, глупое, удивленное лицо пьяницы. Он был одет в рубище и шел, сгибая колени и волоча одну ногу. Второй был человек с бледной улыбающейся физиономией, уже знакомый читателю.</p><p class="p1">Король смотрел на них с минуту, не говоря ни слова, затем вдруг, обращаясь к первому из приведенных, спросил:</p><p class="p1">– Как тебя зовут?</p><p class="p1">– Жьефруа Пенсбурд.</p><p class="p1">– Твое ремесло?</p><p class="p1">– Бродяга.</p><p class="p1">– Зачем ты ввязался в этот проклятый бунт?</p><p class="p1">Бродяга смотрел на короля, качая руками с глупым видом. Это была одна из тех несуразных голов, где уму так же удобно помещаться, как огню под гасильником.</p><p class="p1">– Не знаю, – отвечал он. – Другие пошли, и я пошел.</p><p class="p1">– Вы шли нападать и грабить вашего господина, председателя суда?</p><p class="p1">– Я знаю, что хотели нападать на что-то, захватить кого-то. Вот и все.</p><p class="p1">Один из солдат показал кривой нож, найденный у бродяги.</p><p class="p1">– Ты узнаешь это оружие? – спросил король.</p><p class="p1">– Да, это мой нож. Я виноградарь.</p><p class="p1">– А в этом человеке признаешь своего товарища? – спросил Людовик XI, указывая на второго арестанта.</p><p class="p1">– Нет, я его не знаю.</p><p class="p1">– Довольно, – сказал король, делая знак личности, молча стоявшей у двери, на которую мы уже обратили внимание читателя. – Кум Тристан, бери, он твой.</p><p class="p1">Тристан Пустынник поклонился. Он тихим голосом отдал приказание двум стрелкам, и они увели несчастного бродягу.</p><p class="p1">Между тем король подошел ко второму арестованному, с которого градом катился пот.</p><p class="p1">– Как тебя зовут?</p><p class="p1">– Пьер Гренгуар, государь.</p><p class="p1">– Твое ремесло?</p><p class="p1">– Философ, государь.</p><p class="p1">– Как ты смеешь, негодяй, восставать против нашего друга, господина председателя суда, и что скажешь об этом бунте черни?</p><p class="p1">– Государь, я в нем не участвовал.</p><p class="p1">– Как это? Разве не захватила тебя, грабителя, стража в той толпе?</p><p class="p1">– Нет, государь, тут недоразумение. Это злой рок. Я пишу трагедии. Умоляю, ваше величество, выслушать меня. Я поэт. Людей моей профессии меланхолия иногда заставляет выйти ночью на улицу. Со мной это случилось сегодня. Несчастная случайность! Меня задержали напрасно. Я не принимал участия в бунте. Ваше величество видели, что бродяга не узнал меня. Умоляю, ваше величество…</p><p class="p1">– Замолчи, – приказал король, глотнув своего отвара, – от твоей болтовни голова трещит…</p><p class="p1">Тристан Пустынник подошел и, указывая на Гренгуара пальцем, спросил:</p><p class="p1">– Государь, и этого можно повесить?</p><p class="p1">Это были первые слова, произнесенные им.</p><p class="p1">– Пхэ! – небрежно ответил король. – Не имею ничего против…</p><p class="p1">– Зато я имею, – сказал Гренгуар.</p><p class="p1">Наш философ был в эту минуту зеленее оливки. По холодному и безучастному лицу короля он увидал, что спасения можно искать в каком-нибудь очень патетическом эффекте. Он бросился к ногам Людовика, восклицая с отчаянными жестами:</p><p class="p1">– Ваше величество, сделайте милость, выслушайте меня! Государь, не тратьте ваши громы на такое ничтожество, как я. Гром Божий не поражает латука. Государь, вы могущественный, августейший монарх, сжальтесь над несчастным, но честным человеком, которому было бы труднее подстрекать кого-либо к бунту, чем льдине дать искру! Милостивый государь, милосердие – добродетель льва и короля. Увы! Строгость только запугивает умы. Бешеным порывом ветра не сорвать плаща со странника; солнце же, пригревая его своими лучами, мало-помалу так разгорячает его, что заставляет остаться в одной рубахе. Государь, вы – солнце! Уверяю вас, мой государь, господин и повелитель, что я не бродяга, не товарищ этих безумных воров. Бунт и разбой не пристали свите Аполлона. Не такой я человек, чтоб броситься в эти грозные тучи, которые разражаются мятежом. Я верный подданный вашего величества. Подобно тому как муж дорожит честью своей жены, а сын дрожит при мысли навлечь на себя гнев отца, так верноподданный дорожит славой своего короля. Он должен жить единой мыслью о благополучии королевского дома, об усилении своей преданности. Всякая иная страсть, берущая верх над этим чувством, – заблуждение. Вот, государь, мои политические правила. Не смотрите же на меня как на бунтовщика и грабителя, видя мое вытертое на локтях платье. Если вы меня помилуете, я протру его на коленях, молясь денно и нощно за вас. Увы! Правда, я не очень богат и даже несколько бедноват, но это не сделало меня порочным. Это не моя вина. Всем известно, что литературными трудами не накопишь большого богатства и что у тех, кто зачитывается хорошими книгами, не всегда бывает яркий огонь зимою. Одна только адвокатура склевывает все зерна, оставляя мякину прочим научным профессиям. О дырявом плаще философов есть сорок прекрасных пословиц. О государь, милосердие – единственный свет, способный осветить глубины великой души. Милосердие создает любовь подданных, которая является лучшей охраной личности государя. Что в том вашему величеству, ослепляющему всех вашим могуществом, если на свете будет больше одним человеком – одним философом, который будет продолжать плестись во мраке бедствий с пустыми карманами, перекликающимися с его пустым желудком? К тому же, государь, я ученый. Великие государи увеличивают славу своего венца, покровительствуя ученым. Геркулес не пренебрегал титулом покровителя муз. Матвей Корвин покровительствовал Жану Монроялю, украшению математиков. Плохое же было бы покровительство наукам, если бы ученых вешали. Какое пятно наложил бы на себя Александр, если б велел повесить Аристотеля! Этот поступок не был бы мушкой для украшения его лица, но зловредным наростом, который бы испортил его лицо. Государь, я написал очень удачную эпиталаму для принцессы Фландрской и августейшего дофина. Разве мог бы сделать это мятежник? Ваше величество, вы изволите видеть, что я не полуграмотный босяк, что я прекрасно учился и обладаю природным талантом. Помилуйте меня, государь. Этим вы угодите Пресвятой Деве, и клянусь вам, меня очень пугает мысль о виселице!</p><p class="p1">При этом Гренгуар в отчаянии целовал туфли короля, а Гильом Рим говорил шепотом Коппенолю:</p><p class="p1">– Хорошо делает, что валяется у его ног. Король все равно что критский Юпитер, – у него уши только в ногах.</p><p class="p1">А чулочник, не думая о критском Юпитере, отвечал с мрачной улыбкой, смотря на Гренгуара:</p><p class="p1">– О! Превосходно! Мне кажется, что это канцлер Гюгоне снова молит меня о пощаде.</p><p class="p1">Когда наконец Гренгуар умолк, еле переводя дух, он, дрожа, поднял глаза на короля, который ногтем отчищал пятно на коленях своих панталон. Затем его величество начал медленно пить свой отвар из кубка. Он не говорил ни слова, и это молчание было пыткой для Гренгуара. Наконец Людовик взглянул на него.</p><p class="p1">– Вот так болтун, – проговорил он.</p><p class="p1">Затем, обращаясь к Тристану Пустыннику, приказал:</p><p class="p1">– Отпусти его!</p><p class="p1">Гренгуар так и присел, не помня себя от радости.</p><p class="p1">– Отпустить! – проворчал Тристан. – Ваше величество, не подержать ли его немножко в клетке?</p><p class="p1">– Неужели ты думаешь, кум, что мы строим клетки, обходящиеся нам по триста шестидесять семь ливров восемь солей три денье, для таких птиц, как он? Отпусти этого развратника! – (Людовик XI очень любил это слово, которое вместе с «клянусь Пасхой» всегда употреблял в веселые минуты.) – Вытолкать его отсюда пинком!</p><p class="p1">– Ах! – воскликнул Гренгуар. – Вот великий король!</p><p class="p1">Опасаясь, чтобы король не взял назад своего приказания, он бросился к двери, которую Тристан отворил ему довольно неохотно. Солдаты последовали за ним, подталкивая его кулаками, что Гренгуар перенес, как подобает истинному философу-стоику.</p><p class="p1">Хорошее расположение, овладевшее королем с той минуты, как ему сообщили о бунте против председателя суда, сквозило во всем. Это необычайное милосердие было немаловажным признаком. Тристан смотрел из своего угла свирепо, точно дог, видевший кость и не получивший ее.</p><p class="p1">Людовик XI между тем весело барабанил по ручке своего кресла марш Пон-Одемера.</p><p class="p1">Король был очень скрытен, но умел гораздо лучше скрывать свое огорчение, чем свою радость. Эти внешние проявления удовольствия при каждом хорошем известии заходили иногда очень далеко; так, при известии о смерти Карла Смелого он дал обет построить серебряную балюстраду в храме Святого Мартина Турского, а при своем восшествии на престол он даже забыл распорядиться похоронами отца.</p><p class="p1">– Да, государь! – вдруг спохватился Жак Куаксье. – Что сталось с острым приступом болезни, ради которого вы меня вызвали?</p><p class="p1">– Ох, кум, я и в самом деле очень страдаю, – отвечал король. – В ушах шум, и грудь раздирает словно железными когтями.</p><p class="p1">Куаксье взял руку короля и стал считать пульс с ученым видом.</p><p class="p1">– Посмотри, Коппеноль, – шепотом обратился Рим к своему товарищу. – Вот он теперь между Куаксье и Тристаном. Это весь его штат. Врач – для него, палач – для других.</p><p class="p1">Ощупывая пульс короля, Куаксье становился все озабоченнее.</p><p class="p1">Людовик XI начал посматривать на него несколько тревожно. Лицо Куаксье явно омрачилось. У бедняка не было другого средства пропитания, кроме плохого здоровья короля. Он извлекал из него всю выгоду, какую мог.</p><p class="p1">– Да, да, – пробормотал он наконец, – с этим шутить нельзя.</p><p class="p1">– Правда? – с беспокойством спросил король.</p><p class="p1">– Pulsus creber, anhelans, crepitans, irregularis<a href="ch2.xhtml#id91" class="a">[146]</a>, – продолжал врач.</p><p class="p1">– Клянусь Пасхой!</p><p class="p1">– При таком пульсе через три дня может не стать человека.</p><p class="p1">– Пресвятая Дева! – воскликнул король. – Какое же лекарство, кум?</p><p class="p1">– Подумаю, государь.</p><p class="p1">Он заставил Людовика XI показать язык, покачал головой, сделал гримасу и посреди этих кривляний неожиданно сказал:</p><p class="p1">– Кстати, государь, я должен сообщить вам, что освободилось место сборщика коронных регалий, а у меня есть племянник.</p><p class="p1">– Даю место твоему племяннику, кум Жак, – отвечал король, – только избавь меня от этого огня в груди.</p><p class="p1">– Я надеюсь, ваше величество, что при вашем милосердии вы не откажете мне немного помочь при постройке моего дома в улице Сент-Андрэ-дез-Арк.</p><p class="p1">– Гм! – ответил король.</p><p class="p1">– Мои финансы истощились, – продолжал врач, – а ведь жаль оставить дом без крыши. Не из-за дома – он у меня самый простой – буржуазный, а из-за живописи Жегана Фурбо, украшающей стены. Там есть одна мчащаяся Диана, такая прекрасная, такая нежная, изящная, жизненная, с головкой, украшенной полумесяцем, с кожей такой белой, что, кажется, она способна соблазнить каждого, кто на нее поглядит слишком пристально. Есть еще Церера. Красивая богиня! Она сидит на снопе в венке из козельца и других цветов. Ничто не может быть обольстительнее ее глаз и округленнее ее ног, благороднее ее фигуры и изящнее складок ее одежды. Это одна из совершеннейших и самых чистых красавиц, когда-либо вышедших из-под кисти художника.</p><p class="p1">– Палач! – ворчал Людовик XI. – К чему ты ведешь свою речь?</p><p class="p1">– Все эти картины нуждаются в крыше, и хотя это недорого стоит, однако у меня совсем нет денег.</p><p class="p1">– Что будет стоить крыша?</p><p class="p1">– Крыша… медная, с резьбой и позолотой – не больше двух тысяч.</p><p class="p1">– Ах, убийца! – закричал король. – За каждый выдернутый зуб ему приходится платить бриллиантом.</p><p class="p1">– Будет у меня крыша? – спросил Куаксье.</p><p class="p1">– Да! И убирайся к черту, только вылечи меня.</p><p class="p1">Жак Куаксье низко поклонился и сказал:</p><p class="p1">– Государь, вот отвлекающее средство, которое спасет вас. Мы вам поставим на поясницу целебный пластырь из воска, армянского болюса, яичного белка, оливкового масла и уксуса. Вы будете продолжать пить свое питье, и мы отвечаем за жизнь вашего величества.</p><p class="p1">Горящая свеча привлекает не одну мошку. Мэтр Оливье, видя, что король в щедром настроении, и считая минуту удобной, приблизился в свою очередь:</p><p class="p1">– Государь…</p><p class="p1">– Что еще? – спросил Людовик.</p><p class="p1">– Государь, вам известно, что Симон Раден умер?..</p><p class="p1">– Ну, и что же?</p><p class="p1">– Он состоял королевским советником в суде казначейства….</p><p class="p1">– Ну так что же?</p><p class="p1">– Государь, его место освободилось…</p><p class="p1">Во время этого разговора на высокомерном лице Оливье надменное выражение сменилось низкопоклонным. Это единственная перемена, на которую способно лицо придворного. Король очень пристально взглянул ему в лицо и ответил сухо:</p><p class="p1">– Понимаю.</p><p class="p1">Затем продолжал:</p><p class="p1">– Мэтр Оливье, маршал Бусико говорил: «От кого ждать подарка, как не от короля, где ждать богатого улова, как не в море». Я вижу, ты разделяешь мнение Бусико. Ну, теперь послушай, что я скажу. У нас память хорошая. В шестьдесят восьмом году мы возвели тебя в должность камердинера; в шестьдесят девятом – назначили тебя комендантом замка близ моста в Сен-Клу с жалованьем в сто турских ливров (ты желал парижских). В ноябре семьдесят третьего года рескриптом, данным в Жержоле, мы отдали тебе должность привратника в Венсенском лесу вместо оруженосца Жильбера Акля. В семьдесят пятом году сделали тебя лесничим в Руврэ-ле-Сен-Клу вместо Жака ле Мэра. В семьдесят восьмом году мы указом за двумя висячими восковыми зелеными печатями соблаговолили предоставить тебе и жене твоей право взимать ренту в десять парижских ливров за места с торговцев, торгующих близ Сен-Жерменской школы. В семьдесят девятом году мы назначили тебя лесничим Сенорского леса вместо бедняги Жегана Диаца, затем комендантом замка Лош, потом губернатором Сен-Кантена, потом комендантом Мёланского моста, и с этого времени ты стал называться графом. Из пяти солей, которые платит каждый цирюльник, бреющий в праздник, три достаются тебе, а мы уж получаем остальное. Мы соблаговолили переменить твою фамилию Le Mauvais<a href="ch2.xhtml#id90" class="a">[147]</a>, прекрасно подходившую к твоей физиономии. В семьдесят четвертом году мы, к великому неудовольствию нашего дворянства, даровали тебе разноцветный герб, который делает твою грудь похожей на грудь павлина. Клянусь Пасхой! Не хватил ли ты лишнего? Не слишком ли хорош и необычаен улов? Смотри, как бы лишняя рыбка не опрокинула твою ладью! Тщеславие погубит тебя, куманек. За гордостью всегда идут по пятам разорение и позор. Прими это во внимание и молчи!</p><p class="p1">Эти сурово произнесенные слова вернули лицу мэтра Оливье его нахальное выражение.</p><p class="p1">– Ладно, – пробормотал он почти вслух, – видно, что король сегодня болен. Все только для врача.</p><p class="p1">Людовик вовсе не рассердился на такую дерзость, а, напротив, сказал довольно кротко:</p><p class="p1">– Постой, я еще забыл, что дал тебе пост посланника в Генте, при дворе герцогини Марии. Да, господа, – обратился король к фламандцам, – он был посланником. Ну, куманек, не обижайся, – продолжал он, обращаясь к мэтру Оливье, – ведь мы старые друзья. Однако уже очень поздно; мы кончили работу. Побрей меня.</p></span></span></span>
