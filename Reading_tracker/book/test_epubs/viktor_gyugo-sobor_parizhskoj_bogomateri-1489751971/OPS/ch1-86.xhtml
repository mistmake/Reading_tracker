<p class="p">2. Красноречие под открытым небом</p>
</div><p class="p1">Однажды вечером, в холодную и ветреную погоду, когда, казалось, никому не могла прийти охота задерживаться на улице, какой-то человек, проходивший по Таринзофилду, остановился вдруг у стен Тедкастерской гостиницы. Был конец зимы 1704–1705 года. Человек этот, судя по одежде – матрос, был хорош собой и высок ростом – качества, которые требуются от придворных, но не возбраняются и простолюдинам. Для чего он остановился? Он остановился, чтобы послушать. Что же он слушал? Голос, который раздавался по ту сторону стены, очевидно со двора; голос этот был старческим, но звучал так громко, что его слышно было на улице. И в то же время во дворе, откуда раздавался этот голос, слышался гул толпы. Голос говорил:</p><p class="p1">– Вот и я, жители и жительницы Лондона. От всего сердца поздравляю вас с тем, что вы – англичане. Вы – великий народ. Скажу точнее: вы – великое простонародье. Вы деретесь на кулачках еще лучше, чем на шпагах. У вас превосходный аппетит. Вы – нация, которая поедает другие народы. Великолепное занятие! Эта способность пожирать других ставит Англию на совершенно особое место. В своей политике и философии, в своем искусстве прибрать к рукам колонии и целые народности, в ремеслах и промышленности, в своем умении причинять другим зло, приносящее вам выгоду, вы ни с кем не сравнимы, вы изумительны! И недалек уже день, когда земной шар будет разделен на две части; на одной будет надпись: «Владения людей», на другой – «Владения англичан». Утверждаю это к вящей вашей славе – я, не имеющий отношения ни к тем, ни к другим, ибо я не англичанин и не человек: я имею честь быть медведем. Кроме того, я еще и доктор – одно не мешает другому. Джентльмены, я поучаю. Чему, спросите вы? Двум разным вещам: тому, что я знаю, и тому, чего я не знаю. Я продаю снадобья и подаю мысли. Подходите же и слушайте. Вас призывает наука. Хорошенько навострите уши; если они малы, истины попадет в них не много; если они велики, в них войдет немало глупости. Итак, внимание. Я учу науке, которая называется Pseudodoxia epidemica. У меня есть товарищ, который учит смеяться, я же учу мыслить. Мы живем с ним в одном ящике, ибо смех так же благороден, как благородно знание. Когда Демокрита спрашивали: «Как познаешь ты истину?», он ответствовал: «Я смеюсь». А если спросят меня: «Почему ты смеешься?», я отвечу на это: «Потому что познал истину». Впрочем, я вовсе не смеюсь. Я искореняю предрассудки. Я хочу прочистить ваши мозги. Они весьма засорены. Господь Бог охотно дозволяет, чтобы народ обманывался и был обманут. Отбросим ложную скромность; я совершенно открыто заявляю, что верую в Бога, даже тогда, когда он бывает неправ. Однако, когда я вижу мусор, – а предрассудки тот же мусор, – я выметаю его. Откуда я знаю то, что я знаю? Это уж мое дело. Каждый учится по-своему. Лактанций вопрошал бронзовую голову Вергилия, и она отвечала ему. Сильвестр Второй беседовал с птицами. Что ж, птицы говорили по-человечьи, – или, может быть, папа щебетал по-птичьи? Это не выяснено. Умерший ребенок раввина Елеазара разговаривал со святым Августином. Говоря между нами, я сильно сомневаюсь в истинности всех этих событий, кроме последнего. Допустим, что этот умерший ребенок действительно разговаривал; но под языком у него была золотая пластинка с начертаниями различных созвездий. Значит, тут плутовство. Все это вполне поддается объяснению. Как видите, я беспристрастен. Я отделяю правду от лжи. А вот вам другие заблуждения, которым вы, бедные, невежественные люди, наверное, отдаете дань и от которых я хочу освободить вас. Диоскорид полагал, что бог сокрыт в белене, Хризипп находил его в черной смородине, Иосиф – в репе, Гомер – в чесноке. Все они ошибались. Не Бог заключен в этих растениях, а дьявол. Я это проверил. Неверно, что у змея, соблазнившего Еву, было человеческое лицо, как у Кадма. Гарсиа де Горто, Кадамосто и Жан Гюго, архиепископ Тревский, отрицают, будто достаточно подпилить дерево, чтобы поймать слона. Я склонен согласиться с ними. Граждане, ложные убеждения возникают благодаря стараниям Люцифера. Когда находишься под владычеством князя тьмы, что удивительного в том, что заблуждения так и сыплются дождем? Добрые люди, знайте же, Клавдий Пульхр умер вовсе не от того, что куры отказались выйти из курятника; это Люцифер, предвидя кончину Клавдия Пульхра, помешал курам клевать корм. Тем, что Вельзевул дал императору Веспасиану силу исцелять калек и возвращать зрение слепым, он совершил поступок похвальный, но побуждения Вельзевула при этом были преступны. Джентльмены, не доверяйтесь шарлатанам, применяющим корень переступня и белой матицы и делающим глазные примочки из меда и крови петуха. Научитесь отличать ложь от правды. Неверно, будто Орион явился на свет вследствие того, что Юпитер удовлетворил свою естественную надобность; в действительности это светило произошло таким образом от Меркурия. Неправда, что у Адама был пуп. Когда святой Георгий убил дракона, рядом не было никакой дочери святого. У святого Иеронима в кабинете не было никаких каминных часов: во-первых, потому, что в его пещере не было никакого кабинета; во-вторых, потому, что там не было камина; в третьих, потому, что в то время еще не существовало часов. Проверяйте, проверяйте все. Милые мои слушатели, если вам скажут, будто в мозгу человека, нюхающего валерианову траву, заводится ящерица, будто бык, разлагаясь, превращается в пчелиный рой, а лошадь – в шершней, будто покойник весит больше, чем живой, будто изумруд растворяется в козлиной крови, будто гусеница, муха и паук, замеченные на одном дереве, предвещают голод, войну и чуму, будто падучую возможно излечить с помощью червя, найденного в голове косули, – не верьте этому. Все это предрассудки. Но вот вам подлинные истины: тюленья шкура предохраняет от грома; жаба питается землей, и от этого в голове, у нее образуется камень; иерихонская роза цветет в сочельник; змеи не переносят тени ясеня; у слона нет суставов, и он вынужден спать стоя, опершись о дерево; если жаба высидит куриное яйцо, из него вылупится скорпион, который родит вам саламандру; если слепой доложит одну руку на левую сторону алтаря, а другою закроет себе глаза, он пробреет; девственность не исключает материнства. Добрые люди, впитывайте в себя эти очевидные истины. А там можете верить в Бога по-разному – либо как жаждущий верит в апельсин, либо как осел верит в кнут. Ну, а теперь я познакомлю вас с нашей труппой.</p><p class="p1">В это мгновение довольно сильный порыв ветра потряс оконные рамы и ставни гостиницы, стоявшей в стороне от других построек. Это было похоже на раскаты грома, донесшиеся с неба. Голос подождал минуту, затем продолжал:</p><p class="p1">– Перерыв. Что ж, не возражаю. Пусть говорит Аквилон. Джентльмены, я не сержусь. Ветер словоохотлив, как всякий отшельник. Там, наверху, ему не с кем поболтать. Вот он и отводит душу. Итак, я продолжаю. Перед вами труппа артистов. Нас четверо. A lupo principium – начинаю со своего друга; это волк. Он не возражает, чтобы на него смотрели. Смотрите же на него. Он у нас ученый, серьезный и проницательный. Как видно, провидение собиралось сделать его сначала доктором наук, но для этого требовалась некоторая доля тупоумия, а он совсем не глуп. Прибавим, что он лишен предрассудков и отнюдь не аристократ. При случае он не прочь завести знакомство и с собакой, хотя имеет все права на то, чтобы его избранница была волчицей. Потомки его, если только они существуют, вероятно премило урчат, подражая тявканью матери и вою отца. Ибо волк воет. С людьми жить – по-волчьи выть. Но он также и лает – из снисхождения к цивилизации. Такая мягкость манер – проявление великодушия. Гомо – усовершенствованная собака. Собаку следует уважать. Собака – экое странное животное! – потеет языком и улыбается хвостом. Джентльмены, Гомо не уступит по уму бесшерстному мексиканскому волку, знаменитому холойтцениски, но превосходит его добросердечием. К тому же он смирен. Он скромен, как только может быть скромен волк, сознающий пользу, которую он приносит людям. Он сострадателен, всегда готов прийти на помощь, но делает это втихомолку. Его левая лапа не ведает, что творит правая. Таковы его достоинства. О втором своем приятеле скажу только одно: это чудовище. Вы только подивитесь на него. Некогда он был покинут пиратами на берегу океана. А вот это – слепая. Разве на свете мало слепых? Нет. Все мы слепы, каждый по-своему. Слеп скупец: он видит золото, но не видит богатства. Слеп расточитель: он видит начало, но не видит конца. Слепа кокетка: она не видит своих морщин. Слеп ученый; он не видит своего невежества. Слеп и честный человек, ибо не видит плута, слеп и плут, ибо не видит Бога. А Бог тоже слеп – в день сотворения мира он не увидел, как в его творение затесался дьявол. Да ведь и я слеп: говорю с вами и не замечаю, что вы глухи. А вот эта слепая, наша спутница, это жрица таинственного культа. Веста могла бы доверить ей свой светильник. В ее характере есть нечто загадочное и вместе с тем нежное, как овечье руно. Думаю, что она королевская дочь, то не утверждаю этого. Мудрому свойственна похвальная недоверчивость. Что касается меня самого, то я учу и лечу. Я мыслю и врачую. Chirurgus sum<a href="ch2.xhtml#id32" class="a">[206]</a>. Я исцеляю от лихорадки, от чумы и прочих болезней. Почти все виды воспалений и недугов не что иное, как заволоки, выводящие болезнь наружу, и если правильно лечить их, можно избавиться еще и от других болезней. И все же не советую вам обзаводиться многоголовым вередом, иными словами карбункулом. Это дурацкая болезнь, от которой нет никакого проку. От него умирают, только и всего. Не подумайте, что с вами говорит невежда и грубиян. Я высоко чту красноречие и поэзию и нахожусь с этими башнями в очень близких, хотя и невинных отношениях. Заканчиваю свою речь советом: милостивые государи и милостивые государыни, выращивайте в душе своей, в самом светлом ее уголке, такие прекрасные цветы, как добродетель, скромность, честность, справедливость и любовь. Тогда каждый из нас сможет здесь, в этом мире, украсить свое окошко небольшим горшочком с цветами. Милорды и господа, я кончил. Сейчас начнем представление.</p><p class="p1">Человек в одежде матроса, прослушавший всю эту речь на улице, вошел в низкий зал харчевни, пробрался между столами, заплатил, сколько с него потребовали, за вход и сразу же очутился во дворе, переполненном народом; в глубине двора он увидел балаган на колесах с откинутой стенкой: на подмостках стояли какой-то старик, одетый в медвежью шкуру, молодой человек с лицом, похожим на уродливую маску, слепая девушка и волк.</p><p class="p1">– Черт побери – воскликнул матрос, – вот замечательные актеры!</p></span></span></span></span>
