<span><span><span id="id63"><div class="title6">
<p class="p">III. Да здравствует веселье!</p>
</div><p class="p1">Читатель, может быть, еще не забыл, что оградой части Двора чудес служила старинная городская стена, большинство башен которой уже начинало в то время разваливаться. Одну из этих башен бродяги приспособили для своих увеселений. В нижнем этаже помещался кабак, а все прочее – в верхних этажах. Эта башня была самым оживленным, а следовательно, и самым отвратительным местом в резиденции бродяг. Это был словно огромный улей, жужжавший день и ночь. Ночью, когда большинство нищих спало, когда уже не светился огонь ни в одном окошке домишек, окружавших площадь, когда уже ни один крик не доносился из этих бесчисленных лачуг, кишевших ворами, проститутками, незаконными и крадеными детьми, – веселую башню можно было узнать по ее шуму, по красному свету, лившемуся из ее окон, отдушин, трещин рассевшихся стен, словом, вырывавшемуся из всех ее пор.</p><p class="p1">Итак, в подвальном этаже помещался кабак. В него спускались через низенькую дверь по лестнице, крутой, как классический александрийский стих. На двери вывеску заменяла мазня, изображавшая новые монеты и зарезанных цыплят, с каламбуром внизу: «Кабачок похоронных звонарей».</p><p class="p1">Однажды вечером, когда на парижских колокольнях давали сигналы к тушению огней, ночные сторожа – если бы им только дано было право входить в страшный Двор чудес – могли бы заметить, что в притоне бродяг было еще шумнее, чем обыкновенно, что там пили больше и бранились крепче. Перед дверью толпились многочисленные группы, разговаривавшие вполголоса, словно обсуждая какой-то важный проект, а местами оборванцы, сидя на корточках, оттачивали старые железные ножи о камень.</p><p class="p1">Между тем в самой таверне вино и игра так отвлекали бродяг от мыслей, занимавших в этот вечер все умы, что трудно было бы догадаться из отрывков речей пирующих, о чем, собственно, шла речь. Заметно было только, что они веселее обыкновенного и что у всех сверкает какое-нибудь оружие, зажатое между колен: кривой нож, топор, тяжеловесный палаш или приклад старой пищали.</p><p class="p1">Зал круглой формы был очень обширен, но столы стояли так тесно и пьющих было так много, что все, находившееся в таверне, – мужчины, женщины, скамьи, пивные кружки, все, что тут пило, спало, играло, здоровые и калеки, – все перемешалось в беспорядке, как устричные раковины в куче. Кое-где на столах горели сальные свечи; но главное освещение, заменявшее в таверне люстру оперной залы, было пламя очага. Подвал был настолько сыр, что даже летом в огромном камине со скульптурным навесом, заваленным тяжелыми железными щипцами и кухонными принадлежностями, всегда ярко пылали дрова и торф, и это был такой огонь, какой в кузнице дает ночью яркое отражение ее окон на стенах противоположных домов деревенской улицы. Большая собака, важно восседавшая на куче золы, поворачивала перед горящими угольями вертел с мясом.</p><p class="p1">Однако, несмотря на весь хаос, оглядевшись, можно было различить в этой толпе три группы, толпившиеся вокруг трех человек, уже знакомых читателю. Один из них, в странном наряде из каких-то пестрых восточных лохмотьев, был Матиас Хунгади Стукали, герцог египетский и цыганский. Бродяга восседал на столе, скрестив ноги, подняв указательный палец кверху, и громким голосом посвящал своих слушателей в тайны белой и черной магии, а те только рты разевали от удивления.</p><p class="p1">Другая кучка толпилась вокруг нашего старинного приятеля, храброго короля тунского, вооруженного до зубов. Клопен Труйльфу очень деловито, тихим голосом, руководил расхищением лежащей перед ним огромной бочки с выбитым дном, наполненной оружием. Топоры, сабли, кольчуги, наконечники для стрел, копий и алебард, луки и вертящиеся стрелы сыпались оттуда, как яблоки и виноград из рога изобилия. Каждый брал из кучи, что хотел, – темляк, шпагу или меч с крестообразной рукояткой. Даже дети вооружались, а безногие калеки заковывались в броню и латы и, точно огромные жуки, ползали между ног пирующих.</p><p class="p1">Наконец, третья группа, самая многочисленная, шумная и веселая, занимала скамьи и столы вокруг какого-то человека, звонкий голос которого, ораторствуя и ругаясь, раздавался из-под тяжелых доспехов, дополненных каской и шпорами. Человек, навьючивший на себя эти рыцарские доспехи, совершенно исчезал под своим вооружением, так что от всей его особы виднелись только дерзкий красный короткий нос, прядь белокурых волос, румяный рот и смелые глаза. За поясом у него было заткнуто несколько ножей и кинжалов, справа болтался большой меч, а слева – заржавленный самострел. Перед ним стояла объемистая кружка вина, а рядом с ним сидела толстая, неряшливая девушка. Все вокруг хохотали, бранились и пили.</p><p class="p1">Прибавив еще групп двадцать второстепенных, слуг и служанок, бегавших с кружками пива, игроков, нагнувшихся над шарами и костями, игравших в мельницу, палочку и другие азартные игры; перебранка в одном углу комнаты, поцелуи – в другом, можно составить себе некоторое понятие об общем виде этой картины, освещенной колеблющимся светом яркого огня, пылавшего в камине и заставлявшего плясать на стене множество огромных уродливых теней.</p><p class="p1">Шум, царивший в таверне, придавал ей сходство с внутренностью колокола во время трезвона.</p><p class="p1">Сковородка, на которой шипело сало, наполняла своим неумолкаемым треском промежутки между разговорами, перекрещивавшимися во всех направлениях.</p><p class="p1">Среди всего этого гама, в глубине таверны, на скамье возле очага, положив ноги на пепел и устремив взор на горящие уголья, сидел философ, погруженный в свои мысли. Это был Пьер Гренгуар.</p><p class="p1">– Ну, скорей! Вооружайтесь живей! Через час выступать! – говорил Клопен Труйльфу своей компании.</p><p class="p1">Одна из женщин запела:</p><div class="poem">
<div class="stanza">
<p class="v">Доброй ночи, отец мой и мать,</p>
<p class="v">Уж последние тухнут огни.</p>
</div>
</div><p class="p1">Двое картежников спорили.</p><p class="p1">– Валет! – кричал, весь разгоревшись, один из них, показывая кулак другому. – Покажу я тебе трефы! Ты можешь самого Мистрижи заткнуть за пояс в карточной игре у короля!</p><p class="p1">– Уф! – рычал нормандец, которого можно было узнать по его гнусавому произношению. – Здесь напихано столько народу, сколько святых в Кальювилле!</p><p class="p1">– Дети мои, – говорил фальцетом герцог египетский, обращаясь к своей аудитории. – Французские ведьмы летают на шабаш без метлы, без сала, не на каком-либо звере, а только при помощи магического слова. Итальянских колдуний у дверей всегда ждет козел. Но все обязательно вылетают в трубу.</p><p class="p1">Голос юноши, вооруженного с головы до ног, покрывал весь гам.</p><p class="p1">– Ура! Ура! – кричал он. – Я сегодня впервые ношу оружие! Бродяга! Я теперь бродяга. Черт побери самого Иисуса! Налейте мне вина! Друзья, меня зовут Жан Фролло де Мулен, и я дворянин. Я уверен, что, если бы у Бога было оружие, Он стал бы разбойником! Братья! Мы предпринимаем славную экспедицию. Мы храбрецы. Мы осадим собор, выломаем двери, выведем красавицу, спасем ее от судей, от священников, разнесем монастырь, сожжем епископа в его доме и сделаем все это в меньший срок, чем надо бургомистру, чтобы съесть ложку супу. Наше дело правое; мы ограбим собор Богоматери – и баста! Квазимодо повесим! Знаете вы Квазимодо, сударыни? Видали ли вы, как он, весь запыхавшись, трезвонит в большой колокол в Троицын день? Красивое зрелище! Словно сам дьявол сел верхом на жерло… Послушайте меня, друзья, я в душе бродяга, я родился бродягой. Я был очень богат и прожил все свое состояние. Мать желала, чтобы я был офицером, отец – чтобы я сделался дьяконом, тетка – секретарем королевства, бабушка – королевским прокурором, а внучатная бабушка – казначеем. Я же сделался бродягой! Я сказал это отцу, и он мне ответил проклятием, мать расплакалась и распустила нюни, как это полено в камине. Да здравствует веселье! Трактирщица, голубушка, другого вина! У меня есть еще чем заплатить. Вина! Только не сюренского! Оно дерет глотку! Лучше уж глотать прутья, черт побери!</p><p class="p1">Компания с хохотом рукоплескала ему, и, видя, что гам вокруг него усиливается, школяр продолжал:</p><p class="p1">– Ах, какой славный шум! Populi debacchantis populosa debacchatio!<a href="ch2.xhtml#id114" class="a">[134]</a> – И он принялся петь, закатывая глаза, тоном каноника, начинающего служить вечерню: – Quae cantica! Quae organa! Quae cantilenae! Quae melodiae hic sine fine decantantur! Sonant melliflua hymnorum organa, suavissima angelorum melodia, cantica canticorum mira!..<a href="ch2.xhtml#id112" class="a">[135]</a></p><p class="p1">Он перебил сам себя:</p><p class="p1">– Чертова трактирщица! Подай мне ужин!</p><p class="p1">Наступила минута затишья, среди которого вдруг зазвучал резкий голос герцога египетского, поучавшего своих цыган:</p><p class="p1">– Ласку зовут Адуиной, лисицу – голубой ногой или лесным бродягой, волка – серой или золотой ногой, медведя – стариком или дедушкой. Колпак гнома делает невидимым и позволяет видеть невидимые вещи. Всякую жабу, которую хотят окрестить, следует одеть в красное или черное бархатное платье и привязать ей к шее и ногам по колокольчику. Крестный отец держит голову, крестная мать – задние ноги… Злой дух Сидрагасум властен заставлять девушек плясать нагими.</p><p class="p1">– Клянусь обедней, хотел бы я быть злым духом – Сидрагасумом! – перебил Жан.</p><p class="p1">Между тем бродяги продолжали вооружаться, перешептываясь в другом конце таверны.</p><p class="p1">– Бедняжка Эсмеральда, – говорил один цыган. – Ведь она наша сестра; надо вытащить ее оттуда.</p><p class="p1">– А разве она все еще в соборе? – спросил один из бродяг с еврейским лицом.</p><p class="p1">– Да, черт возьми!</p><p class="p1">– Ну, так идем на собор, товарищи! – крикнул бродяга. – Тем более что в часовне Святых Ферреоля и Ферруциона есть две статуи – одна святого Иоанна Крестителя, а другая – святого Антония – обе из чистого золота и вместе весят семь золотых марок пятнадцать унций; а серебряные золоченые пьедесталы их весят семнадцать марок пять унций. Я это знаю; я ведь золотых дел мастер.</p><p class="p1">В эту минуту Жану подали его ужин. Он воскликнул, положив голову на грудь девушки, сидевшей рядом с ним:</p><p class="p1">– Клянусь святым Вульфом Люком, которого народ называет святым Гоглю, я вполне счастлив! Передо мной торчит какой-то дурак с рожей гладкой, как у эрцгерцога; а у соседа слева зубы такие длинные, что закрывают весь его подбородок. А сам я похож на маршала Жиэ при осаде Понтуаза. Я так же, как он, опираюсь на холм. Черт возьми, приятель, ты с виду похож на торговца, а усаживаешься рядом со мной. Я, любезный, из дворян. Торговля несовместна с дворянством. Убирайся отсюда!.. Эй, вы там, перестаньте драться! Как, Баптист Крок-Уазон, у тебя такой великолепный нос, а ты рискуешь подставлять его под кулак этого быка! Дурак! Non cuiquam datum est habere nasum<a href="ch2.xhtml#id111" class="a">[136]</a>. А ты, право, божественна, Жаклина Ронж-Орейль, жаль только, что у тебя нет волос. Эй! Меня зовут Жан Фролло, и брат мой – архидьякон. Черт его побери! Все, что я говорю вам, – правда. Делаясь бродягой, я с легким сердцем отказался от половины дома в раю, которую брат сулил мне: dimidiam domum in paradiso. Привожу его подлинные слова. У меня есть владение на улице Тиршап, и все женщины влюбляются в меня. Это так же верно, как верно то, что святой Илия был хорошим золотых дел мастером, что пять цехов славного города Парижа – это дубильщики, сыромятники, ременщики, кошелечники и седельщики, а святого Лаврентия сожгли на костре из яичных скорлуп. Клянусь вам, товарищи:</p><div class="poem">
<div class="stanza">
<p class="v">Que je ne beuvrai de piment</p>
<p class="v">Devant un an, si je cy ment!<a href="ch2.xhtml#id110" class="a">[137]</a></p>
</div>
</div><p class="p1">Посмотри, моя милая, светит луна. Взгляни в отдушину. Как ветер мнет облака! Вот и я так твою косынку. Эй, вы, бабы, смотрите, как текут сопли из детских носов и со свечей! Христос и Магомет! Что это я ем, Юпитер! Эй, хозяйка! На голове у твоих девок волос нет, зато их находишь в яичнице. Старуха! Я люблю лысую яичницу. Ах, чтоб тебя черт схватил за нос! Чертовски хороший кабак, где девки причесываются вилками!</p><p class="p1">Говоря это, он разбил тарелку об пол и запел во все горло:</p><div class="poem">
<div class="stanza">
<p class="v">Et je n’ai, moi:</p>
<p class="v">Par le sang – Dieu!</p>
<p class="v">Ni foi, ni loi,</p>
<p class="v">Ni feu, ni fieu,</p>
<p class="v">Ni roi,</p>
<p class="v">Ni Dieux!<a href="ch2.xhtml#id109" class="a">[138]</a></p>
</div>
</div><p class="p1">Между тем Клопен Труйльфу окончил раздачу оружия. Он подошел к Гренгуару, который, поставив ноги на перекладину камина, казался погруженным в глубокое раздумье.</p><p class="p1">– Друг Пьер, – начал тунский король, – о каком ты черте думаешь?</p><p class="p1">Гренгуар обернулся к нему с меланхолической улыбкой:</p><p class="p1">– Люблю я огонь, ваше величество. Я люблю его не по той тривиальной причине, что он согревает нам ноги или варит наш суп, но люблю его за его искры. Иногда я по целым часам смотрю на них. Я открываю тысячу вещей в этих звездах, усеивающих черный фон очага. Эти звезды – тоже миры.</p><p class="p1">– Гром и молния, если я тебя понимаю! – сказал бродяга. – Знаешь ли ты, который час?</p><p class="p1">– Не знаю, – отвечал Гренгуар.</p><p class="p1">Клопен подошел к герцогу египетскому.</p><p class="p1">– Друг Матиас, неудачное мы выбрали время: говорят, король Людовик Одиннадцатый в Париже?</p><p class="p1">– Тем более нужно извлечь из его когтей нашу сестру, – ответил старый цыган.</p><p class="p1">– Ты молодец, Матиас, – сказал тунский король. – К тому же мы живо обделаем. Сопротивления в соборе нечего бояться. Каноники – зайцы, а мы сильны. То-то удивятся парламентские прислужники, когда придут завтра за ней. Клянусь кишками Папы, я не допущу, чтобы повесили нашу красавицу.</p><p class="p1">Клопен вышел из кабака.</p><p class="p1">Между тем Жан крикнул хриплым голосом:</p><p class="p1">– Я пью, я ем, я пьян, я Юпитер! Ей, Пьер-душегуб, если ты еще раз посмотришь на меня такими глазами, я щелчком смахну у тебя пыль с носа.</p><p class="p1">Гренгуар, выведенный из задумчивости, со своей стороны, начал всматриваться в происходившую вокруг него бурную и крикливую сцену, бормоча сквозь зубы: «Luxuriosa res vinum et tumultuosa ebreitas<a href="ch2.xhtml#id108" class="a">[139]</a>. Увы! хорошо я делаю, что не пью, и прав святой Бенедикт, говоря: “Vinum apostatare facit etiam sapientes”»<a href="ch2.xhtml#id102" class="a">[140]</a>.</p><p class="p1">В эту минуту вернулся Клопен и закричал громовым голосом:</p><p class="p1">– Полночь!</p><p class="p1">При этом слове, вызвавшем такой же эффект, как приказание седлать, отданное отдыхающему полку, все бродяги – мужчины, женщины и дети – толпой бросились вон из кабака, гремя оружием и звеня железом.</p><p class="p1">Двор чудес погрузился в полный мрак. Нигде ни одного огонька. Однако двор не опустел: на нем стояла толпа мужчин и женщин, переговаривавшихся шепотом. Слышен был гул, и в темноте отсвечивало разнообразное оружие. Клопен стал на большой камень.</p><p class="p1">– Стройся, бродяги! – скомандовал он. – Стройся, цыгане! Стройся, галилеяне!</p><p class="p1">В темноте началось движение. Огромная толпа, по-видимому, строилась в колонну. Через несколько минут тунский король еще раз возвысил голос:</p><p class="p1">– Идти тихо во время шествия по Парижу! Пароль – «Огонек горит!» Факелы зажечь только перед собором. Марш!</p><p class="p1">Через десять минут ночные сторожа бежали в ужасе перед длинной процессией одетых в черное людей, молча двигавшихся по направлению к мосту Шанж по извилистым улицам, пересекающим по всем направлениям огромный Рыночный квартал.</p></span></span></span>
