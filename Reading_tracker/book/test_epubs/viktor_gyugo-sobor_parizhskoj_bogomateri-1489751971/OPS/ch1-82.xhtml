<span><span><span><span id="id135"><div class="title6">
<p class="p">9. Сумасбродство, которое люди без вкуса называют поэзией</p>
</div><p class="p1">Пьесы Урсуса представляли собой интерлюдии – литературный жанр, несколько вышедший из моды в наше время. Одна из этих пьес, не дошедшая до нас, называлась «Ursus rursus»<a href="ch2.xhtml#id229" class="a">[193]</a>. По-видимому, Урсус исполнял в ней главную роль. Мнимый уход со сцены и сразу же вслед за ним новое, эффектное появление главного действующего лица – таков, судя по всему, был скромный и похвальный сюжет этой пьесы.</p><p class="p1">Интерлюдии Урсуса, как видит читатель, носили иногда латинские названия, стихи же в них нередко были на испанском языке. Испанские стихи Урсуса были рифмованные, как почти все кастильские сонеты того времени. Публику это не смущало. В ту эпоху испанский язык был довольно распространен, и английские моряки говорили на кастильском наречии не менее свободно, чем римские солдаты на карфагенском. Почитайте Плавта. К тому же в театре, как и во время обедни, латинский язык или какой-нибудь другой, столь же непонятный аудитории, не являлся ни для кого камнем преткновения. Чужую речь весело сопровождали знакомыми словами. Это, в частности, помогало нашей старой галльской Франции быть набожной. На голос «Immolatus»<a href="ch2.xhtml#id227" class="a">[194]</a> верующие пели в церкви «Давайте веселиться», а на голос «Sanctus»<a href="ch2.xhtml#id225" class="a">[195]</a> – «Поцелуй меня, дружок». Понадобилось особое постановление Тридентского собора, чтобы положить конец таким вольностям.</p><p class="p1">Урсус сочинил специально для Гуинплена интерлюдию, которой был очень доволен. Это было его лучшее произведение. Он вложил в него всю свою душу. Выразить всего себя в своем творении – существует ли большее торжество для творца? Жаба, производящая на свет другую жабу, создает шедевр. Вы сомневаетесь? Попытайтесь сделать то же.</p><p class="p1">Эту интерлюдию Урсус тщательно отделывал, стараясь довести ее до совершенства. Его детище носило название: «Побежденный хаос».</p><p class="p1">Вот содержание пьесы.</p><p class="p1">Ночь. Раздвигался занавес, и толпа, теснившаяся перед «Зеленым ящиком», сначала не видела ничего кроме темноты. В этом непроглядном мраке ползали по земле три еле различимые фигуры – волк, медведь и человек. Волка изображал волк, медведя – Урсус, человека – Гуинплен. Волк и медведь были воплощением грубых сил природы, бессознательных влечений, дикого невежества; оба они набрасывались на Гуинплена; это был хаос, боровшийся с человеком. Лиц их не было видно. Гуинплен отбивался, закутанный в саван, лицо его было закрыто густыми длинными волосами. К тому же все кругом было объято мраком. Медведь ревел, волк скрежетал зубами, человек кричал. Звери одолевали, он погибал, он молил о помощи, о поддержке, он бросал в неизвестность душераздирающий призыв. Он издавал предсмертный хрип. Зрители присутствовали при агонии первобытного человека, еще мало чем отличавшегося от дикого зверя; это было зловещее зрелище, толпа смотрела на сцену, затаив дыхание; еще мгновение – и звери восторжествуют, хаос поглотит человека. Борьба, крики, вой – и вдруг полная тишина. Во мраке раздавалось пение. Проносилось какое-то веяние, и слышался нежный голос. В воздухе реяли звуки таинственной музыки, вторившие напевам незримого существа, и вдруг неведомо откуда, неизвестно каким образом возникало белое облачко. Это белое облачко было светом, этот свет – женщиной, эта женщина – духом. И вот появлялась Дея; спокойная, чистая, прекрасная и грозная своей красотой и своей чистотой, возникала она, окруженная сиянием. Лучезарный силуэт на фоне утренней зари. Голос принадлежал ей. Нежный, глубокий, невыразимо пленительный голос. Из незримой став видимой, она пела в лучах зари. Это пение было подобно ангельскому или соловьиному. Она появлялась, и человек, ослепленный этим дивным видением, сразу вскакивал и ударами кулаков повергал обоих зверей.</p><p class="p1">Тогда видение, скользя по сцене неуловимым для публики движением, возбуждавшим ее восторг именно этой неуловимостью, начинало петь на испанском языке, чистота которого у слушателей, английских матросов, не вызывала никаких сомнений:</p><div class="poem">
<div class="stanza">
<p class="v">Ora! ilora!</p>
<p class="v">De palabra</p>
<p class="v">Nace razón</p>
<p class="v">De luz el son<a href="ch2.xhtml#id224" class="a">[196]</a>.</p>
</div>
</div><p class="p1">Затем Дея опускала глаза, точно увидав пропасть у себя под ногами, и продолжала:</p><div class="poem">
<div class="stanza">
<p class="v">Noche quita te de allí!</p>
<p class="v">El alba canta hallalí<a href="ch2.xhtml#id223" class="a">[197]</a>.</p>
</div>
</div><p class="p1">По мере того как она пела, человек все больше и больше выпрямлялся: он уже не был простерт на земле, он стоял теперь коленопреклоненный, протянув руки к видению, попирая коленями обоих неподвижно лежавших, как бы сраженных молнией животных. Она же продолжала, обращаясь к нему:</p><div class="poem">
<div class="stanza">
<p class="v">Еs menester a cielos ir</p>
<p class="v">Y tu que llorabas reír<a href="ch2.xhtml#id222" class="a">[198]</a>.</p>
</div>
</div><p class="p1">Приблизившись к нему с величием светила, она продолжала:</p><div class="poem">
<div class="stanza">
<p class="v">Quebra barzón!</p>
<p class="v">Dexa, monstro,</p>
<p class="v">A tu negro</p>
<p class="v">Caparazón<a href="ch2.xhtml#id221" class="a">[199]</a>.</p>
</div>
</div><p class="p1">И возлагала руку ему на лоб.</p><p class="p1">Тогда во мраке раздавался другой голос, более низкий и страстный, голос сокрушенный и восторженный, глубоко трогательный своей дикой робостью. Это была песнь человека в ответ на песнь звезды. Все еще стоя на коленях во мраке и пригибая к земле побежденных зверей – медведя и волка, – Гуинплен, на челе которого покоилась рука Деи, пел:</p><div class="poem">
<div class="stanza">
<p class="v">О ven! ama!</p>
<p class="v">Eres alma</p>
<p class="v">Soy corazón<a href="ch2.xhtml#id38" class="a">[200]</a>.</p>
</div>
</div><p class="p1">И вдруг, прорезав пелену мрака, яркий луч света падал прямо на лицо Гуинплена.</p><p class="p1">Из тьмы внезапно возникала смеющаяся маска чудовища.</p><p class="p1">Невозможно передать словами волнение, охватывавшее при этом зрителей. Над толпою поднималось солнце смеха. Смех порождается неожиданностью, а что могло быть неожиданнее такой развязки? Впечатление, производимое на публику снопом света, ударявшего в шутовскую и вместе с тем ужасную маску, было ни с чем не сравнимо. Все хохотали кругом; всюду – наверху, внизу, в передних, в задних рядах, мужчины, женщины; лысые головы стариков, розовые детские рожицы, добрые, злые, веселые, грустные лица – все озарялось весельем; даже прохожие на улице, которым ничего не было видно, начинали смеяться, услыхав этот громовый хохот. Ликованье зрителей выражалось бурными рукоплесканиями и топотом ног. Когда занавес задергивался, Гуинплена бешено вызывали. Он имел огромный успех. «Видели вы “Побежденный хаос”?» Все спешили посмотреть Гуинплена. Приходили посмеяться люди беззаботные, приходили меланхолики, приходили люди с нечистой совестью. Этот неудержимый хохот можно было иногда принять за болезнь. Но если существует на свете зараза, которой человек не боится, то это заразительное веселье. Впрочем Гуинплен имел успех только среди бедноты. Большая толпа – это маленькие люди. «Побежденный хаос» можно было посмотреть за один пенни. Знать не посещает тех мест, где за вход платят грош.</p><p class="p1">Урсус был не совсем равнодушен к своему драматическому произведению, которое он долго вынашивал.</p><p class="p1">– Это в духе некоего Шекспира, – скромно заявлял автор «Побежденного хаоса».</p><p class="p1">Контраст между Деей и ее партнером усиливал поразительное впечатление, оказываемое на зрителей Гуинпленом. Этот лучезарный образ рядом с этим уродом вызывал чувство, которое можно было бы определить как изумление при виде божества. Толпа взирала на Дею с тайной тревогой. В ней было нечто возвышенное, она казалась девственной жрицей, не ведающей людских страстей, но познавшей Бога. Видно было, что она слепа, но вместе с тем чувствовалось, что она все видит. Казалось, она стоит на пороге в мир сверхъестественного; казалось, ее освещает какой-то нездешний свет. Она опустилась из звездного мира, чтобы принести благо, но так, как это делает небо: разливая вокруг сияние зари. Она нашла отвратительное чудовище и вдохнула в него душу. Она производила впечатление созидательной силы, удовлетворенной и в то же время ошеломленной собственным творением. На ее прекрасном лице отражалось восхитительное смущение, твердая воля совершить благо и изумление перед тем, что она сделала. Чувствовалось, что она любит своего урода. Знала ли она, что он – урод? Да – ведь она прикасалась к нему. Нет – ведь она не отвергала его. Сочетание этих противоположностей, тьмы и света, порождало в сознании зрителя некий сумрак, в котором вырисовывались беспредельные дали. Каким путем божество соединяется с первичным веществом, как происходит проникновение души в материю, почему солнечный луч является своего рода пуповиной, как преображается урод, как бесформенное становится райски совершенным? – все эти тайны, возникавшие в виде смутных образов, внушали почти космическое волнение, усиливавшее судорожный хохот, который вызывала маска Гуинплена. Не вникая в сущность авторского замысла – ибо зритель не любит утруждать себя глубоким проникновением, – публика все-таки постигала нечто выходившее за пределы того, что она видела на подмостках: этот необычайный спектакль приподымал завесу над тайною преображения человека.</p><p class="p1">Что касается переживаний Деи, то их трудно передать словами. Она чувствовала себя окруженной большой толпою, не зная, что такое толпа. Она слышала гул – больше ничего. Толпа для нее была лишь дуновением, и по существу это действительно так. Смена поколений не что иное, как дыхание вечности. Человек делает вдох, выдох и испускает дух. В толпе Дея чувствовала себя одинокой и трепетала от страха, словно под ногами ее зияла разверстая пропасть. Но и в том состоянии смятения и скорби, когда невинное существо, возмущенное возможным падением в бездну, готово бросить упрек неведомому, Дея сохраняла присутствие духа, преодолевала сознание своего одиночества, смутную тревогу перед лицом опасности и вдруг, снова обретая уверенность и точку опоры, хваталась за спасительную нить, кинутую ей в беспредельном мире мрака, и, простирая руку, возлагала ее на могучую голову Гуинплена. Несказанная радость! Ее розовые пальцы погружались в лес курчавых волос. Прикосновение к шерсти вызывает всегда ощущение чего-то нежного. Дея ласкала густое руно, зная, что это – лев. Ее сердце было переполнено неизъяснимой любовью. Она чувствовала себя вне опасности, она нашла своего спасителя. Публике же представлялось совсем иное: для зрителей спасенным был Гуинплен, а спасительницей – Дея. «Не беда!» – думал Урсус, понимавший, что происходит в сердце Деи. И Дея, успокоенная, утешенная, восхищенная, преклонялась перед ангелом, между тем как толпа, видела перед собой чудовище и, тоже зачарованная, но совсем иначе, испытывала на себе воздействие этого титанического смеха.</p><p class="p1">Истинная любовь не знает пресыщения. Будучи всецело духовной, она не может охладиться. Пылающий уголь может подернуться пеплом, небесное светило – никогда. Каждый вечер возобновлялись для Деи эти восхитительные переживания; она готова была плакать от нежности, в то время как толпа надрывалась от смеха. Люди только веселились, Дея же испытывала счастье.</p><p class="p1">Впрочем, необузданное веселье, вызываемое внезапным появлением ошеломляющей маски Гуинплена, вовсе не входило в намерения Урсуса. Он предпочел бы этому хохоту улыбку, он хотел бы встретить у публики восхищение менее грубого свойства. Но триумф всегда служит утешением. И Урсус каждый вечер примирялся с несколько странным успехом своей пьесы, подсчитывая, сколько шиллингов составляют стопки собранных фартингов и сколько фунтов стерлингов в стопках шиллингов. Кроме того, он говорил себе, что, когда смех уляжется, «Побежденный хаос» снова всплывет перед глазами зрителей и неизбежно оставит впечатление в их душе. Он, пожалуй, не совсем ошибался. Всякое произведение искусства оставляет след в сознании людей. Действительно, простой народ, внимательно следивший за этим волком, за медведем, за человеком, за этой музыкой, за диким воем, побежденным гармонией, за этим мраком, рассеянным лучами зари, за пением, от которого исходил свет, – относился с неясной, но глубокой симпатией, даже с некоторым уважением и нежностью к драматической поэме «Побежденный хаос», к этой победе светлого начала над силами тьмы, приводившей к радостному торжеству человека.</p><p class="p1">Таковы были грубые увеселения простого народа.</p><p class="p1">Он вполне довольствовался ими. Народ не имел возможности посещать «благородные поединки», устраиваемые на потеху высокородных джентльменов, и не мог, подобно им, ставить тысячу гиней на Хелмсгейла против Филем-ге-Медона.</p></span></span></span></span>
