<span><span><span><span id="id151"><div class="title6">
<p class="p">2. От сладостного к суровому</p>
</div><p class="p1">Как просто иногда совершается чудо. В «Зеленом ящике» настало время завтрака, и Дея просто пришла узнать, почему Гуинплен не идет к столу.</p><p class="p1">– Ты?! – воскликнул Гуинплен, и этим все было сказано.</p><p class="p1">Для него уже не существовало никаких других горизонтов, ничего другого, кроме неба, где была Дея.</p><p class="p1">Кто не видел улыбки моря, непосредственно следующей за ураганом, тот не может представить себе картину такого умиротворения. Ничто не успокаивается быстрее, чем пучина. Это объясняется легкостью, с какою она все поглощает. Таково и человеческое сердце. Впрочем, не всегда.</p><p class="p1">Стоило появиться Дее, как все, что было светлого в душе юноши, устремилось к ней, и все призраки бежали прочь от ослепленного Гуинплена. Какая великая сила любовь!</p><p class="p1">Несколько мгновений спустя оба сидели друг против друга, Урсус между ними, Гомо – у их ног. Чайник, над которым горела лампочка, стоял на столе. Фиби и Винос были чем-то заняты во дворе.</p><p class="p1">Завтракали, так же как и ужинали, в среднем отделении фургона. Узенький стол был расположен таким образом, что Дея сидела спиною к окну, служившему также и входной дверью «Зеленого ящика». Гуинплен наливал Дее чай. Колени их соприкасались.</p><p class="p1">Дея грациозно дула в свою чашку. Вдруг девушка чихнула. Это произошло как раз в то мгновение, когда над лампой рассеивался дымок и что-то вроде листка бумаги рассыпалось пеплом. От этого-то дымка и чихнула вдруг Дея.</p><p class="p1">– Что это? – спросила она.</p><p class="p1">– Ничего, – ответил Гуинплен.</p><p class="p1">И улыбнулся.</p><p class="p1">Он только что сжег письмо герцогини.</p><p class="p1">Совесть любящего мужчины – ангел-хранитель любимой им женщины.</p><p class="p1">Уничтожив письмо, Гуинплен почувствовал странное облегчение. Он ощутил свою честность, как орел ощущает мощь своих крыльев.</p><p class="p1">Ему показалось, что с этим дымком улетучивается и соблазн, что вместе с клочком бумаги обратилась в пепел и сама герцогиня.</p><p class="p1">Путая свои чашки, беря одну вместо другой, они без умолку говорили. Лепет влюбленных – чириканье воробышков. Ребячество, достойное Матушки-Гусыни и Гомера. Беседа двух влюбленных сердец – вершина поэзии, звук поцелуев – вершина музыки.</p><p class="p1">– Знаешь что?</p><p class="p1">– Нет.</p><p class="p1">– Гуинплен, мне снилось, будто мы звери и будто у нас крылья.</p><p class="p1">– Раз крылья – значит, мы птицы, – шепотом произнес Гуинплен.</p><p class="p1">– А звери – значит, ангелы, – буркнул Урсус.</p><p class="p1">Разговор продолжался.</p><p class="p1">– Если б тебя не было на свете, Гуинплен…</p><p class="p1">– Что тогда?</p><p class="p1">– Это значило бы, что нет бога.</p><p class="p1">– Чай очень горячий. Ты обожжешься, Дея.</p><p class="p1">– Подуй на мою чашку.</p><p class="p1">– Как ты сегодня хороша!</p><p class="p1">– Знаешь, мне надо так много сказать тебе.</p><p class="p1">– Скажи.</p><p class="p1">– Я люблю тебя!</p><p class="p1">– Я обожаю тебя!</p><p class="p1">Урсус бормотал про себя:</p><p class="p1">– Вот славные люди, ей-богу!</p><p class="p1">В любви особенно восхитительны паузы. Как будто в эти минуты накопляется нежность, прорывающаяся потом сладостными излияниями.</p><p class="p1">Помолчав немного, Дея воскликнула:</p><p class="p1">– Если б ты знал! Вечером во время представления, когда я дотрагиваюсь до твоего лба… – о, у тебя благородное чело, Гуинплен! – в ту минуту, когда я чувствую под своими пальцами твои волосы, меня охватывает трепет, я испытываю неизъяснимую радость, я говорю себе: в этом мире вечной ночи, окружающей меня, в этой Вселенной, где я обречена на одиночество, в необъятном, мрачном хаосе, в котором я нахожусь и где все так обманчиво-зыбко во мне и вне меня, существует только одна точка опоры. Это он, – это ты.</p><p class="p1">– О, ты любишь меня, – промолвил Гуинплен. – У меня тоже нет на земле никого, кроме тебя. Ты для меня все. Потребуй от меня чего угодно, Дея, и я сделаю. Чего бы ты желала? Что мне надо сделать для тебя?</p><p class="p1">Дея ответила:</p><p class="p1">– Не знаю. Я счастлива.</p><p class="p1">– О да, – подхватил Гуинплен, – мы счастливы.</p><p class="p1">Урсус строго повысил голос:</p><p class="p1">– Ах так! Вы счастливы? Это почти преступление. Я уже предупреждал вас. Вы счастливы? Тогда старайтесь, чтобы вас никто не видел. Занимайте как можно меньше места. Счастье должно забиваться в самый тесный угол. Съежьтесь еще больше, станьте еще незаметнее. Чем незначительнее человек, тем больше счастья перепадет ему от Бога. Счастливые люди должны прятаться, как воры. Ах, вы сияете, жалкие светляки, – ладно, вот наступят на вас ногой, и отлично сделают! Что это за дурацкие нежности? Я не дуэнья, которой по должности положено смотреть, как целуются влюбленные голубки. Вы мне надоели, в конце концов. Убирайтесь к черту!</p><p class="p1">И, чувствуя, что его суровый тон все смягчается, становится почти нежным, он, скрывая свое волнение, заворчал еще громче.</p><p class="p1">– Отец, – сказала Дея, – почему у вас такой сердитый голос?</p><p class="p1">– Это потому, – ответил Урсус, – что я не люблю, когда люди слишком счастливы.</p><p class="p1">Тут Урсуса поддержал Гомо. У ног влюбленной пары послышалось рычанье волка.</p><p class="p1">Урсус наклонился и положил руку на голову Гомо.</p><p class="p1">– Ну вот, ты тоже не в духе. Ты ворчишь. Вон как ощетинилась шерсть на твоей волчьей башке! Ты не любишь любовного сюсюканья. Это потому, что ты умен. Но все равно молчи. Ты поговорил, ты высказал свое мнение. Теперь – ни гу-гу.</p><p class="p1">Волк снова зарычал.</p><p class="p1">Урсус заглянул под стол.</p><p class="p1">– Смирно, говорю тебе, Гомо. Ну, не упрямься, философ.</p><p class="p1">Но волк вскочил на ноги и, глядя на дверь, оскалил клыки.</p><p class="p1">– Что с тобой? – спросил Урсус и схватил Гомо за загривок.</p><p class="p1">Дея, не обращая внимания на ворчанье волка, вся погруженная в собственные мысли, наслаждалась звуком голоса Гуинплена и молчала в том свойственном одним лишь слепым состоянии экстаза, порою дающего им возможность слышать пение, которое звучит у них в душе и заменяет им какой-то неведомой музыкой недостающий свет. Слепота – мрак подземелья, откуда слышна глубокая, вечная гармония.</p><p class="p1">В то время как Урсус, уговаривая Гомо, опустил голову, Гуинплен поднял глаза.</p><p class="p1">Он поднес ко рту чашку чая, но не стал пить ее; с медлительностью ослабевшей пружины он поставил ее обратно на стол, его пальцы так и остались разжатыми, он весь замер и, не дыша, устремил глаза в одну точку.</p><p class="p1">В дверях, за спиною Деи, стоял какой-то человек.</p><p class="p1">Незнакомец был одет в длинный черный плащ с капюшоном. Его парик был надвинут до самых бровей, в руках он держал железный кованый жезл и короной на обоих концах. Жезл был короткий и массивный.</p><p class="p1">Вообразите себе Медузу, просунувшую голову между двумя ветвями райского дерева.</p><p class="p1">Урсус почувствовал, что кто-то вошел; не выпуская Гомо, он поднял голову и узнал страшного гостя. Он задрожал всем телом.</p><p class="p1">– Это жезлоносец, – шепнул он на ухо Гуинплену.</p><p class="p1">Гуинплен вспомнил.</p><p class="p1">Он чуть было не вскрикнул от удивления, но удержался. Железный жезл с короной на концах был iron-weapon.</p><p class="p1">Это тот знаменитый жезл, на котором городские судьи, вступая в должность, приносили присягу и от которого прежние полицейские в Англии получили свое название.</p><p class="p1">Позади человека в парике вырисовывалась в полумраке фигура перепуганного хозяина гостиницы.</p><p class="p1">Человек, не произнося ни слова и как бы олицетворяя собой немую Фемиду древних хартий, протянул правую руку над головой улыбающейся Деи и, дотронувшись железным жезлом до плеча Гуинплена, в то же время большим пальцем левой руки указал на дверь «Зеленого ящика». Двойной этот жест, казавшийся еще повелительнее благодаря молчанию жезлоносца, означал: «Следуйте за мной».</p><p class="p1">«Pro signo exeundj, sursum trahe»<a href="ch2.xhtml#id5" class="a">[213]</a>, – говорится в нормандском своде монастырских грамот.</p><p class="p1">Тот, на кого опускался железный жезл, терял все права, кроме права повиноваться. Никаких возражений против безмолвного приказания не разрешалось. Английское законодательство грозило ослушнику самыми беспощадными карами.</p><p class="p1">Почувствовав на себе суровую длань закона, Гуинплен вздрогнул, потом сразу точно окаменел.</p><p class="p1">Сильный удар по голове оглушил бы его не больше, чем это простое прикосновение железного жезла к плечу. Он видел, что ему приказано следовать за полицейским. Но почему? Этого он не понимал.</p><p class="p1">Урсус, тоже как громом пораженный, все-таки довольно ясно отдавал себе отчет в происшедшем. Он думал о своих конкурентах, фиглярах и проповедниках, о доносах на «Зеленый ящик», о преступнике-волке, о своих препирательствах с тремя бишопсгейтскими инквизиторами и – как знать? – последнее было ужаснее всего – о непристойных и крамольных словах Гуинплена насчет королевской власти. Он был сильно испуган.</p><p class="p1">А Дея улыбалась.</p><p class="p1">Ни Гуинплен, ни Урсус не проронили ни слова. У обоих возникла одна и та же мысль: не тревожить Дею. Волк, должно быть, решил поступить так же, ибо перестал ворчать. Правда, Урсус продолжал держать его за загривок.</p><p class="p1">Впрочем, Гомо в некоторых случаях соблюдал осторожность. Кому не приходилось замечать, как сдержанно проявляется иногда беспокойство у животных?</p><p class="p1">Быть может, в той мере, в какой волк способен понимать людей, Гомо чувствовал себя преступником.</p><p class="p1">Гуинплен встал.</p><p class="p1">Он знал, что сопротивляться немыслимо, он помнил слова Урсуса, что никаких вопросов задавать нельзя. Он вытянулся перед представителем закона во весь рост.</p><p class="p1">Пристав снял с его плеча железный жезл и повелительным жестом простер его вперед; в те времена этот жест полицейского был понятен всякому и означал:</p><p class="p1">«Этот человек один пойдет со мною. Все остальные пусть остаются на своих местах. Ни звука».</p><p class="p1">Вопросов не допускалось. Полиция во все времена с особым рвением пресекала праздные разговоры. Этот вид ареста назывался «секвестром личности».</p><p class="p1">Пристав одним движением, точно заводная кукла, вращающаяся вокруг собственной оси, повернулся спиной и важным, размеренным шагом направился к выходу. Гуинплен посмотрел на Урсуса.</p><p class="p1">Урсус ответил ему сложной мимикой: поднял плечи, прижал локти к бокам и, отставив руки, взметнул кверху брови, что должно было означать: «Покоримся неведомой судьбе».</p><p class="p1">Гуинплен взглянул на Дею. Она о чем-то задумалась; Улыбка застыла на ее лице.</p><p class="p1">Он приложил пальцы к губам и послал ей невыразимо нежный поцелуй.</p><p class="p1">Как только пристав повернулся к Урсусу спиной, тот, набравшись смелости, воспользовался этим мгновением, чтобы шепнуть на ухо Гуинплену:</p><p class="p1">– Если тебе дорога жизнь, не открывай рта, молчи, пока не спросят.</p><p class="p1">Стараясь не производить ни малейшего шума, как человек, находящийся в комнате больного, Гуинплен снял со стены шляпу и плащ, завернулся в него до самых глаз, а шляпу низко надвинул на лоб; так как накануне он лег не раздеваясь, на нем был рабочий костюм и кожаный нагрудник; он еще раз взглянул на Дею; пристав, дойдя до наружной двери «Зеленого ящика», поднял кверху жезл и стал спускаться по откидной лесенке; Гуинплен пошел за ним, точно тот тащил его на невидимой цепи; Урсус посмотрел вслед уходящему Гуинплену; в эту минуту волк принялся жалобно выть, но Урсус сразу призвал его к порядку, шепнув: «Он скоро вернется».</p><p class="p1">На дворе Никлс, видимо желая угодить полицейскому, гневным жестом велел замолчать вопившим от ужаса Винос и Фиби: с отчаянием смотрели они, как человек в черном плаще и с железным жезлом уводит Гуинплена.</p><p class="p1">Девушки стояли словно каменные, словно вдруг обратились в сталактиты.</p><p class="p1">Ошеломленный Говикем, вытаращив глаза, глядел в полурастворенное окно.</p><p class="p1">Пристав, не оборачиваясь, шел на несколько шагов впереди Гуинплена с тем ледяным спокойствием, которое дается человеку сознанием, что он олицетворяет собою закон.</p><p class="p1">В гробовом молчании они прошли через двор, затем через зал кабачка и вышли на площадь. Перед дверью гостиницы толпилась кучка прохожих, и стоял наряд полиции во главе с судебным приставом. Пораженные зрелищем зеваки, не проронив ни звука, расступились перед жезлом констебля с дисциплинированностью, свойственной каждому англичанину; пристав направился узкими переулками, которые тянулись вдоль Темзы; Гуинплен, конвоируемый с обеих сторон отрядом полицейских, бледный, не делая никаких движений, кроме тех, которых требует ходьба, закутавшись в плащ, точно в саван, медленно удалялся от гостиницы, безмолвно шествуя за молчаливым человеком, подобно статуе, которая сопровождала бы призрак.</p></span><span id="id152"><div class="title6">
<p class="p">3. Lex, rex, fex – Закон, король, чернь</p>
</div><p class="p1">Арест без объяснения причин, который сильно удивил бы нынешнего англичанина, был приемом весьма частым в полицейской практике тогдашней Великобритании. К нему прибегали еще в царствование Георга II, невзирая на habeas corpus, особенно в тех щекотливых случаях, в каких во Франции пускали в ход тайные повеления об арестах, так называемые lettres de cachet; одно из обвинений, предъявленных Уолполу, заключалось в том, что он допустил или даже сам распорядился задержать Нейгофа именно таким образом. Обвинение это было, по всей вероятности, недостаточно обосновано, ибо Нейгоф, корсиканский король, был посажен в тюрьму своими кредиторами.</p><p class="p1">Безмолвные аресты, нашедшие себе широкое применение в практике фемгерихта, допускались германским обычаем, легшим в основу доброй половины английских законов, и в некоторых случаях поощрялись обычаем нормандским, дух которого сказывается в другой их половине. Начальник дворцовой стражи Юстиниана именовался «императорским блюстителем молчания» – silentiarius imperialis. Английская магистратура, прибегавшая к подобным арестам, опиралась на многочисленные нормандские тексты: Canes latrant, sergentes silent. – Sergenter agere, id est tacere<a href="ch2.xhtml#id4" class="a">[214]</a>. Она ссылалась на параграф 16 статута Ландульфа Сагакса: Facit imperator silentium<a href="ch2.xhtml#id3" class="a">[215]</a>. Она цитировала хартию короля Филиппа от 1307 года: Multos tenebimus bastonerios qui, obmutescentes, sergentare valeant<a href="ch2.xhtml#id2" class="a">[216]</a>. Она приводила выдержки из главы LIII статута Генриха I, короля Англии: Surge signo jussus. Taciturnior esto. Hoc est esse in captione regis<a href="ch2.xhtml#id1" class="a">[217]</a>. Особенно охотно пользовалась она предписанием, которое рассматривалось ею как одна из наиболее старинных феодальных привилегий Англии и которое гласило: «Под началом виконтов состоят военные сержанты, каковые обязаны карать по всей строгости законов всех вступивших в злонамеренные общества, всех обвиненных в каком-либо тяжком преступлении, людей беглых и однажды присужденных к изгнанию… обязаны применять столь внушительные меры тайного устрашения, чтобы мирное население продолжало жить спокойно, а злоумышленники были обезврежены…» Быть задержанным на основании этого постановления значило быть схваченным вооруженной стражей (Vetus Consuetude Normanniae, MS.<a href="ch2.xhtml#id272" class="a">[218]</a>, часть I, раздел I, глава II). Юрисконсульты, кроме того, приводили главу о servientes spathae из Charta Ludovici Hutini pro normannis<a href="ch2.xhtml#id271" class="a">[219]</a>. Servientes spathae по мере приближения вульгарной латыни к современному разговорному языку превратились в sergentes spadae<a href="ch2.xhtml#id250" class="a">[220]</a>.</p><p class="p1">Безмолвные аресты были противоположностью крику «Держи его» и указывали на то, что надлежит соблюдать молчание, покуда не будут выяснены некоторые обстоятельства.</p><p class="p1">Они были предупреждением: никаких вопросов!</p><p class="p1">Когда полиция производила такие аресты, это указывало, что они производились по государственным соображениям.</p><p class="p1">К арестам этого рода прилагался правовой термин private, то есть «при закрытых дверях».</p><p class="p1">Именно таким образом, по свидетельству некоторых историков, Эдуард III подверг Мортимера задержанию в постели своей матери Изабеллы Французской. Впрочем, этот факт отнюдь не бесспорен, ибо есть сведения, что Мортимер выдержал в своем городе целую осаду, прежде чем его захватили.</p><p class="p1">Уорик, «делатель королей», охотно пользовался этим способом «привлечения людей к суду».</p><p class="p1">Кромвель тоже применял его, особенно в Коннауте: именно так, соблюдая молчание, был арестован в Кильмеко родственник графа Ормонда – Трейли-Аркло.</p><p class="p1">Личное задержание по молчаливому знаку представителя правосудия являлось скорее вызовом в суд, нежели арестом.</p><p class="p1">Иногда оно было всего-навсего способом производства дознания, и в самом молчании, налагаемом на всех присутствующих, проявлялось стремление оградить в какой-то мере интересы арестованного.</p><p class="p1">Однако народу, плохо разбиравшемуся в таких тонкостях, эти безмолвные аресты представлялись особенно страшными.</p><p class="p1">Не следует забывать, что в 1705 году, и даже значительно позднее, Англия была не та, что теперь. Весь ее внутренний уклад был крайне сумбурен и порою чрезвычайно тягостен для населения. В одном из своих произведений Даниэль Дефо, который на собственном опыте узнал, что такое позорный столб, характеризует общественный строй Англии словами: «железные руки закона». Страшен был не только закон, страшен был произвол. Вспомним хотя бы Стиля, изгнанного из парламента; Локка, прогнанного с кафедры; Гоббоа и Гиббона, вынужденных спасаться бегством, подвергшихся преследованиям Чарльза Черчилля, Юма и Пристли; посаженного в Тауэр Джона Уилкса. Если начать перечислять все жертвы статута seditious libel, список окажется длинным. Инквизиция проникла во все углы Европы; ее приемы сыска стали школой для многих. В Англии было возможно самое чудовищное посягательство на основные права ее обитателей; пусть вспомнят хотя бы о «газетчике в панцире». В середине восемнадцатого века, по приказу Людовика XV, на Пикадилли хватали неугодных ему писателей. Правда, и Георг III арестовал во Франции в зале Оперы претендента на престол. Это были две чрезвычайно длинные руки: рука французского короля дотягивалась до Лондона, а рука английского короля – до Парижа. Такова была свобода.</p><p class="p1">Прибавим, что власть охотно прибегала к казням в стенах тюрьмы; к казни примешивался обман. То был омерзительнейший способ действий, к которому Англия возвращается в наши дни, являя тем самым всему миру чрезвычайно странное зрелище: в поисках лучшего эта великая держава избирает худшее и, стоя перед выбором между прошлым, с одной стороны, и прогрессом, с другой, – допускает жестокую ошибку, принимая ночь за день.</p></span><span id="id153"><div class="title6">
<p class="p">4. Урсус выслеживает полицию</p>
</div><p class="p1">Как мы уже говорили, по суровым законам того времени обращенное к кому-либо требование следовать за жезлоносцем являлось для всех присутствующих при этом приказанием не двигаться с места.</p><p class="p1">Тем не менее кое-кто из любопытных этому требованию не подчинился и издали сопровождал группу полицейских, уводивших Гуинплена. В числе их был и Урсус.</p><p class="p1">В первое мгновение он окаменел, как только может окаменеть человек. Но столько раз уже приходилось ему сталкиваться со случайностями бродячей жизни, со всякими неожиданными злоключениями, что, подобно военному судну, на котором в минуту тревоги вызывается к боевым постам весь экипаж, он объявил сам себе аврал, призвав на помощь весь свой разум.</p><p class="p1">Он поспешил сбросить с себя оцепенение и стал размышлять. В беде нельзя поддаваться панике, беде надо смотреть прямо в лицо; это долг каждого, если только он не дурак.</p><p class="p1">Не доискиваться долго смысла события, но действовать. Действовать немедленно. Урсус задал себе вопрос: «Что делать?»</p><p class="p1">Теперь, когда Гуинплена увели, перед Урсусом встал трудный выбор: страх за судьбу Гуинплена гнал его за ним, страх за самого себя подсказывал решение не трогаться с места.</p><p class="p1">Урсус обладал отвагой мухи и стойкостью мимозы. Его объял неописуемый трепет. Однако он героически поборол все колебания и решил, вопреки закону, пойти за жезлоносцем, – до такой степени он был встревожен тем, что могло произойти с Гуинпленом. Видно, он очень перепугался, если проявил такое мужество. На какие только отважные поступки не толкает порою зайца смертельный страх! Испуганная серна способна перескочить через пропасть. Полное забвение осторожности – одна из форм страха.</p><p class="p1">Гуинплена скорее похитили, чем арестовали. Полиция действовала так быстро, что на ярмарочной площади, еще малолюдной в этот ранний час, арест Гуинплена прошел незаметно. В балаганах Таринзофилда почти никто и не знал о том, что жезлоносец приходил за «Человеком, который смеется». Вот почему кучка людей, сопровождавших шествие, была очень невелика.</p><p class="p1">Благодаря плащу и войлочной шляпе, закрывавшим все лицо Гуинплена, кроме глаз, прохожие не узнавали его.</p><p class="p1">Прежде чем пойти за Гуинпленом, Урсус принял меры предосторожности. Отозвав в сторону Никлса, Говикема, Фиби и Винос, он строго-настрого приказал им хранить обо всем полное молчание при Дее, которая так ни о чем и не подозревала; ни единым словом не проговориться при ней о случившемся и для того, чтобы она ни о чем не догадалась, объяснить отсутствие Гуинплена и Урсуса хлопотами по театральным делам; скоро наступит час ее предобеденного сна, и, прежде чем она проснется, Урсус возвратится вместе с Гуинпленом, ибо все это сплошное недоразумение, mistake, как говорится в Англии; им обоим, ему и Гуинплену, без малейшего труда удастся все разъяснить суду и полиции, они докажут властям их ошибку, и оба вскоре вернутся домой.</p><p class="p1">Урсусу удалось следовать за Гуинпленом совсем незаметно, ибо он старался держаться как можно дальше от него; и все же он умудрился не потерять его из виду. Смелое подглядывание – храбрость робких.</p><p class="p1">В конце концов, несмотря на всю торжественность, с которой арестовали Гуинплена, быть может его вызвали в полицию из-за какого-нибудь маловажного проступка. Урсус успокаивал себя, что вопрос может быть разрешен без проволочки.</p><p class="p1">Кое-что выяснится тут же в зависимости от того, в какую сторону направится отряд полицейских, когда дойдет до конца Таринзофилда и вступит в один из переулков Литтл-стренда.</p><p class="p1">Если он повернет налево, то это значит, что Гуинплена ведут в Саутворкскую ратушу. В этом случае опасаться чего-либо серьезного не приходится: какое-нибудь пустячное нарушение городских постановлений; выговор судьи, два-три шиллинга штрафа. Гуинплена отпустят, и представление «Побежденного хаоса» состоится в тот же вечер в обычное время. Никто ничего не заметит.</p><p class="p1">Если же отряд повернет направо – дело серьезное; в этом направлении находились грозные места.</p><p class="p1">Когда жезлоносец, возглавлявший двойную шеренгу полицейских, конвоировавших Гуинплена, дошел до Литтл-стренда, Урсус, затаив дыхание, впился в него главами. Бывают моменты, когда все силы человека сосредоточиваются в его взгляде.</p><p class="p1">Куда же они повернут?</p><p class="p1">Отряд повернул направо.</p><p class="p1">Урсус зашатался от ужаса и прислонился к стене, чтобы не упасть.</p><p class="p1">Нет ничего лицемернее слов, с которыми в иные минуты человек обращается к самому себе: «Надо узнать, в чем дело». В глубине души он совсем этого не желает. В нем говорит один лишь страх. К тревоге присоединяется еще и смутное опасение сделать какие-либо выводы. Человек сам себе в этом не сознается, но он уже охотно попятился бы обратно и, ступив шаг вперед, уже упрекает себя в этом.</p><p class="p1">Так было и с Урсусом. Он с трепетом подумал: «Дело принимает дурной оборот. Я всегда успел бы узнать об этом. Зачем я пошел за Гуинпленом?»</p><p class="p1">Придя к такому заключению, он – ибо всякий человек соткан из противоречий – ускорил шаг и, преодолевая страх, поспешил нагнать полицейских, чтобы в лабиринте саутворкских улиц не разорвалась нить, соединявшая его с Гуинпленом.</p><p class="p1">Полицейский отряд не мог двигаться быстрее из-за торжественности шествия.</p><p class="p1">Шествие открывалось жезлоносцем.</p><p class="p1">Оно замыкалось судебным приставом.</p><p class="p1">Все это требовало известной медлительности.</p><p class="p1">Все величие, какое только способно воплощать в себе должностное лицо, сказывалось в наружности этого замыкавшего шествие судебного пристава. Его костюм представлял собой нечто среднее между роскошным одеянием оксфордского доктора музыки и скромным черным платьем кембриджского доктора богословия. Из-под длинного годберга, то есть мантии, подбитой мехом норвежского зайца, выглядывал камзол дворянина. Внешность у этого человека была наполовину средневековая: на голове парик, как у Ламуаньона, а рукава широкие, как у Тристана Отшельника. Его большие круглые глаза по-совиному уставились на Гуинплена. Выступал он мерным шагом. Вряд ли можно было встретить более свирепого малого.</p><p class="p1">Урсус немного сбился с пути среди извилистых переулков, но у церкви святой Марии Овер-Рэй ему удалось нагнать шествие, которое, к счастью, задержала драка между мальчишками и собаками – обычная сцена на улицах тогдашнего Лондона; в старинных полицейских протоколах, отводящих собаке место впереди детей, она значилась под рубрикой «dogs and boys» – «собаки и мальчишки».</p><p class="p1">Человек, которого под конвоем полиции вели к судье, был в то время самым заурядным явлением, и так как у каждого были свои собственные дела, кучка любопытных вскоре разбрелась. Один только Урсус продолжал идти по следам Гуинплена.</p><p class="p1">Миновали две часовни, стоявшие одна против другой и принадлежавшие двум сектам, существующим еще и в наши дни: общине «Религиозного отдыха» и «Лиге аллилуйи».</p><p class="p1">Затем шествие, извиваясь, переходило из переулка в переулок, выбирая по преимуществу еще не застроенные улицы, поросшие травой, безлюдные проходы между домами, и делая много поворотов. Наконец оно остановилось. Это был глухой переулок. Никаких жилых строений, кроме двух-трех лачуг в самом начале его. Переулок пролегал между двумя стенами – низкой слева и высокой каменной стеной справа. Эта почерневшая от времени стена саксонской кладки с зубцами была укреплена железными «скорпионами» и прорезана узенькими отдушинами, закрытыми толстой решеткой. Ни одного окна; только кое-где отверстия, служившие некогда амбразурами для камнеметов и старинных пищалей. В самом низу стены виднелась маленькая калитка, похожая на дверцу мышеловки.</p><p class="p1">Эта калитка с решетчатым оконцем была проделана в полукруглом углублении массивного свода и висела на узловатых прочных петлях; она была заперта на большой замок, снабжена тяжелым молотком, сплошь усеяна гвоздями и словно покрыта панцирем из металлических пластинок и блях: в ней было больше железа, чем дерева.</p><p class="p1">В переулке – ни души. Ни лавок, ни прохожих. Но откуда-то поблизости доносился непрерывный шум, как будто рядом с переулком протекал бурный поток. Это был гул голосов и грохот экипажей. Возможно, что по другую сторону почерневшего здания проходила большая улица, вероятно главная улица Саутворка, упиравшаяся одним концом в Кентерберийскую дорогу, а другим – в Лондонский мост.</p><p class="p1">На всем протяжении переулка случайный наблюдатель мог бы обнаружить, кроме конвоя, окружавшею Гуинплена, только одно человеческое лицо – смертельно бледный профиль Урсуса, который рискнул наполовину высунуться из тени, падавшей от стены. Он притаился в одном из коленчатых изгибов переулка, смотрел и боялся увидеть.</p><p class="p1">Отряд выстроился перед калиткой.</p><p class="p1">Гуинплен находился в центре, но теперь жезлоносец со своим железным жезлом стоял позади него. Судебный пристав поднял молоток и постучал три раза. Оконце открылось. Судебный пристав произнес:</p><p class="p1">– По указу Ее Величества.</p><p class="p1">Тяжелая дубовая, окованная железом дверь повернулась на петлях, открылся темный, холодный проем, напоминавший вход в пещеру. Страшный свод терялся во мраке.</p><p class="p1">Урсус видел, как Гуинплен исчез под этим сводом.</p></span><span id="id154"><div class="title6">
<p class="p">5. Ужасное место</p>
</div><p class="p1">Жезлоносец вошел вслед за Гуинпленом. За жезлоносцем – судебный пристав. За ним – весь отряд. Калитка захлопнулась.</p><p class="p1">Тяжелая дверь вплотную прилегла к каменному косяку, и не было видно, ни кто открыл ее, ни кто ее запер. Казалось, засовы сами собой вошли в скобы. В некоторых очень давней постройки смирительных домах еще существуют подобные механизмы, служившие в старину для вящего устрашения преступника. Дверь, привратник которой оставался незримым. Это придавало тюремным воротам сходство с вратами ада.</p><p class="p1">Эта калитка была задним ходом Саутворкской тюрьмы.</p><p class="p1">В этом покрытом плесенью угрюмом здании не было ни одной детали, которая шла бы вразрез с мрачным видом, свойственным всякой тюрьме.</p><p class="p1">Языческий храм, воздвигнутый некогда катьюкланами в честь могонов, древних божеств Англии, ставший впоследствии дворцом для Этелульфа и крепостью для Эдуарда Святого, а в 1199 году превращенный Иоанном Безземельным в место заключения, – вот что представляла собою Саутворкская тюрьма. Это сооружение, вначале пересеченное улицей, подобно тому как Шенонсо пересекается рекой, в течение одного или двух столетий было тем, что по-английски называется gate, то есть укрепленной заставой городского предместья; затем проезд заложили. В Англии еще сохранилось несколько тюрем этого типа: в Лондоне – Ньюгейт, в Кентербери – Вестгейт, в Эдинбурге – Кенонгейт. Французская Бастилия на первых порах тоже служила заставой.</p><p class="p1">Почти все английские тюрьмы имели один и тот же внешний вид: снаружи – высокая стена, внутри – целый улей тюремных камер. Трудно представить себе что-либо мрачнее этих готических тюрем, в которых паук и правосудие ткали свою паутину и куда в то время не проник еще, подобно солнечному лучу, Джон Ховард. Все они, подобно старинной брюссельской «геенне», могли бы быть названы «домом слез».</p><p class="p1">Глядя на эти угрюмые здания, люди испытывали ту же щемящую тоску, какую чувствовали древние мореплаватели, проезжая мимо ада рабов, упоминаемого Плавтом, мимо островов железного лязга, ferricrepiditae insulae, при приближении к которым слышен был звон цепей.</p><p class="p1">В Саутворкскую тюрьму, старинное место пыток и изгнания бесов, вначале сажали преимущественно колдунов, как на то указывало полустершееся двустишие, высеченное на камне над калиткой:</p><div class="poem">
<div class="stanza">
<p class="v">Sunt arreptitii vexati daemone multo.</p>
<p class="v">Est energumenus quem daemon possidet unus<a href="ch2.xhtml#id249" class="a">[221]</a>.</p>
</div>
</div><p class="p1">Эти стихи устанавливают тонкое различие между одержимым и бесноватым.</p><p class="p1">Над этой надписью была прибита к стене виселичная лестница – символ высшего правосудия; она была когда-то сделана из дерева, но окаменела, будучи зарыта в землю близ Вобурнского аббатства, в Асплей-Говисе, почва которого обладает свойством все превращать в камень.</p><p class="p1">Саутворкская тюрьма, ныне уже разрушенная, выходила на две улицы, сообщавшиеся между собой в те времена, когда она служила воротами; в ней было два входа: один, парадный, с главной улицы, предназначавшийся для властей, другой – с переулка, «скорбный вход», для всех прочих смертных, а также для покойников, ибо когда в тюрьме умирал заключенный, его труп выносили в эту калитку. Это было тоже своего рода освобождение. Смерть – свобода, даруемая вечностью.</p><p class="p1">Этим «скорбным входом» Гуинплена ввели в тюрьму.</p><p class="p1">Переулок, как мы уже говорили, представлял выложенную камнем узкую дорожку, сжатую с обеих сторон стенами. В Брюсселе есть такой переулок, именуемый «Улицей для одного прохожего». Стены были неравной высоты: высокая стена была стеной тюрьмы, низкая – оградой кладбища. Эта ограда, за которой окончательно превращалось в прах тело, наполовину сгнившее в тюрьме, была не выше человеческого роста. Ее ворота приходились как раз напротив тюремной калитки. Покойнику только и было труда, что перебраться через улицу. Достаточно было сделать двадцать шагов вдоль стены, чтобы очутиться на кладбище. К высокой стене была прибита виселичная лестница; напротив, на кладбищенской ограде, красовалось изваяние черепа. Одна стена нисколько не ослабляла мрачного впечатления от другой.</p></span><span id="id155"><div class="title6">
<p class="p">6. Какие судебные чины скрывались под париками того времени</p>
</div><p class="p1">Если бы кто-нибудь в эту минуту посмотрел, что творится по другую сторону тюрьмы – со стороны ее фасада, он увидел бы главную улицу Саутворка и мог бы заметить у монументального парадного подъезда здания дорожную карету с крытыми козлами, напоминавшую нынешние кабриолеты. Ее окружала кучка любопытных. Карета была разукрашена гербами, и толпа видела, как из нее вышел человек, который исчез затем в дверях тюрьмы; вероятно, судья, – решили присутствовавшие, ибо в Англии судьи часто бывали из дворян и имели «право на герб». Во Франции герб и судейская мантия почти всегда исключали друг друга; герцог Сен-Симон, говоря о судьях, как-то выразился: «люди этого сословия». В Англии же звание судьи нисколько не бесчестило дворянина.</p><p class="p1">В Англии существуют должности выездных судей; они называются «окружными судьями», и не было ничего проще, как принять эту карету за экипаж судьи, совершающего объезд. Несколько необычным казалось только то, что предполагаемый судья вышел не из самой кареты, а сошел с козел, где хозяин обычно не сидит. Другая странность: в ту эпоху в Англии путешествовали либо в дилижансе, уплачивая по шиллингу за каждые пять миль, либо верхом, с оплатой по три су за милю и по четыре су форейтору после каждого перегона; тот, кто позволял себе путешествовать на перекладных в собственной карете, платил за каждую лошадь и за каждую милю столько шиллингов, сколько су платил ехавший верхом; карета же, остановившаяся у подъезда Саутворкской тюрьмы, была запряжена четверкой лошадей и управлялась двумя форейторами – княжеская роскошь. Наконец больше всего возбуждало любопытство и сбивало с толку то обстоятельство, что карета была тщательно закрыта со всех сторон. Верх был поднят. Окошечки были защищены ставнями; все отверстия, куда только мог проникнуть глаз, заслонены; снаружи нельзя было видеть того, что было внутри экипажа, и, вероятно, изнутри точно так же не было видно ничего из происходившего снаружи. Впрочем, судя по всему, в карете никого не было.</p><p class="p1">Так как Саутворк входил в состав Серрейского графства, то Саутворкская тюрьма была подведомственна серрейскому шерифу. Такое разграничение подсудности было в Англии явлением обычным. Так, например, лондонский Тауэр считался расположенным вне территории какого-либо графства, то есть, с точки зрения юридической, как бы висел в воздухе. Тауэр не признавал никаких судебных властей, кроме своего констебля, носившего звание custos turris<a href="ch2.xhtml#id248" class="a">[222]</a>. Тауэр имел свою собственную юрисдикцию, свою церковь, свой суд, свое особое управление. Власть кустода, или констебля, простиралась и за пределы Лондона на двадцать одно селение.</p><p class="p1">В Великобритании существует множество юридических несообразностей: так, в частности, должность главного канонира Англии подчинена лондонскому Тауэру.</p><p class="p1">Другие обычаи, получившие силу закона, кажутся еще более странными. Например, английский морской суд руководствуется в своей практике законами Родоса и Олерона (французского острова, некогда принадлежавшего англичанам).</p><p class="p1">Шериф графства был весьма важным лицом. Он всегда был эсквайром, а иногда и рыцарем. В старинных хартиях он именуется spectabilis – человеком, на которого надлежит смотреть. Этот титул занимал среднее место между illustris и clarissimus<a href="ch2.xhtml#id247" class="a">[223]</a>: он был ниже первого и выше второго. Шерифы графств некогда избирались народом; но с тех пор как Эдуард II я вслед за ним Генрих VI сделали назначение на эту должность прерогативой короны, шерифы, стали представителями королевской власти. Все они назначались его величеством, за исключением шерифа уэстморлендского, должность которого являлась наследственной, а также шерифов Лондона и Миддлсекса, избиравшихся самим населением в Commonhall. Шерифы Уэльса и Честера пользовались известными правами фискального характера. Все эти должности существуют в Англии и поныне, но мало-помалу, испытав на себе влияние новых обычаев и новых идей, уже утратили свои прежние характерные особенности. На шерифе графства лежала, между прочим, обязанность сопровождать выездных судей и при случае оказывать им покровительство. Подобно тому, как у человека две руки, у шерифа было два помощника; правой его рукой был собственно помощник шерифа, а левой – судебный пристав. При содействии окружного пристава, именуемого жезлоносцем, судебный пристав арестовывал, допрашивал и под ответственность шерифа подвергал тюремному заключению воров, убийц, бунтовщиков, бродяг и всяких мошенников, подлежавших суду окружных судей. Разница между помощником шерифа и судебным приставом, которые оба были подчинены шерифу, состояла в том, что помощник шерифа сопровождал его, а судебный пристав помогал ему в отправлении его должности. Шериф возглавлял два суда: суд постоянный, окружной, County court, и суд выездной, Sheriff-turn, воплощая, таким образом, в своем лице единство и вездесущность судебной власти. В качестве судьи он мог требовать в сомнительных случаях содействия и разъяснений от ученого юриста, так называемого sergens coifae, присяжного законоведа, который под черной шапочкой носил колпачок из белого кембрика. Шериф «разгружал» места заключения: прибыв в один из городов подведомственного ему графства, он имел право наскоро, огулом, решить судьбу всех арестованных, либо освободив их совсем, либо отправив на виселицу, что называлось очисткой тюрьмы, goal delivery. Шериф предлагал составленный им обвинительный акт двадцати четырем присяжным заседателям; если они соглашались с ним, то писали на нем; bilta vera<a href="ch2.xhtml#id246" class="a">[224]</a>; если не соглашались, делали надпись: ignoramus<a href="ch2.xhtml#id245" class="a">[225]</a>; во втором случае обвинение отпадало, я шериф имел право уничтожить обвинительный акт. Если во время судебного следствия один из присяжных умирал, каковое обстоятельство по закону влекло за собой признание обвиняемого невиновным, шерифу, имевшему право арестовать обвиняемого, предоставлялось право освободить его из-под стражи. Особенное уважение и особый страх, внушаемые шерифом, объяснялись тем, что на его обязанности лежало исполнение «всех приказаний его величества» – чрезвычайно опасная широта полномочий. Такие формулы таят в себе неограниченную возможность произвола. Шерифа сопровождали чиновники, именовавшиеся verdeors (лесничими) и коронеры; торговые приставы обязаны были оказывать ему содействие; кроме того, у него была прекрасная свита из конных и пеших слуг, одетых в ливреи. «Шериф, – говорит Чемберлен, – это жизнь правосудия, закона и графства».</p><p class="p1">В Англии все законы и обычаи в результате незаметно протекающего разрушительного процесса подвергаются постепенному измельчанию и уничтожению. В наше время, повторяем, ни шериф, ни жезлоносец, ни судебный пристав уже не могли бы отправлять свою должность так, как они отправляли ее прежде. В старинной Англии существовало некоторое смешение отдельных видов власти, и недостаточная определенность полномочий влекла за собой вторжение в сферу чужой деятельности – явление, в наши дни уже невозможное. Тесной связи между полицией и правосудием положен ныне конец. Наименования должностей сохранились, но функции их уже стали иными. Нам кажется, что даже самый смысл слова wapentake изменился. Прежде оно обозначало судейскую должность, теперь оно обозначает территориальное подразделение; прежде так назывался кантонный пристав, ныне же – самый кантон.</p><p class="p1">В описываемую нами эпоху шериф графства соединял и сосредоточивал в своем лице в качестве городской власти и представителя короля, правда с некоторыми добавочными полномочиями и ограничениями, обязанности двух чиновников, носивших некогда во Франции звание главного гражданского судьи города Парижа и полицейского судьи. Главного судью города Парижа довольно четко характеризует запись в одном из полицейских протоколов того времени: «Господин гражданский судья не враг семейных раздоров, потому что это всегда для него грабительская пожива» (22 июля 1704 года). Что же касается полицейского судьи, особы, опасной многообразием и неопределенностью своих функций, то этот тип нашел себе наиболее полное выражение в личности Рене д’Аржансона, в котором, по словам Сен-Симона, сочетались черты трех судей Аида.</p><p class="p1">Эти судьи, как уже видел читатель, заседали и в лондонской Бишопсгейтской тюрьме.</p></span><span id="id156"><div class="title6">
<p class="p">7. Трепет</p>
</div><p class="p1">Услыхав, как заскрипела всеми петлями и захлопнулась входная дверь, Гуинплен содрогнулся. Ему показалось, что эта только что закрывшаяся за ним дверь была рубежом между светом и мраком, между миром земных радостей и царством смерти, что все, что освещает и согревает солнце, осталось позади, что он переступил пределы жизни, очутился вне ее. Сердце у него болезненно сжалось. Что с ним намерены сделать? Что все это значит?</p><p class="p1">Где он?</p><p class="p1">Он ничего не видел вокруг себя; его окружала непроглядная тьма. Как только закрылась дверь, он как будто мгновенно ослеп. Оконце тоже захлопнулось. Не было ни отдушины, ни фонаря – обычная мера предосторожности в старинные времена. Запрещалось освещать внутренние ходы тюрьмы, чтобы вновь прибывшие не могли их приметить.</p><p class="p1">Гуинплен протянул руки в стороны и нащупал справа и слева стены; это был какой-то коридор. Мало-помалу бог весть откуда сочившийся в высокое подземелье сумеречный свет, к которому, расширяясь, приспособился зрачок, позволил Гуинплену различить неясные очертания тянувшегося перед ним коридора.</p><p class="p1">О суровых карательных мерах Гуинплен знал только со слов все преувеличивавшего Урсуса, и теперь ему чудилось, будто его схватила чья-то огромная незримая рука. Ужасно, когда нами распоряжается неведомый нам закон. Можно сохранять присутствие духа при всяких обстоятельствах и все-таки растеряться перед лицом правосудия. Почему? Потому, что человеческое правосудие – потемки, и судьи бродят в них ощупью. Гуинплен помнил, что Урсус говорил ему о необходимости соблюдать молчание; ему хотелось живым вернуться к Дее; он сознавал, что находится во власти чьего-то произвола, и боялся раздражать тех, от кого он теперь всецело зависел. Иногда желание выяснить положение только ухудшает его. С другой стороны, все происходившее с ним так тяготило его, что в конце концов он не удержался и спросил:</p><p class="p1">– Господа, куда вы ведете меня?</p><p class="p1">Никто не ответил ему.</p><p class="p1">Сохранение полного молчания было одним из основных правил при безмолвном аресте, и текст нормандского закона не допускал в подобных случаях никаких послаблений: «A silentiarils ostio praepositis introducti sunt»<a href="ch2.xhtml#id244" class="a">[226]</a>.</p><p class="p1">От этого молчания кровь застыла в жилах Гуинплена. До сих пор он считал себя сильным; он не нуждался ни в чьей поддержке; не нуждаться ни в чьей поддержке – значит быть необоримым. Он жил одиноким, воображая, что одиночество – верный залог неуязвимости. И вот внезапно он почувствовал на себе гнет некоей ужасной безликой силы. Каким способом бороться с чем-то страшным, жестоким, неумолимым – с законом? Он изнемогал под бременем этой загадки. Неведомый прежде страх прокрался к нему в душу, отыскав слабое место в защищавшей его броне. К тому же он совсем не спал и ничего не ел; он еле прикоснулся к чашке чая. Всю ночь он метался в каком-то бреду, его и теперь лихорадило. Его мучила жажда, быть может, и голод. Пустой желудок дурно влияет на наше душевное состояние. Со вчерашнего дня на Гуинплена обрушивалось одно нежданное событие за другим. Его поддерживало только терзавшее его волнение: не будь урагана, парус висел бы тряпкой. Он чувствовал себя именно таким беспомощным лоскутом, который ветер напрягает до тех пор, пока не превратит в лохмотья. Он чувствовал, что силы покидают его. Неужели он упадет без сознания на эти каменные плиты? Обморок – средство защиты для женщин и позор для мужчины. Он старался взять себя в руки, и все-таки дрожал.</p><p class="p1">Он испытывал ощущение человека, у которого почва уходит из-под ног.</p></span></span></span></span>
