<span><span><span id="id69"><div class="title6">
<p class="p">I. Башмачок</p>
</div><p class="p1">В то время как бродяги осадили собор, Эсмеральда спала. Вскоре ее разбудил все увеличивавшийся шум на площади и беспокойное блеяние козы, проснувшейся раньше ее. Девушка встала с постели, прислушалась, огляделась и, испуганная ярким светом и шумом, выбежала из кельи, чтобы посмотреть, что случилось. Вид площади, смутные призраки, метавшиеся по ней, беспорядок этого ночного нападения, отвратительная толпа, напоминавшая полчище прыгающих лягушек и смутно видневшаяся в темноте, хриплое карканье толпы, одиночные красные факелы, мелькавшие в потемках, точно ночные огни на туманной поверхности болота, – вся эта сцена произвела на Эсмеральду впечатление какой-то таинственной битвы между чудовищами шабаша и каменными статуями собора. Зараженная с детства суевериями цыганского племени, она было подумала, что присутствует на игрище, устроенном таинственными существами, бродящими по ночам. В ужасе бросилась она назад в келью и притаилась там, моля свое ложе послать ей менее страшные сновидения.</p><p class="p1">Но мало-помалу первый испуг прошел. По возраставшему шуму и другим ясным признакам она убедилась, что окружена не привидениями, а живыми людьми. Тогда испуг ее не усилился, но принял другое направление. Ей подумалось, что, может быть, это возмутился народ, чтобы взять ее силой из убежища. Мысль о том, что придется вторично проститься с жизнью, с надеждой, с Фебом, образ которого всегда рисовался в ее мечтах о будущем, сознание своего бессилия, невозможность бегства, беспомощность, одиночество – все эти мысли и множество других тяжелым гнетом легли на ее душу. Она бросилась на колени, упала ничком на постель, заломив над головой руки, и, дрожа от тоски, страха, забыв, что она цыганка – язычница, идолопоклонница, – стала, рыдая, просить помощи у христианского Бога и Богоматери, принявшей ее под свое покровительство. Бывают в жизни такие минуты, когда самый неверующий человек готов исповедовать религию того храма, который окажется ближе всего.</p><p class="p1">Долго оставалась она в таком положении, не столько молясь, сколько дрожа от страха, прислушиваясь с замиранием сердца ко все приближавшемуся реву разъяренной толпы, ничего не понимая, не отдавая себе отчета в том, что там творится и чего от нее хотят, а лишь томясь предчувствием страшной беды.</p><p class="p1">Вдруг среди этих мук неизвестности она услыхала позади себя шаги. Она обернулась. Два человека, из которых один держал фонарь, вошли в ее келью. Она слабо вскрикнула.</p><p class="p1">– Не бойся, – проговорил знакомый голос, – это я.</p><p class="p1">– Кто вы? – спросила она.</p><p class="p1">– Пьер Гренгуар.</p><p class="p1">Это имя ее успокоило. Она подняла глаза и действительно узнала поэта. Но рядом с ним стоял еще кто-то, закутанный с ног до головы в черное, и при виде его она оцепенела.</p><p class="p1">– А ведь Джали меня узнала раньше, чем ты, – с укором заметил Гренгуар.</p><p class="p1">Козочка действительно не дожидалась, чтобы поэт назвал себя по имени. Едва он вошел, она начала тереться об его колени, осыпая его ласками и белыми волосами, так как в это время линяла. Гренгуар так же нежно отвечал на ее ласки.</p><p class="p1">– Кто это с вами? – спросила цыганка шепотом.</p><p class="p1">– Не беспокойся, – отвечал Гренгуар, – это мой друг.</p><p class="p1">Затем философ, поставив на пол свой фонарь, уселся на корточки и, обнимая Джали, с восторгом воскликнул:</p><p class="p1">– Что за прелестное животное! Она, правда, более замечательна своей чистоплотностью, чем величиной, но как она разумна, понятлива и знает не меньше любого ученого! А ну-ка, Джали, посмотрим, не забыла ли ты свои штуки? Покажи-ка нам, как Жак Шармолю…</p><p class="p1">Человек, закутанный в черный плащ, не дал ему докончить, подошел к Гренгуару и грубо тряхнул его за плечо. Гренгуар вскочил.</p><p class="p1">– Правда! – воскликнул он. – Я и забыл, что нам нужно торопиться. Все-таки, учитель, можно было об этом напомнить и другим способом. Мое милое дитя, жизни твоей и Джали грозит опасность. Вас хотят взять отсюда, но мы, твои друзья, пришли вас спасти. Следуй за нами.</p><p class="p1">– Неужели это правда? – воскликнула цыганка с ужасом.</p><p class="p1">– Совершенная правда. Идем скорей!</p><p class="p1">– Идем, – пролепетала она. – Но почему твой друг все молчит?</p><p class="p1">– А в этом виноваты его чудаки-родители, которые создали его таким молчаливым, – сказал Гренгуар.</p><p class="p1">Эсмеральде пришлось удовольствоваться таким объяснением… Гренгуар взял ее за руку, спутник их поднял фонарь и пошел вперед. Обезумевшая от ужаса девушка шла покорно туда, куда ее вели. Коза, припрыгивая, бежала за ними и, обрадованная встречей с Гренгуаром, все время подталкивала его рожками, заставляя его спотыкаться на каждом шагу.</p><p class="p1">«Вот она, жизнь, – размышлял наш философ каждый раз, как спотыкался, – часто бывает, что нас сбивают с ног наши лучшие друзья!»</p><p class="p1">Они быстро спустились по лестнице с башни, прошли церковью, безлюдной, темной, но гудевшей от отдаленного шума, что производило ужасное впечатление, и через Красную дверь выбрались на монастырский двор. Монастырь опустел, каноники попрятались во дворце епископа, где молились все вместе. Двор был пуст. Испуганные слуги забились в укромные уголки. Беглецы направились к калитке, выходившей на Террен. Незнакомец в черном плаще отпер ее своим ключом. Читателям уже известно, что Терреном назывался мыс, обнесенный стенами со стороны Сите. Мыс этот принадлежал капитулу собора Парижской Богоматери и составлял восточную оконечность острова позади монастыря. Здесь не было ни души, шум приступа доносился сюда слабее, а крики осаждающих звучали глухо. Свежий ветерок, дувший с реки, шелестел листьями единственного дерева, выросшего на самой оконечности мыса, и шепот листьев ясно доносился до беглецов. Но все же опасность не миновала. Ближайшими зданиями к ним были собор и дворец епископа. Во дворце, очевидно, царило ужасное смятение. Сумрачная масса его постоянно озарялась огнями, перебегавшими от одного окна к другому, и напоминала собой кучку пепла от сожженной бумаги, на которой еще вспыхивают тут и там огоньки. Рядом – две огромные башни и главный корпус церкви, над которым они возвышались, вырисовываясь черными силуэтами на огненно-красном зареве, охватывавшем всю площадь, казались двумя гигантскими таганами над очагом циклопов.</p><p class="p1">Париж, видневшийся отсюда, казался глазу смесью колеблющихся темных и светлых тонов. На картинах Рембрандта встречается такое освещение заднего плана.</p><p class="p1">Человек, несший фонарь, направился прямо к оконечности мыса Террен. Здесь, около самой воды, шел полусгнивший забор из кольев, перевитых виноградной лозой, которая цеплялась за забор своими тонкими ветками, напоминая растопыренные пальцы руки. В тени за этой изгородью была привязана лодка. Незнакомец знаком приказал Гренгуару и его спутнице сесть в лодку, коза прыгнула за ними. Незнакомец вошел последним. Он отрезал веревку, которой была привязана лодка, оттолкнулся от берега длинным крюком и, усевшись на носу, взял весла и принялся грести изо всех сил, стараясь выбраться на середину реки. Течение Сены очень быстро на этом месте, и ему стоило больших трудов отплыть от мыса.</p><p class="p1">Первой заботой Гренгуара, когда он вошел в лодку, было взять на колени козочку. Он уселся на корму, девушка, которой незнакомец внушал безотчетный ужас, уселась рядом с поэтом и прижалась к нему.</p><p class="p1">Почувствовав, что лодка тронулась с места, наш философ захлопал в ладоши и поцеловал козочку в голову, между рогами.</p><p class="p1">– Ну! – воскликнул он. – Теперь мы все четверо спасены.</p><p class="p1">И, подумав немного, прибавил с весьма глубокомысленным видом:</p><p class="p1">– Благополучный исход самых великих предприятий зависит иногда от судьбы, иногда – от хитрости.</p><p class="p1">Лодка медленно подвигалась к правому берегу. Девушка с тайным страхом наблюдала за незнакомцем. Он тщательно закрыл свет своего глухого фонаря и точно призрак вырисовывался во тьме на носу лодки. Опущенный капюшон закрывал его лицо, точно маска, а при каждом взмахе весел широкие черные рукава его одежды напоминали крылья огромной летучей мыши. До сих пор он не произнес ни слова, не проронил ни звука. Слышались только скрип весел в уключинах да журчание воды за бортами лодки.</p><p class="p1">– Ей-богу! – воскликнул вдруг Гренгуар. – Мы веселы и радостны, как могильщики. Ну, чего мы молчим, точно пифагорейцы или рыбы? Клянусь небом, друзья мои, мне бы очень хотелось, чтобы кто-нибудь из вас заговорил. Человеческая речь – самая приятная музыка для человеческого слуха. Это не мои слова, а изречение Дидима Александрийского, и весьма знаменитое изречение! Ведь Дидим Александрийский – незаурядный философ. Скажите хоть словечко, моя красавица, умоляю, хоть одно словечко. Кстати, у вас была привычка так мило надувать губки, – осталась ли она и теперь? Знаете ли вы, моя прелесть, что парламент имеет верховную юрисдикцию над всеми местами убежищ и что вы подвергались большой опасности в своей келье в соборе? Увы, маленькая птичка трохил вьет себе гнезда в пасти крокодила. Учитель, смотрите, вон взошла луна. Как бы нас кто не заметил! Мы совершаем похвальный поступок, спасая сию девицу, и тем не менее нас повесят именем короля, если нас поймают. Увы, на людские деяния можно смотреть с различных точек зрения! За что порицают меня, за то венчают лаврами тебя. Те, которые восторгаются Цезарем, осуждают Катилину. Не так ли, учитель? И что вы скажете о моей философии? Я ведь практикую философию по инстинкту, как пчелы геометрию – ut apes geometriam. Ну, что же это все молчат? Какие же вы оба скучные! В таком случае я буду говорить один. В трагедии это называется монологом. Клянусь Пасхой! Предупреждаю вас, что я только что видел короля Людовика Одиннадцатого и перенял у него эту поговорку. Итак, клянусь Пасхой! – здорово же они продолжают шуметь в Сите. Препротивный старикашка этот король. Он весь укутан в меха. И до сих пор должен мне за мою мистерию, а сегодня чуть-чуть не повесил меня; мне бы это пришлось вовсе не по вкусу. Он страшно скуп на награды талантливым людям. Ему не мешало бы прочесть четыре тома сочинения Сальвиана Кельнского «Adversus avaritiam»<a href="ch2.xhtml#id88" class="a">[149]</a>. Положительно, этот король имеет весьма узкий взгляд на писателей и совершает крайне жестокие поступки. Это какая-то губка, высасывающая все деньги из народа. Его казна – это растущая опухоль, изнуряющая весь остальной организм. И народные жалобы на плохие времена переходят в ропот на короля. При этом богомольном государе виселицы гнутся от повешенных, плахи загнивают от крови, тюрьмы готовы лопнуть, как переполненные утробы. Одной рукой король берет, а другой вешает. Это прокурор господина Налога и госпожи Виселицы. Он лишает вельмож их сана, а бедняков изнуряет все возрастающими налогами. Этот король ни в чем не знает границ, и мне он не нравится. А вам, учитель?</p><p class="p1">Человек в черном не обращал внимания на болтовню поэта. Он продолжал бороться с сильным течением узкого русла реки, отделяющего остров Сите от острова Богоматери, носящего теперь название острова Святого Людовика.</p><p class="p1">– Кстати, учитель! – вспомнил вдруг Гренгуар. – Заметили ли вы, ваше преподобие, когда мы пробирались по площади среди ошалевших бродяг, маленького карапуза, которому ваш глухой звонарь собирался размозжить голову о перила галереи королей? Я близорук и не узнал его. Не знаете ли, кто это был?</p><p class="p1">Незнакомец не ответил ни слова, но вдруг перестал грести, руки его беспомощно опустились, голова поникла на грудь. И Эсмеральда услышала судорожный вздох. Она содрогнулась. Она уже слыхала эти вздохи.</p><p class="p1">Лодка, предоставленная самой себе, поплыла по течению реки. Но незнакомец через несколько мгновений овладел собой, выпрямился, схватил весла и снова начал бороться с течением. Он обогнул мыс острова Богоматери и направился к Сенной пристани.</p><p class="p1">– А вон, – заговорил Гренгуар, – виднеется особняк Барбо. Посмотрите, учитель: видите группу черных крыш, образующих такие странные углы, вон там, под низко нависшими разорванными грязными облаками, где восходит луна, приплюснутая и желтая, как яичный желток, пролившийся из разбитого яйца? Это великолепное здание. Там есть часовня, увенчанная небольшим сводом с чудной резьбой. А над кровлей вы можете заметить колокольню очень тонкой ажурной работы. При доме есть парк, где имеется пруд, птичник, эхо, место для игры в мяч, лабиринт, домик для диких зверей и множество густых аллей, где Венера себя прекрасно чувствует. Есть там еще интересное дерево под названием «Сластолюбец». Под его тенью предавались наслаждениям любви одна знаменитая принцесса и некий весьма остроумный и галантный коннетабль Франции. Увы, что значим мы, бедные философы, перед каким-нибудь коннетаблем? То же, что грядка капусты или редиски в сравнении с Луврским садом! Но не все ли равно в конце концов? Человеческая жизнь для сильных мира сего, как и для нас, исполнена добра и зла. Страдание всегда следует за наслаждением, как спондей за дактилем. Учитель, послушайте, я расскажу вам историю особняка Барбо. Конец ее трагический. Это было в тысяча триста девятнадцатом году, в царствование Филиппа Пятого, самого долговязого из всех французских королей. Вывод из этой истории можно сделать тот, что искушения плоти всегда гибельны и коварны. Не надо слишком засматриваться на жену своего ближнего, хотя бы она притягивала наши взоры своей красотой. Мысль о прелюбодеянии – весьма греховная мысль. Прелюбодеяние – это любопытство изведать наслаждение, права на которое принадлежат другому… Ого! Однако шум там все растет!</p><p class="p1">И действительно, крики и грохот вокруг собора все усиливались. Довольно ясно раздавались победные клики. Вдруг сотни факелов, ярко освещавших каски солдат, замелькали во всех этажах церкви, в башнях, галереях, переходах. Очевидно, кого-то разыскивали, и вскоре до беглецов ясно донеслись отдаленные крики: «Цыганка! Колдунья! Смерть цыганке!»</p><p class="p1">Несчастная закрыла лицо руками, а незнакомец изо всех сил начал грести к берегу. Между тем наш философ погрузился в размышление. Нежно обнимая козочку, он осторожно отодвигался от цыганки, все ближе прижимавшейся к нему как к своему единственному защитнику.</p><p class="p1">Гренгуар находился в ужасном затруднении. Он думал о том, что козочку в случае поимки повесят, по существующим законам, и ужасно жалел бедную маленькую Джали. Соображал, что ему будет слишком трудно позаботиться о спасении обеих жертв, тогда как его спутник не желает ничего лучшего, как взять на свое попечение только цыганку.</p><p class="p1">В душе поэта происходила ужасная борьба, и, подобно Юпитеру «Илиады», он мысленно поочередно взвешивал цыганку и козочку и, глядя то на одну, то на другую глазами, влажными от слез, бормотал сквозь зубы: «А все-таки я не могу спасти вас обеих!»</p><p class="p1">Сильный толчок дал им знать, что они причалили к берегу. Зловещий шум по-прежнему доносился из Сите. Незнакомец встал, подошел к цыганке и хотел взять ее за руку, чтобы помочь выйти из лодки. Она его оттолкнула и ухватилась за рукав Гренгуара, который в свою очередь почти оттолкнул ее, всецело занятый козочкой. Тогда она выпрыгнула на берег без посторонней помощи. Бедняжка была настолько испугана, что не сознавала, что делает, куда идет. С минуту она простояла как потерянная, глядя на бегущие волны реки. Когда же она немного пришла в себя, то увидала, что осталась одна с незнакомцем. По-видимому, Гренгуар воспользовался моментом высадки на берег, чтобы скрыться вместе с козой между тесно построенными домами улицы Гренье-сюр-Ло.</p><p class="p1">Бедная цыганка вздрогнула, увидав себя наедине с незнакомцем. Она хотела заговорить, крикнуть, позвать Гренгуара, но язык отказывался повиноваться, и она не могла произнести ни звука. Вдруг она почувствовала, что незнакомец схватил ее за руку своей сильной и холодной как лед рукой. Зубы ее застучали, и лицо сделалось бледнее луча луны, озарявшего ее. Незнакомец не произнес ни слова. Быстрыми шагами он направился к Гревской площади, держа Эсмеральду за руку. В эту минуту девушка смутно сознавала, что с судьбой бороться бесполезно. Силы ее оставили, она больше не сопротивлялась и бежала рядом с быстро шагавшим незнакомцем. Набережная в этом месте идет в гору, но Эсмеральде казалось, что она спускается по крутому склону.</p><p class="p1">Она огляделась вокруг. Нигде ни души. Набережная была совершенно пустынна. Виднелись человеческие фигуры и слышались крики только на пылавшем заревом острове Сите, отделенном отсюда лишь рукавом Сены. Оттуда доносилось ее имя, сопровождаемое угрозами смерти. Весь остальной Париж тонул во мраке.</p><p class="p1">Между тем незнакомец продолжал ее увлекать вперед, так же быстро и так же безмолвно. Она не узнавала ни одного из тех мест, где они шли. Проходя мимо освещенного окна, она сделала последнее усилие, вдруг остановилась и крикнула:</p><p class="p1">– Помогите!</p><p class="p1">Буржуа, живший в этом доме, отворил окошко, показался в нем в одной рубашке и со светильником в руке, тупо посмотрел на набережную, пробормотал что-то, чего она не расслышала, и снова захлопнул окно. Последний луч надежды исчез.</p><p class="p1">Незнакомец не произнес ни звука и, крепко держа ее за руку, зашагал еще быстрее. Она больше не сопротивлялась и следовала за ним, совсем разбитая.</p><p class="p1">По временам она собирала последние силы и спрашивала голосом, прерывающимся от быстрого бега по неровной мостовой: «Кто вы? Кто вы?» Он ничего не отвечал.</p><p class="p1">Так они дошли, все время вдоль набережной, до довольно обширной площади, слегка освещенной луной. Это была Гревская площадь. Посреди нее возвышалось что-то вроде черного креста: то была виселица.</p><p class="p1">Эсмеральда все это узнала и поняла, где находится.</p><p class="p1">Незнакомец остановился, обернулся к ней и поднял капюшон.</p><p class="p1">– Ах, я так и знала, что это он! – воскликнула молодая девушка, цепенея от ужаса.</p><p class="p1">Это был архидьякон. Он казался своей тенью, такое впечатление создавал лунный свет. При таком освещении все предметы кажутся призраками.</p><p class="p1">– Слушай, – заговорил он, и Эсмеральда содрогнулась при звуках этого зловещего голоса, которого она уже давно не слыхала. Он продолжал свою речь отрывистым и задыхающимся голосом, что доказывало глубокое внутреннее волнение: – Слушай! Мы пришли сюда, и я хочу с тобой поговорить. Это – Гревская площадь. Дальше идти некуда. Судьба нас отдала во власть друг другу. Твоя жизнь в моих руках, моя душа – в твоих. Этой площадью и сегодняшней ночью для нас кончается все. Слушай же, что я хочу тебе сказать… только не говори со мной о своем Фебе. – (Говоря так, он все время ходил взад и вперед, как человек, который не может устоять на месте, и таскал ее за собой.) – Не говори со мной о нем, слышишь! Если ты назовешь его по имени, я не знаю, что я сделаю, но только это будет ужасно.</p><p class="p1">Высказав это, он остановился, как тело, нашедшее наконец свой центр тяжести. Однако в словах его звучало прежнее волнение. Голос его становился все глуше:</p><p class="p1">– Не отворачивайся так от меня. Слушай, это очень серьезная вещь. Во-первых, вот что произошло. Клянусь, тут дело нешуточное. О чем это я говорил? Не помнишь? Ах да. Состоялось постановление парламента, которым тебя приговорили к эшафоту. Я тебя вырвал из их рук, но они ищут тебя. Посмотри.</p><p class="p1">И он указал на Сите. Там, по-видимому, действительно продолжались поиски. Шум приближался. В башне дома, расположенного как раз напротив Гревской площади, мелькали огни, раздавались крики. На противоположной набережной виднелись фигуры солдат, бегущих с факелами в руках, раздавались их крики: «Цыганка! Где цыганка? Смерть цыганке!»</p><p class="p1">– Ты сама видишь, что тебя ищут и что я тебе не солгал. Но я тебя люблю. Не открывай рта, лучше совсем молчи, если хочешь сказать, что ты меня ненавидишь. Я не хочу больше этого слышать. Сейчас я спас тебя от смерти. Подожди, дай мне договорить. Я могу тебя совсем спасти. У меня все готово. Теперь дело только за тобой, как ты захочешь, так я и сделаю… – Тут он круто оборвал свою речь. – Нет, совсем не то я хотел сказать.</p><p class="p1">И быстрыми шагами, не выпуская ее руки из своей и заставляя Эсмеральду бежать, он подошел прямо к виселице и, указав на нее пальцем, холодно проговорил:</p><p class="p1">– Выбирай между нами.</p><p class="p1">Эсмеральда вырвалась из его рук и припала к подножию виселицы, обнимая ее, как свою последнюю опору. Потом она приподняла свою красивую головку и взглянула через плечо на архидьякона. Она походила на Божью Матерь у подножия креста. Священник стоял не шевелясь, по-прежнему указывая пальцем на виселицу, неподвижный, как статуя.</p><p class="p1">Наконец цыганка проговорила:</p><p class="p1">– Я боюсь ее меньше, чем тебя.</p><p class="p1">Руки архидьякона горестно опустились, и взор с глубоким отчаянием устремился на камни мостовой.</p><p class="p1">– Если бы эти камни могли говорить, – прошептал он, – они бы сказали, что перед ними самый несчастный человек в мире.</p><p class="p1">Он опять заговорил. Девушка, коленопреклоненная у подножия виселицы и вся закрытая длинными волосами, не перебивала его. Теперь в голосе его слышались мягкие, жалобные ноты, странно противоречившие надменному и суровому выражению лица.</p><p class="p1">– Я тебя люблю. О! Это правда! Разве не должно вырываться наружу пламя, сжигающее мое сердце? Увы! Девушка, день и ночь, день и ночь пылает оно. Неужели я не заслуживаю сострадания? Ведь такая любовь – пытка. О, я слишком страдаю, бедное дитя мое! Такая любовь должна вызвать сострадание, я в этом уверен. Ты видишь, как я кротко говорю с тобой, мне бы так хотелось, чтобы ты перестала меня бояться. Да наконец, разве мужчина виноват, если полюбит женщину! Ах, боже мой. Неужели ты меня никогда не простишь, будешь вечно меня ненавидеть! Значит, все кончено! Вот отчего я становлюсь таким жестоким, страшным самому себе. Ты даже не смотришь на меня? Ты, может быть, думаешь о другом, пока я трепетно умоляю тебя, стоя на краю бездны, готовой поглотить нас обоих? Главное, не говори ничего о капитане! Все напрасно! Пусть я валяюсь у твоих ног, пусть я целую – не ноги твои, нет, ты этого не позволишь, – но следы твоих ног, пусть я плачу, как ребенок, пусть я готов растерзать грудь свою, вырвать оттуда не слова, а сердце и внутренности, чтобы доказать свою любовь, – все, все напрасно! А между тем душа твоя полна жалости и сострадания, ты светишься прекрасной кротостью, ты добра, ты кротка, ты милосердна и прелестна. Ты жестока только ко мне! О, проклятие!</p><p class="p1">Он закрыл лицо руками и зарыдал. В первый раз девушка видела его плачущим.</p><p class="p1">В эту минуту, стоя перед ней и вздрагивая от рыданий, он казался более несчастным и жалким, чем ползая перед ней на коленях. Так он плакал несколько минут.</p><p class="p1">– Нет, – заговорил он, немного успокоившись, – я не нахожу больше слов. А между тем я хорошо обдумал все, что хотел сказать тебе. Теперь же я волнуюсь, дрожу, силы покидают меня в решительную минуту, я чувствую над нами руку судьбы, и слова замирают у меня на устах. О, я брошусь на землю в отчаянии, если ты не сжалишься надо мной, не сжалишься над собой! Не губи нас обоих… Если бы ты знала, как я тебя люблю, какое сердце ты оттолкнула! Ты заставила меня отречься от всего доброго, отречься от самого себя! Ученый – я отвернулся от науки, дворянин – я опозорил свое имя, священнослужитель – я превратил молитвенник в подушку для сладострастных дум, я плюнул в лицо своему Богу. И все это ради тебя, чаровница, чтобы стать достойным твоего ада. Ты отвергаешь грешника! Но подожди, это еще не все, осталось самое ужасное, да, самое ужасное!</p><p class="p1">При последних словах лицо его приняло совершенно безумное выражение. Он замолк на секунду, а затем продолжал громким голосом, как бы обращаясь к самому себе:</p><p class="p1">– Каин, что сделал ты со своим братом?</p><p class="p1">Опять он замолк, потом заговорил снова.</p><p class="p1">– Что я с ним сделал, Господи? Я призрел его, я его вырастил, вскормил, я его любил, боготворил, и я его убил. Да, Господи, сегодня на моих глазах ему размозжили голову о стены твоего храма, и это по моей вине, из-за этой женщины, из-за нее…</p><p class="p1">Глаза его блуждали, голос становился все глуше. Он повторил еще несколько раз бессознательно, с большими расстановками: «из-за нее, из-за нее…», подобно замирающему отзвуку последнего удара колокола. Потом слов уже не было слышно, только губы продолжали что-то шептать. Вдруг ноги у него подкосились, он рухнул на землю и замер так, уткнувшись головой в колени.</p><p class="p1">Его заставило очнуться движение девушки, высвобождавшей свою ногу. Он медленно провел рукой по своим впалым щекам и с изумлением посмотрел на свои мокрые пальцы.</p><p class="p1">– Что это? – прошептал он. – Неужели я плакал?</p><p class="p1">И, обернувшись к цыганке, продолжал с невыразимой мукой:</p><p class="p1">– И ты равнодушно смотрела, как я плакал? Знаешь ли ты, дитя, что эти слезы были раскаленной лавой? Нет, видно, ненавистному человеку ничем не тронуть твоего сердца. Если я буду умирать у тебя на глазах, ты только засмеешься. Но я не хочу видеть твоей смерти. Одно слово, одно слово прощения! Не говори, что любишь меня, скажи только, что согласна, – этого довольно; я спасу тебя. Если же нет… Время идет; умоляю тебя всем святым, не дожидайся, пока я опять превращусь в камень, как эта виселица, поджидающая тебя. Подумай, наши судьбы в моих руках, я схожу с ума и каждую минуту могу столкнуть тебя в бездонную пропасть, разверстую у наших ног, несчастная. Падая, я буду преследовать тебя вечно! Хоть одно ласковое слово! Скажи хоть одно слово! Одно слово!</p><p class="p1">Она открыла губы, собираясь отвечать. Он упал на колени перед ней, с благоговением ожидая слов, быть может, более мягких и сострадательных, которые сорвутся с ее губ. Но она произнесла:</p><p class="p1">– Вы убийца!</p><p class="p1">Архидьякон в бешенстве сжал ее в своих объятиях и захохотал как безумный.</p><p class="p1">– Ну да, я убийца! – воскликнул он. – А все-таки ты будешь моей. Ты не захотела, чтобы я был твоим рабом, так я буду твоим господином. Но ты будешь моей. У меня есть убежище, куда я поведу тебя. И ты пойдешь за мной, – да, ты волей-неволей пойдешь за мной, иначе я тебя выдам! Выбирай, красавица, между смертью и мной. Да, ты будешь принадлежать священнику, отступнику, убийце! И сегодня же ночью, слышишь? Ну, смотри веселей! Поцелуй меня, дурочка! Выбирай – могила или мое ложе!</p><p class="p1">Глаза его сверкали от бешенства и нечистых желаний. Его сладострастные губы впивались в шею девушки, она билась в его руках. Он продолжал покрывать ее бешеными поцелуями.</p><p class="p1">– Не кусай меня, чудовище! – кричала она. – Гнусный, отвратительный монах! Оставь меня! Я вырву твои гадкие седые волосы и брошу их тебе в лицо!</p><p class="p1">Он то краснел, то бледнел, наконец выпустил ее из своих объятий и мрачно взглянул на нее.</p><p class="p1">Она подумала, что победила, и продолжала:</p><p class="p1">– Я тебе сказала, что принадлежу Фебу, люблю Феба, что Феб красив. А ты священник, ты стар, ты безобразен. Уходи прочь от меня!</p><p class="p1">Он дико вскрикнул, как преступник, которого прижгли раскаленным железом.</p><p class="p1">– Так умри же! – проговорил он, заскрежетав зубами.</p><p class="p1">Увидев его яростный взгляд, Эсмеральда кинулась бежать, но он догнал ее, встряхнул, бросил на землю и быстро зашагал к башне Роланды, волоча ее за руки за собой по камням. Подойдя к башне, он еще раз спросил:</p><p class="p1">– Последний раз – согласна ты быть моей или нет?</p><p class="p1">– Нет! – твердо отвечала она.</p><p class="p1">Тогда он крикнул громким голосом:</p><p class="p1">– Гудула! Гудула! Вот цыганка! Отомсти за себя!</p><p class="p1">Девушка почувствовала, как кто-то крепко схватил ее за локоть. Она обернулась и увидала костлявую руку, высунувшуюся из небольшого окошечка в стене; рука эта сжала ее, как в железных тисках.</p><p class="p1">– Держи хорошенько, – сказал священник, – это беглая цыганка, смотри, не выпусти ее, пока я не приведу солдат. Ты увидишь, как ее повесят.</p><p class="p1">Гортанный смех раздался из-за стены в ответ на эти кровавые слова: «Ха-ха-ха!..» Цыганка увидела, как священник бегом направился к мосту Богоматери, откуда доносился топот скачущих лошадей.</p><p class="p1">Девушка узнала злую затворницу. Задыхаясь от ужаса, она попробовала освободиться: извивалась, отчаянно билась и рвалась, но затворница держала ее с нечеловеческой силой. Худые, костлявые пальцы судорожно впились в ее руку. Казалось, они приросли к ней совсем. Это было хуже цепи, хуже аркана, хуже железного кольца – это были одушевленные, сознательные клещи, высунувшиеся из стены.</p><p class="p1">Обессилев, она прислонилась к стене, и ее охватил страх смерти. Она подумала о прелести жизни, о молодости, о небе, о красоте природы, о любви, о Фебе, обо всем, что миновало и что ждет ее впереди, о священнике, который пошел донести на нее, о палаче, который сейчас придет, о виселице, бывшей у нее перед глазами. Она почувствовала, как у нее от ужаса зашевелились волосы, и услыхала зловещий смех старухи, шептавшей ей: «Ха-ха-ха! Сейчас тебя повесят!»</p><p class="p1">В смертельной тоске она обернулась к окошку и сквозь решетку его увидела безумное лицо отшельницы.</p><p class="p1">– Что я вам сделала? – спросила Эсмеральда, почти теряя сознание.</p><p class="p1">Затворница ничего не ответила и начала бормотать каким-то певучим, злобным и насмешливым голосом: «Цыганка, цыганка, цыганка!» Несчастная Эсмеральда горестно поникла головой, поняв, что имеет дело с безумным существом. Вдруг заключенная воскликнула, как будто вопрос цыганки только теперь дошел до ее сознания:</p><p class="p1">– Что ты мне сделала, спрашиваешь ты? Ты хочешь знать, что ты мне сделала, цыганка? Так слушай же!.. У меня был ребенок! Ребенок, понимаешь ты! Хорошенькая маленькая девочка… Агнеса моя, – продолжала она как бы в забытьи, целуя что-то в темноте. – Так слушай же, цыганка! У меня отняли моего ребенка, у меня украли моего ребенка, у меня украли моего ребенка! Вот что ты мне сделала!</p><p class="p1">Девушка отвечала, как ягненок в басне:</p><p class="p1">– Быть может, меня тогда еще не было на свете!</p><p class="p1">– Нет, нет, – возразила заключенная, – этого не может быть. Дочь моя была бы твоих лет теперь. И вот пятнадцать лет, как я сижу здесь, пятнадцать лет, как я страдаю, пятнадцать лет молюсь, пятнадцать лет бьюсь головой о стены. Говорю тебе, ее украли у меня цыганки, слышишь ты? Украли и сожрали своими зубами. Есть у тебя сердце? Так представь себе, что это такое – маленький ребенок, который играет, сосет грудь, спит. Что может быть невиннее? И это-то, это они у меня отняли, убили! Про то знает Господь Бог!.. Сегодня мой черед, я сожру цыганку. О, я бы тебя искусала, если бы мне не мешала решетка! Через нее не пролезает голова. Бедная малютка! Ее украли сонную! А если она и проснулась, то она кричала, напрасно меня не было около нее!.. Ага, цыганки! Вы убили моего ребенка, теперь посмотрите, как умрет ваш.</p><p class="p1">И она принялась хохотать и скрежетать зубами. На этом исступленном лице трудно было отличить одно от другого. Тем временем начало рассветать. Сероватый полусвет озарял эту сцену, и виселица все отчетливее вырисовывалась на площади. С противоположного берега от моста Богоматери все яснее доносился до слуха несчастной осужденной конский топот.</p><p class="p1">– Сударыня! – воскликнула она, ломая руки и падая на колени, растрепанная, отчаявшаяся, обезумевшая от ужаса. – Сударыня, сжальтесь! Они приближаются. Я вам ничего не сделала. Неужели вы хотите, чтобы я умерла такой ужасной смертью у вас на глазах? Я знаю, в вашем сердце найдется хоть капля жалости. Это слишком ужасно! Дайте мне спастись. Пустите меня! Ради бога! Я не хочу умирать!</p><p class="p1">– Отдай моего ребенка! – отвечала узница.</p><p class="p1">– Сжальтесь, сжальтесь!</p><p class="p1">– Отдай моего ребенка!</p><p class="p1">– Пустите меня, ради бога!</p><p class="p1">– Отдай моего ребенка!</p><p class="p1">Девушка снова упала, измученная, обессиленная, глаза ее уже остекленели, как у мертвой.</p><p class="p1">– Увы! – прошептала она. – Вы ищете свою дочь, а я ищу своих родителей.</p><p class="p1">– Отдай мне мою маленькую Агнесу, – продолжала Гудула. – Ты не знаешь, где она? Так умри же! Я тебе все расскажу. Я была распутной, у меня был ребенок, и его у меня отняли. Его украли цыганки. Теперь ты понимаешь, почему ты должна умереть. Когда твоя мать, цыганка, придет за тобой, я ей скажу: «Взгляни на виселицу!» Если не хочешь умереть, отдай мне моего ребенка. Знаешь ты, где моя маленькая дочка? Посмотри, что я тебе покажу. Вот ее башмачок, все, что у меня осталось. Не видала ли ты где другого башмачка? Если видела, скажи, и, будь это хоть на другом конце света, я поползу туда на коленях.</p><p class="p1">И с этими словами она другой рукой показала цыганке из-за решетки вышитый башмачок. Было уже настолько светло, что легко можно было разглядеть его форму и цвет.</p><p class="p1">– Покажите мне ближе этот башмачок! – воскликнула цыганка, вся затрепетав. – Боже мой, Боже!</p><p class="p1">И в то же время свободной рукой поспешно раскрыла ладанку, украшенную зелеными бусами, которую всегда носила на шее.</p><p class="p1">– Ладно, ладно! – бормотала Гудула. – Хватайся за свой дьявольский талисман! – Вдруг голос ее оборвался, она задрожала всем телом и воскликнула голосом, выходящим из глубины души: – Дочь моя!</p><p class="p1">Цыганка вынула из ладанки башмачок, как две капли воды похожий на первый. К башмачку был привязан кусочек пергамента, а на нем написаны стихи:</p><div class="poem">
<div class="stanza">
<p class="v">Второй такой же ты найди,</p>
<p class="v">И мать прижмет тебя к груди…</p>
</div>
</div><p class="p1">Быстрее молнии затворница сравнила оба башмачка, прочла надпись на пергаменте и припала к оконной решетке лицом, сияющим небесной радостью, крича:</p><p class="p1">– Дочь моя, дочь моя!</p><p class="p1">– Мать моя! – отозвалась цыганка.</p><p class="p1">Перо бессильно описать эту встречу.</p><p class="p1">Стена и железная решетка разделяли их.</p><p class="p1">– О, эта стена! – воскликнула Гудула. – Видеть тебя и не иметь возможности обнять. Дай руку! Руку!</p><p class="p1">Молодая девушка протянула в окошко руку, и затворница жадно прильнула к ней губами – и замерла в этом поцелуе. Она не подавала никаких признаков жизни, только конвульсивные рыдания по временам потрясали все ее тело. Она плакала молча в темноте, и слезы ее текли ручьями, как ночной дождь. Несчастная мать потоками изливала на эту обожаемую руку черное, бездонное море слез, накопившихся в ее душе, капля за каплей собиравшей ее горе в течение пятнадцати лет.</p><p class="p1">Вдруг она вскочила, откинула с лица длинные пряди седых волос и, не говоря ни слова, принялась с яростью львицы раскачивать железную решетку окна. Но решетка не поддавалась. Тогда она схватила в углу кельи большой камень, служивший ей изголовьем, и с такой силой ударила им в решетку, что один из железных прутьев сломался, брызнув во все стороны искрами. Второй удар окончательно разбил старую крестообразную решетку, загораживавшую окно. Тогда она голыми руками отогнула ржавые прутья сломанной решетки. Бывают минуты, когда руки женщины приобретают нечеловеческую силу.</p><p class="p1">В одну минуту, расширив таким образом отверстие, она схватила свою дочь за талию и втянула ее в келью.</p><p class="p1">– Сюда! Я спасу тебя от гибели, – шептала она.</p><p class="p1">Втащив ее в келью, она тихо опустила ее на пол, потом снова подняла и начала носить на руках, как будто то была прежняя малютка – Агнеса. Она ходила взад и вперед по своей узкой келье, опьяненная, не помня себя от радости. Она кричала, пела, целовала свою дочь, что-то ей бессвязно рассказывала, заливаясь хохотом и слезами в одно и то же время.</p><p class="p1">– Дочь моя, дочь моя! – повторяла она. – Моя дочь нашлась! Вот она! Милосердный Господь возвратил ее мне. Эй, вы! Идите все сюда! Кто хочет взглянуть на мою дочь? Господи Боже мой!.. Какая она красавица! Ты заставил меня пятнадцать лет ждать, Господи, зато какой красавицей возвратил мне ее! Значит, цыганки тебя не съели? Кто же это выдумал! Дочурка моя! Милая моя дочурка! Поцелуй меня! Добрые цыганки, я люблю цыганок! Так это в самом деле ты? Недаром у меня сердце билось всегда, когда ты проходила мимо. А я-то думала, что это от ненависти. Прости меня, моя Агнеса, прости меня! Ты думала, что я очень злая, ведь правда? Ах, как я тебя люблю! Цела ли у тебя родинка на шее? Покажи-ка. Вот она. Ах, как ты хороша! Это я вам дала ваши чудные глаза, сударыня. Поцелуй меня! Я тебя люблю! Теперь мне все равно, что у других матерей есть дети, мне нечего им завидовать. Пусть они придут сюда, я им покажу свою дочь. Вот ее шейка, глазки, волосы, ручка. Есть ли на свете что-нибудь прекраснее! У нее будет много поклонников, я за это ручаюсь. Пятнадцать лет я проплакала, вся моя красота исчезла – и снова расцвела в ней. Поцелуй меня!..</p><p class="p1">И много других бессвязных речей говорила она голосом, полным невыразимой нежности. Одежду молодой девушки она привела в такой беспорядок, что та смущенно краснела. Она целовала ее ноги, колени, лоб, глаза, гладила ее шелковистые волосы и всем восхищалась. Молодая девушка отдавалась ее ласкам и лишь изредка шептала с бесконечной нежностью:</p><p class="p1">– Матушка!</p><p class="p1">– Вот что я тебе скажу, моя дочурка, – продолжала затворница, прерывая свою речь поцелуями, – вот что я тебе скажу. Я тебя буду очень любить. Мы уйдем отсюда и заживем так счастливо. Я получила в Реймсе, на родине, маленький клочок земли в наследство. Ты помнишь Реймс? Нет, ты, конечно, забыла его! Ты была еще слишком мала! А если бы ты знала, какая ты была хорошенькая, когда тебе было четыре месяца! Ножки у тебя были такие крошечные, что на них приходили полюбоваться из Эпернэ, а ведь это за семь лье от Реймса. У нас будет свой домик, свое поле. Ты будешь спать на моей постели. Боже мой, Боже мой! Трудно даже поверить, – моя дочь со мной!</p><p class="p1">– Ах, матушка! – отвечала молодая девушка, преодолев наконец свое волнение настолько, что могла заговорить. – Мне это всегда предсказывала одна цыганка. В нашем таборе была такая добрая цыганка, она умерла в прошлом году. С самого детства она заботилась обо мне, как кормилица. Она повесила мне на шею эту ладанку и часто повторяла: «Девочка, береги эту вещицу, это бесценное сокровище, оно поможет тебе найти твою мать. Ты носишь свою мать у себя на шее». Цыганка предсказала верно!</p><p class="p1">Затворница снова сжала дочь в объятиях.</p><p class="p1">– Дай я тебя поцелую! Как ты мило рассказываешь! Когда мы вернемся на родину, мы отнесем оба башмачка в церковь и обуем в них статую младенца Иисуса. Надо же нам отблагодарить милосердную Пресвятую Деву. Боже мой, какой у тебя прелестный голос! Когда ты сейчас говорила, это была музыка! О Господи! Я нашла свою дочь! Ну, можно ли этому поверить! Видно, люди ни от чего не умирают, если я не умерла от радости.</p><p class="p1">Потом она снова принялась хлопать в ладоши, смеясь и крича:</p><p class="p1">– Ах, как мы будем счастливы!..</p><p class="p1">В эту минуту в келью донесся звон оружия и топот лошадей, проскакавших, по-видимому, по мосту Богоматери и теперь приближавшихся сюда вдоль по набережной. Цыганка с отчаянием бросилась в объятия затворницы:</p><p class="p1">– Спаси меня! Спаси меня, матушка! Они едут за мной!</p><p class="p1">Мать побледнела.</p><p class="p1">– Боже мой, что ты говоришь! Я совсем забыла! За тобой гонятся! Что же ты сделала?</p><p class="p1">– Не знаю, – отвечала бедняжка, – но меня приговорили к смертной казни.</p><p class="p1">– К смертной казни! – проговорила Гудула, пошатнувшись, точно сраженная громом. – К смертной казни! – медленно повторила она, глядя на дочь остановившимся взглядом.</p><p class="p1">– Да, матушка, – продолжала растерянно молодая девушка, – они хотят меня убить. Вот они идут за мной. Эта виселица приготовлена для меня! Спаси меня! Спаси меня! Они уже близко. Спаси меня!</p><p class="p1">Затворница несколько мгновений простояла неподвижно как окаменевшая, потом покачала с сомнением головой и наконец разразилась громким хохотом, своим прежним ужасным хохотом:</p><p class="p1">– Ха-ха-ха! Нет, это ты мне сказки рассказываешь. Как! Я ее потеряла, это длилось пятнадцать лет, потом я нашла ее – и это продлится одну минуту?! Ее хотят опять отнять у меня! Теперь, когда она выросла и стала такой красавицей, когда она говорит со мной, любит меня? Теперь они хотят съесть ее на глазах у меня – у меня, ее матери! Нет, это невозможно, милосердный Господь не допустит этого!</p><p class="p1">Тут конский топот замолк, отряд, по-видимому, остановился, и издали послышался голос:</p><p class="p1">– Сюда, мессир Тристан! Архидьякон сказал, что мы ее найдем около «Крысиной норы»…</p><p class="p1">И конский топот раздался снова.</p><p class="p1">Затворница вскочила, испустив вопль отчаяния:</p><p class="p1">– Беги, беги, дитя мое! Теперь я все вспомнила! Ты права! Это идет твоя смерть! О, ужас! О, проклятие! Беги же, беги!</p><p class="p1">Она высунула голову в окно и тотчас же отшатнулась.</p><p class="p1">– Оставайся здесь, – отрывисто и мрачно прошептала она, судорожно сжимая руку цыганки, помертвевшей от ужаса. – Оставайся! Не дыши! Солдаты повсюду, тебе нельзя выйти, слишком светло.</p><p class="p1">Ее сухие глаза сверкали. Она молчала, бегая взад и вперед по келье. По временам она останавливалась, вырывала у себя клок седых волос и разрывала его зубами. Вдруг она заговорила:</p><p class="p1">– Они приближаются. Я с ними поговорю. Спрячься вон в том углу. Они тебя не увидят. Я им скажу, что ты вырвалась, что я тебя отпустила.</p><p class="p1">Она отнесла свою дочь, которую все еще держала на руках, в самый дальний угол кельи, куда снаружи нельзя было заглянуть. Там она усадила ее, заботливо осмотрев, чтобы руки и ноги были в тени, распустила ее черные волосы, стараясь ими прикрыть белое платье, поставила перед ней свою кружку с водой и камень, служивший ей изголовьем, – единственные предметы, бывшие в ее распоряжении, – воображая, что кружка и камень могут скрыть дочь. Покончив с этим, она немного успокоилась, встала на колени и принялась молиться.</p><p class="p1">День едва занялся, и «Крысиная нора» еще тонула во мраке. В эту минуту возле кельи раздался зловещий голос архидьякона, кричавший:</p><p class="p1">– Сюда, капитан Феб де Шатопер!</p><p class="p1">Услыхав этот голос, это имя, Эсмеральда, притаившаяся в своем углу, пошевелилась.</p><p class="p1">– Не шевелись, – прошептала Гудула.</p><p class="p1">В ту же секунду около самой кельи послышались бряцанье оружия, людские голоса и конский топот. Затворница быстро вскочила и встала у окна, стараясь заслонить его собой. Она увидала большой отряд конных и пеших солдат, выстроившихся на Гревской площади. Их начальник сошел с лошади и направился к отшельнице.</p><p class="p1">– Старуха, – произнес этот человек со зверским выражением лица, – мы ищем колдунью, чтобы ее повесить. Нам сказали, что она у тебя.</p><p class="p1">Несчастная мать постаралась принять самый равнодушный вид и отвечала:</p><p class="p1">– Не понимаю, что вы говорите.</p><p class="p1">– Черт возьми! – воскликнул другой. – Что же нам наплел этот безумный архидьякон! Где он?</p><p class="p1">– Монсеньор, – отвечал один из солдат, – он исчез.</p><p class="p1">– Смотри, старуха, не ври, – заговорил начальник отряда, – тебе поручили стеречь колдунью. Куда она девалась?</p><p class="p1">Затворница поняла, что, отпираясь ото всего, может навлечь на себя подозрение, и потому отвечала сердито и словно чистосердечно:</p><p class="p1">– Коли вы ищете высокую девушку, которую мне велели держать, так она меня укусила, и я выпустила ее… и отстаньте от меня.</p><p class="p1">Начальник отряда скорчил недовольную гримасу.</p><p class="p1">– Смотри, не вздумай мне врать, старая карга! – пригрозил он. – Я – Тристан Пустынник, кум самого короля, слышишь! – И, посмотрев на Гревскую площадь, прибавил: – Здесь эхо отзывается на мое имя.</p><p class="p1">– Хотя бы ты был сам сатана Пустынник, все-таки я тебя не боюсь и ничего больше не знаю! – отвечала ободренная Гудула.</p><p class="p1">– Ах, черт тебя возьми! – воскликнул Тристан. – Вот язык-то! Так колдунья убежала? А куда она побежала?</p><p class="p1">– Кажется, по улице Мутон, – равнодушно отвечала Гудула.</p><p class="p1">Тристан обернулся и подал знак отряду отправляться на дальнейшие поиски. Гудула вздохнула с облегчением.</p><p class="p1">– Монсеньор, – вдруг вмешался один из стрелков, – спросите-ка у старой ведьмы, почему у нее сломана решетка в окне?</p><p class="p1">Этот вопрос снова наполнил сердце несчастной матери тоской отчаяния. Однако она не потеряла присутствия духа.</p><p class="p1">– Она всегда была такая, – пробормотала она.</p><p class="p1">– Ну, нет, – отвечал стрелок, – вчера еще железный крест был цел и наводил на набожные мысли.</p><p class="p1">Тристан искоса взглянул на затворницу:</p><p class="p1">– Что это ты, голубушка, путаешь?</p><p class="p1">Несчастная понимала, что ей нужно сохранить присутствие духа, и, холодея от ужаса, заставила себя расхохотаться; только у матери могло хватить на это сил.</p><p class="p1">– Неправда, – возразила она, – солдат, верно, пьян. Уже с год тому назад тележка, нагруженная камнями, задела за решетку и сломала ее. Уж как я ругала тогда возчика!</p><p class="p1">– Правда, – сказал другой стрелок, – я сам видел.</p><p class="p1">Всегда и повсюду найдутся люди, которые все видели. Это неожиданное свидетельство стрелка ободрило затворницу, испытывавшую во время допроса чувство человека, переходящего над пропастью по лезвию ножа. Но ей, видно, суждено было подвергаться вечным переходам от надежды к отчаянию.</p><p class="p1">– Если бы решетку сломала повозка, – возразил первый солдат, – то обломки прутьев были бы вдавлены внутрь, а они торчат на улицу.</p><p class="p1">– Эге! – обратился Тристан к солдату. – Да у тебя нюх, как у сыщика из Шатлэ. А ну-ка, старуха, что ты на это скажешь?</p><p class="p1">– Боже мой! – воскликнула Гудула, теряя голову, голосом, в котором слышались слезы. – Клянусь вам, монсеньор, что решетку сломала тележка. Вы слышали, вон тот солдат сам это видел. Да и не все ли вам равно, ведь это не касается вашей цыганки.</p><p class="p1">– Гм! – пробурчал Тристан.</p><p class="p1">– Черт возьми, – снова заметил солдат, польщенный похвалою начальника, – а ведь трещины на решетке совсем свежие!</p><p class="p1">Тристан покачал головой, Гудула побледнела.</p><p class="p1">– И давно, говоришь ты, тележка сломала решетку?</p><p class="p1">– Да с месяц тому назад, а может, недели с две, монсеньор! Не помню наверное.</p><p class="p1">– А раньше она сказала, что больше года тому назад, – заметил солдат.</p><p class="p1">– Да, дело тут нечисто, – сказал Тристан.</p><p class="p1">– Монсеньор! – воскликнула Гудула, продолжая заслонять собой окошко и дрожа при мысли, что подозрение может заставить их просунуть голову и заглянуть в келью. – Монсеньор, клянусь вам, что решетка сломана тележкой. Клянусь вам в этом всеми святыми ангелами. Если это не тележка, пусть я буду проклята навеки как богоотступница.</p><p class="p1">– Ты что-то слишком горячо клянешься! – заметил Тристан, окидывая ее инквизиторским взглядом.</p><p class="p1">Несчастная женщина чувствовала, что теряет самообладание, делает промахи и говорит совсем не то, что нужно. Тут подбежал другой солдат и воскликнул:</p><p class="p1">– Монсеньор, старая ведьма врет: колдунья не могла убежать на улицу Мутон. Улица всю ночь была загорожена цепью, и часовые никого не видали.</p><p class="p1">Лицо Тристана с каждой минутой становилось мрачнее.</p><p class="p1">– Что ты на это скажешь? – обратился он к затворнице.</p><p class="p1">Та попыталась преодолеть это новое препятствие:</p><p class="p1">– Не знаю, монсеньор, может, я ошиблась. Кажется, она действительно побежала к реке.</p><p class="p1">– Да это совсем в другую сторону, – сказал Тристан, – и притом невероятно, чтоб она бросилась назад к Сите, где ее ищут. Ты врешь, старуха!</p><p class="p1">– А кроме того, – добавил первый солдат, – ни на том, ни на этом берегу нет лодки.</p><p class="p1">– Она могла перебраться вплавь, – возразила Гудула, отстаивая под собой почву шаг за шагом.</p><p class="p1">– Да разве женщины умеют плавать? – отвечал солдат.</p><p class="p1">– Черт возьми! Ты врешь, старуха! Врешь! – гневно воскликнул Тристан. – Пожалуй, вместо колдуньи придется мне повесить тебя. Четверть часика разговора в застенке, верно, развяжут тебе язык. Собирайся-ка с нами в путь.</p><p class="p1">Она с жадностью подхватила его слова:</p></span></span></span>
