<span><span><span id="id8"><div class="title3">
<p class="p">V. Квазимодо</p>
</div><p class="p1">В одно мгновение все было готово, чтобы осуществить мысль Коппеноля. Горожане, студенты, клерки – все принялись за работу. Гримасы решили делать в маленькой капелле, занимавшей конец зала, напротив мраморного помоста. В красивой розетке над входом выбили одно стекло, так что образовалось круглое отверстие, в которое конкуренты должны были просовывать голову. Для того чтобы добраться до него, стоило только вскарабкаться на две бочки, которые где-то добыли и взгромоздили одну на другую. Было условлено, чтобы каждый кандидат в папы, будь то мужчина или женщина (папа мог быть и женского пола), чтобы произвести свежее впечатление своей гримасой, ждал в капелле, закрыв лицо до тех пор, пока не наступит его очередь высунуться в отверстие. В одну минуту капелла наполнилась конкурентами, и дверь затворилась за ними.</p><p class="p1">Коппеноль со своего места отдавал приказания, распоряжался всем, устраивал все. В зале поднялись страшный шум и суета. Кардинал, возмущенный всем этим не меньше Гренгуара, сославшись на неотложные дела и вечернюю службу, поспешил уйти вместе со своей свитой. И вся эта толпа, которую так взволновало его прибытие, теперь даже не заметила его ухода. Один только Гильом Рим отметил бегство его преосвященства.</p><p class="p1">Внимание толпы обратилось в другую сторону; оно в этот день обращалось вокруг зала, как солнце вокруг земли. Сначала оно было устремлено на один конец зала, потом перешло на середину, а оттуда на другой конец. Мраморный помост и парчовая эстрада уже получили свое, – наступила очередь капеллы Людовика XI. Теперь открывалось широкое поле для всяких безумств: в зале остались только фламандцы и сброд.</p><p class="p1">Начались гримасы. Первая показавшаяся в отверстии физиономия с вывернутыми веками, разинутым, точно пасть, ртом и собранным в складки лбом, похожим на гусарские сапоги времен империи, возбудила такой неудержимый хохот, что Гомер, наверное, принял бы этих крестьян и горожан за богов. Между тем большой зал ничуть не походил на Олимп, и бедный Юпитер Гренгуара знал это лучше всякого другого. За первой страшной рожей появилась другая, потом третья, а хохот и восхищение толпы все увеличивались. В этом зрелище было что-то безумное, какое-то могучее упоение и очарование, о котором трудно составить понятие читателю нашего времени. Вообразите себе, что перед вами проходит целая серия лиц, представляющих собой все геометрические фигуры, от треугольника до трапеции и от конуса до многогранника; выражения всех человеческих чувств, от гнева до сладострастия; все возрасты, от морщин новорожденного до морщин умирающей старухи; все религиозные фантасмагории, от Фавна до Вельзевула; все профили животных, от пасти до клюва, от кабаньей головы до мордочки лисицы. Представьте себе, что все чудовищные изваяния Нового моста, эти кошмары, воплощенные в камень рукой Жермена Пилона, вдруг ожили и устремили на вас свои сверкающие глаза, – вообразите себе, что перед вами проходят все маски венецианского карнавала, весь человеческий калейдоскоп.</p><p class="p1">Оргия становилась чисто фламандской. Сам Тенирс не мог бы дать о ней вполне четкого представления. Это была превращенная в вакханалию битва Сальватора Розы. В зале не было теперь ни студентов, ни послов, ни горожан, ни мужчин, ни женщин, ни Клопена Труйльфу, ни Жилля Лекорню, ни Марии Катрливр, ни Робена Пуспена. Все слились в общем безумии. Большой зал превратился как бы в громадное горнило бесстыдства и ликования, где каждый рот кричал, каждое лицо кривлялось, каждая фигура принимала странную позу. И все это ревело и выло. Невероятные лица, одно за другим показывавшиеся в отверстии розетки, были как бы пылающими головнями, бросаемыми в горящий костер. И из всей этой буйной толпы вырывался, как пар из громадного котла, резкий, пронзительный гул:</p><p class="p1">– Проклятье!</p><p class="p1">– Взгляни-ка на эту рожу!</p><p class="p1">– Ну, она ничего не стоит!</p><p class="p1">– А вот и другая!</p><p class="p1">– Гильомета Можерпюи, видишь эту бычачью морду? Ей не хватает только рогов. Не твой ли это муж?</p><p class="p1">– Подавай новую!</p><p class="p1">– Смотрите, смотрите – это что за гримаса?</p><p class="p1">– Эй! Это жульничество. Можно показывать только лицо.</p><p class="p1">– Это, наверное, проклятая Перетта Кальбот. Она способна на все.</p><p class="p1">– Браво! Браво!</p><p class="p1">– Я задыхаюсь!</p><p class="p1">– А у этого уши не могут пролезть!</p><p class="p1">И т. д. и т. д.</p><p class="p1">Нужно отдать справедливость нашему другу Жану. Среди этого шабаша он продолжал сидеть на верхушке своей колонны, как юнга на мачте. Он вел себя как бесноватый. Рот его был широко открыт, и из него вырывался крик, который не был слышен не потому, что его заглушал общий шум, а, вероятно, потому, что он был слишком высок и недоступен человеческому уху. Совер полагает, что это бывает при двенадцати тысячах колебаний, а Био – при восьми тысячах.</p><p class="p1">Что же касается Гренгуара, то после первой минуты оцепенения он пришел в себя и, вооружившись твердостью, решил не поддаваться.</p><p class="p1">– Продолжайте! – в третий раз сказал он своим говорящим машинам – актерам – и принялся ходить большими шагами около мраморного помоста.</p><p class="p1">Минутами ему приходило в голову подойти в свою очередь к розетке капеллы, хотя бы для того, чтобы доставить себе удовольствие – состроить гримасу этому неблагодарному народу. Но он отгонял от себя эту мысль.</p><p class="p1">«Нет, – думал он, – такая месть недостойна меня. Будем бороться до конца. Поэзия обладает могущественным влиянием на народ. Я заставлю эту толпу вернуться ко мне. Посмотрим, что одержит верх – гримасы или поэзия!»</p><p class="p1">Увы! Он остался единственным зрителем своей пьесы. Теперь было еще хуже, чем раньше: оборачиваясь, он видел одни лишь спины.</p><p class="p1">Впрочем, я ошибаюсь. Лицо терпеливого толстяка, с которым Гренгуар советовался в критическую минуту, было обращено к сцене. Что же касается до Лиенарды и Жискеты, то они уже давно исчезли.</p><p class="p1">Гренгуар был тронут до глубины души верностью своего единственного слушателя. Он подошел к нему и заговорил с ним, подергав его сначала за руку, так как этот честный человек облокотился на балюстраду и слегка вздремнул.</p><p class="p1">– Благодарю вас, сударь, – сказал Гренгуар.</p><p class="p1">– За что же? – спросил толстяк, зевая.</p><p class="p1">– Я вижу, что вам надоел этот страшный шум, – он мешает вам слушать пьесу. Но будьте спокойны: ваше имя перейдет в потомство. Позвольте узнать, как вас зовут?</p><p class="p1">– Рено Шато, хранитель печати в парижском суде, к вашим услугам.</p><p class="p1">– Вы здесь единственный представитель муз, – сказал Гренгуар.</p><p class="p1">– Вы слишком любезны, сударь, – ответил хранитель судебной печати.</p><p class="p1">– Один только вы слушали пьесу как следует, – продолжал Гренгуар. – Как вы ее находите?</p><p class="p1">– Гм, гм! Она, право же, довольно забавна, – ответил толстяк, еще не совсем проснувшись.</p><p class="p1">Гренгуару пришлось удовольствоваться этой похвалой, так как гром рукоплесканий и оглушительные крики прервали их разговор. Папа шутов был выбран.</p><p class="p1">– Браво! Браво! Браво! – ревела толпа.</p><p class="p1">И действительно, трудно было придумать что-нибудь великолепнее гримасы, красовавшейся сейчас в отверстии розетки. После всех пяти-шестиугольных безобразных рож, которые выглядывали оттуда, не достигая идеала уродливости, сложившегося в разгоряченном оргией воображении зрителей, только такая необыкновенная по своему безобразию гримаса могла прельстить толпу и привести ее в восторг. Сам мэтр Коппеноль аплодировал, и даже бывший в числе конкурентов Клопен Труйльфу – а он был настолько безобразен, что мог состроить ужаснейшую гримасу, – признал себя побежденным. Так же поступим и мы. Мы не беремся дать читателю понятие об этом лице с четырехгранным носом, ртом в виде подковы и раздвоенным подбородком. Над маленьким, в виде мешка, левым глазом этого урода нависла щетинистая рыжая бровь, тогда как правый глаз совсем исчезал под громадной бородавкой; поломанные зубы были выщерблены, как зубцы на крепостной стене, а один из них выступал из-за растрескавшихся губ, как клык слона. Но еще труднее передать выражение этого ужасного лица – какую-то смесь злости, изумления и грусти. А теперь представьте себе, если можете, это чудовище.</p><p class="p1">Публика единодушно приветствовала его восторженными криками. Все бросились к капелле и с торжеством вывели оттуда папу шутов. Но тут изумление и восторг толпы дошли до крайних пределов. Гримаса была настоящим лицом.</p><p class="p1">Вернее, он весь представлял собой гримасу. Огромная голова с щетинистыми рыжими волосами; громадный горб на спине и поменьше на груди; страшно искривленные ноги, которые могли соприкасаться только в коленях и напоминали два изогнутых серпа; громадные ступни, чудовищные руки и при всем этом безобразии что-то грозное, могучее и смелое во всей фигуре, представлявшей странное исключение из общего правила, требующего, чтобы сила, как и красота, вытекала из гармонии. Таков был папа, избранный шутами.</p><p class="p1">Казалось, это был разбитый и затем кое-как спаянный великан.</p><p class="p1">Когда этот циклоп показался на пороге капеллы – коренастый, почти одинаковый в ширину и высоту, в камзоле, наполовину красном, наполовину фиолетовом, затканном серебряными колоколенками, – толпа по этому камзолу, а в особенности по необыкновенному безобразию нового папы тотчас же узнала его.</p><p class="p1">– Это Квазимодо, звонарь! Это Квазимодо кривой! Квазимодо-горбун, из собора Богоматери! Квазимодо кривоногий! Браво! Браво!</p><p class="p1">У бедняка не было, как видно, недостатка в прозвищах.</p><p class="p1">– Берегитесь, беременные женщины! – закричали студенты.</p><p class="p1">– Или те, которые желают забеременеть! – прибавил Жан.</p><p class="p1">Женщины действительно закрыли лица руками.</p><p class="p1">– Господи, какая отвратительная обезьяна! – воскликнула одна из них.</p><p class="p1">– И он так же зол, как и уродлив, – подхватила другая.</p><p class="p1">– Это сам дьявол! – прибавила третья.</p><p class="p1">– Я, к несчастью, живу возле самого собора Богоматери и слышу, как он каждую ночь шатается по крыше.</p><p class="p1">– Вместе с кошками!</p><p class="p1">– Да, он всегда шляется по нашим крышам!</p><p class="p1">– И напускает на нас порчу через дымовые трубы!</p><p class="p1">– Как-то вечером он заглянул ко мне в окно. Я подумала, что это какой-то человек, и ужасно перепугалась.</p><p class="p1">– Я уверена, что он летает на шабаш. Раз он забыл свою метлу около моего дома.</p><p class="p1">– Безобразный горбун!</p><p class="p1">– Гнусная душонка!</p><p class="p1">– Тьфу!</p><p class="p1">Зато мужчины смотрели на горбуна с восхищением и восторженно рукоплескали ему.</p><p class="p1">А Квазимодо, породивший всю эту суматоху, продолжал стоять неподвижно около двери капеллы, серьезный и мрачный, позволяя любоваться собой.</p><p class="p1">Студент Робен Пуспен подошел слишком близко к нему и засмеялся ему в лицо. Квазимодо, не говоря ни слова, схватил его за пояс и отшвырнул шагов на десять в толпу.</p><p class="p1">Мэтр Коппеноль, восхищенный, приблизился к нему.</p><p class="p1">– Клянусь Богом, никогда в жизни не видал я такого великолепного безобразия! – воскликнул он. – Тебя стоило бы сделать папой не только в Париже, но и в Риме!</p><p class="p1">И, сказав это, он весело хлопнул его по плечу.</p><p class="p1">Квазимодо не шевельнулся.</p><p class="p1">– Ты как раз такой человек, с которым я был бы не прочь покутить, – продолжал Коппеноль. – И кутеж будет на славу, денег я не пожалею. Что ты на это скажешь?</p><p class="p1">Квазимодо молчал.</p><p class="p1">– Господи помилуй! – воскликнул башмачник. – Да ты глухой, что ли?</p><p class="p1">Квазимодо был действительно глух.</p><p class="p1">Между тем любезности Коппеноля начали, по-видимому, надоедать горбуну. Он вдруг повернулся к нему и так грозно заскрежетал зубами, что богатырь-фламандец попятился, как бульдог от кошки.</p><p class="p1">Толпа тоже отступила, так что около Квазимодо образовался пустой круг, радиусом не меньше шагов пятнадцати. А за этим кругом стояли любопытные, с уважением и страхом смотря на горбуна.</p><p class="p1">Какая-то старуха объяснила Коппенолю, что Квазимодо глух.</p><p class="p1">– Глух? – повторил, громко расхохотавшись, фламандец. – Клянусь Богом, лучше этого папы и не придумаешь!</p><p class="p1">– А, вот это кто! – воскликнул Жан, спустившись наконец с своего карниза, чтобы взглянуть на папу поближе. – Это звонарь моего брата, архидьякона. Здравствуй, Квазимодо!</p><p class="p1">– Этакий дьявол! – сказал Робен Пуспен, еще не успевший оправиться от смущения после своего падения. – Поглядишь на него – оказывается, он горбун; пойдет – видишь, что он кривоногий; посмотрит на вас – кривой; заговоришь с ним – он глух. Но почему же он молчит? Куда девал свой язык этот Полифем?</p><p class="p1">– Он говорит, когда захочет, – сказала старуха. – Он оглох от звона колоколов. Он не немой.</p><p class="p1">– Только этого ему и не хватает, – заметил Жан.</p><p class="p1">– Да еще один глаз у него лишний, – прибавил Робен Пуспен.</p><p class="p1">– Ну, нет, – рассудительно возразил Жан. – Кривому еще хуже, чем слепому: он знает, чего он лишен.</p><p class="p1">Тем временем, налюбовавшись на Квазимодо, нищие, слуги и воры-карманники отправились вместе со студентами за картонной тиарой и шутовской мантией папы шутов, которые хранились в шкафу судебных писцов. Квазимодо беспрекословно, с какой-то горделивой покорностью позволил одеть себя и посадить на пестрые носилки, которые подняли на плечи двенадцать человек из братства шутов. И выражение горькой, презрительной радости осветило мрачное лицо циклопа, когда он увидел под своими уродливыми ногами головы всех этих красивых, прямых, стройных людей. Потом шумная, оборванная толпа двинулась процессией, чтобы, по принятому обычаю, обойти сначала все внутренние галереи дворца и затем уже совершить прогулку по улицам и площадям города.</p></span><span id="id9"><div class="title3">
<p class="p">VI. Эсмеральда</p>
</div><p class="p1">С величайшим удовольствием можем объявить нашим читателям, что в продолжение всей этой сцены Гренгуар не сдавался и пьеса шла своим чередом. Актеры, которых он то и дело понукал, не умолкая, декламировали стихи, а он не переставал их слушать. Не обращая внимания на шум, он решил бороться до конца, все еще не теряя надежды привлечь внимание публики. Эта надежда оживилась, когда Квазимодо, Коппеноль и буйная свита папы шутов с оглушительным шумом вышли из зала и толпа бросилась за ними.</p><p class="p1">«Отлично, – подумал Гренгуар, – теперь все крикуны ушли».</p><p class="p1">К сожалению, «крикунами» оказалась вся публика, и зал в одно мгновение опустел.</p><p class="p1">Собственно говоря, кое-где у колонн еще осталось несколько зрителей. Это были старики, женщины и дети, утомленные всем этим шумом и гамом. Кроме того, несколько студентов сидели верхом на подоконнике и смотрели на площадь.</p><p class="p1">«Ну, что же? – подумал Гренгуар. – И этих достаточно, чтобы выслушать конец моей мистерии. Правда, их мало, но зато это самая избранная, самая образованная публика».</p><p class="p1">Через несколько минут выяснилось, что музыканты, которые при появлении «пресвятой девы» должны были заиграть симфонию – что, несомненно, произвело бы большой эффект, – почему-то молчат. Оказалось, что музыканты исчезли, их увлекла за собой шутовская процессия.</p><p class="p1">– Обойдемся без музыки, – стоически сказал Гренгуар.</p><p class="p1">Он подошел к кучке горожан, говоривших, как ему показалось, о его пьесе. Вот отрывок их разговора, который он услыхал:</p><p class="p1">– Знаете вы, мэтр Шенето, наваррский особняк, принадлежавший господину Немуру?</p><p class="p1">– Знаю, это напротив Бракской часовни.</p><p class="p1">– Ну, так казна отдала его внаймы Гильому Александру, орнаментовщику, за шесть ливров восемь су в год.</p><p class="p1">– Господи, как наемная плата-то повышается!</p><p class="p1">«Увы! – со вздохом подумал Гренгуар. – Но, наверно, другие слушают мою пьесу».</p><p class="p1">– Товарищи! – крикнул вдруг один из студентов, сидевших на окне. – Эсмеральда! Эсмеральда на площади!</p><p class="p1">Это имя произвело магическое действие. Все оставшиеся в зале бросились к окнам, крича: «Эсмеральда! Эсмеральда!»</p><p class="p1">В то же время на площади раздался взрыв рукоплесканий.</p><p class="p1">«Что это еще за Эсмеральда? – подумал Гренгуар, с отчаянием сжимая руки. – Ах, господи! Теперь, как видно, пришла очередь окнам».</p><p class="p1">Он обернулся к мраморному помосту и увидел, что представление прекратилось. Наступила как раз та минута, когда должен был явиться Юпитер со своей молнией. А между тем Юпитер стоял неподвижно внизу, около одевальной.</p><p class="p1">– Мишель Жиборн! – воскликнул рассвирепевший поэт. – Что ты там делаешь? Забыл, что ли, свою роль? Выходи скорее на сцену!</p><p class="p1">– Увы! – сказал Юпитер. – Какой-то студент унес лестницу!</p><p class="p1">Гренгуар взглянул на то место, где она стояла: действительно, ее не было. Всякое сообщение между завязкой и развязкой его пьесы было прервано.</p><p class="p1">– Негодяй! – пробормотал он. – Зачем же он взял лестницу?</p><p class="p1">– Чтобы посмотреть на Эсмеральду, – жалобно проговорил Юпитер. – Он сказал: «Вот лестница, которая стоит здесь зря!» – и утащил ее.</p><p class="p1">Это был последний удар; Гренгуар безропотно перенес его.</p><p class="p1">– Убирайтесь ко всем чертям! – крикнул он комедиантам. – Если заплатят мне, то и я заплачу вам.</p><p class="p1">И он ушел, понурив голову, но ушел последним, как храбро сражавшийся генерал, покидающий поле битвы.</p><p class="p1">– Что за буйное сборище ослов и дураков эти парижане! – ворчал он сквозь зубы, сходя вниз по извилистым лестницам дворца. – Они приходят слушать мистерию и не слушают ее! Они занимались всем на свете – Клопеном Труйльфу, кардиналом, Коппенолем, Квазимодо, чертом и дьяволом, но только не Пресвятой Девой! Знай я это, показал бы уж я вам пресвятых дев, болваны! А я? Вместо того чтобы видеть лица зрителей, я видел одни только спины! Я – поэт – провалился, как какой-нибудь аптекарь! Положим, Гомер просил милостыню в греческих поселках, а Овидий Назон умер в изгнании у москвитян… Пусть черт сдерет с меня кожу, если я понимаю, что хотели они сказать своей Эсмеральдой. И что это за слово? Как будто египетское.</p></span></span></span>
