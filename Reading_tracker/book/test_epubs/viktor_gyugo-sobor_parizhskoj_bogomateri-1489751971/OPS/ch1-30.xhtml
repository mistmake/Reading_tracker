<p class="p">I. Как опасно доверять свою тайну козе</p>
</div><p class="p1">Прошло несколько недель. Стояли первые дни марта. Солнце, еще не получившее от Дю Барта, этого классического предка перифразы, названия великого герцога светочей, сияло, однако, не менее ярко и радостно. Был один из тех мягких, чудесных весенних дней, которые весь Париж, высыпав на площади и бульвары, празднует, как воскресенья. В эти ясные, теплые, безмятежные дни бывает один час, когда особенно хорош фасад собора Богоматери. Это тот час, когда солнце, уже склонившись к западу, стоит почти против самого собора. Его лучи, становясь все более и более горизонтальными, медленно покидают мостовую площади и поднимаются вдоль заканчивающегося шпилем фасада, освещая множество округленных выпуклостей, приобретающих особенную рельефность, а большая центральная розетка пылает, как глаз циклопа, в котором отражается пламя кузницы.</p><p class="p1">Был именно этот час.</p><p class="p1">Напротив собора, освещенного пурпуром заката, на балконе над входом богатого готического дома, стоявшего на углу площади и улицы Парви, весело смеялись и забавлялись несколько молодых девушек. По длинным покрывалам, спускавшимся до земли с их остроконечных, унизанных жемчугом уборов, по тонкому полотну их вышитых сорочек, покрывавших плечи и, согласно тогдашней моде, низко вырезанных спереди, по пышным нижним юбкам, сшитым, вследствие изысканной утонченности, из еще более богатого материала, чем покрывавшие их шелковые, газовые и бархатные верхние юбки, а особенно по белизне их рук, указывавшей на праздный, ленивый образ жизни, – нетрудно было узнать в них богатых, благородных наследниц. Действительно, то были девица Флёр де Лис де Гондлорье со своими подругами Дианой де Кристель, Амлоттой де Монмишель, Коломбой де Гайфонтэн и маленькой Шаншеврие. Все девушки принадлежали к аристократическим семьям и собрались у вдовы де Гондлорье по случаю ожидаемого приезда в Париж монсеньора де Боже и его супруги, которым был поручен выбор фрейлин для встречи и сопровождения невесты дофина Маргариты, следовавшей из Фландрии через Пикардию. Все дворяне на тридцать лье вокруг Парижа добивались этой чести для своих дочерей, и многие уже привезли или прислали их в Париж. Родители поручили их покровительству почтенной госпожи Алоизы де Гондлорье, вдовы бывшего начальника королевских стрелков, жившей со своей единственной дочерью в собственном доме на площади против собора Богоматери.</p><p class="p1">С балкона, на котором находились молодые девушки, можно было пройти в комнату, обтянутую роскошной фландрской кожей коричневого цвета с золотыми тиснеными разводами. Расположенные параллельно балки потолка веселили взгляд разнообразными разрисованными и золочеными резными фигурами. Затейливые шкатулки отливали драгоценной эмалью, фаянсовая кабанья голова украшала великолепный поставец, две ступеньки которого указывали на то, что хозяйка была женой или вдовой дворянина, имевшего свое знамя. В глубине комнаты, у высокого камина, украшенного сверху донизу гербами, в богатом, обитом красным бархатом кресле сидела сама госпожа де Гондлорье, пятидесятипятилетний возраст которой можно было угадать как по лицу, так и по одежде.</p><p class="p1">Возле нее стоял молодой человек довольно горделивой осанки, хотя несколько фатоватый и самодовольный, – один из тех красавчиков, которые возбуждают единодушное восхищение женщин, а людей серьезных и физиономистов заставляют пожимать плечами. На молодом человеке был блестящий мундир капитана королевских стрелков, настолько походивший на наряд Юпитера, уже описанный нами в первой книге нашего рассказа, что мы можем избавить нашего читателя от вторичного его описания.</p><p class="p1">Девицы сидели частью в комнате, частью на балконе, кто на четырехугольных, обитых утрехтским бархатом табуретах с золотыми кистями, кто на дубовых скамеечках, украшенных резными цветами и фигурами. У каждой на коленях лежал край большого вышивания, над которым они все работали сообща и добрая половина которого лежала на полу.</p><p class="p1">Они разговаривали между собой, понизив голос и хихикая, как всегда бывает, когда среди молодых девушек находится молодой человек. Молодой же человек, присутствия которого было достаточно, чтобы пробудить самолюбие всех этих женщин, по-видимому, мало замечал их, в то время как красавицы девушки наперебой старались обратить на себя его внимание. Он чистил пряжку своего пояса замшевой перчаткой и, казалось, был всецело поглощен этим занятием.</p><p class="p1">По временам старая дама обращалась к нему шепотом, и он почтительно отвечал ей с натянутой, неловкой любезностью. По улыбкам, знакам и взглядам, которые госпожа Алоиза, говоря с капитаном, бросала на свою дочь, Флёр де Лис, нетрудно было догадаться, что речь шла о состоявшемся сватовстве и, по-видимому, близкой свадьбе молодого человека и Флёр де Лис. По холодности же офицера легко было догадаться, что с его стороны, по крайней мере, не было и речи о любви. Во всей его мине сказывались натянутость и равнодушие, которое наш теперешний гарнизонный офицер выразил бы словами: «Вот так скучища!»</p><p class="p1">Но госпожа Алоиза, влюбленная в свою дочь, как подобает нежной матери, не замечала равнодушия офицера и изо всех сил старалась шепотом обратить его внимание на то бесконечное совершенство, с каким Флёр де Лис втыкала иголку или разматывала шерсть.</p><p class="p1">– Да взгляните же на нее, кузен, – говорила старушка, дергая молодого человека за рукав, чтобы он наклонился к ней ухом. – Вот она нагибается.</p><p class="p1">– Да, в самом деле, – подтверждал молодой человек и снова погружался в свое ледяное рассеянное молчание.</p><p class="p1">Через минуту ему снова приходилось наклоняться, и госпожа Алоиза говорила:</p><p class="p1">– Видали ли вы лицо оживленнее и приветливее, чем у вашей нареченной? Видали ли цвет лица нежнее и волосы светлее? А как хороши ее руки! А шейка? Не напоминает ли она вам своей гибкостью шею лебедя? Как я минутами завидую вам! Как вы счастливы, противный вы кутила! Разве не очаровательна моя Флёр де Лис и разве вы не влюблены в нее без памяти?</p><p class="p1">– Несомненно! – отвечал тот, думая совсем о другом.</p><p class="p1">– Да поговорите же вы с ней, – вдруг сказала госпожа Алоиза, толкая его в плечо. – Вы стали очень робки.</p><p class="p1">Смеем уверить читателя, что робость не была ни добродетелью, ни пороком молодого человека. Однако он попытался исполнить это требование.</p><p class="p1">– Прекрасная кузина, – сказал он, подходя к Флёр де Лис, – каков сюжет вашего вышивания?</p><p class="p1">– Прекрасный кузен, – отвечала Флёр де Лис с легкой досадой, – я уже три раза говорила вам: это грот Нептуна.</p><p class="p1">Очевидно, Флёр де Лис гораздо яснее, чем мать, видела холодность и рассеянность молодого человека. Он почувствовал, что ему необходимо сказать хотя бы несколько слов.</p><p class="p1">– Для кого же предназначается вся эта мифология? – спросил он.</p><p class="p1">– Для аббатства Сент-Антуан-де-Шан, – отвечала Флёр де Лис, не поднимая глаз.</p><p class="p1">Капитан приподнял угол вышивки.</p><p class="p1">– Кого же должен изображать этот толстый жандарм, который, надув щеки, дует в трубу, прекрасная кузина?</p><p class="p1">– Это Тритон, – отвечала она.</p><p class="p1">В коротких ответах Флёр де Лис звучало неудовольствие. Молодой человек видел, что ему придется сказать ей что-нибудь на ухо: пошлость, любезность – все равно! Он нагнулся, но не мог найти в своем воображении ничего более нежного или задушевного, чем следующие слова:</p><p class="p1">– Почему ваша матушка постоянно носит робу, украшенную гербами, как наши бабушки времен Карла Седьмого? Скажите ей, прелестная кузина, что теперь это уже не в моде. Петли и лавры ее герба, вышитые на платье, придают ей вид ходячего камина. Теперь уже не принято восседать на своих знаменах, клянусь вам!</p><p class="p1">Флёр де Лис с упреком подняла на него свои прекрасные глаза.</p><p class="p1">– Больше вам не в чем поклясться мне? – проговорила она шепотом.</p><p class="p1">Между тем простодушная госпожа Алоиза, восхищенная тем, что они так близко наклонились друг к другу и шепчутся, говорила, играя застежками своего часослова:</p><p class="p1">– Трогательная картина любви!</p><p class="p1">Капитан, приходя все больше в замешательство, опять вернулся к вышиванию.</p><p class="p1">– Право, прелестная работа! – воскликнул он. При этом замечании Коломба де Гайфонтэн, другая блондинка с нежным цветом лица, в платье из голубого шелка, плотно застегнутом до самого горла, решилась вставить свое слово, обращаясь к Флёр де Лис, но надеясь, что ей ответит красивый капитан:</p><p class="p1">– Милая Гондлорье, видели вы вышивки в особняке ла Рош-Гюон?</p><p class="p1">– Это тот самый особняк, в ограде которого находится садик луврской белошвейки? – спросила, смеясь, Диана де Кристель, которая смеялась при каждом удобном случае, чтобы показать свои прекрасные зубы.</p><p class="p1">– И где еще стоит эта большая старинная башня, оставшаяся от прежней парижской стены? – прибавила Амлотта де Монмишель, хорошенькая, свеженькая, кудрявая брюнетка, имевшая привычку вздыхать так же, как ее подруга смеяться, сама не зная почему.</p><p class="p1">– Вы, вероятно, говорите об особняке, принадлежавшем господину де Беквиллю при Карле Шестом, милая Коломба? – спросила госпожа Алоиза. – Правда, там есть прекрасные тканые обои.</p><p class="p1">– Карл Шестой! Карл Шестой! – бормотал капитан, закручивая ус. – Боже мой, какую старину помнит почтенная дама!</p><p class="p1">Мадам Гондлорье продолжала:</p><p class="p1">– Действительно, прекрасные. Такая чудная работа, что считается единственной в своем роде!</p><p class="p1">В эту минуту Беранжера де Шаншеврие, стройная семилетняя девочка, смотревшая на площадь через узорчатую решетку балкона, позвала:</p><p class="p1">– Крестная Флёр де Лис! Смотри-ка, какая хорошенькая танцовщица пляшет там, на улице, и бьет в бубен! А кругом на нее все так и смотрят!</p><p class="p1">Действительно, с улицы доносился громкий звон бубна.</p><p class="p1">– Какая-нибудь цыганка, – отвечала Флёр де Лис, небрежно поворачивая голову в сторону площади.</p><p class="p1">– Посмотрим! Посмотрим! – закричали ее резвые подруги.</p><p class="p1">Все бросились к решетке балкона, между тем как Флёр де Лис, озабоченная холодностью своего жениха, последовала за ними медленно, а сам жених, вырученный этим случаем, положившим конец натянутому разговору, возвратился в глубину комнаты с чувством облегчения, как солдат, сменившийся с караула. Одно время ему нравилось ухаживать за прелестной Флёр де Лис, но мало-помалу это стало ему надоедать, а теперь близость их предстоящего брака охлаждала его с каждым днем все больше. Впрочем, он от природы отличался непостоянством, да вдобавок обладал еще и несколько грубым вкусом. Несмотря на свое высокое происхождение, он приобрел на военной службе солдатские замашки. Ему были по душе таверны и кутежи. Он чувствовал себя хорошо только там, где раздавались грубые остроты, где можно было отпускать казарменные любезности, где красота была доступна и успех легок. А между тем в семье ему дали некоторое воспитание и привили известные манеры; но он слишком рано попал в казарму, слишком рано начал жить, и с каждым днем дворянский лоск все более стирался от грубого трения его военной перевязи. Бывая время от времени из уважения, еще не вполне угасшего в нем, у Флёр де Лис, он чувствовал себя вдвойне стесненным. Во-первых, потому, что, растеряв свою любовь в различных похождениях, он сохранил очень мало для своей невесты, а во-вторых, он постоянно боялся, чтобы среди всех этих затянутых, чопорных красавиц с его языка, привыкшего к ругательствам, не сорвалось бы какое-нибудь крепкое словцо. Можно себе представить, каково было бы впечатление!</p><p class="p1">Впрочем, все это сочеталось у него с большой претензией на изящество, с щегольством и красивой наружностью. Пусть читатель соединит все это, как ему будет угодно. Я только историк.</p><p class="p1">Так он стоял несколько минут молча, точно в раздумье, прислонясь к резному наличнику камина, как вдруг Флёр де Лис, повернув голову, обратилась к нему с вопросом. Ведь, по правде говоря, разговаривать с ним холодно бедной девушке было очень трудно.</p><p class="p1">– Вы, кажется, говорили мне, прекрасный кузен, о какой-то цыганочке, которую вы спасли от целой шайки жуликов два месяца тому назад, объезжая с патрулем город?</p><p class="p1">– Как будто говорил, прекрасная кузина, – отвечал капитан.</p><p class="p1">– Не она ли пляшет там, на площади? Посмотрите, не узнаете ли вы ее, кузен Феб?</p><p class="p1">В этом кратком приглашении подойти и в обращении по имени явно сквозило желание примириться. Капитан Феб де Шатопер – читатель, вероятно, уже с начала главы узнал его – медленно направился к балкону.</p><p class="p1">– Посмотрите на эту девочку, – обратилась к Фебу Флёр де Лис, нежно беря его под руку, – не ваша ли это цыганочка?</p><p class="p1">Феб взглянул и сказал:</p><p class="p1">– Да. Я узнаю ее козу.</p><p class="p1">– Ах, в самом деле, какая прелестная козочка! – воскликнула Амлотта, всплеснув руками от восхищения.</p><p class="p1">– А что, ее рожки из настоящего золота? – спросила Беранжера.</p><p class="p1">Мадам Алоиза заметила, не вставая с кресла:</p><p class="p1">– Не одна ли это из тех цыганок, которые в прошлом году вошли в Париж через Жибарские ворота?</p><p class="p1">– Матушка, теперь эти ворота называются Адскими воротами, – кротко заметила Флёр де Лис.</p><p class="p1">Мадемуазель де Гондлорье знала, как коробят капитана устарелые выражения ее матери. Действительно, он усмехался, повторяя сквозь зубы:</p><p class="p1">– Жибарские ворота! Жибарские! Все воспоминания о короле Карле Шестом!</p><p class="p1">– Крестная, – позвала Беранжера, чьи все время бегавшие глазки вдруг устремились к верхушке собора Богоматери, – какой это там, наверху, человек в черном?</p><p class="p1">Все девушки посмотрели вверх. Действительно, на верхнюю балюстраду северной башни, выходившей на Гревскую площадь, облокотился человек. Это был священник. Ясно видны были его одежда и лицо, подпертое обеими руками. Он стоял неподвижно, как статуя, устремив пристальный взгляд на площадь. В его позе было что-то напоминающее неподвижность коршуна, заметившего воробьиное гнездо и смотрящего на него.</p><p class="p1">– Это жозасский архидьякон, – сказала Флёр де Лис.</p><p class="p1">– Хорошее у вас зрение, если вы узнали его отсюда, – заметила Гайфонтэн.</p><p class="p1">– Как он смотрит на плясунью! – заметила Диана де Кристель.</p><p class="p1">– Беда цыганочке! – сказала Флёр де Лис. – Он не любит ее родины – Египта.</p><p class="p1">– Жаль, что этот человек так смотрит на нее, – прибавила Амлотта де Монмишель. – Она танцует восхитительно…</p><p class="p1">– Прекрасный кузен Феб, – вдруг обратилась к молодому человеку Флёр де Лис, – так как вы знаете эту цыганочку, то сделайте ей знак, чтобы она подошла сюда. Это бы нас позабавило.</p><p class="p1">– Да, да! – хором воскликнули остальные девушки, хлопая в ладоши.</p><p class="p1">– Это безумие, – возразил Феб. – Она, наверное, уже забыла меня, и я даже не знаю ее имени. Однако, если вы желаете, сударыни, то я попытаюсь.</p><p class="p1">И, перегнувшись через балюстраду балкона, он закричал:</p><p class="p1">– Эй, цыганка!</p><p class="p1">Плясунья в эту минуту не била в бубен. Она обернулась в ту сторону, откуда послышался голос, устремила на Феба блестящие глаза и замерла на месте.</p><p class="p1">– Сюда! – он жестом позвал цыганку.</p><p class="p1">Молодая девушка еще раз взглянула на него, затем вся вспыхнула и, взяв тамбурин под мышку, направилась мимо изумленных зрителей к двери дома, откуда ее звали. Она шла медленно, качаясь, с помутившимся взглядом птички, очарованной змеей.</p><p class="p1">Минуту спустя шитая портьера приподнялась, и на пороге появилась цыганка, раскрасневшаяся, смущенная, запыхавшаяся, опустив глаза, не смея ступить ни шагу дальше.</p><p class="p1">Беранжера захлопала в ладоши.</p><p class="p1">Между тем плясунья стояла неподвижно на пороге. Ее появление произвело странное впечатление на группу молодых девушек. Всех их, несомненно, одушевляло бессознательное желание нравиться красивому офицеру, все их кокетство имело в виду блестящий мундир, и с момента его появления между ними началось тайное, глухое соревнование, в котором они сами едва ли отдавали себе отчет, но которое поминутно сквозило во всех их жестах и словах. Но так как они все были приблизительно одинаково красивы, то боролись они одинаковым оружием, и каждая могла надеяться на победу.</p><p class="p1">Появление цыганки сразу нарушило это равновесие. Девушка отличалась такой редкой красотой, что, как только она появилась на пороге, всем показалось, что она распространяет какой-то особый свет. В этой тесной комнате, в темной раме драпировок и резьбы, она была несравненно прекраснее и блистательнее, чем на площади. Она походила на факел, который внесли со света в тень. Благородные девицы были ослеплены. Каждая почувствовала себя как бы оскорбленной в своей красоте. И тут же, не обменявшись между собой ни словом, они – да извинит нам читатель это выражение – переменили фронт. Они прекрасно поняли друг друга. Женщины инстинктивно понимают друг друга быстрее, чем мужчины. Перед ними явилась соперница – все это почувствовали и все сомкнулись. Достаточно одной капли вина, чтоб окрасить целый стакан воды, а чтоб испортить настроение целому собранию хорошеньких женщин, достаточно появления женщины еще более хорошенькой, – особенно когда в обществе есть мужчина.</p><p class="p1">Поэтому цыганке был оказан ледяной прием. Девицы окинули ее взглядом с головы до ног, потом переглянулись, – и все было сказано. Они поняли друг друга. Между тем цыганка ждала, чтоб с ней заговорили. Она была так взволнована, что не смела поднять глаз.</p><p class="p1">Капитан первый прервал молчание.</p><p class="p1">– Честное слово, – заговорил он с крайне фатоватым видом, – прехорошенькая! Как ваше мнение, прекрасная кузина?</p><p class="p1">Это замечание, которое более деликатный человек сделал бы, по крайней мере, не так громко, не могло способствовать тому, чтобы уменьшить ревнивое чувство женщин, рассматривавших цыганку.</p><p class="p1">Флёр де Лис ответила кузену с гримаской притворного пренебрежения:</p><p class="p1">– Недурна!</p><p class="p1">Остальные шептались.</p><p class="p1">Наконец госпожа Алоиза, приревновавшая цыганку не меньше других, но, конечно, не за себя, а за дочь, обратилась к плясунье:</p><p class="p1">– Подойди сюда, девочка.</p><p class="p1">– Подойди сюда, девочка! – с комической важностью повторила Беранжера, ростом не доходившая до талии цыганки.</p><p class="p1">Девушка подошла к благородной даме.</p><p class="p1">– Красавица, я не знаю, окажусь ли я настолько счастлив, что ты узнаешь меня… – высокопарно начал Феб, подходя.</p><p class="p1">Она прервала его, подняв на него бесконечно кроткий взгляд, и проговорила с улыбкой:</p><p class="p1">– Конечно!</p><p class="p1">– У нее хорошая память, – заметила Флёр де Лис.</p><p class="p1">– Как ты, однако, быстро убежала тогда, – продолжал Феб. – Разве я такой страшный?</p><p class="p1">– Ах, нет, – ответила цыганка.</p><p class="p1">В этом «ах, нет» и в этом «конечно» было нечто неизъяснимое, что оскорбило Флёр де Лис.</p><p class="p1">– А вместо себя, красавица, ты оставила мне какого-то горбатого кривого урода, кажется, епископского звонаря, – продолжал капитан, язык которого развязался в разговоре с девушкой из простонародья. – Мне говорили, что он побочный сын архидьякона и по природе своей черт. У него смешное имя, что-то вроде Великой пятницы, Вербного воскресенья или Заговенья. Одним словом – название какого-то праздника, когда трезвонят в колокола! И он позволил себе похитить тебя, будто ты создана для пономарей… Это слишком! Чего нужно было от тебя этому дикому коту? А? Скажи-ка!</p><p class="p1">– Не знаю, – ответила она.</p><p class="p1">– Представьте себе, какая дерзость! Звонарь похищает девушку, как какой-нибудь виконт! Мужик охотится за дворянской дичью! Это неслыханно. Впрочем, он дорого поплатился за это. Мэтр Пьера Тортерю – мастер своего дела! И я должен тебе сказать, – если это может доставить тебе удовольствие, – что он здорово обработал шкуру твоего звонаря.</p><p class="p1">– Бедный! – сказала цыганка, в памяти которой эти слова вызвали воспоминание о сцене у позорного столба.</p><p class="p1">Капитан разразился смехом:</p><p class="p1">– Ах, черт возьми! Тут сожаление так же у места, как султан из перьев на хвосте у свиньи! Пусть мне раздует брюхо, как самому Папе, если…</p><p class="p1">Он осекся:</p><p class="p1">– Извините, сударыни. Я, кажется, чуть было не сказал глупости.</p><p class="p1">– Фи, сударь, – сказала Гайфонтэн.</p><p class="p1">– Он говорит с этой цыганкой на понятном ей языке! – добавила вполголоса Флёр де Лис, досада которой возрастала с каждой минутой.</p><p class="p1">Это чувство, конечно, не уменьшилось, когда она увидела, как капитан, довольный цыганкой, а еще больше самим собой, повернулся на каблуках, повторяя со своей грубой и простодушной солдатской любезностью:</p><p class="p1">– Красавица, черт побери!</p><p class="p1">– Костюм у нее довольно неприличный, – заметила Диана де Кристель, улыбаясь, чтобы показать свои прекрасные зубки.</p><p class="p1">Это замечание было лучом света для всех остальных. Оно указало на уязвимую сторону цыганки. Не имея возможности придраться к ее красоте, девицы набросились на ее наряд.</p><p class="p1">– Да, правда, милая, – вмешалась Амлотта де Монмишель, – как это ты решаешься показываться на улицу без косынки и шемизетки?</p><p class="p1">– И юбка так коротка, что совестно смотреть, – сказала Гайфонтэн.</p><p class="p1">– Тебя, моя милая, за твой золотой пояс заберет городская стража, – довольно язвительно вставила Флёр де Лис.</p><p class="p1">– Девочка, девочка, если бы ты прикрывала руки рукавами, они бы у тебя не так загорели, – продолжала с неумолимой усмешкой Диана.</p><p class="p1">Эта группа молодых красавиц, скользивших и извивавшихся по-змеиному вокруг уличной плясуньи, жаливших ее острыми и ядовитыми язычками, представляла зрелище, достойное более умного наблюдателя, чем Феб. Красавицы были грациозны и злы. Они злобно разбирали этот убогий фантастический наряд из блесток и пестрых тряпок, и смеху, насмешкам, унижениям не было конца. Сарказмы, сопровождаемые высокомерным состраданием и злобными взглядами, сыпались дождем. Красавицы напоминали молодых римских патрицианок, забавлявшихся тем, что втыкали булавки в грудь красивой невольницы. Их можно было сравнить со сворой гончих, с раздутыми ноздрями и разгоревшимися глазами окруживших бедную лесную лань, растерзать которую им запрещает взгляд хозяина.</p><p class="p1">И что значила в конце концов эта жалкая уличная плясунья перед знатными девицами! Они, казалось, даже забыли о ее присутствии и говорили о ней громко, как о вещи довольно красивой, но неопрятной и презренной.</p><p class="p1">Цыганка не была нечувствительна к этим булавочным уколам. По временам краска стыда заливала ее лицо, и в глазах сверкал гнев. Презрительное слово, казалось, было готово сорваться с ее губ, и она делала гримаску, уже знакомую читателю. Однако она молчала и стояла неподвижно, устремив на Феба покорный, грустный и кроткий взгляд. В этом взгляде сквозили счастье и нежность. Можно было подумать, что она сдерживается, боясь, чтобы ее не прогнали.</p><p class="p1">Феб же смеялся, принимая сторону цыганки, со смесью сострадания и нахальства.</p><p class="p1">– Ты их не слушай, милая, – повторял он, позванивая своими золотыми шпорами. – Правда, твой наряд несколько странен и не вполне приличен, но это ничего не значит для такой красотки, как ты.</p><p class="p1">– Боже мой! – воскликнула блондинка Гайфонтэн, вытягивая с горькой усмешкой свою лебединую шейку. – Как легко королевские стрелки воспламеняются от прекрасных цыганских глаз!</p><p class="p1">– Что же тут особенного? – спросил Феб.</p><p class="p1">При этом ответе, небрежно брошенном капитаном, как бросают камень, даже не заботясь взглянуть, куда он упадет, Коломба засмеялась, так же, как засмеялись Диана, Амлотта и Флёр де Лис, у которой, впрочем, на глаза навернулись слезы.</p><p class="p1">Цыганка, опустившая взгляд при замечании Коломбы де Гайфонтэн, подняла глаза и, вся сияющая и гордая, взглянула на Феба. Она была очень красива в эту минуту.</p><p class="p1">Хозяйка, наблюдавшая за этой сценой, чувствовала себя, сама не зная почему, оскорбленной.</p><p class="p1">– Пресвятая Дева! – вдруг закричала она. – Что это там шевелится, у моих ног! Ах ты, противное животное!</p><p class="p1">То была коза, прибежавшая отыскивать свою госпожу. Пытаясь пробраться к ней, она запуталась в бесчисленных складках платья благородной дамы, сидевшей в кресле.</p><p class="p1">Внимание было отвлечено. Цыганка, не говоря ни слова, высвободила козу.</p><p class="p1">– Ах, это козочка с золочеными копытцами! – воскликнула Беранжера, прыгая от восторга.</p><p class="p1">Цыганка опустилась на колени и прижалась щекой к голове ласкавшейся к ней козочки, словно прося у нее прощения за то, что покинула ее.</p><p class="p1">Диана между тем нагнулась к уху Коломбы:</p><p class="p1">– Ах, боже мой! Как это я прежде ее не узнала: ведь это цыганка с козой! Говорят, она колдунья, и ее коза умеет выделывать удивительные штуки.</p><p class="p1">– Ну, так пусть коза нас позабавит и покажет нам какое-нибудь чудо! – сказала Коломба.</p><p class="p1">Диана и Коломба живо обернулись к цыганке.</p><p class="p1">– Милая, заставь свою козу показать нам чудо.</p><p class="p1">– Я не понимаю вас, – отвечала плясунья.</p><p class="p1">– Чудо, волшебство… ну вообще, – колдовство.</p><p class="p1">– Не знаю… – И она начала ласкать хорошенькое животное, повторяя: – Джали! Джали!</p><p class="p1">В эту минуту Флёр де Лис заметила вышитый кожаный мешочек, висевший на шее козы.</p><p class="p1">– Что это такое? – спросила она цыганку.</p><p class="p1">Цыганка подняла на нее свои большие глаза и отвечала серьезно:</p><p class="p1">– Это моя тайна.</p><p class="p1">«Хотела бы я знать, что у тебя за тайны», – подумала Флёр де Лис.</p><p class="p1">Между тем хозяйка встала с недовольным видом.</p><p class="p1">– Однако, моя милая, если ты со своей козой не можешь нам проплясать что-нибудь, то что вам здесь делать?</p><p class="p1">Цыганка, не отвечая, медленно направилась к двери. Но чем ближе она подходила к порогу, тем медленнее становился ее шаг, как будто ее удерживал невидимый магнит. Вдруг она обратила полные слез глаза на Феба и остановилась.</p><p class="p1">– Клянусь Богом! – вскричал капитан. – Разве можно так отпустить ее! Вернись и пропляши нам что-нибудь. Кстати, красотка, как тебя зовут?</p><p class="p1">– Эсмеральда, – отвечала плясунья, не сводя глаз с офицера.</p><p class="p1">При этом странном имени девицы покатились со смеху.</p><p class="p1">– Вот так имя для девушки! – воскликнула Диана.</p><p class="p1">– Сами видите, что она колдунья, – пояснила Амлотта.</p><p class="p1">– Одно могу сказать, моя милая: не у святой купели твои родители дали тебе это имя, – торжественно заявила госпожа Алоиза.</p><p class="p1">Между тем не замеченная никем Беранжера успела кусочком марципана приманить козу в уголок, и они мгновенно подружились. Любопытная девочка отвязала мешочек, висевший на шее козы, открыла его и высыпала содержимое на ковер. Там оказалась азбука, каждая буква которой была написана на отдельной дощечке. Едва успев высыпать эти игрушки на пол, девочка с изумлением увидела, что коза стала своей золоченой ножкой отбирать буквы и размещать их, тихонько подталкивая, в известном порядке. Вероятно, это было одно из «чудес», известных животному. Через минуту составилось слово, по-видимому хорошо ей знакомое, и Беранжера, в восторге всплеснув руками, объявила:</p><p class="p1">– Крестная Флёр де Лис, посмотрите, что сделала коза.</p><p class="p1">Флёр де Лис поспешно подошла и вздрогнула: буквы, размещенные на полу, составляли слово:</p><p class="p1">«ФЕБ»</p><p class="p1">– Это написала коза? – спросила молодая девушка изменившимся голосом.</p><p class="p1">– Да, крестная! – отвечала Беранжера.</p><p class="p1">Сомнение было невозможно: девочка не умела писать.</p><p class="p1">«Так вот ее тайна!» – подумала Флёр де Лис.</p><p class="p1">Между тем на крик девочки подбежали все – и мать, и девицы, и цыганка, и офицер.</p><p class="p1">Цыганка увидала, какую глупость совершила ее коза. Она вспыхнула, затем побледнела и вся дрожала, как уличенная в преступлении, стоя перед капитаном. Он же смотрел на нее с улыбкой удивления и самодовольства.</p><p class="p1">– Феб, – изумленно шептали девицы, – это имя капитана.</p><p class="p1">– У тебя превосходная память! – заметила Флёр де Лис цыганке, замершей на месте, и разразилась рыданиями. – О! – повторяла она горестно, закрывая лицо прекрасными руками. – Она – колдунья!</p><p class="p1">А другой, еще более горький голос шептал ей: «Она – соперница!»</p><p class="p1">Флёр де Лис упала в обморок.</p><p class="p1">– Дочь моя! Дочь моя! – кричала испуганная мать. – Убирайся прочь, проклятая цыганка!</p><p class="p1">Эсмеральда в мгновение ока собрала злополучные буквы, сделала знак Джали и вышла в одну дверь, между тем как Флёр де Лис выносили в другую.</p><p class="p1">Оставшись один, капитан Феб, поколебавшись с минуту, в какую дверь ему направиться, пошел за цыганкой.</p></span></span></span>
