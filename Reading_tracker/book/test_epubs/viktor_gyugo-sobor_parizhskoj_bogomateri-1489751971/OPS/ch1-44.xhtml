<p class="p">I. У Гренгуара на Бернардинской улице появляется несколько блестящих идей</p>
</div><p class="p1">С тех пор как Гренгуар увидал, какой оборот принимает дело, и понял, что оно, наверное, для главных действующих лиц комедии кончится веревкой, виселицей и другими неприятностями, он уже старался не вмешиваться. Бродяги, с которыми он продолжал жить, рассуждая, что в конце концов это все же лучшие люди в Париже, не переставали интересоваться цыганкой. Он находил это очень естественным со стороны людей, у которых, как у нее, не было впереди ничего, кроме господ Шармолю и Тортерю, и которые не летали подобно ему в фантастических сферах на крыльях Пегаса. Из их разговоров Гренгуар узнал, что его супруга, обвенчанная с ним разбитой кружкой, нашла себе приют в соборе Богоматери, и был этому очень рад, но у него даже не явилось искушения разыскать ее. Изредка он вспоминал о козочке – вот и все. Днем он давал атлетические представления, которыми кормился, а ночью корпел над обличительной статьей против епископа Парижского, так как не мог забыть, что однажды был обрызган колесами его мельниц, и затаил против него месть. Кроме того, он был занят составлением комментариев к прекрасному сочинению Бодри ле Ружа, епископа Нойонского и Турнейского, «De cupa Petrarum»<a href="ch2.xhtml#id122" class="a">[130]</a>, вследствие чего он сильно заинтересовался архитектурой, и это искусство вытеснило из его сердца страсть к герметике. Впрочем, одно увлечение проистекало из другого, так как между герметикой и зодчеством существует тесная связь. Гренгуар перешел от своего увлечения идеей к увлечению формой этой идеи.</p><p class="p1">Однажды он остановился близ церкви Святого Германа Оксерского, на углу здания, называемого Фор л’Эвек и находившегося напротив другого, по имени Фор ле Руа. Около этого Фор л’Эвек была прелестная часовня четырнадцатого столетия, фасад которой выходил на улицу. Гренгуар благоговейно рассматривал внешние украшения часовни. На него нашла одна из тех минут эгоистического, всепоглощающего высшего наслаждения, когда художник видит во всем мире одно только искусство и весь мир только в одном искусстве. Вдруг он почувствовал, что на его плечо опустилась чья-то тяжелая рука. Он обернулся. Это был его бывший друг, бывший наставник – господин архидьякон.</p><p class="p1">Гренгуар был поражен. Он уже давно не встречался с архидьяконом, а Клод принадлежал к числу тех величавых и страстных личностей, встреча с которыми всегда нарушает равновесие в душе философа-скептика.</p><p class="p1">Архидьякон несколько минут хранил молчание, и Гренгуар за это время успел его рассмотреть. Он нашел, что dom Клод сильно изменился. Тот был бледен, как зимнее утро; глаза у него впали, и волосы почти совсем поседели. Священник первый прервал молчание, говоря спокойным, но ледяным тоном:</p><p class="p1">– Как поживаете, мэтр Пьер?</p><p class="p1">– Как поживаю? – переспросил Гренгуар. – Да так себе. Но вообще еще ничего. Я очень умерен. Вам ведь известен гиппократовский секрет вечного здоровья? Id est: cibi, potus, somni, venus – omnia moderata sint<a href="ch2.xhtml#id120" class="a">[131]</a>.</p><p class="p1">– Значит, у вас нет никакой заботы, мэтр Пьер? – спросил архидьякон, пристально смотря на Гренгуара.</p><p class="p1">– И то правда – нет.</p><p class="p1">– А что вы теперь делаете?</p><p class="p1">– Видите, учитель, рассматриваю, как обтесаны эти камни и изваяны эти барельефы.</p><p class="p1">Священник улыбнулся той горькой улыбкой, которая только приподнимает один из углов рта.</p><p class="p1">– И это вас занимает?</p><p class="p1">– Это для меня рай, – отвечал Гренгуар и, нагнувшись над изваяниями, с восхищенным видом человека, демонстрирующего живых феноменов, продолжал: – Разве вы не находите, например, что изгибы этого барельефа исполнены с чрезвычайным искусством, тщательностью и терпением? Взгляните на эту колонну. Где вы видали капитель, обвитую листьями, более нежными и тоньше изваянными? Вот три фрески Жана Мальевена. Это еще не самое совершенное произведение его великого гения. Тем не менее наивность, мягкость выражения лиц, красота поз и складок одежды и какая-то неизъяснимая прелесть примешиваются даже к самым недостаткам, придают фигурам необыкновенно приятный и изящный, может быть, даже слишком изящный характер. Вы не находите это очень интересным?</p><p class="p1">– Нет, отчего же? – заметил священник.</p><p class="p1">– А если бы вы видели внутренность часовни! – продолжал поэт, окончательно разболтавшись. – Всюду изваяния! Густо, как капустный кочан! Особенно хоры выдержаны в таком строго религиозном и оригинальном стиле, какого мне нигде не приходилось видеть!</p><p class="p1">Клод прервал его:</p><p class="p1">– Стало быть, вы счастливы?</p><p class="p1">Гренгуар отвечал с увлечением:</p><p class="p1">– Честное слово, да! Сначала я любил женщин, потом животных. Теперь я люблю камни. Они не менее интересны, чем женщины и звери, но далеко не так коварны.</p><p class="p1">Священник поднес руку ко лбу. Это был его привычный жест.</p><p class="p1">– Правда?</p><p class="p1">– Убедитесь сами, какое это удовольствие!</p><p class="p1">Он взял священника за руку и повел его под свод башенок, откуда начиналась лестница Фор л’Эвека.</p><p class="p1">– Вот лестница! Каждый раз, как я вижу ее, я бываю счастлив. Это одно из самых простых и вместе с тем редких сооружений Парижа. Все ступеньки скошены книзу. Ее красота и простота заключаются в красоте именно этих ступеней, имеющих в ширину около фута, они сплетаются, набегают одна на другую, вделаны одна в другую, как бы впиваются друг в друга, твердо и вместе с тем изящно.</p><p class="p1">– И вы ничего не желаете?</p><p class="p1">– Ничего.</p><p class="p1">– И ни о чем не жалеете?</p><p class="p1">– У меня нет ни желаний, ни сожалений. Я наладил свою жизнь.</p><p class="p1">– Что люди устраивают, то обстоятельства расстраивают, – сказал Клод.</p><p class="p1">– Я философ школы Пиррона и стараюсь во всем сохранять равновесие, – отвечал Гренгуар.</p><p class="p1">– А чем же вы живете?</p><p class="p1">– Пописываю кое-какие эпопеи и трагедии. Но больше всего мне приносит мое ремесло, которое вам известно, учитель, – умение носить пирамиды из стульев в зубах.</p><p class="p1">– Грубое ремесло для философа.</p><p class="p1">– Оно тоже требует равновесия, – сказал Гренгуар. – Когда человека занимает одна мысль, он находит ей применение повсюду.</p><p class="p1">– Знаю, – отвечал архидьякон. Помолчав, священник продолжал: – Однако у вас довольно жалкий вид.</p><p class="p1">– Жалкий, да; но не несчастный.</p><p class="p1">В эту минуту послышался стук лошадиных копыт, и собеседники увидали, что на улицу въезжает рота стрелков королевского конвоя с поднятыми вверх пиками, с офицером во главе. Кавалькада имела блестящий вид, и звон копыт гулко отдавался по мостовой.</p><p class="p1">– Что это вы так смотрите на этого офицера? – сказал Гренгуар архидьякону.</p><p class="p1">– Мне кажется, я его узнаю.</p><p class="p1">– Как его зовут?</p><p class="p1">– Мне думается, это Феб де Шатопер, – отвечал Клод.</p><p class="p1">– Феб! Редкостное имя! Есть еще один Феб – граф де Фуа. Я знал одну девушку, у которой имя Феб не сходило с языка.</p><p class="p1">– Пойдемте со мной, – сказал священник. – Мне надо кое-что вам сказать.</p><p class="p1">Со времени появления отряда сквозь холодную наружность архидьякона стало пробиваться какое-то волнение. Он пошел. Гренгуар последовал за ним по привычке повиноваться ему, как все, кому случалось приближаться к этому человеку, обладавшему удивительным влиянием на людей. Они молча дошли до Бернардинской улицы, довольно пустынной. Клод остановился.</p><p class="p1">– Учитель, что вы хотите мне сказать? – спросил Гренгуар.</p><p class="p1">– Не находите ли вы, что мундиры этих всадников, которых мы только что видели, куда красивее моей рясы или вашего одеяния? – сказал архидьякон с видом глубокого размышления.</p><p class="p1">Гренгуар покачал отрицательно головой:</p><p class="p1">– Мне куда больше нравится мой красно-желтый казакин, чем их железная и стальная броня. Удивительное удовольствие производить на ходу такой шум, как чугунная набережная при землетрясении!</p><p class="p1">– И вы никогда, Гренгуар, не завидовали этим красавцам в военных доспехах?</p><p class="p1">– Чему же завидовать, отец архидьякон? Их силе, вооружению, их дисциплине? Философия и независимость в лохмотьях стóят дороже. Я предпочитаю быть головкой мухи, чем хвостом льва.</p><p class="p1">– Удивительно! – задумчиво проговорил священник. – А все же мундир очень красивая вещь.</p><p class="p1">Гренгуар, видя, что он задумался, отошел, чтобы полюбоваться фасадом соседнего дома. Он вернулся, хлопая в ладоши.</p><p class="p1">– Если бы вы не были так заняты красивыми мундирами военных, отец архидьякон, я попросил бы вас взглянуть на эту дверь. Я всегда говорил, что дверь дома сеньора Обри самая красивая в мире.</p><p class="p1">– Пьер Гренгуар, – спросил архидьякон, – куда вы девали ту маленькую плясунью-цыганку?</p><p class="p1">– Эсмеральду? Какой резкий переход в разговоре!</p><p class="p1">– Она, кажется, была вашей женой?</p><p class="p1">– Да, нас повенчали разбитой кружкой. На четыре года. Кстати, – прибавил Гренгуар, смотря на архидьякона не без лукавства, – вы ее еще не забыли?</p><p class="p1">– А вы – неужели забыли?</p><p class="p1">– Почти… У меня столько дела… Боже мой, что за прелесть была ее козочка!</p><p class="p1">– Ведь цыганка, кажется, спасла вам жизнь?</p><p class="p1">– Черт возьми, это правда!</p><p class="p1">– Ну, так что же сталось с нею? Что вы с ней сделали?</p><p class="p1">– Не могу вам сказать. Ее, кажется, повесили.</p><p class="p1">– Вы думаете?</p><p class="p1">– Я не вполне уверен в этом. Когда я увидал, что дело пахнет виселицей, я поспешил убраться.</p><p class="p1">– Это все, что вы знаете?</p><p class="p1">– Постойте! Мне говорили, что она нашла убежище в соборе Богоматери, что там она в безопасности. Я очень рад этому, не знаю только, спаслась ли козочка вместе с ней? Вот и все, что я знаю.</p><p class="p1">– Я скажу вам больше, – закричал dom Клод, и голос его, до тех пор тихий, медленный и почти глухой, загремел как гром. – Она действительно нашла убежище в соборе. Но через три дня правосудие снова овладеет ею, и ее повесят на Гревской площади. Это уже постановлено парламентом.</p><p class="p1">– Это досадно, – заметил Гренгуар.</p><p class="p1">К священнику в одно мгновение вернулось его ледяное спокойствие.</p><p class="p1">– Какому дьяволу понадобилось добиваться вторичного ее ареста? – спросил поэт. – Неужели нельзя было оставить парламент в покое? Кому убыток от того, что бедная девушка скрывается под стрельчатыми сводами собора, там, где ласточки вьют себе гнезда?</p><p class="p1">– Есть на свете такие демоны, – отвечал архидьякон.</p><p class="p1">– Все это чертовски досадно, – заметил Гренгуар.</p><p class="p1">Архидьякон помолчал и затем снова спросил:</p><p class="p1">– Итак, она спасла вам жизнь?</p><p class="p1">– Да, у моих друзей, бродяг… Я уже почти болтался на виселице. Пожалели бы теперь!</p><p class="p1">– Вы не желаете сделать что-нибудь для нее?</p><p class="p1">– Очень бы желал, господин Клод, только боюсь, не нажить бы себе хлопот.</p><p class="p1">– Подумаешь!</p><p class="p1">– Да! Подумаешь! Вам-то хорошо, учитель! Ну а у меня начаты две большие работы.</p><p class="p1">Священник ударил себя по лбу. Несмотря на все его старания казаться спокойным, по временам резкий жест выдавал его душевные муки.</p><p class="p1">– Как ее спасти?</p><p class="p1">Гренгуар сказал ему:</p><p class="p1">– Я вам отвечу, наставник: «Il padelt», что значит по-турецки: «Бог наша надежда».</p><p class="p1">– Как спасти ее? – задумчиво повторил Клод.</p><p class="p1">Гренгуар в свою очередь ударил себя по лбу:</p><p class="p1">– Послушайте, у меня бывают минуты вдохновения. Я найду способ. Не попросить ли помилования у короля?</p><p class="p1">– Помилования – у Людовика Одиннадцатого?</p><p class="p1">– Отчего же нет?</p><p class="p1">– Отнимите кость у тигра!</p><p class="p1">Гренгуар начал придумывать другой исход.</p><p class="p1">– Ну, вот, слушайте! Хотите, я обращусь к повивальным бабкам с заявлением, что эта девушка беременна?</p><p class="p1">Впавшие глаза священника сверкнули:</p><p class="p1">– Беременна! Дурак! Разве ты имеешь основания утверждать это?</p><p class="p1">Вид его испугал Гренгуара. Он поспешил сказать:</p><p class="p1">– Я не имею никакого основания. Наш брак был настоящим forismaritagium<a href="ch2.xhtml#id118" class="a">[132]</a>. Я тут ни при чем. Но таким образом можно добиться отсрочки.</p><p class="p1">– Безумство! Позор! Замолчи!</p><p class="p1">– Напрасно вы сердитесь, – пробормотал Гренгуар. – Отсрочка никому бы не принесла вреда, а повивальные бабки – бедные женщины – заработали бы сорок парижских денье.</p><p class="p1">Священник не слушал его.</p><p class="p1">– Ее надо как-нибудь вывести оттуда! – говорил он. – Приговор должен быть приведен в исполнение через три дня. Но если б даже не было приговора… этот Квазимодо… У женщин такой извращенный вкус!.. – Он повысил голос: – Мэтр Пьер, я рассудил, что есть только одно средство спасти ее.</p><p class="p1">– Именно?.. Я его не вижу.</p><p class="p1">– Послушайте, мэтр Пьер, вспомните, что вы обязаны ей спасением жизни. Я вам изложу свой план. За церковью наблюдают день и ночь. Из нее выпускают только тех, кого видели входящими. Вы, стало быть, можете войти. Вы придете. Я проведу вас к ней. Вы поменяетесь с ней платьем. Она наденет ваш казакин, вы – ее юбку.</p><p class="p1">– До сих пор все идет отлично, – заметил философ. – А дальше?</p><p class="p1">– Дальше? Она уйдет в вашем платье; вы останетесь в ее. Вас, может быть, повесят, но она будет спасена.</p><p class="p1">Гренгуар почесал у себя за ухом с очень серьезным видом.</p><p class="p1">– Да, вот мысль, которая ни за что не пришла бы мне в голову самому.</p><p class="p1">При неожиданном предложении Клода открытое, добродушное лицо поэта омрачилось, как веселый итальянский пейзаж, когда принесенное порывом ветра облако закрывает собою солнце.</p><p class="p1">– Ну, что же вы скажете о моем плане, Гренгуар?</p><p class="p1">– Я скажу, что меня повесят не «может быть», а наверное.</p><p class="p1">– Это уж вас не касается.</p><p class="p1">– Черт возьми! – воскликнул Гренгуар.</p><p class="p1">– Она спасла вам жизнь. Вы только уплатите ей свой долг.</p><p class="p1">– Есть за мной и другие долги, которых я не плачу.</p><p class="p1">– Мэтр Пьер, это необходимо.</p><p class="p1">Архидьякон говорил повелительным тоном.</p><p class="p1">– Послушайте, dom Клод, – отвечал совершенно сбитый с толку Гренгуар. – Вы настаиваете на выполнении вашего плана, и совершенно напрасно. Я не вижу причины, почему мне идти на виселицу за кого-нибудь другого.</p><p class="p1">– Что же вас так привязывает к жизни?</p><p class="p1">– Тысяча причин.</p><p class="p1">– Какие, например?</p><p class="p1">– Какие? Воздух, солнце, утро, вечер, лунный свет, мои друзья-бродяги, покойники, чудные произведения парижского зодчества, которые я изучаю, три толстые книги, которые я намереваюсь написать, между прочим, одну против епископа и его мельниц. Да мало ли еще что!.. Анаксагор говорил, что он живет для того, чтобы любоваться солнцем. Кроме того, я имею счастье проводить все дни с утра до вечера с гением, то есть с самим собой, что весьма приятно.</p><p class="p1">– Пустозвон! – пробормотал архидьякон. – Ну а кто сохранил тебе жизнь, которую ты находишь такой приятной? Кому ты обязан тем, что дышишь этим воздухом, что видишь небо и что твой птичий ум еще тешится пустяками и глупостями? Без этой девушки где бы ты был? И ты, обязанный ей своей жизнью, хочешь, чтобы она умерла? Ты хочешь смерти этого прелестного, кроткого, очаровательного создания, без которого, кажется, и свет померкнет, более божественного, чем сам Бог. А ты, полусумасшедший, пустой набросок чего-то, какое-то растение, воображающее, что оно думает и движется, ты будешь пользоваться жизнью, которую украл у нее, которая так же бесполезна, как свеча в яркий полдень! Пожалей ее, Гренгуар! Будь теперь ты великодушен! Она показала тебе пример.</p><p class="p1">Священник говорил пылко. Гренгуар слушал его сначала равнодушно, затем растрогался, и наконец, на лице его появилась трагическая гримаса, сделавшая его похожим на новорожденного, у которого резь в желудке.</p><p class="p1">– Как вы увлекательно говорите! – сказал он, отирая слезу. – Ну, хорошо; я подумаю… Оригинальная вам пришла мысль… В конце концов, – продолжал он, помолчав, – кто знает? Может случиться, что меня и не повесят. Ведь не всегда женится тот, кто посватался. Найдя меня в келье в таком смешном наряде – юбке и чепце, – они, может быть, только расхохочутся… Ну а если даже и повесят? Разве смерть от веревки не такая же смерть, как всякая другая, или, лучше сказать, не похожа на всякую другую? Смерть на виселице – смерть, достойная мудреца, который колебался всю свою жизнь. Эта смерть – ни рыба ни мясо, как ум истинного скептика, смерть, носящая отпечаток пирронизма и нерешительности, смерть между небом и землей, парящая в воздухе. Это смерть, приличная философу, и мне она, может быть, предопределена. Великолепно умереть так, как жил.</p><p class="p1">Священник прервал его:</p><p class="p1">– Значит, решено?</p><p class="p1">– Что такое смерть, в конце концов? – продолжал Гренгуар с увлечением. – Одно неприятное мгновение, необходимая дань, переход от ничтожества к небытию. Когда кто-то спросил философа Церцидаса, охотно ли бы он умер, тот ответил: «Отчего и не умереть, раз я в загробной жизни увижу великих людей – Пифагора среди философов, Гекатея среди историков, Гомера среди поэтов, Олимпия среди музыкантов?»</p><p class="p1">Архидьякон протянул ему руку:</p><p class="p1">– Итак, решено? Вы придете завтра.</p><p class="p1">Этот жест возвратил Гренгуара к действительности.</p><p class="p1">– Ах нет, – ответил он тоном человека, только что проснувшегося. – Быть повешенным! Это ни с чем не сообразно! Я не хочу.</p><p class="p1">– В таком случае прощайте! – И архидьякон прибавил сквозь зубы: – Я доберусь до тебя!</p><p class="p1">«Не хочу я, чтобы этот человек добрался до меня», – подумал Гренгуар и побежал за Клодом.</p><p class="p1">– Стойте! Отец архидьякон! Зачем ссориться старым друзьям? Вы принимаете участие в этой девушке, то есть в моей жене, – хорошо! Вы придумали план, чтобы вывести ее невредимой из собора, но предлагаете средство, весьма неприятное для меня, Гренгуара. А что, если я вам предложу свой план?.. Предупреждаю вас, что у меня сию минуту мелькнула блестящая мысль. Что вы скажете, если я придумал средство вывести ее из затруднительного положения, не подвергая своей шеи опасности свести знакомство с петлей? Что вы на это скажете? Ведь вы этим удовлетворитесь? Разве для вашего удовольствия необходимо, чтоб меня повесили?</p><p class="p1">Священник с нетерпением рвал пуговицы своей сутаны.</p><p class="p1">– Вот болтун!.. Говори, что ты такое придумал!</p><p class="p1">– Да, – продолжал Гренгуар, разговаривая сам с собой и поднося указательный палец к носу в знак размышления, – так! Бродяги – славные ребята… Цыгане любят ее… Они пойдут по первому зову… Нет ничего легче… Одним ударом. В сумятице ее легко будет похитить… Хоть завтра вечером… Они будут очень рады.</p><p class="p1">– Говори же, что ты придумал? – настаивал священник, тряся его.</p><p class="p1">Гренгуар величественно повернулся к нему.</p><p class="p1">– Оставьте! Видите, я сочиняю. – Он подумал еще несколько секунд, затем зааплодировал своей мысли, крича: – Великолепно! Успех верный!</p><p class="p1">– Говори же! – гневно закричал Клод.</p><p class="p1">Гренгуар сиял.</p><p class="p1">– Идите сюда, я буду говорить шепотом. Презабавная выдумка, которая всех нас выведет из затруднения. Черт возьми! Надо согласиться, что я не дурак.</p><p class="p1">Он сам прервал себя:</p><p class="p1">– Да! А козочка с нею вместе?</p><p class="p1">– Да! Черт тебя побери!</p><p class="p1">– Ведь и ее они бы повесили?</p><p class="p1">– А мне какое дело?</p><p class="p1">– Да, наверное, повесили бы. Вот в прошедшем месяце повесили же свинью! Палачу это выгодно. Он съедает потом мясо. Повесить мою прелестную Джали? Бедную маленькую козочку!</p><p class="p1">– Проклятие! – вскричал Клод. – Ты сам палач! Ну, что же ты придумал, чудак? Надо, что ли, вытаскивать из тебя мысль щипцами?</p><p class="p1">– Тише, учитель, слушайте!</p><p class="p1">Гренгуар наклонился к уху архидьякона и стал говорить шепотом, бросая тревожные взгляды вдоль улицы, где, впрочем, в это время не видно было ни души. Когда он кончил, Клод пожал ему руку, сказав холодно:</p><p class="p1">– Хорошо… До завтра.</p><p class="p1">– До завтра, – повторил Гренгуар.</p><p class="p1">И когда архидьякон направился в одну сторону, Гренгуар пошел в другую, бормоча вполголоса:</p><p class="p1">– Важно ты это придумал, мэтр Гренгуар. Что же такое! Из того, что ты маленький человечек, еще не следует, что ты станешь бояться большого дела. Битон носил большого быка на плечах; вертихвостки, малиновки и каменки перелетают через океан.</p></span><span id="id62"><div class="title6">
<p class="p">II. Становись бродягой!</p>
</div><p class="p1">Вернувшись в монастырь, архидьякон встретился у дверей с братом, Жаном де Муленом, который, поджидая его, заполнял скуку ожидания, рисуя на стене углем профиль старшего брата и украшая его огромным носом.</p><p class="p1">Клод едва взглянул на брата. Он был занят иными мыслями. Веселое лицо повесы, не раз заставлявшее своим радостным видом проясняться мрачную физиономию священника, оказалось на этот раз бессильным разогнать туман, все более и более сгущавшийся над этой сломленной, гниющей и разлагающейся душой.</p><p class="p1">– Братец, – робко начал Жан, – я пришел к вам.</p><p class="p1">Архидьякон даже не поднял глаз.</p><p class="p1">– Ну и что ж?</p><p class="p1">– Братец, – продолжал лицемер, – вы так добры ко мне и даете мне всегда такие хорошие советы, что я постоянно возвращаюсь к вам…</p><p class="p1">– Дальше!</p><p class="p1">– Увы, братец, я убедился, что вы были правы, говоря мне: «Жан! Жан! Cessat doctorum doctrina, discipulorum disciplina…<a href="ch2.xhtml#id116" class="a">[133]</a> Будь благоразумен, Жан, учись, не отлучайся из коллежа без законной причины и без позволения наставника! Не бей пикардийцев, noli, Joannes, verberare Picardos. Не покрывайся плесенью, лежа на школьной соломе, как безграмотный осел, quasi asinus illiteratus. Жан, подчиняйся наказанию, налагаемому наставником; ходи каждый вечер в часовню и пой там каноны, стихи и молитвы Пресвятой Деве Марии…» Ах, какие то были превосходные советы!</p><p class="p1">– Ну а дальше что?</p><p class="p1">– Братец, вы видите перед собой виновного, преступника, развратника, чудовище! Дорогой братец, Жан потоптал ногами, как солому и навоз, ваши советы. Я жестоко за это наказан, и Господь необычайно справедлив. Пока у меня были деньги, я гулял, кутил, делал глупости… О, как привлекателен разгул сначала и как отвратительна его оборотная сторона! Теперь у меня уж нет ни гроша, я спустил скатерть, последнюю рубашку и полотенце! Теперь конец веселью! Яркая свеча догорела, и остался один сальный огарок, от вони которого приходится затыкать нос. Девчонки смеются надо мной. Приходится пить только воду. Раскаяние и кредиторы преследуют меня.</p><p class="p1">– Ну и вывод из всего этого? – спросил архидьякон.</p><p class="p1">– Увы, братец! Мне очень хотелось бы начать лучшую жизнь. Я прихожу к вам, полный раскаяния. Я приношу покаяние, исповедуюсь и бью себя в грудь кулаками. Вы были совершенно правы, высказав желание, чтобы я стал лиценциатом и сделался помощником наставника в коллеже Торши. Именно теперь я почувствовал глубокое к этому призвание. Но у меня нет даже чернил – надо купить новый запас; нет перьев – и их надо купить; нет ни бумаги, ни книг – все надо купить! Для этого мне необходимо немного денег. Вот я и пришел к вам, братец, с сердцем, полным раскаяния.</p><p class="p1">– Это все?</p><p class="p1">– Да… – отвечал студент. – Немного денег.</p><p class="p1">– У меня их нет.</p><p class="p1">Тогда Жан заявил серьезно и решительно:</p><p class="p1">– В таком случае, братец, мне очень прискорбно, но я должен заявить, что мне делают весьма выгодные предложения совершенно с другой стороны. Вы не хотите дать мне денег?.. Нет?.. В таком случае я становлюсь бродягой.</p><p class="p1">Произнося это ужасное слово, Жан принял позу Аякса, ожидающего, что его поразит молния. Архидьякон отвечал холодно:</p><p class="p1">– Становись бродягой.</p><p class="p1">Жан низко поклонился и, посвистывая, спустился с монастырской лестницы.</p><p class="p1">В ту минуту, как он проходил монастырским двором под окном кельи брата, он услыхал, что окно отворилось.</p><p class="p1">Подняв голову, он увидал, что в окно высунулось строгое лицо архидьякона.</p><p class="p1">– Убирайся к черту! – крикнул dom Клод. – Вот тебе последние деньги, которые ты получаешь от меня.</p><p class="p1">Говоря это, священник бросил вниз кошелек, посадивший студенту большую шишку на лоб. Жан ушел, огорченный и вместе с тем довольный, как собака, которую забросали мозговыми костями.</p></span></span></span>
