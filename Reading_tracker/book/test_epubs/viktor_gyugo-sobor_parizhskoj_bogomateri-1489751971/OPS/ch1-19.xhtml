<p class="p">II. Клод Фролло</p>
</div><p class="p1">Клод Фролло действительно не был обыкновенною личностью.</p><p class="p1">Он принадлежал к одному из тех семейств среднего состояния, которые на грубом языке прошлого столетия причислялись то к высшей буржуазии, то к низшему дворянству. Семейство это унаследовало от братьев Паклэ ленный земельный участок Тиршап, зависевший от епископа Парижского; двадцать один дом, расположенный на этом участке, были в тринадцатом столетии предметом бесконечных судебных тяжб. В качестве владельца этого лена Клод Фролло принадлежал к числу тех феодалов, которые имели притязание на взимание сборов в Париже и его предместьях. Его имя долгое время красовалось между леном Танкарвиль, принадлежавшим мэтру Франсуа ле Рец, и леном Турского коллежа в списке упомянутых феодалов, хранившемся в архиве монастыря Сен-Мартен-де-Шан.</p><p class="p1">Родители Клода Фролло со дня рождения сына предназначили его к духовному званию. Читать его учили по-латыни и очень рано привили ему привычку держать глаза опущенными и говорить тихим голосом. Совсем еще маленьким он был отдан отцом в коллеж Торши, в квартале Университета. Там он и вырос над молитвенником и словарем.</p><p class="p1">Впрочем, Клод и от природы был ребенком серьезным, тихим и задумчивым. Он отлично учился, быстро запоминал, никогда не шумел во время рекреаций, не участвовал в вакханалиях улицы Фуар, не знал, что такое dare alapas et capilos laniara<a href="ch2.xhtml#id27" class="a">[51]</a>, и никак не обнаружился в том мятеже 1473 года, который был занесен летописцами в хронику под громким названием «шестой университетской смуты». Лишь изредка он позволял себе вместе с другими осмеивать бедных учеников коллежа Монтегю за их capettes (плащи с капюшонами), по которым они получили свое прозвище, или бурсаков коллежа Дормана за их тонзуры и трехцветные кафтаны из зеленовато-синего, голубого и фиолетового сукна – «azurini coloris et bruni», как сказано в хартии кардинала «Четырех корон».</p><p class="p1">Зато он был самым ревностным посетителем всех больших и малых учебных заведений улицы Сен-Жан-де-Бове. Начиная свою лекцию канонического права в школе Сен-Вандржезиль, аббат Сен-Пьер де Валь всегда видел первым лицо Клода Фролло, который, сидя как раз против кафедры, у одного из столбов аудитории, и, вооруженный пером и чернильницей, готовился записывать слова лектора в лежавшую у него на коленях тетрадь, для чего зимою он должен был отогревать дыханием окоченевшие от холода пальцы. На лекции мессира Миль-Дилье, читавшего по понедельникам в школе Шеф-Сен-Дени, первым, весь запыхавшись, прибегал Клод Фролло. Ни разу не случалось, чтобы он не поспел туда к тому моменту, когда растворялись двери школы. Благодаря этому Клод уже шестнадцати лет смело мог бы потягаться в мистической теологии с любым из отцов Церкви, в канонической – с любым из членов соборов, а в схоластической – с кем угодно из докторов Сорбонны.</p><p class="p1">Изучив до тонкости богословие, он с жадностью набросился на декреталии. От «Свода сентенций» он перешел к капитуляриям Карла Великого. Затем, при такой неутолимой жажде знания, он последовательно поглощал одни декреталии за другими: Теодора, епископа Гиспальского, Бушара, епископа Вормского, Ива, епископа Шартрского, потом декреталии Грациана, затем сборник Григория IX и послание Гонория III super specula, последовавшие за капитуляриями Карла Великого. Этим путем он вполне разобрался в том обширном и смутном периоде борьбы канонического права с гражданским, происходившей среди хаоса Средних веков, который был начат епископом Теодором в 618 году и закончен Папою Григорием в 1227 году.</p><p class="p1">Переварив декреталии, Клод Фролло ухватился за медицину и за свободные искусства. Он изучил науку о целебных растениях и о составлении мазей, основательно ознакомился с различными способами лечения лихорадок, ушибов, нарывов, ран и т. п. Знаменитый Жак д’Эпар не задумался бы дать ему диплом доктора медицины, а Ришар Геллэн с удовольствием вручил бы ему диплом доктора хирургии. С тем же успехом он прошел и все ученые степени в изящных науках: лиценциата, магистра и доктора. Он изучил языки: латынь, греческий и древнееврейский – тройную святыню, мало кого привлекавшую. Его пожирала горячка знания, и он накапливал его с ненасытностью скряги. Восемнадцати лет он уже прошел все четыре факультета. Казалось, что этот юноша видел в жизни только одну цель: знание.</p><p class="p1">Как раз в это время, то есть в знойное лето 1466 года, и разразилась та страшная чума, которая в одном Парижском округе унесла около сорока тысяч человек, в том числе, как выразился Жан де Труа, и «мэтра Арну, королевского астролога, человека добродетельного, мудрого и приятного в обращении». Вдруг в университете распространился слух, что эпидемия с особенной силою свирепствует на улице Тиршап. На этой улице, в своем ленном владении, проживали родители Клода Фролло. В страшном испуге юноша бросился туда. Он застал отца и мать уже мертвыми. В одной комнате с едва остывшими трупами родителей лежал и плакал в колыбели покинутый разбежавшимися слугами грудной младенец, брат Клода. Это было все, что осталось от семьи. Молодой человек взял ребенка на руки и задумчиво вышел. До этой страшной минуты он жил только в мире науки, а теперь внезапно оказался брошенным в водоворот настоящей, «живой» жизни.</p><p class="p1">Эта катастрофа произвела коренной переворот в жизни Клода. Внезапно осиротев и сделавшись на двадцатом году жизни главою семейства, он вдруг был низведен из мира школьных мечтаний в мир грубой действительности. Но, охваченный жалостью к своему маленькому беспомощному брату, он с жаром отдался заботам о нем и страстно к нему привязался. Это чувство было необычно и сладостно для юноши, питавшего раньше любовь только к книгам.</p><p class="p1">Любовь к брату развивалась в нем с изумительною быстротою и силою, всецело охватывая его девственную душу. Это было похоже на первую любовь. Разлученный в раннем детстве с родителями, которых поэтому он едва знал, зарывшийся всецело в книги, жаждавший только знания, заботившийся исключительно о развитии своего ума посредством науки и питавший свое воображение лишь изящною словесностью, бедный студент до сих пор не имел времени почувствовать, что у него бьется сердце. Маленький осиротевший брат, свалившийся к нему вдруг точно с неба, преобразил его и сделал другим человеком. Он понял, что наряду с умозрениями Сорбонны и стихами Гомера в мире есть еще кое-что, что человеку свойственны и живые привязанности, что без любви и нежности жизнь не что иное, как мертвый, ржавый, скрипучий и безобразный механизм. Но, будучи еще в тех годах, когда одна иллюзия сменяется другою, он был уверен, что человеку нужны одни родственные, основанные на узах крови привязанности и что любви к брату вполне достаточно, чтобы сделать жизнь полной.</p><p class="p1">Таким образом, он весь отдался любви к Жану, своему маленькому брату, отдался со всей страстью своей глубокой, сосредоточенной души. Это крошечное, хрупкое существо с розовыми щечками и светлыми кудрявыми волосиками, этот сиротка, не имевший другой опоры, кроме него, бывшего таким же сиротой, трогал его до глубины души. Серьезный мыслитель, Клод подолгу размышлял и над этим существом, в то же время окружая его нежнейшей заботливостью. Он был для Жана больше чем братом, – он сделался его второй матерью.</p><p class="p1">Жан лишился матери в то время, когда еще был грудным ребенком, поэтому Клод был вынужден приискать ему кормилицу. Кроме лена в улице Тиршап он унаследовал от отца еще другой ленный участок – мельницу, стоявшую на холме, близ Винчестерского дворца (Бисетра). У мельничихи был здоровый грудной ребенок. Мельница находилась недалеко от университета, и Клод сам отнес туда Жана.</p><p class="p1">С того времени, чувствуя, что на него возложено бремя, Клод стал относиться к жизни с серьезностью человека зрелых лет. Забота о маленьком брате стала не только его отдохновением, но и единственною целью его научных занятий. Он решил посвятить себя всецело этому существу, за будущность которого обязан был отвечать перед Богом, и дал обет, что никогда не женится и что все свои радости, все свое счастье будет искать только в брате. Это еще более побудило его избрать духовное поприще, к которому он чувствовал такую склонность с детства. Кстати, его прекрасные свойства, его знания и положение в качестве вассала парижского архиепископа широко открывали ему церковные двери.</p><p class="p1">Двадцати лет от роду он с особого разрешения Папы был уже священником, и его назначили младшим капелланом в тот придел собора Богоматери, в котором служилась поздняя обедня и алтарь которого поэтому назывался altare pigrorum<a href="ch2.xhtml#id26" class="a">[52]</a>.</p><p class="p1">На этом месте он, еще более прежнего погруженный в любимые книги, которые покидал только затем, чтобы сходить ненадолго на мельницу навестить брата, не по годам серьезный и ученый, быстро завоевал удивление и уважение всего монастыря. Отсюда слава о его учености проникла и в народ, который, как это водилось в доброе старое время, смешивал научные знания с колдовством.</p><p class="p1">В то памятное Фомино воскресенье Клод шел к себе домой после того, как отслужил позднюю обедню в упомянутом приделе, находившемся направо от главного алтаря, у входа на хоры, возле изображения Богоматери, как вдруг его внимание было привлечено группою старух, так возбужденно работавших языками вокруг яслей для подкидышей.</p><p class="p1">Так случилось ему подойти к тому злополучному маленькому существу, на которое из уст окружающих сыпалось столько ненависти и угроз. Вид этого брошенного, беспомощного, обиженного природою и людьми создания, воспоминание о брате внушили ему мысль, что если он, Клод, внезапно умрет, то и его маленький Жан может быть так же безжалостно брошен в ясли подкидышей. Эта ужасная мысль возбудила в его сердце чувство бесконечной жалости к уродцу в мешке и заставила его унести к себе несчастного ребенка.</p><p class="p1">Вынутый из мешка подкидыш действительно оказался уродливым до чудовищности. Левый глаз бедняжки был закрыт желваком, голова совершенно уходила в плечи, позвоночник выгибался в виде дуги, грудная кость сильно выпячивалась, а ноги были кривые. Тем не менее этот уродец казался живучим. Между прочим, о его здоровье и силе свидетельствовал громкий голос, все время выкрикивавший что-то непонятное. Уродливость ребенка только усилила сострадание к нему Клода и заставила его дать обет воспитать подкидыша из любви к своему брату. Этим милосердием он как бы искупал будущие грехи маленького Жана. Клод словно заботился о том, чтобы припасти брату капитал добрых дел на случай, если тот сам окажется не в состоянии накопить себе таких денег – единственных, которые в ходу в раю.</p><p class="p1">Клод окрестил своего приемыша и назвал его Квазимодо, не то в память того дня, в который он его нашел, не то потому, что хотел этим нечеловеческим именем охарактеризовать его как существо, представляющее собою не полного человека, а лишь черновой набросок его. Ведь кривой, горбатый и кривоногий Квазимодо действительно мог считаться только подобием человека<a href="ch2.xhtml#id25" class="a">[53]</a>.</p></span></span></span>
