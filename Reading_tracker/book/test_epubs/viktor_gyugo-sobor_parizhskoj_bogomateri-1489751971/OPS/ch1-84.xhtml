<p class="p">11. Гуинплен – глашатай справедливости, Урсус – глашатай истины</p>
</div><p class="p1">Философ – это соглядатай. Урсус, любитель читать чужие мысли, внимательно следил за своим питомцем. Наши безмолвные монологи отражаются у нас на лице и вполне ясны физиономисту. Поэтому от Урсуса не скрылось то, что происходило в душе Гуинплена. Однажды, когда Гуинплен был погружен в раздумье, Урсус, дернув его за полу, воскликнул:</p><p class="p1">– Ты, кажется, стал присматриваться к окружающему, глупец! Берегись, это тебя не касается! У тебя есть другое занятие – любить Дею. Ты счастлив вдвойне: во-первых, тем, что толпа видит твою рожу; во-вторых, тем, что Дея ее не видит. Ты пользуешься незаслуженным счастьем. Ни одна женщина не согласилась бы принять от тебя поцелуй, увидев твой рот. А ведь этот рот, который стал залогом твоего благополучия, эта морда, приносящая тебе богатство, – не твои. Ты родился не с таким лицом. Ты исказил свои подлинные черты гримасой, украденной в преисподней. Ты похитил у дьявола его личину. Ты отвратителен: довольствуйся же выпавшей на твою долю удачей. В нашем весьма благоустроенном мире есть счастливцы по праву и счастливцы случайные. Ты баловень случая. Ты живешь в подземелье, куда попала звезда. Эта бедная звезда досталась тебе. Не пытайся же выбраться из подземелья и держи крепко свою звезду, паук! В твоих сетях алмазом горит Венера. Сделай милость, не привередничай. Я вижу, ты задумываешься – это глупо. Послушай-ка, я буду с тобой говорить на языке настоящей поэзии: пускай Дея ест побольше говядины и бараньих котлет, и через полгода она станет толстой, как турчанка; женись на ней, не долго думая, и она родит тебе ребенка, да не одного, а двух, трех, целую кучу детей. Вот что я называю философией. Когда человек чувствует себя счастливым, это совсем не плохо. Иметь собственных детенышей – великолепное дело. Обзаведись ребятами, пеленай их, вытирай им носы, укладывай спать, умывай чумазых пачкунов, и пускай вся эта мелюзга копошится вокруг тебя; если они смеются – прекрасно; если ревут – еще лучше: кричать – значит, жить; наблюдай, как в полгода они сосут грудь, в год – ползают, в два – ходят, в пятнадцать – становятся подростками, в двадцать – влюбляются. У кого есть эти радости – у того есть все. Я упустил это счастье, вот почему я – грубое животное. Сам Господь Бог, сочинитель прекрасных поэм, первый литератор на свете, продиктовал своему секретарю Моисею: «Размножайтесь!» Так гласит писание. Размножайся, животное! Ну, а мир – он всегда будет таким, каков он есть; на земле все будет идти достаточно дурно и без твоего содействия. Не заботься об этом. Не занимайся тем, что происходит вокруг. Не вызывай никаких бурь. Комедиант создан для того, чтобы на него смотрели, а не для того, чтобы смотреть самому. Знаешь ли, кто верховодит на свете? Счастливцы по праву. Ты же, повторяю, счастливец случайный. Ты мошеннически завладел счастьем, которое тебе не принадлежит. Они – его законные обладатели, а ты – втируша, ты незаконно сожительствуешь с удачей. Чего тебе еще? Вот уж явное доказательство, что негодяй с жиру бесится! А ведь обзавестись потомством в союзе с Деей – приятнейшее дело. Это такое блаженство, что без плутовства до него, пожалуй, не доберешься. Те, кто получил свыше привилегию на земное счастье, не любят, чтобы существа, стоящие ниже их, позволяли себе такие радости. Если они спросят тебя, по какому праву ты счастлив, ты не сумеешь ответить. У тебя нет высочайшей грамоты на счастье, как у них. Юпитер ли, Аллах, Вишну или Саваоф – кто уж там, не знаю, выдал им разрешение на счастье. Бойся их. Не суйся в их дела, чтобы они не занялись тобой. Знаешь ли ты, несчастный, что такое счастливец по праву? Это – страшное существо, это – лорд. О, лорд!.. Вот кому, прежде чем появиться на свет в неведомом дьявольском прошлом, пришлось вести немало интриг, чтобы вступить в жизнь именно через эту дверь! Как ему, должно быть, было трудно родиться! Конечно, других забот у него не было, но, боже правый, что это был за труд! Добиться От судьбы, от этой слепой, своевольной дуры, чтобы она сразу, с колыбели, сделала вас владыкой над остальными людьми! Подкупить кассира, чтобы получить лучшее место в театре! Прочти памятку на стенке нашей вышедшей в отставку повозки, прочти этот требник моей мудрости, и ты увидишь, что такое лорд. Лорд – это человек, у которого есть все и который в своем лице воплощает все. Лорд – это существо, попирающее законы человеческой природы; лорд – это тот, кто в юности имеет права старика, а в старости – все преимущества молодости; развратник, он пользуется уважением порядочных людей; трус, он командует храбрецами; тунеядец, он пожирает плоды чужого труда; невежда, он является обладателем дипломов Кембриджского и Оксфордского университетов; глупец, он слышит в его честь славословия поэтов; урод, он получает в награду улыбки женщин; Терсит, он носит шлем. Ахилла; заяц, он облекается в львиную шкуру. Не истолковывай неправильно моих слов, я не утверждаю, что всякий лорд – обязательно невежда, трус, урод и старый дурак; я только говорю, что он может быть всем этим без всякого ущерба для себя. Напротив, лорды – повелители. Король Англии – тоже лорд, первый вельможа между вельможами; это уже много, это – все. В былое время короли именовались лордами: лорд Дании, лорд Ирландии, лорд Соединенных островов. Лорд Норвегии всего лишь триста лет назад принял титул короля. Древнейшего короля Англии, Луция, святой Телесфор называл милордом Луцием. Лорды – это пэры, иначе говоря – равные. Кому? Королю. Я не смешиваю ошибочно лордов с парламентом. Парламент – это народное собрание, которое саксы до покорения их норманнами называли wittenagemot, a покорители-норманны называли parliamentum. И мало-помалу народ выставили за дверь. В королевских приказах по созыву палаты общин некогда стояло: «ad consilium impendendum»<a href="ch2.xhtml#id37" class="a">[201]</a>, теперь же в них стоит: «ad conserittendum»<a href="ch2.xhtml#id36" class="a">[202]</a>. Палата общин имеет право давать свое согласие. Ей разрешается говорить «да». Пэры же могут говорить «нет». Они доказали на деле, что обладают этим правом. Пэры могут отсечь голову королю, а народ не может. Казнь Карла I – нарушение не королевских прав, а пэрских привилегий, и правильно сделали, что вздернули на виселицу скелет Кромвеля. Лорды могущественны. Почему? Потому что в их руках богатства. Кто перелистывал когда-нибудь «Doomsday-book» – «Книгу страшного суда»? Эта книга – доказательство того, что Англией владеют лорды; это составленный при Вильгельме Завоевателе реестр земельных имуществ, принадлежащих английским подданным, хранящийся у лорд-канцлера казначейства. Чтобы сделать выписку из этого реестра, платят по четыре су за строку. Любопытнейшая книга! Знаешь ли ты, что я служил в качестве домашнего врача у некоего лорда Мармедьюка, который имел девятьсот тысяч французских франков годового дохода? Сообрази-ка это, дуралей! Знаешь ли ты, что одними кроликами, содержащимися в садках графа Линдсея, можно было бы накормить всю голь в Пяти Портах? А попробуй протянуть к ним руку! Все на учете. Каждого браконьера вешают. Я видел, как вздернули на виселицу отца шестерых детей только за то, что у него из ягдташа торчала пара длинных кроличьих ушей. Таковы вельможи. Кролик, принадлежащий лорду, дороже человеческой жизни. Но раз лорды существуют на свете – слышишь ты, мошенник? – мы должны находить, что это прекрасно. А если бы мы даже нашли, что это плохо, какое это может иметь для них значение? Народ против чего-то возражает! Подумайте только! Да у самого Плавта не найти ничего комичнее! Смешон был бы тот философ, который посоветовал бы этой жалкой черни возражать против гнета лордов. Да это все равно, как если бы гусеница вступила в пререкания с пятою слона. Однажды я видел, как на кротовую нору наступил гиппопотам; он все раздавил; но он был ни в чем не повинен. Этот добродушный великан даже не догадывался о том, что на свете есть кроты. Милый мой, кроты, которых давят, – это род человеческий. Давить друг друга – закон природы. А ты думаешь, что крот никого не давит? Он является великаном по отношению к клещу, который в свою очередь великан по отношению к тле. Но не будем углубляться в рассуждения. Друг мой, на свете существуют кареты. В каретах ездят лорды, неосторожные пешеходы попадают под колеса, а благоразумный человек норовит отойти в сторону. Посторонись и дай карете проехать. Что касается меня, я люблю лордов, но избегаю их. Я жил у одного из них. Этого вполне достаточно для того, чтобы у меня сохранилось о них прекрасное воспоминание. Его замок запечатлелся у меня в памяти в виде некоего сияния в облаках. Мои мечты обращены назад. Нет ничего замечательнее, чем Мармедьюк-Лодж в смысле величественности здания, соразмерности отдельных частей, пышности украшений, множества пристроек. Вообще дома, особняки, дворцы лордов – это собрание всего, что есть самого великолепного и роскошного в нашем цветущем королевстве. Я люблю наших вельмож. Я признателен им за их богатство, могущество и благосостояние. Я, прозябающий во мраке, с интересом и удовольствием взираю на клочок небесной лазури, именуемый лордом. В Мармедьюк-Лодж въезжали через огромный двор, имевший вид прямоугольника, разделенного, на восемь квадратов, из которых каждый был обнесен балюстрадой; между ними пролегала широкая дорога, посреди которой высился восхитительный восьмиугольный фонтан с двумя водоемами и прелестным ажурным куполом, поддерживаемым шестью колоннами. Там-то я и познакомился с ученым французом, аббатом Дюкро из якобинского монастыря на улице Сен-Жак. В Мармедьюк-Лодже хранится половина библиотеки Эрпениуса, другая половина которой находится на богословском факультете Кембриджского университета. Я занимался чтением, сидя под разукрашенным портиком. Такие вещи обычно обращают на себя внимание лишь немногих любознательных путешественников. Знаешь ли ты, чудак, что у сиятельного Вильяма Норта, лорда Грей-Ролстона, занимающего четырнадцатое место на баронской скамье, больше высокоствольных деревьев на принадлежащей ему горе, чем у тебя волос на твоей ужасной башке? Известно ли тебе, что у лорда Норриса Райкота, графа Эбингдона, есть четырехугольная башня высотою в двести футов с девизом: Virtus ariete fortior, что будто бы означает: «Доблесть сильнее тарана», но что в действительности, дурак ты этакий, следует перевести: «Храбрость сильнее военных машин». Да, я чту и уважаю наших вельмож, я преклоняюсь перед ними. Ведь именно лорды вместе с его королевским величеством заботятся о том, чтобы доставить и обеспечить нации всевозможные выгоды. Их глубокая мудрость блестяще проявляется во всяких затруднительных обстоятельствах. Хотел бы я видеть, как могли бы они не первенствовать всюду и везде. Разумеется, они и первенствуют. То, что в Германии называется княжеским достоинством, а в Испании достоинством гранда, называется пэрством в Англии и Франции. Так как были все основания считать наш мир устроенным достаточно плохо, то Бог, подметив в нем изъяны, решил доказать, что он умеет создавать и счастливых людей, и сотворил лордов на утешение философам. Тем самым Господь исправил первоначальную ошибку и с честью вышел из ложного положения. Вельможи исполнены величия. Пэр, говоря о себе, употребляет местоимение nos<a href="ch2.xhtml#id35" class="a">[203]</a>. Пэр – это множественное число. Король называет пэров consanguinei nostri<a href="ch2.xhtml#id34" class="a">[204]</a>. Пэры издали целую кучу мудрых законов, в том числе закон, карающий смертной казнью всякого, кто срубит трехлетний тополь. Они настолько выше всех остальных людей, что у них есть даже свой особый язык. Так, в геральдике черный цвет, именуемый «песком» на гербе простого дворянина, обозначается словом «сатурн» на княжеском гербе и словом «алмаз» на гербе пэра. Алмазная пыль, звездная ночь – вот что такое черный цвет для счастливых. И даже между этими высокими лицами существуют тонкие различия в отношениях. Барон может совершить омовение рук перед трапезой в присутствии виконта только с разрешения этого последнего. Все это превосходно придумано и служит залогом сохранения нации. Какое счастье для народа – иметь двадцать пять герцогов, пять маркизов, семьдесят шесть графов, девять виконтов и шестьдесят одного барона, что составляет в совокупности сто семьдесят шесть пэров, из коих одних величают «ваша светлость», а других «ваше сиятельство». Велика, подумаешь, важность, если при этом кое-где и попадаются кое-какие лохмотья! Нельзя же требовать, чтобы всюду было одно лишь золото. Лохмотья так лохмотья! Зато рядом с ними – пурпур. Одно искупает другое. Велика важность, что на свете есть неимущие! Они служат строительным материалом для счастья богачей. Черт возьми! Наши лорды – наша слава. Одна лишь свора гончих Чарльза Мохена, барона Мохена, стоит столько же, сколько больница для прокаженных в Мургете или детская больница Иисуса Христа, основанная в тысяча пятьсот пятьдесят третьем году Эдуардом Шестым. Томас Осборн, герцог Лидс, расходует ежегодно на одни только ливреи для своих слуг пять тысяч золотых гиней. При испанских грандах состоит назначенный королем блюститель, который следит; чтобы они не разорились в пух и прах. Это пошло. У нас, в Англии, лорды сумасбродствуют, но зато они великолепны. Я это уважаю. Не будем же поносить их, словно мы какие-нибудь завистники. Я счастлив уже тем, что мне удается лицезреть это прекрасное видение. Пусть я – существо, лишенное света, но на меня падает отблеск чужого. Падает на мои язвы, скажешь ты? Убирайся к дьяволу! Я – Иов, счастливый тем, что созерцаю Тримальхиона. О, как прекрасна лучезарная планета там, в небесной вышине! Быть освещенным лучами луны чего-нибудь да стоит. Уничтожить лордов! Да такая мысль не пришла бы в голову даже Оресту, как ни был он безумен, Утверждать, что лорды вредны или бесполезны, – да это все равно что требовать потрясения государственных основ или утверждать, будто люди вовсе не созданы для того, чтобы жить подобно баранам, пощипывая траву и покорно перенося укусы собак. Баран оголяет луг, на котором пасется, а пастух оголяет барана, стрижет с него шерсть. Что может быть справедливее? На всякого находится своя управа. Что касается меня, то мне все равно: я – философ и за жизнь не цепляюсь. Жизнь земная – лишь временное пристанище. Подумать только, что у Генри Боуса Ховарда, графа Беркширского, в его каретном сарае стоят двадцать четыре парадных кареты, из коих одна с серебряной упряжью и одна с золотой! Боже мой, я отлично знаю, что не у всякого есть по двадцать четыре парадных кареты, но стоит ли волноваться из-за этого? Ты продрог однажды ночью – подумаешь, велика беда! Мало ли на свете бездомных! Другие тоже страдают от холода и голода. Знаешь ли ты, что не будь этого мороза, Дея не ослепла бы, а если бы она не ослепла, она не полюбила бы тебя. Поразмысли-ка об этом, дуралей! Да и хороша была бы музыка, если бы все недовольные начали жаловаться вслух! Молчание – вот правило мудрости. Я убежден, что Господь Бог предписывает молчать всем осужденным на вечные муки, иначе он сам был бы осужден слушать нескончаемые вопли. Олимпийское блаженство покупается ценою безмолвия Коцита. Итак, молчи, народ! А я поступаю еще лучше; я одобряю и восхищаюсь. Я только что перечислил тебе лордов, но к ним надо еще прибавить двух архиепископов и двадцать четыре епископа. Право, я прихожу в умиление, когда думаю об этом. Я вспоминаю, что видел у сборщика десятины для преподобного декана Рафоэ, который является одновременно представителем светской знати и служителем церкви, огромные скирды прекрасной пшеницы, отобранной для нужд его преосвященства у окрестных поселян; декану не пришлось трудиться, чтобы вырастить эту пшеницу, вот у него и оставалось время для молитвы. Знаешь ли ты, что лорд Мармедьюк, у которого я служил, был лорд-казначеем Ирландии и главным сенешалом Кнерсберга в графстве Иоркском? Знаешь ли ты, что лорд обер-камергер (это наследственная должность в роду герцогов Анкастерских) одевает короля в день коронации и получает в награду за свой труд сорок локтей малинового бархата да еще постель, на которой спал король, и что в процессиях ему всегда предшествует, в качестве его представителя, пристав черного жезла? Хотел бы я посмотреть, как ты станешь протестовать против того, что старейшим виконтом Англии признается сэр Роберт Брент, пожалованный в виконты Генрихом Пятым. Все титулы лордов указывают на право владения какими-нибудь землями, за исключением лорда Риверса, у которого фамилия вместе с тем и титул. Ведь это замечательно, что они имеют право облагать налогом других, взимая, как, например, нынче, по четыре шиллинга с фунта стерлингов ежегодного дохода, каковая привилегия продлена еще на год! Какое великолепное изобретение – пошлина на очищенный спирт, акциз на вино и на пиво, сборы за взвешивание и обмер товаров, налоги на сидр, на грушевую наливку, на солод, на перегонку ячменя, на каменный уголь и согни тому подобных налогов! Преклонимся перед существующим порядком! Даже духовенство находится в зависимости от лордов. Мэнский епископ – подданный графа Дерби. Лорды имеют собственных зверей, которых они помещают в свои гербы. Так как Господь Бог сотворил недостаточное количество зверей, то лорды изобретают новые разновидности. Они создали геральдического кабана, который настолько же выше обыкновенного, насколько тот выше свиньи или насколько знатный вельможа выше священника. Они создали грифона, этого орла среди львов и льва среди орлов, пугающего львов своими крыльями, а орлов – своей гривой. У них есть геральдический змей, единорог, саламандра, тараск, дрея, дракон, гиппогриф. Все это наводит на нас ужас, а им служит украшением. У них есть зверинец, называемый гербовником, в котором рычат невиданные чудовища. Ни в одном лесу не найдешь таких диковин, как те, что порождены их спесью. Их тщеславие полно всяких призраков, которые словно прогуливаются среди величественного мрака, вооруженные, в шлемах и панцирях, бряцают шпорами и, держа в руке имперский жезл, грозным голосом говорят: «Мы – предки!» Жуки подтачивают корни растений, а гербы – народное благосостояние. Так и надо! Стоит ли из-за этого изменять законы? Дворянство – неотъемлемая часть существующего порядка. Знаешь ли ты, что в Шотландии есть герцог, который может проскакать тридцать лье по прямой, не выходя за пределы своих владений? Знаешь ли ты, что у лорда-архиепископа Кентерберийского миллион франков ежегодного дохода? Знаешь ли ты, что его величество получает ежегодно по цивильному листу семьсот тысяч фунтов стерлингов, не считая доходов с замков, лесов, наследственных имений, ленных владений, аренд, поместий, свободных от всяких повинностей, пребенд, десятин, оброков, конфискаций и штрафов, превышающих миллион фунтов стерлингов? Те, кто недоволен этим, попросту привередничают.</p><p class="p1">– Да, – задумчиво прошептал Гуинплен, – рай богатых создан из ада бедных.</p></span><span id="id138"><div class="title6">
<p class="p">12. Урсус-поэт увлекает Урсуса-философа</p>
</div><p class="p1">Вошла Дея. Он взглянул на нее и больше уже ничего не видел. Такова любовь. Вихрь мыслей может на мгновение завладеть нами, но входит любимая женщина, и сразу исчезает все, что не имеет к ней непосредственного отношения, бесследно исчезает, и она даже не подозревает, что, быть может, уничтожила в нашей душе целый мир.</p><p class="p1">Упомянем здесь об одном незначительном обстоятельстве. В «Побежденном хаосе» Дее не нравилось слово «monstro» (чудовище), с которым она должна была обращаться к Гуинплену. Иногда, пользуясь тем небольшим знанием испанского языка, которым в то время обладали все, она самовольно заменяла это слово другим, а именно «quiero», что означает «желанный». Урсус относился к таким изменениям текста с некоторым неудовольствием. Он свободно мог бы заявить Дее, как в наши дни Моэссар сказал Виссо:</p><p class="p1">– Ты с недостаточным уважением подходишь к репертуару.</p><p class="p1">«Человек, который смеется» – такова была кличка, под которой Гуинплен приобрел известность. Под этим прозвищем исчезло его настоящее имя, почти никому неизвестное, так же, как исчезло под маской смеха его настоящее лицо. Его популярность тоже была маской.</p><p class="p1">Между тем его имя красовалось на широкой вывеске, водруженной на передней стенке «Зеленого ящика». Надпись, сочиненная Урсусом, гласила:</p><p class="empty-line"/><p class="p1">«Здесь можно видеть Гуинплена, брошенного в десятилетнем возрасте, в ночь на 29 января 1690 года, злодеями компрачикосами на берегу моря в Портленде, ставшего взрослым и теперь носящего имя: ЧЕЛОВЕК, КОТОРЫЙ СМЕЕТСЯ».</p><p class="empty-line"/><p class="p1">Существование этих фигляров походило на существование прокаженных в лепрозории или на блаженную жизнь обитателей некоей Атлантиды. Ежедневно совершался привычный для них переход от самых шумных выступлений перед ярмарочной толпой к полной отрешенности от внешнего мира. Каждый вечер они покидали этот мир, исчезали, словно мертвецы в могильной сени, и на следующий день снова оживали. Актер – это вертящийся фонарь маяка, огонь которого то вспыхивает, то пропадает; для публики од только призрак, только проблеск в этой жизни, где свет постоянно сменяется тьмою.</p><p class="p1">За выступлением на площади следовало добровольное заточение. Как только кончалось представление и поредевшая толпа зрителей растекалась по смежным улицам, громко выражая свое одобрение, «Зеленый ящик» поднимал откидную стенку, точно крепость подъемный мост, и общение со всем остальным человечеством прерывалось. По одну сторону находилась Вселенная, по другую – передвижной барак, и в этом бараке ярким созвездием сияли свобода, чистая совесть, мужество, самоотверженность, невинность, счастье, любовь.</p><p class="p1">Ясновидящая слепая и любимый ею урод садились рядом, рука сжимала руку, чело прикасалось к челу, и так, пьянея от близости, они перешептывались друг с другом.</p><p class="p1">Средняя часть «Зеленого ящика» имела двойное назначение: для публики она была сценой, для актеров – столовой.</p><p class="p1">Урсус, всегда охотно прибегавший к сравнению, пользовался этим как поводом к уподоблению средней части фургона «аррадашу» абиссинской хижины.</p><p class="p1">Урсус подсчитывал выручку, потом садились за ужин. Любовь во всем находит нечто идеальное; когда влюбленные вместе едят и пьют, это создает для них возможность украдкой обмениваться восхитительными прикосновениями, превращающими любой глоток в поцелуй. Они пьют эль или вино из одного стакана, как пили бы росу из чашечки одной лилии. Их души напоминают пару грациозных птичек. Гуинплен прислуживал Дее, нарезал ей ломтиками хлеб или мясо, наливал ей чаю, близко наклонялся к ней.</p><p class="p1">– Гм! – мычал Урсус, но его брюзжание, помимо его воли, переходило в улыбку.</p><p class="p1">Волк ужинал под столом, не обращая внимания ни на что, кроме своей кости.</p><p class="p1">Винос и Фиби разделяли общую трапезу, но никого не стесняли своим присутствием. Эти полудикарки, все еще чуждавшиеся людей, говорили между собой по-цыгански.</p><p class="p1">После ужина Дея вместе с Фиби и Винос удалялась на «женскую половину», Урсус шел привязывать Гомо на цепь под «Зеленым ящиком», а Гуинплен направлялся к лошадям, превращаясь из влюбленного в конюха, подобно гомеровскому герою или паладину Карла Великого. В полночь все уже спало, кроме волка, который, полный сознания своей ответственности, время от времени приоткрывал один глаз.</p><p class="p1">На следующее утро все сходились опять. Завтракали вместе – обычно хлебом с ветчиной, запивая его чаем, который в Англии вошел в употребление с 1678 года. Затем Дея, следуя испанскому обычаю и совету Урсуса, находившего, что она слаба здоровьем, спала несколько часов, между тем как Гуинплен и Урсус занимались внутри фургона и на дворе всеми теми мелкими работами, которых требует кочевая жизнь.</p><p class="p1">Лишь в редких случаях покидал Гуинплен «Зеленый ящик», чтобы побродить немного, да и то по пустынным дорогам и безлюдным местам. В городах он выходил лишь ночью, надвинув на глаза широкополую шляпу, чтобы его лицо не примелькалось на улице.</p><p class="p1">С открытым лицом его можно было видеть только на сцене.</p><p class="p1">Впрочем, «Зеленый ящик» не слишком часто заглядывал в города; Гуинплен в свои двадцать четыре года еще не видел городов больше Пяти Портов. Между тем слава Гуинплена росла. Она уже вышла за пределы простонародья и начинала подниматься выше. Громкая молва о человеке с необычайным лицом, кочующем с места на место и появляющемся неожиданно то здесь, «то гам, передавалась из уст в уста любителями ярмарочных чудес и охотниками до диковинок. О нем говорили, его искали, спрашивали друг друга: «Где он? Как бы его посмотреть?» «Человек, который смеется» положительно становился знаменитым. Отблеск его славы падал до некоторой степени и на «Побежденный хаос».</p><p class="p1">И вот однажды Урсус, исполненный честолюбивых замыслов, объявил:</p><p class="p1">– Надо ехать в Лондон.</p></span></span></span></span>
