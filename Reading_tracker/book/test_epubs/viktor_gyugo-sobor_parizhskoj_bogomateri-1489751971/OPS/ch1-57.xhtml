<p class="p">2. Компрачикосы</p>
</div><p class="p1">Кому в наши дни известно слово «компрачикосы»? Кому понятен его смысл?</p><p class="p1">Компрачикосы, или компрапекеньосы, представляли собой необычайное и гнусное сообщество бродяг, знаменитое в семнадцатом веке, забытое в восемнадцатом и совершенно неизвестное в наши дни. Компрачикосы, подобно «отраве для наследников», являются характерной подробностью старого общественного уклада. Это деталь древней картины нравственного уродства человечества. С точки зрения истории, сводящей воедино разрозненные события, компрачикосы представляются ответвлением гигантского явления, именуемого рабством. Легенда об Иосифе, проданном братьями, – одна из глав повести о компрачикосах. Они оставили память о себе в уголовных кодексах Испании и Англии. Разбираясь в темном хаосе английских законодательных актов, – кое-где наталкиваешься на следы этого чудовищного явления, как находишь в первобытных лесах отпечаток ноги дикаря.</p><p class="p1">«Компрачикос», так же как и «компрапекеньос», – составное испанское слово, означающее «скупщик детей».</p><p class="p1">Компрачикосы вели торговлю детьми.</p><p class="p1">Они покупали и продавали детей.</p><p class="p1">Но не похищали их. Кража детей – это уже другой промысел.</p><p class="p1">Что же они делали с этими детьми?</p><p class="p1">Они делали из них уродов.</p><p class="p1">Для чего же?</p><p class="p1">Для забавы.</p><p class="p1">Народ нуждается в забаве. Короли – тоже. Улице нужен паяц; дворцам нужен гаер. Одного зовут Тюрлюпен, другого – Трибуле.</p><p class="p1">Усилия, которые затрачивает человек в погоне за весельем, иногда заслуживают внимания философа.</p><p class="p1">Что должны представлять собою эти вступительные страницы?</p><p class="p1">Главу одной из самых страшных книг, книги, которую можно было бы озаглавить: «Эксплуатация несчастных счастливыми».</p><p class="empty-line"/><p class="p1">Ребенок, предназначенный служить игрушкой для взрослых, – такое явление не раз имело место в истории. (Оно имеет место и в наши дни.) В простодушно-жестокие эпохи оно вызывало к жизни особый промысел. Одной из таких эпох был семнадцатый век, называемый «великим». Это был век чисто византийских нравов; простодушие сочеталось в нем с развращенностью, а жестокость с чувствительностью – любопытная разновидность цивилизации! Он напоминает жеманничающего тигра. Это век мадам де Севинье, мило щебечущей о костре и колесовании. В этот век эксплуатация детей была явлением обычным: историки, льстившие семнадцатому столетию, скрыли эту язву, но им не удалось скрыть попытку Венсена де Поля залечить ее.</p><p class="p1">Чтобы сделать из человека хорошую игрушку, надо приняться за дело заблаговременно. Превратить ребенка в карлика можно, только пока он еще мал. Дети служили забавой. Но нормальный ребенок не очень забавен. Горбун куда потешнее.</p><p class="p1">Отсюда возникает настоящее искусство. Существовали подлинные мастера этого дела. Из нормального человека делали уродца. Человеческое лицо превращали в харю. Останавливали рост. Перекраивали ребенка наново. Искусственная фабрикация уродов производилась по известным правилам. Это была целая наука. Представьте себе ортопедию наизнанку. Нормальный человеческий взор заменялся косоглазием. Гармония черт вытеснялась уродством. Там, где Бог достиг совершенства, восстанавливался черновой набросок творения. И в глазах знатоков именно этот набросок и был совершенством. Такие же опыты искажения естественного облика производились и над животными: изобрели, например, пегих лошадей. У Тюренна был пегий конь. А разве в наши дни не красят собак в голубой и зеленый цвета? Природа – это канва. Человек искони стремился прибавить к творению божьему кое-что от себя. Он переделывает его иногда к лучшему, иногда к худшему. Придворный шут был не чем иным, как попыткой вернуть человека к состоянию обезьяны. Прогресс вспять. Изумительный образец движения назад. Одновременно бывали попытки превратить обезьяну в человека. Герцогиня Барбара Кливленд, графиня Саутгемптон, держала у себя в качестве пажа обезьяну сапажу. У Франсуазы Сеттон, баронессы Дадлей, жены мэра, занимавшего восьмое место на баронской скамье, чай подавал одетый в золотую парчу павиан, которого леди Дадлей называла «мой негр». Екатерина Сидлей, графиня Дорчестер, отправлялась на заседание парламента в карете с гербом, на запятках которой торчали, задрав морды кверху, три павиана в парадных ливреях. Одна из герцогинь Мединасели, при утреннем туалете которой довелось присутствовать кардиналу Полу, заставляла орангутанга надевать ей чулки. Обезьян возвышали до положения человека, зато людей низводили до положения скотов и зверей. Это своеобразное смешение человека с животным, столь приятное для знати, ярко проявлялось в традиционной паре: карлик и собака; карлик был неразлучен с огромной собакой. Собака была неизменным спутником карлика. Они ходили как бы на одной сворке. Это сочетание противоположностей запечатлено во множестве памятников домашнего быта, в частности на портрете Джеффри Гудсона, карлика Генриеты Французской, дочери Генриха IV, жены Карла I.</p><p class="p1">Унижение человека ведет к лишению его человеческого облика. Бесправное положение завершалось уродованием. Некоторым операторам того времени превосходно удавалось вытравить с человеческого лица образ божий. Доктор Конкест, член Аменстритской коллегии, инспектировавший торговлю химическими товарами в Лондоне, написал на латинском языке книгу, посвященную этой хирургии наизнанку, изложив ее основные приемы. Если верить Юстусу Каррик-Фергюсу, основоположником этой хирургии является некий монах по имени Авен-Мор, что по-ирландски значит «Большая река».</p><p class="p1">Карлик немецкого властительного князя – уродец Перкео (кукла, изображающая его, – настоящее страшилище – выскакивает из потайного ящика в одном из гейдельбергских погребков) – был замечательным образчиком этого искусства, чрезвычайно разностороннего в своем применении.</p><p class="p1">Оно создавало уродов, для которых закон существования был чудовищно прост: им разрешалось страдать и вменялось в обязанность служить предметом развлечения.</p><p class="empty-line"/><p class="p1">Фабрикация уродов производилась в большом масштабе и охватывала многие разновидности.</p><p class="p1">Уроды нужны были султану; уроды нужны были папе. Первому – чтобы охранять его жен; второму – чтобы возносить молитвы. Это был особый вид калек, неспособных к воспроизведению рода. Эти человекоподобные существа служили и сладострастию и религии. Гарем и Сикстинская капелла были потребителями одной и той же разновидности уродов: первый – свирепых, вторая – пленительных.</p><p class="p1">В те времена умели делать многое, чего не умеют делать теперь; люди обладали талантами, которых у нас уже нет, – недаром же благомыслящие умы кричат об упадке. Мы уже не умеем перекраивать живое человеческое тело: это объясняется тем, что искусство пытки нами почти утрачено. Раньше существовали виртуозы этого дела, теперь их уже нет. Искусство пытки упростили до такой степени, что вскоре оно, быть может, совсем исчезнет. Отрезая живым людям руки и ноги, вспарывая им животы, вырывая внутренности, проникали в живой организм человека – и это приводило к открытиям. От подобных успехов, которыми хирургия обязана была палачу, нам теперь приходится отказаться.</p><p class="p1">Операции эти не ограничивались в те давние времена изготовлением диковинных уродов для народных зрелищ, шутов, увеличивающих собою штат королевских придворных, и кастратов – для султанов и пап. Они были чрезвычайно разнообразны. Одним из высших достижений этого искусства было изготовление «петуха» для английского короля.</p><p class="p1">В Англии существовал обычай, согласно которому в королевском дворце держали человека, певшего по ночам петухом. Этот полуночник, не смыкавший глаз в то время, как все спали, бродил по дворцу и каждый час издавал петушиный крик, повторяя его столько раз, сколько требовалось, чтобы заменить собою колокол. Человека, предназначенного для роли петуха, подвергали в детстве операции гортани, описанной в числе других доктором Конкестом. С тех пор как в царствование Карла II герцогиню Портсмутскую чуть не стошнило при виде слюнотечения, бывшего неизбежным результатом такой операции, к этому делу приставили человека с неизуродованным горлом, но самую должность упразднить не решились, дабы не ослабить блеска короны. Обычно на столь почетную должность назначали отставного офицера. При Иакове II ее занимал Вильям. Самсон Кок<a href="ch2.xhtml#id71" class="a">[156]</a>, получавший за свое пение девять фунтов два шиллинга шесть пенсов в год.</p><p class="p1">В Петербурге, менее ста лет тому назад, – об этом упоминает в своих мемуарах Екатерина II, – в тех случаях, когда царь или царица бывали недовольны каким-нибудь вельможей, последний должен был в наказание садиться на корточки в парадном вестибюле дворца и просиживать в этой позе иногда по нескольку дней, то мяукая, как кошка, то кудахтая, как наседка, и подбирая на полу брошенный ему корм.</p><p class="p1">Эти обычаи отошли в прошлое. Однако не настолько, как это принято думать. И в наши дни придворные квохчут в угоду властелину, лишь немного изменив интонацию. Любой из них подбирает свой корм если не из грязи, то с полу.</p><p class="p1">К счастью, королям не свойственно ошибаться. Благодаря этому противоречия, в которые они впадают, никого не смущают. Всегда одобряя их действия, можно быть уверенным в своей правоте, а такая уверенность приятна. Людовик XIV не пожелал бы видеть в Версале ни офицера, поющего петухом, ни вельможу, изображающего индюка. То, что в Англии и в России поднимало престиж королевской и императорской власти, показалось бы Людовику Великому несовместимым с короной Людовика Святого. Всем известно, как он быт недоволен, когда Генриета, герцогиня Орлеанская, забылась до того, что увидала во сне курицу, – поступок, в самом деле весьма непристойный для особы, приближенной ко двору. Тот, кто принадлежит к королевскому двору, не должен интересоваться двором птичьим. Боссюэ, как известно, разделял возмущение Людовика XIV.</p><p class="empty-line"/><p class="p1">Торговля детьми в семнадцатом столетии, как уже было упомянуто, дополнялась особым промыслом. Этой торговлей и этим промыслом занимались компрачикосы. Они покупали детей, слегка обрабатывали это сырье, а затем перепродавали его.</p><p class="p1">Продавцы бывали всякого рода, начиная с бедняка-отца, освобождавшегося таким способом от лишнего рта, и кончая рабовладельцем, выгодно сбывавшим приплод от принадлежащего ему человеческого стада. Торговля людьми считалась самым обычным делом. Еще и в наши дни право на нее отстаивали с оружием в руках. Достаточно только вспомнить, что меньше столетия назад курфюрст Гессенский продавал своих подданных английскому королю, которому нужны были люди, чтобы посылать их в Америку на убой. К курфюрсту Гессенскому шли как к мяснику. Он торговал пушечным мясом. В лавке этого государя подданные висели, как туши на крюках. Покупайте – продается!</p><p class="p1">В Англии во времена Джеффриса, после трагической авантюры герцога Монмута, было обезглавлено и четвертовано немало вельмож и дворян: жены и дочери их, оставшиеся вдовами и сиротами, были подарены Иаковом II его супруге – королеве. Королева продала этих леди Вильяму Пенну. Возможно, что король получил комиссионное вознаграждение и известный процент со сделки! Но удивительно не то, что Иаков II продал этих женщин, а то, что Вильям Пенн их купил. Впрочем, эта покупка, находит себе если не оправдание, то объяснение в том, что, будучи поставлен перед необходимостью заселить целую пустыню, Пенн нуждался в женщинах. Женщины были как бы частью живого инвентаря.</p><p class="p1">Эти леди оказались недурным источником дохода для ее королевского величества. Молодые были проданы по дорогой цене. Не без смущения думаешь о том, что старых герцогинь Пенн, по всей вероятности, приобрел за бесценок.</p><p class="p1">Компрачикосы назывались также «чейлас» – индусское слово, означающее «охотники за детьми».</p><p class="p1">Долгое время компрачикосы находились почти на легальном положении. Иногда темные стороны самого общественного строя благоприятствуют развитию преступных промыслов; в подобных случаях они особенно живучи. В наши дни в Испании такое сообщество, возглавлявшееся бандитом Рамоном Селлем, просуществовало с 1834 по 1866 год; в течение тридцати лет оно держало в страхе три провинции: Валенсию, Аликанте и Мурсию.</p><p class="p1">Во времена Стюартов к компрачикосам при дворе относились довольно снисходительно. При случае правительство прибегало к их услугам. Для Иакова II они были почти instrumentum regni<a href="ch2.xhtml#id70" class="a">[157]</a>.</p><p class="p1">Это были времена, когда пресекали существование целых родов, проявивших непокорность или являвшихся почему-либо помехой, когда одним ударом уничтожали целые семьи, когда насильственно устраняли наследников. Иногда обманным образом лишали законных прав одну ветвь в пользу другой. Компрачикосы обладали умением видоизменять наружность человека, и это делало их полезными целям политики. Изменить наружность человека лучше, чем убить его. Существовала, правда, железная маска, но это было слишком грубое средство. Нельзя ведь наводнить Европу железными масками, между тем как уроды-фигляры могут появляться на улицах, не возбуждая ни в ком подозрения; кроме того, железную маску можно сорвать, чего с живой маской сделать нельзя. Сделать навсегда маской собственное лицо человека – что может быть остроумнее этого? Компрачикосы подвергали обработке детей так, как китайцы обрабатывают дерево. У них, как мы уже говорили, были свои секретные способы. У них были свои особые приемы. Это искусство исчезло бесследно. Из рук компрачикосов выходило странное существо, остановившееся в своем росте. Оно вызывало смех; оно заставляло призадуматься. Компрачикосы с такой изобретательностью изменяли наружность ребенка, что родной отец не узнал бы его. Иногда они оставляли спинной хребет нетронутым, но перекраивали лицо. Они вытравляли природные черты ребенка, как спарывают метку с украденного носового платка.</p><p class="p1">У тех, кого предназначали для роли фигляра, весьма искусно выворачивали суставы; казалось, у этих существ нет костей. Из них делали гимнастов.</p><p class="p1">Компрачикосы не только лишали ребенка его настоящего лица, они лишали его и памяти. По крайней мере в той степени, в какой это было им доступно. Ребенок не знал о причиненном ему увечье. Чудовищная хирургия оставляла след на его лице, но не в сознании. В лучшем случае он мог припомнить, что однажды его схватили какие-то люди, затем – что он заснул и что потом его лечили. От какой болезни – он не знал. Он не помнил ни прижигания серой, ни надрезов железом. На время операции компрачикосы усыпляли свою жертву при помощи какого-то одурманивающего порошка, слывшего волшебным средством, устраняющим всякую боль. Этот порошок издавна был известен в Китае; им пользуются также и в наши дни. Китай задолго до нас знал книгопечатание, артиллерию, воздухоплавание, хлороформ. Но в то время как в Европе открытие сразу оживает, развивается и творит настоящие чудеса, в Китае оно остается в зачаточном состоянии и сохраняется в мертвом виде. Китай – это банка с заспиртованным в ней зародышем.</p><p class="p1">Раз мы уже заговорили о Китае, остановимся еще на одной подробности. В Китае с незапамятных времен существовало искусство, которое следовало бы назвать отливкой живого человека. Двухлетнего или трехлетнего ребенка сажали в фарфоровую вазу более или менее причудливой формы, но без крышки и без дна, чтобы голова и ноги проходили свободно. Днем вазу держали в вертикальном положении, а ночью клали на бок, чтобы ребенок мог спать. Дитя росло, таким образом, только в ширину, заполняя своим стиснутым телом и искривленными костями все полые места внутри сосуда. Это выращивание в бутылке длилось несколько лет. По истечении известного времени жертва оказывалась изуродованной непоправимо. Убедившись, что эксперимент удался и урод вполне готов, вазу разбивали, и из нее выходило человеческое существо, принявшее ее форму.</p><p class="p1">Это очень удобно: можно заказать себе карлика какой угодно формы.</p><p class="empty-line"/><p class="p1">Иаков II относился к компрачикосам терпимо. У него были на то уважительные причины: он сам не раз пользовался их услугами. Не всегда пренебрегают тем, что презирают. Этот низкий промысел, бывший весьма на руку тому высокому промыслу, который именуется политикой, обрекался на жалкое существование, но не преследовался. Никакого надзора за ним не было, однако из виду его не упускали. Он мог пригодиться. Закон закрывал один глаз, король открывал другой.</p><p class="p1">Иногда король доходил до того, что сознавался в соучастии. Таково бесстыдство монархической власти! Иногда жертву клеймили королевскими лилиями; с нее снимали печать, наложенную Богом, и заменяли клеймом короля. В семье Иакова Эстли, родовитого дворянина и баронета, владельца замка Мелтон и констебля графства Норфолк, был такой проданный ребенок, на лбу которого правительственный чиновник выжег каленым железом королевскую лилию. В некоторых случаях, когда по каким-либо причинам хотели удостоверить, что изменение в судьбе ребенка произошло не без участия короля, прибегали именно к этому средству. Англия всегда оказывала нам честь, пользуясь для своих собственных надобностей цветком лилии.</p><p class="p1">Компрачикосы в некоторых отношениях напоминали «душителей» индусской секты – конечно, принимая во внимание разницу между людьми, промышлявшими преступным ремеслом, и фанатиками-изуверами; они дробились на шайки и занимались, между прочим, скоморошеством, но делали это для отвода глаз. Это облегчало им свободный переход с места на место. Они кочевали, появлялись то здесь, то там, но, отличаясь строгими правилами и религиозностью, были неспособны на воровство и ничем не походили на другие бродячие шайки. Народ долгое время неосновательно смешивал их с «испанскими и китайскими маврами». «Испанскими маврами» назывались фальшивомонетчики, а «китайскими» – мошенники. Совсем иное дело компрачикосы. Это были честные люди. Можно быть о них какого угодно мнения, но они порой бывали честны до щепетильности. Они стучались в дверь, входили, покупали ребенка, платили деньги и уносили его с собой. Сделка совершалась так, что покупателей ни в чем нельзя было упрекнуть.</p><p class="p1">Среди компрачикосов были люди различных национальностей. Это название объединяло англичан, французов, кастильцев, немцев, итальянцев. Такое тесное содружество обычно возникает в результате общности образа мыслей, общности суеверий, занятия одним и тем же ремеслом. В этом братстве бандитов левантинцы представляли Восток, а уроженцы западного побережья Европы – Запад. Баски свободно объяснялись с ирландцами: баск и ирландец понимают друг друга, ибо оба говорят на древнем пуническом наречии; кроме того, здесь играла роль тесная связь между католической Ирландией и католической Испанией. Эти дружеские отношения завершились даже повешением в Лондоне гаэльского лорда Брани, который был почти королем Ирландии, что послужило поводом к созданию Литримского графства.</p><p class="p1">Компрачикосы были скорее сообществом, чем племенем, но скорее сбродом, чем сообществом. Это была голь, собравшаяся со всего света и превратившая преступление в ремесло. Это было лоскутное племя, скроенное из пестрых отрепьев. Каждый новый человек был здесь как бы еще одним лоскутом, пришитым к нищенским лохмотьям.</p><p class="p1">Бродяжничество было законом существования компрачикосов, – они появлялись, потом опять исчезали. Тот, кого едва терпят, не может надолго осесть на одном месте. Даже в тех королевствах, где их промысел имел спрос при дворе и служил при случае подспорьем королевской власти, с ними порой обходились весьма сурово. Короли прибегали к их мастерству, а затем ссылали этих мастеров на каторгу. Такая непоследовательность объясняется непостоянством королевских прихотей. Таково уж свойство «высочайшей воли».</p><p class="p1">Кочевой промысел – что катящийся камень: он не обрастает мохом. Компрачикосы были бедны. Они могли бы сказать о себе то же, что сказала однажды изможденная, оборванная колдунья, увидев зажженный для нее костер: «Игра не стоит свеч». Очень возможно и даже вполне вероятно, что их главари, оставшиеся неизвестными и производившие торговлю детьми в крупных размерах, были богаты. Теперь, по прошествии двух столетий, трудно выяснить это обстоятельство.</p><p class="p1">Мы уже говорили, что компрачикосы были своего рода сообществом. У них были свои законы, своя присяга, свои обычаи. У них была, можно сказать, своя каббалистика. Если кому-нибудь в наши дни захотелось бы основательно познакомиться с компрачикосами, ему следовало бы съездить в Бискайю или в Галисию. Среди них было много басков, и поэтому там, в горах, и теперь еще сохранились легенды о них. Еще в наше время о компрачикосах вспоминают в Оярсуне, в Урбистондо, в Лесо, в Астигаре. «Aguardate, nino, que voy allamar al comprachicos!»<a href="ch2.xhtml#id69" class="a">[158]</a> – пугают в тех местах матери своих детей.</p><p class="p1">Компрачикосы, подобно цыганам, устраивали сходбища; время от времени их вожаки собирались, чтобы посовещаться. В семнадцатом столетии у них было четыре главных пункта для таких встреч. Один – в Испании, в ущелье Панкорбо; второй – в Германии, на лесной прогалине, носившей название «Злая женщина», близ Дикирха, где находятся два загадочных барельефа, изображающих женщину с головой и мужчину без головы; третий – во Франции, на холме, где высилось колоссальное изваяние Палицы Обещания, в старинном священном лесу Борво-Томона, близ Бурбон-ле-Бена; четвертый – в Англии, за оградой сада, принадлежавшего Вильяму Челонеру, джисброускому эсквайру, в Кливленде, в графстве Йорк, между четырехугольной башней и стеной со стрельчатыми воротами.</p><p class="empty-line"/><p class="p1">Английские законы, направленные против бродяг, всегда отличались крайней суровостью. Казалось, в своем средневековом законодательстве Англия руководилась принципом: Homo errans fera errante pejor<a href="ch2.xhtml#id68" class="a">[159]</a>. Один из специальных статутов характеризует человека, не имеющего постоянного местожительства, как существо более опасное, чем аспид, дракон, рысь и василиск» (atrocior aspide, dracone, lynce et basilico). Цыгане, от которых Англия хотела избавиться, долгое время причиняли ей столько же хлопот, сколько волки, которых ей удалось совсем истребить.</p><p class="p1">В этом отношении англичанин отличается от ирландца, который молится святым о здравии волка и величает его своим «крестным».</p><p class="p1">Однако английское законодательство, смотревшее, как мы только что видели, сквозь пальцы на прирученного волка, ставшего чем-то вроде собаки, относилось так же терпимо к бродягам, кормящимся каким-нибудь ремеслом. Никто не преследовал ни скомороха, ни странствующего цирюльника, ни лекаря, ни разносчика, ни скитающегося алхимика, если только у них было какое-либо ремесло, доставлявшее им средства к жизни. Но и с этой оговоркой и за этими исключениями вольный человек, каким являлся каждый бродяга, уже внушал опасение закону. Всякий праздношатающийся представлял собою угрозу общественному спокойствию. Характерное для нашего времени бесцельное шатание по белу свету было тогда явлением неизвестным: знали только существовавшее испокон веков бродяжничество. Достаточно было только иметь тот особый вид, который принято называть «подозрительным», – хотя никто не может объяснить, что значит это слово, – чтобы общество схватило такого человека за шиворот: «Где ты проживаешь? Чем занимаешься?» И если он не мог ответить на эти вопросы, его ожидало суровое наказание. Железо и огонь были средствами воздействия, предусмотренными уголовным кодексом. Закон боролся с бродяжничеством прижиганиями.</p><p class="p1">Отсюда, как прямое следствие, вытекал неписаный «закон о подозрительных лицах», применявшийся на всей английской территории к бродягам (которые, надо сознаться, легко становились преступниками) и, в частности, к цыганам, изгнание которых неосновательно сравнивали с изгнанием евреев и мавров из Испании и протестантов из Франции. Что же касается нас, мы не смешиваем облавы с гонением.</p><p class="p1">Компрачикосы, повторяем, не имели ничего общего с цыганами. Цыгане составляли определенную народность; компрачикосы же были смесью всех наций, как мы уже говорили, отбросами их, отвратительной лоханью с помоями. Компрачикосы, в противоположность цыганам, не имели собственного наречия; их жаргон был смесью самых разнообразных наречий; они изъяснялись на каком-то тарабарском языке, заимствовавшем свои слова из всех языков. Они в конце концов сделались, подобно цыганам, племенем, кочующим среди других племен; но их связывало воедино сообщество, а не общность происхождения. Во все исторические эпохи в необъятном океане человечества можно наблюдать такие отдельные потоки вредоносных людей, распространяющие вокруг себя отраву. Цыгане составляли племя, компрачикосы же были своего рода масонским обществом; но это масонское общество не преследовало высоких целей, а занималось отвратительным промыслом. Наконец, было между ними различие и в религии. Цыгане были язычниками, компрачикосы – христианами, и даже хорошими христианами, как подобает братству, хотя и состоявшему из представителей всех народностей, но возникшему в благочестивой Испании.</p><p class="p1">Они были больше чем христианами – они были католиками, и даже больше чем католиками – они были рьяными почитателями папы. Притом они столь ревностно охраняли чистоту своей веры, что отказались соединиться с венгерскими кочевниками из Пештского комитата, во главе которых стоял некий старец, имевший вместо жезла посох с серебряным набалдашником, украшенным двуглавым австрийским орлом. Правда, эти венгры были схизматиками и даже праздновали 27 августа успение – омерзительная ересь!</p><p class="p1">В Англии при Стюартах компрачикосы, по указанным нами причинам, пользовались некоторым покровительством властей. Иаков II, пламенный ревнитель веры, преследовавший евреев и травивший цыган, по отношению к компрачикосам был добрым государем. Мы уже знаем почему: компрачикосы были покупателями человеческого товара, которым торговал король. Они весьма искусно устраивали внезапные исчезновения. Такие исчезновения иной раз требовались «для блага государства». Стоявший кому-нибудь поперек дороги малолетний наследник, попав к ним в руки и будучи подвергнут ими определенной операции, становился неузнаваемым. Это облегчало конфискацию имущества, это упрощало передачу родовых поместий фаворитам. Кроме того, компрачикосы были крайне сдержанны и молчаливы: обязавшись хранить безмолвие, они твердо блюли данное слово, что совершенно необходимо в государственных делах. Почти не было примера, чтобы они выдали королевскую тайну. Правда, это соответствовало их же собственным интересам: если бы король потерял к ним доверие, им грозила бы немалая опасность. Итак, с политической точки зрения они были подспорьем власти. Сверх того, эти мастера на все руки поставляли певчих святейшему отцу. Благодаря им можно было исполнять «Miserere»<a href="ch2.xhtml#id53" class="a">[160]</a> Аллегри. Особенно чтили они деву Марию. Все это нравилось папистам Стюартам. Иаков II не мог неприязненно относиться к людям, благочестие которых простиралось до того, что они фабриковали кастратов для церковных капелл. В 1688 году в Англии произошла смена династии. Стюарта вытеснил принц Оранский. Место Иакова II занял Вильгельм III.</p><p class="p1">Иаков II скончался в изгнании, и на его могиле совершилось чудо: его останки исцелили от фистулы епископа Отенского – достойное воздаяние за христианские добродетели низложенного монарха.</p><p class="p1">Вильгельм Оранский, не разделявший образа мыслей Иакова II и придерживавшийся в своей деятельности других принципов, сурово отнесся к компрачикосам. Он положил немало труда, чтобы уничтожить этот тлетворный сброд.</p><p class="p1">Статут, изданный в самом начале царствования Вильгельма III и Марии, обрушился со всей силой на сообщества компрачикосов. Это было для них жестоким ударом, от которого они уже никогда не смогли оправиться. В силу этого статута члены шайки, изобличенные в преступных действиях, подлежали клеймению: каленым железом у них выжигалась на плече буква «R», что значит rogue, то есть мошенник, на левой руке – буква «Т», означающая thief, то есть вор, и на правой руке – буква «М», означающая manslay, то есть убийца. Главари, «предположительно богатые люди, хотя с виду и нищие», подвергались collistrigium, то есть стоянию у позорного столба (pilori), и на лбу у них выжигали букву «Р»; их имущество подлежало конфискации, а деревья в их угодьях вырубались, и пни выкорчевывались. Виновные в недоносительстве на компрачикосов карались как их сообщники конфискацией имущества и пожизненным заключением в тюрьме. Что же касается женщин, входивших в состав шаек, то они подлежали наказанию, носившему название cucking-stool, – это была своего рода западня, а самый термин образовался из соединения французского слова coquine («непотребная женщина») и немецкого слова stuhl («стул»). Английские законы отличаются необыкновенной долговечностью: в английском уголовном кодексе это наказание сохранилось еще до сих пор для «сварливых женщин». Cucking-stool подвешивают над рекой или прудом, сажают в него женщину и погружают в воду. Эта операция повторяется трижды, «чтобы охладить злобу провинившейся», как поясняет комментатор Чемберлен.</p></span></span></span></span>
