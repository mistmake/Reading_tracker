<p class="p">2. Лорд Дэвид Дерри-Мойр</p>
</div><p class="p1">Лорд Линней Кленчарли не всегда был стариком и изгнанником. Он пережил когда-то пору молодости и страстей. Со слов Гаррисона и Прайда известно, что Кромвель в молодости любил женщин и удовольствия; иной раз подобные увлечения доказывают (другая сторона женского вопроса), что в юноше таится будущий мятежник.</p><p class="p1">Итак, у лорда Кленчарли, как и у Кромвеля, были ошибки и заблуждения. У него был незаконный сын. Этот ребенок, явившийся на свет в дни падения республики, родился в Англии, как раз тогда, когда его отец отправлялся в изгнание. Вот почему мальчик никогда не видел своего отца. Незаконнорожденный отпрыск лорда Кленчарли вырос пажом при дворе Карла II. Его звали лорд Дэвид Дерри-Мойр; титул лорда за ним оставили «из учтивости», так как мать его была знатной дамой. В то время как лорд Кленчарли жил в Швейцарии угрюмым нелюдимом, эта красивая женщина решила быть сговорчивее и добилась того, что ей простили ее первого любовника-бунтовщика ради второго, несомненно более благонамеренного, даже роялиста, так как это был сам король. Она пробыла любовницей Карла II достаточно времени для того, чтобы король, счастливый тем, что отвоевал у республики такую красавицу, назначил маленького лорда Дэвида, сына побежденной им женщины, в свой личный конвой. Внебрачный сын получил офицерское звание, право столоваться при дворе и, в противовес своему отцу, стал горячим приверженцем Стюартов. Некоторое время он, в качестве офицера конвоя его величества, был одним из ста семидесяти, носивших палаши, затем был переведен в «пенсионеры» и стал одним из сорока, имевших право носить золотой бердыш. Кроме того, входя в состав учрежденного Генрихом VIII благородного отряда телохранителей, он пользовался привилегией подавать блюда на стол короля.</p><p class="p1">Таким образом, в то время как отец его старился в изгнании, лорд Дэвид благоденствовал при дворе Карла II.</p><p class="p1">Затем он стал благоденствовать и при дворе Иакова II.</p><p class="p1">Король умер, да здравствует король! – это non deficit alter, aureus<a href="ch2.xhtml#id261" class="a">[182]</a>.</p><p class="p1">По восшествии на престол герцога Йоркского он получил разрешение называться лордом Дэвидом Дерри-Мойр, по названию поместья, которое, умирая, завещала ему мать; поместье это находилось в Шотландии, в большом лесу, где водится птица краг, клювом выдалбливающая себе гнездо в стволе дуба.</p><p class="empty-line"/><p class="p1">Иаков II был королем, но притязал на славу полководца. Он любил окружать себя молодыми офицерами. Он охотно показывался народу верхом, в каске и кирасе, в огромном развевавшемся парике, ниспадавшем из-под каски на кирасу; в таком виде он напоминал конную статую, олицетворяющую войну во всей ее бессмысленности. Ему нравились изящные манеры молодого лорда Дэвида. Он даже питал нечто вроде признательности к этому роялисту за то, что он был сыном республиканца: отречься от отца-бунтовщика небесполезно в начале придворной карьеры. Король сделал лорда Дэвида Дерри-Мойр своим постельничим, с жалованьем в тысячу ливров.</p><p class="p1">Это было крупное повышение. Постельничий спит в одной комнате с королем, на кровати, которую ставят для него рядом с королевским ложем. Всех постельничих двенадцать, и они поочередно охраняют короля.</p><p class="p1">Лорд Дэвид был, кроме того, назначен главным королевским конюшим, на обязанности которого лежало отпускать овес для королевских лошадей, за что он получал еще двести пятьдесят ливров в год. Под его началом находились пять королевских кучеров, пять королевских форейторов, пять королевских конюхов, двенадцать королевских выездных лакеев и четыре королевских носильщика. На нем лежал присмотр за шестью скаковыми лошадьми, которых король содержал в Хеймаркете и которые обходились его величеству в шестьсот ливров в год. Он был полновластным хозяином в королевской гардеробной, снабжавшей парадными костюмами кавалеров ордена Подвязки. Ему до земли кланялся королевский придверник, пристав черного жезла. При Иакове II эту должность занимал кавалер Дюппа. Лорду Дэвиду оказывали все знаки уважения королевский клерк господин Бекер и парламентский клерк господин Броун. Английский двор был образцом великолепия и гостеприимства. Лорд Дэвид председательствовал на пирах и приемах в числе двенадцати вельмож. Он имел честь стоять позади короля в «дни приношения», когда король жертвует церкви золотой безант, byzantium, и в «орденские дни», когда король надевает цепь своего ордена, и в «дни причастия», когда не причащается никто, кроме короля и принцев крови. В страстной четверг он вводил к королю двенадцать бедняков, которым король дарил столько серебряных пенни, сколько ему было лет, и столько шиллингов, сколько лет он уже царствует. Когда король заболевал, на обязанности лорда Дэвида лежало призывать двух высших сановников церкви, которые должны были ухаживать за королем, и не допускать к нему врачей без разрешения государственного совета. Кроме того, он был подполковником шотландского полка королевской гвардии, того самого, который играет шотландский марш.</p><p class="p1">В этом чине он участвовал в нескольких кампаниях и приобрел заслуженную славу как храбрый воин. Это был человек сильный, хорошо сложенный, красивый, щедрый, с благородной наружностью и превосходными манерами. Его внешность соответствовала его положению. Он был высокого роста и высокого происхождения.</p><p class="p1">Дерри-Мойр был уже на шаг от того, чтобы получить звание groom of the stole, что давало бы ему право подносить королю сорочку, но для этого нужно было быть принцем или пэром.</p><p class="p1">Сделать кого-нибудь пэром – дело серьезное. Это значит создать пэрство и тем самым породить завистников. Это – милость, а оказывая кому-либо милость, король приобретает одного друга и сто недругов, не считая того, что и друг оказывается потом неблагодарным. Иаков II из политических соображений с большим трудом жаловал своих подданных достоинством пэра, но передавал его охотно. Переданное пэрство не вызывает волнения. Это делается просто в целях сохранения знатного имени, и такая передача мало трогала лордов.</p><p class="p1">Король не имел ничего против того, чтобы ввести лорда Дэвида Дерри-Мойр в палату пэров, лишь бы это произошло в результате передачи пэрства. Его величество ждал подходящего случая, чтобы сделать Дэвида Дерри-Мойр, лорда «из учтивости», лордом по праву.</p><p class="empty-line"/><p class="p1">Случай этот представился.</p><p class="p1">В один прекрасный день стало известно, что со старым изгнанником произошли разные события, и главное из них было то, что он умер. Смерть хороша тем, что она заставляет хотя бы немного поговорить об умершем. Начали рассказывать, что знали (или, вернее, думали, будто знают) о последних годах жизни лорда Линнея. Очевидно, это были догадки и вымыслы. Если верить этим рассказам, несомненно совершенно неосновательным, республиканские чувства лорда Кленчарли до такой степени обострились к концу его жизни, что он женился – странное упрямство изгнанника! – на дочери одного из цареубийц, Анне Бредшоу, – имя называли с точностью, – которая умерла, произведя на свет ребенка, мальчика, являющегося якобы, если только все это правда, законным сыном и наследником лорда Кленчарли. Эти сведения, очень неопределенные, были похожи скорее на слухи, чем на факты. Для Англии того времени все происходящее в Швейцарии было таким же далеким, как для теперешней Англии то, что происходит в Китае. Лорду Кленчарли было будто бы пятьдесят девять лет, когда он женился, и шестьдесят, когда у него родился сын; говорили, что он умер немного времени спустя и мальчик остался круглым сиротой. Что ж, возможно, конечно, но маловероятно. Прибавляли, что ребенок этот «хорош как день», – как говорится в волшебных сказках. Король Иаков положил конец этим безусловно неосновательным слухам, всемилостивейше объявив в одно прекрасное утро Дэвида Дерри-Мойр единственным и бесспорным наследником его незаконного отца, лорда Линнея Кленчарли, «за неимением у такового законных детей и поскольку установлено отсутствие всякого другого родства и потомства», – грамота, гласящая об этом, была занесена в реестры палаты лордов. Этой грамотой король признавал за лордом Дэвидом Дерри-Мойр титулы, права и преимущества покойного лорда Линнея Кленчарли, при единственном условии, чтобы лорд Дэвид женился, по достижении ею совершеннолетия, на девице, которая в то время была еще младенцем в возрасте нескольких месяцев и которую король, неизвестно по каким причинам, еще в колыбели сделал герцогиней. Впрочем, причины эти были хорошо известны.</p><p class="p1">Малютку-невесту звали герцогиней Джозианой. В Англии была тогда мода на испанские имена. Одного из незаконных детей Карла II звали Карлосом, графом Плимут. Возможно, что имя Джозиана было сокращением двух имен – Джозефа и Анны. А может быть, существовало имя Джозиана, как было имя Джозия. Одного из приближенных Генриха II звали Джозией дю Пассаж.</p><p class="p1">Вот этой-то маленькой герцогине король и пожаловал пэрство Кленчарли. Она была пэрессой, ожидавшей своего пэра: пэром должен был стать ее будущий муж. Это пэрство состояло из двух баронств: баронства Кленчарли и баронства Генкервилл; кроме того, лорды Кленчарли в награду за какой-то воинский подвиг были высочайше пожалованы титулом сицилийских маркизов Корлеэне. Как общее правило, пэры Англии не могут носить иностранных титулов; однако бывают исключения – так, например, Генри Эрандел, барон Эрандел-Уордур, был, так же как и лорд Клиффорд, графом Священной Римской империи, князем которой был лорд Каупер; герцог Гамильтон носит во Франции титул герцога Шательро; Бэзил Фейлдинг, граф Денби, в Германии носит титул графа Габсбурга, Лауфенбурга и Рейнфельдена. Герцог Мальборо был в Швеции князем Миндельгеймом, так же как герцог Веллингтон был в Бельгии князем Ватерлоо. Тот же герцог Веллингтон был испанским герцогом Сьюдад-Родриго и португальским графом Вимейра.</p><p class="p1">В Англии уже и в те времена существовали, как они существуют и поныне, поместья дворянские и поместья недворянские. Эти земли, замки, городки, аренды, лены, поместья, аллоды и вотчины пэрства Кленчарли-Генкервилл принадлежали временно леди Джозиане, и король объявил, что как только лорд Дэвид Дерри-Мойр женится на Джозиане, он станет бароном Кленчарли.</p><p class="p1">Кроме наследства Кленчарли, у леди Джозианы было и собственное состояние. Она владела крупными имениями, часть которых была некогда подарена герцогу йоркскому Madame sans queue<a href="ch2.xhtml#id259" class="a">[183]</a>, иначе говоря, просто Madame. Так величали Генриету Английскую, первую, после королевы, женщину Франции.</p><p class="empty-line"/><p class="p1">Лорд Дэвид, преуспевавший при Карле и Иакове, продолжал преуспевать и при Вильгельме Оранском. Он не заходил в своей приверженности Иакову так далеко, чтобы последовать за ним в изгнание. Не переставая любить своего законного короля, он имел благоразумие служить узурпатору. Впрочем, лорд Дэвид был хоть и не очень дисциплинированным, но превосходным офицером; он переменил сухопутную службу на морскую и отличился в «белой эскадре». Лорд Дэвид стал, как называли тогда, капитаном легкого фрегата. В конце концов из него вышел вполне светский человек, прикрывающий изяществом манер свои пороки, немного поэт, как и все в ту пору, хороший слуга королю и государству, непременный участник всех празднеств, торжеств, «малых королевских выходов», церемоний, но не избегавший и сражений, достаточно угодливый царедворец и вместе с тем весьма надменный вельможа, близорукий или зоркий, смотря по обстоятельствам; честный по природе, почтительный по отношению к одним и высокомерный с другими, искренний и чистосердечный по первому побуждению, но способный мгновенно надеть на себя любую личину, прекрасно учитывающий дурное и хорошее расположение духа у короля, беспечно стоявший перед направленным на него острием шпаги, по одному знаку его величества готовый геройски нелепо рисковать своей жизнью, способный на любые выходки, но неизменно вежливый, раб этикета и учтивости, гордый возможностью в торжественных случаях преклонить колено перед монархом, веселый, храбрый, истый придворный по своему облику и рыцарь в душе, человек все еще молодой, несмотря на свои сорок пять лет.</p><p class="p1">Лорд Дэвид распевал французские песенки, изысканная веселость которых нравилась когда-то Карлу II.</p><p class="p1">Он любил красноречие, ценил высокий слог и восхищался прославленными, но нестерпимо скучными разглагольствованиями епископа Боссюэ в «Надгробных речах».</p><p class="p1">От матери ему досталось скромное наследство, приносившее около десяти тысяч фунтов стерлингов, или двести пятьдесят тысяч франков годового дохода, – этого едва хватало на жизнь. Он кое-как изворачивался, делая долги. В роскоши, экстравагантности и новшествах он не имел соперников. Как только ему начинали подражать, он придумывал что-нибудь новое. Для верховой езды он надевал широкие со шпорами сапоги из юфти двойного дубления. Ни у кого не было таких шляп, таких редкостных кружев и таких брыжей, как у него.</p></span></span></span></span>
