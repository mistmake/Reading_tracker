<p class="p">VIII. Удобство окон, выходящих на реку</p>
</div><p class="p1">Клод Фролло (читатель, более проницательный, чем Феб, конечно, с самого начала узнал в мрачном монахе архидьякона) принялся ощупью знакомиться с темной каморкой, куда его запер Феб. Она представляла собой чуланчик, какие иногда устраиваются архитекторами между крышей и поддерживающей ее стеной. Вертикальный разрез этой собачьей конуры, как ее удачно назвал Феб, представлял треугольник. Вдобавок там не было даже намека на окошко, а скат крыши не позволял выпрямиться во весь рост. Клод присел на корточки среди пыли и обломков штукатурки, рассыпавшихся под тяжестью его тела. Голова у него горела. Пошарив кругом руками, он нашел на полу осколок разбитого стекла, приложил его ко лбу, и эта прохлада немного облегчила его.</p><p class="p1">Что происходило в эту минуту в глубине души архидьякона, про то ведал лишь Бог да он сам!</p><p class="p1">В каком роковом порядке рисовались его воображению Эсмеральда, Феб, Жак Шармолю, его младший брат, так нежно любимый им и брошенный на улице, в грязи, наконец, его собственная священническая ряса и даже доброе имя, которыми он рисковал в притоне какой-то Фалурдель, – словом, все образы и события сегодняшнего дня, – этого я не смогу вам сказать. Одно несомненно, что все эти образы слились в его мозгу в ужасную картину.</p><p class="p1">Так прождал он с четверть часа, но ему казалось, что за это время он состарился на целых сто лет. Вдруг он услыхал скрип ступенек деревянной лестницы под чьими-то ногами. Люк открылся, и показался свет. В полусгнившей двери чулана, где притаился Клод Фролло, была довольно большая щель, и он жадно приник к ней лицом, так что мог наблюдать за всем, что происходило в соседней комнате. Сначала, с лампой в руке, показалась старуха с кошачьим лицом, за ней Феб, покручивавший ус, и, наконец, прелестная грациозная фигурка Эсмеральды. Она явилась пред священником как чудное, ослепительное видение. Клод задрожал, в глазах у него помутилось, кровь бросилась ему в голову, в ушах поднялся звон, все кругом закружилось, и он перестал видеть и слышать.</p><p class="p1">Когда он пришел в себя, Феб и Эсмеральда были уже одни и сидели на сундуке рядом с лампой, ярко освещавшей их молодые лица и жалкое ложе в глубине каморки.</p><p class="p1">Около этого ложа находилось окно, разбитые стекла которого напоминали паутину, поврежденную дождем. Оттуда виднелись клочок неба и луна, мягко покоившаяся на пушистых облаках.</p><p class="p1">Молодая девушка сидела смущенная, трепещущая, с пылающим лицом, опущенные ресницы бросали длинную тень на зардевшиеся щеки. Феб, на которого она не решалась взглянуть, так и сиял. Машинально, с очаровательной неловкостью, чертила она пальчиком по сундуку какие-то бессвязные линии и следила за движением своего пальца. Ножек ее не было видно, на них лежала, свернувшись, маленькая козочка.</p><p class="p1">Капитан был одет весьма щегольски, воротник и рукава его мундира были расшиты золотом, что в те времена считалось верхом роскоши.</p><p class="p1">Клод с трудом мог расслышать, о чем они говорили, – так у него стучало в висках.</p><p class="p1">Разговоры влюбленных не отличаются большим разнообразием. Это вечное повторение слов «я вас люблю», музыкальной фразы, весьма пустой и бессодержательной для постороннего слушателя, если она не украшена какими-нибудь фиоритурами. Но Клод не был равнодушным слушателем.</p><p class="p1">– Ах, – проговорила молодая девушка, не поднимая глаз, – не презирайте меня, монсеньор Феб. Я сама знаю, что поступила очень дурно.</p><p class="p1">– Презирать вас, моя красотка! – воскликнул капитан тоном, полным утонченной галантности. – Презирать вас! Боже мой, да за что же?</p><p class="p1">– За то, что я пришла сюда.</p><p class="p1">– Ну, моя прелесть, в этом мы не сойдемся. Мне бы вас не презирать надо, а ненавидеть.</p><p class="p1">Молодая девушка испуганно взглянула на него:</p><p class="p1">– Меня ненавидеть! Да что же я сделала?</p><p class="p1">– Заставили себя слишком долго упрашивать.</p><p class="p1">– Ах, – возразила она, – ведь я нарушила свой обет. Не найти мне больше своих родителей! Талисман потеряет силу! Но что мне за дело! На что мне теперь мать и отец?</p><p class="p1">И при этих словах она с невыразимой нежностью взглянула на капитана своими большими черными глазами, влажными от радости и умиления.</p><p class="p1">– Ей-богу, ничего не понимаю! – воскликнул Феб.</p><p class="p1">Эсмеральда на минуту притихла, слеза скатилась по ее щеке, глубокий вздох вырвался из уст, и она проговорила:</p><p class="p1">– О монсеньор, как я вас люблю!</p><p class="p1">Вокруг молодой девушки царила атмосфера такого целомудрия, такой нравственной чистоты, что Феб чувствовал себя не совсем ловко. Однако последние слова придали ему смелости.</p><p class="p1">– Ты любишь меня! – с восторгом воскликнул он, обнимая цыганку. Он только и ждал для этого удобной минуты.</p><p class="p1">Священник, увидев это, ощупал пальцем лезвие кинжала, спрятанного у него на груди.</p><p class="p1">– Феб, – продолжала цыганка, тихонько освобождаясь от крепких объятий капитана, – вы добрый, хороший, красивый. Вы спасли меня, бедную, ничтожную цыганку. Давно уже я мечтала об офицере, который спасет мне жизнь. Это о вас я мечтала, еще не зная вас, мой Феб. Герой моей мечты был одет в такой же красивый мундир, как вы, со шпагой на боку, и имел такой же гордый вид. Вас зовут Фебом – какое чудное имя! Я люблю ваше имя, люблю вашу шпагу. Дайте мне вашу шпагу, Феб, покажите мне ее.</p><p class="p1">– Дитя! – улыбнулся капитан, вынимая шпагу из ножен. Цыганка осмотрела рукоятку лезвия, полюбовалась на вырезанный на эфесе вензель и поцеловала шпагу со словами: «Ты шпага храброго офицера, и я люблю твоего хозяина».</p><p class="p1">Феб воспользовался этим случаем, чтобы поцеловать ее наклоненную прелестную шейку, отчего девушка быстро подняла голову и зарделась, как вишня. Архидьякон заскрежетал зубами в потемках.</p><p class="p1">– Феб, – продолжала цыганка, – дайте мне наговориться с вами! Пройдитесь по комнате, и я полюбуюсь на вас. Какой вы высокий, как звенят ваши шпоры! Какой вы красавец!</p><p class="p1">Феб исполнил ее желание, заметив с самодовольной улыбкой:</p><p class="p1">– Какое ты еще дитя! А кстати, моя прелесть, видела ты меня в парадной форме?</p><p class="p1">– К сожалению, нет, – вздохнула она. – Вот это действительно красиво!</p><p class="p1">Феб снова уселся рядом с молодой девушкой, но гораздо ближе, чем прежде.</p><p class="p1">– Послушай, моя радость…</p><p class="p1">Цыганка несколько раз слегка хлопнула его по губам своей прелестной ручкой, ребяческим жестом, полным очаровательной грации:</p><p class="p1">– Нет, нет, не хочу слушать! Любите меня? Скажите, если любите.</p><p class="p1">– Люблю ли я тебя, ангел души моей! – воскликнул капитан, становясь на одно колено. – Я весь твой, я готов пожертвовать для тебя и душой и телом, отдать за тебя всю жизнь. Я люблю тебя и никого не любил, кроме тебя.</p><p class="p1">Капитан столько раз повторял эти слова в подобных случаях, что и теперь выговорил их одним духом, ни разу не запнувшись. При таком страстном объяснении цыганка подняла к грязному потолку, заменявшему небо, взор, полный неземного блаженства.</p><p class="p1">– Ах, – прошептала она, – как бы я желала сейчас умереть!</p><p class="p1">Феб же нашел, что сейчас самый удобный случай сорвать еще один поцелуй, чем опять доставил бесконечные муки несчастному архидьякону.</p><p class="p1">– Умереть! – воскликнул влюбленный капитан. – Да что ты говоришь, мой ангел! Жить нужно, жить, клянусь Юпитером! Как можно думать о смерти теперь, когда нас ждет столько наслаждений? Черт побери, я на это не согласен! Послушай, дорогая моя Симиляр… Эсмепарда. Извини, пожалуйста! У тебя такое нехристианское имя, что я никак не могу его запомнить. Каждый раз язык заплетается.</p><p class="p1">– Ах, боже мой, – проговорила бедная девушка, – а мне казалось, что оно тем и хорошо, что оно такое необыкновенное! Но если оно вам не нравится, зовите меня как хотите.</p><p class="p1">– Ну, полно, милочка, не стоит огорчаться из-за таких пустяков. К твоему имени стоит только привыкнуть, вот и все. Я выучу его наизусть и тогда уже не буду сбиваться. Послушай же, моя прелестная Семиляр, я тебя обожаю! Я люблю тебя так страстно, что даже сам удивляюсь. И я знаю одну особу, которая готова лопнуть от зависти.</p><p class="p1">– Кто это? – перебила его ревниво молодая девушка.</p><p class="p1">– Что нам за дело! – возразил Феб. – Любишь ты меня?</p><p class="p1">– Ах!.. – прошептала она.</p><p class="p1">– Ну… и больше нам ничего и не нужно. Я тебя тоже очень люблю, ты увидишь. И пусть Нептун проколет меня своим трезубцем, если я не сделаю тебя счастливейшей женщиной в мире. Мы найдем где-нибудь маленькую уютную комнатку, я буду водить своих стрелков у тебя под окнами. Все они конные, и стрелки капитана Миньона против них никуда не годятся. Я поведу тебя на парад в Рюлли. Это, я тебе скажу, великолепное зрелище! Восемьдесят тысяч человек вооруженных, тридцать тысяч белых попон и камзолов. Тут же значки всех шестидесяти семи цехов, знамена парламента, счетной палаты, казначейства, монетного двора, одним словом – вся чертова свита! Я покажу тебе королевских львов – это дикие звери. Все женщины очень любят такие вещи.</p><p class="p1">Тем временем молодая девушка, погруженная в свои радужные мысли, мечтала под звуки его голоса, не вслушиваясь в то, что он говорил.</p><p class="p1">– Ах, как ты будешь счастлива! – продолжал капитан, осторожно расстегивая в то же время пояс цыганки.</p><p class="p1">– Что вы делаете? – испуганно воскликнула она, очнувшись от своей задумчивости при переходе капитана от слов к делу.</p><p class="p1">– Ничего, – отвечал Феб. – Я только хотел сказать, что тебе придется расстаться с этим уличным нарядом, когда ты будешь со мной.</p><p class="p1">– Когда я буду с тобой, мой Феб! – повторила нежно молодая девушка.</p><p class="p1">И снова замолкла, погрузившись в задумчивость.</p><p class="p1">Капитан, ободренный такой покорностью, обнял ее за талию и не встретил сопротивления. Тогда он принялся осторожно расшнуровывать ее корсаж и при этом настолько спустил ее косынку, что задыхающийся архидьякон увидал обнажившееся под легкой кисеей прелестное смуглое плечико цыганки, напоминавшее собой луну, показавшуюся в тумане горизонта.</p><p class="p1">Молодая девушка не останавливала Феба и, кажется, даже не замечала, что он делает. Глаза предприимчивого капитана разгорались.</p><p class="p1">– Феб, – вдруг обратилась к нему молодая девушка с выражением бесконечной любви, – научи меня своей вере.</p><p class="p1">– Своей вере?! – воскликнул капитан, расхохотавшись. – Научить тебя своей вере? Черт возьми! Да на что тебе моя вера?</p><p class="p1">– Чтобы нам можно было повенчаться, – отвечала она.</p><p class="p1">На лице капитана отразилось сразу удивление, насмешка, беспечность и сладострастие.</p><p class="p1">– Ну, вот еще! – воскликнул он. – Какая тут женитьба!</p><p class="p1">Цыганка побледнела и печально опустила голову.</p><p class="p1">– Прелесть моя, – нежно продолжал капитан, – выкинь ты из головы эти глупости. Велика важность – женитьба! Точно мы будем меньше любить друг друга, если священник не побормочет над нами по-латыни.</p><p class="p1">И, говоря так, он постарался вложить в голос всю нежность, на какую был способен, а сам наклонялся все ближе к цыганке и с разгоревшимися глазами крепко обнял ее стройную, гибкую талию.</p><p class="p1">По всему видно было, что для капитана Феба наступает одна из тех минут, когда даже сам Юпитер делал такие глупости, что Гомеру приходилось призывать себе на помощь облако.</p><p class="p1">Достопочтенный Клод видел все. В двери чулана, сколоченного из гнилых досок, были такие широкие щели, что сквозь них свободно проникал взгляд архидьякона, напоминавший взгляд хищной птицы. Смуглый и широкоплечий священник, обреченный до сих пор на строгое монастырское целомудрие, теперь дрожал и не помнил себя от этой ночной сцены, полной любви и сладострастия. Вид полуобнаженной молодой красивой девушки в страстных объятиях капитана разогрел его кровь так, словно в его жилах текло расплавленное олово. С чувством бесконечной ревности следил он за каждой отколотой булавкой. Тому, кто увидел бы в эту минуту лицо несчастного, приникшего к гнилым доскам, показалось бы, что он видит перед собой тигра, смотрящего из клетки, как шакал терзает газель. Зрачки его сверкали, как угли, сквозь щели в двери.</p><p class="p1">Вдруг Феб быстро сдернул косынку молодой девушки. Бедная цыганка, сидевшая до сих пор бледная и неподвижная, сразу очнулась. Она быстро отскочила от предприимчивого капитана и, взглянув на свои обнаженные плечи, замерла, сконфуженная и растерянная от стыда, скрестив руки на груди и стараясь прикрыть ими свою наготу. Если бы не зардевшиеся щеки, ее неподвижную и нежную фигуру легко было бы принять за статую целомудрия. Глаза ее оставались опущенными. Резкая выходка капитана обнаружила таинственный талисман, висевший у нее на шее.</p><p class="p1">– Что это такое? – спросил капитан, пользуясь предлогом снова приблизиться к напуганной красавице.</p><p class="p1">– Не троньте! – воскликнула она. – Это мой хранитель, он мне поможет отыскать моих родителей, если я окажусь достойной их. Оставьте меня, господин капитан! Матушка! Милая матушка! Где ты? Помоги мне! Сжальтесь, господин Феб, отдайте мою косынку.</p><p class="p1">Феб отступил и холодно проговорил:</p><p class="p1">– О, сударыня, теперь я отлично вижу, что вы меня не любите!</p><p class="p1">– Я его не люблю! – воскликнула бедная цыганка, бросаясь на шею капитана и усаживая его рядом с собой. – Я тебя не люблю, милый Феб! Злой, ведь ты говоришь это нарочно, чтобы меня помучить. Так <em>на</em> же, возьми меня, возьми всю! Делай со мной все, что хочешь, я вся твоя! На что мне талисман, на что мне мать! Ты для меня мать, потому что я люблю тебя! Феб, мой любимый Феб, взгляни на меня! Смотри, это я, та самая маленькая цыганка, которую ты по своей доброте не оттолкнул от себя, она сама пришла к тебе и сама отдается тебе. Моя душа, моя жизнь, мое тело, все, все во мне принадлежит тебе, мой дорогой! Ну что ж, если ты не хочешь жениться, так и не надо. Да и что я такое? Несчастная уличная девочка, а ведь ты дворянин, мой Феб! Правда, это было бы даже смешно – уличная плясунья и вдруг замужем за офицером! Да я с ума сошла! Нет, Феб, нет, я буду твоей любовницей, твоей забавой, твоим наслаждением – всем, чем ты захочешь, ведь я для того только и создана! Пусть я буду опозорена, запятнана, всеми презираема, но зато любима! И я буду самой счастливейшей из женщин. А когда я состарюсь или подурнею, мой Феб, когда не смогу больше служить для вас забавой, монсеньор, вы позволите мне прислуживать вам. Другие будут вам вышивать шарфы, а я, ваша служанка, буду хранить их. Я буду чистить ваши шпоры, чистить ваш мундир, обтирать пыль с ваших сапог. Не правда ли, мой Феб, вы из сострадания позволите мне это? А теперь бери меня, Феб, я вся твоя, только люби меня! Нам, цыганкам, лишь это и нужно – воздух и любовь!</p><p class="p1">И с этими словами она обвила руками шею капитана, умоляюще глядя на него снизу вверх глазами, полными слез, и улыбаясь чудной улыбкой. Ее нежная грудь терлась о сукно и грубую вышивку его мундира, ее полуобнаженное тело извивалось у него на коленях. Опьяненный капитан прильнул жадными губами к ее смуглым плечикам. Молодая девушка, запрокинувшись назад и подняв глаза, трепетала и замирала под этим поцелуем.</p><p class="p1">Вдруг над головой Феба она увидела другую голову, с мертвенно-бледным, искаженным судорогой лицом и диким взглядом. И около этого лица виднелась поднятая рука с кинжалом. То были лицо и рука архидьякона, выломавшего дверь и выбежавшего из чулана. Феб не мог его видеть. Пораженная страшным видением, девушка замерла, неподвижная, похолодевшая, немая, как голубка при виде ястреба, устремившего свои круглые глаза на ее гнездо.</p><p class="p1">Она не могла даже крикнуть. Она видела, как кинжал опустился на Феба и снова взлетел вверх, весь окровавленный.</p><p class="p1">– Проклятье, – проговорил капитан, падая.</p><p class="p1">Цыганка лишилась чувств.</p><p class="p1">Когда глаза ее закрывались и сознание заволакивалось туманом, ее губы ощутили прикосновение огня, поцелуй более жгучий, чем раскаленное железо палача.</p><p class="p1">Очнувшись, она увидала себя окруженной солдатами ночной стражи. Истекающего кровью капитана куда-то уносили. Архидьякон исчез; окошко в глубине комнаты, выходившее на реку, было распахнуто; около него подняли какой-то плащ, думая, что он принадлежит капитану, а вокруг нее говорили:</p><p class="p1">– Колдунья заколола капитана.</p></span></span></span>
