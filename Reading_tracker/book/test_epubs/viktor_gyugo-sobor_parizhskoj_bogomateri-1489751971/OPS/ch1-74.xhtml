<p class="p">6. Баркильфедро</p>
</div><p class="p1">Знать, что делают твои ближние, весьма полезно, и благоразумие требует, чтобы за ними велось наблюдение.</p><p class="p1">Джозиана поручила наблюдение за лордом Дэвидом преданному человеку, которому она доверяла и которого звали Баркильфедро.</p><p class="p1">Лорд Дэвид поручил осторожно наблюдать за Джозианой преданному человеку, в котором он не сомневался и которого звали Баркильфедро.</p><p class="p1">Королева Анна, со своей стороны, была осведомлена обо всех поступках и действиях Джозианы, своей побочной сестры, и лорда Дэвида, своего будущего зятя с левой стороны, через преданного человека, на которого сна вполне полагалась и которого звали Баркильфедро.</p><p class="p1">У этого Баркильфедро было под рукой три клавиша: Джозиана, лорд Дэвид и королева. Мужчина и две женщины! Сколько возможных модуляций! Какие сочетания самых противоположных чувств!</p><p class="p1">В своем прошлом Баркильфедро не всегда имел такую блестящую возможность нашептывать на ухо трем высоким особам.</p><p class="p1">Когда-то он был слугой герцога Йоркского. Он пытался стать священнослужителем, но это ему не удалось. Герцог Йоркский, принц английский и римский, соединявший приверженность к папе с официальной принадлежностью к англиканской церкви, мог бы далеко продвинуть Баркильфедро по ступеням той и другой иерархии, но не считал его ни достаточно ревностным католиком, чтобы сделать из него священника, ни достаточно ревностным протестантом, чтобы сделать его капелланом. Таким образом, Баркильфедро очутился между двух религий, и душа его низверглась с неба на землю.</p><p class="p1">Для пресмыкающихся душ это не такое уж плохое положение.</p><p class="p1">Есть дороги, по которым можно продвигаться только ползком.</p><p class="p1">В течение долгого времени единственным источником существования Баркильфедро была хотя и скромная, но сытная должность лакея. Такая должность давала ему кое-что, но он, кроме того, стремился к власти. Быть может, он и дорвался бы до нее, если бы не падение Иакова II. Приходилось все начинать сызнова. Трудно было достичь чего-нибудь при Вильгельме III, царствовавшем с угрюмой суровостью, которую он считал честностью. Баркильфедро впал в нищету не сразу после падения его покровителя Иакова II. Какие-то непонятные силы, продолжающие действовать и после того, как низложен монарх, обычно питают и поддерживают еще некоторое время его паразитов. Остатки растительных соков в течение двух-трех дней еще сохраняют зеленой листву на ветвях срубленного дерева; потом оно сразу желтеет и вянет; то же происходит и с царедворцами.</p><p class="p1">Благодаря своеобразному бальзамированию, которое называют наследственным правом на престол, монарх, если даже он свергнут и изгнан, продолжает существовать; не так обстоит дело с придворными – они более мертвы, чем король. Там, на чужбине, король – мумия, здесь, на родине, придворный – только призрак. А быть тенью тени – это высшая степень худобы. Баркильфедро совсем отощал, изголодался. Тогда он стал сочинителем.</p><p class="p1">Но его гнали даже из кухонь. Иногда он не знал, где переночевать. «Кто приютит меня?» – вопрошал он и боролся, боролся с упорством человека, близкого к отчаянию, – черта, обычно вызывающая участие к несчастному. Кроме того, он обладал особым талантом: подобно термиту, он просверливал в древесном стволе ход снизу доверху. С помощью имени Иакова II, играя на своих воспоминаниях, чувстве преданности, умилении, он получил доступ к герцогине Джозиане.</p><p class="p1">Джозиана милостиво отнеслась к человеку, который обладал двумя качествами, способными тронуть сердце: он был беден и умен. Она представила его лорду Дерри-Мойр, поселила в отведенном для слуг помещении, зачислила его в штат своей домашней челяди, была к нему добра и даже иногда разговаривала с ним. Баркильфедро не пришлось больше терпеть ни холода, ни голода. Джозиана говорила ему «ты». Такова была мода: знатные дамы обращались к литераторам на «ты», и те не протестовали. Маркиза де Мальи, принимая лежа в постели, спросила Руа, которого видела первый раз в жизни:</p><p class="p1">– Это ты написал «Год светской жизни»? Здравствуй!</p><p class="p1">Позднее писатели расплатились той же монетой. Пришел день, когда Фабр д’Эглантин обратился к герцогине де Роган:</p><p class="p1">– Ты урожденная Шабо?</p><p class="p1">То, что Джозиана говорила Баркильфедро «ты», было для него большим успехом. Это приводило его в восторг. Ему льстила высокомерная фамильярность герцогини.</p><p class="p1">«Леди Джозиана говорит мне “ты”!» – думал он, потирая руки от удовольствия.</p><p class="p1">Он воспользовался этим, чтобы упрочить свое положение. Он сделался чем-то вроде своего человека во внутренних покоях Джозианы, человека, которого никто не замечает, которого не стесняются; герцогиня не постеснялась бы переменить при нем сорочку. Но все это было ненадежно. А Баркильфедро добивался прочного положения. Герцогиня – только половина пути. Он считал бы все свои труды потерянными, если бы, прокладывая подземный ход, ему не удалось добраться до королевы.</p><p class="p1">Однажды Баркильфедро обратился к Джозиане:</p><p class="p1">– Не захочет ли ваша светлость осчастливить меня?</p><p class="p1">– Чего ты хочешь? – спросила Джозиана.</p><p class="p1">– Получить должность.</p><p class="p1">– Должность? Ты?</p><p class="p1">– Да, ваша светлость.</p><p class="p1">– Что за фантазия пришла тебе просить должности? Ты ведь ни на что не годен.</p><p class="p1">– Потому-то я вас и прошу.</p><p class="p1">Джозиана рассмеялась.</p><p class="p1">– Какую же должность из всех, для которых ты не пригоден, тебе хотелось бы получить?</p><p class="p1">– Место откупорщика океанских бутылок.</p><p class="p1">Джозиана рассмеялась еще веселее:</p><p class="p1">– Что это такое? Ты шутишь?</p><p class="p1">– Нет, ваша светлость.</p><p class="p1">– Хорошо. Для забавы буду отвечать тебе серьезно. Кем ты хочешь быть? Повтори.</p><p class="p1">– Откупорщиком океанских бутылок.</p><p class="p1">– При дворе все возможно. Неужели есть такая должность?</p><p class="p1">– Да, ваша светлость.</p><p class="p1">– Для меня это ново. Продолжай.</p><p class="p1">– Такая должность существует.</p><p class="p1">– Поклянись душой, которой у тебя нет.</p><p class="p1">– Клянусь.</p><p class="p1">– Нет, тебе невозможно верить.</p><p class="p1">– Благодарю вас, ваша светлость.</p><p class="p1">– Итак, ты хотел бы… Повтори еще раз.</p><p class="p1">– Распечатывать морские бутылки.</p><p class="p1">– Такая обязанность, должно быть, не слишком утомительна. Это почти то же, что расчесывать гриву бронзовому коню.</p><p class="p1">– Почти.</p><p class="p1">– Ничего не делать… Такое место действительно по тебе. К этому ты вполне пригоден.</p><p class="p1">– Видите, и я кое на что способен.</p><p class="p1">– Перестань шутить! Такая должность в самом деле существует?</p><p class="p1">Баркильфедро почтительно приосанился:</p><p class="p1">– Ваш августейший отец – король Иаков Второй, ваш зять – знаменитый Георг Датский, герцог Кемберлендский. Ваш отец был, а зять и поныне состоит лорд-адмиралом Англии.</p><p class="p1">– Подумаешь, какие новости ты мне сообщаешь. Я и без тебя это отлично знаю.</p><p class="p1">– Но вот чего не знает ваша светлость: в море попадаются три рода находок – те, что лежат на большой глубине, те, что плавают на поверхности, и те, что море выбрасывает на берег.</p><p class="p1">– Ну и что же?</p><p class="p1">– Все эти предметы, <em>легон, флоутсон и джетсон</em>, являются собственностью генерал-адмирала.</p><p class="p1">– Ну?</p><p class="p1">– Теперь ваша светлость понимает?</p><p class="p1">– Ничего не понимаю.</p><p class="p1">– Все, что находится в море, все, что пошло ко дну, все, что всплывает наверх, все, что прибивает к берегу, – все это собственность генерал-адмирала.</p><p class="p1">– Допустим. Что ж из этого?</p><p class="p1">– Все, за исключением осетров, которые принадлежат королю.</p><p class="p1">– А я думала, – сказала Джозиана, – что все это принадлежит Нептуну.</p><p class="p1">– Нептун – дурак. Он все выпустил из рук, позволил англичанам завладеть всем.</p><p class="p1">– Кончай скорей!</p><p class="p1">– Находки эти называются морской добычей.</p><p class="p1">– Прекрасно.</p><p class="p1">– Они неисчерпаемы. На поверхности моря всегда кто-нибудь плавает, волна всегда что-нибудь пригонит к берегу. Это контрибуция, которую платит море. Англичане берут таким образом с моря дань.</p><p class="p1">– Ну и прекрасно. А дальше?</p><p class="p1">– Ваша светлость, таким образом океан создал целый департамент.</p><p class="p1">– Где?</p><p class="p1">– В адмиралтействе.</p><p class="p1">– Какой департамент?</p><p class="p1">– Департамент морских находок.</p><p class="p1">– Ну?</p><p class="p1">– Департамент этот состоит из трех отделов: Легон, Флоутсон и Джетсон, и в каждом отделе сидит чиновник.</p><p class="p1">– Ну?</p><p class="p1">– Допустим, какой-нибудь корабль, плавающий в открытом море, хочет послать уведомление о том, что он находится на такой-то широте, или встретился с морским чудовищем, или заметил какой-то берег, или терпит бедствие, тонет, гибнет и прочее; хозяин судна берет бутылку, кладет в нее клочок бумаги, на котором записано это событие, запечатывает горлышко и бросает бутылку в море. Если бутылка идет ко дну, это касается начальника отдела Легон, если она плавает – начальника отдела Флоутсон, если волны выбрасывают ее на сушу – начальника отдела Джетсон.</p><p class="p1">– И ты хочешь служить в отделе Джетсон?</p><p class="p1">– Совершенно верно.</p><p class="p1">– И это ты называешь должностью откупорщика океанских бутылок?</p><p class="p1">– Такая должность существует.</p><p class="p1">– Почему тебе это место нравится больше первых двух?</p><p class="p1">– Потому что оно в настоящее время никем не занято.</p><p class="p1">– В чем состоят эти обязанности?</p><p class="p1">– Ваша светлость, в тысяча пятьсот девяносто восьмом году один рыбак, промышлявший ловлей угрей, нашел в песчаных мелях у мыса Эпидиум засмоленную бутылку, и она была доставлена королеве Елизавете; пергамент, извлеченный из этой бутылки, известил Англию о том, что Голландия, не говоря никому ни слова, захватила неизвестную страну, называемую Новой Землей, что это случилось в июне тысяча пятьсот девяносто шестого года, что в этой стране медведи пожирают людей, что описание зимы, проведенной в этих краях, спрятано в футляре из-под мушкета, подвешенном в трубе деревянного домика, построенного и покинутого погибшими голландцами, и что труба эта сделана из укрепленного на крыше бочонка с выбитым дном.</p><p class="p1">– Не понимаю всей этой чепухи.</p><p class="p1">– А Елизавета поняла: одной страной больше у Голландии, значит, одной страной меньше у Англии. Бутылка, содержавшая это известие, оказалась вещью значительной. Было издано постановление о том, что отныне всякий, нашедший на берегу запечатанную бутылку, должен под страхом повешения доставить ее генерал-адмиралу Англии. Адмирал поручает особому чиновнику вскрыть бутылку и, если «содержимое оной того заслуживает», сообщить о нем Ее Величеству.</p><p class="p1">– И часто доставляют в адмиралтейство такие бутылки?</p><p class="p1">– Редко. Но это ничего не значит. Должность существует, и тот, кто занимает ее, получает в адмиралтействе специальную комнату для занятий и казенную квартиру.</p><p class="p1">– И сколько же платят за этот способ ничего не делать?</p><p class="p1">– Сто гиней в год.</p><p class="p1">– И ты беспокоишь меня из-за такой безделицы?</p><p class="p1">– На эти деньги можно жить.</p><p class="p1">– Нищенски.</p><p class="p1">– Как и подобает таким людям, как я.</p><p class="p1">– Сто гиней! Ведь это ничто.</p><p class="p1">– Того, что вы проживаете в одну минуту, нам, мелкоте, хватит на год. В этом преимущество бедняков.</p><p class="p1">– Ты получишь это место.</p><p class="p1">Неделю спустя, благодаря желанию Джозианы и связям лорда Дэвида Дерри-Мойр, Баркильфедро, теперь окончательно спасенный, зажил на всем готовом, получая бесплатную квартиру и годовой оклад в сто гиней.</p></span></span></span></span>
