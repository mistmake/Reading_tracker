<span><span><span><p class="p1">Читатели, несомненно, не догадывались до сих пор, что мэтр Оливье был не кто иной, как тот страшный Фигаро, которого судьба, эта великая сочинительница драм, так искусно заставила играть роль в длинной кровавой комедии царствования Людовика XI. Мы не станем останавливаться здесь подробно на описании этой оригинальной личности. У этого королевского брадобрея было три имени. При дворе его из вежливости звали Оливье ле Дэн, в народе – Оливье Дьявол. Настоящее же его имя было Оливье Урод.</p><p class="p1">Оливье Урод стоял неподвижно, сердясь на короля, и косился на Жака Куаксье.</p><p class="p1">– Да, да, все врачу! – бормотал он сквозь зубы.</p><p class="p1">– Ну да, врачу! – повторил Людовик с необычайным добродушием. – Врач пользуется большим кредитом, чем ты. И это очень понятно. Он господин всей нашей особы, а ты держишь в своих руках только наш подбородок. Погоди, мой бедный брадобрей, и на твоей улице будет праздник. А что бы ты стал делать и на что бы тебе послужило твое ремесло, если бы я, как король Хильперик, имел привычку держаться за бороду рукою?.. Ну, куманек, принимайся за свои обязанности и выбрей меня. Принеси все, что нужно.</p><p class="p1">Оливье, видя, что король все обратил в шутку и что даже не было возможности рассердить его, отправился ворча исполнять его приказание. Король встал, подошел к окну и вдруг, распахнув его, в необычайном волнении воскликнул, захлопав в ладоши:</p><p class="p1">– О! Над городом зарево! Это горит дом председателя суда! Сомнений быть не может. Ах, мой добрый народ! Наконец-то ты поможешь мне уничтожить феодалов. – Обращаясь к фламандцам, он сказал: – Посмотрите, господа. Это зарево, не правда ли?</p><p class="p1">Оба гентца подошли.</p><p class="p1">– Сильный огонь! – сказал Гильом Рим.</p><p class="p1">– О, это напоминает мне сожжение дома сеньора д’Эмберкура! – прибавил Коппеноль, глаза которого вдруг сверкнули. – Восстание, должно быть, серьезное.</p><p class="p1">– Вы так думаете, мэтр Коппеноль? – Взгляд Людовика XI стал почти так же весел, как взгляд чулочника. – Трудно будет противиться ему!</p><p class="p1">– Клянусь Богом! Вашему величеству придется пожертвовать не одной ротой солдат…</p><p class="p1">– Ах, мне… Ну, это другое дело… Если б я захотел…</p><p class="p1">Чулочник смело продолжал:</p><p class="p1">– Если это восстание таково, как я предполагаю, то тут мало захотеть вашему величеству…</p><p class="p1">– Двух рот моего конвоя, кум, да одного залпа картечи будет достаточно, чтобы обуздать это мужичье, – ответил Людовик XI.</p><p class="p1">Чулочник, несмотря на знаки, которые ему делал Гильом Рим, по-видимому, решился не уступать королю:</p><p class="p1">– Государь, и швейцарцы были мужичье! Герцог Бургундский был знатный вельможа и с презрением относился к этой черни. В битве при Грансоне, государь, он кричал: «Канониры! стреляйте в этих негодяев!» – и клялся святым Георгием. Но Шарнахталь бросился на великолепного герцога со своей палицей и своим народом, и от натиска толстокожих мужиков блестящая бургундская армия разлетелась, как стекло от удара камнем. Немало рыцарей пало от руки крестьян, а сеньора Шато-Гюона, самого знатного вельможу Бургундии, нашли мертвым с его серой лошадью в небольшом болотце.</p><p class="p1">– Вы говорили, любезный, о битве, а тут бунт. Я с ним справлюсь, когда только мне вздумается нахмурить брови.</p><p class="p1">Коппеноль отвечал невозмутимо:</p><p class="p1">– Очень может быть, государь. Это будет означать, что час народа еще не наступил.</p><p class="p1">Гильом Рим счел нужным вмешаться:</p><p class="p1">– Мэтр Коппеноль, вы говорите с могущественным королем.</p><p class="p1">– Знаю, – серьезно отвечал чулочник.</p><p class="p1">– Пусть себе говорит, мой друг Рим, – сказал король. – Я люблю, когда говорят так свободно. Отец мой, Карл Седьмой, говорил, что правда больна. Я же думал, что она умерла и не нашла себе духовника. Мэтр Коппеноль доказал мне, что я ошибаюсь. – И, положив ласково руку на плечо Коппеноля, он обратился к нему: – Итак, мэтр Коппеноль, вы сказали…</p><p class="p1">– Я сказал, государь, что вы, быть может, правы, что час народа еще не пробил.</p><p class="p1">Людовик XI посмотрел на него своим проницательным взглядом:</p><p class="p1">– А когда этот час наступит, мэтр?</p><p class="p1">– Вы услышите бой часов.</p><p class="p1">– Каких часов, нельзя ли узнать?</p><p class="p1">Коппеноль со своей спокойной, безыскусственной сдержанностью подвел короля к окну.</p><p class="p1">– Послушайте, государь! Здесь есть башня, дозорная вышка, пушки, горожане, солдаты. Когда вышка ударит в набат, когда пушки загрохочут, когда башня рухнет со страшным шумом, когда горожане и солдаты с ревом начнут убивать друг друга, – это и будет бой часов.</p><p class="p1">Лицо Людовика омрачилось. Он задумался и несколько минут молчал, затем похлопал рукой, как ласкают круп коня, по толстой стене башни.</p><p class="p1">– Ну, нет, не так-то легко ты обрушишься, моя добрая Бастилия, – сказал он. И вдруг, обратившись резким движением к смелому фламандцу, спросил: – А вам, мэтр Жак, случалось видеть бунт?</p><p class="p1">– Я сам принимал в нем участие, – отвечал чулочник.</p><p class="p1">– Как же вы устраивали бунт? – спросил король.</p><p class="p1">– Ну, – ответил Коппеноль, – это дело нехитрое. На это есть сто способов. Прежде всего необходимо, чтоб в городе существовало недовольство. Это не редкость. Затем – характер жителей. Жителей Гента на бунт поднять нетрудно. Они всегда на стороне наследника, на стороне правителя – никогда. Так вот, скажем, в одно прекрасное утро в мою лавку входят и говорят: «Отец Коппеноль, так-то и так-то, Фландрия хочет спасти своих министров», или еще что-нибудь в этом роде, – это не важно. Я бросаю работу, выхожу из лавки на улицу и кричу: «Грабь!» Тут же всегда находится какая-нибудь бочка с выбитым дном. Я влезаю на нее и начинаю громко говорить все, что взбредет мне в голову, все, что у меня на сердце; а когда происходишь из народа, государь, на сердце всегда что-нибудь лежит. Люди собираются, кричат, бьют в набат, народ вооружается оружием, отобранным у солдат, к толпе присоединяются торговцы, и все двигаются в путь. И так будет всегда, до тех пор, пока будут сеньоры в поместьях, буржуа в городах, крестьяне в селениях.</p><p class="p1">– Против кого же вы бунтуете? – спросил король. – Против ваших судей? Против ваших сеньоров?</p><p class="p1">– Иногда. Это – смотря по обстоятельствам. Иногда и против герцогов.</p><p class="p1">Людовик XI снова сел и сказал, улыбаясь:</p><p class="p1">– У нас пока принимаются еще только за судей.</p><p class="p1">В эту минуту вернулся Оливье ле Дэн в сопровождении двух пажей, несших принадлежности королевского туалета. Но короля поразило то, что вместе с ним появились парижский префект и начальник ночной стражи, по-видимому сильно перепуганные. У коварного брадобрея вид был тоже перепуганный, но вместе с тем на лице его проглядывало злорадство. Он заговорил первый:</p><p class="p1">– Государь, я прошу ваше величество простить меня за печальную новость, которую я вам приношу.</p><p class="p1">Король быстро повернулся, царапая ножками кресла циновки на полу.</p><p class="p1">– Что такое?</p><p class="p1">– Государь, – начал Оливье с злобным выражением человека, радующегося, что может нанести жестокий удар, – народ восстал не против председателя суда…</p><p class="p1">– Против кого же?</p><p class="p1">– Против вас, государь!</p><p class="p1">Старый король вскочил и выпрямился во весь рост, как юноша.</p><p class="p1">– Говори ясней, Оливье! Говори ясней! Да смотри, обдумай свои слова, куманек, клянусь крестом святого Лоо, что если ты солжешь нам сегодня, то окажется, что шпага, отрубившая голову герцогу Люксембургскому, еще не настолько притупилась, чтоб не снести голову тебе!</p><p class="p1">Клятва была ужасна. Людовик XI только два раза в жизни поклялся крестом святого Лоо. Оливье пытался ответить:</p><p class="p1">– Государь…</p><p class="p1">– На колени! – резко перебил его король. – Тристан, не выпускай из виду этого человека!..</p><p class="p1">Оливье стал на колени и продолжал холодно:</p><p class="p1">– Государь, парламентский суд приговорил к смерти колдунью. Она спаслась в соборе Богоматери. Народ хочет силой вывести ее оттуда. Господин префект и начальник ночной стражи, только что пришедшие оттуда, могут подтвердить, правду ли я говорю. Чернь осаждает собор Богоматери.</p><p class="p1">– Вот как! – тихо проговорил король, весь побледнев и дрожа от гнева. – Они нападают на нашу покровительницу, Пресвятую Деву, в ее соборе… Встань, Оливье! Ты прав. Место Симона Радена за тобой… Ты прав: нападают на меня. Колдунья находится под охраной церкви, а церковь – под моей! А я-то думал, что взбунтовались против председателя суда! Оказывается – против меня…</p><p class="p1">Помолодев от ярости, он стал ходить по комнате большими шагами. Он уже не смеялся, он был ужасен, он бегал взад и вперед. Лисица превратилась в гиену. Он задыхался так, что не мог говорить; его губы шевелились, костлявые кулаки сжимались. Вдруг он поднял голову; впалые глаза его сверкали, а голос звенел, как рожок:</p><p class="p1">– Бей их, Тристан! Бей этих негодяев! Иди, Тристан, иди, мой друг! Бей их! Бей!</p><p class="p1">После этой вспышки он снова уселся и сказал с холодным, сосредоточенным бешенством:</p><p class="p1">– Поди сюда, Тристан… Здесь, в Бастилии, у нас под рукой триста всадников виконта де Жифа – возьми их. Здесь также рота стрелков нашего конвоя под начальством Шатопера – возьми и их. Ты начальник кузнецов, у тебя есть члены твоего цеха – захвати и их. В отеле Сен-Поль застанешь сорок стрелков новой гвардии дофина – возьми их и со всеми этими силами скорей к собору. Ах, парижские бродяги, вы смеете посягать на французскую корону, на святость Богоматери, на мир нашего государства! Тристан, уничтожай их! А кто останется жив, того на Монфокон!</p><p class="p1">Тристан поклонился:</p><p class="p1">– Повинуюсь, государь.</p><p class="p1">Помолчав, он прибавил:</p><p class="p1">– А что делать с колдуньей?</p><p class="p1">Король призадумался:</p><p class="p1">– С колдуньей?.. Господин д’Эстувиль, что хотел с ней сделать народ?</p><p class="p1">– Мне думается, государь, что раз народ пытается взять ее из собора, где она нашла убежище, значит, ее безнаказанность возмущает его, и он хочет ее повесить.</p><p class="p1">Король, казалось, глубоко задумался, а затем обратился к Тристану:</p><p class="p1">– Ну, что же, кум, перебей народ, а колдунью повесь!</p><p class="p1">– Вот это мне нравится, – шепотом сказал Рим Коппенолю, – наказывать народ за намерение и делать то, что он хочет.</p><p class="p1">– Слушаю, государь, – ответил Тристан. – А если колдунья еще в соборе Богоматери, взять ее оттуда, несмотря на право убежища?</p><p class="p1">– Да, клянусь Пасхой, право убежища! – сказал король, почесывая за ухом. – А между тем эту женщину необходимо повесить.</p><p class="p1">И, словно охваченный внезапной идеей, он бросился на колени перед креслом, снял шапку, положил на сиденье и, набожно смотря на одну из свинцовых фигурок, украшавших шапку, начал молиться, сложив руки:</p><p class="p1">– Прости меня, Парижская Богоматерь, моя милостивая покровительница! Никогда больше я не стану делать этого. Надо покарать эту преступницу. Уверяю тебя, Пресвятая Дева, моя владычица, что эта колдунья недостойна твоего милостивого заступничества. Тебе известно, что многие благочестивые государи преступали церковные привилегии во имя славы Божией и государственной необходимости. Святой Гюг, епископ Английский, разрешил королю Эдуарду взять колдуна из его церкви. Святой Людовик Французский, мой покровитель, во имя того же нарушил неприкосновенность храма Святого Павла, а Альфонс, сын короля иерусалимского, – даже неприкосновенность Гроба Господня. Прости же меня на этот раз, Парижская Богоматерь. Впредь я не буду делать этого и пожертвую тебе прекрасную серебряную статую – такую же, какую в прошедшем году принес в дар церкви Богоматери в Экуане. Аминь.</p><p class="p1">Он перекрестился, встал, снова надел шапку и сказал Тристану:</p><p class="p1">– Не медли, кум. Возьми с собой господина де Шатопера. Пусть ударят в набат. Раздави чернь, повесь колдунью. Я сказал, и я хочу, чтобы казнь была совершена тобой. Ты отдашь мне потом в ней отчет… Идем, Оливье, я не лягу сегодня… Брей меня.</p><p class="p1">Тристан поклонился и вышел. Тогда король жестом отпустил Рима и Коппеноля.</p><p class="p1">– Да хранит вас Бог, верные друзья мои, господа фламандцы. Ступайте отдохните. Уж поздно; время ближе к утру, чем к вечеру.</p><p class="p1">Оба откланялись, и по дороге в свои комнаты, куда их повел комендант Бастилии, Коппеноль говорил Риму:</p><p class="p1">– Гм… Надоел мне этот кашляющий король. Мне приходилось видеть пьяного Карла Бургундского. Но он не был так зол, как больной Людовик Одиннадцатый.</p><p class="p1">– Это оттого, мэтр Жак, – отвечал Рим, – что королей вино ожесточает меньше, чем лекарство.</p></span><span id="id66"><div class="title6">
<p class="p">VI. «Огонек горит»</p>
</div><p class="p1">Выйдя из Бастилии, Гренгуар пустился бежать вниз по улице Святого Антония с прытью понесшей лошади. Добежав до ворот Бодуйе, он направился прямо к каменному кресту, стоявшему посреди площади, словно различив в темноте фигуру человека, одетого в черный плащ с капюшоном и сидевшего на ступенях у подножия креста.</p><p class="p1">– Это вы, учитель? – спросил Гренгуар.</p><p class="p1">Черная фигура поднялась.</p><p class="p1">– Проклятье! Я сгорел от нетерпения, Гренгуар. Сторож с башни Сен-Жерве прокричал половину второго пополуночи.</p><p class="p1">– О, это не моя вина, – сказал Гренгуар, – виновата королевская ночная стража. Мне, однако, счастливо удалось отделаться. Я опять чуть-чуть было не попал на виселицу. Такова, видно, моя судьба.</p><p class="p1">– У тебя всегда все выходит «чуть-чуть не». Ну, пойдем скорей. Знаешь пароль?</p><p class="p1">– Представьте себе, учитель, я видел короля. Я прямехонько от него. На нем бумазейные штаны. Это целое приключение!..</p><p class="p1">– О, какой ты болтун! Какое мне дело до твоего приключения! Ты узнал пароль бродяг?</p><p class="p1">– Узнал, не беспокойтесь: «Огонек горит».</p><p class="p1">– Хорошо. Иначе нам не добраться до церкви. Бродяги преградили доступ со всех улиц. Но, кажется, к счастью, они натолкнулись на препятствие. Мы еще, может быть, поспеем вовремя.</p><p class="p1">– Поспеем, учитель. А только как же мы пройдем в собор?</p><p class="p1">– У меня ключи от башен.</p><p class="p1">– А как выйдем?</p><p class="p1">– Позади монастыря есть дверца, выходящая во двор, а оттуда к реке. Я захватил ключ от этой дверцы и с утра заготовил лодку.</p><p class="p1">– Меня, право, чуть было не повесили! – снова сказал Гренгуар.</p><p class="p1">– Ну скорей, иди! – ответил второй.</p><p class="p1">Оба быстрыми шагами направились к Сите.</p></span><span id="id67"><div class="title6">
<p class="p">VII. «Шатопер, выручай!»</p>
</div><p class="p1">Читатель, может быть, помнит, в каком критическом положении мы оставили Квазимодо. Храбрый глухой, осажденный со всех сторон, потерял если не всякое мужество, то, по крайней мере, всякую надежду спасти – не себя: он и не думал о себе, – но цыганку. Он в отчаянии бегал по галерее. Еще несколько минут, и собор очутится в руках бродяг. Вдруг в соседних улицах послышался лошадиный топот; на площади показался длинный ряд факелов и густая колонна всадников, скакавших с пиками наперевес; на площадь, как ураган, обрушились шум и крики: «Франция! Франция! Кроши мужиков! Шатопер, выручай! За прево! За прево!» Испуганные бродяги повернулись лицом к всадникам. Квазимодо, не слыша ничего, увидал обнаженные шпаги, факелы, наконечники пик всадников, во главе которых узнал капитана Феба, увидал смятение бродяг, испуг одних и смущение наиболее храбрых и почерпнул в неожиданно подоспевшей помощи столько новой силы, что сбросил со стен церкви уже вступавших было на галерею осаждающих.</p><p class="p1">То действительно прискакали королевские отряды. Бродяги встретили их храбро. Они защищались отчаянно. Захваченные сбоку, со стороны улицы Сен-Пьер-о-Беф, и с тылу, через улицу Парви, притиснутые к фасаду собора, который они осаждали и который защищал Квазимодо, играя двойную роль осаждающих и осажденных, бродяги находились в таком же оригинальном положении, в каком впоследствии, в 1640 году, очутился граф Генрих д’Аркур между принцем Фомой Савойским, которого он осаждал, и маркизом Леганез, который блокировал его. Taurinum obsessor idem et obsessus<a href="ch2.xhtml#id89" class="a">[148]</a>, как гласит его надгробная надпись.</p><p class="p1">Произошла ужасная схватка. «В волчью шкуру – собачьи зубы», – как говорит Матье. Королевские войска, среди которых отличался своей храбростью Феб Шатопер, не щадили никого; они кололи и рубили направо и налево. Плохо вооруженные бродяги кусались с пеной у рта. Мужчины, женщины, дети бросались на лошадей спереди и сзади и вцеплялись в них зубами и ногтями рук и ног. Другие совали факелы в лицо всадникам. Третьи крючьями захватывали всадников за шею, стаскивали с лошадей и терзали упавших. Особенно выделялся один из бродяг, долго подкашивавший огромной сверкающей косой ноги лошадей. Он был ужасен. Гнусаво распевая песню, он без остановки взмахивал своей косой. При каждом взмахе вокруг него ложился круг срезанных членов. Спокойно и медленно покачивая головой и дыша глубоко и ровно, точно косец, скашивающий поле пшеницы, он подвигался к самому центру конницы. Это был Клопен Труйльфу. Выстрел из арбалета уложил его наповал.</p><p class="p1">Между тем окна в домах снова начали отворяться. Жители окрестных домов, услыхав боевой крик королевских солдат, вмешались в дело, и со всех этажей на бродяг посыпались пули. Густой дым, пронизываемый огненной полосой мушкетных выстрелов, окутал всю площадь. Через нее с трудом можно было различить фасад собора Богоматери и старинного здания больницы Отель-Дьё, крыша которого была усеяна слуховыми окнами, откуда тут и там высовывались истощенные лица больных.</p><p class="p1">Наконец бродяги уступили. Усталость, недостаток в хорошем оружии, неожиданность нападения, огонь, открытый из окон, храбрый натиск королевских войск – все это сломило их. Они прорвались через цепь осаждающих и пустились бежать по всем направлениям, оставив на площади массу убитых.</p><p class="p1">Увидев бегство врагов, Квазимодо, ни на минуту не перестававший обороняться, упал на колени и простер руки к небу. Затем, опьянев от радости, он с быстротой птицы помчался в келью, вход в которую так храбро защищал. У него была одна только мысль: преклонить колени перед той, которую он сегодня спас во второй раз.</p><p class="p1">Войдя в келью, он увидал, что она пуста.</p></span></span></span>
