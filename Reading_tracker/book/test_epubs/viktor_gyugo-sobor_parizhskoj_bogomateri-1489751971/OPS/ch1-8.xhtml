<p class="p">IV. Мэтр Жак Коппеноль</p>
</div><p class="p1">В то время как пенсионарий города Гента и его преосвященство обменивались низкими поклонами и произносимыми вполголоса любезностями, какой-то человек высокого роста, с широким лицом и могучими плечами выступил вперед, чтобы войти одновременно с Гильомом Римом. Он напоминал бульдога, пробирающегося за лисицей. Его войлочная шапка и кожаная куртка казались пятном среди бархатных и шелковых одежд. Привратник, полагая, что это конюх, зашедший сюда по ошибке, заступил ему дорогу.</p><p class="p1">– Постой, любезный, – сказал он, – здесь входа нет!</p><p class="p1">Человек в кожаной куртке оттолкнул его плечом.</p><p class="p1">– Что нужно этому болвану? – воскликнул он таким громким голосом, что весь зал встрепенулся и стал слушать. – Разве ты не видишь, что и я принадлежу к посольству?</p><p class="p1">– Ваше имя? – спросил привратник.</p><p class="p1">– Жак Коппеноль.</p><p class="p1">– Звание?</p><p class="p1">– Чулочник в Генте, под вывеской «Три цепочки».</p><p class="p1">Привратник попятился. Докладывать о старшинах и бургомистрах еще куда ни шло, но о чулочнике – это уж слишком. Кардинал был как на иголках. Народ слушал и смотрел. Вот уже два дня, как его преосвященство старался по мере сил отшлифовать этих фламандских медведей, чтобы сделать их более представительными в обществе, и теперь все было испорчено.</p><p class="p1">Между тем Гильом Рим подошел к привратнику и со своей лукавой улыбкой вполголоса сказал ему:</p><p class="p1">– Доложите: мэтр Жак Коппеноль, клерк совета старшин города Гента.</p><p class="p1">– Привратник, – громко повторил кардинал, – доложите: мэтр Жак Коппеноль, клерк старшин славного города Гента.</p><p class="p1">Это была ошибка. Гильом Рим, действуя осторожно и незаметно, наверное, уладил бы дело; теперь же Коппеноль услыхал слова кардинала.</p><p class="p1">– Нет, черт побери! – воскликнул он своим громовым голосом. – Доложи: Жак Коппеноль, чулочник. Слышишь? Только это – ни больше ни меньше. Черт возьми! Чулочник – что же в этом зазорного! Да сам эрцгерцог не раз искал свою перчатку в моем товаре.</p><p class="p1">Раздался взрыв хохота и рукоплесканий. В Париже сейчас же поймут шутку и оценят ее по достоинству. Да к тому же Коппеноль был из народа, как и вся публика в зале. Благодаря этому сближение между ним и зрителями произошло мгновенно. Гордая выходка фламандского чулочника, оскорбив придворных, пробудила в душе всех плебеев чувство собственного достоинства, еще смутное и подсознательное в пятнадцатом веке. Этот Коппеноль, равный им по происхождению, не уступил кардиналу. И это было очень приятно жалким беднякам, привыкшим относиться с глубоким уважением и покорностью даже к слугам сержанта судьи аббатства Святой Женевьевы, потому что этот судья был шлейфоносцем кардинала.</p><p class="p1">Коппеноль гордо поклонился кардиналу, и тот вежливо ответил на поклон всемогущего горожанина, которого боялся даже Людовик XI. Гильом Рим, этот «умный и хитрый человек», по выражению Филиппа Коммина, с улыбкой насмешки и превосходства следил за ними в то время, как они возвращались на свои места. Кардинал был смущен и озабочен; Коппеноль смотрел спокойно и гордо. Он, наверное, раздумывал теперь о том, что его звание торговца, в конце концов, не хуже любого другого титула и что Мария Бургундская, мать той самой Маргариты, которую он приехал сюда сватать, гораздо меньше боялась бы его, если бы он был кардиналом, а не торговцем. Не кардинал взбунтовал жителей Гента против фаворитов дочери Карла Смелого; не кардинал убедил толпу выполнить свое намерение, несмотря на мольбы и слезы принцессы фландрской, пришедшей к подножию эшафота и умолявшей народ пощадить ее любимцев. Чулочнику стоило только шевельнуть рукой, чтобы с плахи скатились головы двух светлейших сановников, Ги Эмберкура и канцлера Вильгельма Гугоне!</p><p class="p1">Однако бедного кардинала ждала еще одна неприятность. Он попал в дурное общество, и ему пришлось испить горькую чашу до дна.</p><p class="p1">Читатель, может быть, не забыл дерзкого нищего, который, как только начался пролог, взобрался на край кардинальской эстрады. Прибытие высоких гостей не заставило Клопена спуститься вниз, и в то время как прелаты и посланники, набившись на эстраду, как настоящие фламандские сельди в бочонок, усаживались на свои места, он преспокойно скрестил ноги на карнизе. Сначала никто не заметил этой дерзости, так как все были заняты другим. А Клопен, со своей стороны, не обращал никакого внимания на то, что делалось в зале. Он с беззаботностью неаполитанца покачивал головою и время от времени, несмотря на шум, начинал по привычке тянуть: «Подайте Христа ради!» И без всякого сомнения, только он один из всего собрания не удостоил повернуть голову, когда Коппеноль заспорил с привратником. Гентский чулочник, уже успевший заслужить сочувствие всего зала, прошел в первый ряд и случайно сел как раз над тем местом, где приютился нищий. Каково же было всеобщее удивление, когда фламандский посол, пристально вглядевшись в нищего, дружески хлопнул его по плечу, покрытому лохмотьями! Клопен обернулся, с изумлением взглянул на посла и, по-видимому, узнал его, так как лица их обоих просветлели. Потом, не обращая никакого внимания на устремленные на них со всех сторон взгляды, чулочник и нищий начали тихонько разговаривать, держа друг друга за руки, причем лохмотья Клопена Труйльфу на обтянутой золотой парчой эстраде казались гусеницей, вползшей на апельсин.</p><p class="p1">Эта неожиданная сцена вызвала такой смех и такое безудержное веселье в публике, что кардинал не мог этого не заметить. Он наклонился, но так как с его места были только чуть-чуть видны лохмотья Труйльфу, то ему, естественно, пришло в голову, что нищий выпрашивает милостыню.</p><p class="p1">– Господин дворцовый старшина! – воскликнул он, возмущенный такою наглостью. – Велите-ка бросить этого негодяя в реку!</p><p class="p1">– Помилосердствуйте, ваше преосвященство! – сказал Коппеноль, не выпуская руки Клопена. – Это мой друг!</p><p class="p1">– Браво! Браво! – закричала толпа.</p><p class="p1">С этой минуты мэтр Коппеноль в Париже, как и в Генте, вошел «в большое доверие у народа, так как люди такого покроя, – говорит Филипп де Коммин, – входят у народа в доверие, когда они держат себя столь бесцеремонно».</p><p class="p1">Кардинал закусил губу и, наклонившись к своему соседу, аббату Святой Женевьевы, вполголоса сказал:</p><p class="p1">– Удивительных, однако, послов отправил к нам эрцгерцог, чтобы возвестить о прибытии принцессы Маргариты.</p><p class="p1">– Вы, ваше преосвященство, чересчур любезны с этими фламандскими свиньями. Margaritam ante porcos<a href="ch2.xhtml#id104" class="a">[23]</a>.</p><p class="p1">– А не лучше ли так: Porcos ante Margaritam?<a href="ch2.xhtml#id103" class="a">[24]</a> – с улыбкой сказал кардинал.</p><p class="p1">Вся свита в сутанах пришла в восторг от такой игры слов. Это несколько утешило кардинала. Он рассчитался с Коппенолем – его шутка тоже имела успех.</p><p class="p1">Теперь мы позволим себе спросить тех из наших читателей, которые умеют обобщать образы и идеи, вполне ли ясно представляют они себе, какое зрелище являл громадный параллелограмм зала в тот момент, о котором идет речь.</p><p class="p1">Посреди западной стены возвышается великолепная, обтянутая золотой парчой эстрада; через маленькую стрельчатую дверь на нее входят один за другим важные посетители, о которых докладывает резким голосом привратник. На передних скамьях уже разместились разодетые в шелк и бархат послы. На эстраде все тихо и чинно, а по обе ее стороны и прямо перед ней шумит и волнуется внизу громадная толпа. Тысячи глаз устремлены на каждого входящего на эстраду, тысячи уст повторяют шепотом его имя. Зрелище действительно очень любопытное и вполне заслуживающее внимания публики. Но что же это там, в самом конце зала? Что это за подмостки, на которых кривляются четыре пестро одетые фигуры? Кто этот бледный человек в потертой одежде, стоящий около подмостков? Увы, любезный читатель, – это Пьер Гренгуар и его пролог.</p><p class="p1">Мы совсем было забыли о нем.</p><p class="p1">А именно этого-то он и боялся.</p><p class="p1">С той минуты, как на эстраду вошел кардинал, Гренгуар не переставал тревожиться за судьбу своего пролога. Увидев, что актеры нерешительно остановились, он велел было им продолжать и говорить громче; потом, видя, что никто не слушает, остановил их и в продолжение четверти часа, пока продолжался перерыв, метался из стороны в сторону, топал ногами, просил Жискету и Лиенарду убеждать своих соседей требовать продолжения пролога. Напрасный труд. Все не отрывая глаз смотрели на кардинала, посланников и эстраду. Полагаем – к сожалению, приходится это признать, – что пролог успел уже порядочно надоесть публике к тому времени, как его прервал кардинал. Да к тому же и на эстраде, и на мраморном помосте разыгрывался один и тот же спектакль: борьба между Крестьянством и Духовенством, Купечеством и Дворянством. И большинству было гораздо приятнее, волнуясь и толкая друг друга, смотреть на ту сцену, где это столкновение между сословиями происходило на самом деле, где действовали и боролись настоящие представители этих сословий в лице фламандских послов, духовной свиты кардинала, самого кардинала в его мантии и Коппеноля в его одеянии, чем слушать актеров, нарумяненных, декламирующих стихи и в известном смысле похожих на чучел в своих белых и желтых туниках, в которые их нарядил Гренгуар.</p><p class="p1">Однако к тому времени, как шум немножко стих, наш поэт придумал средство, которое, по его мнению, могло спасти все.</p><p class="p1">– Сударь, – обратился он к одному из своих соседей, толстяку с добродушным лицом, – а что, если бы начать снова?</p><p class="p1">– Что? – спросил тот.</p><p class="p1">– Что? Да, конечно, мистерию, – ответил Гренгуар.</p><p class="p1">– Как знаете, – отвечал сосед.</p><p class="p1">Этого далеко не полного одобрения оказалось вполне достаточно для Гренгуара. Он вмешался в толпу и начал кричать как можно громче:</p><p class="p1">– Начинайте мистерию сначала! Начинайте сначала!</p><p class="p1">– Черт возьми! – воскликнул Жан де Молендино. – С чего это они так разорались на том конце? (Гренгуар шумел и кричал за четверых.) Послушайте, братцы, ведь мистерия окончена? А они хотят начинать ее сначала. Это несправедливо!</p><p class="p1">– Несправедливо! Несправедливо! – закричали студенты. – Долой мистерию! Долой!</p><p class="p1">Но Гренгуар не сдался и начал кричать еще громче:</p><p class="p1">– Начинайте! Начинайте!</p><p class="p1">Эти крики привлекли внимание кардинала.</p><p class="p1">– Господин дворцовый судья, – обратился он к высокому человеку в черной одежде, стоявшему в нескольких шагах от него, – что эти бездельники подняли за возню, точно бес перед заутреней?</p><p class="p1">Дворцовый судья принадлежал, если можно так выразиться, к семейству амфибий и был чем-то вроде летучей мыши судебного сословия, не то крысой, не то птицей, судьей и вместе с тем солдатом.</p><p class="p1">Он подошел к его преосвященству и, боясь возбудить его неудовольствие и заикаясь от страха, объяснил ему, в чем дело. Полдень наступил до прибытия его преосвященства, народ начал волноваться и требовать, чтобы начинали представление, а потому актеры вынуждены были начать, не дожидаясь его преосвященства.</p><p class="p1">Кардинал расхохотался.</p><p class="p1">– Клянусь честью, – воскликнул он, – и ректору университета не мешало бы поступить так же. Как вы полагаете, мэтр Гильом Рим?</p><p class="p1">– Ваше преосвященство, – отвечал Рим, – будем довольны и тем, что пропустили хотя половину комедии. Во всяком случае, мы в выигрыше.</p><p class="p1">– Дозволит ли ваше преосвященство продолжать представление? – спросил судья.</p><p class="p1">– Продолжайте, продолжайте – мне все равно. Я пока почитаю мой требник.</p><p class="p1">Судья подошел к краю эстрады и, подняв руку, чтобы водворить тишину, закричал:</p><p class="p1">– Горожане, крестьяне и жители новых городов! Чтобы удовлетворить тех, кто желает слушать с самого начала, и тех, кто не желает слушать совсем, его преосвященство приказывает продолжать представление.</p><p class="p1">Обе стороны принуждены были покориться. Но ни автор, ни зрители не были довольны решением кардинала и долго не могли простить ему этого.</p><p class="p1">Актеры снова принялись декламировать стихи, и Гренгуар надеялся, что хоть конец его произведения будет выслушан внимательно. Но и эта надежда оказалась, как водится, обманчивой. Тишина действительно мало-помалу водворилась в зале, но Гренгуар не заметил, что эстрада была далеко не полна в ту минуту, как кардинал велел продолжать представление, вслед за фламандскими послами стали появляться все новые лица из их свиты. Имена и титулы новоприбывших, выкликаемые пронзительным голосом привратника, врывались совсем некстати в диалог актеров. Пусть читатель представит себе, что во время театрального представления раздаются между двумя строфами и даже отдельными стихами такие возгласы:</p><p class="p1">– Мэтр Жак Шармолю, королевский прокурор духовного суда!</p><p class="p1">– Жеан де Гарлэ, начальник ночной стражи города Парижа!</p><p class="p1">– Мессир Галио де Женуалак, рыцарь!</p><p class="p1">– Сеньор де Брюссак, начальник королевской артиллерии!</p><p class="p1">– Мэтр Дрэ-Рагье, смотритель королевских лесов, вод и земель во Франции, Шампани и Бри!</p><p class="p1">– Мессир Луи де Гравиль, рыцарь, советник и стольник короля, адмирал Франции, страж Венсенского леса!</p><p class="p1">– Мессир Дени ле Мерсье, начальник Дома слепых в Париже!</p><p class="p1">И т. д. и т. д.</p><p class="p1">Это становилось невыносимым.</p><p class="p1">Такой странный аккомпанемент, из-за которого не было никакой возможности следить за ходом пьесы, тем более возмущал Гренгуара, что занимательность его мистерии, как он думал, постепенно возрастала и его произведению недоставало лишь одного – внимания слушателей.</p><p class="p1">И действительно, трудно было представить себе более остроумный и драматический сюжет. Четыре действующих лица пролога разливались в жалобах на свое затруднительное положение, как вдруг сама Венера, vera, incessu patuit dea<a href="ch2.xhtml#id101" class="a">[25]</a>, в красивой одежде с гербом Парижа, предстала перед ними. Она сама пришла за дельфином, обещанным прекраснейшей из женщин. Юпитер, громы которого гремели в одевальной, очевидно, настаивал на исполнении ее требования, и богиня уже готова была завладеть дельфином, или, иначе говоря, выйти замуж за дофина, когда совсем молоденькая девушка в белом шелковом платье и с маргариткой в руке (прозрачный намек на Маргариту Фландрскую) явилась оспаривать его у Венеры. Театральный эффект и неожиданная перемена. После долгого состязания Венера, Маргарита и все остальные решили обратиться к суду Девы Марии. В пьесе была еще одна прекрасная роль – короля Месопотамии, дона Педро. Но, вследствие постоянных перерывов, трудно было сообразить, зачем, собственно, понадобился этот король. И все они взбирались на сцену по лестнице.</p><p class="p1">Но, к сожалению, публика не поняла и не оценила ни одной из красот пьесы. Казалось, с прибытием кардинала какая-то невидимая волшебная нить притянула все взоры от мраморного стола к эстраде, от южной стены залы – к западной. И ничто не могло разрушить очарования. Все глаза были устремлены на эстраду, и вновь прибывшие лица, их проклятые имена, их наружность и костюмы непрерывно отвлекали внимание.</p><p class="p1">Это было ужасно. Кроме Жискеты и Лиенарды, которые на минуту оборачивались к сцене, когда Гренгуар дергал их за платья, и терпеливого толстяка, его соседа, положительно никто не слушал и не смотрел на представление бедной покинутой моралите. Гренгуар, оборачиваясь взглянуть на зрителей, видел только профили.</p><p class="p1">С какой горечью смотрел он, как рушится мало-помалу возведенное им здание поэзии и славы! Рушится из-за невнимания тех самых людей, которые так нетерпеливо желали услыхать его произведение, что начали даже угрожать судье. А теперь, когда желание их исполнилось, они не обращали никакого внимания на пьесу, которая началась при таких единодушных рукоплесканиях. Вечный прилив и отлив благосклонности толпы. И подумать только, что эта же самая толпа чуть не повесила сержантов судьи! О, как ему хотелось бы пережить опять эти блаженные минуты!</p><p class="p1">Нестерпимые выкрики привратника наконец прекратились. Все уже собрались, и Гренгуар мог наконец свободно вздохнуть. Актеры тоже ободрились, и все шло прекрасно, как вдруг Коппеноль встал и среди всеобщего внимания произнес возмутительную речь:</p><p class="p1">– Господа горожане и дворяне Парижа! Клянусь Богом, я не понимаю, что мы делаем здесь. Я вижу вон в том углу, на подмостках, каких-то людей, которые как будто собираются драться. Не знаю, может быть, это и называется по-вашему мистерией, но, по-моему, тут нет ничего забавного. Они только ссорятся, и больше ничего. Вот уже четверть часа, как я жду первого удара, а они все не начинают драться. Это просто трусы – они бьют друг друга не кулаками, а словами. Вам следовало бы послать за бойцами в Лондон или Роттердам. Они показали бы вам, как следует драться; даже на площади слышны были бы их удары. А это какие-то жалкие актеры. Хоть бы они проплясали мавританский танец или придумали еще что-нибудь забавное. Да, это совсем не то, чего я ожидал. Мне сказали, что здесь будет праздник шутов и станут выбирать папу. У нас в Генте тоже выбирают папу шутов, – в этом мы не отстали от других. Вот как это бывает у нас. Мы собираемся целой толпой, как и вы здесь. Потом каждый по очереди просовывает голову в какое-нибудь отверстие и делает самую ужасную гримасу, какую только может. И тот, чья гримаса выйдет, по мнению публики, страшнее всех остальных, выбирается папой. Это очень забавно. Хотите выбрать сегодня папу по-нашему? Ручаюсь, что это, во всяком случае, будет веселее, чем слушать этих болтунов. Если они хотят, мы, пожалуй, примем в игру и их. Что вы скажете на это, господа горожане? Здесь, в зале, найдется достаточно безобразных лиц – и женских и мужских. Значит, есть надежда, что мы увидим вдоволь забавных гримас и повеселимся по-фламандски.</p><p class="p1">Гренгуар хотел было возразить на эту речь, но от изумления, негодования и гнева не мог произнести ни слова. К тому же предложение Коппеноля было с таким восторгом принято горожанами, польщенными титулом «дворян», что нечего было и думать о сопротивлении. Оставалось только покориться судьбе. И бедный Гренгуар закрыл лицо руками. У него, к сожалению, не было плаща, который он мог бы набросить себе на голову, как Агамемнон Тиманта.</p></span></span></span>
