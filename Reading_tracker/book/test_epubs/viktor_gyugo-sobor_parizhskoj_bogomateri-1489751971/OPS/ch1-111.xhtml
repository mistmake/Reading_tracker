<p class="p">4. Палата лордов в старину</p>
</div><p class="p1">Вся церемония посвящения Гуинплена в звание пэра и введения в палату лордов, начиная со въезда в Королевские ворота и кончая торжественным отречением от католических догматов в стеклянной ротонде, происходила в полутьме.</p><p class="p1">Лорд Вильям Коупер не допустил, чтобы ему, канцлеру Англии, слишком подробно докладывали об уродстве молодого лорда Фермена Кленчарли; он находил ниже своего достоинства знать, что пэр может быть некрасивым, и счел бы себя оскорбленным дерзостью подчиненного, который отважился бы сообщить ему такого рода сведения. Без сомнения, какой-нибудь простолюдин скажет с особенным злорадством: «А ведь принц-то горбат». Поэтому уродство оскорбительно для лорда. Когда королева Анна мельком упомянула о наружности Гуинплена, лорд-канцлер ограничился тем, что заметил; «Красота вельможи – в его знатности». Но в общем из ее слов и из протоколов, которые пришлось проверить и засвидетельствовать, он понял все. Потому-то он и принял некоторые предосторожности.</p><p class="p1">Лицо нового лорда при его вступлении в палату могло произвести нежелательное впечатление. Это нужно было как-то предотвратить. Лорд-канцлер принял некоторые меры. Как можно меньше неприятных происшествий – таково упорное стремление и неизменное правило поведения всех сановных лиц. Отвращение к скандалам – неотъемлемая черта всякой важной персоны. Необходимо было позаботиться о том, чтобы представление Гуинплена произошло без осложнений, подобно тому как происходит представление любого наследника пэрства.</p><p class="p1">Вот почему лорд-канцлер назначил эту церемонию на вечер. Канцлер, будучи как бы привратником, quodammodo ostiarius, как говорится в нормандских хартиях, или j’anuarum cancellorumque potestas<a href="ch2.xhtml#id153" class="a">[269]</a>, по выражению Тертуллиана, может исполнять свои обязанности не только в самой палате, но и в преддверии ее; лорд Вильям Коупер воспользовался этим правом и выполнил все формальности посвящения лорда Фермена Кленчарли в стеклянной ротонде. Кроме того, он назначил церемонию на ранний час, чтобы новый пэр вступил в палату еще до начала вечернего заседания.</p><p class="p1">Что касается возведения в пэрское достоинство вне парламентского зала, то примеры этому бывали и прежде. Так, первый наследственный барон Джон Бошан из Холт-Касла, получивший в 1387 году от Ричарда II титул барона Киддерминстера, был принят в палату именно таким образом.</p><p class="p1">Впрочем, последовав этому примеру, лорд-канцлер сам поставил себя в затруднительное положение, все неудобства которого он понял только два года спустя, при вступлении в палату лордов виконта Ньюхевена.</p><p class="p1">Благодаря своей близорукости, о которой мы уже упоминали, лорд Вильям Коупер почти не заметил уродства Гуинплена; лорды же восприемники также не разглядели его: оба они были почти совершенно слепы от старости.</p><p class="p1">Потому-то лорд-канцлер и остановил на них свой выбор.</p><p class="p1">Мало того, лорд-канцлер, видевший только фигуру и осанку Гуинплена, нашел, что он весьма представителен.</p><p class="p1">В ту минуту, когда оба привратника распахнули перед Гуинпленом двустворчатую дверь, в зале находилось лишь несколько лордов: почти все они были стариками. Старики так же аккуратно являются на собрание, как усердно ухаживают за молодыми женщинами. На скамье герцогов были только два герцога. Один, белый как лунь, – Томас Осборн, герцог Лидс, другой, с проседью, – Шонберг, сын того Шонберга, который, будучи немцем по происхождению, французом по маршальскому жезлу и англичанином по пэрству, воевал сначала как француз против Англии, а затем, изгнанный Нантским эдиктом, стал воевать уже как англичанин против Франции. На скамье князей церкви в верхнем углу сидел лишь архиепископ Кентерберийский, старшая духовная особа Англии, а внизу – доктор Саймон Патрик, епископ Илийский, беседовавший с Эвелином Пирпонтом, маркизом Дорчестером, который объяснял ему разницу между габионом и куртином, между палисадами и штурмфалами; палисады представляли собой ряд столбов, водруженных перед палатками, и предназначались для защиты лагеря, штурмфалами же назывался ряд остроконечных кольев перед крепостным валом, преграждавший доступ осаждающим и не позволявший бежать осажденным; маркиз объяснял епископу, как обносят этими кольями редут, врывая их до половины в землю. Томас Тинн, виконт Уэймет, подойдя к канделябру, рассматривал представленный ему архитектором план устройства в его английском парке в Уилтшире дерновой лужайки, разбитой на квадраты, окаймленные желтым и красным песком, речными раковинами и каменноугольной пылью. На скамье виконтов сидели, не соблюдая старшинства, старые лорды Эссекс, Оссалстоун, Перегрин, Осборн, Вильям Зулстайн, граф Рошфор и несколько молодых лордов, из числа тех, что не носили париков; они окружали Прайса Девере, виконта Герфорда, и обсуждали вопрос, можно ли заменить чай настоем из листьев зубчатолистника. «Можно отчасти», – говорил Осборн. «Можно вполне», – утверждал Эссекс. К их разговору внимательно прислушивался Полете Сент-Джон, двоюродный брат Болингброка, учеником которого в какой-то степени был позднее Вольтер, ибо его развитие, начавшееся в школе отца Поре, завершилось влиянием Болингброка. На скамье маркизов Томас Грей, маркиз Кент, лорд-камергер королевы, уверял Роберта Берта, маркиза Линдсея, лорда-камергера Англии, что главный выигрыш большой английской лотереи в 1614 году достался двум французским выходцам: Лекоку, бывшему члену парижского парламента, и господину Равенелю, бретонскому дворянину. Граф Уаймс читал книгу под заглавием «Любопытные предсказания сивилл». Джон Кемпбел, граф Гринич, известный своим длинным подбородком и редкой для старика восьмидесяти семи лет игривостью писал письмо своей любовнице. Лорд Чандос занимался отделкой ногтей. Ввиду того, что предстояло королевское заседание, то есть такое, на котором корона должна была быть представленной комиссарами, два помощника привратников ставили перед троном обитую ярко-красным бархатом скамью. На втором мешке с шерстью сидел блюститель списков, sacrorum scriniorum magister, занимавший в те времена дом, в котором прежде жили обращенные в христианство евреи. На четвертом мешке два помощника клерка, стоя на коленях, перелистывали актовые книги.</p><p class="p1">Между тем лорд-канцлер занял место на первом мешке с шерстью, парламентские чиновники тоже заняли свои места, кто сидя, кто стоя; архиепископ Кентерберийский, поднявшись, прочел вслух молитву, и заседание палаты началось. К тому времени Гуинплен уже вошел, не обратив на себя ничьего внимания; скамья баронов, на которой он сидел, была ближайшей к перилам, так что ему пришлось пройти лишь несколько шагов. Лорды-восприемники сели по обе стороны его, благодаря чему появление нового лорда осталось незамеченным. Никто не был предупрежден, и парламентский клерк вполголоса, чуть ли не шепотом, прочел все документы, относившиеся к новому лорду, а лорд-канцлер объявил о его принятии в сословие пэров среди «всеобщего невнимания», как говорится в отчетах.</p><p class="p1">Все были заняты разговорами. В зале стоял тот особый гул, пользуясь которым, в собраниях часто «под шумок» проводят постановления, впоследствии вызывающие удивление самих участников.</p><p class="p1">Гуинплен сидел молча, с обнаженной головой, между двумя стариками, своими восприемниками, – лордом Фицуолтером и лордом Эранделом.</p><p class="p1">Необходимо заметить, что Баркильфедро, в качестве шпиона осведомленный обо всем и решивший во что бы то ни стало с успехом довести до конца свой замысел, в официальных донесениях лорд-канцлеру скрыл до известной степени уродство лорда Фермена Кленчарли, особо настаивая на том, что Гуинплен мог усилием воли подавлять на своем лице выражение смеха и сообщать серьезность своим изуродованным чертам. Баркильфедро, быть может, даже преувеличил эту способность. Впрочем, какое могло все это иметь значение в глазах аристократии? Ведь сам лорд-канцлер Вильям Коупер был автором знаменитого изречения: «В Англии восстановление пэра в его правах имеет большее значение, чем реставрация короля». Разумеется, красоте и знатности следовало бы быть неразлучными; досадно, что лорд обезображен; это, конечно, злобная насмешка судьбы, но в сущности разве это может отразиться на его правах? Лорд-канцлер принял известные предосторожности и поступил правильно, но в конце концов даже если б они и не были приняты, что могло бы помешать пэру вступить в палату лордов? Разве родовитость и королевское происхождение не искупают любого уродства и увечья? Разве в древней фамилии Кьюменов, графов Бьюкен, угасшей в 1347 году, не передавался из рода в род, наравне с пэрским достоинством, дикий, хриплый голос, так что по одному уж этому звериному рыку узнавали отпрысков шотландского пэра? Разве отвратительные кроваво-красные пятна на лице Цезаря Борджа помешали ему быть герцогом Валантинуа? Разве слепота помешала Иоанну Люксембургскому быть королем Богемии? Разве горб помешал Ричарду III стать королем Англии? Если вдуматься как следует, то окажется, что увечье и безобразие, переносимые с высокомерным равнодушием, не только не умаляют величия, но даже поддерживают и подчеркивают его. Знать так величественна, что ее не может унизить никакое уродство. Такова другая, не менее важная, сторона вопроса. Как видит читатель, ничто не могло воспрепятствовать принятию Гуинплена в число пэров, и благоразумные предосторожности лорд-канцлера, целесообразные во всяком ином случае, оказались совершенно излишними с точки зрения аристократических принципов.</p><p class="p1">При входе в зал Гуинплен, следуя наставлению герольдмейстера и напоминаниям обоих восприемников, поклонился «королевскому креслу».</p><p class="p1">Итак, все было кончено. Он стал лордом.</p><p class="p1">Он достиг ее, этой чудесной вершины, перед ослепительным сиянием всю свою жизнь с ужасом преклонялся его учитель Урсус. Теперь Гуинплен попирал ее ногами.</p><p class="p1">Он находился в самом знаменитом и самом мрачном месте Англии.</p><p class="p1">Это была древнейшая вершина феодализма, на которую в продолжение шести веков взирали Европа и история. Страшное сияние, вырвавшееся из царства тьмы.</p><p class="p1">Он вступил в круг этого сияния. Вступил безвозвратно.</p><p class="p1">Он был теперь в своей среде, на своем месте, как король на своем.</p><p class="p1">Отныне ничто не могло помешать ему остаться здесь.</p><p class="p1">Эта королевская корона, которую он видел над балдахином, была родной сестрой его собственной короне. Он был пэром этого трона.</p><p class="p1">Перед лицом королевской власти он олицетворял собою знать. Он был меньше, чем король, но подобен ему.</p><p class="p1">Кем был он еще вчера? Скоморохом. Кем стал он сегодня? Властелином.</p><p class="p1">Вчера он – ничто, сегодня – все.</p><p class="p1">Столкнувшись внезапно лицом к лицу в глубине одной души, ничтожество и могущество стали двумя половинами одного и того же сознания.</p><p class="p1">Два призрака – призрак нищеты и призрак благоденствия, – овладев одной и той же душой, влекли ее каждый в свою сторону. Эти братья-враги, бедность и богатство, вступив в трагическое столкновение, делили между собою разум, волю и совесть одного человека. Авель и Каин воплотились в одном лице.</p></span></span></span></span>
