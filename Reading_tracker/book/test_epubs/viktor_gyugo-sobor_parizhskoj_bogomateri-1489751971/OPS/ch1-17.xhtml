<span><span><span><p class="p1">Что же касается современных памятников нового Парижа, то мы охотно избавим себя от труда говорить о них подробно. Мы лишь упомянем о них по заслугам. Например, церковь Святой Женевьевы, сооруженная архитектором Суфло, бесспорно, является одним из самых красивых савойских пирогов, когда-либо выделанных из камня. Дворец Почетного легиона также представляет собой весьма замечательный кусок кондитерского пирога. Купол Хлебного рынка очень напоминает фуражку английского жокея, вздернутую на длинную лестницу. Башни церкви Святого Сульпиция сильно напоминают пару больших кларнетов, и это, право, неплохо; телеграф, торчащий на их кровле, вполне гармонирует с целым. Церковь Сен-Рош щеголяет папертью, с которою по великолепию может равняться разве только паперть церкви Святого Фомы Аквинского. В ней есть круглое и горбатое возвышение, изображающее Голгофу; кроме того, имеется солнце из позолоченного дерева. Оба эти изделия – штука замечательная. Фонарь лабиринта ботанического сада тоже довольно замысловат. Что же касается здания Биржи, греческого стиля по его колоннаде, римского – по дугообразным сводам окон и дверей и эпохи Возрождения – по большим низким перекладинам, – то это, несомненно, памятник вполне корректный и безупречный; уже одно то, что он увенчан аттическою вышкою, какой не было и в Афинах, изумительно прямолинейною и местами чрезвычайно изящно пересеченною печными трубами, вполне доказывает это. По правилам, архитектура здания должна вполне соответствовать его назначению, так, чтобы при первом же взгляде было понятно, к чему оно предназначено. Взглянув же на здание Биржи, вы можете его принять за что угодно: за королевский дворец, за академию, за склад товаров, за здание суда, за музей, казармы, гробницу, храм или театр. Но пока – это Биржа. Между прочим, каждое строение должно быть приспособлено и к местному климату. То здание, о котором идет речь, очевидно, тоже построено сообразно с нашим климатом. Кровля у него сделана плоская, какие бывают на Востоке; поэтому зимою, когда идет снег, ее метут, из чего должно заключить, что кровли для того и устраиваются, чтобы их подметали. Что же касается назначения, о котором мы выше говорили, то это здание так хорошо удовлетворяет этому требованию, что, будучи во Франции биржей, оно в Греции с тем же удобством могло бы служить храмом. Правда, архитектор сильно старался замаскировать циферблат часов, который нарушил бы чистоту прекрасных линий фасада, и позаботился окружить все здание колоннадою, в которой, в особо торжественные дни, свободно может развернуться величественная процессия биржевых маклеров и купеческих приказчиков.</p><p class="p1">Да, все это, без сомнения, превосходные произведения зодчества. А если к ним прибавить удивительно красивые, разнообразные и веселые улицы, вроде улицы Риволи, то смело можно надеяться, что когда-нибудь Париж с высоты птичьего полета представит глазу то богатство линий, изобилие деталей, приятное разнообразие видов, ту величавость в простоте и оригинальность в красоте, которые отличают шахматную доску.</p><p class="p1">Между тем, каким бы прекрасным ни казался вам современный Париж, восстановите мысленно Париж пятнадцатого столетия; вообразите этот лес башен, колоколен и стрел; разбросайте их по городу, оторвите от оконечностей островов, обвейте вокруг арок мостов Сену с ее зелеными и желтыми заливчиками гниющей воды, переливающимися ярче, чем кожа змеи; нарисуйте на голубом фоне неба готический профиль старого Парижа; заставьте выступить его контуры сквозь пелену зимнего тумана, цепляющегося за его многочисленные трубы; окуните его в ночной мрак, полюбуйтесь на эту причудливую игру света и тени в лабиринте его зданий. Бросьте на него полосу лунного света и посмотрите, как она выделит в тумане большие головы башен; или же возьмите этот черный силуэт, оживите игрою тени множества острых углов, шпилей и зданий и заставьте его сразу выступить еще более кружевным, чем внутренняя челюсть акулы, на медном небе заката, а затем сравнивайте.</p><p class="p1">Если же вы желаете получить от старого города впечатление, какого никогда не будет в состоянии дать вам новый Париж, то поднимитесь пораньше утром, в большой праздник, например в первый день Пасхи или на Троицу, на один из возвышенных пунктов, господствующих над всей столицей, и ждите пробуждения колоколов. Вот вы дождались этого момента, когда по сигналу неба, данному первым солнечным лучом, брызнувшим над горизонтом, сразу дрогнут все эти сотни колоколен. Сначала от одной церкви к другой понесутся редкие удары колоколов, как в оркестре перед началом увертюры проносятся отдельные звуки. Потом, смотрите, – ведь в некоторых случаях и ухо может смотреть, как глаз, – с каждой колокольни сразу поднимется столб звуков, облако гармонии. Пока еще вибрация каждого колокола поднимается к ясному утреннему небу как бы отдельно, чистым, кристаллическим звуком, но понемногу эти звуки, усиливаясь, сливаются в одно целое и соединяются в один великолепный аккорд. Теперь с бесчисленных колоколен несется сплошное звучное гудение; оно волнами расстилается над Парижем, и далеко за его пределы несутся отзвуки его могучих раскатов. Это море гармонии не хаотично. Несмотря на всю свою ширину и глубину, оно все-таки остается как бы прозрачным. Вы свободно можете проследить, как в нем змеиными изгибами проносятся отдельные группы звуков, брызжущих из прорезов колоколен; можете расслышать диалог важного басового колокола и суетливо-крикливого тенорового; можете видеть, как с одной колокольни на другую перелетают октавы, как легко возносятся крылатые, пронизывающие ноты серебряного колокола и как грузно падают глухие звуки деревянного; можете любоваться роскошными переливами и гаммами всех семи колоколов церкви Святого Евстафия, гаммами, то повышающимися, то понижающимися. Временами в этот концерт звуков врываются неизвестно откуда несколько ясных, звонких нот и, отчетливо прозвучав, снова поспешно исчезают, сверкнув молниеносными зигзагами в этом океане благовеста. С одного горизонта несется дребезжащее и крикливое пение колоколов аббатства Сен-Мартена, с другого ему отвечает грубый и зловещий голос Бастилии. Дальше гудит басом Луврская башня. Царственные колокола Дворца правосудия беспрерывно во все стороны шлют лучезарные трели своих чистых голосов, покрываемых по временам тяжелыми ударами большого колокола собора Богоматери. От этих ударов трели рассыпаются еще звонче и брызжут, точно искры на наковальне при ударах тяжелого молота. В известные промежутки бесконечно разнообразными сочетаниями проносятся струи звуков, изливаемые тройным набором колоколов церкви Сен-Жермен-де-Пре. Иногда вся эта масса чудных звуков вдруг как бы расступается, чтобы пропустить налетающую с колокольни церкви Благовещения фугу, которая тотчас же разлетается звездными брызгами. А снизу, из самой глубины этого оркестра, вам смутно слышится пение, которым в эту минуту полны церкви и которое пробивается наружу сквозь их гулкие своды. Да, такую оперу, бесспорно, стоит послушать. Днем Париж шумит говором; ночью он дышит, а теперь вы слышите, как он поет. Прислушайтесь же к этому чарующему ухо трезвону парижских колоколов. Присоедините к нему немолчный гул полумиллионного населения, вечный ропот реки, неумолкаемые вздохи ветров, внушительный и далекий квартет четырех рощ, расположенных на окаймляющих горизонт холмах, подобно трубам гигантских органов; заглушите этой как бы полутенью все, что может быть грубого и резкого в городском трезвоне, – и скажите, положа руку на сердце, знаете ли вы что-нибудь более богатое, более радостное, более яркое и ликующее, чем это смятение колоколов, чем этот очаг музыки, чем эти десять тысяч медных голосов, поющих вместе и возносящихся из гигантских каменных флейт в триста футов высотой, чем этот город-оркестр, чем эта симфония, создающая шум бури!</p></span></span></span>
