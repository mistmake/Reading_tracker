<p class="p">10. Пламя, которое можно было бы видеть, будь человек прозрачен</p>
</div><p class="p1">Как! Эта шалая женщина, эта похотливая мечтательница, девственница по недоразумению, этот кусок человеческого мяса, который пока еще не нашел владельца, эта бесстыжая причудница в герцогской короне, эта Диана, еще не доставшаяся первому встречному только потому, что спесива, – или, быть может, по чистой случайности; эта побочная дочь канальи-короля, у которого не хватило ума удержаться на троне, эта неизвестно откуда выпорхнувшая герцогиня, только благодаря своей знатности разыгрывающая из себя богиню, между тем как в бедности она была бы потаскухой; эта мнимая леди, эта воровка, укравшая имущество изгнанника, – эта высокомерная дрянь обнаглела до того, что когда он, Баркильфедро, оказался без крова и куска хлеба, она посадила его на нижнем конце своего стола и дала ему пристанище в одном из углов ее постылого дворца, не все ли равно где – на чердаке, в подвале? Живется ему немного лучше лакея в людской, немного хуже лошади на конюшне! Воспользовавшись его, Баркильфедро, отчаянным положением, она поторопилась оказать ему предательскую услугу, как это обычно делают богачи, чтобы унизить бедняков и привязать их к себе, как своих такс, которых они водят на сворке! А чего стоила ей эта помощь? Цена помощи определяется ценою жертвы. У нее во дворце комнат хоть отбавляй! Она, видите ли, помогала ему, Баркильфедро! Подумаешь, как ей было это трудно! Съела ли она из-за этого хоть одной ложкой меньше черепахового супа? Лишила ли она себя хотя бы частицы своего проклятого богатства? Нет, она прибавила к своему изобилию новый повод к тщеславию, еще один предмет роскоши, – сделала доброе дело, украсившись им, как украшают палец перстнем, пришла на помощь умному человеку, взяла под свое покровительство духовное лицо! Теперь она может кичиться этим, говорить: «Я оказываю благодеяния, я кормлю писателей!» Она может разыгрывать из себя его покровительницу. «Повезло этому бедняге, что он напал на меня! Ведь я друг искусства!» И все лишь потому, что она отвела ему жалкую койку в дрянном чулане под своей крышей. Конечно, должность в адмиралтействе Баркильфедро получил благодаря Джозиане. Прекрасная должность, черт возьми! Джозиана сделала из Баркильфедро то, что он есть. Она дала ему положение, допустим. Да, но ничтожное. Меньше чем ничтожное. В этой смехотворной должности он чувствовал себя связанным по рукам и по ногам, парализованным, утратившим собственный облик. Чем он обязан Джозиане? Признательностью, которую горбун питает к матери, родившей его уродом. Вот они, эти привилегированные, пресыщенные всеми благами люди, эти выскочки, баловни подлой мачехи-судьбы! А даровитый человек, Баркильфедро, вынужден вытягиваться перед ними на лестнице, кланяться лакеям, карабкаться вечером на самую вышку, быть любезным, предупредительным, обходительным, вежливым, приятным и неизменно хранить на лице почтительную улыбку! Как тут не заскрежетать зубами от ярости! А она в это время надевает на шею жемчуга и ломает любовную комедию со своим дураком, лордом Дэвидом Дерри-Мойр, негодяйка этакая!</p><p class="p1">Никогда не принимайте ничьих услуг. Вас непременно поймают на удочку. Не давайтесь благодетелям в руки в ту минуту, когда вы валитесь с ног от изнеможения. Вам окажут благодеяние. У него, Баркильфедро, не было хлеба, – эта женщина его накормила? С тех пор он стал ее лакеем! Временное чувство пустоты в желудке – и вот вы прикованы на всю жизнь! Быть кому-либо обязанным – значит попасть в рабскую зависимость. Счастливцы власть имущие пользуются моментом, когда вы протягиваете руку, чтобы сунуть вам грош, они пользуются минутой вашей слабости, чтобы превратить вас в раба, в худшую разновидность раба – в раба, облагодетельствованного милостыней, в раба, обязанного любить! Какой позор! Какая неделикатность! Какая западня для вашей гордости! И вот все кончено: вы навеки осуждены превозносить доброту этого человека, признавать красавицей эту женщину, оставаться на заднем плане, со всем соглашаться, всему рукоплескать, восхищаться, курить фимиам, натирать себе мозоли вечным коленопреклонением, рассыпаться в сладких речах, когда вас гложет ярость, когда вы готовы вопить от бешенства, когда дикая злоба разрывает вашу грудь и горькая пена клокочет в ней сильнее, чем в океане.</p><p class="p1">Вот как богачи делают бедняка своим узником.</p><p class="p1">Вы навсегда увязаете в клейкой смоле оказанного вам благодеяния, которое замарает вас на всю жизнь.</p><p class="p1">Милостыня – нечто непоправимое. Признательность – тот же паралич. Благодеяние прилипает к вам, лишает вас свободы движения. Это свойство хорошо известно ненавистным богачам, которые обрушили на вас свою жалость. Дело сделано. Вы стали вещью. Они вас купили. Чем? Костью, которую они отняли у своей собаки, чтобы бросить вам. Они швырнули эту кость вам в голову. Этой костью они больше ушибли вас, чем помогли вам. Все равно, обглодали вы эту кость или нет. Вам отвели место в конуре. Благодарите же. Будьте благодарны всю жизнь. Боготворите ваших господ. Валяйтесь в ногах у них. Благодеяние предполагает добровольное подчинение благодетельствуемого благодетелю. Благотворители требуют от вас, чтобы вы признавали себя ничтожеством, а их – богами. Ваше унижение возвеличивает их. Взглянув на ваш согбенный стан, они держатся еще прямее. В звуке их голоса слышится надменность. Их семейные события, свадьбы, крестины, беременность, появление на свет потомства – все это касается вас. У них рождается волчонок – отлично, пишите стихи на случай. На то вы и поэт, чтобы сочинять всякие пошлости. Как тут не остервенеть! Еще немного, и они заставят вас донашивать их старые башмаки!</p><p class="p1">«Кто это у вас, моя милая? Вот урод! Откуда он?» – «Сама не знаю, какой-то писака, которого я кормлю». Так разговаривают между собою эти индюшки. И даже не понижают голоса. Вы слышите это и продолжаете расточать любезности. Впрочем, если вы больны, ваши господа присылают вам врача. Не своего, конечно. При случае он осведомляется о вас. Будучи иной породы, чем вы, и находясь на недосягаемой для вас высоте, они приветливы с вами. Их высокое положение делает их доступными. Они знают, что вы не можете быть с ними на равной ноге. Презирая вас, они учтивы с вами. За столом они слегка кивают вам головой. Иногда они знают, как пишется ваше имя. Если они и дают почувствовать, что покровительствуют вам, то лишь простодушно попирая ногами все, что есть в вас наиболее уязвимого и чувствительного. Они так добры к вам!</p><p class="p1">Разве это не верх гнусности?</p><p class="p1">Конечно, следовало как можно скорее наказать Джозиану. Надо было дать ей понять, с кем она имеет дело! А-а, господа богачи, потому лишь, что вы не в состоянии поглотить все, что у вас есть, потому лишь, что излишество могло бы повлечь за собой несварение желудка (ибо ваши желудки не больше наших), потому лишь, наконец, что лучше раздать объедки, чем выбросить их вон, вы великолепным жестом швыряете беднякам эти жалкие отбросы! Ах, вы даете нам хлеб, даете пристанище, одежду, занятие, и ваша дерзость, ваше безумие, ваша жестокость, ваша глупость и нелепость доходят до того, что вы верите, будто мы вам обязаны! Наш хлеб – это хлеб рабства, пристанище, которое вы нам даете, – лакейская, одежда – ливрея, должность – издевательство; правда, нам на этой должности платят, но она низводит нас на уровень скота! Ах, вы считаете себя вправе бесчестить нас за то, что дали нам кров и пищу, вы воображаете, что мы ваши должники, вы рассчитываете на нашу признательность! Отлично! Мы сожрем ваши внутренности! Отлично! Мы выпотрошим вас, красавица, проглотим вас живьем, перегрызем зубами все мышцы вашего сердца!</p><p class="p1">Ах, эта Джозиана! Чудовище! В чем ее заслуга? Велика, подумаешь, важность: появилась на свет, подтвердив этим глупость своего отца и бесстыдство своей матери; оказала нам милость, согласившись существовать, и за то, что она любезно соизволила быть публичным скандалом, ей заплатили миллионы, пожаловали земли и замки, заповедники, охоты, озера, леса – всего не перечесть! И при этом она еще кривляется. Ей пишут стихи! А он, Баркильфедро, который столько учился и работал, столько потрудился на своем веку, поглотил уйму фолиантов, забил ими свои мозги, заплесневел среди научных трактатов, он, человек выдающегося ума, он, который мог бы отлично командовать армиями и – если бы только захотел – писать трагедии, подобно Отвею и Драйдену, он, рожденный быть императором, вынужден согласиться на то, чтобы это ничтожество спасало его от голодной смерти! Могут ли простираться еще дальше узурпаторские действия богачей, ненавистных баловней случая? Притворяться великодушными и улыбаться нам, нам, готовым выпить их кровь и облизать себе губы! Не чудовищная ли это несправедливость, что какая-то гнусная придворная дама имеет право называть себя вашей благодетельницей, а человек, превосходящий ее во всех отношениях, обречен подбирать крохи, оброненные такой рукою? Как тут не схватить скатерть за все четыре конца, не швырнуть ее в потолок вместе со всем пиром, со всею оргией, обжорством и пьянством, со всеми гостями – и с теми, что развалились, опираясь локтями на стол, и с теми, что ползают под столом на четвереньках, – с наглецами, которые бросают нищему подачку, и идиотами, принимающими эту подачку, выплюнуть все это Богу прямо в лицо, швырнуть в небо всю нашу землю! Ну, а пока вонзим когти в Джозиану.</p><p class="p1">Так рассуждал Баркильфедро. Дикий рык раздавался в его душе. Оправдывая себя, завистник смешивает свои личные обиды с общественным злом. В кровожадном сердце бурно кипят все виды злобных страстей. На географических картах пятнадцатого века в углу изображали большое безыменное пространство, на котором были начертаны три слова: Hie sunt leones<a href="ch2.xhtml#id251" class="a">[189]</a>. Такие же неисследованные области есть и в душе человека. Где то внутри нас волнуются и бурлят страсти, и об этом темном уголке нашей души можно также сказать: «Hie sunt leones».</p><p class="p1">Но разве уж совершенно нелеп был хаос этих диких мыслей? Разве был он лишен всякой логики? Надо сознаться, что нет.</p><p class="p1">Страшно подумать, но наш рассудок не всегда является голосом справедливости. Суждение – нечто относительное. Справедливость – нечто безусловное. Поразмыслите над тем, какая разница между судом и правосудием.</p><p class="p1">Злодеи своевольно распоряжаются своей совестью. Существует всякого рода гимнастика лжи. Софист – фальсификатор: в случае нужды он насилует здравый смысл. Определенная логика, чрезвычайно гибкая, беспощадная и искусная, всегда готова к услугам зла: она изощреннейшим образом побивает скрытую в тени истину. Сатана наносит Богу страшные удары кулаком.</p><p class="p1">Иной софист, приводящий в восхищение глупцов, только тем и славен, что покрыл синяками человеческую совесть.</p><p class="p1">Больше всего удручала Баркильфедро мысль, что дело сорвется. Он предпринял огромный труд и опасался, что в итоге причинит слишком мало вреда. Носить в своем сердце всепожирающую злобу и твердую, как алмаз, ненависть, обладать железной волей, стремиться все взорвать – и в результате ничего не сжечь, никого не обезглавить, никого не уничтожить! Быть тем, чем он был, – разрушительной силой, всепоглощающей враждебностью, палачом чужого счастья, быть созданным (ибо всегда есть создатель – дьявол или Бог) по мерке, присущей только Баркильфедро, и разрядить всю свою энергию в жалком щелчке, да разве это мыслимо! Баркильфедро промахнется? Чувствовать в себе взрывчатую силу, способную метать в воздух скалы, – и всего-навсего посадить шишку на лоб жеманницы! Быть катапультой – и напрасно сотрясать воздух! Выполнять сизифов труд – и убедиться, что это не более как муравьиные усилия! Излить весь запас ненависти почти без всякие последствий! Не унизительно ли это, когда сознаешь себя злобной силой, могущей превратить в прах всю Вселенную! Привести в движение сложную систему зубчатых колес, громыхать во мраке, как машина Марли, для того чтобы прищемить кончик розового пальчика! Своротить глыбу, чтобы вызвать на поверхности болота придворной жизни легкую рябь! Нелепое расточительство сил к лицу только богам: обвал горы иной раз кончается тем, что кротовая нора меняет свое место.</p><p class="p1">Да и кроме того, на своеобразном поле битвы, каким является двор, нет ничего опаснее, как прицелиться в своего врага и промахнуться. Во-первых, вы тем самым предстаете своему противнику без личины и вызываете его ярость, а во-вторых (и это существеннее), промахнувшись, вы возбуждаете недовольство вашего господина. Королям не очень-то нравятся неловкие люди. Смотрите, чтоб не было ни шишек, ни безобразных ссадин! Режьте всех, но не разбивайте носы в кровь. Кто убивает – тот молодец, кто только ранит – тот разиня. Короли не любят, чтобы увечили их слуг. Они сердятся, когда вы разбиваете фарфор у них на камине или калечите кого-либо из их свиты. При дворе должна быть чистота, опрятность. Разбивайте, но заменяйте новым, и все будет в порядке.</p><p class="p1">Вдобавок это превосходно согласуется со взглядом вельможных людей на злословие. Злословьте, но тумаков не давайте или, если уж зудит рука, бейте насмерть.</p><p class="p1">Вонзайте кинжал, но не царапайте. Разве только отравленной булавкой. Это – смягчающее вину обстоятельство. Вспомним, что именно таково было оружие Баркильфедро.</p><p class="p1">Всякий злобствующий пигмей – сосуд, в котором заключен сказочный дракон. Крошечный сосуд – и исполинский дракон. Чудовищно плотный сгусток, выжидающий момента, чтобы расшириться до необъятных размеров. Скучая, он утешается мыслью о грядущем взрыве. Содержимое больше вместилища. Притаившийся гигант – не странно ли это? Червяк, вынашивающий в себе гидру! Быть ужасной шкатулкой с сюрпризом, таящей в себе Левиафана, – для карлика это и пытка и наслаждение.</p><p class="p1">Итак, ничто не могло бы заставить Баркильфедро отказаться от его намерений. Он ждал своего часа. Наступит ли этот час? Что нужды! Он ждал его. У отъявленных злодеев ко всему примешивается личное самолюбие. Рыть яму и вести подкоп под карьеру придворного, стоящего выше вас, пытаться взорвать эту карьеру, рискуя собственной головой, как бы мы ни были сами укрыты под землей, повторяем, дело интересное. Такая игра может захватить. Ею можно увлечься, как сочинением эпической поэмы. Быть ничтожеством и напасть на существо в тысячу раз сильнее вас – блестящий подвиг. Приятно быть блохою на теле льва.</p><p class="p1">Гордый зверь чувствует укус и расходует свою бешеную ярость, обрушиваясь на ничтожный атом. Встреча с тигром причинила бы ему меньше досады. И вот роли переменились. Униженный лев чувствует в своем теле жало насекомого, а блоха вправе заявить: «Во мне течет львиная кровь».</p><p class="p1">Однако гордость Баркильфедро удовлетворялась этим лишь наполовину. Это было слабое утешение. Дразнить – приятно, но лучше было пытать. Назойливая мысль не давала покоя Баркильфедро; он боялся, что ему удастся только слегка задеть Джозиану, нанести поверхностную царапину. Мог ли он рассчитывать на большее, он, такое ничтожество по сравнению с этой блестящей женщиной? Нанести царапину – какая малость, когда ему хотелось содрать кожу, обнажить живое кровоточащее мясо, когда ему хотелось бы слышать дикие вопли женщины, не обнаженной, нет, а лишившейся последнего покрова – собственной кожи! Как ужасно сознавать свое бессилие, тая в душе такое стремление! Увы, на свете нет ничего совершенного.</p><p class="p1">Как бы там ни было, он покорялся своей судьбе. Не имея возможности воплотить в жизнь свои замыслы, он мечтал осуществить их хотя бы наполовину. Сыграть злую шутку – все-таки цель.</p><p class="p1">Человек, мстящий за оказанное ему благодеяние, – фигура недюжинная. Баркильфедро проявил себя здесь подлинным исполином. Обычно неблагодарность проявляется в забвении; у этого же избранника зла она проявлялась в яростной ненависти. Сердце неблагодарного человека хранит в себе только пепел. Что же было в сердце Баркильфедро? Его сердце было горнилом, полным пылающих углей. Ненависть, гнев, досада, злоба молчаливо раздували здесь то пламя, которое должно было испепелить Джозиану. Никогда еще мужчина не пылал такой беспричинной ненавистью к женщине. Это было ужасно! Джозиана стала его бессонницей, его единственной заботой, его тоской, его бешенством.</p><p class="p1">Быть может, он был в нее немного влюблен.</p></span><span id="id124"><div class="title6">
<p class="p">11. Баркильфедро в засаде</p>
</div><p class="p1">Найти уязвимое место Джозианы и нанести ей удар – таково было, по причинам, о которых мы говорили выше, непреклонное желание Баркильфедро.</p><p class="p1">Хотеть – недостаточно; надо мочь.</p><p class="p1">Как взяться за это?</p><p class="p1">В этом весь вопрос.</p><p class="p1">Мелкие негодяи тщательно разрабатывают подробный план гнусности, которую хотят совершить. Они не чувствуют в себе достаточно силы, чтобы на лету схватить первую представившуюся возможность, завладеть ею добром или насильно и подчинить ее своим целям. Этим объясняются их предварительные комбинации, которыми настоящие злодеи пренебрегают. Опытные злодеи полагаются главным образом на свой злодейский нрав: они вооружаются чем можно, заготовляют на всякий случай разного рода оружие и, подобно Баркильфедро, просто выжидают благоприятного момента. Они знают, что заранее выработанный план может не совпасть с обстоятельствами. Связав себя определенной программой действий, злодей рискует запутаться и не добиться поставленной цели. С судьбою не ведут предварительных переговоров. Завтрашний день нам не подвластен. Случай не повинуется нам. Поэтому преступники подстерегают случай и, ухватив его цепкой лапой, заставляют сразу же, без лишних слов, работать с ними заодно. Ни плана, ни чертежа, ни модели, ничего заранее обдуманного, что оказалось бы непригодным для неожиданности, как башмак, сшитый не по мерке. Они бросаются очертя голову в черную бездну. Немедленно и быстро извлекать для себя пользу из любого обстоятельства – искусство подлинного злодея, превращающее мошенника в демона.</p><p class="p1">Настоящий злодей поражает нас, как праща, первым попавшимся под руку камнем. Настоящие злодеи всегда полагаются на неожиданность, эту немую помощницу всякого преступления.</p><p class="p1">Поймать случай, прыгнуть ему на спину – вот единственное art poétique<a href="ch2.xhtml#id235" class="a">[190]</a> этого рода талантов.</p><p class="p1">А до поры до времени им необходимо выведать, с кем они имеют дело. Нащупать почву.</p><p class="p1">Для Баркильфедро этой почвой была королева Анна.</p><p class="p1">Баркильфедро все ближе подползал к королеве.</p><p class="p1">Его допускали так близко, что порою ему казалось, будто он слышит мысли Ее Величества.</p><p class="p1">Иногда он, как лицо, которое в счет не идет, присутствовал при разговорах двух сестер. Ему не запрещалось вставить и свое словечко. Он пользовался этим для собственного уничижения. Это был способ внушить к себе доверие.</p><p class="p1">Так, однажды в Гемптон-Корте, в саду, находясь позади герцогини, стоявшей за спиной у королевы, он услыхал, как Анна, с натугой следовавшая тогдашней моде изрекать сентенции, произнесла:</p><p class="p1">– Счастливы животные – они не рискуют попасть в ад.</p><p class="p1">– Они и без того в аду, – возразила Джозиана.</p><p class="p1">Ответ этот, внезапно подменивший религию философией, пришелся королеве не по вкусу. Пусть ответ даже был глубокомыслен, Анну он все же покоробил.</p><p class="p1">– Милая моя, – заметила она Джозиане, – мы говорим об аде как две дурочки. Спросим у Баркильфедро, что представляет собою ад. Он должен хорошо разбираться в этом.</p><p class="p1">– В качестве дьявола? – спросила Джозиана.</p><p class="p1">– В качестве животного, – ответил Баркильфедро.</p><p class="p1">И поклонился.</p><p class="p1">– Он, сударыня, – обратилась королева к Джозиане, – умнее нас с вами.</p><p class="p1">Для такого человека, как Баркильфедро, быть приближенным к королеве значило держать ее в руках. Он мог сказать: «Она в моей власти». Теперь ему надо было только найти способ заставить ее служить своим целям.</p><p class="p1">Он занял определенное место при дворе. Укрепиться при дворе – чего лучше! Только бы подвернулся благоприятный случай: уж он не упустит его. Не раз он вызывал злобную улыбку на устах королевы. Это значило, что ему дозволено охотиться.</p><p class="p1">Но не было ли при дворе какой-либо запретной дичи? Давало ли ему это разрешение право подбить крылышко или лапку, скажем, родной сестре Ее Величества?</p><p class="p1">Это следовало узнать в первую очередь. Любит ли королева свою сестру?</p><p class="p1">Неверный шаг мог погубить все дело. Баркильфедро стал приглядываться.</p><p class="p1">Прежде чем сделать ход, игрок смотрит в свои карты. Какие у него козыри? Баркильфедро первым делом сопоставил возраст обеих женщин: Джозиане двадцать три года, Анне – сорок один. Отлично. Карты недурные.</p><p class="p1">Момент, с которого женщина перестает вести счет годам по веснам и начинает вести его по зимам, действует на нее раздражающим образом. В ней пробуждается глухая злоба против безжалостного времени, которое она начинает чувствовать. Молодые, только что расцветшие красавицы, источающие для других благоухание, обращены к ней одними шипами, и каждая из этих роз причиняет ей укол. Ей кажется, что это они отняли у нее свежесть, что ее собственная красота вянет лишь потому, что она расцветает в других.</p><p class="p1">Воспользоваться этой тайной досадой, углубить морщины на лице сорокалетней женщины, королевы, – вот что предстояло Баркильфедро.</p><p class="p1">Зависть – отличное средство для возбуждения ревности: она выводит ее наружу, подобно тому как крыса выгоняет крокодила из его логова.</p><p class="p1">Баркильфедро сосредоточил все внимание на королеве. Он вглядывался в королеву, как вглядываются в стоячую воду. Болото иной раз бывает довольно прозрачно. В грязной воде видны пороки, в мутной – нелепости. Анна была водою мутной.</p><p class="p1">В ее тупом мозгу шевелились зародыши чувств и личинки мыслей.</p><p class="p1">Все там было неясно. Все было едва намечено. Это было тем не менее нечто реальное, хотя и бесформенное. Королева думала то-то. Королева желала того-то. Точно установить, что она думала, чего желала, – было трудно. Еле заметные превращения, происходящие в стоячей воде, не так-то легко поддаются исследованию.</p><p class="p1">Обычно вялая, королева иногда позволяла себе глупые и грубые выходки. Этими вспышками и следовало воспользоваться. Надо было поймать ее на этом.</p><p class="p1">Чего в глубине души желала Анна герцогине Джозиане? Добра или зла?</p><p class="p1">Загадка. Баркильфедро задался целью разгадать ее.</p><p class="p1">Найдя ответ, он мог бы пойти дальше.</p><p class="p1">На помощь ему пришел ряд случайностей, но главное – помогла его постоянная настороженность.</p><p class="p1">Анна приходилась по мужу дальней родственницей новой прусской королеве, супруг которой имел сто камергеров; у Анны был его портрет, писанный на эмали по способу Тюрке де Майерна. У прусской королевы тоже была незаконнорожденная младшая сестра, баронесса Дрика.</p><p class="p1">Однажды в присутствии Баркильфедро Анна стала расспрашивать прусского посланника об этой Дрике.</p><p class="p1">– Говорят, она богата?</p><p class="p1">– Очень богата, – ответил посланник.</p><p class="p1">– У нее есть дворцы?</p><p class="p1">– И даже более великолепные, чем у ее сестры – королевы.</p><p class="p1">– За кого она выходит замуж?</p><p class="p1">– За знатного вельможу, за графа Гормо.</p><p class="p1">– Он красив?</p><p class="p1">– Очарователен.</p><p class="p1">– Она молода?</p><p class="p1">– Совсем молода.</p><p class="p1">– Так же хороша, как королева?</p><p class="p1">Посланник, понизив голос, ответил:</p><p class="p1">– Еще лучше.</p><p class="p1">– Какая дерзость! – прошептал Баркильфедро.</p><p class="p1">Королева помолчала, потом воскликнула:</p><p class="p1">– Ох, уж эти незаконнорожденные!</p><p class="p1">Это множественное число не ускользнуло от Баркильфедро.</p><p class="p1">В другой раз, при выходе из часовни, где Баркильфедро стоял довольно близко от королевы, позади двух раздатчиков милостыни, лорд Дэвид Дерри-Мойр, продвигавшийся сквозь ряды королевской свиты, произвел на придворных дам сильное впечатление своей наружностью. Вслед ему раздавался хор женских восклицаний: «Как он изящен! – Как он любезен! – Какой у него величественный вид! – Какой красавец!»</p><p class="p1">– Как это неприятно! – пробормотала королева.</p><p class="p1">Баркильфедро услышал это.</p><p class="p1">Теперь он знал, что ему делать.</p><p class="p1">Можно было вредить герцогине, не опасаясь возбудить недовольство королевы.</p><p class="p1">Первая задача была решена.</p><p class="p1">Перед ним возникла вторая.</p><p class="p1">Как же повредить герцогине?</p><p class="p1">Какие средства для достижения столь трудной цели могла доставить ему его жалкая должность?</p><p class="p1">Никаких, очевидно.</p></span></span></span></span>
