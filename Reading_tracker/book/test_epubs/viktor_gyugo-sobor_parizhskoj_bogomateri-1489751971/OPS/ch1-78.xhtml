<p class="p">12. Шотландия, Ирландия и Англия</p>
</div><p class="p1">Отметим одну подробность: у Джозианы «был диск».</p><p class="p1">Это станет понятным, если вспомнить, что она была сестрой королевы – правда, сестрой побочной, но все же особой королевской крови.</p><p class="p1">«Иметь диск» – что это значит?</p><p class="p1">Виконт Сент-Джон (иными словами – Болингброк) писал Томасу Леннарду, графу Сессексу: «Две вещи сообщают людям высокое положение. В Англии – tour, во Франции – pour». Pour означало во Франции следующее: когда король путешествовал, гоф-фурьер вечером, во время остановок, отводил помещение лицам, сопровождавшим его величество. Некоторые из этих вельмож пользовались огромным преимуществом перед остальными. «У них есть <em>pour</em>, – читаем мы в “Историческом журнале” за 1694 год на странице 6-й, – то есть распределитель помещения пишет перед именами этих особ слово <em>pour</em> (для), например: “для принца Субиз”, между тем как, отмечая помещение лица не королевской крови, он опускает предлог “для” и пишет просто: “Герцог де Жевр, герцог Мазарини”» и т. д. Предлог pour, красовавшийся на дверях, указывал на то, что здесь помещается принц крови или фаворит. Фаворит – это еще хуже, чем принц. Король жаловал право на pour, как орденскую ленту или как пэрство.</p><p class="p1">«Право на диск» (tour) в Англии было менее почетно, но представляло большие выгоды. Это было знаком подлинной близости к царствующей особе. Тот, кто по праву рождения или вследствие расположения монарха мог получать от него непосредственные сообщения, имел в стене своей спальни диск с приделанным к нему звонком. Звонок звонил, диск открывался в виде дверцы, и на золотой тарелке или на бархатной подушке появлялось королевское послание, после чего диск возвращался на прежнее место; это было интимно и торжественно. Таинственное входило в повседневный обиход. Диск не имел никакого другого назначения. Звонок возвещал только о королевском послании. Тот, кто приносил послание, оставался невидимым. Впрочем, обычно это был паж короля или королевы. В царствование Елизаветы «диск» был у Лестера, в царствование Иакова I – у Бекингема. Джозиана получила «право на диск» при Анне, хотя королева и не питала к ней особой благосклонности. Получавший эту привилегию как бы входил в непосредственное сношение с небом и время от времени получал письма от Бога через его почтальона. Ничему так не завидовали, как этому знаку отличия. Однако эта привилегия усиливала раболепство. Ее обладатель становился еще раболепнее других. При дворе всякое возвышение унижает. «Право на диск» обозначалось французским термином avoir le tour; эта особенность английского этикета исходила, по всей вероятности, из какого-нибудь старинного французского обычая.</p><p class="p1">Леди Джозиана, пэресса-девственница, подобно тому как Елизавета была девственницей-королевой, жила, смотря по времени года, то в городе, то в деревне и вела почти королевский образ жизни; у нее был свой собственный двор, при котором лорд Дэвид, вместе с другими лицами, играл роль придворного. Не будучи еще супругами, лорд Дэвид и леди Джозиана все же могли, не вызывая пересудов, показываться вместе на людях и охотно пользовались этим. Нередко они ездили в театр или на бега в одной карете и сидели в одной ложе. Хотя мысль о браке, в который им было разрешено и даже предписано вступить, расхолаживала их, тем не менее им было приятно встречаться друг с другом. Свободное обхождение, дозволенное помолвленным, имеет границы, которые легко переступить. Однако они воздерживались от этого, ибо чрезмерная непринужденность – признак дурного вкуса.</p><p class="p1">Самые знаменитые состязания в боксе происходили в ту пору в Ламбетском приходе, где находился дворец архиепископа Кентерберийского, хотя на этой окраине воздух вреден для здоровья; там же была и богатая библиотека архиепископа, открытая в определенные часы для всех добропорядочных людей. Однажды зимой на обнесенной оградой поляне происходило состязание между двумя боксерами, на котором присутствовала Джозиана: ее привез сюда Дэвид. Она как-то спросила его: «Разве женщины допускаются на бокс?» Дэвид ответил: «Sunt faeminae magnates». В вольном переводе это означает: «Только не мещанки», в буквальном же переводе: «Знатные дамы». Герцогини вхожи куда угодно. Потому-то леди Джозиана и присутствовала на этом зрелище.</p><p class="p1">Ей пришлось сделать только одну уступку приличиям – надеть мужской костюм, но это было вполне в обычае того времени. Женщины и не путешествовали иначе. На шесть человек, помещавшихся в виндзорском дилижансе, почти всегда приходились одна или две дамы в мужском платье. Это свидетельствовало об их принадлежности к дворянству.</p><p class="p1">Поскольку лорд Дэвид сопровождал даму, он не мог принимать непосредственного участия в состязании и вынужден был оставаться просто зрителем.</p><p class="p1">Леди Джозиана выдавала свое высокое общественное положение лишь тем, что смотрела в лорнет: на это имели право только знатные особы.</p><p class="p1">«Благородный поединок» происходил под председательством лорда Джермена, прадеда или двоюродного деда того лорда Джермена, который в конце XVIII века служил полковником, бежал с поля сражения, а затем стал военным министром и спасся от неприятельских пуль лишь для того, чтобы пасть жертвой сарказмов Шеридана, оказавшихся страшнее всякой картечи. Многие из джентльменов держали пари: Гарри Белью из Карлтона, претендент на угасшее пэрство Белла-Аква, бился об заклад с Генри, лордом Хайдом, членом парламента от местечка Денхайвед, носившего также название Лаунсестон; высокочтимый Перегрин Берти, член парламента от местечка Труро, – с сэром Томасом Колпепером, членом парламента от Мейдстоуна; лорд Лемирбо из Лотианской епархии – с Семюэлем Трефузисом из местечка Пенрайн; сэр Бартелемью Грейсдью из местечка Сент-Ивс – с достопочтеннейшим Чарльзом Бодвилем, который носил титул лорда Робертса и являлся custos rotulorum – мировым судьей Корнуэлского графства. Бились об заклад и многие другие.</p><p class="p1">Один боксер был ирландец из Типперери, прозванный по имени родной горы Филем-ге-Медоном, другой – шотландец Хелмсгейл. Таким образом, здесь столкнулись два национальных самолюбия. Предстояла схватка между Ирландией и Шотландией. Поэтому общая сумма пари превышала сорок тысяч гиней, не считая негласной игры.</p><p class="p1">Оба бойца были обнажены до пояса, весь костюм их состоял из коротких панталон, застегнутых на бедрах, и башмаков на подбитой гвоздями подошве, зашнурованных у щиколоток.</p><p class="p1">Шотландец Хелмсгейл был низкорослый малый, не больше девятнадцати лет от роду, но уже со швом на лбу; поэтому за него держали пари на два с третью. В прошлом месяце он переломил ребро и выбил оба глаза боксеру Сиксмайлсуотеру; этим объяснялся вызываемый им энтузиазм. Ставившие на него выиграли тогда двенадцать фунтов стерлингов. Кроме шва на лбу, у Хелмсгейла была еще повреждена челюсть. Он был легок и проворен, ростом не выше маленькой женщины, плотен, приземист, коренаст; в его фигуре было что-то угрожающее; природа, казалось, ничего не упустила, вылепив его из особого теста, и, казалось, каждый мускул его был предназначен для кулачного боя. В его крепком, лоснящемся, коричневом, как бронза, торсе была какая-то собранность. Когда он улыбался, обнаруживалось отсутствие трех зубов.</p><p class="p1">Его противник был огромен и широк, иными словами – слаб.</p><p class="p1">Это был мужчина лет сорока, шести футов роста, с грудной клеткой гиппопотама, очень кроткий на вид. Ударом кулака он мог бы проломить корабельную палубу, но не умел наносить этого удара. Ирландец Филем-ге-Медон представлял собою преимущественно удобную мишень для противника и, по-видимому, принимал участие в боксе не столько для того, чтобы наносить удары, сколько для того, чтобы получать их. Однако чувствовалось, что он продержится долго. Он напоминал недожаренный ростбиф, который трудно разжевать и невозможно проглотить. На языке боксеров таких силачей называют raw flesh – сырая говядина. У него были косые глаза. Судя по всему, он примирился со своей участью.</p><p class="p1">Эти два человека проспали всю прошедшую ночь бок о бок в одной постели. Оба выпили из одного стакана по три больших глотка портвейна. И у того и у другого были свои приверженцы, люди с суровыми физиономиями, которые в случае надобности могли припугнуть судей. В группе сторонников Хелмсгейла бросался в глаза Джон Громен, прославившийся тем, что пронес на спине целого быка, и некто Джон Брей, который однажды взвалил себе на плечи десять мешков муки по пятнадцать галлонов в каждом, да еще мельника впридачу, и прошел с этим грузом больше двухсот шагов. В числе приверженцев Филем-ге-Медона находился приведенный лордом Хайдом из Лаунсестона некто Кильтер, который жил в Зеленом Замке и метал через плечо камень весом в двадцать фунтов выше самой высокой башни этого замка. Все трое, Кильтер, Брей и Громен, были уроженцы Корнуэла – обстоятельство, делающее честь этому графству.</p><p class="p1">Остальные сторонники обоих боксеров были здоровенные парни, с широкими спинами, кривыми ногами, большими узловатыми руками, с тупыми лицами, в лохмотьях, почти все побывавшие под судом и не боявшиеся ничего на свете.</p><p class="p1">Многие из них отлично умели подпаивать полицейских. В каждой профессии должны быть свои таланты.</p><p class="p1">Поляна, выбранная для поединка, простиралась за Медвежьим садом, где некогда происходили бои медведей, быков и догов, за последними, еще не законченными городскими строениями, рядом с развалинами приорства святой Марии Овер-Рэй, разрушенного Генрихом VIII. Дул северный ветер, моросил дождь, была гололедица. Среди собравшихся джентльменов можно было сразу узнать отцов семейства по раскрытым зонтам.</p><p class="p1">На стороне Филем-ге-Медона был полковник Монкрейф в качестве арбитра и Кильтер – чтобы подставлять колено.</p><p class="p1">На стороне Хелмсгейла – достопочтенный Пьюг Бьюмери в качестве арбитра и лорд Дизертем из Килкерн – чтобы подставлять колено.</p><p class="p1">Несколько минут, пока сверялись часы, оба боксера неподвижно стояли в ограде. Затем противники подошли друг к другу и обменялись рукопожатием.</p><p class="p1">Филем-ге-Медон сказал Хелмсгейлу:</p><p class="p1">– Эх, хорошо бы уйти домой.</p><p class="p1">Хелмсгейл, как человек добропорядочный, ответил:</p><p class="p1">– Нельзя же попусту собирать благородную публику.</p><p class="p1">Они были обнажены, и им было холодно. Филем-ге-Медон весь дрожал, и у него стучали зубы.</p><p class="p1">Доктор Элинор Шарп, племянник архиепископа Йоркского, крикнул им:</p><p class="p1">– Надавайте друг другу тумаков, болваны! Сразу согреетесь.</p><p class="p1">Эти любезные слова расшевелили их.</p><p class="p1">Они бросились друг на друга.</p><p class="p1">Но они еще недостаточно разъярились. Первые три схватки прошли вяло. Преподобный доктор Гемдрайт, один из сорока членов «Коллегии всех душ», крикнул:</p><p class="p1">– Поднесите-ка им джину!</p><p class="p1">Но оба «рефери» и двое «восприемников» – все четверо судей, хотя и было очень холодно, настояли на соблюдении правил.</p><p class="p1">Послышался крик: «First blood!» – требовали «первой крови». Противников поставили лицом к лицу.</p><p class="p1">Они сошлись, вытянули руки, ощупали друг у друга кулаки, потом каждый отступил назад. Вдруг низкорослый Хелмсгейл бросился вперед. Начался настоящий бой.</p><p class="p1">Филем-ге-Медон получил удар прямо в лоб, между бровей. Кровь залила ему все лицо. Толпа заорала:</p><p class="p1">– Хелмсгейл пролил красное вино!</p><p class="p1">Раздались рукоплескания. Филем-ге-Медон, вращая руками как мельничными крыльями, принялся бить кулаками куда попало. Достопочтенный Перегрин Берти заметил:</p><p class="p1">– Ослеплен. Но еще не ослеп.</p><p class="p1">Тогда Хелмсгейл услыхал доносившиеся со всех сторон возгласы поощрения:</p><p class="p1">– Выбей ему буркалы!</p><p class="p1">Словом, оба бойца были выбраны вполне удачно, и хотя погода не благоприятствовала состязанию, всем стало ясно, что поединок не будет безрезультатным. Великан Филем-ге-Медон оказался жертвой собственных преимуществ: большой рост и вес делали его неповоротливым. Руки его были настоящими палицами, но тело – мертвым грузом. Маленький шотландец бегал, разил, прыгал, скрежетал зубами, быстротою движений удваивал свою силу, пускался на всякие уловки. С одной стороны – первобытный, дикий, некультурный, невежественный удар кулаком; с другой – удар цивилизованный. Хелмсгейл столько же бился нервами, сколько и мускулами, брал не одной лишь силой, но и злобой; Филем-ге-Медон смахивал на ленивого мясника, слегка оглушенного предварительным ударом. Искусство выступало здесь против природы. Ожесточенный человек – против варвара.</p><p class="p1">Было ясно, что побежденным окажется варвар. Однако не слишком скоро. Это и возбуждало интерес. Низкорослый против великана. Преимущество было на стороне первого. Кошка одолевает дога. Голиафы всегда бывают побеждены Давидами.</p><p class="p1">Бойцов подстегивали градом восклицаний:</p><p class="p1">– Браво, Хелмсгейл! Хорошо! Отлично, горец! – Твоя очередь, Филем!</p><p class="p1">Друзья Хелмсгейла сочувственно повторяли:</p><p class="p1">– Выбей ему буркалы!</p><p class="p1">Хелмсгейл поступил лучше. Внезапно нагнувшись, затем выпрямившись волнообразным движением пресмыкающегося, он ударил Филем-ге-Медона под ложечку. Колосс зашатался.</p><p class="p1">– Незаконный удар! – крикнул виконт Барнард.</p><p class="p1">Филем-ге-Медон опустился на колено к Кильтеру и произнес:</p><p class="p1">– Я начинаю согреваться.</p><p class="p1">Лорд Дизертем, посовещавшись с рефери, объявил:</p><p class="p1">– Пятиминутная передышка!</p><p class="p1">Филем-ге-Медон был близок к обмороку. Кильтер фланелью отер ему кровь на глазах и пот на теле, затем вставил в рот горлышко фляги. Это была одиннадцатая схватка. Не считая раны на лбу, у Филем-ге-Медона была помята грудная клетка, распух живот и было повреждено темя. Хелмсгейл нисколько не пострадал. Среди джентльменов замечалось некоторое смятение.</p><p class="p1">Лорд Барнард повторил:</p><p class="p1">– Незаконный удар!</p><p class="p1">– Пари вничью! – сказал лорд Лемирбо.</p><p class="p1">– Я требую обратно мою ставку! – подхватил сэр Томас Колпепер.</p><p class="p1">А достопочтенный член парламента от местечка Сент-Ивс сэр Бартелемью Грейсдью прибавил:</p><p class="p1">– Пускай мне возвратят мои пятьсот гиней, я ухожу.</p><p class="p1">– Прекратите состязание! – крикнули арбитры.</p><p class="p1">Но Филем-ге-Медон поднялся, шатаясь как пьяный, и сказал:</p><p class="p1">– Продолжим поединок, но с одним условием. За мною тоже признается право нанести один незаконный удар.</p><p class="p1">Со всех сторон закричали:</p><p class="p1">– Согласны!</p><p class="p1">Хелмсгейл пожал плечами. После пятиминутной передышки схватка возобновилась. Борьба, которая для Филем-ге-Медона была сплошной мукой, казалась забавой для Хелмсгейла. Вот что значит наука! Маленький человечек нашел способ засадить великана in chancery; иначе говоря, Хелмсгейл вдруг захватил огромную голову Филем-ге-Медона под свою левую, стальным полумесяцем изогнутую руку и, держа подмышкой затылком вниз, стал правым кулаком колотить по голове противника, словно молотком по гвоздю, сверху и снизу, пока не изуродовал все лицо. Когда же Филем-ге-Медон получил, наконец, возможность поднять голову, лица у него больше не было. То, что прежде было носом, глазами и ртом, теперь казалось чем-то вроде черной губки, пропитанной кровью. Он сплюнул. На землю упало четыре зуба. Затем он свалился. Кильтер подхватил его на свое колено. Хелмсгейл почти совсем не пострадал. Он получил несколько синяков да царапину на ключице. Никто уже не чувствовал холода. За Хелмсгейла против Филем-ге-Медона ставили теперь шестнадцать с четвертью.</p><p class="p1">Гарри из Карлтона крикнул:</p><p class="p1">– Нет больше Филем-ге-Медона! Ставлю на Хелмсгейла мое пэрство Белла-Аква и мой титул лорда Белью против старого парика архиепископа Кентерберийского.</p><p class="p1">– Дай-ка твою морду, – сказал Кильтер Филем-ге-Медону и, поливая окровавленную фланель из горлышка бутылки, обмыл ему лицо джином. Показался рот. Филем-ге-Медон открыл одно веко. Виски у него, казалось, были рассечены.</p><p class="p1">– Еще одна схватка, дружище, – сказал Кильтер. – За честь нижнего города.</p><p class="p1">Валлийцы и ирландцы понимают друг друга; однако Филем-ге-Медон ничем не обнаружил, что он еще способен соображать. При поддержке Кильтера Филем-ге-Медон поднялся. Эта была двадцать пятая схватка. По тому, как этот циклоп (ибо одного глаза он лишился) стал в позицию, все поняли, что это конец; никто уже не сомневался в его неизбежной гибели.</p><p class="p1">Защищаясь, он поднял руку выше подбородка: это был промах умирающего. Хелмсгейл, только слегка вспотевший, крикнул:</p><p class="p1">– Ставлю за себя тысячу против одного.</p><p class="p1">И, занеся руку, ударил противника. Однако странное дело: упали оба. Раздалось веселое мычание.</p><p class="p1">Это Филем-ге-Медон вслух выражал свою радость.</p><p class="p1">Он воспользовался страшным ударом, который Хелмсгейл нанес ему по черепу, и сам, вопреки правилам, ударил его в живот. Хелмсгейл, лежа без чувств, хрипел.</p><p class="p1">Арбитры, увидев Хелмсгейла на земле, изрекли:</p><p class="p1">– Получил сдачу сполна.</p><p class="p1">Все захлопали в ладоши, даже проигравшие.</p><p class="p1">Филем-ге-Медон отплатил незаконным ударом за незаконный удар, но это было ему разрешено.</p><p class="p1">Хелмсгейла унесли на носилках. Все были убеждены, что он не оправится.</p><p class="p1">Лорд Роберте воскликнул:</p><p class="p1">– Я выиграл тысячу двести гиней!</p><p class="p1">Филем-ге-Медон должен был, очевидно, остаться калекой на всю жизнь.</p><p class="p1">Уходя, Джозиана оперлась на руку лорда Дэвида, что разрешалось помолвленным, и проговорила:</p><p class="p1">– Прекрасное зрелище. Но…</p><p class="p1">– Но что?</p><p class="p1">– Я думала, что оно рассеет мою скуку. Оказывается, нет.</p><p class="p1">Лорд Дэвид остановился, посмотрел на Джозиану, сжал губы, надул щеки, покачал головой, что обозначало: «Примем к сведению», затем ответил герцогине:</p><p class="p1">– Против скуки существует только одно лекарство.</p><p class="p1">– Какое?</p><p class="p1">– Гуинплен.</p><p class="p1">Герцогиня спросила:</p><p class="p1">– А что это такое – Гуинплен?</p></span></span></span></span>
