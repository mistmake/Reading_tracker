<p class="p">II. Париж с птичьего полета</p>
</div><p class="p1">Мы попытались восстановить перед читателем прекрасный собор Парижской Богоматери. Мы бегло указали на большую часть тех красот, которыми он отличался в пятнадцатом столетии и которых недостает ему ныне. Но мы упустили из виду главное: мы еще ни слова не сказали о виде на Париж, который открывался со всех башен собора.</p><p class="p1">Чудная картина сразу развертывалась перед изумленными взорами того, кто после долгого подъема ощупью по темной винтовой лестнице, отвесно пронизывающей толстые стены колокольни, вдруг выходил на одну из высоких площадок, залитых светом и воздухом. Зрелище sui generis<a href="ch2.xhtml#id48" class="a">[47]</a>, о котором могут составить себе понятие только те из наших читателей, которые имели счастье видеть цельный, однородный в своих частях готический город, например Нюрнберг в Баварии или Витторию в Испании, или хотя самые небольшие образчики таких городов, лишь бы они хорошо сохранились, вроде Витрэ в Бретани и Нордгаузена в Пруссии.</p><p class="p1">Париж триста пятьдесят лет тому назад, Париж пятнадцатого века, был уже исполинским городом. Мы, современные парижане, сильно заблуждаемся, воображая, что с тех пор заняли бог весть сколько лишнего пространства. В сущности, Париж со времен Людовика XI увеличился немногим более чем на одну треть. Во всяком случае, он гораздо больше проиграл в красоте, чем выиграл в пространстве.</p><p class="p1">Как известно, Париж возник на том древнем острове Старого города, который имеет форму колыбели. Риф этого острова был его первой оградой, Сена была его первым рвом. Париж несколько веков находился в положении острова с двумя мостами – одним на севере, другим на юге, и с двумя мостовыми укреплениями, служившими в то же время и воротами: Гран-Шатлэ на правом берегу и Пти-Шатлэ – на левом. Затем, начиная с королей первой династии, Париж, не имея более возможности пошевельнуться на острове, который сделался для него слишком тесен, перешел через реку. Тогда по ту сторону обоих Шатлэ была воздвигнута первая линия стен, охватившая часть полей на обоих берегах Сены. Еще в прошлом столетии оставались следы этой древней ограды, ныне же от нее не сохранилось ничего, кроме воспоминания и кое-каких связанных с местностью преданий, как, например, о воротах Бодэ, или Бодуайе (римской porta Bagauda). Понемногу поток домов, беспрерывно изливавшийся из сердца города на окраины, поднялся через ограду, подмыл ее, источил, затем совершенно сровнял с землею. Филипп Август воздвиг этому потоку новую запруду. Этот король заключил Париж в замкнутую цепь громадных, высоких и солидных башен. Более ста лет дома теснились, сбивались в кучу, и уровень их в этом бассейне все поднимался, как вода в резервуаре. Дома бросались в глубину города, нагромождали этажи, карабкались друг на друга, пробивались кверху, как сжатая жидкость; только тот дом и мог захватить немного воздуха, которому удавалось поднять голову выше соседей. Улица все более и более углублялась и суживалась, площади наполнялись строениями и исчезали под ними. Наконец дома, перескочив и через стену Филиппа Августа, весело рассыпались как попало по равнине, точно вырвавшиеся на свободу узники. Там они, не стесняясь, начали себе устраивать в полях сады и вообще располагаться с полным удобством.</p><p class="p1">С 1367 года предместья города стали так расползаться, что понадобилась новая ограда, в особенности на правом берегу. Эту ограду возвел Карл V. Но город, подобный Парижу, находится в состоянии вечного роста. Только такие города и становятся столицами. Это своего рода воронки, куда вливаются географические, политические, нравственные и умственные течения целой страны, куда ведут все естественные тропы народа; это, так сказать, кладези цивилизации и вместе с тем сточные места, где фильтруется и накапливается беспрерывно капля за каплей, век за веком торговля, промышленность, знания, население – все соки, жизнь, душа народа. Стена Карла V разделила участь стены Филиппа Августа. В конце пятнадцатого столетия дома преодолели и ее, и предместье устремилось дальше. В шестнадцатом столетии кажется, будто сама стена отступает, все глубже и глубже уходя в Старый город, – так разрастается за нею новый.</p><p class="p1">Таким образом, в пятнадцатом веке, на котором мы остановимся, Париж уже прорвал тройной концентрический круг, бывший во времена Юлиана Отступника еще, так сказать, в зачаточном состоянии между Гран-Шатлэ и Пти-Шатлэ. Могучий город последовательно заставил треснуть четверной пояс своих стен, подобно тому, как у растущего ребенка лопается по швам одежда. При Людовике XI из моря домов местами еще выделялись развалины башен прежних оград, как вершины холмов во время наводнения, как архипелаг древнего Парижа, затопленный волнами нового города.</p><p class="p1">С тех пор Париж не раз вновь преображался, к несчастью для наших глаз, но перешел с того времени всего одну новую ограду – ту, которую воздвиг Людовик XV, – эту жалкую стену, слепленную из грязи и мусора, вполне достойную ее строителя и воспевшего его поэта:</p><div class="poem">
<div class="stanza">
<p class="v">Le mur murant Paris rend Paris murmurant<a href="ch2.xhtml#id46" class="a">[48]</a>.</p>
</div>
</div><p class="p1">В пятнадцатом столетии Париж был еще разделен на три города, совершенно независимые и резко отличные друг от друга, имевшие каждый свою собственную физиономию, специальность, нравы, обычаи, привилегии и историю: Сите, Университет, Город. Сите, расположенный на острове, самый старший и самый меньший из городов и отец обоих остальных, был сжат между ними и напоминал дряхлую старушку между двумя взрослыми цветущими дочерьми. Университетская сторона, или просто Университет, как ее называли, занимала левый берег Сены, от Ла Турнель до Польской башни. В современном Париже первый из этих пунктов соответствует Винному рынку, а второй – Монетному двору. Его ограда далеко раскидывалась по тому полю, где когда-то находились термы Юлиана. В этой ограде оказалась заключенной гора Святой Женевьевы. Самым видным пунктом этой каменной дуги являлись Папские ворота, находившиеся приблизительно на месте нынешнего Пантеона. Город, самая обширная из трех частей Парижа, располагался на правом берегу реки. Его набережная, прерывавшаяся в нескольких местах, тянулась вдоль Сены от башни Бильи до башни Буа, то есть от местности, где ныне склады «Изобилия», до места, на котором красуется Тюильри. Эти четыре пункта, в которых Сена перерезает ограду столицы, оставляя налево Ла Турнель и Польскую башню, а направо – башни Бильи и Буа, в общем носили название «Четырех парижских башен». Город еще дальше, чем Университет, углублялся в окрестности. Главным пунктом его ограды, возведенной Карлом V, были ворота Сен-Дени и Сен-Мартен, уцелевшие на своих местах до сих пор.</p><p class="p1">Как мы уже сказали, каждое из этих трех крупных подразделений Парижа составляло особый город, но город со слишком специальным характером, чтобы быть совершенным и обходиться без остальных двух. От этого и вид у каждого был своеобразный. Сите изобиловал церквами, Университет – учебными заведениями, а Город – дворцами. Оставляя в стороне второстепенные особенности старого Парижа и причуды его распространения, скажем с общей точки зрения, выделив из хаоса общественной юрисдикции лишь главные характеризующие черты, что остров принадлежал епископу, правый берег – торговому старшине, а левый – ректору. Над всем этим властвовал прево, то есть старшина города Парижа, чиновник королевский, а не муниципальный. Сите заключал в себе собор Парижской Богоматери, Город – Луврский дворец и городскую ратушу, а Университет – Сорбонну. В Городе был главный рынок, в Сите – Отель-Дье, а в Университете – Пре-о-Клер. Проступки, совершаемые учащимися на левом берегу Сены, разбирались на острове, во Дворце правосудия, и наказывались на правом берегу, в Монфоконе. Исключения бывали только тогда, когда в дело вмешивался ректор, чувствуя, что университетская власть сильна, а королевская слаба. Тогда учащиеся пользовались привилегией быть повешенными у себя дома.</p><p class="p1">Заметим здесь мимоходом, что большая часть университетских привилегий – а в числе их были и более серьезные – были вырваны у королевской власти путем восстаний и бунтов. Таков обычай с незапамятных времен. Король не выпускает, пока народ не вырывает. Есть одна старинная грамота, где очень наивно сказано по поводу верноподданности:</p><p class="p1">Civibus fidelitas in reges quae tamen aliquoties seditionibus interrupta multa peperit privilegia<a href="ch2.xhtml#id44" class="a">[49]</a>.</p><p class="p1">В пятнадцатом веке парижские стены окружали пять островов, омываемых Сеною: остров Лувье, где в то время были деревья, а теперь только продаются дрова, острова О-Ваш и Нотр-Дам, находившиеся во владении парижского епископа. Они были тогда совсем пустынными. В семнадцатом столетии их соединили в один остров, назвали островом Святого Людовика и застроили. Четвертым был остров Сите, а пятым – примыкавший к нему островок Перевозчика коров, исчезнувший теперь под валом Нового моста. Сите имел в то время пять мостов: три по правую сторону – каменные Нотр-Дам и О-Шанж и деревянный мост О-Менье и два по левую сторону – каменный Малый мост и деревянный – Святого Михаила; все они были застроены домами. Университет имел шесть ворот, сооруженных Филиппом Августом и носивших следующие названия: Сен-Виктор, Бордель, Папские, Сен-Жак, Сен-Мишель и Сен-Жермен. Город также имел шесть ворот, построенных Карлом V и называвшихся Сент-Антуан, Дю-Тампль, Сен-Мартен, Сен-Дени, Монмартр и Сент-Оноре. Все эти ворота были крепки и красивы – вовсе не в ущерб крепости. Подножия стен, окружавших Париж, омывались проведенными из Сены водами широкого и глубокого рва. Ночью все ворота запирались, река на обоих концах города заграждалась толстыми железными цепями, и Париж спокойно спал.</p><p class="p1">С высоты птичьего полета все эти три части – Сите, Университет и Город – представлялись глазу густою, запутанною сетью причудливо переплетенных улиц. Тем не менее при первом же взгляде можно было различить, что эти три части составляют одно целое. Сразу бросались в глаза две длинные параллельные улицы, тянувшиеся без перерыва, почти совершенно прямыми линиями, с юга на север, отвесно к Сене, и пересекавшие из конца в конец все три части города. Соединяясь, смешиваясь, местами сливаясь и беспрестанно переливая народные волны из одного города в другой, эти улицы тесно связывали три города в один. Первая из них шла в ворота Сен-Жак до ворот Сен-Мартен; в Университете она называлась улицею Сен-Жак, в Сите – улицею Де-ла-Жюиври, а в Городе – улицею Сен-Мартен. Она дважды переходила через реку по мостам Пти-Пон и Нотр-Дам. Вторая улица, на левом берегу реки называвшаяся улицей Де-ла-Гарп, на острове – улицей Де-ла-Барильери, на правом берегу – улицей Сен-Дени, шла от ворот Сен-Мишель в Университете до ворот Сен-Дени в Городе – через мосты Святого Михаила на одном рукаве Сены и Шанж – на другом. Эти все названия носили только две улицы – улицы-матери, родоначальницы, главные артерии Парижа. Остальные жилы тройного города были их разветвлениями или в них вливались.</p><p class="p1">Независимо от этих двух главных улиц, последовательно прорезавших Париж во всю его ширину, общих для всей столицы, – Город и Университет имели каждый свою особую главную улицу, пролегавшую параллельно Сене и перерезывавшую под прямым углом обе артериальные улицы. Таким образом, в Городе можно было пройти по прямой линии от ворот Сент-Антуан до ворот Сент-Оноре; в Университете – от ворот Сен-Виктор до ворот Сен-Жермен. Скрещиваясь с первыми улицами, эти главные пути Города и Университета представляли собой канву, на которой был выткан перепутанный лабиринт всех парижских улиц. В сливавшихся очертаниях узора этой гигантской сети, пристально вглядываясь, можно было различить как бы два широких снопа улиц: один в Университете, другой в Городе; эти два пучка больших улиц, постепенно расширяясь, шли от мостов к воротам.</p><p class="p1">Кое-что от этого геометрического плана осталось и до сих пор.</p><p class="p1">В каком же виде представлялось это целое с высоты башен собора Парижской Богоматери в 1482 году? Постараемся дать понятие и об этом.</p><p class="p1">Зритель, который, задыхаясь, взобрался бы на эту высоту, сначала был бы ослеплен расстилавшимся внизу хаосом кровель, труб, улиц, мостов, площадей, шпилей, колоколен. Ему сразу бросились бы в глаза резные шпили, остроконечные кровли, повисшие на углах стен башенки, каменная пирамида одиннадцатого века, шиферный обелиск пятнадцатого, круглая неукрашенная башня замка, четырехугольные узорчатые колокольни церквей – грандиозное и миниатюрное, массивное и воздушное. Взор его долго терялся бы в глубине этого лабиринта, где не было ничего, что не отличалось бы оригинальностью, смыслом, гением, красотою, на чем не лежало бы печати художественности, начиная с самого маленького домика, с расписанным и скульптурным фасадом, со всей его обшивкой, с притаившейся дверью и с выступавшим вперед вторым ярусом, и кончая королевским Лувром, который был тогда окружен колоннадою башен. Но, начав разбираться в этом хаосе зданий, глаз различил бы главные составные части.</p><p class="p1">Сначала выделился бы Сите. «Остров Сите, – говорит Соваль, у которого среди набора пустозвонных слов иногда попадаются и удачные выражения, – похож на большой корабль, завязший в тине и застрявший навсегда посередине Сены». Мы уже говорили, что в пятнадцатом столетии этот «корабль» соединялся с обоими берегами пятью мостами. Корабельная форма острова поразила и составителей геральдики. Корабль, украшающий древний герб Парижа, возник, по словам Этьена Пакье, благодаря этому сходству, а вовсе не вследствие осады норманнов. Для человека, умеющего в ней разбираться, геральдика есть своего рода алгебра, геральдика – язык. Вся история второй половины Средних веков написана на гербах, как история первой их половины выражена символами романской церкви. Это иероглифы феодалов, заменившие иероглифы теократии.</p><p class="p1">Итак, остров Сите показался бы зрителю кораблем, обращенным кормою на восток, а носом на юг. Обернувшись к носу, зритель увидал бы несметное сборище древних кровель, над которыми возвышается куполообразная свинцовая крыша Святой часовни, напоминающая спину слона с находящейся на ней башенкой. Только здесь эта башня представилась бы взору зрителя самой смелой, острой, узорчатой, тщательно отделанной резной вершиной, сквозь кружевной конус которой просвечивает голубое небо. Далее его взор упал бы на красивую, обставленную старинными домами площадь собора Парижской Богоматери с выходившими на нее тремя улицами. На южной стороне этой площади высился угрюмый, весь в морщинах и бороздках фасад Отель-Дье с его кровлей, словно покрытой желваками и пузырями. И повсюду в тесной сравнительно окружности Сите, направо и налево, на восток и на запад и куда бы ни взглянул зритель, виднелись колокольни двадцати одной церкви различных времен, всевозможных форм и величин, начиная с низенькой, источенной веками романской колокольни церкви Сен-Дени-дю-Па и кончая тонкими шпилями церквей Сен-Пьер-о-Бев и Сен-Ландри. За собором Парижской Богоматери на севере выступали: монастырь с готическими галереями; на юге – полуроманский дворец епископа; на востоке – пустынная оконечность острова, так называемый мыс Террен. В этом нагромождении домов глаз отличал по каменным сквозным митрам, увенчивавшим в ту эпоху верхние окна дворцов, не исключая и слуховых, особняк, подаренный Городом, при Карле VI, Ювеналу Дезюрсену; немного далее – просмоленные бараки рынка Палюс; еще далее – старую церковь Сен-Жермен-де-Вье, расширенную в 1458 году за счет улицы О-Фев; потом кишащий народом перекресток, позорный столб на углу улицы, кусок прекрасной мостовой Филиппа Августа, великолепную, вымощенную плитами и предназначавшуюся для всадников дорожку посередине улицы, так плохо замененную в шестнадцатом веке жалким булыжником, называвшимся мостовою Лиги. После этого глаз зрителя проникал внутрь какого-нибудь двора позади дома и останавливался на одной из тех сквозных башенок, пристроенных ко входу в дом, образец которых можно видеть еще и теперь на улице Бурдонне. Наконец, направо от Святой часовни, на западной стороне, у самой воды, виднелась группа башен Дворца правосудия. Деревья королевских садов, покрывавших западную оконечность острова Сите, маскировали островок Перевозчика. Что же касается реки, то с башен собора Парижской Богоматери ее совсем не было видно ни с какой стороны: она исчезала под мостами, а мосты скрывались под домами.</p><p class="p1">Если, пробежав по этим мостам с домами, кровли которых зеленели от плесени, преждевременно нараставшей от водяных испарений, взгляд зрителя направлялся влево, к Университету, то прежде всего он останавливался на широком и низком снопе башен. Это был Пти-Шатлэ, широко зиявшие ворота которого словно поглощали часть Малого моста. Если же взгляд устремлялся на берег, то во всю длину с востока на запад, от Ла Турнель до Нельской башни, он видел линию домов с лепными украшениями, с цветными оконными стеклами, с нависшими друг над другом ярусами; видел бесконечные извилины владений буржуазии, часто пересекаемых какою-нибудь улицей или задеваемых фасадом или углом громадного каменного особняка, бесцеремонно расползшегося со всеми своими дворами и садами, корпусами и флигелями в ширину и в длину, среди массы сжатых, теснившихся друг к другу домов, как важный барин в толпе простолюдинов. Таких особняков на берегу было пять или шесть; они начинались особняком де Лорен, разделявшим с бернардинцами громадное, обведенное оградой пространство по соседству с Турнель, и кончались особняком де Нель, главная башня которого служила рубежом Парижа, а остроконечные кровли пользовались привилегией ежегодно в продолжение трех месяцев подряд своими черными треугольниками застилать багряный диск заходящего солнца.</p><p class="p1">На этом берегу Сены торговля была развита меньше, чем на противоположном, здесь толпилось и шумело больше учащихся, чем ремесленников. Набережной, в настоящем смысле этого слова, можно было считать только пространство от моста Святого Михаила до Нельской башни, остальная же часть берега Сены или представлялась голой песчаной полосой, как по ту сторону владения бернардинцев, или была покрыта скопищем домов, стоявших у самой воды, как, например, между обоими мостами. Здесь стоял вечный гвалт прачек; с утра до вечера, полоща белье вдоль реки, они неумолчно болтали, кричали и пели так же, как и в наши дни. Париж и в те времена был таким же веселым.</p><p class="p1">Университетская сторона представлялась глазам сплоченною массою. Она была из конца в конец однородным целым. Тысячи ее остроконечных, примыкавших одна к другой кровель, почти одинаковой формы, с высоты казались кристаллами одного и того же вещества. Прихотливо извивавшиеся рвы улиц не могли разбить всю эту массу зданий на пропорциональные кварталы. Сорок две коллегии этой части Парижа распределялись довольно равномерно, так что их можно было видеть всюду. Разнообразные и забавные вершины этих прекрасных зданий были произведениями того же самого искусства, что и кровли простых домов, которые они превосходили только вышиною; они были, в сущности, лишь умножением в квадрате или в кубе той же геометрической фигуры. Эти вершины только объединяли целое, не нарушая его, только дополняли, не обременяя. Геометрия – это гармония. Тут и там несколько красивых особняков выделялись великолепными брызгами посреди живописных чердаков левого берега. Неверское подворье, Римское подворье и Реймское подворье, теперь исчезнувшие; особняк Клюни, существующий, к утешению художников, до сих пор, башню которого несколько лет тому назад так глупо развенчали. Возле отеля Клюни виднелось красивое римское здание с прекрасными сводчатыми арками – термы Юлиана. Немало было аббатств, отличавшихся более строгой красотою, более внушительной величественностью, чем особняки, и не менее прекрасных и значительных. Из них особенно бросались в глаза: аббатство бернардинцев с его тремя колокольнями; монастырь Святой Женевьевы, четырехугольная башня которого, уцелевшая до сих пор, заставляет так сильно жалеть об остальном; Сорбонна, полумонастырь, полушкола, прекрасная церковь которой еще сохранилась; красивый квадратный монастырь матуринцев; его сосед, монастырь Святого Бенедикта, в стены которого, в промежутке между седьмым и восьмым изданиями этой книги, успели втиснуть театр; аббатство кордельеров с его тремя громадными остроконечными фронтонами; аббатство августинцев, изящный шпиль которого, после Нельской башни, является в этой стороне Парижа вторым по красоте резным украшением. Коллежи, в сущности служившие соединительным звеном монастыря с миром, держались по архитектуре середины между особняками и аббатствами, отличаясь полною изящества строгостью, менее воздушными скульптурами, чем дворцы, и менее серьезною архитектурой, чем монастыри. К несчастью, почти ничего не осталось от этих памятников, в которых готическое искусство так прекрасно соединялось с богатством и умеренностью. Церковные здания в Университете были многочисленны и великолепны, они также представляли все эпохи зодчества, начиная с круглых сводов Сен-Жюльена и кончая стрельчатыми сводами Сен-Северина. Церкви там господствовали над всем и – самые гармоничные среди всеобщей гармонии – то и дело пронизывали разнообразные вершины зданий узорчатыми стрелами, сквозными колокольнями и тонкими иглами, линии которых были прелестным дополнением к острым углам кровель.</p><p class="p1">Университетская сторона была гориста. Гора Святой Женевьевы образовывала громадный выступ на юго-востоке. Интересно было бросить взгляд с высоты собора Парижской Богоматери на это множество узких и извилистых улиц (теперь там Латинский квартал), на эти массы домов, разбросанных по горе и в беспорядке скатывавшихся по ее склонам к самой реке: одни из них имели вид падающих вниз, другие – карабкающихся наверх, а все вместе – цепляющихся друг за друга. Беспрерывный поток многих тысяч черных точек, перекрещивавшихся на мостовой, являл глазу образ самого движения: это кишел людской муравейник, который едва можно было различить с такой высоты и на таком расстоянии.</p><p class="p1">Наконец, в промежутках этих кровель, стрел, разнообразных бесчисленных зданий, так прихотливо очерчивавших и украшавших своим узором линии Университета, местами проглядывали части покрытой мхом стены, массивная круглая башня и зубчатые городские ворота, представлявшие укрепления; это была стена Филиппа Августа. По ту сторону этой стены расстилались зеленые луга и во все стороны разбегались дороги, вдоль которых были разбросаны последние дома предместий, по мере удаления от города все более и более редевшие. Некоторые из этих предместий пользовались известным значением. Таково, например, предместье Сен-Виктор с его мостом-аркою через Бьевр, с его аббатством, где можно было прочесть надпись Людовика Толстого – epitaphium Ludovici Grossi, – и с его церковью, которая украшена восьмигранною стрелою, окруженною четырьмя колоколенками одиннадцатого века (подобную церковь до сих пор можно видеть в Этампе – ее не успели еще сломать). Далее следовало предместье Сен-Марсо, в котором были три церкви и монастырь. Потом, если оставить влево фабрику гобеленов с ее четырьмя белыми стенами, перед вами открывалось предместье Сен-Жак с его прекрасным резным крестом на перекрестке. По пути бросались в глаза: церковь Сен-Жак-дю-Го-Па, которая тогда еще была готическою и пленяла взоры своей воздушной красотою; прелестная церковь Сен-Маглуар, красивое произведение зодчества четырнадцатого века, которую Наполеон превратил в сенной склад; церковь Богородицы на Полях, в которой находились византийские мозаики. Наконец, скользнув по расположенному в открытом поле монастырю Шартрэ, богатому зданию, современнику Дворца правосудия, с его разбитыми на маленькие участки садами, и пробежав по развалинам Вовера, пользующимся такой дурной славою, взор падал на западе на три романские стрелы церкви Сен-Жермен-де-Пре. Сен-Жерменское предместье, бывшее уже тогда большой общиной, расползалось пятнадцатью или двадцатью улицами. Один из углов этого предместья был отмечен островерхой колокольней церкви Святого Сульпиция. Рядом с этой церковью можно было различить четырехгранную ограду Сен-Жерменского рынка, затем – красивую кругленькую башню аббатства, увенчанную свинцовым конусом. Дальше шли: черепичный завод, улица Дю-Фур, ведущая к общественной хлебопекарне, мельница на пригорке и приют для прокаженных – уединенное здание весьма непривлекательного вида. Но более всего приковывало к себе взоры Сен-Жерменское аббатство. Действительно, великолепную картину представляло на горизонте это аббатство с его одинаково величественными церковью и дворцом, провести хоть одну ночь в котором парижские епископы считали за особенную честь. Этот монастырь с его трапезной, которой архитектор придал стиль, красоту и великолепный орнамент собора, с изящной часовней Богородицы, монументальными дортуарами, обширными садами, подъемными решетками и мостами, с зубчатою оградою, так красиво выделявшейся на зеленом фоне окружающих лугов, с дворами, где вперемежку с блещущими золотом мантиями кардиналов сверкало оружие воинов, – все это, сгруппированное и объединенное вокруг трех острых готических стрельчатых башен, представляло на горизонте великолепную картину.</p><p class="p1">Когда же наконец, вдоволь налюбовавшись на Университет, вы поворачивались к правому берегу, где расположен Город, панорама вдруг менялась. Более обширный, чем Университет, Город отличался меньшим единством. При первом же взгляде было видно, что он подразделяется на несколько частей, резко отличающихся одна от другой. На востоке, в той части, которая до сих пор еще называется по имени болота, в которое Камулоген загнал было Юлия Цезаря, теснилась группа дворцов, выдвинувшихся на самый край берега. В водах Сены красиво отражались перерезанные стройными башенками шиферные кровли четырех особняков, почти примыкавших друг к другу: Жуи, Санс, Барбо и Дворца королевы. Эти четыре здания занимали все пространство от улицы Де-Нондьер до Целестинского монастыря, красиво возвышавшегося своей стрельчатой колокольней над зубцами и кровлями дворцов. Несколько позеленевших развалин, нависших над водою перед этими роскошными дворцами, не мешали видеть прекрасные линии их фасадов, широкие окна с крестообразными каменными переплетами, сводчатые, украшенные статуями ворота; изящно закругленные детали доказывали изумительное богатство готического искусства. За этими дворцами извивались во всех направлениях, то выделяясь своими зубцами и укреплениями, то прячась в тени деревьев, бесконечные стены грандиозного дворца Сен-Поль, где французский король мог свободно и роскошно поместить двадцать два принца крови вроде дофина и герцога Бургундского, с их свитами и служителями, не считая знатных вельмож германского императора, когда он посещал Париж, а также львов, помещавшихся тут же в особом здании. Заметим мимоходом, что отделение каждого принца состояло из одиннадцати комнат, начиная парадным залом и кончая молельней, не говоря уже о галереях, ваннах и других «лишних» помещениях, которыми было снабжено каждое отделение; не говоря об особых для каждого королевского гостя садах, о кухнях, чуланах, людских, столовых для слуг, задних дворах, на которых были расположены двадцать две богато обставленные поварни, начиная с той, где пекли хлеб, и кончая пивоварней; не говоря о помещениях для разнообразных игр: в мячи, в шары, в обручи и т. п., и о множестве птичников, рыбных садков, конюшен, зверинцев, скотных дворов, библиотек, арсеналов и проч. Вот что тогда представляли собою королевские Лувр и дворец Сен-Поль! Это были города в городе.</p><p class="p1">С того места, где находился зритель, дворец Сен-Поль, полузакрытый от взора четырьмя вышеупомянутыми домами, все-таки представлял величественное зрелище. Можно было легко различить три особняка, которые Карл V присоединил к этому дворцу, хотя они очень искусно были связаны с главным зданием длинными галереями, украшенными колонками и расписными окнами. Это были: особняк Пти-Мюс с кружевной балюстрадой, грациозно обвивавшей его кровлю; особняк аббатства Сен-Мор, похожий на крепость, с толстой башней, железным болверком, бойницами и гербом аббатства на саксонских воротах между выемками для подъемного моста, и особняк графа д’Этамп с попорченною в верхней части вышкою, зазубренною, как петушиный гребешок. Кое-где там были разбросаны купы вековых дубов, похожих издали на кочаны цветной капусты. В прозрачных, полных то света, то тени водах прудов белели гордые лебеди; к сожалению, можно было видеть только уголки этих прекрасных и живописных прудов. Здесь было помещение для львов с низкими сводами на саксонских столбах, с железными решетками и вечным гулом львиного рыканья. Там, пронизывая воздух, уходила в небо чешуйчатая стрела церкви Ave Maria. Налево – жилище парижского прево, украшенное четырьмя изящно вырезанными башенками по углам. В самой середине, в глубине этого городка, возвышалось главное здание дворца Сен-Поль с его разнообразными фасадами, со всеми теми бесчисленными приращениями всевозможных видов, которыми со времен Карла V обременяла его в продолжение двух столетий фантазия зодчих, – со всеми вышками его часовен, с его галереями, с тысячами узорчатых флюгеров по всем четырем странам света, наконец, с двумя смежными высокими башнями, конические кровли которых, окруженные у основания зубцами, напоминали островерхие шляпы с загнутыми полями.</p><p class="p1">Поднимаясь уступами по этому раскинувшемуся в отдалении амфитеатру дворцов, перенесясь через низину, прорытую в массе домов Города и обозначавшую улицу Сент-Антуан, глаз зрителя достигал Ангулемского подворья, обширного здания нескольких эпох, в котором новые части резко отличались от старых своей белизною и так же мало подходили к целому, как красные заплаты к голубой мантии. Особенно поражала изумительно острая, высокая кровля нового дворца, щетинившаяся резными желобами и покрытая свинцовыми полосами, которые были усеяны бесчисленными, ярко сверкавшими фантастическими арабесками из желтой меди. Эта словно замаскированная, замысловатая кровля с величавой грациозностью возносилась посреди коричневых развалин старого здания, толстые башни которого, раздувшиеся от времени, оседали от ветхости и трескались сверху донизу, как расстегнутые на тучных животах жилеты. Позади этого особняка виднелся лес шпилей дворца Ла Турнель. Нигде во всем мире, даже в Альгамбре или Гамборе, нельзя было видеть такой волшебной, захватывающей воздушной картины, как та, что открывалась здесь перед зрителем узором всех этих стрел, колоколен, флюгеров, винтовых лестниц, шпилей, просвечивавших фонариков, павильонов и башен всевозможной формы, высоты и расположения. Все это, вместе взятое, можно было сравнить с гигантской каменной шахматной доской, уставленной шахматными фигурами.</p><p class="p1">По правую сторону от дворца Турнель ершился громадный пук черных башен, врезывающихся одна в другую и точно перевязанных охватившим их рвом. Башни окружали мрачное здание, в котором было больше бойниц, чем окон, и у которого был постоянно поднят мост и опущена решетка. Это – Бастилия. Черные цилиндрические предметы, выглядывавшие из-за каждого зубца этого замка и издали похожие на желоба, были пушки.</p><p class="p1">Под их жерлами, у подножия страшного здания, виднелись ворота Сент-Антуан, сжатые между двумя башнями.</p><p class="p1">Дальше, за этим городком башен, вплоть до стены Карла V, расстилался роскошный зеленый, красиво расшитый цветами ковер полей и королевских парков, между которыми сразу можно было отличить, по лабиринту аллей и деревьев, знаменитый сад Дедала, подаренный Людовиком XI Куаксье. Обсерватория этого ученого поднималась над лабиринтом исполинскою колонною, увенчанною вместо капители небольшим домиком. В этой башне немало было состряпано ужасных астрологических бредней. Теперь здесь Королевская площадь.</p><p class="p1">Выше было сказано, что дворцовый квартал, о котором мы старались дать читателю представление, хотя останавливались лишь на его главных особенностях, наполнял весь угол, образуемый на восточной стороне оградою Карла V и Сеною. Центр Города был загроможден жилыми домами. Там сходились все три моста с правого берега Сите; дома на этих мостах предшествовали дворцам. И это скопище буржуазных жилищ, лепившихся друг к другу, как ячейки улья, тоже не лишено было красоты. Кровли большого города, как волны моря, представляют собой величественную картину. Спутанные, то и дело перекрещивающиеся улицы Города разрезали эту груду домов на сотню причудливых фигур. Вокруг рынков они образовывали громадную звезду. Улицы Сен-Дени и Сен-Мартен, с их бесчисленными разветвлениями, поднимались рядом одна с другою и походили на исполинские деревья, перепутавшиеся своими сучьями. Улицы Каменщиков, Стекольщиков, Ткачей и другие змеились во всех направлениях. Местами застывшие волны этого моря кровель прорывались высокими зданиями. Так, например, перед мостом Менял, за которым Сена пенила свои воды под колесами мельниц, расположенных вдоль моста Менье, высился Шатлэ, уже не в виде римской башни, как во времена Юлиана Отступника, а в форме феодальной башни тринадцатого столетия. Камень, из которого была сооружена эта башня, отличался такой твердостью, что за три часа его удавалось продолбить ломом не глубже чем на палец. Прекрасная колокольня церкви Сен-Жак-де-ла-Бушри, вся поросшая, точно мхом, гранями и скульптурными украшениями, была очень живописна, несмотря на то, что в пятнадцатом веке она еще не была окончена. Тогда ей еще недоставало четырех чудовищ по углам, имеющих вид сфинксов, задающих новому Парижу загадку старого. Ваятель Ро поместил их туда только в 1526 году, получив за свой труд двадцать франков. Дальше: церковь Сен-Мери со сводчатыми окнами; церковь Святого Иоанна, чудесный шпиль которой вошел в пословицу; Дом с колоннами, выходивший на Гревскую площадь, о которой мы уже рассказали читателю. Церковь Сен-Жервэ, впоследствии испорченная папертью в стиле «хорошего» вкуса, и десятки других памятников, не брезговавших погрузить свои чудеса в этот хаос черных, глубоких и узких улиц. Прибавьте к этому резные каменные кресты, которыми перекрестки изобиловали более, чем виселицами; кладбище «Невинных душ», видневшееся вдали, над морем зданий; архитектурную ограду; столбы рынка, верхушки которых выделялись между двумя печными трубами улицы Де-ла-Коссопри; лестницу церкви Де-ла-Круа-дю-Трагуар на перекрестке того же имени, вечно черневшем народом; развалины круглого Хлебного рынка; обломки древней ограды Филиппа Августа, потонувшие тут и там в массе домов; источенные временем башни; полуразрушенные ворота; бесформенные, рассыпающиеся остатки домовых стен; набережную с ее тысячами лавок и кровавыми живодернями; часть покрытой лодками Сены; представьте себе все это, и вы будете иметь смутное понятие о том, каков был в 1482 году вид центральной части Города.</p><p class="p1">Город, состоявший из двух кварталов: один – дворцов, другой – домов, опоясывался почти кругом рядом аббатств, тянувшихся со своими монастырями и часовнями с востока на запад, образуя по ту сторону фортификационных линий вторую, внутреннюю ограду. Непосредственно за Турневильским парком, между улицей Сент-Антуан и старой улицей Дю-Тампль, стоял величественный монастырь Святой Екатерины; оградой ему служила городская стена. Между обеими улицами Дю-Тампль, Старою и Новою, посреди обширной зубчатой ограды, хмурилась высокая, уединенная и мрачная громада аббатства Дю-Тампль. Между улицами Нев-дю-Тампль и Сен-Мартен находилось аббатство Сен-Мартен, великолепный укрепленный монастырь посреди садов, уступавший красотою башен своей ограды и тиарою своих колоколен разве только церкви Сен-Жермен-де-Пре. Между улицами Сен-Мартен и Сен-Дени виднелась ограда аббатства Святой Троицы. Наконец, между улицами Сен-Дени и Монторгель было аббатство Филь-Дье. В стороне можно было различить прогнившие кровли и полуразрушенную ограду Двора чудес; это было единственным мирским звеном, неизвестно как попавшим в эту цепь святынь.</p><p class="p1">Но Город имел и четвертое подразделение, резко обрисовывавшееся в путанице его домов на правом берегу. Эта часть, занимавшая западный угол Города, состояла из нового узла дворцов и особняков, теснившихся у подножия Лувра. Древний Лувр Филиппа Августа, огромное здание, вокруг главной башни которого было сгруппировано двадцать три других, немного меньших размером, не считая бесчисленного множества маленьких башенок, издали казался втиснутым между готическими кровлями особняка д’Алансон и Пти-Бурбон. Эта башенная гидра, исполинская охранительница Парижа, с ее двадцатью четырьмя грозно поднятыми головами, чудовищными свинцовыми и чешуйчатыми крестцами, вся переливавшаяся волнами металлических отблесков, восхитительно заканчивала собою западный угол Города.</p><p class="p1">Итак, Город представлялся громадным скоплением частных домов между двумя группами дворцов, увенчанных с одной стороны Лувром, а с другой – дворцом Ла Турнель и окаймленных на севере длинной линией аббатств и садов. Все это издали сливалось в одно целое. Над этим множеством зданий высились одна над другою черепичные и шиферные кровли, а над ними, причудливо рассекая воздух и перемешиваясь между собою, вонзались в небо стройные резные, узорчатые башни четырех церквей. Внизу вся эта масса зданий прорывалась через множество улиц и переулков, ограничиваясь с одной стороны стенами с четырехугольными башнями (башни стен Университета были круглые), а с другой – Сеною, пересекаемою мостами и покрытою всевозможными мелкими судами. Таков был Город в пятнадцатом веке.</p><p class="p1">За стенами Города, ближе к воротам, расположилось несколько предместий, но менее многочисленных и более разбросанных, чем за стенами Университета. За Бастилией скучилось десятка два плохоньких домишек вокруг любопытных скульптурных сооружений Круа-Фобан и массивных сводов аббатства Сент-Антуан-де-Шан; затем шли предместья: Попенкур, затерявшееся в хлебных полях; Ла Куртиль, веселенькая деревенька со множеством кабачков; местечко Сен-Лорен с церковью, колокольня которой издали сливалась с островерхими башнями ворот Сен-Мартен; предместье Сен-Дени с обширной оградой монастыря Сен-Ладр. За Монмартрскими воротами белели стены Гранж-Бательер; за ними высились меловые откосы самого Монмартра, в котором тогда было почти столько же церквей, сколько мельниц, и на котором теперь уцелели одни мельницы, так как современное общество требует только телесной пищи. Наконец, по ту сторону Лувра можно было видеть расстилающееся по лугам предместье Сент-Оноре, в то время уже довольно значительное, зеленеющую Пти-Бретань и развертывающийся Свиной рынок с черневшею посредине страшною черною печью, в которой заживо жарились фальшивомонетчики. Между предместьями Куртиль и Сен-Лорен глаз зрителя останавливается на своего рода здании, увенчивавшем одинокий холм посреди пустынной равнины и издали походившем на развалины колоннады с рассыпавшимся основанием. Это не был ни Парфенон, ни храм Юпитера олимпийского. Это был Монфокон.</p><p class="p1">Теперь, перечислив главные особенности описываемой картины и опасаясь, как бы все эти подробности не улетучились из памяти читателя по мере того, как мы их указываем, постараемся несколько короче резюмировать сказанное и дорисовать картину общего вида старого Парижа. Итак, повторяем: в центре – остров Сите, похожий своею формою на исполинскую черепаху, лапы которой образуются чешуйчатыми мостами, а голова – массою серых кровель; налево – сплошная трапеция Университета, как бы слитая, плотно сжатая, ощетинившаяся; направо – обширный полукруг Города, изобилующий садами и церквами. Эти три части – Сите, Университет и Город – изрыты бесчисленными улицами. Поперек всего этого тянется серебристая лента Сены, – Сены-кормилицы, как называл ее П. дю Брёль, – сплошь покрытая островами, мостами и судами. Всю эту панораму окружает необъятная равнина, покрытая пестрыми нивами, усеянная красивыми селениями. С левой стороны идут селения: Исси, Ванвр, Вожирар, Монруж и Шантильи с двумя башнями, круглой и четырехугольной. С правой стороны расположены двадцать селений, начиная с Конфлана и кончая Виль д’Эвек. На горизонте – кайма холмов, образующих круг как бы по краям бассейна. Наконец, вдали виднеются: на востоке – Венсен с семью четырехгранными башнями; на юге – острые вершины башен Бисетра; на севере – Сен-Дени с его стрелою, а на западе – Сен-Клуи с его крепостью. Вот каков был Париж, которым любовались с башен собора Парижской Богоматери вороны, жившие в 1482 году.</p><p class="p1">Между тем Вольтер сказал об этом городе, что он до Людовика XIV имел всего четыре хороших памятника: купол Сорбонны, церковь Валь-де-Грас, нынешний Лувр и, не помню, какой четвертый, кажется, Люксембург. К счастью, Вольтер написал «Кандида» и лучше всех остальных людей, сменявших друг друга в бесконечном ряду поколений, умел хохотать дьявольским смехом. Это, между прочим, доказывает, что можно быть гением в одном каком-нибудь искусстве и ничего не смыслить в остальных. Не воображал ли и Мольер, что он оказывал много чести Рафаэлю и Микеланджело, когда называл их Миньярами своего времени?</p><p class="p1">Но возвратимся к Парижу пятнадцатого века.</p><p class="p1">Париж был тогда не только красивым городом, но и цельным произведением зодчества и истории Средних веков, был каменною хроникою. Он был составлен всего из двух наслоений: римского и готического. Римское наслоение давно уже исчезло, за исключением терм Юлиана, в виде которых оно еще пробивалось сквозь толстую кору Средних веков. Что же касается отложения кельтского, то его следов не находили даже при рытье колодцев.</p><p class="p1">Пятьдесят лет спустя, когда начавшееся Возрождение принялось примешивать к этому строгому и вместе с тем разнообразному единству ослепительную роскошь своих фантазий и систем и праздновать свои оргии римского свода, греческих колонн и готических перекладин, распространять свою тонкую, идеальную скульптуру, свои любимые арабески и свое архитектурное язычество, современное Лютеру, – тогда Париж, быть может, сделался еще более прекрасным, зато не таким гармоничным для глаза и мысли. Но этот блестящий момент быстро миновал. Возрождение не отличалось беспристрастием: оно не довольствовалось созиданием – оно стремилось и к разрушению. Правда, ему нужно было очистить больше места. Таким образом, Париж лишь на мгновение был вполне готическим. Еще не успели окончить церкви Сен-Жак-де-ла-Бушри, как уже начали ломать старый Лувр.</p><p class="p1">С тех пор великий город с каждым днем все более и более терял свой облик. Париж готический, под которым исчезал романский, быстро исчез в свою очередь. Какой же Париж заменил его?</p><p class="p1">Был Париж Екатерины Медичи в Тюильри<a href="ch2.xhtml#id28" class="a">[50]</a>; Париж Генриха II в городской ратуше, – оба этих здания прекрасны еще до сих пор; Париж Генриха IV на Королевской площади – кирпичные фасады, каменные углы, шиферные кровли и трехцветные дома; Париж Людовика XIII – в церкви Валь-де-Грас – зодчество приземистое, придавленное, полуовальные своды с какими-то толстыми колоннами и горбатыми куполами; Париж Людовика XIV – в церкви Святого Сульпиция – каменные банты, облака, червячки и завитушки; Париж Людовика XVI – в Пантеоне (вообще все это здание слеплено кое-как); Париж республики – в Медицинской школе, – тоже плохом подражании римлянам и грекам, столь же похожем на Колизей или Парфенон, как конституция III года походит на законы Миноса, – этот вид зодчества назывался «стилем Мессидора»; Париж Наполеона – на Вандомской площади – нечто действительно грандиозное, но состоящее из одной бронзовой колонны, перелитой из пушек; Париж Реставрации – в здании Биржи – слишком белая колоннада с чересчур прилизанным фризом (здание это четырехугольное и стоило двадцать миллионов).</p><p class="p1">Каждому из этих своеобразных памятников соответствует по вкусу, форме и виду известное количество домов, рассеянных в различных частях города. В общей массе знаток сразу отличает эти дома и определяет их эпоху. Кто умеет смотреть, тот узнает дух века и характер данного царствования даже по ручке дверного молотка.</p><p class="p1">Но современный Париж не имеет никакой определенной физиономии. Это – простая коллекция образцов зодчества нескольких столетий, и притом далеко не лучших. Наша столица увеличивается только количеством зданий – и каких зданий? Париж теперь живет при таких условиях, что должен возобновляться каждые пятьдесят лет. Поэтому историческое значение его зодчества все более и более умаляется. Прежних памятников в нем становится меньше и меньше: они постепенно тонут среди новых зданий. Наши предки жили в каменном Париже, а потомки будут жить в Париже гипсовом.</p></span></span></span>
