<p class="p">10. Взгляды на вещи и на людей человека, выброшенного за борт жизни</p>
</div><p class="p1">У человека всегда есть затаенное желание – отомстить за доставленное ему удовольствие. Отсюда – презрение к актеру.</p><p class="p1">Это существо пленяет меня, развлекает, забавляет, восхищает, утешает, нравственно возвышает, оно мне приятно и полезно – каким же злом отплатить ему? Унижением. Презрение – это пощечина на расстоянии. Дадим ему пощечину. Он мне нравится – значит, он подл. Он мне служит, я его за это ненавижу. Где бы найти камень, чтобы бросить в него? Священник, дай мне твой камень! Философ, дай мне свой! Боссюэ, отлучи его от церкви! Руссо, поноси его! Оратор, осыпь его градом галек, которые ты держишь во рту! Медведь, запусти в него булыжником! Побьем камнями дерево, растопчем плод и съедим его. «Браво!» и «Долой его!» Декламировать стихи поэта – значит быть зачумленным. Эй ты, фигляр! Сейчас в награду за успех мы наденем на него железный ошейник и поставим к позорному столбу. Завершим его триумф травлей. Пусть он собирает вокруг себя толпу и тем самым создает свое одиночество. Так имущие классы, которые называют высшими, изобрели для комедианта особую форму отчуждения от общества – аплодисменты.</p><p class="p1">Простой народ не так жесток. Он не питал ненависти к Гуинплену, он не презирал его. Но все же самый последний из конопатчиков самого последнего экипажа на самом последнем судне в последнем из портов Англии считал себя неизмеримо выше этого увеселителя «сброда» и был убежден, что конопатчик настолько же выше скомороха, насколько лорд выше конопатчика.</p><p class="p1">Итак, как это бывает со всеми комедиантами, Гуинплена награждали рукоплесканиями и обрекали на одиночество. Впрочем, в этом мире всякий успех – преступление, которое приходится искупать. У каждой медали есть оборотная сторона.</p><p class="p1">Для Гуинплена этой оборотной стороны не существовало, потому что и то и другое последствие его успеха были ему по душе: он был рад аплодисментам и доволен одиночеством. Аплодисменты приносили ему богатство, одиночество дарило ему счастье.</p><p class="p1">В низших слоях общества быть богатым значит всего-навсего не быть бедным. Не иметь дыр на платье, не страдать от пустоты в желудке, от отсутствия дров в очаге. Есть и пить вволю. Иметь все необходимое, включая возможность подать грош нищему. Этого-то скромного благосостояния, достаточного, чтобы чувствовать себя свободным, и достиг Гуинплен.</p><p class="p1">Но душа его обладала несметным богатством: он любил и был любим. Чего мог он еще пожелать?</p><p class="p1">Он ничего и не желал.</p><p class="p1">Единственное, что ему можно было бы, пожалуй, предложить – это избавить его от уродства. Однако с каким негодованием он отверг бы такое предложение! Сбросить с себя маску, вернуть свое подлинное лицо, снова стать таким, каким он, быть может, был, – красивым и привлекательным, – он не согласился бы ни за что. Как бы он мог тогда кормить Дею? Что сталось бы с бедной кроткой слепой, любившей его? Без этой гримасы смеха на лице, делавшей из него единственного в своем роде комедианта, он оказался бы простым скоморохом, заурядным гимнастом, подбирающим жалкие гроши на мостовой, и Дея, возможно, не каждый день ела бы хлеб! С глубокой и трогательной гордостью он сознавал себя покровителем этого беззащитного небесного создания. Мрак, одиночество, нужда, беспомощность, невежество, голод и жажда – семь разверстых пастей нищеты – зияли перед ним, а он был святым Георгием, сражающимся с этим драконом. И он побеждал нищету. Чем? Своим безобразием. Благодаря своему безобразию он был полезен, он оказывал помощь, одерживал победу за победой, стал велик. Стоило ему только показаться публике, и деньги сыпались в его карман. Он властвовал над толпой, он был ее повелителем. Он все мог сделать для Деи. Он заботился об удовлетворении ее потребностей; он исполнял все ее желания, прихоти, фантазии в тех ограниченных пределах, какие могли быть у слепой девушки. Гуинплен и Дея, как мы уже говорили, были настоящим провидением друг для друга. Он чувствовал, что она возносит его на своих крыльях; она чувствовала, что он носит ее на руках. Нет ничего приятнее, чем покровительствовать любимому существу, давать необходимое тому, кто возносит вас к звездам. Гуинплен познал это высокое блаженство. Он был обязан им своему безобразию. Это безобразие давало ему превосходство надо всем. С помощью этой уродливой маски он содержал себя и своих близких; благодаря ей он был независим, свободен, знаменит, удовлетворен и горд собою. Уродство делало его неуязвимым. Рок уже был не властен над ним: рок выдохся, вероломно нанеся жестокий удар, который, однако, принес Гуинплену торжество. Пучина бед превратилась в вершину светлого счастья. Гуинплен находился в плену у собственного уродства, но этот плен разделяла с ним Дея. Темница, мы уже говорили это, стала раем. Между двумя заключенными и всем остальным миром стояла стена. Тем лучше. Эта стена отгораживала их от других, но зато и защищала. Какой вред можно было нанести Дее или Гуинплену, когда они были так далеки от всех жизненных волнений? Отнять у него успех? Невозможно. Для этого пришлось бы наделить Гуинплена другим лицом. Отнять у него любовь Деи? Невозможно. Дея не видела его. Слепота Деи была неисцелима. Какое же неудобство представляло для Гуинплена его безобразие? Никакого. Какие оно ему давало преимущества? Все. Несмотря на свое уродство, а может быть, благодаря ему, он был любим. Уродство и увечье инстинктивно потянулись одно к другому и вступили в союз. Быть любимым – разве это не все? Гуинплен думал о своем безобразии не иначе, как с признательностью. Клеймо оказалось для него благословением. Он с радостью сознавал, что оно неизгладимо и вечно. Какое счастье, что это благо у него никак нельзя отнять! Пока существуют перекрестки, ярмарочные площади, дороги, уводящие вдаль, народ внизу и небо над головою, можно быть уверенным в завтрашнем дне. Дея ни в чем не будет нуждаться, и они будут любить друг друга. Гуинплен не поменялся бы лицом с Аполлоном. Быть уродом – в этом заключалось все его счастье.</p><p class="p1">Потому-то мы и говорили в начале повествования, что судьба щедро одарила его. Этот отверженный был ее баловнем.</p><p class="p1">Он был так счастлив, что порой даже жалел окружавших его людей, – он был сострадателен. Впрочем, его бессознательно влекло взглянуть на то, что творится кругом, ибо на свете нет совершенно замкнутого в себе человека, и природа – не отвлеченность; он был рад, что стена отгораживает его от остального мира, однако время от времени он поднимал голову и смотрел поверх ограды. И, сравнив свое положение с положением других, он с еще большей радостью возвращался к своему одиночеству, к Дее.</p><p class="p1">Что же видел он вокруг себя? Что представляли собою эти существа, которые благодаря его постоянным странствиям возникали перед ним во всем своем разнообразии, ежедневно сменяясь другими? Вечно новые люди, а в действительности – все та же толпа. Вечно новые лица – и вечно все те же несчастия. Смешение всякого рода обломков. Каждый вечер все виды неизбежных социальных бедствий тесным кольцом обступали его счастье.</p><p class="p1">«Зеленый ящик» пользовался успехом.</p><p class="p1">Низкие цены привлекают низшие классы. К Гуинплену шли слабые, бедные, обездоленные. К нему тянулись, как тянутся к рюмке джина. Приходили купить на два гроша забвения. С высоты своих подмостков Гуинплен производил смотр этой угрюмой толпе народа. Один за другим проникали в его сознание эти образы бесконечной нищеты. Лицо человека отражает на себе состояние его совести и всю его жизнь: оно – итог множества таинственных воздействий, из которых каждое оставляет на нем свой след. Не было такого страдания, такой злобы и гнева, такого бесчестья, такого отчаяния, отпечатка которых не наблюдал бы Гуинплен на этих лицах. Вот эти детские рты сегодня ничего не ели. Вот этот мужчина – отец, эта женщина – мать: образы обреченных на гибель семей. Вон то лицо принадлежит человеку, находящемуся во власти порока и идущему к преступлению; причина ясна: это невежество и нищета. Были лица, отмеченные печатью природной доброты, уничтоженной социальным гнетом и превратившейся в ненависть. На лбу седой старухи можно было прочесть слово «голод»; на лбу юной девушки – слово «проституция». Один и тот же факт имел разные последствия для молодой и для старухи, но для кого из них они были тяжелее? В этой толпе были руки, умевшие трудиться, но лишенные орудий труда; эти люди хотели работать, но работы не было. Иногда рядом с рабочим садился солдат, порою инвалид, и перед Гуинпленом вставал страшный призрак войны. Здесь Гуинплен угадывал безработицу, там – эксплуатацию, а там – рабство. На некоторых лицах он замечал явные признаки вырождения, постепенный возврат человека к состоянию животного, вызванный в низших слоях общества тяжким гнетом блаженствующей верхушки его. И в этом беспросветном мраке Гуинплен видел лишь одну светлую точку. Он и Дея, пройдя через горькие страдания, были счастливы. На всем остальном лежало клеймо проклятия. Гуинплен знал, что над ним стоят власть имущие, богатые, знатные, баловни судьбы, и чувствовал, как они бессознательно топчут его; а внизу он различал бледные лица обездоленных. Он видел себя и Дею, свое крошечное и в то же время безграничное счастье, между этими двумя мирами; вверху был мир свободных и праздных, веселых и пляшущих, беспечно попирающих других ногами; внизу – мир тех, которых попирают. Подножием блеска служит тьма – печальный факт, свидетельствующий о глубоком общественном недуге. Гуинплен отдавал себе отчет в этом печальном явлении. Какая унизительная участь! Человек способен так пресмыкаться! Такое тяготение к праху и грязи, такое отвратительное самоотречение вызывали у него желание раздавить эту мерзость ногой. Для какой же бабочки может служить гусеницей подобное существование? И перед каждым в этой голодной, невежественной толпе стоит вопросительный знак. Что ждет его – преступление или позор? Растление совести – неизбежный закон существования всех этих людей. Здесь нет ни одного ребенка, которого не ждало бы унижение, ни одной девушки, которой не пришлось бы торговать собой, ни одной розы, которой не предстояло бы быть растоптанной!</p><p class="p1">Порой Гуинплен пытался всмотреться пытливым и сочувственным взором в самые глубины этого мрака, где гибло столько бесплодных порывов, где столько сил сломилось в борьбе; он видел перед собой целые семьи, павшие жертвой общества, честных людей, искалеченных законом, раны, ставшие гнойниками из-за системы уголовных наказаний, бедняков, истощаемых налогами, умных, увлекаемых невежеством в пучину мрака; он видел тонущие плоты, усеянные голодными, войны, неурожаи, сонмы смертей. И эта душераздирающая картина всеобщих бедствий заставляла болезненно сжиматься его сердце. Он как будто воочию видел всю накипь несчастий над мрачным морем человечества. А он был надежно укрыт в гавани и лишь со стороны наблюдал это страшное кораблекрушение. Иногда он закрывал руками свое обезображенное лицо и погружался в раздумье.</p><p class="p1">Какое безумие – быть счастливым! Чего только не приходило ему в голову! В его мозгу зарождались самые нелепые мысли. Когда-то он пришел на помощь младенцу, теперь в нем рождалось страстное желание помочь всем обездоленным. Эти смутные мечты порою даже заслоняли от него действительность; он терял чувство меры до такой степени, что задавал себе вопрос: «Как же, чем же помочь этому бедному народу?» Порою он так погружался в эти мысли, что произносил эти слова вслух. Тогда Урсус пожимал плечами и пристально смотрел на него. А Гуинплен продолжал мечтать:</p><p class="p1">– Ах, будь в моих руках власть, как бы я помогал несчастным! Но что я? Жалкое ничтожество. Что я могу сделать? Ничего.</p><p class="p1">Он ошибался. Он немало делал для несчастных. Он заставлял их смеяться.</p><p class="p1">А мы уже сказали, что заставить людей смеяться – значит дать им забвение.</p><p class="p1">И разве не благодетель человечества тот, кто дарит людям забвение?</p></span></span></span></span>
