<p class="p">III. Рассказ о маисовой лепешке</p>
</div><p class="p1">В то время, к которому относится наш рассказ, келья Роландовой башни была занята. Если читатель полюбопытствует узнать, кем именно, пусть прислушается к беседе трех почтенных кумушек, которые как раз в ту минуту, когда мы остановили внимание читателя на «Крысиной норе», шли в ее сторону, пробираясь от Шатлэ вдоль реки к Гревской площади.</p><p class="p1">Две из этих кумушек были одеты так, как подобало настоящим парижским гражданкам. Их тонкие белые шейные косынки, юбки из полосатой, красной с голубым, шерстяной ткани, белые чулки с цветными вышитыми стрелками, красиво облегавшие ноги, желтые кожаные башмаки с квадратными вырезами и черными подошвами, а главное – их головные уборы наподобие рога из блестящей сетки, с которой спускалось множество лент и кружев, – указывали на их принадлежность к разряду богатых купчих, занимающих среднее положение между теми, которых лакеи называют просто женщинами, и теми, которых они величают дамами. На них не было ни золотых колец, ни крестов, но сразу заметно было, что они отказывают себе в удовольствии щеголять такими украшениями вовсе не из бедности, а просто из боязни штрафа. Спутница этих купчих была одета приблизительно так же, как они, но во всем ее наряде и в манерах было что-то, изобличавшее в ней провинциалку. При одном взгляде на ее слишком высоко подтянутый пояс можно было понять, что она очень недавно приехала в Париж. Прибавьте к этому шейную косынку со складками, банты на башмаках, юбку с поперечными, а не с продольными полосами и множество других отступлений от хорошего вкуса.</p><p class="p1">Купчихи шли той особенною походкою, которая свойственна только парижанкам, показывающим свою столицу приезжей родственнице или знакомой из какого-нибудь провинциального захолустья. Приезжая вела за руку толстого мальчугана, державшего в руке большую лепешку. К великому нашему прискорбию, мы должны сознаться, что, по случаю холодной погоды, он вместо носового платка пользовался своим языком.</p><p class="p1">Мальчик давал себя тащить non passibus aequis<a href="ch2.xhtml#id205" class="a">[85]</a>, как выражается Вергилий, и на каждом шагу спотыкался, причем его мать громко вскрикивала. И действительно, он больше смотрел на лепешку, чем себе под ноги. Должно быть, важные причины мешали ему приняться за истребление этой лепешки и заставляли его довольствоваться одним любовным созерцанием ее. Матери следовало бы самой нести лепешку. Было слишком большою жестокостью подвергать этого толстощекого малыша мукам Тантала.</p><p class="p1">Между тем все три «дамуазели» (так назывались в то время женщины недворянского происхождения, в отличие от дам высшего сословия) без умолка тараторили.</p><p class="p1">– Однако нам нужно поторопиться, дамуазель Магиета, – говорила, обращаясь к провинциалке, самая молодая и вместе с тем самая толстая из кумушек. – Боюсь, мы опоздаем. Ведь в Шатлэ говорили, что его сейчас же поведут к позорному столбу.</p><p class="p1">– Ах, что вы, дамуазель Ударда Мюнье! – с жаром возразила другая парижанка. – Разве вы не слыхали, что его продержат тут целых два часа? Времени у нас вполне достаточно… А вы видели когда-нибудь позорный столб, милая Магиета?</p><p class="p1">– Конечно, у нас в Реймсе, – отвечала провинциалка.</p><p class="p1">– Ну, какой уж позорный столб может быть у вас в Реймсе! Так, какая-нибудь дрянная клетка, в которой выставляют одних неотесанных крестьян… Есть чем хвалиться!</p><p class="p1">– Крестьян! – с негодованием повторила Магиета. – Это на Суконном-то рынке, в Реймсе? Ну, нет, вы ошибаетесь, мы видали там очень замечательных преступников, даже таких, которые убивали отца и мать!.. Крестьян!.. Да за кого вы нас принимаете, милая Жервеза?</p><p class="p1">Очевидно, провинциалка была готова энергично вступиться за честь позорного столба своего родного города. К счастью, благоразумная Ударда Мюнье поспешила свернуть разговор на другую тему.</p><p class="p1">– Кстати, дамуазель Магиета, – сказала она, – как понравились вам наши фламандские послы? Бывали у вас такие в Реймсе?</p><p class="p1">– Нет, надо сказать правду, что таких послов можно увидать только в Париже, – согласилась Магиета.</p><p class="p1">– А заметили вы между ними того высокого и толстого посла, который назвал себя чулочником?</p><p class="p1">– Да, – сказала Магиета, – он похож на настоящего Сатурна.</p><p class="p1">– А того толстяка, у которого лицо похоже на голое брюхо? – продолжала Жервеза. – И того низенького, с маленькими глазами и красными веками, растрепанного, как куст репейника?</p><p class="p1">– Больше всего мне понравились их лошади, – они так красиво обряжены по моде их страны, – заметила Ударда.</p><p class="p1">– Ах, моя милая! – воскликнула Магиета, в свою очередь принимая вид превосходства. – Что же вы бы сказали, если бы в шестьдесят первом году, восемнадцать лет тому назад, увидали лошадей принцев и королевской свиты у нас, в Реймсе, на коронации? Какие там были попоны и чепраки – просто умопомрачительные!.. У одних из дамасского сукна или из золотой парчи, обшитые соболями; у других – бархатные с горностаевой отделкой; у некоторых так и горели золотом, с толстыми золотыми или серебряными кистями… Каких страшных денег все это должно было стоить… А если бы вы видели, какие хорошенькие пажи сидели на этих лошадях!</p><p class="p1">– Все это может быть, – сухо сказала Ударда. – А все-таки и у фламандцев лошади очень хороши и богато убраны, да и ужин вчера был задан посольству на славу в ратуше господином купеческим старшиною. Говорят, за столом подавали обсахаренный миндаль, вино с корицей, пряности и другие редкости.</p><p class="p1">– Что вы, милая соседка! – вскричала Жервеза. – Да ведь фламандцы ужинали у кардинала, в Малом Бурбонском дворце!</p><p class="p1">– Да нет же! В ратуше.</p><p class="p1">– Ну, вот опять! Говорю вам, в Малом Бурбонском дворце!</p><p class="p1">– Нет, они ужинали именно в ратуше! – задорно возразила Ударда. – Еще доктор Скурабль сказал им там прекрасную латинскую речь, которой они остались очень довольны. Мне сказал это мой муж, присяжный книготорговец.</p><p class="p1">– Нет, – упорствовала Жервеза, – они ужинали в Малом Бурбонском дворце! Я даже могу перечислить вам все, что им представил посланный кардинала: двенадцать двойных бутылок вина с пряностями, белого, розового и красного; двадцать четыре коробки самых лучших раззолоченных лионских пряников; столько же факелов, весом в два фунта каждый; полдюжины белого и красного боннского вина самого лучшего достоинства и много других хороших вещей… Думаю, что я лучше других должна это знать. Мне об этом рассказывал муж, а он, как вам известно, состоит пятидесятником в отряде судебных сержантов. Он сегодня утром сравнивал фламандских послов с послами императора требизондского, которые приезжали из Месопотамии в Париж при последнем короле и носили в ушах кольца.</p><p class="p1">– А все-таки фламандцы ужинали в ратуше, – продолжала Ударда, нисколько не смущенная доводами Жервезы. – Это так же верно, как и то, что с тех пор, как стоит ратуша, никогда не видали такой пропасти жарких и сластей.</p><p class="p1">– А я вам говорю, что они ужинали в Малом Бурбонском дворце! – кипятилась Жервеза. – Наверное, вас сбило с толку слышанное от кого-то, что им прислуживал сержант городского управления ле Сек. Вот вы все и спутали.</p><p class="p1">– Нет, это вы путаете! Они ужинали в ратуше.</p><p class="p1">– В Малом Бурбонском дворце, моя милая, в Малом Бурбонском! Я даже знаю, что слово «Надежда», которое выбито над главным входом в этот дворец, было иллюминовано разноцветными огнями.</p><p class="p1">– В ратуше, в ратуше, говорю вам!.. Еще Гюссон ле Вуар играл там на флейте во время ужина.</p><p class="p1">– Говорю вам – нет!</p><p class="p1">– А я вам говорю – да!</p><p class="p1">– Да нет же, нет!</p><p class="p1">Толстая Ударда собиралась ответить, и спор угрожал перейти в крупную ссору, которая могла кончиться потасовкою, если бы в эту минуту Магиета не воскликнула:</p><p class="p1">– Смотрите, смотрите, сколько собралось народу в конце моста!.. Там что-то случилось… Видите, как все столпились!</p><p class="p1">– И то правда, – сказала Жервеза. – Слышите бубен?.. Э, да там, должно быть, маленькая Эсмеральда со своей козой… Ну, милая Магиета, прибавьте шагу да и сынишку заставьте идти попроворнее… Ведь вы приехали, чтобы ознакомиться со всем, что есть интересного у нас, в Париже. Вчера вы видели наших фламандских послов, а сегодня вам надо посмотреть цыганку.</p><p class="p1">– Цыганку?! – повторила Магиета, энергично прокладывая себе путь локтями и крепко сжимая руку ребенка. – Нет, сохрани меня господи! Она еще украдет у меня мальчика!.. Идем отсюда, Эсташ, – торопила она мальчугана.</p><p class="p1">Она бегом пустилась вдоль набережной по направлению к Гревской площади и бежала до тех пор, пока мост не остался далеко позади. Наконец Эсташ от усталости упал на колени, и она сама, вся запыхавшись, остановилась. Ударда и Жервеза вскоре догнали ее.</p><p class="p1">– С чего вам пришло в голову, что эта цыганка может украсть у вас ребенка? – спросила Жервеза. – Какая дикая фантазия!</p><p class="p1">Магиета задумчиво покачала головой.</p><p class="p1">– Странно! – заметила Ударда. – Ведь вот и затворница то же самое говорит о цыганках.</p><p class="p1">– Какая затворница? – спросила Магиета.</p><p class="p1">– Да сестра Гудула, – ответила Ударда.</p><p class="p1">– А кто же такая эта сестра Гудула?</p><p class="p1">– Вот и видно, что вы только что приехали из вашего Реймса! – воскликнула Ударда. – Да ведь это затворница «Крысиной норы».</p><p class="p1">– Как? – спросила Магиета. – Та несчастная, которой мы несем лепешку?</p><p class="p1">Ударда утвердительно кивнула головою и сказала:</p><p class="p1">– Ну да, та самая. Вы сейчас ее увидите у окошечка ее кельи, – оно выходит прямо на площадь… Да, она думает то же, что и вы, об этих египетских бродягах, которые бьют в бубен и предсказывают судьбу. Никто не знает, почему затворница так ненавидит этих цыган. Но вы-то, милая Магиета, почему так испугались одного упоминания о цыганке?</p><p class="p1">– Ах! – вскричала Магиета, обхватывая обеими руками белокурую головку своего ребенка. – Я не хочу, чтобы со мной случилось то, что было с Пакетой Шанфлери.</p><p class="p1">– Э, да это, кажется, пахнет целой историей! Вы нам расскажете ее, не так ли, милая Магиета? – проговорила Жервеза, беря приезжую за руку.</p><p class="p1">– Пожалуй, расскажу, – согласилась провинциалка. – Но вот сейчас видно, что и вы дальше своего Парижа нигде не бывали, если даже ничего не слыхали о Пакете… Так вот… Да что же мы остановились? Разве я не могу рассказывать на ходу?.. Ну, так вот, нужно вам сказать, что Пакета Шанфлери была красивой восемнадцатилетней девушкой как раз в то время, когда я была такою же, то есть восемнадцать лет тому назад. Если из нее теперь не вышло такой же здоровой, цветущей женщины тридцати шести лет, имеющей мужа и ребенка, как я, то она сама виновата… Впрочем, ей уже с четырнадцати лет поздно было думать о замужестве… Отца ее звали Гиберто. Он был реймским судовым менестрелем – тем самым, который имел счастье играть и петь перед самим королем Карлом Седьмым, когда король во время празднества по случаю своей коронации катался в лодке по нашей реке Веле, от Сильери до Мюизона. Сама девственница была вместе с ним в лодке. Старик отец умер, когда Пакета была еще ребенком. У нее, таким образом, осталась только мать, которая была сестрою господина Прадона, мастера медных и котельных изделий, жившего в Париже, на улице Парен-Гарлен. Он умер только в прошлом году. Как видите, жена Гиберто происходила из хорошего рода и вдобавок была доброю женщиною, но, на свою беду, она ничему не научила Пакету, кроме вышивания золотом и бисером разных безделушек. Ну, так вот девочка и росла, а достатка не прибавлялось. Жили они вдвоем с матерью в Реймсе, у самой реки, в улице Фоль-Пен. Запомните это: мне думается, что от этого и произошло все несчастье Пакеты. В шестьдесят первом году, когда наш король Людовик Одиннадцатый – да хранит его Бог! – вступил на престол, Пакета была такая хорошенькая и веселенькая резвушка, что ее прозвали Шанфлери<a href="ch2.xhtml#id204" class="a">[86]</a>. Бедняжка! Зубы у нее были точно жемчуг, и она то и дело смеялась, чтобы похвастаться ими. А это уж известно, что когда девушки много смеются, значит, готовят себе ручьи слез в будущем. Красивые зубы погубят красивые глаза. Так вот какая была эта Пакета Шанфлери… Жить им с матерью было очень трудно. Менестрель-то им ничего не оставил. Своими безделушками они зарабатывали не больше шести денье в неделю, стало быть, меньше двух лиардов каждая. Разве такие были у них средства при жизни Гиберто? Он во время коронации одними своими песенками заработал двенадцать парижских су… Итак, вот в одну очень холодную зиму… это случилось как раз в шестьдесят первом году… у них не было ни одной хворостинки, чтобы протопить себе печку. От холода у бедной Шанфлери так зарумянились щеки, что мужчины больше прежнего стали на нее заглядываться. Тут-то и стряслась беда. В эту самую зиму она и сгубила себя… Эсташ, ты никак собираешься приняться за лепешку? Смотри у меня!.. Мы тогда же все сразу поняли, что она пропала, когда она в одно воскресенье пришла в церковь с золотым крестиком на шее. Это в четырнадцать-то лет, а? Началось с виконта де Кормонтрёля, у которого есть замок в трех четвертях лье от Реймса. Потом на его место явился мессир Анри де Трианкур, королевский всадник. После него она перешла к сержанту Шиару де Больону. Потом она начала опускаться все ниже и ниже и попала сначала к Гери Обержону, который был лакеем при королевском столе, затем к Масэ де Фрепюсу, цирюльнику дофина; потом сошлась с Тевененом ле Муэном, королевским поваром, пока наконец, переходя все к более старым и менее благородным, не попала в руки Гильома Расина, менестреля-сказочника, а уж от него прямо к фонарщику Тьери де Меру. Вообще, бедняжка в конце концов пустилась, как говорится, во все тяжкие и дошла до того, что во время коронации нашего благочестивого короля попала вовсе на улицу… вы понимаете?.. И все это в один год!</p><p class="p1">Магиета вздохнула и утерла слезы, навернувшиеся у нее на глаза.</p><p class="p1">– Ну, это история самая обыкновенная, – заметила Жервеза. – Мы думали, вы нам порасскажете что-нибудь о цыганках, которые воруют детей…</p><p class="p1">– Погодите, – продолжала Магиета, – дойдет и до этого. В нынешнем месяце, в день святого Павла, будет ровно шестнадцать лет, как Пакета родила девочку. Это, стало быть, случилось в шестьдесят шестом году… Бедняжка была ужасно рада этому, потому что давно уже желала иметь ребенка. Мать ее, эта простушка, которая всю свою жизнь только и умела, что закрывать на все глаза, уже умерла. Пакете некого было больше любить, да и ее не любил никто. Со времени ее первой беды прошло пять лет. Жизнь ее была так плоха, что и сказать нельзя. Она осталась на свете одна как перст. Все только и знали, что срамить ее. На улицах ей не давали прохода, городская стража ее колотила, мальчишки бросали в нее грязью и насмехались над нею. И потом ей ведь стукнуло уже двадцать лет, а это для таких женщин, как она, уже старость. От своего уличного промысла она получала не больше того, что в прежнее время зарабатывала иголкою. Каждая лишняя морщинка на лице убавляла ее заработок. Зимою она постоянно дрожала от холода, потому что нечем было топить печь, есть тоже приходилось не каждый день; у нее часто не было даже корки хлеба. Работать она больше не могла, потому что, пустившись гулять, обленилась… Впрочем, вернее будет сказать, что она и загуляла-то оттого, что всегда была ленива… Священник церкви Сен-Ромен говорит, что такие женщины в старости больше других страдают от холода и голода…</p><p class="p1">– Все это прекрасно, – перебила Жервеза, – но где же цыганки?</p><p class="p1">– Ах, какая вы нетерпеливая! – воскликнула более степенная Ударда. – Дайте же ей рассказать все по порядку. Не с конца же начинать вам… Продолжайте, Магиета, вы так интересно рассказываете… Бедная Шанфлери!</p><p class="p1">Магиета продолжала:</p><p class="p1">– Она никак не могла выбиться из нужды и плакала так, что ее щечки избороздили потоки слез. Но среди своего одиночества, срама и позора ей казалось, что она не будет такой одинокой, опозоренной и отверженной, если кого-нибудь полюбит чистой любовью и такой же любовью будут отвечать ей. И ей захотелось иметь ребенка, который, по своей ангельской невинности, мог бы дать ей эту любовь. Она поняла это после того, как сошлась с одним вором, единственным человеком, который мог ее пожелать. Но через некоторое время она заметила, что даже вор ее презирает… А между тем именно таким несчастным женщинам и необходима какая-нибудь сильная привязанность, чтобы наполнить их сердце: если не любовник, то хоть ребенок. Без этого им уж слишком тяжело жить. Не находя верного любовника, она горячо стала желать ребенка, а так как она всегда была набожною, несмотря на свою грешную жизнь, то постоянно просила Бога послать ей хотя это утешение. И вот Господь сжалился над нею и послал ей дочку. Трудно описать, как она была рада этому. Бедняжка чуть не зацеловала и не заласкала до смерти своего ребенка и обливала его слезами радости. Она сама стала кормить свою дочку и наделала ей пеленок из своего единственного старенького одеяла. От счастья она не чувствовала ни холода, ни голода; она даже опять похорошела. Это, впрочем, всегда так: даже старая девушка бывает молодой матерью. Опять нашлись ухажеры, да еще такие, которые стали ей хорошо помогать. Но она почти все деньги, добытые грехом, тратила на шелковые шапочки, переднички с кружевцами, хорошенькие платьица и разные другие безделушки для своей дочки, а сама так и оставалась без одеяла. Так вот… Эсташ! Я уж говорила тебе, чтобы ты не смел есть этой лепешки!.. Так вот, маленькая Агнеса… Так звали ребенка, а фамилии у самой Шанфлери давно уже не было… Ну вот, я и говорю, что маленькая Агнеса всегда была нарядна, как принцесса. Между прочим, у девочки была пара таких башмачков, каких, я думаю, не было и у самого короля Людовика Одиннадцатого в детстве. Мать сама их сшила из розовой шелковой материи и украсила разными блестками и золотыми шнурочками, словно покров Богоматери. Обойди, кажется, весь свет, а лучших башмачков не найдешь. Величиною они были не длиннее моего большого пальца, а девочке приходились как раз впору. Можно себе представить, какие крошечные ножки были у Агнесы! А как они были хороши, просто загляденье! Пухленькие и розовенькие, так что их даже трудно было отличить от розовых башмачков… Когда у вас будут дети, милая Ударда, вы поймете, что нет ничего прелестнее детских ручек и ножек…</p><p class="p1">– Ах! – со вздохом произнесла Ударда. – Я только и мечтаю о ребенке, но мой муж, господин Анри Мюнье, не желает иметь детей.</p><p class="p1">– Но у дочки Пакеты, – продолжала Магиета, – были хороши не одни ножки. Я видела ее, когда ей было всего четыре месяца, и могу сказать, что она казалась настоящим ангелочком. Глаза у нее были больше ротика, а головка покрыта тонкими черными вьющимися волосиками. Шестнадцати лет она была бы такой красавицей, что другой подобной ей не сыскать было на всем свете. Мать с каждым днем все больше и больше сходила с ума по своей дочке. Только и знала, что возиться с девочкою: мыла, чесала, наряжала, кормила, ласкала и баловала ее по целым дням. От счастья она не знала, как благодарить Бога. Особенно восхищалась она розовыми ножками дочки: никак не могла на них налюбоваться и беспрестанно их целовала, чуть не готова была съесть их. Сто раз в день она то обувала, то разувала эти ножки, восторгалась ими, разглядывала их на свет и едва не плакала от жалости, когда девочка начала пробовать переступать ими по постели. Одним словом, счастливая мать не поленилась бы, кажется, всю жизнь простоять на коленях перед ножками дочери, точно перед какою-нибудь святыней, и все время обувать, разувать и целовать их…</p><p class="p1">– Все это очень хорошо, – проворчала снова Жервеза, – а цыганок-то я все-таки еще не вижу.</p><p class="p1">– Погодите, сейчас будут и они, – сказала рассказчица и продолжала: – В один прекрасный день в Реймс прибыли какие-то странные всадники, не то нищие, не то бродяги, шлявшиеся по стране под предводительством своего герцога и своих графов. Лица у них были смуглые, волосы – курчавые, а в ушах блестели большие круглые серебряные серьги. Женщины их были еще хуже мужчин: почти совсем черные, в драных юбчонках и каких-то дерюгах на плечах. Волосы у них были распущены по плечам на манер лошадиной гривы. Детей их, цеплявшихся за подолы матерей, испугались бы и обезьяны. Словом, это была настоящая шайка нехристей. Как мы потом узнали, вся эта нечисть пожаловала в Реймс прямо из Египта, через Польшу. Говорили, что они были на исповеди у Папы и тот наложил на них епитимью, чтобы они семь лет подряд странствовали по белу свету и во все это время не спали ни одной ночи в постели. Поэтому они сами называли себя кающимися, и от них ужас как несло какою-то вонью. Кажется, они когда-то были сарацинами и поэтому, конечно, должны были верить в Юпитера… Вдобавок они брали по десяти турских ливров со всех архиепископов, епископов и аббатов, имевших митры и кресты. Говорили, что это им было разрешено Папой. В Реймс они притащились затем, чтобы предсказывать судьбу от имени алжирского короля и германского императора. Так как им было воспрещено пребывание в самом городе, то вся их ватага расположилась станом за стенами города, у Бренских ворот, на пригорке, где стоит мельница, рядом со старыми каменоломнями, где когда-то добывали мел. Понятно, что чуть не весь Реймс устремился к этим предсказателям. Они глядели людям на руки и предсказывали всякие чудеса. Кажется, сунь им сам Иуда-предатель свою нечестивую ручищу, они и ему предсказали бы, что он будет Папой. Это, впрочем, все было бы еще ничего, но про них ходила дурная молва: поговаривали, будто они похищают детей и воруют у ротозеев кошельки и едят человеческое мясо. Благоразумные люди говорили дуракам: «Не ходите», а сами украдкою бывали у них. Все словно очумели… Впрочем, это было неудивительно: они предсказывали всем такие вещи, что любой кардинал и тот бы потерял голову. Все матери совсем рехнулись от гордости, после того как цыганки вычитали на руках их деточек всякие умопомрачительные вещи, написанные будто бы на детских ручках по-язычески и по-турецки. У одной сыночку суждено, вишь, быть императором, у другой – Папой, у третьей – великим полководцем. Несчастную Шанфлери тоже разобрало любопытство: захотелось и ей узнать, не сделается ли ее хорошенькая дочка когда-нибудь армянской императрицею или чем-нибудь в этом роде. Вот и она бросилась со своей девочкой к цыганкам. Те восхищались ребенком, ласкали его, целовали своими черными губами. Ножки и башмачки девочки, которой тогда еще не было и года, хитрые цыганки нашли такими восхитительными, каких, по их словам, не было ни у одного ребенка в свете, да и не будет. Девочка что-то лепетала, заливалась смехом, глядя на мать, и хлопала ручонками. При этом она была такая пухленькая, румяная и быстроглазая и корчила такие уморительные гримаски, что на нее и правда нельзя было достаточно налюбоваться. Наконец, девочке сделалось скучно или страшно от обступивших ее со всех сторон цыганок: она громко заплакала. Но мать живо успокоила ее поцелуями и ушла с нею, не помня себя от радости, когда ворожеи предсказали ей, что ее девочка будет невиданной красавицей, умницей, королевой. Бедная Шанфлери, сама не своя от гордости, что несет на руках будущую королеву, не помнила, как вернулась в свою бедную каморку в улице Фоль-Пен. На другой день она улучила минутку, когда Агнеса спала на ее кровати, куда она всегда клала ее, и побежала к соседке на улицу Сешри похвалиться, что настанет день, когда ее Агнесе будут прислуживать за столом даже такие лица, как английский король и эфиопский эрцгерцог, и кучу разных других чудес. Возвращаясь и не слыша крика ребенка, Пакета подумала, что девочка все еще спит, и была очень этим довольна. Ее удивило только то, что дверь каморки оказалась отворенною более широко, чем она ее оставила. Она поспешно вошла в каморку и бросилась к кровати. Кровать оказалась пустою: вместо ребенка на ней лежал один из его розовых башмачков. Как безумная, она бросилась вон из дому, вихрем слетела с лестницы и стала колотиться головой об стену, крича: «Дитя мое… У кого мое дитя? Кто взял мое дитя?» В доме в это время не было ни души. Пакета побежала по улице и стала там кричать то же самое; но улица была пуста, и никто не мог ей сказать, куда девалась ее девочка. Несчастная мать обегала весь город, заглядывала во все встречные дворы, совалась во все двери и окна, как разъяренная тигрица, у которой отняли детеныша. Растрепанная, с искаженным лицом, задыхающаяся, с сухими горящими глазами, она была страшна. Она останавливала встречных и кричала: «Где моя дочь?.. Отдайте мне мою девочку… Кто мне вернет мою дочь, я буду его слугою… даже слугою его собаки… Если нужно, я свое сердце отдам на съедение этой собаке!..» Встретив священника церкви Сен-Реми, она сказала ему: «Господин кюре, я готова голыми руками копать землю, только верните мне мою девочку!» Это было ужасно, уверяю вас, Ударда. Даже прокурор Понс Лакабр и тот заплакал, глядя на обезумевшую от горя мать, а уж на что, кажется, он был черств сердцем… Только поздно вечером вернулась она домой и узнала от соседки, что, пока она бродила по городу, в ее каморку потихоньку пробрались две цыганки, одна из них несла в руках какой-то сверток. Немного погодя эти цыганки торопливо спустились вниз и, как только вышли на улицу, исчезли, словно провалились сквозь землю. После этого из каморки Пакеты стал слышаться писк ребенка. Выслушав это, Пакета радостно засмеялась, взлетела на лестницу словно на крыльях, одним ударом распахнула дверь и вошла… Ах, милая Ударда, страшно даже сказать, что она там увидела. Вместо вымоленной у Бога своей красавицы дочки, этой беленькой, румяной и пухленькой девочки с громадными ясными глазами и кудрявыми волосами, на полу ползал какой-то безобразный уродец, кривой, горбатый, колченогий, – вообще такое страшилище, что и вообразить себе трудно… Пакета закрыла глаза от ужаса. «Господи! – кричала она. – Неужели злые колдуньи обратили мою девочку в этого страшного звереныша?..» Прибежали соседки и поскорее унесли уродца: они боялись, что Пакета сойдет с ума, глядя на него… Все поняли, что это отродье самого нечистого и какой-нибудь цыганки. На вид уродцу было года четыре, и он все бормотал что-то непонятное, – знать, на чертовском языке. Пакета бросилась на башмачок – все, что оставалось ей от того, что она любила. Долго она лежала ничком на кровати, не шевелясь, молча, даже без слез и точно не дыша. Думали уж, не умерла ли она. Вдруг она задрожала, поднялась и, не переставая осыпать поцелуями башмачок, так принялась голосить, что у нас сердце разрывалось на части. Я была при этом, и мы все плакали навзрыд. Она повторяла: «Дочка моя! Милая моя, дорогая девочка! Где ты?» А у нас мороз так по коже и пробежит. Я и сейчас готова плакать, как только вспомню об этом… Ведь дети-то наши – мозг наших костей. О мой милый Эсташ, что бы я стала делать без тебя?.. Если бы вы знали, какой он у меня умник! Вчера еще говорит мне: «Мама, я хочу быть жандармом…» Ах ты, ангелочек мой славный! Никуда я тебя не отпущу! Так вот, Пакета… Вдруг она вскочила и выбежала на улицу. Там она принялась кричать отчаянным голосом: «Бежим в цыганский табор… Зовите сержантов! Нужно сжечь этих проклятых ведьм!» Но цыган уже и след простыл. Наступила ночь, и такая темная, что хоть глаз выколи. Разыскивать колдунов нечего было и думать. На другой день неподалеку от Реймса, на пустоши между Гё и Тиллуа, нашли следы от большого костра, ленточки от наряда Агнесы, капли крови и козий помет. Накануне была суббота, поэтому все догадались, что цыгане справляли на этой пустоши свой шабаш и сожрали дочку Пакеты в компании с Вельзевулом, как это водится у магометан. Когда Пакета узнала про все эти ужасы, она не проронила ни одной слезинки, а только все шевелила губами, словно хотела что-то сказать. На другое утро она оказалась вся седая, а на третий день исчезла…</p><p class="p1">– Да, это действительно ужасная история и может разжалобить даже бургундца, – заметила Ударда.</p><p class="p1">– После этого я не удивляюсь, что вы так боитесь цыган, – добавила Жервеза.</p><p class="p1">– Вы хорошо сделали, что сейчас убежали сюда со своим Эсташем, потому что цыгане, которые бродят у нас по Парижу, тоже из Польши, – продолжала Ударда.</p><p class="p1">– Нет, – сказала Жервеза, – говорят, они пришли из Испании и из Каталонии.</p><p class="p1">– Из Каталонии?.. Ну, может быть, – сдалась Ударда. – Польша, Каталония, Валония – это все одно и то же; я всегда смешиваю эти три провинции. Во всяком случае, верно то, что тут бродят цыгане…</p><p class="p1">– И что у них зубы достаточно остры, чтобы пожирать детей, – подхватила Жервеза. – Мне думается, что даже эта Эсмеральда втихомолку лакомится детским мясом, несмотря на то что умеет так хорошо складывать свои губки сердечком. Ее белая коза, с которою она постоянно показывается, выкидывает такие хитрые штуки, что едва ли дело тут чисто.</p><p class="p1">Магиета теперь шла молча. Она была погружена в ту глубокую задумчивость, которая всегда служит как бы продолжением только что оконченного печального повествования и прекращается лишь тогда, когда на дне души угаснет волнение, вызванное грустным содержанием рассказа. Но Жервеза обратилась к ней с вопросом:</p><p class="p1">– Неужели так никто и не узнал, что сделалось с Пакетой?</p><p class="p1">Магиета не отвечала. Жервеза повторила свой вопрос, схватив свою спутницу за руку и назвав ее по имени.</p><p class="p1">– Что сталось с Пакетой? – машинально повторила Магиета, сделав над собою усилие, чтобы вникнуть в смысл этих слов, и с живостью добавила: – Ах, вы спрашиваете о Пакете? Нет, толком о ней ничего так и не узнали.</p><p class="p1">Помолчав немного, она добавила:</p><p class="p1">– Правда, одни говорили, что видели вечером, как она выходила из города через Флешамбосские ворота, а другие – что она вышла на рассвете через старые Базеские ворота. Какой-то нищий нашел ее золотой крестик повешенным на каменный крест в том месте, где бывают у нас ярмарки. Это был тот самый крестик, который подарил ей в шестьдесят первом году ее первый любовник, красавец виконт де Кормонтрёль, бывший причиной ее гибели. Как, бывало, ни нуждалась Пакета, но никогда не соглашалась продать этот крестик. Она дорожила им больше жизни. Поэтому, когда мы узнали о находке, то сразу подумали, что она умерла. А между тем есть люди, в Кабаре-ле-Вот, которые уверяют, что видели ее идущею босиком по дороге в Париж. Но тогда она должна была выйти из Реймса Вольскими воротами. Вообще слухи были разные. Впрочем, очень может быть, что она вышла из города и Вольскими воротами, только не в Париж, а прямо на тот свет…</p><p class="p1">– Что вы хотите этим сказать? – спросила Жервеза.</p><p class="p1">– Ведь у нас перед этими воротами протекает река Вель, – с печальной улыбкой пояснила Магиета.</p><p class="p1">– Бедная Шанфлери! – с дрожью проговорила Ударда. – Значит, она утопилась?</p><p class="p1">– Наверное, так, – сказала Магиета. – Думал ли Гиберто, когда он распевал свои песни, плывя в лодке под мостом Тенкё вниз по течению реки, что настанет день, когда и его милая маленькая Пакета проплывет под этим мостом, но уж не в лодке и без песен?</p><p class="p1">– Ну а башмачок? – спросила Жервеза.</p><p class="p1">– Пропал вместе с нею, – ответила Магиета.</p><p class="p1">– Бедненький башмачок! – сказала Ударда.</p><p class="p1">Эта чувствительная толстушка готова была довольствоваться одними восклицаниями и вздохами, между тем как любопытная Жервеза продолжала неутомимо спрашивать.</p><p class="p1">– А чудовище? – спросила она у Магиеты.</p><p class="p1">– Какое чудовище? – недоумевала та.</p><p class="p1">– Да то самое, которое цыганки подкинули Пакете вместо маленькой Агнесы. С ним что сделали? Тоже утопили?</p><p class="p1">– Нет, не утопили, – отвечала Магиета.</p><p class="p1">– Ах, да! Его сожгли… Это правильно. Колдовское отродье и следует сжигать, чтобы от них и следа не оставалось.</p><p class="p1">– Нет, Жервеза, его и не сожгли. Этим цыганским ребенком заинтересовался сам архиепископ. Монсеньор отчитал его от сидевшего в нем беса, благословил и отправил в Париж. Там его положили в соборе Богоматери в ясли для подкидышей.</p><p class="p1">– Ох уж эти епископы! – проворчала с неудовольствием Жервеза. – Никогда ничего не сделают по-людски… от большой учености, должно быть… Ну, скажите, пожалуйста, Ударда, на что это похоже – класть чертенят в ясли для подкидышей? Наверное, это и был сам дьявол, а вовсе не человеческий ребенок… Ну а не слыхали вы, Магиета, что сталось с ним у нас в Париже? Неужели нашелся человек, который решился взять его себе на воспитание? Думаю, что нет.</p><p class="p1">– Ну, уж этого не могу вам сказать, – ответила реймская жительница. – Как раз в то время, когда случилось это дело, муж мой приобрел место нотариуса в Верю, в двух лье от Реймса, и мы больше не занимались этой историей. Перед деревней стоят два больших сернейских пригорка; они заслоняют от нас весь город вместе с его соборными колокольнями.</p><p class="p1">Продолжая болтать, три почтенные гражданки дошли до Гревской площади. Занятые своим разговором, они прошли, не останавливаясь, мимо Роландовой башни с кельей затворницы и машинально направились к позорному столбу, вокруг которого толпа беспрерывно росла. По всей вероятности, зрелище, привлекавшее туда толпу, заставило бы и наших кумушек совсем забыть о «Крысиной норе» и о цели их прогулки, если бы об этом вдруг не напомнил шестилетний толстяк Эсташ, которого мать тащила за руку.</p><p class="p1">– Мама, – спросил он, точно угадав детским инстинктом, что «Крысиная нора» осталась позади, – можно теперь съесть лепешку?</p><p class="p1">Если бы Эсташ был похитрее, вернее, если бы он не был таким лакомкой, то он отложил бы свой робкий вопрос до того времени, когда они с матерью вернутся в дом мэтра Анри Мюнье, в квартале Университета. Там он со своей лепешкою был бы отделен от «Крысиной норы» обоими рукавами Сены и всеми пятью мостами острова Сите.</p><p class="p1">Но теперь неосторожный вопрос Эсташа направил внимание Магиеты совсем в другую сторону.</p><p class="p1">– Постойте! – воскликнула Магиета. – Ведь мы совсем забыли про затворницу!.. Где же тут ваша «Крысиная нора»? Нужно снести туда лепешку.</p><p class="p1">– Ах да, и в самом деле! – спохватилась Ударда. – Мы ведь несем подаяние.</p><p class="p1">Но это меньше всего входило в расчеты Эсташа.</p><p class="p1">– Я хочу лепешку… Она моя!.. – хныкал Эсташ, ежась и попеременно потирая уши то одним плечом, то другим, что у детей служит признаком крайнего неудовольствия.</p><p class="p1">Когда все три женщины дошли обратно до Роландовой башни, Ударда сказала своим спутницам:</p><p class="p1">– Нам не следует всем сразу заглядывать в окно, это может испугать затворницу. Вы обе делайте вид, что читаете «Отче наш» по молитвеннику, а я пока загляну одна в келью. Затворница меня уж немножко знает. Я скажу, когда можно будет подойти и вам.</p><p class="p1">И Ударда одна приблизилась к окошку. Но лишь только она заглянула в каменный мешок, на ее открытом и веселом лице тотчас же изобразилась глубокая жалость и самый цвет ее лица изменился так резко, точно она перешла из полосы солнечного света в лунный. На глазах ее навернулись слезы, и губы судорожно задергались, как будто она собиралась заплакать. Минуту спустя она приложила палец к губам и сделала Магиете знак подойти поближе.</p><p class="p1">Магиета, тоже сильно взволнованная, приблизилась на цыпочках, точно к ложу умирающего.</p><p class="p1">Трудно было представить себе более печальное зрелище, чем то, которое увидели обе женщины, молча, затаив дыхание, заглядывавшие в решетчатое окно «Крысиной норы».</p><p class="p1">Келья была очень узкая, но довольно высокая, со стрельчатым сводом, придававшим ей изнутри сходство с епископской митрой. На голом каменном полу, прислонившись спиною к стене, сидела скорчившаяся женская фигура. Голова ее была опущена на грудь, а руки крепко обхватывали приподнятые колени. Из-под покаянного коричневого балахона, который облекал худое, изможденное тело, виднелись босые ноги. Скорченная, с растрепанными космами длинных седых волос, падавших ей на лицо, она с первого взгляда казалась не человеком, а каким-то странным предметом, треугольником, резко разделенным слабо проникавшим в окно светом на две половины, одну темную, другую – освещенную. Это был точно один из тех призраков, состоящих наполовину из тени, наполовину из света, которые иногда видишь во сне или на удивительных произведениях кисти Гойя, изображавшего бледные, неподвижные, зловещие призраки, сидящие на могиле или прислоненные к решетке тюрьмы. Призрак не походил ни на женщину, ни на мужчину, вообще ни на одно живое существо, даже ни на какой определенный предмет. Это было что-то бесформенное, чудовищное, какая-то странная смесь действительного с фантастичным, света с мраком. С большим трудом можно было различить сквозь нависшие и падавшие почти до полу волосы строгие очертания изможденного лица. Только видневшиеся из-под подола балахона босые ноги, судорожно сжатые на холодных плитах пола, доказывали, что эта фигура может быть человеком, а это еще более заставляло содрогаться от жалости сердца зрительниц.</p><p class="p1">Это существо, казавшееся вросшим в каменный пол, само словно окаменело, лишившись способности двигаться и дышать. Едва прикрытая тонким холщовым балахоном, сидя на голом гранитном полу в углу темного помещения, в окно которого проникал только холодный ветер и слабый дневной свет, затворница точно не чувствовала январского холода. Но это происходило, быть может, оттого, что она действительно уже окаменела на камнях, застыла на холоде. Руки ее были сжаты, а глаза неподвижно устремлены в одну точку. При первом взгляде ее можно было принять за призрак, при втором – за статую.</p><p class="p1">Однако по временам ее посиневшие губы раскрывались, и она слабо вздыхала. Но это движение было такое же машинальное и безжизненное, как движение сухих листьев, уносимых ветром. Ее тусклые глаза были неподвижно устремлены в угол кельи, не видный снаружи, и глядели глубоким, сумрачным, напряженным взглядом, в котором, казалось, сосредоточилась вся скорбь ее страждущей души.</p><p class="p1">Таково было это создание, прозванное за свой образ жизни затворницей, а за одежду – мешочницей.</p><p class="p1">Жервеза вместе со своими подругами тоже взглянула в окно кельи. Головы любопытных женщин заслоняли и без того скупой свет, проникавший в крошечное окно, но несчастная, по-видимому, не замечала этого.</p><p class="p1">– Молится! – шепотом заметила Ударда. – Не будем ей мешать.</p><p class="p1">Между тем Магиета с возрастающим вниманием всматривалась в поблекшее, страшно исхудавшее лицо затворницы, едва видневшееся из-под растрепанных волос, и глаза ее наливались слезами.</p><p class="p1">– Быть не может! – пробормотала она.</p><p class="p1">Встав на цыпочки и прижав лицо к решетке окна, она ухитрилась заглянуть в дальний угол, к которому был прикован взгляд затворницы. Когда она оторвалась от окна, все ее лицо было залито слезами.</p><p class="p1">– Как зовут эту несчастную? – спросила она Ударду.</p><p class="p1">– Мы зовем ее сестрой Гудулой, – отвечала Ударда.</p><p class="p1">– Ну а я могу ее назвать Пакетой Шанфлери! – сказала Магиета и, приложив палец к губам, предложила удивленной Ударде посмотреть повнимательнее в тот угол, куда был обращен неподвижный взгляд затворницы. Ударда поспешно взглянула туда и заметила в углу крошечный розовый башмачок, покрытый золотым шитьем и блестками.</p><p class="p1">После Ударды заглянула в глубь кельи и Жервеза. Затем все три женщины, глядя на несчастную мать, расплакались чуть не навзрыд.</p><p class="p1">Но ни их взгляды, ни их слезы не были замечены отшельницей. Руки ее по-прежнему были сжаты, уста – безмолвны, глаза – неподвижны. Это сосредоточенное созерцание розового башмачка было душераздирающим, особенно для знавших ее историю.</p><p class="p1">Женщины стояли молча, не решаясь говорить даже шепотом. Это безмолвие, это великое горе, это полное отречение от всего окружающего производило на них такое впечатление, точно они присутствовали при торжественном пасхальном или рождественском богослужении. Затихнув в глубоком благоговении, они готовы были опуститься на колени. Им казалось, что они вступили в храм.</p><p class="p1">Наконец Жервеза, самая любопытная, а потому и не особенно деликатная, решила попытаться заговорить с затворницей:</p><p class="p1">– Сестра Гудула! А сестра Гудула!</p><p class="p1">Она повторила свой оклик три раза, все повышая голос, но затворница оставалась по-прежнему неподвижною. Ни слова, ни взгляда, ни вздоха, ни малейшего признака жизни.</p><p class="p1">Ударда тоже окликнула ее, но более мягким и ласковым голосом:</p><p class="p1">– Сестра Гудула, что с вами?</p><p class="p1">Такое же молчание, такая же неподвижность.</p><p class="p1">– Вот странная женщина! – воскликнула Жервеза. – Тут хоть из пушек стреляй, она и тогда, должно быть, не пошевельнется…</p><p class="p1">– Может быть, она глухая? – заметила Ударда.</p><p class="p1">– И слепая, – добавила Жервеза.</p><p class="p1">– Скорее всего, она умерла, – сказала Магиета.</p><p class="p1">И действительно, если душа и не покинула еще это неподвижное, оцепеневшее, точно застывшее тело, то она скрылась в такие глубокие тайники, куда не могли проникнуть никакие внешние звуки.</p><p class="p1">– Можно бы оставить лепешку на окне и уйти, – сказала Ударда, – но ее, пожалуй, стащат мальчишки. Нужно придумать, как бы привести ее в чувство.</p><p class="p1">В это время Эсташ, внимание которого раньше было отвлечено большой собакой, запряженной в тележку, вдруг заметил, что его спутницы пристально смотрят в окно кельи. Это возбудило и его любопытство. Он забрался на тумбу, стоявшую возле стены, приподнялся на цыпочки и, приложив свое толстое румяное личико к оконной решетке, крикнул:</p><p class="p1">– Мама, я тоже хочу посмотреть!</p><p class="p1">При звуках ясного, свежего и звонкого детского голоса затворница встрепенулась. Она повернула голову сухим и резким движением стальной пружины, откинула своими длинными, костлявыми руками с лица волосы и уставила на ребенка глаза, полные удивления, горечи и отчаяния. Это был не взгляд, а молния.</p><p class="p1">– Боже мой! – воскликнула она, снова уткнувшись лицом в колени. – Не показывай мне, по крайней мере, чужих детей!</p><p class="p1">Голос ее был так резок, что, казалось, должен был разорвать ей грудь.</p><p class="p1">– Здравствуйте, мадам! – с важностью сказал ребенок.</p><p class="p1">Как бы там ни было, но мальчуган своим вмешательством вывел затворницу из оцепенения. По всему ее изможденному телу пробежала дрожь, зубы застучали. Она снова приподняла голову, прижала локти к бокам и, обхватив руками ноги, чтобы согреть их, тихо проговорила:</p><p class="p1">– Ой, как холодно!</p><p class="p1">– Бедная сестра Гудула, не хотите ли, мы вам принесем огня, чтобы погреться? – сострадательно обратилась к ней Ударда.</p><p class="p1">Затворница отрицательно покачала головой.</p><p class="p1">– Так вот, выпейте этого вина с пряностями, это вас согреет, – продолжала Ударда, протягивая флягу.</p><p class="p1">Отшельница снова покачала головою и, пристально глядя на Ударду, промолвила:</p><p class="p1">– Воды!</p><p class="p1">– О, сестра, что за питье зимою – вода! – настаивала Ударда. – Лучше выпейте вина и закусите вот этой лепешкой. Она из маисовой муки; мы ее нарочно для вас испекли.</p><p class="p1">Но затворница оттолкнула лепешку, которую протягивала ей Магиета, и резко сказала:</p><p class="p1">– Черного хлеба!</p><p class="p1">– Сестра Гудула, – заговорила Жервеза, охваченная в свою очередь жалостью к этой несчастной женщине, – возьмите вот мою шерстяную накидку. Она будет потеплее вашего мешка. Накиньте себе на плечи.</p><p class="p1">Затворница отказалась и от этого подарка точно так же, как отказалась от вина и лепешки:</p><p class="p1">– Довольно и мешка.</p><p class="p1">– Но надо ж, – продолжала добродушная Ударда, – помянуть чем-нибудь и вам вчерашний праздник.</p><p class="p1">– Я и так его помню, – сказала затворница. – Второй день в моей кружке нет ни капли воды.</p><p class="p1">Помолчав немного, она добавила:</p><p class="p1">– В праздники меня всегда забывают. Да это и хорошо. К чему людям думать обо мне, когда я о них не думаю? Потухшим угольям – холодная зола.</p><p class="p1">И, как бы утомленная этой длинной речью, она опять уткнулась головою в колени.</p><p class="p1">– Ну, так что же, принести вам горячих угольев? – спросила добрая, но простоватая Ударда, понявшая последние слова затворницы в том смысле, что та все еще продолжает жаловаться на холод.</p><p class="p1">– Горячих угольев? – каким-то странным тоном повторила затворница. – А могут ли эти уголья согреть ту бедную малютку, которая уже пятнадцать лет лежит в земле?</p><p class="p1">Она вся дрожала, как в злейшей лихорадке; голос ее вдруг зазвенел, глаза загорелись огнем. Привстав на колени, она протянула свою костлявую руку к Эсташу, смотревшему на нее изумленными глазами, и громко крикнула:</p><p class="p1">– Уведите скорее отсюда этого ребенка, а не то и его унесет цыганка!</p><p class="p1">С последними словами она упала ничком на пол и ударилась лбом о каменный пол кельи с таким звуком, точно и ее лоб был каменный. Стоявшие за окном женщины подумали, что она умерла. Однако немного спустя она зашевелилась и поползла на коленях в тот угол, где находился башмачок. У посетительниц не хватило духа подсмотреть, что она там будет делать; но они вскоре услыхали звуки бессчетных поцелуев вперемежку со вздохами, раздирающими душу воплями и какими-то глухими ударами, точно затворница билась головою об стену. Потом, после одного из таких ударов, такого сильного, что все три женщины невольно вздрогнули, в келье вдруг все затихло.</p><p class="p1">– Боже мой! Не покончила ли она с собой? – сказала Жервеза, пытаясь просунуть голову сквозь толстые прутья оконной решетки. – Сестра Гудула! Сестра Гудула, послушайте! – кричала она.</p><p class="p1">– Сестра Гудула! – повторяла за нею и Ударда.</p><p class="p1">– Так и есть, – продолжала Жервеза. – Она не движется… Наверное, умерла… Гудула! Гудула!</p><p class="p1">Магиета, едва владевшая собою от охватившего ее волнения, до сих пор молчала, не будучи в состоянии говорить от душивших ее слез. Сделав над собою усилие, она отстранила подруг.</p><p class="p1">– Погодите, я попробую, – сказала она и крикнула в окно: – Пакета! Пакета! Шанфлери!</p><p class="p1">Ребенок, нечаянно вызвавший взрыв ракеты, дунув на ее тлевший фитиль, и получивший при этом ожоги лица, не мог бы испугаться так, как испугалась Магиета действия произнесенного ею имени.</p><p class="p1">Дрожа всем телом, отшельница вскочила на свои босые ноги и одним скачком очутилась у окна. Глаза ее так страшно сверкали, что все три посетительницы, подхватив ребенка, в ужасе бросились бежать от кельи.</p><p class="p1">Страшная фигура отшельницы, плотно прильнув к решетке окна, закричала им вслед с безумным смехом:</p><p class="p1">– А! Это цыганка меня зовет!</p><p class="p1">Вдруг ее блуждающий взгляд остановился на позорном столбе.</p><p class="p1">Увидев происходившую там сцену, она, с искаженным от бешенства лицом, просунула сквозь решетку свои иссохшие, как у скелета, руки и крикнула диким голосом:</p><p class="p1">– Так это опять ты, нечестивая египтянка! Это ты меня зовешь, гнусная воровка детей?! Будь же ты проклята! Проклята! Проклята!</p></span></span></span>
