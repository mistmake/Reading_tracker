<span><span><span id="id188"><div class="title6">
<p class="p">Заключение</p>
<p class="p">Море и ночь</p>
</div><span id="id189"><div class="title6">
<p class="p">1. Сторожевая собака может быть ангелом-хранителем</p>
</div><p class="p1">У Гуинплена вырвался крик:</p><p class="p1">– Это ты, волк!</p><p class="p1">Гомо завилял хвостом. Глаза его сверкали в темноте. Он смотрел на Гуинплена.</p><p class="p1">Затем он снова начал лизать ему руки. Одну минуту Гуинплен был точно пьяный. Он был потрясен внезапно вернувшейся к нему надеждой. Гомо! Откуда он явился? За двое последних суток Гуинплен испытал всякие неожиданности; ему оставалось еще пережить нежданную радость. Эту радость принес Гомо. Вновь обретенная уверенность или по крайней мере надежда, внезапное вмешательство таинственной, благодетельной силы, быть может присущей судьбе, жизнь, проникшая в непроглядный мрак могилы, свет исцеления и освобождения, блеснувший, когда уже не ждешь ничего, точка опоры, обретенная в минуту крушения, – всем этим оказался Гомо для Гуинплена. Волк казался ему озаренным сиянием.</p><p class="p1">Между тем волк побежал назад. Сделав несколько шагов, он обернулся, словно для того, чтобы посмотреть, идет ли за ним Гуинплен.</p><p class="p1">Гуинплен последовал за ним. Гомо помахал хвостом и двинулся дальше.</p><p class="p1">Он бежал по спуску набережной Эфрок-Стоуна. Спуск вел к берегу Темзы. Гуинплен, следуя за Гомо, сошел вниз по этому спуску.</p><p class="p1">Время от времени Гомо поворачивал голову назад, чтобы удостовериться, идет ли за ним Гуинплен.</p><p class="p1">Бывают в жизни случаи, когда самый проницательный ум не может сравниться с чутьем преданного животного. Животное как будто обладает даром ясновидения.</p><p class="p1">В некоторых случаях собака следует за хозяином, в иных же – ведет его за собой, и тогда инстинкт животного руководит разумом человека. Тонкое чутье зверя безошибочно разбирается там, где мы теряемся во мраке. Животное испытывает смутную потребность стать нашим проводником. Знает ли оно, что нам угрожает опасность сделать неверный шаг и что надо помочь нам избежать опасности? Вероятно, нет. А может быть, и да; во всяком случае кто-то знает это за него; мы уже говорили, что нередко помощь, которую в решительные минуты оказывают нам существа низшие, на самом деле приходит к нам свыше. Мы не знаем, в каком обличье может явиться божество. Иногда зверь служит выразителем воли провидения.</p><p class="p1">Дойдя до берега, волк спустился вниз на отмель, тянувшуюся вдоль Темзы.</p><p class="p1">Он не издал ни единого звука, он не лаял, он бежал молча. Подчиняясь своему инстинкту, Гомо при любых обстоятельствах исполнял свой долг с мудрой осторожностью существа, преследуемого законом.</p><p class="p1">Пройдя шагов пятьдесят, он остановился. Направо виднелась пристань на сваях, за ней темнел грузный корпус довольно большого судна. На палубе, недалеко от носа, светился тусклый огонек, похожий на гаснущий ночник.</p><p class="p1">В последний раз удостоверившись, что Гуинплен тут, волк вскочил на пристань, представлявшую собою длинный помост из просмоленных досок, укрепленный на толстых бревнах, под которыми текла река. Через несколько мгновений Гомо и Гуинплен дошли до конца пристани.</p><p class="p1">Судно, стоявшее здесь на причале, представляло собой пузатую голландскую шхуну с двумя палубами без бортов, одной – в носовой части, другой – в кормовой, и с устроенным между ними по японскому образцу открытым трюмом, куда спускались по прямому трапу и который предназначался для грузов. Таким образом, на шхуне было две палубы – бак на носу, ют на корме, как в старину на наших речных сторожевых судах. Пространство между палубами заполнялось грузом. Приблизительно такую форму имеют бумажные детские кораблики. Под палубами находились каюты, сообщавшиеся с центральным отделением дверцами и освещенные иллюминаторами, пробитыми в обшивке. При погрузке оставляли проход между тюками. На шхуне было две мачты, по одной на каждой палубе. Передняя мачта называлась Павлом, а кормовая – Петром, так что судно, подобно католической церкви, возглавлялось двумя апостолами. Над центральным грузовым отделением были переброшены с одной палубы на другую деревянные мостки. В дурную погоду глухие стенки мостков откидывались с обеих сторон при помощи особого механизма, образуя крышу над межпалубным отделением, так что в бурю трюм оказывался плотно закрытым. На этих громоздких шхунах рулем служило толстое бревно, так как сила руля должна соответствовать тяжести судна. Для управления этими грузными морскими судами достаточно было трех человек: хозяина с двумя матросами, не считая мальчика-юнги. Носовая и кормовая палубы были, как мы уже сказали, без бортов. На черном пузатом корпусе этой шхуны можно было даже в темноте разобрать надпись белыми буквами: «Вограат. Роттердам».</p><p class="p1">В ту эпоху ряд событий, разыгравшихся на море, и, в частности, совсем недавняя катастрофа, постигшая у мыса Карнеро 21 апреля 1705 года восемь кораблей барона Пуанти и заставившая весь французский флот отойти к Гибралтару, совершенно расчистила Ла-Манш и освободила от военных судов весь путь между Лондоном и Роттердамом, так что торговые суда могли плавать безо всякого конвоя.</p><p class="p1">Шхуна «Вограат», к которой подошел Гуинплен, была подтянута к пристани левым краем кормовой палубы и находилась почти на одном уровне с помостом. Надо было спуститься на одну ступеньку. Одним прыжком Гомо и Гуинплен очутились на корме. Палуба была пуста, и на всем судне не замечалось никакого движения; судя по тому, что шхуна готовилась отчалить и погрузка была закончена, на что указывал переполненный тюками и ящиками трюм, пассажиры на борту были, но они, по всей вероятности, спали в каютах между палубами, так как переезд должен был произойти ночью. В подобных случаях путешественники показываются на палубе лишь утром. Что касается экипажа, то в ожидании скорого отплытия он, очевидно, ужинал в помещении, которое тогда носило название матросской каюты. Этим объяснялось совершенное безлюдье на обеих палубах.</p><p class="p1">По пристани волк почти бежал; но очутившись на судне, он пошел медленно, словно крадучись. Он вилял хвостом, но уже не радостно, а беспокойно и уныло, как пес, чующий недоброе. По-прежнему идя впереди Гуинплена, он перешел по мостику с кормовой палубы на носовую.</p><p class="p1">Вступив на мостки, Гуинплен увидел перед собой свет. Это был фонарь, стоявший у подножия передней мачты; при свете фонаря вырисовывались очертания какого-то большого ящика на четырех колесах.</p><p class="p1">Гуинплен узнал старый возок Урсуса.</p><p class="p1">Эта убогая деревянная лачуга, одновременно и возок и хижина, в которой протекло его детство, была прикреплена к подножию мачты толстыми канатами, продетыми сквозь колеса. Давно выйдя из употребления, она совершенно обветшала; ничто не действует так разрушительно на людей и вещи, как праздность; лачуга печально покосилась набок. От бездействия ее точно разбил паралич, не говоря уже о том, что она была больна неисцелимым недугом – старостью. Ее бесформенный, источенный червями остов производил впечатление совершенной развалины. Все, из чего она была сооружена, разрушалось: железные части заржавели, кожа потрескалась, дерево сгнило. Стекло переднего окошечка, сквозь которое проходил свет фонаря, было разбито. Колеса покривились. Стенки, потолок и оси обветшали и словно изнемогали от усталости. Все в целом носило на себе отпечаток чего-то бесконечно жалкого и молящего о пощаде. Торчавшие вверх оглобли походили на руки, воздетые к небу. Вся повозка расползалась по швам. Внизу висела цепь Гомо.</p><p class="p1">Казалось бы вполне законным и совершенно естественным, вновь обретя все, в чем заключается наша жизнь, наше счастье, наша любовь, броситься ко всему этому очертя голову. Да, но не в тех случаях, когда мы пережили глубокое потрясение. Человек, вышедший совершенно подавленным, обезумевшим из целого ряда катастроф, похожих на предательство, становится недоверчивым даже в радости, боится приобщить к своей злополучной судьбе тех, кого он любит, чувствует себя носителем зловещей заразы и даже к самому счастью подходит с опаской. Перед ним вновь раскрывается рай, но, прежде чем вступить в него, он боязливо всматривается.</p><p class="p1">Гуинплен, еле держась на ногах от волнения, глядел на родное жилище.</p><p class="p1">Волк тихо улегся рядом со своей цепью.</p></span></span></span></span>
