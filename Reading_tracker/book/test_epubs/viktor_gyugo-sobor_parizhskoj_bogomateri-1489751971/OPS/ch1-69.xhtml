<p class="p">1. Лорд Кленчарли</p>
</div><p class="p1">В те времена существовал человек, который был живым осколком прошлого.</p><p class="p1">Этим осколком был лорд Линней Кленчарли.</p><p class="p1">Барон Линней Кленчарли, современник Кромвеля, был одним из тех, спешим прибавить – немногочисленных, пэров Англии, которые в свое время признали республику. Это признание имело свои причины и в конце концов вполне объяснимо, поскольку республика на короткое время восторжествовала. Так что не было ничего удивительного в том, что лорд Кленчарли пребывал в партии республиканцев, пока республика была победительницей. Но лорд Кленчарли продолжал оставаться республиканцем и после того, как окончилась революция и пал парламентский режим. Высокородному патрицию нетрудно было бы вернуться во вновь восстановленную палату лордов, ибо при реставрациях монархи всегда очень охотно принимают раскаявшихся и Карл II был милостив к тем, кто возвращался к нему. Однако лорд Кленчарли совершенно не понял, чего требовали от него события. И в то время, как в Англии радостными кликами встречали короля, вновь вступавшего во владение страной, как верноподданные единодушно приветствовали монархию и династия восстанавливалась среди всеобщего торжественного отречения от прошлого, в то время, как прошлое становилось будущим, а будущее – прошлым, лорд Кленчарли не пожелал покориться. Он не захотел видеть этого ликования и добровольно покинул родину. Он мог стать пэром, а предпочел стать изгнанником. Так протекали годы; так он и состарился, храня верность мертвой республике. Такое ребячество сделало его всеобщим посмешищем.</p><p class="p1">Он удалился в Швейцарию. Он поселился в высоком полуразвалившемся доме на берегу Женевского озера. Он выбрал себе жилище в самом глухом месте побережья – между Шильоном, где был заключен Бонивар, и Веве, где похоронен Ледло. Его окружали овеваемые ветрами и одетые тучами суровые, сумрачные Альпы; он жил здесь, затерянный, в глубокой тени, отбрасываемой горами. Его редко встречал прохожий. Этот человек жил вне своей страны, почти вне своей эпохи. В то время каждый, кто был в курсе событий и разбирался в них, понимал, что всякое сопротивление установившемуся порядку не имело оправдания. Англия была счастлива; реставрация – своего рода примирение супругов: король и нация возвращаются на свое брачное ложе; можно ли представить себе что-либо более приятное и радостное? Великобритания сияла от счастья; иметь короля – это уже много, а тем более такого очаровательного короля. Карл II был любезен, умел и пожить в свое удовольствие и управлять государством, напоминая своим величием Людовика XIV. Это был джентльмен и дворянин; подданные восхищались им; он вел войну с Ганновером и, конечно, хорошо знал зачем, хотя только он один это и знал; он продал Дюнкерк Франции – дело высокого политического значения. У демократически настроенных пэров, про которых Чемберлен сказал: «Проклятая республика заразила своим тлетворным дыханием даже некоторых аристократов», хватило здравого смысла очень быстро примениться к обстоятельствам, не отстать от своего времени и занять свои места в палате лордов; для этого им достаточно было лишь принести присягу королю.</p><p class="p1">Когда люди думали обо всем этом – об этом прекрасном царствовании, об этом превосходном короле, об этих августейших принцах, возвращенных народу божественным милосердием; о том, что такие значительные особы, как Монк и позднее Джеффрис, примирились с троном и были справедливо вознаграждены за верность и усердие самыми почетными должностями и самыми доходными местами; о том, что лорд Кленчарли не мог не знать, что от него одного зависело торжественно занять между ними подобающее ему место и разделить сыпавшиеся на них почести; о том, что Англия, благодаря своему королю, вознесена на вершину процветания, что в Лондоне одно празднество сменяется другим, что все кругом богатеют и преисполнены восторга, что королевский двор галантен, весел и пышен, – и при этом случайно возникал в памяти образ изгнанника, прозябающего вдали от всего этого великолепия, этого, старика в одежде простолюдина, бледного, согбенного, вероятно уже близкого к могиле, который стоит в эту минуту над озером в печальном полумраке, не замечая холода и непогоды, или шагает по его берегу без цели, с неподвижным взором, с развевающимися на ветру седыми волосами, молчаливый, одинокий, погруженный в свои думы, – трудно было удержаться от улыбки.</p><p class="p1">Этот старик был олицетворением безумия.</p><p class="p1">Улыбка, являвшаяся у людей при мысли о том, чем мог быть лорд Кленчарли и чем он стал, несомненно была проявлением их снисходительности. Иные смеялись открыто. Были и такие, что негодовали.</p><p class="p1">Понятно, что людей положительных коробила такая вызывающая отчужденность.</p><p class="p1">Вину лорда Кленчарли смягчало только то, что он никогда не блистал умом. Таково было общее мнение.</p><p class="empty-line"/><p class="p1">Неприятно видеть людей упорствующих. Подражатели Регула не пользуются симпатией, и общественное мнение относится к ним с иронией. Подобное упрямство походит на упрек, и здравомыслящие люди правы, когда смеются над этим.</p><p class="p1">И в конце концов разве такое упорство, такая непреклонность – добродетель? Разве в чрезмерном подчеркивании своей самоотверженности и честности нет большой доли тщеславия? Это просто-напросто рисовка. К чему такие крайности, как добровольное одиночество и изгнание? Ничего не преувеличивать – вот правило мудреца. Можете возражать, осуждать, если вам угодно, но делайте это благопристойно и не переставая возглашать: «Да здравствует король!» Подлинная добродетель – это рассудительность. То, что падает, должно было упасть, то, что преуспевает, должно было преуспеть. У провидения свои цели: оно награждает того, кто этого достоин. Неужели вы мните себя способным разобраться в этом лучше, чем оно? Когда обстоятельства совершенно ясно определились, когда один режим сменил другой, когда самим успехом установлено, где правда и где ложь, где катастрофа, а где торжество, – не может уже быть места никаким сомнениям; порядочный человек присоединяется к той стороне, которая одержала верх, и будь это даже выгодно ему и его родне, он, конечно, вовсе не из этих соображений, а исключительно во имя общественного блага предоставляет себя целиком в распоряжение победителя.</p><p class="p1">Что стало бы с государством, если бы никто не согласился служить? Все остановилось бы. Всякий благоразумный гражданин должен оставаться на своем месте. Умейте поступаться своими сокровенными симпатиями. Должности существуют для того, чтобы их занимали. Надо жертвовать собой. Не изменять общественным обязанностям – вот истинная верность. Самовольный уход чиновников парализовал бы государство. Вы добровольно отправляетесь в ссылку? Очень жаль. Вы хотите показать пример? Какое тщеславие! Вы бросаете вызов? Какая наглость! Кем же вы себя возомнили? Знайте, что мы не хуже вас. Но мы не покидаем своего поста. При желании мы тоже могли бы быть несговорчивы и непокорны и натворить еще худших дел, чем вы. Но мы предпочитаем благоразумие. Только потому, что я Тримальхион, вы считаете меня неспособным быть Катоном? Какие глупости!</p><p class="empty-line"/><p class="p1">Никогда еще положение вещей не было таким ясным и определенным, как в 1660 году. Никогда еще линия поведения благонамеренного человека не намечалась сама собой с такой отчетливостью.</p><p class="p1">Англия избавилась от Кромвеля. Много неправомерного было совершено во время республики. Британия приобрела первенство в Европе; в результате Тридцатилетней войны была покорена Германия; с помощью Фронды ослаблена Франция, с помощью герцога Браганцкого умалена Испания. Кромвель подчинил себе Мазарини; во всех договорах протектор Англии ставил свою подпись выше подписи французского короля; на Соединенные провинции была наложена контрибуция в восемь миллионов; Алжир и Тунис подверглись притеснениям; покорили Ямайку; усмирили Лиссабон; в Барселоне подогрели соперничество Испании и Франции, а в Неаполе восстание Мазаньелло; присоединили к Англии Португалию; от Гибралтара до Кандии очистили море от берберийцев; утвердили морское владычество двумя способами: силой оружия и торговлей; 10 августа 1653 года английский флот разбил Мартина Гапперца Тромпа, человека, выигравшего тридцать три сражения, старого адмирала, именовавшего себя «дедушкой матросов», победителя испанского флота. Англия отняла Атлантический океан у испанцев, Великий – у голландцев. Средиземное море – у венецианцев и по навигационному акту установила свое господство на побережьях всех морей; захватив океан, она держала в руках весь мир; голландский флаг смиренно приветствовал в море флаг английский; Франция в лице своего посла Манцини преклонила колени перед Оливером Кромвелем, а Кромвель, как мячами, играл Кале и Дюнкерком; он заставил трепетать весь континент, он диктовал мир, объявлял войну; повсюду развевался английский флаг; один только закованный в латы полк протектора внушал Европе больший ужас, чем целая армия; Кромвель говорил: «Я хочу, чтобы английскую республику уважали так, как уважали республику римскую»; не оставалось ничего святого; слово было свободно, печать была свободна; на улице говорили все, что хотели, все печатали без всякого контроля и цензуры; престолы зашатались; весь монархический порядок Европы, частью которого были Стюарты, пришел в расстройство. Но вот, наконец, Англия свергла этот ненавистный режим и получила прощение.</p><p class="p1">Снисходительный Карл II даровал Бредскую декларацию. Он дал Англии возможность забыть о том времени, когда сын гентингдонского пивовара попирал пятой голову Людовика XIV.</p><p class="p1">Англия покаялась в своих тяжких прегрешениях и вздохнула свободно. Радость, как мы уже говорили, объяла все сердца, и воздвигнутые виселицы цареубийц только усиливали ликование. Реставрация – это улыбка, но несколько виселиц не портят впечатления: надо же успокоить общественную совесть. Дух неповиновения рассеялся, восстанавливалась преданность монарху. Быть добрыми верноподданными – к этому сводились отныне все честолюбивые стремления. Все опомнились от политического безумия, все поносили теперь революцию, издевались над республикой и над тем удивительным временем, когда с уст не сходили громкие слова «Право, Свобода, Прогресс»; над их высокопарностью теперь смеялись. Возврат к здравому смыслу был зрелищем; достойным восхищения. Англия стряхнула с себя тяжкий сон. Какое счастье – избавиться от этих заблуждений. Возможно ли что-нибудь более безрассудное? Что было бы, если бы каждого встречного и поперечного наделили всеми правами? Вы представляете себе? Вдруг все стали бы правителями? Мыслимо ли, чтобы страна управлялась гражданами? Граждане – это упряжка, а упряжка – не кучер. Решать вопросы управления голосованием – разве это не то же, что плыть по воле ветра? Неужели вы хотели бы сообщить государственному строю зыбкость облака? Беспорядок не создает порядка. Если зодчий – хаос, строение будет Вавилонской башней. И потом, эта пресловутая свобода – сущая тирания. Я хочу веселиться, а не управлять государством. Мне надоело голосовать, я хочу танцевать. Какое счастье, что есть король, который всем этим занимается. Право, как великодушен король, что берет на себя весь этот труд. Кроме того, его этому учили, он умеет справляться с этим. Это его ремесло. Мир, война, законодательство, финансы – какое до всего этого дело народу? Конечно, необходимо, чтобы народ платил, чтобы он служил, и он должен этим довольствоваться. Ведь ему предоставлена возможность участвовать в политике: из его недр выходят две основные силы государства – армия и бюджет, Платить подати и быть солдатом – разве этого мало? Чего ему еще надо? Он – опора военная, и он же – опора казны. Великолепная роль. А за него царствуют. Должен же он платить за такую услугу. Налоги и цивильный лист – это жалованье, которое народы платят королям за их труды. Народ отдает свою кровь и деньги для того, чтобы им правили. Какая нелепая идея – самим управлять собою. Народу необходим поводырь. Народ невежествен, а стало быть, слеп. Ведь есть же у слепца собака. А у народа есть король – лев, который соглашается быть для своего народа собакой. Какая доброта! Но почему народ невежествен? Потому что так надо. Невежество – страх добродетели. У кого нет никаких надежд, у того нет и честолюбия. Невежда пребывает в спасительном мраке, который, лишая его возможности видеть, лишает его вместе с тем всяких вожделений. Отсюда – неведение. Кто читает, тот мыслит, а кто мыслит, тот рассуждает. А зачем, спрашивается, народу рассуждать? Не рассуждать – это его долг и в то же время его счастье. Эти истины неоспоримы. На этом зиждется общество.</p><p class="p1">Таким образом в Англии снова восторжествовали здоровые социальные доктрины. Так вернула себе нация утраченную честь. Одновременно возродился интерес к изящной литературе. Стали презирать Шекспира и восхищаться Драйденом. «Драйден – величайший поэт Англии и своего века», – говорил Эттербери, переводчик «Ахитофела». Это было время, когда Гюэ, епископ Авраншский, писал Сомезу, оказавшему своими нападками и бранью честь автору «Потерянного рая»: «Как можете вы заниматься таким ничтожеством, как этот Мильтон?» Все возрождалось; все опять становилось на свое место: Драйден вверху, Шекспир внизу. Карл II на троне, Кромвель на виселице. Англия старалась загладить позор и сумасбродство минувших лет. Великое счастье для нации, когда монархия восстанавливает порядок в государственных делах и воспитывает хороший литературный вкус.</p><p class="p1">Трудно поверить, что можно не оценить такие благодеяния. Отвернуться от Карла II, заплатить неблагодарностью за то, что он великодушно воссел на восстановленный трон, – не гнусно ли это? Лорд Кленчарли причинил большое огорчение всем порядочным людям. Как это возмутительно – досадовать на счастье своей родины!</p><p class="p1">Известно, что в 1650 году парламент установил следующий текст присяги: «Обещаю хранить верность республике, без короля, без монарха, без государя». Лорд Кленчарли на том основании, что он принес эту чудовищную присягу, жил вне пределов королевства и на фоне всеобщего благополучия и привольной жизни считал себя вправе быть печальным. Он хранил скорбную память о том, что погибло. Странная привязанность к несуществующему!</p><p class="p1">Ему не было оправдания; даже самые благожелательные к нему люди отвернулись от него. Друзья долго оказывали ему честь, считая, что он вступил в ряды республиканцев лишь для того, чтобы поближе увидеть слабые стороны республики, и позднее, когда настанет время, вернее поразить ее, защищая священные интересы короля. А такое выжидание удобного момента для нападения на врага с тыла и есть одно из проявлений лояльности. Именно такой лояльности и ожидали от лорда Кленчарли и были склонны истолковывать в лучшую сторону его поведение. Но перед лицом его странной приверженности к республике пришлось поневоле изменить это доброе мнение. Очевидно, лорд Кленчарли был верен своим убеждениям, то есть глуп.</p><p class="p1">Снисходительные люди колебались, не зная, чем объяснить его образ действий – ребяческим ли упрямством или старческим упорством.</p><p class="p1">Люди строгие, справедливые шли дальше. Они клеймили отступника. Тупоумие в человеке допустимо, но оно должно иметь и границы. Можно быть грубияном, но нельзя быть бунтовщиком. В конце концов, кто такой этот лорд Кленчарли? Перебежчик. Он покинул стан аристократии, чтобы примкнуть к стану противоположному – к народу. Следовательно, этот стойкий приверженец республики – изменник. Правда, он изменил более сильному и остался верен более слабому. Правда, стан, им покинутый, был победителем, а стан, к которому он примкнул, был побежденным; правда, при этом «предательстве» он потерял все: свои политические привилегии и свой домашний очаг, свое пэрство и свою родину. А что он выиграл? Прослыл чудаком и вынужден жить в изгнании. А что это доказывает? Да то, что он глупец! Это – бесспорно.</p><p class="p1">Предатель и в то же время простак – это бывает.</p><p class="p1">Будь дураком сколько хочешь, но не подавай дурного примера. От дураков не требуется ничего, кроме благонамеренности, и тогда они могут считать себя опорой монархии. Этот Кленчарли был невероятно ограниченным человеком. Он был по-прежнему ослеплен революционными фантазиями. Он прельстился республикой и из-за этого выброшен за борт. Он обесчестил свою страну. Позиция, занятая им, была настоящим вероломством. Его отсутствие было оскорблением. Он, словно от чумы, бежал от счастья своих соотечественников. В его добровольном изгнании был какой-то протест против всеобщего довольства. Он, видимо, считал королевскую власть заразой. На фоне веселья, вызванного торжеством монархии, он был чем-то мрачным и зловещим, как черный флаг над чумным бараком. Как? Напускать на себя угрюмый вид перед лицом восстановленного порядка, воспрянувшей нации, восторжествовавшей религии! Набрасывать тень на эту безмятежность! Негодовать на счастливую Англию! Быть темным пятном в безбрежном голубом небе! Напоминать собою угрозу! Противиться желанию нации! Говорить «нет», когда столько людей говорят «да»! Это было бы гнусно, если бы не было смешно. Этот Кленчарли не понял, что можно заблуждаться вместе с Кромвелем, но что следует вернуться вместе с Монком. Посмотрите на Монка. Он командовал республиканской армией; Карл II, находясь в изгнании и зная о его тайной преданности престолу, написал ему; Монк, умея сочетать доблесть с хитростью, сначала скрывал свои намерения, потом неожиданно ринулся во главе войска на мятежный парламент, возвел на престол короля и за спасение общества получил титул герцога Олбемарльского. Он приобрел богатство, навеки прославил свое время и в качестве кавалера ордена Подвязки может рассчитывать на то, что его похоронят в Вестминстерском аббатстве. Такова слава истинно верноподданного англичанина. Лорд Кленчарли не мог подняться до столь тонкого понимания долга. Он предпочел всему бездейственное изгнание. Он удовольствовался пустыми фразами. Его сковала гордость. Слова «совесть», «достоинство» и тому подобное в конце концов только слова. Надо смотреть глубже.</p><p class="p1">Вот этого-то умения смотреть глубже не было у лорда Кленчарли – он был близорук; прежде чем принять участие в каком-нибудь деле, он всегда хотел присмотреться к нему, узнать, чем оно пахнет. Отсюда все его нелепые предубеждения. При такой щепетильности нельзя быть государственным деятелем. Требовательная совесть превращается в недуг. Человек совестливый – однорук, ему не захватить власти; он евнух – ему не овладеть фортуной. Остерегайтесь щепетильности; она далеко заведет вас. Неразумная верность своим убеждениям ведет вниз, как лестница в погреб. Ступенька, другая, третья – и вы погружаетесь во тьму. Люди смышленые поднимаются обратно, простофили остаются внизу. Нельзя легкомысленно разрешать своей совести быть неприступной. Ведь так можно понемногу дойти до такой крайности, как честность в политике. Тогда вы погибли. Так и случилось с лордом Кленчарли.</p><p class="p1">Принципы в конце концов увлекают людей в бездну.</p><p class="p1">Вот и шагай теперь, заложив руки за спину, по берегу Женевского озера, – прекрасное занятие!</p><p class="p1">В Лондоне иногда говорили об этом изгнаннике. В глазах благородного общества он был чем-то вроде подсудимого. Одни высказывались за, другие против него. При этом смягчающим вину обстоятельством признавалась его глупость.</p><p class="p1">Многие из бывших приверженцев республики перешли на сторону Стюартов; что же, за это они только достойны похвалы. Естественно, что они слегка злословили на его счет. Угодливые души не выносят упрямцев. Люди умные, занявшие хорошее положение при дворе, которым надоело его вызывающее поведение, охотно говорили: «Он не примкнул к нам только потому, что ему слишком мало заплатили. Он хотел занять место канцлера, а король предоставил это место лорду Хайду» и т. д. Один из его «старых друзей» смело утверждал: «Он сам мне об этом говорил». Иногда, несмотря на замкнутый образ жизни Линнея Кленчарли, до него доходили кое-какие слухи через беглецов, которых он встречал, – старых цареубийц, вроде Эндрью Броутона, жившего в Лозанне. В ответ Кленчарли только пожимал плечами – признак полного отупения.</p><p class="p1">Однажды он дополнил этот жест следующими, сказанными вполголоса, словами: «Жалею тех, кто этому верит».</p><p class="empty-line"/><p class="p1">Карл II, человек мягкий, отнесся к нему с презрением. Англия была при Карле II больше чем счастлива – она ликовала. Реставрация подобна потемневшей от времени картине, которую заново покрыли лаком, – все прошлое вдруг выступает наружу. Возвратились добрые старые нравы: красивые женщины царствовали и управляли. Эвелин отметил это; мы читаем в его дневнике: «Разврат, кощунство, презрение к Богу. В воскресный вечер я видел короля с его непотребными девками: Портсмут, Кливленд, Мазарини и еще двумя-тремя другими; все почти голые собрались в галерее для игр». В этом описании сквозит явное недовольство; но Эвелин был ворчливый пуританин, зараженный республиканскими идеями. Он не оценил всего значения примера, который подают короли своими вавилонскими праздниками, в итоге способствующими развитию роскоши. Он не понимал пользы пороков. Существует правило: если хотите иметь прелестных женщин, не истребляйте пороков, иначе вы будете похожи на тех дураков, которые, страстно любя бабочек, истребляют гусениц.</p><p class="p1">Карл II, как мы уже сказали, почти не заметил, что существует мятежник по имени Кленчарли, но Иаков II был более внимателен. Карл II правил мягко, это была его манера; признаться, правлению государством это не вредило. Иногда моряк, натягивая снасти, предназначенные управлять ветром, оставляет один узел свободным, для того чтобы его затянул сам ветер. В этом проявляется глупость урагана и глупость народа.</p><p class="p1">Правление Карла II и было таким слабым узлом, который, однако, очень быстро затянулся туго-натуго.</p><p class="p1">При Иакове II этот узел затянулся окончательно; началось последовательное удушение всего, что осталось от революции. Иаков II возымел похвальное желание быть подлинным королем. В его глазах царствование Карла II было лишь черновым наброском реставрации; Иаков II хотел полностью возвратить прежние порядки. В 1660 году он выразил сожаление, что повесил всего лишь десять цареубийц. Он действительно восстановил «твердую власть». При нем восторжествовали серьезные принципы; воцарилось настоящее правосудие, которое, став выше чувствительных разглагольствований, заботится прежде всего об интересах общества.</p><p class="p1">Эти строгие охранительные мероприятия обнаруживают в нем отца государства. Он доверил отправление правосудия Джеффрису, а меч – Кирку. Этот рьяный полковник умножил устрашающие примеры. Вешая одного республиканца, он три раза подряд вынимал его из петли, спрашивая при этом: «Отказываешься от республики?» Злодей неизменно отвечал: «Нет!» – и был удавлен. «Я четыре раза вешал его», – с удовлетворением говорил Кирк. Возобновившиеся казни служили несомненным признаком сильной власти. Была казнена леди Лайль, отправившая своего сына на войну против Монмута, но укрывшая у себя двух мятежников. Другой мятежник, у которого хватило благородства сознаться, что старуха-анабаптистка давала ему приют, был помилован, женщину же сожгли на костре. Однажды Кирк дал понять одному городу, что знает о его республиканских грехах, – он повесил там девятнадцать горожан. Вполне законное возмездие, если вспомнить, что при Кромвеле в церквах отбивали носы и уши каменным статуям святых. Иаков II, сумевший выбрать Джеффриса и Кирка, был государем глубоко религиозным; он умерщвлял свою плоть, выбирая себе уродливых любовниц, он слушал проповедника, отца Ла-Коломбьера, почти не уступавшего елейностью речей отцу Шемине, но отличавшегося еще большим пылом. Этот священнослужитель прославился тем, что первую половину своей жизни был советником Иакова II, а вторую – вдохновителем Марии Алакок. Благодаря такой религиозной пище Иаков II позднее с достоинством мог переносить изгнание и в своем сен-жерменском уединении спокойно относился к превратностям судьбы и беседовал с иезуитами, являя собой пример твердого духом короля.</p><p class="p1">Понятно, что этот король должен был обратить некоторое внимание на такого мятежника, как лорд Линней Кленчарли. И так как наследственное пэрство заключает в себе кое-какие возможности, то ясно, что Иаков II готов был без всяких колебаний принять любые меры против этого лорда.</p></span></span></span></span>
