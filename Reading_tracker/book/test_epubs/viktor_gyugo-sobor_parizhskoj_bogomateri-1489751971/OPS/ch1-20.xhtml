<p class="p">III. Immanis pecoris custos – immanior ipse<a href="ch2.xhtml#id24" class="a">[54]</a></p>
</div><p class="p1">В 1482 году Квазимодо был уже взрослым. Он уже несколько лет исправлял должность звонаря собора Богоматери. Эту должность он получил по милости своего приемного отца Клода Фролло. Последний имел теперь сан жозасского архидьякона, полученный им по милости своего начальника Луи де Бомона, сделавшегося в 1472 году парижским архиепископом по смерти Гильома Шартье, по милости своего покровителя, Оливье ле Дена, бывшего по милости Божьей цирюльником Людовика XI.</p><p class="p1">Итак, Квазимодо был звонарем собора Богоматери.</p><p class="p1">С течением времени между звонарем и собором образовалась какая-то таинственная связь. Навсегда отрешенный от мира тяготевшим над ним двойным несчастьем – неизвестностью происхождения и уродливостью, – с детства заключенный в этот двойной круг, через который невозможно было перешагнуть, злополучный подкидыш не привык видеть ничего другого, кроме этих священных стен, приютивших его под своей сенью. По мере того как Квазимодо рос, собор Богоматери представлял для него сначала яйцо, потом – гнездо, дом, отечество, а под конец и всю Вселенную.</p><p class="p1">И действительно, это существо было соединено с собором Богоматери какой-то особенной извечной гармонией.</p><p class="p1">Когда Квазимодо, будучи еще совсем маленьким, с мучительными усилиями, вприскочку, на четвереньках, пробирался под мрачными сводами этого собора, то он, со своим получеловеческим лицом и чудовищным телосложением, казался пресмыкающимся, возникшим прямо от того сырого и сумрачного помоста, на который капители романских столбов бросали свои причудливые тени.</p><p class="p1">Впоследствии, в тот день, когда Квазимодо в первый раз уцепился за веревку колокольни и, повиснув на ней, раскачал колокол, он произвел на своего приемного отца Клода Фролло такое впечатление, точно у этого странного ребенка развязался наконец язык и он начинает говорить.</p><p class="p1">Таким образом, постепенно развиваясь сообразно окружавшей его обстановке собора, безвыходно живя в этом здании и постоянно подвергаясь его таинственному влиянию, Квазимодо в конце концов почти сросся с собором, сделался как бы его инкрустацией, неотделимою от него частью. Выступающие углы его тела (да простят нам это сравнение!) вполне соответствовали вогнутым углам здания, так что он казался не только обитателем, но прямо частью этого здания. Можно было сказать, не впадая в особенное преувеличение, что он принял форму собора, как улитка принимает форму своей раковины. Собор был его жилищем, его норою, его оболочкою. Между ним и старым храмом существовала такая глубокая коренная симпатия, было столько, так сказать, органического сходства, что он как бы целиком прирос к собору, как прирастает черепаха к своему панцирю. Шероховатые стены собора были действительно как бы его чешуей.</p><p class="p1">Было бы лишним предупреждать читателя, чтобы он не придавал буквального значения сравнениям, к которым мы были вынуждены прибегнуть, чтобы дать понятие об этом странном, симметричном, непосредственном, почти однородном по своему вещественному составу сочетании человека с зданием. Бесполезно также было бы распространяться о том, до какой степени Квазимодо освоился со всем собором в продолжение долгого и близкого своего общения с ним. Собор был зданием, построенным точно нарочно для него. В этом здании не было ни одной щели, в которой не побывал бы Квазимодо, ни одного возвышения, на которое он бы не влезал. Сколько раз взбирался он на собор прямо по фасаду, пользуясь одними выступами скульптурных украшений! Не раз видали его пробирающимся ползком по наружным краям башен, подобно ящерице, скользящей по отвесной стене. Эти два каменных близнеца-исполина, грозные и недоступные для других, не внушали ему страха; карабкаясь по ним, он не испытывал ни головокружения, ни боязни, ни приступов растерянности. Видя их такими податливыми, можно было подумать, что он приручил их. Постоянно лазая, прыгая и кувыркаясь над бездною, зиявшею со всех сторон у подножия гигантского собора, Квазимодо сделался чем-то средним между обезьяной и серною, напоминая калабрийского ребенка, который начинает плавать раньше, чем ходить, и, совсем еще маленький, точно играет с грозным морем.</p><p class="p1">Наконец не только его тело, но и сама его душа сформировалась по подобию собора. В каком состоянии находилась его душа? Как она складывалась, какую приняла форму в этой угловатой оболочке, в этой невозможной жизненной обстановке? Определить это очень трудно. Квазимодо явился на свет кривым, горбатым и колченогим. Даже выучить его говорить Клоду Фролло удалось с громадным трудом и терпением. Но, очевидно, над бедным подкидышем тяготел рок. Сделавшись четырнадцати лет от роду звонарем собора Богоматери, он подвергся новому несчастью, довершившему его физическое убожество: от колокольного звона у него лопнули барабанные перепонки, и он оглох. Этим для него закрылась навсегда и та последняя дверь, которую оставила было ему природа для общения с внешним миром.</p><p class="p1">Закрывшись, эта дверь пресекла доступ единственному лучу света и радости, до тех пор кое-как проникавшему в душу бедного звонаря, и эта душа очутилась в полном мраке. Злополучного калеку охватила глубокая меланхолия, такая же полная и неизлечимая, как и его телесное уродство. Глухота сделала его отчасти и немым. Почувствовав себя оглохшим, он, чтобы не быть мишенью лишних насмешек, обрек себя на молчание, которое нарушал только наедине с самим собою. Он добровольно вновь наложил узы на свой язык, развязать который стоило стольких трудов его приемному отцу. Последствием этого было то, что, когда перед ним возникала неизбежная необходимость говорить, язык его поворачивался тяжело и неуклюже, как дверь на ржавых петлях.</p><p class="p1">Если бы мы попытались проникнуть в душу Квазимодо сквозь покрывавшую ее толстую и корявую оболочку; если бы мы могли прощупать всю глубину этого уродливого организма; если бы нам была дана возможность заглянуть за эти грубые органы и исследовать сумрачную внутренность этого загадочного существа, пройти по всем углам и своеобразным изгибам этой темной пропасти и осветить томившуюся на ее дне психику, мы, наверное, нашли бы ее в самом жалком положении: скорченною и захирелою, подобно тем несчастным узникам венецианских свинцовых тюрем, которые доживали до старости, согнутые в три погибели в каменных ящиках, слишком узких, коротких и низких для того, чтобы можно было в них выпрямиться.</p><p class="p1">В уродливом теле дух не может не атрофироваться. Квазимодо лишь смутно мог чувствовать в себе присутствие души, похожей на его тело. Впечатления окружавших его предметов должны были подвергаться множеству преломлений, прежде чем дойти до его сознания. Мозг его представлял совсем особую среду: проходившие через него мысли были чудовищно извращены. Мысль, подвергавшаяся стольким преломлениям, естественно, должна была получаться до невозможности расплывчатой, туманной.</p><p class="p1">Это порождало бесчисленное множество зрительных обманов, ложных суждений и уклонений блуждавшей мысли, и Квазимодо казался то сумасшедшим, то форменным идиотом.</p><p class="p1">Первым следствием такой роковой организации было то, что она совершенно затемняла взгляд Квазимодо на окружающее. Не получая никаких непосредственных впечатлений, это злополучное существо было несравненно дальше от внешнего мира, чем всякое другое. Вторым следствием его уродства являлась злость. И действительно, Квазимодо был зол, потому что был дик, а диким он стал оттого, что был безобразен. Его натура, как и всякая другая, была последовательна. Его необычайно развившаяся телесная сила тоже немало способствовала увеличению в нем злости. Гоббс недаром сказал: Malus puer robustus<a href="ch2.xhtml#id22" class="a">[55]</a>.</p><p class="p1">Впрочем, по справедливости следует сказать, что злость, пожалуй, у него не была врожденной. Не нужно забывать, что с первых же шагов среди людей он почувствовал себя – а впоследствии и отчетливо осознал это – оплеванным, забросанным грязью, отверженным. Человеческая речь была для него не чем иным, как проклятьями или насмешками. Пока он рос, он видел вокруг себя одну лишь ненависть и сам проникся ею. Он лишь подобрал оружие, причинившее ему столько глубоких, неизлечимых ран.</p><p class="p1">Впрочем, он всегда с крайнею неохотою обращался к людям. Ему было вполне достаточно его собора, населенного мраморными изображениями королей, святых, епископов и проч. Эти изображения, по крайней мере, не смеялись ему прямо в лицо и смотрели на него лишь взглядом, полным благоволения и величавого бесстрастия. Правда, там были изображения демонов и чудовищ, но и те смотрели на него без всякой ненависти. Он сам был слишком на них похож. Если он и подмечал в них оттенок насмешливости, то разве только по отношению к другим. Святые благословляли его, и он поэтому считал их своими друзьями. Чудовища охраняли его, он и в них видел своих друзей. Он не стеснялся изливать перед ними свои чувства. Иногда он по целым часам сидел на корточках перед какою-нибудь статуей, ведя с ней задушевную беседу. Если кто-нибудь заставал его, он поспешно убегал, точно влюбленный, которого застали поющим серенаду.</p><p class="p1">Собор заменял для Квазимодо не только общество людей, но и всю вселенную, всю природу. Ему не нужно было других украшений, кроме разноцветных и ярких красок, сверкающих на оконных стеклах собора; другой тени, кроме той, которая отбрасывалась каменною, усаженною птицами листвою, густо украшавшей саксонские капители; других гор, кроме исполинских башен собора; другого океана, кроме того, который представлял Париж, бурливший у подножия этих башен.</p><p class="p1">Но что он более всего любил в этом родном здании, что пробуждало его душу и заставляло ее хоть изредка расправлять свои бедные крылья, так безжалостно сжатые ее тесным помещением, – это колокола. Он их любил, лелеял, разговаривал с ними и понимал их. Он относился нежно ко всем ним, начиная с маленьких колоколов средней стрельчатой башенки и кончая большим колоколом портала. Средняя колоколенка и обе боковые башни были для него тремя громадными клетками, в которых воспитанные им птицы услаждали своим пением только его одного. А между тем эти самые колокола были причиною его глухоты. Но ведь матери обыкновенно любят сильнее именно тех детей, которые заставляли их больше страдать.</p><p class="p1">Да, голос колоколов был единственный, который он мог еще слышать. Поэтому он больше всех остальных любил большой колокол; он относился к нему с особенным вниманием и отличал его из всей этой шумной семьи, так весело заливавшейся вокруг него по праздничным дням. Этот большой колокол звали «Марией». Он висел один в южной башне, рядом со своей сестрой «Жакелиной», заключенной в клетку меньших размеров. «Жакелина» была названа этим именем в честь жены Жана Монтегю, пожертвовавшего этот колокол собору, что, кстати, не помешало ему быть потом обезглавленным на Монфоконе. Во второй башне висело шесть колоколов, на средней башенке помещалось тоже шесть колоколов, поменьше, в обществе деревянного колокола, в который звонили только на Страстной неделе, начиная с полудня чистого четверга и кончая утром субботы. Таким образом, в распоряжении Квазимодо было пятнадцать колоколов, из которых самым любимым была все-таки «Мария».</p><p class="p1">Невозможно описать радость, какую он испытывал в дни большого благовеста. Как только архидьякон приказывал ему идти на свое место и начинать звон, он бросался на винтовую лестницу и взбирался по ней скорее, чем другой стал бы спускаться. Запыхавшись, он вступал в воздушное помещение большого колокола. С минуту он проводил в благоговейном созерцании своего любимца, потом нежным голосом что-то говорил ему и гладил его рукою, точно доброго коня, которому предстоит длинный путь. Казалось, он жалел колокол за предстоявший ему труд. После этих первых ласк он кричал своим помощникам, дожидавшимся в нижнем ярусе башни, чтобы они начинали. Помощники повисали на канатах, раздавался скрип ворота, и громадная медная масса медленно начинала раскачиваться. С замирающим сердцем Квазимодо следил за нею глазами. Вот вздрогнули бревенчатые балки под первым ударом колокола, под первым звуком медного языка. Квазимодо сам вибрировал вместе с колоколом.</p><p class="p1">– Ну, звони! – вскрикивал он и разражался безумным хохотом. Между тем движение колокола ускорялось, и, по мере того как увеличивался описываемый им угол размаха, глаз Квазимодо все более и более расширялся и начинал сверкать фосфорическим блеском. Наконец к голосу этого колокола присоединялись голоса и остальных колоколов собора. Начинался трезвон. Дрожала уже вся башня; она гудела всем своим корпусом – каменными плитами и свинцовыми полосами, начиная со столбов фундамента и кончая увенчивавшими ее трилистниками. Квазимодо кипел ключом. Наклоняясь взад и вперед, он дрожал вместе с башней с головы до ног. Освобожденный рассвирепевший колокол подносил то к тому, то к другому из пролетов башни свою бронзовую пасть, дышавшую той бурей звуков, которая была слышна по крайней мере на четыре лье кругом. Поместившись перед этой пастью, Квазимодо, следуя движениям колокола, то приседал, то подскакивал, вдыхая производимый движением колокола ветер и с торжеством глядя попеременно то на кишевшую народом внизу, на глубине двухсот футов, площадь, то на исполинский медный язык, ревевший ему прямо в уши. Это был единственный голос, который он мог слышать, единственный звук, нарушавший безмолвие, в которое для него была погружена вселенная. Он наслаждался, как птица в лучах солнца. Вдруг исступление колокола сообщалось и ему; взгляд его становился неестественным. Выждав приближение качавшегося взад и вперед колокола, как паук выжидает добычу, и уловив момент, он бросался на него одним прыжком. Повиснув над бездной, он схватывал медное чудовище за ушки, сжимал его коленями, пришпоривал ударами пяток и всею своею силою, всею тяжестью своего тела старался увеличить и без того уже бешеные размахи колокола. Вся башня тряслась. Квазимодо вскрикивал и скрежетал зубами; его рыжие волосы становились дыбом, грудь пыхтела, как кузнечный мех, единственный глаз метал молнии; огромный колокол ржал и задыхался под ним. Это были уже не колокол собора Богоматери и его звонарь Квазимодо, это была фантасмагория, вихрь, буря. Это было безумие, оседлавшее звук; дух, вцепившийся в летающий хребет; чудовищный кентавр – наполовину человек, наполовину колокол; своего рода ужасающий Астольф, уносимый волшебным бронзовым гиппогрифом.</p><p class="p1">Присутствие такого странного существа, как Квазимодо, вдыхало жизнь во все здание собора. По словам суеверной толпы, казалось, что от Квазимодо исходит какая-то таинственная сила, оживлявшая камни и шевелившая самые недра старого собора. Достаточно было верившим в эту силу знать, что он находится в соборе, чтобы им представлялось, как он оживляет бесчисленные статуи, галереи и паперти. И действительно, собор казался живым существом, во всем ему покорным и послушным, ждавшим его приказания, чтобы поднять свой гулкий голос, – существом, одержимым Квазимодо, как духом. Можно сказать, что Квазимодо заставлял дышать все громадное здание. Он был точно вездесущ в соборе, как бы одновременно присутствовал во всех его пунктах. То с ужасом видели на вершине одной из башен уродливого карлика, который там лазил, извивался змеей, ползал на четвереньках, висел над пропастью, прыгал с одного выступа на другой и забирался внутрь какой-нибудь скульптурной горгоны – это был Квазимодо, разорявший вороньи гнезда. То вдруг неожиданно наталкивались в темном углу собора на подобие живой химеры, скорченной и насупившейся, – это был Квазимодо, погруженный в размышление. То вдруг из-под какого-нибудь колокола показывалась громадная голова, приделанная к чудовищно уродливому туловищу, бешено раскачивавшемуся на веревке, – это был Квазимодо, звонивший к вечерне. Часто по ночам можно было видеть какое-то страшилище, бродившее по нежной, точно кружевной балюстраде, увенчивавшей башни и кровлю собора, – это был все тот же горбун собора Богоматери. В эти ночи, как уверяли соседки, вся церковь принимала какой-то сверхъестественный, страшный вид. Тут и там раскрывались глаза и уста; слышен был лай каменных псов, вой змей и драконов, день и ночь стороживших собор с вытянутыми шеями и разинутыми пастями. А если дело происходило в ночь под Рождество, в то время, когда большой колокол задыхающимся голосом созывал верующих на полунощное богослужение, мрачный фасад собора принимал такой вид, точно он своим порталом, как чудовищной пастью, поглощает толпу богомольцев, а центральная розетка казалась громадным светящимся глазом, озиравшим их с высоты. И все это происходило благодаря Квазимодо. В Египте его признали бы божеством этого храма; Средние века видели в нем демона собора, тогда как в действительности он был только душою этого здания.</p><p class="p1">Да, для тех, которые знают, что существовал Квазимодо, собор Богоматери теперь опустел, превратился в бездыханную, мертвую массу. Чувствуется, что в соборе чего-то недостает, что это громадное тело внутри пусто, что это, в сущности, один скелет. Дух исчез, осталась одна оболочка. Это все равно что череп, в котором еще сохранились впадины для глаз, но самых глаз уже нет.</p></span><span id="id25"><div class="title6">
<p class="p">IV. Собака и ее господин</p>
</div><p class="p1">Между тем было одно человеческое существо, на которое Квазимодо не распространял злобы, питаемой им ко всем остальным людям. Он любил одного человека так же, а быть может, даже больше, чем свой собор. Это был Клод Фролло.</p><p class="p1">Да оно и понятно. Клод Фролло подобрал его, когда он был брошен всеми, усыновил, вскормил и воспитал его. Будучи еще ребенком, Квазимодо привык искать у ног Клода Фролло защиты против бросавшихся на него злых собак и ребятишек. Клод Фролло научил его говорить, читать и писать. Наконец, Клод Фролло сделал его звонарем, а обручить Квазимодо с большим колоколом было то же самое, что отдать Джульетту Ромео.</p><p class="p1">Зато и глубокой, страстной признательности Квазимодо не было предела. Хотя лицо его приемного отца часто было мрачно и сурово, а речь – отрывиста, жестка и повелительна, признательность Квазимодо к своему воспитателю еще ни разу ни на одно мгновение не ослабевала. Архидьякон имел в лице своего приемыша самого покорного раба, самого усердного слугу, самую бдительную собаку. Когда бедный звонарь оглох, между ним и Клодом Фролло установился своеобразный, таинственный язык знаков, понятный только им одним. Таким образом, архидьякон был единственным человеком, с которым Квазимодо еще общался. Только собор Богоматери и Клод Фролло и связывали его со здешним миром.</p><p class="p1">Власть архидьякона над звонарем и привязанность звонаря к архидьякону были беспредельны. По одному знаку Клода Фролло, из одного желания сделать ему удовольствие, Квазимодо был бы готов броситься вниз с самой высокой башни собора Богоматери. Замечательно, что Квазимодо, обладавший такой необычайной физической силой, подчинялся, точно ребенок, человеку, бывшему физически гораздо слабее его. В этом, несомненно, сказывались не только сыновняя любовь и привязанность слуги к своему господину, но и обаяние более сильного ума. Убогий, скудный, жалкий разум звонаря невольно благоговейно преклонялся перед глубоким, сильным, властным и могучим умом архидьякона. На первом месте, однако, здесь была благодарность, дошедшая до таких крайних пределов, что сравнить ее нельзя ни с чем. Наиболее яркие примеры этой добродетели даются не людьми. Поэтому мы лучше всего охарактеризуем привязанность Квазимодо к Клоду Фролло, если скажем, что он любил его так, как ни собака, ни лошадь, ни слон никогда не любили своего господина.</p></span></span></span>
