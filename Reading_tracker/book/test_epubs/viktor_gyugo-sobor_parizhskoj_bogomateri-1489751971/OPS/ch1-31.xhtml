<p class="p">II. Священник и философ не одно и то же</p>
</div><p class="p1">Священник, которого молодые девушки увидали на северной башне и который так внимательно следил, перегнувшись через перила, за пляской цыганки, был действительно архидьякон Клод Фролло.</p><p class="p1">Читатель не забыл, вероятно, таинственной кельи, которую архидьякон устроил себе в этой башне. (Между прочим, я не знаю, не та ли эта самая келья, внутренность которой и теперь можно видеть через четырехугольное окошечко, проделанное на высоте человеческого роста с восточной стороны платформы, служащей основанием для башен собора. Теперь это не что иное, как пустая полуразрушенная нора, плохо выштукатуренные стены которой местами «украшены» плохими пожелтевшими изображениями фасадов различных соборов. Я думаю, что там гнездятся летучие мыши и пауки, и, следовательно, ведется двойная истребительная война против мух.)</p><p class="p1">Ежедневно, за час до захода солнца, архидьякон поднимался по лестнице на башню и запирался в этой келье, где иногда проводил целые ночи. На этот раз, добравшись до низенькой двери своего убежища, вставляя в замок замысловатый ключ, который он всегда носил в сумке, висевшей у него на поясе, он услыхал звук бубна и кастаньет. Звук доносился с площади перед собором. Келья, как мы уже говорили, имела только одно окошечко, выходившее на крышу собора. Клод Фролло быстро выдернул ключ и через минуту стоял уже на вершине башни в угрюмой, сосредоточенной позе, в которой его заметили молодые девицы.</p><p class="p1">Он стоял там, серьезный, неподвижный, весь поглощенный одним зрелищем и одной мыслью. У его ног лежал Париж с тысячами шпилей своих зданий и горизонтом, затянутым мягкими очертаниями холмов, с рекой, извивающейся под мостами, и улицами, кишащими народом, облаками дыма и массами нагроможденных, как горы, одна на другую крыш, словно наступающих со всех сторон на собор. Но во всем этом городе внимание священника привлекал один только уголок – площадь перед собором. Среди всей этой толпы он видел одно только лицо – лицо цыганки.</p><p class="p1">Трудно было бы определить, что выражал этот взгляд и какое чувство заставляло его гореть таким огнем. Взгляд был неподвижен и вместе с тем исполнен смятения и тревоги. Судя по неподвижности всего тела, по которому лишь изредка пробегал невольный трепет, подобный содроганию дерева, колеблемого ветром, по застывшим локтям, казавшимся изваянными из мрамора, как те перила, на которые они опирались, по неподвижной улыбке, исказившей лицо, – можно было подумать, что в Клоде Фролло оставались живыми одни только глаза.</p><p class="p1">Цыганка плясала. Она вертела свой бубен на кончике пальца и подбрасывала его в воздух, танцуя провансальскую сарабанду. Проворная, легкая, радостная, она не чувствовала тяжести страшного взгляда, тяготевшего отвесно над ее головой.</p><p class="p1">Толпа теснилась вокруг нее. По временам человек в желтом с красным казакине расширял круг, а затем снова усаживался на стул в нескольких шагах от танцовщицы и клал голову козы себе на колени.</p><p class="p1">Этот человек был, по-видимому, спутником цыганки. Клод Фролло с высоты, на которой он находился, не мог различить черт его лица.</p><p class="p1">С той минуты, как архидьякон заметил этого человека, внимание его, казалось, раздвоилось между плясуньей и им, и лицо его становилось все мрачнее.</p><p class="p1">Вдруг он выпрямился, и по всему его телу пробежала дрожь.</p><p class="p1">– Что это за человек? – проговорил он сквозь зубы. – Она всегда ходила одна.</p><p class="p1">И, скрывшись под извилистым сводом винтовой лестницы, он спустился вниз.</p><p class="p1">Проходя мимо полуотворенной двери помещения для колоколов, он увидел нечто, поразившее его. Квазимодо, высунувшись в отверстие под одним из шиферных навесов, похожих на жалюзи, тоже смотрел на площадь. Он так ушел в свое созерцание, что не заметил, как его приемный отец прошел мимо. В его единственном глазу было странное выражение. В нем светились восторг и умиление.</p><p class="p1">– Вот странно, – бормотал Клод, – неужели он так смотрит на цыганку?</p><p class="p1">Клод продолжал задумчиво спускаться и через несколько минут вышел через дверь у подножия башни на площадь.</p><p class="p1">– Куда же девалась цыганка? – спросил он, вмешиваясь в группу зрителей, собравшихся на звук бубна.</p><p class="p1">– Не знаю, – ответил один из стоявших рядом с ним, – она куда-то исчезла. Кажется, пошла плясать в тот дом, напротив. Ее позвали оттуда.</p><p class="p1">Вместо цыганки на том же ковре, арабески которого минуту тому назад исчезали под капризными узорами пляски, архидьякон увидал только человека в красном с желтым казакине. Завладев вниманием зрителей, человек этот обходил круг, подперши бока руками, закинув голову, вытянув шею, побагровев и держа в зубах стул. К стулу была привязана кошка, взятая напрокат у живущей поблизости женщины и отчаянно мяукавшая со страху.</p><p class="p1">– Пресвятая Богородица, как попал сюда мэтр Пьер Гренгуар! – воскликнул архидьякон, когда фигляр, с которого пот катился градом, прошел мимо него со своей пирамидой из стула и кошки.</p><p class="p1">Строгий голос так поразил беднягу, что все его сооружение потеряло равновесие и стул с кошкой при отчаянных криках ушибленных полетел на головы зрителей.</p><p class="p1">Очень вероятно, что Пьеру Гренгуару – то был действительно он – пришлось бы дорого поплатиться перед хозяйкой кошки и перед всеми ушибленными или исцарапанными, если бы он не воспользовался смятением, чтобы скрыться в церкви, куда Клод Фролло знаком пригласил его следовать за собой.</p><p class="p1">В соборе было пусто и темно, и лампады в приделах светились, как звездочки среди мрака, уже наполнившего своды. Только большая розетка фасада, на разноцветные стекла которой падали косые лучи солнца, сверкала в темноте игрой самоцветных камней, отбрасывая ослепительный спектр на противоположную стену.</p><p class="p1">Сделав несколько шагов, достопочтенный Клод прислонился к колонне и пристально взглянул на Гренгуара. Взгляд его был не тот, которого боялся Гренгуар, устыдившийся, что такое почтенное и ученое лицо встретило его в наряде фигляра. Во взгляде священника не было ни насмешки, ни иронии; он был серьезен, спокоен и проницателен. Архидьякон первый нарушил молчание:</p><p class="p1">– Послушайте, мэтр Пьер, вы должны объяснить мне многое. Во-первых, что это значит, что вас не было видно целых два месяца, а теперь вы появляетесь на перекрестке и, нечего сказать, в чудесном наряде: одна сторона желтая, другая – красная, словно кодебекское яблоко!</p><p class="p1">– Мессир, – жалобно заговорил Гренгуар, – это действительно очень странный наряд, и он стесняет меня больше, чем стеснила бы кошку тыква, надетая ей на голову. Я чувствую, что поступаю очень глупо, подвергая господ сержантов городской стражи риску нанести удар по плечевой кости философа-пифагорейца, обрядившегося в этот казакин. Но что делать, почтенный учитель! Виноват во всем мой старый кафтан, предательски покинувший меня в начале зимы под предлогом, что он превращается в клочья и что ему пора отдохнуть в корзине тряпичника. Что делать? Цивилизация еще не достигла той степени, при которой можно было бы ходить нагишом, как мечтал старик Диоген. Прибавьте к этому, что дул холодный ветер и что в январе мудрено пытаться ввести подобное усовершенствование в жизнь человечества. Подвернулся этот казакин. Я его взял и бросил свой черный подрясник, бывший далеко не достаточно герметическим для такого герметика, как я. И вот вы видите меня в наряде гистриона, как это было с блаженным Генезием. Что делать? Бывают такие темные полосы в жизни людской. Ведь пришлось же Аполлону пасти свиней у Адмета.</p><p class="p1">– Нечего сказать, славное вы избрали себе ремесло! – продолжал архидьякон.</p><p class="p1">– Совершенно согласен, что лучше философствовать или заниматься поэзией, раздувать пламя в алхимическом горне или доставать его с неба, чем носить кошек на подставке. И вот, когда вы окликнули меня, я почувствовал себя в таком же глупом положении, как осел перед вертелом. Но как быть, почтенный учитель? Надо чем-нибудь перебиваться со дня на день, и самый превосходный александрийский стих не заменит зубам куска сыра бри. Как вам известно, я сочинил для принцессы Маргариты Фландрской свадебную песнь, и город не платит мне за нее под предлогом, что эта песнь – далеко не лучшее произведение в своем роде, – как будто за четыре экю можно дать трагедию Софокла! Стало быть, мне грозила голодная смерть. К счастью, в челюстях у меня оказалась порядочная сила, и я сказал им: «Показывайте фокусы, в которых проявилась бы ваша сила, и кормите сами себя – ale te ipsam». Шайка оборванцев, с которыми я свел дружбу, выучила меня разным атлетическим штукам, и теперь я каждый вечер преподношу моим зубам тот хлеб, который они заработали в поте лица моего. Конечно, concedo, – я согласен, что это весьма печальное применение моих умственных способностей и что человек не для того создан, чтобы бить в бубен и носить в зубах стулья. Но, уважаемый учитель, недостаточно жить, надо как-нибудь суметь сохранить свою жизнь.</p><p class="p1">Достопочтенный Клод слушал молча. Вдруг взгляд его впавших глаз принял такое проницательное, дальновидное выражение, что Гренгуару показалось, что этот взгляд проник в сокровенные тайники его души.</p><p class="p1">– Все это прекрасно, мэтр Пьер, но как же вы очутились в обществе этой плясуньи-цыганки?</p><p class="p1">– Очень просто: она моя жена, а я ее муж, – отвечал Гренгуар.</p><p class="p1">В мрачных глазах священника вспыхнул зловещий огонь.</p><p class="p1">– Ты осмелился сделать это, негодяй! – закричал Клод, яростно хватая Гренгуара за руку. – Неужели Бог тебя совсем оставил, что ты осмелился коснуться этой девушки?</p><p class="p1">– Если это вас тревожит, монсеньор, то клянусь вам спасением моей души, что я ни разу не прикоснулся к ней, – дрожа всем телом, заявил Гренгуар.</p><p class="p1">– Что же ты болтаешь о муже и жене? – спросил священник.</p><p class="p1">Гренгуар поспешил коротко рассказать ему обо всем, что уже известно читателю, – обо всем случившемся с ним на Дворе чудес и о своем венчании разбитой кружкой. По-видимому, это венчание не имело дальнейших последствий, и цыганка каждый вечер ускользала от него, как в первую ночь.</p><p class="p1">– Это неприятно, – заключил свой рассказ Гренгуар. – Но беда в том, что я, кажется, имел несчастье жениться на девственнице.</p><p class="p1">– Что вы хотите этим сказать? – спросил архидьякон, мало-помалу успокоившийся в продолжение рассказа.</p><p class="p1">– Это довольно трудно объяснить, – отвечал поэт. – Тут дело в суеверии. Моя жена, как мне сказал старый бродяга, которого у нас называют герцогом египетским, подкинута или потеряна своими родными, – впрочем, это одно и то же. Она носит на шее ладанку, которая, как уверяют, поможет ей со временем отыскать родных, но которая утратит свою силу, если девушка утратит свою чистоту. Из этого следует, что мы оба живем как нельзя более добродетельно.</p><p class="p1">– Стало быть, вы думаете, мэтр Пьер, что к этой твари еще не прикасался ни один мужчина? – спросил Клод, лицо которого прояснялось по мере того, как говорил Гренгуар.</p><p class="p1">– Что может мужчина поделать против суеверия, достопочтенный Клод? – ответил поэт. – У девушки эта мысль засела в голове. Полагаю, что, наверное, большая редкость встретить такую монашескую целомудренность среди цыганок, которые вообще так легко приручаются. Но ее сохраняют три вещи: герцог египетский, взявший ее под свое покровительство, предполагая, может быть, со временем продать ее какому-нибудь аббату; все ее племя, относящееся к ней с каким-то особенным обожанием, точно к какой-нибудь святой, и, наконец, маленький кинжал, который мошенница всегда носит при себе, несмотря на запрещение прево, и который немедленно появляется в ее руке, как только вздумаешь обнять ее за талию. Настоящая оса!</p><p class="p1">Архидьякон засыпал Гренгуара вопросами.</p><p class="p1">По мнению Гренгуара, Эсмеральда безобидное, прелестное существо. Она хорошенькая, когда не делает своей особенной гримаски, наивная, страстная, совершенно не знающая жизни и всем увлекающаяся, не понимает еще различия между мужчиной и женщиной. Это совершенное дитя природы, до страсти любящее пляску, шум, жизнь под открытым небом, – нечто вроде женщины-пчелы, с невидимыми крыльями на ногах, живущей в постоянном вихре. Она обязана этими свойствами той бродячей жизни, которую вечно вела. Гренгуару удалось узнать, что еще в детстве она исходила всю Испанию, Каталонию и Сицилию; кажется, даже побывала со своим цыганским табором в царстве Алжирском, находящемся в Ахайи, которая, как известно, с одной стороны граничит с Малой Албанией и Грецией, а с другой – с Сицилийским морем, по которому лежит путь в Константинополь. Цыгане, по словам Гренгуара, оказывались подданными алжирского короля, как главы всех белых мавров. Достоверно только то, что Эсмеральда еще в очень юном возрасте пришла во Францию из Венгрии. Во всех этих странах молодая девушка усвоила отрывки странных наречий, песен и понятий, и поэтому ее речь так же пестра, как ее полуафриканский, полупарижский наряд. Жители кварталов, которые она посещает, любят ее за ее веселость, грацию, живость, пляски и песни. Она считает, что во всем городе ее ненавидят только два лица, о которых она часто говорит с ужасом: затворница Роландовой башни, неизвестно за что ненавидящая цыганок и проклинающая Эсмеральду каждый раз, как та проходит мимо окошечка ее кельи, и какой-то священник, который никогда не проходит мимо, не бросив ей взгляда или слова, которые пугают ее. Последнее обстоятельство весьма смутило архидьякона. Но Гренгуар не обратил особенного внимания на его смущение. Двух месяцев оказалось совершенно достаточно, чтобы заставить легкомысленного поэта забыть странные подробности того вечера, когда он встретился с цыганкой, и о той роли, которую при этом играл архидьякон. Вообще маленькая танцовщица ничего не боится, она не гадает, а следовательно, ей нечего опасаться преследований за колдовство, которым часто подвергаются цыганки. К тому же Гренгуар постоянно находится при ней, если не в качестве мужа, то, по крайней мере, брата. Вообще философ, по-видимому, переносил очень терпеливо свой платонический брак. Все же он имел кров и кусок хлеба. Каждое утро он выходил из квартала нищих, чаще всего вместе с цыганкой, и помогал ей собирать на перекрестках мелкие монеты. Вечером они вместе возвращались под общую кровлю. Эсмеральда запиралась в своей каморке, а он засыпал сном праведника. Гренгуар находил такое существование очень приятным и располагающим к мечтательности. Философ в душе не был уверен в том, что он без ума влюблен в цыганку. Он, кажется, любил козу не меньше ее хозяйки. То было прелестное, кроткое, умное животное – ученая коза. В Средние века подобные ученые животные, возбуждавшие всеобщее удивление и часто доводившие своих хозяев до костра, не были редкостью. Между тем колдовство козочки с золочеными копытцами было самого невинного свойства. Гренгуар разоблачил ее фокусы архидьякону, которого эти подробности, по-видимому, чрезвычайно интересовали. В большинстве случаев достаточно было протянуть бубен тем или иным образом, чтобы она произвела желаемое колдовство. Научила ее этому цыганка, обладавшая в этом отношении таким талантом, что ей достаточно было двух месяцев, чтобы выучить козу складывать из передвижных букв слово «Феб».</p><p class="p1">– «Феб», – сказал священник. – Почему «Феб»?</p><p class="p1">– Не знаю, – отвечал Гренгуар. – Может быть, цыганка приписывает этому слову какое-нибудь особенное, таинственное свойство. Часто, думая, что ее никто не слышит, она повторяет его вполголоса.</p><p class="p1">– Уверены ли вы, что это слово, а не имя? – спросил Клод, сопровождая свой вопрос проницательным взглядом.</p><p class="p1">– Чье имя? – сказал поэт.</p><p class="p1">– Почем я знаю, – ответил священник.</p><p class="p1">– Знаете, что я думаю, мессир? Цыгане в некотором роде огнепоклонники и обожают солнце. Вот откуда взялось «Феб».</p><p class="p1">– Мне это не кажется таким ясным, как вам, мэтр Пьер.</p><p class="p1">– В сущности, это меня не касается. Пусть себе бормочет своего «Феба» на здоровье! Одно я знаю, что Джали любит меня уже почти не меньше, чем ее.</p><p class="p1">– Кто это Джали?</p><p class="p1">– Коза.</p><p class="p1">Архидьякон взялся рукой за подбородок и на минуту задумался. Вдруг он порывисто обратился к Гренгуару:</p><p class="p1">– И ты клянешься мне, что ты не прикасался к ней?</p><p class="p1">– К кому? – спросил Гренгуар. – К козе?</p><p class="p1">– Нет, к этой женщине?</p><p class="p1">– К моей жене? Клянусь!</p><p class="p1">– А ты часто бываешь наедине с ней?</p><p class="p1">– Каждый вечер с добрый час.</p><p class="p1">Клод нахмурился.</p><p class="p1">– Ого! Solus cum sola non cogitabuntur orare Pater noster<a href="ch2.xhtml#id190" class="a">[90]</a>.</p><p class="p1">– Клянусь честью, я мог бы прочесть при ней и Pater, и Ave Maria, и Credo in deum patrem omnipotentem<a href="ch2.xhtml#id189" class="a">[91]</a>, и она обратила бы на меня внимания не больше, чем курица на церковь. – Поклянись мне утробой своей матери, что ты не прикасался к этой твари кончиком пальца! – горячо повторил архидьякон.</p><p class="p1">– Я мог бы поклясться также и головой моего отца, а это не меньше. Но, почтенный учитель, позвольте и мне предложить вам один вопрос.</p><p class="p1">– Говорите.</p><p class="p1">– Какое вам до всего этого дело?</p><p class="p1">Бледное лицо архидьякона вспыхнуло, как щеки девушки. Он с минуту ничего не отвечал, затем заговорил с видимым смущением:</p><p class="p1">– Послушайте, мэтр Пьер Гренгуар, вы еще, насколько мне известно, не погубили своей души. Я принимаю в вас участие и желаю вам добра. Малейшее же общение с этой проклятой цыганкой отдаст вас во власть Сатаны. Вы знаете, что всегда тело губит душу. Горе вам, если вы сблизитесь с этой женщиной. Вот и все.</p><p class="p1">– Я было попытался раз… в первый день, да укололся, – сознался Гренгуар, почесывая затылок.</p><p class="p1">– У вас хватило на это совести, мэтр Пьер?</p><p class="p1">Лицо священника снова омрачилось.</p><p class="p1">– Другой раз, – продолжал поэт, улыбаясь, – я перед сном подсмотрел в замочную скважину и увидел самую красивую женщину, под обнаженной ногой которой когда-либо скрипела постель.</p><p class="p1">– Убирайся ты к дьяволу! – крикнул священник с ужасным взглядом и, толкнув изумленного Гренгуара, большими шагами удалился под самые темные своды собора.</p></span><span id="id40"><div class="title6">
<p class="p">III. Колокола</p>
</div><p class="p1">С того дня, когда Квазимодо был выставлен у позорного столба, жителям соседних с собором домов стало казаться, что усердие Квазимодо к колокольному звону значительно охладело. Прежде трезвон поднимался по всякому поводу. Утренний звон продолжался от ранней до поздней обедни, а перед вечерней начинался целый набат. Богатая гамма всех колоколов раздавалась при бракосочетании или крестинах, образуя в воздухе как бы узор из разнородных прелестных звуков. Старинный храм весь наполнялся звучными, радостными переливами. Чувствовалось постоянное присутствие причудливого шумного духа, певшего всеми этими медными устами. Теперь этот дух словно исчез. Собор казался мрачным и охотно безмолвствовал. В праздники и при похоронах раздавался обычный сухой звон без всяких прикрас – только то, что требовалось по уставу, и ничего больше. Из двух голосов церкви – орган внутри, а колокола снаружи – остались только звуки органа. Можно было подумать, что на колокольнях уже нет умелого звонаря. Между тем Квазимодо продолжал жить там. Что же с ним случилось? Быть может, стыд и отчаяние, испытанные им у позорного столба, еще продолжали наполнять его сердце, удары кнута палача продолжали отдаваться в его душе и пережитое страдание убило в нем все, даже его страсть к колоколам? Или, быть может, колокол «Мария» нашел себе соперницу в сердце соборного звонаря, забывшего большой колокол и его четырнадцать братьев ради чего-нибудь более прекрасного?</p><p class="p1">Случилось так, что в 1482 году Благовещение пришлось во вторник. В этот день воздух был так чист и легок, что в душе Квазимодо снова пробудилась любовь к его колоколам. Он поднялся на северную башню, между тем как внизу церковный сторож открывал настежь все церковные двери, состоявшие тогда из огромных плоскостей крепкого дерева, окованных медью, прибитых золочеными железными гвоздями и обрамленных весьма искусно вычеканенным орнаментом.</p><p class="p1">Войдя в верхнее отделение колокольни, Квазимодо некоторое время смотрел на свои шесть колоколов, грустно покачивая головой, словно жалея о том, что в его сердце что-то встало между ним и ими. Но, когда он раскачал их, когда почувствовал движение этой грозди колоколов, управляемой его рукой, когда увидал – слышать он не мог, – как трепещущая октава пробегала вверх и вниз по этой звучащей лестнице, подобно птице, прыгающей с ветки на ветку, когда демон музыки, потрясающий всей массой нот, трелей и переливов, овладел бедным глухим, он снова стал счастлив. Он забыл все, и облегчение, испытываемое его сердцем, отразилось на его лице.</p><p class="p1">Он ходил взад и вперед, ударял в ладоши, бегал от одной веревки к другой, ободряя своих шестерых певцов голосом и жестами, как дирижер, подбадривающий чутких виртуозов.</p><p class="p1">– Ну, «Габриель», – говорил он, – наполни своими звуками всю площадь. Сегодня праздник. «Тибо», не ленись! Ты что-то замедляешь темп, ну же, ну! Ты заржавел, ленивец?.. Хорошо! Скорей, скорей! Чтоб языка не было видно. Оглуши их, чтоб они стали, как я! Хорошо, «Тибо»… молодец!.. «Гильом»! «Гильом»! Ты самый большой, а «Пакье» самый маленький, – и у «Пакье» дело идет лучше. Я готов побиться об заклад, что те, которые слышат, слышат его лучше, чем тебя. Хорошо, хорошо, «Габриель»; сильней, сильней! Эй, да что это вы оба там делаете, воробьи? Вас вовсе не слышно. Что это за медные клювы? Они как будто зевают, вместо того чтобы петь? У меня работать! Сегодня Благовещение. Солнце светит ярко. Надо отзвонить на славу… Бедный «Гильом», ты совсем запыхался, толстяк!</p><p class="p1">Он весь ушел в подбадривание своих колоколов, которые взапуски подпрыгивали, сотрясаясь своими блестящими телами, как шумная запряжка испанских мулов, поощряемых время от времени прикосновением бича.</p><p class="p1">Вдруг, бросив взгляд вниз через широкую шиферную чешую, покрывавшую остроконечную стену колокольни, он увидал на площади девушку в пестром наряде, расстилавшую ковер, на который прыгнула козочка. Кругом уже собирались зрители. Это зрелище вдруг изменило направление мыслей звонаря и охладило его музыкальное рвение, как струя холодного воздуха охлаждает растопленную смолу. Он остановился, отвернулся от колоколов и, присев у отверстия в шиферных плитах, устремил на плясунью тот задумчивый, нежный и кроткий взгляд, который уже однажды так изумил архидьякона. Между тем забытые колокола замолкли все сразу, к великому прискорбию любителей колокольного звона, внимательно слушавших с моста Шанж и разошедшихся с чувством недоумения, испытываемого собакой, которой показали кость, а дали камень.</p></span></span></span>
