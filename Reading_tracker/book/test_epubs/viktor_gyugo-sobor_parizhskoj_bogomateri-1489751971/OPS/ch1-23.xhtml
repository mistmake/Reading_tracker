<p class="p">I. Abbas beati Martini<a href="ch2.xhtml#id266" class="a">[64]</a></p>
</div><p class="p1">Слава Клода Фролло разнеслась далеко. Ей он был обязан случившимся вскоре после того, как он отказался принять госпожу де Боже, посещением, надолго сохранившимся в его памяти. Дело было вечером. Клод только что вернулся после вечернего богослужения в свою келью в монастыре собора Богоматери. В этой келье не было ничего странного или таинственного, если не считать несколько стоявших в углу склянок, наполненных каким-то подозрительного вида порошком, напоминавшим алхимические снадобья. Правда, кое-где на стенах виднелись надписи, но это были просто научные сентенции или благочестивые изречения, заимствованные у вполне благонадежных авторов. Усевшись при свете медного трехсвечника перед столом, на котором стоял большой ящик с рукописями, и опершись локтем на раскрытую книгу Гонория Отенского «De praedestinatione et libero arbitrio»<a href="ch2.xhtml#id264" class="a">[65]</a>, архидьякон в глубокой задумчивости перелистывал большой печатный фолиант, только что принесенный им с собою. Других печатных книг у него в этой келье не было.</p><p class="p1">Его задумчивость была прервана стуком в дверь.</p><p class="p1">– Кто там? – крикнул ученый радушным тоном голодной собаки, которой помешали как раз в то время, когда она хотела приняться за кость.</p><p class="p1">– Ваш друг Жак Куаксье, – раздалось за дверью.</p><p class="p1">Архидьякон поднялся и отпер дверь.</p><p class="p1">Это действительно был медик короля, человек лет пятидесяти, с жестким выражением лица, несколько смягчавшимся взглядом хитрых глаз. С ним был какой-то незнакомец. Оба были в длинных одеждах темно-серого цвета, обшитых белым мехом, наглухо застегнутых и перетянутых поясом. Головы их покрывали шапки того же цвета и из той же материи; руки прятались в рукавах, ноги – под складками одежд, а глаза – под шапками.</p><p class="p1">– Праведный Боже! – воскликнул архидьякон, впуская гостей в келью. – Вот уж никак не ожидал таких почетных посетителей в столь поздний час!</p><p class="p1">Говоря это любезным тоном, он с видимым беспокойством пытливо вглядывался в лица гостей.</p><p class="p1">– Никакой час не может считаться слишком поздним для посещения такого знаменитого ученого, как dom<a href="ch2.xhtml#id262" class="a">[66]</a> Клод Фролло де Тиршап, – ответил доктор Куаксье, тягучее произношение которого обличало в нем уроженца Франш-Конте. Благодаря этому произношению каждая его фраза казалась величественной, как платье со шлейфом.</p><p class="p1">Тут между доктором и архидьяконом начался тот обмен любезностями, который, по обычаю того времени, был обязателен при встрече ученых, что, однако, нисколько не мешало им от всей души ненавидеть друг друга. Впрочем, и в наши дни замечается то же самое: уста ученого, приветствующие собрата, представляют сосуд, наполненный желчью, подслащенной медом.</p><p class="p1">В любезностях, которыми Клод осыпал Жака Куаксье, были скрыты ядовитые намеки на те мирские блага, которые достойный медик так удачно умел извлекать из каждой пустячной болезни короля в течение своей карьеры, возбуждавшей столько зависти. По мнению архидьякона, способ действий доктора Куаксье мог быть приравнен к алхимическим деяниям, только более верным и более прибыльным, нежели искание философского камня.</p><p class="p1">– Честное слово, господин доктор, – продолжал распинаться архидьякон перед медиком короля, – весть о том, что ваш племянник, достопочтенный Пьер Версэ, получил епископат, возбудила живейшую радость в моем сердце… Если не ошибаюсь, он назначен епископом в Амьен?</p><p class="p1">– Совершенно верно, господин архидьякон, – отвечал медик. – Это великая милость Божия, – прибавил он.</p><p class="p1">– Какой у вас был внушительный вид на Рождество, во главе сопровождавших вас членов счетной палаты, господин президент!</p><p class="p1">– Увы, dom Клод! Я пока еще только вице-президент.</p><p class="p1">– Ну, а как ваш прекрасный дом в улице Сен-Андрэ-Дезарк?.. Это настоящий Лувр!.. Как красиво изображенное над главным его входом абрикосовое дерево с остроумною надписью: «A l’abri ôtier»<a href="ch2.xhtml#id260" class="a">[67]</a>.</p><p class="p1">– Увы, мэтр Клод, если бы вы знали, каких бешеных денег стоит мне постройка этого дома! По мере того как он строится, я разоряюсь.</p><p class="p1">– Ну, полноте! Разве у вас нет доходов от пошлин всех судебных учреждений Парижского округа, кроме аренды с домов, лавок, палаток и мастерских, находящихся на вашей земле… Неужели и этих доходов мало?</p><p class="p1">– Мое кастелянство в Пуасси в нынешнем году не дало ничего…</p><p class="p1">– А пошлины на заставах, которые вы получаете с Триеля, Сен-Джемса и Сен-Жермен-ан-Лэ?</p><p class="p1">– А много ли их набирается? Всего сто двадцать ливров, да и то не парижских!</p><p class="p1">– Но у вас и постоянные доходы, например, жалованье королевского советника.</p><p class="p1">– Это верно, мой дорогой собрат. Зато проклятое Полиньи, о котором так много шумят, даже в самый хороший год дает не более шестидесяти золотых экю.</p><p class="p1">Во всех любезностях архидьякона сквозила горькая насмешка. Пока он их расточал, на его губах играла печальная и вместе с тем жестокая улыбка человека, одаренного более возвышенным умом, но не такого счастливого и пользующегося случаем потешиться над грубым довольством человека дюжинного. Но королевский медик ничего этого не замечал.</p><p class="p1">– Во всяком случае, – закончил наконец Клод, пожимая руку медика, – я душевно рад видеть вас в вожделенном здравии.</p><p class="p1">– Благодарю вас, dom Клод.</p><p class="p1">– Кстати, как здоровье вашего царственного больного? – продолжал архидьякон.</p><p class="p1">– Он плохо вознаграждает своего врача, – отвечал медик, искоса взглянув на своего спутника.</p><p class="p1">– Вы находите, кум Куаксье? – проговорил последний.</p><p class="p1">Эти слова, сказанные тоном удивления и упрека, заставили архидьякона пристальнее взглянуть на незнакомца, которого до этой минуты он наблюдал только украдкою, хотя и довольно внимательно. Не имей он тысячи причин сохранять добрые отношения с доктором Жаком Куаксье, этим всемогущим медиком короля Людовика XI, он ни за что не принял бы его в обществе незнакомой личности. Поэтому лицо его не отличалось особенною приветливостью, когда Жак Куаксье сказал:</p><p class="p1">– Кстати, dom Клод, я привел к вам собрата, который хотел видеть вас, прослышав о вашей славе.</p><p class="p1">– Так этот господин тоже служитель науки? – спросил архидьякон, устремляя проницательный взгляд на незнакомца, из-под нависших бровей которого сверкнул не менее острый и недоверчивый взор. Насколько можно было разглядеть при слабом свете трехсвечника, спутник Жака Куаксье был старик лет около шестидесяти, среднего роста, довольно болезненный и хилый на вид. Профиль его лица, хотя и буржуазного типа, таил в себе что-то строгое и величественное: глаза его из глубоких впадин сверкали огнем, вырывавшимся точно из недр пещеры, а под шапкой, надетой на самый нос, можно было угадать очертания высокого лба, говорившего об одаренности.</p><p class="p1">Незнакомец сам ответил на вопрос архидьякона.</p><p class="p1">– Уважаемый учитель, – проговорил он внушительным тоном, – ваша слава дошла до меня, и я пожелал с вами посоветоваться. Я – небогатый провинциальный дворянин и всегда с величайшим почтением отношусь к людям науки… Но вы еще не знаете моего имени. Мое имя – кум Туранжо.</p><p class="p1">«Странное имя для дворянина!» – подумал архидьякон, в то же время чувствуя, что перед ним сильная и незаурядная личность.</p><p class="p1">Чутьем своего выдающегося ума он угадывал такой же ум и под отделанной мехом шапкою кума Туранжо. По мере того как он пристальнее всматривался в эту полную достоинства фигуру, ироническая усмешка, вызванная на его собственном угрюмом лице присутствием Жака Куаксье, постепенно исчезала, как исчезает вечерняя заря на ночном небе. Мрачный и молчаливый, он уселся опять в свое глубокое кресло, привычно облокотился на стол и подпер лоб рукою. После нескольких минут раздумья он знаком пригласил своих посетителей сесть и произнес, обращаясь к куму Туранжо:</p><p class="p1">– Вы желаете посоветоваться со мною, сударь, – но о чем же?</p><p class="p1">– Отец мой, – ответил кум Туранжо, – я болен, очень болен, а вы, говорят, второй Эскулап! Вот я и пришел просить у вас медицинского совета.</p><p class="p1">– Медицинского! – воскликнул архидьякон, покачав головою.</p><p class="p1">Подумав с минуту, он продолжал:</p><p class="p1">– Кум Туранжо, – если вас действительно так зовут, – поверните голову, и вы увидите мой ответ вот на этой стене.</p><p class="p1">Кум Туранжо повиновался и прочитал находившуюся как раз над его головою надпись, выцарапанную на стене: <em>«Медицина – дочь сновидений. Ямвлих»</em>.</p><p class="p1">Между тем доктор Жак Куаксье выслушал вопрос своего кума с досадой, которую еще усилил ответ Клода. Он нагнулся к уху кума Туранжо и сказал ему так тихо, что архидьякон не мог его расслышать:</p><p class="p1">– Я предупреждал вас, что это сумасшедший, но вы все-таки пожелали его видеть…</p><p class="p1">– А может быть, этот сумасшедший и прав, доктор Жак, – так же тихо, но с горькою улыбкою ответил кум Туранжо.</p><p class="p1">– Как вам будет угодно, – сухо проговорил медик и, обращаясь к архидьякону, громко сказал: – Однако, dom Клод, вы очень быстры в своих суждениях, и для вас разделаться с Гиппократом, очевидно, так же легко, как обезьяне разгрызть орех… Называть медицину сновидением! Я уверен, что если бы вас услыхали господа аптекари и лекаря, то непременно побили бы вас каменьями… Так, следовательно, вы отрицаете влияние микстур на кровь, не признаете пользы мазей для тела? Отрицаете вековечную аптеку трав и металлов, которую называют природой и которая нарочно устроена для того вечного больного, которого зовут человеком?</p><p class="p1">– Я вовсе не отрицаю ни аптеки, ни больного, – холодно возразил Клод, – я отрицаю только медика.</p><p class="p1">– Так, по-вашему, – с жаром продолжал Куаксье, – неправда, что подагра – простой вошедший внутрь лишай, что огнестрельную рану можно вылечить прикладыванием к ней жареной мыши, что надлежащим образом перелитая в старые жилы молодая кровь возвращает старикам молодость?.. Отрицаете, что дважды два – четыре и что в корчах тело сначала выгибается вперед, а потом назад?</p><p class="p1">– Нет, я просто составил себе о некоторых вещах особое мнение, – спокойно ответил архидьякон.</p><p class="p1">Куаксье весь покраснел от негодования.</p><p class="p1">– Полно, полно, мой добрый Куаксье, не будем сердиться, – сказал кум Туранжо. – Не забывайте, что господин архидьякон наш друг.</p><p class="p1">– Да и в самом деле, что спрашивать с сумасшедшего! – вполголоса проворчал Куаксье, успокаиваясь.</p><p class="p1">– Ну, мэтр Клод, – продолжал кум Туранжо после короткой паузы, – вы меня совсем обескуражили. Я было шел к вам за двумя советами: относительно моей болезни и насчет моей звезды.</p><p class="p1">– Милостивый государь, – ответил архидьякон, – если вы пришли именно с этим намерением, то не стоило и затруднять себя подниматься ко мне по лестнице. Я не верю ни в медицину, ни в астрологию.</p><p class="p1">– В самом деле? – с удивлением произнес кум Туранжо.</p><p class="p1">Куаксье насильственно засмеялся и шепнул своему спутнику:</p><p class="p1">– Ну, разве вам теперь не ясно, что это сумасшедший?.. Не верит даже в астрологию!</p><p class="p1">– Как можно воображать, что каждый луч звезды изображает из себя нить, прикрепленную к голове человека! – продолжал Клод.</p><p class="p1">– Так во что же вы верите? – воскликнул кум Туранжо.</p><p class="p1">Архидьякон с минуту, как бы в нерешимости, помолчал, потом с мрачною улыбкой, противоречившей его словам, проговорил:</p><p class="p1">– Credo in Deum<a href="ch2.xhtml#id258" class="a">[68]</a>.</p><p class="p1">– Dominum nostrum<a href="ch2.xhtml#id256" class="a">[69]</a>, – добавил кум Туранжо, сотворив крестное знамение.</p><p class="p1">– Amen<a href="ch2.xhtml#id240" class="a">[70]</a>, – докончил Куаксье.</p><p class="p1">– Уважаемый учитель, – продолжал кум Туранжо, – я душевно рад видеть вас таким твердым в религии. Но неужели, будучи таким великим ученым, вы ради религии перестали признавать науку?</p><p class="p1">– Нет! – воскликнул архидьякон, схватив руку кума Туранжо, и в его потускневших было глазах вспыхнул луч прежней восторженности. – Нет, я не отрицаю науки!.. Если я столько времени ощупью, ползком, не щадя сил, пробирался по запутанному лабиринту подземных ходов храма науки, то, конечно, в конце концов не мог не увидать мерцающий вдали, в страшной глубине, огонек, светоносное сияние, отблеск того ослепительного света, которым должна быть наполнена центральная лаборатория вселенной, где мудрые и терпеливые находят Бога.</p><p class="p1">– Но какую же из наук вы считаете верною и истинною? – спросил кум Туранжо.</p><p class="p1">– Алхимию.</p><p class="p1">– Помилуйте, dom Клод, может быть, алхимия и права! – вскричал Куаксье. – Но зачем же поносить медицину и астрологию?</p><p class="p1">– Затем, что ваша наука о человеке и о небе – ничто! – с жаром проговорил архидьякон.</p><p class="p1">– Стало быть, – возразил медик с усмешкой, – по-вашему, Эпидавр и всю Халдею можно побоку?</p><p class="p1">– Послушайте, мессир Жак, – ответил Клод, – будем говорить положа руку на сердце. Я ведь не медик короля и не получал от его величества сада Дедала, чтобы наблюдать там звезды. Не сердитесь и выслушайте меня… Скажите по совести, какую вы извлекли истину… Я уж не говорю из медицины – она не имеет под собою ровно никакой почвы, – но что дала вам астрология? Укажите мне достоинства вертикального бустрофедона и открытия чисел зируф и зефирот.</p><p class="p1">– Значит, вы отрицаете и симпатическую силу клавикулы, и происхождение от нее кабалистики?</p><p class="p1">– Заблуждение, мессир Жак! Ни одна из ваших формул не приводит ни к чему реальному, тогда как алхимия имеет за собою множество открытий. Что вы можете возразить против тех истин, до которых дошли путем алхимии?.. Например, благодаря этой науке известно, что лед, пробывши в земле тысячу лет, превращается в горный кристалл; что свинец – родоначальник всех металлов, за исключением золота, которое не может быть названо металлом, оно скорее – свет, и что свинцу нужно всего четыре периода, в двести лет каждый, чтобы последовательно перейти сначала в красный мышьяк, потом – в олово, а из олова – в серебро… Разве это не положительные факты? Но верить в клавикулу, в полную линию и во влияние на человека звезд так же смешно, как, например, верить вместе с обитателями великого Катея, что иволга может превращаться в крота, а хлебные зерна – в рыбу чебак.</p><p class="p1">– Я изучал герметику и утверждаю… – начал было Куаксье, но вспыливший архидьякон не дал ему договорить.</p><p class="p1">– А я изучал и медицину, и астрологию, и герметику, – перебил он, – и нашел истину только вот в этом.</p><p class="p1">С этими словами он достал из-под стола склянку с тем подозрительным порошком, о котором мы уже говорили выше, и продолжал:</p><p class="p1">– Только в этом свет!.. Гиппократ – одна мечта; Урания – тоже; Гермес – мысль, а золото – это солнце. Делать золото – значит быть самим божеством. Вся истинная наука скрыта в этом познании… Повторяю, я проник в самую глубь медицины и астрологии – ничто, ничто… Тело человеческое – потемки! Звезды – потемки!</p><p class="p1">И Клод откинулся на спинку своего кресла; лицо его дышало силой и вдохновением. Туранжо молча наблюдал его, а Куаксье искусственно посмеивался, пожимал плечами и вполголоса повторял:</p><p class="p1">– Сумасшедший!</p><p class="p1">– Ну а скажите, пожалуйста, удалось вам достигнуть великой цели алхимии? Добыли вы золото? – вдруг спросил Туранжо.</p><p class="p1">– Если бы я его добыл, – отвечал архидьякон, медленно выговаривая каждое слово, как человек, отвечающий на собственную мысль, – то французский король назывался бы Клодом, а не Людовиком.</p><p class="p1">Туранжо нахмурился.</p><p class="p1">– Впрочем, – с презрительной улыбкой продолжал архидьякон, – на что бы мне французский престол! Владея тайною делать золото, я мог бы восстановить Восточную империю.</p><p class="p1">– Ну, вот это дело другое, – проворчал Туранжо.</p><p class="p1">– Вот безумец-то! – бормотал себе под нос Куаксье.</p><p class="p1">Следуя течению своих мыслей, Клод продолжал с расстановкою:</p><p class="p1">– Но я пока все еще только двигаюсь ползком… Я раздираю себе лицо и колени о камни подземелья… пока только смутно подозреваю, но ничего еще не вижу… Я еще не читаю, а только едва разбираю по складам.</p><p class="p1">– А когда вы научитесь читать свободно, то сумеете делать золото? – спросил кум Туранжо.</p><p class="p1">– В этом не может быть и сомнения! – воскликнул архидьякон.</p><p class="p1">– Одной Богоматери известно, как я нуждаюсь в деньгах; и я бы очень хотел научиться читать ваши книги. А скажите, уважаемый учитель, ваша наука не враждебна и не неприятна Божией Матери? – спросил кум Туранжо.</p><p class="p1">На этот вопрос Клод ответил с высокомерным спокойствием:</p><p class="p1">– А где я служу архидьяконом?</p><p class="p1">– Вы правы, учитель… Не будете ли вы так добры посвятить и меня в вашу науку настолько, чтобы я мог вместе с вами читать хоть по складам?</p><p class="p1">Клод принял величественный вид и заговорил тоном пророка:</p><p class="p1">– Старик! Для того чтобы отважиться предпринять путешествие по дебрям великих тайн, нужно иметь впереди более длинный ряд лет, чем тот, который остался перед вами. Ваша голова уже покрыта сединою, а с сединою можно только выходить из этих дебрей, входить же в них нужно с темными волосами. Сама наука сумеет избороздить, иссушить и заставить поблекнуть человеческое лицо. Она не нуждается, чтобы к ней приходили с лицами, уже изборожденными старостью… Но если вас, несмотря на ваши годы, тянет засесть за указку и приняться за страшную азбуку мудрецов, то приходите ко мне, – я попробую. Я не заставлю такого слабого старика, как вы, спускаться в подземные склепы пирамид, о которых свидетельствует древний Геродот. Я не отправлю вас исследовать ни Вавилонскую кирпичную башню, ни громадное, возведенное из белого мрамора святилище индийского храма в Эклинге. Я и сам не видал ни халдейских каменных сооружений, воздвигнутых в подобие священной Сикры, ни разрушенного храма Соломона, ни разбитых каменных врат от гробницы царей израильских. Мы удовольствуемся теми отрывками книги Гермеса, которые у нас здесь под рукою. Я объясню вам статую святого Христофора, символ сеятеля, и значение двух ангелов, изображенных при входе в Святую часовню, один из которых держит руку опущенною в сосуд, а другой – простирает свою руку в облака…</p><p class="p1">Здесь Жак Куаксье, совсем было опешивший перед страстной речью архидьякона, приободрился и перебил его торжествующим тоном ученого, поправляющего ошибку другого.</p><p class="p1">– Erras, amice Claudi!<a href="ch2.xhtml#id239" class="a">[71]</a> – произнес он. – Символ – не число. Вы принимаете Орфея за Гермеса.</p><p class="p1">– Нет, это вы заблуждаетесь, – со спокойной самоуверенностью возразил архидьякон. – Дедал – это основание, Орфей – стены, а Гермес – это все здание… Приходите, когда хотите, – продолжал он, обращаясь к Туранжо. – Я покажу вам крупинки золота, оставшиеся на дне тигеля Николая Фламеля, и вы можете сравнить их с золотом Гильома Парижского. Я объясню вам тайный смысл греческого слова peristera…<a href="ch2.xhtml#id238" class="a">[72]</a> Но прежде всего я научу вас, как нужно читать мраморные буквы азбуки, гранитные страницы великой книги. Мы пойдем от портала епископа Гильома и Сен-Жана ле Рона у Святой часовни к дому Николая Фламеля на улице Мариво, а оттуда – к его могиле на кладбище «Невинных душ», после чего посетим оба его госпиталя на улице Монморанси. Я научу вас разбирать иероглифы, которыми покрыты четыре массивных железных косяка портала больницы Сен-Жерве и улицы Ла-Ферронри. Кроме того, мы вместе постараемся разобрать по складам фасады церквей Сен-Ком, Святой Женевьевы-Дезардан, Сен-Мартена, Сен-Жак-де-ла-Бушри…</p><p class="p1">По выражению лица Туранжо было заметно, что он, несмотря на ум, светившийся в его глазах, давно уже перестал понимать dom Клода. Наконец он перебил:</p><p class="p1">– Господи! Да что же это за книги у вас?</p><p class="p1">– Вот одна из них, – ответил архидьякон.</p><p class="p1">И, распахнув окно своей кельи, он указал на величавое здание собора Богоматери. Собор, вырисовываясь на звездном небе черными силуэтами своих двух башен, каменных боков и чудовищного хребта, казался исполинским двуглавым сфинксом, расположившимся посреди города. Несколько времени архидьякон молча смотрел на колоссальное здание, потом, протянув со вздохом правую руку к печатной книге, лежавшей раскрытою на столе, а левую по направлению к собору, с глубокой печалью произнес:</p><p class="p1">– Увы! Это убьет то!</p><p class="p1">Куаксье поспешно нагнулся над книгою и невольно воскликнул:</p><p class="p1">– Помилуйте! Да что же дурного в этой книге? Ведь это – Clossa in epistolas D. Pauli. Norimbergae, Antonius Koburger<a href="ch2.xhtml#id237" class="a">[73]</a>. Тысяча четыреста семьдесят четвертый год, вещь далеко не новая. Это сочинение Пьера Ломбара, прозванного «Учителем сентенций». Может быть, вас пугает эта книга только потому, что она печатная?</p><p class="p1">– Именно потому, – ответил Клод.</p><p class="p1">Выпрямившись во весь рост, с печатью глубокой думы на лице, он крепко прижал согнутый указательный палец к одной из страниц книги, вышедшей из-под знаменитого нюренбергского печатного станка, и многозначительно добавил:</p><p class="p1">– Да, увы! Малое осиливает великое; один зуб в состоянии разрушить целую массу. Нильская крыса убивает крокодила, рыба-меч убивает кита, а книга убьет здание.</p><p class="p1">Монастырский колокол, приглашавший тушить огонь, прозвучал как раз в тот момент, когда медик шептал на ухо своему спутнику свой неизменный припев:</p><p class="p1">– Он сумасшедший!</p><p class="p1">На этот раз и спутник ответил:</p><p class="p1">– Кажется, что так.</p><p class="p1">Настал час, когда все посторонние должны были удалиться из монастыря. Посетители встали.</p><p class="p1">– Учитель, – сказал Туранжо, прощаясь с архидьяконом, – я люблю ученых и великие умы, вас же я особенно уважаю. Приходите завтра в Турнельский дворец и спросите там аббата из Сен-Мартен-де-Тур.</p><p class="p1">Архидьякон возвратился в свою келью совершенно ошеломленный; он наконец понял, кто был этот «кум Туранжо». Ему припомнилось следующее место из монастырских грамот святого Мартина Турского: «Abbas beati Martini, scilicet rex Franciae, est canonicus de consuetudine et habet parvam praebendam quam habet sanctus Venantius et debet sedere in sede thesaurarii»<a href="ch2.xhtml#id236" class="a">[74]</a>.</p><p class="p1">Утверждали, что с этого вечера архидьякон часто виделся с Людовиком XI, когда его величество приезжал в Париж, и что милость, которою Клод Фролло пользовался у короля, возбуждала зависть даже Оливье ле Дена и Жака Куаксье, причем последний, по своей привычке, грубо пенял за это Людовику.</p></span></span></span>
