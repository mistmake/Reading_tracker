<span><span><span><span id="id110"><div class="title6">
<p class="p">5. Причуды мизантропа</p>
</div><p class="p1">Какой-то странный, пугающий скрежет донесся до него из темноты.</p><p class="p1">Тут было от чего попятиться назад. Однако он пошел вперед.</p><p class="p1">Тому, кого удручает безмолвие, приятно даже рычание.</p><p class="p1">Эта свирепо разверстая пасть ободрила его. Угроза сулила какой-то выход. Здесь, неподалеку, было живое, не погруженное в сон существо, хотя бы и дикий зверь. Он пошел в ту сторону, откуда доносилось рычание.</p><p class="p1">Он повернул за угол и при мертвенно-тусклых отсветах снега увидел какое-то темное сооружение, приютившееся у самой стены: не то повозку, не то хижину. Оно стояло на колесах, – значит, повозка. Но у него была крыша, как у дома, – значит, людское жилье. Над крышей торчала труба, из трубы шел дым. Дым был красноватого цвета, что свидетельствовало о жарко горящем очаге. Петли, приделанные снаружи на стене, указывали на то, что здесь устроена дверь, а сквозь четырехугольное отверстие в середине двери виден был свет, горевший в хижине. Ребенок подошел ближе.</p><p class="p1">Существо, издававшее рычание, почуяло его. Когда он приблизился к повозке, угрожающие звуки стали еще яростнее. Это уже было не глухое ворчанье, а громкий вой. Он услыхал лязг натянувшейся цепи, и внезапно между задними колесами повозки, под самой дверью, блеснул двойной ряд острых белых клыков.</p><p class="p1">В ту же минуту, как между колесами показалась звериная морда, в четырехугольное отверстие двери просунулась чья-то голова.</p><p class="p1">– Молчать! – крикнула голова.</p><p class="p1">Вой прекратился.</p><p class="p1">Голова спросила:</p><p class="p1">– Есть тут кто-нибудь?</p><p class="p1">Ребенок ответил:</p><p class="p1">– Да.</p><p class="p1">– Кто?</p><p class="p1">– Я.</p><p class="p1">– Ты? Кто ты? Откуда ты?</p><p class="p1">– Я устал, – сказал ребенок.</p><p class="p1">– А который теперь час?</p><p class="p1">– Я озяб.</p><p class="p1">– Что ты там делаешь?</p><p class="p1">– Я голоден.</p><p class="p1">Голова возразила:</p><p class="p1">– Не всем же быть счастливыми, как лорды. Убирайся прочь!</p><p class="p1">Голова скрылась. Форточка захлопнулась.</p><p class="p1">Ребенок опустил голову, прижал к себе спящую малютку и собрал последние силы, чтобы снова тронуться в путь. Он уже отошел на несколько шагов от возка.</p><p class="p1">Но в то самое время, как закрылась форточка, распахнулась дверь, и опустилась подножка. Голос, только что говоривший с мальчиком, сердито окликнул его из глубины возка:</p><p class="p1">– Ну, что ж ты не входишь?</p><p class="p1">Ребенок обернулся.</p><p class="p1">– Входи же, – продолжал голос. – И откуда это еще взялся на мою беду такой негодяй? Голоден, озяб, а входить не хочет.</p><p class="p1">Ребенок, которого одновременно прогоняли и звали, стоял не двигаясь.</p><p class="p1">Голос продолжал:</p><p class="p1">– Говорят тебе, входи, бездельник!</p><p class="p1">Мальчик наконец решился и уже занес ногу на первую ступеньку лестницы.</p><p class="p1">Но в эту минуту под тележкой послышалось рычанье.</p><p class="p1">Он отступил. Из-под возка опять показалась разинутая пасть.</p><p class="p1">– Молчать! – крикнул человеческий голос.</p><p class="p1">Пасть исчезла. Рычанье прекратилось.</p><p class="p1">– Влезай! – продолжал человек.</p><p class="p1">Ребенок с трудом поднялся по трем ступенькам лестницы. Его движениям мешала девочка, которую он держал на руках; она вся закоченела, хотя так плотно была закутана в куртку, что ее совсем не было видно: это был какой-то бесформенный сверток.</p><p class="p1">Одолев все три ступеньки, мальчик остановился на пороге.</p><p class="p1">В домике не горело ни одной свечи – вероятно, из нищенской экономии. Он был освещен лишь красноватым отблеском, вырывавшимся из дверцы чугунной печки, где потрескивал торф. На печке стояла дымившаяся миска и горшок, в котором, по-видимому, готовилось какое-то кушанье. От него шел приятный запах. Все убранство домика состояло из сундука, скамьи и подвешенного к потолку незажженного фонаря. По стенам, на подставках, было укреплено несколько полок и вбит ряд крюков, на которых висела разная утварь. На полках и отдельно, на гвоздях, поблескивала стеклянная и медная посуда, перегонный куб, колба, похожая на сосуд для плавления воска, и множество странных предметов, назначения которых ребенок не мог себе объяснить и которые составляют кухню химика. Домик имел продолговатую форму; печь помещалась в самой глубине. Это была даже не клетушка, а деревянный ящик не слишком больших размеров. Снаружи домик был освещен снегом сильнее, чем изнутри – печкой. Полумрак, наполнявший каморку, скрадывал все очертания. Тем не менее благодаря отсвету пламени можно было прочитать на потолке слова, написанные крупными буквами: «Урсус, философ».</p><p class="p1">В самом деле, ребенок очутился в жилище Гомо и Урсуса. Рычание, которое мы только что слышали, было рычанием Гомо, а голос – голосом Урсуса.</p><p class="p1">Переступив порог, ребенок увидел около печки высокого пожилого мужчину, худощавого и гладко выбритого; он был одет во что-то серое и стоял, упираясь лысым черепом в самый потолок. Человек этот не мог приподняться на носки: каморка была высотою как раз в его рост.</p><p class="p1">– Входи, – сказал человек. Это был Урсус.</p><p class="p1">Ребенок вошел.</p><p class="p1">– Узелок положи вон туда.</p><p class="p1">Ребенок, боясь испугать и разбудить малютку, бережно опустил на сундук свою ношу.</p><p class="p1">Мужчина продолжал:</p><p class="p1">– Что это ты так осторожно кладешь? Мощи там у тебя, что ли? Уж не боишься ли ты разорвать свое тряпье? Ах, мерзкий бездельник! В такой час слоняться по улицам! Кто ты? Отвечай! Впрочем, не надо никаких разговоров! Сперва проделаем самое неотложное: ты прозяб, ступай погрейся.</p><p class="p1">И, взяв мальчика за плечи, он толкнул его к печке.</p><p class="p1">– Ну и промок же ты! Ну и замерз же ты! И в таком-то виде ты смеешь являться в чужой дом? Ну-ка, сбрасывай поскорее с себя всю эту ветошь, негодяй!</p><p class="p1">И с лихорадочной поспешностью он одной рукой сорвал с него лохмотья, которые от одного прикосновения рвались на клочья, а другою снял с гвоздя мужскую рубашку и вязаную фуфайку.</p><p class="p1">– Ну, напяливай на себя!</p><p class="p1">Выбрав из вороха тряпок шерстяной лоскут, он принялся растирать перед огнем руки и ноги нагого, остолбеневшего от неожиданности и близкого к обмороку ребенка, которому в эту минуту блаженного тепла показалось, что он попал на небо. Растерев мальчику все тело, человек ощупал его ступни.</p><p class="p1">– Ну, кощей, ничего у тебя не отморожено. А я-то, дурень, боялся, не отморозил ли он себе передние или задние лапы! На этот раз ты еще не калека! Одевайся!</p><p class="p1">Ребенок натянул на себя рубашку, а поверх нее старик накинул на него фуфайку.</p><p class="p1">– Теперь…</p><p class="p1">Он пододвинул ногою скамью, толкнул на нее ребенка и пальцем показал на миску, от которой шел пар. В этой миске ребенку снова явилось небо, на этот раз в виде картошки с салом.</p><p class="p1">– Раз голоден, так ешь!</p><p class="p1">Достав с полки черствую горбушку хлеба и железную вилку, он протянул их ребенку; тот не решался взять.</p><p class="p1">– Уж не прикажешь ли накрыть для тебя стол? – заворчал мужчина.</p><p class="p1">И он поставил миску мальчику на колени.</p><p class="p1">– Лопай все это!</p><p class="p1">Голод взял верх над изумлением. Ребенок принялся за еду. Бедняжка не ел, а пожирал убогую снедь. В каморке слышался веселый хруст жестких корок, которые он уплетал. Хозяин ворчал:</p><p class="p1">– И куда это ты торопишься, обжора! Ну и жаден же, негодяй! Эти голодные канальи едят так, что тошно становится. То ли дело лорды: любо посмотреть, как они кушают. Мне случалось видеть герцогов за столом. Они совсем ничего не едят; вот что значит благородное воспитание. Правда, они пьют… Ну, ешь до отвала, поросенок!</p><p class="p1">Голодное брюхо к ученью глухо; ругательства, которыми хозяин осыпал своего гостя, не производили на него особого впечатления, тем более что они явно противоречили той доброте, которую проявил к нему Урсус. К тому же все внимание ребенка было всецело поглощено двумя желаниями: согреться и поесть.</p><p class="p1">Продолжая негодовать, Урсус между тем ворчал себе под нос:</p><p class="p1">– Я видел, как ужинал сам король Иаков; это было в Банкетинг-Хаузе, где по стенам висят картины знаменитого Рубенса; его величество даже не притронулся ни к чему. А этот нищий знай набивает себе живот! Недаром «живот» и «животное» – слова одного корня. И дернула же меня нелегкая забраться в этот Уэймет, чтоб ему провалиться! С самого утра ничего не продал, краснобайствовал перед снегом, играл на флейте для урагана, не заработал ни одного фартинга, а вечером тут как тут – нищие! Ну и гнусный край! Только и знаешь, что с дураками прохожими состязаться, кто кого надует! Они стараются отделаться от меня жалкими грошами, а я стараюсь всучить им какое-нибудь целительное снадобье. Но сегодня, как назло, – ничего, решительно ничего! Ни одного болвана на перекрестке, ни одного пенни в кассе! Ешь, исчадие ада! Уплетай за обе щеки, грызи, глотай! Мы живем в такое время, когда ничто не может сравниться с наглостью лизоблюдов. Жирей на мой счет, паразит! Это не голодный ребенок, а людоед! Это не аппетит, а звериная жадность. Тебя, видно, разъедает изнутри какая-то зараза. Кто знает? Уж не чума ли? У тебя чума, разбойник? Что, если она перебросится на Гомо? Ну нет, подыхай один, подлое отродье, не хочу я, чтоб умер мой волк. Однако я и сам проголодался. Надо прямо сказать, пренеприятный случай. Сегодня я проработал до глубокой ночи. Бывают такие обстоятельства в жизни, когда человеку нужно что-нибудь до зарезу. Нынче вечером мне во что бы то ни стало надо было поесть. Сижу я здесь один, развел огонь; всего-то припасов у меня две картошки, горбушка хлеба, ломтик сала да капля молока; ставлю я все это подогреть и думаю: ладно, попробую как-нибудь этим насытиться. Трах! Надо же было, чтобы этот крокодил свалился мне на голову! Ни слова не говоря, становится между мной и моей пищей. И вот в моей трапезной хоть шаром покати! Ешь, щука, ешь, акула! Хотелось бы знать, во сколько рядов зубы у тебя в пасти? Жри, волчонок! Нет, беру это слово назад – из уважения к волкам. Глотай мой корм, удав! Работал, работал, а в желудке пусто, горло пересохло, в поджелудочной железе боль, все кишки свело; трудился до поздней ночи – и вот моя награда: смотрю, как ест другой. Что ж, так и быть, разделим ужин пополам. Ему – хлеб, картошка и сало, мне – молоко.</p><p class="p1">В эту минуту каморка огласилась протяжным и жалобным криком. Урсус насторожился.</p><p class="p1">– И еще кричишь, мошенник? Чего ты орешь?</p><p class="p1">Мальчик повернулся к нему. Было очевидно, что кричит не он. Рот у него был полон.</p><p class="p1">Крик не прекращался.</p><p class="p1">Урсус направился к сундуку.</p><p class="p1">– Да это твой сверток орет! Долина Иосафата! Вот уж и свертки стали горланить. Чего это он раскаркался?</p><p class="p1">Он развернул куртку. Из нее показалась головка младенца, надрывавшегося от крика.</p><p class="p1">– Это еще кто там? – спросил Урсус. – Что это такое? Еще один! Этому конца не будет! Караул! В ружье! Капрал, взвод вперед! Вторичная тревога! Что это ты мне принес, бандит! Разве ты не видишь, что она хочет пить? Значит, надо ее напоить. Ничего не поделаешь, придется, видно, остаться и без молока.</p><p class="p1">Он выбрал из кучи хлама, лежавшего на полке, несколько ветошек, губку и пузырек, продолжая все время яростно ворчать:</p><p class="p1">– Проклятый край!</p><p class="p1">Потом осмотрел малютку.</p><p class="p1">– Девчонка. Можно по визгу узнать. Эта тоже насквозь промокла.</p><p class="p1">Он сорвал с нее, так же как с мальчика, тряпье, в которое она была укутана, и завернул ее в обрывок грубого толста, дырявый, но чистый и сухой. Внезапное и быстрое переодевание окончательно растревожило малютку.</p><p class="p1">– Ну и мяучит! Пощады нет! – промолвил он.</p><p class="p1">Он откусил зубами продолговатый кусок губки, оторвал от тряпки четырехугольный лоскут, вытянул из него нитку, снял с печки горшок с молоком, перелил молоко в пузырек, наполовину воткнул губку в горлышко, прикрыл ее лоскутом, обвязал холст ниткой, приложил пузырек к щеке, чтобы убедиться, что он не слишком горяч, и взял подмышку спеленутого младенца, продолжавшего неистово кричать.</p><p class="p1">– На, поужинай, негодная тварь! Вот тебе соска!</p><p class="p1">И он сунул ей в рот горлышко пузырька.</p><p class="p1">Малютка стала с жадностью сосать.</p><p class="p1">Он поддерживал склянку в наклонном положении, продолжая ворчать:</p><p class="p1">– Все они на один образец, негодные! Как только преподнесешь, чего им хочется, так и замолкают.</p><p class="p1">Малютка глотала молоко так торопливо и с такой жадностью впилась в искусственную грудь, протянутую ей этим ворчливым провидением, что закашлялась.</p><p class="p1">– Да ты захлебнешься, – сердито буркнул Урсус. – Смотри-ка, тоже обжора хоть куда!</p><p class="p1">Он отнял у нее губку, выждал, пока прошел кашель, затем снова сунул ей в рот пузырек, говоря:</p><p class="p1">– Соси, дрянь ты этакая!</p><p class="p1">Тем временем мальчик положил вилку. Он смотрел, как малютка сосет молоко, и забыл о еде. За минуту до этого, когда он утолял свой голод, в его взгляде было только удовлетворение; теперь же этот взгляд выражал признательность. Он смотрел на возвращавшуюся к жизни малютку. Окончательное воскрешение девочки, вырванной из объятий смерти, исполнило его взор неизъяснимо радостным блеском. Урсус продолжал сердито ворчать сквозь зубы. По временам мальчик поднимал на него глаза, влажные от слез: бедное создание, хоть его и осыпали руганью, было глубоко растрогано, но не умело выразить словами волновавших его чувств.</p><p class="p1">Урсус гневно накинулся на него:</p><p class="p1">– Будешь ты есть, наконец!</p><p class="p1">– А вы? – дрожа всем телом, спросил ребенок, в глазах которого стояли слезы. – Вам ничего не останется?</p><p class="p1">– Ешь все, говорят тебе, дьявольское отродье! Здесь и тебе одному еле хватит, если для меня было мало.</p><p class="p1">Ребенок взял вилку, но не решался есть.</p><p class="p1">– Ешь! – заорал Урсус. – При чем тут я? Кто тебя просит заботиться обо мне? Говорю тебе, ешь все, босоногий причетник Безгрошового прихода! Раз ты попал сюда, так надо есть, пить и спать. Ешь, не то я вышвырну тебя за дверь вместе с твоей негодницей.</p><p class="p1">Услышав эту угрозу, мальчик снова принялся за еду. Ему не пришлось слишком много трудиться, чтобы уничтожить то, что еще оставалось в миске.</p><p class="p1">Урсус пробормотал:</p><p class="p1">– Постройка не из важных: от окон так и несет холодом.</p><p class="p1">В самом деле, оконце в двери было разбито не то от тряски, не то камнем шалуна. Урсус залепил дыру бумагой, но она отставала. Через это отверстие проникал холодный ветер.</p><p class="p1">Урсус присел на самый край сундука. Малютка, которую он, обхватив обеими руками, держал у себя на коленях, с наслаждением сосала свою соску, впав в то состояние блаженной дремоты, в котором находятся херувимы перед ликом божьим и младенцы у материнской груди.</p><p class="p1">– Наелась, – промолвил Урсус.</p><p class="p1">И прибавил:</p><p class="p1">– Проповедуйте-ка после этого воздержание!</p><p class="p1">Ветром сорвало со стекла наложенную Урсусом заплатку; клочок бумаги, взлетев на воздух, закружился по всей каморке, но такой пустяк не мог отвлечь внимания детей от занятия, возвращавшего их обоих к жизни.</p><p class="p1">Пока девочка пила, а мальчик ел, Урсус продолжал брюзжать:</p><p class="p1">– Пьянство начинается с пеленок. Стоит ли после этого быть епископом Тиллотсоном и метать громы и молнии на пьяниц! Вот отвратительный сквозняк! Да и печка того гляди развалится. Такой дым, что глаза ест. Не сладить ни с холодом, ни с огнем. Да и темновато. Эта тварь злоупотребляет моим гостеприимством, а я еще не разглядел его рожи. Да, до роскоши здесь далеко. Клянусь Юпитером, я умею ценить утонченное пиршество в теплом зале, где тебя не продувает насквозь. Я изменил своему призванию: я рожден для чувственных удовольствий. Величайший из мудрецов – Филоксен выразил желание иметь журавлиную шею, чтобы подольше наслаждаться хорошей трапезой. Сегодня ни гроша не заработал! За весь день ничего не продал! Катастрофа. Пожалуйте, горожане, слуги, мещане, вот лекарь и вот лекарства! Напрасно стараешься, старина. Убери-ка свою аптеку. Здесь все здоровы. Что за проклятый город, где нет ни одного больного! Одни лишь небеса страдают поносом. Вон какой снег! Анаксагор учил, что снег черного цвета. Он был прав: холод – это чернота. Лед – это ночь. Ну и вьюга! Представляю себе, как приятно сейчас в море. Ураган – это хоровод дьяволов, это бешеная свистопляска вампиров, все они скачут галопом и кувыркаются у нас над головой. Они мелькают в тучах: у одного – хвост, у другого – рога, у третьего вместо языка во рту пламя, у этого – крылья с когтями, у того – брюхо лорд-канцлера, а вон у того – башка академика. Каждого из них можно распознать по особому, им одним издаваемому звуку. Что ни порыв ветра, то новый адский дух; слышишь и видишь в одно и то же время, ибо этот грохот принимает зрительные формы. Черт возьми, а ведь в море, наверно, есть люди! Друзья мои, управляйтесь с бурей как-нибудь без меня, а мне и самому-то нелегко управиться с жизнью. Что я вам, содержатель харчевни, что ли? С какой это стати ко мне прут путешественники? Всемирная нужда перехлестывает через порог моего убогого жилища. Омерзительные брызги человеческой нищеты летят прямо ко мне в хижину. Я жертва алчности всяких проходимцев. Я их добыча. Добыча околевающих с голоду. Зима, ночь, картонный домишко, под ним – несчастный друг; снаружи со всех сторон – буря, в каморке – картошка, жалкий огонь в печке, попрошайки, ветер, свистящий во все щели, ни гроша в кармане и впридачу – свертки, которые вдруг начинают выть. Разворачиваешь его, а там – маленькая нищенка! Ну и жизнь! Не говоря уже о том, что здесь налицо явное нарушение закона. Ах ты, бродяга, гнусный карманник, преступный недоносок! Шатаешься по улицам после того, как погасили огни. Если бы наш добрый король узнал об этом, он мигом законопатил бы тебя в какое-нибудь подземелье, чтобы проучить как следует: шутка ли сказать, молодчик прогуливается по ночам со своей девицей! В пятнадцатиградусный мороз без шапки и босиком! Да ведь это запрещено, на сей счет существуют особые правила и указы, мятежник ты этакий! Ты разве не знаешь, что все бродяги подлежат наказанию, тогда как благонамеренные люди, имеющие свои дома, пользуются охраной и покровительством закона: недаром же короли – отцы народа. Я, например, человек оседлый! Если бы тебя поймали, тебя выпороли бы кнутом на площади, и отлично бы сделали. В благоустроенном государстве нужен порядок. Напрасно я сразу же не донес на тебя констеблю. Но так уж я создан: знаю, что хорошо, а поступаю дурно. Ах ты, мерзавец! Явился ко мне в таком виде! Я и не заметил сперва, сколько снегу ты нанес. А теперь все растаяло. Лужи во всех углах. Настоящее наводнение. Придется сжечь уйму угля, чтобы осушить это озеро. А уголь-то стоит двенадцать фартингов мерка! Как же мы поместимся втроем в этой хибарке? Кончено, отныне я завожу у себя питомник – в моих руках будущее всей английской голи, которую мне придется вскармливать на свой счет. Моим занятием, обязанностью и назначением в жизни будет воспитание недоносков великой мошенницы – нищеты, наведение лоска на малолетних висельников, превращение молодых плутов в философов! И подумать только, что если бы меня тридцать лет кряду не объедали такие твари, как эти, я был бы богачом, Гомо нагулял бы жиру, у меня был бы врачебный кабинет со всякими диковинками и хирургическими инструментами, как у доктора Лайнекра, хирурга короля Генриха Восьмого, с чучелами разных зверей, египетскими мумиями и тому подобным. Я был бы членом Докторской коллегии, имел бы право пользоваться библиотекой, выстроенной в тысяча шестьсот пятьдесят втором году знаменитым Гарвеем, и работал бы под стеклянным куполом, откуда открывается вид на весь Лондон. Я мог бы продолжать заниматься вычислением солнечных затмений и доказал бы, что от этого светила исходит неуловимый глазом пар. Таково мнение Иоганна Кеплера, который родился за год до Варфоломеевской ночи и был придворным математиком императора. Солнце – это очаг, который иногда дымит, как моя печка. Она не лучше солнца. Да, я нажил бы себе состояние, был бы совсем другим человеком – не пошляком, унижающим достоинство науки на всех перекрестках. Народ не заслуживает, чтобы его просвещали, ибо народ – это сборище безумцев обоего пола, беспорядочная смесь возрастов, нравов, общественных положений, чернь, которую мудрецы всех времен открыто презирали, сумасбродство и ярость которой справедливо ненавидят даже самые умеренные из них. Ах, мне надоело все на свете! С такими чувствами долго не проживешь. Говорят, что жизнь человеческая коротка. А я уже ею сыт по горло. Чтобы мы не впали в полное отчаяние, чтобы заставить нас добровольно влачить это глупое существование, чтобы мы не воспользовались великолепным случаем повеситься на первой попавшейся веревке и гвозде, природа нет-нет да и прикинется, будто она не прочь и позаботиться о человеке, – я не говорю об этой ночи. Она, эта угрюмая природа, взращивает хлебные колосья, наливает соком виноград, заставляет петь соловья. Порою луч зари или стакан джина вызывает у нас обманчивые мечты о счастье. Узенькая полоска добра окаймляет огромный саван зла. Наша судьба целиком соткана дьяволом, а Бог только подшил рубец. Ах ты, воришка: пока я тут разглагольствовал, ты проглотил весь мой ужин!</p><p class="p1">Между тем у малютки, которую он осторожно держал на руках и, несмотря на высказываемое негодование, старался не беспокоить, начинали смыкаться глазки – знак того, что она вполне удовлетворена. Взглянув на пузырек, Урсус буркнул:</p><p class="p1">– Все вылакала, бессовестная!</p><p class="p1">Поддерживая крошку левой рукой, он встал, приподнял правой рукой крышку сундука и извлек оттуда медвежью шкуру, которую он, как помнит читатель, называл своей «настоящей шкурой».</p><p class="p1">Проделывая все это, он искоса поглядывал на другого ребенка, еще занятого едой.</p><p class="p1">– Туго придется мне, если надо будет кормить этого обжору. Это будет подлинный солитер во чреве моего промысла.</p><p class="p1">Свободной рукой он старательно разостлал медвежью шкуру на сундуке, помогая себе локтем другой руки и следя за каждым своим движением, чтобы не потревожить засыпавшую малютку. Затем положил ее на мех, поближе к огню.</p><p class="p1">Покончив с этим, он поставил пустой пузырек на печку и воскликнул:</p><p class="p1">– Смерть как хочется пить!</p><p class="p1">Заглянув в горшок, где оставалось еще несколько глотков молока, он поднес этот горшок к губам. Но в эту минуту его взгляд упал на девочку. Он поставил горшок обратно на печку, взял пузырек, вылил в него остатки молока, снова вложил губку в горлышко, обернул ее лоскутком и завязал ниткой.</p><p class="p1">– А все-таки хочется и есть, и пить, – продолжал он.</p><p class="p1">И прибавил:</p><p class="p1">– Когда нет хлеба, пьют воду.</p><p class="p1">За печкой стоял безносый кувшин.</p><p class="p1">Он взял его и подал мальчику.</p><p class="p1">– Пей!</p><p class="p1">Ребенок напился и снова принялся за еду.</p><p class="p1">Урсус схватил кувшин и поднес его ко рту. Вода в нем, благодаря соседству в печкой, нагрелась неравномерно. Он сделал несколько глотков и скорчил гримасу.</p><p class="p1">– О ты, якобы чистая вода, ты похожа на мнимых друзей. Сверху ты теплая, а на дне – холодная.</p><p class="p1">Между тем мальчик покончил с ужином. Миска была не только опорожнена: она была вылизана дочиста. О чем-то задумавшись, мальчик подбирал и доедал последние крошки хлеба, упавшие к нему на колени.</p><p class="p1">Урсус повернулся к нему.</p><p class="p1">– Это еще не все. Теперь потолкуем. Рот дан человеку не только для того, чтобы есть, но и для того, чтобы говорить. Ты согрелся, нажрался и теперь смотри, животное, берегись: тебе придется отвечать на мои вопросы. Откуда ты пришел?</p><p class="p1">Ребенок ответил:</p><p class="p1">– Не знаю.</p><p class="p1">– Как это не знаешь?</p><p class="p1">– Сегодня вечером меня оставили одного на берегу моря.</p><p class="p1">– Ах, негодяй! Как же тебя зовут? Хорош гусь, если от него даже родители отказались.</p><p class="p1">– У меня нет родителей.</p><p class="p1">– Ты должен считаться с моими вкусами: имей в виду, что я терпеть не могу вранья. Раз у тебя есть сестра, значит, есть и родители.</p><p class="p1">– Она мне не сестра.</p><p class="p1">– Не сестра?</p><p class="p1">– Нет.</p><p class="p1">– Кто же она такая?</p><p class="p1">– Эту девочку я нашел.</p><p class="p1">– Нашел?</p><p class="p1">– Да.</p><p class="p1">– Где? Если ты лжешь, я тебя убью.</p><p class="p1">– На мертвой женщине в снегу.</p><p class="p1">– Когда?</p><p class="p1">– Час тому назад.</p><p class="p1">– Где?</p><p class="p1">– В одном лье отсюда.</p><p class="p1">Урсус сурово сдвинул брови, что характерно для философа, охваченного волнением.</p><p class="p1">– Так эта женщина умерла? То-то счастливица. Надо ее так и оставить в снегу. Ей там хорошо. А где ж она лежит?</p><p class="p1">– Как идти к морю.</p><p class="p1">– Ты переходил мост?</p><p class="p1">– Да.</p><p class="p1">Урсус открыл форточку в задней стене и посмотрел, что делается на дворе. Погода нисколько не стала лучше. Все так же падал густой, наводивший уныние снег.</p><p class="p1">Он захлопнул форточку.</p><p class="p1">Подойдя к разбитому стеклу, он заткнул дыру тряпкой, подбросил в печку торфу, разостлал как можно шире медвежью шкуру на сундуке, взял лежавшую в углу толстую книгу, пристроил ее в изголовье вместо подушки и положил на нее головку уснувшей малютки.</p><p class="p1">Затем повернулся к мальчику:</p><p class="p1">– Ложись сюда.</p><p class="p1">Ребенок послушно растянулся во всю длину рядом с девочкой. Урсус плотно закутал обоих детей в медвежью шкуру и подоткнул ее края им под ноги.</p><p class="p1">Он достал с полки и надел на себя холщовый пояс с большим карманом, в котором, вероятно, были хирургические инструменты и склянка со снадобьями.</p><p class="p1">Потом отцепил висевший над потолком фонарь, зажег его. Фонарь был потайной. Свет от него не падал на лица детей.</p><p class="p1">Урсус приоткрыл дверь и, уже стоя на пороге, сказал:</p><p class="p1">– Я ухожу. Не бойтесь. Я скоро вернусь. Спите.</p><p class="p1">Спуская подножку, он позвал:</p><p class="p1">– Гомо!</p><p class="p1">Ему ответило ласковое ворчание.</p><p class="p1">Урсус с фонарем в руке сошел вниз, подножка поднялась, дверь снова закрылась. Дети остались одни.</p><p class="p1">Снаружи донесся голос Урсуса; он спрашивал:</p><p class="p1">– Мальчик, съевший мой ужин, ты еще не спишь?</p><p class="p1">– Нет, – ответил ребенок.</p><p class="p1">– Ну так вот: если она заревет, дай ей остальное молоко.</p><p class="p1">Послышался лязг отвязываемой цепи и постепенно удалявшийся шум шагов человека и зверя.</p><p class="p1">Несколько минут спустя дети спали глубоким сном.</p><p class="p1">Их дыхание смешалось, и в этом была неизъяснимая чистота. Реявшие над ними детские сны перелетали от одного к другому, под закрытыми веками их глаза, быть может, сияли звездами; если слово «супруги» в этом случае будет допустимо, то они были супругами в том смысле, в каком могут быть ими ангелы. Такая невинность в таком мраке жизни, такая чистота объятий, такое предвосхищение небесной любви возможно только в детстве, и все, что есть на свете великого, меркнет перед величием младенцев. Из всех бездн это самая глубокая. Ни чудовищный жребий висевшего на цепи мертвеца, ни бешеное неистовство, с которым разъяренный океан топит корабль, ни белизна снега, заживо погребающего человека под своей холодной пеленой, – ничто не может сравниться с трогательным зрелищем божественного соприкосновения детских уст, которое не имеет ничего общего с поцелуем. Быть может, это обручение? Быть может – предчувствие роковой развязки? Над этими спящими детьми нависло неведомое. Это зрелище очаровательно. Но кто знает – не страшно ли оно? Сердце невольно замирает. Невинность выше добродетели. Невинность – плод святого неведения. Они спали. Им было спокойно. Им было тепло. Нагота их прижавшихся друг к другу тел была так же целомудренна, как их невинные души. Они были здесь как в гнездышке, повисшем над бездной.</p></span><span id="id111"><div class="title6">
<p class="p">6. Пробуждение</p>
</div><p class="p1">День начинался зловещей хмурью. В каморку проник бледный, печальный свет. Занялась ледяная заря. Белесоватые ее лучи постепенно обрисовывали угрюмые очертания предметов, ночью казавшихся призраками, но не разбудили детей; они продолжали спать, прижавшись друг к дружке. В каморке было тепло. Слышно было дыхание спящих детей; оно напоминало ровные всплески двух чередующихся волн. Ураган затих. Рассвет неторопливо захватывал одну полосу небосвода за другой. Созвездия гасли, как потушенные свечи. Только несколько крупных звезд упорно продолжали мерцать. С моря доносился бесконечный, глухой, протяжный гул.</p><p class="p1">Печка не совсем еще потухла. Утренние сумерки постепенно переходили в дневной свет. Мальчик спал не так крепко, как девочка. Он и во сне, казалось, бодрствовал над нею и охранял ее. Как только первый яркий луч проник в окно, он открыл глаза. До окончательного своего пробуждения ребенок обычно бывает некоторое время погружен в забытье. Мальчик в дремоте не отдавал себе отчета, ни где он, ни кто лежит рядом с ним, и не старался припомнить что бы то ни было; глядя в потолок, он мечтательно рассматривал надпись «Урсус-философ», не понимая ее смысла, потому что он не умел читать.</p><p class="p1">Щелканье ключа в замке заставило его приподнять голову.</p><p class="p1">Дверь отворилась, подножка откинулась наружу. Вошел Урсус. Он поднялся по ступенькам, держа в руке потушенный фонарь.</p><p class="p1">Одновременно послышался мягкий топот четырех лап, легко взбиравшихся по подножке. Это был Гомо, возвращавшийся домой вслед за Урсусом.</p><p class="p1">Мальчик, окончательно проснувшись, вздрогнул.</p><p class="p1">Волк, вероятно проголодавшийся к утру, раскрыл пасть, ощерив ослепительно белые клыки.</p><p class="p1">Стоя на подножке, он положил передние лапы на порог, позой напоминая проповедника, облокотившегося на кафедру. Он издали обнюхал сундук, на котором не привык видеть никого постороннего. В прямоугольном проеме двери верхняя часть его туловища вырисовывалась черным силуэтом на фоне светлеющего неба. Наконец он решился и вошел.</p><p class="p1">Увидев в каморке, волка, мальчик вылез из-под медвежьей шкуры и встал на ноги, заслонив собою малютку, спавшую крепким сном.</p><p class="p1">Урсус повесил фонарь на крюк, вбитый в потолок. Молча, не спеша, привычным движением снял и положил на полку пояс с инструментами. Он не смотрел по сторонам и как будто ничего не замечал. Глаза у него казались стеклянными. По-видимому, он был чем-то глубоко взволнован. Наконец его мысль прорвалась наружу, как всегда, быстрым потоком слов:</p><p class="p1">– Вот счастливица! Мертва, совсем мертва!</p><p class="p1">Он присел на корточки, подбросил в печку выпавший из нее шлак и, помешивая торф, бормотал:</p><p class="p1">– Нелегко было отыскать ее. Какая-то злая сила запрятала ее на два фута под снег. Не будь со мною Гомо, чутье которого ведет его так же хорошо, как в свое время разум вел Христофора Колумба, я до сих пор вязнул бы там в сугробах, играя в прятки со смертью. Диоген днем с фонарем искал человека, а я ночью с фонарем искал покойницу; поиски Диогена привели его к сарказму, мои привели меня к зрелищу смерти. Какая она была холодная! Я дотронулся до ее руки – настоящий камень. Какое безмолвие в ее глазах! Как это глупо – умирать, зная, что оставляешь после себя ребенка! Не очень-то удобно будет нам втроем в этой коробке. Ну и неприятность! Выходит, я обзавелся семьей. Девочкой и мальчиком.</p><p class="p1">Пока Урсус произносил эту тираду, Гомо прокрался к печке. Ручка спящей малютки свешивалась между печкой и сундуком. Волк стал лизать ручку.</p><p class="p1">Он лизал ее так осторожно, что девочка даже не шевельнулась.</p><p class="p1">Урсус повернулся к волку.</p><p class="p1">– Ладно, Гомо. Я буду отцом, а ты – дядей.</p><p class="p1">Не прерывая своего монолога, он с философским глубокомыслием снова принялся помешивать торф в печке.</p><p class="p1">– Значит, усыновляю. Это дело решенное. Да и Гомо не прочь.</p><p class="p1">Он выпрямился.</p><p class="p1">– Любопытно было бы знать, кто повинен в этой смерти? Люди? Или…</p><p class="p1">Он устремил взор куда-то ввысь и еле внятно докончил:</p><p class="p1">– Или ты?</p><p class="p1">И в тяжелом раздумье Урсус поник головой.</p><p class="p1">– Ночь взяла на себя труд умертвить эту женщину, – сказал он.</p><p class="p1">Когда он снова поднял голову, его взгляд упал на лицо мальчика, который совсем проснулся и прислушивался к его словам. Урсус резко спросил его:</p><p class="p1">– Ты чему смеешься?</p><p class="p1">Мальчик ответил:</p><p class="p1">– Я не смеюсь.</p><p class="p1">Урсус вздрогнул и, пристально посмотрев на него, сказал:</p><p class="p1">– В таком случае ты ужасен.</p><p class="p1">Ночью в лачуге было настолько темно, что Урсус не разглядел лица мальчика. Теперь, при дневном свете, он увидел его впервые.</p><p class="p1">Положив обе руки на плечи ребенка, он со все возраставшим вниманием всматривался в его черты и, наконец, крикнул:</p><p class="p1">– Да перестань же смеяться!</p><p class="p1">– Я не смеюсь! – сказал мальчик.</p><p class="p1">По всему телу Урсуса пробежала дрожь.</p><p class="p1">– Ты смеешься, говорю тебе!</p><p class="p1">И, тряся ребенка с яростной силой, не то от гнева, не то от жалости, он накинулся на него:</p><p class="p1">– Кто же так над тобою поработал?</p><p class="p1">Ребенок ответил:</p><p class="p1">– Я не понимаю, о чем вы говорите.</p><p class="p1">Урсус продолжал допытываться:</p><p class="p1">– С каких это пор ты так смеешься?</p><p class="p1">– Я всегда был такой, – ответил мальчик.</p><p class="p1">Урсус повернулся лицом к сундуку и произнес вполголоса:</p><p class="p1">– Я думал, что этого уже не делают.</p><p class="p1">Осторожно, чтобы не разбудить спящей малютки, он вытащил у нее из-под головки книгу, которую положил ей вместо подушки.</p><p class="p1">– Посмотрим, что говорится на этот счет у Конкеста, – пробормотал он.</p><p class="p1">Это был толстый фолиант в мягком пергаментном переплете. Урсус полистал большим пальцем трактат, отыскивая нужную страницу, разложил книгу на печке и прочел:</p><p class="p1">– …«De denasatis»<a href="ch2.xhtml#id265" class="a">[180]</a>. Это здесь.</p><p class="p1">– И продолжал:</p><p class="p1">– «Bucca fissa usque ad aures, genzivis denudatis, nasoque murdridato, masca eris, et ridebis semper<a href="ch2.xhtml#id263" class="a">[181]</a>. Да, именно так.</p><p class="p1">Он водворил книгу на полку, бормоча себе под нос:</p><p class="p1">– Случай, в смысл которого было бы вредно углубляться. Останемся на поверхности явления. Смейся, малыш!</p><p class="p1">Девочка проснулась. Ее утренним приветствием был крик.</p><p class="p1">– Ну, кормилица, дай-ка ей грудь, – сказал Урсус.</p><p class="p1">Малютка приподнялась на своем ложе. Урсус достал с печки пузырек и сунул его в рот девочки.</p><p class="p1">В эту минуту взошло солнце. Оно только что всплыло над горизонтом. Алые его лучи, проникнув в окно, ударили прямо в лицо малютки, повернувшейся в ту сторону. В зрачках ее, как в двух зеркалах, отразился пурпурный диск светила. Зрачки не сократились, и веки не дрогнули.</p><p class="p1">– Что ж это, – вскрикнул Урсус, – она слепа!</p></span></span></span></span>
