<p class="p">IV. Медвежья услуга</p>
</div><p class="p1">В эту самую ночь Квазимодо не спал. Он только что в последний раз обошел собор. Запирая дверь, он не заметил, что архидьякон прошел мимо него, и выразил неудовольствие, видя, как он тщательно запирал все засовы и замки тяжелых дверей с железной обшивкой, придававшей этим дверям прочность каменной стены. Клод казался еще более озабоченным, чем обычно. Вообще со времени ночного приключения в келье он обращался с Квазимодо очень дурно. Но напрасно он был груб с ним, даже иногда бил его, – ничто не было в состоянии поколебать терпения, покорности, преданности верного звонаря. Он сносил от архидьякона все: брань, угрозы, побои – без слова, без малейшей жалобы. Разве только глаз его с беспокойством следил за Клодом, когда тот поднимался по лестнице в башню. Но архидьякон и сам уже не показывался на глаза цыганке.</p><p class="p1">Итак, в эту ночь, бросив мимоходом взгляд на свои колокола, которые он совсем забросил, – на «Жаклину», «Марию», «Тибо», – Квазимодо взошел на вершину северной башни и, поставив на крышу наглухо закрытый фонарь, стал смотреть на Париж. Ночь, как мы уже сказали, была очень темная. Париж, который в то время не освещался, представлялся глазу смутной темной массой, перерезанной местами беловатыми изгибами Сены. Квазимодо не видел света нигде, кроме окна отдаленного здания, темный профиль которого вырисовывался над крышами, в стороне Сент-Антуанских ворот. Там тоже кто-то не спал.</p><p class="p1">Оглядывая своим единственным глазом этот темный, туманный горизонт, Квазимодо чувствовал в душе какую-то необъяснимую тревогу. Уже несколько дней он был настороже. Он замечал, что вокруг собора постоянно бродят какие-то люди зловещего вида и не спускают глаз с убежища девушки. Он подозревал, что, быть может, против несчастной составился какой-нибудь заговор. Он воображал, что народ преследует ее своей ненавистью так же, как его, и что, следовательно, можно ожидать всего. Поэтому он стоял на колокольне настороже, «мечтая в своем укромном уголке», как говорит Рабле, и устремляя взгляд то на келью, то на Париж, полный недоверия, зорко сторожил, как хорошая собака.</p><p class="p1">Вдруг в ту минуту, как он всматривался в Париж одним глазом, который природа как бы в вознаграждение снабдила такой зоркостью, что он почти заменял Квазимодо все недостающие у него органы, ему показалось, что набережная Виейль-Пеллетри приняла какой-то странный вид, что там что-то движется, и линия парапета, черневшая на светлой поверхности вод, не так пряма и спокойна, как на прочих набережных, а как будто колеблется, подобно речной волне или головам движущейся толпы.</p><p class="p1">Это показалось ему странным. Он удвоил внимание. Движение, казалось, шло со стороны Сите. Однако – ни малейшего огонька. Движение несколько времени происходило на набережной, затем оно мало-помалу улеглось, будто волна вошла внутрь острова. Затем все исчезло, и линия моста снова сделалась прямой и неподвижной.</p><p class="p1">В ту минуту, как Квазимодо терялся в догадках, ему показалось, что движение возобновилось на улице, идущей от площади по Сите, перпендикулярно к фасаду собора. Наконец, несмотря на всю густоту мрака, он увидел, как у выхода из этой улицы показалась голова колонны, и вслед за тем всю площадь наводнила толпа, в которой ничего нельзя было рассмотреть впотьмах, кроме того, что это – толпа.</p><p class="p1">Это зрелище было страшно. Вероятно, эта странная процессия, которая, по-видимому, хотела скрыться под покровом темноты, хранила глубокое молчание. Все же оттуда должен был доноситься кое-какой шум – хотя бы шум шагов. Но эти звуки не долетали до нашего глухого, и масса людей, которую он едва различал, которой не слыхал, хотя она волновалась и двигалась так близко от него, производила на него впечатление сонма мертвецов, безмолвного, неосязаемого, теряющегося во мгле. Ему казалось, что на него надвигается туман, полный людей, что он видит, как в тени движутся тени.</p><p class="p1">Тогда к нему вернулись его опасения, мысль о покушении на цыганку снова возникла в его мозгу. Он смутно чувствовал, что наступает решительная минута. В эту критическую минуту он все обдумал так основательно и быстро, как того мудрено было ожидать от его слабо развитого мозга. Разбудить ему цыганку? Дать ей возможность бежать? Каким ходом? Улицы все заняты, а задний фасад собора выходит на реку. Нет ни лодки, ни выхода… Оставалось одно: пасть мертвым на пороге собора, сопротивляться, по крайней мере до тех пор, пока не придет помощь, если только она придет, но не нарушать сна Эсмеральды. Несчастную всегда еще успеют разбудить для смерти. Приняв такое решение, он начал более спокойно приглядываться к врагу.</p><p class="p1">Толпа на площади, по-видимому, росла с каждой минутой. Он понял, что она производила очень мало шума, потому что окна, выходившие на улицы и площадь, оставались закрытыми. Вдруг сверкнул огонь, и над головами замелькало во мраке колеблющееся пламя семи или восьми факелов. При свете их Квазимодо ясно рассмотрел на площади чудовищную, волнующуюся толпу оборванцев, мужчин и женщин, вооруженных косами, пиками, кривыми ножами и палашами, острия которых сверкали. Местами черные вилы торчали, как рога, над этими безобразными лицами. Квазимодо неясно припомнилась эта чернь, и ему даже казалось, что он узнает и лица этих людей, провозглашавших его несколько месяцев тому назад папой шутов. Один человек с зажженным факелом в одной руке и дубиной в другой встал на тумбу и, по-видимому, держал речь. В то же время странная армия сделала несколько эволюций, как бы размещаясь вокруг собора. Квазимодо взял фонарь и спустился на площадку между башнями, чтобы видеть все поближе и придумать средства обороны.</p><p class="p1">Действительно, Клопен Труйльфу, дойдя до дверей собора, построил свою армию в боевом порядке. Хотя он и не ожидал сопротивления, однако, по свойственному ему благоразумию, хотел сохранить порядок, который позволил бы ему встретить внезапную атаку ночной стражи или отряда королевских войск. Он расположил свой отряд так, что издали и сверху он напоминал римский треугольник в битве при Экноме, кабанью голову Александра или знаменитый клин Густава-Адольфа. Основание этого треугольника упиралось в глубину площади, преграждая доступ на нее с улицы, а одна из сторон была обращена к Отель-Дьё, другая – к улице Сен-Пьер-о-Беф. Клопен Труйльфу стал во главе толпы с герцогом египетским, нашим другом Жаном и самыми смелыми из бродяг.</p><p class="p1">Нападения, подобные тому, которое бродяги намеревались совершить на собор Богоматери, не составляли редкости в Средние века. Того, что мы теперь называем полицией, тогда не существовало. В населенных городах, особенно в столицах, не было одной центральной, охраняющей порядок власти. Феодализм построил эти большие общины странным образом. Город являлся собранием множества отдельных феодальных владений, разделявших его на части, разнообразные по форме и величине. Это создало множество противоречивых организаций, другими словами – никакой организации. В Париже, например, независимо от ста сорока одного владельца, имевших право взимать пошлину, было еще двадцать пять владельцев, пользовавшихся и правом собирать подати и судебной властью, начиная с парижского епископа, которому принадлежало сто пять улиц, и кончая приором монастыря Богоматери в полях, который владел четырьмя улицами. Все эти феодалы лишь номинально признавали авторитет своего сюзерена – короля. Все пользовались правом собирать дорожные пошлины. Все были хозяевами у себя дома. Людовик XI, этот неутомимый труженик, начавший разгром феодального здания, который потом продолжали Ришелье и Людовик XIV в интересах монархии, а Мирабо завершил в интересах народа, – попытался было пробить брешь в этой сети независимых владений, покрывавшей Париж, и издал без всякой последовательности два или три указа, касавшихся общей полиции. Так, в 1465 году им был издан приказ, чтобы граждане, под страхом смертной казни, при наступлении ночи ставили зажженные свечи на окнах и запирали собак. В этом же году было приказано запирать улицы железными цепями и запрещено носить при себе ночью кинжалы или вообще какое-либо оружие. Но все эти попытки введения общих законов быстро сводились к нулю. Граждане позволяли ветру гасить свечи на их окнах, а собакам бродить на свободе. Цепи протягивались только при осадном положении, а запрещение носить кинжалы повело лишь к переименованию улицы Перерезанной глотки в улицу Перерезанного горла – очевидный прогресс! Старинное сооружение феодального законодательства продолжало существовать. Независимые и арендные владения в городе переплетались, сцеплялись, мешали друг другу, вытесняли одно другое. Стражи, помощники стражей, сыщики образовали бесполезную заросль, через которую пробивались во всеоружии разбой, грабеж и подкуп. Таким образом, подобное вооруженное нападение одной части населения на дворец, на особняк, на дом в одном из наиболее населенных мест города отнюдь не представляло ничего необыкновенного при существующем повсюду беспорядке. В большинстве случаев соседи вмешивались в дело только тогда, когда грабеж касался их самих. При выстрелах из мушкетов они зажимали уши, закрывали ставни, баррикадировали двери, предоставляя нападению разыграться при участии стражи или без нее, и на следующий день по всему Парижу толковали: «Сегодня ночью разгромили дом Стефана Барбетта», «На маршала Клермона произведено нападение» и т. п. Поэтому не только королевские резиденции – Лувр, Дворец правосудия, Бастилия, Турнель, – но и дворцы вельмож, как, например, Малый Бурбонский, особняк де Сане, особняк герцога Ангулемского и т. д., были обнесены зубчатыми стенами и над воротами имели бойницы. Церкви охраняла их святость. Однако некоторые из них – собор Парижской Богоматери не принадлежал к числу последних – бывали тоже укреплены. Аббатство Сен-Жермен-де-Пре было обнесено такими же зубчатыми стенами, как резиденция какого-нибудь барона, и истратило на пушки много больше меди, чем на колокола. Еще в 1610 году видны были эти укрепления. Теперь там едва сохранилась только церковь.</p><p class="p1">Вернемся же к собору Богоматери.</p><p class="p1">Когда первые маневры были окончены – и, к чести дисциплины бродяг, мы должны сказать, что приказания Клопена были исполнены в полной тишине и с поразительной точностью, – достойный предводитель шайки взобрался на парапет паперти и возвысил свой хриплый, грубый голос, повернувшись в сторону собора и потрясая факелом, свет которого, колеблемый ветром и застилаемый собственным дымом, то озарял, то оставлял в тени багровый фасад храма.</p><p class="p1">– Тебе, Куи де Бомон, епископ Парижский, член парламента, я, Клопен Труйльфу, король тунский, князь бродяг, епископ шутов, говорю: «Наша сестра, несправедливо осужденная на смерть за колдовство, нашла убежище в твоей церкви. Ты должен был дать ей приют и покровительство. Однако парламент хочет извлечь ее оттуда, и ты на это согласился, так что ее повесили бы завтра на Гревской площади, если бы девушке не помогли Бог и бродяги. Вот мы пришли сюда, епископ. Если церковь твоя неприкосновенна, то неприкосновенна и наша сестра. Если наша сестра не неприкосновенна, то твоя церковь – тоже нет. Поэтому мы предлагаем тебе выдать нам нашу сестру, если ты хочешь спасти церковь, иначе же мы силой возьмем девушку и разграбим церковь. Вот и все! В доказательство я водружаю здесь свое знамя, и да хранит тебя Господь, епископ Парижский!»</p><p class="p1">К несчастью, Квазимодо не мог слышать этих слов, произнесенных с мрачным, диким величием. Один из бродяг подал Клопену знамя, и он торжественно водрузил его в щели между двумя плитами. То были вилы, на зубьях которых висел окровавленный кусок падали.</p><p class="p1">Совершив это, король тунский обернулся и оглядел свою армию – мрачную толпу, где взгляды сверкали почти так же, как пики. После минутной паузы он крикнул:</p><p class="p1">– Вперед, дети! За дело, молодцы!</p><p class="p1">Тридцать здоровенных молодцов с железными мускулами, по-видимому слесаря, выступили из рядов с молотами, клещами и железными полосами на плечах. Они направились к главному входу в собор, взошли по ступеням и, вскоре очутившись под сводом, принялись рычагами и клещами взламывать двери. Толпа бродяг последовала за ними, чтобы посмотреть или помочь, и запрудила все одиннадцать ступеней лестницы.</p><p class="p1">Однако дверь не поддавалась.</p><p class="p1">– Черт возьми, какая крепкая! – сказал кто-то.</p><p class="p1">– Стара, и оттого хрящи у нее окостенели, – подхватил другой.</p><p class="p1">– Смелей, товарищи! – ободрял Клопен. – Ставлю голову против старого башмака, что вы взломаете дверь, похитите девушку и ограбите главный алтарь, прежде чем успеет проснуться хоть один из церковных сторожей. Вот, кажется, замок уже подался.</p><p class="p1">Страшный треск, раздавшийся позади Клопена, заставил его прервать свою речь. Он обернулся. Огромная балка упала с неба. Она задавила с десяток бродяг на ступенях паперти и полетела на мостовую с грохотом пушечного выстрела, перешибив по дороге ноги нескольким бродягам, сторонившимся с криками ужаса. В одну минуту площадка перед папертью опустела. Молодцы, пробивавшие дверь, хотя и бывшие под защитой глубокого свода портика, бросили дверь, и сам Клопен отступил на почтительное расстояние от церкви.</p><p class="p1">– По счастью, не попался! – воскликнул Жан. – Только ветром пахнуло. Ну а Пьер-душитель – задушен!</p><p class="p1">Невозможно изобразить, какое изумление и ужас вызвало это бревно среди бродяг. Они несколько минут смотрели в воздух, перепуганные этим куском дерева больше, чем появлением двадцати тысяч королевских стрелков.</p><p class="p1">– Черт возьми, – ворчал герцог египетский, – это пахнет колдовством!</p><p class="p1">– Луна швырнула в нас этим поленом, – сказал Анри ле Руж.</p><p class="p1">– Недаром говорят, что луне покровительствует Пресвятая Дева, – заметил Франсуа Шантпрюн.</p><p class="p1">– Тысяча чертей! – закричал Клопен. – Все вы дураки! – Однако он и сам не знал, как объяснить падение бревна.</p><p class="p1">Между тем на фасаде, до вершины которого не достигал свет факелов, ничего не было видно. Тяжелая балка лежала посредине площади, и слышались стоны несчастных, распоровших себе животы об острые углы каменных ступеней.</p><p class="p1">Очнувшись от первого потрясения, король тунский нашел объяснение, показавшееся его товарищам правдоподобным:</p><p class="p1">– Черт побери! Кажется, попы вздумали обороняться? Так бейте их! Грабьте!</p><p class="p1">– Грабьте! – повторила толпа со страшным ревом. И в фасад храма был выпущен залп из самострелов и мушкетов.</p><p class="p1">При этом грохоте мирные жители окрестных домов проснулись. Несколько окон отворилось, показались ночные колпаки и руки с зажженными свечами.</p><p class="p1">– Стреляй по окнам! – командовал Клопен.</p><p class="p1">Окна тотчас захлопнулись, и бедные граждане, едва успевшие бросить испуганный взгляд на эту бурную сцену, освещенную светом факелов, вернулись, обливаясь холодным потом, к своим супругам, спрашивая себя, не шабаш ли справляется на площади перед собором или не произошло ли нападение бургундцев, как в шестьдесят четвертом году. Мужья боялись грабежа, жены – насилия, и все дрожали.</p><p class="p1">– Грабь! – повторяли бродяги, однако не смели двинуться вперед. Они смотрели на балку, смотрели на собор. Балка лежала неподвижно, здание хранило свой спокойный и пустынный вид, но что-то непонятное леденило бродяг.</p><p class="p1">– Ну, молодцы, за дело! – крикнул Труйльфу. – Выламывайте двери.</p><p class="p1">Никто не тронулся.</p><p class="p1">– Гром и молния! – кричал Клопен. – Трусы, испугались перекладины!</p><p class="p1">Старый слесарь отвечал ему:</p><p class="p1">– Не перекладина пугает нас, командир, а дверь вся обшита железными полосами. Клещами тут ничего не поделаешь.</p><p class="p1">– Что же вам надо, чтобы взломать ее? – спросил Клопен.</p><p class="p1">– Надо бы таран.</p><p class="p1">Тунский король смело подбежал к ужасной балке и поставил на нее ногу.</p><p class="p1">– Вот вам таран, сами каноники вам его прислали. – И, насмешливо кланяясь в сторону собора, он прибавил: – Спасибо, отцы каноники!</p><p class="p1">Эта шутка произвела хорошее впечатление. Бревно потеряло свою устрашающую силу. Бродяги ободрились. Скоро тяжелая балка, подхваченная, как перо, двумястами сильных рук, яростно ударилась о большие двери, которые перед тем пытались взломать. При слабом свете факелов на площади эта длинная балка, поддерживаемая толпой, бегом несущейся к собору, походила на тысяченогое чудовищное животное, нападающее с опущенной головой на каменного великана.</p><p class="p1">Под ударами бревна дверь, сделанная наполовину из металла, звенела, как огромный барабан. Однако она не поддавалась, хотя весь собор содрогался и удары, казалось, отдавались в самых отдаленных подвалах здания.</p><p class="p1">В ту же минуту на голову осаждающих сверху посыпался град крупных камней.</p><p class="p1">– Ах, черт! – воскликнул Жан. – Кажется, башни вздумали засыпать нас своими балюстрадами?</p><p class="p1">Но толчок был дан; пример тунского короля подействовал. Все были уверены, что епископ защищается, и это заставило только с удвоенной яростью штурмовать дверь, несмотря на камни, разбивавшие направо и налево черепа.</p><p class="p1">Замечательно, что камни падали поодиночке, один за другим, но зато очень часто. Бродяги чувствовали одновременно удар одного по голове, другого по ногам. Редкий из камней не наносил удара, и уже груда убитых и раненых истекала кровью и билась в предсмертных судорогах у ног осаждающих, которые, рассвирепев, беспрестанно сменялись свежими силами.</p><p class="p1">Длинная балка продолжала ударяться о дверь с правильными промежутками, как язык колокола, камни – сыпаться, дверь – гудеть.</p><p class="p1">Читатель, вероятно, уже угадал, что это неожиданное сопротивление, ожесточившее бродяг, было оказано Квазимодо.</p><p class="p1">Случай, к несчастью, пришел на помощь храброму глухому.</p><p class="p1">Когда он спустился на площадку между башнями, мысли у него в голове путались. Он несколько минут бегал вдоль галереи как сумасшедший, видя внизу плотную толпу бродяг, готовых устремиться на церковь, и прося Бога или Сатану спасти цыганку. Ему пришла мысль вбежать на южную колокольню и ударить в набат, но, прежде чем он успеет раскачать колокол, прежде чем «Мария» издаст первый звук, не успеют ли нападающие десять раз выломать двери собора? Это было как раз в ту минуту, как выступили вперед слесаря. Что делать?</p><p class="p1">Вдруг он вспомнил, что каменщики целый день работали над поправкой стены и крыши южной башни. Его озарила мысль. Стена была каменная, крыша свинцовая, а перекладины деревянные. Эти удивительные перекладины были так часты, что получили название «леса».</p><p class="p1">Квазимодо побежал на эту башню. Действительно, помещение нижнего этажа было завалено материалами. Тут были целые кучи глины, свернутые листы железа, пучки дранок, толстые, уже надпиленные балки, груды щебня – целый арсенал.</p><p class="p1">Каждая минута была дорога. Молотки и клещи работали внизу. С силой, удвоившейся от сознания опасности, Квазимодо поднял одно из бревен – самое тяжелое, самое длинное, высунул его в слуховое окно, затем выбежал на крышу и стал спускать его по карнизу балюстрады, окружавшей площадку, и наконец сбросил его в пропасть. Огромная балка летела с высоты ста шестидесяти футов, царапая стену, разбивая изваяния. Несколько раз она перевернулась в воздухе, как оторвавшееся мельничное крыло, и наконец грохнулась о землю. Послышался страшный крик, и огромное черное бревно, отскочив от мостовой, походило на гигантскую подпрыгнувшую змею.</p><p class="p1">Квазимодо видел, как бродяги при падении бревна бросились в стороны, как пепел от дуновения ребенка. Он воспользовался их смятением, и, пока они в суеверном страхе разглядывали темную массу, упавшую с неба, и осыпали градом стрел и крупной дробью изваяния святых на портике собора, Квазимодо заготовил запас камней, щебня, мусора, даже целые мешки с инструментами каменщиков на парапете балюстрады, откуда перед тем сбросил бревно.</p><p class="p1">И как только бродяги начали выбивать дверь, на них посыпался каменный град, и им показалось, что собор сам собою разрушается над их головами.</p><p class="p1">Вид Квазимодо в эту минуту был страшен. Кроме собранных им на балюстраде метательных снарядов он еще заготовил кучу камней на самой крыше. Как только запас на балюстраде истощился, Квазимодо принялся за вторую кучу. Он нагибался, выпрямлялся, снова нагибался и опять выпрямлялся с необычайной быстротой. Его огромная голова гнома склонялась над парапетом балюстрады, и один громадный камень летел вниз за другим. По временам он следил взглядом за особенно большим камнем и, удачно попав в цель, издавал рычание.</p><p class="p1">Бродяги между тем не падали духом. Уже более двадцати раз тяжелая дверь, против которой они направили свои усилия, сотрясалась под тяжестью дубового тарана, увеличенной силой сотни человек. Рамы дверей трещали, резьба разлеталась вдребезги, петли при каждом сотрясении подпрыгивали, пазы расползались, дерево, окованное железом, рассыпалось в порошок под трением металла. К счастью для Квазимодо, в дверях было больше железа, чем дерева.</p><p class="p1">Однако он чувствовал, что дверь колеблется. Хоть он и не слышал, но каждый удар тарана отзывался в нем и в подвалах церкви. Он видел сверху, как исступленные бродяги с торжеством грозили кулаками темному фасаду собора, и завидовал за себя и за цыганку крыльям сов, стаями взлетавших над его головой.</p><p class="p1">Каменного града оказалось недостаточно, чтоб отразить нападение.</p><p class="p1">В эту критическую минуту Квазимодо увидел несколько ниже балюстрады, с которой громил бродяг, две длинные каменные водосточные трубы, оканчивающиеся как раз над главным входом. Верхнее отверстие этих водостоков приходилось как раз у края платформы. У Квазимодо мелькнула мысль. Он побежал в свою конуру, схватил там вязанку хвороста, положил ее на кучу драни и на нее свертки свинца – снаряды, которыми еще не воспользовался, – и, уложив этот костер перед отверстием водосточных труб, зажег его от своего фонаря.</p><p class="p1">В этот промежуток каменный дождь прекратился, и бродяги перестали смотреть на небо. Бандиты, задыхаясь, как стая гончих, выгоняющая кабана из логова, с шумом теснились вокруг главной двери, изуродованной тараном, но все еще не уступавшей. Они с трепетом ждали последнего удара, который бы пробил ее. Каждый старался протесниться вперед, чтобы, когда она откроется, первым ворваться в этот богатый храм, где были собраны сокровища трех веков. Рыча от радости и жадности, бродяги напоминали друг другу о великолепных серебряных крестах, роскошных парчовых ризах, чудных золотых раках, великолепных хоругвях на хорах, окруженных сверкающими светильниками, пасхальных иконах, залитых солнечным светом, о богатых святынях, где все – канделябры, раки святых, дарохранительницы, ковчеги, иконостасы – было покрыто броней из золота и бриллиантов. Без сомнения, в эту прекрасную минуту все эти плуты, воры и бродяги думали гораздо меньше об освобождении цыганки, чем о разграблении собора. Мы охотно готовы поверить, что для многих из них Эсмеральда была только предлогом, – если только ворам вообще нужен какой-нибудь предлог!</p><p class="p1">Вдруг в ту самую минуту, как осаждавшие, готовясь нанести последний удар, столпились вокруг тарана, затаив дыхание и напрягая мускулы, чтобы придать больше силы решительному натиску, среди них раздался вопль – еще более ужасный, чем в ту минуту, как на них упало бревно. Те, кто не кричал, кто остался невредим, огляделись. В самую плотную часть толпы сверху лились две струи расплавленного свинца. Люди падали как подкошенные под кипящим металлом, образовавшим в местах своего падения, в толпе, две черные дымящиеся дыры, какие образовала бы горячая вода в снегу. Умирающие, наполовину сваренные, корчились, испуская отчаянные вопли. От этих двух главных потоков летели в стороны капли ужасного дождя и впивались в черепа осаждающих, как огненные бурава. Тяжелые раскаленные капли тысячью градин падали на несчастных.</p><p class="p1">Слышались раздирающие душу вопли. Бродяги – и храбрые, и трусливые – бежали врассыпную, бросив балку на тела умирающих, и паперть опустела вторично.</p><p class="p1">Все устремили глаза на церковную колокольню. Тут им представилось необычайное зрелище. На верхней галерее, приходившейся выше центральной розетки, горел яркий костер, пламя которого с вихрем искр вздымалось между двумя колокольнями; это было беспорядочное, свирепое пламя, и ветер по временам уносил клочки его вместе с дымом. Под этим пламенем, под темной балюстрадой, металлическая решетка которой раскалилась, две водосточные трубы изрыгали непрестанно из своих пастей этот жгучий дождь, серебристая струя которого выделялась на темной нижней части фасада. По мере приближения к низу потоки расплавленного свинца расширялись в снопы, как вода, прорывающаяся из мелких дырочек лейки. Над пламенем возвышались огромные башни и видны были две резко отделенные стороны каждой из них – одна совершенно черная, другая багровая. От тени, отбрасываемой ими до самого неба, они казались еще выше. Бесчисленные украшавшие их орнаменты из чудовищ и драконов казались зловещими. При трепещущем отблеске пламени они, чудилось, колебались и сами. Змеи словно смеялись, чудовища с открытыми пастями, казалось, щелкали зубами, саламандры дули на огонь, а горгоны чихали, задыхаясь от дыма. И среди этих чудовищ, разбуженных от каменного сна всем этим огнем и шумом, было одно чудовище, двигавшееся и мелькавшее время от времени на фоне пылающего костра, как летучая мышь перед свечой.</p><p class="p1">Без сомнения, этот странный маяк должен был разбудить дровосеков, живших на далеких холмах Бисетра, испугав их видом колеблющихся над их лесом теней гигантских башен собора Богоматери.</p><p class="p1">Среди бродяг воцарилась ужасная тишина, слышались только испуганные крики каноников, запертых в своем монастыре и встревоженных более, чем лошади в горящей конюшне, мимолетный стук быстро отворяемых и так же быстро затворяемых окон, шум, поднявшийся внутри дома Отель-Дьё, порывы ветра, задувавшие пламя, предсмертный хрип умиравших, неумолкающий треск свинцового дождя, падавшего на мостовую.</p><p class="p1">Между тем предводители шайки удалились под портик дома Гондлорье и держали совет. Герцог египетский, сидя на тумбе, с суеверным страхом смотрел на волшебный костер, пылавший на высоте двухсот футов. Клопен Труйльфу кусал от бешенства свой толстый кулак.</p><p class="p1">– Войти невозможно! – бормотал он сквозь зубы.</p><p class="p1">– Старая заколдованная церковь! – ворчал старый цыган, Матиас Хунгади Спикали.</p><p class="p1">– Клянусь папскими усами, эти каменные желоба плюются свинцом не хуже Лектурских бойниц, – вставил пожилой солдат.</p><p class="p1">– Видите вы этого демона, что бегает взад и вперед перед огнем? – воскликнул герцог египетский.</p><p class="p1">– Черт возьми, да это проклятый звонарь Квазимодо, – заявил Клопен.</p><p class="p1">Цыган покачал головой:</p><p class="p1">– А я говорю вам, что это дух Сабнак, великий маркиз, демон укреплений. Он принимает вид солдата с львиной головой. Иногда он является верхом на безобразной лошади. Он превращает людей в камни, из которых строит башни. У него под командой пятьдесят легионов. Говорю вам, это он. Я его узнал. Иногда он бывает одет в прекрасное золотое платье турецкого покроя.</p><p class="p1">– Где Бельвин Летуаль? – спросил Клопен.</p><p class="p1">– Умер, – ответила одна из женщин-бродяг.</p><p class="p1">Анри ле Руж хохотал идиотским смехом:</p><p class="p1">– Собор Богоматери задает работу больнице Отель-Дьё.</p><p class="p1">– Неужели же нет возможности выбить эту дверь? – воскликнул тунский король, топая ногой.</p><p class="p1">Герцог египетский грустно указал на два сверкающих свинцовых ручья, не перестававших бороздить темный фасад, как две фосфорические прялки.</p><p class="p1">– Бывали случаи, что церкви защищались сами таким образом, – добавил он, вздыхая. – Сорок лет тому назад Святая София в Константинополе три раза кряду ниспровергала полумесяц Магомета, потрясая своими куполами. Гильом Парижский, построивший этот собор, был колдун.</p><p class="p1">– Неужели же так и убираться отсюда ни с чем, как каким-нибудь мелким воришкам? – сказал Клопен. – И оставить в руках этих волков в скуфьях нашу сестру, которую они завтра повесят?</p><p class="p1">– И ризницу, где золота целые телеги! – прибавил бродяга, имени которого мы, к сожалению, не знаем.</p><p class="p1">– Ах, проклятые! – закричал Труйльфу.</p><p class="p1">– Попытаемся еще раз, – предложил бродяга.</p><p class="p1">Матиас Хунгади покачал головой:</p><p class="p1">– В дверь нам не войти. Надо отыскать, где есть изъян в броне старой колдуньи. Потайную дверь, отдушину, какую-нибудь щель.</p><p class="p1">– Кто пойдет со мной? Я возвращаюсь! – проговорил Клопен. – Кстати, где этот маленький студент Жан, что так основательно вооружился?</p><p class="p1">– Должно быть, приказал долго жить, – ответил кто-то. – Его смеха что-то не слыхать.</p><p class="p1">Король тунский нахмурился:</p><p class="p1">– Тем хуже. Под латами билось храброе сердце… А мэтр Пьер Гренгуар?</p><p class="p1">– Этот удрал, когда мы еще не дошли до моста о’Шанж, – доложил Анри ле Руж.</p><p class="p1">Клопен топнул ногой.</p><p class="p1">– Проклятый! Зазвал нас сюда, и сам первый дал тягу, оставив нас в беде. Подлый болтун! Стоптанный башмак!</p><p class="p1">– Командир Клопен, – заговорил Анри ле Руж, смотря на улицу, – вот наш студент!</p><p class="p1">– Хвала Плутону! – произнес Клопен. – Какого это черта он тащит за собой?</p><p class="p1">Действительно, это был Жан, бежавший так скоро, как только ему позволяли его тяжелое вооружение и длинная лестница, которую он храбро тащил по мостовой, запыхавшись при этом больше, чем муравей, который тащит соломинку в двадцать раз длиннее его самого.</p><p class="p1">– Победа! Te Deum!<a href="ch2.xhtml#id100" class="a">[141]</a> – кричал студент. – Вот лестница грузчиков с моста Сен-Ландрен.</p><p class="p1">Клопен подошел к нему.</p><p class="p1">– Что ты затеваешь, мальчуган? На кой черт тебе эта лестница?</p><p class="p1">– Я достал ее… я знал, где она, – запыхавшись, отвечал Жан. – Она стояла под навесом у дома наместника. Там живет моя знакомая девица, которая находит, что я красив, как Купидон… Я воспользовался знакомством, чтобы достать лестницу, и достал, прах ее побери!.. Девчонка выскочила отворить мне ворота в одной рубашке…</p><p class="p1">– Все это хорошо, – сказал Клопен. – Но на что тебе лестница?</p><p class="p1">Жан взглянул на него плутовским самоуверенным взглядом и щелкнул пальцами, как кастаньетами. Он был неподражаем в эту минуту. На голове у него был один из тех фантастических шлемов пятнадцатого века, которые устрашали врагов своими причудливыми украшениями. На шлеме Жана торчало штук десять металлических клювов, так что Жан мог бы оспаривать у корабля гомеровского Нестора эпитет «δεχεμβολοζ»<a href="ch2.xhtml#id98" class="a">[142]</a>.</p><p class="p1">– На что она мне, могущественный король тунский? Видите вы ряд статуй, так глупо стоящих над тремя порталами?</p><p class="p1">– Да… Ну, что же?</p><p class="p1">– Это – галерея французских королей.</p><p class="p1">– А нам какое дело до этого? – спросил Клопен.</p><p class="p1">– Погодите! В конце этой галереи есть дверь, запертая только на щеколду. Я влезу туда по этой лестнице и проберусь в церковь.</p><p class="p1">– Дай мне влезть первым, мальчуган.</p><p class="p1">– Нет, извините, дружище. Лестница моя. Вы, если хотите, будете вторым.</p><p class="p1">– Чтоб Вельзевул тебя удавил! – проворчал угрюмо Клопен. – Я не хочу быть вторым.</p><p class="p1">– Ну так найди себе лестницу!</p><p class="p1">Жан побежал по площади, волоча за собой лестницу и крича:</p><p class="p1">– За мной, ребята!</p><p class="p1">В одну минуту лестницу подняли и прислонили к балюстраде нижней галереи, над одним из боковых порталов. Толпа бродяг с громкими криками толпилась у ее подножия, готовясь лезть по ней. Но Жан отстаивал свое право и первый ступил на лестницу. Лезть пришлось долго. Галерея французских королей в настоящее время находится на высоте около шестидесяти футов над мостовой. Тогда же прибавлялись еще одиннадцать ступеней паперти. Жан лез медленно: ему мешало тяжелое вооружение, он держался одной рукой за лестницу, а другой придерживал свой самострел. Достигнув середины лестницы, он бросил меланхолический взгляд на тела бедных бродяг, которыми была усеяна паперть, и проговорил:</p><p class="p1">– Увы, вот груда трупов, достойная пятой песни «Илиады»!</p><p class="p1">Он продолжал взбираться. Бродяги следовали за ним. На каждой ступени стояло по человеку. Эта колеблющаяся линия покрытых латами спин имела в полумраке сходство с огромной змеей, покрытой стальной чешуей, карабкающейся по стене собора. Жан, бывший во главе, свистал, дополняя иллюзию.</p><p class="p1">Наконец студент достиг балкона галереи и довольно легко прыгнул на нее при всеобщем одобрении бродяг. Овладев таким образом цитаделью, он испустил крик радости, но вдруг остановился как окаменелый. За статуей одного из королей он увидел Квазимодо, притаившегося в потемках. Глаз Квазимодо сверкал.</p><p class="p1">Прежде чем второму осаждающему удалось ступить на галерею, страшный горбун прыгнул к лестнице, не произнося ни слова, схватил ее за конец своими могучими руками, приподнял ее, отдалил от стены, раскачал и, при криках ужаса, со сверхъестественной силой бросил длинную гибкую лестницу со всеми унизывавшими ее сверху донизу бродягами на площадь. Наступило мгновение, когда самые отважные содрогнулись. Отброшенная лестница одну секунду стояла прямо, словно колеблясь. Затем она закачалась и, описав огромный круг радиусом в восемьдесят футов, рухнула на мостовую со своим грузом быстрее, чем подъемный мост, у которого оборвались цепи. Раздалось страшное проклятие, затем все замолкло, и несколько искалеченных выползли из-под груды убившихся насмерть.</p><p class="p1">Торжествующие крики сменились ропотом гнева и жалости. Квазимодо стоял невозмутимо, опершись о балюстраду локтями, и смотрел вниз. Он имел вид древнего, обросшего волосами короля, смотрящего из окна своего дворца.</p><p class="p1">Жан Фролло находился в критическом положении. Он очутился на галерее с глазу на глаз со страшным звонарем, отделенный от товарищей отвесной стеной в восемьдесят футов. Пока Квазимодо возился с лестницей, Жан побежал к дверце, которую думал найти отворенной. Напрасно: выходя на галерею, глухой запер дверь за собой. Жан спрятался за одну из статуй, затаив дыхание и устремив на страшного горбуна растерянный взгляд, как человек, который, ухаживая за женой сторожа в зверинце и идучи однажды вечером на любовное свидание, ошибся, перелезая через стену, и неожиданно очутился лицом к лицу с белым медведем.</p><p class="p1">В первую минуту глухой не заметил его. Но наконец он обернулся и вдруг выпрямился: он увидал студента.</p><p class="p1">Жан приготовился к жестокому нападению; но горбун стоял неподвижно, он только смотрел на студента.</p><p class="p1">– Хо! Хо! – крикнул Жан. – Что ты так печально смотришь на меня своим кривым глазом?</p><p class="p1">Говоря это, повеса исподтишка готовил самострел.</p><p class="p1">– Квазимодо! – закричал он. – Я тебе переменю имя. Теперь тебя станут звать слепой.</p><p class="p1">Раздался выстрел. Стрела просвистела в воздухе и вонзилась в левую руку горбуна. Квазимодо обратил на это внимания не более, чем если бы поцарапали каменного короля Фарамонда. Он вырвал стрелу и спокойно разломил ее надвое о свое толстое колено. Затем он скорее уронил, чем бросил, оба обломка. Но выстрелить Жану во второй раз не удалось. Сломав стрелу, Квазимодо, пыхтя, прыгнул вперед, как кузнечик, на студента и притиснул его латами к стене.</p><p class="p1">И в полумраке, при трепещущем свете факелов, произошло нечто ужасное.</p><p class="p1">Квазимодо схватил левой рукой обе руки Жана, который уже не сопротивлялся, чувствуя, что погиб. Правой рукой глухой, сохраняя молчание, стал снимать с зловещей медленностью со студента все части его вооружения – шпагу, кинжалы, шлем, латы, наручники. Как обезьяна, очищающая орех, Квазимодо бросал к своим ногам один за другим куски железной скорлупы студента.</p><p class="p1">Увидав себя безоружным, раздетым, слабым и обнаженным в этих ужасных руках, Жан не пытался заговорить с глухим, но нагло засмеялся ему в лицо и запел, с неустрашимой беззаботностью шестнадцатилетнего школяра, известную тогда песенку:</p><div class="poem">
<div class="stanza">
<p class="v">Elle est bien habillê</p>
<p class="v">La ville de Cambrai.</p>
<p class="v">Marasin La pillè<a href="ch2.xhtml#id96" class="a">[143]</a>.</p>
</div>
</div><p class="p1">Он не кончил: Квазимодо, вскочив на парапет галереи, схватил его одной рукой за ноги и начал вертеть им в воздухе над бездной, как пращой. Затем послышался шум, как бы от ящика с костями, разбитого об стену, и в воздухе мелькнуло что-то, что остановилось приблизительно на трети пути, зацепившись за выступ здания. То было бездыханное тело, которое повисло, согнувшись, с перебитыми костями, с размозженным черепом.</p><p class="p1">Крик ужаса поднялся среди толпы.</p><p class="p1">– Отомстим! – кричал Клопен.</p><p class="p1">– Разнесем все! – отвечала толпа. – На приступ! На приступ!</p><p class="p1">Раздался рев, где смешались все языки, все наречия, все акценты. Смерть бедного студента пробудила ярость в этой толпе. Стыд и злоба овладели ею при мысли, что ее так долго отражал от церкви какой-то горбун. Ярость заставила найти лестницы, новые факелы, и через несколько минут Квазимодо с ужасом увидел, что бродяги со всех сторон, как муравьи, карабкаются по стенам собора. Те, кому не досталось лестницы, делали узлы на веревках, а те, у кого не было и веревок, лезли, хватаясь за выступы изваяний, цепляясь за рубища своих товарищей. Нечего было и думать устоять против прилива этих чудовищ. Исступление исказило эти и без того дикие лица; глаза их метали молнии. С землистых лбов ручьями струился пот. Все эти искаженные злобой, отвратительные лица окружали Квазимодо. Можно было подумать, что какое-то другое здание выслало для осады собора всех своих горгон, псов, драконов, демонов, свои самые фантастические изваяния. Как будто слой живых чудовищ покрыл слой каменных чудовищ фасада!</p><p class="p1">Между тем на площади, подобно звездам, зажглось множество факелов. Беспорядочная картина, погруженная до того времени в темноту, вдруг озарилась светом. Площадь была залита светом, отбрасывающим свой отблеск на небо. Костер на верхней площадке собора продолжал пылать, издали освещая город. Огромный силуэт двух башен, далеко раскинувшись над крышами Парижа, образовал темное пятно на этом светлом фоне. Город проснулся. С разных сторон стал доноситься звон набата. Бродяги рычали, пыхтели, ругались и продолжали взбираться наверх, а Квазимодо, сознавая свое бессилие перед таким наплывом врагов, дрожа за цыганку, видя, что все эти разъяренные лица все ближе и ближе подвигаются к галерее, просил у неба чуда и в отчаянии ломал руки.</p></span></span></span>
