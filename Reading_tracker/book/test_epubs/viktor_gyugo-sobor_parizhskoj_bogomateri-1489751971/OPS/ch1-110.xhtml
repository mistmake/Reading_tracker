<p class="p">3. Старинный зал</p>
</div><p class="p1">Близ Вестминстерского аббатства стоял старинный нормандский дворец, сгоревший в царствование Генриха VIII. От этого здания уцелело два флигеля. В одном из них Эдуард VI поместил палату лордов, в другом – палату общин.</p><p class="p1">Ни флигелей, ни обоих залов в настоящее время уже не существует, – все перестроено.</p><p class="p1">Мы уже упоминали и теперь снова повторяем, что между прежней и нынешней палатой лордов нет никакого сходства. Разрушив старинный дворец, уничтожили и некоторые старинные обычаи. Удары лома, наносимые древним памятникам, отзываются также на обычаях и на хартиях. Старый камень, падая, увлекает за собой какой-нибудь старый закон. Поместите в круглом зале сенат, заседавший в зале квадратном, и он окажется другим. Форма моллюска изменяется по мере изменения формы раковины.</p><p class="p1">Если вы хотите сохранить какое-нибудь старинное установление, будь оно происхождения человеческого или божественного; будь оно кодексом или догматом, аристократией или жреческим сословием, – ничего не переделывайте в нем заново, даже наружной оболочки. В крайнем случае положите заплату. Орден иезуитов, например, – заплата на католицизме. Если хотите уберечь от перемен учреждения, ничего не меняйте в зданиях.</p><p class="p1">Тени должны жить среди развалин. Обветшалой власти не по себе в заново отделанном помещении. Если учреждение пришло в упадок, ему нужен полуразрушенный дворец.</p><p class="p1">Показать внутренность прежней палаты лордов – значит показать неведомое. История – та же ночь. В ней нет заднего плана. Все, что не находится на авансцене, немедленно пропадает из виду и тонет во мраке. Когда декорации убраны, память о них исчезает, наступает забвение. Прошедшее и неведомое – синонимы.</p><p class="p1">Пэры Англии в качестве верховных судей заседали в большом зале Вестминстера, а в качестве законодателей – в особом зале, носившем название «дома лордов», house of the lords.</p><p class="p1">Кроме суда пэров, созывавшегося только по инициативе короны, в большом Вестминстерском зале заседали еще два судебных учреждения, стоявших ниже суда пэров, но выше всех остальных судебных органов. Они занимали два смежных отделения в передней части этого зала. Первое из них, носившее название «суда королевской скамьи», возглавлялось самим королем, второе именовалось канцлерским судом, и в нем председательствовал канцлер. Одно было органом карающим, другое – милующим. Именно канцлер возбуждал перед королем вопрос о помиловании, но случалось это редко. Оба эти судилища, существующие и поныне, толковали законы, а иногда слегка изменяли их. Искусство судьи состоит в том, чтобы судебной практикой устранять шероховатости свода законов – ремесло, от которого справедливость нередко страдает. В суровом большом Вестминстерском зале вырабатывались и применялись законы. Сводчатый потолок этого зала был из каштанового дерева, на котором не может завестись паутина; достаточно было и того, что она завелась в законах.</p><p class="p1">Заседать как суй и как законодательная палата – две разные вещи. Из двух этих прерогатив слагается верховная власть. «Долгий парламент», начавший заседать 3 ноября 1640 года, почувствовал необходимость вооружиться в революционных целях этим двойным мечом. Поэтому, подобно палате лордов, он объявил себя не только властью законодательной, но и властью судебной.</p><p class="p1">Эта двойная власть с незапамятных времен принадлежит палате лордов. Мы только что говорили, что в качестве судей лорды занимали Вестминстер-Холл, а в качестве законодателей заседали в другом помещении.</p><p class="p1">Палата лордов в собственном смысле занимала продолговатый и узкий зал. Он освещался только четырьмя окнами, проделанными в потолке, так что свет проникал в него через крышу и через затянутое занавесками круглое оконце в шесть стекол над королевским балдахином; вечером здесь зажигали только дюжину канделябров, висевших на стенах. Освещение в зале венецианского сената было еще более скудным. Подобно совам, всемогущие вершители народных судеб любят полумрак.</p><p class="p1">Над залом, где заседали лорды, высился огромный многогранный, украшенный позолотой свод. В палате общин потолок был плоским; в сооружениях, воздвигаемых при монархическом строе, все имеет свой определенный смысл. В одном конце длинного зала палаты лордов находилась дверь, в другом, противоположном, – трон. В нескольких шагах от двери тянулся барьер, пересекая зал поперек и образуя своего рода границу, обозначавшую, где кончается место народа и начинаются места знати. Направо от трона, на камине, украшенном наверху гербом, выступали два мраморных барельефа: один с изображением победы Кетуольфа над бретонцами в 572 году, другой – с планом местечка Денстебль, в котором было только четыре улицы, соответственно четырем странам света. К трону вели три ступени. Он назывался «королевским креслом». По обе стороны от трона стены были обтянуты рядом тканых шпалер, подаренных Елизаветой палате лордов и в последовательном порядке представлявших все злоключения испанской Армады, начиная с ее отплытия из Испании и кончая ее гибелью у берегов Англии. Надводные части судов были вытканы золотыми и серебряными нитями, почерневшими от времени. Под этими шпалерами, разделенными стенными канделябрами, стояли направо от трона три ряда скамей для епископов, налево столько же рядов скамей для герцогов, маркизов и графов; скамьи шли уступами и разделялись проходами. На трех скамьях первого сектора восседали герцоги, второго – маркизы, третьего – графы. Скамьи виконтов, поставленные под прямым углом одна к другой, помещались прямо против трона, а между ними и барьером стояли две скамьи для баронов. Верхнюю скамью направо от трона занимали два архиепископа – Кентерберийский и Йоркский, среднюю – три епископа: Лондонский, Дерхемский и Винчестерский, нижнюю – остальные епископы. Между архиепископом Кентерберийским и другими епископами существует важное различие: он является епископом «промыслом божиим», между тем как прочие – епископы лишь «соизволением божиим». Направо от трона стояло кресло для принца Уэльского, налево – складные стулья для принцев крови, а позади этих стульев – скамья для несовершеннолетних пэров, не имеющих еще права заседать в палате. Всюду – множество королевских лилий, а на всех четырех стенах над головами пэров, так же как и над головой королевы, – громадные щиты с гербом Англии. Сыновья пэров и наследники пэрств присутствовали на заседаниях, стоя позади трона, между балдахином и стеной. Между троном, находившимся в глубине зала, и тремя рядами скамей вдоль стен оставалось еще большое свободное пространство в форме четырехугольника. На ковре с гербами Англии, устилавшем это пространство, лежало четыре мешка, набитых шерстью; один, прямо перед троном, – для канцлера, который сидел на нем, держа булаву и государственную печать; второй, перед епископами, – для судей – государственных советников, имевших право присутствовать без права голоса; третий, против герцогов, маркизов и графов, – для государственных секретарей; четвертый, против виконтов и баронов, – для клерков: коронного и парламентского; на нем писали, стоя на коленях, их помощники. В центре этого четырехугольника стоял большой, покрытый сукном стол, заваленный бумагами, списками, счетными книгами, с массивными, чеканной работы, чернильницами и с высокими светильниками по четырем углам. Пэры занимали места «в хронологическом порядке» – каждый соответственно древности его рода. Они рассаживались, соблюдая двойное старшинство – титула и времени его пожалования. У барьера стоял пристав черного жезла, держа в руке эту эмблему своей должности; у дверей – его помощник, за дверьми – глашатай черного жезла, на обязанности которого лежало открывать заседание возгласом: «Слушайте». Он трижды произносил это слово по-французски, торжественно растягивая первый слог. Рядом с глашатаем стоял булавоносец канцлера.</p><p class="p1">Когда заседания палаты происходили в присутствии короля, светские пэры надевали корону, а духовные – митру. Архиепископы носили митры с герцогской короной, а епископы, приравненные к виконтам, – митру с короной баронской.</p><p class="p1">Странное и вместе с тем поучительное обстоятельство: четырехугольник, образованный троном, скамьями епископов и баронов, с коленопреклоненными чиновниками посредине, был точной копией древнего парламента Франции при двух первых династиях. И во Франции и в Англии власть принимала одни и те же внешние формы. В 853 году Гинкмар в трактате «De ordinatione sacri palatii»<a href="ch2.xhtml#id155" class="a">[268]</a> как будто описывает заседание палаты лордов, происходящее в Вестминстере в восемнадцатом веке. Курьезный протокол, составленный за девятьсот лет до самого события.</p><p class="p1">Что такое история? Отголосок прошедшего в будущем. Отсвет, отбрасываемый будущим на прошедшее.</p><p class="p1">Созыв парламента был обязательным лишь через каждые семь лет.</p><p class="p1">Лорды совещались тайно, при закрытых дверях. Заседания же палаты общин были публичными. Гласность казалась умалением достоинства.</p><p class="p1">Число лордов было неограниченным. Назначение новых лордов королем было своего рода угрозой. Это было способом дать почувствовать строптивым лордам королевскую власть.</p><p class="p1">В начале восемнадцатого столетия число заседавших в палате лордов достигло весьма внушительной цифры. С тех пор оно возросло еще больше. Такое разбавление аристократии новыми лицами преследовало определенную политическую цель. Елизавета, быть может, допустила ошибку, сократив число пэров до шестидесяти пяти. Чем малочисленнее знать, тем она сильнее. Чем многолюднее ее сборище, тем меньше в нем голов. Иаков II отлично сознавал это, увеличивая число лордов в верхней палате до ста восьмидесяти восьми или до ста восьмидесяти шести, если исключить отсюда двух герцогинь королевского алькова – Портсмут и Кливленд. При Анне общее число пэров, включая и епископов, достигло двухсот семи.</p><p class="p1">Не считая герцога Кемберлендского, супруга королевы, герцогов было двадцать пять, из коих первый, Норфолк, не заседал в палате, так как был католиком, а последний, герцог Кембриджский, курфюрст Ганноверский, входил в ее состав, хотя и был иностранцем. Винчестер, называвшийся первым и единственным маркизом Англии, подобно тому как в Испании единственным маркизом был Асторга, был якобитом и потому отсутствовал; но вместо него было еще пять маркизов: старшим из них считался Линдсей, а младшим – Лотиан; семьдесят девять графов: из них старшим был Дерби, а младшим – Айлей; девять виконтов: из них старший – Герфорд, а младший – Лонсдейл; шестьдесят два барона: из них старший – Эбергевени, а младший – Гарвей, который в качестве самого младшего члена палаты назывался «меньшим». Дерби, который при Иакове II был четвертым по старшинству, так как выше него стояли графы Оксфорд, Шрусбери и Кент, при Анне занял среди графов первое место. В ту пору из списков баронов исчезли имена двух канцлеров: Верулама, известного истории как Бэкон, и Уэма, известного под именем Джеффриса; Бэкон и Джеффрис – имена мрачные, каждое по-своему. В 1705 году из двадцати шести епископов оставалось двадцать пять, так как Честерская епархия была вакантна. Среди епископов встречались знатные вельможи, как, например, Вильям Талбот, архиепископ Оксфордский, глава протестантской ветви своего дома. Другие были выдающимися учеными, как, например, Джон Шарп, архиепископ Йоркский, бывший деканом в Норвике, поэт Томас Спратт, епископ Рочестерский, человек апоплексической наружности, или епископ Линкольнский Уэйк, противник Боссюэ, умерший в сане архиепископа Кентерберийского.</p><p class="p1">В особо важных случаях, когда, например, верхней палате предстояло выслушать какое-либо королевское сообщение, все это величественное сборище в мантиях, в париках, митрах или шляпах с белыми перьями заполняло пэрский зал и рассаживалось ступенчатыми рядами вдоль стен, на которых в полумраке можно было разглядеть изображение бури, уничтожающей испанскую Армаду. Эта картина как бы говорила: «И буря повинуется Англии».</p></span></span></span></span>
