<p class="p">9. Ненависть так же сильна, как и любовь</p>
</div><p class="p1">Немало подсказчиков нашептывали на ухо королеве Анне. В том числе и Баркильфедро.</p><p class="p1">Кроме королевы, он старался воздействовать и на леди Джозиану и на лорда Дэвида, стремясь незаметно подчинить их своему влиянию. Как мы уже говорили, он нашептывал сразу в три уха. На одно ухо больше, чем Данжо. Вспомним, что Данжо нашептывал только двоим; просунув голову между Людовиком XIV, влюбленным в свою свояченицу Генриету, и Генриетой, влюбленной в Людовика XIV, и, сделавшись без ведома Генриеты секретарем Людовика и без ведома Людовика секретарем Генриеты, он оказался в центре любовной интриги двух марионеток, сам задавая вопросы и сам же отвечая на них.</p><p class="p1">Баркильфедро был таким веселым и сговорчивым, таким безобразным и злоязычным, он был так неспособен заступиться за кого-либо и проявить верность кому бы то ни было, что нет ничего странного в том, что он стал в конце концов необходим королеве. Оценив по достоинству Баркильфедро, Анна не пожелала слушать других льстецов. Он льстил ей так же, как льстили Людовику XIV, он обращал свое жало против других. «Король невежествен, – говорила госпожа де Моншеврейль, – приходится поэтому смеяться над учеными».</p><p class="p1">Отравлять постепенно, уколами – это верх искусства. Нерон любил смотреть на работу Локусты.</p><p class="p1">В королевские дворцы проникнуть нетрудно: в этих коралловых сооружениях существуют внутренние ходы, о существовании которых очень быстро догадывается полип, называемый царедворцем; найдя готовый ход, он расширяет его, а если нужно, проделывает новый. Чтобы попасть во дворец, достаточно какого-нибудь предлога.</p><p class="p1">Воспользовавшись в качестве такого предлога своей службой, Баркильфедро в очень короткое время сделался для королевы тем, чем он был и для герцогини Джозианы, – привычным и забавным домашним животным. Сорвавшееся у него однажды с языка остроумное словечко помогло ему раскусить королеву: теперь он знал, чем можно заслужить милость Ее Величества. Королева очень любила своего лорда-управителя Вильяма Кавендиша, герцога Девонширского, человека необычайно глупого. В одно прекрасное утро этому лорду, имевшему все ученые степени Оксфорда и писавшему с ошибками, вздумалось умереть. Придворный, умирая, совершает большую неосторожность, ибо никто больше не стесняется о нем злословить. Королева погоревала о нем в присутствии Баркильфедро и наконец промолвила со вздохом:</p><p class="p1">– Как жаль, что столь добродетельный человек был не очень умен!</p><p class="p1">– Да примет Господь душу своего осла, – вполголоса пробормотал по-французски Баркильфедро.</p><p class="p1">Королева улыбнулась. Баркильфедро отметил эту улыбку.</p><p class="p1">Отсюда он сделал вывод: нравится, когда язвят.</p><p class="p1">Итак, ему дозволялось быть злоязычным.</p><p class="p1">С этого дня Баркильфедро дал волю своему любопытству и своей злости. Его никто не смел одернуть, все его боялись. Тот, кто смешит короля, гроза для всех остальных.</p><p class="p1">Баркильфедро стал всесильным шутом.</p><p class="p1">Ежедневно пробирался он вперед своим подземным ходом. В Баркильфедро нуждались. Некоторые вельможи до такой степени дарили его своим доверием, что в случае нужды поручали ему то или иное гнусное дело.</p><p class="p1">Двор – это целая система зубчатых колес. Включившись в эту систему, Баркильфедро стал ее двигателем. Обратили ли вы внимание на то, что в некоторых механизмах двигательное колесо очень мало?</p><p class="p1">Джозиана, как мы уже сказали, пользовалась шпионскими способностями Баркильфедро и питала к нему такое доверие, что, не задумываясь, дала ему ключ от своих покоев, с помощью которого Баркильфедро мог проникнуть к ней в любое время.</p><p class="p1">Такое чрезмерное доверие, раскрывающее интимную сторону жизни перед посторонними людьми, было в семнадцатом столетии весьма распространенным явлением. Это называлось «подарить ключ». Джозиана подарила два потайных ключа: один – лорду Дэвиду, другой – Баркильфедро.</p><p class="p1">Впрочем, в старину никто не удивлялся, если человек получал доступ в спальню. Иногда это приводило к неожиданностям. Ла Ферте, например, раздвинув внезапно полог постели мадемуазель Лафон, наткнулся на черного мушкетера Сенсона.</p><p class="p1">Баркильфедро отличался особым умением раскрывать тайны, которые подчиняют великих мира сего и предают их в руки маленьких людей. Он умел бесшумно красться в потемках извилистым путем. Как всякий хороший соглядатай, он совмещал в себе жестокость палача и терпение микрографа. Он был прирожденным царедворцем, а все царедворцы – лунатики. Они бродят в ночи, называемой всемогуществом. В руке у них потайной фонарь. Лучом этого фонаря они освещают только то, что хотят, оставаясь сами в тени. Не человека ищет царедворец с этим фонарем, а животное, которое скрывается в человеке; он находит его в короле.</p><p class="p1">Королям не нравится, чтобы кто-то рядом с ними претендовал на величие. Талант Баркильфедро заключался в том, что он непрерывно умалял достоинства лордов и принцев, благодаря чему возрастало величие королевы.</p><p class="p1">Ключ, подаренный Баркильфедро, был с двумя бородками по концам, и потому им можно было открывать спальные комнаты в обеих любимых резиденциях Джовианы – в Генкервилл-Хаузе в Лондоне и в Корлеоне-Лодже в Виндзоре. Оба эти дворца входили в состав наследства лорда Кленчарли. Генкервилл-Хауз прилегал к Олдгейту. Олдгейт был воротами, ведущими в Лондон из Харвика; там стояла статуя Карла II с раскрашенным изваянием ангела над головой и фигурами льва и единорога у подножия. Восточный ветер доносил в Генкервилл-Хауз благовест из Сент-Мерильбона. Дворец Корлеоне-Лодж в Виндзоре был построен в флорентийском стиле из кирпича и камня с мраморной колоннадой и стоял на сваях; к нему вел деревянный мост; парадный двор его считался одним из самых красивых в Англии.</p><p class="p1">В этом дворце, расположенном неподалеку от Виндзорского замка, Джозиана была на виду у королевы. Тем не менее ей нравилось там жить.</p><p class="p1">Влияние Баркильфедро на королеву было незаметно со стороны, но пустило глубокие корни. Нет ничего более трудного, чем удалить такие придворные плевелы; они почти не дают ростков, и их не за что ухватить. Выполоть Роклора, Трибуле или Бреммеля – задача почти невозможная.</p><p class="p1">С каждым днем королева Анна становилась все благосклоннее к Баркильфедро.</p><p class="p1">Всем известно имя Сары Дженнингс. Имя же Баркильфедро осталось неизвестным. Никто не знает о милостивом отношении к нему королевы Анны. Его имя не дошло до истории. Не всякий крот попадает в руки кротолова.</p><p class="p1">Баркильфедро, неудачливый кандидат в священнослужители, учился всему понемногу, а потому, как это бывает обычно в подобных случаях, не знал ничего. Можно стать жертвой мнимого всезнайства. Сколько на свете таких, можно сказать, бесплодных ученых, у которых на плечах вместо головы бочка Данаид. Чем только ни набивал Баркильфедро свою голову, все напрасно – она оставалась пустой.</p><p class="p1">Ум, как и природа, не терпит пустоты. Природа заполняет пустоту любовью; ум нередко прибегает для этого к ненависти. Ненависть дает ему пищу.</p><p class="p1">Существует ненависть ради ненависти; искусство ради искусства более свойственно натуре человека, чем принято думать.</p><p class="p1">Люди ненавидят. Надо же что-нибудь делать.</p><p class="p1">Беспричинная ненависть ужасна. Это ненависть, которая находит удовлетворение в самой себе.</p><p class="p1">Медведь живет тем, что сосет свою лапу.</p><p class="p1">Но это не может длиться без конца. Лапу надо питать. Медведю необходим какой-нибудь корм.</p><p class="p1">Ненависть сладостна сама по себе, и на некоторое время ее хватает, но в конце концов она должна устремиться на определенный предмет.</p><p class="p1">Злоба беспредметная истощает, как всякое наслаждение в одиночестве. Она похожа на стрельбу холостыми патронами. Эта игра увлекает лишь в том случае, если можно пронзить чье-либо сердце.</p><p class="p1">Нельзя ненавидеть только ради того, чтобы прослыть ненавистником. Необходима цель – мужчина или женщина, кто-то, кого стремишься погубить.</p><p class="p1">Джозиана бессознательно оказала Баркильфедро эту восхитительную и ужасную услугу – она придала игре интерес и сообщила ей цель: она разожгла и направила ненависть, раздразнила охотника видом живой добычи, внушила притаившемуся стрелку надежду, что скоро прольется теплая, дымящаяся кровь, обрадовала птицелова мнимой легковерностью быстрокрылого жаворонка, пробудила в охотнике зверя, ибо, сам того не подозревая, он был создан для того, чтобы убивать.</p><p class="p1">Мысль – это снаряд. Баркильфедро с первого дня избрал Джозиану мишенью для всех черных замыслов, гнездившихся в его мозгу. Существует сходство между намерением и пищалью. Баркильфедро притаился в засаде, направив на герцогиню всю свою затаенную злобу. Это вас удивляет? Зачем вы стреляете в птицу, которая не сделала вам никакого зла? Чтобы съесть ее – отвечаете вы. Того же хотел и Баркильфедро.</p><p class="p1">Джозиану нельзя было ранить в сердце, так как трудно поразить место, где скрывается загадка, но можно было нанести ей удар в голову, уязвив ее гордость.</p><p class="p1">Именно гордость была ее слабостью, а она видела в ней свою силу.</p><p class="p1">Баркильфедро это прекрасно понял.</p><p class="p1">Если бы Джозиана могла разобраться в черной душе Баркильфедро, если бы она узнала, что скрывается за его улыбкой, эта надменная высокопоставленная особа затрепетала бы. Но сны ее были безмятежно спокойны, она даже не подозревала, что таилось в этом человеке.</p><p class="p1">Нежданное обрушивается неизвестно откуда. Страшны глубинные источники жизни. Нет малой ненависти. Ненависть всегда огромна. Она сохраняет свои размеры даже в самой ничтожной твари и остается чудовищной. Всякая ненависть сильна уже тем, что она – ненависть. Слону, которого ненавидит муравей, грозит опасность.</p><p class="p1">Еще не нанеся удара, Баркильфедро уже радостно предвкушал зло, которое собирался совершить. Он пока не знал еще, что именно он предпримет против Джозианы. Но намерение его было твердо. И одно уже такое решение значит немало.</p><p class="p1">Он не надеялся уничтожить Джозиану; это было бы слишком большой удачей. Но оскорбить ее, унизить, причинить ей горе, увидеть, как покраснеют от слез бессильной ярости эти прекрасные глаза, – вот что он считал бы удачей. И на нее он рассчитывал. Не напрасно природа одарила его такой настойчивостью, такой страстной жаждой причинять страдания другим. Он был уверен, что найдет какой-нибудь изъян в золотых доспехах Джозианы и прольет кровь этой обитательницы Олимпа. Какая же за это ждала его награда? – спросим мы. Огромная: радость отплатить злом за добро.</p><p class="p1">Кто такой завистник? Неблагодарный. Он ненавидит солнце, которое освещает и согревает его. Так Зоил ненавидит Гомера.</p><p class="p1">Подвергнуть Джозиану тому, что назвали бы теперь вивисекцией, видеть, как она корчится в судорогах на анатомическом столе, не торопясь резать ее живую на части – вот какие мечты лелеял Баркильфедро.</p><p class="p1">Чтобы достигнуть этого, он рад был бы и сам пострадать немного. Можно попасть в собственные тиски. Складывая нож, можно обрезать себе пальцы. Велика важность! Если бы, мучая Джозиану, Баркильфедро причинил боль себе, он отнесся бы к этому безразлично. Палач, орудуя раскаленным железом, обжигается сам, но не обращает на это внимания. Вы ничего не чувствуете, так как другой страдает больше. Видя, как мучится тот, кого пытают, вы не ощущаете собственной боли.</p><p class="p1">Вреди как можно больше, а там – будь что будет.</p><p class="p1">Причиняя ближнему зло, вы береге на себя ответственность. Подвергая другого опасности, вы рискуете собой, так как сцепление различных обстоятельств может привести к неожиданному крушению и вашу судьбу. Истинно злой человек не останавливается даже перед этим. Его радуют терзания страдальца. Его приятно щекочут эти муки. Веселье злодея ужасно. Он чувствует себя отлично при виде пытки. Герцог Альба грел руки у костров, на которых жгли людей. Огонь – страдание, его отблеск – радость. Невольно содрогаешься при мысли о том, какие выводы можно сделать из подобных противопоставлений. Темные стороны души непостижимы. Встречающееся у Бодена выражение «изощренная казнь» имеет, быть может, тройной ужасный смысл: утонченные пытки, страдания пытаемого, наслаждение мучителя.</p><p class="p1">«Алчность», «честолюбие» – эти слова означают, что кто-то приносится в жертву для удовлетворения аппетита другого. Как печально, что даже понятие «надежда» может быть извращено! Таить зло против кого-нибудь – значит желать ему зла. Почему не добра? Не потому ли, что наша воля устремлена преимущественно в сторону зла? Самая тяжелая задача – постоянно подавлять в своей душе желание зла, с которым так трудно бороться. Почти все наши желания, если хорошенько разобраться в них, содержат нечто такое, в чем нельзя признаться. Но у законченного злодея – а такого рода гнусное совершенство существует – вырабатывается правило: чем хуже для других, тем лучше для меня. Совесть его – мрачный вертеп.</p><p class="p1">Джозиана в избытке обладала той беспечностью, которая порождается презрительной гордостью и высокомерно-пренебрежительным отношением ко всему. Способность женщины к презрению поразительна. Джозиане была присуща бессознательная, непроизвольная, самоуверенная надменность. Баркильфедро в ее глазах был почти вещью. Она очень удивилась бы, если бы ей сказали, что у него тоже есть душа.</p><p class="p1">Она ходила, говорила, смеялась, не обращая внимания на этого человека, который исподтишка наблюдал за ней.</p><p class="p1">Он только выжидал удобного случая. И чем больше он ждал, тем больше крепло в нем решение омрачить чем-нибудь жизнь этой женщины.</p><p class="p1">Беспощадная засада…</p><p class="p1">Впрочем, объясняя себе свое поведение, он приводил весьма убедительные доводы. Не думайте, что негодяи не питают к себе уважения. Они оправдываются в своих поступках, произнося высокопарные монологи, и свысока смотрят на окружающих. Как! Эта Джозиана подала ему милостыню! Она, как нищему, швырнула ему несколько лиаров из своего несметного богатства! Она поработила его этой нелепой должностью! Если он, Баркильфедро, почти духовное лицо, человек, одаренный такими крупными и разнообразными способностями, ученый муж, имеющий все основания получить титул его преподобия, должен заниматься описью черепков вроде тех, которыми Иов соскребывал гной со своих струпьев, если он вынужден проводить свою жизнь в мерзкой канцелярии и с важностью раскупоривать глупые бутылки, покрытые слоем ила и морских ракушек, читать заплесневелые пергаменты, истлевшие бестолковые послания, грязные обрывки завещаний, какой-то неудобочитаемый вздор, – во всем этом виновата Джозиана.</p><p class="p1">И эта тварь еще смеет говорить ему «ты»!</p><p class="p1">Да неужели он не отомстит за себя, не проучит это ничтожество?</p><p class="p1">Нет, погоди! Есть еще на свете справедливость!</p></span></span></span></span>
