<p class="p">II. Это убьет то</p>
</div><p class="p1">Наши читательницы извинят нас, если мы остановимся на минуту, чтобы попытаться разгадать внутренний смысл загадочных слов архидьякона: «Это убьет то» и «Книга убьет здание».</p><p class="p1">По нашему мнению, мысль эта была двойственна. Прежде всего, это была мысль священника, ужас священнослужителя перед новой силой – печатным станком, крик испуга представителя Церкви, ослепленного светоносным изобретением Гуттенберга. Церковная кафедра и рукописная книга, слово изустное и слово рукописное, вооружались против слова печатного. Это было нечто вроде ужаса воробья, перед которым ангел Легион развернул бы свои шесть миллионов крыльев. Это было воплем пророка, которому уже слышится, как шумит и бурлит освобождающееся человечество, который видит, как в будущем расшатываются устои религии, как свободная мысль свергает с пьедестала слепую веру и как потрясается могущество Рима. Это было предвидением философа, которому представлялось, как окрыленная печатью человеческая мысль вырвется из тисков теократии. Это было страхом воина перед железным стенобитным орудием, говорящего: «Башня рухнет». Это означало, что одна сила сменяется другою, что «печать убьет Церковь».</p><p class="p1">Но это было, так сказать, лишь поверхностной частью мысли, понятной каждому по своей простоте. За этой частью мысли скрывалась другая, менее доступная общему пониманию, хотя и легче опровержимая, – мысль также философская и мысль уже не только священника, но и ученого и художника. В ней выражалось предчувствие, что человеческое мышление направится по новому пути и соответственно этому будет выливаться в новые формы, что преобладающие в каждом поколении идеи не будут более записываться прежним материалом и прежним способом; что книга каменная, которая казалась такою прочною и трудно истребимою, должна будет уступить место книге бумажной, еще более прочной и неистребимой. С этой точки зрения неопределенные выражения архидьякона имели второй смысл, и именно тот, что одно искусство займет место другого, что книгопечатание убьет зодчество. В самом деле, с самого начала истории человечества и вплоть до пятнадцатого столетия христианской эры единственною книгою человечества было зодчество. В этой книге и выражались все ступени развития человека, как силы просто физической и как силы умственной.</p><p class="p1">Когда память первобытных человеческих племен оказалась уже чересчур обремененною, когда запас накопившихся воспоминаний человечества сделался так велик и запутан, что простое летучее слово рисковало растерять его весь по дороге, то эти воспоминания стали записывать на почве самым легким, прочным и вместе с тем самым естественным способом, то есть каждое предание запечатлевалось под видом какого-нибудь памятника.</p><p class="p1">Первые памятники были простыми каменными глыбами, к которым, по выражению Моисея, «не прикасалось железо». Зодчество началось с того же, с чего начинается каждая письменность, – с азбуки. В известном месте ставили стоймя камень, и он изображал собою какую-нибудь букву. Каждая такая буква была иероглифом, а на каждом иероглифе покоилась целая группа мыслей, как покоится на колонне капитель. Так делали первобытные племена человеческого рода по всему лицу земли. Стоячий камень кельтов можно найти и в азиатской Сибири, и в американских пампасах.</p><p class="p1">Позднее возникли слова. Начали накладывать один камень на другой и соединять каменные слога в слова, делая известные комбинации. Дольмены и кромлехи кельтов, этрусский турмул, еврейский Галгал – все это каменные слова. Некоторые из этих слов, в особенности этрусские турмулы, представляют собою имена собственные. Подчас в известный период писались даже целые фразы в тех местах, где было много материала и пространства. Так, например, громадные каменные нагромождения в Карнаке изображают целые формулы.</p><p class="p1">Наконец, таким путем начали уже составлять и целые книги. Предания порождали символы, под которыми сами исчезали, как исчезает под листьями ствол дерева. Все эти символы, в которые веровало человечество, постепенно нарастали, размножались, перекрещивались между собою и все более и более осложнялись; под конец они разрослись до такой степени, что под ними нельзя было уже разобрать смысла тех простых, едва возвышавшихся над землею преданий, в воспоминание о которых были воздвигнуты памятники. Символу необходимо было расшириться в здание. В это время вместе с человеческой мыслью стало развиваться и зодчество. Вырастая в тысячеголового и тысячерукого гиганта, оно облекло в вековечную, видимую и осязаемую форму весь символизм, страдавший раньше такой неопределенностью. Пока [Дедал] – сила – делал измерения, а [Орфей] – разум – пел, столп – буква, аркада – слог, пирамида – слово, вызванные к жизни законами геометрии и поэзии, начали группироваться, соединяться и сливаться в одно целое, углубляться в почву, подниматься ввысь, громоздясь одно над другим, тянуться в небо, создавая таким образом, под диктовку преобладающей в данную эпоху идеи, те чудесные книги, которые являлись и чудесными зданиями, как, например, Эклингская пагода, Рамсейон в Египте и храм Соломона в Иерусалиме.</p><p class="p1">Главная идея, слово, не только легла в основание всех этих зданий, но выражалась и в их форме. Так, например, храм Соломона представлял собою не просто переплет священной книги, но был и самою книгою. Посвященные могли прочесть ясно выраженное и истолкованное слово на каждой из его концентрических оград и от святилища к святилищу проследить все его превращения, пока наконец это слово не представилось им в святая святых, в самой конкретной форме, – опять-таки зодческой, – в форме кивота Завета. Слово хотя и было заключено в здании, но образ его запечатлевался и на его внешней оболочке, как очертания человеческой фигуры на мумии.</p><p class="p1">Не только форма здания, но и самое место, на котором оно располагалось, выражало представленную им мысль. Сообразно со светлым характером своего символа, Греция увенчивала горы храмами, пленявшими глаз гармоничностью линий, между тем как Индия под влиянием своего мрачного мировоззрения пряталась в недрах гор, чтобы там высекать причудливые пагоды, поддерживаемые рядами исполинских гранитных слонов.</p><p class="p1">Таким образом в течение первых шести тысяч лет существования мира зодчество служило человечеству великой книгой истории, начиная с самой древней пагоды Индостана и кончая Кёльнским собором. Это факт неоспоримый. В этой огромной книге записаны не только все религиозные символы человечества, но каждая его мысль нашла себе место и памятник на ее страницах.</p><p class="p1">Каждая цивилизация начинается с теократии и кончается демократией. Порядок последовательного перехода от подчинения к свободе запечатлен зодчеством. Не нужно забывать, что зодчество воздвигало не одни только храмы, выражало не одни мифы и священные символы и начерчивало иероглифами на своих каменных страницах не одни таинственные скрижали закона. Если бы было так, то поскольку в каждом человеческом обществе наступает момент, когда священный символ изнашивается и стирается под давлением свободной мысли, когда человек освобождается от влияния духовенства, когда развитие философии и наук изглаживает религию, то архитектура не смогла бы выразить новое состояние духа, ее страницы, заполненные снаружи, оказались бы пустыми изнутри, ее создания были бы изуродованы, ее летопись была бы неполна. Но это не так.</p><p class="p1">Возьмем для примера Средние века, которые нам доступнее, потому что они ближе к нам. В самом их начале, в то время как теократия организует Европу, Ватикан собирает вокруг себя и приводит в порядок все элементы нового Рима, возникающие из частей старого Рима, лежащего в развалинах вокруг Капитолия; в то время как христианство отыскивает в обломках древней цивилизации материал для возведения нового общественного здания со всеми ярусами для сооружения нового иерархического мира, краеугольным камнем которого является духовенство; в то время, говорим мы, из хаоса и из-под развалин мертвых архитектур Греции и Рима начинает медленно пробиваться, благодаря соединенным усилиям христианства и варваров, таинственное романское зодчество – этот брат теократических сооружений Египта и Индии, эта яркая эмблема чистого католицизма, этот непоколебимый памятник папского единства. Действительно, мысль того времени выразилась целиком в мрачном романском стиле. От этого стиля так и веет властью, единством, непроницаемостью и абсолютизмом – словом, Папою Григорием VII. Во всех зданиях той эпохи всюду чувствуется священнослужитель, а не человек, проявляется каста, а не народ. Но вот наступают крестовые походы. Это было сильное народное движение, а каждое народное движение, каковы бы ни были его причина и цель, в конце концов всегда порождает стремление к свободе. Начинает пробиваться что-то новое, открывается бурный период жакерий, прагерий, лиг. Власть расшатывается, единство раздваивается. Феодализм оспаривает часть власти у теократии в ожидании, когда дойдет неизбежная очередь до народа, который обязательно потребует себе львиную долю. Quia nominor leo<a href="ch2.xhtml#id234" class="a">[75]</a>. Из-под духовенства пробивается аристократия; из-под феодальной власти – коммуна. Лицо Европы резко изменяется, а вместе с тем изменяется и лицо зодчества. Одновременно с цивилизацией и зодчество перевертывает страницы своей летописи и готовится добросовестно записывать то, что продиктует ему новый дух времени. Как народ возвратился из крестовых походов со стремлением к свободе, так и зодчество вернулось из них со стремлением к стрельчатой форме. А в то время, когда власть Рима начинает мало-помалу распадаться, гибнет и романское зодчество. Иероглиф покидает собор и переходит в гербы замков аристократии, чтобы увеличить ее престиж. Самый собор, этот символ строгого догматизма, под влиянием врывающейся в него буржуазии, свободной общины, начинает уклоняться от непосредственной власти священника и отдается художнику, который и перестраивает его по собственному вкусу. Прощайте мистерия, миф, закон. На смену пришли фантазия и каприз. Лишь бы священнику была сохранена основная форма базилики с алтарем, во всем остальном он уже не имеет права голоса. Стены собора всецело находятся теперь в распоряжении художника. Книга зодчества перестает быть исключительным достоянием духовенства, религии, Рима, – она уже открывает свои страницы воображению, поэзии, народу. Отсюда быстрые и многочисленные превращения нового зодчества, в течение его только трехвекового существования, которые и представляют такой резкий контраст со стоячей неподвижностью, выдержанною романским зодчеством в продолжение вдвое большего промежутка времени. Искусство исполинскими шагами движется вперед. Народный гений и народное творчество берут на себя задачу, которая раньше выполнялась только епископами. Каждое поколение мимоходом заносит свою строку в книгу зодчества. Соединенными усилиями целого ряда поколений стираются с фасадов соборов древние романские иероглифы и заменяются новыми символами, и лишь очень проницательный глаз может различить под этими иероглифами следы старого догмата, под драпировкою народной фантазии – остов религии. Трудно себе представить, до какой степени доходила в эту эпоху вольность зодчих по отношению к церкви. В Каминном зале Дворца правосудия на капителях колонн изображены непристойными парами монахи и монахини. На паперти собора в Бурже выписана резцом вся история посрамления Ноя, с чрезвычайной откровенностью и точностью. В умывальной комнате Бошервильского аббатства смеется в лицо всей общине пьяный монах с ослиными ушами, держащий в руке чашу, наполненную вином. Вообще в ту эпоху человеческая мысль, выражаемая зодчеством, пользовалась привилегией, напоминающей современную свободу печати. Это было время свободы зодчества.</p><p class="p1">Эта свобода заходила очень далеко. То тут, то там какой-нибудь портал, фасад, а иногда и целая церковь являлись символическим выражением мысли, совершенно чуждой и даже враждебной культу религии. Гильом Парижский в тринадцатом столетии, а Николай Фламель в пятнадцатом написали этим способом несколько очень соблазнительных страниц. Что же касается церкви Сен-Жак-де-ла-Бушри, то она вся была воплощением духа оппозиции.</p><p class="p1">Будучи свободной лишь в области зодчества, мысль и высказывалась целиком только на тех страницах, которые называются зданиями. В этой форме мысль лицезрела, как ее в виде рукописи сжигали на площадях рукой палача. Мысль, выраженная на портале собора, присутствовала при казни мысли, запечатленной в книге. Поэтому вполне понятно, что мысль с такой стремительностью бросалась на единственный путь, оставшийся ей открытым. Этим только и можно объяснить невероятное количество церквей, покрывших всю Европу, – количество до такой степени громадное, что трудно поверить, даже пересчитав их лично. Очевидно, все материальные и духовные силы общества тогда сосредоточились в одном зодчестве, как в зрительном фокусе. Под предлогом сооружения церквей для служения Богу широко развивалось искусство.</p><p class="p1">В то время каждый родившийся поэтом делался архитектором. Вся та сумма дарований, которая была рассеяна в массах и со всех сторон подавлялась феодализмом, точно стеною бронзовых щитов, находила приложение только в зодчестве и, широко пользуясь этим искусством, писала свои «Илиады» в форме соборов. Все остальные искусства подчинились зодчеству и служили ему, перестав существовать самостоятельно. Они были чернорабочими великого дела. Архитектор-поэт, архитектор-мастер подчинил себе и скульптуру, покрывавшую резьбою его фасады, и живопись, разрисовывавшую ему оконные стекла, и музыку, приводившую в движение колокола и дышавшую трубами органа. Даже бедная поэзия, которая так упорно прозябала в рукописях, в конце концов, не желая окончательно погибнуть, должна была согласиться войти в рамки здания под формою гимна или прозы. Эту же роль играли в греческих празднествах трагедии Эсхила, а в храме Соломона – Книга Бытия.</p><p class="p1">Таким образом, до Гуттенберга зодчество было преобладающею формою письменности, общею для всего мира. Его гранитная книга, начатая Востоком, продолжавшаяся греческою и римскою древностью, была дописана Средними веками. Нужно, впрочем, заметить, что не в одни Средние века можно было наблюдать, как зодчество народное выступает на смену зодчеству кастовому; это случалось и в другие периоды истории человечества. Укажем вкратце на главнейшие проявления закона, для подробного исследования которого понадобилось бы исписать целые тома. На дальнем Востоке, этой колыбели первобытного человечества, индусское зодчество сменяется финикийским, этим щедрым родоначальником арабского. В классической древности за египетским зодчеством с его разновидностями – циклопическими постройками и этрусскими подземными сводами – следует греческое, продолжением которого служил римский стиль в соединении с карфагенским куполом. Потом, в Средних веках, как мы уже видели, на смену зодчеству романскому явилось готическое. Классифицируя все эти различные виды зодчества, мы видим, что они составляют, так сказать, три двойные серии, из которых первая половина – зодчество индусское, египетское и романское – символизирует одно понятие: теократию, касту, единство, догмат, миф, бога, а вторая половина – зодчество финикийское, греческое и готическое, при всем различии их форм, – представляет понятие совершенно противоположное: свободу, народ, человека. В зданиях первого порядка, то есть в индусских, египетских и романских, чувствуется влияние одного священнослужителя, как бы он ни назывался: брамином, магом или Папою, между тем как в зданиях, созданных не кастою, а народом, – нечто совершенно иное. Так, в постройках финикийских чувствуется купец, в греческих – республиканец, в готических – буржуа.</p><p class="p1">Теократическое зодчество всегда и всюду отличалось неизменяемостью, боязнью всякого прогресса, строгим сохранением традиционных форм, соблюдением первоначальных типов и постоянным подчинением всех проявлений человеческого бытия и самой природы непостижимой прихоти символа. Произведения этого зодчества – такие темные книги, разобрать которые может только посвященный. В них каждая форма, даже самая уродливая, имеет свой особенный смысл, обеспечивающий ее неприкосновенность. От индусских, египетских или романских зодчих нельзя требовать, чтобы они изменяли свой рисунок и совершенствовали формы своих изваяний. Каждое улучшение для них – кощунство. Здания эпохи теократического зодчества кажутся вдвойне окаменелыми – и по своему материалу, и по неподвижности своих догматических форм. Характерные же особенности зданий народного зодчества, напротив, – стремление к прогрессу, к самобытности, к разнообразию и вечному движению. Народное искусство уже настолько отрешилось от религиозного догмата, что не считает грехом думать и заботиться о своей красоте, беспрестанно украшая свой наряд статуями и арабесками. Такое искусство всегда живет вместе со временем и во всех своих произведениях примешивает присущий ему элемент человечности к религиозному символу, который поневоле еще довлеет над ними. Потому-то эти здания, подобно природе, доступны каждой душе, каждому уму, каждому воображению. Собственно, между зодчеством теократическим и народным та же разница, как между священным языком и народной речью, между иероглифом и искусством, между Соломоном и Фидием.</p><p class="p1">Резюмируя отмеченные в этом беглом обозрении главнейшие данные о зодчестве, которые можно было бы подтвердить множеством примеров, мы получим следующий вывод: зодчество было главною летописью человечества до пятнадцатого столетия нашей эры. В продолжение всего этого громадного промежутка времени не было ни одной более или менее сложной идеи, которая не выразилась бы в виде здания, и каждая народная идея, как и идея религиозная, оставила свои памятники. Человечество не воспринимало ни одной значительной идеи, которую не спешило бы увековечить в форме каменных письмен. Чем же это объяснить? А тем, что каждая мысль, будь она религиозная или философская, стремится увековечить себя. Каждая идея, волновавшая одно поколение, рвется перейти к следующим поколениям и поэтому старается оставить по себе неизгладимый след. Легко уничтожимая рукопись представляет слишком плохую гарантию увековечения мысли, между тем как здание своей прочностью, устойчивостью и способностью сопротивления скорее может обеспечить долговечность. Для уничтожения рукописного слова достаточно какого-нибудь дикаря или горящего факела, а для уничтожения того же слова, вылитого из гранита, нужен целый переворот – общественный или земной. Колизей устоял под напором варваров, а над пирамидами, быть может, пронесся даже целый потоп.</p><p class="p1">В пятнадцатом столетии все изменяется.</p><p class="p1">Человеческая мысль открывает другой способ увековечения, способ, не только еще более прочный и устойчивый, чем зодчество, но несравненно более простой и легкий. Зодчество развенчивается. Каменные буквы Орфея заменяются свинцовыми буквами Гуттенберга.</p><p class="p1"><em>Книга стремится убить здание.</em></p><p class="p1">Изобретение книгопечатания – величайшее событие истории. Оно производит коренной переворот. Способ выражения человеческой мысли совершенно изменяется; мышление облекается в новую форму, отбросив старую. Символическая змея, со времен Адама олицетворявшая разум, сменяет старую шкуру на совершенно новую, небывалую.</p><p class="p1">Благодаря печати человеческая мысль становится уже вполне бессмертною, потому что сделалась крылатою, неуловимою и неуничтожимою. Она начинает носиться в воздухе. Во времена владычества архитектуры мысль превращалась в утес и властно располагалась в одном определенном месте и овладевала одним определенным веком. Но с возникновением печати она превращается в стаю птиц, которая разлетается во все стороны и одновременно наполняет все точки воздуха и пространства.</p><p class="p1">Повторяем, каждому понятно, что эта перемена должна была придать мысли большую несокрушимость. Из прочной она делается живучей, из долговечной превращается в бессмертную. Всякую твердыню можно уничтожить, но как уничтожить вездесущее? Пусть настанет потоп, горы исчезнут под водою, а птицы все-таки будут летать! Достаточно одному ковчегу уцелеть и носиться на поверхности вод, чтобы на него опустились птицы и поплыли вместе с ним. Когда спадут воды и из хаоса потопа возникнет новый мир, то этот мир все-таки увидит витающую над ним крылатую, бессмертную мысль мира погибшего.</p><p class="p1">Можно ли поэтому удивляться, что человеческий разум покинул зодчество ради изобретения Гуттенберга и что книгопечатание не только лучше зодчества обеспечивает сохранение мысли, но в то же время представляется наиболее простым, удобным и легким способом ее выражения? Действительно, книгопечатание не требует громоздких приспособлений, не нуждается в тяжеловесных орудиях. Для того чтобы выразиться в форме здания, мысль должна затратить значительную денежную сумму, призвать к себе на помощь все остальные искусства, срыть целые горы, чтобы добыть необходимый материал, срубить целые леса для устройства подмостков, двинуть целые полчища рабочих. Между тем для того, чтобы выразиться в виде книги, ей нужно немного бумаги, чернил и перьев. Само собою разумеется, что мысль с радостью должна была ухватиться за новый способ облечения ее в осязаемую форму. Пересеките русло реки каналом, прорытым ниже ее уровня, и воды реки тотчас же покинут старое русло.</p><p class="p1">В самом деле, мы видим, как с момента изобретения книгопечатания начинает понемногу сохнуть, атрофироваться и бледнеть зодчество. Так и чувствуется, что вода в этом русле убывает, что жизненные соки этого искусства иссякают, что мысль веков и народов устремилась уже по другому пути. В пятнадцатом столетии эта перемена еще не особенно была заметна. Печатный станок тогда еще недостаточно окреп и поддерживал свое существование только тем, что питался излишком соков процветавшего еще зодчества. Но с шестнадцатого века зодчество уже начинает хиреть так сильно, что это бросается в глаза. Оно перестает быть главным выразителем общественной мысли и, как искусство, ищет жалкой опоры в классицизме, превращаясь из галльского, европейского, самобытного в греко-римское, из современного и правдивого – в ложноантичное. Настает та эпоха упадка зодчества, которая называется эпохою Возрождения. Положим, этот упадок был обставлен очень эффектно. Старый готический гений, представлявший собою как бы солнце, закатывавшееся за исполинским майнцским печатным станком, еще некоторое время золотит своими последними лучами всю эту разнохарактерную смесь латинских аркад и коринфских колоннад.</p><p class="p1">И это заходящее солнце мы принимаем за утреннюю зарю!</p><p class="p1">Лишь только зодчество стало на одну ступень с остальными искусствами, перестав быть главным между ними, поглощавшим все остальные и всецело господствовавшим над ними, – оно потеряло всякое влияние на них. Почувствовав обессиление зодчества, остальные искусства спешат освободиться из-под его гнета и сделаться самостоятельными. И они все выигрывают от этого освобождения. Обособление способствует их развитию. Резьба становится ваянием, рисование превращается в живопись, церковный канон развивается в музыку. Совершается нечто вроде распада империи после смерти Александра, когда провинции делаются государствами.</p><p class="p1">Отсюда появление Рафаэля, Микеланджело, Жана Гужона, Палестрины – этих светочей лучезарного шестнадцатого века.</p><p class="p1">Одновременно с искусствами освобождается со всех сторон и мысль. Католичество было уже сильно поколеблено ересями Средних веков, а шестнадцатый век окончательно расшатал его устои. До книгопечатания реформация была бы только расколом, книгопечатание сделало ее переворотом. Отнимите у ереси печатный станок, и вы обессилите ее. По предопределению или по роковому случаю, но Гуттенберг является предшественником Лютера.</p><p class="p1">И вот когда средневековое солнце совершенно закатилось, когда готический гений навеки угас на горизонте искусства – зодчество отживает свой век, все более и более тускнея, обесцвечиваясь и ухудшаясь. Оно высасывается и пожирается печатною книгою, подобно дереву, подтачиваемому червяком. Зодчество быстро чахнет, лишается своих листьев и сохнет. Оно оскудевает, впадает в убожество, превращается в ничтожество. Оно уже более ничего не выражает, даже воспоминания об искусстве прежних времен. Предоставленное самому себе, покинутое остальными искусствами, потому что человеческая мысль устремилась в другую сторону, оно вместо художников зовет к себе на помощь ремесленников. Расписные оконные стекла заменяются простыми. Скульптор заменяется каменотесом. Прощай всякая самобытность, вся жизненность, вся осмысленность зодчества! Отныне оно, жалкий нищий, будет влачить существование по ремесленным мастерским, пробавляясь плохим подражанием. Микеланджело, очевидно, понимавший, что зодчество в шестнадцатом веке пошло на окончательную убыль, в отчаянии сделал последнюю попытку спасти погибающее искусство. С этой целью он, этот титан искусства, создал собор Святого Петра в Риме, нагромоздив на Парфенон Пантеон. Это великое произведение, достойное того, чтобы остаться единственным в своем роде, было последнею вспышкою творчества в зодчестве, подписью художника-исполина на длинном, многовековом каменном списке, которому уже более не суждено продолжаться. Умер Микеланджело – в чем же тогда стало проявляться убогое зодчество, пережившее само себя в виде бледного призрака? Оно набрасывается на римский собор Святого Петра и начинает делать с него слепки и пародии. Это подражание превращается в жалкую манию. Каждое столетие имеет свой собор Святого Петра; семнадцатое представляет его под названием церкви Валь-де-Грас, восемнадцатое – под названием церкви Святой Женевьевы. Каждая страна обзаводится своим собором Святого Петра; в Париже их два или три, в Петербурге и Лондоне по одному. Это последние усилия воли, последний бред великого умирающего искусства, от дряхлости впавшего в детство перед смертью.</p><p class="p1">Если мы, не вдаваясь в подробности, вглядимся только в общий вид зодчества, за период времени от шестнадцатого до восемнадцатого столетия, то заметим те же признаки упадка и вырождения. Начиная с Франциска II художественная форма здания все более и более сглаживается, из-под нее все заметнее выступает форма чисто геометрическая, как скелет на исхудавшем теле больного. Изящные линии художника уступают место сухим, жестким линиям геометра. Здание перестает быть зданием, оно превращается в простой многогранник. Между тем зодчество тщетно силится скрыть свою наготу. Отсюда происходит то, что в романский фронтон втискивается греческий, и наоборот; повсюду вы видите все тот же Пантеон на Парфеноне – тот же римский собор Святого Петра. Но вот явились кирпичные дома Генриха IV, с углами, обделанными камнем; такими домами застроены Королевская площадь и площадь Дофина. Вот церкви эпохи Людовика XIII – тяжелые, приземистые, неуклюжие, придавленные куполом, точно горбом. Вот зодчество времен кардинала Мазарини – плохая итальянская стряпня в виде училища Четырех наций. Вот дворцы Людовика XIV – длинные, холодные, скучные казармы для придворных. Вот, наконец, и эпоха Людовика XV с ее пучками цикория и червячками, со всеми этими бородавками и наростами, которые так обезображивают лицо старого, беззубого, дряхлого, но все еще молодящегося зодчества. Словом, начиная с Франциска II и до Людовика XV, недуг архитектуры возрастал в геометрической прогрессии. От искусства остались только кожа да кости. Оно медленно умирает.</p><p class="p1">Что же делается в это время с книгопечатанием? Все жизненные силы, покидающие зодчество, вливаются в него. По мере того как зодчество падает, книгопечатание растет и крепнет. Человечество теперь тратит на книги все те силы, которые прежде тратило на здания. Уже в шестнадцатом столетии книгопечатание, сравнявшись ростом с падающим зодчеством, борется с ним и убивает его, а в семнадцатом печать уже настолько могущественна и победоносна, настолько укрепила плоды своей борьбы, что может задать миру великий пир литературного процветания. В восемнадцатом веке она, после продолжительного отдыха при дворе Людовика XIV, снова овладевает старым оружием Лютера, вооружает им Вольтера и шумно устремляется в битву с той старой Европой, которую она уже лишила архитектурного способа выражения. К концу же восемнадцатого столетия печать разрушила все старое, а в девятнадцатом начинает созидать новое.</p><p class="p1">Спросим теперь, которое же из двух этих искусств является за три последних столетия истинным представителем человеческой мысли? Которое из них истолковывает эту мысль, выражает не только ее литературные и школьные направления, но и все ее движение во всей его широте и глубине? Которое из них постоянно, ни на секунду не отставая, неутомимо идет рядом с постоянно подвигающимся вперед тысяченогим чудовищем, называемым человечеством, – зодчество или печать?</p><p class="p1">Разумеется, печать. Не будем обманываться: зодчество умерло и никогда уже более не воскреснет. Оно убито печатною книгою, убито потому, что оно не так прочно, как эта книга, и несравненно дороже стоит. Каждый собор поглощает миллиард. Представьте же себе, какие колоссальные затраты понадобились бы на то, чтобы, так сказать, переписать заново всю архитектурную книгу, чтобы снова покрыть землю тысячами зданий, чтобы воскресить то время, когда, по словам очевидца, количество памятников зодчества было так велико, что, казалось, «и мир стряхнул с себя старые одежды, чтобы покрыться белыми ризами церквей». Erat enim ut si mundus, ipse excutiendo semet, rejecta vetustate, candidam ecclesiarum vestem indueret (Glaber Radulphus).</p><p class="p1">Между тем книга изготовляется так быстро, стоит так дешево и распространяется так легко! Что же удивительного, если человеческая мысль устремляется по этому склону? Впрочем, нельзя сказать, чтобы зодчество уже окончательно лишилось возможности всякого успеха, что оно уже никогда не будет в состоянии дать какого-нибудь единичного образцового произведения. Нет, и при господстве печатного станка зодчество может по временам воздвигать из сплава пушек и при помощи целой армии какую-нибудь колонну, как складывались при господстве зодчества «Илиады» и «Романсеро», «Махабхараты» и «Нибелунги» – эти литературные творения целых народов, слитые воедино из отдельных рапсодий. Случай может вызвать к жизни и в двадцатом столетии гениального зодчего, как он породил в тринадцатом Данте. Но только зодчество уже никогда более не будет искусством общественным, коллективным и главенствующим. Великая поэма, великое здание, великое творение человечества не будет строиться – оно будет печататься.</p><p class="p1">Если зодчеству и удастся случайно вновь подняться, оно не будет более стоять во главе; оно будет подчинено литературе, как литература в свое время была подчинена ему. Взаимоотношение обоих искусств изменится в обратном направлении. Несомненно, что изредка появлявшиеся в эпоху владычества зодчества поэмы имели много сходства с его собственными произведениями. Индийский Вияза, творец «Махабхараты», так же непроницаем, загадочен и странен, как сама пагода. Египетская поэзия отличается той же строгостью очертаний и величавостью, какою отличаются самые здания страны фараонов. В античной Греции в обоих искусствах царят красота, ясность и гармония. В христианской Европе поражают величавость католицизма, наивность народа и богатая, бьющая через край жизнедеятельность эпохи Возрождения. В общем, Библия походит на пирамиды, «Илиада» – на Парфенон, Гомер – на Фидия. Данте в тринадцатом столетии представляет как бы последний храм романского стиля, как Шекспир в шестнадцатом – последний готический собор.</p><p class="p1">Итак, делая окончательный вывод из всего сказанного, по необходимости очень отрывисто и бегло, мы видим, что человечество имеет, так сказать, две книги, два списка, два завета – библию каменную и библию бумажную: зодчество и печать. Бесспорно, сравнивая оба эти завета, обе эти книги, так широко раскрытые перед нами историей, мы невольно поддаемся чувству сожаления о покинутом величии этого гранитного письма, гигантские буквы которого изображались в виде колоннад, пилонов и обелисков, в виде гор, созданных и раскиданных рукою человека по всему лицу земли, начиная с Хеопсовой пирамиды и кончая Страсбургским собором. Будем же перечитывать прошлое, начертанное на этих каменных страницах; будем чаще перелистывать книгу, написанную зодчеством, и восхищаться ею, но не будем ради нее отрицать и величия здания, воздвигнутого в свою очередь печатью.</p><p class="p1">Это здание колоссально. Какой-то статистик-любитель вычислил, что если положить одну на другую все книги, вышедшие из-под печатного станка со времени Гуттенберга, то они могли бы заполнить все расстояние между Землей и Луною. Положим, мы говорим не о таком величии, однако не можем не заметить, что если мы попытаемся вычислить в уме всю сумму произведений печати от начала ее возникновения и до наших дней, то перед нашим воображением действительно возникает такое исполинское здание, которое своим основанием покроет весь земной шар и вершиною затеряется в туманах будущего, потому что оно постоянно увеличивается неустанными трудами всего человечества. Это вечно кишащий муравейник умов – улей, куда все золотистые пчелы воображения сносят свой сладкий мед. Это здание имеет тысячи этажей. Здесь и там в его стенах зияют темные впадины бесчисленных, пересекающих друг друга пещер, выкапываемых в нем наукою. Искусство щедрою рукою украшает это гигантское здание своими арабесками, розетками и кружевами. Каждое отдельное произведение, каким бы причудливым и обособленным оно ни казалось, имеет здесь свое место и находится на виду. Тысячи башен разбросаны в этом здании во всех направлениях, заполняя промежутки между собором Шекспира и мечетью Байрона. На самом же его основании переписаны некоторые из древних грамот человечества, не вошедшие в список зодчества. Налево, у входа, воспроизведен белый мраморный барельеф Гомера, направо возвышает свои семь голов многоязычная Библия. Дальше щетинятся гидра «Романсеро» и некоторые другие гибриды поэзии, Веды и «Нибелунги». Но как ни велико это здание, оно все еще не закончено. Печать, этот гигантский механизм, безостановочно выкачивающий из общества все его соки, неустанно подбавляет новые строительные материалы. Все человечество собралось для работы на лесах этого здания. Каждый ум здесь является каменщиком. Самый смиренный работник кладет свой камень или заделывает еле заметную щель. Ретиф де ла Бретон тащит свою корзину с мусором. Каждый день кладется новый ряд камней. Независимо от самостоятельных трудов отдельных творцов, в бесконечное здание печати вводятся и целые части, созданные коллективно. Восемнадцатый век создает «Энциклопедию», а революция – «Moniteur». Здание печати растет и тянется вверх бесконечными спиралями. Здесь мы присутствуем при смешении всевозможных языков, видим беспрерывную деятельность, неутомимый труд, напряженное соревнование всего человечества, созидание убежища для мысли на случай нового потопа или нашествия варваров. Это вторая Вавилонская башня, возводимая человечеством.</p></span></span></span>
