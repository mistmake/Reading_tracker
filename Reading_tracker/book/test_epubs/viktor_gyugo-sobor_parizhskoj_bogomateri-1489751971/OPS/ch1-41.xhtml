<span><span><span id="id54"><div class="title6">
<p class="p">I. Лихорадка</p>
</div><p class="p1">Клода Фролло уже не было в соборе Богоматери, когда его приемный сын так внезапно разрубил роковой узел, которым несчастный архидьякон связал цыганку, попав в него сам. Войдя в ризницу, священник сорвал с себя облачение, сбросил его на руки удивленного пономаря, выбежал боковою дверью из монастыря и, приказав лодочнику перевезти себя на левый берег Сены, углубился в сеть улиц Университетской стороны, сам не зная, куда он идет, сталкиваясь на каждом шагу с группами мужчин и женщин, оживленно спешивших в сторону моста Сен-Мишель в надежде «поспеть вовремя», чтобы видеть, как будут вешать колдунью. Бледный, заблудившийся, он был более растерян, ослеплен и дик, чем ночная птица, преследуемая днем детьми. Он не знал, где он, о чем думает, наяву ли все это. Он шел, бежал, сворачивал куда попало, не выбирая направления, гонимый прочь Гревской площадью, ужасной Гревской площадью, которую он ощущал позади себя.</p><p class="p1">Так пересек он гору Святой Женевьевы и наконец вышел из города через Сен-Викторские ворота.</p><p class="p1">Он продолжал бежать, пока мог видеть, оглядываясь, верхушки башен Университета и разбросанные дома предместья.</p><p class="p1">Когда же наконец холм окончательно скрыл от его глаз ненавистный Париж, когда ему показалось, что он на расстоянии ста лье от него, в полях, в пустыне, он остановился и почувствовал, что начинает дышать. Тогда в его уме начали роиться страшные мысли. Он ясно увидел свою душу и содрогнулся. Он подумал о несчастной девушке, погубившей его и погубленной им. Он бросил блуждающий взор на извилистый путь их судеб и на ту минуту, когда эти судьбы пересеклись и были безжалостно разбиты одна об другую. Он думал о тщете вечных клятв, о тщете девственности, науки, религии, добродетели, о ненужности Бога. Сердце его испытывало радость от этих страшных мыслей, и, погружаясь в них все больше, он слышал в своей душе сатанинский хохот.</p><p class="p1">Заглянув в свою душу, увидев, сколько страстности природа вложила в нее, он усмехнулся с еще большей горечью. Он всколыхнул всю свою ненависть, всю свою злобу, лежавшие в глубинах его сердца; и, всмотревшись в свою душу холодным взором врача, исследующего больного, он увидал, что эта ненависть, эта злоба была только извращенной любовью, что любовь, источник всех человеческих добродетелей, превращалась в нечто чудовищное в сердце священника, что человек, созданный, как он, становясь священником, превращается в дьявола. Он горько рассмеялся и вдруг побледнел, вспомнив самую мрачную сторону своей извращенной, злобной, беспощадной, ядовитой любви, приведшей цыганку к виселице, его – к аду. Она – приговорена; он – проклят.</p><p class="p1">Он снова засмеялся, подумав о том, что Феб жив; что после всего, что произошло, капитан весел и доволен, что он поведет свою новую возлюбленную смотреть, как будут вешать старую. Его смех усилился, когда он подумал о том, что из всех людей, которым он желал смерти, не избежала ее только цыганка, единственное существо, которое он не ненавидел.</p><p class="p1">От капитана мысль его перенеслась к толпе, и в нем вспыхнула небывалая ревность. Он думал о том, что и народ, весь народ видел женщину, которую он любил, в рубашке, почти обнаженной. Он заломил руки при мысли, что женщина, чье тело, созерцаемое во мраке им одним, было бы для него источником высшего блаженства, была выставлена средь бела дня, в яркий полдень, на поругание, одетая, словно для ночи сладострастия. Он плакал от ярости, вспоминая, что все эти чудеса любви осквернены, обнажены, обесчещены. Он плакал от ярости, думая о том, сколько нечистых взглядов коснулось этой сорочки с распахнутым воротом. Эта чудная девушка, эта чистая лилия, эта чаша чистоты и прелести, к которой он лишь, дрожа, осмеливался приблизить свои уста, превратилась как бы в публичный сосуд, из которого пили теперь сообща все воры, нищие, лакеи, пили нечистое, развратное наслаждение все подонки Парижа!</p><p class="p1">Когда он старался представить себе, каким бы счастьем мог он наслаждаться на земле, если бы она не была цыганкой, а он священником, если бы не существовало Феба и она любила его, – когда он думал, что и для него возможно было бы спокойное счастье, что и в эту минуту есть на свете счастливые пары, воркующие под сенью апельсинных деревьев, у журчащих ручьев, при сиянии заходящего солнца или звездной ночи, что и он, если бы Богу было угодно, мог составить с нею одну из таких благословенных пар, – сердце его разрывалось от нежности и отчаяния.</p><p class="p1">О, эта мысль! Эта страшная, неотступная, постоянно возвращающаяся мысль! Она его грызла, сверлила его мозг, раздирала его внутренности. Он не жалел, не раскаивался, он был готов снова поступить так, как поступил. Он предпочитал видеть ее в руках палача, чем в объятиях капитана, но он страдал, так страдал, что временами вырывал себе клочья волос, чтобы посмотреть, не поседели ли они.</p><p class="p1">Одну минуту ему пришло на ум, что, быть может, в это самое мгновение тяжелая цепь, которую он видел утром, стянула железным узлом нежную шейку. При этой мысли он весь покрылся холодным потом.</p><p class="p1">Затем, дьявольски смеясь над собою, он представил себе Эсмеральду, какою он увидал ее в первый раз: живую, беззаботную, радостную, нарядную, пляшущую, окрыленную и гармоничную, и Эсмеральду последнего дня, в рубашке, с веревкой на шее, медленно всходящую босыми ногами по грубой лестнице виселицы. Он так ясно увидал эту двойную картину, что у него вырвался крик ужаса.</p><p class="p1">В то время как этот ураган отчаяния бушевал, опрокидывая, ломая, вырывая с корнем все в его душе, Клод смотрел на окружающую его природу. У ног его куры ворошили мелкий кустарник, что-то клюя, золотые жучки сверкали на солнце, над головою серые облачка плыли по ясной лазури, на горизонте поднимался шпиль Сен-Викторского аббатства. Мельник на холме Копо, посвистывая, смотрел на вертящиеся крылья своей мельницы. Вся эта деятельная, спокойная, организованная, воплощенная в многообразную форму жизнь причиняла ему боль. Он снова бросился бежать.</p><p class="p1">Так бродил он по полям до вечера. Это бегство от природы, от жизни, от себя самого, от людей, от Бога, от всего длилось весь день. Порой он бросался на землю ничком и вырывал ногтями молодую траву, порой останавливался посреди пустынной деревни, и мысли его становились столь невыносимы, что он хватался руками за голову, будто желая сорвать ее с плеч и разбить о мостовую.</p><p class="p1">Когда солнце начало склоняться к западу, он снова заглянул в свою душу, и ему показалось, что он почти безумен. Буря, происходившая в нем с той минуты, как он потерял надежду и желание спасти цыганку, эта буря не оставила в его сознании ни одной здравой мысли, ни одного ясного представления. Его рассудок лежал распростертый, почти окончательно сломленный. Лишь два образа существовали в его уме: Эсмеральда и виселица. Все остальное было – мрак. Эти два образа сплетались в ужасное видение, и чем больше старался он сосредоточить на них остатки своего внимания и мысли, тем фантастичнее вырастали грациозность, очарование, красота, лучезарность одного образа и тем страшнее становился другой. Наконец Эсмеральда стала казаться ему звездой, а виселица – громадной костлявой рукой.</p><p class="p1">Странно, что во время таких мучений мысль о смерти ни разу не пришла ему в голову. Несчастный был так создан, он любил жизнь. Быть может, он ощущал приближение ада.</p><p class="p1">Тем временем надвигалась ночь. Живое существо, еще шевелившееся в нем, смутно напомнило ему о возвращении. Ему казалось, что он далеко от Парижа, но, оглядевшись, он заметил, что кружил все время вокруг ограды университета. Шпиль Сен-Сюльписа и три высокие иглы Сен-Жермен-де-Пре прорезали горизонт справа от него. Он направился в ту сторону, но, подойдя к зубчатым стенам Сен-Жермена и услыхав оклик часового, свернул на тропинку, пролегавшую между мельницей аббатства и городской больницей, и через несколько минут очутился на окраине Пре-о-Клер. Это был луг, известный буйствами, которые совершались там днем и ночью. Он был гидрой бедных монахов Сен-Жермена: quod monachis sancti Germani pratensis hydra fuit, clerics nova semper dissidiorum capita suscitantibus<a href="ch2.xhtml#id130" class="a">[127]</a>. Архидьякон боялся встретить там кого-нибудь, боялся всякого человеческого лица. Обойдя университет и предместье Сен-Жермен, он хотел попасть на улицы как можно позднее. Обогнув Пре-о-Клер, пройдя по пустынной дорожке, отделявшей его от Дьё-Нёф, он дошел наконец до реки. Там Клод нашел лодочника, который за несколько парижских денье переправил его через Сену до конца Сите и высадил на косу, на которой читатель уже видел мечтавшего Гренгуара и которая тянулась за садами короля, параллельно с островом Погонщика коров.</p><p class="p1">Монотонное покачивание лодки и плеск воды словно убаюкали несчастного Клода. Когда лодочник удалился, он тупо стоял на отлогом берегу, видя перед собой только какие-то неясные фантастические образы. Нередко утомление страданием вызывает такое притупление ума. Солнце скрылось за высокой Нельской башней. Наступали сумерки. Небо было белое, река тоже. Между этими двумя белыми полосами левый берег Сены, к которому были прикованы его глаза, казался темной массой и, уменьшаясь в перспективе, терялся в тумане на горизонте, как черная стрела. На ней стояли дома; можно было различить лишь их темные силуэты, резко очерченные на светлом фоне неба и воды. Кое-где окна начинали светиться огнями, как искры в тлеющей груде углей. Этот громадный черный обелиск между двумя белыми простынями неба и реки, широкой в этом месте, производил на Клода странное впечатление, похожее на то, какое испытывал бы человек, лежащий на спине у подножия Страсбургской колокольни и смотрящий, как огромный шпиль вырисовывается в сумерках над его головой. Только здесь Клод стоял, а обелиск лежал; но так как река, отражая небо, продолжала бездну под ним, огромный мыс казался так же смело вонзившимся в пустоту, как шпиль собора; впечатление было то же самое. Оно было тем более странным и глубоким, что мыс и в самом деле походил на Страсбургскую колокольню, но колокольню в два лье вышиной; нечто неслыханное, гигантское, неизмеримое; здание, какого никогда не видел человеческий глаз: Вавилонская башня. Трубы домов, зубчатые стены, острые коньки крыш, стрела Августинцев, Нельская башня – все эти выступы, бороздящие профиль колоссального обелиска, увеличивали иллюзию, представляясь глазу деталями богатой и фантастической скульптуры.</p><p class="p1">Клод в состоянии, близком к галлюцинации, вообразил, что он видит воочию башню ада. Тысячи огоньков, разбросанные вдоль всей чудовищной башни, казались ему дверцами громадной внутренней печи; шум и говор, вырывавшиеся оттуда, – криками и скрежетом зубовным. Ему стало страшно: он заткнул руками уши, чтобы не слышать, отвернулся, чтобы не видеть, и стал быстро удаляться от страшного видения.</p><p class="p1">Но видение было в нем самом.</p><p class="p1">Когда он опять попал на улицы, прохожие, толкавшиеся при свете, вырывавшемся из лавок, казались ему призраками. Странный шум гудел у него в ушах, странные фантазии волновали мозг. Вместо домов, повозок, людей он видел хаос неопределенных предметов, сливавшихся между собою. На углу улицы Барильери была бакалейная лавка, перед входом в которую, по незапамятному обычаю, вместо вывески висел железный обруч со связкой сделанных из дерева свечей, которые от ветра стучали друг об друга, как кастаньеты. Ему показалось, что это стучат в темноте кости скелетов с кладбища Монфокон.</p><p class="p1">– О, – прошептал он, – ночной ветер гонит их, и вместе со стуком цепей слышится стук костей! Может быть, и она уже между ними!</p><p class="p1">Растерянный, не сознавая, куда он идет, он очутился на мосту Святого Михаила. Окно в нижнем этаже одного из домов было освещено. Он приблизился. Сквозь тусклое стекло была видна комната, что-то смутно напоминавшая ему. В этой плохо освещенной комнате веселый, свежий белокурый молодой человек со смехом целовал девушку, не особенно скромно одетую. Около лампы старуха пряла и пела надтреснутым голосом. Когда юноша переставал смеяться, отрывки песни долетали до слуха священника. Это было что-то непонятное и ужасное:</p><div class="poem">
<div class="stanza">
<p class="v">Grèvе, aboye, Grève, grouille!</p>
<p class="v">File, file, ma quenouille,</p>
<p class="v">File sa corde au boureau,</p>
<p class="v">Qui siffle dans le prèau,Grève, aboye, Grève, grouille!</p>
<p class="v">La belle corde de chanvre!</p>
<p class="v">Semez d’Issy jusqu’a Vanvre</p>
<p class="v">Du chanvre et non pas du blè.</p>
<p class="v">Le voleur n’a pas volè</p>
<p class="v">La belle corde de chanvre.</p>
<p class="v">Grève, grouille, Grève, aboys.</p>
<p class="v">Pour voir la fille de joie</p>
<p class="v">Pendre aux gibeet chassieux.</p>
<p class="v">Les fen tres sont des yeux.</p>
<p class="v">Grève, grouille, Grève, aboye!<a href="ch2.xhtml#id129" class="a">[128]</a></p>
</div>
</div><p class="p1">Молодой человек хохотал и ласкал девушку. Старуха была Фалурдель; девушка была из гулящих. Молодой человек был его брат, Жан.</p><p class="p1">Он продолжал смотреть. Не все ли равно на что?</p><p class="p1">Он видел, как Жан подошел к окну в глубине комнаты, открыл его, взглянул на набережную, где вдалеке сверкали тысячи освещенных окон, и слышал, как Жан произнес, закрывая окно:</p><p class="p1">– Клянусь, вот уже и ночь. Горожане зажигают огни, а Бог – звезды.</p><p class="p1">Потом Жан подошел к девке, разбил бутылку, стоявшую на столе, и воскликнул:</p><p class="p1">– Уже пуста, проклятая! У меня больше нет денег! Изабо, друг мой, я не буду доволен Юпитером, пока он не превратит твои белые груди в черные бутылки, из которых я буду день и ночь сосать бонское вино!</p><p class="p1">Девушка рассмеялась этой шутке, и Жан вышел. Клод едва успел броситься на землю, чтобы не столкнуться с братом лицом к лицу и не быть узнанным. К счастью, улица была темна, а студент пьян. Но он все же заметил архидьякона, лежавшего в грязи на мостовой.</p><p class="p1">– Ого! – сказал он. – Вот этот весело провел время. – Он тронул ногой Клода, затаившего дыхание. – Мертвецки пьян, – заметил он. – Напился, как пиявка. Лысый, – продолжал он, нагнувшись, – старик! Fortunate senex!<a href="ch2.xhtml#id128" class="a">[129]</a></p><p class="p1">И Клод услышал, как он удаляется, говоря:</p><p class="p1">– А все-таки разум великая вещь, и мой брат архидьякон счастлив, что он добродетелен и имеет много денег.</p><p class="p1">Тогда архидьякон встал и, не останавливаясь, добежал до собора Богоматери, огромные башни которого возвышались в темноте над домами. Когда он, запыхавшись, дошел до площадки, он отступил, не смея поднять глаз на роковое здание.</p><p class="p1">– О, – прошептал он, – разве может быть, чтоб это случилось здесь, сегодня утром?</p><p class="p1">Клод решился поднять глаза на церковь. Фасад был темен. Небо за ним сияло звездами. Серп луны, недавно показавшийся из-за горизонта, остановившийся в эту минуту над правой башней, казался блестящей птицей, севшей на балюстраду с вырезанными черными трилистниками.</p><p class="p1">Ворота монастыря были заперты. Но у архидьякона всегда был при себе ключ от той башни, где находилась его лаборатория. Он воспользовался этим ключом, чтобы проникнуть в собор.</p><p class="p1">Там было тихо и мрачно, как в подземелье. По длинным теням вокруг он понял, что занавеси утренней церемонии еще не сняты. Большой серебряный крест местами переливался в темноте сверкающими точками, как Млечный Путь. Стрельчатые верхушки длинных окон на хорах поверх черных занавесей, освещенные луной, блестели неверными ночными тонами, лиловатыми, белыми, голубоватыми, какие бывают на лицах умерших. Архидьякону казалось, что эти верхушки окон – митры проклятых епископов. Он закрыл глаза, и, когда снова открыл их, они показались ему рядом бледных лиц, которые смотрели на него.</p><p class="p1">Он побежал по храму, но ему показалось, что храм зашевелился, ожил, что каждая колонна сделалась громадной лапой, опиравшейся на пол, и что весь громадный собор обратился в чудесного слона, который пыхтел и топтался толстыми столбами вместо ног, с башнями вместо хоботов и темными драпировками вместо попоны.</p><p class="p1">Горячка и безумие Клода дошли до того, что внешний мир превратился для несчастного в какой-то видимый, ощутимый, страшный апокалипсис.</p><p class="p1">Ему сделалось немного легче, когда, направившись в боковой придел, он заметил за колоннами красноватый огонек. Он направился к нему, как к путеводной звезде. Это была бедная лампадка, горевшая день и ночь над общественным молитвенником Пресвятой Девы, покрытым железной сеткой. Он жадно бросился к святой книге в надежде найти там утешение или опору. Книга была открыта на странице из Иова, которую он пробежал взглядом: «Дух пронесся перед лицом моим. Я почувствовал его дуновение, и волосы мои поднялись дыбом».</p><p class="p1">При чтении этих зловещих слов он почувствовал то, что почувствовал бы слепец, ужаленный палкой, поднятой им. Колени его подкосились, и он опустился на землю, думая о той, которая умерла сегодня. Он чувствовал, что его мозг обволакивает чудовищный дым, и ему показалось, что голова его превратилась в адскую печь.</p><p class="p1">Клод долго оставался в этом положении, не думая, безвольно предаваясь терзавшему его демону. Наконец он немного оправился и решился спастись в свою башню, к верному Квазимодо. Он встал и, так как ему было страшно, взял лампадку, висевшую над молитвенником, чтобы посветить себе. Это было кощунство, но он уже не обращал внимания на такие мелочи.</p><p class="p1">Клод медленно поднимался по лестнице башни, полный тайного ужаса, который, должно быть, разделяли и редкие прохожие на площади при виде таинственного огонька, поднимавшегося в такой час от бойницы к бойнице на колокольню.</p><p class="p1">Вдруг он почувствовал на своем лице свежесть и очутился перед дверью верхней галереи. Воздух был холоден; белые облака двигались, громоздясь друг на друга, словно вскрывшаяся после зимы река, серп луны казался кораблем, затертым этими воздушными льдами.</p><p class="p1">Опустив глаза, он взглянул сквозь решетку, соединяющую обе башни, сквозь дымку тумана, вдаль, на молчаливую толпу парижских крыш, острых, бесчисленных, сжатых и маленьких, как волны тихого моря в летнюю ночь.</p><p class="p1">Луна бросала слабые лучи, окрашивавшие небо и землю в пепельный цвет.</p><p class="p1">В эту минуту раздался хриплый звук часов. Пробило полночь. Священник вспомнил о полудне; с тех пор прошло двенадцать часов.</p><p class="p1">«О, – подумал он, – теперь она уже окоченела!»</p><p class="p1">Вдруг порыв ветра погасил лампаду, и в ту же минуту Клод увидел в противоположном углу башни тень, белизну, облик, женщину. Он вздрогнул. Около женщины была козочка, проблеявшая вместе с последним ударом часов.</p><p class="p1">У него хватило сил посмотреть. Это была она.</p><p class="p1">Она была бледна и сурова. Ее волосы падали на плечи, как утром. Но веревки на шее не было, и руки не были связаны. Она была свободна – она была мертва!</p><p class="p1">Она была одета в белое, и белая вуаль покрывала ей голову. Она тихо приближалась к нему, смотря на небо. Сверхъестественная коза следовала за ней. Клод окаменел и не мог бежать. При каждом ее шаге он лишь отступал на шаг назад. Он дошел таким образом до темного свода лестницы. Его леденила мысль, что она вступит туда же, и, если бы она это сделала, он умер бы от ужаса.</p><p class="p1">Она действительно подошла к лестнице, остановилась на минуту, пристально посмотрела в темноту, не заметила священника и прошла. Она показалась ему выше ростом, чем при жизни. Он видел, как луна просвечивала сквозь ее белое одеяние; он слышал ее дыхание.</p><p class="p1">Когда она прошла, он стал спускаться с лестницы медленно, как виденный им призрак. Он сам себе казался привидением, его редкие волосы стояли дыбом, в руках он все еще держал потухшую лампаду. Спускаясь по спиральной лестнице, Клод ясно слышал над своим ухом голос, смеющийся и повторяющий: «Дух пронесся перед лицом моим. Я почувствовал его дуновение, и волосы мои поднялись дыбом».</p></span><span id="id55"><div class="title6">
<p class="p">II. Горбатый, одноглазый, хромой</p>
</div><p class="p1">Все города во Франции до царствования Людовика XII имели свои места убежища. Среди потопа карающих законов и варварских юрисдикций эти убежища возвышались, как острова, над уровнем человеческого правосудия. Всякий преступник, вступивший на них, был спасен. В каждом округе мест убежища было столько же, сколько мест наказания. Это было злоупотребление безнаказанностью рядом со злоупотреблением казнью – два зла, которые стремились уравновесить друг друга. Дворцы, дома принцев, церкви обладали правом убежища. Иногда, когда хотели населить город, его целиком делали местом убежища. Людовик XI в 1467 году сделал убежищем Париж.</p><p class="p1">Вступив в убежище, преступник становился священным. Но он уже не должен был выходить. Один шаг – и он снова валился в бездну. Колесо, виселица ждали свою жертву и кружились вокруг нее, как акулы вокруг корабля. Многие осужденные доживали до седых волос в монастыре, на лестнице дворца, в саду аббатства, под портиком церкви, так что убежище становилось в то же время и тюрьмой.</p><p class="p1">Случалось, что, по торжественному постановлению парламента, извлекали преступника из убежища и передавали палачу, но это бывало очень редко. Члены парламента боялись епископов, и, когда они друг с другом сталкивались, мантия оказывалась бессильной против сутаны. Иногда, как было в деле убийц Пети-Жана, парижского палача, и в деле Эмери Руссо, убийцы Жана Валера, правосудие действовало вопреки Церкви и приводило в исполнение свои приговоры. Но, кроме как по постановлению парламента, горе тому, кто посмел нарушить право убежища вооруженной рукой. Все знают, какою смертью погибли Робер Клермонский, маршал Франции, и Жан де Шалон, маршал Шампани, а речь шла всего лишь о Перрене Марке, служащем у менялы, о жалком убийце; но маршалы разбили двери церкви Сен-Мери. В этом и заключался их проступок.</p><p class="p1">Убежища уважались до такой степени, что предание говорит, будто даже звери подчинялись этому чувству. Эмуан рассказывает, что олень, преследуемый Дагобером, укрылся около гробницы святого Дениса, и свора собак сразу остановилась и перестала его преследовать.</p><p class="p1">В церквах обыкновенно находилась келья, принимавшая спасающихся. В 1407 году Николай Фламель построил для них под сводами Сен-Жак-де-ла-Бушри комнату, которая обошлась ему в четыре ливра шесть солей шестнадцать парижских денье.</p><p class="p1">В соборе Богоматери она была на крыше, под сводами, против монастыря, в том месте, где теперь привратница устроила себе садик, так же похожий на висячие вавилонские сады, как кустик салата на пальму, а сама привратница на Семирамиду.</p><p class="p1">Туда после своего яростного и победного бега по башням и галереям Квазимодо поместил Эсмеральду. В продолжение этого бега молодая девушка, еще не очнувшаяся, наполовину спящая, наполовину бодрствующая, чувствовала только, что она несется по воздуху, летит куда-то, что кто-то приподнял ее от земли. Время от времени она слышала смех и громкий голос Квазимодо и открывала глаза. Смутно представлялся ей Париж черепичной мозаикой своих сине-красных крыш, но когда взгляд ее случайно попадал на страшное и радостное лицо Квазимодо, она закрывала глаза и думала, что все кончено, что ее убили во время обморока и что безобразный дух, руководивший ее судьбой, завладел ею и уносит ее. Она боялась смотреть на него и покорялась.</p><p class="p1">Но когда всклокоченный и задыхающийся звонарь опустил ее в келье, когда его огромные руки стали осторожно развязывать веревку, до боли тершую ей руки, она ощутила толчок, какой пробуждает пассажиров корабля, внезапно снявшегося с якоря среди ночи. Мысли ее понемногу прояснились. Девушка поняла, что она в соборе Богоматери, и вспомнила, что ее спасли из рук палача, что Феб жив, что Феб ее больше не любит. Когда эти две мысли, из которых одна делала такой горькой другую, ясно представились бедной осужденной, она обратилась к Квазимодо, стоявшему перед ней и пугавшему ее своим видом, и сказала:</p><p class="p1">– Зачем вы меня спасли?</p><p class="p1">Он тревожно смотрел на нее, стараясь понять, что она говорит. Она повторила вопрос. Тогда он бросил на нее глубокий, грустный взгляд и быстро удалился.</p><p class="p1">Она была удивлена.</p><p class="p1">Через несколько минут он вернулся и опустил к ее ногам узел. Это была одежда, положенная для нее на паперть добрыми женщинами. Тогда она оглянулась на себя, увидела, что почти обнажена, и покраснела. Жизнь возвращалась.</p><p class="p1">Квазимодо, казалось, почувствовал ее стыд; он закрыл глаза рукою и опять вышел медленными шагами.</p><p class="p1">Она поторопилась одеться. В узле оказались белое платье и белое покрывало – одежда послушницы.</p><p class="p1">Едва она оделась, как вернулся Квазимодо. Он нес корзину и тюфяк. В корзине был хлеб, бутылка вина и еще кое-какая провизия. Он поставил корзину и сказал:</p><p class="p1">– Кушайте. – Затем, постлав на пол тюфяк, прибавил: – Спите!</p><p class="p1">Звонарь принес ей собственный обед и собственную постель. Цыганка подняла глаза, чтобы поблагодарить его, но не могла выговорить ни слова. Он был так ужасен, что она, вздрогнув, опустила голову.</p><p class="p1">Тогда Квазимодо проговорил:</p><p class="p1">– Я вас пугаю. Я безобразен, не правда ли? Не смотрите на меня. Слушайте меня только. Днем вы будете оставаться тут; ночью вы можете гулять по всей церкви. Но из церкви не выходите ни днем, ни ночью. Вы погибнете. Вас убьют. А я умру.</p><p class="p1">Тронутая, она подняла голову, чтобы ответить, но он уже исчез. Оставшись одна, она задумалась над странными словами этого чудовища, над звуком его голоса, грубого и нежного в одно и то же время.</p><p class="p1">Потом девушка осмотрела свою келью. Это была комната в шесть квадратных футов, с маленьким окном и с дверью, выходившею на слегка покатую крышу из плоских кирпичей. Несколько водосточных труб с изображениями животных точно заглядывали в ее окошечко. Под крышей виднелись верхушки тысяч труб, несших в ее сторону дым чуть ли не всех печей Парижа. Грустный вид для бедной безродной цыганки, приговоренной к смерти, для одинокого создания без родины, без семьи, без очага!</p><p class="p1">В ту минуту, как она особенно сильно почувствовала свое одиночество, чья-то мохнатая бородатая голова скользнула по ее рукам и коленям. Она вздрогнула: все пугало ее теперь. Это была ее бедная козочка, ее Джали, которая последовала за нею, когда Квазимодо отбил ее от стражи Шармолю, и которая уже давно терлась у ее ног, расточая ласки, чтобы обратить на себя внимание своей хозяйки. Цыганка покрыла ее поцелуями.</p><p class="p1">– О, Джали, – говорила она, – я забыла о тебе! Но ты все время помнила обо мне! О, какая я неблагодарная!</p><p class="p1">И она заплакала, как будто невидимая рука сняла тяжесть, так долго угнетавшую ее сердце. Вместе с этими слезами растворялось все самое жгучее, все самое горькое, что было в ее душе.</p><p class="p1">Когда наступила ночь, она показалась ей такой прекрасной, луна – такой нежной, что она обошла верхнюю галерею церкви. Земля показалась ей с этой высоты такой мирной, что она почувствовала облегчение.</p></span><span id="id56"><div class="title6">
<p class="p">III. Глухой</p>
</div><p class="p1">На другое утро она заметила, что хорошо выспалась. Это ее удивило. Она уже так давно отвыкла от сна. Веселый луч восходящего солнца проходил в окошечко и падал ей на лицо. Вместе с солнцем она увидала в окошечке и нечто страшное: лицо несчастного Квазимодо. Невольно она закрыла глаза, но и сквозь закрытые веки ей казалось, что она видит эту одноглазую, зубастую маску. Тогда она услышала грубый голос, кротко говоривший:</p><p class="p1">– Не бойтесь. Я ваш друг. Я смотрел, как вы спите. Ведь вам от этого не больно, когда я смотрю на вас. Не все ли вам равно, что я здесь, когда глаза у вас закрыты. А теперь я уйду. Вот! Я встал за стеной. Вы можете открыть глаза.</p><p class="p1">Выражение, с которым это говорилось, было еще грустнее самих слов. Тронутая цыганка открыла глаза. Его действительно не было в окошке. Девушка подошла к окну и увидала бедного хромого, спрятавшегося за стеной в грустной и покорной позе. Она сделала над собой усилие, преодолевая отвращение, которое он ей внушал, и тихо сказала:</p><p class="p1">– Подите сюда!</p><p class="p1">По движению губ Квазимодо подумал, что она гонит его. Он опустил голову и стал медленно удаляться, хромая, боясь даже поднять на молодую девушку свой взгляд, полный отчаяния.</p><p class="p1">– Подите сюда! – крикнула она; но он продолжал удаляться.</p><p class="p1">Тогда она выскочила из кельи, подбежала к нему и взяла его за руку. Почувствовав ее прикосновение, Квазимодо задрожал всем телом. Он поднял на нее умоляющий взгляд; когда он увидел, что она удерживает его, все лицо его осветилось радостью и нежностью. Она хотела, чтобы он вошел в ее комнату, но он остановился на пороге.</p><p class="p1">– Нет, нет, – сказал он, – сова не должна входить в гнездо жаворонка.</p><p class="p1">Она грациозно уселась на свое ложе. Козочка спала у ее ног. Несколько минут Эсмеральда и Квазимодо молчали и рассматривали: он – такую красоту, она – такое безобразие. Каждую минуту она находила в нем новые уродства: ее взгляд перебегал с кривых колен на горб, с горба на единственный глаз. Она не могла понять, как существует такое уродливое создание! Впрочем, в нем было столько грусти и нежности, что она начинала привыкать к нему.</p><p class="p1">Квазимодо заговорил первый:</p><p class="p1">– Вы сказали мне, чтоб я вернулся?</p><p class="p1">Она кивнула головой, произнеся:</p><p class="p1">– Да.</p><p class="p1">Он понял ее кивок.</p><p class="p1">– Увы, – нерешительно сказал он, – ведь я… глухой.</p><p class="p1">– Бедный! – вскричала с видом ласкового сострадания цыганка.</p><p class="p1">Он печально улыбнулся.</p><p class="p1">– Вы находите, что только этого мне недоставало, не правда ли? Да, я глух и безобразен. Это ужасно, что я такой, не правда ли? А вы, вы так прекрасны!</p><p class="p1">В голосе несчастного было такое глубокое сознание своего горя, что она не имела силы ответить ему. Да он ее бы и не услышал.</p><p class="p1">Квазимодо продолжал:</p><p class="p1">– Я никогда не сознавал так своего безобразия, как теперь. Когда я сравниваю себя с вами, мне жалко самого себя, бедного урода! Я вам кажусь зверем, не так ли? А вы, вы – луч солнца, вы – капля росы, вы – пение птицы! Я ужасен: ни зверь, ни человек, я тверже, безобразнее булыжника, который топчут ногами.</p><p class="p1">Он засмеялся, и смех этот надрывал душу. Затем он продолжал:</p><p class="p1">– Да, я глух. Но вы можете говорить со мной жестами, знаками. У меня есть учитель, который так говорит со мной. Я скоро привыкну узнавать ваши желания по движению губ, по глазам.</p><p class="p1">– Ну, так скажите мне, – проговорила она, улыбаясь, – зачем вы спасли меня?</p><p class="p1">Он внимательно присматривался к ней.</p><p class="p1">– Я понял, – сказал он. – Вы спрашиваете, зачем я вас спас? Вы забыли несчастного, который как-то ночью хотел украсть вас и которому вы же на следующий день подали помощь на проклятом позорном столбе. За эту каплю воды и за вашу жалость я могу заплатить только своей жизнью. Вы забыли этого несчастного, но он не забыл вас!</p><p class="p1">Она слушала его, глубоко тронутая. Слезы было навернулись на глаза звонаря, но он удержал их.</p><p class="p1">– Послушайте, – продолжал он, почувствовав, что не заплачет, – у нас тут высокие башни, человек, упавший с одной из них, умрет раньше, чем долетит до мостовой. Когда вы пожелаете, чтоб я бросился, вам не нужно будет произнести ни слова, – одного взгляда будет достаточно.</p><p class="p1">Он встал. Это странное существо возбуждало сожаление бедной цыганки. Она сделала ему знак остаться.</p><p class="p1">– Нет, нет, – сказал он, – я не должен оставаться слишком долго. Я неспокоен, когда вы смотрите на меня. Вы из жалости не отворачиваете от меня глаз. Я пойду куда-нибудь, откуда буду видеть вас, а вам не будет нужно смотреть на меня. Так будет лучше.</p><p class="p1">Он вынул из кармана металлический свисток.</p><p class="p1">– Возьмите, – сказал он, – и когда вам нужно будет меня, когда вы захотите, чтоб я пришел, когда вам не так будет противно видеть меня, – засвистите. Этот звук я слышу.</p><p class="p1">Он положил свисток на пол и скрылся.</p></span></span></span>
