<p class="p">7. Баркильфедро пробивает себе дорогу</p>
</div><p class="p1">Прежде всего люди спешат проявить неблагодарность.</p><p class="p1">Не преминул поступить таким образом и Баркильфедро.</p><p class="p1">Облагодетельствованный Джозианой, он, конечно, только и думал о том, как бы ей за это отомстить.</p><p class="p1">Напомним, что Джозиана была красива, высока ростом, молода, богата, влиятельна, знаменита, а Баркильфедро уродлив, мал, стар, беден, зависим и безвестен. За все это, разумеется, надо было отомстить.</p><p class="p1">Может ли тот, кто воплощает мрак, простить тому, кто полон блеска?</p><p class="p1">Баркильфедро был ирландец, отрекшийся от Ирландии, – самый дрянной человек.</p><p class="p1">Только одно говорило в пользу Баркильфедро – его большой живот.</p><p class="p1">Большой живот обычно считается признаком доброты. Но чрево Баркильфедро было сплошным лицемерием: он был злым человеком.</p><p class="p1">Сколько лет было Баркильфедро? Трудно сказать. Столько, сколько требовали обстоятельства. Морщины и седина придавали ему старческий вид, а живость ума говорила о молодости. Он был и ловок и неповоротлив; что-то среднее между обезьяной и гиппопотамом. Роялист? Конечно. Республиканец? Как знать! Католик? Может быть. Протестант? Несомненно. За Стюартов? Вероятно. За Брауншвейгскую династию? Очевидно. Быть «за» выгодно только тогда, когда ты в то же время и «против», – Баркильфедро придерживался этого мудрого правила.</p><p class="p1">Должность «откупорщика океанских бутылок» на самом деле не была такой уж нелепой, какою она казалась со слов Баркильфедро. Гарсиа Феррандес в своем «Морском путеводителе» протестовал против разграбления потерпевших крушение судов и расхищения прибрежными жителями выброшенных морем вещей; протест, который в наши дни был бы сочтен простым витийством, произвел в Англии сенсацию и принес пострадавшим от кораблекрушения ту выгоду, что с тех пор их имущество уже не растаскивалось крестьянами, а конфисковывалось лорд-адмиралом.</p><p class="p1">Все, что выбрасывало море на английский берег, – товары, остовы судов, тюки, ящики и прочее, – все принадлежало лорд-адмиралу (в том-то и заключалась значительность должности, о которой ходатайствовал Баркильфедро); особенно привлекали внимание адмиралтейства плававшие на поверхности моря сосуды, содержавшие в себе всякие известия и сообщения. Кораблекрушения – вопрос, серьезно занимающий Англию. Жизнь Англии в мореплавании, и потому кораблекрушения составляют вечную ее заботу. Море причиняет ей постоянное беспокойство. Маленькая стеклянная фляжка, брошенная в море гибнущим кораблем, содержит в себе важные и ценные со всех точек зрения сведения – сведения о судне, об экипаже, времени и причине крушения, о ветрах, потопивших корабль, о течении, прибившем фляжку к берегу. Должность, которую занимал Баркильфедро, уничтожена более ста лет тому назад, но в свое время она действительно приносила пользу. Последним «откупорщиком океанских бутылок» был Вильям Хесси из Доддингтона в Линкольне. Человек, исполнявший эту обязанность, являлся как бы докладчиком обо всем, что происходит в море. Ему доставлялись все запечатанные сосуды, бутылки, фляжки, выброшенные прибоем на английский берег; он один имел право их вскрывать, он первый узнавал их тайну; он разбирал их и, снабдив ярлыками, записывал в реестр; отсюда и пошло до сих пор еще употребляемое на островах Ла-Манша выражение: «водворить плетенку в канцелярию». Правда, была принята одна мера предосторожности: все эти сосуды могли быть распечатаны только в присутствии двух представителей адмиралтейства, приносивших присягу не разглашать тайну и совместно с чиновником, заведующим отделом Джетсон, подписывавших протокол о распечатании. Так как оба «присяжных» были связаны своим клятвенным обязательством, то для Баркильфедро открывалась некоторая свобода действий, и в известной мере от него одного зависело скрыть какой-либо факт или предать его гласности.</p><p class="p1">Эти хрупкие находки были далеко не такими редкими и незначительными, как Баркильфедро говорил Джозиане. Иногда они довольно быстро достигали земли, иногда на это требовались долгие годы, – все зависело от ветров и течений. Обычай бросать в море бутылки теперь почти вывелся, так же как и обычай вешать ex voto<a href="ch2.xhtml#id252" class="a">[188]</a> перед изображениями святых, но в те времена люди, смотревшие в глаза смерти, любили таким способом посылать Богу и людям свои последние мысли, и иногда в адмиралтействе скоплялось много подобных посланий.</p><p class="p1">Пергамент, хранящийся в Орлеанском замке и подписанный графом Сэффолком, лорд-казначеем Англии при Иакове I, гласит, что в течение одного только 1615 года в адмиралтейство было доставлено и зарегистрировано в канцелярии лорд-адмирала пятьдесят две штуки засмоленных склянок, банок, бутылок и фляг, содержавших известия о гибнущих кораблях.</p><p class="p1">Придворные должности похожи на капли масла, которые, расплываясь, постепенно захватывают все более широкое поле. Таким путем привратник становится канцлером, а конюх – коннетаблем. На должность, которую выпрашивал и получил Баркильфедро, назначался обычно человек, облеченный доверием. Так пожелала Елизавета. При дворе доверие подразумевает под собой интригу, а интрига означает повышение в чинах. Чиновник этот в конце концов стал в некотором роде значительной персоной. Он был клерком и в придворной иерархии следовал непосредственно за двумя раздатчиками милостыни. Он имел право входа во дворец, – правда, скромного входа (humilis introitus), но перед ним открывались двери даже королевской спальни; обычай требовал, чтобы в некоторых случаях он оповещал королевскую особу о своих находках, часто весьма любопытных: в них бывали завещания людей, потерявших всякую надежду остаться в живых, прощальные письма родным, сообщения о хищениях груза и других преступлениях, совершенных в море, дарственные записи в пользу короны и т. д.; «откупорщик океанских бутылок» поддерживал непосредственные сношения с двором и время от времени давал королю отчет о вскрытых им находках. Это был «черный кабинет» по делам океана.</p><p class="p1">Елизавета, охотно говорившая по-латыни, спрашивала обычно у Темфилда из Колея в Беркшире, который занимал при ней должность чиновника Джетсон и вручал ей такие выброшенные морем послания:</p><p class="p1">– Quid mihi scribit Neptunus? (Что пишет мне Нептун?)</p><p class="p1">Ход был проделан. Термит добился своего. Баркильфедро проник к королеве.</p><p class="p1">Это было именно то, к чему он стремился.</p><p class="p1">Чтобы создать свое благополучие?</p><p class="p1">Нет.</p><p class="p1">Чтобы разрушить благополучие других.</p><p class="p1">Это гораздо приятнее.</p><p class="p1">Вредить ближнему – высшее наслаждение.</p><p class="p1">Далеко не всем дано испытывать смутное, но необоримое желание причинять другому вред и ни на минуту не забывать о своем намерении. Баркильфедро был удивительно настойчив. В осуществлении своих замыслов он отличался мертвой хваткой бульдога. Он испытывал мрачное удовлетворение от сознания собственной непреклонности. Только бы чувствовать в своих руках добычу или хотя бы знать, что зло будет нанесено неизбежно, – больше ему ничего не надо было.</p><p class="p1">Он готов был сам дрожать от холода, лишь бы этот холод заморозил другого. Быть злым – роскошь. Человек, который слывет бедным, да и на самом деле беден, обладает одним лишь сокровищем, от которого он не откажется ни за какие другие; это сокровище – его злоба. Все дело в удовлетворении, которое испытываешь, сыграв с кем-нибудь скверную штуку. Эта радость дороже всяких денег. Чем хуже для жертвы, тем лучше для шутника. Кэтсби, сообщник Гая Фокса в пороховом заговоре папистов, говорил: «Я и за миллион фунтов стерлингов не отказался бы от радости увидеть, как взлетает в воздух парламент».</p><p class="p1">Кто был Баркильфедро? Самым ничтожным и самым ужасным существом. Завистником.</p><p class="p1">При дворе зависть всегда найдет себе применение. Там много наглецов, бездельников, богатых лодырей, жадных до сплетен, искателей соломинки в чужом глазу, злопыхателей, осмеянных насмешников, глупых остряков, и все они нуждаются в услугах завистника.</p><p class="p1">Как отрадно послушать хулу на своего ближнего!</p><p class="p1">Из завистников выходят ловкие шпионы.</p><p class="p1">Между врожденной страстью – завистью и развившимся в обществе особым ремеслом – шпионством есть глубокое сходство. Шпион, как собака, выслеживает добычу для других; завистник, как кошка, выслеживает ее для себя.</p><p class="p1">Звериный эгоизм – вот существо завистника.</p><p class="p1">У Баркильфедро были другие особенности: он был скромен, скрытен, но всегда ставил себе определенную цель. Он все хранил про себя и копил в себе злобу. Великая низость идет об руку с великим тщеславием. К Баркильфедро благоволили те, кого он забавлял, остальные ненавидели его; но он чувствовал, что ненавидящие относятся к нему с пренебрежением, а благосклонные – с презрением.</p><p class="p1">Он постоянно сдерживал себя. Под личиной враждебной покорности в нем кипели оскорбленные чувства. Он возмущался, как будто негодяи имеют право на негодование. Ярость, не дававшая ему ни минуты покоя, никогда не проявлялась у него внешне. Он был способен вынести любые оскорбления. Его терзали мрачные порывы злобы и пожирало вечно тлевшее в его душе пламя, но никто об этом даже не догадывался. Втайне Баркильфедро был холерик, но он всегда улыбался. Он был обходителен, услужлив, учтив и угодлив. Он кланялся всем и каждому. Малейшее, дуновение ветерка склоняло его до земли. Легко добиться счастья тому, у кого вместо позвоночного столба гибкая тростинка.</p><p class="p1">Таких скрытных и ядовитых людей больше, чем мы думаем. Они зловеще шныряют вокруг нас. Зачем они существуют на свете? Какой мучительный вопрос! Его постоянно задает себе мечтатель и никогда не может разрешить мыслитель. Поэтому печальные взоры философов всегда устремлены к той сумрачной вершине, которую именуют роком и с высоты которой огромный призрак зла бросает на землю пригоршни змей.</p><p class="p1">У Баркильфедро было тучное тело и худое лицо. На жирном туловище узкая головка. У него были короткие, плоские рубчатые ногти, узловатые пальцы, жесткие волосы, далеко расставленные друг от друга глаза, лоб преступника, широкий и низкий. Раскосые глаза с подлым выражением прятались под нависшими бровями. Длинный, острый, горбатый нос почти соприкасался со ртом. Если бы облачить Баркильфедро в одежду римских императоров, он был бы похож на Домициана. Его желтое лицо казалось вылепленным из какой-то клейкой массы, а неподвижные щеки – из воска; множество продольных и поперечных морщин свидетельствовали о всевозможных пороках; у него была широкая нижняя челюсть, тяжелый подбородок и большие мясистые уши. Когда он молчал, из-под верхней губы, приподнятой острым углом, видны были, при взгляде на него сбоку, два зуба. Казалось, эти зубы смотрят на вас. Ведь зубы могут смотреть, так же как глаза – кусаться.</p><p class="p1">Терпеливость, сдержанность, умеренность, осторожность, скромность, любезность, уступчивость, мягкость, вежливость, трезвость и целомудрие – все эти добродетели дополняли и совершенствовали образ Баркильфедро. То, что он обладал ими, было клеветой на них.</p><p class="p1">В очень короткое время Баркильфедро прочно обосновался при дворе.</p></span><span id="id121"><div class="title6">
<p class="p">8. Inferi – Преисподняя</p>
</div><p class="p1">Обосноваться при дворе можно двояким способом: либо на облачных высотах – тогда вы окружены ореолом величия, либо в грязи – и тогда в ваших руках сила.</p><p class="p1">В первом случае вы пребываете на Олимпе, во втором – располагаетесь в гардеробной.</p><p class="p1">Обитатель Олимпа повелевает только громами; тот, кто живет при гардеробной, – полицией.</p><p class="p1">Здесь, в гардеробной, вы найдете все атрибуты королевской власти, а иногда – ибо гардеробная место предательское – и орудия кары. Тут находят свою смерть Гелиогабалы. В подобных случаях гардеробная называется отхожим местом.</p><p class="p1">Но обыкновенно в гардеробной не столь ужасно. Альберони восхищается здесь герцогом Вандомским, коронованные особы охотно дают здесь аудиенции. Она заменяет собою тронную залу. Людовик XIV принимал в ней герцогиню Бургундскую. Филипп V восседал там рядом с королевой. В королевскую гардеробную получает доступ и священник. Иногда она становится отделением исповедальни.</p><p class="p1">Вот почему, занимая при дворе самое незаметное положение, можно сделать карьеру. И неплохую карьеру.</p><p class="p1">Если вы хотите быть великим при Людовике XI – будьте Пьером Роганом, маршалом Франции; если хотите быть «влиятельным – будьте, как Оливье Леден, цирюльником. Если хотите прославиться при Марии Медичи – будьте канцлером Силлери, если хотите иметь значение – будьте Ганнон, камеристкой. Если вы хотите быть знаменитым при Людовике XV – будьте Шуазелем, министром, если хотите быть грозным – будьте Лебелем, лакеем. Бонтан, стеливший Людовику XIV постель, был более могуществен, чем Лавуа, создавший этому королю армию, и Тюренн, доставивший ему столько побед. Отнимите у Ришелье отца Жозефа, и от Ришелье почти ничего не останется. Исчезнет всякая таинственность. Красный кардинал великолепен, серый кардинал страшен. Какая сила кроется в червяке! Все Нарваэсы вкупе со всеми О’Доннелями не могут сделать того, что сделает какая-нибудь сестра Патрочиньо.</p><p class="p1">Первым условием такого могущества является ничтожество. Если вы хотите быть сильным, будьте незаметным. Будьте ничем. Свернувшаяся кольцом спящая змея является в одно и то же время символом бесконечности и нуля.</p><p class="p1">Такая змеиная удача выпала и на долю Баркильфедро.</p><p class="p1">Он прополз туда, куда стремился.</p><p class="p1">Плоские паразиты проникают всюду. В кровати Людовика XIV водились клопы, а в его политике действовали иезуиты.</p><p class="p1">В нашем мире нет ничего несовместимого.</p><p class="p1">Жизнь напоминает маятник. Тяготеть к чему-либо – значит качаться из стороны в сторону. Один полюс стремится к другому. Франциску I необходим Трибуле, Людовику XV – Лебель. Существует глубокое сходство между «высшим величием» и крайним ничтожеством.</p><p class="p1">Управляет ничтожество. Это совершенно понятно. Нити находятся в руках того, кто внизу.</p><p class="p1">Он занимает самую удобную позицию.</p><p class="p1">Он все видит, и к нему прислушиваются.</p><p class="p1">Он – око правительства.</p><p class="p1">В его распоряжении – ухо короля.</p><p class="p1">Если в вашем распоряжении ухо короля, то это значит, что вы можете по собственному усмотрению открывать и защелкивать дверь королевского сознания и всовывать туда все, что вам заблагорассудится. Ум короля – ваш шкаф. Если вы тряпичник – он превращается в вашу корзинку. Уши королей принадлежат не им, и поэтому, сказать по правде, эти бедняги не вполне ответственны за свои поступки. Тот, кто не владеет своими мыслями, не распоряжается и своими действиями. Король всегда повинуется.</p><p class="p1">Кому?</p><p class="p1">Какому-нибудь мерзавцу, который жужжит у него над ухом. Черной мухе, исчадию бездны.</p><p class="p1">В этом жужжании – приказ. Король всегда правит под чью-то диктовку.</p><p class="p1">Монарх повторяет вслух, подлинный властитель диктует шепотом.</p><p class="p1">И те, кто умеет уловить этот шепот и услышать, что именно подсказывает он королю, – настоящие историки.</p></span></span></span></span>
