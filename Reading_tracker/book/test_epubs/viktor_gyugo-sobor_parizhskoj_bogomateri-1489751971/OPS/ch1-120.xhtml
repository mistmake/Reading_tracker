<p class="p">Гаврош</p>
</div><p class="subtitle">I</p><p class="p1">У Парижа есть дитя, у леса есть птичка. Птичка называется воробьем, дитя – гаменом.</p><p class="p1">Это маленькое существо весело. Оно ест не каждый день, а отправляется в театр, если ему заблагорассудится, каждый вечер. У него нет рубашки на теле, башмаков на ногах, кровли над головой; оно, как птица небесная, не знает ничего подобного.</p><p class="p1">Гамену от семи до тринадцати лет. Он живет шайками, гранит мостовую, спит на открытом воздухе, носит старые отцовские панталоны, которые спускаются ему ниже пят, старую шляпу какого-нибудь другого отца, которая нахлобучивается ему ниже ушей, и одну единственную подтяжку с желтой каемкой. Он бегает, ищет, подстерегает, теряет время, курит трубку, бранится как извозчик, шляется по кабакам, знается с ворами, но в сердце у него нет ничего дурного. Дело в том, что у него в душе жемчужина – невинность, а жемчуг не растворяется в грязи.</p><p class="p1">Если бы у огромного города спросили: «Кто это?» – он ответил бы: «Это мое дитя».</p><p class="p1">Парижский гамен – это карлик великанши.</p><p class="p1">Не будем преувеличивать. У этого уличного херувима иногда бывает рубашка, во всяком случае, только одна; бывают иногда башмаки, но без подошв, бывает иногда жилище, которое он любит, потому что видит в нем свою мать, но которому все-таки предпочитает улицу, так как находит там свободу. У него есть собственные игры, свои шалости, основанием которых служит чаще всего ненависть к буржуа, свои метафоры – умереть на его языке значит «есть одуванчики с корня», свои промыслы – проводить фиакры, опускать подножки карет, устраивать переправу через улицы во время сильных дождей и выкрикивать речи, произнесенные властями в пользу французского народа; он имеет свои собственные деньги, состоящие из маленьких кусочков меди, которые он подбирает на улицах.</p><p class="p1">Вечером, благодаря нескольким су, которые гамен всегда сумеет добыть, он идет в театр. Переступив за этот магический порог, он сразу преображается. Он был гаменом – он становится жаворонком. Театры – те же корабли, но перевернутые трюмом вверх. В этот-то трюм и набиваются жаворонки. Гамен относится к жаворонку так же, как личинка к бабочке; то же самое существо, но сначала ползающее, а потом летающее. Достаточно одного его присутствия, его сияющего счастьем лица, его способности радоваться и восторгаться, его аплодисментов, похожих на хлопанье крыльев, чтобы этот тесный, смрадный, темный, нездоровый, ужасный, отвратительный трюм действительно превратился в «раек».</p><p class="p1">Дайте какому-нибудь существу бесполезное и отнимите у него все необходимое, и вы получите гамена.</p><p class="p1">Гамен не совсем невежда по части литературы. Но направление, которого он придерживается, – говорим это с крайним сожалением – совсем не в духе классицизма. Он, по самой природе своей, не имеет ничего общего с академией. Так, например, популярность, которой пользовалась среди этой бурной детской публики м-ль Марс, была приправлена оттенком иронии. Гамен так прозвал артистку.</p><p class="p1">Этот странный ребенок кричит, насмехается, издевается, спорит, одетый в тряпки, как младенец, и в рубище, как философ, он удит в сточных трубах, охотится в клоаках, умеет сохранять веселость даже среди нечистот, оглашает своими остротами перекрестки, зубоскалит и кусается, свистит и поет, восторженно приветствует и бранится, распевает все, начиная с молитвы за усопших и кончая куплетами, находит, не отыскивая, и знает, не изучая. Он непреклонен до плутовства, безумен до мудрости, лиричен до грязи; он готов бы взобраться на Олимп, а валяется в грязи и выходит оттуда чистый и сияющий, как звезда. Парижский гамен – это Раблэ в миниатюре.</p><p class="p1">Он недоволен своими панталонами, если в них нет кармашка для часов.</p><p class="p1">Он удивляется редко, пугается еще реже, сочиняет песенки, в которых осмеивает суеверия, уменьшает до надлежащих размеров преувеличения, подшучивает над тайнами, высовывает язык привидениям, обличает ходульность и зло, смеется над эпической напыщенностью. Не потому, что он прозаичен. Нет, далеко не то. Он только заменяет торжественное видение шуточной фантасмагорией. Если бы перед ним явился Господь, он, наверное, воскликнул бы: «Вот так пугало!»</p><p class="subtitle">II</p><p class="p1">Маленький Гаврош как раз подходил бы под сделанное нами выше описание гамена, если бы сердце его не было так пусто и мрачно, несмотря на то что он не прочь был посмеяться, как настоящий ребенок. Он носил мужские панталоны, но не отцовские, и женскую кофту, но не материнскую. Чужие люди нарядили его из милости в эти лохмотья. А между тем у него был отец, и была мать. Но отец совсем не думал о нем, а мать не любила его. Он принадлежал к числу тех несчастных детей, больше всех остальных заслуживающих сострадания, у которых есть и отец, и мать, но которые все-таки остаются сиротами.</p><p class="p1">Этот мальчик чувствовал себя лучше всего на улице. Мостовая была для него не так жестока, как сердце его матери.</p><p class="p1">Родители вытолкнули его в жизнь пинком.</p><p class="p1">И он полетел.</p><p class="p1">Это был шумливый, бледный, веселый, проворный, насмешливый мальчик, с живым, но бледным лицом. Он бегал то туда то сюда, пел, играл в бобы, рылся в канавах, слегка воровал, но весело, как кошки или воробьи, смеялся, когда его называли мальчишкой, и сердился, когда его называли негодяем. У него не было ни крова, ни хлеба, ни тепла, ни любви, но он был весел, потому что чувствовал себя свободным.</p><p class="p1">Когда эти несчастные создания вырастают, жернов социального строя почти всегда захватывает и переламывает их; но в детстве они спасаются от него. Они еще так малы, что могут ускользнуть в каждую дырочку.</p><p class="p1">Однако, как ни покинут был этот ребенок, он все-таки изредка, в два или три месяца раз, говорил себе: «Пойду-ка я к своей маме!» Тогда он покидал бульвар, проходил мимо цирка и ворот Сен-Мартен, спускался на набережную, шел по мостам, достигал предместьев, добирался до больницы Сальпетриер и подходил к дому с двойным номером 50–52.</p><p class="p1">В это время в доме под № 50–52, всегда пустом и вечно украшенном билетиком «Отдаются комнаты», было, против обыкновения, довольно много жильцов, которые, как это всегда бывает в Париже, не имели друг с другом никаких сношений и связей. Все они принадлежали к тому бедному классу, который начинается мелким, стесненным в средствах буржуа, постепенно спускается все ниже и ниже, к самым подонкам общества, и кончается двумя существами, к которым приходит вся материальная сторона цивилизации: чистильщиком, вывозящим нечистоты, и тряпичником, подбирающим лохмотья.</p><p class="p1">Из всех жильцов дома в самом жалком положении была семья, состоявшая из четырех лиц: отца, матери и двух почти взрослых дочерей. Они все четверо помещались на чердаке, в одной из каморок. Эта семья, на первый взгляд, не представляла ничего особенного, кроме своей крайней бедности. Отец, нанимая комнату, назвал себя Жондреттом. Жондретт сказал женщине, которая исполняла должность привратницы и мела лестницу:</p><p class="p1">– Вот что, матушка: если кто-нибудь будет спрашивать поляка или итальянца, а может быть, и испанца, то знайте, что это я.</p><p class="p1">К семье Жондреттов принадлежал и веселый босоножка.</p><p class="p1">Он проходил сюда, видел здесь бедность и отчаяние, но, что еще грустнее, не видал ни одной улыбки; находил холодный очаг и холодные сердца.</p><p class="p1">Когда он входил, его спрашивали:</p><p class="p1">– Откуда ты?</p><p class="p1">– С улицы, – отвечал он.</p><p class="p1">Когда он уходил, его снова спрашивали:</p><p class="p1">– Куда ты идешь?</p><p class="p1">И он снова отвечал:</p><p class="p1">– На улицу.</p><p class="p1">– Зачем ты приходишь сюда? – не раз спрашивала его мать.</p><p class="p1">Этот ребенок жил, лишенный любви, как та бледная травка, которая растет на погребах. Он не страдал от этого и не обвинял никого. Он не знал, наверное, каковы должны быть отец и мать.</p><p class="p1">Впрочем, мать любила его сестер.</p><p class="p1">Мы забыли сказать, что на Тампльском бульваре этот мальчик был известен под именем Гавроша. Почему назывался он Гаврошем? Да, должно быть, потому, что отец его назывался Жондреттом.</p><p class="p1">Некоторые бедные семьи как бы по инстинктивно разрывают связывающие их нити.</p><p class="subtitle">III</p><p class="p1">Раз вечером маленький Гаврош мучился от голода; он ничего не ел почти целый день. Он вспомнил, что не ел и накануне. Это становилось, наконец, скучным, и он решил попытаться достать себе что-нибудь на ужин. С этой целью он отправился побродить по пустынным окрестностям Сальпетриера, где иногда можно было получить подачку; там, где редко кто бывает, скорее можно надеяться найти что-нибудь. Незаметно он дошел до поселка, который показался ему деревней Аустерлицем.</p><p class="p1">Во время одной из своих прежних экскурсий в эту местность он заметил там старый, запущенный сад, в котором росла очень недурная яблоня и по которому иногда бродили какие-то старики – мужчина и женщина. Возле яблони он также заметил нечто вроде маленькой кладовой для плодов, очевидно незапиравшейся, так что в ней, наверное, можно было поживиться яблочком. Яблоко – это ужин, а ужин – жизнь. То, что погубило Адама, могло спасти Гавроша. Сад тянулся вдоль немощеного пустынного переулка, окаймленного кустарником в тех местах, где не было никаких строений. От переулка сад отделялся изгородью.</p><p class="p1">Гаврош подошел к этому саду, почти сразу отыскав его местоположение. Он узнал яблоню и маленькую кладовую и внимательно осмотрел изгородь, через которую ему ничего не стоило перебраться. День померк; в переулке не было видно даже кошки, час был вполне удобный. Гаврош начал было уже перелезать в сад, как вдруг остановился, услыхав, что там разговаривают. Он снова слез и заглянул сквозь щели изгороди.</p><p class="p1">В двух шагах от него, по ту сторону забора, лежал опрокинутый камень, очевидно служивший скамейкой; на камне сидел старик, которого Гаврош видал раньше в этом саду; перед ним стояла старуха и что-то ворчала.</p><p class="p1">– Господин Мабеф! – говорила старуха.</p><p class="p1">«Мабеф? Какое чудное имя», – подумал Гаврош.</p><p class="p1">Старик не шевелился. Старушка продолжала:</p><p class="p1">– Господин Мабеф!</p><p class="p1">Не поднимая с земли глаз, старик, наконец, откликнулся:</p><p class="p1">– Что вам, тетушка Плутарх?</p><p class="p1">«Тетушка Плутарх? Тоже преуморительное прозвище», – думал Гаврош.</p><p class="p1">Поощренная откликом старика, старушка уже смелее продолжала, вовлекая его в беседу:</p><p class="p1">– Ведь хозяин-то наш недоволен.</p><p class="p1">– Чем это?</p><p class="p1">– А тем, что мы задолжали ему за три срока.</p><p class="p1">– А еще через три месяца мы будем должны за четыре срока.</p><p class="p1">– Он говорит, что заставит нас ночевать на улице.</p><p class="p1">– Ну что ж, я и пойду.</p><p class="p1">– Зеленщица тоже требует по счету. Больше ничего не хочет отпускать. Потом, чем же мы будем топить эту зиму? Ведь у нас нет дров.</p><p class="p1">– Зато есть солнце.</p><p class="p1">– И мясник отказывается давать в долг; ни одного кусочка мяса больше у него не выпросишь.</p><p class="p1">– И прекрасно: я плохо перевариваю мясо. Это слишком тяжело для моего желудка.</p><p class="p1">– Что же мы будем есть?</p><p class="p1">– Хлеб.</p><p class="p1">– Да и пекарь требует денег по счету. «Если – говорит, – у вас нет денег, то у меня нет для вас хлеба».</p><p class="p1">– Ну и отлично.</p><p class="p1">– Что же вы будете есть?</p><p class="p1">– А яблоки-то наши.</p><p class="p1">– Ну, сударь, нельзя же так жить без денег!</p><p class="p1">– Откуда я их возьму?</p><p class="p1">Старуха ушла, Мабеф остался один. Он задумался. Гаврош, со своей стороны, тоже размышлял. Между тем почти совсем смерклось.</p><p class="p1">Первым результатом размышлений Гавроша было то, что он, вместо того, чтобы перебраться через изгородь, прикорнул под ней в том месте, где расходились ветви кустарников.</p><p class="p1">«Ишь ведь какая славная постель!» – мысленно говорил он себе, свертываясь в комочек. Почти прислонившись спиною к камню, на котором сидел Мабеф, он ясно слышал дыхание этого восьмидесятилетнего старика.</p><p class="p1">Гаврош старался заменить еду сном. Кошки спят только одним глазом, так спал и Гаврош. Сквозь дремоту он следил за всем, что происходило вокруг.</p><p class="p1">На землю легло отражение белесоватого сумеречного неба, и переулок обозначился бледной чертой между двумя рядами темных кустов. Вдруг в этой белесоватой полосе появились два силуэта. Один из этих силуэтов шел впереди, другой следовал за ним на некотором расстоянии.</p><p class="p1">– Вот несет каких-то двоих! – прошептал себе под нос Гаврош.</p><p class="p1">Первый силуэт походил на старого, сгорбленного задумчивого буржуа, одетого более чем просто и тихо передвигавшего разбитые годами ноги; очевидно, он вышел из дому только за тем, чтобы немного побродить при сиянии звезд. Второй силуэт отличался тонкостью, стройностью и живостью. Хотя эта фигура и соразмеряла свои шаги с шагами первой, тем не менее в ее вынужденно-медленной походке чувствовались гибкость и проворство. Несмотря на элегантную внешность второй фигуры, от нее веяло чем-то неприятным и подозрительным. Фигура эта, также мужская, была в шляпе красивой формы, в черном, прекрасно сшитом сюртуке, вероятно из дорогого сукна, сидевшем как нельзя лучше. Голову незнакомец держал прямо, со своеобразной грацией и мощью. Из-под шляпы в сумерках виднелся молодой профиль. В этом незнакомце Гаврош сразу узнал знакомого ему вора – Монпарнаса. Что же касается того, который шел впереди, то о нем Гаврош мог сказать разве только то, что это какой-нибудь старый простачок.</p><p class="p1">Гаврош принялся зорко наблюдать. Очевидно, один из этих прохожих что-то замыслил насчет другого. Гаврош находился в положении как нельзя более удобном для наблюдения над другими, между тем как сам не мог быть никем замеченным.</p><p class="p1">Появление Монпарнаса в этом месте, в эту пору, кравшегося по следам другого, не предвещало ничего хорошего. Мальчику стало страшно жаль незнакомого старичка, которого, очевидно, преследовал Монпарнас.</p><p class="p1">Что было делать Гаврошу? Вмешаться в то, что он предвидел? Но разве один слабосильный может помочь другому? Такая попытка только рассмешила бы Монпарнаса. Гаврош отлично понимал, что для этого восемнадцатилетнего отъявленного разбойника ничего не стоило одним ударом прикончить старика и ребенка.</p><p class="p1">Пока Гаврош размышлял таким образом, ожидаемое нападение совершилось с поразительной быстротой. Это было нападение тигра на онагра, паука на муху. Монпарнас вдруг бросил розу, которую до того времени держал в губах, кинулся на старика, схватил его за ворот и вцепился в него, как дикая кошка. Глядя на это, Гаврош едва мог удержаться от крика и ужаса. Спустя минуту один из прохожих бился с хрипом на земле, придавленный сильным, точно мраморным коленом другого, упершимся ему в грудь. Но вышло совсем не так, как ожидал Гаврош: лежавший на земле был Монпарнас, а победителем оказался старик. Все это произошло в нескольких шагах от Гавроша.</p><p class="p1">Старик выдержал внезапный удар молодого и вернул его, но с такой силой, что нападавший и подвергшийся нападению в один миг поменялись ролями.</p><p class="p1">«Вот так старик!» – подумал Гаврош.</p><p class="p1">И он невольно захлопал в ладоши, но его рукоплескание не донеслось до слуха противников, оглушенных друг другом и все еще продолжавших возиться, тяжело дыша один другому в лицо и напрягая все силы в борьбе.</p><p class="p1">Наступила тишина. Монпарнас вдруг перестал биться. Гаврош спрашивал себя: «Уж не убит ли этот разбойник?»</p><p class="p1">Старик все время не издал ни крика, ни звука. Только когда Монпарнас приподнялся из своего согнутого положения, Гаврош услыхал, как старик сказал:</p><p class="p1">– Вставай!</p><p class="p1">Монпарнас встал, но старик не выпускал его из рук. Монпарнас имел приниженный и разъяренный вид волка, которого одолела овца.</p><p class="p1">Гаврош слушал и смотрел во всю, стараясь удвоить зрение слухом. Мальчик забавлялся от всей души. Он был вполне вознагражден за свое добросовестное внимание в качестве зрителя всего происходившего.</p><p class="p1">Он отлично мог расслышать следующий разговор, которому ночной мрак придавал нечто трагическое. Старик спрашивал, Монпарнас отвечал:</p><p class="p1">– Сколько тебе лет?</p><p class="p1">– Девятнадцать.</p><p class="p1">– Ты парень здоровый и сильный, почему ты не работаешь?</p><p class="p1">– Потому что это мне не нравится.</p><p class="p1">– А кто ты такой?</p><p class="p1">– Бездельник.</p><p class="p1">– Отвечай серьезно. Могу я сделать что-нибудь для тебя? Кем бы ты хотел быть?</p><p class="p1">– Вором.</p><p class="p1">Наступило молчание. Старик, по-видимому, глубоко задумался. Он стоял неподвижно, не выпуская, однако, Монпарнаса. По временам молодой, сильный и ловкий разбойник вздрагивал, как пойманный в капкан зверь. Он вырывался, пробовал ударить своего противника ногами, отчаянно выгибался всем туловищем, стараясь как-нибудь освободиться. Но старик точно не замечал ничего этого, с уверенностью геркулесовой силы сжимая одной рукой обе руки молодца как в железных тисках, из которых не было никакой возможности вырваться.</p><p class="p1">Подумав несколько времени, старик устремил пристальный взгляд на своего противника и мягким голосом, торжественно зазвучавшим в ночной тишине, обратился к нему с наставительной речью, из которой Гаврош пропустил немало слов мимо ушей.</p><p class="p1">Кончив, старик выпустил руки Монпарнаса, сунул ему свой кошелек. Молодой негодяй взвесил кошелек на руке, потом, с привычной осторожностью вора, положил его себе в один из задних карманов сюртука. Между тем старик спокойно повернулся и продолжал свою прогулку.</p><p class="p1">– Дурак! – пробормотал ему вслед Монпарнас.</p><p class="p1">Изумленный Монпарнас стоял на месте, глядя, как фигура старика теряется в темноте. Это созерцание сделалось для него роковым.</p><p class="p1">Когда старик стал удаляться, Гаврош начал приближаться. Убедившись сначала одним быстрым взглядом, что Мабеф, вероятно задремав, все еще сидит на своей скамейке, мальчик потихоньку выполз из кустарника и ползком направился к Монпарнасу, неподвижно стоявшему к нему спиной. Незаметно добравшись до разбойника, Гаврош осторожно засунул руку в карман его тонкого сюртука, ощупал там кошелек, быстро выхватил его и, зажав в руке, с ловкостью ящерицы мгновенно проскользнул обратно в кусты. Монпарнас, не имевший никакой причины быть настороже и в первый раз в жизни задумавшийся, ничего не заметил. Гаврош же, вернувшись на прежнее место, около скамейки Мабефа, перебросил кошелек через изгородь и поспешил скрыться бегством.</p><p class="p1">Кошелек упал прямо к ногам Мабефа. Стук его о землю вывел старика из дремотного состояния. Он нагнулся и поднял кошелек. Ничего не понимая, он машинально раскрыл кошелек и увидел, что он о двух отделениях; в одном отделении было несколько мелочи, а в другом – шесть золотых монет.</p><p class="p1">Испуганный старик поспешил показать кошелек своей ключнице.</p><p class="p1">– Это нам с неба свалилось, – просто сказала старуха.</p><p class="subtitle">IV</p><p class="p1">Вечером, когда леденящий ветер дул с такой силой, точно вернулся январь, и граждане снова надели свои теплые плащи, маленький Гаврош, ежась в своих лохмотьях, стоял перед окном парикмахерской, в окрестностях л’Орм-Сен-Жерве, и притворялся, что замер в восторженном созерцании восковой невесты, которая в подвенечном наряде, с померанцевым венком на голове вертелась в окне посреди двух ярко горевших ламп, показывая прохожим то спину, то вечно улыбающееся лицо. В действительности Гаврош заинтересовался этой картиной только как предлогом, чтобы, не возбуждая подозрений, наблюдать за тем, что происходило в самой парикмахерской. Он выискивал случай «стибрить» кусок мыла, с целью продать его потом за су «куаферу» из предместья. Ему уже не раз удавалось поужинать таким куском; мальчик называл этого рода промысел, к которому чувствовал призвание, «бритьем цирюльников».</p><p class="p1">Кутаясь в бог весть где добытую им старую женскую шаль, служившую ему вместо кашне, и делая свои тонкие наблюдения, он бормотал себе под нос: «Во вторник… Нет, кажется, не во вторник… Или во вторник… Да, во вторник и есть!» Неизвестно к чему относился этот монолог. Если он означал тот день, когда мальчик ел в последний раз, то значит, что он голодает уже третий день, так как теперь была пятница.</p><p class="p1">Цирюльник в своей хорошо натопленной лавке брил кого-то, не переставая искоса поглядывать на «врага», то есть на стоявшего снаружи перед окном продрогшего мальчишку с дерзкими глазами, который, засунув в карманы руки, находился там, по-видимому, неспроста.</p><p class="p1">Пока Гаврош глядел на соблазнявшее его виндзорское мыло, делая вид, что любуется восковой невестой, двое мальчуганов еще меньше его – одному могло быть лет семь, а другому не больше пяти, и оба довольно прилично одетые – робко повернули ручку двери парикмахерской и вошли туда. Они чего-то просили, быть может милостыни, и притом такими жалобными голосами, которые походили скорее на писк голодных мышей, чем на человеческую речь. Они говорили оба сразу, и разобрать их слова было невозможно, потому что голос меньшего прерывался рыданиями, а старший стучал зубами от холода. Цирюльник повернул к ним перекошенное бешенством лицо и, не выпуская бритвы из правой руки, левою оттолкнул старшего мальчика, а меньшого пнул коленкой обратно к двери. Выпроводив их снова на улицу, он захлопнул за ними дверь и сердито пробурчал:</p><p class="p1">– Зря только холод напускают!</p><p class="p1">Дети, со слезами на глазах, побрели дальше. Между тем нашла туча, и начал накрапывать дождик. Маленький Гаврош догнал мальчиков и спросил их:</p><p class="p1">– Что с вами, ребятки?</p><p class="p1">– Мы не знаем, где нам спать сегодня, – ответил старший.</p><p class="p1">– Только-то?! – сказал Гаврош. – Эка, подумаешь, беда! Да разве из-за таких пустяков ревут?.. Экие вы глупенькие!</p><p class="p1">И с видом горделивого превосходства, сквозь которое просвечивала покровительственная нежность, добавил:</p><p class="p1">– Марш за мной, мелюзга!</p><p class="p1">– Хорошо, сударь, – покорно сказал старший из мальчиков.</p><p class="p1">И малютки последовали за Гаврошем с таким доверием, с каким пошли бы за архиепископом, если бы он позвал их. Они даже перестали плакать.</p><p class="p1">Гаврош повел их по улице Сент-Антуан, по направлению к Бастилии. По пути он бросил негодующий взгляд назад на лавку цирюльника и пробормотал:</p><p class="p1">– Экая бессердечная треска! Должно быть, это англичанин.</p><p class="p1">Какая-то девушка громко расхохоталась при виде следовавших гуськом друг за другом мальчиков. Это было прямым оскорблением маленьких граждан.</p><p class="p1">– Здравствуйте, мамзель Омнибус! – насмешливо крикнул Гаврош.</p><p class="p1">Минуту спустя ему опять вспомнился парикмахер, и он пробурчал:</p><p class="p1">– Нет, я ошибся в этом животном: это не треска, а змея. Смотри, цирюльник, я приведу к тебе слесаря и заставлю его приделать тебе к хвосту погремушку!</p><p class="p1">Продолжая идти дальше по улице, Гаврош заметил под воротами окоченевшую нищенку лет тринадцати с небольшим, у которой из-под слишком короткой юбки виднелись синие коленки. Девочка, очевидно, давно уже выросла из юбки, и это становилось даже неприличным.</p><p class="p1">– Бедная девчонка! – сказал Гаврош. – У нее нет даже пантолончиков… На вот, возьми хоть это.</p><p class="p1">С этими словами, распутав теплую шерстяную ткань, которая была обмотана вокруг его шеи, он набросил ее на исхудалые и посиневшие плечи девочки, превратив таким образом кашне снова в шаль.</p><p class="p1">Девочка взглянула на него с изумлением и молча приняла подарок. На известной ступени нищеты бедняк настолько тупеет, что уже более не жалуется на свои страдания и не благодарит за добро.</p><p class="p1">– Бр-р-р! – произнес Гаврош, дрожа сильнее святого Мартина, у которого оставалась хоть половина плаща.</p><p class="p1">Вслед за тем дождь хлынул как из ведра, точно в наказание за доброе дело.</p><p class="p1">– Это еще что такое! – воскликнул Гаврош. – Словно из ушата… Если так будет продолжаться, я перестану быть добрым! – прибавил он, продолжая путь.</p><p class="p1">– Впрочем, не беда, – проговорил он, бросив прощальный взгляд на нищенку, которая ежилась под шалью, – хоть она-то согреется.</p><p class="p1">И, взглянув затем на мрачную тучу, нависшую над его головой, он задорно крикнул:</p><p class="p1">– Что, взяла?!</p><p class="p1">И прибавил шагу. Малыши старались поспеть за ним.</p><p class="p1">Проходя мимо одной из тех толстых железных решеток, которыми ограждаются окна булочной, так как хлеб сберегается в одинаковой мере с золотом, Гаврош обернулся к своим маленьким спутникам и спросил их:</p><p class="p1">– Ребятки, а вы обедали сегодня?</p><p class="p1">– Нет, сударь, – ответил старший, – мы ничего не ели с самого утра.</p><p class="p1">– Значит, у вас нет ни отца, ни матери? – продолжал Гаврош.</p><p class="p1">– Извините, сударь, у нас есть и папа, и мама, но мы не знаем, где они, – возразил старший мальчуган.</p><p class="p1">– А!.. Ну, иной раз, пожалуй, лучше этого и не знать, – проговорил Гаврош глубокомысленным тоном.</p><p class="p1">– Вот уже два часа как мы ходим, – продолжал старший из его спутников, – и ищем под ногами, нет ли чего поесть, но ничего не нашли.</p><p class="p1">– Это потому, что собаки жрут все, что валяется на улице, – сказал Гаврош и после непродолжительного молчания добавил: – Значит, мы потеряли наших родителей? Мы не знаем, что с ними сталось? Это скверно, мои милашки. Нехорошо так сбиваться с пути!.. Нужно постараться уладить дело.</p><p class="p1">Он не стал больше расспрашивать ребятишек. Не иметь пристанища – дело такое обыкновенное!</p><p class="p1">Между тем старший из мальчуганов, почти совсем вернувшийся к свойственной его возрасту беспечности, вдруг заметил:</p><p class="p1">– А ведь мама обещала свести нас на вербу в Вербное воскресенье!</p><p class="p1">– Это ерунда! – сказал Гаврош.</p><p class="p1">– Мама у нас важная дама и живет вместе с мамзель Мисс.</p><p class="p1">– Есть чем хвастаться!</p><p class="p1">Бросая эти презрительные замечания, Гаврош остановился и принялся шарить во всех заплатках своих лохмотьев. Наконец он поднял голову с видом, который должен был быть, по его желанию, только довольным, а на самом деле вышел торжествующий.</p><p class="p1">– Успокойтесь, малыши, – сказал он, – нам всем троим есть на что поужинать. Вот, смотрите.</p><p class="p1">И он показал им су. Не дав ребятишкам времени удивиться, он толкнул их перед собой в булочную, положил там свои су на прилавок и крикнул:</p><p class="p1">– Гарсон! На пять сантимов хлеба!</p><p class="p1">«Гарсон», оказавшийся самим хозяином, взял хлеб и нож.</p><p class="p1">– Режь на три куска, гарсон, – продолжал Гаврош и с достоинством прибавил: – нас трое.</p><p class="p1">И заметив, что булочник, оглянув всех трех покупателей, отложил в сторону белый хлеб и взял черный, Гаврош засунул палец в нос и с величественным видом Фридриха Великого, нюхающего табак, бросил в лицо булочнику негодующий вопросительный возглас:</p><p class="empty-line"/><p class="p1">– Que-ce-que-c’est-la?</p><p class="p1">Предупреждаю тех из читателей, которые могут усмотреть в этом восклицании русское или польское слово или примут его за один из тех воинственных кличей, которыми обмениваются дикари в своих пустынях, что это самое обыкновенное слово; оно то и дело употребляется самими читателями, но в форме целой фразы, то есть «Это что такое?»</p><p class="p1">Булочник сразу понял Гавроша.</p><p class="p1">– Это тоже очень хороший хлеб, только второго сорта, – сказал он.</p><p class="p1">– Вероятно, вы хотите сказать: самый плохой черный хлеб, – возразил Гаврош с холодной презрительностью. – Давайте нам белого хлеба, гарсон, слышите? Самого лучшего белого хлеба. Я угощаю.</p><p class="p1">Булочник не мог удержаться от улыбки и, нарезывая требуемый хлеб, смотрел на детей таким сострадательным взглядом, который задел Гавроша за живое.</p><p class="p1">– А позвольте спросить, господин пекарь, почему вы изволите так странно пялить на нас свои буркалы? – задорно спросил он.</p><p class="p1">Булочник молча отдал хлеб, взял с прилавка су и отвернулся.</p><p class="p1">– Нате вот, лопайте! – обратился Гаврош к детям, вручая каждому из них по куску хлеба.</p><p class="p1">Но мальчики изумленно глядели на него, не решаясь взять хлеб. Гаврош расхохотался.</p><p class="p1">– А, да! Вы ведь не привыкли к таким словам! – догадался он и прибавил: – Кушайте, мои пичужки.</p><p class="p1">Полагая, что старший из детей, казавшийся ему достойным более другого чести беседовать с ним, нуждается в особом поощрении, чтобы освободиться от колебания умиротворить свой голод, он присовокупил, сунув ему самую большую долю хлеба:</p><p class="p1">– Вот, заложи это себе в свой клюв.</p><p class="p1">Самый маленький кусок он оставил себе. Булочник, конечно, старался нарезать хлеб равными долями, но все-таки три части были не совсем одинаковой величины.</p><p class="p1">Бедные дети, так же как и Гаврош, были страшно голодны. Буквально разрывая хлеб зубами, они толклись в булочной, хозяин которой, удовлетворив их желание, смотрел теперь на них не очень ласково.</p><p class="p1">– Пойдемте, – сказал Гаврош своим спутникам.</p><p class="p1">И они все трое продолжили путь к Бастилии. Проходя мимо ярко освещенных окон магазинов, то и дело встречавшихся на пути, самый маленький из мальчиков каждый раз смотрел на свои свинцовые часики, которые висели у него на шее на тоненьком шнурочке.</p><p class="p1">– Экий чижик! – проговорил сквозь зубы Гаврош, с нежностью глядя на ребенка. Потом, после некоторого раздумья, он прибавил: – Ну, если бы у меня были такие малыши, я бы их лучше берег!</p><p class="subtitle">V</p><p class="p1">Лет двадцать тому назад в юго-западном углу площади Бастилии, близ канала, прорытого в старом рву этой крепости-тюрьмы, красовался странный монумент. Это был слон сорока футов вышиною, построенный из камней и досок, с башней на спине, походившей на дом.</p><p class="p1">Когда-то эта фигура была вымазана зеленой краской каким-нибудь маляром, но впоследствии сделалась черной от действия времени, дождей и непогоды. В открытом и пустынном углу площади широкий лоб слона, его хобот, клыки, башня, исполинская спина и похожие на колонны ноги вырисовывались на ярком звездном ночном небе фантастически-чудовищными силуэтами. Никто не знал, что, собственно, означала эта фигура. Это могло быть символом народной силы, мрачным, загадочным. Это было могучим, резко бросавшимся в глаза призраком, рядом с невидимым призраком Бастилии. Немногие иностранцы посещали этот памятник, а прохожие едва на него взглядывали. Он стал разрушаться, каждый год с его боков отваливались громадные пласты штукатурки, и получалось впечатление страшных зияющих ран. Дойдя до колоссальной фигуры слона, Гаврош понял, какое впечатление может произвести бесконечно великое на бесконечно малое, и сказал своим спутникам:</p><p class="p1">– Не пугайтесь, ребятки!</p><p class="p1">Затем он пробрался сквозь отверстие ограды к слону и помог своим маленьким путникам перекарабкаться через брешь. Немного испуганные дети молча следовали за Гаврошем, вполне вверяясь этому маленькому провидению в лохмотьях, которое уже накормило их и обещало дать им ночлег.</p><p class="p1">За оградой, во всю ее длину, лежала лестница, служившая днем рабочим на соседней стройке. Гаврош с необыкновенною для его лет силой поднял эту лестницу и прислонил ее к передним ногам слона. Около того места, куда достигала лестница, в брюхе слона зияло нечто вроде темной ямы.</p><p class="p1">Гаврош указал своим спутникам на лестницу и яму и сказал им:</p><p class="p1">– Ну, лезьте и входите в ту вон дверь, что видна наверху.</p><p class="p1">Мальчики в ужасе переглянулись.</p><p class="p1">– Ага! Струсили, ребятки! – вскричал Гаврош. – Смотрите, как это делается!</p><p class="p1">И, обхватив шероховатую ногу слона, он в один миг, не пользуясь лестницей, очутился наверху и быстро скрылся во впадине, а через несколько мгновений дети увидели, как во мраке впадины белым призраком обрисовалось его бледное лицо.</p><p class="p1">– Ну, влезайте теперь и вы, пиголицы! – крикнул он им. – Вы увидите, как тут хорошо. Лезь ты первый, – обратился он к старшему из мальчиков, – я тебе помогу.</p><p class="p1">Мальчуганы подталкивали друг друга. Гамен внушал им одновременно и боязнь, и доверие; в союзе с проливным дождем взяло верх последнее чувство, и ребята решились на то, что казалось им настоящим подвигом. Первым полез наверх старший. Видя себя покинутым между огромных лап страшного зверя, младший порывался зареветь, но не посмел. Между тем старший со страхом взбирался все выше и выше по перекладинам лестницы. Гаврош поощрял его одобрительными восклицаниями, точно фехтовальный учитель своих учеников или погонщик своих мулов:</p><p class="p1">– Смелей!.. Вот так!.. Не робей!.. Ставь теперь ногу вот сюда!.. Давай руку!.. Ну, еще немножко!..</p><p class="p1">И когда мальчик был уже достаточно близко к нему, Гаврош с силой потянул его за руку к себе и сказал:</p><p class="p1">– Вот так, молодцом!</p><p class="p1">Заставив затем ребенка спуститься в яму, он добавил:</p><p class="p1">– Теперь, сударь, милости прошу садиться. Будьте как дома и ждите меня.</p><p class="p1">С ловкостью и быстротой обезьяны он выбрался из впадины, соскользнул по ноге слона вниз, в густую траву, подхватил там меньшего мальчика и поставил его сразу на средину лестницы, потом стал сам позади его и крикнул старшему:</p><p class="p1">– Эй, ты, пузырь, принимай братца! А я буду поддерживать его отсюда.</p><p class="p1">Не успел пятилетний карапуз опомниться, как тоже очутился во внутренности слона. Поднявшись вслед за малюткой, Гаврош сильно толкнул лестницу, так что она упала на землю, забрался в трещину и, захлопав в ладоши, весело воскликнул:</p><p class="p1">– Вот мы и добрались! Да здравствует генерал Лафайет!</p><p class="p1">После этого взрыва веселости он прибавил:</p><p class="p1">– Ну, цыпочки, теперь вы у меня!</p><p class="p1">Действительно, Гаврош был тут у себя дома.</p><p class="p1">О, неожиданная польза бесполезного! Милосердие великих творений! Доброта исполинов! Этот величавый памятник, содержавший в себе мысль императора, сделался жилищем гамена! Ребенок был принят и укрыт великаном. Проходя по праздникам мимо слона на площади Бастилии, разряженные буржуа окидывали его презрительным взглядом глупо вылупленных глаз и бурчали: «Ну, на что это годно!» А «это» служило для того, чтобы спасти от холода, снега, града, дождя, вьюги, укрыть от зимнего ветра, предохранить от сна среди грязи, последствием чего бывает лихорадка, избавить от сна среди снега, ведущего к смерти, укрыть и защитить от всего этого маленькое существо без отца, без матери, без хлеба, без одежды, без приюта. «Это» служило для того, чтобы дать убежище невинному существу, отвергнутому обществом. «Это» служило для того, чтобы смягчить вину общества. «Это» была берлога того, для которого были заперты все двери.</p><p class="subtitle">VI</p><p class="p1">Трещина, которой пользовался Гаврош для того, чтобы проникнуть во внутренность слона, находилась во внутренней части исполинской фигуры; снаружи она не была заметна при беглом взгляде и притом настолько узка, что в нее только кошки и дети и могли пробираться.</p><p class="p1">– Ну, сперва надо сказать швейцару, что нас нет дома, если кто будет спрашивать, – с важностью проговорил Гаврош.</p><p class="p1">Юркнув в потемки с уверенностью человека, знающего все закоулки своей квартиры, он достал доску и закрыл ею трещину. Затем дети услышали слабый треск спички, всунутой в пузырек с фосфорическим составом. Наших спичек тогда еще не существовало; прогресс в эту эпоху представлялся огнивом Фюмада.</p><p class="p1">Внезапный свет заставил детей зажмуриться. Гаврош зажег кусок фитиля, пропитанного смолою. Такие фитили назывались «погребными крысами». «Крыса» Гавроша, более чадившая, чем светившая, очень слабо озаряла внутренность слона. Озираясь вокруг, маленькие гости Гавроша испытывали нечто сходное с тем, что испытывал бы человек, заключенный в знаменитую исполинскую Гейдельбергскую банку или, еще вернее, что испытывал Иона в чреве кита. Они видели охватывающий их со всех сторон гигантский остов. Длинное почерневшее бревно над их головами, от которого на известных расстояниях друг от друга выгибались по бокам толстые жерди, изображало позвоночный столб с ребрами; от бревна свешивались в виде сталактитов просочившиеся когда-то сверху и застывшие струйки жидкой штукатурки, а между противоположными ребрами протягивались серыми перепонками густо запыленные паутины. Там и сям, по углам, виднелись какие-то черные пятна, которые казались живыми; они быстро и суетливо шевелились, точно испуганные. Обломки, упавшие сверху и заслонившие нижнюю часть того, что изображало брюшную полость слона, позволяли свободно ходить в этой полости, как по полу.</p><p class="p1">Мальчуганы выглядели такими испуганными, что, по мнению гамена, им нужна была известная встряска.</p><p class="p1">– Чего вы там пищите! – крикнул он. – Вам не нравится здесь? Не нарядно для вас?.. В Тюльери, что ли, прикажете вас поместить?.. Скоты вы после этого!.. Смотрите вы у меня! Я ведь шутить с собой не позволю! Я вам покажу, как рыла воротить! Подумаешь, какие важные особы.</p><p class="p1">При боязни бывает очень полезна легкая суровость – она успокаивает. Дети подошли к Гаврошу и прижались к нему.</p><p class="p1">Тронутый таким доверием, он сразу перешел от строгости к ласке и, обратившись к младшему, мягко сказал ему:</p><p class="p1">– Дурачок ты этакий! Темно-то не здесь, а на дворе. На дворе льет дождь как из ведра, а здесь его нет; на дворе стужа, а здесь хоть не дует; на дворе куча народа, а здесь – никого, кроме нас; на дворе даже луны не видать, а здесь моя свечка, черт возьми! Чего же вам еще надо?</p><p class="p1">Дети начали посмелее оглядывать помещение, но Гаврош не дал им долго заниматься этим.</p><p class="p1">– Ступайте туда, – сказал он им, вталкивая их в глубину своей «комнаты», где помещалась его постель.</p><p class="p1">Постель Гавроша была вполне «как следует» – с тюфяком, «одеялом» и «альковом с пологом». Тюфяком служила соломенная циновка, одеялом – большая, почти новая и очень теплая серая шерстяная попона, альков же был устроен следующим образом: три длинных шеста – два спереди, один сзади – были крепко водружены внизу брюшной полости слона, а верхушками связаны вместе, так что получился пирамидальный шатер. На этот шатер была накинута проволочная сеть, искусно прикрепленная к шестам. Сеть эта составляла часть клетки, в которой помещаются в зверинцах птицы. К «полу» она была прикреплена рядом тяжелых камней, положенных на ее края. Под этим-то шатром, очень напоминавшим эскимосский, и находилась постель Гавроша. Шесты представляли «альков», сеть – «полог».</p><p class="p1">Гаврош раздвинул несколько камней спереди, и «полог», плотно запахнутый, раскрылся.</p><p class="p1">– Ну, малыши, вот вам и постель; ложитесь! – сказал гамен, помогая им пробраться под шатер.</p><p class="p1">Потом он сам забрался вслед за ними и также плотно накрыл опять полог и прикрепил его камнями, но только уже с внутренней стороны. Все трое растянулись на циновке.</p><p class="p1">Как ни малы были ребята, но ни один из них не мог стоять в алькове, потому что тот был слишком низок.</p><p class="p1">Гаврош все время держал в руке свою «крысу».</p><p class="p1">– Теперь извольте дрыхнуть! – скомандовал он. – Я потушу канделябр.</p><p class="p1">– Сударь, – спросил старший мальчик, показывая на сетку, – а это что такое?</p><p class="p1">– Это от крыс, – с важностью отвечал Гаврош. – Дрыхните же, говорю вам!</p><p class="p1">Однако через секунду он счел нужным снизойти к незнанию малюток и прибавил им в поучение:</p><p class="p1">– Все, что вы здесь видите, взято мною из зоологического сада от зверей. Там всего этого много, целая кладовая. Стоит только перелезть через стену, вскарабкаться в окошко, проползти под дверь, и бери что хочешь.</p><p class="p1">Во время этого объяснения он закутывал меньшего мальчика частью попоны.</p><p class="p1">– Ах, как тепло! Как хорошо! – бормотал обрадованный ребенок.</p><p class="p1">Гаврош с довольным видом полюбовался на одеяло и сказал:</p><p class="p1">– И это тоже из зверинца. Это я стибрил у обезьян.</p><p class="p1">Затем, указав на циновку, которая была очень толстая и превосходной работы, прибавил:</p><p class="p1">– А это я взял у жирафа.</p><p class="p1">После небольшой паузы он продолжал:</p><p class="p1">– Это все было у зверей. Я отнял у них. Они на это не рассердились. Я им сказал: «Это для слона».</p><p class="p1">Он снова немного помолчал и потом пробурчал:</p><p class="p1">– Лезешь себе через стены и знать никого не хочешь. Да и чего бояться?</p><p class="p1">Дети с изумлением и боязливым уважением смотрели на это предприимчивое и изобретательное существо, которое было таким же бродягой, как они, таким же одиноким и жалким, но в котором было что-то особенное, что-то могучее, казавшееся сверхъестественным, и физиономия которого представляла собою смесь ужимок старого фокусника в соединении с самой прелестной, самой наивной улыбкой.</p><p class="p1">– Сударь, вы, значит, не боитесь городских сержантов? – робко спросил старший из мальчиков.</p><p class="p1">– Малыш, нужно говорить не «сержанты», а «фараоны», – наставительно заметил Гаврош.</p><p class="p1">Младший лежал молча, с широко открытыми глазами. Так как он находился с краю циновки, между тем как брат его приходился посредине, то Гаврош завернул вокруг него одеяло, как сделала бы мать, и устроил ему с помощью тряпок, подсунутых под циновку, нечто в роде подушки.</p><p class="p1">– А ведь тут недурно, а? – обратился он затем к старшему.</p><p class="p1">– О, да! – ответил тот, глядя на Гавроша с выражением ангела, спасенного от смерти.</p><p class="p1">Вымокшие до костей дети начали согреваться.</p><p class="p1">– А скажите-ка теперь, из-за чего вы давеча так хныкали? – продолжал Гаврош и, указывая на младшего, прибавил: – Этому карапузу еще простительно реветь, а такому большому, как ты, ужасно стыдно. Ты тогда становишься похожим на мокрую курицу и на идиота.</p><p class="p1">– Да ведь нам некуда было идти и было очень страшно одним, – ответил старший.</p><p class="p1">Гаврош то и дело прерывал его, советуя заменять многие выражения словами из воровского языка; мальчик благодарил его за наставление и обещал запомнить.</p><p class="subtitle">VII</p><p class="p1">Дети крепко прижались друг к другу. Гаврош расправил под ними сбитую циновку, еще раз подоткнул везде попону и снова велел им «дрыхнуть». Потом задул фитиль.</p><p class="p1">Только что он успел сам хорошенько улечься, как проволочный шатер стал трястись под влиянием чего-то странного. Слышалось глухое трение, точно когтей и зубов о проволоку, издававшую резкие металлические звуки. При этом что-то пищало на разные голоса.</p><p class="p1">Младший мальчик, услыхав возле себя эту непонятную возню и задрожав от ужаса, толкнул локтем старшего, который уже «дрыхнул» по приказанию Гавроша. Тогда ребенок, не помня себя от страха, осмелился обратиться к Гаврошу робким шепотом, боясь даже громко дохнуть:</p><p class="p1">– Сударь!</p><p class="p1">– Чего тебе? – отозвался гамен, начинавший уже дремать.</p><p class="p1">– Что это такое?</p><p class="p1">– Крысы, – спокойно ответил Гаврош, укладывая поудобнее голову.</p><p class="p1">Действительно, это были крысы, кишмя кишевшие в остове слона и являвшиеся теми самыми живыми черными пятнами, о которых мы говорили выше. Пока горел огонь, крысы держались в почтительном отдалении, но как только в этой яме, населенной ими бог весть когда, снова воцарилась обычная темнота, они, почуяв то, что славный сказочник Перро называл «свежим мясом», толпами набросились на шалаш, с таким искусством устроенный Гаврошем, вскарабкались на верхушку и с ожесточением принялись грызть проволоку, надеясь прорвать ее своими острыми зубами и таким образом забраться во внутренность шалаша. Между тем меньший мальчик все еще не спал.</p><p class="p1">– Сударь! – снова окликнул он Гавроша.</p><p class="p1">– Ну что еще, карапуз?</p><p class="p1">– Что такое крысы?</p><p class="p1">– Крысы – это мыши.</p><p class="p1">Такое объяснение немного успокоило ребенка. Он видал уже белых мышек и не боялся их. Тем не менее он через минуту снова подал свой голосок:</p><p class="p1">– Сударь!</p><p class="p1">– Ну?</p><p class="p1">– А почему у нас нет кошки?</p><p class="p1">– У меня была кошка, но ее съели.</p><p class="p1">Это второе объяснение уничтожило действие первого, и мальчуган снова начал тревожиться. Между ним и Гаврошем снова возобновился следующий разговор:</p><p class="p1">– Сударь!</p><p class="p1">– Ну еще что?</p><p class="p1">– Кого это съели?</p><p class="p1">– Кошку.</p><p class="p1">– А кто же ее съел?</p><p class="p1">– Крысы.</p><p class="p1">– Мыши?</p><p class="p1">– Да, крысы.</p><p class="p1">Пораженный тем, что находится в обществе мышей, которые съедают кошек, ребенок продолжал:</p><p class="p1">– Сударь, а нас не съедят эти мыши?</p><p class="p1">– Наверное, они не прочь бы это сделать, – отвечал Гаврош, но, видя, что ребенок совсем замер от ужаса, прибавил:</p><p class="p1">– Не бойся, цыпленок! Мыши не могут пробраться к нам. Да и потом ведь я здесь. На вот, возьми мою руку. Молчи и спи.</p><p class="p1">С этими словами он протянул руку ребенку, который прижался к ней и успокоился. Мужество и сила таинственным способом передаются от одного к другому.</p><p class="p1">Звук голоса испугал и отогнал крыс. На время вокруг шалаша водворилась полная тишина. Но через несколько минут крысы снова вернулись и с еще большим ожесточением принялись за решетку. К счастью, мальчики уже крепко спали и ничего не слыхали.</p><p class="p1">Часы шли за часами. Мрак окутывал огромную площадь Бастилии. Холодный, настоящий зимний ветер, смешанный с дождем, бушевал, как в степи. Патрули обшныривали ворота, аллеи, огороженные места, темные закоулки и в поисках ночных бродяг молча проходили мимо слона. Застыв в своей неподвижной позе, с широко открытыми глазами, чудовище казалось погруженным в раздумье о том добром деле, которое оно совершило, приютив от непогоды и от людей бедных, сладко теперь спавших в нем детей.</p><p class="p1">Чтобы понять то, о чем сейчас будет речь, следует знать, что в описываемую эпоху гауптвахта Бастилии помещалась на другом конце площади, откуда не могло быть замечено часовыми ничего, что происходило около слона.</p><p class="p1">В исходе того часа, который непосредственно предшествует рассвету, с улицы Сент-Антуан торопливо вышел на площадь Бастилии какой-то человек. Осмотревшись вокруг, он бегом направился к Июльской колонне, обогнул ее и проскользнул сквозь палисадник под брюхо слона. Если бы какой-нибудь свет озарил этого человека, то можно было бы заметить, что он весь промок, проведя, очевидно, всю ночь под дождем. Добравшись до слона, он испустил странный крик, который мог бы быть вполне воспроизведен разве только попугаем. Он два раза повторил этот крик, о котором может дать приблизительное понятие следующее сочетание букв: «Кир кикиу!»</p><p class="p1">На вторичный крик из брюха слона отозвался молодой, ясный и веселый голос:</p><p class="p1">– Здесь!</p><p class="p1">Вслед за тем доска, закрывавшая отверстие в слоне, отодвинулась и из-за нее показался мальчик, который, проворно скользнув вдоль ноги слона, спрыгнул с ее нижней оконечности на землю. Мальчик этот был Гаврош, а вызывавший его – Монпарнас.</p><p class="p1">Должно быть, крик Монпарнаса был условным и означал: «Здесь ли ты, Гаврош?»</p><p class="p1">Услыхав этот крик сквозь сон, гамен тотчас же вскочил, выполз из своего алькова, раздвинул немного сеть, затем снова тщательно задвинул и закрепил ее; после этого он открыл люк и спустился вниз.</p><p class="p1">Монпарнас и Гаврош сразу узнали друг друга в ночной темноте. Монпарнас ограничился словами:</p><p class="p1">– Ты нам нужен. Иди, помоги нам немного.</p><p class="p1">Гамен не требовал других объяснений.</p><p class="p1">– Иду, – сказал он.</p><p class="subtitle">VIII</p><p class="p1">Мятеж есть одно из явлений, выходящих из ряда вон. Он всегда вспыхивает одновременно во всех местах. Первый встречный овладевает толпой и ведет ее куда хочет. Ужасное дело, к которому примешивается что-то вроде зловещей веселости. Начинается обыкновенно с криков, потом запираются лавки, выставки товаров исчезают, там и сям раздаются одинокие выстрелы, люди бегут, удары прикладами потрясают ворота, слышно, как в глубине дворов смеются служанки, приговаривая: «Ну, быть потехе!»</p><p class="p1">Около шести часов вечера пассаж Дю-Симон превратился в место битвы. В одном конце его находились мятежники, в другом – войска.</p><p class="p1">Перестреливались от решетки до решетки. Посторонний наблюдатель, мечтатель, автор этой книги, пожелавший взглянуть в непосредственной близости на бурливый вулкан, очутился в этом пассаже буквально между двух огней. У него не было другой защиты, кроме выступов полуколонн, отделявших один от другого магазины, и он около получаса находился в этом неприятном положении. Между тем пробили сбор: национальная гвардия поспешно надевала мундиры и вооружалась, легионы выступали из мэрий, полки выходили из казарм. Против пассажа Де-Ланкер один барабанщик пал под ударом кинжала. Другой был атакован тридцатью молодыми людьми, которые разбили его барабан и отняли у него саблю. Третий был убит.</p><p class="p1">Восстание из центра Парижа устроило что-то вроде недоступной, исполинской, извилистой цитадели. Там был очаг движения, там, очевидно, и сосредоточивалось все дело; остальное же было не более как мелкие стычки. Так как в центре еще не дрались, то можно было понять, что решение вопроса подготовлялось именно там.</p></span>
