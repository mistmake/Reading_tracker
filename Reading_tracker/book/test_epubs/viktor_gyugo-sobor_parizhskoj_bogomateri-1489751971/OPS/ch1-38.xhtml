<p class="p">IV. Lasciate ogni speranza<a href="ch2.xhtml#id137" class="a">[120]</a></p>
</div><p class="p1">В Средние века в каждом законченном здании почти такая же часть, какая находилась над землей, скрывалась и под землей. Каждый дворец, каждая крепость, каждый храм, если только они не были построены на сваях, как собор Богоматери, имели подземные этажи. В соборах бывали как бы еще другие, подземные соборы – низкие, темные, таинственные, слепые и немые, помещавшиеся под первыми, верхними, залитыми светом, оглашаемыми день и ночь звуками органа и колоколов. Иногда то бывали склепы. Во дворцах и крепостях под землей помещались темницы либо тоже склепы, а иногда и то и другое вместе. Эти огромные здания, способ постройки которых мы уже объяснили, имели не только фундаменты, но и, так сказать, корни, которые разветвлялись под землей в виде комнат, галерей, лестниц, таких же, как в надземном помещении. Таким образом, половина корпуса церквей, дворцов и укреплений находилась в земле. Подвалы здания были другим зданием, в которое спускались, вместо того чтобы подниматься, и которое соприкасалось своими подземными этажами с громадой надземных этажей, как соприкасаются леса и горы, отраженные на зеркальной поверхности озера, с подножием гор и лесов, находящихся на его берегу.</p><p class="p1">В Сент-Антуанской бастилии, в парижском Дворце правосудия, в Лувре эти подземелья были тюрьмами. По мере того как этажи этих тюрем углублялись ниже и ниже, они становились все теснее и темнее. Каждый этаж представлял как бы пояс известной степени ужаса. Данте не мог найти ничего лучшего для своего ада. Эти тюрьмы-воронки обыкновенно оканчивались колодцем-ямой, куда Данте поместил своего Сатану и куда общество заключало приговоренных к смерти. Раз несчастный попадал в такой колодец – прощай, свет, воздух, жизнь, прощай, всякая надежда! Он выходил оттуда только на виселицу или костер. Иногда он тут и сгнивал. Человеческое правосудие называло это забвением. Осужденный чувствовал, что между ним и людьми над его головой тяготеет каменная громада, а тюремщики, вся тюрьма, вся крепость представлялись ему огромным сложным замкóм, за которым он сидит, исключенный из мира живых.</p><p class="p1">В такое-то подземелье, в колодец, вырытый Святым Людовиком в тюрьме для вечного заключения в Турнеле, поместили, вероятно опасаясь ее бегства, Эсмеральду, приговоренную к повешению. Над ее головой высилась громада Дворца правосудия. Бедная мушка, которая не могла шевельнуть ни одной из своих маленьких лапок!</p><p class="p1">Без сомнения, судьба и общество были одинаково несправедливы. Не было надобности в таком избытке бедствия и муки, чтобы разбить столь хрупкое создание.</p><p class="p1">Она очутилась в темноте, погребенная, закопанная, замурованная. Всякий, кому пришлось бы увидеть ее в таком положении после того, как он ее видел пляшущей и смеющейся на солнце, несомненно, содрогнулся бы. Кругом тьма и холод смерти. Ни одно дуновение ветерка не шевелило ее волос, ни один человеческий звук не касался ее слуха, ни один луч света не достигал ее глаз. Разбитая, раздавленная цепями, сидя возле кружки с водой и куском хлеба, на охапке соломы, в луже воды, образовавшейся из капель, стекавших со стен тюрьмы, без движения, почти без дыхания, – она уже не имела сил даже для страданий. Феб, солнце, полдень, свобода, улицы Парижа, пляски при рукоплесканиях, сладостный любовный лепет с офицером; затем монах, кинжал, кровь, пытка, виселица – все это еще мелькало в ее голове, то как радостное, золотое видение, то как уродливый кошмар. Но это были уже лишь смутные и ужасные образы, терявшиеся во мраке, тихие отдаленные звуки, раздававшиеся там, наверху, на земле, и не достигавшие уже глубины, где была заточена несчастная. С тех пор как ее поместили здесь, она не бодрствовала, но и не спала. Со своим несчастием, в этом склепе, она уже не была в состоянии отличить бодрствование от сна, сновидение от действительности, день от ночи. Все смешивалось, дробилось, расплывалось, носилось в мыслях в каком-то тумане. Она уже не чувствовала, не сознавала, не думала, разве только грезила. Никогда еще живое существо не стояло так близко к небытию.</p><p class="p1">В таком оцепенении, застывшая от холода, окаменевшая, она едва слышала два или три раза стук открывавшегося где-то над ее головой люка, через который не проникало даже ни единого луча света, но через который чья-то рука бросала ей корку черного хлеба. Это периодическое появление тюремщика было единственным ее общением с людьми.</p><p class="p1">Один только звук невольно занимал ее слух. Над ее головой сырость просачивалась через заплесневевший камень свода, и через ровные промежутки времени с него падали капля за каплей. Эсмеральда бессознательно слушала шум, производимый этой каплей при падении в лужу возле ее подстилки.</p><p class="p1">Эта падающая капля была единственным движением вокруг, единственными часами, указывавшими течение времени, единственным звуком из всех звуков, раздававшихся на поверхности земли.</p><p class="p1">В довершение всего Эсмеральда часто чувствовала, как что-то холодное пробегает у нее по руке или ноге среди этой зловонной темноты, и вздрагивала.</p><p class="p1">Сколько времени она пробыла в этом подземелье, она не знала. Она смутно помнила, что где-то над кем-то был произнесен смертный приговор, что затем ее унесли куда-то и что она, вся закоченев, пришла в себя среди темноты и полного безмолвия. Она поползла на руках, цепи зазвенели и врезались ей в ноги. Она убедилась, что ее окружает одна сплошная стена и что она лежит на снопе соломы, брошенном на мокрый пол. Нигде ни светильника, ни отдушины! Тогда она села на этой соломе, а иногда, чтобы переменить положение, переходила на последнюю ступень каменной лестницы, находившейся в ее тюрьме.</p><p class="p1">Эсмеральда попробовала было считать минуты по падавшим каплям, но скоро это слабое усилие больного мозга само собой прервалось, и она погрузилась в полное оцепенение.</p><p class="p1">Наконец – днем то было или ночью, она не знала: в этом склепе полночь и полдень были одинаково черны – она услыхала над своей головой шум более сильный, чем производила обыкновенно подъемная дверь, через которую ей спускали хлеб и кружку с водой. Она подняла голову и увидала красноватый луч, падавший через люк, устроенный в своде камеры.</p><p class="p1">В то же время загремел тяжелый засов, люк со скрипом поднялся на заржавленных петлях, и Эсмеральда увидала руку, фонарь и нижнюю часть туловища двух человек. Дверь была слишком низка, чтобы можно было рассмотреть их головы. От света ее глазам стало так больно, что она их закрыла.</p><p class="p1">Когда она снова открыла глаза, дверь была затворена, фонарь поставлен на ступеньку, а перед ней стоял человек – один. Черный плащ окутывал его с головы до ног, капюшон такого же цвета закрывал лицо. Не было видно ни фигуры, ни лица, ни рук. Перед Эсмеральдой стоял черный саван, под которым что-то двигалось. Несколько секунд она, не сводя глаз, смотрела на привидение; оба молчали. Они походили на две встретившиеся статуи. Только две вещи, казалось, жили в этом подземелье: фитиль фонаря, трещавший от сырости воздуха, да водяная капля, прерывавшая этот неровный треск своим монотонным падением, заставляя дрожащий отблеск фонаря разбегаться кругами по маслянистой поверхности лужи. Наконец узница прервала молчание:</p><p class="p1">– Кто вы?</p><p class="p1">– Священник.</p><p class="p1">Слово, интонация, звук голоса заставили ее вздрогнуть. Священник продолжал глухим голосом:</p><p class="p1">– Вы приготовились?</p><p class="p1">– К чему?</p><p class="p1">– К смерти.</p><p class="p1">– О! – сказала она. – Скоро ли это будет?</p><p class="p1">– Завтра.</p><p class="p1">Голова ее, которую она было радостно подняла, снова упала на грудь.</p><p class="p1">– Как долго! – проговорила она. – Отчего не сегодня?</p><p class="p1">– Вы, стало быть, очень несчастны? – спросил священник, помолчав.</p><p class="p1">– Мне очень холодно, – ответила она.</p><p class="p1">Она взялась руками за ноги движением, свойственным людям, которым холодно; мы уже видели такое же движение у узницы Роландовой башни. Зубы ее застучали.</p><p class="p1">Священник, по-видимому, осмотрел из-под капюшона камеру.</p><p class="p1">– Без света! Без огня! В воде! Это ужасно!</p><p class="p1">– Да, – отвечала она с тем изумленным видом, который ей придало несчастье. – Свет ведь для всех. Отчего мне дают только мрак?</p><p class="p1">– Знаете ли вы, за что вы здесь? – спросил священник.</p><p class="p1">– Кажется, знала, – сказала она, проводя худыми пальчиками по лбу, как бы стараясь помочь своей памяти, – только теперь забыла.</p><p class="p1">Вдруг она расплакалась, как ребенок.</p><p class="p1">– Мне хотелось бы уйти отсюда, сударь. Мне холодно, страшно. По моему телу бегают какие-то звери.</p><p class="p1">– Хорошо, идите за мной.</p><p class="p1">С этими словами священник взял ее за руку. Бедняжка вся окоченела и тем не менее почувствовала холод от прикосновения этой руки.</p><p class="p1">– О! Это ледяная рука смерти, – проговорила она. – Кто же вы?</p><p class="p1">Священник поднял капюшон. Она увидела то зловещее лицо, которое так давно преследовало ее, ту дьявольскую голову, которую она увидала у Фалурдель над головой обожаемого Феба, тот самый взор, который сверкнул перед ней рядом с кинжалом.</p><p class="p1">Появление этого человека, всегда роковое для нее, толкавшее ее от одного несчастья к другому, вплоть до осуждения на казнь, вывело ее из оцепенения. Ей показалось, что покров, окутывавший ее память, порвался.</p><p class="p1">Все подробности кровавого происшествия, от ночной сцены в доме Фалурдель до приговора на суде, сразу воскресли в ее памяти не в неясных, расплывчатых воспоминаниях, как до сих пор, но в отчетливых, резких, трепещущих, ужасных образах. Темная фигура, стоявшая перед ней, снова оживила эти воспоминания, почти изгладившиеся под влиянием чрезмерных страданий, подобно тому, как приближение огня заставляет резко выступить на белой бумаге невидимые буквы, написанные симпатическими чернилами. Ей показалось, что все раны ее сердца раскрылись снова и сочатся кровью.</p><p class="p1">– А! – крикнула она, с судорожной дрожью закрывая глаза рукой. – Это тот священник!</p><p class="p1">Затем руки ее беспомощно опустились, и она села, понурив голову, устремив глаза в землю, безмолвно трепеща.</p><p class="p1">Священник смотрел на нее глазами коршуна, который долго кружился в воздухе над головой бедного жаворонка, притаившегося во ржи, безмолвно сужая спираль своего полета, и вдруг как молния бросился на добычу, сжимая трепещущую птичку в когтях.</p><p class="p1">Эсмеральда тихо проговорила:</p><p class="p1">– Кончайте! Нанесите последний удар! – Она в ужасе втянула голову в плечи, как овечка, ожидающая удара дубины мясника.</p><p class="p1">– Я внушаю вам ужас? – спросил он.</p><p class="p1">Она не отвечала.</p><p class="p1">– Неужели я внушаю вам ужас? – повторил он.</p><p class="p1">Ее губы искривились, точно она улыбалась.</p><p class="p1">– Да, – сказала она, – палач еще смеется над осужденной! Вот уже целые месяцы, как он преследует меня, грозит, пугает меня! Боже, как я была счастлива без него! Он толкнул меня в эту пропасть! Небо! Это он убил… он убил его… моего Феба!</p><p class="p1">Рыдая, она подняла глаза на священника.</p><p class="p1">– О презренный! Кто вы? Что я вам сделала? За что вы так ненавидите меня? За что?</p><p class="p1">– Я люблю тебя! – крикнул священник.</p><p class="p1">Слезы Эсмеральды сразу высохли. Она смотрела на священника тупым взглядом. Он же упал перед ней на колени и пожирал ее пламенным взглядом.</p><p class="p1">– Слышишь ты? Я люблю тебя! – еще раз закричал он.</p><p class="p1">– Что же это за любовь! – прошептала несчастная, содрогаясь.</p><p class="p1">Он продолжал:</p><p class="p1">– Любовь обреченного грешника.</p><p class="p1">Оба несколько секунд молчали, подавленные тяжестью своих чувств; он – обезумевший, она – совершенно отупевшая.</p><p class="p1">– Слушай, – заговорил наконец священник, к которому вернулось странное спокойствие. – Ты все узнаешь. Я тебе признаюсь в том, в чем до сих пор едва решался признаться самому себе, вопрошая свою совесть в те поздние ночные часы, когда мрак так глубок, что сам Бог, кажется, не видит нас. Слушай. До встречи с тобой, девушка, я был счастлив…</p><p class="p1">– И я тоже! – со слабым вздохом прошептала она.</p><p class="p1">– Не прерывай меня… Да, я был счастлив, по крайней мере, верил, что счастлив. Я был чист; на душе у меня было ясно и светло. Никто не держал голову так высоко, как я. Священники учились у меня целомудрию, доктора – науке. Да, наука была для меня всем! Она была мне сестрой, и, кроме нее, мне никого не было нужно. Между тем с летами мне стали приходить другие мысли. Не раз моя плоть волновалась, когда мне случалось видеть проходившую мимо женщину. Не раз волнение крови, которое я, безумный юноша, считал подавленным навеки, судорожно потрясало железные обеты, приковывавшие меня, презренного, к холодным плитам алтаря. Но пост, молитва, занятия, умерщвление плоти снова вернули душе господство над телом. Я избегал женщин. К тому же стоило мне открыть книгу, чтоб все нечистые помыслы рассеялись перед лучезарным сиянием науки. Через несколько минут я чувствовал, как все тяжелые мирские дела отступали все дальше и дальше, я снова становился спокойным, созерцая в душевной ясности ослепительное, но спокойное сияние вечной истины. Пока дьявол посылал, чтобы меня искушать, лишь неясные женские образы, мелькавшие мимо меня поодиночке то в храме, то на улице, то где-нибудь вблизи и лишь слегка тревожившие меня во сне, – я легко побеждал дьявола. Увы! Если победа осталась не за мной, – виноват Бог, давший неодинаковые силы дьяволу и человеку… Слушай же! Однажды…</p><p class="p1">Здесь священник остановился, и узница услышала, как из груди его вырвался хриплый, стонущий вздох.</p><p class="p1">Он продолжал:</p><p class="p1">– Однажды я стоял, облокотясь, у окна моей кельи. Что я тогда читал?.. Теперь все перепуталось у меня в голове… Итак, я читал. Окно выходило на площадь. Я услыхал звук бубна и музыку. Досадуя, что мне мешают, я взглянул в окно. То, что я увидал, видели и другие, а между тем то было зрелище, созданное не для человеческих глаз. Там, посредине площади, – был полдень… светило солнце… плясала девушка. Девушка столь прекрасная, что Бог предпочел бы ее Пресвятой Деве, избрал бы ее своей матерью, пожелал бы родиться от нее, если бы она существовала тогда, когда он решил воплотиться в человека. У нее были чудные черные глаза, в черных волосах, под солнечными лучами, загорались золотые нити. Ножки исчезали в движении, как спицы быстро вертящегося колеса. Вокруг головы в ее черные косы были вплетены золотые пластинки, сверкавшие на солнце и образовавшие на ее лбу как бы корону из звезд. Ее платье, усеянное блестками, отливало голубым цветом и все искрилось, как летняя ночь. Ее гибкие смуглые руки сплетались вокруг талии и расплетались, как два шарфа. Формы ее тела были удивительно красивы. Какое это было ослепительное создание! Оно лучезарно сверкало даже при ярком свете солнца!.. Увы, эта девушка была ты!.. Изумленный, опьяненный, очарованный, я поддался искушению и смотрел на тебя. Я смотрел на тебя, пока не вздрогнул от ужаса, чувствуя, что уже не в силах противиться року.</p><p class="p1">Под гнетом тяжелых воспоминаний священник снова остановился. Затем продолжал:</p><p class="p1">– Уже наполовину побежденный, я пытался ухватиться за что-нибудь, чтобы удержаться в своем падении. Я вспомнил про те сети, которые Сатана уже расставлял мне. Создание, которое я видел перед собой, было одарено такой сверхъестественной красотой, что могло быть только даром неба или ада. То не была девушка, созданная, как мы все, из земли и бледно освещенная изнутри мерцающим лучом женской души. То был ангел, но не лучезарный ангел света, а ангел мрака и пламени. В ту минуту, как я подумал об этом, я увидел возле тебя козу – дьявольское животное: она смотрела на меня, смеясь. Рога ее при полуденном солнце горели, как огненные. Тут я начал подозревать западню со стороны дьявола и уже не сомневался, что ты порождение ада, посланное мне на погибель. Я был убежден в этом. – Тут священник взглянул прямо в лицо узнице и прибавил холодно: – Я и теперь убежден в этом… Между тем очарование действовало мало-помалу. Твоя пляска кружила мне голову, я чувствовал, как колдовство овладевало мной. Все, что должно было бодрствовать в моей душе, засыпало, и, подобно людям, умирающим в снегу, я с удовольствием поддавался этому сну. Вдруг ты начала петь. Что мне, несчастному, оставалось делать? Твое пение было еще очаровательнее пляски. Я хотел бежать. Невозможно. Я был пригвожден, я прирос к месту. Мне казалось, что мраморные плиты пола доходят мне до колен. Пришлось остаться до конца. Ноги у меня были как лед, а голова горела. Наконец ты, может быть, сжалилась надо мной, – ты перестала петь и исчезла. Мало-помалу ослепительное видение в моих глазах и звук чарующей музыки в моих ушах стали исчезать. Я упал на подоконник, обессиленный и неподвижный, как разбитая статуя. Разбудил меня звон к вечерне. Я встал и убежал. Но – увы! – во мне рушилось что-то, что не могло уже подняться. Явилось нечто новое, пришедшее извне, от чего я не мог спастись.</p><p class="p1">Он снова помолчал и продолжал:</p><p class="p1">– Да, с этого дня во мне поселился другой человек, которого я не знал. Я пустил в ход все средства противодействия – покаяние, молитву, работу, книги… Безумство! О, каким пустым звуком кажется наука, когда в отчаянии прибегаешь к ней с головой, полной страстей! Знаешь ли ты, что я с этой минуты постоянно видел между собой и книгой? Тебя, твою тень, лучезарное видение, промелькнувшее однажды передо мной. Но этот образ уже имел иную окраску: он был мрачный, зловещий, темный, как черный круг, долго преследующий зрение неосторожного, который прямо взглянул на солнце.</p><p class="p1">Не будучи в силах избавиться от твоего образа, вечно слыша твою песню, вечно видя перед собой твои пляшущие ножки, ощущая ночью твое прикосновение к себе, я жаждал снова увидеть тебя, прикоснуться к тебе, узнать, кто ты, убедиться, действительно ли ты походишь на тот идеал, который ты оставила в моей памяти, – быть может, разбить свою мечту о действительность! Во всяком случае, я надеялся, что новое впечатление изгладит прежнее, а прежнее мне стало невыносимо. Я начал разыскивать тебя и снова увидал. Несчастье! Когда я увидел тебя два раза, я пожелал видеть тебя тысячу раз, видеть тебя вечно! После этого как мог я остановиться на этой адской покатости? Я уже не принадлежал себе. Враг человека привязал к твоим ногам конец нити, который связал мои крылья. Я стал таким же бездомным бродягой, как ты. Я поджидал тебя на церковных папертях, за углом улиц, караулил тебя на вершине своей башни. И с каждым днем я все более и более очаровывался, приходил все в большее и большее отчаяние, все больше и больше поддавался колдовству. Я окончательно погибал.</p><p class="p1">Я узнал, что ты цыганка, египтянка, хитана, зингара. Как мог я сомневаться, что ты колдунья! Слушай. Я надеялся, что процесс избавит меня от твоих чар. Колдунья околдовала Бруно д’Аста. Он добился ее сожжения и исцелился. Я захотел испытать это средство. Сначала я пытался запретить тебе доступ на площадь перед собором, надеясь позабыть тебя, если ты не вернешься. Ты не обратила внимания на это запрещение. Ты вернулась. Тогда мне пришла мысль похитить тебя. Однажды ночью я сделал попытку. Нас было двое. Мы уже схватили тебя, когда явился этот несчастный офицер и отбил тебя. Этим он положил начало своему несчастью, твоему и моему. Наконец, не зная, что делать, куда броситься, я донес на тебя консистории. Я думал, что исцелюсь, как Бруно д’Аст. У меня также смутно мелькала мысль, что процесс предаст тебя в мои руки и что, раз ты попадешь в тюрьму, ты уже не уйдешь от меня, что ты уже довольно долго владеешь мной, чтоб я в свою очередь мог овладеть тобой. Когда делаешь зло, надо делать его до конца. Безумие остановиться на полдороге, когда идешь на чудовищное дело! Завершенное преступление таит в себе безумие и радость. Священник и колдунья могут погрузиться в наслаждения на охапке соломы в тюрьме!</p><p class="p1">Итак, я донес на тебя. С этих пор я стал пугать тебя при встречах. Замысел, который я питал против тебя, гроза, которую собирал над твоей головой, прорывались в угрозах и вспышках с моей стороны. Однако я еще колебался. Мой план имел ужасающие особенности, заставившие меня отступать.</p><p class="p1">Может быть, я и совсем отказался бы от него, может быть, моя чудовищная мысль засохла бы у меня в мозгу, не принеся плода. Мне казалось, что от меня зависит, продолжить или прекратить процесс. Но всякая злая мысль непреклонна и требует перехода к делу. И там, где я считал себя всемогущим, судьба оказалась сильнее меня. Увы! Увы! Это она взяла тебя и бросила под колеса машины, которую я коварно соорудил!.. Слушай. Я подхожу к концу.</p><p class="p1">Однажды – опять был такой же солнечный день – я встретился с человеком, произнесшим твое имя со смехом и сладострастием во взгляде. Проклятие! Я последовал за ним. Остальное тебе известно…</p><p class="p1">Он умолк.</p><p class="p1">У молодой девушки нашлось только одно слово:</p><p class="p1">– О мой Феб!</p><p class="p1">– Не упоминай этого имени! – воскликнул священник, схватывая ее за руку. – Не произноси его! Это имя погубило нас всех! Или скорее мы все губили друг друга по воле неумолимого рока!.. Ты страдаешь, ты зябнешь, слепнешь от постоянного мрака, тюрьма давит тебя. Но, быть может, в душе твоей еще сохранился какой-нибудь свет, хотя бы твоя детская любовь к этому пустому офицеру, игравшему твоим сердцем! Я же ношу тюрьму в душе. Во мне зима, лед, отчаяние, ночь… Знаешь ли ты, как я страдал? Я присутствовал при твоем процессе. Я сидел в числе представителей консистории. Да, под одним из священнических капюшонов бился в судорогах грешник, находящийся под проклятием. Я был там, когда тебя привели, присутствовал при твоем допросе… Волчья берлога… Я видел, как медленно воздвигалась для тебя виселица, созданная мною, моим преступлением… Я присутствовал при допросе свидетелей, при предъявлении документов, при чтении всего обвинения. Я мог считать каждый твой шаг на скорбном пути. Я слышал, как этот хищный зверь… королевский прокурор… О! я не предвидел пытки! Слушай! Я последовал за тобой в застенок. Я видел, как тебя раздел и как схватил тебя своими гнусными руками палач. Я видел, как твою ножку – ту ножку, за прикосновение к которой губами я отдал бы все в мире, под которую я с радостью положил бы свою голову, чтоб она раздавила ее, – я видел, как эту ножку сжал ужасный «сапог», превращающий члены живого существа в кровавую массу. О, презренный! Смотря на все это, я взбороздил себе всю грудь кинжалом, который держал под плащом. При крике, вырвавшемся у тебя, я вонзил в себя кинжал, и если б я услыхал еще раз крик, острие пронзило бы мне сердце! Взгляни: рана еще не зажила.</p><p class="p1">Он распахнул сутану. Действительно, грудь была словно исцарапана когтями тигра, а на боку виднелась довольно большая и плохо затянувшаяся рана.</p><p class="p1">Узница в ужасе отшатнулась.</p><p class="p1">– Сжалься надо мной, девушка, – молил священник. – Ты думаешь, что ты несчастна. Увы! Увы! Ты не знаешь, что такое несчастье. О! Любить женщину и быть монахом! Возбуждать ненависть! Любить девушку страстно, всеми силами своей души, за одну ее улыбку быть готовым отдать всю свою кровь, всего себя, свое доброе имя, свое спасение, бессмертие, вечность, эту жизнь и будущую; сожалеть, что ты не король, не гений, не император, не архангел, не Бог, чтоб иметь возможность повергнуть к ее ногам еще большую жертву; и только мысленно, в сновидениях прижимать ее к своей груди и видеть, что она влюблена в военный мундир! Иметь возможность явиться к ней только в монашеской рясе, возбуждающей в ней, быть может, отвращение и страх! Видеть, тая в душе ревность и бешенство, как она расточает сокровища любви и красоты жалкому хвастуну! Видеть, как это существо, один взгляд на которое зажигает всю кровь, как эта нежная грудь краснеет и трепещет под поцелуями другого!.. О Небо! Любить эту ножку, эту ручку, это плечико, бредить голубыми жилками на смуглой коже и ночью валяться в корчах на полу своей кельи! Видеть, что вместо ласк, которыми ты мечтал осыпать ее, ты довел ее до пытки и только уложил на кожаный тюфяк! Да! Это настоящие клещи, раскаленные на адском пламени! О, счастливы те, кого распиливают надвое или разрывают лошадьми на четыре части! Имеешь ли ты понятие о муках, которые испытываешь в долгую ночь, когда кровь кипит в твоих жилах, когда сердце разрывается на части, голова готова лопнуть, зубы впиваются в руки? Когда мысль твоя постоянно возвращается к твоей любви, ревности и отчаянию, и кажется, что остервенелые палачи непрестанно поворачивают тебя на раскаленной решетке? Молю тебя, сжалься! Дай минуту вздохнуть! Посыпь немного пепла на эти пылающие угли! Вытри, умоляю тебя, пот, струящийся по моему лицу! Дитя мое, мучь меня одной рукой, но только ласкай другою! Сжалься надо мной, девушка, сжалься!</p><p class="p1">Священник лежал на каменном мокром полу и бился головой об углы каменных ступеней. Девушка слушала и смотрела на него.</p><p class="p1">Когда же он, изнемогая и задыхаясь, умолк, она проговорила:</p><p class="p1">– О мой Феб!</p><p class="p1">Клод подполз к ней на коленях.</p><p class="p1">– Умоляю тебя! – вскричал он. – Если в тебе есть сердце, не отталкивай меня! О, я люблю тебя! Я – презренный, несчастный! Когда ты произносишь это имя, ты словно терзаешь своими зубами мое сердце! Сжалься! Если ты исчадие ада, я последую за тобой в ад. Я все сделал, чтобы попасть туда. Ад, где ты будешь, будет для меня раем. Видеть тебя – это больше, чем видеть Бога! О, скажи! Ты отворачиваешься от меня? Мне казалось, что в тот день, когда женщина отвергнет такую любовь, горы должны сдвинуться с места. О, если бы ты пожелала, как мы могли бы быть счастливы! Мы бы бежали – я устроил бы твой побег, – ушли бы куда-нибудь, отыскали бы местечко на земле, где больше всего солнца, где кругом деревья и вечно голубое небо. Мы бы любили друг друга, сливались бы душами, вечно жаждали бы один другого и утоляли бы эту жажду из кубка неиссякаемой любви…</p><p class="p1">Эсмеральда разразилась ужасным, безудержным хохотом.</p><p class="p1">– Взгляните, отец, у вас кровь под ногтями!</p><p class="p1">Священник несколько мгновений, не спуская глаз, пристально смотрел на свои руки.</p><p class="p1">– Ну да, – сказал он наконец со странной кротостью, – оскорбляй меня, насмехайся надо мной, добивай! Но иди со мной. Поспешим. Я сказал тебе, что завтра… ты знаешь, виселица на Гревской площади всегда готова… О! Видеть, как тебя повезут на телеге! Пощади!.. Никогда я еще не чувствовал так, как теперь, до чего я люблю тебя!.. О, пойдем со мной! Со временем ты, может быть, полюбишь меня, после того как я спасу тебя… Можешь ненавидеть меня, сколько тебе будет угодно. Только пойдем… Завтра, завтра! Виселица! Твоя казнь! О, спасись! Пожалей меня!</p><p class="p1">Он взял ее за руку, сам не помня себя, и хотел увлечь за собой. Она устремила на него пристальный взгляд.</p><p class="p1">– Что сталось с моим Фебом?!</p><p class="p1">– А! – проговорил священник, выпуская ее руку. – Вы неумолимы!</p><p class="p1">– Что сталось с Фебом?! – холодно повторила она.</p><p class="p1">– Он умер! – закричал священник.</p><p class="p1">– Умер? – повторила она тем же ледяным голосом, не двигаясь. – Зачем же вы говорите мне о жизни?</p><p class="p1">Он не слушал ее.</p><p class="p1">– Да, да, – говорил он будто сам с собой, – он, вероятно, умер. Кинжал вошел глубоко. Мне кажется, я острием коснулся сердца. О, я жил тогда на острие этого кинжала!</p><p class="p1">Девушка бросилась на него, как разъяренная тигрица, и со сверхъестественной силой толкнула его к ступеням лестницы.</p><p class="p1">– Уходи, чудовище! Уходи, убийца! Дай мне умереть! Пусть наша кровь – моя и его – наложит несмываемое пятно на твое чело! Ты говоришь – быть твоей, поп? Никогда! Никогда! Ничто не соединит нас; не соединит даже ад! Уходи, проклятый! Никогда!</p><p class="p1">Священник споткнулся у лестницы. Он молча высвободил ноги из складок своего платья, взял фонарь и начал медленно подниматься по ступеням, которые вели к двери. Отворив эту дверь, он вышел.</p><p class="p1">Вдруг узница увидела, что голова его снова появилась, выражение его лица было ужасно, и он крикнул ей хриплым от бешенства и отчаяния голосом:</p><p class="p1">– Говорю же тебе, – он умер!</p><p class="p1">Эсмеральда упала ничком на землю, и в тюрьме не стало слышно ровно ничего, кроме монотонного звука падавших капель, колебавших в темноте поверхность лужи.</p></span><span id="id51"><div class="title6">
<p class="p">V. Мать</p>
</div><p class="p1">Я думаю, что нет на свете ничего отраднее тех мыслей, которые пробуждаются в сердце матери при виде башмачка ее ребенка. В особенности если это праздничный, воскресный, крестильный башмачок, весь расшитый; башмачок, в котором ребенок еще не ходил. Глядя на этот крошечный башмачок, матери кажется, что она видит своего ребенка. Она улыбается ему, целует его, говорит с ним. «Может ли быть такая маленькая ножка?» – думает она. Достаточно ей посмотреть на такой башмачок, чтоб представить себе отсутствующего ребенка. Мать его видит живого, веселого, видит его – с его нежными ручками, круглой головкой, чистыми губками, ясными глазками с голубоватым белком. Зимой он ползает на ковре, привстает около табуретки, и мать боится, чтоб он не подошел к огню. Летом он на дворе, в саду, выдергивает травку, выросшую между камней, без страха разглядывает больших собак, лошадей, играет раковинами, цветами, и садовник ворчит, находя песок на клумбах и землю на дорожках. Все блестит и смеется вокруг него, а дуновение ветерка и луч солнца играют в его растрепанных волосиках. Все это напоминает матери башмачок, и сердце ее тает, как воск на огне.</p><p class="p1">Но когда ребенок пропал, тогда эти радостные, нежные воспоминания превращаются в муки. Хорошенький башмачок делается вечным орудием пытки для сердца матери. Оно продолжает вибрировать и трепетать, но уже не от ласки ангела, а от мучительных прикосновений демона.</p><p class="p1">В одно утро, когда майское солнце вставало на том синем небе, на фоне которого Гарофло любил писать свои картины, изображающие снятие с креста, затворница Роландовой башни услышала шум колес и топот лошадей на Гревской площади.</p><p class="p1">Она не обратила на это внимания, сдвинула волосы на уши, чтобы меньше слышать, и продолжала стоять на коленях перед неодушевленным предметом, который боготворила в продолжение пятнадцати лет. Этот башмачок, как мы уже говорили, составлял весь ее мир. Ее мысль была навсегда прикована к нему. Сколько горьких упреков, сколько молений, сколько рыданий воссылала она к небу при виде этой вещицы из розового атласа, мог бы сказать только один мрачный погреб Роландовой башни. Никогда столько горького отчаяния не изливалось над маленьким, прелестным предметом! В это утро горе ее, казалось, было еще сильнее, чем когда-либо, ее громкое и однообразное причитание надрывало сердце.</p><p class="p1">– Дочь моя! – говорила она. – Дочь моя! Бедное мое маленькое дитятко, неужели я никогда не увижу тебя? Неужели все кончено? Мне кажется, что это было вчера! Господи, если Ты хотел так скоро отнять ее, лучше бы не давал мне ее! Разве Ты не знаешь, как близко нам наше дитя, разве не знаешь, что, потеряв ребенка, мать перестает верить в Бога? Зачем я, несчастная, вышла в тот день! Господи, Господи! Ведь Ты видел меня с нею, когда я грела ее у огня, когда она смеялась у моей груди, когда я целовала ее ножки! Если бы Ты тогда взглянул на нас, Ты не мог бы отнять у меня мою радость, мою последнюю любовь! Неужели я уж такая недостойная, что Ты не мог взглянуть на меня, прежде чем так ужасно покарать? Увы! Увы! Вот башмачок, а где теперь ножка? Где дитя мое? Дочь моя, дочь моя, что они с тобой сделали? Господи, возврати мне ее. Пятнадцать лет на коленях молю, разве этого недостаточно? Отдай мне ее на день, на час, на минуту, одну минуту, и повергни меня в ад на вечность! Если бы я могла захватить край Твоей ризы, я бы не выпустила ее, пока бы Ты не отдал мне моего ребенка! Господи, неужели не трогает Тебя этот башмачок? Неужели можно приговаривать мать к такой каторге в продолжение пятнадцати лет? Матерь Божия, Царица Небесная! Моего младенца Иисуса отняли, украли, съели, пили его кровь, дробили его кости… Пресвятая Дева, пожалей меня! Я хочу, хочу мою дочь! Что мне в том, что она в раю? Мне не ангела надо, а мою дочь! Я львица и хочу своего львенка. Я разобью голову мою о камни, я погублю душу, я прокляну Тебя, Господи, если мне не возвратят моего ребенка! Видишь, я искусала все свои руки, неужели у Тебя нет милосердия? Не давайте мне ничего, кроме черного хлеба, но дайте мне мою дочку: она, как солнце, согреет мое сердце. Увы, Господи Боже мой, я страшная грешница, но дочь моя делала меня благочестивой. Из любви к ней я была набожна. Я видела Тебя сквозь ее улыбку. О, дай еще раз, один раз надеть этот башмачок на ее розовую ножку, и я умру, благословляя тебя, Мать Пресвятая! Пятнадцать лет – она бы уж теперь была взрослая! Бедное дитя! Значит, это правда? Я не увижу ее никогда, даже на небесах! Я ведь не попаду туда. Это ужасно! От всего счастья остался только один башмачок!</p><p class="p1">Несчастная бросилась к этому башмачку, ее утешению и отчаянию в течение стольких лет, и душераздирающе зарыдала, как в первый день. Матери, потерявшей своего ребенка, время не приносит забвения. Такое горе не старится. Траурные платья изнашиваются, в сердце же остается мрак.</p><p class="p1">В эту минуту она услыхала за своим окном веселые детские голоса. Всякий раз, когда она видела или слышала детей, она пряталась в самый темный угол своего каменного гроба и, казалось, хотела зарыться головой в камень, чтобы не слыхать их. На этот раз она, напротив, стала жадно прислушиваться. Маленький мальчик сказал:</p><p class="p1">– Сегодня будут вешать цыганку.</p><p class="p1">Как паук бросается на пойманную муху, так она бросилась к своему оконцу, которое выходило, как известно, на Гревскую площадь. Перед постоянной виселицей действительно была поставлена лестница, и помощник палача поправлял там какие-то цепи. Вокруг толпился народ.</p><p class="p1">Смеющиеся дети были уже далеко. Узница искала глазами, кого бы расспросить. Она заметила священника, который стоял возле самой ее кельи, делая вид, будто читает общественный молитвенник. В сущности, он был гораздо менее занят молитвенником, чем виселицей, на которую он по временам бросал мрачный и суровый взгляд. Она узнала жозасского архидьякона, святого человека.</p><p class="p1">– Отец мой, – спросила она, – кого будут вешать?</p><p class="p1">Священник посмотрел на нее, не отвечая. Она повторила свой вопрос. Тогда он сказал:</p><p class="p1">– Не знаю.</p><p class="p1">– Тут проходили дети, они говорили, что цыганку, – продолжала затворница.</p><p class="p1">– Кажется, да, – ответил священник.</p><p class="p1">Пакета Шанфлери разразилась хохотом гиены.</p><p class="p1">– Сестра моя, – сказал архидьякон, – вы, должно быть, сильно ненавидите цыганок?</p><p class="p1">– Еще бы не ненавидеть! – закричала она. – Они, ведьмы, воруют детей! Они растерзали мою девочку, мое единственное дитя! Они растерзали и мое сердце!</p><p class="p1">Она была страшна. Священник холодно смотрел на нее.</p><p class="p1">– Одну я особенно ненавижу, я прокляла ее, – продолжала затворница. – Она молодая, ей столько лет, сколько было бы моей дочери, если б ее мать не съела мое дитя. Каждый раз, когда этот змееныш проходит мимо меня, у меня кипит кровь!</p><p class="p1">– Ну, так радуйтесь, сестра моя, – сказал священник, холодный, как статуя на гробнице, – вы увидите именно ее смерть.</p><p class="p1">Он опустил голову на грудь и медленно стал удаляться.</p><p class="p1">Затворница всплеснула руками от радости.</p><p class="p1">– Я ей предсказывала это! Спасибо, священник! – закричала она.</p><p class="p1">И она стала ходить большими шагами перед решеткой своего окна. Волосы ее были растрепаны, глаза горели. Она билась плечом о стены, как запертая в клетку волчица, которая голодна и чувствует, что близок час кормления.</p></span></span></span>
