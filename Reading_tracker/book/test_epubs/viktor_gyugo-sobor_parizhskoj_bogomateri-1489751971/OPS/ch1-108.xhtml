<span><span><span><span id="id177"><div class="title6">
<p class="p">1. Торжественная церемония во всех ее подробностях</p>
</div><p class="p1">Та ошеломляющая сила, которая привела Гуинплена в Виндзор и в течение уже стольких часов возносила все выше и выше, теперь снова перенесла его в Лондон.</p><p class="p1">Непрерывной чередой промелькнули перед ним все эти фантастические события.</p><p class="p1">Уйти от них было невозможно. Едва завершалось одно, как на смену ему являлось другое.</p><p class="p1">Он не успевал даже перевести дыхание.</p><p class="p1">Кто видел жонглера, тот воочию видел человеческую судьбу. Эти шары, падающие, взлетающие вверх и снова падающие, – не образ ли то людей в руках судьбы? Она так же бросает их. Она так же ими играет.</p><p class="p1">Вечером того же дня Гуинплен очутился в необычайном месте.</p><p class="p1">Он восседал на скамье, украшенной геральдическими лилиями. Поверх его атласного, шитого золотом кафтана была накинута бархатная пурпурная мантия, подбитая белым шелком и отороченная горностаем, с горностаевыми же наплечниками, обшитыми золотым галуном. Вокруг него были люди разного возраста, молодые и старые. Они восседали так же, как и он, на скамьях с геральдическими лилиями и так же, как и он, были одеты в пурпур и горностай.</p><p class="p1">Прямо перед собой он видел других людей. Эти стояли на коленях, мантии их были из черного шелка. Некоторые из них что-то писали.</p><p class="p1">Напротив себя, немного поодаль, он видел ступени, которые вели к помосту, крытому алым бархатом, балдахин, широкий сверкающий щит, поддерживаемый львом и единорогом, а под балдахином, на помосте, прислоненное к щиту позолоченное, увенчанное короной кресло. Это был трон.</p><p class="p1">Трон Великобритании.</p><p class="p1">Гуинплен, ставший пэром, находился в палате лордов Англии.</p><p class="p1">Каким же образом произошло это введение Гуинплена в палату лордов? Сейчас расскажем.</p><p class="p1">Весь этот день, с утра до вечера, от Виндзора до Лондона, от Корлеоне-Лоджа до Вестминстерского дворца был днем его восхождения со ступени на ступень. И на каждой ступени его ждало новое головокружительное событие.</p><p class="p1">Его увезли из Виндзора в экипаже королевы в сопровождении свиты, подобающей пэру. Почетный конвой очень напоминает стражу, охраняющую узника.</p><p class="p1">В этот день обитатели домов, расположенных вдоль дороги из Виндзора в Лондон, видели, как пронесся вскачь отряд личного Ее Величества конвоя, сопровождавший две стремительно мчавшиеся коляски. В первой из них сидел пристав с черным жезлом в руке. Во второй можно было разглядеть только широкополую шляпу с белыми перьями, бросавшую густую тень на лицо сидевшего в коляске человека. Кто это был? Принц или узник?</p><p class="p1">Это был Гуинплен.</p><p class="p1">Судя по всем признакам, кого-то везли не то в лондонский Тауэр, не то в палату лордов.</p><p class="p1">Королева устроила все как подобает. Для сопровождения будущего мужа своей сестры она дала людей из собственного своего конвоя.</p><p class="p1">Во главе кортежа скакал верхом помощник пристава черного жезла.</p><p class="p1">На откидной скамейке против пристава лежала серебряная парчовая подушка, а на ней черный портфель с изображением королевской короны.</p><p class="p1">В Брайтфорде, на последней станции перед Лондоном, обе коляски и конвой остановились.</p><p class="p1">Здесь их уже дожидалась карета с черепаховыми инкрустациями, запряженная четверкой лошадей, с четырьмя лакеями на запятках, двумя форейторами впереди и кучером в парике. Колеса, подножки, дышло, ремни, поддерживающие кузов кареты, были позолочены. Кони были в серебряной сбруе.</p><p class="p1">Этот парадный экипаж, сделанный по совершенно особому рисунку, был так великолепен, что, несомненно, мог бы занять место в числе тех пятидесяти знаменитых карет, изображения которых оставил нам Рубо.</p><p class="p1">Пристав черного жезла вышел из экипажа, его помощник соскочил с лошади.</p><p class="p1">Помощник пристава черного жезла снял со скамеечки дорожной кареты парчовую подушку, на которой лежал портфель, украшенный изображением короны, и, взяв ее в обе руки, стал позади пристава.</p><p class="p1">Пристав черного жезла отворил дверцы пустой кареты, затем дверцы коляски, в которой сидел Гуинплен, и, почтительно склонив голову, предложил Гуинплену пересесть в парадный экипаж.</p><p class="p1">Гуинплен вышел из коляски и сел в карету.</p><p class="p1">Пристав с жезлом и его помощник с подушкой последовали за ним и уселись на низкой откидной скамеечке, на которой в старинных парадных экипажах обыкновенно помещались пажи.</p><p class="p1">Внутри карета была обтянута белым атласом, отделанным беншским кружевом, серебряными позументами и кистями. Потолок был украшен гербами.</p><p class="p1">Форейторы, сопровождавшие дорожные экипажи, были одеты в придворные ливреи. Кучер, форейторы и лакеи парадного экипажа были в великолепных ливреях уже другого образца.</p><p class="p1">Сквозь то полусознательное состояние, в котором он находился, Гуинплен все же обратил внимание на эту пышно разодетую челядь и спросил пристава черного жезла:</p><p class="p1">– Чьи это слуги?</p><p class="p1">Пристав черного жезла ответил:</p><p class="p1">– Ваши, милорд.</p><p class="p1">В этот день палата лордов должна была заседать вечером. Curia erat serena<a href="ch2.xhtml#id167" class="a">[262]</a>, отмечают старинные протоколы. В Англии парламент охотно ведет ночной образ жизни. Известно, что Шеридану однажды пришлось начать речь в полночь и закончить ее на заре.</p><p class="p1">Оба дорожных экипажа вернулись в Виндзор пустыми; карета, в которую пересел Гуинплен, направилась в Лондон. Эта карета с черепаховыми инкрустациями, запряженная четверкой лошадей, двинулась из Брайтфорда в Лондон шагом, как это полагалось карете, управляемой кучером в парике. В лице этого исполненного важности кучера церемониал вступил в свои права и завладел Гуинпленом.</p><p class="p1">Впрочем, медлительность переезда, судя по всему, преследовала определенную цель. В дальнейшем мы увидим какую.</p><p class="p1">Еще не наступила ночь, но было уже довольно поздно, когда карета с черепаховыми инкрустациями остановилась перед Королевскими воротами – тяжелыми низкими воротами между двумя башнями, служившими сообщением между Уайт-Холлом и Вестминстером.</p><p class="p1">Конвой живописной группой окружил карету.</p><p class="p1">Один из лакеев, соскочив с запяток, отворил дверцы.</p><p class="p1">Пристав черного жезла в сопровождении помощника, несшего подушку, вышел из кареты и обратился к Гуинплену:</p><p class="p1">– Благоволите выйти, милорд. Не снимайте, ваша милость, шляпы.</p><p class="p1">Под дорожным плащом на Гуинплене был надет атласный кафтан, в который его переодели накануне. Шпаги при нем не было.</p><p class="p1">Плащ он оставил в карете.</p><p class="p1">Под аркой Королевских ворот, служившей въездом для экипажей, находилась боковая дверь, к которой вело несколько ступенек.</p><p class="p1">Церемониал требует, чтобы лицу, которому оказывается почет, предшествовала свита.</p><p class="p1">Пристав черного жезла, сопровождаемый помощником, шел впереди.</p><p class="p1">Гуинплен следовал за ними.</p><p class="p1">Они поднялись по ступенькам, вошли в боковую дверь и спустя несколько мгновений очутились в просторном круглом зале с массивной колонной посредине.</p><p class="p1">Зал помещался в первом этаже башни и был освещен очень узкими стрельчатыми окнами; должно быть, здесь и в полдень царил полумрак. Недостаток света иногда усугубляет торжественность обстановки. Полумрак величественен.</p><p class="p1">В комнате стояли тринадцать человек: трое впереди, шестеро во втором ряду и четверо позади.</p><p class="p1">На одном из стоявших впереди был камзол алого бархата, на двух остальных тоже алые камзолы, но атласные. У каждого из этих троих был вышит на плече английский герб.</p><p class="p1">Шесть человек, составлявшие второй ряд, были в далматиках белого муара; на груди у каждого из них красовался свой особый герб.</p><p class="p1">Четверо последних, одетых в черный муар, отличались друг от друга какой-нибудь особенностью в одежде: на первом был голубой плащ, у второго – пунцовое изображение святого Георгия на груди, у третьего – два вышитых малиновых креста на спине и на груди, на четвертом – черный меховой воротник. Все были в париках, без шляп и при шпагах.</p><p class="p1">В полумраке их лица трудно было различить. Они также не могли видеть лица Гуинплена.</p><p class="p1">Пристав поднял свой черный жезл и произнес:</p><p class="p1">– Милорд Фермен Кленчарли, барон Кленчарли-Генкервилл! Я, пристав черного жезла, первое должностное лицо в приемной Ее Величества, передаю вашу светлость кавалеру ордена Подвязки, герольдмейстеру Англии.</p><p class="p1">Человек в алом бархатном камзоле выступил вперед, поклонился Гуинплену до земли и сказал:</p><p class="p1">– Милорд Фермен Кленчарли, я – кавалер ордена Подвязки, первый герольдмейстер Англии. Я получил свое звание от его светлости герцога Норфолка, наследственного графа-маршала. Я присягал королю, пэрам и кавалерам ордена Подвязки. В день моего посвящения, когда граф-маршал Англии оросил мне голову вином из кубка, я торжественно обещался служить дворянству, избегать общества людей, пользующихся дурной славой, чаще оправдывать, чем обвинять людей знатных и оказывать помощь вдовам и девицам. На моей обязанности лежит устанавливать порядок похорон пэров и охранять их гербы. Предоставляю себя в распоряжение вашей светлости.</p><p class="p1">Первый из двух одетых в атласные камзолы отвесил низкий поклон и сказал:</p><p class="p1">– Милорд, я – Кларенс, второй герольдмейстер Англии. На моей обязанности лежит устанавливать порядок похорон дворян, не имеющих пэрского титула. Предоставляю себя в распоряжение вашей светлости.</p><p class="p1">Затем выступил второй, поклонился и сказал:</p><p class="p1">– Милорд, я – Норрой, третий герольдмейстер Англии. Предоставляю себя в распоряжение вашей светлости.</p><p class="p1">Шесть человек, составлявшие второй ряд, не кланяясь, сделали шаг вперед.</p><p class="p1">Первый, направо от Гуинплена, сказал:</p><p class="p1">– Милорд, мы – шесть герольдов Англии. Я – Йорк.</p><p class="p1">Затем каждый из герольдов по очереди назвал себя:</p><p class="p1">– Я – Ланкастер.</p><p class="p1">– Я – Ричмонд.</p><p class="p1">– Я – Честер.</p><p class="p1">– Я – Сомерсет.</p><p class="p1">– Я – Виндзор.</p><p class="p1">На груди у каждого из них был вышит герб того графства или города, по названию которого он именовался.</p><p class="p1">Четверо последних, одетые в черное и стоявшие позади герольдов, хранили молчание.</p><p class="p1">Герольдмейстер, кавалер ордена Подвязки, указал на них Гуинплену и представил:</p><p class="p1">– Милорд, вот четверо оруженосцев. – Голубая Мантия.</p><p class="p1">Человек в голубом плаще поклонился.</p><p class="p1">– Красный Дракон.</p><p class="p1">Человек с изображением святого Георгия на груди поклонился.</p><p class="p1">– Красный Крест.</p><p class="p1">Человек с красным крестом поклонился.</p><p class="p1">– Страж Решетки.</p><p class="p1">Человек в меховом воротнике поклонился.</p><p class="p1">По знаку герольдмейстера подошел первый из оруженосцев, Голубая Мантия, и взял из рук помощника пристава парчовую подушку с портфелем, украшенным короной.</p><p class="p1">Герольдмейстер обратился к приставу черного жезла:</p><p class="p1">– Да будет так. Честь имею сообщить вам, что принял от вас его милость.</p><p class="p1">Вся эта процедура, а также, и некоторые другие, которые будут описаны дальше, входили в состав старинного церемониала, установленного еще до Генриха VIII; королева Анна одно время пыталась возродить эти обычаи. В наши дни все они отжили свой век. Тем не менее палата лордов и поныне считает себя чем-то вечным, и если где-нибудь на свете существует что-либо не изменяющееся, то именно в ней.</p><p class="p1">А все же и она подвержена переменам. E pur si muove<a href="ch2.xhtml#id165" class="a">[263]</a>.</p><p class="p1">Куда, например, девалась may pole (майская мачта), которую город Лондон водружал на пути шествия пэров в парламент? В последний раз она была воздвигнута в 1713 году. С тех пор о ней уже ничего не слыхать. Она вышла из употребления.</p><p class="p1">Многое представляется внешне незыблемым, в действительности же все меняется. Возьмем, например, титул герцогов Олбемарлей. Он кажется вечным, а между тем он последовательно переходил к шести фамилиям: Одо, Мендвилям, Бетюнам, Плантагенетам, Бошанам и Монкам. Титул герцога Лестера тоже принадлежал поочередно пяти фамилиям: Бомонтам, Брюзам, Дадлеям, Сиднеям и Кокам. Титул Линкольна носили шесть фамилий. Титул графа Пемброка – семь и т. д. Фамилии изменяются, титулы остаются неизменными. Историк, который подходит к явлениям поверхностно, верит в их незыблемость. В сущности же на свете нет ничего устойчивого. Человек – это только волна. Человечество – это море.</p><p class="p1">Аристократия гордится именно тем, что женщина считает для себя унизительным: своею старостью; однако и женщина и аристократия питают одну и ту же иллюзию – обе уверены, что хорошо сохранились.</p><p class="p1">Нынешняя палата лордов, возможно, не пожелает узнать себя в описанной нами картине и в том, что нами будет описано далее: так давно отцветшая красавица не хочет видеть в зеркале своих морщин. Виноватым всегда оказывается зеркало, но оно привыкло к обвинениям.</p><p class="p1">Правдиво рисовать прошлое – вот долг историка.</p><p class="p1">Герольдмейстер обратился к Гуинплену:</p><p class="p1">– Благоволите следовать за мной, милорд.</p><p class="p1">Он прибавил:</p><p class="p1">– Вам будут кланяться. Вы же, ваша милость, приподымайте только край шляпы.</p><p class="p1">Вся процессия направилась к двери, находившейся в глубине круглого зала.</p><p class="p1">Впереди шел пристав черного жезла.</p><p class="p1">За ним, с подушкой в руках, – Голубая Мантия; далее – первый герольдмейстер и, наконец, Гуинплен в шляпе.</p><p class="p1">Прочие герольдмейстеры, герольды и оруженосцы остались в круглом зале.</p><p class="p1">Гуинплен, предшествуемый приставом черного жезла и руководимый герольдмейстером, прошел анфиладу зал, ныне уже не существующих, ибо старое здание английского парламента давно разрушено.</p><p class="p1">Между прочим, он прошел и через ту готическую палату, где произошло последнее свидание Иакова II с герцогом Монмутом, палату, где малодушный племянник тщетно склонил колени перед жестоким дядей. На стенах этой палаты были развешаны, в хронологическом порядке, с подписями имен и изображениями гербов, портреты во весь рост девяти представителей древнейших пэрских родов: лорда Нансладрона (1305 год), лорда Белиола (1306 год), лорда Бенестида (1314 год), лорда Кентилупа (1356 год), лорда Монтбегона (1357 год), лорда Тайботота (1372 год), лорда Зуча Коднорското (1615 год), лорда Белла-Аква – без даты и лорда Харрен-Серрея, графа Блуа – без даты.</p><p class="p1">Так как уже стемнело, в галереях на некотором расстоянии друг от друга были зажжены лампы. В залах, тонувших в полумраке, как церковные притворы, горели свечи в медных люстрах.</p><p class="p1">По пути встречались одни только должностные лица.</p><p class="p1">В одной из комнат стояли, почтительно склонив головы, четыре клерка государственной печати и клерк государственных бумаг.</p><p class="p1">В другой находился достопочтенный Филипп Сайденгем, кавалер Знамени, владетель Браймптона в Сомерсете. Кавалеры Знамени получали это звание во время войны от самого короля под развернутым королевским знаменем.</p><p class="p1">В следующем зале они увидели древнейшего баронета Англии сэра Эдмунда Бэкона из Сэффолка, наследника сэра Николаев, носившего титул primus baronetorum Angliae<a href="ch2.xhtml#id163" class="a">[264]</a>. За сэром Эдмундом стоял его оруженосец с пищалью и конюший с гербом Олстера, так как носители этого титула были наследственными защитниками графства Олстер в Ирландии.</p><p class="p1">В четвертом зале их ожидал канцлер казначейства с четырьмя казначеями и двумя депутатами лорд-камергера, на обязанности которых лежала раскладка податей. Тут же находился начальник монетного двора: он держал на ладони золотую монету в один фунт стерлингов, вычеканенную при помощи специального штампа. Все восемь человек низко поклонились новому лорду.</p><p class="p1">При входе в коридор, устланный циновками и служивший для сообщения палаты общин с палатой лордов, Гуинплена приветствовал сэр Томас Мансель Маргем, контролер двора Ее Величества и член парламента от Глеморгана. При выходе его встретила депутация баронов Пяти Портов, выстроившихся по четыре человека с каждой стороны, ибо портов было не пять, а восемь. Вильям Ашбернгем приветствовал его от Гастингса, Мэтью Эйлмор – от Дувра, Джозиа Берчет – от Сандвича, сэр Филипп Ботлер – от Гайта, Джон Брюэр – от Нью-Ремнея, Эдуард Саутвелл – от города Рея, Джемс Хейс – от города Уинчелси и Джордж Нейлор – от города Сифорда.</p><p class="p1">Гуинплен хотел было поклониться в ответ на приветствия, но первый герольдмейстер шепотом напомнил ему правила этикета:</p><p class="p1">– Приподымите только край шляпы, милорд.</p><p class="p1">Гуинплен последовал его указанию.</p><p class="p1">Наконец он вступил в «расписной зал», где, впрочем, не было никакой живописи, если не считать нескольких изображений святых, в том числе изображение святого Эдуарда, в высоких нишах стрельчатых окон, разделенных настилом пола таким образом, что нижняя часть окон находилась в Вестминстер-Холле, а верхняя – в «расписном зале».</p><p class="p1">Зал был перегорожен деревянной балюстрадой, за которой стояли три важные особы, три государственных секретаря. Первый из них ведал югом Англии, Ирландией и колониями, а также сношениями с Францией, Швейцарией, Италией, Испанией, Португалией и Турцией. Второй управлял севером Англии и ведал сношениями с Нидерландами, Германией, Швецией, Польшей и Московией. Третий, родом шотландец, ведал делами Шотландии. Первые два были англичане. Одним из них являлся достопочтенный Роберт Гарлей, член парламента от города Нью-Реднора. Тут же находился шотландский депутат. Мунго Грехэм, эсквайр, родственник герцога Монтроза. Все они молча поклонились Гуинплену.</p><p class="p1">Гуинплен дотронулся до края своей шляпы.</p><p class="p1">Служитель откинул подвижную часть барьера, укрепленную на петлях, и открыл доступ в заднюю часть «расписного зала», где стоял длинный накрытый зеленым сукном стол, предназначенный только для лордов.</p><p class="p1">На столе горел канделябр.</p><p class="p1">Предшествуемый приставом черного жезла. Голубой Мантией и кавалером ордена Подвязки, Гуинплен вступил в это святилище.</p><p class="p1">Служитель закрыл за Гуинпленом барьер.</p><p class="p1">Очутившись за барьером, герольдмейстер остановился.</p><p class="p1">«Расписной зал» был очень большим.</p><p class="p1">В глубине его, под королевским щитом, помещавшимся между двумя окнами, стояли два старика в красных бархатных мантиях, с окаймленными золотым галуном горностаевыми наплечниками и в шляпах с белыми перьями поверх париков. Из-под мантий видны были шелковые камзолы и рукояти шпаг.</p><p class="p1">Позади этих двух стариков неподвижно стоял человек в черной муаровой мантии; в высоко поднятой руке он держал огромную золотую булаву с литым изображением льва, увенчанного короной.</p><p class="p1">Это был булавоносец пэров Англии.</p><p class="p1">Лев – их эмблема. «А львы – это бароны и пэры» – гласит хроника Бертрана Дюгесклена.</p><p class="p1">Герольдмейстер указал Гуинплену на людей в бархатных мантиях и шепнул ему на ухо:</p><p class="p1">– Милорд, это – равные вам. Поклонитесь им так же, как они поклонятся вам. Оба эти вельможи – бароны, и лорд-канцлер назначил их вашими восприемниками. Они очень стары и почти слепы. Это они введут вас в палату лордов. Первый из них – Чарльз Милдмей, лорд Фицуолтер, занимающий шестое место на скамье баронов, второй – Август Эрандел, лорд Эрандел-Трерайс, занимающий на той же скамье тридцать восьмое место.</p><p class="p1">Герольдмейстер, сделав шаг вперед по направлению к обоим старикам, возвысил голос:</p><p class="p1">– Фермен Кленчарли, барон Кленчарли, барон Генкервилл, маркиз Корлеоне Сицилийский приветствует ваши милости.</p><p class="p1">Оба лорда как можно выше приподняли шляпы над головами, затем снова покрыли головы.</p><p class="p1">Гуинплен приветствовал их таким же образом.</p><p class="p1">Затем выступил вперед пристав черного жезла, потом Голубая Мантия, за ним кавалер ордена Подвязки.</p><p class="p1">Булавоносец подошел к Гуинплену и стал перед ним, лорды поместились по обе стороны от него: лорд Фицуолтер – по правую руку, а лорд Эрандел-Трерайс – по левую. Лорд Эрандел, старший из двух, был очень дряхл на вид. Он умер год спустя, завещав свое пэрство несовершеннолетнему внуку Джону, но все же его род прекратился в 1768 году.</p><p class="p1">Шествие вышло из «расписного зала» и направилось в галерею с колоннами; у каждой колонны стояли на часах попеременно английские бердышники или шотландские алебардщики.</p><p class="p1">Шотландские алебардщики, ходившие с обнаженными коленями, были великолепным войском, позднее, при Фонтенуа, сражавшимся с французской кавалерией и с теми королевскими кирасирами, к которым их полковник обращался перед сражением с такими словами: «Господа, наденьте плотнее ваши головные уборы, мы будем иметь честь пойти в атаку».</p><p class="p1">Командиры бердышников и алебардщиков отсалютовали Гуинплену и обоим лордам-восприемникам шпагой. Солдаты взяли на караул бердышами и алебардами.</p><p class="p1">В глубине галереи отливала металлическим блеском огромная дверь, столь роскошная, что створки ее казались двумя золотыми плитами.</p><p class="p1">По обе стороны двери стояли неподвижно два человека. По ливреям в них можно было узнать так называемых door-keepers – привратников.</p><p class="p1">Немного не доходя до дверей, галерея расширялась, образуя застекленную ротонду.</p><p class="p1">Здесь в громадном кресле восседала чрезвычайно важная особа, если судить по размерам ее мантии и парика. Это был Вильям Коупер, лорд-канцлер Англии.</p><p class="p1">Весьма полезно обладать каким-нибудь физическим недостатком в еще большей степени, чем монарх. Вильям Коупер был близорук, Анна тоже, но меньше, чем он. Слабое зрение Вильяма Коупера понравилось близорукости Ее Величества и побудило королеву назначить его канцлером и блюстителем королевской совести.</p><p class="p1">Верхняя губа Вильяма Коупера была тоньше нижней – признак некоторой доброты.</p><p class="p1">Ротонда освещалась спускавшейся с потолка лампой.</p><p class="p1">По правую руку лорд-канцлера, величественно восседавшего в высоком кресле, сидел за столом коронный клерк, по левую, за другим столом, – клерк парламентский.</p><p class="p1">Перед каждым из них лежала развернутая актовая книга и находился письменный прибор.</p><p class="p1">Позади кресла лорд-канцлера стоял его булавоносец, державший булаву с короной, и два чина, на обязанности которых лежало носить его шлейф и кошель, – оба в огромных париках. Все эти должности существуют и поныне.</p><p class="p1">Подле кресла на маленьком столике лежала шпага в ножнах, с золотой рукоятью и с бархатной портупеей огненно-красного цвета.</p><p class="p1">Позади коронного клерка стоял чиновник, держа обеими руками наготове развернутую мантию, предназначенную для церемонии.</p><p class="p1">Второй чиновник, стоявший позади парламентского клерка, держал таким же образом другую мантию, в которой Гуинплену предстояло заседать.</p><p class="p1">Обе эти мантии из красного бархата, подбитые белым атласом, с горностаевыми наплечниками, отороченными золотым галуном, были почти одинаковы, с той лишь разницей, что на церемониальной мантии горностаевые нашивки были шире.</p><p class="p1">Третий чиновник, так называемый librarian<a href="ch2.xhtml#id161" class="a">[265]</a>, держал на четырехугольном подносе из фландрской кожи маленькую книжку в красном сафьяновом переплете, заключавшую в себе список пэров и представителей палаты общин; кроме того, на подносе лежали листки чистой бумаги и карандаш, которые вручались обычно каждому новому члену парламента.</p><p class="p1">Шествие, которое замыкал Гуинплен, сопровождаемый двумя пэрами-восприемниками, остановилось перед креслом лорд-канцлера.</p><p class="p1">Лорды-восприемники сняли шляпы. Гуинплен последовал их примеру.</p><p class="p1">Герольдмейстер, взяв из рук Голубой Мантии парчовую подушку с черным портфелем, поднес ее лорд-канцлеру.</p><p class="p1">Лорд-канцлер взял портфель и передал его парламентскому клерку. Тот принял портфель с подобающей торжественностью, затем, вернувшись на свое место, раскрыл его.</p><p class="p1">Портфель, согласно обычаю, содержал два документа: королевский указ палате лордов и предписание новому пэру заседать в парламенте.</p><p class="p1">Клерк встал и громко, с почтительной медленностью прочел обе бумаги.</p><p class="p1">Предписание лорду Фермену Кленчарли оканчивалось обычной формулой: «Предписываем вам во имя верности и преданности, коими вы нам обязаны, занять лично принадлежащее вам место среди прелатов и пэров, заседающих в нашем парламенте в Вестминстере, дабы по чести и совести подавать ваше мнение о делах королевства и церкви».</p><p class="p1">Когда чтение обеих бумаг было окончено, лорд-канцлер возгласил:</p><p class="p1">– Воля Ее Величества объявлена. Лорд Фермен Кленчарли, отрекается ли ваша милость от догмата пресуществления, от поклонения святым и от мессы?</p><p class="p1">Гуинплен наклонил голову в знак согласия.</p><p class="p1">– Отречение состоялось, – сказал лорд-канцлер.</p><p class="p1">Парламентский клерк подтвердил:</p><p class="p1">– Его милость принес присягу.</p><p class="p1">Лорд-канцлер прибавил:</p><p class="p1">– Милорд Фермен Кленчарли, вы можете заседать в парламенте.</p><p class="p1">– Да будет так, – произнесли оба восприемника.</p><p class="p1">Герольдмейстер поднялся, взял со столика шпагу и надел ее на Гуинплена.</p><p class="p1">«После сего, – говорится в старинных нормандских хартиях, – пэр берет свою шпагу, занимает свое высокое место и присутствует на заседании».</p><p class="p1">Гуинплен услыхал позади себя голос:</p><p class="p1">– Облачаю вашу светлость в парламентскую мантию.</p><p class="p1">С этими словами говоривший накинул на него мантию и завязал на шее черные шелковые ленты горностаевого воротника.</p><p class="p1">Теперь, в пурпурной мантии, со шпагой на боку, Гуинплен ничем не отличался от лордов, стоявших направо и налево от него.</p><p class="p1">«Библиотекарь» взял с подноса красную книгу и положил ее Гуинплену в карман его кафтана.</p><p class="p1">Герольд шепнул ему на ухо:</p><p class="p1">– Милорд, при входе поклонитесь королевскому креслу.</p><p class="p1">Королевское кресло – это трон.</p><p class="p1">Между тем оба клерка, каждый сидя за своим столом, что-то вписывали, один в актовую книгу короны, другой – в парламентскую актовую книгу.</p><p class="p1">Потом они по очереди, сперва королевский клерк, а за ним парламентский, поднесли на подпись свои книги лорд-канцлеру.</p><p class="p1">Скрепив обе записи своей подписью, лорд-канцлер встал и обратился к Гуинплену:</p><p class="p1">– Лорд Фермен Кленчарли, барон Кленчарли, барон Генкервилл, маркиз Корлеоне Сицилийский, приветствую вас среди равных вам духовных и светских лордов Великобритания.</p><p class="p1">Восприемники Гуинплена дотронулись до его плеча. Он обернулся.</p><p class="p1">Высокие золоченые двери в глубине галереи распахнулись настежь.</p><p class="p1">Это были двери английской палаты лордов.</p><p class="p1">Не прошло и тридцати шести часов с той самой минуты, как перед Гуинпленом, окруженным совсем другого рода свитой, растворилась железная дверь Саутворкской тюрьмы.</p><p class="p1">Все эти события пронеслись над его головой быстрее стремительно бегущих облаков. Они точно штурмовали его.</p></span></span></span></span>
