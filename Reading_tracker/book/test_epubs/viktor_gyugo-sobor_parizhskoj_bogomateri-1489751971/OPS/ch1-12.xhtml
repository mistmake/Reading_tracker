<p class="p">VI. Разбитая кружка</p>
</div><p class="p1">Гренгуар бежал некоторое время со всех ног, сам не зная куда. Не раз стукался он головой об углы домов, сворачивая из одной улицы в другую, перепрыгивал через канавы, пересекал улицы, глухие переулки и перекрестки, бросался во все извилистые проходы старинного рынка и исследовал в паническом страхе то, что называется в старинных латинских хартиях «tota via, cheminum et viaria»<a href="ch2.xhtml#id93" class="a">[29]</a>.</p><p class="p1">Вдруг наш поэт остановился как вкопанный. Во-первых, он чуть не задохнулся, а во-вторых, его, так сказать, схватила за ворот неожиданно пришедшая ему в голову дилемма.</p><p class="p1">– Мне кажется, мэтр Пьер Гренгуар, – сказал он, прикладывая палец ко лбу, – что вы совсем потеряли голову! Ну зачем вы бежите как безумный! Ведь мальчишки испугались вас нисколько не меньше, чем вы испугались их. Вы своими же собственными ушами слышали, как застучали их башмаки по направлению к югу – в то время как вы сами бросились к северу. Одно из двух. Если они убежали, то принесенная ими солома послужит вам прекрасной постелью, которой вы добиваетесь чуть не с самого утра и которую вам чудесно посылает Пресвятая Дева в награду за то, что вы написали в ее честь моралите. Если же дети остались и зажгли солому, у вас будет великолепный костер, около которого вам можно будет обсушиться, обогреться и немножко воспрянуть духом. Во всяком случае, – в виде ли костра, в виде ли постели – солома для вас является даром неба. Может быть, Пресвятая Дева Мария, статуя которой стоит на углу улицы Монконсейль, именно для этого и послала смерть Эсташу Мубону, и очень глупо с вашей стороны бежать, как пикардиец перед французом, оставляя позади себя то, чего сами же ищете. Вы ужаснейший болван, мэтр Пьер Гренгуар!</p><p class="p1">И Гренгуар повернул обратно. Насторожив уши и внимательно всматриваясь, он старался ориентироваться и отыскать благодетельную солому. Но старания его были тщетны. Он попал в такой лабиринт глухих переулков, перекрестков и домов, что все время колебался, не зная, куда идти, потерявшись в этой путанице темных улиц больше, чем если бы попал в лабиринт замка Турнель. Наконец его терпение лопнуло.</p><p class="p1">– Будь прокляты все эти перекрестки! – торжественно воскликнул он. – Наверное, сам дьявол понаделал их!</p><p class="p1">Это восклицание несколько облегчило его, а красноватый отблеск, который он в эту минуту увидел в конце длинной извилистой улицы, вернул ему мужество.</p><p class="p1">– Слава богу! – воскликнул он. – Это горит мой костер! – И, сравнивая себя с кормчим судна, сбившегося ночью с пути, он благоговейно прибавил: – Salve, Maria, stella<a href="ch2.xhtml#id87" class="a">[30]</a>.</p><p class="p1">К кому относились эти слова хвалебного гимна – к Пресвятой Деве или соломенному чучелу, – этого мы знать не можем.</p><p class="p1">Не успел он сделать и нескольких шагов по длинной немощеной улице, которая шла под гору и становилась все круче и грязнее, как заметил что-то странное. То тут то там по ней двигались, смутно выделяясь среди темноты, какие-то неуклюжие фигуры. Все они направлялись к свету, мерцавшему в конце улицы, и походили на неповоротливых гусениц, которые, перебираясь ночью со стебелька на стебелек, ползут к костру пастуха.</p><p class="p1">Человек делается необыкновенно смел, когда у него пусты карманы. Гренгуар продолжал идти вперед и скоро догнал одну из этих гусениц, которая тащилась медленнее других. Поравнявшись с нею, он увидал, что это жалкий калека, который передвигался, подпрыгивая на руках, и походил на паука-сенокосца, оставшегося только с двумя лапками. В то время как он проходил мимо этого паука с человеческим лицом, тот жалобно проговорил:</p><p class="p1">– La buona mancia, signor! La buona mancia!<a href="ch2.xhtml#id86" class="a">[31]</a></p><p class="p1">– Черт тебя побери, – воскликнул Гренгуар, – да и меня вместе с тобою, если я понимаю, что ты хочешь сказать!</p><p class="p1">И он пошел дальше.</p><p class="p1">Через минуту Гренгуар догнал другого калеку и с любопытством оглядел его. Это был разбитый параличом несчастный, хромой и однорукий, опиравшийся на сложное сооружение из костылей и деревяшек, которые делали его похожим на ходячие подмостки каменщиков. Гренгуар, имевший слабость к благородным классическим сравнениям, мысленно сравнил его с живым треножником Вулкана.</p><p class="p1">Этот треножник поклонился, когда он поравнялся с ним, и, подставив свою шляпу, как бритвенницу, под самый его подбородок, крикнул ему в ухо:</p><p class="p1">– Senor caballero, para comprar un pedaso de pan<a href="ch2.xhtml#id85" class="a">[32]</a>.</p><p class="p1">«И этот, кажется, говорит, – подумал Гренгуар, – но на очень грубом языке. Он счастливее меня, если понимает его».</p><p class="p1">Тут мысли его внезапно приняли другой оборот, и он прибавил, хлопнув себя по лбу:</p><p class="p1">– Не понимаю, что они хотели сказать сегодня утром своей «Эсмеральдой»!</p><p class="p1">Он хотел ускорить шаг, но в третий раз что-то или, вернее, кто-то преградил ему путь. Это был слепой, с еврейским лицом, низенький и бородатый, которого вела на поводу большая собака. Он размахивал вокруг себя палкой и, услыхав шаги Гренгуара, прогнусил с венгерским акцентом:</p><p class="p1">– Facitote caritatem<a href="ch2.xhtml#id84" class="a">[33]</a>.</p><p class="p1">– Слава богу! – сказал Гренгуар. – Хоть один говорит по-человечески. Должно быть, я кажусь очень добрым, если у меня просят милостыню, несмотря на мой тощий кошелек… Любезный друг, – прибавил он, обращаясь к слепому, – я на прошлой неделе продал свою последнюю рубашку, или, говоря на языке Цицерона, так как никакого другого ты, по-видимому, не понимаешь, vendidi hebdomade nuper transita meam ultimam chemisam.</p><p class="p1">Сказав это, он повернулся спиной к нищему и пошел дальше. Но слепой ускорил шаг и не отставал от него; в то же время параличный и безногий стали догонять Гренгуара, громко стуча по мостовой своими костылями и чашками для сбора подаяний. Потом они все трое, спотыкаясь и ковыляя, пошли за бедным поэтом и затянули свою песенку:</p><p class="p1">– Caritatem! – начинал слепой.</p><p class="p1">– La buona mancia! – подхватывал безногий.</p><p class="p1">– Un pedaso de pan! – заканчивал музыкальную фразу параличный.</p><p class="p1">Гренгуар заткнул уши.</p><p class="p1">– Настоящее вавилонское столпотворение! – воскликнул он и бросился бежать. Слепой, безногий и параличный тоже побежали за ним.</p><p class="p1">И по мере того как Гренгуар подвигался вперед, около него все увеличивалось число калек, которые выходили из домов и прилегающих переулков, выползали из подвалов. Тут были безногие, слепые, горбатые, безрукие, кривые и прокаженные со своими страшными язвами. И все они кричали, выли, визжали, все спотыкались и ковыляли, стремясь к свету, все были грязны, как улитки после дождя.</p><p class="p1">Гренгуар, которого продолжали преследовать трое нищих, совсем растерялся и, не зная, что делать, шел вместе с остальными, обходя хромых, перепрыгивая через безногих и с таким же трудом пробираясь в этой толпе калек, с каким подвигалось судно одного английского капитана, попавшее в косяк крабов.</p><p class="p1">Ему пришло в голову повернуть назад, но было уже слишком поздно. Весь этот легион сомкнулся позади него, а его преследователи не отставали ни на шаг. И он продолжал идти, увлекаемый этим непреодолимым течением и охватившим его страхом. Голова у него кружилась – ему казалось, что он видит страшный сон.</p><p class="p1">Наконец он дошел до конца улицы. Она выходила на громадную площадь, где в ночном тумане мерцали тысячи рассеянных огоньков. Гренгуар бросился бежать, надеясь, что быстрые ноги унесут его от трех отвратительных калек, не выпускавших его из виду.</p><p class="p1">– Onde vas, hombre?<a href="ch2.xhtml#id83" class="a">[34]</a> – крикнул параличный, отшвырнув костыли, и бросился за ним. У него оказалась пара самых великолепных и быстрых ног, какие когда-либо ступали по парижским улицам.</p><p class="p1">Безногий тоже подбежал и нахлобучил на голову Гренгуару свою тяжелую, окованную железом чашку, а слепой смотрел на него сверкающими глазами.</p><p class="p1">– Где я? – спросил перепуганный поэт.</p><p class="p1">– Во Дворе чудес, – ответил четвертый нищий, подходя к товарищам.</p><p class="p1">– Да, здесь действительно совершаются чудеса, – сказал Гренгуар. – Слепые тут прозревают, безногие бегают… Но где же Спаситель?</p><p class="p1">В ответ раздался зловещий смех.</p><p class="p1">Бедный поэт осмотрелся кругом. Он на самом деле попал на тот страшный Двор чудес, куда никогда не заходил в такой поздний час ни один порядочный человек. Это был магический круг, где исчезали бесследно судебные пристава и городские сержанты, осмелившиеся переступить черту; притон воров, отвратительный нарост на лице Парижа; клоака, откуда изливался каждое утро, а ночью лился назад грязный поток пороков, нищенства и бродяжничества, всегда переливавшийся через край и наводнявший улицы столицы, чудовищный улей, куда сходились вечером с добычей все трутни человеческого общества; обманчивый госпиталь, где цыган, расстриженный монах, опустившийся студент и негодяи всех наций и религий – испанцы, итальянцы, немцы, евреи, христиане, магометане, язычники – днем просили подаяния, стараясь разжалобить своими искусственными язвами, а ночью превращались в разбойников, – словом, громадная одевальная, где одевались и раздевались в ту пору актеры той вечной комедии, которую воровство, проституция и убийство играют на улицах Парижа.</p><p class="p1">Обширная площадь неправильной формы была плохо вымощена, как и все парижские площади в то время. Тут и там на ней горели костры, вокруг которых теснились странные группы. Люди подходили, уходили, кричали. Со всех сторон раздавались грубый смех, плач детей и голоса женщин. Руки и головы этой толпы, казавшиеся черными на светлом фоне, принимали странные очертания. Иногда мимо костра, бросавшего на землю колеблющийся отблеск, пересеченный длинными смутными тенями, мелькала собака, похожая на человека, или человек, похожий на собаку. Здесь были люди всякого сорта и всех национальностей, но грани между ними были стерты. Мужчины, женщины, животные, возраст, пол, здоровье, болезни – все смешивалось и сливалось. Каждый принимал здесь участие во всем.</p><p class="p1">При слабом, мерцающем свете Гренгуар, несмотря на свое волнение, различил вокруг площади ряд безобразных старых домов. Осевшие, низкие, источенные червями фасады их с освещенными то одним, то двумя слуховыми окнами казались ему в темноте рядом громадных голов угрюмых, чудовищных старух, смотревших, подмигивая, на этот шабаш.</p><p class="p1">Перед ним был какой-то совсем новый мир, невиданный, неслыханный, уродливый, пресмыкающийся, копошащийся, фантастический.</p><p class="p1">Гренгуар, совсем обезумев от страха, окруженный троими нищими, державшими его как в тисках, и множеством других лиц, оглушенный шумом и гвалтом, старался собраться с мыслями и припомнить, не канун ли праздника сегодня. Но все его усилия были тщетны – нить его мыслей и памяти оборвалась.</p><p class="p1">И, сомневаясь во всем, переходя от того, что он видел, к тому, что он чувствовал, он задавал себе неразрешимый вопрос:</p><p class="p1">– Если я существую – существует ли все окружающее? Если существует все окружающее – существую ли я?</p><p class="p1">В это время раздались громкие крики, покрывшие гул окружавшей его толпы:</p><p class="p1">– Отведем его к королю! Отведем его к королю!</p><p class="p1">– Пресвятая Дева! – пробормотал Гренгуар. – Здешний король, наверное, козел!</p><p class="p1">– К королю! К королю! – заревела вся толпа.</p><p class="p1">Гренгуара потащили. Каждый старался завладеть им. Но трое нищих не выпускали своей добычи и вырывали его у других с криком: «Он наш!» Камзол поэта, и без того уже изношенный, во время этой битвы испустил последнее дыхание. Пересекая ужасную площадь, он несколько опомнился, пришел в себя и начал осматриваться. В первую минуту, благодаря его поэтическому воображению, а может быть, просто пустому желудку, легкое облако задернуло перед ним все окружающее, и он видел все словно в неясном тумане кошмара, как в сумраке сна, когда все очертания дрожат, формы колеблются, предметы скучиваются в чудовищные группы, когда вещи кажутся химерами, а люди – призраками. Мало-помалу эта галлюцинация рассеялась, и помутившийся взгляд Гренгуара прояснился. Действительность предстала перед ним; она била ему в глаза, попадалась под ноги, и наконец ужасная, но поэтическая картина, подсказанная в первые минуты его воображением, побледнела и исчезла. Он сообразил, что перед ним не Стикс, а грязь, что его толкают не демоны, а воры, что в опасности находится не душа его, а попросту жизнь, так как у него нет кошелька, этого вернейшего примирителя, который с таким успехом становится между вором и честным человеком. Таким образом, разглядев оргию ближе и хладнокровнее, Гренгуар понял, что попал не на шабаш, а в кабак.</p><p class="p1">Двор чудес был и в самом деле кабак, но кабак разбойников, залитый не только вином, но и кровью.</p><p class="p1">Когда оборванный конвой Гренгуара наконец доставил его куда следовало, открывшееся перед ним зрелище никоим образом не могло привести его в мечтательное настроение, так как было лишено всякой поэзии, даже поэзии ада. Перед ним была самая прозаическая, грубая действительность таверны. Если бы действие происходило не в пятнадцатом веке, мы сказали бы, что Гренгуар спустился от Микеланджело к Калло.</p><p class="p1">На плоском камне был разложен большой огонь, над которым стоял таган, в настоящую минуту пустой, а вокруг огня в беспорядке стояли несколько источенных червями столов. Здесь не было слуги-геометра, который бы удосужился придать им побольше симметрии или хотя бы позаботился, чтобы они не соприкасались между собою под такими необычайными углами. На столах поблескивало несколько переливающихся через край кружек с пивом и вином, а за этими кружками виднелись пьяные лица, раскрасневшиеся от огня и вина. Вон какой-то толстяк с огромным брюхом и веселым лицом звонко целует толстую, обрюзгшую девку. Рядом с ним плут, изображавший днем солдата, разбинтовывает, посвистывая, свою якобы раненую ногу и потирает здоровое колено, которое было туго завернуто с самого утра во всевозможные тряпки. Его сосед занят изготовлением чудесного снадобья из чистотела и бычьей крови, при помощи которого он к утру превратит свою здоровую ногу в больную, покрытую страшными язвами. Через два стола от них «святоша» в полном костюме паломника упражняется, монотонно напевая в нос стихи и псалмы. Недалеко от него очевидно еще неопытный юноша берет урок падучей болезни у старого попрошайки, который учит его пускать пену, засунув в рот кусок мыла. Тут же больной водянкой превращается в здорового, выпуская раздувавший его воздух, а четыре или пять воровок, сидящие с ним за одним столом и спорящие из-за украденного вечером ребенка, зажимают себе носы.</p><p class="p1">Спустя два века все эти типы и превращения Двора чудес казались уже «такими удивительными и забавными», как говорит Соваль, «что, для развлечения короля, они появились на сцене и послужили сюжетом для балета „Ночь”, который разделялся на четыре акта и давался в театре Малого Бурбонского дворца».</p><p class="p1">«Никогда еще, – говорит очевидец 1653 года, – не были так верно воспроизведены необыкновенные метаморфозы Двора чудес. А прелестные стихи Бенсерада подготовили нас к представлению».</p><p class="p1">Всюду раздавались грубый смех и непристойные песни. Каждый говорил свое, кричал и бранился, не слушая соседа. Кружки стукались одна об другую, разбитая кружка порождала ссору, и в ссоре бродяги черепками рвали друг на друге лохмотья.</p><p class="p1">Большая собака сидела около огня и смотрела на него. Было в этом аду и несколько детей. Украденный ребенок плакал и кричал. Другой, толстенький мальчик лет четырех, сидел, свесив ноги, на слишком высокой для него скамейке, у стола, доходившего ему до подбородка, и не говорил ни слова. Третий с серьезным видом размазывал пальцем по столу сало, которые текло с оплывавшей свечи. Последний, еще совсем крошка, весь покрытый грязью, был едва виден из-за огромного котла. Он почти влез в него и скреб котел обломком черепицы, извлекая звук, от которого Страдивари, наверное, упал бы в обморок.</p><p class="p1">У огня стояла бочка, а на ней сидел нищий. Это был король на своем троне.</p><p class="p1">Трое оборванцев, захвативших Гренгуара, подвели его к бочке, и на минуту вся толпа притихла, только из котла, в который забрался ребенок, по-прежнему раздавался скрип.</p><p class="p1">Гренгуар не осмеливался ни поднять глаз, ни перевести дух.</p><p class="p1">– Hombra, quita tu sombrero<a href="ch2.xhtml#id81" class="a">[35]</a>, – сказал один из троих негодяев, и, прежде чем Гренгуар понял, что это значит, другой сорвал с него шляпу. Правда, это была довольно жалкая шляпа, но она еще могла защищать его от солнца и дождя. Гренгуар вздохнул.</p><p class="p1">Между тем король с высоты своего трона обратился к нему.</p><p class="p1">– Это что за мошенник? – спросил он.</p><p class="p1">Гренгуар вздрогнул. Голос короля, хотя в нем теперь и слышалась угроза, напомнил ему другой, жалобный голос, который в то самое утро нанес первый удар его мистерии, затянув среди представления: «Подайте Христа ради!» Он поднял глаза. Перед ним был действительно Клопен Труйльфу.</p><p class="p1">Несмотря на знаки королевского достоинства, Клопен Труйльфу был облачен в те же самые лохмотья. Болячка на его руке уже исчезла. Он держал ременный кнут из белой кожи, какие назывались в то время «метелками» и употреблялись сержантами, когда нужно было водворить порядок в толпе. На голове у него было что-то странное – не то детская шапочка, не то корона. Разобрать было трудно – ведь они так похожи одна на другую.</p><p class="p1">Между тем Гренгуар, сам не зная почему, несколько ободрился, узнав в короле Двора чудес ненавистного ему нищего большого зала.</p><p class="p1">– Мэтр… – пробормотал он. – Монсеньор… Сир… Как прикажете называть вас? – наконец спросил он, достигнув высшей точки своего величания, не зная, как подняться еще выше, и не решаясь спуститься вниз.</p><p class="p1">– Монсеньор, ваше величество или товарищ – называй меня, как хочешь. Но только не мямли. Что можешь ты сказать в свое оправдание?</p><p class="p1">«В свое оправдание! – подумал Гренгуар. – Плохо дело!» И он проговорил, заикаясь:</p><p class="p1">– Я тот… который сегодня утром…</p><p class="p1">– Клянусь когтями дьявола! – прервал его Клопен. – Твое имя, мошенник, и ничего больше! Слушай. Ты стоишь перед лицом трех могущественных государей: меня, Клопена Труйльфу, короля тунского, преемника верховного властелина королевства арго; Матиаса Гунгади Сникали, герцога египетского и цыганского, – вон того желтолицего старика с тряпкой, обвязанной кругом головы, и Гильома Руссо, императора галилейского, того толстяка, который ласкает шлюху и не слушает нас. Мы твои судьи. Ты, чужой, пришел в королевство арго и нарушил этим привилегии нашего города. Ты будешь наказан, если только ты не вор, не нищий и не бродяга. Оправдывайся. Выкладывай свои титулы. Кто ты – вор, нищий или бродяга?</p><p class="p1">– Увы! – отвечал Гренгуар. – Я не имею чести принадлежать к ним. Я писатель…</p><p class="p1">– Довольно, – остановил его Труйльфу, не дав ему докончить, – ты будешь повешен. Да, повешен, и это вполне справедливо, господа честные горожане. Как вы обращаетесь с нами, когда мы попадаем в ваши руки, так и мы обращаемся с вами у себя. Закон, который вы придумали для бродяг, бродяги в свою очередь применяют к вам. Вы сами виноваты, если он строг. Надо же когда-нибудь полюбоваться и нам на гримасу честного человека в веревочной петле. От этого сама казнь становится как-то почетней. Ну, приятель, раздай-ка живей свои лохмотья этим барышням. Я повешу тебя для развлечения воров и бродяг, а ты отдашь им кошелек, чтобы им было на что выпить. Если хочешь помолиться перед смертью, у нас есть прекрасная статуя Бога Отца, которую мы украли из церкви Святого Петра на Быках. Даю тебе четыре минуты, чтобы поручить Богу свою душу.</p><p class="p1">Речь произвела большой эффект.</p><p class="p1">– Ловко сказано, клянусь душою! – воскликнул царь галилейский, разбив свою кружку об стол. – Клопен Труйльфу читает проповеди не хуже самого святейшего отца Папы!</p><p class="p1">– Всемилостивейшие императоры и короли! – хладнокровно сказал Гренгуар; к нему совершенно неожиданно вернулось мужество, и он говорил смело. – Вам еще неизвестно, кто я. Я Пьер Гренгуар, поэт, написавший мистерию, которую разыгрывали сегодня утром в большом зале Дворца правосудия.</p><p class="p1">– А, так вот ты кто! – воскликнул Клопен. – Как же, как же, ведь я тоже был там. Так что же из этого, приятель? Разве потому, что ты надоедал нам утром, тебя нельзя повесить вечером?</p><p class="p1">«Трудно мне будет выпутаться из беды», – подумал Гренгуар, но все-таки сделал еще одну попытку.</p><p class="p1">– По-моему, – сказал он, – поэты как раз подходят к вам. Эзоп был бродягой, Гомер – нищим, Меркурий – вором…</p><p class="p1">– Ты, кажется, вздумал морочить нас своей тарабарщиной, – прервал его Клопен. – Черт возьми! К чему столько церемоний? Неужели ты не можешь дать себя повесить просто?</p><p class="p1">– Извините, ваше величество, король тунский, – возразил Гренгуар, упорно отстаивая каждый шаг. – Вы увидите сами… Одну минуту… Выслушайте меня… Ведь не осудите же вы меня, не выслушав?..</p><p class="p1">Между тем шум мало-помалу увеличивался, и слабый голос Гренгуара был едва слышен. Маленький мальчик пилил по котлу еще усерднее, чем прежде, да вдобавок какая-то старуха поставила на таган сковородку с салом, трещавшим на огне так громко, как кричит толпа ребятишек, преследуя маску.</p><p class="p1">Клопен Труйльфу, посовещавшись с герцогом цыганским и мертвецки пьяным царем галилейским, резко крикнул своим подданным:</p><p class="p1">– Молчать!</p><p class="p1">Но так как котел и сковородка не слушались его, то он соскочил с бочки, одним ударом ноги отбросил котел шагов на десять от ребенка, а другой ногой опрокинул сковородку, все сало с которой пролилось в огонь. Затем он важно взобрался на свой трон и уселся, не обращая внимания на прерывистые всхлипывания мальчика и ворчание старухи, ужин которой улетел вместе с густым дымом.</p><p class="p1">По знаку Труйльфу герцог цыганский, император галилейский, святоши и высшие члены королевства встали полукругом вокруг Гренгуара, которого продолжали держать трое нищих. Окружавшие поэта люди были в лохмотьях и мишурных украшениях, с дрожащими от пьянства ногами, тусклыми глазами и тупыми, безжизненными лицами. Они держали в руках вилы и топоры. Во главе этого чудовищного «круглого стола» восседал на своем троне Труйльфу, как дож в сенате, как Папа на конклаве, как король среди своих пэров. Он господствовал над всеми, был выше всех, и не потому только, что сидел на бочке. В выражении его лица было что-то свирепое, надменное и грозное, придававшее блеск его глазам и смягчавшее его животный тип. Он казался вепрем среди свиней.</p><p class="p1">– Слушай, – сказал он Гренгуару, поглаживая уродливый подбородок мозолистой рукой. – Я не вижу ничего такого, что мешало бы мне повесить тебя. Положим, это как будто не нравится тебе, но что же тут мудреного? Вы, горожане, не привыкли к этому и потому воображаете, что это уж невесть что. Но мы вовсе не желаем тебе зла, и, если хочешь, я дам тебе возможность выпутаться из беды. Согласен ты присоединиться к нам?</p><p class="p1">Нетрудно представить себе, как подействовало это предложение на Гренгуара, потерявшего уже всякую надежду спасти свою жизнь. Он с восторгом ухватился за него.</p><p class="p1">– Согласен… конечно… с удовольствием, – отвечал он.</p><p class="p1">– Желаешь ты вступить в воровскую шайку?</p><p class="p1">– В воровскую? Конечно!</p><p class="p1">– Признаешь ты себя членом вольной буржуазии? – продолжал тунский король.</p><p class="p1">– Да, я признаю себя членом вольной буржуазии.</p><p class="p1">– Подданным королевства арго?</p><p class="p1">– Королевства арго.</p><p class="p1">– Бродягой?</p><p class="p1">– Бродягой.</p><p class="p1">– От всей души?</p><p class="p1">– От всей души.</p><p class="p1">– Должен, впрочем, предупредить тебя, – сказал король, – что в конце концов тебя все-таки повесят.</p><p class="p1">– Господи помилуй! – воскликнул поэт.</p><p class="p1">– Только немножко позднее, – невозмутимо продолжал Клопен, – с большей церемонией, повесят честные люди, на красивой каменной виселице и на счет славного города Парижа. Это может служить тебе утешением.</p><p class="p1">– Да… конечно, – согласился Гренгуар.</p><p class="p1">– Ты будешь пользоваться и другими преимуществами. Как члену вольной буржуазии тебе не придется платить обязательных для всех парижан налогов: в пользу бедных, на очистку города и освещение улиц.</p><p class="p1">– Хорошо, – сказал поэт, – я согласен. Я бродяга, подданный королевства арго, член воровской шайки, вольной буржуазии и всего чего угодно. И я был всем этим еще раньше, ваше величество, потому что я философ. А как вам известно, et omnia in philosophia, omnes in philosophio continentur<a href="ch2.xhtml#id79" class="a">[36]</a>.</p><p class="p1">Тунский король нахмурил брови.</p><p class="p1">– За кого ты принимаешь меня, приятель? – сказал он. – С какой стати ты начал болтать на языке венгерских жидов? Я не говорю по-еврейски. Чтобы сделаться бандитом, не нужно быть жидом. Теперь я даже не занимаюсь воровством; я выше этого – я убиваю. Я режу головы, но не срезываю кошельков.</p><p class="p1">Слушая эти короткие фразы, которые, по мере того как королем овладевал гнев, становились все отрывистее, Гренгуар испугался и начал оправдываться.</p><p class="p1">– Прошу извинения у вашего величества, – сказал он. – Я говорил не по-еврейски, а по-латыни.</p><p class="p1">– Повторяю тебе, что я не жид! – в ярости воскликнул Клопен. – Я велю тебя повесить, отродье синагоги! Вместе вон с тем коротышкой-жиденком, который стоит рядом с тобою. Впрочем, его, наверное, скоро пригвоздят к прилавку, как фальшивую монету.</p><p class="p1">Говоря это, он показал пальцем на низенького бородатого еврея, надоедавшего Гренгуару своим facitote caritatem<a href="ch2.xhtml#id77" class="a">[37]</a>. Не зная никакого другого языка, еврей с удивлением смотрел на тунского короля, не понимая, чем мог вызвать его гнев.</p><p class="p1">Наконец его величество Клопен несколько успокоился.</p><p class="p1">– Итак, плут, ты хочешь поступить в воровскую шайку? – спросил он поэта.</p><p class="p1">– Да, хочу, – отвечал тот.</p><p class="p1">– Одного желания еще мало, – угрюмо проговорил Клопен. – От него не прибавится ни одной луковицы в супе, оно хорошо только для рая. А рай и арго – вещи разные. Чтобы быть принятым в шайку, ты должен доказать, что годен на что-нибудь, и для этого обыскать чучело.</p><p class="p1">– Я обыщу кого угодно, – отвечал Гренгуар.</p><p class="p1">Клопен сделал знак. Несколько человек вышли из круга и через минуту вернулись, неся два столба. Эти столбы заканчивались двумя деревянными подпорками, на которых они держались прочно и крепко, когда их поставили на землю. Верхние концы столбов соединили поперечной перекладиной, так что вышла прехорошенькая переносная виселица. Гренгуар имел удовольствие видеть, как она в одну минуту воздвиглась перед ним. Все было налицо, даже петля, грациозно качавшаяся под перекладиной.</p><p class="p1">– Что они хотят делать? – с некоторым беспокойством спрашивал себя Гренгуар.</p><p class="p1">В эту минуту раздался звон колокольчиков, рассеявший его тревогу, и чучело, которому члены вольной буржуазии накинули на шею петлю, закачалось на виселице. Это было настоящее воронье пугало, наряженное в красную одежду и увешанное таким огромным количеством колокольчиков и бубенчиков, что их хватило бы на упряжь для тридцати кастильских мулов. Эти колокольчики звенели, пока качалась веревка, а потом, мало-помалу замирая, совсем затихли, когда чучело остановилось неподвижно, подчиняясь закону маятника, вытеснившего водяные и песочные часы.</p><p class="p1">Тогда Клопен, указывая Гренгуару на старую, расшатанную скамейку, стоявшую под чучелом, сказал:</p><p class="p1">– Влезай!</p><p class="p1">– Черт возьми, да ведь я сломаю себе шею! – возразил Гренгуар. – Ваша скамейка хромает, как двустишие Марциала. Одна нога у нее гекзаметр, а другая пентаметр.</p><p class="p1">– Влезай! – повторил Клопен.</p><p class="p1">Делать нечего, Гренгуар влез на скамейку и, взмахнув несколько раз руками и головой, нашел наконец равновесие.</p><p class="p1">– Теперь, – продолжал тунский король, – подними правую ногу, обхвати ею левое колено и встань на кончики пальцев левой ноги.</p><p class="p1">– Так вы непременно хотите, чтобы я сломал себе что-нибудь, ваше величество? – воскликнул Гренгуар.</p><p class="p1">Клопен покачал головою.</p><p class="p1">– Ты слишком много болтаешь, приятель, – сказал он. – Вот в двух словах, что от тебя требуется: ты встанешь на цыпочки, как я сказал. Тогда ты сможешь достать карман у чучела. Ты обыщешь его и вынешь оттуда кошелек, который там лежит. Если ты сделаешь это так, что не зазвенит ни один колокольчик, – отлично, ты будешь членом нашей шайки, и все ограничится только тем, что мы в продолжение восьми дней будем нещадно колотить тебя.</p><p class="p1">– Господи помилуй! – воскликнул Гренгуар. – А если колокольчики зазвенят?</p><p class="p1">– Тогда тебя повесят. Понимаешь?</p><p class="p1">– Нет, совсем не понимаю, – отвечал Гренгуар.</p><p class="p1">– Так слушай еще раз. Ты обыщешь это пугало и вытащишь у него из кармана кошелек. Если в это время зазвенит хоть один колокольчик, тебя повесят, понимаешь?</p><p class="p1">– Хорошо, понимаю, – сказал Гренгуар, – а дальше?</p><p class="p1">– Если тебе удастся вытащить кошелек так, что не зазвенит ни один колокольчик, ты будешь принят в шайку и мы станем тузить тебя в продолжение восьми дней подряд. Теперь ты, надеюсь, понял?</p><p class="p1">– Нет, ваше величество, я опять-таки ничего не понял. Что же я выиграю? В одном случае меня повесят, в другом будут колотить!</p><p class="p1">– Но ведь зато ты будешь бродягой! Разве ты не ставишь это ни во что? А бить тебя мы будем для твоей же пользы, чтобы приучить твое тело к ударам.</p><p class="p1">– Благодарю покорно, – отвечал поэт.</p><p class="p1">– Ну, живей! – воскликнул король, ударив ногой по бочке, которая загудела, как огромный барабан. – Обыскивай чучело, и покончим с этим. Предупреждаю тебя в последний раз, что ты сам займешь место чучела, если звякнет хоть один колокольчик.</p><p class="p1">Вся шайка разразилась рукоплесканиями при этих словах Клопена и с громким смехом окружила виселицу; этот безжалостный смех показал Гренгуару, что его отчаянное положение является для них забавой и что ему нечего ждать пощады. Итак, все было против него, – оставалась лишь одна слабая надежда, что, может быть, ему удастся выполнить трудную задачу. Он решил рискнуть, но сначала обратился мысленно с горячей мольбой к чучелу, которое собирался обокрасть; легче было смягчить его, чем окружавших виселицу людей. А когда Гренгуар взглядывал на все эти колокольчики с медными языками, ему казалось, что это – мириады змей, открывших свои пасти и собирающихся зашипеть и ужалить его.</p><p class="p1">«Господи, – думал он, – неужели моя жизнь зависит от того, зазвенит или не зазвенит хотя бы один из этих маленьких колокольчиков? О колокольчики, не звените, бубенчики, не гремите!» – прибавил он мысленно, с мольбою сжав руки. Потом он снова обратился к Клопену.</p><p class="p1">– А если колокольчики зазвенят от ветра? – спросил он.</p><p class="p1">– Ты будешь повешен, – не задумываясь отвечал Клопен.</p><p class="p1">Видя, что нет никакой возможности ни увернуться, ни добиться отсрочки, Гренгуар покорился своей судьбе. Он переступил правою ногою за левую, встал на цыпочки на левую ногу и протянул руку; но в ту минуту, как он дотронулся до чучела, тело его, стоявшее только на одной ноге, да к тому же на трехногой скамейке, пошатнулось. Он машинально хотел опереться на чучело и, потеряв равновесие, тяжело упал на землю, оглушенный зловещим звоном тысячи колокольчиков, а чучело, которое он толкнул, сначала описало круг, а потом величественно закачалось между двумя столбами.</p><p class="p1">– Проклятие! – воскликнул Гренгуар, летя со скамейки, и, упав на землю ничком, остался неподвижен, как мертвый.</p><p class="p1">А между тем он слышал страшный трезвон у себя над головой, злобный хохот бродяг и голос их короля, сказавшего:</p><p class="p1">– Поднимите этого молодца и повесьте его!</p><p class="p1">Гренгуар встал. Чучело уже сняли, чтобы освободить ему место, и заставили его влезть на скамейку. Клопен подошел к нему, надел ему на шею петлю и, хлопнув его по плечу, сказал:</p><p class="p1">– Прощай, любезный друг! Теперь тебе уже не вернуться, будь ты хоть сам Папа!</p><p class="p1">Мольба о пощаде замерла на губах Гренгуара. Он огляделся кругом. Никакой надежды – все хохочут.</p><p class="p1">– Бельвинь де Летуаль, – сказал тунский король, и огромный верзила вышел из рядов. – Влезь на перекладину!</p><p class="p1">Бельвинь де Летуаль ловко взобрался на поперечный брус, и Гренгуар с ужасом увидал, что он присел на корточки над самой его головой.</p><p class="p1">– Когда я хлопну в ладоши, – продолжал король, – ты, Андрэ Леруж, вышибешь скамейку из-под его ног ударом колена, ты, Франсуа Шант-Прюн, повиснешь на ногах этого бездельника, а ты, Бельвинь, вскочишь ему на плечи. И все трое сразу – понимаете?</p><p class="p1">Гренгуар задрожал.</p><p class="p1">– Ну, готовы вы? – спросил Клопен Бельвиня, Франсуа и Леружа, которые собирались броситься на Гренгуара, как три паука на муху. Затем для несчастного поэта наступила минута томительного ожидания, в то время как Клопен спокойно подталкивал ногою в огонь несколько еще не загоревшихся веток. – Готовы вы? – повторил он и поднял руки, чтобы хлопнуть в ладоши.</p><p class="p1">Еще секунда – и все было бы кончено.</p><p class="p1">Но вдруг Клопен остановился, как бы внезапно пораженный какой-то мыслью.</p><p class="p1">– Погодите, – сказал он, – я забыл. По нашим обычаям, нельзя повесить человека, не спросив сначала, не хочет ли какая-нибудь женщина взять его в мужья… Ну, товарищ, это твоя последняя надежда. Ты возьмешь себе в жены или одну из наших женщин, или веревку.</p><p class="p1">Этот цыганский обычай может показаться читателю очень странным, но он существовал на самом деле и внесен в старинное английское законодательство. О нем можно справиться в «Заметках» [Берингтона].</p><p class="p1">Гренгуар перевел дух. В течение получаса он во второй раз возвращался к жизни и не мог быть вполне уверен, что ему удастся спастись.</p><p class="p1">– Эй, вы, бабье! – крикнул Клопен, снова взобравшись на свою бочку. – Кто из вас, начиная с колдуньи и кончая ее кошкой, хочет взять себе в мужья этого молодца? Эй, Колетта ла Шаронн! Елизавета Трувен! Симона Жадуин! Мария Пьедебу! Тонн ла Лонг, Берар да Фануель! Мишель Женайль! Клодина Ронж-Орейль! Матурина Жирору! Изабелла Тьери! Идите сюда, смотрите! Мужчина даром! Кто хочет?</p><p class="p1">Но Гренгуар имел такой жалкий вид, что представлял мало привлекательного. Женщины отнеслись равнодушно к предложению короля, и бедный поэт слышал, как они говорили: «Нет! Нет! Его лучше повесить. Тогда все получат удовольствие».</p><p class="p1">Однако три из них все-таки вышли из толпы и одна за другой стали подходить и осматривать его. Первая была толстуха с квадратным лицом. Она внимательно оглядела истрепанную одежду философа; на ней было больше дыр, чем в печной решетке для жаренья каштанов. Девушка сделала гримасу.</p><p class="p1">– Старое тряпье! – пробормотала она и обратилась к Гренгуару: – Где твой плащ?</p><p class="p1">– Я потерял его, – ответил Гренгуар.</p><p class="p1">– А твоя шляпа?</p><p class="p1">– У меня ее взяли.</p><p class="p1">– Покажи твои башмаки.</p><p class="p1">– У них отваливаются подошвы.</p><p class="p1">– Твой кошелек?</p><p class="p1">– Увы! – запинаясь, проговорил Гренгуар. – У меня нет ни гроша.</p><p class="p1">– Так попроси, чтобы тебя повесили, да еще поблагодари за труды! – сказала девушка и повернулась к нему спиной.</p><p class="p1">Вторая, подошедшая взглянуть на Гренгуара, была безобразная смуглая старуха, вся в морщинах, выделявшаяся своим уродством даже на Дворе чудес. Она обошла кругом Гренгуара, которому сделалось даже страшно, что она хочет взять его.</p><p class="p1">– Нет, он слишком уж худ! – проворчала сквозь зубы старуха и ушла.</p><p class="p1">Третья была молодая девушка, довольно свеженькая и недурненькая собою.</p><p class="p1">– Спасите меня! – прошептал ей несчастный.</p><p class="p1">Она посмотрела на него с состраданием, потом опустила глаза и, перебирая юбку, несколько времени стояла, как бы не зная, на что решиться. Гренгуар следил за всеми ее движениями: это был последний луч надежды.</p><p class="p1">– Нет, – произнесла наконец девушка, – Гильом Лонгжу меня изобьет.</p><p class="p1">И она вошла в толпу.</p><p class="p1">– Ну, приятель, тебе не везет! – сказал Клопен. Он встал на бочку и, к величайшему удовольствию всех, закричал тоном оценщика на аукционе: – Никто не желает взять его? Раз, два, три! – И, повернувшись к виселице, прибавил, кивнув головой: – Он остался за тобою!</p><p class="p1">Бельвинь де Летуаль, Андрэ Леруж и Франсуа Шант-Прюн подвинулись к Гренгуару.</p><p class="p1">В эту минуту раздались крики:</p><p class="p1">– Эсмеральда! Эсмеральда!</p><p class="p1">Гренгуар вздрогнул и обернулся в ту сторону. Толпа расступилась и пропустила прелестную молодую девушку.</p><p class="p1">Это была цыганка.</p><p class="p1">– Эсмеральда! – прошептал пораженный Гренгуар. Несмотря на волнение и на то, что мысли его были заняты совсем другим, магическое слово «Эсмеральда» сразу вызвало в его памяти все события этого дня.</p><p class="p1">Даже здесь, на Дворе чудес, все, казалось, испытывали на себе могущество ее очарования и красоты. Мужчины и женщины тихо расступались, давая ей дорогу, и их грубые лица прояснялись от одного ее взгляда.</p><p class="p1">Она подошла своей легкой поступью к жертве. Хорошенькая Джали следовала за ней. Гренгуар был ни жив ни мертв. Эсмеральда с минуту смотрела на него.</p><p class="p1">– Вы хотите повесить этого человека? – спросила она Клопена.</p><p class="p1">– Да, сестра, – отвечал тунский король, – если только ты не захочешь взять его в мужья.</p><p class="p1">Она сделала свою презрительную гримаску и сказала:</p><p class="p1">– Хорошо, я возьму его.</p><p class="p1">Тут Гренгуар уже вполне убедился, что видит сон. Да, он заснул еще утром – он грезит и теперь.</p><p class="p1">Развязка, как ни была она приятна, слишком потрясла его своей неожиданностью. С шеи поэта сняли петлю и помогли ему сойти со скамейки. Он был так взволнован, что принужден был сесть.</p><p class="p1">Герцог египетский, не произнося ни слова, принес глиняную кружку. Эсмеральда подала ее Гренгуару.</p><p class="p1">– Бросьте ее, – сказала она.</p><p class="p1">Кружка разлетелась на четыре части.</p><p class="p1">– Брат, – сказал герцог египетский, кладя руки на их головы. – Она твоя жена. Сестра, он твой муж. На четыре года. Ступайте.</p></span></span></span>
