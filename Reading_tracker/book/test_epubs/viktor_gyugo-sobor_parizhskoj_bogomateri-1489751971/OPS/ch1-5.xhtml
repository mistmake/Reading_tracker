<p class="p">I. Большой зал</p>
</div><p class="p1">Ровно триста сорок восемь лет шесть месяцев и девятнадцать дней тому назад парижан разбудил громкий трезвон всех колоколов трех кварталов: Старого и Нового города и Университета. А между тем этот день, 6 января 1482 года, не принадлежал к числу тех, о которых сохранилась память в истории. Ничего примечательного не было в событии, так взволновавшем жителей Парижа и заставившем с утра звонить все колокола. На город не шли приступом пикардийцы или бургундцы, студенты не бунтовали, не предвиделось ни въезда «нашего грозного властелина, господина короля», ни занимательного повешения воров и воровок. Не ожидалось также прибытия какого-нибудь разряженного и разубранного посольства, что случалось так часто в пятнадцатом веке. Всего два дня тому назад одно из таких посольств, состоящее из фламандских послов, явившихся с целью устроить брак между дофином и Маргаритой Фландрской, прибыло в Париж, к великой досаде кардинала Бурбонского, который, угождая королю, должен был волей-неволей оказывать любезный прием этим неотесанным фламандским бургомистрам и угощать их в своем Бурбонском дворце представлением «весьма прекрасной моралите, шуточной пьесы и фарса», в то время как проливной дождь хлестал по его великолепным коврам, разостланным у входа во дворец.</p><p class="p1">Но 6 января причиной волнения всех жителей Парижа, как говорит Жеан де Труайе, было установившееся с незапамятных времен двойное празднество – праздник Богоявления и праздник шутов. В этот день бывала иллюминация на Гревской площади, посадка майского дерева в Бракской часовне и мистерия во Дворце правосудия.</p><p class="p1">Об этом провозгласили накануне на всех перекрестках, при звуках труб, городские глашатаи в красивых одеждах из фиолетового камлота, с большими белыми крестами на груди.</p><p class="p1">Толпы горожан и горожанок, заперев дома и лавки, направились с самого утра по трем разным направлениям. Одни шли на Гревскую площадь, другие – в часовню, третьи – смотреть мистерию. И нужно отдать справедливость здравому смыслу тогдашних парижских зевак: большинство из них предпочло иллюминацию, как раз подходящую ко времени года, и мистерию, которая должна была разыгрываться в большом зале Дворца, хорошо защищенном от непогоды. Бедному майскому дереву, едва покрытому листьями, любопытные предоставили одиноко зябнуть под январским небом на кладбище Бракской часовни.</p><p class="p1">Особенно много народу стекалось по улицам, ведущим ко Дворцу правосудия, так как было известно, что прибывшие два дня тому назад фламандские послы будут присутствовать на представлении и при избрании папы шутов, которое тоже должно было состояться в большом зале. Нелегко было пробраться в этот зал, считавшийся тогда самым большим на свете. (Действительно, тогда еще Соваль не измерял большого зала в замке Монтаржи.)</p><p class="p1">Залитая народом площадь перед Дворцом правосудия представлялась тем, кто смотрел на нее из окон, волнующимся морем, куда пять или шесть улиц изливали каждую минуту, подобно рекам, новые волны голов. И эти волны, все увеличиваясь, разбивались об углы домов, выступавших, словно мысы, то тут то там, в неправильном вместилище площади.</p><p class="p1">В центре высокого готического<a href="ch2.xhtml#id63" class="a">[5]</a> фасада Дворца правосудия с большой лестницы непрерывно поднимались и спускались толпы народу, разделяясь на верхней площадке и разливаясь широкими волнами по двум большим спускам, словно водопады. От криков, смеха, топота тысяч ног над площадью стояли страшный шум и гул. По временам этот шум усиливался, течение, несшее всю эту толпу к лестнице, внезапно поворачивало назад, и начинался какой-то водоворот. Это происходило тогда, когда полицейский страж ударял кого-нибудь ружейным прикладом или конный сержант врезался в толпу, чтобы водворить порядок; эта милая традиция, завещанная старшинами города коннетаблям, от коннетаблей перешла по наследству к объездной команде, а уж затем к теперешней жандармерии Парижа.</p><p class="p1">У дверей, у окон, на крышах, на чердаках – всюду виднелись тысячи добродушных, честных лиц горожан, глазевших на Дворец, на толпу и не желавших ничего больше. Многие парижане довольствуются тем, что лишь смотрят на других зрителей; даже стена, за которой происходит что-нибудь, уже представляет для них интерес.</p><p class="p1">Если бы мы, живущие в 1830 году, могли хоть мысленно смешаться с парижанами пятнадцатого века и войти вместе с ними, толкаясь, работая локтями и вертясь в гуще толпы, в огромный зал суда, казавшийся 6 января 1482 года столь тесным, мы увидели бы интересное и чарующее зрелище, нас окружали бы вещи столь старинные, что они показались бы нам совсем новыми.</p><p class="p1">Если читатель согласен, мы попробуем воспроизвести хоть мысленно то впечатление, которое мы с ним испытали бы, переступив за порог большого зала вместе с этой разношерстной толпой.</p><p class="p1">Прежде всего мы были бы оглушены страшным шумом и ослеплены роскошью и блеском. Вверху, над нашими головами, – двойной стрельчатый бледно-голубой свод, украшенный деревянной резьбой и усеянный золотыми лилиями; внизу, под ногами, – пол из черных и белых мраморных плит. В нескольких шагах от нас – громадная колонна, потом другая, третья. Всего вдоль зала семь колонн, поддерживающих двойной свод.</p><p class="p1">Вокруг первых четырех колонн – лавочки торговцев, сверкающие стеклом и разными побрякушками; вокруг трех остальных – дубовые скамьи, немало послужившие на своем веку, гладко отполированные одеждой тяжущихся и мантиями прокуроров. Кругом зала, вдоль высоких стен, между колоннами и в простенках между дверями и окнами, – бесконечный ряд статуй французских королей, начиная с Фарамонда, королей-лентяев с повисшими руками и опущенными глазами и королей мужественных, воинственных, смело поднявших к небу головы и руки. В высоких стрельчатых окнах вставлены тысячи разноцветных стекол. Великолепные двери украшены тонкой резьбой. И все это – свод, колонны, стены, наличники, потолок, двери, статуи – чудесного голубого цвета с золотом, уже несколько потускневшего в то время и вовсе исчезнувшего под пылью и паутиной к 1549 году, когда де Брель восхищался им уже только по преданию.</p><p class="p1">Теперь представьте себе этот громадный продолговатый зал, освещенный бледным светом январского дня, с нахлынувшей в него пестрой шумной толпой, и вы в общем получите о нем некоторое понятие, а интересные частности мы постараемся описать более точно.</p><p class="p1">Разумеется, если бы Равальяк не убил Генриха IV, в канцелярии дворца не хранились бы документы по его делу, не было бы сообщников, заинтересованных в исчезновении этих документов, а следовательно, не было бы и поджигателей, вынужденных, за неимением лучшего средства, сжечь канцелярию, чтобы сжечь документы, и сжечь самый Дворец правосудия, чтобы сжечь канцелярию. Не было бы пожара 1618 года, старинный дворец сохранился бы до сих пор, и я мог бы сказать читателю: «Сходите посмотреть на большой зал». И мне не пришлось бы описывать его, а читателю – читать это посредственное описание. Все это служит доказательством новой истины, что великие события имеют неисчислимые последствия.</p><p class="p1">Возможно, конечно, что у Равальяка не было сообщников, а если он и имел их, то они все-таки могли быть неповинны в пожаре 1618 года. Существуют еще два весьма вероятных предположения. Во-первых, все знают, что 7 марта, после полуночи, большая пылающая звезда шириною в фут, длиною в локоть упала с неба на Дворец правосудия. Во-вторых, существует следующее четверостишие Теофиля:</p><div class="poem">
<div class="stanza">
<p class="v">Certes, ce fut un triste jeu,</p>
<p class="v">Quand a Paris dame Justice,</p>
<p class="v">Pour avoir mangé trop dépice,</p>
<p class="v">Se mit tout le palais en feu<a href="ch2.xhtml#id62" class="a">[6]</a>.</p>
</div>
</div><p class="p1">Но как бы мы ни смотрели на эти три толкования – политическое, физическое и поэтическое, – событие, к сожалению, неопровержимое, пожар Дворца правосудия в 1618 году, остается налицо. По милости этого пожара, а в особенности по милости позднейшей реставрации, погубившей то, что пощадил пожар, в настоящее время почти ничего не осталось от этого первого дворца французских королей. Он был древнее Лувра и уже в царствование Филиппа Красивого считался таким старинным, что в нем находили много общего с великолепными постройками, воздвигнутыми королем Робертом и описанными Гельгальдусом. И почти все исчезло. Что сталось с канцелярией, где Людовик Святой «скрепил свой брак»? С садом, где он, «одетый в камлотовое платье, камзол без рукавов из грубого сукна и черный плащ, решал дела, лежа на ковре вместе с Жуанвилем»? Где комнаты императора Сигизмунда, Карла IV, Иоанна Безземельного? Где лестница, с которой Карл IV провозгласил свой милостивый эдикт? Плита, на которой Марсель, в присутствии дофина, зарезал Роберта Клермонского и маршала Шампанского? Калитка, где были разорваны буллы антипапы Бенедикта и откуда вышли его посланные, наряженные в шутовские мантии и митры и принужденные публично каяться на всех перекрестках Парижа? Где большой зал с его голубой окраской, позолотой, статуями, колоннами, с его стрельчатым сводом, покрытым резьбой? А позолоченная комната? А каменный лев около дверей с опущенной головой и поджатым хвостом, как у львов Соломонова трона, – символ силы, смиренно склоняющейся перед правосудием? А великолепные двери и цветные оконные стекла? А резные дверные ручки, приводившие в отчаяние Бикорнета? А изящная столярная работа дю Ганси?.. Что сделало время, что сделали люди со всеми этими чудесами? И что дали нам взамен этой истории галлов, этого готического стиля? Тяжелые полукруглые своды де Бросса, построившего неуклюжий портал Сен-Жерве, – по части искусства, а по части истории – вздорную болтовню господ Патрю о главной колонне. Нельзя сказать, чтобы это было много.</p><p class="p1">Но вернемся к настоящему большому залу настоящего старинного дворца…</p><p class="p1">Один конец этого гигантского параллелограмма был занят знаменитым мраморным столом, таким длинным, широким и толстым, что, по выражению старинных рукописей, он был способен возбудить аппетит у Гаргантюа, потому что подобного куска мрамора в мире не бывало. На противоположном конце зала находилась часовня, где Людовик XI велел поставить свою коленопреклоненную статую перед образом Божией Матери и куда, по его приказанию, невзирая на то что в ряду королевских статуй остались две пустые ниши, были перенесены статуи Карла Великого и Людовика Святого, двух святых, пользующихся, по его мнению, в качестве французских королей большим влиянием на небе. Эта часовня, совсем новая, существовавшая всего лет шесть, была в том изящном, прелестном архитектурном стиле, с чудесными скульптурными украшениями и тонкой резьбой, который заканчивает готическую эру и продолжается до середины шестнадцатого столетия в волшебных, причудливых созданиях эпохи Возрождения. Тончайшим произведением искусства была небольшая вделанная над входом сквозная розетка, необыкновенно изящной и тонкой работы. Она казалась сотканной из кружева звездой.</p><p class="p1">Посреди зала, напротив главного входа, около стены возвышалась обтянутая золотой парчой эстрада, на которую был устроен отдельный ход через окно коридора, находящегося перед золоченой комнатой. Эта эстрада была приготовлена для фламандских послов и других знатных особ, приглашенных на представление.</p><p class="p1">Мистерия, по издавна установившемуся обычаю, должна была разыгрываться на мраморной площадке, приготовленной с самого утра. На великолепной мраморной доске, исцарапанной каблуками судебных писцов, стояла довольно высокая деревянная клетка. Верхняя ее часть, хорошо видная всем зрителям, должна была служить сценой, а внутренняя, замаскированная коврами, – одевальной для актеров. Лестница, наивно приставленная к клетке снаружи, предназначалась для сообщения сцены с одевальной, и по ней должны были входить и уходить актеры. Как ни внезапно должно было появиться какое-нибудь действующее лицо, ему все-таки приходилось взбираться по этой лестнице, и каким неожиданным ни предполагался какой-нибудь сценический эффект, нельзя было обойтись без этих ступенек. Невинное и почтенное детство искусства и механики!</p><p class="p1">Четыре сержанта дворцового судьи, обязанные присутствовать при всех народных развлечениях как в дни празднеств, так и во время казней, стояли по четырем углам мраморной площадки.</p><p class="p1">Представление должно было начаться ровно в двенадцать – с последним ударом дворцовых часов. Это было, конечно, слишком поздно для театрального представления, но приходилось поневоле считаться с удобствами фламандских послов.</p><p class="p1">Между тем вся толпа, теснившаяся в зале, ждала здесь с самого утра. Многие из любопытства пришли на площадь, как только занялась заря, и терпеливо стояли там, дрожа от холода, а некоторые даже утверждали, что провели всю ночь у главного входа, чтобы наверняка войти первыми. Толпа увеличивалась с каждой минутой и, как река, выступившая из берегов, поднималась около стен, вздувалась вокруг колонн, разливалась по карнизам, подоконникам, выступам и всем выпуклостям скульптурных украшений.</p><p class="p1">От давки, скуки, нетерпения, свободы сумасбродного и шутовского дня, ссор, разгоравшихся из-за каждого пустяка – торчащего локтя или подбитого гвоздями башмака, – в криках этого стиснутого, запертого, задыхавшегося народа начало звучать раздражение еще задолго до прибытия послов. Со всех сторон раздавались жалобы и проклятия по адресу фламандцев, купеческого старшины, кардинала Бурбонского, судьи, Маргариты Австрийской, сержантов с жезлами, холода, жары, дурной погоды, парижского епископа, Папы, шутов, колонн, статуй, запертой двери, открытого окна. Все это очень забавляло затесавшихся в толпу студентов и слуг, старавшихся еще больше подзадорить недовольных, раздражая их, словно булавочными уколами, язвительными остротами и насмешками.</p><p class="p1">Особенно отличалась одна группа веселых забияк, которые, выбив в окне стекла, бесстрашно уселись на подоконник и оттуда осыпали насмешками попеременно то толпу на площади, то толпу в зале. По их оживленным жестам, звонкому хохоту, по тому, как весело перекликались они через весь зал с товарищами, видно было, что эти молодые люди не скучают и не томятся, как остальная публика, и что это зрелище вполне их удовлетворяет в ожидании другого.</p><p class="p1">– Черт побери, да это ты, Жан Фролло де Молендино! – крикнул один из них, увидав маленького белокурого бесенка с хорошеньким, плутовским личиком, повисшего на акантах капители. – Ну, недаром же тебя зовут Жаном Фролло Муленом<a href="ch2.xhtml#id61" class="a">[7]</a>. Твои руки и ноги и впрямь похожи на четыре крыла ветряной мельницы. Давно ты здесь?</p><p class="p1">– Да уж побольше четырех часов, – ответил Жан Фролло. – Надеюсь, они зачтутся мне, когда я попаду в чистилище. Я слышал, как восемь певчих сицилийского короля начали петь в семь часов раннюю обедню в капелле.</p><p class="p1">– Отличные певчие! Голоса их, пожалуй, еще пронзительнее их остроконечных колпаков. Только, прежде чем служить обедню святому Иоанну, королю следовало бы разузнать, нравятся ли святому Иоанну латинские псалмы с провансальским акцентом.</p><p class="p1">– И все это сделано для того, чтобы эти проклятые сицилийские певчие могли зашибить деньгу! – резко крикнула старуха, стоявшая в толпе под окном. – Подумать только! Тысячу ливров за одну обедню! Да еще из налога с продажи морской рыбы на парижских рынках!</p><p class="p1">– Помолчи, старуха! – сказал важный толстяк, стоявший возле рыбной торговки и зажимавший себе нос. – Нельзя было не отслужить обедни. Разве тебе хочется, чтобы король опять заболел?</p><p class="p1">– Ловко сказано, мэтр Жилль Лекорню, придворный меховщик! – закричал маленький студентик, прицепившийся к капители.</p><p class="p1">Все школяры громко захохотали, услыхав злосчастное имя придворного поставщика мехов.</p><p class="p1">– Лекорню! Жилль Лекорню!<a href="ch2.xhtml#id60" class="a">[8]</a> – кричали они.</p><p class="p1">– Cornutus et hirsutus!<a href="ch2.xhtml#id59" class="a">[9]</a> – прибавил кто-то.</p><p class="p1">– Ну, ясно, – продолжал маленький дьяволенок на капители. – И чему они смеются? Этот почтенный человек, Жилль Лекорню, – брат Жана Лекорню, смотрителя королевского дворца, сын Маги Лекорню, главного сторожа в Венсенском лесу. Все они парижские горожане, и все до одного женаты.</p><p class="p1">Хохот усилился. Толстый меховщик, не говоря ни слова, старался скрыться от устремленных на него со всех сторон глаз. Но тщетно пыхтел он и обливался потом: он торчал как клин, вбитый в дерево, и, сколько ни старался, только и мог, что спрятать за плечи соседей свое толстое, побагровевшее от досады и гнева лицо.</p><p class="p1">Наконец один из его соседей, такой же толстый, коренастый и почтенный, как он сам, пришел к нему на помощь.</p><p class="p1">– Безобразие! – воскликнул он. – Как смеют студенты так издеваться над горожанином! В мое время их высекли бы за это розгами, а потом сожгли бы на костре из этих самых розг.</p><p class="p1">Вся банда студентов накинулась на него:</p><p class="p1">– Эй! Кто это распевает там? Что это за зловещая сова?</p><p class="p1">– Постойте-ка, я знаю его! – воскликнул кто-то. – Это мэтр Андри Мюнье.</p><p class="p1">– Один из четырех присяжных книгопродавцов университета! – подхватил другой.</p><p class="p1">– В этой лавчонке всякого добра по четыре штуки! – крикнул третий. – Четыре нации, четыре факультета, четыре праздника, четыре попечителя, четыре избирателя и четыре книгопродавца.</p><p class="p1">– Ну, так мы четырежды наделаем им хлопот! – вскричал Жан Фролло.</p><p class="p1">– Мюнье, мы сожжем твои книги!</p><p class="p1">– Мюнье, мы поколотим твоего слугу!</p><p class="p1">– Мюнье, мы намнем бока твоей жене!</p><p class="p1">– Что за славная толстуха – эта госпожа Ударда!</p><p class="p1">– И притом так свежа и весела, как будто овдовела!</p><p class="p1">– Черт побери вас всех! – пробормотал Мюнье.</p><p class="p1">– Молчи, мэтр Андри, а не то я свалюсь тебе прямо на голову, – сказал Жан, все еще вися на своей капители.</p><p class="p1">Мэтр Андри поднял глаза, смерил высоту капители, определил приблизительную тяжесть Жана и, помножив ее в уме на квадрат скорости, замолчал.</p><p class="p1">– Так-то лучше, – злорадно проговорил Жан, торжествуя победу. – Я это сделал бы, хоть и прихожусь родным братом архидьякону.</p><p class="p1">– Что за жалкое начальство сидит у нас в университете! Они даже не подумали ознаменовать наши привилегии в такой день, как сегодня! В городе – праздник мая и иллюминация; здесь – мистерия, папа шутов и послы; у нас в университете – ничего!</p><p class="p1">– А между тем площадь Мобер, кажется, достаточно велика, – заметил один из студентов, сидевших на подоконнике.</p><p class="p1">– Долой ректора, избирателей и попечителей! – крикнул Жан.</p><p class="p1">– Устроим сегодня иллюминацию из книг мэтра Андри, – вторил ему другой.</p><p class="p1">– И из пюпитров писцов! – подхватил его сосед.</p><p class="p1">– И из жезлов надзирателей!</p><p class="p1">– И из плевательниц деканов!</p><p class="p1">– И из шкафов прокуроров!</p><p class="p1">– И из скамеек ректора!</p><p class="p1">– Долой! – зажужжал, как пчела, маленький Жан. – Долой мэтра Андри, надзирателей и писцов! Теологов, медиков и докторов богословия! Попечителя, избирателей и ректора!</p><p class="p1">– Настоящее светопреставление! – пробормотал Мюнье, затыкая уши.</p><p class="p1">– Вот, кстати, и ректор! Вот он пересекает площадь! – крикнул один из сидевших на окне.</p><p class="p1">Все устремили глаза на площадь.</p><p class="p1">– Неужели это в самом деле наш достопочтенный ректор, мэтр Тибо? – спросил Жан Фролло де Мулен; вися на капители, он не мог видеть площади.</p><p class="p1">– Да, да! – закричали ему. – Это он сам, мэтр Тибо, ректор!</p><p class="p1">И действительно, ректор и все университетские власти двигались процессией перед послами и в настоящую минуту пересекали Дворцовую площадь. Сидевшие на окне студенты встретили их саркастическими выкриками и насмешливыми рукоплесканиями. Ректору, ехавшему впереди, достался первый оглушительный залп.</p><p class="p1">– Здравствуйте, господин ректор! Эй! Да здравствуйте же!</p><p class="p1">– Как он попал сюда, этот старый игрок? Как он решился расстаться с игральными костями?</p><p class="p1">– Смотрите, как он подпрыгивает на муле. А ведь, право же, у мула уши короче, чем у него самого!</p><p class="p1">– Здравствуйте, господин ректор Тибо! Tybalde aleator<a href="ch2.xhtml#id127" class="a">[10]</a>. Старый дуралей! Старый игрок!</p><p class="p1">– Много ли раз выбросили вы двойную шестерку сегодня ночью?</p><p class="p1">– Что за отвратительная рожа – бледная, испитая, помятая! А все страсть к азартной игре!</p><p class="p1">– Куда это вы едете, Тибо, Tybalde ad dados? Повернувшись спиной к университету, а лицом к городу?</p><p class="p1">– Он, наверное, едет искать квартиру в улице Тиботодэ!<a href="ch2.xhtml#id126" class="a">[11]</a> – крикнул Жан де Мулен.</p><p class="p1">Вся компания с ревом повторила его остроту и неистово захлопала в ладоши.</p><p class="p1">– Вы, значит, хотите поселиться в улице Тиботодэ, ведь так, господин ректор, чертов игрок?</p><p class="p1">Потом наступила очередь других сановников университета.</p><p class="p1">– Долой надзирателей! Долой жезлоносцев!</p><p class="p1">– А это что за птица? Не знаешь ли ты, Робен Пуспен, кто это?</p><p class="p1">– Это Жильбер де Сюильи, Gilbertus de Soliaco, канцлер Отенской коллегии.</p><p class="p1">– Постой, вот мой башмак. Тебе ловчее, брось-ка его ему в физиономию!</p><p class="p1">– Saturnialitias mittimus ecce nuces<a href="ch2.xhtml#id125" class="a">[12]</a>.</p><p class="p1">– Долой шестерых богословов с их белыми стихарями!</p><p class="p1">– Так это-то богословы? А я думал, что это шесть белых гусей, которых святая Женевьева пожертвовала городу.</p><p class="p1">– Долой медиков!</p><p class="p1">– Долой диспуты на заданный и выбранный по желанию тезис!</p><p class="p1">– А! Вот канцлер святой Женевьевы, швырну-ка в него своей шапкой! Немало он мне насолил! Он отдал мое место у нормандцев маленькому Асканию Фальзаспада из Буржской провинции, потому что он итальянец.</p><p class="p1">– Это несправедливо! – закричали все студенты. – Долой канцлера святой Женевьевы!</p><p class="p1">– Эй! Иоахимде Ладегор! Э-гей! Луи Дагюиль! Э-гей! Ламбер-Гоктеман!</p><p class="p1">– Ко всем чертям покровителя германской нации!</p><p class="p1">– И капелланов капеллы с их серым меховым облачением! Cum tunicis grisis<a href="ch2.xhtml#id124" class="a">[13]</a>.</p><p class="p1">– Seu de pellibus grisis furratis<a href="ch2.xhtml#id123" class="a">[14]</a>.</p><p class="p1">– Ого! Профессора университета! Все красивые черные мантии! Все красивые красные мантии!</p><p class="p1">– У ректора получился недурной хвост.</p><p class="p1">– Право же, можно подумать, что это венецианский дож идет обручаться с морем!</p><p class="p1">– Смотри-ка, Жан! Каноники Святой Женевьевы!</p><p class="p1">– К черту каноников!</p><p class="p1">– Аббат Клод Шоар! Доктор Клод Шоар! Вы, должно быть, ищете Мари Жиффар?</p><p class="p1">– Она живет на улице Глатиньи!</p><p class="p1">– Она греет постель королю распутников!</p><p class="p1">– Она выплачивает свои четыре денье – quatuor denarios.</p><p class="p1">– Aut unum bombum<a href="ch2.xhtml#id121" class="a">[15]</a>.</p><p class="p1">– Вы хотите, чтобы она дала вам по носу?</p><p class="p1">– Смотрите! Это едет Симон Сангэн, избиратель из Пикардии, а сзади сидит его жена.</p><p class="p1">– Post equitem sedet atra cura<a href="ch2.xhtml#id119" class="a">[16]</a>.</p><p class="p1">– Смелее, мэтр Симон!</p><p class="p1">– Доброго утра, господин избиратель!</p><p class="p1">– Спокойной ночи, госпожа избирательница!</p><p class="p1">– Какие счастливцы – им видно все! – со вздохом проговорил Жан де Мулен, все еще цепляясь за завитки своей капители.</p><p class="p1">Между тем книгопродавец университета Андри Мюнье нагнулся к уху королевского меховщика Жилля Лекорню.</p><p class="p1">– Ну, право же, сударь, пришел конец света! – сказал он. – Никогда еще не видано было такой распущенности студентов. А всему виной эти проклятые новые изобретения – пушки, кулеврины, бомбарды, а в особенности книгопечатание – еще одна немецкая язва! Не будет больше ни рукописных сочинений, ни книг. Да, книгопечатание убивает книжную торговлю. Пришел конец мира!</p><p class="p1">– Верно, верно! Это видно уж по тому, как бойко стал расходиться бархат, – заметил меховщик.</p><p class="p1">В эту минуту пробило двенадцать.</p><p class="p1">– А! – в один голос воскликнула вся толпа.</p><p class="p1">Студенты замолчали; в зале поднялась страшная суматоха. Головы задвигались, ноги зашаркали, люди начали оглушительно кашлять и сморкаться; каждый старался устроиться поудобнее; затем наступила глубокая тишина. Все шеи вытянулись, все рты открылись, все глаза устремились к мраморной площадке. Но там не было никого. Только четыре сержанта, вытянувшись в струнку, продолжали стоять неподвижно, как раскрашенные статуи. Все взгляды обратились к эстраде, приготовленной для посольства; дверь была затворена, и эстрада пуста. Вся эта толпа ждала с самого утра, полдня, посольства и мистерии. Но лишь один полдень настал вовремя.</p><p class="p1">Это было уж слишком.</p><p class="p1">Подождали одну, две, три, пять минут, четверть часа – представление не начиналось. Эстрада оставалась по-прежнему пустой, сцена – немой. Нетерпение начало сменяться гневом. Послышались недовольные возгласы – правда, еще негромкие – и сдержанный гул голосов: «Мистерию! Мистерию!» Возбуждение росло. Буря, пока еще вызывавшая лишь ропот, готова была разразиться каждую минуту. Первая искра вспыхнула благодаря Жану де Мулену.</p><p class="p1">– Мистерию, и к черту фламандцев! – крикнул он во всю силу своих легких, обвившись, как змея, вокруг капители.</p><p class="p1">Толпа захлопала в ладоши.</p><p class="p1">– Мистерию! – заревела она. – Ко всем чертям Фландрию!</p><p class="p1">– Начинайте мистерию, и сию же минуту! – продолжал студент. – А не то мы взамен представления повесим судью!</p><p class="p1">– Верно, верно! – подхватила толпа. – А для начала повесим его сержантов.</p><p class="p1">Поднялся страшный шум и крики. Несчастные сержанты побледнели и переглянулись. Толпа надвигалась на них, того и гляди рухнет легкая деревянная балюстрада, отделяющая их от зрителей.</p><p class="p1">Минута была критическая.</p><p class="p1">– Вздернуть их! Вздернуть! – кричали со всех сторон. Вдруг ковер, закрывавший вход в одевальную, откинулся, и показался человек, один вид которого усмирил толпу и, словно по волшебству, превратил ее гнев в любопытство.</p><p class="p1">– Тише! Тише! – раздались отовсюду голоса.</p><p class="p1">Вошедший неуверенно и боязливо шел по площадке, ежеминутно кланяясь. И чем ближе он подходил к краю, тем ниже становились его поклоны и тем больше были они похожи на коленопреклонение.</p><p class="p1">Между тем шум мало-помалу затих. Остался только тот легкий гул, который всегда стоит над замолчавшей толпой.</p><p class="p1">– Господа горожане и госпожи горожанки! – сказал вошедший. – Мы будем иметь честь представлять и декламировать перед его преосвященством господином кардиналом прекрасную моралите, под названием «Премудрый суд Пресвятой Девы Марии». Я буду играть Юпитера. Его преосвященство сопровождает в настоящую минуту достопочтенное посольство герцога Австрийского, которое несколько замешкалось, слушая приветственную речь господина ректора университета у ворот Бодэ. Как только прибудет его преосвященство господин кардинал, мы тотчас же начнем представление.</p><p class="p1">Только вмешательство самого Юпитера и могло спасти четырех судейских сержантов. Если бы мы сами выдумали эту правдивую историю и были ответственны за нее перед судом почтеннейшей критики, то против нас нельзя было бы выставить классическое правило «Nec deus intersit»<a href="ch2.xhtml#id117" class="a">[17]</a>. Кроме того, костюм Юпитера был очень красив и немало способствовал успокоению толпы, так как привлек всеобщее внимание. Юпитер был в латах, обтянутых черным бархатом, прикрепленным золотыми гвоздиками; на голове его была шапочка, украшенная серебряными вызолоченными шишечками. И если бы толстый слой румян не покрывал верхней части его лица, а густая рыжая борода не закрывала нижней; если бы он не держал в руках позолоченной картонной трубки, усеянной блестками и мишурой, в которой опытный глаз сейчас же узнал бы молнию; если б не его ноги, обтянутые телесным трико и перевитые на греческий манер лентами, – то он строгостью своей осанки мог бы поспорить с любым бретонским стрелком из отряда герцога Беррийского.</p></span></span></span>
