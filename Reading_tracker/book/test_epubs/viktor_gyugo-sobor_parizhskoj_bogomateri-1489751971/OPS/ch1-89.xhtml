<p class="p">6. Мышь на допросе у котов</p>
</div><p class="p1">Урсусу пришлось пережить еще одну тревогу, и достаточно страшную. На этот раз дело касалось непосредственно его. Он получил предложение явиться в Бишопсгейт, в комиссию, состоящую из трех пренеприятных лиц. Это были доктора, официальные блюстители порядка: один был доктор богословия, представитель вестминстерского декана; другой – доктор медицины, представитель Коллегии восьмидесяти, третий – доктор истории и гражданского права, представитель Грешемской коллегии. На этих трех экспертов in omni re scibili<a href="ch2.xhtml#id31" class="a">[207]</a> был возложен надзор за всеми речами, произносимыми публично на всей территории ста тридцати приходов Лондона, семидесяти трех приходов Миддлсекского графства, а заодно уж и пяти саутворкских. Эти богословские судилища существуют в Англии еще и поныне и беспощадно расправляются с провинившимися. 23 декабря 1868 года решением Арчского суда, получившим утверждение тайного совета лордов, преподобный Маконочи был приговорен к порицанию и возмещению судебных издержек за то, что зажег свечи на простом столе. Литургия шутить не любит.</p><p class="p1">Итак, в один прекрасный день Урсус получил от трех ученых докторов письменный вызов в суд, который, к счастью, был вручен ему лично, так что он мог сохранить дело в тайне. Не говоря никому ни слова, он отправился по этому вызову, трепеща при мысли, что в его поведении что-то могло подать повод заподозрить его, Урсуса, в какой-то дерзости. Для него, столько раз советовавшего другим помалкивать, это было жестоким уроком. Garrule, sana te ipsum<a href="ch2.xhtml#id30" class="a">[208]</a>.</p><p class="p1">Три доктора – три официальных блюстителя законов – заседали в Бишопсгейте, в глубине зала первого этажа, в трех черных кожаных креслах. Над их головами стояли бюсты Миноса, Эака и Радаманта, перед ними – стол, в ногах – скамейка.</p><p class="p1">Войдя в зал в сопровождении степенного и строгого пристава и увидав ученых мужей, Урсус сразу же мысленно окрестил каждого из них именем того страшного судьи подземного царства, чье изображение красовалось у него над головой.</p><p class="p1">Первый из трех, Минос, официальный представитель богословия, знаком велел ему сесть на скамейку.</p><p class="p1">Урсус поклонился учтиво, то есть до земли, и, зная, что медведя можно задобрить медом, а доктора – латынью, произнес, почти не разгибая спины – из уважения к присутствующим:</p><p class="p1">– Tres faciunt capitulum<a href="ch2.xhtml#id29" class="a">[209]</a>.</p><p class="p1">И с опущенной головой (смирение обезоруживает) сел на скамейку.</p><p class="p1">Перед каждым из трех докторов лежала на столе папка с бумагами, которые они перелистывали.</p><p class="p1">Допрос начал Минос:</p><p class="p1">– Вы выступаете публично?</p><p class="p1">– Да, – ответил Урсус.</p><p class="p1">– По какому праву?</p><p class="p1">– Я – философ.</p><p class="p1">– Это еще не дает вам права.</p><p class="p1">– Кроме того, я – скоморох, – сказал Урсус.</p><p class="p1">– Это другое дело.</p><p class="p1">Урсус вздохнул с облегчением, но еле слышно. Минос продолжал:</p><p class="p1">– Как скоморох вы можете говорить, но как философ вы должны молчать.</p><p class="p1">– Постараюсь, – сказал Урсус.</p><p class="p1">И подумал: «Я могу говорить, но должен молчать. Сложная задача».</p><p class="p1">Он был сильно напуган.</p><p class="p1">Представитель богословия продолжал:</p><p class="p1">– Вы высказываете неблагонамеренные суждения. Вы оскорбляете религию. Вы отрицаете самые очевидные истины. Вы распространяете возмутительные заблуждения. Например, вы говорили, что девственность исключает материнство.</p><p class="p1">Урсус кротко поднял глаза:</p><p class="p1">– Я не говорил этого. Я только сказал, что материнство исключает девственность.</p><p class="p1">Минос задумался и пробормотал:</p><p class="p1">– В самом деле, это нечто прямо противоположное.</p><p class="p1">Это было одно и то же. Но первый удар был отражен.</p><p class="p1">Размышляя над ответом Урсуса, Минос погрузился в бездну собственного тупоумия, вследствие чего наступило молчание.</p><p class="p1">Официальный представитель истории, тот, которого Урсус мысленно назвал Радамантом, постарался прикрыть поражение Миноса, обратившись к Урсусу со следующими словами:</p><p class="p1">– Обвиняемый, всех ваших дерзостей и заблуждений не перечислить. Вы отрицали тот факт, что Фарсальская битва была проиграна потому, что Брут и Кассий встретили по дороге негра.</p><p class="p1">– Я говорил, – пролепетал Урсус, – что это объясняется также тем, что Цезарь был более талантливым полководцем.</p><p class="p1">Представитель истории сразу перешел к мифологии:</p><p class="p1">– Вы оправдывали низости Актеона.</p><p class="p1">– Я полагаю, – осторожно возразил Урсус, – что увидеть обнаженную женщину не позор для мужчины.</p><p class="p1">– И вы заблуждаетесь, – строго заметил судья.</p><p class="p1">Радамант опять вернулся к истории:</p><p class="p1">– В связи с несчастьями, постигшими конницу Митридата, вы оспаривали всеми признанные свойства некоторых трав и растений. Вы утверждали, что от травы securiduca у лошадей не могут отвалиться подковы.</p><p class="p1">– Простите, – ответил Урсус, – я только говорил, что подобным свойством обладает лишь трава sferra-cavallo. Я не отрицаю достоинств ни в одном растении.</p><p class="p1">И вполголоса прибавил:</p><p class="p1">– И ни в одной женщине.</p><p class="p1">Последними словами Урсус хотел доказать самому себе, что, невзирая на свою тревогу, он не обезоружен. Несмотря на владевший им страх, Урсус не терял присутствия духа.</p><p class="p1">– Я настаиваю на этом, – продолжал Радамант. – Вы заявили, что Сципион поступил глупо, когда, желая отворить ворота Карфагена, он прибегнул к траве Aethlopis, ибо, по вашему мнению, трава Aethlopis не обладает способностью взламывать замки.</p><p class="p1">– Я просто сказал, что он поступил бы лучше, если бы воспользовался травой Lunaria.</p><p class="p1">– Ну, это еще вопрос, – пробормотал Радамант, задетый в свою очередь.</p><p class="p1">И представитель истории умолк.</p><p class="p1">Представитель богословия Минос, придя в себя, снова стал допрашивать Урсуса. За это время он успел просмотреть тетрадь с заметками.</p><p class="p1">– Вы отнесли аурипигмент к мышьяковым соединениям и говорили, что аурипигмент может служить отравой. Библия отрицает это.</p><p class="p1">– Библия отрицает, – со вздохом возразил Урсус, – зато мышьяк доказывает.</p><p class="p1">Особа, которую Урсус мысленно называл Эаком и которая в качестве официального представителя медицины не проронила до сих пор ни слова, теперь вмешалась в разговор и, надменно полузакрыв глаза, с высоты своего величия поддержала Урсуса. Она изрекла:</p><p class="p1">– Ответ не глуп.</p><p class="p1">Урсус поблагодарил Эака самой льстивой улыбкой, на какую только был способен.</p><p class="p1">Минос сделал страшную гримасу.</p><p class="p1">– Продолжаю, – сказал он. – Отвечайте. Вы говорили, что неправда, будто василиск царствует над змеями под именем Кокатрикса.</p><p class="p1">– Ваше высокопреподобие, – промолвил Урсус, – я нисколько не хотел умалить славы василиска и даже утверждал, как нечто, не подлежащее сомнению, что у него человеческая голова.</p><p class="p1">– Допустим, – сурово возразил Минос, – но вы прибавили, что Пэрий видел одного василиска с головою сокола. Можете вы доказать это?</p><p class="p1">– С трудом, – ответил Урсус.</p><p class="p1">Здесь он почувствовал, что теряет почву под ногами.</p><p class="p1">Минос, воспользовавшись его замешательством, продолжал:</p><p class="p1">– Вы говорили, что еврей, перешедший в христианство, дурно пахнет.</p><p class="p1">– Но я прибавил, что христианин, перешедший в иудейство, издает зловоние.</p><p class="p1">Минос бросил взгляд на тетрадь с обличительными записями.</p><p class="p1">– Вы распространяете самые вздорные бредни. Вы говорили, будто Элиан видел, как слон писал притчи.</p><p class="p1">– Нет, ваше высокопреподобие. Я просто сказал, что Оппиан слышал, как гиппопотам обсуждал философскую проблему.</p><p class="p1">– Вы заявили, что на блюде из букового дерева не могут сами собой появиться любые яства.</p><p class="p1">– Я сказал, что таким свойством может обладать лишь блюдо, подаренное вам дьяволом.</p><p class="p1">– Подаренное мне?!</p><p class="p1">– Нет, мне, ваше преподобие! Нет, никому! Я хотел сказать: всем!</p><p class="p1">И про себя Урсус подумал: «Я и сам уж не знаю, что говорю». Но, несмотря на то, что он сильно волновался, он почти ничем не выдавал своего волнения. Он продолжал бороться.</p><p class="p1">– Все это, – возразил Минос, – отчасти предполагает веру в дьявола.</p><p class="p1">Урсус не смутился.</p><p class="p1">– Ваше высокопреподобие, я верю в дьявола. Вера в дьявола – оборотная сторона веры в Бога. Одна доказывает наличие другой. Кто хоть немного не верит в черта, не слишком верит и в Бога. Кто верит в солнце, должен верить и в тень. Дьявол – это ночь Господня. Что такое ночь? Доказательство существования дня.</p><p class="p1">Урсус импровизировал, преподнося своим судьям непостижимую смесь философии с религией. Минос снова задумался и еще раз погрузился в молчание.</p><p class="p1">Урсус опять вздохнул с облегчением.</p><p class="p1">И вдруг он подвергся неожиданной атаке. Эак, официальный представитель медицины, только что высокомерно защитивший его от богослова, внезапно из союзника превратился в нападающего. Положив кулак на внушительный ворох испещренных записями бумаг, он сразил Урсуса в упор:</p><p class="p1">– Доказано, что хрусталь – результат естественной возгонки льда, и алмаз – результат такой же возгонки хрусталя; установлено, что лед становится хрусталем через тысячу лет, а хрусталь становится алмазом через тысячу веков. Вы это отрицали.</p><p class="p1">– Нет, – меланхолически возразил Урсус. – Я только говорил, что за тысячу лет лед может растаять и что тысячу веков не так-то легко счесть.</p><p class="p1">Допрос продолжался; вопросы и ответы звучали как сабельные удары.</p><p class="p1">– Вы отрицали, что растения могут говорить.</p><p class="p1">– Ничуть. Но для этого нужно, чтобы они росли под виселицей.</p><p class="p1">– Признаете вы, что мандрагора кричит?</p><p class="p1">– Нет, но она поет.</p><p class="p1">– Вы отрицали, что безымянный палец левой руки обладает свойством исцелять сердечные болезни?</p><p class="p1">– Я только сказал, что чихнуть налево – дурная примета.</p><p class="p1">– Вы дерзко и оскорбительно отзывались о фениксе.</p><p class="p1">– Ученейший судья, я всего-навсего говорил, что, утверждая, будто мозг феникса – вкусное блюдо, вызывающее, однако, головную боль, Плутарх зашел слишком далеко, так как феникса никогда не существовало.</p><p class="p1">– Возмутительные речи. Каннамалка, который вьет себе гнездо из палочек корицы, дубоноса, из которого Паризатида изготовляла свои отравы, манукодиату, которая не что иное, как райская птица, и семенду с тройным клювом ошибочно принимали за феникса; но феникс существовал.</p><p class="p1">– Я не возражаю.</p><p class="p1">– Вы осел.</p><p class="p1">– Вполне этим удовлетворен.</p><p class="p1">– Вы признали, что бузина излечивает грудную жабу, но вы прибавили, что это происходит вовсе не потому, что у нее на корне есть волшебный нарост.</p><p class="p1">– Я объяснял целебные свойства бузины тем, что на ней повесился Иуда.</p><p class="p1">– Суждение, близкое к истине, – пробормотал Минос, довольный тем, что может в свою очередь подпустить шпильку медику Эаку.</p><p class="p1">Задетое высокомерие сразу переходит в гнев. Эак пришел в ярость:</p><p class="p1">– Бродяга, ваш ум блуждает так же, как и ваши ноги. У вас подозрительные и странные наклонности. Вы занимаетесь чем-то близким к чародейству. Вы состоите в сношениях с неведомыми зверями. Вы говорите простонародью о вещах, существующих лишь в вашем воображении и природа которых никому не известна, например, о гемороусе.</p><p class="p1">– Гемороус – гадюка, которую видел Тремеллий.</p><p class="p1">Этот ответ поверг свирепого доктора Эака в некоторое замешательство.</p><p class="p1">Урсус прибавил:</p><p class="p1">– В существовании гемороуса так же не может быть сомнений, как в существовании пахучей гиены или циветты, описанной Кастеллом.</p><p class="p1">Эак вышел из затруднения, выпустив решительный заряд:</p><p class="p1">– Вот ваши подлинные, поистине дьявольские слова. Слушайте.</p><p class="p1">Заглянув в свои записи, Эак прочел:</p><p class="p1">– «Два растения, фалагсигль и аглафотис, светятся с наступлением темноты. Днем они цветы, ночью – звезды».</p><p class="p1">Он пристально посмотрел на Урсуса.</p><p class="p1">– Что вы можете сказать в свое оправдание?</p><p class="p1">Урсус ответил:</p><p class="p1">– Каждое растение – лампада. Его благоухание – свет.</p><p class="p1">Эак перелистал несколько страниц.</p><p class="p1">– Вы отрицали, что железы выдры выделяют жидкость, тождественную бобровой струе.</p><p class="p1">– Я ограничился замечанием, что, быть может, в этом вопросе не следует доверять Аэцию.</p><p class="p1">Эак рассвирепел.</p><p class="p1">– Вы занимаетесь медицинской практикой?</p><p class="p1">– Я практикую в этой области, робко вздохнул Урсус.</p><p class="p1">– На живых людях?</p><p class="p1">– Предпочитаю на живых, нежели на покойниках, сказал Урсус.</p><p class="p1">Урсус отвечал серьезно и вместе с тем заискивающе; в этом удивительном сочетании двух интонаций преобладала вкрадчивость. Он говорил с такой кротостью, что Эак почувствовал потребность оскорбить его.</p><p class="p1">– Что вы там воркуете? – грубо сказал он.</p><p class="p1">Урсус растерялся и ограничился тем, что ответил:</p><p class="p1">– Воркуют молодые люди, старики же только кряхтят. Увы, я могу лишь кряхтеть.</p><p class="p1">Эак продолжал:</p><p class="p1">– Предупреждаю вас: если вы возьметесь лечить больного и он умрет, вы будете казнены.</p><p class="p1">Урсус отважился задать вопрос:</p><p class="p1">– А если он выздоровеет?</p><p class="p1">– В таком случае, – ответил доктор более мягким тоном, – вы также будете казнены.</p><p class="p1">– Невелика разница, – заметил Урсус.</p><p class="p1">Доктор продолжал:</p><p class="p1">– В случае смерти больного карается невежество, в случае выздоровления – дерзость. В обоих случаях вас ждет виселица.</p><p class="p1">– Я не знал этой подробности, – пролепетал Урсус. – Благодарю вас за разъяснение. Ведь не всякому известны все тонкости нашего замечательного законодательства.</p><p class="p1">– Берегитесь!</p><p class="p1">– Буду свято беречься, – промолвил Урсус.</p><p class="p1">– Мы знаем, чем вы занимаетесь.</p><p class="p1">«А я, – подумал Урсус, – знаю это не всегда».</p><p class="p1">– Мы могли бы отправить вас в тюрьму.</p><p class="p1">– Я вижу, милостивейшие государи.</p><p class="p1">– Вы не в состоянии отрицать ваши проступки и своевольные действия.</p><p class="p1">– Как философ, прошу прощения.</p><p class="p1">– Вам приписывают целый ряд дерзких суждений.</p><p class="p1">– Это страшная ошибка.</p><p class="p1">– Говорят, что вы излечиваете больных.</p><p class="p1">– Я – жертва клеветы.</p><p class="p1">Три пары бровей, устрашающе направленных на Урсуса, нахмурились; три ученые физиономии наклонились одна к другой; послышался шепот. Урсусу померещилось, будто над тремя головами трех официальных представителей науки высится один дурацкий колпак; многозначительно-таинственное бормотание этой троицы длилось несколько минут, в течение которых его от ужаса бросало то в жар, то в холод; наконец Минос, председатель, повернулся к нему и с бешенством прошипел:</p><p class="p1">– Убирайтесь вон!</p><p class="p1">Урсус почувствовал приблизительно то же, что чувствовал Иона, когда кит извергнул его из своего чрева.</p><p class="p1">Минос продолжал:</p><p class="p1">– На этот раз вас отпускают.</p><p class="p1">Урсус подумал: «Уж больше я им не попадусь! Прощай, медицина!»</p><p class="p1">И прибавил в глубине души: «Отныне я предоставлю больным полную свободу околевать».</p><p class="p1">Согнувшись в три погибели, он отвесил поклоны во все стороны: докторам, бюстам, столу, стенам, и, пятясь, отступил к дверям, чтобы исчезнуть, подобно рассеявшейся тени.</p><p class="p1">Он вышел из зала медленно, как человек с чистой совестью, но очутившись на улице, кинулся бежать опрометью, как преступник. При ближайшем знакомстве представители правосудия производят столь страшное и непонятное впечатление, что, даже будучи оправданным, человек норовит поскорее унести ноги.</p><p class="p1">Убегая, Урсус ворчал себе под нос:</p><p class="p1">– Я дешево отделался. Я – ученый дикий, они – ученые ручные. Доктора преследуют настоящих ученых. Ложная наука – отброс науки подлинной, и ею пользуются для того, чтобы губить философов. Философы, создавая софистов, сами роют себе яму. На помете певчего дрозда вырастает омела, выделяющая клей, при помощи которого ловят дроздов. Turdus sibi malum cacat<a href="ch2.xhtml#id8" class="a">[210]</a>.</p><p class="p1">Мы не хотим изобразить Урсуса чрезмерно щепетильным. Он имел дерзость употреблять выражения, вполне передававшие его мысль. В этом отношении он стеснялся не более, чем Вольтер.</p><p class="p1">Вернувшись в «Зеленый ящик», Урсус объяснил дядюшке Никлсу свое опоздание тем, что ему попалась на улице какая-то хорошенькая женщина; ни словом не обмолвился он о своем приключении.</p><p class="p1">Только вечером он шепнул на ухо Гомо:</p><p class="p1">– Знай: я одержал победу над трехголовым псом Цербером.</p></span></span></span></span>
