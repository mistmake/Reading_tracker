<span><span><span id="id86"><div class="title6">
<p class="p">Часть вторая</p>
<p class="p">Урка в море</p>
</div><span id="id87"><div class="title6">
<p class="p">1. Законы, не зависящие от человеческой воли</p>
</div><p class="p1">Снежная буря на море – одно из наименее исследованных явлений. Она во всех отношениях должна быть признана самым темным метеорологическим феноменом. Это соединение тумана со штормом, которое и в наше время еще не вполне изучено, вызывает множество бедствий.</p><p class="p1">Причиною снежной бури считают ветер и волны. Но ведь в воздухе есть какая-то сила, отличная от ветра, а в воде – сила, отличная от волны. Сила эта, одна и та же и в воздухе и в воде, есть ток. Воздух и вода – две текучих массы, почти тождественные и проникающие одна в другую путем сгущения или разрежения; поэтому дышать – то же самое, что пить. Но только ток по-настоящему текуч. Ветер и волна – это толчки, ток же есть истечение. Ветер становится зримым благодаря облакам, волна – благодаря пене, ток же невидим. Тем не менее время от времени он дает знать о себе: «я здесь». Это «я здесь» – удар грома.</p><p class="p1">Снежная буря представляется такой же загадкой, как и сухой туман. Если удастся когда-либо пролить свет на сущность явления, именуемого испанцами callina, а эфиопами quobar, то это, конечно, окажется возможным только при условии внимательного наблюдения над свойствами магнитных токов.</p><p class="p1">Без этого множество фактов останется для нас загадкой. Например, изменением скорости ветра, обычно пробегающего три фута, а в бурю – двести двадцать футов в секунду, объясняется изменение высоты волны, подымающейся с трех дюймов при тихой погоде до тридцати шести футов в шторм. Или, например, горизонтальное направление ветра даже при шторме объясняет, каким образом вал в тридцать футов высотою может простираться в длину на полторы тысячи футов. Но почему волны Тихого океана в четыре раза выше у берегов Америки, чем у берегов Азии, то есть выше на западе, чем на востоке? Почему в Атлантическом океане мы наблюдаем обратное явление? Почему уровень воды в океане выше всего на экваторе? Чем вызывается изменение высоты волн океана в различных широтах? Все эти явления объясняются только влиянием магнитных токов в связи с вращением земли и притяжением небесных светил.</p><p class="p1">Не в этом ли таинственном сочетании различных сил следует искать причину внезапных перемен в направлении ветра, идущего, например, через запад от юго-востока к северо-востоку, затем внезапно поворачивающего обратно и возвращающегося назад тем же путем от северо-востока на юго-восток, – таким образом за тридцать шесть часов он описывает на огромном пространстве две дуги общей сложностью в пятьсот шестьдесят градусов, как это имело место перед снежной бурей 17 марта 1867 года.</p><p class="p1">В Австралии во время бури волны достигают восьмидесяти футов в высоту; это происходит от близости магнитного полюса. Штормы в этих широтах вызываются не столько перемещением воздушных слоев, сколько продолжительностью подводных электрических разрядов; в 1866 году работа трансатлантического кабеля каждые сутки регулярно нарушалась в продолжение двух часов, с двенадцати до двух часов пополудни, – приступы своеобразной перемежающейся лихорадки. Сложение и разложение некоторых сил имеют своим последствием определенные явления; моряк, желающий избегнуть кораблекрушения, должен непременно принимать их в расчет.</p><p class="p1">В тот день, когда искусство кораблевождения, продолжающее еще руководствоваться рутинными представлениями о природе, станет наукой, точной как математика; когда начнут доискиваться, почему, например, в наших широтах теплые ветры дуют иногда с севера, а холодные – с юга; когда поймут, что понижение температуры воды прямо пропорционально глубине океана; когда для всех станет очевидным, что земной шар – огромный, поляризованный в бесконечном пространстве магнит с двумя осями – осью вращения и осью магнитной, пересекающимися в центре земли, и что магнитные полюсы вращаются вокруг полюсов географических; когда люди, рискующие своей жизнью, согласятся рисковать ею лишь во всеоружии научных знаний; когда неустойчивая стихия, с которой приходится иметь дело мореплавателям, будет достаточно изучена; когда капитан будет метеорологом, а лоцман – химиком, – только тогда явится возможность избегнуть многих катастроф. Море в такой же мере стихия магнитная, как и водная; целый океан неведомых сил зыблется в океане воды, иначе сказать – плывет по течению. Видеть в море одну лишь массу воды – значит совсем не видеть моря; в море происходит непрерывное движение токов точно так же, как непрерывное чередование приливов и отливов; законы притяжения имеют для него, быть может, большее значение, чем ураганы; молекулярное сцепление, выражающееся, помимо ряда других явлений, капиллярным притяжением, неуловимое для невооруженного глаза, в океане приобретает грандиозные размеры, зависящие от его огромных пространств, и волны магнитные то усиливают движение воздушных и морских волн, то противодействуют им. Кто не знает законов электричества, тому неизвестны и тесно связанные с ними законы гидравлики. Правда, нет области знания более трудной и менее разработанной: наука эта имеет столь же близкое отношение к данным опыта, как астрономия – к астрологии. Однако без этой науки немыслимо кораблевождение.</p><p class="p1">А теперь перейдем к нашему повествованию.</p><p class="p1">Одно из самых страшных явлений на море – снежная буря. Она в значительной мере вызывается магнитными токами. Подобно северному сиянию, она есть порождение полюса; во мгле снежной бури и в блеске северного сияния – все тот же полюс; и в снежных хлопьях, как и в голубоватых сполохах, очевидно присутствие магнитных токов.</p><p class="p1">Снежные бури – это нервные припадки и приступы горячки у моря. У моря тоже есть свои мигрени. Бури можно сравнить с болезнями. Одни из них смертельны, другие – нет; от одной болезни выздоравливают, от другой – умирают. Снежная буря считается смертельным бедствием. Один из лоцманов Магеллана, Харабиха, называл ее «тучей, вышедшей из левого бока дьявола» (una nube sali da del malo lado del diabolo).</p><p class="p1">Сюркуф говорил: «Такая буря точно холера».</p><p class="p1">В старину испанские мореплаватели называли бурю la nevada, когда падали снежные хлопья, и la helada, когда шел град. По их словам, вместе со снегом падали с неба и летучие мыши.</p><p class="p1">Снежные бури – явление обычное в полярном поясе. Однако они иногда доходят и до наших широт, вернее, обрушиваются на них – так велики причиняемые ими бедствия.</p><p class="p1">Как мы уже видели, «Матутина», покинув Портленд, с решимостью устремилась навстречу всем опасностям ночи, еще возросшим благодаря надвигавшейся буре. С трагической смелостью кинула она вызов уже возникшей перед ней угрозе. Но, повторяем, она была достаточно предупреждена об этом.</p></span><span id="id88"><div class="title6">
<p class="p">2. Обрисовка первых силуэтов</p>
</div><p class="p1">Пока урка находилась еще в Портлендском заливе, море было довольно спокойно; волнения почти не чувствовалось. Океан, правда, потемнел, но на небе было еще светло. Ветер чуть надувал паруса. Урка старалась держаться возможно ближе к утесу, служившему для нее прекрасным заслоном.</p><p class="p1">Их было десять на бискайском суденышке: три человека экипажа и семь пассажиров, в том числе две женщины. В открытом море сумерки всегда светлее, чем на берегу; теперь можно было ясно различить всех, находившихся на борту судна. К тому же им не было уже надобности ни прятаться, ни стесняться; все держали себя непринужденно, говорили громко, не закрывали лиц; отплыв от берега, беглецы вздохнули свободно.</p><p class="p1">Эта горсточка людей поражала своей пестротой. Женщины были неопределенного возраста: бродячая жизнь преждевременно старит, а нужда налагает на лица ранние морщины. Одна женщина была баскийка, другая, с крупными четками, – ирландка. У обеих был безучастный вид, свойственный обычно беднякам. Очутившись на палубе, они сразу уселись рядышком на сундуках у мачты. Они беседовали: ирландский и баскский языки, как мы уже говорили, родственны между собой. У баскийки волосы пахли луком и базиликом. Хозяин урки был баск из Гипускоа, один из матросов – тоже баск, уроженец северного склона Пиренеев, а другой – южного, то есть принадлежал к той же национальности, хотя первый был французом, а второй испанцем. Баски не признают официального подданства. «Mi madre se llama montana» («мою мать зовут гора»), – говаривал погонщик мулов Салареус. Из пяти мужчин, ехавших вместе с женщинами, один был француз из Лангедока, другой – француз-провансалец, третий – генуэзец, четвертый, старик, носивший сомбреро без отверстия в полях для трубки, – по-видимому, немец; пятый, главарь, был баск из Бискароссы, житель каменистых пустошей. Это он в ту минуту, когда ребенок уже собирался подняться на урку, сбросил мостик в море. Этот крепко сложенный человек, отличавшийся порывистыми, быстрыми движениями и одетый, как уже было упомянуто, в лохмотья, расшитые галунами и блестками, не мог усидеть на месте; он то нагибался, то выпрямлялся, то переходил с одного конца палубы на другой, как будто его тревожило и то, что он только что сделал, и то, что должно было сейчас произойти.</p><p class="p1">Главарь шайки, хозяин корабля и двое матросов, все четверо баски, говорили то на баскском языке, то по-испански, то по-французски: эти три языка одинаково распространены на обоих склонах Пиренеев. Впрочем, все, за исключением женщин, объяснялись немного на французском языке, который был основою жаргона их шайки. В ту эпоху французский язык начинал входить во всеобщее употребление, так как он представляет собою переходную ступень от северных языков, отличающихся обилием согласных, к южным языкам, изобилующим гласными. В Европе по-французски говорили торговцы и воры. Многие, верно, помнят, что лондонский вор Джибби понимал Картуша.</p><p class="p1">Урка, быстроходный парусник, неслась вперед; однако десять человек, да сверх того еще и багаж, были слишком тяжелым грузом для такого утлого суденышка.</p><p class="p1">Бегство шайки на «Матутине» отнюдь не свидетельствовало о том, что между экипажем судна и его пассажирами существовала постоянная связь. Для такого предприятия было вполне достаточно, чтобы хозяин урки и главарь шайки были оба vascongado<a href="ch2.xhtml#id43" class="a">[165]</a>. Помогать друг другу – священный долг каждого баска, не допускающий никаких исключений. Баск, как мы уже говорили, не признает себя ни испанцем, ни французом: он баск и потому везде, при любых обстоятельствах, обязан приходить на помощь своему соплеменнику. Таковы узы братства, связывающие всех жителей Пиренеев.</p><p class="p1">Все время, пока урка находилась в заливе, небо хотя и было пасмурно, однако не сулило ничего страшного, что могло бы встревожить беглецов. Они спасались от преследования, уходили от врага и были безудержно веселы. Один хохотал, другой распевал песни. Хохот был грубый, но непринужденный, пение – не пленявшее слуха, зато беззаботное.</p><p class="p1">Уроженец Лангедока орал: «Caougagno!» – «Кокань!», что на нарбоннском наречии означает высшую степень удовлетворения. Обитатель приморской деревушки Грюиссан, лепившейся по южному склону Клаппа, он не был настоящим матросом, не был мореходом, а был скорее рыбаком, привыкшим разъезжать в своей душегубке по Бажскому озеру и вытаскивать полный рыбою невод на песчаный берег Сент-Люси. Он принадлежал к тому племени, где носят красный вязаный колпак, крестясь, складывают пальцы особым образом, как это делают испанцы, пьют вино из козьего меха, обгладывают окорок дочиста, становятся на колени, когда богохульствуют, и, обращаясь к своему покровителю с мольбой, грозят ему: «Великий святой, исполни мою просьбу, не то я запущу тебе камнем в голову» (ou té feg’ un pic).</p><p class="p1">В случае нужды он мог оказаться полезным и в роли матроса.</p><p class="p1">Провансалец в камбузе подкидывал куски торфа под чугунный котел и варил похлебку.</p><p class="p1">Эта похлебка напоминала собой «пучеро», но только говядину заменяла в ней рыба; провансалец бросал в кипящую воду горох, маленькие, нарезанные квадратиками, ломтики сала и стручки красного перца, что было уступкой со стороны любителя bouillabaisse<a href="ch2.xhtml#id42" class="a">[166]</a> любителям olla podrida<a href="ch2.xhtml#id41" class="a">[167]</a>. Развязанный мешок с провизией стоял рядом с ним. Провансалец зажег у себя над головой железный фонарь со слюдяными стеклами, подвешенный на крючке к потолку камбуза. Рядом с фонарем болтался на другом крючке зимородок, служивший флюгером. В те времена существовало народное поверье, будто мертвый зимородок, подвешенный за клюв, всегда поворачивается грудью в ту сторону, откуда дует ветер.</p><p class="p1">Занимаясь стряпней, провансалец то и дело подносил ко рту горлышко фляги и; прихлебывал из нее водку. Фляга была широкая и плоская, с ушками, оплетенная ивняком: такие фляги носили на ремне у пояса, почему они назывались «поясными флягами». Потягивая вино, он мурлыкал себе под нос одну из тех деревенских песенок, которые как будто лишены почти всякого содержания: протоптанная тропинка, изгородь; меж кустами видны на лугу, освещенном лучами заходящего солнца, длинные тени повозки и лошади; время от времени над изгородью показываются и тотчас же пропадают вилы с охапкой сена. Для незатейливой песенки этого вполне достаточно.</p><p class="p1">Отъезд, в зависимости от настроения и мыслей, владеющих нами в эту минуту, вызывает либо чувство облегчения, либо горесть. На урке все казались довольными, кроме самого старого члена шайки, человека в сомбреро.</p><p class="p1">Старика этого скорее всего можно было принять за немца, хотя у него было одно из тех лиц, с которых уже стерлись все признаки какой-либо национальности; он был лыс и держал себя так степенно, что его плешь казалась тонзурой. Проходя мимо изваяния святой девы на носу урки, он всякий раз приподнимал свою войлочную шляпу, и тогда на его черепе видны были вздутые старческие вены. Длинное, похожее на мантию, одеяние из коричневой дорчестерской саржи, потертое и рваное, распахиваясь, приоткрывало кафтан, плотно облегавший его и застегнутый, наподобие сутаны, до самого горла. Его руки, казалось, сами собой складывались на груди косым, крестом, по привычке богомолов. Цвет лица у него был мертвенно бледный: лицо человека всегда отражает его внутренний мир, и ошибочно думать, будто мысль лишена окраски. Это старческое лицо отражало странное душевное состояние – результат сложных противоречий, влекущих человека одновременно и в сторону добра и в сторону зла; внимательный наблюдатель разгадал бы, что это существо способно нравственно опуститься до уровня дикого зверя, пасть ниже тигра или возвыситься над обыкновенными людьми. Такой душевный хаос вполне возможен. В этом лице было что-то загадочное. Его таинственность была почти символической. Чувствовалось, что этот человек изведал и предвкушение зла, заранее рассчитывая его последствия, и опустошенность, следующую за его совершением. Его бесстрастие, быть может только кажущееся, носило печать двойной окаменелости: окаменелости сердца, свойственной палачу, и окаменелости мысли, свойственной мандарину. Можно было безошибочно утверждать – ибо чудовищное тоже бывает в своем роде совершенным, – что он был способен на все, даже на душевный порыв. Всякий ученый немного напоминает труп, а человек этот был ученым. С первого же взгляда бросалась в глаза эта ученость, запечатленная во всех его движениях, даже в складках его плаща. Подвижные морщины на лице этого полиглота порою складывались в гримасу, противоречившую строгому выражению каменных черт. В нем не было лицемерия, но не было и цинизма, – лицо трагического мечтателя, человека, которого преступление привело к глубокому раздумью. Из-под нахмуренных бровей бандита светился кроткий взор архиепископа. Поредевшие седые волосы были на висках совершенно белыми. В нем чувствовался христианин, который фатализмом мог бы перещеголять турка. Костлявые пальцы были искривлены подагрой; высокая, прямая, как жердь, фигура производила смешное впечатление, уверенная поступь выдавала моряка. Ни на кого не глядя, замкнутый и зловещий, он медленно расхаживал по палубе. В глубине его зрачков можно было уловить отблеск души, отдающей себе отчет в окружающем ее мраке и знающей, что такое угрызения совести.</p><p class="p1">Время от времени главарь шайки, человек грубый и бойкий, быстро носившийся по палубе, подбегал к нему и шептал что-то на ухо. Старик в ответ кивал головой. Казалось, молния совещается о чем-то с ночью.</p></span><span id="id89"><div class="title6">
<p class="p">3. Встревоженные люди на тревожном море</p>
</div><p class="p1">Два человека на судне были озабочены: старик и владелец урки, которого не следует смешивать с главарем шайки; судохозяин был озабочен видом моря, старик – видом неба. Один не спускал глаз с морских волн, другой сосредоточил все свое внимание на тучах. Состояние моря тревожило владельца урки, старику же внушало опасения то, что происходило на небе. Он пристально наблюдал каждую звезду, показывавшуюся в разрывах туч.</p><p class="p1">Был тот сумеречный час, когда еще светло, но кое-где в вечерней мгле уже слабо мерцают редкие звезды.</p><p class="p1">Горизонт выглядел необычно. Туман принимал самые разнообразные формы.</p><p class="p1">Он сгущался преимущественно над берегом, тучи же скоплялись главным образом над морем.</p><p class="p1">Еще до выхода из Портлендского залива владелец урки, озабоченный высотою волн, тщательно проверил весь такелаж. Не дожидаясь момента, когда судно обогнет мыс, он подверг осмотру швиц-сарвени, убедился, что переплетка нижних вантов находится в полной исправности и служит надежной опорой путенс-вантам марсов, – предосторожность моряка, собирающегося поставить на судне все паруса.</p><p class="p1">Урка – в этом заключался ее недостаток – сидела в воде носом на полвары глубже, чем кормой.</p><p class="p1">Судохозяин то и дело переходил от путевого компаса к главному, стараясь при помощи обоих диоптров определить по неподвижным предметам на берегу скорость движения судна и румб, под которым оно шло. Сначала это оказался бейдевинд, и владелец урки ничего не имел против этого, хотя боковой ветер и вызывал отклонение на пять пунктов в сторону от намеченного курса. Он сам по возможности стоял все время у румпеля, по-видимому, не доверяя другим и считая только себя способным извлечь из управления рулем наибольшую скорость хода.</p><p class="p1">Так как разница между румбом действительным и румбом кажущимся тем значительнее, чем быстрее движется судно, то казалось, что урка идет под большим углом к направлению ветра, чем это было на самом деле. Урка шла не в бакштаг и не в бейдевинд, но настоящее направление ветра можно определить, только когда он дует в корму. Если в облаках видны длинные полосы, спускающиеся к какой-либо точке на горизонте, эта точка и есть то место, откуда дует ветер. Но в этот вечер дуло несколько ветров, румб ветра определить было трудно, и владелец урки сомневался в правильности курса.</p><p class="p1">Он управлял рулем осторожно и в то же время смело, брасопил реи, следил за всеми отклонениями от курса, старался не допускать их, наблюдал за дрейфом, замечал самые незначительные толчки румпеля, малейшие изменения в скорости хода, постоянно держался на известном расстоянии от берега, мимо которого шло судно; особенно же, принимая во внимание малые размеры путевого компаса, он все время добивался того, чтобы угол, образуемый флюгером и килем, был больше угла раствора парусов. Его взгляд, неизменно устремленный на воду, улавливал все изменения на ее поверхности.</p><p class="p1">Один только раз он поднял глаза к небу, стараясь найти три звезды, находящиеся в поясе Ориона; эти три звезды носят название Трех волхвов, и в старину испанские лоцманы говаривали: «Кто видит трех волхвов, тому недалеко и до спасителя».</p><p class="p1">Как раз в то мгновение, когда владелец урки поглядел на небо, на другом конце урки послышалось бормотание старика:</p><p class="p1">– Не видно ни Полярной звезды, ни Антареса, несмотря на его ярко-красный цвет. Не различить ни одной звезды.</p><p class="p1">Остальных беглецов это, казалось, не тревожило.</p><p class="p1">Однако, когда прошел первый порыв радости, вызванный бегством, все почувствовали на себе ледяное дыхание ветра, напоминавшее им о том, что стоит январь и что они находятся в море. Расположиться в каюте оказалось невозможно: она была слишком мала и к тому же вся загромождена багажом и тюками с товаром. Багаж принадлежал пассажирам, а тюки – экипажу, ибо урка была не яхтой для прогулок, а судном контрабандистов. Пассажирам пришлось разместиться на палубе – лишение в сущности небольшое для этих кочевников. Привычка жить на открытом воздухе устраняет для бродяг всякую заботу о ночлеге. Звездное небо заменяет им кров, на холоде приходит крепкий, а иногда и смертный сон.</p><p class="p1">Впрочем, в эту ночь, как мы только что сказали, небо было беззвездно.</p><p class="p1">Уроженец Лангедока и генуэзец в ожидании ужина улеглись, свернувшись клубком, рядом с женщинами у мачты, накрывшись брезентом, который им бросили матросы.</p><p class="p1">Лысый старик все стоял на носу судна, не трогаясь с места и как будто не чувствуя холода.</p><p class="p1">Владелец урки, не отходя от руля, издал гортанный звук, похожий на крик птицы, которую в Америке называют «восклицателем»; на этот зов к нему подошел главарь шайки, и судохозяин обратился к нему:</p><p class="p1">– Etcheco jaüna!</p><p class="p1">Эти два баскских слова, означающие «горный земледелец», служат у потомков древних кантабрийцев обычным вступлением к разговору, требующему серьезного внимания.</p><p class="p1">При этом владелец урки пальцем, указал на старика, и беседа продолжалась на испанском языке, не отличавшемся особой правильностью, так как оба изъяснялись на наречии горцев:</p><p class="p1">– Горный земледелец, что это за человек?</p><p class="p1">– Человек.</p><p class="p1">– На каких языках он говорит?</p><p class="p1">– На всех.</p><p class="p1">– Что он знает?</p><p class="p1">– Все.</p><p class="p1">– Какую страну он считает своей родиной?</p><p class="p1">– Никакую.</p><p class="p1">– Кто его бог?</p><p class="p1">– Бог.</p><p class="p1">– Как зовешь ты его?</p><p class="p1">– Безумцем.</p><p class="p1">– Как, повтори, зовешь ты его?</p><p class="p1">– Мудрецом.</p><p class="p1">– Кто он в вашей шайке?</p><p class="p1">– То, что он есть.</p><p class="p1">– Главарь?</p><p class="p1">– Нет.</p><p class="p1">– Кто же он в таком случае?</p><p class="p1">– Душа.</p><p class="p1">Главарь шайки и судохозяин расстались, и каждый снова погрузился в свои мысли, а немного времени спустя «Матутина» вышла из залива.</p><p class="p1">Началась сильная качка.</p><p class="p1">Там, где море не было покрыто пеной, оно казалось клейкой массой; в вечернем сумраке волны, утратив четкость очертаний, походили на лужи желчи. В иных местах волны как будто ложились плашмя, и на них виднелись лучеобразные трещины, как на стекле, в которое бросили камнем. В самом центре этих расходившихся лучей, в кружащейся точке, мерцал фосфорический свет, похожий на тот кошачий блеск, которым горят глаза совы.</p><p class="p1">«Матутина» гордо и отважно миновала полосу опасной зыби над Чембурской мелью. Чембурская мель, заграждающая выход из портлендского рейда, имеет вид не прямой преграды, а амфитеатра. Песчаная круглая арена подводного цирка с симметрически расположенными ступенями, выбитыми круговоротом волн на поглощенной морем вершине высотою с Юнгфрау, Колизей на дне океана, призрачным видением возникающий перед водолазом в прозрачной глубине морской пучины, – вот что представляет собою Чембурская мель. Чудовищная арена; там сражаются гидры, там бросаются в схватку левиафаны; там, если верить легенде, на дне гигантской воронки покоятся остовы кораблей, схваченных и потопленных исполинским пауком Кракеном, которого называют также «горой-рыбой». Такова страшная тайна моря.</p><p class="p1">Эта призрачная, неведомая человеку жизнь дает о себе знать на поверхности моря только легкой зыбью.</p><p class="p1">В девятнадцатом столетии Чембурская мель почти совсем исчезла. Недавно построенный волнорез силою прибоя опрокинул и разрушил это высокое подводное сооружение, подобно тому как плотина, воздвигнутая в 1760 году в Круазике, передвинула время прилива и отлива у берегов его на четверть часа. Между тем приливы и отливы вечны. Но вечность подчиняется человеку гораздо больше, чем полагают.</p></span></span></span></span>
