<span><span><span><span id="id133"><div class="title6">
<p class="p">7. Слепота дает уроки ясновидения</p>
</div><p class="p1">Порою Гуинплен упрекал себя. Его счастье вызывало в нем нечто вроде угрызений совести. Ему казалось, что, позволяя любить себя этой девушке, которая не может его видеть, он обманывает ее. Что сказала бы она, если бы ее глаза внезапно прозрели? Какое отвращение почувствовала бы она к тому, что так ее привлекает! Как отпрянула бы она от своего страшного магнита! Как вскрикнула бы! Как закрыла бы лицо руками! Как стремительно убежала бы! Тягостные сомнения терзали его. Он говорил себе, что он, чудовище, не имеет права на любовь. Гидра, боготворимая светилом! Он считал долгом открыть истину этой слепой звезде.</p><p class="p1">Однажды он сказал Дее:</p><p class="p1">– Знаешь, я очень некрасив.</p><p class="p1">– Я знаю, что ты прекрасен, – ответила она.</p><p class="p1">Он продолжал:</p><p class="p1">– Когда ты слышишь, как все смеются, знай, что смеются надо мной, потому что я уродлив.</p><p class="p1">– Я люблю тебя, – сказала Дея.</p><p class="p1">И, помолчав, прибавила:</p><p class="p1">– Я умирала, ты вернул меня к жизни. Когда ты здесь, я ощущаю рядом с собою небо. Дай мне свою руку: я хочу коснуться Бога!</p><p class="p1">Их руки, найдя одна другую, соединились. Оба не проронили больше ни слова; они молчали от полноты взаимной любви.</p><p class="p1">Урсус, нахмурившись, слушал этот разговор. На другое утро, когда они сошлись все трое, он сказал:</p><p class="p1">– Да ведь и Дея тоже некрасива.</p><p class="p1">Эта фраза не достигла своей цели. Дея и Гуинплен пропустили ее мимо ушей. Поглощенные друг другом, они редко вникали в сущность изречений Урсуса. Мудрость философа пропадала даром.</p><p class="p1">Однако в этот раз предостерегающее замечание Урсуса «Дея тоже некрасива» изобличало в этом книжном человеке известное знание женщин. Несомненно, Гуинплен, сказав правду, допустил тем самым неосторожность. Сказать всякой другой женщине, всякой другой слепой, кроме Деи: «Я очень некрасив собою», – было опасно. Быть слепой и сверх того влюбленной – значит быть слепой вдвойне. В таком состоянии с особенной силой пробуждается мечтательность. Иллюзия – насущный хлеб мечты; отнять у любви иллюзию – все равно что лишить ее пищи. Для возникновения любви необходимо восхищение как душой, так и телом. Кроме того, никогда не следует говорить женщине ничего такого, что ей трудно понять. Она начинает над этим задумываться, и нередко мысли ее принимают дурной оборот. Загадка разрушает цельность мечты. Потрясение, вызванное неосторожно оброненным словом, влечет за собою глубокую трещину в том, что уже срослось. Иногда случается, неизвестно даже как, что под влиянием случайно брошенной фразы сердце незаметно для самого себя постепенно пустеет. Любящее существо замечает, что уровень его счастья понизился. Нет ничего страшнее этого медленного исчезновения счастья сквозь стенки треснувшего сосуда.</p><p class="p1">К счастью, Дея была вылеплена совсем из другой глины и резко отличалась от прочих женщин. Это была редкая натура. Хрупким было только тело, но не сердце Деи. Основой ее существа было божественное постоянство в любви.</p><p class="p1">Вся работа мысли, вызванная в ней словами Гуинплена, свелась лишь к тому, что однажды она затеяла с ним такой разговор:</p><p class="p1">– Быть некрасивым – что это значит? Это значит причинять кому-либо зло. Гуинплен делает только добро, значит, он прекрасен.</p><p class="p1">Затем все в той же форме вопросов, которая свойственна обычно детям и слепым, она продолжала:</p><p class="p1">– Видеть? Что называете вы, зрячие, этим словом? Я не вижу, а я знаю; Оказывается, видеть – значит многое терять.</p><p class="p1">– Что ты хочешь этим сказать? – спросил Гуинплен.</p><p class="p1">Дея ответила:</p><p class="p1">– Зрение скрывает истину.</p><p class="p1">– Нет, – сказал Гуинплен.</p><p class="p1">– Скрывает! – возразила Дея, – если ты говоришь, что ты некрасив.</p><p class="p1">И после минутного раздумья прибавила!</p><p class="p1">– Обманщик!</p><p class="p1">Гуинплену оставалось только радоваться: он признался, ему не поверили. Его совесть была теперь спокойна, любовь – тоже.</p><p class="p1">Так дожили они до той поры, когда Дее исполнилось шестнадцать лет; Гуинплену шел двадцать пятый год.</p><p class="p1">Со дня своей первой встречи они, как принято говорить теперь, «нисколько не продвинулись вперед». Даже пошли назад. Ибо читатель помнит, что они уже провели свою брачную ночь, когда Дее было девять месяцев, а Гуинплену десять лет. В их любви как бы нашло свое продолжение их безгрешное детство. Так иногда запоздалый соловей продолжает петь свою ночную песню и после того, как занялась заря.</p><p class="p1">Их ласки не шли дальше пожатия рук. Изредка Гуинплен слегка прикасался губами к обнаженному плечу Деи. Им достаточно было этого невинного любовного наслаждения.</p><p class="p1">Двадцать четыре года, шестнадцать лет. И вот однажды утром Урсус, не оставивший своего намерения «сыграть с ними шутку», объявил им:</p><p class="p1">– На днях вам придется выбрать себе вероисповедание.</p><p class="p1">– Зачем? – спросил Гуинплен.</p><p class="p1">– Чтобы пожениться.</p><p class="p1">– Да ведь мы уже женаты, – ответила Дея.</p><p class="p1">Она не понимала, что можно быть в большей мере мужем и женой, чем они.</p><p class="p1">Эта чистота желаний, это наивное упоение двух душ, не ищущих ничего за пределами настоящего, это безбрачие, принимаемое за супружескую жизнь, в сущности даже нравились Урсусу. Если он прохаживался на этот счет, то лишь потому, что нужно же было побрюзжать. Но как-человек, обладавший медицинскими познаниями, он находил Дею если не слишком юной, то во всяком случае слишком хрупкой и слишком слабой для того, что он называл «плотским браком».</p><p class="p1">Это никогда не будет поздно.</p><p class="p1">К тому же разве не были они уже супругами? Если существует на свете нерасторжимая связь, то не в союзе ли Гуинплена и Деи? Этот чудесный союз был порожден несчастьем, бросившим их в объятия друг друга. И, словно одних этих уз было недостаточно, к несчастью присоединилась, обвилась вокруг него, срослась с ним еще и любовь. Какая сила в состоянии разорвать железную цепь, скрепленную узлом из цветов?</p><p class="p1">Конечно, разлучить эту чету было невозможно.</p><p class="p1">Дея обладала красотой, Гуинплен – зрением. Каждый из них принес приданое. Они составляли не просто чету, они составляли отлично подобранную пару, которую разделяла только священная преграда невинности.</p><p class="p1">Однако, как ни старался Гуинплен жить одними мечтами, ограничиваясь только созерцанием Деи и духовной любовью к ней, он все-таки был мужчиной. Влияния роковых законов устранить нельзя. Как и все в природе, он был подвержен таинственному брожению заложенных в него сил, происходящему по воле создателя. Порою, во время представлений, он невольно смотрел на женщин, находившихся в толпе, но тотчас же отводил от них ищущий взгляд и торопился уйти со смутным чувством раскаяния.</p><p class="p1">Прибавим, что он не встречал поощрения. На лицах всех женщин, на которых он смотрел, он читал отвращение, антипатию, гадливость. Было ясно, что, кроме Деи, ни одна женщина не могла ему принадлежать. Это способствовало его раскаянию.</p></span></span></span></span>
