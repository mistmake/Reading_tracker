<span><span><span><span id="id173"><div class="title6">
<p class="p">3. Ева</p>
</div><p class="p1">Он увидел восьмиугольный зал с полуовальными арками сводов; окон не было; свет лился откуда-то сверху; стены, пол и свод были облицованы мрамором цвета персика. Посреди зала возвышался черного мрамора балдахин, опиравшийся на витые колонны в тяжеловесном, но очаровательном стиле времен Елизаветы; под ним помещалась ванна-бассейн такого же черного мрамора; в ней била медленно наполнявшая ее тонкая струя душистой теплой воды. Черный мрамор ванны, оттеняя белизну тела, сообщает ему ослепительный блеск.</p><p class="p1">Журчанье этой струи и услыхал Гуинплен. Отверстие в ванне, сделанное на известном уровне, не давало воде переливаться через край. Над ванной поднимался еле заметный пар, мельчайшею росою оседая на мраморе. Тонкая струйка воды была похожа на гибкий стальной прут, колеблющийся от малейшего дуновения.</p><p class="p1">Мебели почти не было; только около самой ванны стояла кушетка с подушками, достаточно длинная для того, чтобы в ногах лежащей на ней женщины могли поместиться ее собачка или ее любовник; поэтому такие кушетки и носят название can-al-pie<a href="ch2.xhtml#id171" class="a">[259]</a>, которое мы превратили в «канапе».</p><p class="p1">Судя по серебряным ножкам и серебряной раме, это был испанский шезлонг. Обивка и подушки были из белого атласа.</p><p class="p1">По другую сторону ванны стоял у стены высокий туалет из литого серебра со всеми необходимыми принадлежностями; посередине его возвышалось что-то вроде окна, состоявшего из восьми небольших венецианских зеркал, соединенных между собой серебряным переплетом.</p><p class="p1">В стене, ближайшей к кушетке, было вырублено квадратное отверстие, похожее на слуховое окно и закрывавшееся серебряной дверцей. Эта дверца ходила на петлях, как ставень. На ней сверкала покрытая золотом и чернью королевская корона. Над дверцей висел вделанный в стену колокольчик из позолоченного серебра, а может быть и из золота.</p><p class="p1">Напротив арки, через которую вошел Гуинплен, круглился в конце зала проем такой же арки, занавешенный от потолка до полу серебристой тканью.</p><p class="p1">Тонкая, как паутина, ткань была совершенно прозрачна. Сквозь нее было видно все.</p><p class="p1">В центре этой паутины, в том самом месте, где обычно помещается паук, Гуинплен увидел нечто поразительное – нагую женщину.</p><p class="p1">Собственно говоря, она не была совсем нагой. Женщина была одета. Одета с головы до пят. На ней была очень длинная рубашка вроде тех одеяний, в которых изображают ангелов, но настолько тонкая, что казалась мокрой. Такая полуобнаженность более соблазнительна и более опасна, нежели откровенная нагота. Из истории нам известно, что принцессы и знатные дамы принимали участие в процессиях кающихся, проходивших между двумя рядами монахов; в одной из таких процессий герцогиня Монпансье, под предлогом самоуничижения, показалась всему Парижу в одной кружевной рубашке. Правда, герцогиня шла босая и со свечой в руках.</p><p class="p1">Серебристая ткань, прозрачная как стекло, служила занавесью. Она была прикреплена только вверху, и ее можно было приподнять. Она отделяла мраморный зал-ванную от смежной с нею спальни. Эта очень небольшая комната представляла собой нечто вроде зеркального грота. Зеркала, вплотную подогнанные одно к другому, были соединены между собой золотым багетом и, образуя многогранник, отражали кровать, стоявшую в центре. Кровать, так же как туалет и кушетка, была из серебра; на ней лежала женщина. Она спала.</p><p class="p1">Она спала, запрокинув голову, одной ногой отбросив одеяло, словно ведьма, над которой распростер свои крылья сладостный сон.</p><p class="p1">Обшитая кружевом подушка упала на ковер.</p><p class="p1">Между наготой женщины и взором Гуинплена были только две преграды, две прозрачных ткани; рубашка и занавес из серебристого газа. Комната, похожая скорее на альков, освещалась слабым светом, проникавшим из ванной. Свет, казалось, обладал большей стыдливостью, чем эта женщина.</p><p class="p1">Кровать была без колонн, без балдахина, без полога, так что женщина, открывая глаза, могла видеть в окружавших ее зеркалах тысячекратное отражение своей наготы.</p><p class="p1">Простыни были сбиты, словно в тревожном сне. Их красивые складки свидетельствовали о тонкости ткани. Это было то время, когда некая королева, стараясь представить себе адские мученья, воображала их в виде постели с грубыми простынями.</p><p class="p1">Обычай спать голым перешел из Италии, он существовал еще до римлян. Sub clara nuda lucerna<a href="ch2.xhtml#id170" class="a">[260]</a>, – говорит Гораций.</p><p class="p1">В ногах кровати был брошен халат из какого-то необычайного шелка, несомненно китайского, так как в складках его виднелась большая, вышитая золотом ящерица.</p><p class="p1">Позади кровати, в глубине алькова, находилась, по всей вероятности, дверь, скрытая довольно большим зеркалом, с изображенными на нем павлинами и лебедями. В этой полутемной комнате все сияло. Промежутки между стеклом и золотым багетом были залиты тем блестящим сплавом, который в Венеции называется «стеклянной желчью».</p><p class="p1">К изголовью кровати был прикреплен серебряный пюпитр с вращающейся доской и неподвижными подсвечниками; на нем лежала раскрытая книга; на страницах ее, над текстом, стояло начертанное красными буквами заглавие: «Alcoranus Mahumedis»<a href="ch2.xhtml#id169" class="a">[261]</a>.</p><p class="p1">Гуинплен не заметил ни одной из этих подробностей: он видел только женщину.</p><p class="p1">Он остолбенел и в то же время был взволнован до глубины души. Противоречие невероятное, но в жизни оно бывает.</p><p class="p1">Он узнал эту женщину.</p><p class="p1">Глаза ее были закрыты, лицо обращено к нему.</p><p class="p1">Перед ним быта герцогиня.</p><p class="p1">Да, это она, загадочное существо, таившее в себе всю прелесть неизвестного, она, являвшаяся ему столько раз в постыдных снах, она, написавшая ему такое странное письмо, единственная в мире женщина, про которую он мог сказать: «Она меня видела и хочет быть моею!» Он отогнал от себя эти сны, он сжег письмо. Он изгнал ее из своих мыслей, из своей памяти, он больше не думал о ней, он забыл ее…</p><p class="p1">И вот она снова перед ним. И еще более грозная, чем прежде! Нагая женщина – это женщина во всеоружии.</p><p class="p1">Он затаил дыхание. Ослепительное облако подхватило его и увлекло с собой. Он смотрел. Перед ним была эта женщина. Возможно ли?</p><p class="p1">В театре – герцогиня. Здесь – нереида, наяда, фея. И всюду она – призрак.</p><p class="p1">Он хотел бежать и почувствовал, что не может двинуться с места. Взгляды его стали цепями, приковывавшими его к видению.</p><p class="p1">Кто она? Непотребная женщина? Девственница? И то и другое. Улыбка таившейся в ней Мессалины сочеталась с настороженностью Дианы. В ее блистательной красоте было что-то неприступное. Ничто не могло сравниться чистотою с целомудренно строгими формами ее тела. Снег, на который никогда не ступала нога человека, можно узнать с первого взгляда. Эта женщина сияла священной белизной вершины Юнгфрау. От ее невозмутимого чела, от рассыпавшихся золотистых волос, от опущенных ресниц, от еле заметных голубоватых жилок, от округлостей ее груди, достойной резца ваятеля, от бедер и колен, розовевших сквозь прозрачную рубашку, веяло величием спящей богини. Ее бесстыдство растворялось в сиянии. Она лежала нагая так спокойно, точно имела право на этот олимпийский цинизм; в ней чувствовалась самоуверенность богини, которая, погружаясь в морскую волну, может сказать океану: «Отец!» Великолепная, недосягаемая, она предлагала себя всем взглядам, всем желаниям, всем безумиям, всем мечтам, горделиво покоясь на этом ложе, подобно Венере на лоне пенных вод.</p><p class="p1">Она заснула с вечера и безмятежно спала до сих пор; доверчивость, с которой она отдалась сумраку, не исчезла и при свете дня.</p><p class="p1">Гуинплен трепетал. Он смотрел на нее восхищенный. Болезненное, алчное восхищение пагубно. Ему стало страшно.</p><p class="p1">Неожиданностям, которыми судьба дарит человека, не бывает конца. Гуинплену казалось, что он дошел до предела, и вдруг все начиналось снова. Что означали все эти непрерывно поражавшие его молнии и этот последний, страшный удар – внезапно представшая ему спящая богиня? Что означали эти последовательно открывавшиеся ему просветы небес, откуда, наконец, снизошла его желанная и грозная мечта? Что означала эта угодливость неведомого искусителя, осуществлявшего одну за другой его смутные грезы, неясные стремления, облекавшего плотью даже его дурные помыслы, мучительно опьянявшего его похожей на фантазию действительностью? Не соединились ли против него, жалкого человека, все силы тьмы? К чему должны были привести его все эти улыбки зловещей судьбы? Кто это задался целью вскружить ему голову? Эта женщина? Почему она здесь? Зачем? Непонятно. Зачем он здесь? Зачем она здесь? Уж не сделали ли его пэром Англии ради этой герцогини? Кто толкал их друг к другу? Кто тут был одурачен? Кто был жертвой? Чьим доверием злоупотребляли? Быть может, обманывали Бога? Все эти мысли проносились в голове Гуинплена, словно окутанные черными облаками. А это волшебное, зловещее жилище, этот странный дворец, откуда не было выхода, как из тюрьмы, – быть может, и он принимал участие в заговоре? Все окружающее словно засасывало его. Какие-то темные силы связывали все его движения. Его воля, все больше и больше слабея, покидала его, рассеивалась. За что ухватиться? Он был растерян и околдован. Ему казалось, что он окончательно сходит с ума. Объятый смертельным ужасом, он стремительно падал в зияющую бездну.</p><p class="p1">Женщина спала.</p><p class="p1">Его волнение все возрастало. Для него это была уже не леди, не герцогиня, не знатная дама; это была женщина.</p><p class="p1">Дурные наклонности заложены в нас в скрытом состоянии. В нашем организме неведомо для нас существует уже готовая почва для пороков. От этого не свободны даже самые невинные и на первый взгляд чистые люди. Если человек ничем не запятнан, это еще не значит, что у него нет недостатков. Любовь – закон. Сладострастие – западня. Опьянение и пьянство – две разные вещи. Желать определенную женщину – опьянение. Желать женщину вообще – то же, что пьянство.</p><p class="p1">Гуинплен терял власть над собою, он весь дрожал.</p><p class="p1">Как устоять на этот раз? Тут не было уже ни легких сборок воздушных тканей, ни складок тяжелого шелка, ни пышного, кокетливого туалета, затейливо прикрывающего и вместе с тем обнажающего женское тело, – никакой дымки. Нагота во всей своей страшной простоте. Настойчивый, таинственный призыв существа, не ведающего стыда, обращенный ко всему темному, что есть в человеке. Ева, более опасная, нежели сам сатана. Человеческое в сочетании со сверхъестественным. Беспокойный восторг, завершающийся грубым торжеством инстинкта над долгом. Порабощающая власть красоты. Когда красота перестает быть идеалом и становится чувственным соблазном, близость ее губительна для человека.</p><p class="p1">Иногда герцогиня незаметно меняла позу, как легкое облако меняет свои очертания в лазури. Линии ее тела принимали по-новому прелестную волнистость. В плавных и гибких движениях женщины та же изменчивость, что и в движениях волны, в них есть что-то неуловимое. Странно – прекрасное тело, которое созерцал Гуинплен, не вызывало никаких сомнений в своей реальности – и в то же время казалось чем-то сказочным. Несмотря на ощутимую близость, женщина эта была бесконечно далекой. Бледный, смущенный Гуинплен смотрел на нее, не отрывая взора. Он прислушивался, как дышит ее грудь, и ему чудилось, что это – дыхание призрака. Его влекло к ней, он боролся. Как устоять против нее? Как совладать с самим собой?</p><p class="p1">Он ожидал всего, только не этого. Он думал, что ему придется выдержать схватку с лютым стражем, который преградит ему выход, с каким-нибудь разъяренным чудовищем, со свирепым тюремщиком. Он ожидал встретить Цербера – и увидел Гебу.</p><p class="p1">Нагую женщину. Спящую женщину.</p><p class="p1">Какая тяжелая борьба!</p><p class="p1">Он опускал веки. От слишком яркого света глазам бывает больно. Но и сквозь закрытые веки он все видел ее. Менее ослепительную, но столь же прекрасную.</p><p class="p1">Бежать не всегда возможно. Он пытался и не мог. Он словно прирос к полу, как это бывает иногда во сне. Когда мы хотим бежать от соблазна, он приковывает нас к месту. Идти ему навстречу еще возможно, но отступить уже нельзя. Незримые руки греха тянутся к нам из-под земли и увлекают нас в пропасть.</p><p class="p1">Принято думать, будто всякое ощущение постепенно притупляется. Ошибочное мнение. Это равносильно утверждению, что азотная кислота, медленно стекая на рану, успокаивает боль, или что Дамьен, подвергнутый четвертованию, мог свыкнуться с этой пыткой.</p><p class="p1">На самом деле каждый новый толчок лишь обостряет ощущение.</p><p class="p1">Изумляясь все больше и больше, Гуинплен дошел до неистовства. Его рассудок, ошеломленный новой неожиданностью, был подобен переполненной до краев чаше. В нем пробудилось что-то неведомое и страшное.</p><p class="p1">Он потерял компас. Одно только для него было достоверно – лежащая перед ним женщина. Ему открывалось что-то всепоглощающее, разверзшееся перед ним, как морская пучина. Он уже не мог управлять собой. Необоримое течение увлекало его к подводному камню. Но подводный камень оказался не скалою, а сиреной; дно бездны таило магнит. Гуинплен хотел бы противостоять его притягательной силе, но как? Он уже не находил точки опоры. Человека иногда подхватывает и несет буря. Подобно судну, он теряет все снасти. Его якорь – это совесть. Но, как это ни ужасно, якорь может оборваться.</p><p class="p1">Гуинплен даже не мог сказать себе: «Я безобразен, ужасен. Она оттолкнет меня». Эта женщина писала ему, что любит его.</p><p class="p1">Бывают мгновенья, когда мы как бы повисаем над пропастью. Когда мы утрачиваем связь с добром и приближаемся к злу, та часть нашего существа, которая вовлекает нас в грех, торжествует над нами и в конце концов низвергает нас в бездну. Не наступила ли и для Гуинплена такая печальная минута?</p><p class="p1">Как спастись?</p><p class="p1">Итак, это она! Герцогиня! Та женщина! Она была здесь, в этой комнате, в уединенном месте, одна, спящая, беззащитная. Она была в его руках, и он – всецело в ее власти.</p><p class="p1">Герцогиня!</p><p class="p1">В глубине небесного пространства вы заметили звезду. Вы восхищались ею. Она так далеко! Какие опасения может внушить нам неподвижная звезда? Но вот однажды ночью она меняет место. Вы различаете вокруг нее дрожащее сияние. Светило, которое вы считали бесстрастным, пришло в движение. Это не звезда, это комета. Это неистовая поджигательница неба. Светило приближается, растет, оно распускает огненные волосы, становится огромным; оно приближается к вам. О ужас! Оно летит на вас! Комета вас узнала, комета пылает к вам страстью, комета вожделеет к вам. Страшное приближение небесного тела. То, что надвигается на вас, настолько ярко, что может ослепить. Это избыток жизни, несущий смерть. Вы отвечаете отказом на зов зенита. Вы отвергаете любовь, предлагаемую бездной. Вы закрываете лицо руками, вы прячетесь, бежите, вы считаете себя спасенным, вы открываете глаза… Чудовищная звезда перед вами. И не звезда, а целый мир. Неведомый мир лавы и огня. Всепожирающее чудо, рожденное безднами. Комета заполнила собой все небо. Кроме нее, ничего не существует. В глубокой бесконечности она горела карбункулом, вдали казалась алмазом, вблизи же превратилась в огненное горнило. Вы со всех сторон окружены пламенем.</p><p class="p1">И вы чувствуете, как этот райский огонь испепеляет вас.</p></span></span></span></span>
