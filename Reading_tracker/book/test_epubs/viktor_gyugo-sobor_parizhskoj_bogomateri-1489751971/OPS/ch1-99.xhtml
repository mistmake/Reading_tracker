<p class="p">4. Чары</p>
</div><p class="p1">Для того чтобы всплыть со дна на поверхность, требуется некоторое время.</p><p class="p1">Гуинплен был ввергнут в такую глубокую пучину изумления, что сразу прийти в себя он не мог.</p><p class="p1">Невозможно в одно мгновение освоиться с неведомым.</p><p class="p1">Мысли иногда приходят в расстройство точно так же, как войско на войне, и их так же трудно собрать, как разбежавшихся солдат. Человек чувствует себя как бы расчлененным на части. Он присутствует при каком-то странном распаде собственной личности.</p><p class="p1">Бог – рука, случай – праща, человек – камень. Попробуйте остановиться, когда вас метнули ввысь.</p><p class="p1">Гуинплена – да простят нам это сравнение – как бы швыряло от одного поразительного события к другому. После любовного письма герцогини – открытие в саутворкском подземелье.</p><p class="p1">Когда вы вступаете в полосу неожиданностей, готовьтесь к тому, что они обрушатся на вас одна за другой. Как только перед вами распахнулась эта страшная дверь, в нее сразу устремляются неожиданности. Как только в стене пробита брешь, события сразу же врываются в этот пролом. Необычайное не приходит только один раз.</p><p class="p1">Необычайное – это мрак. Этот мрак окутывал Гуинплена. То, что с ним случилось, казалось ему непостижимым. Он видел все сквозь туман, который заволакивает наше сознание после пережитого нами глубокого потрясения подобно тому, как после обвала еще стоит в воздухе облако пыли. Это было действительно сильное потрясение. Он не мог разобраться в окружающем. Но мало-помалу воздух становится прозрачнее. Пыль оседает. С каждой минутой ослабевает удивление. Гуинплен напоминал человека, спящего с открытыми глазами и старающегося разглядеть то, что происходит с ним во сне. Он то разгонял это облако, то опять давал ему сгущаться, то терял рассудок, то снова обретал его. Под влиянием неожиданности он переживал те колебания разума, которые бросают нас из стороны в сторону, заставляя переходить от понимания к полной растерянности. Кому не случалось наблюдать это качание маятника в собственном мозгу?</p><p class="p1">Постепенно мысль Гуинплена стала осваиваться с мраком загадочного события, подобно тому как ранее его глаза освоились с мраком саутворкского подземелья. Трудность заключалась в том, что надо было как-то распутать все эти сбившиеся в один клубок впечатления. Для того чтобы воспринять нагромождение событий, нужна передышка. Здесь же ее не было: события обрушивались одно за другим, не давая ни минуты отдыха. Входя в ужасное саутворкское подземелье, Гуинплен ожидал, что его закуют в кандалы, как каторжника, а его увенчали короной. Как это могло случиться? Между тем, чего опасался Гуинплен, и тем, что с ним произошло в действительности, промежуток времени был слишком мал, все следовало слишком быстро одно за другим, его испуг чересчур скоро сменился иными чувствами, и он не мог прийти в себя. Противоположности были слишком разительны. Они как тисками сдавили рассудок Гуинплена, и он всеми силами старался высвободить его.</p><p class="p1">Он молчал. Мы не в достаточной мере отдаем себе отчет, насколько силен инстинкт, заставляющий нас прибегать к молчанию, когда мы чем-нибудь поражены до глубины души. Тот, кто не говорит ничего, способен противостоять всему. Одно случайно оброненное слово может иногда погубить все.</p><p class="p1">Бедняк живет в вечном страхе быть раздавленным. Толпа всегда боится, что ее кто-то растопчет. А Гуинплен с младенческих лет был частью этой толпы.</p><p class="p1">Бывает странное состояние тревоги, выражающееся словами «что-то надвигается». Гуинплен находился именно в таком состоянии, когда человек чувствует, что положение еще не определилось окончательно, когда выжидаешь чего-то, что еще должно произойти. Смутно настораживаешься. «Что-то надвигается». Что? – Неизвестно. Кто? Всматриваешься в даль.</p><p class="p1">Человек с большим животом повторил:</p><p class="p1">– Вы у себя дома, милорд.</p><p class="p1">Гуинплен озирался. Когда человек изумлен, он сперва оглядывается кругом, чтобы удостовериться, что все по-прежнему стоит на своем месте, затем ощупывает самого себя, чтобы убедиться в собственном существовании. Да, действительно обращались к нему, но он уже был не он. На нем уже не было его рабочего костюма, его кожаного нагрудника. На нем был камзол из серебряной парчи и, судя по ощущению, атласный, расшитый золотом кафтан, в кармане камзола туго набитый кошелек; поверх узкого, в обтяжку, трико клоуна – широкие бархатные панталоны, а на ногах башмаки с высокими красными каблуками. Его не только перенесли во дворец, его переодели с головы до ног.</p><p class="p1">Человек продолжал:</p><p class="p1">– Соблаговолите запомнить, ваша милость, что меня зовут Баркильфедро. Я чиновник адмиралтейства. Это я вскрыл флягу Хардкванона и извлек из нее ваш жребий. Так в арабских сказках рыбак выпускает из бутылки великана.</p><p class="p1">Гуинплен устремил глаза на улыбающееся лицо говорившего.</p><p class="p1">Баркильфедро продолжал:</p><p class="p1">– Кроме этого дворца, милорд, вам принадлежит Генкервилл-Хауз – тот дворец еще роскошнее. Вам принадлежит Кленчарли-Касл, дающий вам титул пэра и представляющий собою крепость времен Эдуарда Старого. Вы владеете девятнадцатью округами со всеми входящими в них деревнями и поселянами. Это дает вам возможность собрать под вашим знаменем лорда и дворянина около восьмидесяти тысяч вассалов и тяглых людей. В Кленчарли вы – полновластный судья и господин над всем – над имуществом и над людьми; там вы можете править свой баронский суд. У короля только то преимущество перед вами, что он чеканит монету. Король, который в нормандских законах именуется chief signer<a href="ch2.xhtml#id191" class="a">[249]</a>, имеет право суда и право чеканки. За исключением последнего, вы такой же король в своих поместьях, как он в своем королевстве. Как барон, вы в Англии имеете право на виселицу о четырех столбах, и в Сицилии, как маркиз, – на виселицу о семи столбах; у простого дворянина виселица о двух столбах, у ленного владельца – о трех, а у герцога – о восьми. В старинных хартиях Нортумбрии вы именуетесь государем. Вы состоите в родстве с виконтами Валеншиа (они же Поуэр) в Ирландии и с графами Эмфревиль (они же Ангус) в Шотландии. Вы являетесь главою клана, так же как Кемпбел, Ардманах и Мак-Каллумор. У вас восемь родовых поместий: Рикелвер, Бекстон, Хелл-Кертерс, Хомбл, Морикемб, Гемдрайт, Тренуордрайт и еще другие. Вам принадлежит право на торфяные разработки в Пилинморе и на алебастровые ломки в Тренте; кроме того, в вашем владении находится вся Пенетчейзская область и гора с расположенным на ней старинным городом. Город называется Вайнкаунтон, а гора – Мойл-Энли. Все это дает вам сорок тысяч фунтов стерлингов ежегодного дохода, то есть в сорок раз больше тех двадцати пяти тысяч франков, которыми довольствуется какой-нибудь французский маркиз.</p><p class="p1">В то время как Баркильфедро говорил, изумление Гуинплена все возрастало, и он припоминал многое. Воспоминание – пучина, которую одно слово может всколыхнуть до дна. Все названия замков и поместий, которые перечислил Баркильфедро, были знакомы Гуинплену. Они занимали несколько строк внизу двух надписей, украшавших стены возка, в котором протекло его детство; долгие годы взор его машинально скользил по ним, он невольно заучил их наизусть. Придя покинутым сиротою в передвижной балаган Урсуса, он нашел в нем опись ожидавшего его наследства; просыпаясь по утрам, бедный мальчик первым делом устремлял свой беспечный и рассеянный взгляд на перечень своих владений и титулов. Удивительное совпадение, присоединившееся ко всем неожиданностям, уготованным ему судьбою: в течение пятнадцати лет он, клоун бродячей труппы, кочевавшей с одного перекрестка на другой, он, с трудом зарабатывавший себе изо дня в день на пропитание, собиравший гроши и живший впроголодь, странствовал, все время имея перед глазами перечень своих богатств.</p><p class="p1">Баркильфедро дотронулся указательным пальцем до шкатулки, стоявшей на столе.</p><p class="p1">– Милорд, в этой шкатулке две тысячи гиней, которые Ее Величество, всемилостивейшая королева, посылает вам на первые расходы.</p><p class="p1">Гуинплен сделал движение.</p><p class="p1">– Это будет для моего отца Урсуса, – сказал он.</p><p class="p1">– Хорошо, милорд, – ответил Баркильфедро. – Для Урсуса, что живет в Тедкастерской гостинице. Присяжный законовед, сопровождавший нас сюда, сейчас отправляется обратно: он и отвезет ему эти деньги. Быть может, и я поеду в Лондон. В таком случае я возьму это поручение на себя.</p><p class="p1">– Я сам отвезу их, – возразил Гуинплен.</p><p class="p1">Баркильфедро перестал улыбаться и сказал:</p><p class="p1">– Невозможно.</p><p class="p1">Есть интонации, которые подчеркивают слова. Баркильфедро прибегнул именно к такой интонации. Он остановился, как будто для того, чтобы поставить точку. Потом продолжал тем почтительным и полным значения тоном, каким говорят слуги, чувствующие себя господами:</p><p class="p1">– Милорд, вы находитесь в двадцати трех милях от Лондона, в Корлеоне-Лодже, вашей придворной резиденции, смежной с Виндзорским королевским замком. Никому не известно, что вы здесь. Вас привезли сюда в закрытой карете, которая ждала вас у ворот Саутворкской тюрьмы. Люди, доставившие вас в этот дворец, вас не знают, но они знают меня, и этого довольно. Мы могли попасть в это помещение лишь благодаря тому, что у меня есть секретный ключ. В доме спят, и сейчас неудобно будить слуг. Поэтому я успею дать вам некоторые объяснения, тем более что сказать мне остается немного. Сейчас изложу суть дела. У меня есть поручение от Ее Величества.</p><p class="p1">Продолжая говорить, Баркильфедро принялся перелистывать пачку бумаг, лежавших рядом со шкатулкой.</p><p class="p1">– Милорд, вот ваша грамота на звание пэра. Вот другая грамота на титул сицилийского маркиза. Вот документы ваших восьми баронств, с печатями одиннадцати королей, начиная с Бальдрета, короля Кентского, и до Иакова Шестого и Первого, короля Англии и Шотландии. Вот документ на право председательствования в разных учреждениях. Вот арендные договоры на получение доходов, акты на право владения и подробные описания ваших ленов, поместий, земель и вотчин. Вот в щите над вашей головой изображены две короны – баронская с жемчугами и зубчатая корона маркиза. Рядом с этой комнатой, в гардеробной, висит ваша пурпурная, отороченная горностаем, бархатная мантия пэра. Сегодня, всего лишь несколько часов тому назад, лорд-канцлер и депутат – граф-маршал Англии, узнав о результате вашей очной ставки с компрачикосом Хардкваноном, получали распоряжения Ее Величества. Королева Анна соизволила своей подписью скрепить соответствующий приказ, что равносильно закону. Все формальности соблюдены. Не позднее, чем завтра, вы вступите в качестве полноправного члена в палату лордов; там уже несколько дней идет обсуждение представленного короною билля об увеличении на сто тысяч фунтов стерлингов, то есть на два с половиной миллиона французских ливров, годичного содержания герцогу Кемберлендскому, супругу королевы; вы можете принять участие в прениях.</p><p class="p1">Баркильфедро остановился, медленно перевел дух и продолжал:</p><p class="p1">– Однако дело еще не доведено до конца. Нельзя стать пэром Англии помимо своего желания. Если вы не захотите понять, что от вас требуется, все может рухнуть и погибнуть безвозвратно. В политике бывают случаи, когда назревающее событие так и не воплощается в жизнь. Милорд, о перемене в вашем положении пока еще никому не известно. Палата лордов узнает об этом только завтра. Все ваше дело хранилось в тайне по соображениям государственного порядка, и соображения эти настолько серьезны, что те немногие высокопоставленные лица, которые в настоящее время осведомлены о вашем существовании и ваших правах, немедленно же забудут о них, если того потребуют государственные интересы. То, что сохраняется сейчас в тайне, может остаться скрытым навсегда. Устранить вас ничего не стоит. Это тем более легко, что у вас есть брат, побочный сын вашего отца и женщины, которая впоследствии, во время его изгнания, стала любовницей короля Карла Второго, благодаря чему и ваш брат занимает при дворе видное положение; ваше пэрство может перейти к нему, хотя он и незаконный сын. Хотите вы этого? Не думаю. Итак, все зависит от вас. Надо повиноваться королеве. Вы покинете этот дворец только завтра и отправитесь в карете Ее Величества прямо в палату лордов. Милорд, желаете вы быть пэром Англии, да или нет? Королева имеет на вас виды. Она намерена соединить вас браком с особой почти королевской крови. Лорд Фермен Кленчарли, настала решительная минута в вашей жизни; Судьба никогда не открывает одной двери, не захлопнув в то же время другой. Сделав несколько шагов вперед, уже нельзя отступить ни на шаг. Перевоплощение неизбежно предполагает исчезновение прежней личности, Милорд! Гуинплен умер. Вы все поняли?</p><p class="p1">Гуинплен задрожал с головы до ног, потом овладел собой.</p><p class="p1">– Да, – сказал он.</p><p class="p1">Баркильфедро улыбнулся, поклонился и, спрятав шкатулку под плащ, вышел.</p></span></span></span></span>
