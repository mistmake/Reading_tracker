<p class="p">IV. Слеза за каплю воды</p>
</div><p class="p1">Эти слова явились как бы связующим звеном между двумя сценами, происходившими в двух пунктах Гревской площади: в «Крысиной норе» и у позорного столба. Первая сцена, уже описанная нами, не имела других свидетелей, кроме трех известных читателю женщин; вторая же, предстоящая еще описанию, происходила на глазах всей той толпы, которая, как мы видели выше, собиралась вокруг позорного столба и виселицы.</p><p class="p1">Толпа, привлеченная видом тех четырех сержантов, которые с девяти часов утра заняли свои места у четырех углов площадки со столбом, поняла, что предстоит какое-нибудь интересное зрелище: если и не повешение, то, по крайней мере, наказание плетьми, отрезание ушей или что-нибудь в этом роде. Мало-помалу эта толпа возросла до таких размеров, что сержанты, на которых она слишком бесцеремонно напирала, не раз вынуждены были «осаживать» ее, как тогда выражались, ударами плети или крупами своих лошадей.</p><p class="p1">Публика, давно приученная подолгу ожидать зрелищ на этой площади, не выказывала особенного нетерпения. Для развлечения она рассматривала позорный столб, представлявший собою очень простое сооружение в виде полого внутри куба из камней футов в десять вышиной. Несколько крутых ступеней из неотесанного камня, носивших громкое название лестницы, вели к устроенной наверху площадке, где виднелось дубовое колесо, лежащее горизонтально. Приговоренного к наказанию плетьми ставили на колесо на колени со связанными назад руками. Скрытый в столбе ворот посредством зубчатой оси приводил колесо в движение: вращаясь вокруг своей оси, колесо продолжало оставаться в горизонтальном положении, так что осужденный поворачивался лицом последовательно во все стороны площади. Это называлось «вертеть» преступника.</p><p class="p1">Из этого описания читатель видит, что позорный столб Гревской площади далеко не был так интересен, как столб Рынка. В нем не было ничего монументального, никаких архитектурных особенностей; не было ни крыши с железным крестом, ни восьмигранного фонаря, ни стройных колонн, распускавших вокруг, под самой крышей свои капители в виде листьев и цветов, ни желобов, похожих на какие-то фантастичные чудовища, ни разукрашенных деревянных частей, ни тонкой скульптуры на каменных частях. Зрителю положительно нечем было любоваться, кроме грубой кладки столба с его двумя подпорками да возвышающейся рядом с ним тощей, тоже обнаженной каменной виселицы. Любитель изящной архитектуры не нашел бы ничего интересного в этом аляповатом сооружении. Но почтенные ротозеи Средних веков были очень невзыскательны в художественном отношении и не искали никаких красот в сооружениях, предназначенных для наказаний.</p><p class="p1">Наконец прибыл и осужденный, привязанный к задку тележки. Когда его ввели на верх столба и привязали там веревками и ремнями к колесу, вся площадь дрогнула от смешанного гула криков, хохота и говора толпы, узнавшей в осужденном Квазимодо.</p><p class="p1">Это был действительно он. Судьба, видимо, издевалась над ним, заставляя его сегодня стоять у позорного столба на той самой площади, на которой он накануне так торжественно фигурировал в качестве папы и повелителя шутов, при восторженных криках толпы, в сопровождении герцога египетского, короля тунского и императора галилейского. Смело можно, однако, поручиться, что во всей этой толпе, присутствовавшей на площади в эту минуту, не было ни одного человека, – не исключая даже и героя дня, превратившегося из вчерашнего триумфатора в жалкого преступника, – кому пришло бы на ум такое сопоставление. Недоставало Гренгуара с его страстью к философствованию.</p><p class="p1">Но вот Мишель Нуарэ, присяжный глашатай его величества, заставил умолкнуть шумевших зрителей и громким голосом прочитал судебный приговор, как это было приказано господином прево. Затем он вместе со своими одетыми в мундиры подчиненными направился к тележке.</p><p class="p1">Квазимодо сидел бесстрастный и неподвижный. Сопротивления он оказать не мог благодаря тому, что на тогдашнем канцелярском языке называлось «силою и крепостью уз», которые действительно крепко впивались ему в тело. Впрочем, эта традиция тюрем и галер до сих пор еще сохраняется у нас в виде кандалов, несмотря на нашу цивилизованность, мягкость и гуманность (каторга и гильотина не в счет).</p><p class="p1">Звонарь собора Богоматери с видом полнейшего равнодушия позволил себя привезти на площадь, втащить волоком на вершину столба, связывать, развязывать и снова связывать, сколько было угодно его мучителям. На его лице ничего нельзя было прочесть, кроме разве изумления дикаря или идиота. Что он был глух – это давно уже всем было известно, а теперь казалось, что он и слеп.</p><p class="p1">Его поставили на колени на вершине столба, – он не сопротивлялся. С него сняли верхнюю одежду и спустили до пояса рубашку, – он и тут не выказал ни малейшего сопротивления. Его стали опутывать целой системою ремней и пряжек, – и он покорно давал застегивать на себе пряжки и завязывать узлы. Только по временам он шумно фыркал, как теленок, когда тот колотится головой о края тележки мясника.</p><p class="p1">– Вот дурак-то! – говорил Жан де Мулен своему другу Робену Пуспену (само собою разумеется, что эти два студента последовали за осужденным на площадь). – Сразу видно, что он смыслит не больше жука, засаженного в коробку.</p><p class="p1">В толпе пронесся оглушительный хохот, когда обнажили горбатую спину, верблюжью грудь и угловатые, обросшие волосами плечи Квазимодо. Во время этого взрыва народной веселости на площадку столба поднялся небольшого роста коренастый человек с грубым лицом, одетый в мундир городской магистратуры, и встал рядом с осужденным. Имя этого человека, передаваясь из уст в уста, с быстротою молнии облетело всю толпу. Это был мэтр Пьерá Тортерю, присяжный палач суда Шатлэ. Сначала он поставил на край площадки столба черные песочные часы, верхняя часть которых была наполнена красным песком, мерно сыпавшимся в нижнее отделение. Потом он снял с себя верхнюю двухцветную одежду, под которой у него оказалась висевшая на правой руке тонкая длинная плеть из скрученных белых лоснящихся кожаных ремешков, покрытых узлами и снабженных на концах металлическими когтями. Левою рукою палач небрежно засучил на правой руке рукав до самого плеча. Между тем Жан Фролло взобрался на плечи Робена Пуспена и, подняв свою кудрявую белокурую голову над толпою, закричал во все горло:</p><p class="p1">– Месье и медам, пожалуйте сюда! Здесь сейчас начинается интересное представление! Будут самым добросовестным образом хлестать достопочтенного мэтра Квазимодо, звонаря моего брата, господина архидьякона Жозасского. Уважаемый звонарь устроен в чисто восточном вкусе, – в этом вы можете убедиться по его куполообразной спине и ногам в виде витых колонн.</p><p class="p1">Слова студента были встречены новым взрывом хохота, в особенности со стороны молодежи и детей.</p><p class="p1">Но вот палач топнул ногой, и колесо начало вращаться. Связанный Квазимодо вздрогнул. Появившееся на его уродливом лице выражение тупого недоумения усилило смех толпы.</p><p class="p1">Вдруг, в ту самую минуту, когда колесо, повернувшись, подставило мэтру Пьера горбатую спину Квазимодо, палач поднял руку с плетью, тонкие ремни с резким свистом прорезали воздух, словно пучок змей, и со всего размаха опустились на плечи несчастного.</p><p class="p1">Квазимодо подскочил, точно внезапно разбуженный от сна. Он начинал понимать. Он стал корчиться и извиваться под ремнями. Все лицо его судорожно передернулось от не ожиданности и боли, но он не издал ни одного звука. Он только дернул головой сначала назад, потом вправо и влево, наконец замотал ею, как бык, ужаленный в бок слепнем.</p><p class="p1">За первым ударом последовал второй, затем – третий, четвертый, пятый. Колесо вертелось, и удары сыпались градом. Вскоре брызнула кровь и побежала струйками по темной спине горбуна, свистевшая же в воздухе плеть, перед тем как упасть, разбрызгивала капли крови над толпой.</p><p class="p1">Что же касается Квазимодо, то он снова, по крайней мере по внешности, впал в свою обычную апатию. Вначале он пробовал незаметно разорвать свои узы. Глаз его при этом пылал диким огнем, мускулы напрягались, все тело корчилось. Ремни было растянулись под его отчаянным геркулесовским усилием, но, несмотря на свою ветхость, все-таки с честью выдержали этот могучий напор. Они только слегка трещали, но не лопались.</p><p class="p1">Квазимодо, очевидно, понял бесполезность своей попытки и более не повторял ее. Вместо тупого равнодушия на его лицо теперь легло выражение глубокого и горького разочарования. Он закрыл свой единственный глаз, опустил голову на грудь и замер.</p><p class="p1">После этого он больше не шевелился. Казалось, ничто не могло заставить его двинуть хоть одним мускулом: ни кровь, продолжавшая литься по его исполосованной спине, ни удары плетью, сыпавшиеся на него градом, ни ярость палача, возраставшая с каждым ударом, ни резкий свист отвратительных змеевидных ремней.</p><p class="p1">Наконец, одетый с головы до ног в черное, пристав суда Шатлэ, все время сидевший верхом на черной лошади у подножия столба, протянул свой черный жезл по направлению к песочным часам. Палач мгновенно остановился. Остановилось и колесо. Глаз Квазимодо медленно раскрылся.</p><p class="p1">Истязание кончилось.</p><p class="p1">Двое слуг палача обмыли окровавленную спину наказанного, натерли ее какою-то мазью, тотчас же остановившею кровь, и накинули ему на плечи что-то вроде желтой рясы. Тем временем Пьера Тортерю стряхивал на мостовую кровь, которою была пропитана его плеть.</p><p class="p1">Однако Квазимодо еще не отделался этим. Ему предстояло пробыть на позорном столбе еще тот час, которым мэтр Флориан Барбдьён так справедливо усилил приговор мессира Робера д’Эстувиля, к вящей славе старой, но столь богатой психологическим и физиологическим смыслом игры слов Иоанна Куменского: surdus – absurdus<a href="ch2.xhtml#id203" class="a">[87]</a>.</p><p class="p1">Песочные часы перевернули и оставили горбуна привязанным к колесу, чтобы удовлетворить правосудие до конца.</p><p class="p1">Чернь, особенно средневековая, является среди общества тем же, чем ребенок среди своей семьи. Пока народ находится в состоянии первобытного невежества, умственного и нравственного несовершеннолетия, про него можно сказать то же самое, что говорят о детях: «Этот возраст не знает жалости».</p><p class="p1">Мы уже говорили, что Квазимодо был предметом общей ненависти, имевшей, впрочем, более или менее основательные причины. Едва ли во всей этой толпе, обступавшей позорный столб Гревской площади, был хоть один человек, который не считал бы себя вправе жаловаться на звонаря собора Богоматери. Поэтому его появление на позорном столбе возбудило общую радость, а жестокое истязание, которому он подвергся, и жалкое положение, в котором его оставили после бичевания, не только не возбудили сострадания в толпе, но еще усилили народную ненависть, вооружив ее жалом насмешки.</p><p class="p1">И вот лишь только были выполнены требования «закона общественного возмездия», как до сих пор еще выражаются носители четырехугольных шапок, настала очередь и тысячеголовой личной мести. Здесь, как в зале суда, больше всех неистовствовали женщины. Они все ненавидели Квазимодо: одни – за его злой нрав, другие – за его уродство. Последние прямо бесновались, глядя на него.</p><p class="p1">– У, харя антихристова! – визжала одна.</p><p class="p1">– Чертов всадник на помеле! – голосила другая.</p><p class="p1">– Ишь ведь, какую рожу корчит! – кричала третья. – Если бы вчерашний праздник был сегодня, этого урода за одну его рожу нужно было бы сделать папой шутов!</p><p class="p1">– Ах, моя милая! – прошамкала какая-то старуха. – Если он строит такую рожу у позорного столба, то какую же он скорчил бы на виселице?</p><p class="p1">– Когда же твой большой колокол вдавит тебя в землю? – доносилось с одной стороны.</p><p class="p1">– И этот-то черт звонит к вечерне? – неслось с другой. – Ах ты, глухарь!.. Кривоглазый урод!.. Горбатое чудовище!</p><p class="p1">– При одном взгляде на это чучело можно выкинуть без помощи лекарей и аптекарей!</p><p class="p1">А школьники Жан де Мулен и Робен Пуспен во все горло распевали старинный народный припев:</p><div class="poem">
<div class="stanza">
<p class="v">Une hart –</p>
<p class="v">Pour le pendart!</p>
<p class="v">Un fagot –</p>
<p class="v">Pour le magot!<a href="ch2.xhtml#id202" class="a">[88]</a></p>
</div>
</div><p class="p1">Ругательства, проклятия, оскорбительные замечания, насмешки вместе с хохотом так и сыпались на злополучного горбуна. По временам в него летели и камни.</p><p class="p1">Квазимодо был глух, но видел очень хорошо, а озлобление толпы выражалось на лицах так же ясно, как и в словах. К тому же удары камнями поясняли ему, что означают взрывы хохота.</p><p class="p1">Сначала звонарь крепился, но мало-помалу и его терпение, закалившееся под плетью палача, стало колебаться от бесчисленных уколов целой тучи насекомых. Астурийский бык, хладнокровно выдержавший нападение пикадора, приходит в ярость, когда на него накидывается свора собак и бандерильеров.</p><p class="p1">Сначала Квазимодо обвел толпу угрожающим взглядом. Но так как он был крепко связан, его взгляд не мог отогнать мух, облепивших и сосавших его раны. Он начал рваться из своих уз с такою силою, что старое колесо, к которому он был привязан, колебалось и трещало. Но все это только подливало масла в огонь: насмешки и ругательства толпы усилились.</p><p class="p1">Убедившись еще раз, что ему не порвать ремней, которыми он был связан, несчастный горбун, как дикий зверь, снова затих. Лишь по временам вздохи бешенства вздымали его уродливую грудь. На лице его не выражалось ни стыда, ни смущения. Он был слишком далек от цивилизации и слишком близок к дикому состоянию, чтобы иметь понятие о стыде. Да и возможно ли при таком уродстве, каким он отличался, быть чувствительным к позору? Но гнев, ненависть и отчаяние постепенно заволакивали его безобразное лицо темной тучей, все более и более сгущавшейся и насыщавшейся электричеством, сверкавшим тысячей молний из глаза циклопа.</p><p class="p1">Однако эта туча на мгновение просветлела, когда в толпе появился какой-то священник верхом на муле. Лишь только Квазимодо еще издали увидел этого священника, лицо его сразу смягчилось. Гримаса бешенства, еще более усилившая безобразие этого лица, сменилась какой-то странной улыбкой, полною бесконечной нежности, кротости и умиления. По мере приближения священника эта улыбка становилась яснее, теплее и лучезарнее, точно несчастный приветствовал появление своего спасителя. Но в ту минуту, когда мул очутился настолько близко от столба, что всадник мог узнать преступника, всадник опустил глаза, круто повернул своего мула и погнал его обратно. По-видимому, он спешил избавиться от унизительного положения быть узнанным жалким горемыкой, выставленным на общий позор.</p><p class="p1">Это был архидьякон Клод Фролло.</p><p class="p1">Туча на лице Квазимодо сгустилась более прежнего; сквозь нее еще мелькала улыбка, но уже улыбка горькая, скорбная, страдальческая.</p><p class="p1">Время шло. Уже полтора часа мучился Квазимодо на позорном столбе, истерзанный нравственно и физически, служа мишенью издевательств.</p><p class="p1">Вдруг он снова начал биться на колесе с удвоенной энергией отчаяния; все сооружение так затрещало, что, казалось, готово было разрушиться, и наконец он нарушил молчание, которое до сих пор так упорно хранил.</p><p class="p1">– Пить! – крикнул он глухим, сиплым, дрожавшим от бешенства голосом, напоминавшим лай разъяренного пса.</p><p class="p1">Этот вопль страдания, вырвавшийся из глубины измученной груди, вместо того чтобы разжалобить добрых парижан, окружавших столб, только усилил их веселость. Впрочем, эти парижане были нисколько не лучше той шайки бродяг, с которой мы уже познакомили читателя и которая составилась из худших отбросов общества. Если и поднимались голоса вокруг страждущего на колесе, то лишь с тем, чтобы поглумиться над его новым мучением – над жаждой.</p><p class="p1">Правда, в эту минуту, со своим красным, безобразным лицом, покрытым грязным потом, с блуждающим взором, с покрытыми пеной от бешенства и муки губами и высунутым языком, он был не столько жалок, сколько страшен и отвратителен. Да если бы в толпе и нашлась сострадательная душа, вроде евангельского самаритянина, которая была бы готова подать страдальцу кружку воды, то и она едва ли бы решилась это сделать ввиду того, что считалось унизительным и постыдным даже касаться ногой ступеней позорного столба. А господствующие предрассудки, как известно, сильнее всего.</p><p class="p1">Тщетно прождав несколько минут, Квазимодо окинул толпу взглядом отчаяния и прохрипел еще более душераздирающим голосом:</p><p class="p1">– Пить!</p><p class="p1">В ответ на это снова раздался грубый, злорадный хохот.</p><p class="p1">– Вот, на, пососи! – крикнул Робен Пуспен, бросив в лицо несчастного грязную тряпку, намоченную в луже. – Получай, подлый глухарь, от своего должника.</p><p class="p1">Какая-то женщина бросила горбуну в голову камень.</p><p class="p1">– А вот тебе за то, что ты нас будишь по ночам своим адским трезвоном! – крикнула она.</p><p class="p1">– Ну что, дружок, – спросил один калека, стараясь ткнуть несчастного своим костылем, – будешь ты теперь насылать на нас порчу с вершины соборных башен?</p><p class="p1">– На, получай посудину для питья! – крикнул какой-то мастеровой, швырнув горбуну прямо в грудь разбитую кружку. – Моя жена, мимо которой ты прошел, когда она была беременна, из-за тебя родила двухголового ребенка.</p><p class="p1">– А моя кошка из-за тебя принесла котенка с шестью лапами! – завизжала какая-то старуха и бросила в горбуна черепком.</p><p class="p1">– Пить! – в третий раз повторил Квазимодо, задыхаясь.</p><p class="p1">В эту минуту он увидал, как толпа вдруг расступилась и пропустила молодую девушку в странном наряде. Девушка держала в руке баскский бубен и шла в сопровождении белой козы с золотыми рогами.</p><p class="p1">Глаз Квазимодо засверкал. Горбун узнал в этой девушке ту самую цыганку, которую он пытался похитить в предшествующую ночь и за которую, как он смутно предполагал, его так жестоко наказывали. Но мы знаем, что это предположение было неверно: его наказывали за то, что он был глух и попался в лапы глухого судьи. Квазимодо вообразил, что и цыганка пришла лишь за тем, чтобы отомстить ему и ударить его, как все остальные.</p><p class="p1">Он видел, как цыганка быстро поднялась по ступеням позорного столба. Он задыхался от гнева и ярости. Он жаждал сокрушить столб. Если бы острый взгляд его глаза мог бы метать молнии, то египтянка была бы превращена в прах раньше, чем она дошла до площадки столба.</p><p class="p1">Безмолвно приблизившись к Квазимодо, тщетно пытавшемуся увернуться от воображаемого удара, цыганка отвязала от пояса фляжку и с ласковым видом поднесла ее к пересохшим губам страдальца.</p><p class="p1">Вдруг в его глазу, который до сих пор оставался сухим и воспаленным, выступила крупная слеза и медленно скатилась по его уродливому лицу, выражавшему до того лишь злобу и отчаяние. Быть может, это была первая слеза, пролитая жалким созданием во всю его жизнь.</p><p class="p1">Пораженный неожиданным поступком цыганки, Квазимодо даже забыл о своей жажде. Эсмеральда нетерпеливо передернула плечами и с улыбкой прижала свою фляжку к зубастому рту Квазимодо. Он жадными глотками стал утолять мучившую его жажду. Осушив фляжку, он вытянул свои почерневшие губы с явным намерением поцеловать красивую руку, оказавшую ему помощь. Но молодая девушка, по-видимому, не совсем ему доверяла и, вспомнив о его вчерашнем дерзком покушении, отдернула руку с испуганным видом ребенка, опасающегося, как бы его не укусил зверь.</p><p class="p1">Несчастный горбун устремил на нее взгляд, полный упрека и невыразимой печали.</p><p class="p1">Трогательное зрелище представляла из себя эта прелестная, цветущая и чистая девушка, которая, несмотря на свою слабость, так мужественно явилась на помощь к такому олицетворению уродства, злобы и несчастья. У позорного столба подобное зрелище было величественным.</p><p class="p1">Даже толпа невольно почувствовала себя тронутой и с криками «Noёl! Noёl!»<a href="ch2.xhtml#id201" class="a">[89]</a> стала хлопать в ладоши.</p><p class="p1">В эту-то минуту затворница из окна своей кельи увидела цыганку на вершине позорного столба и выкрикнула зловещие слова:</p><p class="p1">– О, будь ты проклята, египтянка, проклята, проклята!</p></span><span id="id36"><div class="title6">
<p class="p">V. Конец рассказа о лепешке</p>
</div><p class="p1">Эсмеральда побледнела и стала спускаться, шатаясь, а голос затворницы продолжал ее преследовать:</p><p class="p1">– Сходи, сходи, египетская воровка! Тебе опять придется взбираться туда!</p><p class="p1">– Ну, на затворницу сегодня что-то нашло! – говорили зрители. Больше они ничего не решались сказать, потому что подвижницы не только пользовались уважением в народе, но даже считались святыми. Неудобно затрагивать человека, который день и ночь проводит в молитве.</p><p class="p1">Между тем срок наказания окончился. Бедного горбуна отвязали от колеса, и толпа стала расходиться.</p><p class="p1">Магиета тоже направилась домой вместе со своими двумя спутницами. У Большого моста она вдруг остановилась:</p><p class="p1">– Эсташ, а куда ты девал лепешку?</p><p class="p1">– Ах, мама, – отвечал ребенок, – пока вы говорили с тетей, которая сидит в башне, ко мне подбежала большая собака и откусила кусок лепешки. Тогда и я откусил.</p><p class="p1">– Как, бесстыдник, – воскликнула мать, – ты съел всю лепешку?!</p><p class="p1">– Нет, мама, виновата собака. Я ей говорил, что нельзя есть эту лепешку, а она меня не послушалась. Ну, тогда и я стал есть лепешку.</p><p class="p1">– Ах, какой ты ужасный ребенок! – с притворно сердитой улыбкой проговорила Магиета. – Представьте себе, Ударда, этот малыш поедает все вишни в нашем садике в Шарльранже. Недаром дедушка говорит, что быть ему капитаном… Смотри ты у меня, Эсташ! В другой раз не спущу!.. Ну а теперь пойдем, гадкий мальчишка!</p></span></span></span>
