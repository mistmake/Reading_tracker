<p class="p">1. Урсус</p>
</div><p class="p1">Урсус и Гомо были связаны узами тесной дружбы. Урсус<a href="ch2.xhtml#id80" class="a">[151]</a> был человек, Гомо<a href="ch2.xhtml#id78" class="a">[152]</a> – волк. Нравом они очень подходили друг к другу. Имя «Гомо» дал волку человек. Вероятно, он же придумал и свое; найдя для себя подходящей кличку «Урсус», он счел имя «Гомо» вполне подходящим для зверя. Содружество человека и волка пользовалось успехом на ярмарках, на приходских праздниках, на уличных перекрестках, где толпятся прохожие; толпа всегда рада послушать балагура и накупить всяких шарлатанских снадобий. Ей нравился ручной волк, ловко, без принуждения исполнявший приказания своего хозяина. Это большое удовольствие – видеть укрощенного строптивца, и нет ничего приятней, чем наблюдать все разновидности дрессировки. Вот почему бывает так много зрителей на пути следования королевских кортежей.</p><p class="p1">Урсус и Гомо кочевали с перекрестка на перекресток, с площадей Абериствита на площади Иедбурга, из одной местности в другую, из графства в графство, из города в город. Исчерпав все возможности на одной ярмарке, они переходили на другую. Урсус жил в балагане на колесах, который Гомо, достаточно вышколенный для этого, возил днем и стерег ночью. Когда дорога становилась трудной из-за рытвин, грязи или при подъемах в гору, человек впрягался в лямку и по-братски, бок о бок с волком, тащил возок. Так они вместе и состарились.</p><p class="p1">На ночлег они располагались где придется – среди невспаханного поля, на лесной прогалине, у перекрестка нескольких дорог, у деревенской околицы, у городских ворот, на рыночной площади, в местах народных гуляний, на опушке парка, на церковной паперти. Когда возок останавливался на какой-нибудь ярмарочной площади, когда с разинутыми ртами сбегались кумушки и вокруг балагана собирался кружок зевак, Урсус принимался разглагольствовать, и Гомо с явным одобрением слушал его. Затем волк учтиво обходил присутствующих с деревянной чашкой в зубах. Так зарабатывали они себе на пропитание. Волк был образованный, человек – тоже. Волк был научен человеком или научился сам всяким, волчьим, фокусам, которые повышали сбор.</p><p class="p1">– Главное, не выродись в человека, – дружески говаривал ему хозяин.</p><p class="p1">Волк никогда не кусался, с человеком же это порою случалось. Во всяком случае Урсус имел поползновение кусаться. Урсус был мизантроп и, чтобы подчеркнуть свою ненависть к человеку, сделался фигляром. К тому же надо было как-нибудь прокормиться, ибо желудок всегда предъявляет свои права. Впрочем, этот мизантроп и скоморох, быть может, думая таким образом найти себе место в жизни поважнее и работу посложнее, был также и лекарем. Мало того, Урсус был еще и чревовещателем. Он умел говорить, не шевеля губами. Он мог ввести в заблуждение окружающих, с изумительной точностью копируя голос и интонации любого из них. Он один подражал гулу целой толпы, что давало ему полное право на звание «энгастримита». Он так себя и величал. Урсус воспроизводил всякие птичьи голоса: голос певчего дрозда, чирка, жаворонка, белогрудого дрозда – таких же скитальцев, как и он сам; благодаря этому своему таланту он мог по желанию в любую минуту вызвать у вас впечатление то площади, гудящей народом, то луга, оглашаемого мычанием стада; порою он бывал грозен, как рокочущая толпа, порою детски безмятежен, как утренняя заря. Такое дарование хотя и редко, но все же встречается. В прошедшем столетии некто Тузель, подражавший смешанному гулу людских и звериных голосов и воспроизводивший крики всех животных, состоял при Бюффоне в качестве человека-зверинца. Урсус был проницателен, крайне своеобразен и любознателен. Он питал склонность ко всяким россказням, которые мы называем баснями, и притворялся, будто сам верит им, – обычная хитрость лукавого шарлатана. Он гадал по руке, по раскрытой наобум книге, предсказывал судьбу, объяснял приметы, уверял, что встретить черную кобылу – к неудаче, но что еще опаснее услышать, когда ты уже совсем готов в дорогу, вопрос: «Куда собрался?» Он называл себя «продавцом суеверий», обычно говоря: «Я этого не скрываю; вот в чем разница между архиепископом Кентерберийским и мной». Архиепископ, справедливо возмущенный, однажды вызвал его к себе. Однако Урсус искусно обезоружил его преосвященство, прочитав перед ним собственного сочинения проповедь на день рождества Христова, которая так понравилась архиепископу, что он выучил ее наизусть, произнес с кафедры и велел напечатать как свое произведение. За это он даровал Урсусу прощение.</p><p class="p1">Благодаря своему искусству врачевателя, а может быть, и вопреки ему, Урсус исцелял больных. Он лечил ароматическими веществами. Хорошо разбираясь в лекарственных травах, он умело использовал огромные целебные силы, заключенные во множестве всеми пренебрегаемых растений – в гордовине, в белой и вечнозеленой крушине, в черной калине, бородавнике, в рамене; он лечил от чахотки росянкой, пользовался, сообразно надобности, листьями молочая, которые, будучи сорваны у корня, действуют как слабительное, а сорванные у верхушки – как рвотное; исцелял горловые болезни при помощи наростов растения, именуемого «заячьим ушком»; знал, каким тростником можно вылечить быка и какой разновидностью мяты можно поставить на ноги больную лошадь; знал все ценные, благотворные свойства мандрагоры, которая, как всем известно, является растением двуполым. У него были лекарства на всякие случаи. Ожоги он исцелял кожей саламандры, из которой у Нерона, по словам Плиния, была сделана салфетка. Урсус пользовался ретортой и колбой; он сам производил перегонку и сам же продавал универсальные снадобья. Ходили слухи, будто одно время он сидел в сумасшедшем доме; ему оказали честь, приняв его за умалишенного, но вскоре выпустили на свободу, убедившись, что он всего-навсего поэт. Возможно, что этого и не было: каждый из нас бывал жертвой подобных россказней.</p><p class="p1">В действительности же Урсус был грамотеем, любителем прекрасного и сочинителем латинских виршей. Он был ученым в двух областях, ибо одновременно шел по стопам и Гиппократа и Пиндара. В знании поэтического ремесла он мог бы состязаться с Раненом и с Видой. Он мог бы сочинять иезуитские трагедии не менее удачно, чем отец Бугур. Благодаря близкому знакомству с прославленными ритмами и размерами древних Урсус в своем обиходе пользовался ему одному свойственными образными выражениями и целым рядом классических метафор. О матери, впереди которой шествовали две дочки, он говорил: «Это дактиль»; об отце, за которым шли два его сына: «Это анапест»; о внуке, шагавшем между дедом и бабушкой: «Это амфимакрий». При таком обилии знаний можно жить только впроголодь. Салернская школа рекомендует: «Ешьте мало, но часто». Урсус ел мало и редко, выполняя, таким образом, лишь первую половину предписания и пренебрегая второй. Но это уж была вина публики, которая собиралась не каждый день и покупала не слишком часто. Урсус говорил: «Отхаркнешься поучительным изречением – станет легче. Волк находит утешение в вое, баран – в теплой шерсти, лес – в малиновке, женщина – в любви, философ же – в поучительном изречении». Урсус по мере надобности кропал комедии, которые сам же с грехом пополам и разыгрывал: это помогало продавать снадобья. В числе других творений он сочинил героическую пастораль в честь рыцаря Хью Миддлтона, который в 1608 году провел в Лондон речку. Эта речка спокойно протекала в шестидесяти милях от Лондона, в графстве Гартфорд; явился рыцарь Миддлтон и завладел ею; он привел с собою шестьсот человек, вооруженных заступами и мотыгами, стал рыть землю, понижая грунт в одном месте, повышая его в другом, иногда подымая речку на двадцать футов, иногда углубляя ее русло на тридцать футов, соорудил из дерева наземные водопроводы, построил восемьсот мостов, каменных, кирпичных и бревенчатых, и вот, в одно прекрасное утро, речка вступила в пределы Лондона, который испытывал в то время недостаток в воде. Урсус преобразил эти прозаические подробности в прелестную буколическую сцену между рекою Темзой и речкой Серпантиной. Мощный поток приглашает к себе речку, предлагая ей разделить с ним ложе. «Я слишком стар, – говорит он, – чтобы нравиться женщинам, но достаточно богат, чтобы оплачивать их». Это был остроумный и галантный намек на то, что сэр Хью Миддлтон произвел все работы за свой счет.</p><p class="p1">Урсус мастерски владел монологом. Будучи нелюдимым и вместе с тем словоохотливым, не желая никого видеть, но испытывая потребность поговорить с кем-нибудь, он выходил из затруднения, беседуя сам с собою. Кто жил в уединении, знает, до какой степени человеческой природе свойствен монолог. Слово, звучащее внутри нас, вызывает своего рода зуд. Обращаясь в пространство, мы как бы открываем предохранительный клапан. Разговор вслух наедине с собой производит впечатление диалога с Богом, которого мы носим в себе. Таково, как всем известно, было обыкновение Сократа. Он произносил речи перед самим собой. Точно так же поступал и Лютер. Урсус брал пример с этих великих мужей. Он обладал способностью, раздваиваясь, быть своей собственной аудиторией. Он задавал себе вопросы и сам отвечал на них; он превозносил себя и осыпал оскорблениями. С улицы слышно было, как он один ораторствует в своем возке. Прохожие, у которых есть свое мерило для оценки незаурядных людей, говорили: «Вот идиот!» По временам, как мы только что сказали, Урсус бранил самого себя, но бывали моменты, когда он отдавал себе должное. Как-то в одной из тех кратких речей, с которыми он обращался к себе, он с гордостью воскликнул: «Я изучил растение во всех его тайнах, я изучил стебель, почку, чашелистики, лепесток, тычинку, завязь, семяпочку, бурачок, спорангий и апотеций. Я постиг хромацию, осмосию и химосию, иными словами – образование цвета, запаха и вкуса». В этом аттестате, который Урсус выдавал Урсусу, была, несомненно, некая доля бахвальства, но пусть первым кинет в него камень тот, кто не постиг хромации, осмосии и химосии.</p><p class="p1">К счастью, Урсус никогда не бывал в Нидерландах. Там его, без сомнения, взвесили бы, чтобы определить, обладает ли он должным весом, избыток или недостаток которого свидетельствует о том, что человек – колдун. В Голландии этот должный вес был мудро установлен законом. Это было удивительно просто и остроумно. Вас клали на чашу весов – и все сразу становилось ясным: если вы оказывались слишком тяжелым, вас вешали, если слишком легким – сжигали. Еще теперь можно видеть в Удеватере весы для взвешивания колдунов, но в наши дни на этих весах взвешивают сыр, – вот во что выродилась религия! Тощему Урсусу, пожалуй, не поздоровилось бы от такого взвешивания. В своих странствиях он избегал Голландии – и хорошо делал. Впрочем, мы полагаем, что он вообще не покидал пределов Англии.</p><p class="p1">Как бы то ни было, Урсус, человек очень бедный и притом сурового нрава, завязав в лесу знакомство с Гомо, почувствовал влечение к бродяжничеству. Он взял волка себе в товарищи и стал скитаться с ним по дорогам, живя на вольном воздухе жизнью, полной всяких неожиданностей. Урсус был очень изобретателен, всегда себе на уме, весьма искусен во врачебном деле и великий мастер на всякие фокусы. Он пользовался славой хорошего лекаря и хорошего фигляра; само собою разумеется, что его считали и чародеем, но лишь отчасти, ибо (прослыть приятелем черта было в ту пору небезопасно. Говоря по правде, Урсус своим пристрастием к фармакопее и лекарственным растениям мог навлечь на себя подозрение, так как часто уходил собирать травы в угрюмые, непролазные чащи, где произрастает салат Люцифера и где, как это установил советник д’Анкр, рискуешь встретить в вечернем тумане вышедшего из-под земли человека, «кривого на правый глаз, без плаща, со шпагой на боку и совершенно босого». Но при всех странностях своего характера Урсус был слишком добропорядочным, чтобы насылать град, вызывать привидения, вихрем пляски замучить человека насмерть, внушать безмятежные или, напротив, печальные и полные ужасов сны и заклинаниями выводить из яиц четырехкрылых петухов, – подобных проделок за ним не водилось. Он был неспособен на такие мерзости, как, например, говорить по-немецки, по-древнееврейски или по-гречески, не изучив этих языков, что является признаком либо гнусного коварства, либо природной болезни, вызываемой меланхолией. Если Урсус изъяснялся по-латыни, то только потому, что знал ее. Он не позволил бы себе говорить по-сирийски, так как не знал этого языка; кроме того, доказано, что сирийский язык – язык ведьм. В медицине Урсус не без основания отдавал предпочтение Галену перед Кардано, ибо Кардано, при всей своей учености, жалкий червь по сравнению с Галеном.</p><p class="p1">В общем, Урсус не принадлежал к числу тех лиц, которых часто тревожит полиция. Его возок был достаточно длинен и широк, чтобы он мог лежать в нем на сундуке, хранившем его не слишком роскошные пожитки. Он был обладателем фонаря, нескольких париков, кое-какой утвари, развешанной на гвоздях, а также музыкальных инструментов. Кроме того, у него была медвежья шкура, которую он напяливал на себя в дни больших представлений; он называл это – облачаться в парадный костюм. «У меня две шкуры, – говорил он, – вот эта – настоящая». И он указывал на медвежью шкуру. Передвижной балаган принадлежал ему и волку. Кроме возка, реторты и волка, у него были флейта и виола-да-гамба, на которых он неплохо играл. Он сам изготовлял эликсиры. Все эти таланты иногда обеспечивали ему возможность поужинать. В потолке его лачуги было отверстие, через которое проходила труба чугунной печки, стоявшей почти вплотную к сундуку, так что деревянная стенка его даже слепка обуглилась. В печке было два отделения: в одном из них Урсус варил свои специи, в другом – картошку. По ночам волк, дружеской рукой посаженный на цепь, спал под возком. Гомо был черен, Урсус сед; Урсусу было лет пятьдесят, если не все шестьдесят. Его покорность человеческой судьбе была такова, что он, как выше упомянуто, питался картофелем, который в ту пору считался поганой пищей, годной лишь для свиней да каторжников. Он ел его, негодуя, но подчиняясь своей участи. Ростом он был невысок, но казался долговязым. Он горбился и был всегда задумчив. Согбенная спина старика – это груз прожитых лет. Урсусу на роду было написано быть печальным. Ему стоило труда улыбнуться и никогда не удавалось заплакать. Он не умел находить утешение в слезах и временное облегчение в веселье. Старик – это не что иное, как мыслящая развалина. Урсус и был такой развалиной. Краснобайство шарлатана, худоба пророка, воспламеняемость заряженной мины – таков был Урсус. В молодости он жил в качестве философа у одного лорда.</p><p class="p1">Все это происходило сто восемьдесят лет назад, в те времена, когда люди были немного более волками, чем в наши дни.</p><p class="p1">Впрочем, не намного.</p><p class="empty-line"/><p class="p1">Гомо не был обыкновенным волком. Судя по тому, как он набрасывался на кизил и на яблоки, его можно было принять за степного волка; темной окраской шерсти он походил на гиену, а воем, постепенно переходившим в лай, напоминал чилийскую дикую собаку; но зрачок этого животного еще недостаточно изучен, и, может быть, оно лишь разновидность лисицы, между тем как Гомо был настоящим волком. Длина его равнялась пяти футам, а это немалый рост для волка даже в Литве; он был очень силен; смотрел он исподлобья, но это нельзя было ставить ему в вину; язык у него был мягкий, и он иногда лизал Урсуса; по спинному хребту у него щетинилась узкая полоска короткой шерсти; он был тощ, но это была здоровая худоба лесного зверя. До своего знакомства с Урсусом, когда ему не приходилось еще таскать за собой возок, он легко пробегал по сорок лье за ночь. Урсус, натолкнувшись на него в чаще на берегу ручья, проникся к нему уважением, увидев, как он умно и осторожно ловит раков, и с удовлетворением признал в нем отличный экземпляр подлинного гвианского волка – купара, из породы так называемых собак-ракоедов.</p><p class="p1">Урсус предпочитал Гомо ослу в качестве вьючного животного. Ему было бы неприятно заставлять осла тащить возок: он слишком уважал это животное. К тому же он заметил, что осел, этот не понятый людьми четвероногий мечтатель, имеет неприятное обыкновение настораживать уши, когда философы изрекают какие-нибудь глупости. Между нами и нашей мыслью осел оказывается, таким образом, лишним свидетелем, а это стеснительно. Урсус предпочитал Гомо в качестве друга и собаке, так как полагал, что волку дружба с человеком дается труднее.</p><p class="p1">Вот почему Урсус довольствовался обществом Гомо. Гомо был для него больше, чем другом, – он был его подобием. Похлопывая волка по впалым бокам, Урсус говорил: «Я нашел свое второе издание».</p><p class="p1">Он говорил также: «Когда я умру, всякому, кто пожелает получить представление обо мне, надо будет только изучить Гомо. Я оставлю его потомству в качестве моей вернейшей копии».</p><p class="p1">Английский закон, не слишком мягкий по отношению к хищным зверям, мог бы придраться к этому волку и притянуть его к ответу за смелость, с которой он свободно появлялся в городах; но Гомо пользовался неприкосновенностью, дарованной домашним животным одним из статутов Эдуарда IV. «Всякое домашнее животное, – гласит этот статут, – может свободно следовать за своим хозяином». Кроме того, некоторое ослабление строгостей по отношению к волкам явилось результатом моды, распространившейся при последних Стюартах среди придворных дам, которые заводили вместо собак маленьких песцов, величиной с кошку, выписывая их за большие деньги из Азии.</p><p class="p1">Урсус передал Гомо часть своих талантов: научил его стоять на задних лапах, умерять свой гнев, заменяя его хмуростью, издавать глухое ворчанье вместо воя и т. д. Волк, со своей стороны, передал человеку часть волчьих познаний, научив его обходиться без крова, без хлеба, без огня и предпочитать голод в лесу рабству во дворце.</p><p class="p1">Возок Урсуса, своеобразная передвижная хижина, следовал по самым различным направлениям, не выходя, однако, за пределы Англии и Шотландии; он был установлен на четырех колесах и снабжен оглоблями для волка и лямкой для человека. Пристяжкой пользовались только при дурной дороге. Балаган был крепок, хотя и сколочен из тонких досок, обычно идущих на перегородки. Спереди у него была стеклянная дверь с маленьким балконом, своего рода кафедрой или трибуной, с которой Урсус произносил речи, а сзади – глухая дверь с форточкой. Для входа в балаган, на ночь тщательно запиравшийся засовами и замками, служила откидная подножка в три ступеньки, прилаженная на шарнирах к внутренней стороне задней двери. Немало дождей и снега перевидал возок на своем веку. Когда-то он был окрашен, но теперь уже нельзя было установить, в какой именно цвет, ибо перемены погоды действуют на дорожные возки точно так же, как смены царствований на придворных. Снаружи на стенке возка когда-то можно было разобрать на дощечке надпись черными буквами по белому полю, постепенно расплывшуюся и стершуюся:</p><p class="p1">«Золото ежегодно теряет от трения одну тысяча четырехсотую часть своего объема; это называется потерей в весе монеты; отсюда следует, что из миллиарда четырехсот миллионов золотом, находящихся в обращении на всем земном шаре, ежегодно пропадает один миллион. Этот миллион золотом распыляется, улетучивается, носится в воздухе мельчайшим прахом, попадает в человеческие легкие, проникает в нашу совесть, приглушает, обременяет, отягчает ее, соединяется с душою богачей, которые становятся от него надменными, и с душою бедняков, которые от него ожесточаются».</p><p class="p1">Надпись эту, размытую дождями и стершуюся по милости провидения, к счастью, уже нельзя было прочитать, так как весьма вероятно, что это загадочное и вместе с тем довольно прозрачное рассуждение о золоте, проникающем в легкие, пришлось бы не по вкусу шерифам, прево, маршалам и прочим носителям париков, стоящим на страже закона. Английское законодательство в ту пору шутить не любило. Быть жестоким считалось в порядке вещей. Беспощадность была исконным свойством судей, а жестокосердие – их второй натурой. Инквизиторы кишмя кишели. Джеффрис породил целое племя себе подобных.</p><p class="empty-line"/><p class="p1">Внутри возка были еще две надписи. Над сундуком на дощатой, выбеленной известкой стене было выведено от руки чернилами:</p><p class="empty-line"/><p class="p1">«Единственное, что следует знать:</p><p class="p1">Барон и пэр Англии носит на голове золотой обруч с шестью жемчужинами.</p><p class="p1">Право на корону начинается с виконта.</p><p class="p1">Виконт носит корону с неограниченным количеством жемчужин; граф – жемчужную корону, зубцы которой перемежаются с небольшими земляничными листьями; у маркиза – зубцы и листья на одном уровне; у герцога – одни зубцы, без жемчужин; у герцога королевской крови – обруч, составленный из крестов и лилий; у принца Уэльского корона такая же, как у короля, но незамкнутая.</p><p class="p1">Герцог именуется “светлейшим и могущественнейшим государем”; маркиз и граф – “высокородным и могущественным владетелем”, виконт – “благородным и могущественным господином»; барон – «истинным господином”.</p><p class="p1">Обращение к герцогу: “ваша светлость”, к остальным пэрам – “ваша милость”.</p><p class="p1">Личность лорда неприкосновенна.</p><p class="p1">Пэры – это парламент и суд, concilium et curia, законодательство и правосудие.</p><p class="p1">Most honourable (высокочтимый) значит больше, чем right honourable (досточтимый).</p><p class="p1">Лорды-пэры признаются лордами по праву рождения, лорды не пэры – лордами из учтивости; только пэры – настоящие лорды.</p><p class="p1">Лорд никогда не приносит присяги ни королю, ни на суде. Достаточно одного его слова. Он говорит: “Заверяю своей честью”.</p><p class="p1">Члены палаты общин, представляющие народ, будучи вызваны в палату лордов, смиренно обнажают головы перед лордами, сидящими в головных уборах.</p><p class="p1">Палата общин представляет билли в палату лордов через депутацию из сорока членов, которые при вручении билля отвешивают три глубоких поклона.</p><p class="p1">Лорды препровождают в палату общин свои билли через простого писца.</p><p class="p1">В случае разногласия между палатами они совместно совещаются в “расписном зале”, причем пэры сидят в шляпах, а члены палаты общин стоят с непокрытой горловой.</p><p class="p1">По закону, изданному Эдуардом VI, лорды пользуются привилегией непреднамеренного убийства. Лорд, убивший простолюдина, не подлежит преследованию.</p><p class="p1">Бароны приравниваются по рангу к епископам.</p><p class="p1">Чтобы быть бароном-пэром, надо получить от короля пожалование per baroniam integram, то есть полным баронским поместьем.</p><p class="p1">Полное баронское поместье состоит из тринадцати с четвертью дворянских ленов, каждый стоимостью в двадцать фунтов стерлингов, что составляет четыреста марок.</p><p class="p1">Баронский замок – эта “голова” баронского поместья – caput baroniae – переходит по наследству на тех же основаниях, что и корона Англии, то есть переходит к дочерям лишь при отсутствии детей мужского пола и в таком случае достается старшей дочери; caeteris filiabus aliunde satisfactis.</p><p class="p1">Бароны носят титул лорда, от саксонского laford (классическое латинское – dominus и вульгарно-латинское – lordus).</p><p class="p1">Старшие и следующие за ними сыновья виконтов и баронов – первые эсквайры королевства.</p><p class="p1">Старшие сыновья пэров имеют преимущество перед кавалерами ордена Подвязки; младшие сыновья преимущества не имеют.</p><p class="p1">Старший сын виконта в процессии следует за баронами и впереди всех баронетов.</p><p class="p1">Дочь лорда – леди, прочие английские девицы – мисс.</p><p class="p1">Все судьи признаются ниже пэров. Сержант носит капюшон из шкуры ягненка; судьи – капюшон de minuto vario – из белых шкурок любых мелких зверей, кроме горностая. Горностай носят только пэры и король.</p><p class="p1">Против лорда не допускается supplicavit<a href="ch2.xhtml#id76" class="a">[153]</a>.</p><p class="p1">Лорда нельзя посадить в обычную тюрьму. Он может быть заключен только в лондонский Тауэр.</p><p class="p1">Лорд, приглашенный в гости к королю, имеет право убить в королевском парке одну или две лани.</p><p class="p1">Лорду в его владениях предоставляется право баронского суда.</p><p class="p1">Выйти на улицу в мантии, взяв с собою для сопровождения только двух слуг, – недостойно лорда. Он может появляться лишь с целой свитой приближенных дворян.</p><p class="p1">Пэры отправляются в парламент в каретах цугом; члены палаты общин этого права не имеют. Некоторые пэры отправляются в Вестминстер в открытых двухместных колясках. Украшенные гербами и коронами коляски и кареты разрешается иметь только лордам: это одна из их привилегий.</p><p class="p1">Лорд может быть приговорен к штрафу только лордами, и притом в размере не свыше пяти шиллингов; исключение составляет герцог, которого можно оштрафовать на десять шиллингов.</p><p class="p1">Лорд может иметь у себя в доме шесть иностранцев. Всякий другой англичанин – только четырех.</p><p class="p1">Лорд может беспошлинно держать у себя в погребе восемь бочек вина.</p><p class="p1">Только лорд не подлежит явке к окружному шерифу.</p><p class="p1">Лорд не может быть облагаем податью на содержание войска.</p><p class="p1">Когда это угодно лорду, он на свои средства набирает полк и предоставляет его в распоряжение короля; так поступают их светлости герцог Атольский, герцог Гамильтон и герцог Нортемберлендский.</p><p class="p1">Лорд может быть судим только лордами.</p><p class="p1">В гражданских делах он может требовать пересмотра и отмены решения, если в составе суда не было по крайней мере одного дворянина.</p><p class="p1">Лорд сам назначает своих капелланов.</p><p class="p1">Барон назначает трех капелланов, виконт – четырех, граф и маркиз – пять, герцог – шесть.</p><p class="p1">Лорд не может быть подвергнут пытке даже при обвинении в государственной измене.</p><p class="p1">Лорд не может быть заклеймен палачом.</p><p class="p1">Лорд всегда считается ученым человеком, даже если он не умеет читать. Он грамотен по праву рождения.</p><p class="p1">Герцог появляется под балдахином всюду, за исключением тех мест, где присутствует король; виконт имеет балдахин у себя дома; у барона есть кубок с крышкой для пробы вина, крышку слуга держит под кубком, пока барон пьет; баронесса в присутствии виконтессы имеет право пользоваться услугами одного человека для ношения шлейфа.</p><p class="p1">Восемьдесят шесть лордов или старших сыновей лордов занимают председательские места за восемьюдесятью шестью столами на пятьсот приборов каждый, накрываемыми ежедневно в королевском дворце за счет округи, в которой расположена королевская резиденция.</p><p class="p1">Простолюдину, ударившему лорда, отсекают кисть руки.</p><p class="p1">Лорд почти то же, что король.</p><p class="p1">Король почти то же, что бог.</p><p class="p1">Вся земля – собственность лордов.</p><p class="p1">Англичане, обращаясь к Богу, называют его “милорд”».</p><p class="empty-line"/><p class="p1">Против этой надписи можно было прочесть другую, написанную таким же способом. Вот она:</p><p class="empty-line"/><p class="p1">«Утешение, которым должны довольствоваться те, кто ничего не имеет.</p><p class="p1">Генрих Оверкерк, граф Грентэм, заседающий в палате лордов между графом Джерси и графом Гриничем, имеет сто тысяч фунтов стерлингов ежегодного дохода. Его милости принадлежит дворец Грентэм-Террас, выстроенный из мрамора и знаменитый своим лабиринтом коридоров, представляющим собою настоящую достопримечательность. В этом дворце есть алый коридор из саранколинского мрамора, коридор из астраханской лумачеллы, белый – из ланийского мрамора, черный – из алабандского мрамора, серый – из старемского мрамора, желтый – из гессенского мрамора, зеленый – из тирольского, красный – наполовину из крапчатого богемского мрамора, наполовину из кордовской лумачеллы, темно-синий – из генуэзского мрамора, фиолетовый – из каталонского гранита, траурный – из сланцев Мурвиедро с белыми и черными прожилками, розовый – из альпийского циполина, жемчужный – из нонетской лумачеллы и разноцветный коридор, называемый “придворным”, – из пестрой брекчии.</p><p class="p1">Ричард Лаутер, виконт Лонсдейл, имеет в Уэстморленде замок Лаутер; необыкновенно пышный подъезд этого замка как бы приглашает королей посетить его.</p><p class="p1">Ричард, граф Скарборо, виконт и барон Лэмлей, виконт Уотерфорд в Ирландии, лорд-лейтенант и вице-адмирал графства Нортемберлендского, графства Дерхемского с одноименным городом, владеет двумя поместьями в Стэнстеде, старым и новым, в котором всеобщее внимание привлекает великолепная решетка, охватывающая полукругом бассейн с фонтаном необычайной красоты. Сверх того ему принадлежит замок в Лэмлее.</p><p class="p1">Роберту Дарси, графу Холдернесу, принадлежит родовой замок Холдернес с баронскими башнями и огромным французским парком, в котором он совершает прогулки в карете, запряженной шестеркой лошадей, с двумя форейторами, как и подобает пэру Англии.</p><p class="p1">Чарльз Боклерк, герцог Сент-Олбенс, граф Барфорд, барон Хеддингтон, первый сокольничий Англии, рядом с королевским дворцом в Виндзоре владеет дворцом, нисколько не проигрывающим от этого соседства.</p><p class="p1">Чарльз Бодвилл, лорд Робертс, барон Труро, виконт Бодмин, владеет в Кембридже поместьем Уимпл, где выстроены три дворца с тремя фронтонами, из коих один в виде арки, а два треугольные. Въездная аллея обсажена четырьмя рядами деревьев.</p><p class="p1">Высокородный и могущественный лорд Филипп Герберт, виконт Кардиф, граф Монтгомери, граф Пемброк, пэр и владетель Кендола, Мармиона, Сент-Квентина и Чарленда, смотритель прудов в графствах Корнуэле и Девоне, наследственный наблюдатель коллегии Иисуса, является собственником чудесного Уилстонского сада, в котором, есть два фонтана, превосходящие красотою версальские фонтаны христианнейшего короля Людовика XIV.</p><p class="p1">Чарльз Сеймур, герцог Сомерсетский, владеет на Темзе виллой Сомерсет-Хауз, ничем не уступающей вилле Памфили в Риме. На величественном камине обращают на себя внимание две китайские фарфоровые вазы эпохи Юаньской династии, оцениваемые в полмиллиона на французские деньги.</p><p class="p1">В Йоркшире Артур, лорд Ингрэм, виконт Ирвин, владеет дворцом Темпл-Ньюшем, к которому подъезжают через триумфальную арку; широкие и плоские крыши этого дворца похожи на мавританские террасы.</p><p class="p1">Роберту, лорду Феррерс-Чартлею, Борчиру и Ловену, принадлежит в Лестершире замок Стаунтон-Гарольд с парком, имеющим форму храма с фронтоном; большая церковь с четырехугольной колокольней, высящаяся на берегу пруда, входит в состав поместья.</p><p class="p1">В графстве Нортгемптон Чарльз Спенсер, граф Сандерленд, член тайного совета его величества, владеет поместьем Олтроп, в которое въезжают через кованые железные ворота на четырех столбах, украшенных мраморными группами.</p><p class="p1">Лоуренсу Хайду, графу Рочестеру, принадлежит в Серрее поместье Нью-Парк, с замком, украшенным художественно изваянным акротерионом, с обсаженной деревьями круглой лужайкой и дубравами, на опушке которых высится искусно закругленная горка, увенчанная большим, издалека видным дубом.</p><p class="p1">Филипп Стенхоп, граф Честерфилд, владеет в Дербишире поместьем Бредби, в котором есть великолепный павильон с часами, соколиный двор, кроличьи садки и прелестные пруды, четырехугольные и овальные, в том числе один в форме зеркала, с двумя фонтанами, бьющими очень высоко.</p><p class="p1">Лорду Корнуэлу, барону Ай, принадлежит Бром-Холл – дворец четырнадцатого века.</p><p class="p1">Высокородный Олджернон Кейпл, виконт Молден, граф Эссекс, владеет в Гартфордшире замком Кешиобери, имеющим форму буквы “Н”, и лесными угодьями, изобилующими дичью.</p><p class="p1">Лорду Чарльзу Оссалстоуну принадлежит в Миддлсексе замок Доули, окруженный садами в итальянском вкусе.</p><p class="p1">Джемс Сесил, граф Солсбери, в семи лье от Лондона владеет дворцом Гартфилд-Хауз, с четырьмя господскими павильонами, с дозорной башней в центре и парадным двором, выложенным белыми и черными плитами, как в Сен-Жермене. Дворец этот, занимающий по фасаду двести семьдесят два фута, был выстроен в царствование Иакова I государственным казначеем Англии, прадедом нынешнего владельца. Кровать одной из графинь Солсбери стоит несметных денег: она целиком сделана из бразильского дерева, признанного вернейшим средством от змеиного укуса, которое называется milhombres, что значит “тысяча мужчин”. На этой кровати золотыми буквами выведена надпись: “Honni soit qui mal y pense”<a href="ch2.xhtml#id74" class="a">[154]</a>.</p><p class="p1">Эдуард Рич, граф Уорик и Холленд, – собственник замка Уорик-Касл, где камины топят целыми дубами.</p><p class="p1">В приходе Севн-Оукс Чарльзу Секвиллу, барону Бекхерсту, виконту Кренфилду, графу Дорсету и Миддлсексу, принадлежит поместье Ноул, по величине не уступающее городу; в нем выстроены параллельно друг другу три дворца, длинных, как линии пехоты; на главном здании с лицевой стороны – десять ступенчатых щипцов, а над воротами замковая башня, окруженная четырьмя малыми башнями.</p><p class="p1">Томас Тинн, виконт Уэймет, барон Уорминстер, – собственник дворца Лонг-Лит, в котором почти столько же каминов, фонарей, беседок, арок, павильонов, башенок круглых, башенок со шпилями, сколько и в замке Шамбор во Франции, принадлежащем королю.</p><p class="p1">Генри Ховард, граф Сэффолк, владеет в двенадцати лье от Лондона, в Миддлсексе, дворцом Одлейн, почти не уступающим размерами и величественностью Эскуриалу испанского короля.</p><p class="p1">В Бедфордшире Рест-Хауз-энд-Парк, обнесенный рвами и стенами, – целая округа с лесами, реками, холмами – составляет собственность маркиза Генри Кента.</p><p class="p1">В Гартфорде Гемптон-Корт с огромной зубчатой башней и садом, который отделен от леса прудом, принадлежит Томасу, лорду Конингсби.</p><p class="p1">Графу Роберту Линдсею, лорду и наследственному владельцу Уолхемского леса, принадлежит в Линкольншире замок Гримсторф с длинным фасадом, украшенным высокими башенками в виде частокола, с парками, прудами, фазаньими дворами, овчарнями, лужайками, рощами, площадками для игр, высокоствольными деревьями, узорными цветниками, разбитыми на квадраты и ромбы и похожими на большие ковры, с полянами для состязаний в верховой езде и с величественной круговой аллеей, служащей въездом в замок.</p><p class="p1">В Сессексе высокочтимому Форду, лорду Грею, виконту Глендейлу и графу Танкарвиллу, принадлежит большой квадратный замок с двумя симметрически расположенными по обеим сторонам парадного двора флигелями, над которыми высятся дозорные башни.</p><p class="p1">Дворец Ньюхем Пэдокс, в Уорикшире, со стеклянным четырехскатным щипцом и с двумя четырехугольными рыбными садками в парке, составляет собственность графа Денби, который в Германии носит еще титул графа Рейнфельден.</p><p class="p1">Замок Уайтхем в графстве Берк с французским парком, в котором сооружены четыре грота из тесаного камня, с его высокой зубчатой башней, подпираемой двумя крепостного типа контрфорсами, принадлежит лорду Монтегю, графу Эбингдону, который является также собственником баронского замка Райкот, над въездными воротами которого красуется девиз: “Virtus ariete fortior”<a href="ch2.xhtml#id72" class="a">[155]</a>.</p><p class="p1">Уильям Кавендиш, герцог Девонширский, владеет шестью замками, и в том числе двухэтажным Четсуортом, отлично выдержанным в греческом стиле; кроме того, его светлости принадлежит в Лондоне дворец с фигурой льва, обращенной спиною к королевскому дворцу.</p><p class="p1">Виконт Кинелмики, ирландский граф Корк, владеет в Пикадилли дворцом Барлингтон-Хауз, с обширными садами, простирающимися за пределы Лондона. Ему также принадлежит дворец Чизуик, состоящий из девяти великолепных зданий, и Ландсборо, где рядом со старым дворцом выстроен новый.</p><p class="p1">Герцог Бофорт – собственник Челси, состоящего из двух дворцов в готическом стиле и одного во флорентийском; ему же принадлежит в Глостере дворец Бедмингтон, от которого лучами расходятся во все стороны прекрасные широкие аллеи. Высокородный и могущественный принц Генри, герцог Бофорт, носит также титул маркиза и графа Уостера, барона Раглана, барона Пауэра и барона Герберт-Чипстоу.</p><p class="p1">Джон Холле, герцог Ньюкасл и маркиз Клер, владеет замком Болсовер, четырехугольная дозорная башня которого производит величественное впечатление, а также замком Хоутон в Ноттингеме, где есть бассейн с круглой пирамидой в центре, наподобие вавилонской башни.</p><p class="p1">Лорд Вильям Кревен, барон Кревен-Хемпстед, имеет в Уорикшире свою резиденцию – Комб-Эбей, с самым красивым фонтаном в Англии, а в Беркшире два баронских замка: Хемпстед-Маршал с фасадом, украшенным пятью стеклянными балконами в готическом стиле, и Эсдоун-Парк, выстроенный в лесу на скрещении двух дорог.</p><p class="p1">Лорд Линней Кленчарли, барон Кленчарли-Генкервилл, маркиз Корлеоне Сицилийский, владеет замком Кленчарли, выстроенным в 914 году Эдуардом Старым для защиты от датчан; ему же принадлежат дворцы: Генкервилл-Хауз в Лондоне и Корлеоне-Лодж в Виндзоре, а также восемь кастелянств: в Брукстоне на Тренте, с правом разработки алебастровых копей, затем Гемдрайт, Хомбл, Морикемб, Тренуордрайт, Хелл-Кертерс с замечательным источником, Пиллинмор с торфяными болотами, Рикелвер близ старинного города Уайнкаунтон на горе Мойл-Энли; затем девятнадцать небольших городков и деревень с правом феодального суда над населением, а также вся округа Пенснет-Чейз, что в совокупности приносит его милости сорок тысяч фунтов стерлингов годового дохода.</p><p class="p1">Сто семьдесят два пэра, облеченных властью в царствование Иакова II, получают в совокупности миллион двести семьдесят две тысячи фунтов стерлингов годового дохода, что составляет одиннадцатую часть доходов Англии».</p><p class="empty-line"/><p class="p1">Сбоку, против последнего имени, лорда Линнея Кленчарли, рукою Урсуса была сделана пометка:</p><p class="empty-line"/><p class="p1">«Мятежник; в изгнании; имущество, земли и поместья под секвестром. И поделом».</p><p class="empty-line"/><p class="p1">Урсус восхищался Гомо. Мы восхищаемся тем, что нам близко. Это – закон.</p><p class="p1">Внутренним состоянием Урсуса была постоянная глухая ярость; его внешним состоянием была ворчливость. Урсус принадлежал к числу тех, кто недоволен мирозданием. В системе природы он выполнял роль оппозиции. Он видел мир с его дурной стороны. Никто и ничто на свете не удостаивалось его одобрения. Для него сладость меда не оправдывала укуса пчелы; распустившаяся на солнце роза не оправдывала желтой лихорадки или рвоты желчью, вызванных тем же солнцем. Возможно, что наедине с самим собой Урсус резко осуждал господа. Он говорил: «Очевидно, дьявола надо держать на привязи, и вина Бога, что он спустил его с цепи». Он одобрял только владетельных особ, но выказывал это одобрение довольно своеобразно. Однажды, когда Иаков II принес в дар Богоматери ирландской католической часовни тяжелую золотую лампаду, Урсус, как раз проходивший мимо этой часовни с Гомо, который, впрочем, относился к таким событиям более равнодушно, стал во всеуслышание выражать свой восторг. «Несомненно, – воскликнул он, – Богородица гораздо больше нуждается в золотой лампаде, чем вот эта босоногая детвора – в башмаках!»</p><p class="p1">Такие доказательства «благонамеренности» Урсуса и его очевидное уважение к властям предержащим, вероятно, немало содействовали тому, что власти довольно терпимо относились к его кочевому образу жизни и необычайному союзу с волком. Иногда вечерком он по дружеской слабости разрешал Гомо немного поразмяться и побродить на свободе вокруг возка. Волк был бы неспособен злоупотребить доверием – и в «обществе», то есть на людях, вел себя смирнее пуделя. Однако попадись он в дурную минуту на глаза полицейским, не миновать бы неприятностей; вот почему Урсус старался как можно чаще держать ни в чем не повинного волка на цепи.</p><p class="p1">С точки зрения политической его надпись насчет золота, ставшая совсем неразборчивой, да к тому же малопонятная по существу, представлялась простой мазней на фасаде балагана и не навлекала на Урсуса никаких подозрений. Даже после Иакова II и в «досточтимое» царствование Вильгельма и Марии возок Урсуса спокойно разъезжал по глухим городкам английских графств. Урсус исколесил всю Великобританию, продавая свои чудодейственные зелья и снадобья и проделывая с помощью волка шарлатанские фокусы странствующего лекаря; он легко ускользал от сетей полиции, раскинутых в ту пору по всей Англии для очистки страны от бродячих шаек и главным, образом для задержания «компрачикосов».</p><p class="p1">В сущности это было справедливо. Урсус не принадлежал ни к какой бродячей шайке. Урсус жил вдвоем с Урсусом, и только волк, осторожно просовывая между ними свою морду, нарушал эту беседу с самим собой. Пределом мечтаний Урсуса было родиться караибом. Но так как это было вне его власти, он стал отшельником. Отшельничество – это та слабо выраженная форма дикарства, которую соглашается терпеть цивилизованное общество. Чем дольше мы скитаемся по свету, тем более мы одиноки. Этим объяснялись постоянные странствования Урсуса. Долгое пребывание в одном каком-нибудь месте казалось ему переходом от свободного состояния к неволе. Вся его жизнь прошла в скитаниях. При виде города в нем возрастала тяга к чаще, к лесным дебрям, к пещерам в скалах. В лесу он был у себя дома. Но глухой гул толпы на площадях не смущал его, так как напоминал ему шум лесных деревьев. В известной мере толпа удовлетворяет склонности к отшельничеству. Если что и не нравилось Урсусу в его повозке, то только дверь и окно, придававшие ей сходство с настоящим домом. Он достиг бы своего идеала, если бы мог поставить на колеса пещеру и путешествовать в ней.</p><p class="p1">Мы уже говорили, что Урсус не улыбался; он только смеялся – временами даже часто; но это был горький смех. В улыбке всегда есть некие начала примирения, тогда как смех часто выражает собою отказ примириться.</p><p class="p1">Главной особенностью Урсуса была ненависть к роду человеческому. В этой ненависти он был неумолим. Он пришел к твердому убеждению, что человеческая жизнь отвратительна; он заметил, что существует своего рода иерархия бедствий: над королями, угнетающими народ, есть война, над войною – чума, над чумою – голод, а над всеми бедствиями – глупость людская; удостоверившись, что уже самый факт существования является в какой-то мере наказанием, и видя в смерти избавление, он тем не менее лечил больных, которых к нему приводили. У него были укрепляющие лекарства и снадобья для продления жизни стариков. Он ставил на ноги калек и потом язвительно говорил им: «Ну вот, ты снова на ногах. Можешь теперь вволю мыкаться в этой юдоли слез». Увидев нищего, умирающего от голода, он отдавал ему все деньги, какие у него были, и сердито ворчал: «Живи, несчастный! Ешь! Старайся протянуть подольше! Уж только не я сокращу сроки твоей каторги». Затем, потирая руки, он приговаривал: «Я делаю людям все зло, какое только в моих силах».</p><p class="p1">Через окошечко в задней стене балагана прохожие имели возможность прочитать на потолке его надпись углем крупными) буквами: «Урсус-философ».</p></span></span></span></span>
