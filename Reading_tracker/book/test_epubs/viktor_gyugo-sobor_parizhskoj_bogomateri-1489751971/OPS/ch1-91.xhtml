<p class="p">9. Abyssus abyssum vocat – Бездна призывает бездну</p>
</div><p class="p1">Исчезло и другое лицо – Том-Джим-Джек. Он вдруг перестал появляться в Тедкастерской гостинице.</p><p class="p1">Люди, которым их общественное положение позволяло видеть обе стороны великосветской жизни лондонской знати, вероятно заметили, что в то же самое время в «Еженедельной газете», между двумя выписками из приходских метрических книг, появилось известие об «отъезде лорда Дэвида Дерри-Мойра, коему, согласно повелению Ее Величества», предстояло снова принять командование фрегатом, крейсирующим в составе «белой эскадры» у берегов Голландии.</p><p class="p1">Урсус заметил, что Том-Джим-Джек больше не посещает «Зеленый ящик»; это очень занимало его. Том-Джим-Джек не показывался с того дня, как уехал в одной карете с дамой, заплатившей квадрупль. Конечно, этот Том-Джим-Джек, похищавший герцогинь, был загадкой. Как было бы интересно углубиться в исследование такого происшествия! Сколько тут возникало вопросов! Сколько можно было бы высказать по этому поводу замечаний! Именно потому Урсус и не обмолвился ни словом.</p><p class="p1">Немало повидав на своем веку, он знал, как жестоко можно обжечься на дерзком любопытстве. Любопытство всегда должно соразмеряться с положением любопытствующего. Подслушивая – рискуешь ухом, подсматривая – рискуешь глазом. Ничего не видеть и ничего не слышать – самое благоразумное. Том-Джим-Джек сел в княжескую карету, хозяин гостиницы видел, как он садился. Матрос, занявший место рядом с леди, казался каким-то чудом, и это заставило Урсуса насторожиться. Прихоти знатных людей должны быть священны для лиц низкого звания. Всем этим существам, пресмыкающимся во прахе, всем, кого высокородные люди называют чернью, не остается ничего лучшего, как забиться в свою нору, когда они замечают что-нибудь необычайное. Лишь тот в безопасности, кто сидит смирно. Закройте глаза, если вам не посчастливилось родиться слепым; заткните уши, если, на свою беду, вы не глухи; крепко держите язык за зубами, если вы не настолько совершенны, чтобы быть немым. Великие мира сего становятся тем, чем им хочется быть, малые – чем могут; посторонимся же перед неведомым. Не будем тревожить мифологию, не будем доискиваться смысла видимых явлений; почтительно преклонимся перед их показной стороной. Оставим досужие толки об угасании или рождении светил, происходящем в высоких сферах по причинам, нам неизвестным. Для нас, ничтожных людишек, это по большей части оптический обман. Метаморфозы – дело богов; внезапные превращения и исчезновения случайно встреченных знатных особ, парящих где-то в высоте над нами, – туманные события, понять которые невозможно, а изучать опасно. Излишнее внимание раздражает олимпийцев, занятых своими развлечениями и причудами; берегитесь, удар грома может разъяснить вам лучше слов, что бык, к которому вы слишком пристально присматриваетесь, не кто иной, как Юпитер. Не будем же распахивать складки серой мантии, облекающей страшных властителей наших судеб. Равнодушие – это благоразумие. Не шевелитесь – в этом ваше спасение. Притворитесь мертвым, и вас не убьют. К этому сводится мудрость насекомого. Урсус следовал ей.</p><p class="p1">Хозяин гостиницы, чрезвычайно заинтригованный, однажды обратился к Урсусу:</p><p class="p1">– А знаете, Том-Джим-Джек что-то больше не показывается.</p><p class="p1">– Вот как? – ответил Урсус. – А я и не заметил.</p><p class="p1">Никлс пробормотал что-то, должно быть не слишком почтительное, насчет близости Том-Джим-Джека к герцогской карете, но так как его слова показались Урсусу слишком неосторожными, старик притворился, будто не расслышал их.</p><p class="p1">Однако Урсус был слишком артистической натурой, чтобы не-сожалеть о Том-Джим-Джеке. Он был до известной степени разочарован. Своими впечатлениями он поделился только с Гомо, единственным наперсником, в чьей скромности он был уверен. Он шепнул на ухо волку:</p><p class="p1">– С тех пор как Том-Джим-Джек больше не приходит, я ощущаю пустоту как человек и холод как поэт.</p><p class="p1">Излив свою печаль дружескому сердцу, Урсус почувствовал некоторое облегчение.</p><p class="p1">Он ни звуком не обмолвился об этом в разговоре с Гуинпленом, а тот в свою очередь ни разу не упомянул о Том-Джим-Джеке.</p><p class="p1">В самом деле, Гуинплен был всецело поглощен Деей, и его мало интересовал Том-Джим-Джек.</p><p class="p1">С каждым днем Гуинплен все больше забывал о незнакомке. Что касается Деи, она и не подозревала о смятении, овладевшем на короткий срок душою ее возлюбленного. К этому же времени прекратились и всякие слухи о заговоре против «Человека, который смеется», о каких бы то ни было жалобах на него. Ненавистники, по-видимому, успокоились. Все волнения улеглись и в «Зеленом ящике» и вокруг него. Комедианты и священники точно сквозь землю провалились. Замерли последние раскаты грома. Успеху бродячей труппы уже не грозило ничто. Иногда в человеческой судьбе внезапно наступает такая полоса безмятежной тишины. Ни малейшая тень не омрачала в это время безоблачного счастья Гуинплена и Деи. Мало-помалу оно дошло до той точки, где останавливается всякий рост. Есть слово, обозначающее такое состояние, – апогей. Подобно морскому приливу, счастье порою достигает своего высшего уровня. Единственное, что еще тревожит вполне счастливых людей, – это мысль о том, что за приливом неизбежно следует отлив.</p><p class="p1">Опасности можно избежать двумя способами: либо стоять очень высоко, либо очень низко. Второй способ едва ли не лучше первого. Инфузорию раздавить труднее, чем настигнуть стрелою орла. Если кто-нибудь на земле мог благодаря своему скромному положению чувствовать себя в безопасности, – это были, как мы уже сказали, Гуинплен и Дея: никогда это чувство безопасности не было полнее, чем в ту пору. Они все больше и больше жили друг другом, отражаясь – он в ней, она в нем. Сердце впитывает в себя любовь, словно некую божественную соль, сохраняющую его; этим объясняется нерасторжимая связь двух существ, полюбивших друг друга на заре жизни, и свежесть любви, продолжающейся и в старости. Любовь как бы бальзамируется. Дафнис и Хлоя превращаются в Филемона и Бавкиду. Такая старость, когда вечерняя заря походит на утреннюю, по-видимому, ждала Гуинплена и Дею. А пока они были молоды.</p><p class="p1">Урсус наблюдал эту любовь, как медик, производящий наблюдения в клинике. У него был, как выражались в то время, «гиппократовский взгляд». Он останавливал на хрупкой и бледной Дее свой проницательный взор и бормотал себе под нос:</p><p class="p1">– Какое счастье, что она счастлива!</p><p class="p1">Другой раз он говорил:</p><p class="p1">– Она счастлива, это необходимо для ее здоровья!</p><p class="p1">Он покачивал головой и иногда принимался читать Авиценну в переводе Вописка Фортуната, изданном в Лувене в 1650 году, – старинный фолиант, в котором его интересовал раздел, трактующий о «сердечных недугах».</p><p class="p1">Дея быстро уставала, часто у нее выступала испарина, она легко впадала в дремоту и, как помнит читатель, всегда отдыхала днем. Однажды, когда она опала на медвежьей шкуре, а Гуинплена не было в «Зеленом ящике», Урсус осторожно наклонился над ней и приложил ухо к ее груди в том месте, где находится сердце. Он послушал несколько мгновений, потом, выпрямившись, прошептал:</p><p class="p1">– Малейшее потрясение для нее опасно. Болезнь быстрыми шагами пошла бы вперед.</p><p class="p1">Толпа продолжала стекаться на представления «Побежденного хаоса». Успех «Человека, который смеется» казался нескончаемым. Все опешили посмотреть Гуинплена, и теперь это были уже не только жители Саутворка, но в какой-то мере и Лондона. Публика теперь собиралась смешанная: она не состояла уже из одних только матросов и возчиков; по мнению дядюшки Никлса, бывшего знатоком всякого сброда, в толпе зрителей бывали теперь и дворяне и даже баронеты, переодетые простолюдинами. Переодевание – одно из излюбленных развлечений знати; в то время оно было в большой моде. Появление аристократии среди черни было хорошим признаком и свидетельствовало о том, что «Человек, который смеется» завоевывает и Лондон. Положительно, слава Гуинплена уже проникала в круги высокородной публики. В этом не было никаких сомнений. В Лондоне только и говорили, что о «Человеке, который смеется». О нем говорили даже в «Могок-клубе», где бывали только лорды.</p><p class="p1">В «Зеленом ящике» об этом не подозревали; его обитатели довольствовались собственным счастьем. Для Деи было высшим блаженством каждый вечер прикасаться к курчавым, непокорным волосам Гуинплена. В любви главное – привычка. В ней сосредоточивается вся жизнь. Ежедневное появление солнца – привычка Вселенной. Вселенная – влюбленная женщина, и солнце – ее возлюбленный.</p><p class="p1">Свет – ослепительная кариатида, поддерживающая весь мир. Каждый день – это длится только одно божественное мгновение – земля, еще в покрове ночи, опирается на восходящее солнце. Слепая Дея испытывала такое же чувство возврата тепла и возрождения надежды в ту минуту, когда прикасалась рукой к голове Гуинплена.</p><p class="p1">Быть двумя безвестными, боготворящими друг друга; любить в совершенном безмолвии – да так и целая вечность прошла бы незаметно!</p><p class="p1">Однажды вечером, по окончании спектакля, Гуинплен, изнемогая от избытка блаженства, от которого, как от опьяняющего аромата цветов, сладостно кружится голова, бродил, как обычно, по лугу, неподалеку от «Зеленого ящика». Бывают часы, когда сердце до того переполнено чувствами, что уже не в силах вместить их. Ночь была темна и безоблачна; в небе ярко сияли звезды. Площадь была безлюдна; сон и забвение безраздельно царили в деревянных бараках, разбросанных по всему пространству Таринзофилда.</p><p class="p1">В одном лишь месте горел огонь: это был фонарь Тедкастерской гостиницы, полуоткрытая дверь которой поджидала возвращения Гуинплена.</p><p class="p1">На колокольнях пяти саутворкских приходских церквей только что пробило полночь; на каждой колокольне бой часов не совпадал по времени с остальными и отличался от них по звуку.</p><p class="p1">Гуинплен думал о Дее. Да и о чем другом мог он еще думать? Но в этот вечер он чувствовал какое-то странное смятение; весь во власти очарования, к которому примешивалась и тревога, он думал о Дее иначе, чем всегда, он думал о ней, как думает мужчина о женщине. Он упрекал себя за это. Ему казалось, что это принижает его любовь. В нем глухо начинало бродить желание. Сладостное и повелительное нетерпение. Он переходил незримую границу, по одну сторону которой – девственница, а по другую – женщина. Он тревожно вопрошал себя, он как бы внутренне краснел. Прежний Гуинплен мало-помалу изменился; сам того не сознавая, он возмужал. Прежде стыдливый юноша, он испытывал теперь смутное, волнующее влечение. У нас есть ухо, обращенное к свету, – им мы внемлем голосу разума, – и другое, обращенное в сторону тьмы, которым мы прислушиваемся к тому, что говорит инстинкт; именно в это ухо, служившее рупором мрака, неведомые голоса настойчиво шептали что-то Гуинплену. Как бы ни был чист душою юноша, мечтающий о любви, между ним и его мечтою встанет в конце концов некий телесный образ женщины. Грезы его теряют свою безгрешность. Им овладевают стремления, внушаемые самой природой, в которых он сам боится себе признаться. Гуинплена страстно влекло к живой, телесной прелести женщины, которая является источником всех наших искушений и которой недоставало бесплотному образу Деи. В горячке, казавшейся ему чем-то опасным, он преображал, быть может, не без некоторого страха, ангельский облик Деи, придавая ему черты земной женщины. Ты нужна нам, женщина!</p><p class="p1">Излишек райской невинности в конце концов перестает удовлетворять любовь. Она жаждет лихорадочно горячей руки, трепета жизни, испепеляющего поцелуя, после которого уже нет возврата, беспорядочно разметавшихся волос, страстных объятий. Звездная высота мешает. Эфир слишком тягостен для нас. В любви избыток небесного – то же, что избыток топлива в очаге: пламя не может разгореться. Теряя рассудок, Гуинплен отдавался во власть упоительно-страшного видения: перед ним возникал образ Деи, доступной обладанию, Деи покорной, отдающейся в минуту головокружительной близости, связующей два существа тайной зарождения новой жизни. «Женщина!» Он слышал в себе этот зов, идущий из самых недр природы. Словно новый Пигмалион, создающий Галатею из лазури, он в глубине души дерзновенно изменял очертания целомудренного облика Деи – облика, слишком небесного и недостаточно райского; ибо рай – это Ева, а Ева была женщиной, рождающей желание, матерью, кормилицей земного, в чьем священном чреве таились все грядущие поколения, в чьих сосцах не иссякало молоко, чья рука качала колыбель новорожденного мира. Женская грудь и ангельские крылья несовместимы. Девственность – лишь обетование материнства. Однако до сих пор в мечтах Гуинплена Дея стояла выше всего плотского. Теперь же, в смятении, он мысленно пытался низвести ее, ухватившись за ту нить, которая всякую девушку связывает с землею. Эта нить – пол. Ни одной из этих легкокрылых птиц не дано реять на свободе. Дея, подобно всем остальным, была подвластна законам природы, и Гуинплен, лишь наполовину сознаваясь себе в этом, жаждал, чтоб она им подчинилась. Это желание возникало в нем помимо его воли, и он все время боролся с ним. В воображении он наделял Дею чертами земной женщины. Он дошел до того, что представлял себе нечто невозможное: Дею – существом, вызывающим не только экстаз, но и страсть, Дею, склоняющую голову к нему на подушку. Он стыдился этих кощунственных видений; какая-то сила внутри его пыталась унизить образ Деи; он сопротивлялся наваждению, отворачивался от этих картин, потом снова к ним возвращался; ему казалось, что он покушается на целомудрие девушки. Дея была для него как бы в облаке. Весь трепеща, он раздвигал это облако, точно приподымал покровы. Стоял апрель.</p><p class="p1">Спинной мозг тоже грезит на свой лад.</p><p class="p1">Гуинплен шагал наудачу, рассеянно, слегка раскачиваясь, как это иногда делают люди, неторопливо прогуливаясь в одиночестве. Когда рядом нет никого, это предрасполагает к безрассудным мечтаниям. Куда устремлялась его мысль? Он сам не решился бы признаться себе. К небу? Нет. К брачному ложу. И вы еще глядели на него, звезды!</p><p class="p1">Почему говорят: «влюбленный»? Надо было бы говорить: «одержимый». Быть одержимым дьяволом – исключение; быть одержимым женщиной – общее правило. Всякий мужчина подвержен этой потере собственной личности. Какая волшебница – красивая женщина! Настоящее имя любви – плен!</p><p class="p1">Женщина пленяет нас душой. Но и плотью. И порой плотью больше, чем душой. Душа – возлюбленная, плоть – любовница!</p><p class="p1">На дьявола клевещут. Не он искушал Еву. Это Ева ввела его в искушение. Почин принадлежал женщине.</p><p class="p1">Люцифер преспокойно шел мимо. Он увидел женщину и превратился в Сатану.</p><p class="p1">Тело – внешняя оболочка неведомого. И – странное дело – оно пленяет своей стыдливостью. Нет ничего более волнующего. Подумать только: оно, бесстыдное, стыдится!</p><p class="p1">В ту минуту именно такое неодолимое влечение к телесной красоте волновало и подчиняло Гуинплена. Страшное мгновение, когда мы вожделеем к наготе. Ничего не стоит поскользнуться и нравственно пасть. Сколько мрака кроется в белизне Венеры!</p><p class="p1">Что-то внутри Гуинплена громко призывало Дею, Дею – девушку, Дею – подругу, Дею – плоть и пламя, Дею – с обнаженной грудью. Он был готов прогнать ангела. Таинственный кризис, переживаемый всяким влюбленным и грозящий опасностью идеалу. Извечный закон мироздания.</p><p class="p1">Миг помрачения небесного света в душе.</p><p class="p1">Любовь Гуинплена к Дее обращалась в любовь супружескую. Целомудренная любовь – только переходная ступень. Настала неизбежная минута. Гуинплен страстно желал эту женщину.</p><p class="p1">Он страстно желал женщину.</p><p class="p1">Он скользил по этой наклонной плоскости, обрывавшейся на первом же шагу.</p><p class="p1">Невнятный зов природы необорим.</p><p class="p1">Какая бездна – женщина!</p><p class="p1">К счастью для Гуинплена, близ него не было женщины, кроме Деи. Единственной женщины, которую он желал. Единственной, которая могла желать его.</p><p class="p1">Гуинплен весь был охвачен неясным трепетом: сама жизнь властно взывала в нем о своих правах.</p><p class="p1">Прибавьте к этому еще и влияние весны. Он вбирал в себя неизъяснимые токи звездной ночи. Он шел без цели, в каком-то упоительном забытьи.</p><p class="p1">Рассеянный в воздухе аромат весенних соков, хмельные запахи, которыми пропитан сумрак ночи, благоухание распускавшихся вдали ночных цветов, согласный щебет, доносящийся из укрытых где-то маленьких гнезд, журчанье вод и шелест листьев, вздохи со всех сторон, свежесть, теплота – все это таинственное пробуждение природы не что иное, как властный голос весны, нашептывающий о страсти, дурманящий призыв, и душа отвечает ему лишь бессвязным лепетом, сама уже не понимая собственных слов.</p><p class="p1">Всякий, кто увидел бы в эту минуту Гуинплена, подумал бы: «Смотри-ка! Пьяный!»</p><p class="p1">Действительно, он еле держался на ногах под бременем своего отягощенного сердца, под бременем весны и ночи. Кругом было безлюдно и тихо, и Гуинплен порою громко разговаривал сам с собой.</p><p class="p1">Когда знаешь, что тебя никто не слышит, охотно говоришь вслух.</p><p class="p1">Он медленно шел, опустив голову, заложив руки за спину, держа левую в правой и не сжимая ладони.</p><p class="p1">Вдруг он почувствовал, как будто что-то скользнуло ему в руку.</p><p class="p1">Он быстро обернулся.</p><p class="p1">В руке у него была бумага, а перед ним стоял какой-то человек.</p><p class="p1">Очевидно, этот человек, неслышно, как кошка, подкравшись к нему сзади, сунул ему в руку бумагу.</p><p class="p1">Бумага оказалась письмом.</p><p class="p1">Человек, насколько его можно было рассмотреть при свете звезд, был маленького роста, круглолиц, совсем юн, но очень важен и одет в огненного цвета ливрею, видневшуюся между длинными полами серого плаща, называемого в то время capenoche – испанское сокращенное слово, означающее «ночной плащ». На голове у него была ярко-малиновая шапочка, похожая на кардинальскую шапочку, но с галуном, указывавшим на то, что ее носитель – слуга. К шапочке был прикреплен пучок вьюрковых перьев.</p><p class="p1">Мальчик неподвижно стоял перед Гуинпленом. Он походил на фигуру, привидевшуюся во сне.</p><p class="p1">Гуинплен узнал в нем слугу герцогини.</p><p class="p1">И, прежде чем Гуинплен успел вскрикнуть от удивления, он услыхал тоненький, не то детский, не то женский, голосок пажа, который говорил ему:</p><p class="p1">– Будьте завтра в этот же час у Лондонского моста. Я буду там и провожу вас.</p><p class="p1">– Куда? – спросил Гуинплен.</p><p class="p1">– Туда, где вас ждут.</p><p class="p1">Гуинплен перевел глаза на письмо, которое продолжал машинально держать в руке.</p><p class="p1">Когда он снова поднял их, грума уже не было. Вдали, на ярмарочной площади, двигался темный силуэт, быстро уменьшавшийся в размерах. Это уходил маленький слуга. Он завернул за угол и исчез из виду.</p><p class="p1">Гуинплен посмотрел на удалявшегося грума, потом на письмо. В жизни человека бывают мгновения, когда случившееся с ним как будто не случилось; оцепенение некоторое время не дает ему осознать происшедшее. Гуинплен поднес письмо к глазам, как будто хотел прочесть его, но только тут заметил, что не может сделать это по двум причинам: во-первых, конверт еще не был распечатан, во-вторых, было темно. Прошло несколько минут, прежде чем он сообразил, что в гостинице горит фонарь. Он ступил два-три шага, но в сторону, как бы не зная, куда идти. Так двигался бы лунатик, получив письмо из рук призрака.</p><p class="p1">Наконец он очнулся от изумления и почти бегом направился к гостинице, остановился против приоткрытой двери и еще раз посмотрел при свете на запечатанное письмо. На печати не было никакого оттиска, а на конверте стояло только одно слово: «Гуинплену». Он сломал печать, разорвал конверт, развернул письмо, поднес его ближе к свету и прочел:</p><p class="p1">«Ты безобразен, а я красавица. Ты скоморох, а я герцогиня. Я – первая, ты – последний. Я хочу тебя. Я люблю тебя. Приди».</p></span></span></span></span>
