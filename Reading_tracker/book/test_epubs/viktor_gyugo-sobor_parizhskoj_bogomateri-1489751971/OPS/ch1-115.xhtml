<span><span><span id="id185"><div class="title6">
<p class="p">Часть девятая</p>
<p class="p">На развалинах</p>
</div><span id="id186"><div class="title6">
<p class="p">1. С высоты величия в бездну отчаяния</p>
</div><p class="p1">В то время, как на колокольне собора святого Павла пробило полночь, какой-то человек, перейдя Лондонский мост, углублялся в сеть саутворкских переулков. Фонари уже не горели, ибо в то время в Лондоне, как и в Париже, гасили городское освещение в одиннадцать часов, то есть именно тогда, когда оно всего нужнее. Темные улицы были безлюдны. Отсутствие фонарей сокращает количество прохожих. Человек шел большими шагами. На нем был костюм, совсем не подходящий для поздней прогулки по улицам: шитый золотом атласный камзол, шпага на боку, шляпа с белыми перьями; плаща на нем не было. Ночные сторожа при виде его говорили: «должно быть, какой-нибудь лорд, побившийся об заклад», – и уступали ему дорогу с уважением, с каким должно относиться и к лордам и к пари.</p><p class="p1">Человек этот был Гуинплен.</p><p class="p1">Он бежал из Лондона.</p><p class="p1">Куда он стремился, он и сам не знал. Как мы уже говорили, в душе, человека иногда бушует смерч, и для него земля и небо, море и суша, день и ночь, жизнь и смерть сливаются в непостижимый хаос. Действительность душит нас. Мы раздавлены силами, в которые не верим. Откуда-то налетает ураган. Меркнет небесный свод. Бесконечность кажется пустотой. Мы перестаем ощущать самих себя. Мы чувствуем, что умираем. Мы стремимся к какой-то звезде. Что испытывал Гуинплен? Только жажду видеть Дею. Он весь был полон одним желанием: вернуться в «Зеленый ящик», в Тедкастерскую гостиницу, шумную, ярко освещенную, оглашаемую взрывами добродушного смеха простого народа; снова встретиться с Урсусом, с Гомо, снова увидеть Дею, вернуться к настоящей жизни.</p><p class="p1">Подобно тому, как стрела, выпущенная из лука, с роковою силою устремляется к цели, так и человек, истерзанный разочарованиями, устремляется к истине. Гуинплен торопился. Он приближался к Таринзофилду. Он уже не шел, он бежал. Его глаза впивались в расстилавшийся перед ним мрак; таким же жадным взором всматривается в горизонт мореплаватель в поисках гавани. Как радостна будет минута, когда он увидит освещенные окна Тедкастерской гостиницы!</p><p class="p1">Он вышел на «зеленую лужайку», обогнул забор: на противоположном конце пустыря перед ним выросло здание гостиницы – единственной, как помнит читатель, жилой постройки на ярмарочной площади.</p><p class="p1">Он стал всматриваться. Света не было. Все окна были темны.</p><p class="p1">Он вздрогнул. Затем стал убеждать себя, что уже поздно, что харчевня закрыта, что дело объясняется просто: все спят, и ему надо только разбудить Никлса или Говикема, постучав в двери. Он двинулся туда. Он уже не бежал – он мчался изо всех сил.</p><p class="p1">Добравшись до харчевни, он остановился, с трудом переводя дыхание. Если человек, измученный жестокой душевной бурей, судорожно сопротивляясь натиску нежданных бедствий, не зная, жив ли он или мертв, все же способен с бережной заботливостью относиться к любимому существу – это верный признак истинно прекрасного сердца. Когда все оказывается поглощенным пучиной, всплывает наверх одна только нежность. Первое, о чем подумал Гуинплен, это как бы не испугать спящую Дею.</p><p class="p1">Он подошел к дому, стараясь производить как можно меньше шума. Он хорошо знал чуланчик, служивший ночным убежищем Говикему; в этом закоулке, примыкавшем к нижнему залу харчевни, было маленькое оконце, выходившее на площадь. Гуинплен тихонько постучал пальцем по стеклу. Надо было только разбудить Говикема.</p><p class="p1">Но в каморке никто не пошевелился. «В его возрасте, – решил Гуинплен, – спят очень крепко». Он стукнул в оконце еще раз. Никакого движения.</p><p class="p1">Он постучал сильнее два раза подряд. В чуланчике по-прежнему было тихо. Тогда, встревоженный, он подошел к дверям гостиницы и постучался.</p><p class="p1">Никакого ответа.</p><p class="p1">Чувствуя, что весь холодеет, он подумал: «Дядюшка Никлс стар, дети спят крепко, а у стариков сон тяжелый. Постучу погромче».</p><p class="p1">Он барабанил, бил кулаком, колотил изо всей силы. И это вызвало в нем далекое воспоминание об Уэймете, когда он, еще мальчиком, бродил ночью с малюткой Деей на руках.</p><p class="p1">Он стучался властно, как лорд; ведь он и был лордом, к несчастью.</p><p class="p1">В доме по-прежнему стояла мертвая тишина.</p><p class="p1">Он почувствовал, что теряет голову. Он уже перестал соблюдать осторожность. Он стал звать:</p><p class="p1">– Никлс! Говикем!</p><p class="p1">Он заглядывал в окна в надежде, не вспыхнет ли где-нибудь огонек.</p><p class="p1">Никакого движения. Ни звука. Ни голоса. Ни малейшего света. Он подошел к воротам, стал стучаться, яростно грясти их и кричать:</p><p class="p1">– Урсус! Гомо!</p><p class="p1">Волк не залаял в ответ.</p><p class="p1">На лбу Гуинплена выступил холодный пот.</p><p class="p1">Он оглянулся вокруг. Стояла глухая ночь, но на небе было достаточно звезд, чтобы рассмотреть ярмарочную площадь. Его глазам представилась мрачная картина – кругом был голый пустырь; не осталось ни одного балагана. Ни одной палатки, никаких подмостков. Ни одной повозки. Цирка тоже не было. Там, где еще совсем недавно шумно кишел бродячий люд, теперь зияла зловещая черная пустота. Все исчезло.</p><p class="p1">Безумная тревога овладела Гуинпленом. Что это значит? Что случилось? Разве тут больше нет никого? Разве с его уходом рухнула вся его прежняя жизнь? Что же сделали с ними со всеми? Ах, боже мой!</p><p class="p1">Как ураган, он снова ринулся к гостинице. Он стал стучать в боковую дверь, в ворота, в окна, в ставни, стены, стучал кулаками, ногами, обезумев от ужаса и тоски. Он звал Никлса, Говикема, Фиби, Винос, Урсуса, Гомо. Стоя перед стеной, он надрывался в криках, он стучал что было мочи. По временам он умолкал и прислушивался. Дом оставался нем и мертв. В отчаянии он снова принимался стучать и звать. Все вокруг гудело от его ударов, стука и криков. Это было похоже на раскаты грома, пытающиеся нарушить молчание гробницы.</p><p class="p1">Есть такая степень страха, когда человек сам делается страшен. Кто боится всего, тот уже ничего не боится. В такие минуты мы способны ударить ногой даже сфинкса. Мы не страшимся оскорбить неведомое. Гуинплен бушевал как помешанный, иногда останавливаясь, чтобы передохнуть, затем опять оглашал воздух непрерывными криками и зовом, как бы штурмуя это трагическое безмолвие.</p><p class="p1">Он сотни раз окликал всех, кто, по его предположению, мог находиться внутри, – всех, кроме Деи. Предосторожность, непонятная ему самому, но которую он, несмотря на всю свою растерянность, еще инстинктивно соблюдал.</p><p class="p1">Видя, что крики и призывы напрасны, он решил пробраться в дом. Он сказал себе: «Надо проникнуть внутрь». Разбив стекло в каморке Говикема и порезав при этом руку, он отодвинул задвижку и отворил оконце. Шпага мешала ему, и он, гневно сорвав с себя перевязь, пояс и шпагу, швырнул все это на мостовую. Потом, вскарабкавшись на выступ стены, влез, несмотря на узкую оконную раму, в каморку; оттуда он пробрался в гостиницу.</p><p class="p1">В темноте еле была видна постель Говикема, но мальчика на ней не было. Раз не было Говикема, очевидно не было и Никлса. Весь дом был погружен во мрак. В этом совершенно темном помещении угадывалась таинственная неподвижность пустоты и та зловещая тишина, которая означает: «Здесь нет ни души». Содрогаясь, Гуинплен прошел в нижний зал; он натыкался на столы, ронял на пол посуду, опрокидывал скамьи, жбаны, шагал через стулья и, очутившись, у двери, выходившей на двор, так сильно ударил в нее коленом, что сбил щеколду. Дверь повернулась на петлях, Гуинплен заглянул во двор. «Зеленого ящика» там не было.</p></span></span></span></span>
