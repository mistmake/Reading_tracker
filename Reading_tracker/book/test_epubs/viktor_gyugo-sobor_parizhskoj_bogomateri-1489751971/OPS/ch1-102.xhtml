<span><span><span><span id="id166"><div class="title6">
<p class="p">2. И как он поступает</p>
</div><p class="p1">Он вернулся в Тедкастерскую гостиницу. Пробило половина седьмого, «половина после шести», как выражаются англичане. Еще только начинало смеркаться.</p><p class="p1">Дядюшка Никлс стоял на пороге входной двери. Ему так и не удалось согнать с лица выражение испуга, пережитого утром.</p><p class="p1">Заметив Урсуса еще издали, он крикнул ему:</p><p class="p1">– Ну, что?</p><p class="p1">– Как что?</p><p class="p1">– Вернется Гуинплен? Давно уже пора. Скоро соберется публика. Будет сегодня выступать «Человек, который смеется»?</p><p class="p1">– Человек, который смеется, – это я, – сказал Урсус.</p><p class="p1">И, взглянув на содержателя харчевни, оглушительно захохотал.</p><p class="p1">Потом поднялся на второй этаж, распахнул ближайшее к вывеске гостиницы окно, высунулся в него, протянул руку, сорвал доски с надписями: «Гуинплен – Человек, который смеется» и «Побежденный хаос», взял их подмышку и спустился вниз.</p><p class="p1">Дядюшка Никлс следил за ним глазами.</p><p class="p1">– Зачем вы снимаете это?</p><p class="p1">Урсус снова разразился хохотом.</p><p class="p1">– Чему это вы радуетесь? – спросил хозяин.</p><p class="p1">– Я решил жить сам для себя.</p><p class="p1">Никлс понял и приказал своему помощнику Говикему объявлять всем, кто придет, что сегодня вечером представления не будет. Он убрал от дверей бочку, служившую будкой кассирше, и откатил ее в дальний угол низкого зала.</p><p class="p1">Минуту спустя Урсус поднялся в «Зеленый ящик».</p><p class="p1">Он поставил в угол обе вывески и вошел в отделение фургона, которое он называл «женской половиной».</p><p class="p1">Дея спала.</p><p class="p1">Она лежала на постели одетая, только расстегнув платье, как делала обычно во время дневного отдыха.</p><p class="p1">Подле нее сидели, погруженные в задумчивость, Винос и Фиби, одна на табуретке, другая прямо на полу.</p><p class="p1">Несмотря на поздний час, они не надели костюмов, в которых изображали богинь, что свидетельствовало о глубоком унынии. Они так и остались в корсажах из грубой шерсти и в холщовых юбках.</p><p class="p1">Урсус посмотрел на Дею.</p><p class="p1">– Она готовится к более долгому сну, – пробормотал он.</p><p class="p1">И обратился к Фиби и Винос:</p><p class="p1">– Эй, вы, послушайте! Кончена музыка! Можете спрятать ваши трубы в ящик. Хорошо сделали, что не вырядились богинями. Конечно, в своем естественном виде вы достаточно уродливы, но все-таки поступили умно. Щеголяйте в своих отрепьях. Представления не будет ни сегодня, ни завтра, ни послезавтра, ни послепослезавтра. Нет больше Гуинплена. Сам черт его теперь не сыщет.</p><p class="p1">И он снова устремил глаза на Дею.</p><p class="p1">– Какой это будет для нее удар! Она погаснет сразу, как свеча.</p><p class="p1">Он набрал в грудь воздуха и дунул:</p><p class="p1">– Фу! – и кончено.</p><p class="p1">И засмеялся сухим смешком.</p><p class="p1">– Не будет у нас Гуинплена, не будет ничего. Это все равно, как если бы я лишился Гомо. Даже хуже. Она почувствует себя более одинокой, чем всякая другая. Слепые тяжелее переживают горе, чем мы.</p><p class="p1">Он подошел к окошечку в глубине фургона.</p><p class="p1">– Как прибавляется день! Уже семь часов, а еще довольно светло. Все-таки зажжем свечу.</p><p class="p1">Он высек огнивом искру и зажег фонарь, спускавшийся с потолка «Зеленого ящика». Затем наклонился над Деей.</p><p class="p1">– Она простудится. Вы ее слишком легко одели. Французы говорят:</p><div class="poem">
<div class="stanza">
<p class="v">Апрель еще не май –</p>
<p class="v">Фуфайки не снимай.</p>
</div>
</div><p class="p1">Заметив, что на полу блестит булавка, он поднял ее и воткнул себе в рукав. Потом, жестикулируя, стал ходить взад и вперед по фургону.</p><p class="p1">– Я не потерял присутствия духа. Я нахожусь в здравом уме более, чем когда-либо. По-моему, данное событие в порядке вещей, и я одобряю то, что происходит. Как только она проснется, я выложу ей все без утайки. Катастрофа разразится немедленно. Гуинплена больше нет. Значит, прощай, Дея! Как хорошо все устроилось. Гуинплен в тюрьме, Дея на кладбище. Как раз друг против друга. Настоящая пляска смерти. Две человеческие судьбы сходят со сцены. Спрячем костюмы. Захлопнем чемодан, то есть гроб. Это была чета неудачников. Дея без глаз, Гуинплен без лица. Там, на небесах, Господь возвратит Дее зрение, а Гуинплену красоту. Смерть все приводит в порядок. Все отлично. Фиби, Винос, повесьте на стену ваши тамбурины. Ваш, с позволения сказать, музыкальный талант теперь зачахнет, мои красавицы. Ни играть, ни трубить больше не придется. «Побежденный хаос» побежден. «Человеку, который смеется» – крышка. Великому шуму и грохоту конец. А Дея все спит. И хорошо делает. На ее месте я бы и не просыпался. Впрочем, она скоро опять заснет. Долго ли помереть такой худышке? Вот что значит удариться в политику. Какой урок! И как правительства правы! Гуинпленом занялся шериф. Деей займется могильщик, Поучительная симметрия. Надеюсь, хозяин харчевни плотно запер дверь. Сегодня мы умрем в тесном семейном кругу. Впрочем, ни я, ни Гомо. Одна только Дея. Я буду по-прежнему разъезжать в фургоне. Я рожден для бродячей жизни. Отпущу обеих женщин. Ни одной у себя не оставлю. У меня есть наклонность сделаться старым развратником. Служанка у распутника – все равно что хлеб на столе. Не желаю искушений. Не по возрасту это мне. Turpe senilis amor<a href="ch2.xhtml#id180" class="a">[250]</a>. Теперь опять стану бродить один с Гомо. Вот кто удивится – так это он: где Гуинплен, где Дея? Мы снова вдвоем, старый товарищ. Я в восторге, черт побери! Поперек горла стояла у меня их идиллия. А этот негодяй Гуинплен и не думает возвращаться. Он бросил нас. Прекрасно. Теперь очередь за Деей. Ну, эта не заставит себя долго ждать. Я люблю законченность во всем. Пальцем о палец не ударю, чтобы помешать ей умереть. Околевай, слышишь! Ах, черт, она просыпается!</p><p class="p1">Дея открыла глаза (слепые часто спят с закрытыми глазами). Ее нежное, невинное лицо озарилось улыбкой.</p><p class="p1">– Она улыбается, – пробормотал Урсус, – а я смеюсь. Все идет прекрасно.</p><p class="p1">Она позвала:</p><p class="p1">– Фиби! Винос! Пора, должно быть, начинать представление. Я, кажется, очень долго спала. Оденьте меня.</p><p class="p1">Ни Фиби, ни Винос не шевельнулись.</p><p class="p1">Между тем взгляд Деи, в котором было нечто невыразимое, свойственное всем слепым, встретился с глазами Урсуса. Старик вздрогнул.</p><p class="p1">– Ну, – закричал он, – чего вы ждете? Фиби, Винос, разве вы не слышите, что говорит Дея? Оглохли вы, что ли? Живее! Представление сейчас начнется.</p><p class="p1">Обе женщины с крайним удивлением смотрели на Урсуса.</p><p class="p1">Урсус заорал:</p><p class="p1">– Разве вы не видите, что публика уже собирается? Фиби, одевай Дею! Винос, бей в тамбурин!</p><p class="p1">Фиби была само послушание, Винос – пассивность. Вдвоем они олицетворяли собою безропотную покорность. Их хозяин всегда был для них загадкой. Кого не понимают, тому обычно слепо повинуются. Они просто решили, что он сошел с ума, но исполнили его приказание. Фиби сняла с гвоздя костюм, Винос схватила тамбурин.</p><p class="p1">Фиби принялась одевать Дею. Урсус опустил завесу «женской половины» и уже по ту сторону ее продолжал:</p><p class="p1">– Смотри-ка, Гуинплен! Почти полон двор народу. У входа настоящая давка. Ну и толпа! Хороши Фиби и Винос, им и дела нет. До чего глупы эти цыганки! Что за дурачье живет в Египте! Не подымай занавески. Будь скромен: Дея одевается.</p><p class="p1">Он сделал паузу, и вдруг послышалось восклицание:</p><p class="p1">– Как прекрасна Дея!</p><p class="p1">Это был голос Гуинплена. Фиби и Винос вздрогнули и обернулись. Это был голос Гуинплена в устах Урсуса.</p><p class="p1">Выглянув из-за занавески, он знаком запретил им выражать свое удивление.</p><p class="p1">Потом продолжал голосом Гуинплена:</p><p class="p1">– Ангел!</p><p class="p1">И возразил уже своим голосом:</p><p class="p1">– Это Дея-то ангел? Ты рехнулся, Гуинплен. Из всех млекопитающих летают только летучие мыши.</p><p class="p1">И прибавил:</p><p class="p1">– Вот что, Гуинплен, ступай-ка отвяжи Гомо. Это будет умнее.</p><p class="p1">И легкой походкой Гуинплена он быстро побежал по приставной лесенке «Зеленого ящика». Он подражал шагам Гуинплена в расчете, что Дея услышит этот топот.</p><p class="p1">На дворе он увидел Говикема, которого так занимало все происходящее, что он не мог заняться никаким другим делом.</p><p class="p1">– Подставь обе руки, – шепотом сказал Урсус.</p><p class="p1">И насыпал ему целую пригоршню медных монет.</p><p class="p1">Такая щедрость растрогала Говикема.</p><p class="p1">Урсус шепнул ему на ухо:</p><p class="p1">– Останься во дворе, прыгай, пляши, стучи, вой, реви, свисти, ори, бей в ладоши, топай, хохочи, сломай что-нибудь.</p><p class="p1">Дядюшка Никлс, оскорбленный и огорченный тем, что публика, пришедшая посмотреть на «Человека, который смеется», поворачивала назад и направлялась в другие балаганы на ярмарочной площади, запер дверь харчевни; желая избежать докучных расспросов, он даже отказался торговать в этот вечер напитками. Оставшись без дела из-за несостоявшегося представления, он смотрел с галереи на двор, держа в руке свечу. Урсус: поднеся обе руки ко рту, чтобы его слышал только Никлс, обратился к нему:</p><p class="p1">– Джентльмен, возьмите пример с вашего слуги: визжите, вопите, рычите!</p><p class="p1">Вернувшись в «Зеленый ящик», он приказал волку:</p><p class="p1">– Гомо, вой как можно громче.</p><p class="p1">И, повысив голос, произнес:</p><p class="p1">– Слишком много народу. Боюсь, что стены не выдержат.</p><p class="p1">Винос тем временем ударила в тамбурин.</p><p class="p1">Урсус продолжал:</p><p class="p1">– Дея одета. Можно будет сейчас начать. Жалко, что столько напустили публики. Какая уйма их набилась! Посмотри-ка, Гуинплен! Какая сумасшедшая давка! Бьюсь об заклад, что нынче у нас будет самый большой сбор за все время. Ну-ка, бездельницы, принимайтесь за свою музыку! Ступай сюда, Фиби, возьми свой рожок. Хорошо. Винос, колоти в тамбурин. Задай ему встряску, да покрепче! Фиби, стань в позу богини славы. Милостивые государыни, вы, по-моему, недостаточно оголились. Сбросьте безрукавки. Накиньте газ. Публика не прочь полюбоваться на женские формы. Пускай моралисты мечут громы и молнии. Черт возьми, можно себе позволить маленькую нескромность. Больше страсти! Огласите воздух бешеными мелодиями. Трубите, гудите, дудите, трещите, бейте в тамбурины! Сколько народу… Гуинплен!</p><p class="p1">Он перебил себя:</p><p class="p1">– Помоги мне, Гуинплен. Откинем стенку.</p><p class="p1">Тем временем он развернул носовой платок.</p><p class="p1">– А я пока прочищу как следует нос.</p><p class="p1">И он энергично высморкался – необходимое приготовление к чревовещанию.</p><p class="p1">Спрятав платок в карман, он привел в движение систему блоков, заскрипевших как обычно, и откинул стенку фургона.</p><p class="p1">– Гуинплен, не отдергивай занавеса! Пускай он будет закрыт до начала представления. Иначе мы окажемся на виду у всех. Фиби, Винос, ступайте обе на авансцену. Ну-ка, сударыни! Бум! Бум! Публика у нас подобралась на диво. Самые что ни на есть подонки! Господи, сколько народу!</p><p class="p1">Цыганки, привыкшие к безропотному повиновению, разместились по обе стороны откинутой стенки.</p><p class="p1">Тут Урсус превзошел самого себя. Это был уже не один человек, а целая толпа. Задавшись целью изобразить двор, переполненный народом, на том месте, где зияла абсолютная пустота, он призвал на помощь свои удивительные способности чревовещателя. Со всех сторон сразу раздались голоса людей и животных. Он превратился в целый легион. Закрыв глаза, можно было подумать, что находишься на какой-нибудь площади, где волнуется праздничная или мятежная толпа. Вихрь криков и восклицаний вырывался из груди Урсуса: он пел, лаял, горланил, кашлял, харкал, гикал, нюхал табак, чихал, вел диалоги, задавал вопросы, отвечал, и все это одновременно. Обрывки фраз сталкивались, перерезали друг друга. В безлюдном дворе звучали голоса мужчин, женщин, детей. Сквозь смутный гомон и смешанный гул голосов прорывалась, точно сквозь дымную завесу, странная какофония, кудахтанье, мяуканье, плач грудных детей. Слышались хриплый говор пьяниц, недовольное ворчанье собак, которым зрители наступали на лапы. Голоса раздавались вблизи, доносились издали, сверху, снизу, справа, слева. Все в совокупности было рокотом, каждый звук в отдельности был криком. Урсус стучал кулаками, топал ногами, кричал то из глубины двора, то откуда-то из-под земли. Это было что-то бурное и хорошо знакомое. Он переходил от шепота к шуму, от шума к грохоту, от грохота к реву урагана. Он был самим собою и в то же время всеми. Это были то монологи, то хор голосов. Так же, как существует зрительный обман, существует и слуховой. Тем же, чем был Протей для взора, был Урсус для слуха. Ничего не могло быть искуснее такого подражания толпе. Время от времени он раздвигал занавес и смотрел на Дею. Дея слушала.</p><p class="p1">Говикем тоже бесновался во дворе.</p><p class="p1">Винос и Фиби добросовестнейшим образом дули в трубы и отчаянно барабанили.</p><p class="p1">Единственный зритель, дядюшка Никлс, так же как и они, решил, что Урсус сошел с ума; это, впрочем, было только лишним мрачным штрихом на фоне его меланхолии. «Какое безобразие!» – бормотал себе под нос этот славный трактирщик. Он сохранял серьезность, как всякий, кто не забывает, что над ним бдит закон.</p><p class="p1">Говикем, в восторге, что может принять участие в этом гаме, неистовствовал не меньше Урсуса. Это забавляло его. Кроме того, он ведь зарабатывал деньги.</p><p class="p1">Гомо был задумчив.</p><p class="p1">Производя весь этот шум, Урсус умудрялся произносить еще отдельные фразы:</p><p class="p1">– Как всегда, Гуинплен, против нас заговор. Опять конкуренты стараются подорвать наш успех. Но шиканье только придает ему остроту. Кроме того, народу набралось слишком много. Зрителям тесно. Когда тебя толкает локоть соседа, это не вызывает восторга. Только бы они не поломали скамеек. Ах, если бы наш друг Том-Джим-Джек был здесь! Но он не приходит больше. Посмотри, целое море голов! У этой части публики, которая стоит, не слишком довольный вид, хотя, по словам великого ученого Галена, стоячее положение укрепляет организм. Мы сократим спектакль; так как на афише значится только «Побежденный хаос», то мы не будем играть «Ursus rursus». Хоть на этом выгадаем. Какой кавардак! До чего сумасбродна эта буйная толпа. Уж чего-нибудь они да натворят! Однако это не может так продолжаться. Ведь такой шум заглушает все происходящее на сцене. Надо обратиться к ним с речью, чтобы они успокоились. Гуинплен, раздвинь немного занавес! Граждане…</p><p class="p1">Тут Урсус прервал самого себя, крикнув резким и пронзительным голосом:</p><p class="p1">– Долой старика!</p><p class="p1">И уже своим голосом продолжал:</p><p class="p1">– Кажется, публика меня оскорбляет. Цицерон прав: plebs, fex urbis<a href="ch2.xhtml#id179" class="a">[251]</a>. Ничего, попробуем уговорить чернь. Трудно будет заставить их слушать. Однако я все-таки попытаюсь. Человек, исполни свой долг. Посмотри-ка, Гуинплен, на эту мегеру! Как она скрежещет зубами!</p><p class="p1">Урсус сделал паузу и заскрежетал зубами. Гомо, введенный в заблуждение, последовал его примеру. Говикем присоединился к ним обоим.</p><p class="p1">Урсус продолжал:</p><p class="p1">– Женщины куда хуже мужчин. Момент не особенно подходящий. Все равно, испытаем силу слова… Красноречие никогда не помешает. Послушай, Гуинплен, как я буду их увещевать. Гражданки и граждане! Я – медведь. Чтобы говорить с вами, я снимаю свою голову. Покорнейше прошу вас соблюдать тишину.</p><p class="p1">Изображая возглас в толпе, Урсус крикнул:</p><p class="p1">– Брюзга!</p><p class="p1">И продолжал:</p><p class="p1">– Я глубоко уважаю свою аудиторию. Брюзга – обращение ничуть не хуже всякого другого. Привет тебе, буйная толпа! Я нисколько не сомневаюсь в том, что все вы бездельники. Но от этого мое уважение к вам ничуть не меньше. Уважение вполне сознательное. Я отношусь с искренним почтением к господам жуликам, оказавшим мне честь явиться сюда. Среди вас есть уроды, но для меня это безразлично. Хромые и горбатые – явление естественное. Верблюд горбат; у бизона нарост на спине; у барсука обе левых ноги короче правых; об этом упоминает еще Аристотель в своем трактате о походке животных. Те из вас, у кого есть две рубашки, одну носят на теле, а другую несут к ростовщику. Я знаю, что это дело обычное. Альбукерк закладывал свои усы, а святой Денис – свой нимб. Ростовщики ссужали деньги даже под нимб. Достойные примеры. Иметь долги – значит уже кое-что иметь. В вашем лице я чту нищету.</p><p class="p1">Урсус прервал свою речь, крикнув низким басом:</p><p class="p1">– Втройне осел!</p><p class="p1">И ответил самым вежливым тоном:</p><p class="p1">– Согласен. Я ученый. Приношу в этом свое извинение. С научной точки зрения я и сам презираю науку. Невежество есть нечто такое, чем можно снискать себе пропитание; наука же заставляет голодать. В общем, приходится выбирать: либо быть ученым и худеть, либо быть ослом и пощипывать травку. О граждане, пощипывайте травку! Наука не стоит ни одного вкусного кусочка. Я предпочитаю есть бифштекс, нежели знать, как он называется по-латыни. Я обладаю только одним достоинством: у меня глаза не на мокром месте. Я никогда не плакал. Надо вам сказать, что и доволен я никогда не был. Никогда. Даже самим собой. Я презираю себя. Но прошу присутствующих здесь представителей оппозиции принять во внимание, что если Урсус всего-навсего ученый, то Гуинплен – настоящий артист.</p><p class="p1">Он снова фыркнул:</p><p class="p1">– Брюзга!</p><p class="p1">– Опять брюзга! Это – серьезное возражение. И тем не менее я пропускаю его мимо ушей. А рядом с Гуинпленом, милостивые государи и милостивые государыни, вы увидите другого артиста, личность мохнатую и благородную, странствующую с нами, господина Гомо – некогда дикую собаку, а ныне цивилизованного пса и верноподданного Ее Величества. Гомо – мимический актер, одаренный замечательным талантом. Будьте внимательны и сосредоточьтесь. Сейчас вы увидите игру Гомо и Гуинплена, а к искусству должно относиться с почтением. Это пристало великим нациям. Не в лесу же вы выросли? А если бы и так, то sylvae sunt consule dignae<a href="ch2.xhtml#id178" class="a">[252]</a>. Два артиста стоят одного консула. Прекрасно. В меня запустили капустной кочерыжкой, но она не задела меня. Это не помешает мне говорить. Напротив. Опасность, которой удалось избежать, предрасполагает к болтливости – garrula pericula, как говорит Ювенал. Зрители, среди вас есть пьяницы, – мужчины и женщины. Отлично. Пьяные мужчины мерзки, пьяные женщины омерзительны. Правда, у вас немало веских причин собираться здесь: праздность, лень, свободное время между двумя-тремя кражами, портер, эль, стаут, солодовые напитки, водка, джин, влечение одного пола к другому. Чудесно. Игривый ум нашел бы себе здесь отличное применение. Но я воздерживаюсь. Любострастие – пускай! Однако и в оргии надо соблюдать известное приличие. Вы весело настроены, но слишком шумны. Вы превосходно подражаете крикам разных животных, но что сказали бы вы, если бы я прервал вашу любовную беседу в укромном уголке с какой-нибудь леди и вдруг стал бы лаять по-собачьи? Это несколько помешало бы вам. Ну так вот, и ваш галдеж нам мешает. Разрешаю вам замолчать. К искусству должно относиться с не меньшим уважением, чем к разврату. Я говорю с вами, как порядочный человек.</p><p class="p1">Он тут же накинулся на себя:</p><p class="p1">– Задуши тебя лихорадка, вместе с твоими бровями, торчащими, как ржаные колосья.</p><p class="p1">И немедленно возразил:</p><p class="p1">– Милостивые государи, оставим в покое ржаные колосья. Грешно оскорблять растения, сравнивая их с людьми или животными. Кроме того, лихорадка не душит, а трясет. Неудачная метафора. Прошу вас, помолчите! Простите за откровенность, но вам не хватает величия, свойственного настоящим английским джентльменам. Я замечаю, что те из вас, у которых из дырявых башмаков вылезают большие пальцы, пользуются этим, чтоб класть ноги на плечи сидящих впереди; это позволяет дамам делать вывод, что подошвы всегда протираются в самом выдающемся месте плюсны. Показывайте немного поменьше ваши ноги и побольше – руки. Я вижу отсюда мошенников, ловко запускающих пальцы в карманы дураков-соседей. Дорогие карманники, будьте чуть-чуть скромнее. Награждайте своего ближнего тумаками, если желаете, но не обкрадывайте его. Он меньше разозлится на вас, если вы подобьете ему глаз, чем если вы сопрете у него медный грош. Так и быть, разбивайте носы. Мещанин больше дорожит деньгами, чем красотой. Впрочем, примите уверения в моем искреннем расположении к вам. Я отнюдь не такой педант, чтобы порицать мошенников. Зло действительно существует. Каждый страдает от него, и каждый его творит. Всех нас одолевают грехи. Сейчас я имею в виду лишь тот грех, о котором говорил раньше. Разве не испытывает каждый из нас этот зуд? Бог – и тот почесывается, когда его жалит дьявол. Я и сам впадал в ошибки. Plaudite, cives!<a href="ch2.xhtml#id177" class="a">[253]</a></p><p class="p1">Здесь Урсус изобразил продолжительный рев толпы, затем закончил речь следующими словами:</p><p class="p1">– Милорды и господа, я вижу, что моя речь имела счастье вам не понравиться. На одну минуту я расстанусь с вашим шиканьем и свистом. Сейчас надену свою голову, и представление начнется…</p><p class="p1">Оставив ораторский тон, он заговорил обыкновенным голосом:</p><p class="p1">– Задерни занавес, передохнем. Я был медоточив. Я говорил хорошо. Я назвал их милордами и господами. Вкрадчивый, но бесполезный язык. Что скажешь ты насчет этих бездельников, Гуинплен? Как ясно видишь все, что выстрадала Англия за последние сорок лет, когда посмотришь на этот озлобленный и лукавый сброд. В старину англичане были воинственны, теперь же они угрюмы, задумчивы и кичатся своим презрением к закону и королевской власти. Я сделал все, на что только способно человеческое красноречие. Я щедро расточал метонимии, прелестные, как цветущие ланиты отрока. Смягчило ли это их? Сомневаюсь. Чего можно ждать от людей, которые поглощают невероятное количество пищи и отравляют себя табаком до такой степени, что даже писатели пишут свои сочинения, не выпуская трубки изо рта? Ну, была не была, начнем пьесу.</p><p class="p1">Кольца, на которых двигался занавес, с визгом заскользили по проволоке. Цыганки перестали бить в тамбурины. Урсус снял со стены свои рыли, сыграл прелюдию и произнес вполголоса:</p><p class="p1">– Каково, Гуинплен? До чего все это таинственно!</p><p class="p1">Затем вступил в борьбу с волком.</p><p class="p1">Одновременно с рылями Урсус снял с гвоздя косматый парик и бросил его на пол, неподалеку от себя.</p><p class="p1">Представление «Побежденного хаоса» шло почти так же, как и всегда, не было только голубого освещения и «магических эффектов». Волк играл вполне добросовестно. В надлежащую минуту появилась Дея и своим чудным трепетным голосом окликнула Гуинплена. Она протянула руку вперед, ища его голову…</p><p class="p1">Урсус кинулся к парику, взбил его, напялил на себя и, удерживая дыхание, тихими шагами приблизившись к Дее, подставил ей свою голову.</p><p class="p1">Затем он призвал на помощь все свое искусство и, подражая голосу Гуинплена, спел с выражением неизъяснимой любви арию чудовища в ответ на зов светлого духа.</p><p class="p1">Он подражал так искусно, что и в этот раз обе цыганки принялись искать глазами Гуинплена, испуганные тем, что, не видя его, слышат его голос.</p><p class="p1">Восхищенный Говикем затопал ногами, захлопал в ладоши, производя невероятный шум и один хохоча, как целое сборище богов. Мальчик, повторяем, оказался на редкость талантливым зрителем.</p><p class="p1">Фиби и Винос, как два автомата, которых заводил Урсус, начали изо всех сил трубить и бить в тамбурины; под эти оглушительные звуки обычно заканчивался спектакль и расходилась публика.</p><p class="p1">Урсус поднялся на ноги, весь обливаясь потом.</p><p class="p1">Он шепнул Гомо:</p><p class="p1">– Понимаешь, надо было выиграть время. Кажется, нам это удалось. Я неплохо вышел из положения, хотя было из-за чего потерять голову. Гуинплен, быть может, еще вернется завтра. Зачем же было преждевременно убивать Дею? Тебе-то я могу объяснить, в чем дело.</p><p class="p1">Он снял парик и отер лоб.</p><p class="p1">– Я гениальный чревовещатель, – пробормотал он. – Как я все это великолепно проделал! Пожалуй, я перещеголял Брабанта, чревовещателя короля Франциска Первого. Дея убеждена, что Гуинплен здесь.</p><p class="p1">– Урсус, – сказала Дея, – а где Гуинплен?</p><p class="p1">Урсус вздрогнул и обернулся.</p><p class="p1">Дея продолжала стоять в глубине сцены, под фонарем, спускавшимся с потолка. Она была бледна как смерть.</p><p class="p1">Она продолжала с неповторимой улыбкой, в которой было отчаяние:</p><p class="p1">– Я знаю. Он нас покинул. Он исчез. Я знала, что у него есть крылья.</p><p class="p1">И, подняв к небу свои невидящие глаза, она прибавила:</p><p class="p1">– Когда же мой черед?</p></span><span id="id167"><div class="title6">
<p class="p">3. Осложнения</p>
</div><p class="p1">Урсус совершенно растерялся.</p><p class="p1">Ему не удалось ввести Дею в заблуждение.</p><p class="p1">Было ли тут виною его искусство чревовещателя? Конечно, нет. Ему удалось обмануть зрячих Фиби и Винос, но слепую Дею он не смог обмануть. Ведь Фиби и Винос смотрели только глазами, тогда как Дея видела сердцем.</p><p class="p1">Он не был в состоянии ответить ни слова. Он только подумал про себя: Bos in lingua<a href="ch2.xhtml#id176" class="a">[254]</a>. У растерявшегося человека точно бык подвешен к языку.</p><p class="p1">Когда человек находится во власти сложных переживаний, он прежде всего испытывает приступ самоуничижения. Урсус пришел к печальному выводу:</p><p class="p1">– Напрасно я столько труда потратил на звукоподражание!</p><p class="p1">Как и всякий мечтатель, потерпевший неудачу, он принялся горько сетовать:</p><p class="p1">– Полный провал! Я воспроизводил все эти голоса впустую. Что же будет теперь с нами?</p><p class="p1">Он взглянул на Дею. Она стояла молча, не шевелясь и все больше и больше бледнея. Ее неподвижный, слепой взор был устремлен куда-то в пространство.</p><p class="p1">На помощь Урсусу пришел случай.</p><p class="p1">Урсус увидел во дворе дядюшку Никлса, который, держа в руке свечу, делал ему знаки.</p><p class="p1">Дядюшка Никлс не дождался конца фантастической комедии, единственным исполнителем которой был Урсус, так как кто-то постучал в двери харчевни. Дядюшка Никлс пошел отворить. В дверь стучали дважды, и хозяин дважды уходил. Урсус, поглощенный своим стоголосым монологом, ничего не заметил.</p><p class="p1">Увидав, что Никлс машет ему рукой, Урсус спустился во двор.</p><p class="p1">Он подошел к хозяину гостиницы.</p><p class="p1">Урсус приложил палец к губам.</p><p class="p1">Дядюшка Никлс тоже приложил палец к губам.</p><p class="p1">Они смотрели друг на друга.</p><p class="p1">Каждый из них словно говорил другому: «Поговорим, но не здесь».</p><p class="p1">Никлс тихо отворил дверь в нижний зал. Они вошли. Кроме них, в комнате не было никого. Входная дверь с улицы и окна были наглухо закрыты.</p><p class="p1">Хозяин захлопнул дверь во двор перед самым носом любопытного Говикема.</p><p class="p1">Потом поставил свечу на стол.</p><p class="p1">Начался разговор. Вполголоса, почти шепотом!</p><p class="p1">– Мистер Урсус…</p><p class="p1">– Мистер Никлс?</p><p class="p1">– Я, наконец, понял.</p><p class="p1">– Вот как!</p><p class="p1">– Вы хотели убедить эту бедную слепую, что все идет как обычно.</p><p class="p1">– Закон не запрещает чревовещания.</p><p class="p1">– У вас настоящий талант.</p><p class="p1">– Вовсе нет.</p><p class="p1">– Удивительно, до какой степени вы умеете воспроизводить все, что вам хочется.</p><p class="p1">– Уверяю вас, нет.</p><p class="p1">– А теперь мне нужно поговорить с вами.</p><p class="p1">– Это разговор о политике?</p><p class="p1">– Как сказать.</p><p class="p1">– О политике я и слушать не хочу.</p><p class="p1">– Вот в чем дело. В то время как вы играли, изображая один и актеров и публику, в дверь стучались.</p><p class="p1">– Стучались в дверь?</p><p class="p1">– Да.</p><p class="p1">– Мне это не нравится.</p><p class="p1">– Мне тоже не нравится.</p><p class="p1">– Что же дальше?</p><p class="p1">– Я отворил.</p><p class="p1">– Кто же стучал?</p><p class="p1">– Человек, который вступил со мной в разговор.</p><p class="p1">– Что он вам сказал?</p><p class="p1">– Я выслушал его.</p><p class="p1">– Что вы ему ответили?</p><p class="p1">– Ничего. Я вернулся смотреть на вашу игру.</p><p class="p1">– Ну?</p><p class="p1">– Ну, и в дверь постучали вторично.</p><p class="p1">– Кто? Тот же самый?</p><p class="p1">– Нет, другой.</p><p class="p1">– Он тоже с вами говорил?</p><p class="p1">– Нет, этот не сказал ни слова.</p><p class="p1">– Я это предпочитаю.</p><p class="p1">– А я нет.</p><p class="p1">– Объяснитесь, мистер Никлс.</p><p class="p1">– Угадайте, кто говорил со мной в первый раз?</p><p class="p1">– Мне некогда разыгрывать роль Эдипа.</p><p class="p1">– Это был хозяин цирка.</p><p class="p1">– Соседнего?</p><p class="p1">– Да, соседнего.</p><p class="p1">– Того, где гремит такая бешеная музыка?</p><p class="p1">– Да. Ну так вот, мистер Урсус, он делает вам предложение.</p><p class="p1">– Предложение?</p><p class="p1">– Предложение.</p><p class="p1">– Почему?</p><p class="p1">– Да потому.</p><p class="p1">– У вас передо мной одно преимущество, мистер Никлс; вы только что разгадали мою загадку, а я никак не могу разгадать вашу.</p><p class="p1">– Хозяин цирка поручил мне передать вам, что он видел, как приходили полицейские, и что он, хозяин цирка, желая доказать вам свою дружбу, предлагает купить у вас за пятьдесят фунтов стерлингов наличными ваш фургон «Зеленый ящик», обеих лошадей, трубы вместе с дующими в них женщинами, вашу пьесу вместе со слепой, которая в ней играет, и вашего волка с вами в придачу.</p><p class="p1">Урсус высокомерно улыбнулся.</p><p class="p1">– Содержатель Тедкастерской гостиницы, передайте хозяину цирка, что Гуинплен вернется.</p><p class="p1">Трактирщик взял со стула что-то темное и повернулся к Урсусу, подняв обе руки и держа в одной плащ, в другой кожаный нагрудник, войлочную шляпу и рабочую куртку.</p><p class="p1">И сказал:</p><p class="p1">– Человек, который постучал вторым, был полицейский; он вошел и вышел, не произнеся ни слова, и передал мне вот это.</p><p class="p1">Урсус узнал кожаный нагрудник, рабочую куртку, шляпу и плащ Гуинплена.</p></span><span id="id168"><div class="title6">
<p class="p">4. Moenibus surdis, campana muta – Стены глухи, колокол нем</p>
</div><p class="p1">Урсус ощупал войлок шляпы, сукно плаща, саржу куртки, кожу нагрудника – никаких сомнений быть не могло; коротким повелительным жестом, не произнеся больше ни слова, он показал хозяину на дверь гостиницы.</p><p class="p1">Тот открыл ее.</p><p class="p1">Урсус опрометью выбежал на улицу.</p><p class="p1">Дядюшка Никлс следил за ним глазами. Урсус бежал так быстро, как только позволяли ему ноги, в том направлении, в каком утром вели Гуинплена. Четверть часа спустя запыхавшийся Урсус был уже в том переулке, куда выходила калитка Саутворкской тюрьмы и где он провел столько часов на своем наблюдательном посту.</p><p class="p1">Этот переулок был безлюден не только в полночь. Но если днем он нагонял тоску, то ночью внушал тревогу. Никто не отваживался появляться в нем позже определенного часа. Казалось, каждый боялся, как бы тюрьма и кладбище не сдвинулись со своих мест и, приди им только фантазия обняться, не раздавили его в этом объятии. Все это – ночные страхи. В Париже подстриженные ивы на улице Вовер тоже пользовались дурной славой. Поговаривали, будто по ночам эти обрубки деревьев превращаются в громадные руки и хватают прохожих.</p><p class="p1">Население Саутворка, как мы уже говорили, инстинктивно избегало этого переулка между тюрьмой и кладбищем. В прежнее время поперек него протягивали на ночь железную цепь. Излишняя предосторожность, ибо самой лучшей цепью, преграждавшей вход в переулок, был внушаемый им ужас.</p><p class="p1">Урсус решительно свернул в него.</p><p class="p1">Какую цель преследовал он? Никакой.</p><p class="p1">Он пришел в этот переулок, чтобы выведать что-нибудь. Собирался ли он постучаться в тюремную дверь? Конечно, нет. Это страшное и бесполезное средство ему и в голову не приходило. Попытаться проникнуть в тюрьму, чтобы расспросить о Гуинплене? Какое безумие! Тюремные двери так же трудно отворяются для тех, кто хочет войти в них, как и для тех, кто хочет выйти. Их можно отпереть только именем закона. Урсус это понимал. Зачем же он пришел сюда? Чтобы увидать. Что именно? Он и сам не знал. Что удастся. Очутиться против калитки, за которой скрылся Гуинплен, – и то уже хорошо. Иногда самая мрачная и угрюмая стена приобретает дар речи, и из щелей между ее камнями вырывается наружу сноп лучей. Порою из наглухо запертого темного здания пробивается тусклый свет. Внимательно рассмотреть оболочку таинственного – значит потерять время – не напрасно. Мы все инстинктивно стараемся быть поближе к тому, что нас интересует. Вот почему Урсус вернулся в переулок, куда выходила задняя дверь тюрьмы.</p><p class="p1">В ту минуту, когда он вступил в него, он услыхал один удар колокола, потом второй.</p><p class="p1">«Неужели уже полночь?» – подумал он.</p><p class="p1">И машинально принялся считать:</p><p class="p1">«Три, четыре, пять».</p><p class="p1">Он подумал:</p><p class="p1">«Какие большие промежутки между ударами! Как медленно бьют эти часы! – Шесть, семь».</p><p class="p1">Потом мысленно воскликнул:</p><p class="p1">«Какой заунывный звон! – Восемь, девять. – Впрочем, все очень понятно. Пребывание в тюрьме нагоняет тоску даже на часы. – Десять. – Да, здесь и кладбище рядом. Этот колокол отмеряет живым время, а мертвым – вечность. – Одиннадцать. – Увы! Тем, кто лишен свободы, он тоже отмеряет вечность. – Двенадцать».</p><p class="p1">Он остановился.</p><p class="p1">«Да, полночь».</p><p class="p1">Колокол ударил тринадцатый раз.</p><p class="p1">Урсус вздрогнул.</p><p class="p1">«Тринадцать!»</p><p class="p1">Раздался четырнадцатый удар, потом пятнадцатый.</p><p class="p1">«Что это значит?»</p><p class="p1">Удары продолжали раздаваться через большие промежутки. Урсус слушал.</p><p class="p1">«Это не часы. Это колокол mutus<a href="ch2.xhtml#id175" class="a">[255]</a>. Недаром я говорил: как медленно бьет полночь. Это не бой часов, а звон церковного колокола. Что же предвещает этот унылый звон?»</p><p class="p1">Во всех тюрьмах того времени, как и во всех монастырях, был так называемый колокол mutus, отмечавший печальные события. Этот «немой колокол» бил очень тихо, словно стараясь, чтобы его не услыхали.</p><p class="p1">Урсус опять возвратился в удобный для наблюдений закоулок, где он провел большую часть дня, не сводя глаз с тюремной калитки.</p><p class="p1">Удары колокола по-прежнему, с большими равномерными паузами, следовали один за другим.</p><p class="p1">Погребальный звон как бы расставляет в пространстве зловещие знаки восклицания. На развернутом свитке наших повседневных забот каждый удар колокола словно мрачно отмечает красную строку. Похоронный звон похож на предсмертное хрипение человека. Он гласит о смертных муках. Если в домах, куда доносится этот звон, кто-нибудь предается мечтательному ожиданию, удары колокола резко обрывают его. Неясные мечты представляются как бы убежищем; человеку, объятому тоскою, они подают какую-то надежду; угрюмый звук колокола отнимает ее своей определенностью. Он рассеивает туманную пелену, за которой стремится укрыться наше беспокойство. Он вызывает в нашей душе горестную тревогу. Похоронный звон напоминает каждому о человеческих страданиях, о чем-то страшном. Эти печальные звуки обращены к каждому из нас. Они предостерегают. Нет ничего более мрачного, чем этот размеренный монолог. Удары, отделенные друг от друга равными промежутками, преследуют какую-то цель. Что кует молот колокола на наковальне нашей мысли?</p><p class="p1">Урсус бессознательно продолжал считать удары, хотя в этом не было никакого смысла. Чувствуя, что он на краю бездны, он старался не строить никаких догадок. Догадки – наклонная плоскость, по которой можно скатиться очень глубоко. И все-таки – что означал этот звон?</p><p class="p1">Урсус смотрел в ту сторону, где, как он знал, находится тюремная калитка.</p><p class="p1">Вдруг в том самом месте, где чернело что-то вроде дыры, появился красноватый отблеск. Он становился все ярче и ярче и превратился в свет.</p><p class="p1">Это было не расплывчатое пятно, а четко обозначившийся в темноте четырехугольник. Дверь тюрьмы повернулась на петлях. Красноватый свет явственно обрисовал притолоку и косяки.</p><p class="p1">Дверь только приотворилась. Тюрьма не распахивает настежь своих ворот, она лишь наполовину раскрывает свою пасть, словно зевая от скуки.</p><p class="p1">Из калитки вышел человек с факелом в руке.</p><p class="p1">Колокол продолжал звонить.</p><p class="p1">Внимание Урсуса теперь раздвоилось: он напряженно прислушивался к колоколу и в то же время не спускал глаз с факела.</p><p class="p1">Пропустив человека, полуоткрытая дверь широко раскрылась, и из нее вышло еще двое; вслед за ними показался четвертый. Это был жезлоносец. Урсус узнал его при свете факела. В руке у него был жезл.</p><p class="p1">Вслед за жезлоносцем вышли попарно какие-то люди; они двигались молча, держась прямо, словно деревянные истуканы.</p><p class="p1">Участники этого ночного шествия, напоминавшего процессию кающихся, с мрачной торжественностью, пара за парой, переступали тюремный порог, стараясь не производить ни малейшего шума. Так осторожно выползает из своей норы змея.</p><p class="p1">Факел освещал свирепые лица и мрачные фигуры.</p><p class="p1">Урсус узнал тех самых полицейских, которые утром увели Гуинплена.</p><p class="p1">Никаких сомнений – это были те же люди. Теперь они выходили из тюрьмы.</p><p class="p1">Очевидно, сейчас выйдет и Гуинплен.</p><p class="p1">Они привели его сюда, они и выведут его назад.</p><p class="p1">Это ясно.</p><p class="p1">Урсус стал всматриваться еще пристальнее. Выпустят ли Гуинплена на свободу?</p><p class="p1">Полицейские по двое выходили из-под низкого свода, очень медленно, как просачивается капля за каплей из стены вода. Колокол, не переставая звонить, казалось, ударял в такт их шагам. Выходя из тюрьмы, люди в этом шествии поворачивались спиною к Урсусу, направляясь в правый, противоположный, конец переулка.</p><p class="p1">В дверях блеснул второй факел.</p><p class="p1">Значит, шествие сейчас кончится.</p><p class="p1">Сейчас Урсус увидит, кого они сопровождают. Узника. Человека.</p><p class="p1">Сейчас Урсус увидит Гуинплена.</p><p class="p1">То, что они сопровождали, наконец появилось.</p><p class="p1">Это был гроб.</p><p class="p1">Четыре человека несли гроб, покрытый черным сукном.</p><p class="p1">За гробом шагал могильщик с лопатой на плече.</p><p class="p1">Шествие замыкалось третьим факелом, который держал человек, читавший какую-то книгу, – очевидно, тюремный священник.</p><p class="p1">Гроб понесли за полицейскими, повернув направо.</p><p class="p1">В то же время люди, шедшие впереди, остановились.</p><p class="p1">Урсус услышал скрип ключа в замке.</p><p class="p1">Факел осветил другую дверь, напротив тюрьмы, в низкой стене, тянувшейся по ту сторону переулка.</p><p class="p1">Эта дверь, над которой был изображен череп, вела на кладбище.</p><p class="p1">Жезлоносец вошел в нее, за ним остальные, за дверью скрылся уже второй факел; шествие стало короче, напоминая хвост уползающей змеи; вся вереница полицейских исчезла во тьме, за ними гроб, могильщик с лопатой, священник с факелом и книгой, и дверь захлопнулась.</p><p class="p1">Все исчезло, только за стеной еще мерцал свет.</p><p class="p1">Послышалось какое-то бормотанье, потом глухие удары.</p><p class="p1">Вероятно, священник и могильщик провожали гроб, опускаемый в землю, – один псалмами, другой комьями земли.</p><p class="p1">Бормотанье прекратилось, прекратились и глухие удары.</p><p class="p1">Опять послышались шаги, сверкнули факелы, на пороге распахнувшейся кладбищенской калитки снова показался жезлоносец, высоко держа свой жезл, за ним священник с книгой, могильщик с лопатой, полицейские, но уже без гроба. Процессия, двигаясь все так же попарно, вернулась обратно тем же путем, храня, как и прежде, угрюмое молчание; закрылись ворота кладбища, отворилась, снова освещенная факелами, дверь тюрьмы; сводчатый коридор на мгновение озарился красноватым отблеском; взору Урсуса предстали мрачные недра тюрьмы, и снова все потонуло во тьме.</p><p class="p1">Колокол умолк. Ночь завершила трагедию, опустив над нею зловещий занавес тишины.</p><p class="p1">Видение исчезло бесследно.</p><p class="p1">Призраки рассеялись.</p><p class="p1">Мы часто находим какой-то смысл в случайных совпадениях и строим на этом основании как будто правдоподобные догадки.</p><p class="p1">К таинственному аресту Гуинплена, к его одежде, принесенной полицейским, к похоронному звону колокола в той самой тюрьме, куда его увели, присоединилась еще одна трагическая деталь – опущенный в землю гроб.</p><p class="p1">– Он умер! – воскликнул Урсус и без сил опустился на камень. – Умер! Они убили его! Гуинплен! Дитя мое! Мой сын! – И он зарыдал.</p></span></span></span></span>
